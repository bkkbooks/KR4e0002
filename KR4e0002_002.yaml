body:
  text: 文憲集卷二明宋濂撰記凡三十章觀心亭記昊天純祐九有民全以所覆畀我大明皇帝執符御厯撥亂世而反之正化行仁流臻於泰寧然猶孜孜夙夜敬厥德奉若天道赫如上帝鑒臨乃洪武十年冬十月丙午朔復敕工曹造觀心之亭于宫城上設甓為墉塗以赭泥中置黼座前闢彤户越七日壬子落成上親幸焉召臣濂語之曰人心虛靈乘氣機出入操而存之為難朕罔敢自暇自逸譬魚之在井雖未免跳躑終不能度越範圍况有事於天地廟社尤用祇惕致齋之日必端居亭中返視却聽上契沖漠體道凝神誠一弗二庶幾將事之際對越在天洋洋乎臨其上卿為朕記之傳示來裔咸知朕志俾弗懈愈虔臣拜手稽首而揚言曰書有之惟天無親克敬惟親民罔常懷懷于有仁鬼神無常享享于克誠曰誠曰敬曰仁皆中心所具非由外鑠我也此心若存則動靜合道建中保極之源清而弗擾庶績咸熙否則天飛淵淪懍乎若朽索之馭六馬唯欲之從而罔克攸濟治忽之幾其始甚微不可不慎也欽惟皇帝陛下法天啓運乾乾終日不遑暇食十有五年大統斯集政平人和休祥屢應斯皆觀心之明驗古先哲王相傳心法所謂精一執中之訓亦不過此聖子神孫必來取法當有不言而喻者矣雖然靡不有初鮮克有終臣願陛下存神內居常如亭中時則必與天為一祥刑敷政一出自天衍億萬年無疆之休亦永無疆之聞不亦顯哉臣不佞既承詔旨輒稽古書而為之記别有觀神亭與斯亭東西對峙其制同其義亦無異云遊琅琊山記洪武八年十有一月壬子皇上以皇太子暨諸王久處宫掖無以發舒精神命西幸中都沿道校獵以講武事濂實奉詔扈從十有二月戊午次滁州驛濂進啓曰臣聞琅琊山在州西南十里晉元帝潛龍之地帝嘗封琅琊王山因以名頗聞秀麗偉拔為淮東竒觀願一遊焉而未能也敢請皇太子歡然可之即約四長史同行秦王府則林伯恭晉王府則朱伯賢楚王府則朱伯清靖江王府則趙伯友遂自驛西南出過平臯約三里所望豐山盤互雄偉出琅琊諸峯上唐梁載言十道志又云豐亭山山上有漢高祖祠又有飲馬池世俗妄傳漢高祖曽飲馬于此國朝以山麓為畜養之場别鑿池飲馬仍揭以舊名居人指云山下有幽谷地形低窪四面皆山其中有紫微泉宋歐陽公修所發泉上十餘步即豐樂亭直豐樂之東數百步至山椒即醒心亭由亭曲轉而西入天寧寺今皆廢惟涼煙白草而已濂聞其語為悵然者久之山東南有柏子潭潭在深谷底延袤畝餘色正深黑即歐陽公賽龍處上有五龍君祠皇上初龍飛屯兵于滁會旱暵親挾雕弓注矢于潭者三約三日雨如期果大雨及御寶厯為作欄楯護潭且新其廟廟側有時若亭濂坐亭上問潭側雙燕洞及其南白鴿洞以肆窮覽人無知者乃止復西行約三里所有泉瀉出於兩山之間分流而下曰釀泉潺湲清激可鑑毛髮傍岸有亭曰漸入佳境今亦廢惟四大字勒崖石間淳熙中郡守張商卿等題名尚存沿溪而過薛老橋入醉翁亭亭久廢名人石刻頗夥兵後焚煉為堊殆盡亭後四賢堂亦廢亭側有玻璃泉又名六一泉石闌覆之闌下壓以巨石中疏一竅通泉徑可五六寸手掬飲之溫是日天隂雪花翩翩飄伯清亟倡曰雪作矣不還將何為濂遊興方濃掉頭去弗顧其步若飛歷石徑一里所至回馬嶺伯友追而至伯清繼之伯友曰二客足力弱不能從矣二客伯賢伯恭也其謂回馬者建炎冦盜充斥郡守向子伋因山為寨植東西二門西曰太平東乃回馬也嶺之東有醴泉又其東南有栲栳山山之南有桃花洞又南有了頭山山之下有熙陽洞皆未暇往蛇行磬折黃茅白葦間莽不知所之宋熙寧初僧崇定獲佛舍利六百壘石為四十九塔於道隅纍纍如貫珠塔雖廢幸有遺址可憑徑行無疑其路若窮又復軒豁蓋峯回路轉九鎖而至開化禪院在琅琊山最深處惜乎山皆童而無蔚然深秀之處唐大厯中刺史李幼卿與僧法深同建此院即張文定公方平寫二生經處三門外有觀音泉入院皆瓦鑠之區惟新構屋三楹間中施佛像僧紹寧出速坐方定龍典院僧德學同太子贊善孟益秦王伴讀趙鐄吳王伴讀王驥楚王伴讀陳子晟聞濂入山咸來會晟云太子正字桂彥良憩六一泉上亦足弱不能進恐隨二客歸矣寧具飯飯客飯已學引觀庶子泉泉出山罅中乃幼卿所發李陽氷所篆銘銘已亡張億書三字碑亦斷裂卧泉下石崖上多諸儒題名陷石為一方鐫勒其中自皇祐淳熙乾道以來皆有之字或或𨽻或楷或可辨或不可辨山之東西在在皆然不特此泉也泉之南有白龍泉禱雨多驗童行堂下有明月溪稍南有吳道子畫觀音及須菩提像刻石壁上傍鐫淮東部使者八人舜臣琅琊山記頗不合文體為之破顔一笑又稍南有華嚴池由明月而上入歸雲洞訪于佛塔遺址過石屏路俯窺大厯井井亦幼卿所鑿沿山腰陟磨拖嶺逺望大江如練鍾阜若小青螺在遊氣冥茫中嶺下有琅琊洞洞廣兩室中有一穴深不測名人題識無異庶子泉懼日夕復不暇往焉自幼卿博求勝迹鑿石引泉以為溪左右建上下坊作禪室琴臺後人頗繼其風山中之亭幾二十所而日觀望月為尤勝今荆榛彌望雖遺迹亦無從求之可歎哉夫亭臺廢興乃物理之常奚足深慨所可慨者世間竒山川如琅琊者何限第以處于偏州下邑無名勝士若幼卿者黼黻之故潛伏而無聞焉爾且幼卿固能使琅琊聞于一方自非歐陽公之文安足以逹於天下或謂文辭無關于世果定論邪然公以道德師表一世故人樂誦其文不然文雖工未必能久傳也傳不傳亦不足深論獨念當元季繹騷竄伏荒土朝不能謀夕今得以厠迹朝班出陪帝于巡幸而琅琊之勝遂獲窮探豈非聖德廣被廓清海宇之所致邪非惟濂等獲沾化育生成之恩而山中一泉一石亦免震驚之患是宜播之聲歌以侈上賜遊觀云乎哉因取醉翁亭記中語風霜高潔水落石出字為韻各賦一詩授主僧紹廣刻諸山石云元史目録記洪武元年秋八月上既平定朔方九州攸同而金匱之書悉輸於祕府冬十有二月乃詔儒臣發其所藏纂修元史以成一代之典而臣濂臣禕實為之總裁明年春二月丙寅開局至秋八月癸酉書成紀凡三十有七卷志五十有三卷表六卷傳六十有三卷丞相宣國公臣善長率同列表上已經御覽至若順帝之時史官職廢皆無實録可徵因未得為完書上復詔儀曹遣使行天下其涉於史事者令郡國上之又眀年春二月乙丑開局至秋七月丁亥書成又復上進以卷計者紀十表二傳三十又六凡前書有所未備頗補完之其時與編摩者則臣趙塤臣朱右臣貝瓊臣朱世廉臣王濂臣王彛臣張孟兼臣髙遜志臣李懋臣張宣臣李汶臣張簡臣杜寅臣俞寅臣殷弼而總其事者仍臣濂與臣禕焉合前後二書復釐分而附麗之共成二百一十卷舊所纂録之士其名見於表中者或仕或隱皆散之四方獨塤能始終其事云昔者唐太宗以開基之主干戈甫定即留神於晉書敕房玄齡等撰次成編人至今傳之肆惟皇上龍飛江左取天下於羣雄之手大統既正亦詔修前代之史以為世鑒古今帝王能成大業者其英見卓識若合符節蓋如是嗚呼盛哉第臣濂等以荒唐繆悠之學義例不明文詞過陋無以稱塞詔旨之萬一夙夜揣分無任戰兢今鏤板訖功謹繫嵗月次第於目録之左庶幾博雅君子相與刋定焉洪武三年十月十三日史臣金華宋濂謹記歙縣孔子廟學記歙漢縣也初屬丹陽自吳晉而下雖屢更為郡若州而縣仍舊名不廢其地為東越奧區號多佳山川黟川如龍前行偃蹇不受羈紫陽問政二山又矗起東南勢若翔鳯鳯凰飛布紫金諸峯又騰翥于後先而黃山又直西北竒巒之不可名者凡三十六丹崖翠岑分割隂陽而吐和降精于無窮故士之生其間者或以氣節著或以道藝名時有其人近代尤稱多士立言著書動足名家是固因山川之靈攸鍾其沈涵陶育之者非立學之所致歟初學在縣市之東淳祐庚戌郡守謝堂始建至大庚戌縣尹宋節至正甲申縣丞葉琛皆葺而新之壬辰兵起而歙為鬬爭之場官廬民舍焚爇無遺而學亦廢矣淡煙荒照榛荆蔽途而狐兔或暮出衝人識者為之倣徨太息如是者十年辛丑之夏張侯齊來為縣喟然嘆曰歙為徽國文公父母之邦道德之化衣被天下雖時當尚武而其鄉學可久廢乎遂請于大府而經營之會故基已更構紫陽書院遂於書院之東立表考宜剪刈穢荒别畚新土充其虧窪髙爽塏疏有踰其舊中峙王寢象厥正配黼座朱几嚴事有容旁圓從祀於兩廡間外敞正門列以畫戟法庭端潔墄平密鞏欄楯翼遮術道直修外為都墉樹以三門上應靈星榮光昭煥廟左别築論堂直齋以處講師暨弟子員不嗇不侈無愆彛憲經始于秋九月考成于明年壬寅之秋八月侯帥儒師行釋奠禮牲幣有飭庭燎伊煌樽俎維旅法齊苾芬神來顧歆如在左右觀者歎慕至於咏蹈僉謂侯之嘉惠吾民者深不可無以貽永久於是教諭江君材奉幣請文刻諸麗牲之碑惟先王之制自諸子以至公卿大夫士之子使之修德學道春合諸學秋合諸射以考其藝而進退之是文事武備均出于學也所以興師必受成而行及其還也則釋奠于學而以訊馘告曷嘗析為二哉自世道既衰不復獲沾先王之澤之盛人徒見提幡鼓而簡車徒者乃指為武殊不知制勝兩楹折衝千里而有所謂詩書之帥也侯於下車之初能汲汲建學於用武之日可謂知斯道矣歙之人士尚當専心一力惇於明體適用之學平居之時則談俎豆而攻遺經一遇四郊有警則操戈上馬以收獻馘之功使議者咸曰是生文公之邦而無忝山川之靈者庶幾不負建學之意不然豈豫之所敢知哉侯字仲賢齊其名也某郡人以行中書掾擢為令招徠懷集民歡趨之遂成市落縣廨驛舍皆新作之而尤急于農功築吕堨及良干范阮二埭嵗以有秋其善政蓋不一而足當時相其成者則丞胡拱辰主簿王某及江君云集賢大學士吳公記先公諱直方字行可姓吳氏其先毗陵人一遷于鄱再遷于睦三遷浦陽之新田唐乾寧初有諱公養者又遷縣西尊仁里至先公十五世曽祖諱聞贈中奉大夫福建道宣慰使護軍追封渤海郡公妣盛氏追封渤海郡夫人祖諱蕃纍贈資善大夫太常禮儀院使上護軍追封渤海郡公妣沈氏追封渤海郡夫人父諱伯紹纍贈翰林學士承旨榮祿大夫柱國追封渤國公妣金氏追封渤國夫人先公自幼有大志篤意儒學及壯遊京師主留守曼濟台台家教其子托克托及額森特穆爾元統間托克托為御史中丞以先公嘗用説書事明宗于潛邸奏除江浙等處儒學提舉中書易為副提舉階將仕佐郎先公年已六十一矣未上御史臺改授將仕郎海北廣東道肅政廉訪司管勾承發架閣庫兼照磨遷中政院管勾承發架閣庫復升長史階威如故重記至元末廟堂用事者頗擅威福上與大臣謀罷其政柄先公實協贊之上念其功召至便殿錫以黃金繫帶超拜集賢直學士就轉侍講學士未幾升學士厯亞中中奉資善三階大夫會托克托入相中書國有大政令多咨先公而後行先公每引古義告之言無不聽民被其澤為多先公以年及致仕上章乞骸骨遂以集賢大學士榮祿大夫食俸賜終身俄又賜田一千九百餘畝尋謝不受先公前娶盛氏先十七年卒後娶金李二氏金氏封渤國夫人子男二長萊字立夫延祐庚申以春秋經預鄉薦後用御史祭舉為饒州路長薌書院山長博學能文為世聞人亦先十七年卒次即志道崇文監丞奉訓大夫孫男三長士愕嫠州路金華縣儒學教諭次士謐次存仁曽孫男三長中次平次弇曽孫女一申先公生于宋德祐乙亥十一月二十四日庚寅薨于今至正丙申七月十二日庚寅享年八十有二卜以是年八月十二日庚申葬德政鄉後吳山徐塢之原距承旨公墓左五十步而近嗚呼褒敘令德是在世之立言君子非不肖孤所敢僭姑序世系及歷官次第納諸玄堂别録其副以藏于家庶幾後人知所考焉嗚呼痛哉孤子志道泣血謹記浙東行省右丞李公武功記惟我皇帝既定浙東西地以其疆場與虜人犬牙相入乃置浙東行省以轄五府一州之衆建牙于嚴于時右丞李公實以上之懿親總受藩宣之寄而兼命參知政事胡公德濟分治諸暨所以聨絡氣勢綏輯東土而折衝外侮者也乃乙已之春二月己丑虜挾我叛人謝再興分兩道入冦其舟師自釣臺烏石窺我建德公遣兵禦之其馬步卒踰濤江而東圍諸暨之新城聲言二十萬壁壘旁午旌旗充塞虜堅忍持重務以為必拔之計構飾寢宇創建倉庫預建州長二官屬復分精卒數萬屯城北十里以遏我援師胡公堅壁力守戒將士勿輕與戰有來攻城者發矢石退之遂遣使乞師于公公即欲馳援初釣臺之役稍不利亡一千夫長至是羣情疑沮或獻謀於公曰嚴實吾藩垣所寄虜若闞公往即起乘之奈何諸暨雖受圍得一鋭將帥師解焉可也公曰浙水東門戶在諸暨諸暨茍不守郡縣必致驛騷故虜盛兵東向而使遊兵泝釣臺以綴我師我不往脫有弗靖嚴其能獨利乎乃屬大師三人為居守明日癸丑遂行有自虜中來者又以衆寡不敵為辭公弗顧甲寅至浦江丁巳抵烏傷之龍潭去虜營不二十里因據其險忽有白氣自東北經天三軍見之勇氣百倍日且晡軍中驚言虜將襲我公亦不為動夜四鼓城中知有援至潛縋士卒來約明旦將空壁逆戰戊午蓐食已公分諸將為左右翼公自將其中軍既成列會參軍胡君深復承公檄率所部將士亦自括而至軍氣益振公乃申號令曰師之勝負在曲直不在多寡我國何負於叛人虜乃挾之日夜以生變癸卯之秋九月壬午直犯我東陽我不敢愛其生晝夜兼行殄之於烏傷爾三軍之所親覩皇天助順不可誣也今虜又不改行盡驅其衆以擾我邊疆占書云軍中見白氣者剋敵之像此殆天欲滅此虜也爾等尚效死斬刺以報國家之寵靈毋怯母貪獲毋避險阻毋左右顧視有不如約者即戮以徇語始畢虜兵整圎陳而至兵既接公乘匹馬挺身先入陷其中軍中軍虜之精鋭所萃見公至競來迫之槍屢及公膝公馬上運戟捷如雨風當其鋒者應手皆仆虜氣皆讋左右翼及諸軍一齊奮擊聲振天地軍遂大亂時溪洞兵居後列猶觀望欲集兩山之民呼曰虜敗矣虜敗矣遂皆棄甲而奔我軍乘勝逐北斬首如刈麻前後躪踐死者以萬餘計溪水為之不流胡公亦率精甲出圍城中從公合擊之殺獲甚衆其主帥僅以身免燔其營寨若干俘其將帥六百軍士三千馬八百輜重鎧仗積如丘山三月己未凱歌而旋所至父老爭進牛酒為公夀公勞而却之辛酉還嚴既飲至即命幕府上其功簿于朝上嘉公敵愾之功錫以御衣名馬其餘將士第功行賞有差濂聞之軍讖之論良將有曰以身先人故其兵為天下雄説者引薛仁貴為將持戟腰刀奮呼入敵衆輒為之奔潰此所以為天下之雄也濂以公之事觀之殆似有過焉者蓋仁貴挺身陷陳其驍悍若與公同然必兩軍相當方可制勝未聞其以寡却衆如公之為也今虜兵大集塞野蔽川人孰不為公危公以不滿萬之衆談笑而殱之斯不亦昔人之所尤難哉由公精忠貫于內徑氣注於外但知有國而不知有其身瞋目張膽視虜若無故其功業焜耀至於如此也公之賢為不可及矣濂昔待罪右史嘗書公之勞烈藏之金匱今又因邦人士之請為文若詩以昭公之光庶使世之讀者上毋忘於帝德下無負於公之功云公名文忠字世英敬賢下士如弗及平居恂恂禮遜及臨大敵雖賁育之勇不是過君子服焉系之以詩曰於赫皇王大明東升爍彼羣陰六合載清建藩分鎮以奠以寧倬彼李公實遍東浙虎符煌煌侑以龍節導宣皇靈德柔威刷吳虜逞虐登我叛臣屢啓兵釁來毒蒸民亦既搗之化為埃塵龍集鶉首仲春之月怙惡弗悛竟犬之突合圍諸暨不通一髮公聞之怒氣衝斗間咄哉狂虜天紀之干翹其若鷇鬬此徑翰乃飭將佐整厥堅胄􅙀厥雕戈礪厥金鏃我欲即發爾罔或沒禡纛于門載之以行叶卒旅言言旄幟翻翻蛟螭騰淵熊羆出山直薄龍潭伺敵而戰有氣經天其白如練吉徵開先何兵不剪左右列屯兩翼飛鶱公將虎旅宅其中堅氣通脈聨勢如率然復戒多士虜衆我寡大刀長揮毋獲士馬要使青原盡變為赭虜馳而至公躍而前單戟奮先星流飊旋閃閃莫定觸之必顛虜實警疑斯何為者莫非神兵自天而下震懾相駭弓不能弝三軍縱擊其亂如雲混混沌沌紛紛紜紜或斷其膂或斫其齦蠢彼有苗猶爾偵視山氓齊呼倒戈而避我師疾逐其勢尤熾如雷斯掀如風斯奔如火斯燉融乾燭坤一鼓而殱凛焉雄吞譬猶鴐鵝衆若雲翳孤隼橫擊無有不斃將唯在勍豈多為貴人亦有言天監匪私我直彼曲孰不周知以順討逆云胡不夷昔兵始交毒霧蒙絡今敵既平上下清廓神道助順理甚昭灼奏凱而旋既歌且謡歌聲委蛇間以短簫祥颸獻娛嘉卉動搖耆耋歡迎列拜馬首非公之臨幾陷虎口敢以牛酒以為公夀三軍戾止燕饗有容公拜稽首疏于章封非臣之力諸將之功皇情悅豫徴公入覲珠衣龍馬錫之不吝第賞其餘匪琛伊賮自古在昔六龍御天必有良弼參佐化權遂開丕基萬世其延惟皇神聖控御區宇百寮師師選有文武親賢如公綏我東土綏我東土我民用熙無敵不靡無徠不懷成此武功實耀簡書簡書所紀以勸在位贊咏鋪張選古之義史臣作歌蹈揚奮厲故懷逺將軍髙昌衛同知指揮使司事華善公墳記公諱華善輝和爾氏世居高昌曽祖紐掄事元世祖有功封高昌王祖特穆爾布哈中書左丞相父布逹實哩中書平章政事皆襲王爵母額森呼圖克封王夫人公性警敏能知時逹變幼亦紹王封鎮永昌洪武三年大兵下蘭州公賫印綬自永昌率府屬詣轅門內附詔授懷逺將軍高昌衛同知指揮使司事世襲其職公乃開設官署招集降卒數百人會宋國公馮公勝奉敕征甘肅命公移鎮西涼轉輸饋餉無乏朝廷嘉之不幸以七年九月二十八日卒于南京之寓舍年二十有八以十月八日葬江寧縣聚寶門外五里吕氏花園上遣使者祭墓恩禮優渥人皆以為榮公妻曰都堅子一人太平女二人在室惟公生于王家暨入國朝榮膺顯爵方以事功自見而賦年不永惜哉因為疏其世系及卒葬大槩納於墓以志其哀恆山精舍記恆山精舍者旴江王君伯昭藏修之所也精舍建於旰江恆山則在中山之陽曲地之相去若是其甚逺也而名之以恆山者何示不忘其先也蓋伯昭之先家于陽曲其八世祖尚書左丞公由進士起家揚厯臺省政和中蔡京方居宰府有徐禋者增廣鼓鑄之説以媚京公劾止之既而京引方士以惑上公復上疏言并奏京欺君罔上蠧國害民數事直詞正氣震動一時公諱安中字履道世所稱初寮先生者也公之子辟章出守泉州亦以政事聞泉州之子秬往來旴江樂其水土之衍沃遂徙家焉至伯昭已更六世矣伯昭締室麻姑山之下東西之廣㢙充三筵楹礎鞏密户牖靚明伯昭飲水著書其中以樂先王之道間嘗出户而望見夫林巒之蒼潤煙霞之卷舒晴容雨態之變移輒北向泫然流涕曰嗚呼是山信美矣吾其敢忘於恆山乎恆山先世之所宅也其杖屨所經巖阿川曲遺馨故在也吾其可忘於恆山乎恆山不可忘則夫寤寐於先德者或者庶幾其有合乎於是名其精舍曰恆山所以志也濂竊聞之昔者晉陽穆公自江左遷于疏屬之南汾水之曲惕然有感于中其家廟座必東南向曰未忘先子之國也穆公者王虬也著政大論八首以言帝王之道曽孫通因按之以續經其人亦賢矣今伯昭與虬皆王氏而汾水陽曲又皆冀州之境安知其初不出於一族乎穆公之所感伯昭之所志其道固宜相同也其所異者穆公則自南而北遷伯昭之先則自北而南來爾雖然此不必較也古之人不忘其先者不齊其迹而追其德使伯昭能振先德而弗使之墜則雖遷旴江而無殊于恆山茍舍此而不圖則雖世處乎恆山日遊乎陽曲亦奚翅久居于遐荒而忘其祖也乎伯昭學贍而文雄試藝鄉闈嘗占前列及其再貢又冠多士文光煜然起于東南如長虹貫天無逺弗覩大江之西未能或之先也而其為人俊偉磊落又有燕趙竒男子之風異時立朝徑氣直辭必將無愧前人伯昭雖不緦緦於恆山濂亦知其能承家學矣然而記有之樂樂其所自生禮不忘其本伯昭蓋深逹夫禮樂之原者其能不致謹於斯乎伯昭能致謹於斯是則所以為伯昭者也華川書舍記華川書舍者烏傷王君子充學文之所也烏傷有大澤曰華川唐武德間嘗置華川縣不久而縣廢今之所謂繡湖者即其地也子充之居直湖之陰猶繫之以舊名志乎古也子充之志乎古豈止此而已哉上自羣聖人之文下逮諸子百家之文咸萃舍中日冥搜而精玩之大肆其力於文愈出而愈無窮以濂同受經于侍講黃先生之門也請為記書于舍壁濂雖稍長於子充視子充之辭鋒橫厲百未能及一縱強顔欲記之將何以云耶雖然子充弱冠時濂見其文輒曰子充他日當以文知名今始十年而子充名動薦紳間識者遂以濂為知言濂雖不文寧不為子充一言乎嗚呼文豈易言哉日月照耀風霆流行雲霞卷舒變化不常者天之文也山嶽列峙江河流布草木發越神妙莫測者地之文也羣聖人與天地參以天地之文發為人文施之卦爻而陰陽之理顯形之典謨而政事之道行咏之雅頌而性情之用著筆之春秋而賞罰之義彰序之以禮和之以樂而扶導防範之法具雖其為教有不同凡所以正民極經國制樹彛倫建大義財成天地之化者何莫非一文之所為也自先王之道衰諸子之文人人自殊管夷吾氏則以霸略為文鄧析氏則以兩可辨説為文列禦冦氏則以黃老清淨無為為文墨翟氏則以貴儉兼愛尚賢明鬼非命尚同為文公孫龍氏欲屈衆説則又以堅白名實為文莊周氏則又以通天地之統序萬物之性逹死生之變為文慎到氏則又以刑名之學為文申不害氏韓非氏宗之又流為深刻之文鬼谷氏則又以捭闔為文蘇秦氏張儀氏學之又肆為縱橫之文孫武氏吳起氏則又以軍刑兵勢圖國料敵為文獨荀况氏粗知先王之學有若非諸子之可及惜乎學未聞道又不足深知羣聖人之文凡若是者殆不能悉數也文日以多道日以裂世變日以下其故何哉蓋各以私説臆見譁世惑衆而不知會通之歸所以不能參天地而為文自是以來若漢之賈誼董仲舒司馬遷揚雄劉向班固隋之王通唐之韓愈栁宗元宋之歐陽修曽鞏蘇軾之流雖以不世出之才善馳騁于諸子之間然亦恨其不能皆純揆之羣聖人之文不無所愧也上下一千餘年惟孟子能闢邪説正人心而文始明孟子之後又惟舂陵之周子河南之程子新安之朱子完經翼傳而文益明爾嗚呼文豈易言哉自有生民以來涉世非不逺也歷年非不久也能言之士非不夥且衆也以今觀之照耀如日月流行如風霆卷舒如雲霞惟羣聖人之文則然列峙如山嶽流布如江河發越如草木亦惟羣聖人之文則然而諸子百家之文固無與焉故濂謂立言不能正民極經國制樹彛倫建大義者皆不足謂之文也士無志於古則已有志于古舍羣聖人之文何以法焉斯言也侍講先生嘗言之子充亦嘗聞之濂復取以為子充告者誠以子充將以文知名于世不可不以羣聖人之文為勉也濂家芙蓉山之陽距子充之居不二舍而近他日謁子充于湖之隂仰觀俯察天地之文退坐書舍中又參之以羣聖人之文則濂與子充各當有所進也子充以濂言為然乎雖然濂言夸矣子充幸為我刪之月堀記余退直詞林戴華陽之巾被鹿皮之裘焚香默坐存神規中太和薰蒸百體欣順龍降虎升水溫火寒周流密綿莫究端倪沖陽子自空明洞天翩翩而來碧曈方頤氣貌充甚謁入揚袂言曰月堀之義子知之乎揚雄云西壓月堀指月所生之地也吾意則不然太隂之精朔後魄生至望而盈盈極而衰隨日漸虧晦而復蘇上下二弦虧盈得平氣和弗偏吾煉九還七返靈丹抽添進退之候每於月而取則焉因名其室以月堀所以志之豫曰陽陰不可偏勝也獨陽不生獨陰不成乾坤搆精六子乃凝水坎火離中藏偶竒用竒變偶乾道始茂重隂盡消純陽則昭久而行之與道逍遙是謂三一之真也復命之區也若取則乎月無乃専溺於陰乎沖陽子曰二氣之精互為其根房日之兔畢月之烏取象表徴指意甚微陽既合陰陰亦含陽茍舉其偏道則不張子何見之拘邪豫曰言則美矣其理尚有所遺也人身之中有玄牝焉繫乎天根呼吸所關絲絡聨綿枝葉扶踈靜以養之一氣孔神超于象先不見其朕玉色連娟天光內朗蓋以無為而得無為而成孰火能為其候孰鼎能為其爐孰藥能為其材我皆不得而知也假形託物著于丹書顛倒錯亂自漢以來已如斯矣吾將與子握手空明洞天之上當素月流輝銀鋪水翻瑶露初滴寂然無聲委羽仙人必騎黃鶴而一下之與子稍一叩焉則豫之説為當矣沖陽子喟然而嘆曰道有精粗象分內外非粗不足以别精非外不足以形內初機之徒未忘乎物茍不以此示之必大笑而走何可與上士玄功之成者並論哉子之説固當而吾之所取喻又豈可少哉於是相視一笑沖陽子揖而退豫送至庭外沖陽子復請曰一隂之生其卦為姤是月堀也一陽之生其卦為復是天根也邵子嘗往來其間而所謂三十六宫都是春者其與吾月堀之義頗有合乎豫曰此大易精微所繫雖更僕不能盡也豫惡能知之豫惡能知之君當問諸庖犧沖陽子曰唯沖陽子張姓輔其名以廷翼為字台之黃岩人蓋有道之士也洪武四年正月某日玄真遁叟金華宋濂記松風閣記夫風者天地之噫氣然則生生者誰哉生之者靜之體而應之者動之用也當其萬竅怒號前者唱于而隨者唱喁咸物之自取也庭宇之松蒼髯奮傑於晨露夕月之中遇祥飈過之冷冷然如鸞鳯之鳴如琴瑟之音昔者陶隱居恆樂之後世幽人狷士又從而效之或取以名其室焉方外恬師靜庵來徴所謂松風閣記豫請極其變者而言之可乎始風之未生也斂神功於寂默之中昏昏冥冥萬象雖具不見其迹天機一動隨品物以流形大海遇之重波復浪一瀉萬里千山逢之鱗甲掀動笙鏞間作經簷蔔之林則郁烈酣潤清芬之襲人入鮑魚之肆則腥穢逆鼻觸之而噦嘔如此者不可以一二數茍獨指松而為言非所以極風之變者也然其變者豈皆有繫于風之動哉先覺有云風性本靜以緣起故動儻其性本動則寧有靜時是則物各有以自取也且以吾心言之大用繁興之時怒氣熾然如霆奔火烈喜色熙然如霧廓霞舒興哀則千人霣涕鼓勇則萬夫莫敵皆此一心之變也然心果有變乎心無變其所變者緣爾故當本體澄湛之際無物不有而無一物之留以近取譬所謂生之者靜之體而應之者動之用豈非然歟豫家浦陽大山中青松羅垣舍之北南明月之夜白露初零默然出坐庭際松聲到耳乍大乍小或亟或徐中心頗樂之方知隱居酷愛之者良有以也自松聲而推之世間之聲萬變不齊雖不可勝窮其道亦不外是矣嘗一滴之醎而知滄海之性窺寸隙之光而見日輪之體又何以紛紜為哉恬師學佛之流故豫極其變而告之須知變之中而有不變者存不變者何前所謂心者是也心無體段無方所無古今無起滅三世諸佛不見其有餘河沙凡夫不見其不足恬師能索之於此焉則松風朝夕所演無非大乘微妙之法隱居惡足以語此哉閣在越之耶溪上季蘅若公之所建者因得徑山範公所書松風二大字遂揭以為名豫謂徑山古之名德其字不可褻玩宜别求善書者易之既告之故復為記其事如右其詳則見天竺法師道公所為文其妙無以加矣豫何言哉生生堂記生生堂者東陽陳澤民之所居也縣南八十里有鄉名瑞山陳氏世家其中至諱宗譽字彥聲者有德於鄉又能與陸務觀父子遊而其諸孫黼東萊吕成公弟子擢淳熙辛丑進士第纍官駕部郎中林正惠公實以女妻之澤民蓋其十世從孫也澤民思繼承家學出從名師巨儒遊精于科目之業有司貢上選曹試經義合格署通判于漳州將上以堂記屬豫豫頗聞縣之仁夀鄉在東北四十里而近有簮纓家亦與澤民同姓而譜諜不通非其族也嘗搆宅一區方建前楹有鳩鳴其上占之者云此宅當屬之張氏後六十年復歸于陳未幾西鄰張氏果來居之張既不振人士皆謂復還于始搆之家不知乃澤民竟以重資獲之也僂指計之誠甲子一周矣噫亦異哉澤民遂筮日自瑞山而遷當春氣煦明卉木含榮有嚶其鳴澤民刲羊刺豕具尊俎合賔姻而燕樂之酒微酣坐客擊案為節而歌之曰有巋者堂髙明之居蔚蔚紆紆曲橑而交疏惟德之符冥數懸應不爽乎錙銖繼有賡之者曰新居其遷茀祿其延族姓其聨演迤而芊綿於是州邑之間咸稱事有前定澤民之遷居有不偶然者澤民因取書有生生自庸之義用以名其堂鳴呼生生之義雖見於書而莫備於易易云生生之謂易夫隂之生陽陽之生隂生生相續變易而不窮澤民之居於此他日子孫衆多甚欲有類於易之言有類於易之言則生生不息矣雖然非積善之家未足以致之然所謂善者何盡孝以事親竭忠以事君德義以提身信愛以睦鄰仁惠以及民五者備矣方不愧名堂之義爵祿之來當未艾也駕部翁孫豈得専美於前哉占者之云蓋出於禨祥小數而非君子之大道此勿論焉可也豫老矣文辭卑陋不足應人之求人翻疑為矯集其門者日益繽紛也卷軸之積動如束筍近亦力排而深絶之矣以澤民鄉人也義不得辭聊相與一言之怡養堂記禮之不行常自近而易能者始惟其近也故人忽之惟其易能也故人不加之意焉事親人人之所能也其事朝夕之所習也聖人恐人忽而不加之意自夫起居食息寒暑疾病之微問告拜跪定省應對之節皆著之禮經可謂詳且備矣然而能盡之者雖君子猶難之豈事親之禮誠難行哉難乎其當也甘膬之養人所能致也而敬難敬人所能也而愛難敬欲其如事大賔則何難之有而非敬親之道也愛欲其如愛妻子則何難之有而非愛親之道也故敬而不愛非所以事親也愛而不敬非所以事親也愛而肅恭之禮存焉敬而婉悅之意備焉斯可以為善養矣陵江劉復初父及繼母俱存思盡事親之道名其堂曰怡養而請余記夫記以紀事功著其可見者堂之作吾不得而知其可見者人皆能言之非事之所急也然則舍事親之道何以為復初言乎復初好學慎行不待余言以余事親先於復初則知事親之難莫余若也故推其道以告之俾書之壁使後人有所興起焉復古堂記監察御史虞泰魯瞻嘗奉諸父玄佐之命請記其所名復古堂者豫以不文固辭而魯瞻請之益勤乃叩之曰子之所謂復古者以為上古乎上古之時巢居而穴處汙樽而抔飲茹毛而飲血子今有室廬器用之美稻梁羊牛之饒決不能復之以為中古乎中古之制冠辨裳衣以定其分鼎彝罍爵以稱其用門奧屋漏以嚴其居筵榻格几以殊其度雖曰異於上古有可法者子今狃於久安必隨世而變遷想亦未易以復之也然則子之復古者將何居魯瞻笑曰非是之謂也虞氏之居餘姚自漢日南太守以來代有顯人至唐永興文懿公為尤著文懿公實泰之逺祖流裔至今二十七世矣嶼山之南有虞家城周圍一百五十丈相傳以為故宅之基尚巋然獨存諸父每相與登眺白煙涼草觸目悽然輒彈指嘆曰虞氏之先嘗光著矣奈何無迓續徽猷者乎復古之名蓋以此也豫曰繼志述事孝子慈孫所當為况思追紹于七百餘年之前此其見之確行之厲是足尚已第不知復於古者果止於斯否乎魯瞻曰何謂也豫曰文懿公之為人外謹懦而中抗烈固以文學政事圖形凌煙而為唐代名臣較之同時孔司業之經術杜萊公之政業議者有未足焉孔之與杜然矣較于漢之留侯及董江都其運籌之良宅心之純或猶未能無遺憾焉以此例之古今人物其優劣不倫雖更僕未能盡也欲師古者宜取則于上上賢者在古亦衆矣何獨私于一家哉魯瞻曰先生之言侈矣留侯之與江都信足法歟余曰不然也古之人以道德為師者有孔子焉有孟氏焉以政業居輔弼者有伊尹焉有周公焉人而不為孔孟伊周其學皆茍焉而已子將復古必如斯而後可爾魯瞻曰敢問復之之功奚先余曰載籍之存者莫古於易伏犧之卦文王之彖周公之爻孔子之繫於是乎悉備姑摘一二陳之風自火出家人君子以言有物而行有恆此身正而家齊之象也洊雷震君子以恐懼修省此自治之象也山附於地剝上以厚下安宅此安養人民之象也雷電皆至豐君子以折獄致刑此聽訟之象也自此而推一卦一爻皆開物成務之道也魯瞻父子夙夜究心於斯此則所謂真復古者過則聖不及則賢逹則兼善於人窮則獨善諸已復古之功不亦大哉若曰沾沾焉取則于一家不幾於自隘矣乎請以是記諸屋壁魯瞻毋以余言為誇而棄之玄佐名某以經學教授于鄉言行有師法魯瞻學有端緒自給事中遷今官正氣蓋凛然云敦睦堂記台黃巖之西三十里有灃水灃水之上大姓張氏居焉故有堂曰樂善至諱遂者屬其子光祖與璣為嵗時合族之所諸孫若奎等五人謹守之而不敢廢元至正壬辰堂燬于盜嘗欲作之而未能越二十六年為國朝洪武丁巳若奎之子昭與羣從兄弟謀以為自斯堂之廢久而不復則親義踈而友悌乖將始諸此可不亟圖乃各出錢粟材木金石之費合作同謀弗怠弗息如營其私越明年堂成既行會族之禮復更其門曰敦睦其在京師者太學生升遂來徴余記昔者先王盛時制民之具既備又為井田以聨其心為鄉黨州閭以同其俗為學校以化其暴戾而樂其善良又有月書嵗考之法以紏其不率教者而取人之際又必察其孝弟姻睦之行焉故當是時凡比屋鄰井之人喜相慶戚相弔疾病患難相賙恤如至親然脫有災祻非常之事狠虐不軌之人皆無所自而發發則親戚鄰保隨而撲滅之故其時天下無亂民以百姓皆相親睦故也世逺法隳人自為家鄉自為俗甚者兄弟父子不通假貸憂喜不相問逸樂不同情事觸于中則勃然操戈而相逐父不能以禁其子弟不能以諍其兄往昔之亂多起于此非民性異於古也制民之具不若耳制民之事非無位者所得為有志之士能睦其族化其鄉而不陷于非義豈非善學古者乎若張氏之為蓋近之矣賢人君子豈必皆假乎位而後行道居乎家而使同姓之親少長知禮讓而不爭壯者知勉于學而篤于行頑嚚化為純慤愚昧者不失其性是亦道之推也豈細事哉張氏之孫多賢能其鄉咸稱之他日東海之邑聞有民淳俗厚如鄒魯者必張氏之化也歟試記其堂以俟焉棣華堂記盱江黃氏有昆弟之賢者三人曰松軒曰竹所曰梅庭松軒嗜學善屬文而於法律家尤深訓三子皆為儒遂以子貴追贈泰和州判官竹所好談辨出史入經霏霏若吐玉屑人爭樂聽之梅庭獨淬礪力戰集有力少年隂授之擊刺坐作進退之法且曰不久兵將起吾以衛吾宗也松軒既沒四方果大亂江右受禍尤慘死喪相枕籍孰不畏之梅庭同竹所聚兵為屏蔽卒獲無虞及今四海平定而二君子且巋然老矣龎眉皓髮相映於殘山剩水之間自相謂曰同氣而生者三人伯兄墓木已長所存者惟吾與兄耳春花秋月可不隨時而作樂乎於是日具籩豆飲酒以為歡人見其雍雍然和怡怡然悅似不可以幾及取詩中常棣之語名其堂曰棣華松軒之子子雍請豫記之夫常棣之詩召公所作以親夫人之兄弟者也故首章有云常棣之華鄂不韡韡凡今之人莫如兄弟箋者謂鄂足傅華之光明則韡韡然盛興者喻弟以敬事兄兄以榮覆弟恩義之顯亦韡韡然二君子生於簮紳之家漸濡詩書之澤兄弟之間下承上覆彰明光顯固無失於詩人之旨然而兵戈之際各攜其妻孥西東竄奔視兄弟如棄涕唾而二君子乃如形影相懸不使跬步之暌違則二章所謂死喪之威兄弟孔懷者得不為有合乎及至喪亂既平之後從容燕飲以洽其和孺之情朝斯夕斯唯恐不足則六章所謂儐爾籩豆飲酒之飫者又不為尤有合乎常棣之詩何其多與二君子類也蓋兄弟之情本乎秉彛無古無今同一至理雖去之二千餘載固當無甚相逺也名其室以棣華誰曰不宜抑豫聞世之人有以桂名軒者矣有以椿名室者矣徒欲歆豔乎科目之榮企望乎耆頤之年耳其於飭勵之益則蔑乎未之有聞也二君子名堂之義誠可為不令兄弟之勸厚人倫美教化移風俗之道將於是乎在子雍位躋法從為時名臣而其伯仲又多能文辭子雍幸相率發為聲詩勒成簡編如唐之李義華蕚集故事二君子升堂獻酬之際時出一二章歌以侑觴人聞其詩者寧不油然而興起矣乎不知子雍又以為何如也貞白堂記臨川許君仲孚闢貞白堂一所與環翠亭相映接蓋為讀書地也間來徴豫記余聞仲孚清修而嗜學堂下種梅花數樹當霜雪嚴沍之際衆芳搖落而是花獨翹然散而為春妍氷玉其葩一塵不緇仲孚嘆曰其所謂貞白者非子也耶乃約二三勝友日吟哦其下超然神遊如升天際恍不知貞白之在已耶抑果梅之有貞白耶客有歌之者曰遊氣冉冉兮將汙人曠獨處兮誰與鄰姑射仙人兮玉為神驂青鸞兮服素裙望之不見兮隔河津青鳥不徠兮會無因仲孚從而賡之曰天風翛翛兮生翠寒白月流光照松壇美人來兮佩珊珊殷勤遺我青琅玕我將搗之奉晨餐歌已二人相視而笑豫家芙蓉山之陽懸崖萬丈蒼官青士日駢立乎其間方滴露研硃入朝真洞點易聞仲孚之事不覺矍然而嘆曰吾等其有激而然耶雖然物我之立皆成於相形而泯於相忘非貞則無有偏也非汙則無有白也豫嘗觀心皎如明鏡中懸萬象自見求其貞白且不可得况假物之云哉况乎天地中萬彚藝藝自形自色杳不知其故雖造物者隨氣運行色色形形亦若不知其故是果孰為之樞紐乎問諸兩間兩間不言叩之百物百物不言質諸神扄則曰是在我矣斯貞白之義已仲孚曰子玄言也不知者謂涉於虛無恍惚殆非也請記諸壁何如於是乎書永思堂記永之為言長也所謂永思者長思而不忘也長思而不忘者為誰福清林榮得仁也得仁十嵗喪父洎長以縣諸生貢上太學選入禁廷為承敕郎謙慎而齊飭聲譽出薦紳間會濂朝京師乃來請曰榮也念父不見或食焉或羮焉或寢且息焉恆懸懸有思思之不得則升高逺望草木之敷腴山川之鬱紆萬物欣欣有自得意輒泫然流涕曰光景日新吾父獨何之乎將乘海鶴逺遊三山乎抑精神流衍于氣化中冥茫而莫之覩乎何為使我心憂而弗釋也如此者久之因以永思題諸堂楣以志無窮之悲先生願為記之濂曰不然也子之父固亡子幸有母夫人存承候顔色問衣燠寒而進退之弄雛其側以悅之依依嫪戀如羊之跪乳烏之反哺其樂將無涯視五鼎萬鍾若不能過之子何乃自苦日慘然以悲父固當思也思或鬱陶成疾獨不計貽母之憂乎得仁曰堪輿之間當其青年父母俱存者何限雖閭閻小夫亦知割鮮具醪醴稱曰具慶榮始二十又七獨與母居如之何勿思吾父生我之劬勞欲報之德所謂昊天罔極者也一乘馭則思為其執鞭一就寢則思為其扇枕一有疾則思為其嘗藥今皆不可得已觸目之間無非可感如之何勿思濂曰不然也人心苦不知足得隴且望蜀濂也父母皆殁久矣其分當永思乎雖曰偏侍不獨愈於濂乎為子謀者當思盡孝以養母致思貴富以顯父使人稱之曰某氏之子斯為永思也已得仁曰非此之謂也盡孝養母榮豈不知之奚俟先生之言若曰致思於富貴富纍於千金貴為三庫大夫縱可以慰母心而吾父不知享焉終有不愜吾情者事不得其全故也如之何勿思濂曰子之言美矣善矣而又有一説願為子陳之夫為孝子者不當為無益之思而思不死其親可也其謂不死者何子於事君之際則必自思曰此當罄厥忠不可溺於邪佞恐辱吾父也能思是子之父雖死其不死矣乎涖官之時則必自思曰此當廉且勤不可習於貪怠恐辱吾父也能思是子之父雖死其不死矣乎鞫獄之頃則必自思曰此當欽且恤不可務於苛刻恐辱吾父也能思是子之父雖死其不死矣乎交友之中則必自思曰此當主於信不可待以浮偽恐辱吾父也能思是子之父雖死其不死矣乎出言之間則必自思曰此當合於正不可流於詖遁恐辱吾父也能思是子之父雖死其不死矣乎觸類而長之如此可思者甚衆雖更僕不能盡也子能力行之方可盡永思之道也於子何如榮復泫然流涕曰斯言也榮未之前聞也敢不夙夜祗奉濂既退嘉得仁之能孝也因次第問答之語記諸堂壁貞則堂記貞則堂者傅君藻養母夫人之所也夫人姓樓氏故為烏傷士族年十五歸同里處士夀朋生二子長曰權次即藻又十有八年而寡夫人斷髮誓不食他姓家日單凍餒交攻當風雪凄迷青鐙夜織雞再號猶軋軋聞機杼聲人弗能堪夫人裕如也越若干年始克葬處士君華川之南葬已先廬未備者補之持宿劵責金者庚之専心一力訓二子有成權得推擇為吏藻從黃文獻公遊以文辭稱夫人素髮埀領日坐堂上含沖挹腴而享夀養之樂時年蓋六十餘矣人皆曰女婦青年能守貞者非艱守於阽危中者為艱當夫人獨居室無儋石之積皎皎自信如淮南之金色百煉而弗變非其賢過人能如是乎吾邦生齒之繁動至數十萬求如夫人者千或不能二三宜其休聞流溢無窮所可憾者無良有司上于朝廷以表其宅里爾金華宋濂獨不謂然何者婺為吕成公講道之邦禮義修明風俗淳美非惟家孝弟而人詩書至于女子婦人亦皆無思犯禮而畏行露之侵第處道之常同老于室無以見其所執之操今謂如夫人者千不能二三是何待父母之國如此其輕也向使處士君不蚤逝孰知夫人之行能卓卓如是乎利器之施遇錯節而顯徑柏之剛因凝霜而知名蓋生於世之變也計夫人之心豈樂負守貞之名哉以守貞名夫人已為不幸况又欲徼旌寵之榮乎旌寵朝廷之事也濂也不敏與藻居同郡學同師嘗升斯堂而拜夫人藻指謂濂曰吾子幸為我文之濂不敢讓使濂之文傳夫人大節其亦烜著於世矣乎貞節堂記天地之間有大經決不可廢者猶如闔廬以為居稻粱以為食繒布以為服一日無之則人事盡失難以為治此其故何哉茍無闔廬則風雨震凌矣茍無稻粱則道殣相望矣茍無繒布則手足皸瘃矣三者猶難闕一而况於大經乎大經者何三綱之謂也是故臣有二心者為不忠子悖其父者為不孝婦事二夫者為失節彛倫攸斁職此之由其所係於人道之重者何如哉泉南莊氏歸其夫為海鹽陳思恭思恭海賈也育子寶生四月去入海五年而不返或以為死誘莊改適莊心如鐵不為動已而思恭歸相見之頃悲喜交集居久之思恭復去航海卒溺焉向日誘者譁曰今真死矣奈何莊指寶生曰夫雖死而子存猶不死也吾敢死其夫而去之乎誘者曰曰子賢也猶云可也脫有不肖餘生將託之東流乎莊曰此天也吾無所逃也順受之而不失也此其一念之正可以貫金石可以通神明可以耀古今嗚呼孰謂天道無知儻無知而寶生何其能賢耶此人定勝天之義著矣嗚呼使以莊此心推之子必善事其親而稱孝矣臣必能報其上而稱忠矣四海其有不治乎奈何世降俗漓號為士大夫須鬛如戟議論凌雲霄一則曰我丈夫也二則曰我男子也或遇君父有難作狐鼠竄去往往而是似婦人女子之不若抑又何説哉嗚呼柏舟之詩不作久矣余於婦莊寧不啻聞空谷跫音乎然而君子之立志寧暴露而無庇也寧凍餓而殞其生也天地之大經不可失也豫故於莊之事亟稱道而弗置者為其有合於此也寶生介吾友黃彛先生請記所謂貞節堂者寶生其誠賢矣哉因書此授之思恭死時莊年三十七今踰五十矣初思恭嘗娶妻生一子貧寓外家莊遺錢使營生産且償思恭之宿逋此固人之所難以非大節所繫不詳書之經畬堂記聖人之言曰經其言雖不皆出於聖賢而為聖人所取者亦曰經經者天下之常道也大之統天地之理通隂陽之故辨性命之原序君臣上下內外之等微之鬼神之情狀氣運之始終顯之政教之先後民物之盛衰飲食衣服器用之節冠昏朝享奉先送死之儀外之鳥獸草木夷狄之名無不畢載而其指歸皆不違戾於道而可行于後世是以謂之經易書春秋用其全詩與禮擇其純而去其偽未有不合乎道而可行于世者也故易書詩春秋禮皆曰經五經之外論語為聖人之言孟子以大賢明聖人之道謂之經亦宜其它諸子所著正不勝譎醇不逮疵烏足以為經哉自漢以降聖賢不作異説滋橫凡外夷小道以及星厯地理占卜醫藥種樹養馬詭誕淺近之言皆僭以經名千餘年間時益嵗加書之以經名者布乎四海之內學者眩於其名趨而陷溺焉者甚衆而五經孔孟之道晦矣然非彼之過也學五經孔孟者不能明其道見諸事功故也夫五經孔孟之言唐虞三代治天下之成效存焉其君堯舜禹湯文武其臣臯夔益契伊傅周公其具道德仁義禮樂封建井田小用之則小治大施之則大治豈止浮辭而已乎世儒不之察顧切切然剽攘摹擬其辭為文章以取名譽于世雖韓退之之賢誨勉其子亦有經訓災畬之説其意以為經訓足為文章之本而已不亦陋於學經矣乎學經而止為文章之美亦何用于經乎以文章視諸經宜乎陷溺于彼者之衆也吾所謂學經者上可以為聖次可以為賢以臨大政則斷以處富貴則固以行貧賤則樂以居患難則安窮足以為來世法逹足以為生民凖豈特學其文章而已乎錢唐錢鈞質甚敏好學甚篤取退之經畬之言名其齋會余過其郡造旅邸徴文甚力余美其志恐其泥于退之之言也推其道以告之使求夫大者焉盧龍清隱記盧龍山在京城西北二十五里周遍十二里高三十六丈山嶺綿延逺接石頭乃江上之關塞比于北地盧龍山因名和陽尊師駱月溪隱居其中自號曰盧龍清隱請豫友王儀曹本道徵豫文以記之本道述月溪之言曰古人有云心不溷濁謂之清迹不章顯謂之隱豫學老子之法者也朝暮黃梁一盂苜蓿一盤既適而且安間披鶴氅衣手執黃庭經一卷翛然而凝坐九衢十二陌之遊塵莫我之干也寧非清邪名氏不落于聲利之場心迹不屬乎榮辱之境其入也煙霞與之同棲其出也漁樵與之爭席寧非隱邪然而老氏之道清淨而無為隱約以無名不以清為清不以名為名是則無所不名可以治國可以觀兵可以修身可以延齡其小靡不該其大無不并此其為清隱益大矣吾嘗聞之於師而未之能行也姑就其近似者而究心焉雖然豫視古今不翅一旦暮何為復膠膠於斯人身至中其體含虛不縱不橫非東非西纎如黍珠鴻包玄區火龍因之而飛焰水虎以之而生腴庶幾騰神紫府吹簫玄都此殆忘清隱之名而食其實也邪其言若是先生以為何如金華宋濂聞之嘆曰月溪蓋幾于知道者非歟其始也將欲遁世其中也又知其道可以治世其末也又思長生而度世縱豫有所言其何以加于三者之間哉於是偕本道訪月溪于盧龍山中白月獨照萬樹僵立無風乃握手歌曰盧龍之山兮髙巑岏有儒一生兮煉九還夜半月出兮露浸寥壇紫霞仙人兮駕采鸞七星為衣兮芙蓉為冠鐵笛一聲煙漫漫擷靈芝兮下空山歌已二人者相視而笑遂次第其言而為之記金華張氏先祠記金華縣東行四十五里有地曰苓唐山川相繆而風氣鬱盤著姓張氏世居其中初張氏有諱隆府君者字亨仲宋建炎初自睦而來為潘氏之贅壻至今其村聚猶仍潘為名府君既占名數于縣日以力本為務未幾家寢穰生三丈夫子曰子政曰子中曰子成皆能紹前業而無爽德子中之子文華倜儻尚竒行鄉先逹端明殿學士王公野甚器重之淳祐末公遷沿江制置使欲辟為之屬辭弗赴自時厥後府君之三子遺胤日滋遂成三大族亡慮十百餘人其出而仕者既以文墨論議著稱于時而退修于家者亦循循雅飭無愧于士君子之行蓋自府君至是亦十有一世矣府君之六世孫榮今為一宗之長乃慨然歎曰吾儕承藉其先祉以克至於今日有闔廬以禦風雨有絲枲膏粱以為之羞服而先祖妥靈之無其所不亦傎乎於是與族弟琰力謀之而子姓之中若留鎮琮侣四人即捐所居之廳事三楹間以為之倡榮遂加以暨茨之功繚以垣墉列以龕櫝與夫祭饗百須之器莫不精且良中奉府君原其初遷也旁以三子侑食三族之所宗也而又益之以制屬君府君之流先及是始振示不敢忘也然而世逺屬疏祭不敢用四仲惟據朱徽公所定祀先祖之儀以立春生物之始陳器具饌而行三獻禮月旦十五日之序參族人散處乎東西度不能以皆至惟正月朔旦無小無大咸拜於祠下復會拜别室以敘長幼焉其生子已命名者續書之於譜圖而後退若夫朝夕汛掃啓閉之職擇謹願者為之主守祭田若干畝則俾三族之嗣人輪掌其租入以供孝祀燕私之事此其大凡也始事於至正乙已之冬而迄功於丙午之春榮帥宗人數千指皆沐浴盛冠衣入奉明薦牲酒潔清執事儼恪周旋進退濟濟蹌蹌觀者咸悅以為一邑之所未覩竣事復遣其孫愈來徴濂文刻示後裔俾世世無有所易其田之鄉落步畝則附見于石陰濂聞之先王制為廟祭之禮上下隆殺皆有常典牲牢器幣皆有常數固非士庶人可得而行然其親親之仁出於物則民彛之懿者初不以賤與貴而有異也今榮乃能於服殺宗遷之後以義起禮而逺祀府君非惟使子若孫不忘其所自出而管攝人心聚合宗族之意實於是乎在不亦孝子仁人之用心也哉嗚呼人非空桑而生孰不本之於祖者方其封殖自厚長慮却顧無所不用其極問其所從來則曰吾不知也問其薦奠之禮則又曰我未之能行也所謂報本反始之道顧當是邪視榮之為殆將愧死矣是不可以不書三族之嗣人尚思是纘是承棟宇之必葺也母使之震凌黍稷之必獲也母使之穢荒牲牷之必腯也母使之瘯蠡庶幾濂之文為不徒作矣嗚呼其懋敬之哉其懋敬之哉國清林氏重建先祠堂記莆田縣東二十里有山曰穀城岡巒秀拔林樾蒼潤其下匯為巨浸號國清湖在昔盛時一望杳渺無際而波濤吞吐於風日雲月之間真勝絶之境也唐忠臣邵州刺史林藴之裔大理評事元始自長城徙居湖上五傳為睦菴府君格以積慶力本造祠又再傳為承奉郎國鈞其族寖大承奉府君于艾軒文節公光朝為諸父行乃建義齋于東井命艾軒為之師倡明道德性命之旨遐邇生徒雲赴川臻惟恐或後東井之學遂聞于天下林氏子若孫亦世擢進士第克守詩禮之訓彌久而彌光其先祠舊在浣錦社蓋以睦菴為之宗睦菴三子長曰諱錫府君名鼻頭房次曰諱旃府君名追逺房次曰諱遷府君名曰白沙房至今埀十三世二百人之多者皆三房之後於是列為神板者五高四尺博一尺有八寸下設趺座用粉塗而玄書之其板中起于大理之祖考逮睦菴三子而止左右則追逺西則白沙東則鼻頭凡三房之後其物故者輒升名其間當日南至羣族相率合祭其小宗有事于四世别各行之於家嵗旦則展謁舉序拜之禮若冠若婚宦學出入悉於此而告焉諱遷府君九世孫比部主事衡患祠之規制庳狹不足以交神明乃與從子厚謀共白於宗長伯濟而改圖之即大理故宅之基建屋三楹間蔽以外門俾族之賢者司其啓閉經始於元至正戊戌冬十二月壬寅訖功於皇明洪武庚戌冬十一月已酉羣族皆出泉布來助而曰曽恕曰寶曰天禧者為多相地計功終始其役則維卿之力也初睦菴在宋時己置祭田自後纍增至二千畝有竒故蒸嘗之禮視他族為時豐元季亂離始不能以自守衡懼族散宗湮無所繫屬既汲汲先祠之建復徴濂文以昭示於後嗚呼先王之時立宗法以統其屬定廟制以嚴其分制有降殺毫髮之莫踰宗有大小條序之不紊所以維持人心匡持治道者其事至詳且密也逮乎後世經殘教弛漫焉而弗之謀曽未四三傳已藐若秦越之相視當是時也有能以義起禮因祀事而崇孝敬雖於古昔未能盡合寧不為君子之所取乎此濂於衡之請不敢固辭而亟稱之也濂聞莆陽多名族冠衣濟濟讀書之聲相聞貴名檢而賤浮侈以此見艾軒之教浹人之深而承奉府君建學之功及今猶未泯泯孰謂賢者之澤不悠且長哉詩曰高山仰止景行行止三房之嗣人尚思朂焉可也衡字士衡通經而有文為名進士云平陽林氏祠學記禮之由生非天作而地設制之者人也太古無事之時固未有所謂禮禮之立起于人情之變如洪水之潰制禮者猶禹治水然左瀹而右疏排險而導下惟適水之性使各順其道而已不可以一法拘也水勢有古今之殊茍執禹之遺法而治千載以下之水則不合者多矣奚可乎哉傳曰三王不同禮言因時而變也古者墓無祠庶人惟祭其禰禮也至漢嘗祠墓矣祭嘗及髙祖矣不可謂之非禮也今平陽蓋竹之林氏立祠于其始遷之祖之墓而祭之烏得謂之非禮乎時不同禮亦不同禮雖不同而其因人情而立教者未嘗不同也初林氏之居蓋竹自名䉞者始䉞卒葬于華蓋山子孫至今數百家散處鄉閭服微情弛者久矣其十二世孫元陽江縣尹淳懼其愈逺而不知所自出也欲立祠于墓而未果淳卒其子今刑部主事升遂作祠奉䉞之主朔望必謁嵗時必祭皆率一族之人以從事祠後為齋曰思孝以會其族人復立祠于左偏祀晦菴朱子之像以其先宋吏部侍郎拱辰知信州遷之知南劍州起鰲及其父陽江君配即祠之前為學聘鄉人之賢者為師使族人子弟就學焉凡其所為未必皆合於古而余獨有取者以其得禮之意也禮之目以千百數求其意不過禁邪止慝道人以善而已人情之變也無禮以治之雖日刑千人而不足教之以禮可以使之立化於俎豆間豈刑罰之威不若俎豆哉制之以其所畏不若因其所易知而教之之為速也夫以既逺久踈之族有貧富弱強之殊茍提其耳授以法令使無相乖背必有不可正者今也立一祠于始遷祖之墓率族人以祭踈者可以復親逺者可以不散富強者必不敢以是私其身而貧弱者必有所仰濟矣其族寧有壞乎况於有學以為之教有先賢之祠以為之則其為族人慮者可謂備矣林之嗣人祭于祠學于學而能修其身睦其親者善為人後者也茍不能過于他族之人豈不負升之望哉升字若高敏事有才能故其所為能合于禮其徴記于余也遂推其意使歸而刻焉先夫人木像記先夫人既殁之九年豫妻賈専朝夕思之不少置間告豫曰妾生二十二年而歸君妾之姑已四十有九嵗妾母方氏亦五十有四嵗後君念妾之母老而兄弟多故乃迎養于家當是時二老人蒼顔白髮共坐堂上妾與君沽酒買魚以奉其歡更闌燭盡猶連觴引滿而語笑聲不休君時嘗語妾曰吾雖貧而老親之歡如此吾退而安寢矣後十三年而妾之姑竟亡初姑未亡時妾子瓚始十三嵗姑嘗撫瓚頂謂曰吾年耄矣或幸見汝之有子吾死亦暝目矣又三年君自金華遷浦陽妾與母從之來今妾母七十有五嵗瓚亦娶婦生子而妾姑之墓木拱矣思欲如昔時共君奉觴上夀其又可得邪每念及此輒涕泗交頤然恨無以自慰也欲刻木為像以事之凡遇疏食菜羮必祭使死者而有知亦當翩然而來享也雖然此豈妾之敢知哉不過盡其心焉爾矣豫謂之曰昔之孝子有丁蘭者事母至孝及母亡而思之不置乃刻木事之此蓋丈夫子之事子以一女婦能行之亦可謂賢矣雖然不必爾也古者既葬而反虞公主用桑期年而練祭練主用栗所謂主者主乎神者也設主之外無有刻像事之者也豫之思親豈不尤切于子哉禮若可為則豫為之也久矣専曰是故然矣世俗媚浮屠神者尚飾像奉之而况妾之姑乎妾不若是其心終皇皇焉君幸有以如妾之意也豫不能拒於是命工人刻像以遺之并録其問答之辭書于像龕之北以示子孫先夫人姓陳氏諱賢時金華潛溪人安道堂記自昔真主之興天必生異常之才以備其一代之用外之則有貔虎之士奉命秉略為之鞭驅僭叛汛掃六合內之則有夔龍之倫立法定制為之謀謨廟堂協和黎庶近而至於贄御之屬執事之臣亦莫不忠厚謹飭小心而盡職雖曰善以類應非天命孰能使然哉皇上肅將明威致虔天討於四方江淮之間豪傑魁壘之士翕然附從指顧叱咄戰勝攻取無不得意及功成業定上公徹侯甲第相望輔相侍從皆當時之賢而於近侍之中又得供奉司令杜君安道而益知其他之皆然也安道自上之興持刀鑷侍左右未嘗暫違凡上之征吳越略淮楚攻齊魯汴蔡舟車所臨四五千里虜偽王斬驍將以百十計帷下之謀籌䇿之算安道皆得身從而目見之安道性慎密不泄動稱法度為上所信任者二十二年由尚冠郎改御用監令至今官入內廷行步可數言語敬恭唯恐有絲毫過擢闕門外要官勢人之前如不相識一揖之餘不啓口而退故上每稱侍臣之忠謹者必以安道為言今夫天下之官受祿于朝者孰非仕哉蓋有終其身沈於下位欲覲清光而不可得者縱得近輦轂下有願承一顧之恩而不可得者安道乃得侍上而見稱許雖曰慎密之所致又豈非天哉安道其益勉之可也余官在太史事上者亦二十年餘安道既以其字名堂復願得豫文以識遭逢之盛夫稱天命以紀載國家人材之美豫之職也乃為之言思逺樓記旴江有湕湖周圍凡若干步涵日星而蕩風煙四時之景無不宜者大姓胡氏世居湖濵以詩禮為學至吾永年人益稱其賢以薦者起家為吉水幕職遷海北鹽課司白石倉副使未及大用而終其弟永實其子原鳯原鵬原駒皆號善繼大夫士恆集其門永年欲建樓以藏先世遺書不幸賫志以殁原鳯兄弟請于永實因竭力成之名之曰思逺示不忘乎親也介前進士曽君仰來徵豫記豫問之曰思逺之義何居原鳯對曰不幸先人即世一念及兹精神遐漂無所戾止有時摳衣升高極目四顧見雲煙之卷舒星河之出沒泫然流涕曰吾先人果何所之精爽或有靈庶幾乘雲龍而一下焉斯思逺之所以名樓也豫曰是固然矣而其義未盡也原鳯又曰今人邇矣而逺者莫若古之人古之人隕魄黃壚泯然不可見其迹其精神心術之近存者賴遺言見於書爾大則聖次則哲次則忠與孝往往形諸載籍一展卷間神交冥漠有不知千載之為長一日之為短者孳孳焉悃悃焉日致力于斯庶幾契先人之所志爾是或思逺之義乎豫曰逺固逺矣而未切於身也盍更言之原鳯於是研精覃思大周六合小入一髮默然良久忽揚眉吐氣而顧豫曰我知之矣先生所謂逺者不在今人亦不在古人在吾之一身爾吾身非突然而中有也前之千萬年自地闢天開繩繩相承以迄于吾身後之千萬年又自吾身亹亹相續以至於無窮不可以數計不可以智推庸非至逺者乎吾身一有失焉則前焉而弗能繼後焉而弗能延其責果安歸乎是以君子懼其學之有爽也惕惕然如履淵氷恐其行之弗軌也惴惴焉如馭六轡此無他逺之不可不慎也若是何如豫乃喟然嘆曰子言今得之矣頗符先子之所望矣嗚呼逺固逺矣而甚邇也古之人有三太上立德其次立功其次立言若而人逺者數千年邇者亦一二百年其人固不得而覩矣玩其遺文想其德業儼然若與之周旋堂序之上未嘗知其死也所謂人雖死而有不死者存此之謂歟原鳯誠知此則又能以逺為邇無難矣永嘉之勝亦有樓名思逺者彼蓋慕浮屠之學此則篤於彛倫而有關于名教世必有能辨之者豫與原鳯言不過如此而止若夫湕湖之風物與斯樓之雄麗賢士大夫當有為原鳯賦咏者豫則可略也見山樓記見山樓者上虞魏君仲逺之所建也仲逺居縣西四十里所龍山委蛇走其南將升而復翔其旁支斜迤而西則為福祈諸峯若車若旌若奔馬若渴鹿飲泉不一而足勢之下降為隂阜為連坡為平林一奮一止復襟帶乎後先東則遙岑隱見青雲之端宛類娥眉向羣山相嫵媚為妍其下有巨湖廣袤百里汪肆浩渺環浸乎三方晦明吐吞朝夕萬變方屏插起湖濵曰夏蓋山去天若尺五巖峙谷張尤可玩愛誠越中勝絶之境也仲逺心樂之以為非高明之居不足延攬精華而領納爽氣於是構斯樓日與賢士大夫同登鼎俎既備殽核維旅壺觴更酬吟篇疊咏及至神酣意適褰簾而望逺近之山爭獻竒秀晴容含青雨色擁翠不俟指呼儼若次第排闥而入使人涵茹太清空澄中素直欲驂鸞翳鳯招偓佺韓終翩然被髮而下大荒其視起滅埃氛弗能自拔者為何如也伻來俾濂記之夫自辛卯兵興闔廬所在往往蕩為灰燼狐狸晝舞鬼磷宵發悲風翛然襲人君子每為之永慨自非真人龍興撥亂世而反之正含齒戴髮之氓孰不在枯魚之肆哉縱有佳山日在眉睫間將不暇見之矣今仲逺雍容於觀眺之際亦曰帝力難名而吾民恆獲遂其生爾昔太常博士施侯作見山閣於臨川而荆國王文公為記其事且謂吾人脫於兵火洗沐仁聖之膏澤餘百年而施侯始得以樓觀自娛仲逺之去亂離僅四三載爾乃能抗志物表厥修故事如承平時此無他皇化神速有非前代所可及雍熙之治將見覃及于海內是樓之作其殆兆之先見者歟雖欲不為之記不可得也第所愧者濂之學識繆悠立言無精魄難以傳逺仲逺尚求荆國其人而為之庶幾樓之勝槩與雄文雅製同為不朽耳仲逺名夀延鄭國文貞公二十四世孫羣從子姓皆彬彬嗜學文章巨公多集其門而仲逺尤號翹楚且工於詩有和平沖淡之趣濂蓋聞之丹崖先生云瑶芳樓記瑶芳樓者常熟虞君子賢燕居之所也瑶芳者何古桐琴之名子賢以重購得之間一撫弄其聲翏翏然如出金石如聞鸞鳯鳴如與仙人劍客共語於千載之上子賢樂焉則以謂世之名樓者衆矣髙駢之迎仙謂其泝遐情也其失也誕張建封之燕子謂其興新懷也其失也靡韓建之齊雲謂其凌高清也其失也侈吾皆弗敢蹈其非欲専斯樓之美者舍斯琴也其孰能當之遂以瑶芳名其樓而列圖書於中當風物清朗白月獨照神情遐沖敻出世外子賢棕冠鶴氅自函道而升復取琴鼓一再行久之演而為紫琳之操其辭曰有堅者石中含精矣其白如肪煜有瑛矣五音繁會鏘然而鳴矣客有與子賢同志者從而賡之曰豔質兮非華陽卉兮非奢折秋聲兮遺所思望美人兮天涯歌已相視而笑金華宋濂聞其聲唶曰古之人好樓居者豈欲夸靡麗而為榮觀哉蓋臨隂幽之室則其情斂以揫處陽明之居則其情暢以舒隨境而遷因物而著其亦人理之常者乎况夫宫角之相參羽徴之互奏禁其忿欲之邪宣以中和之正其於學問之功又未必為無所助所以先生長者無故不去之蓋有以也雖然君子蓋不物於物不物於物則凡紛然而來前者皆吾性情之發舒或縣崖邃壑或平墅曠林雖非層搆可以闔闢陽隂而清風徐來萬籟皆動曲澗流泉復助之為聲勢五音泠然愜心而溢耳太和融浹內外無間有不翅聽子賢之琴於兹樓之上矣此無他逹人大觀無地不為樓無聲不為琴也茍局滯於一室之間適其意則有之而蹈道則未也有若子賢蓋學道而有所得者故濂敢以是説告之子賢博雅好古絶出流俗之上吾友楊君廉夫極稱其為人謂篤於士行而尤孝其親云文憲集卷二
