body:
  text: 文憲集卷四明宋濓撰記凡二十三章代祀髙麗國山川記皇帝受天明命丕承正統薄海內外罔不臣妾德流惠敷浹于神人粵洪武三年春正月二日癸巳上御奉天殿受羣臣朝乃言曰朕以菲德惟天惟祖宗是賴位于諸侯王兆民之上郊廟祠享之禮朕不敢不恭然而名山大川能出雲雨以被澤生民者朕於報祈亦罔或弗欽邇者髙麗國奉表稱臣已封其君為王爵錫以金印而其境內山川未遑致祭非一視同仁之意儀曹其議行之於是禮部尚書臣崔亮郎中臣趙時泰員外郎臣蘭以權主事臣黃肅相與具牢醴幡幣選志慮凝一可通神明之士充使者以行有司遂以臣徐師昊名上既復命上出宿齋宫七日始御翰墨撰祝册至十日庚子昧爽左丞相信國公臣徐達率文武百司序立龍墀之左右上服通天冠絳紗袍復臨前殿默思久之方持香以授臣師昊置綵輿中導以音樂出奉天門上親迓玉趾送之臣師昊受命惟謹以夏五月某日甲子至其國某日甲子為壇三成於南門外攝行祀事其國王王顓暨諸陪臣先後駿奔以竭顯相之義當祀之晨天氣宴清海波不驚祥雲瑞飈回旋上下宛若神靈來歆來格僉以謂聖天子不鄙夷逺民龍光下被人神具欣雖鳥獸魚鱉之屬亦得翔泳於至化之中其於慶幸古所未覩爭欲勒文於石以垂示於無窮臣師昊聞之自古帝王以天下為一家雖海外要荒之地視如咫尺則公羊髙所謂方望之事無所不通者固其宜也肆惟皇上撫有萬邦一遵先王成憲其有事逺徼山川如此之嚴者豈有他哉實為東民徼福使風雨以時年榖順成物無疵癘而已書曰至治馨香感于神明黍稷非馨明德惟馨神既歆厥明德洞達無間昭報響答當有洋洋臨乎其上者矣臣師昊不佞請書是以為記以昭宣上德軫念遐方之氓不翅中國者當與東海相為無極云是歲某月日記蔣山廣薦佛會記皇帝御寶厯之四年海宇無虞洽于大康文武恬嬉雨風時順於是恭默思道端居穆清罔有三二與天為徒重念元季兵興六合雄爭有生之類不得正命而終者動億萬計靈氛糾蟠充塞下土吊奠靡至煢然無依天隂雨濕之夜其聲或啾啾有聞宸𠂻䀌傷若疚在躬且謂洗滌隂鬱升陟陽明惟大雄氏之教為然乃冬十有二月詔徴江南有道浮屠十人詣于南京命欽天監臣差以穀旦就蔣山太平興國禪寺丕建廣薦法會上宿齋室却葷肉弗御者一月復敕中書右丞相汪廣洋左丞胡惟庸移書於城社之神具宣上意俾神達諸冥期以畢集五年春正月辛酉昧爽上服皮辨服臨奉天殿羣臣服朝衣左右侍尚寶卿梁子忠啓御撰章疏識以皇帝之寶上再拜燎香于爐復再拜躬視疏已授禮部尚書陶凱凱捧從黃道出午門置龍輿中備法仗鼓吹導至蔣山天界總持萬金及蔣山主僧行容率僧伽千人持香華出迎萬金取疏入大雄殿用梵法從事白而焚之退閲三藏諸文自辛酉至癸亥止當癸亥日時加申諸浮屠行祠事已上服皮辨服搢玉圭上殿面大雄氏北向立羣臣各衣法服以從和聲即舉麾奏恱佛之樂首曰善世曲上再拜迎羣臣亦再拜樂再奏昭信曲上跪進熏薌奠幣復再拜樂三奏延慈曲相以恱佛之舞舞人十其手各有所執或香或燈或珠玉明水或青蓮花氷桃暨名荈衣食之物勢皆低昂應以節上行初獻禮跪進清淨饌史册祝復再拜亞終二獻同其畔異者不用册光祿卿徐興祖進饌樂四奏曰法喜曲五奏曰禪恱曲舞同三獻已上還大次羣臣退諸浮屠旋繞大雄氏寶座演梵呪三周以寓攀注之意初斸山右地成六十坎漫以堊至是令軍卒五百負湯實之湯蒸氣成雲諸浮屠速幽爽入浴焚象衣使其徒以綵幢法樂引至三解脫門門內五十步築方壇髙四尺上升壇東向坐侍儀使溥博西向跪受詔而出集幽爽而戒飭之詔已引入殿致三佛之禮聽法於徑山禪師宗泐受毗尼戒於天竺法師慧日復引而出命軌範師呪飯摩伽陀解法食凡四十有九飯已夜將半上復上殿羣臣從如初樂六奏遍應曲執事者徹豆上再拜羣臣同樂七奏妙濟曲上拜送者再羣臣復同樂八奏善成曲上至望燎位燎已上還大次解嚴羣臣趍出濓聞前事二日凄風成寒飛雪灑空山川慘淡不辨草木鑾輅一至雲開日明祥光沖融布滿寰宇天顔懌如厯陛而升嚴恭對越不違咫尺俯伏拜跪穆然無聲儼如象馭陟降在廷諸威神衆拱衛圍繞下逮冥靈來歆來饗焄蒿悽愴聳人毛髮此皆精誠動乎天地感乎鬼神初不可以聲音笑貌為也肆惟皇上自臨御以來即詔禮官稽古定制京師有泰厲之祭王國有國厲之祭若郡厲邑厲鄉厲類皆有祭其興哀於無祀之鬼可謂備矣然聖慮淵深猶恐未盡幽明之故特徴內典附以先王之禮確然行之而弗疑豈非仁之至者乎昔者周文王作靈臺掘地得死人之骨王曰更葬之天下謂文王為賢澤及朽骨而况於人夫瘞骨且爾矧欲挽其靈明於生道者則我皇上好生之仁流衍無際將不間於顯幽誠與天地之德同大非言辭之可贊也猗歟盛哉祠部郎中李顔主事張孟兼蔡秉夷臧哲職掌禱祠親覩勝因謂不可無紀載以藏名山以揚聖德於罔極固請濓為之文濓以老病固辭弗獲既為具列行事如右復繫之以詩曰皇鑒九有憲天惟仁明幽雖殊錫福則均死視如生屈將使伸一歸至和同符大鈞其一元綱解紐亂是用作黑祲蕩摩日月為薄孰靈匪人流血沱若積尸橫縱委溝溢壑其二霜月凄苦涼颸酸嘶茫然四顧精爽何依寒郊無人似聞夜啼鑄鐵為心寧免涕洟其三惟我聖皇夙受佛記手執金輪繼天出治軫念幽潛宵不遑寐爰啓靈場豁彼蒙翳其四皇輿載臨稽首大雄遙瞻猊座如覿睟容香疑霧黑燈類星紅棾呪震雷鯨音號鍾其五鬼宿渡河夜漏將半飈輪羽幢其集如霰神池潔清鮮衣華粲滌塵垢身還清淨觀其六乃陟祕殿乃覲慈皇聞法去蓋受戒思防昔也昏酣棘塗宵行今焉昭朗白晝康莊其七法筵設食厥名為斛化至河沙初因一粟無量香味用實其腹神變無方動皆充足其八鴻恩既廣氛盩全消乾坤清夷日月光昭器車瑞協玉燭時調大庭擊壤康衢列謠其九惟佛道𢎞誓拔羣滯惟皇體佛仁德斯被無潛弗灼有生咸遂史臣載文永垂來裔其十遊塗荆二山記濓既遊琅琊山起行至池河驛適郵卒遞內使監公牒至及開緘中藏濠梁古迹一卷宸翰親題其外令濓披訪與青宫言之濓因啓曰臨濠古迹唯塗荆二山最著按圖經塗山在昔鍾離縣西九十五里荆山亦在縣西八十三里二山本相聨屬而淮水繞荆山之背神禹鑿開使水流二山間其疏鑿之蹤故在人思其功迄今弗能忘青宫曰至中都當共往遊焉余將渡淮狩于王莊先生宜泝流而上屆今懷逺縣治以俟濓奉教行以洪武乙卯冬十一月巳巳發舟庚午日曛始泊縣西門而青宫已駐蹕於門東五里矣辛未濓上謁青宫喜甚下令以壬申遊二山濓至期約懷遠文學掾王景彰宿舟中黎明棹舟至塗山足曳杖入山山傍廢址舊皆民廬前渡石梁復斗折而北纍石為墉多藝椒之園行可三里餘視大磐石青緑間錯頽然欹足坐諦視之乾蘚交封之其間有草生石上髙一尺其花可玩不假土力人取懸簷間呼為石蓮華復行四里所巖石犖確插起道左危傾欲飛墜復二里所微徑入灌莽抵崖罅貯泉一泓味甚甘覆以生茨四聖水亭取水以禜雨多驗復一里餘至山巔禹廟在焉廟已毁唯頽垣破礎存遊目四顧長淮西來渦河北匯而夀春臨濠宿州之境皆在冥茫昏杳中緬想南北戰爭屯戍處為感慨者久之山之下聚落甚盛廟史云名禹會村乃禹會諸侯之地廬舍之比如櫛移踵入廟廟前杏樹一章大可蔽牛二柏參差左右樹東置小甕杏柯之水時津津滴其中廟史云當晨霧四集水愈多其來如泉可代井汲石碣二一大書有夏皇祖之廟六字下方刻宋慶元初州守劉仲光自造禱雨記一亦記禱雨事皇甫斌紹熙庚戌來為郡命鍾離尉丁大榮作石未剝泐文尚可讀復從廟西循石坡而下巨石危立如人形遙望之一嫗儼然也相傳為啓母石廟史云居人每刲羊豕祭之至有以粉黛飾其貌者聞之不覺失笑山坳舊有僧房今廢久俟鶴駕不來忽使者至云扈從士馬多無橋可以渡河青宫不復至矣言未既但見旌旗如錦繡搖曳上荆山矣濓亦下山麓入縣廟見所題神號鄙俚棄而不睨出讀祖無擇所賦歌京口孫臨為書碑蓋無擇謫守夀春過此而作也復北經縣治折而東行約三里所至荆山梁魏交鬭時就山築堰以灌夀春其遺迹猶班班可見復行三十步崖廣如屋側身而入石平如牀座可坐人號為卞和洞自西上復一里所過避雨石石斜倚可避雨故名復六十步至産玉坡竒石駢列玄質而白緣粲如雪西有玉池榛荆迷路不可尋景彰欲導遊青峯庵足倦遂止時青宫已獵逺郊濓因登舟先還中都云惟二山見諸載記者其説多乖殊以塗山言之春秋左氏傳云禹會諸侯於塗山杜預注云在夀春縣東北説者云今濠州是也國語史記則又云禹會諸侯於會稽故會稽亦有塗山吳越春秋亦以塗山在會稽又兼載塗山之歌應劭云塗山在永興兆説者云今會稽蕭山縣是也是二説已不能歸於一致矣至於蘇鶚演義又云塗山有四一會稽二渝州三濠州四當塗然其處皆有禹迹或者遂謂禹之治水固嘗遍厯宇內而會詣侯實在會稽之塗山栁子厚塗山銘蘇子瞻子由塗山詩指在濠州者皆非是濓之存疑而未決者一也以荆山言之荆山楚山也楚之先王熊繹辟在荆山篳路藍縷以處草莽傳至成王始盛又七傳至昭王始遷都郢昭王有言曰自吾先王受封望不過江漢河非所獲罪則楚之封疆可知郢即今之江陵其地有荆山一名景山荆故楚號也有之誠宜世則指為濠州濠州古鍾離子國與夀春密邇楚自昭王之後又厯十一傳至考烈王始徙都夀春韓非子所載卞和獻玉事乃在厲武文三王之際昭王上接武王己越十世當三王時鍾離何嘗屬楚而強謂卞和至此山邪新序又謂抱玉而泣在共王之時雜記又謂在懷王及其子平王之時平王乃昭王之父下距懷王九世共王上至武王亦六世何至顛倒錯亂如是邪濓之存疑而未決者二也大抵山川遺迹非本諸經史者多不可信如葛洪丹井與郭景純之墓在在有之縱以髙世之智將何自辨其真偽邪必欲可信塗山當稽之左氏以夀春為正荆山當正諸史傳以江陵為正有謂塗山氏乃古國名禹曽娶其女者别是一説與此殊不相涉也濓耄矣諸書遺忘欲盡所記憶者未必無舛訛輒緣紀遊因挂漏書之以發同遊者一笑同遊者蓋太子正字桂彥良晉府長史朱伯言楚府長史朱伯清吳府伴讀王致逺及景彰云後一月某日記孫忠愍侯墳記侯諱興祖字世安姓孫氏世為濠州人祖六一府君贈中奉大夫中書參知政事護軍追封樂安郡公祖母陸氏追封樂安郡夫人父遇仙封驃騎上將軍副大都督府事上護軍樂安郡公母謝氏封樂安郡夫人配王氏亦封樂安郡夫人子二人曰恪曰斗童女三人皆在室侯居幼齡而膽氣己雄會元運將終四方鼎沸侯隨大軍取和陽遂渡長江凡征討之事輒帥師以從略姑孰連攻溧水溧陽元兵建水寨采石以扼江險侯共擊走之乃定建業下毗陵授右郡先鋒已而破宣城克宜興征婺越衢舒池等州偽漢東侵鏖戰于龍江大敗其衆擒戮者過半升統兵元帥繼搗入陳指揮營於瑞昌敗之進伐南昌遷天䇿衛指揮使偽吳圍安豐侯復赴援立功轉飛熊衛指揮使時安陸襄陽通泰皆未降大帥攻拔之侯亦有力焉遂鎮徐州紀律嚴肅敵兵莫敢犯擢驃騎大將軍副大都督府事未幾受詔戍北平往討沙漠與元兵酣戰遂死之洪武三年某月日也享年三十有三事聞敕贈推忠宣力效節功臣龍虎上將軍北平等處行中書省左丞上護軍追封燕山侯諡曰忠愍配享開平忠武王廟復敕翰林學士臣濓志其墳惟侯志氣倜儻以身許國身經百戰為世忠臣可謂豪傑不羣之士一旦歿于王事其孤不得迎尸以葬卜以是年某月日藏衣冠於州之鍾離縣於皇鄉某山之原起墳以表其處古者墳必有記所以著其里居官爵卒葬歲月以示於後者也今不敢廢因掇其槩勒石以納諸竁云先大夫碑隂記惟我顯考府君宋公樹善深長不自食其報持以覆燾後人致使不肖濓獲際昌辰忝以文墨事上授經青宫當侍講禁林之日特膺寵數錫贈顯考府君中順大夫禮部侍郎顯妣陳氏德人濓時侍上左右不敢稍離於是遣殿廷儀禮司序班曾孫慎虔奉制書展告墓次曽未幾何升濓翰林學士承旨例得追封二代更贈顯考嘉議大夫禮部尚書顯妣淑人顯祖考贈亞中大夫太常少卿顯祖妣金氏淑人而其誥辭乃上所親製褒錫有加焉濓亦蒙恩致政而歸方克躬詣兆域奠告如初惟是皇仁如天溥博無際澤及九泉敻絶前比深懼無以埀示悠久因請前丞相汪公朝宗大其所贈官封勒石塜前一以侈上賜一以昭先德使後世萬子孫思忠思孝永不忘乎君親斯蓋濓惓惓之深望也洪武十年夏四月前翰林學士承旨嘉議大夫知制誥兼修國史兼太子贊善大夫介子濓再拜謹記介孫中書舍人璲書丹篆題龍淵義孰記至正十三年九月某甲子括蒼章君溢新建龍淵義孰成龍淵即龍泉避唐諱更以今名相傳其地即歐冶子鑄劍處至今有水號劍溪焉山深而川阻與通都大邑相去逺或二三百里雖至近亦且半之鄉閭之子弟無所於學章君之先世嘗以為病謀創桂山仙巖兩書院以無恆産未幾而皆廢章君深憂之與諸子計曰無田是無孰也其奚可哉遂樽節凡費而用其餘斥田至一百五十畝其妻黨陳京兄弟聞之以曽大父適齋先生所遺二百三十畝有畸來為之助章君曰吾事濟矣乃卜地官山之隂創燕居以奉先聖而先師為之配春與秋行舍菜之禮旁列四齋曰遜敏曰知通曰敬樂曰博約以居弟子員後敞正義堂月旦十五日鳴鼓集多士以申飭五倫之教前建大門榜之曰龍淵義孰甓其修塗以達于東西灌木嘉篁前後蔽蔭蓋鬱然云歲聘經行修明之士以為講師諸生業進者月有賞才頴家單不能裹糧者資之使成其不帥教者罰及之田賦之出入主孰事者司焉日用有籍月考朒贏歲二會其數有餘則他貯益斥田以廣其業石華象溪二所復設别孰以教陳氏族子之幼者俟其長乃赴龍淵受業此其大凡也江浙行省恭知政事石抹公聞而嘉之檄本郡免其科繇俾無有所與章君既列條教序而刻諸石復懼來者不能保其終也伻來請濓記之惟古者之建學也雖其為制有小大之殊而所以導民𠂻扶世防者則一而已龍泉舊為浙水東文獻之邦水心葉氏正則西山真氏希元實後先以學鳴聲感氣求籟鳴機動掇巍科而典雄藩者聲華相望一時文物固嘗盛矣距今未及百年而繼之者何其鮮也豈俗尚不同遽有古今之異哉亦係乎學之興衰為何如爾章君有見于斯不效時俗封殖吝固以為肥家之計乃闢孰聘師以克紹先世之徽猷其立志甚𢎞而為功甚溥陳京兄弟樂善好義以助其成自非適齋涵濡之澤亦豈能至於是哉章君之子若孫當夙夜以繼志為事毋豐已以自私毋蠧糵其間以啓爭端毋狎非類而斁厥彛訓毋植朋黨而互相低昻庶幾不負章君之意脫有違於是陳氏之中有端亮者宜匡正之陳氏或不我屑也則鄉尹里師豈無勇於為義者咸得糾之鄉尹里師又不我屑也則縣大夫之賢者宜扶樹而振發之是則章君之孰可相傳於無窮雖然無以逺慮為也夫具人之形體者孰無人心哉茍讀濓文宜戰兢保守之弗暇矧敢壞因書之以為記是歲十月具官朱濓記長洲練氏義孰記皇上建大號之八年以為天下既已安輯而化民善俗之道猶有未備乃下詔郡縣凡閭里皆啓孰立師守令以時程督之於是雖窮鄉陋壤莫不有學吳郡長洲縣之尹山民居繁庶習俗嗜利久不知教有司偶遺不舉大姓練塤自謂其父文達由睦來居嘗有志而未果今明詔如此而孰不時立恐非朝廷淑斯民意乃與弟篪謀夷上治林作堂三楹間以為講習之所旁為四室以供寢處庖湢延儒士高平范煥為師俾里中子弟就學焉割田三十畝以食之始於洪武十一年正月越七月而後成具以其狀白于縣若郡郡許以為宜塤乃遣書來請文紀成績古之為治者其法雖詳然不越乎養與教而已養失其道則民貧教失其道則民暴貧則流而為盜暴則去而為邪二者皆亂之始也是以先王重之二十五家之閭必有左右孰孰必有師師必以仕而老于家者為之故是時無不學之民無無孰之地無邪僻淫靡之俗刑罰置而不用亂亡無所自而起其後強大諸侯欲圖得志相與毁詩書六藝之籍使其教壞而不行然尚踰數百年而後絶一民不忍叛其上教之足以感人若是自秦以降無教者亡有教者存得其道者盛以延失其道者衰以促千載一軌也皇上奮然閔前代之失大設學舍以教之欲使海內之民皆沾沐禮義此與先王之心何異塤非有化民之責乃能以淑其閭里是圖豈非君子哉君子之所為貴乎可法於世他日三吳巨族人人能竭奉上設教之意以化其閭巷之民閭巷之民皆知尚禮義耻犯法如成周之時蓋將始於兹乎姑刻其事以俟養親園記天台楊君子善謁豫而請曰善之少也習進士業從陳用晉彭允誠二先生遊屢踐場屋輒不利於是棄去會海內弗靖奉二親逺竄山谷艱難險阻無不備嘗及今真人啓運六合一家幸得還先人之敝廬竊自念少壯之時思欲沽寸祿以榮親東馳西奔靡有寧歲定省曠而音問踈茲獲婆娑於膝下家公年已七十又二固幸康強素髮埀領而齒牙且􅏒搖矣母之年如家公又益其二焉尫羸如不勝衣而出入之氣僅屬愛日之情恆怦怦然頗聞申椒為物性熱而味辛能益氣延年明目生津吾親所宜服餌而不可闕者也乃擇家南之沃壤數畝而贏九耕而十耨之使其土疏而壤鹵封為直疄疄各有溝踰三尺輒樹一本以數計之將六伯焉周為儲胥以護之使羊牛不得踐履夏氣方中絳實盈盈綴于枝間舉手觸之馨烈之氣鬯達於左右遂與子姓采而擷之以奉親有餘則售于千家之市獲其直以還買魚沽酒以為親歡班衣起舞每歌之以侑觴歌曰我藝我椒其實纍纍只薄言掇之其香弗虧只可以延年可以生津只樂兮樂兮吾以奉吾親只歌己二親亦欣欣為之引滿頽然就醉今善雖出仕與有祿食遐想斯園寤寐不能忘子願為善記之豫聞用天道分地利孔子以為庶人之孝説者謂其順時别五土所宜而播種之以養其父母蓋古之士者朝出耕暮歸讀聖人書亦常事爾後世習俗寖偷雞鳴而起從事於末作始有不知躬耕以為養者如吾子善於瀾倒波隨之際屹立不遷不亦行古之道哉雖然子善以茂才應辟出仕明時亦既丞京府而贊治化當以守貴富保社稷和民人為孝較之庶人之事則有不得而茍同者子善素為明經之學其識見超卓有非人之所及豈不能以豫言為然乎豫年加耄不足以言文力辭子善之請而其言益勤因濡毫而為之記朱氏家慶圖記浦陽江上有朱仲賢氏年埀七十而其夀母尤夫人則厯九十二春秋矣猶康寧飲啖如恆人當候序和適夀母出坐鞠隱堂中仲賢率家屬分立左右稱觴為歡州里觀者莫不徘徊歎慕縣校官張君正卿獨曰是亦希有事也不可以不識命畫史作家慶圖裝禠成卷持示金華宋濓指曰鶴髮埀領神色恬康危坐榻上者夀母也其右方帶襞積冠張拱前趨而角巾三人從子男子也五冠者與一童子列其後者孫也二兒挾册徐行自語顧語者曾孫也其左方盛服而參差立者四子婦也三兒二大一小大者攜小者行手中執鞠花者曾孫女也重立於右上二抱嬰孩一獻桃一捧茗甌者四孫之配也一俯倚榻上一牽夀母衣一熙然侍立其側者三孫女也指畢合而計之凡二十又八人且曰先生史官也其言信於海內願為序而傳之嗟夫夀之為言久也最人之所不可得也然亦有得焉而煢然索居者非夀也又有得焉而謀不及朝夕者非夀也又有得焉而左右不能孝且養者非夀也又有得焉而體尫氣羸十日九疾者非夀也又有得焉而禍患迭嬰中心靡寧者非夀也今夀母享此高年尊安無疾孫子秩秩皆能盡養家道豐裕心志怡愈是無五者之失而有自足之樂矣得不為希有之事乎正卿之為是舉宜也非過也且昔人之所至願一則曰夀二則曰夀非惟欲乎己又且祝於人豈不以夀出乎天而非人之所能乎設或有之誠可歌也己吾婺素號文獻之邦振黃鍾之鏗鍧剪毛羽之紛蕤者比比有之其能為仲賢撰為賦頌矣乎戴亭張氏譜圖記張出自姬姓青陽氏第五子揮為弓正始造弓矢實張羅以取禽獸主祀弧星世掌其職賜姓張氏周宣王時有卿士張仲其後裔事晉為大夫張侯生老老生君臣君臣生躍躍生骼骼孫曰抑朔至三卿分晉張氏事韓韓相開地生平凡相五君平生良字子房其孫子實蕃分布四方有安定范陽太原南陽燉煌修武上谷沛國梁國榮陽平原京兆清河等四十三望大抵皆良之裔故唐初定清河為乙門其所由來者逺矣句容戴亭張氏自汴而遷則始於大理評事要皆出於四十三族之中屢更兵燹圖譜喪不能言其為幾世評事生謙三傳至邦寧邦顯邦寧生孝仁孝榮孝仁生景逢景逢生應珍應蘭應珍生鄉貢進士志禮孝榮生溧陽學諭景先次元英景明景先生應開應熙元英生玉山教諭應辰金壇稅務副使應麒次應麟應時應麒生四子遂遷金壇應麟生志逺志逺生文賢文賢生允鄰允達允成景明生應和應和生志頴志頴生文原文原生伯常邦顯生日升日升生思恭思恭生雲霓雲霓生天麟天錫天福天錫生文昌文昱文圭文昱知青陽縣自謙逮今十有二世析為三十四支而族屬之衆將數百人當科目之興也以五見其揀試者各有其人冠衣濟如劔佩鏘如諭道德而談唐虞繽紛而舒徐人或造之但見其棟宇鱗次術徑交羅朝夕循環於詩書爼豆間竟迷其西東故鄉之稱望族者一則曰戴亭張氏二則曰戴亭張氏云先是應和嘗於譜廢之餘搜采而圖之未盡其詳而殁其孫文原出而補其闕請序於申屠推官駉未幾又廢於兵文原之從子允達恐愈久而愈忘也乃以耳目之所記疏其大槩來謁於豫曰先生有職於太史氏其言必見信於世幸不鄙而文諸碑豫因不辭按史表之法書而遺之鳴呼圖譜局之不見即令史之不設大小宗之法遂廢而弗之講允達能惓惓於圖譜之修亦可謂賢也己允達有士行尤致謹於先世遺文裝潢成卷而珍襲之其於崇孝廣敬之道蓋有知無不為云西甌黃氏家牒記黃本陸終之後受封於黃若春秋所書黃人是也其後為楚所滅散居江淮間以國為氏在宋之季有諱定者家揚之六合為兵馬副都監元兵攻揚定同大將與之鏖戰敗績挈妻孥踰浙江居處之龍泉會襄愍公索多帥師攻處定復隨州兵出戰至九里潭力屈就擒索多命禠其衣反接于樹彎弓而向之曰速降速降不降矢貫汝心矣定毅然弗為動定季女南金聞之獨泣曰女子緩急無用理誠不誣妾雖不才忍見父入鬼籙乎乃脫簮珥蓬首垢面走馬謁索多曰將軍平江南一才一藝宜不忍棄妾父有大將之略奈何置之死地即死愈堅他敵心於將軍甚無益也故妾含耻來言將軍茍不聽妾請與父同死誓不獨生也索多義之即命釋其縛俾𨽻麾下同掠地閩中權授忠武校尉建寧路下千户且命統精兵擊延平之沙縣定嘆曰吾宋臣也不能死其顙有泚矣奈何加兵向之乃引疾固辭寓建寧之甌寧將終老焉後五年復擢泗州五河縣尹階承務郎未及代又棄官歸以夀考終葬城南蓮華池上定娶某郡連氏生四子世部世衡世得世虎世衡郢復翼總把總把軍職也世虎有勇力能以手握巨竹破之世衡獨有後餘皆無傳世衡亦娶連氏生三子義夫老柱細良殁葬夀山之原義夫字世忠娶建安陳善足生四子同夀衆嘉如蒲普保殁葬聖佛壇之岡同夀衆嘉蚤夭如蒲字子謙娶建安張鼐生四子仁義智貴仁字淵靜以易經舉鄉貢進士名列第四以溫純能詞章選為太常贊禮郎階將仕佐郎娶泰州張惠義字永宜智夭貴字用和王氏出也普保字居德年十六郡庠私試輒先列己而深通易經應書鄉闈遂有薦于朝者授忠州鄷都丞娶某郡張淑夀生二子炳烔炳蚤夭老柱好武藝娶某氏生一子閭其所習如其父殁于軍細良娶某氏生一子某初義夫既殁如蒲八歲普保四歲家事絶艱辛陳氏以黃乃宦族氷雪自守越五年其外伯父馮翁力奪其志適里之同姓黃清字寒潭實桂甫之子宋孔目官某之孫鞠育二子擇名師傅授以詩書不翅親父二子亦感其恩能孝養之生事葬祭終身無違者清之弟淨既生子珉珉復生子福慧矣孔目之宗當不墜如蒲乃還奉五河君之祀其子仁嘗從豫學明經間修其家牒使後人有所於考請豫序之豫聞氏族之學昔人所甚重所以明同異辨親疏别是非也蓋氣血相貫喘息相通唯正系之傳則然儻以他氏參之此即莒人之滅鄫不可不慎也寒潭固同姓其家承胤既有其人子謙之自禰其父斯近禮己况五河君以武顯而居德及仁方以詩書起家易武以文尤可見能亢其宗者其顯融蓋未艾也故弗辭而為之記詩有云子子孫孫勿替引之黃氏之後人益思其自慎者哉俞巨川墓記余致政家居澄坐於靜軒中日與造化者遊凡文墨之事一皆謝却忽伏龍山海禪師金華童子陽同麗水俞原善連翩而踵余門禪師為原善而致辭曰原善名善衛居括蒼之麗水其先有諱德者嘗為松陽校官自是以詩書為業校官生義義生通通生明家道雖寖裕而敦龎朴茂不為外物而遷朝出耕暮歸讀古人書柔仁自持與人語唯恐傷氣尤懼𨽻卒不啻避虎狼足迹未嘗至公門科繇之應求豪有力者兼之貨賄隨其所命不敢出一言較多寡幸其見聽輒閉户自詫曰吾屬無患矣明生淶字巨川年未弱冠見祖父失之太柔慨然曰茍持此而不變其尚足以立家乎或有事州縣巨川奮身直前揖拜上官皆不踰於禮節吏欲為姦利輒窮根柢不使其滋蔓凡有所期會朝受令逮日落即集羣豪相戒曰是子才智兩全不比其乃公可欺吾當謹避之爾自是其家安輯雞犬亦不驚資業益致殷盛然篤於倫品嗜善不厭仲弟巨淵遘風癎之疾巨川晝夜憂如己有之聘醫治藥殆無虛日至於烹錬火候必躬親視之及巨淵亡撫育其二子尤有恩意鄉鄰之中孤嫠者耄且病者困窶無依者振之恤之唯恐有不及俞源有橋二所曰利涉曰康濟溪水暴悍旋踵輒敗壞巨川憫涉者告病皆重建之如履平地去家十里所慧力古招提在焉蕪廢不治而荒榛沒人巨川為造殿堂門廡莊嚴像設無不畢備具疏延碧潭澄師主持寺事復施毗盧藏經以實之樊嶺慈仁寺棟宇雖隆而浮屠氏諸像未完巨川召良工摶土造之始稱其伽藍之制其存心為善大率類此年六十三以至正乙未六月十日卒于家某年甲子某月日葬于北山之麓巨川娶陳顔二氏男四人長即原善有學行嘗從許文懿公門人逰仲父巨淵喪在淺土原善造穴於父墓之側奉而藏焉乃捐私錢築孝思庵買田若干畞入其租以供祀事錙銖不以煩仲父諸子鄉人士稱之次善麟次善詵次善護女三人湯源吳華髙聽其壻也孫二人某巨川為人外剛毅而內慈惠遇事以誠略不尚浮藻知儒術旁通醫藥卜筮之學嗜義如嗜利今不幸己矣原善慕太史公名非一日無以自通於執事謹介吾儕為之先容願太史公畀矜之賜以冢上之銘也於是原善出再拜其有請如前而加切焉余與誠意伯劉公伯溫御史中丞章公三益嘗同朝二公皆括蒼人每品評鄉邦人物輒稱曰麗水俞巨川仁人也其家世以積善稱余固己聞之矣今原善之至復知詳焉然為善者當有後非惟巨川能亢其宗而其後裔食前人之報者當未艾也爵祿之來夫孰禦之哉豫不辭而為之銘銘曰彼悍如狼我仁如麟彼雖嚚嚚我則振振所以才智鍾乎後昆家有餘慶恆在善人紫綬金章行當大其門金溪縣義渡記撫州金溪縣南若千里旴水與清江合流入于汝名曰東溪其地為四達之衢人之所負物之所載咸出焉溪廣不可梁必籍舟亂流以濟當氣升水起篙師艤棹以徼金錢踰時不能遽涉或水落氣縮氷霜寒沍類揭跣以進若履刀戟然人病之溪濵質行士曰何有華惻然以為己憂伐堅木造舟置諸衝往者聚數十人輒渡之來者亦然割田食舟子自朝抵夕不敢斯須逺去舟敗更新之周語曰辰角見而雨畢天根見而水涸雨畢而除道水涸而成梁此有司濟人常事爾初不責民也有華以編氓能佐官政之不及可不謂賢哉有華字祥瑞周窮扶難甓塗架橋其事蓋不一而足云天台廣濟橋記天台縣西二十里有山曰鷓鴣二水發源其間合流至長洋復折而西與大溪匯然後滔滔東逝當夏潦秋霖水驟進氣勢奔突咫尺如隔胡越里人壘石為小橋不能殺水怒竟蝕而去邑大姓洪紹生憂之乃集子姓與謀纍址于淵鑿石于山犬牙相函魚鱗密比架為髙梁崇以尺計者二十有五修倍之翼以石欄與橋相齊甓東西兩隄各二百尺有畸傍築庵廬三楹間招浮屠惠澄者守之始事至正己亥之三月訖功於庚子之十一月費錢一萬緡夫工一萬一百橋成隱然如虹霓跨空而收截險利涉之效下視飛濤如履袵席遂名之曰廣濟云豫聞橋之名始於殷至秦漢多異稱以其有小大之殊而濟人之功則一也世道陵夷使拔一毛以利物則怫然怒其視紹生一門見人病猶己病者幾何人哉嗚呼若紹生者亦可謂惠人也已昔蔡襄記萬安渡石橋不過一百二十二字又葉正則作利涉橋記乃六倍之豫斟酌其繁簡而為斯記俾刻焉紹生字傳可其先有諱漢者唐末自浦江海塘來遷世多儒至紹生益力本尚義其子曰居安居易居息姪曰夢能濟浩福翁祿翁居易即來請記者今為國子生云玄武石記吳興林君靜嗜道家言事玄武神尤謹一旦出遊虎林忽遇羽客髽髻而方瞳揖林君曰吾與子生同里何遽忘之邪問其里居姓名笑而不答強之則曰乃李自然也客鼇峰之紫陽庵言訖飄然而逝未幾夜夢羽客持龜與蛇施施而來謂林君曰子能往鼇峰乎吾遲子矣林君異之翼日遂行既至逢龜蛇出洞中己而不見林君因斸地獲石類鳬卵圓且黝滌而視之玄武神黃帕首按劍坐雲中龜蛇在下衣袂翩翩如淡金色背文外為墨緣其內正白别有墨龜昻首行蛇絡之所現之像毫末備悉雖善繪者不是過也林君獲之歡曰此吾之玄徴亟往庵中覔羽客無有也乃懷石以歸畫成二圖徴余為之記余聞天地之運二氣絪緼自色自形其變孔神惟其孔神凡人心思之所能及者物具有焉且玄武之稱見于禮經其為軍陳以象天也蓋玄黑也北方之色也武龜蛇鱗甲之象也取其能禦侮也未聞有所謂神也逮于宋初避聖祖諱始易玄為真其名真武以為神手按劍而足躡龜蛇殆起於道家傅會之説乎其傅會固也何為圓石之中果有顯像之異乎夫石與天地俱生而傅會者後代也又何為乎吻合無毫髮之爽乎將神變不可測者偶與之合乎抑事之未見己兆於先乎不特此也梓潼之有神亦非古也天厯中有官於麗水者曰韓氏亦獲玄石石文有神戴席帽乘白騾揚鞭而行一蒼頭後從其與林君所獲無大相逺者不知果何為而然乎豈理之常者可以推理之變者誠不可致詰乎人心至靈一念之感其小者草木或無根而生華其大者日星或退舍而見異况天地間之神出有入無坱圠紛紜又何所不有乎欲徇小夫之末智而致疑於造化之所為可不可乎今林君之為人沉潛而有守而事玄武神又甚謹其必有所感而致於斯乎所謂同里及李自然云者蓋示萬物之里同出於自然知同出於自然則大道可致大道可致則神當在林君之心而不在於石矣林君勉乎哉林君勉乎哉林君字子山靜其名也以瑶臺玄史為之號博學通文詞見羽客以洪武元年八月二十五日入夢則是月之晦獲石乃九月之朔云靈洞題名後記蘭溪棲真院靈洞題名乃蒙齋右史范公端臣乾道五年己丑季秋二十三日所書潘慈明志右史之墓謂其篆楷草𨽻皆造於妙今觀遺墨其言實有不誣者矣然其所題之名凡四曰韓無咎者龍圖閣學士南澗公元吉也曰范元卿者即右史瀫水人曰吕伯恭者金華東萊成公也曰曽正中者章貢文清公幾世之諸孫也曰無咎之子淲者淲字仲止文學追亞其父父號南澗人因稱其為澗泉也蓋成公為文清之外孫視正中為內外兄弟南澗實成公之外舅而右史又成公之親友故相與同為此逰他瑣瑣者要不得與之也成公時居母曽夫人憂至是年二月從吉會妻韓氏物故已八年於是南澗復以次女為之配其如德清行親迎之禮起自五月二十日至八月十一日始還以韓夫人廟見南澗父子及正中同來於婺者豈或為昏事之故邪初成公之伯祖父中書舍人本中親傳中原文獻載而入南僑寓信之廣教寺己而文清辭廣西運判亦來居之文清則孔文仲武仲之甥劉器之胡康侯之髙第弟子二公􅀈學甚契故以女妻舍人從子倉部郎官大器即成公之父也南澗出於雍丘桐木之韓後寓廣信其先人少師持國與程洛公司馬溫公吕申公為友而南澗能紹家學為一代冠冕右史則從叔父香溪先生浚學經而深於性理者也有若四君子之所學其家世淵源師友傳授尚班班可考見當其徘徊山水之間特欲發舒精神而涵泳萬象之妙非比尋常之逰衍而已也院僧介眉上人嗜古特甚每撫壁間題識不勝髙山仰止之思仍慮漫滅不存礱巨石勒置廡下介義空勝公求豫記之因為疏其梗概於下方至若續題乃右史之弟俞之筆實紹熙三年壬子距前題己丑已二十有四年而四君子者皆作土中人矣自壬子至今至正丙午又一百七十五載人事之變遷者何可勝道唯有德之士其名弗磨見之如存不知其亡也覽此者其亦思有以自立也蘭亭觴詠圖記蘭亭觴詠圖一卷相傳為李公麟所畫觀其運意狀物極有思致似非公麟不能先畫蘭亭一所俯臨清流上甚幽靘四面皆簾簾半捲旁周欄楯中設方几几上研墨各一紙三二成軸一布几間有美丈夫坐几後冠竹籜冠服大布衣右手操翰冥然若遐思疑羲之草序時也後列二童一侍側一吹火爇鼎鼎水沸將瀹湯前一童傍欄睨溪溪中白鵝三一去一反顧一飛起波面厠二鵝間溪上皆崇山峻嶺有水自中出三級水西置酒尊四一童左手執袂右入尊勺酒一童執觴一童執壺夾左右立尊前有案列觴五觴各有舟如荷葉二童執觴流於溪一童傴立其後舉觴次第授之旁有小梃觴泊岸觸之使逝又西有石磴磴上覆舟一列觴三一童執壺注觴中一童取酒盜飲次畫郡功曹魏滂右將軍王羲之滂左執卷回顧羲之伸右手欲受卷觀羲之左持卷授滂未授右執翰凝視若將塗竄然風流之狀猶可倣佛想見次畫散騎常侍郤曇左右手展卷自誦次畫榮陽桓偉餘杭令謝藤偉坦腹坐左手掀髯氣甚豪右執卷猗大帶間藤解襟盤礴詩思久未屬握拳作欠伸勢次畫侍郎謝瑰左持卷當膺右握翰撫膝上次畫王凝之潁川庾友王渙之凝之袒兩肩左手埀硯側右執卷授友友袒如凝之方軸紙作卷卷末紙參差以掌齊之渙之袒如友兩手抱膝微吟次畫行參軍事卭丘旄袒裼如渙之伸一足坐舉手取觴飲次畫餘杭令孫統琅琊王友謝安行參軍曹茂府主簿任凝統翹左足義兩手著膝安翹右足左手壓硯令不動右揩墨作汁二人相向坐茂兩手執紙直埀輾轉軸之凝袒衣露左臂壓膝上翹一足如統旋首顧茂目光炯然次畫左司馬孫綽斂衽危坐若泊然無所為者次畫潁川庾藴年甚耄坐久思起右手據地一童挾左臂扶之次畫行參軍楊模衣半袒單足起立屈一足揚雙袖向前翩翩如舞次畫王獻之王肅之鎮東司馬虞説任城吕系府主簿吕綿獻之襟袖半敞埀右手著地左按膝肅之困睫不可擘一手撚紙作針刺鼻令嚏説袒半衣兩手展卷讀系向説右手據席左繞出背後閣膝上臂露者半俯身就説作聽狀綿足心並翹一足兩手持卷夾膝身微側次畫參軍孔熾坦腹仰靣視霄漢翹一足左持卷枕膝右據地傍一童伏溪岸以小梃致觴欲飲熾次畫參軍劉密袒衣坐左手執袂右入水微波動指間前有觴泛流而下欲取之旁有覆觴流去次畫王玄之永興令王彬之郡五官謝繹王微之玄之展卷斜視露左手右不見彬之與玄之對袒肩坐伸手借卷繹亦袒埀左臂右執翰壓臂臂癢將搔之微之左擎卷至觀右操翰欲寫未寫次畫府功曹勞夷行參軍徐豐之夷豐之相向夷左執觴右手夾觴側若獻豐之豐之面仰視揎袖至腕上勢粗甚右手向身北取觴似欲酬夷者次畫長岑令華耆右執觴未飲左撚髭旁睨豐之洋洋有喜色次畫徐州西平曹華右執卷側身欲讀左手隱次畫王藴之鎮國大將軍掾卞迪司徒左西屬謝萬彭城曹諲任城吕本藴之箕踞坐交臂兩膝間一握拳一舒掌掌覆拳背迪半欹舉手迎觴欲取萬肩半坦左按紙右在肘下側目視迪諲伸右足左持觴顧本本翹一足屈臂拄膝持翰貼耳上頭微仰若苦吟者次畫上虞令華茂山隂令虞谷中軍參軍孫嗣茂袒肩右執翰埀下欲擲轉首共谷語谷袒衣與茂同右持觴浮茂嗣拊掌大笑一足踞次畫陳郡袁嶠之行參軍王豐之豐之展卷仰首讀背微傴嶠之雙掌相向舞似對之擊節者次畫二埀桞夾石橋橋有扶闌二童度橋上一持器疑貯觴者一倚闌戟手指溪中溪左右各一童操小梃邀觴舟收之其側有覆觴二舟兩别有一童出桞下身半露自蘭亭至石橋溪水詰曲流如龍奔溪右二十人溪左二十有二人其中冠者十有二人巾者三十人衣皆褒加紳各地坐藉以方裀或熊虎皮研紙墨筆各具有詩者各繫人傍兩篇成者十有一人一篇成者十有五人不成者十有六人其狀人人殊誠可謂善畫者己今去永和癸丑不翅千有餘年計其一時人物之盛清標雅致浮動於左尊右俎間猶可即此圖以想見其事然而俯仰今昔時異世殊崇山峻嶺固不改於舊而昔人果安在哉後之人欲見有不可得徒想像於圖畫中亦足悲矣噫世間萬事往往如是是何足深道唯辭章勞烈足以傳世於無窮其人雖死猶不死也如王謝諸人是己使公麟復生尚得描貌之乎豫見此卷於友人家因借歸記其事如右時一觀焉則有不勝感慨者矣饒氏杏庭記臨川曽先生旦初助教成均嘗以其鄉友饒君孟持杏庭記為請豫年踰六望七精神衰耗四方求文者接踵于門心極厭之則作而固辭先生之請至六七而不倦豫以先生有學之士其言之勤如此意必有所屬因詢其詳先生曰孟持故詩書家其先祖手植文杏一章於所居之西兵燹之餘風枝露幹屹然蒼煙中疑有百靈訶衛之者孟持因樹亭其側名曰杏庭然孟持之意非以為觀美也唯汲汲乎先祖是思當春陽和煦生氣鬯達自本而末咸周流而無間則思其與道為體精神發舒無往而不在也秋髙氣清葉脫而色不澤所謂歸根復命返於沖漠則思其順時斂藏不誇能不矜寵也朝露其沐浥乎其容則思其盥漱而興正衣冠而屹立也夕颸作涼冷然其音則思其出坐中堂若誨語之初聆也一動靜一云為之間見杏則如見其先祖焉所以聳動其心志警戒其昏惰者大有資於學功視彼拈葩摘豔以為耳目娛者其可同日語哉此誠有關於彛倫之重不避再三之瀆職此故也豫聞之嘆曰孟持亦可謂孝子矣乎昔者召伯循行南國以布文王之政或舍甘棠之下其後人思其德尚愛其樹而不忍傷矧先祖手所親植者乎宜乎孟持之不能忘也孟持不忘於杏且如斯則夫手澤之在書口澤之在杯棬其所感又當何如哉孟持可謂孝子者矣雖然逺取於物不若近取諸身孟持之身內而心膂外而髮膚非先祖一氣之所分者乎一氣之所分則是身乃先祖之有也葆嗇失宜非孝矣登髙臨深非孝矣言行弗擇非孝矣忠節有爽非孝矣涖事不勤非孝矣孟持可不慎乎雖然杏一物耳孟持以先祖手植如或見之則其於身殆有不言而喻者矣豫之云云不置無乃過於思慮矣乎先生曰子之言善不專為孟持頌重榮桂記廬陵周氏奕葉以書詩為業有字孟聲者與其子學顔皆以文鳴薦紳間故廬在吉水之泥田村門墉之內桂樹一章扶疏而離褷晝日成隂縱橫可二畝逺望之童童若車蓋然元至正壬辰紅巾盜起廬舍皆化為煨燼桂亦焚死剪取其枝柯為薪唯幹獨存越五年甲申桂忽發緑芽膚間已而怒長不數年間蓊鬱若雲布東南有小桂者二亦壞於兵至是萌蘖出自根柢枝葉沃如也閭師里尹過之戟手指曰此非祥也妖也物反常則為妖烈火之所焮炙津枯于內枝焦于外生意安能貫之生意不貫而萌蘖惡乎生茍謂其生為祥則倒竪之槐僵起之桞不亦祥之大者歟或曰非也此祥也天地之間有開必先其機之動間不容髮萊公之感插竹生筍田氏之聚枯荆再華蓋草木最得氣之先者也大化流衍占盛衰者每於斯觀其兆焉唐人以擢第者為折桂此殆周氏科目之徴乎二者之論久未有所定國朝洪武􅏤戌學顔之子仲方以明經舉于鄉會試南宫除侍儀使出為中牟令以政事聞然後始知桂之重榮非為妖也實祥也豫嘗聞之人事之與天道誠相表裏有感必有應始終循環無窮今以茲桂徴天而驗人其祥固無疑者然而君子之論祥當在人不可使物得以專之仲方益率德勵行使德馨逺聞既以華其躬又以燾其後人周氏之興其殆未艾也歟係之以詩曰維桂之良其色中黃其氣苾芳有士治經藝之于庭比德之馨帕額執殳來爇我廬桂亦變枯椔翳屹然自踵至顛氣絶弗聨胡彼緑苞怒長如毛有華其膏日益以崇車蓋童童敷隂正濃大化絪緼何屈不伸瑞應之純孰歡孰呶為祥為妖匪德曷要德將何徴搴其芳榮以契其真天昌其家悴而復華厥兆孔嘉勿剪勿傷是培是封沃以靈漿君子有云瑞當在人其福乃臻我陳我詩其辭則梔匪頌以規渤泥入貢記渤泥國表附濓承旨禁林日福建行省都事沈秩來謁曰洪武三年秋八月秩與監察御史張敬之等奉詔往諭渤泥國冬十月由泉南入海四年春三月乙酉朔達闍婆又踰月始至其國國王瑪珨穆特沙僻處海中倨傲無人臣禮秩令譯人通言曰皇帝撫有四海日月所照霜露所隊無不奉表稱臣渤泥以彈丸之地乃欲抗天威邪王大悟舉手加額曰皇帝為天下主即吾之君父安敢云抗秩即折之曰王既知君父之尊為臣子者奈何不敬亟撤王座而更設薌几置詔書其上命王帥官屬列拜于庭秩奉詔立宣之王俯伏以聽成禮而退明日王辭曰近者蘇祿起兵來侵子女玉帛盡為所掠必俟三年後國事稍紓造舟入貢爾秩曰皇帝登大寶己有年矣四方之國東則日本髙麗南則交址占城闍婆西則吐蕃北則蒙古諸部落使者接踵于道王即行已晚何謂三年王曰地瘠民貧愧無竒珍以獻故將遲遲爾非有他也秩曰皇帝富有四海豈有所求於王但欲王之稱藩一示無外爾王曰容與相臣圖之又明日其相王宗恕來曰使者之言良是請以五月五日成行闍婆有人間王曰蘇祿來攻王帥師却之今聞歸誠中國無我闍婆矣王惑之秩復走見王王辭以疾秩大言謂宗恕曰爾謂闍婆非中國臣邪闍婆尚稱臣於爾國乎何有使者朝還天兵旦夕至雖欲噬臍悔可及乎宗恕悚然曰敬聞命矣乃入白王王大會其屬共議遣亦思麻逸等四人入朝臨發王以金佩刀吉貝布為贈秩毅然辭之王顧近侍曰中國使者亷潔乃如是邪闍婆來人誅索每無厭况強之而不受邪爾曹宜效之秩以涉海萬里不可以無紀乃與敬之各賦一詩王大恱書于板中懸之既與王别舟行至海口王又惑左右言令人與亦思麻逸曰使者不受刀布爾等必不還矣秩恐王不喻復走王所反覆譬曉之王曰使者之言如此豫中心釋然矣王舉酒為别酹地祝曰願使者蚤還中國願亦思麻逸蚤歸敝邦秋八月十五日還京師十六日以亦思麻逸等入見錫宴於會同館已而遣歸寵賚其王甚厚云其所貢物鶴頂生玳瑁大片龍腦米龍腦黃蠟降真諸香其表用金刻畨書倣佛如回鶻書其文鄙陋不足觀皇太子箋用銀箋文與表相類其地炎熱多風雨無城郭樹木柵為固王之所居若樓覆以貝多葉王綰髻祼跣腰纒花布無輿馬出入徒行城中人不滿三千家多業漁剪髮齊額婦人衣短衫僅蔽背腰繫花布散髮跣足其物産只吉貝黃蠟降真龜筒玳瑁檳榔煮海為鹽􅅹榔漿為酒無稻麥捕生魚蝦蟹食之兼食沙糊沙糊者取樹實為漿澄漉膩如粉食之能不飢食無器皿以竹編貝多葉為之食畢則棄之畨書無筆札以刀刻貝多葉行之事佛甚嚴以五月十三日為節國人亦於是日作佛事若有燕饗則刲羊豕雞鵝鳴鼓擊鈸以為樂此其大凡也先生職在太史願為詳紀之以昭聖化所被之盛濓聞渤泥在西南大海中所統一十四州去闍婆四十五日程去占城與摩逸各三十日程去三佛齊四十日程厯代未嘗朝貢故史籍不載至宋太平興國二年其王向打始因商人蒲盧歇遣使弩使副蒲亞利判官哥心等齎表來貢元豐五年二月其王錫􅀈麻喏復遣使如前日後輒不聞元有國百餘年亦不復至方今聖人在上威德之所被無逺不屆璽書一頒輒稽首臣順稽之往古允謂過之至若秩等奉宜德音辭令所加足以讋服其心亦可謂不辱君命者矣其事冝書以俟他時修國史者采焉秩字仲庸湖之烏程人敬之字某某州人二人協心謀慮無役不偕故卒能成功云表文云渤泥國王臣馬合謨沙為這幾年天下不寧靜的上頭俺在畨邦裏住地呵沒主的一般今有皇帝今有使臣來開讀了皇帝的詔書知道皇帝登了寶位與天下做主俺心裏好生歡喜本國地面是闍婆管下的小去處怎消得皇帝記心這幾日全被蘇祿家沒道理使國將歹人來把房子燒了百姓每都喫害了託著皇帝詔書來的福廕喜得一家兒人沒事如今國别無好的東西有些不中的土物使將頭目每替我身子根隨著皇帝根的來的使臣去見皇帝願皇帝萬萬歲皇太子千千歲可憐見休怪洪武四年五月渤泥國王臣馬合謨沙表蜀墅塘記義烏縣南四十里有塘曰蜀墅焉周圍凡三千六百步東西北皆岸山山之水合七十二流入于塘而南出南有蜀山突然中起昔人因據山作隄障水以溉田山之東其修七百尺有竒廣如修之數而殺其五之四深如廣之數而又殺其三之二山之西其修如廣之數而稍加強焉隄之中刳木為三竇以泄水水之所溉田至六千畝而嬴至正四年夏水暴而隄壞田遂不稔丹溪朱君震享憫農之告病也白於縣縣尹周侯自強為下其事命雙林巡檢張某來視役震享遂盡召有田之民履其畝而使之輸其力薦貨有差復出役夫之功一千以為衆倡衆悅趨之一聽震享之經畫補其闕遺增以崇髙築其址加闢而漸殺其上隄之西埀鑿石為斗門視水溢乾而時畜泄之門之上架徒杠以便行者木竇易壞則易以堅石且定為髙下之穴使欲水者先後有程而不紊復懼厯嵗之久而隄弗固也請於掌堂事者中析粥魚之利而嗣葺之凡用錢四千緡夫一萬功經始於五年秋八月庚申踰三月乃告成里耆朱仁傑等來謂濓曰震享之興是役也初無一弓之田以徼塘利其夙夜盡瘁而不舍者果何為哉凡欲利吾農也我不敢忘願吾子記之濓聞海陵胡公瑗之在湖學也置經義治事之齋教授諸生至於水利之屬亦無不習而通之故其門人皆有適於大用今震享之學出於金華許先生謙先生之六世祖實嘗從海陵遊其家學相傳至先生為尤盛宜吾震享見諸行事者有足觀哉世之人方髙談性命以聾世瞽俗聽之雖若可以有為一遇小利害輒顛倒衣裳不知所措視震享無所為而利民者何如也盍亦知所警哉震享字彥修有長材縣嘗下括田之令唯震享行之無擾云江乘小墅記部使者髙昌君近仁雖嘗顯融于時而翛然有山林之思往往吞雲吐霞形之於詩詩不足以泄之復寓之於書糾蟠飛騫神蛇蟄而渴驥奔書又不足以盡之復和墨圖竹君之形容淋漓蕤綏生色照人恍然如臨淇川之隂然而逸韻曠情非標雅之居無以遂其潔修故君宦轍之所至必營别墅以自休焉近者持節江乘仍卜城北之地而作之初其地蕪廢己久頽垣敗壁漂搖風雨中羊牛犬雞之迹交錯於其上君剪荒剔翳别運新意或革或因而各適其度匡竹為藩敞以兩扉自扉而入有曲軒覆以生莎中虛可容六七人木榻橫陳映雪時晴宜臨右軍書曰映雪軒軒右折而北一室窪深類嵌巖上下皆塗以堊白光爛爛如銀眩人目睛曰雪洞洞左闢圭門中鑿小池漫以甓四壁圖海波有噴湧突起之勢手捫之方知其平池左通竇于墉外受湯可作浴事非浴時梁以巨版可聽琴可坐而奕曰天地一息或取山中白石湘之又名煮石窩窩南有奧焉其制一如雪洞畫偃蹇怪松卧寒煙濕霧間觀之毛骨瀟爽可擁氊而吟曰雪松巢出巢過小廡翼以欄檻兩傍可列坐曰雲艭艭之北築圓基圍以巨竹織葦而苴以泥其顛通一竅以泄天明結銅絲為羃承之冒以油繒東西北三面有竅如其顛障之以白間錬梔液而黃其四周可據爐而飲飲後可畫曰橘中天以其首末閷而中肥其形肖繭又更之為繭甕甕之西偏列圖書左右間謐靜巖不聞人聲可以擢神扄而契道機曰清閟室室之南有屋兩楹前附方池環以菊本當秋髙氣清時離離黃金錢若新鑄者秋水無波倒影入其中星燦霞明無不可玩君一切置之獨瞻簷前白雲英英西飛思親之不可見泫然泣下因命之曰望雲堂所以志也凡堂之得名者十而重其二薦紳先生既各為之文君間謂豫曰子幸一辱臨之知吾居之悉者莫子若也願為我書焉昔王左丞維文采藴藉為一時之冠嘗營别墅於輞川若華子岡若欹湖若竹里館若栁浪若茱萸沜及辛夷塢羅列後先維咸標之以嘉名日與客咏歌其間襟懷和沖或作草𨽻書動入能品輞川叢竹龐龎時出秀色撩人維復寫其雨態風情至今獲者如見魯之璠璵雖當時史臣為維傳者亦載其事加詳自沉酣富貴者言之唯聲色遊畋之樂是耽孰肯怡情於物外乎如維之賢殆不可及己於戲豈知七百年之後君之事乃有近於維哉抑豫聞之維於遊厯諸處雖愛戀之不少置不過各賦一詩而已今君則命才大夫分記之後俾豫合記之則又維之所未有也君不為尤賢乎哉豫故長言之俾後之史臣傳君事者有采焉爾君善談論出史入經聽者纚纚忘倦長於政事而於典章制度之學尤精以不繫於記也皆略之貞一道院記貞一道院者浦江戴君性中所建以奉玄武神者也初性中嘗習法令于江浙行中書有事如金陵舟渡大江至中流忽黑風吹舟蕩搖欲覆幸不覆而水入者二尺會天大寒氷生衣上淅淅有聲如此者三日夜風既不止又不能火食唯取醇酎飲之俟死而已怖中計無所出乃北向稽首號諸神曰神當有以哀我即使我無死誓作宫以報神休時夜正黑有天光自檣端下爥耀然如燈髣佛見黑衣神披髮按劍以足蹴舟迅行如飛逮明己薄江岸噫亦異矣儒者之正論恆以為玄武乃北方七宿之象而傳記之所謂龜也或曰龜與蛇也古之人出師必象天文而作陳法故畫龜蛇於旐而與蛟龍之旗熊虎之旗鳥隼之旟並掌於司常議禮之家獨謂龜蛇為玄武者玄則以其色之黑武則以其有甲能禦侮也玄武之見於用者蓋如此宋有天下尊崇聖祖以其嫌名玄郎故改玄為真初非有所謂神也道家者流欲竒其事謂神有名字里居一何悖邪性中之所見其有無未可必也濓則以為不然沖漠無朕而萬象森然已具者非心之謂也心則神之所合無大不包無小不涵雖以天地之髙厚日月之照臨鬼神之幽逺舉有不能外者故其精誠所召揮戈指天白日退舍拔刀斫山飛泉湧地亦感應之常理耳何足異乎此既不足異何獨於性中之所見而疑之乎世之好竒者既聽於茫昧不可致詰之神而激者反之於正乂一切絶之於無有嗚呼不亦兩失也哉道院之額教主嗣天師之所署始事於某年某月日訖功於某年某月日費錢若干緡為屋凡幾楹間搏土象玄武神于中黑衣翩翩披髮按劍而坐蓋志所見也文憲集卷四
