body:
  text: 文憲集卷十六明宋濓撰碑凡二十三章金溪孔子廟學碑金溪縣令李子敬修建孔子廟學成廟之殿及㦸門皆仍其舊罅漏者補葺之䵝昧者丹堊之學之論堂廟之西東廡與夫肄業之舍皆新作之論堂為間者三崇二十又二尺縱視崇而弱其二尺橫視縱而强其十尺肄業之舍為間者左右各三兩廡視舍其數各再倍之經始於洪武七年八月至十月訖功嗚呼元季兵亂邑廬盡毁而廟學巋然獨存是固有相之道而賢大夫復能汲汲為此可謂知化原者矣助其成者縣丞楊乾主簿劉祺典史喬思道子敬既相率釋奠已使教諭曽易徴文於濓濓序其故而系之以詩廟學緣起及三遷之詳則舊記存焉詩曰金溪之山翔躍猶龍下有學宫靈氣所宗篤生大賢惟我陸子究明本心逺探聖髓其道朗融白日青天纎塵不驚萬象著懸矧兹鄉學可不亟圗孰其興之實邑大夫機動籟鳴泉赴川增其從之者緝緝繩繩三月之間用幣告成龍礎鳯甍文梲丹楹氣象改觀焕乎聲明人亦有言有詩有書有齊有廬式寧其軀匪居之為娛前軌是趨念此小邦文物則衍其氣夜發電流虹轉學子翩翩期文之願匪文之為勔惟形是踐我作我詩為勸甚力聖謨孔彰萬古一日有赫其臨敬之無斁蘇州重修孔子廟學之碑蒲坼魏公守姑蘇之明年鋤暴樹良無令弗肅上下洽和百廢具興惟孔子廟學弗治棟楹傾敧丹堊䵝昧若不能支旦暮者公顧瞻良久愀然弗寧乃登僚寀縣令丞暨尚義之士咸集于庭喟然歎曰皇帝以神武定四海即大興文治詔以明經六藝之科頒示郡邑使選弟子員肄講明體適用之學將以人文化成天下今敝陋至是非所以靈承帝意豫先捐俸為倡爾二三君子幸相與圗之穹殿邃廊䖍奉明禋靈星之門神道所繇其役為最吳江葛德潤爾其葺之論堂有嚴兩廡相嚮復挾以六齊以通于前門吳江寧璇汝其修之亭號采芹下臨康衢來遊來歌多士攸宜崑山張庸爾其整之公言未已吳江令許茂進曰邑有八士曰李庚等頗有意乎書詩尊經之閣先賢諸祠游息三亭以至庖湢橋梁之屬茂率其承之長洲丞丁師尹復進曰許令然矣師尹獨不可為乎若止善堂及中廊達于閣者當諭羣儒使賦金俾里耆唐晟視其役焉公大恱唯周垣四千八百尺未有所屬僚若佐遂以罰布佽助而吳縣令曽輔歡然趨功役邑夫畚粘土繩繩而來事因大集始事於洪武六年二月戊辰而訖功于十二月某甲子如翬斯飛如雲斯凝如濤斯湧深沉而潔清宏麗而靜密一還承平舊觀公帥其屬執豆籩具脯醢以成功告觀者如堵牆莫不嗟歎自兵興以來學宫所在蹂踐為墟而姑蘇幸僅存非公之至幾何不與之俱廢乎教授貢穎之既宣力於始終復使訓導張田請記其事以埀不朽惟蘇之有學實始於范文正公蓋公景祐初出守鄉郡擇南園之地奏請于朝而建是學為其師者則安定胡文昭公也計當時人物固嘗盛矣數百載之下仰其聲光慕其風烈每使人發不可企及之歎自時厥後雖有賢愚而學之興廢靡常而二公過化之地流風遺俗終未泯也况今遭逢有道之朝而得良二千石為之師帥豈徒然哉然公興學之志不下於范公者也則夫坐臯比而談經藝者其必將取法於文昭乎明體適用之學吾知駸駸然向盛矣茍不務出此而摘英搴華為譁世取寵之具非區區所敢聞請以是刻諸麗牲之碑庶幾蘇之人士知所自朂哉公名觀字把山通周易為人疏達無凝滯如八窗玲瓏見義勇為雖千萬人不可遏所至輒烈烈有聲同知府事李權通判徐弼推官超霖皆號一時之選與公道合故成事無難者碑為修學作前代興造各自有記皆不書唯當書者不敢拘於文體而不致其詳焉系之以詩曰姑胥之墟有川滮滮折趨南園匯而東流靈氛中啓渙爛弗收自非聖師疇協其休昔有哲人出綰郡章乃搆學宫乃建廟堂廟堂章章學宫將將襟佩洋洋來翺來翔盛衰相因揆理則然風摧雨蝕上漏旁穿矧丁艱虞烽火相連誰舉一臂持危扶顚大明當天九服攸同叶欃槍斂翳奎壁吐芒眷我魏公來蒞大邦屢形於言我敢怠遑既率部封復登府僚分勞授事具乃教條曽不一朞厥功孔昭化此朽腐鬱為岧嶤孰敦化原孰築教基孰牖民彞匪學曷為我語蘇人公豈爾私耳目茍具必致其思思之如何法孝與忠二者無愧行將天通震澤有石其堅比銅史官勒辭用昭無終胡越公新廟碑丈夫之遇于時也生使人懷之歿使人思之且建廟食於其土必其德澤入人之深堅如金石而弗渝信如四時而弗爽照如日星而不忒然後足以厭乎人心而合乎輿論也嗚呼豈易致哉若今之胡越公者其庶幾無愧於此乎自辛卯兵興天下大亂民遭溺焚倀倀無所棲止皇帝手秉黃鉞起而救之屯兵滁陽公杖䇿謁轅門一見語合遂居前鋒以佐揚天威乙未春二月王師取和州夏六月下太平丙申春三月平金陵攻京口丁酉春三月又拔毗陵公皆列戎行或搴旗斬將或操蝥弧以先登前後屢建竒功乃授右翼統軍元帥使宿衛帳下夏四月又從破宣城上命行樞密院判官鄧愈戍宣公副之秋七月遂同諸將攻徽州拔之元將楊完者聚兵十萬欲復其城公自婺源兼程以進橫槊而前大呼殺人衆皆披靡而遁戊戌春三月諸將克嚴州公又偕往降溪洞兵二萬以功遷行樞密院判官公謂蘭溪去嚴為甚邇蘭溪下則斷婺之右臂矣冬十月乃下蘭溪十有二月王師取婺州升公僉書行樞密院事公益思有以自效己亥春正月攻陷諸暨州十有一月又平處州庚子夏五月又拔信州信方絶糧人皆勸公還師公曰此閩楚喉襟地也可棄之乎乃築城浚隍為堅守計辛丑夏五月上憫公之勞且以婺為海右大藩通甌引越非宿將重臣有以控制不可乃授公江南等處行中書省參知政事屯戍於婺壬寅春二月溪洞兵叛而西歸公遂遇害知公之死者莫不哀慟流涕如喪厥父母上聞之亦震悼弗置親御翰墨作文以祭且命有司塑公像配享卞忠貞公廟庭甲辰冬復降㫖贈光祿大夫浙東等處行中書省平章政事柱國追封越國公先是公歿之明年公之部曲與境內之民悵然遐思若不能勝其情乃相率即城中作新廟一區十越月而廟成堂門庭廡咸具及是寵褒之命下復羣謁於金華宋濓部曲進曰公之號令素嚴人無違禁賞非無功罰非無罪使我等攻必克戰必勝而丕冒於寵靈之內者公之賜歟我之病也孰知而起之我之凍且餒也孰察而周之其能親自裹創注藥及安於食且衣者非公之賜歟公之德我何以將之境內之民又進曰吾婺之民凋瘵殊甚公専心撫摩之昔也奔走西東歲無寧居今也長幼一堂愈愈雍雍非公之賜歟昔也商賈不通布榖不登今也市區充溢百貨具集非公之賜歟昔也厄於暴强莫敢何問今也攘一莖茅公亦使償之如承平時非公之賜歟公之德我亦何以將之兹者龍光下被爵登上公人神洽熙雲日潤明卉木動搖如有喜色適新廟告成願為我詳紀公之功德以埀示於無窮是用合辭以請濓竊觀古之名將出戍邊域者矣茍得甲士之歡心則耕田鑿井之氓必至於弗寧使斯民稍得以遂其生則持㦸荷戈者必不免於愁歎孰有能兩全者哉若公者可謂尤賢乎已公嘗自誦曰我不知書然吾行軍唯有三事而已不殺人不虜人女婦不焚人廬舍故其軍一出逺近之人皆爭趨附之蓋公處心以仁蒞事以威惟其仁也故不言而民化惟其威也故不待戒而兵自不敢犯昔者祭征虜制御士心不越法度所在吏民不知有軍及其死也人為立祠享之較之於公其事固無大相逺也廟而祠之其誰曰不宜初公之未薨嘗夜出人見其兩目煜煜有光若燈及其既薨敵人數擾我邊陲公降祥異或見夢於人或覩靈火滿野洶洶聞人馬聲洎出師輒大捷似實有隂兵來助者是則公之英魂烈爽下上於星辰之間固未嘗亡也因併及之使知天之生公有非偶然者公姓胡氏諱大海字通甫泗之虹縣人詩曰聖皇啓運四方攸同升龍在天飊狂雲從中有一人萬夫之雄其人謂誰時維越公其一凛凛越公徑氣橫騖手荷鐵殳其粲若爐彼趫以馬我捷以步陷陳如飛逢者必仆其二天兵四出靡弗在行瞪目疾視前無堅城有聲洸洸敵人震驚土疆既拓大勛以凝其三皇帝曰都爾主羽翼婺維雄藩爾鎮其域爾參政府解爾宥密爾勞爾徠以盡乃職其四公既受命分閫建牙威讋化孚莫敢或譁汝顛汝掖汝疢汝摩化汝呻吟而為謳歌其五視彼郊原其耕釋釋視彼闤闠其通繹繹視彼室廬其居奭奭何以致斯伊公之力其六我民無祿俾公棄捐精神上遊固合化權民之云思其何舍旃匪廟曷祀非祀曷䖍其七乃簡甓材乃端術徑乃差榖辰視星之定林衡奔事班倕禀令紫梲星錯素階玉瑩其八邃清有寢嚴衛有門旁夾有廡四繚有垣肖像中居威神騰軒隂風肅如髣佛若存其九維公顧綏時著靈響幽火東騖鐵騎西上赤幟一揮無敵不磢孰不生畏孰不景仰其十生為名臣死為明神䇿書所列指可縷陳矧公之英貫乎屈伸幽明有殊神人則均其十一公實惠我弗間弗二人之依公如旌繫旞登我稼穡遏我妖沴歆我明祀欽于世世其十二景祐廟碑景祐廟者宋殿前司統制祖公廟也公諱琙字真夫其先閩人後徙明奉化之松溪公有文武才建隆中以剛毅稱居鄉黨遇歲飢發私廩以賑餒夫所活以千計里有昏喪貧不能成禮出財帛周助之子弟不能學者為招師儒使就學焉邑人咸德之既沒皇祐二年遂作廟于忠義鄉之福慶里有故必相率趨禱滅火愈疾屢著竒徴元祐中漁者鄧祺徐寶泛海值風舟起立者數四懼死呼神求救公忽見于空中應之俄而火光如斗墜檣下風頓息起視所在舟已至公廟下矣建炎四年髙宗南奔御舟至﨑頭金人將舟師追其後將及見赤旗數萬蔽海上金人沮懼而退是夕提領海舟張公裕夢神人虎䩨魚服奏對上前自稱官位姓名公裕以聞髙宗多公之績制封文惠侯賜廟額為景祐元大德十二年大疫死者相枕民禱公公降于人指廟東井命民飲病者飲水立愈明年蝗發境上官督民捕蝗日以斗斛徴之民泣訴于公頃之蝗飛積廟前髙數丈民取以輸遺蝗亦皆自投于海禾不為災至正十一年海盜起將剽掠邑民㑹大風揚沙晝晦不可辨盜迷失道而退後盜復至鈔民財無所得怒欲火廬舍至廟若聞絃誦聲驚駭相顧卒不敢犯二十二年有巨蝶集里巷螫民膚即死民神事之迎置于廟公復降于廟巫手撲殺之耆耋卓在明汪敬行等列其事聞于朝二十六年加以昭烈之號皇上有天下以為凡神之封爵宜命于天非人所敢與洪武四年乃詔儀曹易公號為故義士祖公之神每歲季春縣用剛鬛行祀事著為恆制敬行之弟敏學復謂公自宋初至于今四百年功烈及于民者甚久而未有文辭昭靈焯美埀之無極甚非事神之道乃遣從子正來請傳其事于碑夫公以一將之微其生也非有公侯之貴萬鍾之富而獨能惠其鄉既死數世復能濟其君于艱難而保鄉邑之民於無窮非烈丈夫能然哉是可歎也已其詩曰斗牛之南大海堧羣山嵂崒植翠􅎶乾靈坤秀鬱不宣篤生祖公維俊賢虎眉虬髯髙兩顴右握寶刀左屬鞬指揮豼貅立殿前晚辭天子歸林泉傾萬金資振顚連聞人急難刺在肩有弗能拯食不咽曰生施惠靡遑年死為明神參化權鬱攸肆虐焚氓㕓揮唾沃之不敢煽颶風掀浪欲拍天漁舟葉出立以旋火焰如日墮檣端手提白骨出重淵鑾輿狩南濟大川追者十萬犬羊羶身率以君將樓船赤幟塞島虜愕然璽書褒忠禮彌䖍坐秉躬圭冠貂蟬癘鬼跳浪民告癲以藥投井飲輒痊飛蝗被野禍夫田神氣一噓舞翩翩如蛾赴火積成山立使凶歲為有年海盜操矛口埀涎揚沙撲面懾以還退奔相蹂行蹁躚巨蝶為妖大如鳶家趨巷祭陳豆籩以掌擊之民害蠲邑民戴公綏以安歲時扶攜謁廟門清酤在觴几蒸豚鐘宣鼓考雜管絃公騎蒼麟手執鞭龍旗獸盾衛者千來如旋風止如烟顧民欲去不忍言民拜願公毋我捐俾禾如茨黍蛇蟠疾害不作福祐綿公名不朽同坤乾重建寶婺觀碑婺之寶婺觀祠婺女星始作於唐武德四年初在郡城西北吳越有國時刺史錢儼徙於子城上西南陬宋淳熙十三年以知州事洪邁請賜今額元九十年燬于火者再皆官作之國朝洪武五年秋觀復災主觀道士楊道可與其徒同姑者德生德清謀謂祠星所以休民興役而出於官是厲民也厲民弗祥乃持厯走境內告于衆庶各出貨泉相厥事而屬劉仲謀等十餘人司出納之任伐木於大山長谷乘流而致于城下僦匠傭工甓城增址作正殿五楹間其南為重閣三間殿與閣之中搆為飛亭亭之後先聨屋以合庭霤三門舊在閣南正直通塗今遷閣東三十步由門循廊西上抵𤣥武神祠又折而西始升於閣三門之右别庭𤣥壇廟餘若齊居賔館之屬各以次就緒而星之像猶未具先是杭州衛都指揮使徐君司馬嘗出鎮於婺屢徼靈于星祠其在杭也夢有所見遣使者問所須以像闕告因命斫沉水香為像名其閣曰靈華而奉像置其上道可復迎其教所嚴事者共祠焉工始於災之明年越六春秋至十二年冬始成蓋役夫糜錢以巨萬計而有司不知州民歡欣趨謁以為有所憑依不可無以示來者於是道可持幣走告于濓曰婺以星名州星之澤州民者甚大宋宣和三年方臘反睦將陷郡統領劉光世討之兵次蘭溪未敢進夢霞冠羽衣神趣之行且以病指告劉至盜黨就禽及謁星祠其像如夢中一指將墜開禧三年大水先期告守土吏為備民不漂溺景定四年武義山冦為亂來犯城屯於溪南遇媪鬻屨長數尺盜怪問之媪曰城中人屨皆若是耳盜驚散去元至元十三年郡既降復守元將髙興怒欲屠城夢神諭以勿殺明日以火矢射觀矢返墮軍中見巨人坐城上濯足城南水中大駭遂下令風民降不敢戮一人至正十六年沿海翼兵自蘭溪夜叛還謀襲郡城神化婦人導叛兵食瓜田間食已皆昏迷失道至城而天已曙官兵有備遂伏誅此皆彰灼可徵之大者而疾癘旱潦之禱為尤驗固未易悉數也今觀事幸復乎故皆神靈之所致願并記之濓曰婺女之於兹郡猶參之於晉陽辰之於商丘固宜祠而祭之然惟有國者得祭禮也民之祭者情也先王之教謹禮而不違民之情一乎禮則拘専乎情則濫在人折衷焉耳且田祖先嗇民以其有功一執匕猶思之祭之况昭回于天恃賴以為司命者乎說者乃謂自南斗十五度至婺女七度為星紀吳越之分皆屬焉何獨婺之人得専祠婺女乎是不然吳越之分固廣而斗牛女之所該亦廣茍以躔度細推之郡之墟正上直於婺爾星之降祥焉可誣也道可等劬躬焦思而盡力於神無非為民祈福濓如其請特載星之威靈不測者為詳所以起州民之瞻敬而俾繼承於無窮豈止述起廢之功乎道可字南峯郡人也沖默而契道嗣天師畀以崇真明逺宏道法師之號云繫之以詩曰帝居冥漻天中央宰制萬有仰隂陽經乾緯坤翕以張百靈環衛燦文章交參洞射下土方州分國列奠厥疆須女下流婺適當赤光熊熊吐寒芒名州建官自隋唐厯年百千氣愈亢神宫巍然逼𤣥蒼彤楹文户紫檀房髙閣飛甍穆煌煌神君之來天門黃電母雷師翼兩旁麒麟駕軿虹霓幢羽衣絳裘雲錦裳凍雨灑道塵不揚清氛襲人靈始降即之若無視洋洋山君海王修典常執玉來覲歲相望奉帝威令俾勿爽鯨鯢戮死魑魅藏耆耋有時告雨暘麾箕舒飈畢沛滂源多黍稷隰有粳地寧天清民樂康誰其尸之神降祥嗟爾黎庶德是蘉善錫鴻慶慝被殃神靈秉握帝紀綱帝有正命莫敢禳禳之以私帝所戕神理恍惚誰能詳史臣作詩匪昧荒金石可渝斯不亡溫忠靖王廟堂碑歲在閼逢涒灘斗杓直寅其日某家子東家道士儲祥㬢新作溫忠靖王廟成後十有一年太史氏濓為之記曰太虛之間一降一升而能槖籥於無窮者非氣母也邪氣母之所孕其出無根其入無門而其應也甚神人能察乎隂陽之變而不凝滯于物者其知鬼神之情狀矣乎王姓溫氏名瓊字永清溫之平陽人父民望嘗中明經甲科年耄無嗣與妻張道輝晝夜籲于上帝一夕張夢一神手擎火珠自天門而來謂曰吾乃大火之精將降胎為人張覺赤光被體中猶喜喜然因有妊以唐長安二年五月五日午時生其左腋有霆篆二十四右半之七歲習禹步為罡十四通五經百氏及老釋家言二十六舉進士不第乃拊几歎曰吾生不能致君澤民死當為泰山神以除天下惡厲耳復制三十六神符授人曰持此能主地上鬼神言已忽幻藥義象屹立而亡蜀葉天師後用其符禜除沴氣之為人菑者倣佛見王衣赭袍握寶劍乘追風駿下之劾召之家遂皆祠王以祈靈響焉王初封翊靈昭武將軍正佑侯其曰正福顯應威烈忠靖王則宋季之纍加也王之行事見於傳記者如此自薦紳先生言之可謂怪神之極殊不知氣母之所孕入竒出神靡所不有蜚龍感而異人生𤣥象應而神蹟著蓋不可一二計惟夫偏盩或足以病民故必降剛明方直者而祛斥之此亦天之恆道非所謂怪也古之聖神體天以訓民鑄鼎象物使民知神姦故入川澤山林鬼魅魍魎莫能逢之奈何氣漓俗微御隂陽通神明之術不傳方士之徒遂得竊其機權而用之世之昧者不知出於古聖神遺法咸歸諸道家往往鄙其譎誕不經嗚呼是果譎誕不經者邪非邪系之以詩曰南離有赫大火神下上六氣凌三辰靈龍桀軿輔以雲被髮下降瘴海濵帝出乎震物以伸約束百鬼主地門神往從之勢翩幡豹鞬絳衫紫䌳巾七斗直劍火暈輪嶽祇瀆鬼爭駿奔厲或憑人叱使泯弼贊𤣥化歸一鈞東嘉之山翠嶙峋作宫翼翼鸞鳯鶱牲牢充腯酒鬱煴挺然正氣扶乾坤山明澤媚日曣㬈獅子山徐將軍廟碑帝王受天命而興默運𤣥化施陽斂隂日月為之却行山嶽為之震疊川君水伯咸聽其命令而效職獻靈理勢則然也今皇帝之都金陵伐亂討逆遣將出師旌旄所向鉦鼓所戒巨城大邑無不降順時則有若徐將軍者亦著神功將軍烏程人晉時行賈江淮間道廬之巢湖溺死死而為神巢民奉之甚謹上初度江諸將多祀神舟中所向克捷或以事聞于上歲戊戌某月命南安侯俞某即龍江盧龍山為廟祀焉擇清修道士汪與權駱德輝徐善誠三人主其事及既登大位之六年為洪武癸丑九月大駕幸盧龍時與權已化去詔德輝葺廟室樹名木且敕改盧龍為獅子山德輝等承詔奉祀益恭甲寅某月復相與建祠奉其教所謂𤣥武神于廟左殿堂門廡略具咸以為斯廟與國同興將軍之功格知帝主耿耿不誣其本始固不宜無考而𤣥武之祠威靈日著亦宜牽聨書乃來請銘其銘曰帝興江淮賢豪景從叱咤而雷麾斥而風豈惟人同鬼神爭助水伯川君罔不來赴維巢有湖神之所都隂翊王師鼉鼓龍旟敵城額額大將攸克示以神兵暗褫其魄軍聲如霆目無全城一日十勝蘄冦率平帝詢將臣成功孔速疑有神助使之順伏將臣有言非惟戰功維巢有神實張兵戎帝曰異哉何以勸賞爵非所安俾其廟享龍江之陽山回岡翔作鎮于京以綏四方有廡有堂有筵有几神之戻止冷風如水都人來觀天子聖仁天子褒功及于鬼神都人來言神之威武洞于幾微以佐明主上天埀象龜蛇合形佑我下民功尤難名並洞實宜精神上通合慶同體以贊化工時清歲康烽燧不芒都人薦奠粢稷豆觴人神相依其德弗慆於千萬年彌久彌昭溫州橫山仁濟廟碑記禮者曰能禦大菑則祀之能捍大患則祀之先王之制非惟崇德報功以埀勸於方來亦所以達幽明之故而察鬼神之情狀蓋受氣之剛大者決不隨物澌盡其能警勸威靈以錫羡萬民乃其理之所有學者多疑於鬼神遽絶謂無之夫豈可哉有若橫山廟神之事其明效可覩已神諱凱字公武姓周氏世居臨海郡之橫陽生而雄偉身長八尺餘髮埀至地善擊劍能左右射博文而彊記家雖貧躬耕以養父母及司馬氏平吳與陸機兄弟入洛張華薦之神知晉室將亂獨辭不就時臨海屬邑曰永寧曰安固曰橫陽地皆瀕海海水沸騰蛇龍雜居之民罹其毒神還自洛乃白于邑長隨其地形鑿壅塞而疏之遂使三江東注于海水性既順其土作乂永康中三江逆流颶風挾怒潮為孽邑將陸沉民咸懼為魚神奮然曰吾將以身平之即援弓發矢大呼衝潮而入水忽裂開電光中見神乘白龍東去但聞海門有聲如雷而神莫知所在矣俄而水勢平江禍乃絶邑長思其功號其里曰平水且建祠尸祝之祠初在城之西郊及更永寧為永嘉郡郭璞相土遷之於西洋遐邇徼靈者無虛日神功益用赫著陳至德間閩冦章大寶侵分水嶺其氣勢張甚民爭遁逃神見天兵於雲間戈甲耀日盜驚而潰唐武德中輔公柘為亂其黨入冦民依華蓋山築城而拒守之時當嚴冬神降大雨雹冦弗敢近城因得不陷天寶中河決澶州怒暴不可制神見黃旗驚濤間河復故道光化末天台大饑神化形為商載米貸人已而投杖于江變成赤龍騎而升天宋景德初契丹同其母蕭氏南侵丞相冦準殿前指揮使髙瓊奉真宗親征車駕過河幸北城天際見力士數萬旌旗上髣佛有平水王字虜懼請盟而退大中祥符初詔營玉清昭應宫取材于溫之樂成使者以重山不可致走禱於神忽風霆凌厲龍湫震蕩巨石皆起立大木斯拔蔽江流而下神之靈異或見諸紀載或相傳父老之口如此者蓋不一而足今則粗舉其槩而已神初封于唐為平水顯應公尋升王爵賜衮冕赤舄宋纍加通天護國仁濟之號從祀郊壇兼賜仁濟以為廟額元復加威惠進封大和冲聖帝遂易廟為宫逮入國朝一以誠事神以為數加溢美之辭非所以敬恭明神詔禮官定議為橫山周公之神至於廟宇之建修皆郡守任其責可考見者自陳毛喜逮元左答納失里凡一十三人云昔者大禹當洪水橫流之時隨山刋木奠髙山大川民始得平土而居千載之下覩河洛者必思禹功而弗忘天衷民彞其不可泯也如此若神之為憫生民之昏墊奮身而興捍患禦菑蚩蚩之氓得遂桑土既蠶而不混為魚鱉者果誰之力歟夫禹之功在天下神之澤則被乎一州雖有小大之殊其惠利萬民之心則一而已廟而祝之誠合先王制禮之義孰謂非宜州人士永嘉教諭許士宏訓導張升恐無以示來者介鄉友秦王府紀善林君溫徴濓文勒諸樂石濓既為序其事復作歌一篇使邦人歌以祀神其佐神張鉉字子元郡人由右科進士仕至閣門宣贊舍人剛烈正直嘗上疏言事忤史嵩之被斥而歿既歿而顯靈太守吳泳因并祠之法當附書文中歌曰東甌之地大海濵止斥鹵噴蝕成荒堙止有時魚龍或怒嗔止蹴翻巨浪髙嶙峋止懷襄勢殷莽無垠止惟神我憫眉屢顰止帥衆疏鑿不憚勤止夜役隂兵直達晨止三江順流若拖紳止盡化魚鱉為衣巾止一旦颶風號秋旻止江流逆上波插雲止城廬沉溺在逡巡止神知事急如救焚止彎弓注矢肯顧身止眼不見水唯見民止衝濤直入勇絶倫止海水壁立左右分止赤電飛射光相燉止神乘白龍赴海門止虩虩似聽驚雷奔止水禍頓弭神具欣止有室堪居田可耘止民言曷以酬大勛止有廟肇祀西洋濆止漸周吳越洎七閩止神功彌盛海㝢聞止天兵建隊向空陳止旌旗上著鳥篆文止虜氣讋盡去解屯止况兹狗鼠視欲吞止河道遄復流沄沄止投杖化龍靈迹存止疏封直至帝王尊止冕旒衮衣佩㻞璘止神之正氣塞乾坤止下上日月摩星辰止𤣥化沕穆合神人止甌民戴神忱且恂止遐邇奔凑川之臻止如見靈旗降繽紛止牲牷肥腯酒苾芬止驅斥厲鬼黍稌蕃止太史造文勒堅珉止後千百載期無諼止淵穎先生碑浦陽江之上有大儒曰淵穎先生吳公以精深𤣥懿之學發沉雄竒絶之文闔隂闢陽出神入鬼縱橫變化其妙難名生雖弗克顯融以伸其志既沒而言立浩浩穰穰其書滿家信一代之偉人足以播芳猷於弗朽者也先生諱萊字立夫姓吳氏其先毗陵人一遷于番再遷于睦三遷婺浦江之新田唐乾寧初有諱公養者又遷縣西之吳溪實德政鄉尊仁里也髙祖諱聞贈中奉大夫福建道宣慰使護軍追封渤海郡公妣盛氏追封渤海郡夫人曽祖諱蕃纍贈資善大夫太常禮儀院使上護軍追封渤海郡公妣沈氏追封渤海郡夫人祖伯紹纍贈翰林學士承㫖榮祿大夫柱國追封渤國公妣金氏追封渤國夫人父諱直方集賢大學士榮祿大夫致仕妣盛氏初盛夫人懷娠始七月翰林公忽夢西域神人飛空而來直止夫人之寢心異之越翼日先生遂生因名曰來夫人頗知書年四歲授以孝經論語春秋榖梁傳隨口成誦七歲善屬文有奴僕命騷之言嵓南先生方公鳯見而竒之曰此邦家材也取南山有臺詩中語更今名族父幼敏家素多書先生時出與羣童敖私挾一編以歸盡夜讀竟又復往易或以聞于幼敏迫而觀之乃班固漢史也幼敏指谷永杜鄴傳謂曰爾竊觀吾書能記是當不爾責先生琅然誦之至終篇一字不遺幼敏以為偶熟此卷三易他編其誦皆如初乃盡出所藏書畀之讀嵓南益異之許以孫女妻焉且授易書詩三經義暨秦漢而下詩文章大家先生一覽即悉其指趣嵓南退謂人曰明睿如吳某雖汝南應世叔政不足多也自是以來先生博極羣書至於制度沿革隂陽律厯兵謀術數山經地志字學族譜之屬尤無所不通矣時朝廷將有事于四夷即自奮曰此小醜耳何必上勤王師使某持尺書諭之足矣因撰疏論其事㑹病不果上延祐間貢舉法行有司以先生名上豫章熊公朋來巴西鄧公文原及吾郡胡公長儒主去留士此三數公輩行老成學術淹貫自非博古該今明體適用咸懼不得在兹選而先生與焉於是東經齊魯梁楚之郊北抵燕每遇中原竒絶處輒瞪然長視平岡灌莽一望千里昔人歌舞戰爭之地一皆前迎後却畢在塵沙霜露中遂與當塗李翼餘姚方九思臨川傅斯正貰酒髙歌天寒風急毛髮上豎自謂綽有司馬子長遺風尋以論議不合於禮官退歸田里出游海東洲厯蛟門峽過小白華山登盤陀石著觀日賦以見志還寓同縣陳士貞家士貞之居與龍湫五泄鄰榛篁蒙羃似不類人世先生日嘯詠其中暢然自得或至暮忘返遊覽之暇不廢纂述重取春秋傳五十餘家各隨言而逆其意一以理折衷之譬猶法家奏讞傳逮爰書既得其情而曲直真僞無所隱至若繁露釋例纂例辨疑微㫖折衷權衡意林通㫖之類皆有論著復謂孟子乃亞聖之大才司馬遷不當使與鄒衍淳于髠慎到荀卿墨翟尸佼長盧同傳因刪去諸子益以萬章公孫丑之徒作孟子弟子列傳古今樂府不同郭茂倩不當但取標題無時世先後就其所次辨其時代使各成家名樂府類編古之賦學専尚音律必使宫商相宣徴羽迭變自宋玉而下唯司馬相如揚雄柳宗元能調協之因集四家所著名楚漢正聲其他著述若此者衆不能殫舉也四方學士慕其聲光多負笈從之游先生遇之恆若撫子姓羞服有不給者周之監察御史許君克學行部浙東以茂才薦署饒州路長薌書院山長未行而疾作裏風挾沴其血交襲顔面壅黑兩脛罷孱不可越户限重紀至元六年先生年四十四棲遲衽席愈不自振忽夢作童汪踦贊覺謂人曰汪踦殤者也豫自嬰疾以來何藥不嘗而勢革若此今歲殆不起邪夏四月九日竟卒于家遺命治喪不用浮屠法諸生胡邦翰鄭銘等來相治後事二子士諤士謐以至正九年十一月二十四日奉柩窆鄉之盉塢去家南五里而近及門之士以其經義𤣥深而文辭貞敏也私諡曰淵穎先生郡太守縣大夫復各祠之於學宫云先生自少有大志専思澤物不欲以文士名每慕張宣公為人推明義利雖一毫不茍取表裏一致與人遊歡然有恩愈久愈固身雖羸弱若不勝衣雙瞳碧色爛爛如岩下電見者改容鑑裁精絶人以古詩文試之先生察其辭氣即知其為某代某人所作當其賦詠捷如雨風一日於故人家見几上堆剡紙數十畨戲為長歌頃刻而盡屬對嚴巧文采縟麗觀者驚以為神謂非人所能及所著書有尚書標說六卷春秋世變圗二卷春秋傳授譜一卷古職方録八卷孟子弟子列傳二卷楚漢正聲二卷樂府類編若干卷唐律删要若干卷文稿六十卷别如詩傳科條春秋經說胡氏傳考誤未完夫自文氣日卑士無真識往往倚人之論以為低昻其惟古之作者則曰雄渾贍富唯有漢之文為然淳質雅奧亦唯有漢之文為然今之從事藝文者如之何可及也嗚呼豈其然哉茍以先生諸作置之司馬遷相如劉向王褒之間吾知其未必有愧也第以數與時違弗沾一命以至於死不大顯白于世所幸雄篇巨册彪炳烜著有如日星尚當藏諸名山以俟後世之知揚子雲者銘曰大火焞焞司于南辰重明宣昭神之伸也有赫厥靈郁紛輪囷敷為至文降于人也斧藻交橫黼黻斯皇變化凌厲動無方也雲流猋行品彚咸亨於燁其光寂無聲也胡積之腴不顯其施返于混茫朱鳥之區也騎箕之精上為列星發天之符合地真也石室之藏雄文吐芒鬼神呵衛禁不祥也泰華嶙峋長河奫沄永世有耀與之俱存也吳先生碑元國子博士吳先生既卒三十有七年其子今翰林待制沉告于太史宋濓曰先君學行海內靡不聞之然知而尤詳者莫如鄉人鄉人知者衆矣好道而諒直者宜莫如子圖其傳俾久弗忘非子之屬而誰屬濓於先生固弟子行幸執筆從士列咸餘教所暨且與沉友老矣寧敢卒辭先生吳氏諱師道字正𫝊婺之蘭溪人少勇於學不督而勤始為文辭輒驚駭長老未冠讀真文忠公書大悔初所為非是即以聖賢自師時許文懿公以朱子之學淑學者先生持所悟識造文質難許公甚禮敬之授以所受心領意繹日開歲化斂戢充擴刻削就規矩燁然有聞於時至治元年舉進士登科授髙郵縣丞階將仕郎漕渠決泛原陸漕不通先生集工隄之三年以外艱歸服除改寧國録事轉從仕郎天厯元年徴江淮兵過郡將弗檢下兵白晝揮刀㦸走市怖人敓資貨不與繫楊道上縱火焚廬舍橫甚自郡守以下皆畏噤不敢治視民戚若不知先生曰兵無狀賊天子民不治且不可制索馬從數卒行市捕得縛市門榜掠令衆衆譁操仗呼曰何録事乃敢爾吾曹死耳不忍為人辱必殺録事先生聞之獨出喻其衆曰録事儒者易殺敢殺者來録事不汝禦也衆􅌓眙不敢有言退相戒曰他人易凌慎勿犯吳録事明年飢先生平價勸分得粟萬餘石食城中民既而宣城民仰縣官食者三十三萬口亷訪使者以先生能吏檄攝縣賑飢悉召大姓第其家為九等出粟有差得三萬七千六百石飢者以不殣死又明年春未麥先生白亷訪使者請諸朝發官廪十萬計使者亦遣掾吏出貸旁縣復獲鈔數萬定選亷察吏賑民先生任三之二籍民為曹伍以次呼名受錢粟襁負充庭中若無一人然有既受而易服重至者先生目吏取其人於衆中詰之具伏左右相顧疑為神明居五載條教修完事治姦息亷訪使者薦於朝以疾引歸重紀至元之初遷文林郎池州建德縣尹新孔子廟堂廣學舍豪氓侵郡學田七百畞郡下先生問狀按圗繩豪民歸諸學建德非茶區民苦茶稅先生言不便報减稅民賴之中書左丞吕公思誠侍御史孔公思立薦先生經明行髙宜為人師召入為國子助教階承務郎踰年升博士進儒林郎先生聲著中朝者久士子聞先生至喜曰是婺吳先生邪相率持所疑揖問開以機鑰皆歎服去先生因推所聞陳說誨誘端簡嚴肅經義一本朱子排斥異論有詆朱子者惡絶弗與言初許文正公衡在成均時宗朱子以為教其法具在先生守不變學者信嚮如文正時禁林近臣復薦先生才任修史未報至正三年先生以內艱南還明年江浙行省中書當大比聘先生去取士疾作不能行上書請致其事八月十七日卒于家夀六十二既卒命書下以奉議大夫禮部郎中致仕五年九月十七日葬銅山鄉中徐之原先生之先居信安四世祖把徙蘭溪曽祖輝祖儒宗宋國子進士考􅙫世父辛無子以考命後之辛贈應奉翰林文字從仕郎妣龔氏贈宜人先生娶徐氏封如龔氏二男子長深先卒次沉也一女適徐虎臣孫男若干人先生於書無時不觀故無所不熟涵畜淵邃不可涯涘為文務自理出暢而不繁崇而不矯有蘭溪山房類稿二十卷易書詩皆有雜說通十卷戰國䇿校注十卷絳守居園池記校注一卷敬鄉録二十三卷自聖賢之學不傳篤信者失之拘而不適於用喜功者失之詭而不合乎義二千年間非無豪傑之士而功烈不少見於世者不以斯邪宋之君子後先繼出推明闡抉疏闢扶樹理無不章事無不備雖聖賢復生為後世計無以加矣然而卒未有繇其說而大有為於天下者豈非有志者鮮哉先生蚤有所聞尊而行之守道而不遺乎事致用而必本於道施其緒餘於郡邑已足以震耀當世使假之以髙位而獲大行被其潤澤者夫豈細哉卒止於斯謂之天也非耶雖然觀其所自立不既偉矣夫銘曰聖學之傳猶日麗天光華赫如照被八埏有足者行有目者覩致用成功咸以日故使日自明明不照物雖曰行天何取於日其或善燭而不能遐如膏與薪厥功幾何道積于躬用見乎世微之一毫大之無外在聖有作佐商造周天包地含嶽立川流區區霸功實悖於道卑曲偏岐膏薪之耀厯世二千濓洛擴之有支而南考亭拓之夷其榛荒亦有車馬有駕而行可盡天下彼惛不由狹徑是趨殫其智能陷於泥塗惟婺有傳考亭之適先生是承孔武且力涵而俾深植而俾成濯其光晶有燁其明始奮而仕不辭下位道無粗精崇卑一致繩豪鋤彊煦其弱羸父嚴母慈亦作之師廷臣咸言其道可斆帝曰汝來掌我邦教有肅威儀有秩詩書大帶𤣥端開陳聖謨使陟而升可澤四海世方仰之曷為不待不顯者身道則不亡遺書滿家百世彌章世觀其書將考於為勿謂易知斯道在斯黃文獻公祠堂碑星辰之昭乎上者天之文河嶽之列于下者地之文經緯乎兩間而丕昭至道者人之文人之文雖若有不同或得之者亦足以配二儀而常存後萬物而弗凋蓋以長庚之精峨眉之神皆降而為命世之人所以能軋摩日月扶植鴻化以震蕩乎一世故雖其魄已喪其神不亡乘一氣於太虛間鼓舞變化隨雨露風霆而著形焉尸而祝之實有不得不然者矣有若烏傷黃文獻公其殆庶幾乎公之方妊母夫人夢大星煜煜然墜于懷及其生也繡川之水為之一清是蓋星靈川祥所融凝而成者故公遂以文章鳴一時侍講經筵闡明聖學掌宣皇制黼黻太平昭回雲漢之章衣被乎草木人文化成之效於斯為盛是則公雖薨而其耿耿不沒者固將游神太清在帝左右而祠之不設非甚缺典歟濠梁胡侯惟信來為縣剛明正直不可干以私行之既久政通人和屢謁公之墓下凉颸動木悵然而有遐思即下令禁其樵採復輯公之遺文刻梓傳世侯猶謂未足以交神明乃請于上官築祠於繡川之濵堂庭穆如門廡清謐象設有嚴丹雘焜耀落成之日侯具牲酒盛服致祭公之孫子邦之羣彥咸從侯後精誠格孚契乎沖漠焄蒿悽愴如將見之祭畢而燕籩豆靜嘉肴核維旅鴻休誕昭秩秩雍雍四方之士來遊來瞻僉以為侯之為政知所風厲而公之靈爽永有攸棲矣或者則曰人死則其氣斯盡古者祭鄉先生于社不過崇德報功為人勸爾子曰其神不亡無乃涉於誕耶曰嗚呼是未知鬼神之情狀者也世之强夫志士用物精多尚能昭著靈響廟食百世况鍾天地靈長之氣而發為文章之英者乎其不隨世而磨滅者決矣至若庸人凡氓其德不顯其鬼不靈則當如此言爾初祠之成同門友王君褘既為紀其歲月公之子梓從子橒從弟楧謂侯是舉有關於名教之重而非私於一家又請濓詳文其事於石以昭侯之善與此祠相為終始濓按春秋書事之法辭有重復而不殺者因竊取斯義而為之記復繫之以詩曰大星煜煜流光晶川后斂滓若鏡澄發為五色文章英上騎日月薄太清呼吸雨露鞭風霆在帝左右持文衡交龍降升藻火明生色燦爛丹鳳翎萬物承被流華榮一氣闔闢不可名𤣥功斂迹歸杳冥其魂雖離神則形炯炯直與元化并有祠翼然妥幽靈陽烏髙鶱聳觚稜庭宇沕穆森巨楹歲時奠祭輸精誠牲牷肥腯酒潔馨倐陽忽隂誰使令有神來下風泠泠若乘𤣥麟紫霞軿降爾百福響然憑鄒魯禮樂當洊興春秋報事埀千齡門人前史官金華宋濓撰官巖院碑浦江縣東南三十五里有山穹然拔起於衆峯之間者曰康侯山又曰官巖山俗以其形蹲踞如獅子又稱之曰獅子岩從岩趾斜入六百餘步崖木回環最號幽邃有古招提在焉梁大同間比丘尼元净始建院岩北石洞前號曰安和後更名兜率至唐㑹昌之季燬于火其故基至今猶存咸通初祖燈大師自越之上虞飛錫而來遂縛禪岩內㑹歲旱獨上絶頂祈請隕身投崖下而卒俄頃大雨火化得五色舍利民感之就岩之西為建今院八年丁亥因山賜額為官岩云燈之事備載洪遵郡志中而比丘之經始則出於縣民蔣氏之所私紀年世遼逺莫考其詳所可考者宋大中祥符癸丑重建釋迦寶殿天福己未刻木為諸菩薩護法神王諸像景定庚申妙空大師智印嘗出主杭之旌德顯慶教寺以衣盂之資命其徒六人造經鐘二樓暨圎通堂方文三門兩廡之屬復聞于朝以奉仁烈皇后楊氏神御院益增重國朝延祐丙辰院僧宗勝建普賢大士閣明年丁巳宗尚悉易殿之楣楹新其四檐而加闢焉復搏土益舊木像礲石為牀座而妥置之使與殿稱至順壬申景輝作潮音堂于殿之北墉至正癸未畢光寶閣成越三年丙戌集僧之堂又成明年丁亥香積之室又成其費一出於衆僧唯閣之役頗殷賴邑大姓洪君榮助之而始就榮之二弟盛興復為創鷲峯潛碧兩亭自是院之規制一如大伽藍四方人士來觀來游但見穹樓傑閣飛動於蒼烟凉翠間恍若登耆闍崛山親逢如來法㑹之未散莫不歡欣贊咏得未曽有比丘普安曽不以是為既完且謂自祥符癸丑至今厯三百四十有三年其中更幾世幾人始克致有于是茍不圗文刻諸貞珉則後來者何以知其艱哉乃以烏傷朱君烈所述顚末走青蘿山中而求濓為之記濓所居距岩不十里而近一出户輒望見之當天朗氣清時嘗同二三子捫蘿攀葛而上俯瞰縣北岩坑仙華諸峯如萬馬東行或駐或躍而浦陽江之水蜿蜿蜒蜒又如白龍南飛一瀉數十里繞岩腹而去周圎原野星羅棊布諸池沼厠其中直小甌耳方呼酒放歌天風自東北起四山鱗甲一時皆動同游或戰掉不能留誠天地間勝絶之地也宜為有道浮屠之所都而興仆補壞代不乏人也濓因弗辭而為之記系之以詩曰獅子之岩不瞰巨江涵靈茹和吐隂納陽其一不有大雄曷擅竒絶平地湧成琉璃宫闕其二誰操化機寂我鼓鐘若龍若象遁棲無蹤其三有大導師飛錫而至以清净身化為甘雨其四我民咸言盍報有年一彈指頃樓閣現前其五厯年四百何以弗墜世有長材愈作愈麗其六陽烏四鶱觚稜髙翔金浮翠流輝輝煌煌其七觀者如登妙莊巖域見種種光暨種種色其八惟世間相起滅弗停中不滅者永劫猶存其九矧是有為俱繫虛妄當悟以心毋取于相其十若事若理本無二門茍涉分别即非一真其十一我述我文鐫諸堅石後千萬年與山無極其十二神仙宅碑處士之州並城三里所有山曰少微山之下有觀曰紫虛觀之南一峯巉然挺出曰眉巖西南諸山拱挹周衛而二水蜿蜒起伏來匯其下登髙望之萬象呈露儼若天開圗畫不知者以為真蓬壺員嶠之絶景也宋南渡後仙翁章思亷自遂昌紫極夀光宫來隱觀中蓬首垢面日初升輒東向吐納凝然澄坐久之絶粒唯日飲水一盂形神分合人莫測其變幻乾道丙戌冬沐浴坐蛻肌膚柔潤如生弟子瘞諸眉岩下後有見於濤江之濵手攜一舄飄飄然遡風而行衆異其事啓棺視之唯隻履存焉先是主觀事者嘗作亭墓前壞於風雨道士王有大日徘徊其間悵然有上清笙鶴之思歸與其師梁惟適謀自墓左開曲徑一千餘尺直至巖顛誅榛翦荆造祠宇七楹間名之曰神仙宅中祠處士星及仙翁諸像東室曰藝香藏書其中西室曰橘樂為娛賔奕棋之所宅之前二石岩拔起其蟠若龍其踞若虎各搆亭其上左曰來鶴右曰留舄而山之景愈勝矣經始於至正丙午春三月某甲子落成於其年夏六月甲寅贊其功者楊一寧王性存也惟適復捐腴田若干畞歲收其入度子弟世守之介同郡吳府録事吳從善徴豫為之記豫聞括之名山上直少微天文家所謂處士之星也靈輝下燭凝粹敷和修鍊者居之去滓穢而來清虛雖曰內功之加要亦山川淑靈所助為多也今以紫虛言之遍游海內名山招白鶴而翩然化去豈無盧仲璠者乎道遇至人授以游戲翰墨之法卒吹鐵笛與之同往豈無徐虛寂者乎不止仙翁一人而已且琳宫祕館無處無之何少微所照而超然霞舉之士至三人焉當有不言而喻者矣仙翁靈迹固不可不表見于世自非惟適父子篤志𤣥學孰肯一顧於寒煙衰草之墟哉化荒曠而為居處功亦大矣修真之士當世繼之俾勿壞可也嗚呼塵坌膠葛豫不知秋髮之被肩安得攀仙翁之逸駕共吸沆瀣於寥陽之上耶惟適麗水人宋户部尚書汝嘉諸孫有大青田人亦簪纓家能文辭及𨽻書皆髙士云系之以詩曰少微之星煜煜埀芒降魄名山充鬱沛􅗈結為靈和其中含黃覔之無形發休吐祥孰其尸之有道之士來涵清寧度世不死皎出東方其大如篩我啄其精以洗吾髓錬虛凝真惚恍若神冠劍既藏神游江濵豈伊幻化身外有身出入河嶽下上星辰靈蹤猶存木老亭仆芳草離離誰復來顧有巋者士父子同慕皓鶴不來馳情雲輅乃陟崇椒乃建瓊宫羽蓋飈輪庶或一逢靈風泠然白月正中溟涬無際遐思何窮况乎遙矚境與心㑹羣峯攢藍二水縈帶萬象燦然如列珠貝一嘯歌間敻超物外巖巖者山匪仙不名不有𤣥搆曷棲其靈水火有鼎龍虎有經疇非采真浮游黃庭神君捧劍鬼伯持㦸呵衛弗祥固此仙宅法古為碑麟回鳯翼太史勒辭式昭罔極風門洞碑神者變化不測之謂也凡不測之所必有神司之天之髙且明不可測也地之廣且厚不可測也故天有帝地有祗嶽鎮海瀆其崇深幽險曖昧惚恍不可測也故皆有神為之主名山經所載五千三百七十山其神有龍身而馬首者有牛身而足四二首而馬尾者有身如蛇鳥而豹尾虎齒者雖譎誕難徴然不可測之所其神亦變怪無常要不可以常理論也金華縣東南五十里有山曰風門山有石洞洞之户可入二人其內晦如漆人怖不敢往以石投之有聲礲礲然莫測其所底止風蓬然從中出襲人毛髮盡豎鄉民異之意其必有神歲時禱祠之多應因號之曰風門洞神久而神與人益習因降于巫言生四子皆為神民信之遂即洞西一里所西溪之原為祠以像神及所謂四子者其來蓋已久元至正丙午夏旱民皆走祠下爭舁其像以歸像至之鄉雨隨以至否則咫尺不相及民益大驚不敢慢而琴山里浦二處之民事神尤謹惟恐失其意初里浦民嘗有神次子像靈甚至是歲琴山民迎禱之得雨而里浦不雨里浦人曰我神也奈何澤琴山而遺我乎遂欲舁去琴山民亦曰我神也神澤我我未有以報請緩之相持者頗久不能止則與之盟曰天雨則以神歸我已而里浦果雨歲以大穰乃還神於琴山於是琴山之民思報神惠復刻木為次子别像而請邑士王間碑神之休烈植之祠下明年琴山有秋而西溪螟為災西溪民疑新像與碑不利也怒沉像於水而碎其碑沉像之歲西溪民大疫死者十七八神降言將盡殛西溪民民惶懼殺牲叩首請為像以贖辜治具將樹碑而文已毁琴山士愈慶乃來言其故請文刻之噫斯事亦異於常理矣然非果異也木石之怪久而不散且能為災警讋人况大山穹谷之靈乎其能出雲雨為休神不可測度固其常也民祗奉之至於為祠設像亦事之必致耳夫豈不可哉或與之抗則過矣凖禮山川能澤物者則在所祭如神者澤兹邑之民而享其奉非濫也宜也為之民者烏不敬乎系之以詩曰風門之山蔚穹窿羣峯左右翼且宗勢若萬驥環一龍帝恐地軸膠不通為鑿巨竅貫其胸復驅后祗叱豐隆手鼓大塊噓雄風至今山竅如截筒有風泠然出其中下深不測上無窮幽怪宜為神所宫惟神受命于祝融身騎赤虬搖緑總四子夾馳乘四熊川君水伯扈以從或珥青蛇持兩鏦或撼鼉鼓或震鏞欻隂倐陽互冥䝉喜則吐雲怒流虹山民駭瞻增敬崇殺牲奠酒陳微衷願施霈澤回秋豐伐山築祠溪水東彩楹畫棟扉則彤縣民歲時來㑹同攜孩扶耋如聚蜂蒲伏祼獻罔不恭有不恭者殃厥躬神為帝臣秉大公願恢至仁綏九農聖經國典祠有功功髙施博名必鴻鐫辭廟門𤣥碑穹著祥昭異警羣聾千秋萬祀為神雄惠州何氏先祠碑英傑之士立大功而享爵位者非其先之基仁纍善何能自致哉然其先有德而子孫不知報祀者有矣知報祀其祖而棄蔑其祖之子孫者有矣是皆不達禮義之弊也若山東行中書省參政何公其篤於禮義者乎公名真字邦佐世居廣之東莞至公始遷惠州祖諱發藻元贈中奉大夫廣東道宣慰使都元帥護軍追封盧江郡公父諱叔賢贈資善大夫江浙等處行中書省左丞上護軍追封盧江郡公祖妣鄒氏母葉氏皆封盧江郡夫人公祖暨父世有潛德鄉稱善士公生八年而喪父母夫人守志不奪慈鞠嚴教少偉然有志當元至正中中原兵起廣民王成亦搆亂公為小官即請而討之已而解惠州之圍逐叛將黃常復思州㑹賊陷廣州公以兵復之由衛州府判五遷為江西等處行中書省左丞階資善大夫分省治廣公弟迪以從征功擢中奉大夫廣東道宣慰使都元帥兼僉樞密院事遂推恩封其二代後合福建江西為一省改拜公資德大夫江西福建行中書省左丞仍治廣州歲乙巳九月賊挾亷訪司副使廣寧等叛圍廣公禦之踰十月部將與賊通絶糧道公出避城陷丁未五月復克之明年制授公榮祿大夫自左丞升右丞未拜而皇明兵平江西詔至諭公公舉廣東之籍以降上嘉公保民順命之績授中奉大夫江西等處行中書省參知政事洪武庚戌移山東行省越七年以老致其政初公追思顯榮之盛由於先世既於東莞率族人建祠置田以祀羣祖復與弟迪謀悉以其先所遺田儲租入以祭其禰公猶未慊於心乃以惠州城西之私第為義祠并所有私田百餘頃為義田世俾宗子主祀事恐族人不知學也有孰以教之恐其羞服或乏也有粟帛歲賑之嫁娶喪葬有以助之疾病疲癃有以養之懼其久而失其意也為書以訓之俾嗣弗壞而來請銘嗚呼先王所以親民善俗之道逺矣賢人志士欲推之於世而勢有所不能欲退而惠一族化一鄉而力有所不逮者有之至於勢足以為而不為力可以至而不至者亦有之此所越數十世而其事曽不一二見也惟公奮自韋布夷盜保民鎮寧南服致位尊顯卒能識幾效順戢斂干戈為民請命使粵南之民不易市肆推本反始孝于祖宗惠及族人所踐所言允可為法其於富貴可謂不茍處矣視彼恃險而賊民私厥身而忘其所自者其賢豈不多哉是宜紀行載勳著之樂石以為後嗣式其銘曰維昔至正德否亂生海沸山崩靡人不兵額額粵南在嶺之外猖豎嘯呼民罹其害何公曰嗟我民何辜告于大藩請行天誅乃戈乃殳乃糗乃糧大斾修斨人莫敢當叛將肆凶賊我守邦鞭門疾呼鼠拱以降曷以褒功躋于左轄巨鉞良弓左旄右節豈惟其身錫爾祖考峻爵崇勳以顯忠孝祖考榮矣子弟孔多寶帶銀章威儀甚都邦人聚觀拜伏稽首按轡徐驅詢其耆老耆老有言大哉公勳元衰不君公其我臣公曰吁哉我志已定待彼有德為汝請命赫赫大明洸洸仁聲震于南溟勢無全城公束干戈載封版籍錦韜龍函獻于京國帝嘉厥功不勞我師錫燕彤庭重瞳屢回大江之西岱宗之東祿食十年執政廟堂寅畏恭勤髯鬢盡白詔優老臣勿勞以職公歎謂人我德何為祖考之惠幸以弗隳豐湖之西有第奕奕𤣥楹文牖既蠲且侐亦有土田被隰包原重穋荐年歲登百千我第以祠我田以祀祖考之休敢恤吾嗣池有穹魚圃有嘉蔬以醢以葅丹荔清酤刲豕擊羊來蒸來嘗孫子咸臻有雍鴈行或授以罍或奠以斚登降肅然莫敢叱咤數具禮全陳几布筵孰為弟昆孰為子孫公曰族人亦孔之夥揆本追原咸由於祖祖病在指四體靡寧奈何一身曽莫胥矜爾餒爾寒我有粟帛爾昧弗通我學爾迪爾有災害我則戚之或有燕私則慶樂之我有爵祿我祖之故不私吾身𢎞祖之祜豈無鄙夫爵祿是荷惟家之肥遑恤其他維公克仁仁以保民惟公克孝尊祖睦親嗟爾後人惟公是師繼承無忘公有訓辭臨濠費氏先塋碑皇帝登天位之三年覩四方之既平嘉諸將之勳烈乃十一月丙申大封功臣為公侯錫以鐵劵俾傳諸子孫於是臨濠費侯自僉大都督府事進開國輔運推誠宣力武臣榮祿大夫柱國平源侯既而復謂賢豪之生基德纍仁必繇于其先乃推榮其三世侯之曽大父五一府君贈驃騎將軍都指揮使護軍追封靈璧縣子大父六三府君贈鎮國將軍僉大都督府事護國追封江夏伯顯考七五府君贈榮祿大夫同知大都督府事柱國追封平源侯曽祖妣季氏祖妣及妣兩何氏皆從其夫爵邑為夫人命書既下侯用牲醴詣五河告祭于先塋榮光赫然照燭泉壤山雲宰木飛揚燁奕皆有異氣自是歲時奉祀惟恭侯間謂余曰吾世齒恆氓至于吾躬遭時遇主奮自戎行奉命克敵或専或禆凡十八年始于江淮中於閩浙至於定中原舉關陜皆與諸將之列取城邑以數十計其艱且勤亦至矣藉聖主之德念録微勞爵為列侯名載册書人臣之榮無所與比顧豈吾材之能致哉實我祖考遺休餘澤之所及也惟我祖考皆有厚德為鄉邦所稱宏址深源誕啓厥後恩數之加允稱不虛兹欲歌頌先德敷揚聖恩樹石墓道俾後嗣知所自出非子孰宜余嘗待罪國史撰次功臣勞烈知侯為人仁勇有智略事上御下以忠以誠今又弗忘其先以顯著遺德為事可謂知所先後善為臣子者矣侯名聚字士英其詩曰帝乘六龍起江淮東濠泗之間為漢沛豐維時費侯貙吼虎雄壯馬長矛為帝股肱既定泗濵遂剗靈璧維滁及和一舉而踣孰謂大江可限南北萬馬飛渡不以羽翼巍巍建業扼江而城既入其郛帝庸作京廣德既綏遂平長興軍聲轟轟四方震驚蠢彼僞吳假息于蘇愚弗量能自干天誅將命以行以翦以刳獲其大醜歸置質鈇帝德如日愈久而晰孰倚氷雪以詫弗拔何閩何浙何勍何劣如朽之折如藩之撤閩浙既清載征中原巨壘連營望風而奔或奔或降追則其根中原卒平萬方來臻帝嘉治平曰誰之功鐵劵丹書錫爵命邦矯矯費侯平凉是封豈惟其身榮逮祖宗侯有峻爵上推於父維祖甚仁伯于江夏江夏之先靈璧是子旁及其嬪咸有爵土費侯曰咨小子無良祖考之休積厚而昌既有土田又蕃牛羊維曰薦奠以致孝享大登如几牲碩酒㫖費侯蒞祀陳豆奠斚擊鼓駭駭焚幣煒煒費侯克孝祖考咸喜濠民謂侯勇不失身委質聖君為社稷臣濠民謂侯貴不遺親玉佩貂冠為賢孝孫四海既同爵勳既崇曷以承之維孝與忠忠以于朝孝以于家繼德無愆茀祿是荷天台顧氏先德碑顧氏之系出江左其後遷金華尋復由金華徙天台相傳以為顧歡之後歡梁之隱君子也故其地有顧儒嶺有歡溪然世逺宗堙莫能知其詳矣至宋南渡後有諱知言者字孚先通黃帝內經之學人有疾注藥起之無靳色㑹疫癘大興孚先裹良劑日巡户而與之鄉人感其賜有搏土肖像以為夀者以子貴纍贈宣教郎生商卿周卿商卿字方子用薦者為鄉郡學官遂以明經講授從之者皆為純篤君子出言制行能使人慕豔不置閥閲家綦氏伯仲爭以門資叙爵幾至破家方子片言喻之輒頓首謝過以官讓其兄周卿字成子擢嘉定癸未進士第官至朝奉郎奉國軍僉判初娶貴族施氏資裝甚豐成子夜讀書隱几而臥施戲泚筆塗其面及覺大怒曰合卺未旬日乃敢爾邪所謂相敬如賔者何在坐以待旦斥出之再配楊氏無子抱方子之子育之乳因有湩方子孫玉文字溫夫咸淳甲戌武舉第一人授秉節郎殿前司同正將德祐丙子元兵入台執其父申欲殺之溫夫抱父頸而號曰寧殺我寧殺我無害吾父溫夫被創而免因以跛廢初溫夫議娶應氏已納采忽折其脛衆勸之改圗溫夫不聼曰言猶在耳焉敢背之彼體雖虧而行未嘗虧何傷乎應後得婦道甚為一家之師從兄􅌫翁死以孤子託之溫夫授經納配不翅已出者溫夫子鎔字可範年十三試藝鄉校頃刻而就人目為神童丞相吳公堅以孫女妻之大母葉氏與其母春秋皆髙可範先意承顔唯恐有不及兄鎬早世諸孤呱呱然無依羞服昏姻皆可範主之然自宣教府君以下族屬頗衆正月之吉與日長至大合其族行聚拜之禮親之近者浹旬則一㑹飲酒哦詩情文藹如也有不至者罰及之凡遇疾疢死喪輒遑遑往視蹙額弗舒旦暮必謁先祠大寒暑不易人取以為法焉家畜二猫皆孕一既産出為人所縶未産者往乳之及其歸也同一窟而哺子人以為和氣之應鄉井服可範之化茍有赴訴不之公府而惟其言是聼皆恱服而去里有陽歸堰溉田萬畝當農功將興可範必繕築以利民糧書之修閭師並緣為姦利可範履畝而核其實鄉鄰德之可範性端恪子姓有不善面折不恕然其律身尤嚴日抵暮輒懸燈書其言行于籍不可書則不為年九十二忽無疾而卒惟天台素為文獻之邦如南塘陳茂卿謙齊吳清之直軒吳直翁慥堂鄭景溫是四君子者皆與聞濓洛關閩之學故其鄉邦之間金舂而玉應宫奏而商宣所以咸有士君子之操如顧氏一門是已然其嘉言善行多可書已見墓文固可傳諸不朽其或聞之父老之口者厯年滋多恐日就泯泯族孫石樓縣令碩乃件繫之請豫為之記嗚呼世之求文者奚翅數百罔不欲譽已之善而於其先德則未嘗少留意焉碩乃能一反其所為得非知識度越於人哉因不欲辭而書以遺之使碩之後人庶幾有所徴焉奉議大夫國子司業金華宋濓撰龍泉章氏世系碑文章氏本出姜姓世居于汴至宋兵部尚書巖永嘉初來守泉州始家于南安唐康州刺史及又自南安遷建之浦城及生福州軍事判官修修生仔鈞深沉有大度年踰四十尚晦跡弗仕當唐之季藩鎮爭强各欲致賢才以自輔有遣使來召者力辭不起乾寧四年福建觀察使王潮卒其弟審知代立即奉表修貢效臣子之職朝廷嘉之以福州為威武軍拜審知節度使纍遷同中書門下平章事封琅琊王仔鈞以審知尚知有唐乃往謁之投以戰攻守三䇿審知大喜執仔鈞手曰何相見之晚邪遂表聞于朝辟授仔鈞髙州刺史檢校太傅西北面行營招討制置使選步騎卒五千命屯戍浦城西巖山南唐盧將軍假道過山下忽鼓譟來攻壘仔鈞堅守弗與戰遣二校邊鎬王建封求援兵建安仔鈞既退盧兵二校失期尚不至當處以軍法其妻越國夫人練氏諌曰世道方艱若二校者安知其不建功以靖亂邪仔鈞曰如廢法何練氏曰法固不當廢不若縱之使自逸耳仔鈞仁其言而許之練氏使諸子喻二校曰宜急去毋受戮于市復以金條脫遣其行二校望拜感泣仰天誓曰夫人之恩茍不報有如日遂去南唐晉天福末審知子大閩皇曦與弟富沙王延政治兵相攻互有勝負延政遂稱帝于建州國號殷閩中大亂南唐闖其隟遣樞密院使查文徽及待詔臧循發兵取之時二校已貴顯為行營招討封為先鋒橋道使共攻建州城陷議屠之時仔鈞已死練氏之子有官建安幕府者練氏因家城中二校入城銜練氏舊恩獨以兵衛其門練氏曰汝今見報獨活我家耳豈足為義邪闔城之人不下十萬未必皆有罪汝能全之乃為報吾恩不然妾不能獨生也二校聼之一城生聚悉賴以完仔鈞生一十八子皆登顯仕其第三子銀青光祿大夫檢校司徒仁燧仕于南唐賜名曰獻誠慷慨有大節不屑細故思繼先緒若執玉奉盈唯恐墜仁燧生祕書省校書郎文錫當宋之初屯練民軍捍禦鄉郡盜不敢侵境時四方未寧名門右族各風雨散去不相繫屬文錫一門二千餘指獨能聚居人稱為東南第一文錫生都官郎中重性髙簡超然不羣時伯仲列仕中外以百十數朱紫烜赫重獨棄官歸隱一旦獵于龍泉西寧鄉見山川明秀樂之復遷居焉重生告介潔不欲仕如其父告生順奉親極其孝諸弟從官各一方順獨戀戀居膝下蹞步弗離親沒葬祭能中節順生公探與從弟知潁州衡尤厚善衡每招公探仕不應衡或强之輒曰使一家之道盡即為政爾何必御朝署閲詞諜乃名為政乎遇二弟友甚聲孚氣洽如奏塤篪晚立祠以奉仔鈞神主帥宗人歲時薦饗士論多之公探生世安其友恭如其父建標慶庵于公探冡側中設仔釣位而以公探配之世安生舉當文明極盛之世鼓琴誦詩優游自樂人或讓其獨善舉曰羣賢在朝海晏而河清矣奚必舉之出哉或仕或止各安夫天分爾舉生宗氣貌容偉能以寬柔之德被於人人宗生鄉貢進士輔履仁蹈義作事可為師法輔生聞義聞義生用之父子益雄於資聞義所搆室廬亭館甲于一州時具壺觴集大夫士其中共談古今治亂用之尤善述事動靜循矩彠不愆于度用之生强宗學該而文贍好購書籍凡四庫之目多搜采貯藏子孫得以資其學業强宗生煥文愛施與寒沍之時憂閭伍艱食升樓遐望有晨烟不起者常召與粟與物交無忤意從弟某負氣每媒怨於人煥文晝寢其池亭怨家意從弟也持斧入欲斫之忽池魚躍水濺煥文面急驚起怨家流涕謝曰幾誤害善人從弟之難因藉之以解踰數年煥文復遷錦州依婦翁以居煥文生斯立通象緯堪輿家書及素問靈樞之學日以利濟為務醇熙和比絶無怨惡於人其言呐然若不出諸口而德容充浹見者歡然親之斯立生格局度凝廓一以儒術自娛自入國朝益斥屏聲利髙蹈物表白髮蒼顔衣冠偉如亦多注善藥以濟疾病疕傷者誓不求償父老踰八十不良于行雖傔媵之多格朝夕扶持左右未嘗逺去父既歿奉其愛姬如母近屬有利格多金者數至豪奪格咸弗與競居亡何又倚官中勢鉗劫之格曰君何必爾欲金當持去又弗與較乃大慚服不敢復有所侵格生遇孫燕居危坐肩背不傾側雖不務榮進與人解患之志耿耿自信有赴訴者懇惻為陳利害理即曲頓首免冠請自新旱潦疾疫必身禱禱輒應鄉人士服其言行稱之曰長者其嗜文學孝弟事如嗜厚味弗之厭每舉以厲人遇孫生圭璋溢圭璋皆有隱行溢多雄才下傖囊之時集兵以退羣冦縣賴以安尤尚伊洛之學病閭井子弟不知所教建龍淵義孰聘碩師陳其說以開來裔葺標慶庵捐田入之定為祭規一十五則以示宗族家雖異爨久忽慨然曰兄弟手足爾其何分乎遂合食焉立義約若干條教子孫守之弗易其制行粹凝臨事剛毅有不讓古之賢者嗚呼何章氏之多賢子孫哉濓竊觀之世家巨室能使遺裔蟬聨而弗之絶者皆其先德之所敷遺譬如良疇之種至秋而必穫嘉禾之植逢春而必榮其理實可徴不誣也昔者王翁孺為繡衣御史能活萬人論者識其後昆之當興鄧仲華自謂將百萬之衆未嘗妄殺一人君子知其來葉之必大况乎練氏能全一城之命較兹二者實過之矣宜乎子孫代有名人其出而列仕則秉鈞輔位法從綰郡縣之章項背相望功惠既已有加于民其處而沉晦則被服仁義篤志書詩雅雅彬彬譽望隆蔚又能不殞厥世矧今迓續芳猷踵承遺烈者吾未見其止也君子之澤古之所謂汪洋而衍裕者寧有既邪濓久與溢交而其子存厚又從濓學治經於是知其系緒為詳序而勒之石以為世之勸讀兹文者尚當有所興起也哉系之以詩曰天道維仁法之者昌隂施陽報厥理用章理將孰樞命之攸定有如灰籥氣至而應卓哉章氏曰太傅公建節駐兵以靖鄉邦其配練氏生而肉髮沉幾先知物不踰越二校失期在法當刑練氏止哉聽其間行校仕南唐帥師攻建城陷將屠銜德罔變十萬之氓已登鬼庭片言之加易死為生孫子繩繩多躋膴仕水湧山出未見其止或膺郡寄或坐廟朝照耀後先聨組疊貂沉潛自晦亦振厥德俎豆詩書是攻是食遺澤迄今世象其賢有光赫然如虹貫天龍泉之宗光康且懿益衍以承允亢其世人亦有言養自蘖牙蔚如車輪大揭其華彼不暢者非沮而遏荒如薉如其本斯撥豈無簪纓或淪皂臺視彼德門其髙崔嵬天亦何為盛衰頓異居髙聽卑心焉是視稽諸古訓善積慶餘何以引之勿忘其初太史造文勒于貞石尚告嗣人服膺無斁上虞縣重修柯韓二閘碑上虞有湖名夏蓋延袤一百餘里縣東北衆水經上妃白馬二陂匯于湖釃為三十六渠支分絡聨以達于田凡溉一十三萬畝有畸渠之下流建二石閘視時溢乾而留泄之歲恆無凶者近代農官失政畚土成塍取給一朝不旋踵而圮傍縣亡賴男子當旱暵時又夜半決防以去然湖並于海鹵水或乘潮入善禍稼舊嘗造隄捍其衝潮汐齧蝕至是亦暴潰民憧憧告病矣乃洪武四年冬臨淮唐侯鐸自殿中侍御史出守㑹稽上虞㑹稽屬縣人士羣走白侯侯愀然弗寧行海上視決堤與民共約度田以㑹粟因口以賦庸鑿石為隄自蓮花池至纂風合萬有三千尺始與故石隄屬侯斬牲饗海神已登民謂曰隄幸成二閘無難者㑹侯召入為卿奉常遂命僚屬集事其柯家閘廣二十有四尺深如廣之數而贏其一先築土樹橛櫛比星攢度久且不壞方敷以石兩翼四隅咸斂甃如法中峙石楹左右皆有副鍥坎陷版以為縱閉復隨土形崇卑疏級為五以瀉水上駕石梁以便行者橛以章計者九百八十有五灰以斛量者三百六十又四石以丈數者七百三十有八匠以日考者一千三百其韓家閘廣减前閘之半深比廣倍之石楹唯二級道則减其一仍冠以石梁餘皆同其工物視前匠損四百石損五百灰損六十八橛損二百八十一始事洪武甲寅秋七月訖工於冬十有二月此其大凡也有道浮屠雷峯净昱乃具事狀介太史氏朱君右徴濓文記其成豫聞成周之時稻人掌稼平地以瀦畜水以防止水以溝蕩水以遂均水以列舍水以澮瀉水其為法甚備其為利至久也然而溝澮之屬所可考者其深廣自四尺至八尺或至於尋仭各二先王豈不知害地而廢稼以為不若是則水性失其常溢則有溺患乾則禾將菑矣古制不可復見有能設瀦防以惠民者得不謂之賢哉昔者曽文定公之為齊州州城西北有湖疏為水門遇流潦暴集則取荆葦為蔽納土於門以防外水之入公為易之以石其深八十尺廣三十尺視水髙下而閉縱之而禁障宣通皆得其節人無後虞今唐侯之為閘也其事與之頗相類世言古今人不能相及果足信之與是可書已相其成者通判府事吳敬知縣張翼營度督視不憚勞勩者主簿史文郁也司其出內則邑大姓徐某余某法宜牽聨得書海堤别自有記兹可略云系之以詩曰維夏蓋湖百川所瀦在彼海邦其一釃為通渠行水委蛇溉稻與粳其二制水有閘因時闢闔其法孔臧其三農政斯缺惡壤為竭水失厥防其四侃侃唐侯爰咨爰諏中心盡傷其五曰是弗修民焉有秋敢視為常其六乃登乃屬乃謀乃告乃輯其長其七畝㑹其粟工來以族筮日奏功其八琢石于山樹橛于灣以楗以梁其九決塞有關既堅且完若首有骯其十昔何怒突今乃順則弗隳我疆其十一行彼赤日清流潏潏黃茂芃芃其十二食為民天非稼無年民用卒爽其十三伊誰我憐五馬翩翩朱衣葱珩其十四成周之制有溝有遂維畫維良其十五古法寖廢河渠興利其效則章其十六漢吏曰循惠孚蒸民唯此之蘉其十七矧乎巨津北枕海濵澤被五鄉其十八侯治之棘行龎心惻不翅父兄其十九越石可泐越川可竭侯功勿忘其二十義烏重濬繡川湖碑義烏有繡川湖在縣西一百五十步廣袤九里三十步舊設東西中三管稽其户田之數以均水利其所溉凡八百九十五畝後加疏瀹之功其利愈博以畝計者至於一千五百而贏東南各有斗門釃以二渠東渠循堤折行㑹於南又折而東疏為三以達于田然而衆流行潢汙間挾之入湖其勢易致填閼在宋紹興甲子知縣董爟請湖為放生池嘗一濬之淳熙戊戌縣丞吳沃以春夏暴漲而淫管不能宣泄始更為閘視贏縮而司啓閉仍架石橋其上人因以吳公名之開禧丙寅縣丞胡衍景定甲子知縣林桂發復皆重濬之自後無繼之者一遇亢陽為沴水輒涸田遂不稔曲阜孔侯來為縣之三年政通人和百廢具興乃躬履湖濵愀然而嘆曰無湖是無田也兹非縣令之責乎歸與僚佐謀集八鄉二十八里之民量地定繇分鄉授事各植小幟以别其界域使之不相淆亂嚴示期約責其成功於是畚鍤齊舉有不戒而趨之意侯恐其過於勞也趣承水利之家具酒漿葅醢以食之勸相既頻功緒日就湖之北故為官道水齧蝕且盡因築而廣之湖南沿隄亦有曲徑以通人行居民侵塞且及湖百尺皆斥而復之雜藝花栁映帶左右復聚土為山於花島之後經始於今洪武戊午正月十五日至三月十八日湖之濬已及三之二以東作方興遂輟其功其深約五尺有竒役工三萬二千有竒自興是役晝恆晴夜或雨雪逮夫遂事淫霖夕不止君子謂侯愛民之所感是歲婺七縣大旱並湖之田獨獲有秋縣人士懷侯不能忘援昔人名橋故事既名土山為孔公墩以識侯功復來謁豫文為記欲示後之為令者俾嗣濬之余觀載籍之中有民社者能修陂渠之政則屢書之而不厭其詳此無他以民食之所繫故特用是以為勸也昔者史起之為鄴令大興水利以利民至有舄鹵生稻梁之謡逮今五尺之童亦有能知其賢者世之為令者茍能如起之愛民其修名有不埀於無窮者乎繡川湖縣之巨浸一方之所倚賴自景定甲子以迄乎兹已閲一百十五春秋佩銅章墨綬者不知其幾人皆漠然不以為意而孔侯獨能行之可謂無愧昔賢者矣因備書之勒於金石非惟永侯之文抑亦勸來者使亦效之也侯名克源字敦夫孔子五十五代孫系之以詩曰華川之墟衆水所趨其勢回旋匯而為湖黃流奔衝歲受汙濁不有濬之化為平陸孰為其先澤我甫田孰為其後維今之賢其賢為誰裔自曲阜我煦我育不翅召父百齡絶響曰吾繼之民食攸繫何敢弗思乃程土功乃集徒旅畚鍤齊興其來如雨森之綢綢斥之絿絿翕之鳩鳩離之休休窊者既深壅者斯戢建閘築防節其出入潦水時行納之若虛猶如東瀛注於尾閭亢陽為沴靡神不格徒爾號呼土毛盡赤我行我野黍苗芃芃亦有流泉其聲潨潨人力勝天遵古之義胡不是修索諸茫昧彼歲遘凶我年獨豐拊几而思曰誰之功功在不刋非文莫紀采而書之敢告惇史趙氏族葬兆域碑銘有序金華趙君古愚篤學而好修以其先世造家孔艱歿者多塗殯於郊乃與二弟古怡古忱謀黜衣殺裳厯十年之久始克族葬於縣之慶雲鄉青岡山之原鄉先達衢州教授胡公翰既為撰文表諸阡古怡復以為昭示後嗣辭不厭其繁力請濓申言之濓以古怡存心願慤行義如古人不欲重違其意頗諾之自時厥後竊祿于朝徒以未成之學操觚染翰無以應求文者之紛紜由是不及為者蓋八年于兹矣古怡又介宗叔嗣泰請之愈堅遂案其圗狀而序之趙氏於宋有屬籍廣陵康簡王德雍實魏悼王之第四子五傳至太中大夫堅之始自汴徙于衢古愚七世祖也特遷之於中穴餘則分左右而序列焉右則髙大父遂昌令盱夫大父永濟倉副使若磬伯父嗣淇嗣鴻叔父嗣淵也左則曽大父時堯叔祖父若降父某州路學録嗣滋及弟某縣某處巡檢古恆也太中公碩人田氏髙祖母曽祖母二徐氏祖母陳何李三氏叔祖母童氏母葉氏叔母張氏嫂張氏皆祔從夫穴而太中公之子常熟丞公傳常熟之子長溪丞彥鉷皆不遷以長溪君窆蘭溪常熟君葬衢者久也今所葬者始自太中公即繼以遂昌君者遂昌長溪之子也八世之中凡二十喪昭穆惟叙尊卑不亂厲限有截羡道中度神靈載寧人道朂順鄉之大夫士過之者咸相與慕咏而去蓋大江以南拘泥於堪輿家謂其水土淺薄無有族葬之者他未遑深論雖以父子至親其兆域相去近或十里所逺乃至於踰百夫以一氣所生喘息之相通魂神之相依乃使之曠絶疏逺如此豈人心天理之所安哉周官有墓大夫掌凡邦墓之地域為之圗令國民族葬而掌其政令正其位掌其度數使皆有私地域釋者曰位謂昭穆也度數謂爵等之大小也古者萬民墓地同處分其地使各有區域得以族葬嗚呼它姓尚爾况同族同氣者乎何為離而異之何為離而異之古愚兄弟一即乎義理之正而弗蹈夫流俗之失不亦行古之道哉行古之道可謂君子者矣抑聞之趙氏既家衢常熟君又遷蘭溪副使君又遷婺城人遂為金華府人其世德宗系各見公所述墓銘其族葬之時則洪武戊申歲冬十月壬午日也銘曰人之生也聚族而居朝焉暮焉胥㑹於堂序之上冠衣濟濟而笑語嘻嘻奈何其歿也則異而藏之設其有知也未必能瞑目於泉下若其無知已揆諸人情而胡乃忍為自堪輿家倡為禍福之論舉世紛紛遂瀾倒而波隨縱曰其理之所必有徇利而忘孝亦昔賢之所嗤况涉於茫昧恍惚弗能使智者之無疑不有君子孰覺其非今昭穆有序塋域具宜其安死者如生又惡知不順夫秉彛豫所以取之而樂道之者亦中心深有感慨乎而噫麗水陳孝女傳碑陳孝女妙珍處之麗水人父南溪為神祠祝史蚤夭母某氏更適他族妙珍依大母林氏以生林嬰末疾妙珍刲股雜淖糜以進疾遂瘳或告之曰此若女孫股肉之功也林悲泣曰吾耄矣死固當然何用苦若耶疾復如初妙珍倀倀如有失賣衣走浮屠氏作諸禳禜事皆不應林忽昏眩妙珍解髮相糾纒哀號良久乃蘇自是氣益弱僅有一絲相屬妙珍計無所出燃香右臂上稽顙籲天乞以身代復不應至正四年四月壬申夜夢一丈夫冠烏紗巾服青布袍來告妙珍曰爾勿憂能剔肝食之則愈矣妙珍問曰欲剔將焉從丈夫指右脅示之且俾吞紅藥半丸吞已遂覺甲戌妙珍乃具湯沐浴露禱上下神祇時空中雨墜妙珍之身獨不霑濕若有張蓋覆之者妙珍益喜持刀視脅下見紅痕如縷長可三寸許就痕上割之血滂然流再割之了無所見妙珍懼乃擲杯珓卜於神逮俯身拾之而肝忽出懸亟刃之置几上爇香自誓云大母倘得生終身持菩薩戒不復適人矣尋取肝聶而切之雜竹萌烹之大母食才下咽其疾頓愈妙珍懲前事戒左右勿漏言然創巨甚幾至危殆復夢神人語之曰無傷也宜錬紙作灰傅之妙珍從其言果愈時年十四耳後三年林以夀終妙珍造塔瘞之復然頂申前誓棄家為優婆夷前進士永嘉髙明來官郡録事為上其事部使者大名髙履復按得實以聞次于朝詔有司具烏頭雙表之制旌表其門仍月給粟一斛養其終身時八年春二月也郡守固始黃某以其事有涉名教也命儒學教授鄭汝原為記其事于石云史官曰人子之於親本宗一氣茍可以死生者勢當共之肯以形體既分而視之有異耶當親有疾時呼號天地鬼神遑遑求索茫昧中力有可致雖萬死弗之顧又奚暇毁傷絶滅之計耶或者作人對痛斥之余不知其何所見耶夫忠孝無二道忠臣肝腦塗地世未嘗指以為非顧獨於孝子而疑之耶此決非韓子之文其依倣而託之者耶余聞之慈溪黃東發之言如此因造陳孝女傳故備論之重建龍德大雄殿碑佛法之入中夏始於漢明帝永平八年此說殆非也中夏知有佛蓋已久矣周穆王時西域有化人來能出入水火王為築中天之臺列禦冦之書所載西方有大聖人不治而不亂不言而自信不化而自行雖不明言其為佛其事固皆佛也况乎天竺室利房等持經來秦而始皇謝去之漢武帝詔霍去病討胸奴獲休屠王祭天金人祠之甘泉成帝命劉向校書天祿閣往往多見佛書哀帝遣景憲使大月氏得其王口授浮屠經而還是則明帝以前經之與像中夏皆有焉至於永平以後而其教法始恢𢎞耳然而中州之人奉佛者雖多江南塔廟則自吳大帝赤烏四年康僧㑹所造建初寺始婺之浦江從仙華山降勢而下其東支蜿蜒而來曰龍峯峯之麓龍德寺在焉乃法瓌禪師道場初名乾元宋大中祥符元年更今名嘉定中寧宗親書寺額以賜之寺無碑碣可徴不知何時建立相傳為赤烏中豫竊惑之僧㑹之化方行建業而浦江在千餘里外何緣遽有興蘭若事乎乾元乃唐肅宗紀年以年名寺其殆或肇于唐歟寺廢將圯元大德九年住持僧善興及其徒永鎮悉撤其舊而新之先是龍峯之上有塔七成宋天聖三年僧咸若募兵部侍郎胡公則捐錢五十萬所建至是亦一新之且造塔院一區湧殿飛樓雄麗華焕為一郡佛宫之冠歲時祝釐縣之諸浮屠悉萃焉元末兵亂一夕皆為煨燼寺之二比丘至德守約衋然傷心乃合謀曰前人之功吾儕不可不繼也而力未能遍及宜先其大者以為衆倡樂善之士豈無從而和之者乎於是黜衣縮食重創大雄殿五楹間其廣一百一十尺深比廣閷二十尺崇比深復閷其四十尺經始於洪武九年之十月落成於十三年之三月匠以日計者八千米以石計者一千錢以貫計者五千而所就之夫弗與焉二比丘以成功之孔艱也欲使嗣人知所保護介豫學子吳誠來請記嗚呼久逺劫來諸佛出世其化度前後固不可以詳知而先儒則謂穆王之世中夏已昉見之越一千六十餘年至明帝法始盛行又越一百七十餘年至吳大帝江南方知有佛祕藏之莫顯至道之難聞亦已甚矣今也祗園梵林交接乎東西琅函玉笈充牣於左右則其證修宜若易易然者而闡提之人猶日衆多自非增崇其像變宏侈其實坊何以新其瞻視而袪其疑妄者哉此二比丘所以協力起廢而不敢緩也真如妙智含生本具當有繼軌轍而興事功者不數年間一復大德舊觀豫安敢謂無其人哉故因作記特稽佛法緣起而歎其不易遭逢意將起人之敬信茍謂泛引而續言之非知豫者也系之以詩曰西方大聖天人師降本埀迹攝羣機五色神光貫太微九龍行水香襲衣六齡寂默和天倪明星一出絶去來大音演法寶華埀像教東漸自蒼姬祕藏弗顯昧若黟後千餘歲寖光輝白馬䭾經息鴻盧從此祠廟覃夏夷仙華名山如曳旗青龍東逝勢欲飛穹塔為角卉木鬐掩映樓觀聳巍巍髣佛兜率中天移劫火洞熾風鼓威盡化丹雘為荒椔二士見之心酸嘶欲符西土化人為彈指勿使神鬼窺四阿凌虛截絳霓一倡當知百和隨千楹萬礎列參差行看規制踰昔時調御丈夫示𢎞慈擲埴索塗哀世迷手擎日月耀九馗疾步長趨絶險巇厯劫難值心勿疑浦陽長江流渺瀰江水可竭道無虧興作起壞屬之誰尚告繼者徴斯碑洪武十三年夏四月八日前翰林學士承㫖嘉議大夫知制誥兼修國史兼太子贊善大夫縣人宋濓撰文憲集卷十六
