body:
  text: 文憲集卷二十三明宋濓撰墓碣凡二十章太初子碣宋之德深逺矣暨其衰微不振人能取其國而不能絶其子孫百餘年間顯官名士森布於天下當世稱多才者歸趙氏此豈人力乎非天曷能致此乎吾於浦江得太初子諱良本字立道其裔出於周王元儼至太初子十世矣太初子六世祖士翮為處州兵馬鈐轄髙宗時來遷睦卒贈武節大夫武節之子武義郎不玷復自睦徙浦江髙祖武經郎善近曽祖武翊郎汝沮祖崇徯父必俊自祖以下始不仕皆以儒名至太初子尤異焉太初子少時好讀書從學於鄉先生吳貞文公萊通經史大略不喜専精為章句有得諸心輒見於行事其言纚然可聽其為家以禮取友必君子凡所友者善譽惡諷終身不變也妹歸樓氏喪夫二子楨楠幼樓氏族利其資欲以計奪分之楨訴官未報夭死長老有憫是婦子者為言于縣縣擇可托孤者皆曰莫賢於太初子且其兄也可任縣籍其資具土田付太初子主之太初子視孤甥如子既長授以其籍絲髮無所私太初子行方嚴有度柔仁者咸慕與親剛愎者惴憚不敢過其門翰林待制桞文肅公貫太初子父友雅愛太初子為人命從朱先生震亨遊朱先生老儒通醫術最嚴毅不許可庸俗士獨樂太初子盡傳以其術太初子謂吾欲及物而患其無道今乃得之遂發其術濟病者窶人來問藥與畢麾去不取賈監察御史聞太初子精於醫薦于朝授以醫學正太初子笑不就而太初子之嫡亦且長於是太初子謂曰兒善治而家吾將休矣遂闢一室以居研摩養生之說朝夕粥一器不御醯鹽蔬蓏盛暑不箑浴烈寒不附火踰三十年無懈意至老鬚髮不少白人望之以為真神仙人而太初子亦若有所自得人莫測也洪武六年太初子卒年七十先卒之一日坐牀上謂人曰明日良吾將歸矣顧稚子取筆與簡預書斂葬儀曰衣我楮衣屨我繩屨屨二量宜用敝者毋華侈汙我至日晨興冠衣正坐啜一食斂手瞑目撼之則逝矣二月十五日也三十日葬于華表山之原夫人戴氏先四年卒合葬焉太初子嫡曰友昌孫曰季升季昱曽孫曰同璿同圭同璣濓交太初子翁季間最久法當銘銘曰人之將寐昏氣乘之形憊神疲不能自持矧惟死生世之大事誰能兩忘談笑而去猗太初子脫然天游與道始終知命不憂曷由致斯其欲甚寡形且頓忘孰不可舍世之鄙夫雄傑一時疾病之臨鼠伏狐悲太初之道匪神匪仙充乎兩間無後無先劉府君碣烏傷劉君大音字韶父凝貌寡知撫世一以誠人至於不忍欺當四筵合座囂聲撼屋居處其間默如也或出一言輒中肯綮而萬理皆解且才識敻絶人多嗜腴田設巧穽期必獲焉君一不舉目睨之世咸以病君君曰吾將利吾𦙍耳子奈何欲陷之邪未幾多田夫苦賦斂繁荷械走氷雪中咤曰劉君其智人也哉嵗祲盜夜半入君舍攫金以去君揣知其人帥子姓蹤跡于野遙見一家燈熠熠紅君曰此是已隔虎落偵之盜方轟飲昧爽縛送于官盜為裒止即欲盜齚舌相戒曰劉家翁在何地容吾屬乎族人瀕死子方乳以業券泣授君曰非君仁厚不足以保此有子與無子同願為盡心焉君藏劵篋衍候子長召而觴之枚數以還祖揆弗逮事父訓復蚤世君每思之必澘然飲泣奉母李夫人唯懼有咈其志君之弟晉繼於别宗夫人愛之甚泉若布君縱其欲弗敢靳其焚劵周急拯難嫁娶又不一而足嗚呼非古之所謂吉士者邪君之傳裔有家牒中奉大夫公亮五世祖也家嘗顯矣君雖不登仕版其行無歉者娶余生誠剛魯道四男子及女二賈叔文宋慎其壻也卒以洪武辛亥十二月三日葬以癸丑十二月某日夀七十三墓在潚溪黃垣之原從先兆也剛既從豫學經有文聲而君女又歸于冡孫義當銘銘曰玉孕于山其木華滋淵産靈珠水則有輝鄉有吉士俗醇而熙一旦死矣吁其悲進賢朱府君碣先王之法不行於後世道隱民散仁鄙夀夭貧賤强弱為吏者多弗暇問於斯時也百里之邑茍有忠信之士聳善扶誼以禆助於政教不亦空谷跫音之可喜乎如府君者誠可銘己府君諱志同字與可姓朱氏進賢朱方里人曽祖仁無嗣其妹適宋某年進士豐城袁某生梓梓遂來為仁後府君之祖也父粹中字幼純漕貢進士有材略德祐世變能聚兵立堡以衛一鄉冦鋒不敢近府君天資亮直尤好赴人之難科繇或不平視其力單者佽助之閭右作威福鉗劫細民不敢少吐氣府君奮然為直於上官人人敬畏不敢作非義事縣大夫聞之嘆曰是剛介不羣者也是有補政教者也遇以賓禮民間利病必一一詢之府君為之傾盡邑以治最聞天厯已已大儉民有菜色部使者行縣延府君于庭叩以勸分之䇿府君曰進賢雖小邑其藏粟者何翅百家計其飽妻孥外有餘則輸于官分給餓夫使者一謦咳間所活數十萬不難也然示之以至仁布之以大公衆將樂於從化願力行之行之當自志同始使者曰君言是也命即為之三百里間無填溝壑者府君義聞彰著監察御史有嘉其能者首以茂才薦府君自度不能隨俗浮湛力辭不就築室白湖嶺之隂鑿池種樹若將終身揭文安公為扁堂曰真村文白先生范公亦為賦詩江右學者多傳頌府君篤於訓子闢館舍聘名師使其子渙就學族姻子弟貧而無資者悉聽已而渙學大進如水湧山出復使裹糧逺遊以充其學識束脯裝錢之費雖鬻産給之無倦色不幸渙早世府君嗚嗚而泣復召諸孫夢炎訓之如訓渙夢炎晝夜奮勵雖寐不敢忘學既成登至正辛卯進士第奉觴為夀府君喜曰爾不負吾所屬矣元季兵起夢炎奉府君辟地南昌之蜀溪未幾以疾終癸巳春正月某日也夀六十六秋八月某日始自蜀溪奉柩還葬白湖嶺之白楊坑初府君愛白楊風氣回旋有卜藏兆之意及是見夢於人曰吾將寧魄此地矣衆咸異之府君性耿介人有過必詰責之雖面頸發赤不少恕家政嚴肅闔門千指罔敢有違教條其於勢利紛華之欲則淡然無動於中鼓琴吹簫酣咏水光山色間有不知老之將至也娶臧溪吳氏子男二長即渙卒時年三十五能古文辭虞文靖公甚器重之遺藁若干卷其門人袁鏕鍥梓以傳次紹信後府君四月亦卒女二舒某胡某其壻也孫男六曰和曰夢炎通厯代文獻之學如指諸掌禮樂家賴之曰良曰厚曰碩曰惠曽孫九則以進以任以武以應云云也府君葬後二十五年濓待罪國史夢炎官于儀曹實與之同朝夢炎自狀府君行持來告曰李翺有云先祖有美而不知不明也知而不傳不仁也夢炎竊為此懼願吾子有以畀矜之墓門有石亦既琢而礲之矣濓不敢辭銘曰剛腸斥邪徑弗折一見未語心已惕庶幾今逢古遺直義聞如泉漸洋溢勸分有䇿昭厥績繡衣使者加薦辟堅卧不起志非激膏肓久矣縈泉石少微星昏風夜黑白楊有祥閟𤣥室孰不霣涕何嗟及有孫文章成五色君子於兹觀世德南澗子包公碣烏傷縣西四十里為南澗子所居其鄉曰智者里名修政南澗子生於宋咸淳乙丑九月三十日眉目秀整讀書學文皆過人年五嵗見伯父記飲中八仙及大厯十才子名隨記隨失南澗子牽衣問曰翁何健忘耶兒雖耳聞已熟於心矣因厯數以對翁大驚及長鋭然尚友古人朝負耒出耕稍暇輒躬親杵臼井竈之事及入夜方懸燈挾冊琅琅聲不絶終能暗誦春秋左氏傳三十卷一字不遺名動遐邇閭右之族爭聘致為弟子師南澗子専以講解章㫖為第一義且曰自先世逮吾凡十世皆以教授學徒為業其所相傳不過如此而已弟子遵其教者皆不悖師說為良士性嗜酒雖至百觴不亂當酣適之際岸巾獨坐髙歌八韻律賦抑揚髙下音節極可聽聞者猶能識前進風致濓之祖太常府君與南澗子相友善嘗延於家孰俾諸孫師事之而濓甫十二齡亦預其列操觚賦詩動輒十餘首南澗子酷愛之既而濓以家單稍不事觚翰南澗子移書於先君尚書公曰公之子終成偉器豈可使嬰世利而志不専耶外物去來猶春花之開落唯問學乃身中之至寶耳先君深悟其言命擔簦逺游至今幸忝簪纓之末皆助𨗳之功也南澗子無機心撫世酬物洞逹出肺腑相示人無賢不肖皆樂親之夀七十二以重紀至元丙子二月十二日卒瀕卒危坐賦詩有脫胎換骨之句俄頃而逝其年十二月二十四日葬于家後五十步祔祖塋也南澗子諱廷藻字文叔自號南澗姓包氏出合肥孝肅公拯之裔公之子綬生夀年夀年生執中初遷天台執中生通直再遷金華之松溪通直生冀之冀之生昶三遷於今里昶生凱凱生震震生文煥南澗子父也母盧氏望江丞殷之女繼邢氏南澗子娶史氏生五子士瑞士祥士安士梁士華孫五人文貞文星文旺文彬文賢士梁有學行善繼父業與濓丱角締交間以墓文為屬濓游宦南京二十年久不克為今年春䝉恩致政而歸士梁復竭蹶而來以申前請近嘗謁拜墓下寒草凄迷徒增古今之感乃書其所知者以授士梁不待狀之所具也銘曰師道之立善人斯多奕葉傳經無敢訛才良俗善資漸摩何以表之銘澗阿故紹興路總管府治中金府君墓碣并序濓來浦江聞縣有先逹之士金公厯官多異政時公歿未久也㑹邑令長請修圖經縣之人物法當登載文下七鄉徴其實㑹公家有故不以事來上其詳無從知之詢于大夫士情之好惡不同言人人人殊不能聽但略附公氏名他傳至今以為恨後十有五年公之子昌祖始具治行蹐門泣拜且謁銘濓因得備序之揭諸墓上且使續縣志者有采焉公諱德潤字君澤姓金氏世家彭城五世祖碩德始遷婺之浦江曽祖載祖文興父定字正甫雅好施貸而不償則裂或作併劵棄之以公貴纍贈奉議大夫婺州路總管府治中上騎都尉追封大興縣子程文獻公巨夫為銘其墓妣吳氏纍贈大興縣君公少有大志不屑事耕稼視其手曰吾掌腴且厚如此肯浮沉田間乎年二十餘逺遊湖南入憲府學書獄客東廡下中設木榻旁鍑釡之屬寢食於是翻案牘於是終日危坐休沐未嘗出時踈齊先生盧公摯為部使者每見人散後唯公獨留心録其勤選為潭州府史公辭曰明公不以德潤為不肖俾吏于潭然潭之户口踰五十萬事必劇甚非長才不足以任之若區區者得一閒曠之所稍讀律焉則明公之賜也大矣盧公尤嘉之如其請移桂陽越三年補湖南道憲府書吏久之遷湖北贊使者發姦伏聲逹湖廣行中書辟理問所提控案牘以年勞及格授台州路録事判官階將仕佐郎豪卒質人珠人贖焉卒愛珠潔意將乾沒之紿曰汝何多忘珠已歸汝矣其可再乎人訟于官公訊之卒諱如初因去卒巾跪于庭使人持去謂卒妻曰汝夫令索珠恐汝不信特以此為驗妻視之果夫巾也啓櫝還之卒大慚服薛記擊陳源死薛行賕上下以勢扼諸孤亟藁葬其尸寃莫能伸公白發之厯二年尸僵如生抵薛于辟辟浙東道宣慰司令史考滿擢將仕郎平江路總管府知事未上江南行御史臺辟令史以病足辭尋之官平江轉承事郎常州路宜興州判官新學宫築社稷壇壝架長橋民賴之州多盜公閲盜冊察其尤嚚狡者􅎂左右趾役于官三年之間外户不閉建文會以激攻科目者文既集請名進士第其髙下賞之有差公去日民為立遺愛碑改承務郎嘉興路總管府推官屬嵗大水禾不登道殣相望其壯者謀曰吾儕等死耳飽死可乎乃羣詣富人貸粟弗從竟囊之而奔諸聚落皆然縣州坐以强敓案且具公原其情悉傅以輕典脫死者六百人民感泣曰推官生我推官生我拜而去已而足疾寖劇遂上疏乞骸骨以奉議大夫紹興路總管府治中致其事公為人忠靖而慤勤讀書至老不釋卷當入吏時操觚或不能成字後解屬文詠詩論議出入經史蟬聨不少休自以性𥚹躁托古之有容德者成類各贊以詩號曰紀忍之書趙文敏公孟俯虞文靖公集皆深有取焉生平無他嗜好視貨泉如土梗唯愛聚書多至七千卷居家謹禮度劇暑鑠金不冠帶不見諸子奉先恭甚月旦十五日必帥家人謁拜先祠下撫姻族有恩嫁娶不足者助之遇嵗儉割秩祿濟之每思效范希文買義田為經久計有志不就其蒞官則清心寡欲祿或不給取貨于家以繼其用惡豪强之蠧良弱極力鋤剗所至皆屏迹人呼為健吏云公娶王氏纍贈大興縣君重配何氏封大興縣君子四人長曰夀祖以公廕授昌化尉次即昌祖通儒術能紹家學者也次曰紹祖次曰光祖夀祖光祖皆相繼卒女一人歸姑蘇鄭善孫九人曰教化曰不花曰珤曰琥曰剛曰忠曰聰曰滿曰茅孫女六人其一適張輝餘未行年六十六以至順四年二月十五日卒于家十二月某日葬于後金之原嗚呼公起于蒸庶不從貨取不從權勢而致不從奔競阿附而獲直以纍積勞烈綿厯嵗時而躋五品服卒使澤加於民聲流於時榮號寵賁于先人誠可謂難能者已銘曰健翮維隼兮寧不奮飛捷足維驥兮千里以馳豈皂櫪之可淹兮而縧鏦之足羈吁嗟夫子兮其類是為翩然髙舉兮物莫能翳之命服斯皇兮終易布韋聲號赫赫兮如飈四馳雖宰木之已拱兮芬烈掬而未除揭徽行於隧道兮尚來者之可期故承事郎漳州府漳浦縣知縣張府君新墓碣銘並序張之為著姓尚矣自軒轅第五子青陽生揮為弓正觀弧星始制弓矢因姓張氏厯代以來勳賢軒冕未嘗乏人其居饒之德興吳闡里者諱鵬仕唐為節度使至五季時子孫猶授節鉞宋天聖中龍圖閣直學士燾嘗同文潞公諸賢為洛社耆英之㑹暨還饒見旁縣安仁有山名若嶺林樾蒼潤靈氣回合因移居其下五世孫一清中特科進士第一與同邑湯文清公最相友善推究經傳反覆詰難必得肯綮乃已自時厥後族日以蕃讀書之聲琅琅乎西東擢上第者凡十預薦送者二十又七薦紳以為榮一清若干傳至宣義郎某宣義生某舉進士上南宫厯斥時政之弊有忤執政遂下第某生英肥遁終身飲水著書以自樂有春秋屬辭若干卷藏於家英之兄國學上舍某當宋籙將訖帥安仁義師從謝枋得勤王及戰敗家遂為墟英子禹受方在幼最號孤貧後能遵廢舉之術大振其宗田貨悉逾於前人初無嗣育仲兄某之子璵為後年四十七始生府君府君諱理字玉文十嵗通經史十五能屬文父悅曰吾宗書種弗絶矣為築義湖精舍於室之南偏聘明經老生為師遐邇之士鼓篋而來咸食飲之由是游從者日衆而府君聞見益廣縣令長嘉之旌其里曰儒賢云府君以纍世科名欲起而踵其後復往從廬陵王君充耘習為程試之學較藝江浙鄉闈不中遂學詩於翰林學士承㫖張公翥張公見府君襟度沖曠深器之悉授以詩家之法府君寤寐不忘虞文靖公集覽其所賦擊節嘆賞不少置至正壬辰蘄黃妖冦相挺為亂破饒州已而安仁繼陷殺戮到雞犬府君攜家避去臨川時江浙行省左丞羅羅公江西行省丞相亦憐直班公屯兵信之弋陽營壘相望府君遣張世英請檄起兵遂同弟瑑間道歸安仁聞外孫陳政養甲士三百以自衛府君召政與計事命伏兵於户內椎牛釃酒誘僞帥二十四人醉飲於庭縛送於官斬之復諭其部曲曰爾帥已成擒即宜改圖稍緩成葅醢矣衆翕然歸乃研墨汁署其衣曰興安義兵二日之間得健兒四千金溪白砂盜周謙入境鈔掠府君命瑑將健兒往逐斬首數百尋殱之白砂盜平丞相出兵平饒號一十萬至貴溪瑑以兵迎一鼓而安仁復瑑受命攝縣事僞將軍彭浩擁七萬衆逼丞相於團湖丞相兵欲退瑑部騎卒執麾前驅丞相遽下令出戰浩大敗斬首三萬級積尸如山瑑𨗳丞相前進復饒州軍士乏食且重以疫癘府君率縣大姓輸糧一萬二千斛散之時冦盜充斥南通閩北適燕唯安仁為便使者乘傳而來絡繹不絶皆仰給府君家為之貧江西劇盜黃廉舉猖獗不可制左丞和爾齊公檄瑑共平之府君授瑑計焚其窟穴賊遁去别據岩險為拒守設伏於道瑑乘勝深入賊突起而蹴之瑑力鬭而歿府君失聲哭曰折吾右臂矣吾當上告方伯以復爾仇下命介子以奉爾祀庶幾盡吾心爾遂急攻亷舉亷舉懼别降江西行中書未幾復叛府君與王伯美夾攻大敗之殺其兄亷靖亷舉夜走菘溪吳友文械送府君獻諸幕府尸于市且求殺瑑者五人烹之而以中子為瑑後里嵗儉人多相食府君移粟以振仍禁山谷氓勿出鈔道商賈懋遷如承平時四方辟地者三百餘家皆依府君以為安五年之間號為小康辛丑嵗八月天兵取九江九江與旴江連府君知天命有所屬往贊其守臣王公溥以全城內附皇上召府君至南京擢知徽州黟縣事黟在萬山中自近代來髙陵巨壑皆有賦民不堪命㑹部使者至府君力陳之言與淚俱使者以其事聞下營田司核實惟田輸糧餘皆置不問黟民得以少舒秩滿改知漳州漳浦縣及行民爭擁馬埀泣而送之漳浦接連溪洞民善亂舊於其地置汀漳屯田萬户府及入職方詔徴屯田軍赴京萬户吳世榮遂叛府君集民兵攻世榮戮之具上奏中朝免其徴海冦林仲明鄭惟明鄭君長恃能出入海濤先後為背叛漳州衛兵雖嘗剪除而渠魁逸不可捕府君悉用謀致之磔裂以徇民畏威不復敢為亂俗尚妖術呪物食人久則成形於腹中物動人輒死云役其魂為奴府君亷知之毁其淫祠數十區其害遂熄邑多良田其隄防為潮水所齧鞠為草菜之區府君修築之百里之間皆化為沃壤土豪羅季二族黨與甚衆恆持官府短長府君徙其家逺方事始帖帖府君且謂蠻夷不知禮義無善教以牖其良心爾乃為修學聘師集子弟而誨飭之三年之間政教大治府知事孫希顔嘗有求而弗獲及以贓墨敗誣府君以白金百二十銖為贄刑曹逮府君坐以不宜與事已釋將趣裝南還忽遘心疾恆怦怦若絃目不暇瞑遂卒實主於江寧欒氏其時則洪武五年三月五日壬子也年五十九同門友夏君通為稱貸襲斂以某月日權厝於聚寶山府君娶臨川王氏出荆國文公之後吉水州判官某之孫女也先七年卒子男尚德次九德即為瑑後者次報德女常德適臨川許觀孫男三人桐木東府君天性孝友父病亟夙夜籲天祈以身代仍刲股和藥以進疾乃瘳後二年卒事兄璵唯恐弗獲其歡心然操履剛介不諧於流俗而非義之財絲髮不取故居官之日命其子負販以自給及其歿也槖無一錢識者頗哀焉濓為左史時見府君清溪上府君方以意氣自豪醉墨淋漓有鸞翔鳯翥之勢頗異其為人自是數與之游暨别去為縣聲跡不相聞者六七年遇與府君交者輒詢之皆不能道其詳今年夏忽有衰絰踵門者則府君之子尚德也驚而問焉府君死且殯已逾月矣嗟夫十數年來朋舊凋落殆盡如府君康强者亦復棄去人間世則夫沉酣聲利自恃以為久長者果何如也因為泣下數行既而尚德將奉柩歸故鄉以某月日葬於某山之原持夏君所狀羣行請為文勒墓上濓府君之友也不為之銘孰宜為之銘銘曰維其文五色絪緼揚葩而吐芬維其武扼彼妖旅退縮莫豫侮維才孔臧曷施弗良維邑之試變劇如易維澤之滂然維民之龎然維聲之鏘然維神之難言胡不永其延吁嗟乎賢吁嗟乎賢故龍南一峰先生鍾府君墓碣銘有序府君諱柔字元剛姓鍾氏其系出於魏侍中繇繇之十代孫紹京字可大事親孝自為童時凡得瓜果必先進最工書人號為小鍾蓋以繇為大鍾也嘗直鳯閣後從唐𤣥宗平內難拜中書侍郎始居贑其諸孫曰某游宦龍南復為龍南人傳至諱胄字少游者擢元豐五年進士第厯二廣轉運使以功烈聞性尤至孝父歿哀慟劈踊聲不絶於口羣烏助之哀鳴人為建感烏堂府君則其裔孫也曽祖淳祖德賢皆抱道潛耀以自樂父克俊在宋之季補國學上舍生聞三宫北遷糾集義旅為勤王之舉勢既不可為乃登贑之馬祖岩遙望中原白雲渺瀰而翠華不可復見悲歌激烈聞者涕下已而痛憤益深誓不食元之粟賦詩一章有自許有身埋漢土終憐無淚哭秦庭之句遂赴龍頭江而死其忠義之志蓋皎然云府君生甫一嵗宋初改物兵燹猶未息祖母吳氏與其母劉夫人挾之走南雄艱難險阻莫不備厯府君幸既長俾歸從鄉先達雷州推官劉公震游夫人日自程督之府君性既頴拔復知以紹述為事昧爽即興挾冊映簷光而讀至夜漏下二十刻亦弗休由是融貫於經子史集諸家握筆為决科之文頃刻千餘言長風驅濤而雷電與之相後先也夫人喜曰吾有子如是吾夫子為不亡矣夫人或與府君語及龍頭江事府君輒長號弗輟幾欲無生及祖母與夫人相繼而逝府君竭誠於葬祭之禮觀者咸曰鍾氏世有孝子感烏堂之作不得専美於前矣府君初娶田州判官凌君昌任之女生一子而卒興闕尹馬君良竒府君之為人復以女妻之遂同之官凡馬君之善政所以鋤姦扶懦滌寃疏滯者皆府君有以發之廣東帥閫及海北亷訪使者聞府君學行之懿交薦之署為雷州路學正府君以海濱非久處之地力辭而歸下簾講授從者數百人咸共推尊之號曰一峯先生云府君儀觀偉然終日正襟危坐人莫能窺其際晚益刋落英華窮極根柢所居僅蔽風雨所入僅足饘粥而處之怡然至於赴人之急雖蹈水火有不暇顧者君子尤稱之府君生於至元丁亥正月某甲子歿於重紀至元辛巳十月某甲子得夀僅五十又五瀕卒無他言唯屬子力學厲行毋墜家聲而已所著書有諸經纂說易書詩衍義弊帚集若干卷藏於家府君凡三娶初凌氏生一子即恕字以行至正癸巳鄉貢進士署濓溪書院山長不赴次馮氏無子次凌氏生二女一早世一適凌德曽孫男三人曰肅曰緝曰熙女一人適某曽孫女二人尚幼府君之卒也葬於龍山之南洪武庚戌秋八月某甲子再遷於仙女湖之西與凌氏合葬焉實縣南之五里也惟府君生於忠孝之門耳濡目染已能立乎其大者及求諸六經驗諸躬行所見益真切所獲益粹凝雖不見用於時而弟子從之者皆知所謂孝悌忠信其有功名教甚多是亦為政也中州君子恆言䖍南為遐荒之地賢才鮮少有若府君者其裔胄之悠久家學之盛著文行之隆蔚初亦何减於中州人之好論議往往如是是重可嘆也因按鄱陽董先生之狀大書以銘府君之墓庶幾白府君潛德於逺邇䖍南之士讀余文者亦當有所奮勵而興起焉銘曰􅍇人之班班乎而忠信以為冠乎而佩純知而鞶華文乎而光彩之如璊乎而長才詘而弗信乎而敶政令而屏奸乎而柔之立而强之刓乎而臯比設而師道尊乎而反澆凉而為龎惇乎而一鄉之善士質其玉溫乎而岐有鳴鳯魯有祥麟乎而天之生賢無方何暢復何屯乎而勒銘墓門乎而庶昭昭其永聞乎而故樓景元甫墓碣禮有之凡有道者有德者使教焉死則以為樂祖祭於瞽宗此之謂先師若漢禮有髙堂生樂有制氏詩有毛公書有伏生之類是已嗚呼古禮不行久矣今之所謂鄉先生者得不近之歟鄉先生謂誰烏傷竹山里有樓君景元以書詩教於其鄉景元日坐臯比申飭五倫之教亹亹不自休受其學者攝其粗踈歸於密微必充然有得而後止父既師之其子又繼之其孫又執經從之先後埀六十年環境之內外率皆其弟子矣於是相與謀築書齊一區以為講授之地暨歿而葬號泣而執紼者數百人咸曰吾先生亡矣何所受業而辨惑哉觀者歎慕而去初景元之父玉汝翁習六藝而文景元幼服家庭之訓長益自振厲從淵頴先生吳公立夫為科目之學未幾棄去而専攻羣經間發於詩亦首尾開闔皆中矩度名著逺近縣大夫或出鄉咸望閭欵謁詢以民間利病必懇懇縷陳之乃已景元性淵慤事親能盡其養親死經紀喪事不以煩諸兄諸兄性方嚴景元承事惟謹逮至分田唯受磽瘠者不辭其後兄子有黜其業者為贖而歸之且曰烏可使其無食也遇族姻故舊一以誠相接無一毫狎昵態晚嵗頗好神仙家言杖䇿游江東登龍虎名山騁目逺望翛翛然獨立物表意謂古仙人或可見云洪武七年甲寅十月十一日以疾卒於家年七十九臨啓手足無他言唯戒諸子以守詩書之澤使勿墜九年丙辰正月六日奉柩葬於梅口山先塋之次景元諱光亨景元字也姓樓氏樓故為宦族宋嘉定癸未進士通判吉州元齡其四世從祖也曽大父炎大父建中父有成無為路儒學録即玉汝翁也娶劉氏有婦德濓嘗為銘其墓男子四人女子四人孫男三人孫女四人名皆具前銘中兹不書濓今春䝉恩致政而還蘿山景元季子仁夀縣主簿璉件繫羣行而來請曰先夫人之終辱先生賜之銘甫及二載而先君又卒先君平日嘗言知我者唯太史公宋君我死若求文鎸墓上吾目瞑矣用是不避譴呵重有所瀆願先生進之濓之先廬與景元密邇而景元長濓僅一十四嵗相與論文甚歡聞景元死涕落不能收近雖老病四方求文者類多峻辭其於景元可得而忘情乎若吾景元生能執詩書之業以淑諸人誠無愧於鄉先生者死雖未及祭之於社銘以列之豈過也哉銘曰一卷之書必立之師牖民孔易斯德所歸懿哉樓君侃侃令儀執經據座析分毫絲環而聽者肅其冠衣聚精㑹神臻於泰熙春融天衷蟬脫人私俗變淳龎實由於兹生服明訓歿寓哀思有素者冠溢於中逵彼位崇階澤不下施人孰無舌不一道之太史造銘公厥是非觀者宜式知無愧辭故諸暨陳府君墓碣惟陳氏逺有世序其先居襄陽之宜城有諱璿者生磐磐生斌斌生甸甸生宋國子助教旦始自宜城徙杭之萬松嶺旦生慤字公實有文學一時名人如范元卿陸務觀辛棄疾咸與之游論者謂其氣節度量有郭元振之風官至承事郎知餘姚縣復自杭徙諸暨陶朱里慤生樵樵生載又自陶朱里徙開元橫山之西載生國子監主簿瑞瑞生嶨嶨生清清生德興字克明從子洙嗜學如不及克明資之使受經名師食或告絶躬事杵臼市米以遺之卒成巨儒克明娶曹氏生府君諱大倫字彥理自幼岐嶷學易於洙既而更春秋年甫踰冠敷繹義例揮毫輒雲煙滿紙自度功名易如拾芥屢試藝場屋不能中繩尺恚曰吾文視舉進士者何逺今不與之並驅造物困豫矣將何言於是棄絶益攻古文辭浦陽淵頴先生吳公萊以奧學雄文知名當代府君從之講學下及秦漢以來諸文章大家章有其法句有其㫖青燈夜懸或至逹旦不寐府君之學大進逺近歆豔之交聘為家孰師留富春山中者最久富春右族多負氣善鬬府君周旋其間每以訟終凶為戒言辭悃愊無華聞者皆心醉俗為丕變馮士頤將合族為義食不問耄倪一聽府君言府君量其可行者樹規約如干則防範甚密其家賴之狂士吳子中文而好訐斂怨於鄉羅山人集亡賴男子縛致幽室將朴殺之府君徑趨山人家揚言曰爾曹欲殺吳子中邪子中無大罪豈可以嫌隙之細遽害之具耳目者恐不為也吾當白之於官山人聞之懼解縛與其俱來伏地謝罪府君諭遣之子中因得不死元季兵亂江浙行中書徴兵儲於饒饒之判官方沂實部其凡及押運吏入江為敵人所襲上官將致辟於沂逮捕甚急沂潛往見府君泣訴其故抽刃欲自刎府君奪其刃藏沂山澤間且解之曰兵儲之失罪在押運吏判官何與焉尋獲免沂見府君跪而語曰生死肉骨之恩隕身不足以為報府君張目大言曰方判官乃以市道交我乎沂不敢復言府君知時事不可為遂絶意仕進時江南行御史臺移治㑹稽中丞吳鐸監察御史督烈圖王偲競欲挽府君於州縣文學掾府君力以疾辭且䇿西師旦夕必大至決不暇安居乃遁鄰縣之東陽已而果然諸暨下髙郵欒鳯來為州與李參軍希白謀迎還府君以事師之禮事之州兵為變鳯與希白皆被害府君又避入流子里流子里在州東長谷中府君當兩山夾澗作晚香亭三楹閒日與賓客暢飲為樂酒酣府君捉筆咏詩脫帽髙歌擊几案為節座人每為絶倒或氣候和適戴華陽巾服寬博布衣支笻行古石細路間遇泉石佳處游目思視意若與之相忘人問其故府君嘆曰吾生平無他嗜唯攻文成癖孳孳矻矻垂四十年昔之人如此者何限今皆安在哉每搔首自傷但得適意時竟與萬物齊冥當不計有明日也識者服其曠逹後三年以疾卒於家實吳元年十一月二十一日享年七十十二月十八日葬於某鄉吕塘之原府君娶樂氏生二女適傅某胡驥繼配張氏生一子曄善古文辭能紹家學者孫男五可牧可蕘可漁可農可仕府君長身美髯性坦夷吐言露肝膽雖髮已斑白手不釋卷天文地理老釋氏之書莫不攬其英華尤善寫竹樹蕭蕭有蒼徑之意寫已競取為清玩所著書有春秋手鏡尚雅集各若干卷尚雅蓋府君之自號也府君歿其友張辰既狀其行復慟然謂人曰府君之才之美設用於時當無適不宜奈何斂財操勢者銖黍不合度輒斥而不取遂俾甘心丘壑老死而不悔甚可為當世有司弔若府君者無榮無辱全其所有而歸於造化奚翅足矣尚復何說哉曄持狀來徴銘濓雖素知府君未必有加於辰之言也謹備識之而為之銘銘曰天之夢夢孰得而論賦才孔多乃卒堙淪侃侃夫君纓蕤之門風措孤鶱所凝者神五彩成章隨氣吐吞其光爛然可燭翳昏鬱而弗施結為氤氲彼狂者生取尤於人將扼殺之不翅孤豚奮襼一呼凶徒裭魂有友阽危逮者星奔將蹈白刃誰欲命存匿之山樊慰言復諄平脫其生矢不以恩少見事為己復有聞假使大用何物不春惜丁亂離戎馬紛紜鶚書雖上荷衣莫焚笑咏煙霞傲晲乾坤時命所拘有志弗伸七尺之墳吕塘之原昭懿廓潛太史有文故廬陵張府君光逺甫墓碣銘皇上即位之五年朝廷清明百揆時叙乃開文華堂禁中妙揀英才詔詞林羣公分教之車駕幸臨閲其所業文親定優劣上德至渥也時江西張唯流寓河南以尚書領首薦㑹試南宫未幾除國史編修仍俾肄業於堂余見唯有雋才特請於上録為弟子員唯執經日久忽歔欷流涕言曰唯父抱竒節不幸沒於盜手今體魄入土而墓石無文一念及兹將欲無生惟先生矜而畀之余按亡友吏部員外郎周子諒狀君諱逺字光逺姓張氏吉安永豐人氣岸豁逹不徇於小物當元之季大盜起沔陽蔓延江右陷吉安既而州兵搗走之盜所過井落民皆相挻為變殺掠巨室慘酷不忍聞君怒髮上指日夜建竒策剪冦其友羅惟逺者尚氣節遣人夜致之列酒炙於庭脫冠酣飲夜將半屏左右跽而告之吾州素號文物之邦一旦盜蹂踐將無遺義不與賊俱生然非公不足濟吾事今郡守梁使君出督兵境上公宜往請師吾隂立部署以候斫賊無難者羅抵掌於几曰子誠竒男子吾縱無他能敢不從命議既君冡子庸猶未知君乃叩寢門令出拜復語之故庸曰羅先生若迎官兵至庸持大斧盡殺狐鼠輩不留一人羅舉觴賀君曰大兄有如此豪傑兒事不患不成也未發冦諜知之帥衆執羅去祼而鞭之且問曰誰與汝造謀羅罵曰死狗奴吾憤汝不道自欲殺汝何暇與人謀哉賊怒愈鞭之仍授紙筆使寫首謀者名羅瞋目視之大書一死字賊反接羅於樹剖其腹作小竅日增加之羅嚼齒大詈三日而後氣絶將絶罵聲猶含糊在口君幸得脫走吉水及冦勢稍戢君還故里冦有知君遣羅事者縶之至營賊競來指曰是嘗欲殺吾屬者君顔色自若從容語賊曰我纓緌之家决不畏死喪節殺即殺何以多言為遂遇害賊黨忿猶未平并欲屠君次子賢渠魁執不可慨然嘆曰彼固忠義人也寧可使其不血食耶為具棺斂使歸葬里之桐塘聞者莫不霣涕君博通經史篤風義事親以孝聞豪右以科繇困之君奉親避去旁郡不逺百里負米以為養暨沒號慟幾絶者數四然疾惡如仇閭師有貸粟多取息者勢橫甚君面斥其非直於州縣閭師恚欲夜擊死君聞州里萬口交譽不忍發而止賓客至門傾有無相接劇談古今事變二千年間如玉貫珠聨客為之傾聽忘日之夕且曲盡物情三尺童子上謁亦以禮受未嘗少忤性不嗜貨殖或勸為孫子計君嘆曰能守先業亦足矣何以多為君子稱焉夀五十四遇害於至正戊戌之正月其日不可復知自桐塘改葬於大塍之原則洪武辛亥八月某日也君配劉氏輕財重義亂離後家單每鬻叉鈿助夫賓客費後君五年卒子三長即庸次即賢有膂力能馳馬奮槊千人中後十一年亦卒季乃唯新擢今官女三俱適士族孫三憲文昌女二在室曽孫一祺君之系出自唐曲江公九齡九齡𤣥孫洪州都督參軍景重始來江西參軍曽孫簽判處州洪字宏淵復遷永豐之杏園代多顯官至君曽大父元升大父瑞伯父亨雖曰不仕咸能世儒業云嗚呼士氣弗振久矣當楚氛膠葛之時為二千石者曽不一舉手障之冦至輒俯首遁去日行百里惟恐不疾誠女婦留鬚鬛者也有如君者藐然一布衣無社稷人民之寄乃能建策殺賊不幸事不成雖肝腦塗地而不悔豈非烈丈夫也哉羅氏能從君謀身可殺而志不可奪亦可謂慷慨之士取反之端又於君見之嗚呼智莫大於殄冦義莫重於捐生此而不銘惡乎銘銘曰元政陵夷盜起楚區絳巾嘯呼毒氣所侵蠱其良心棄鋤握􅚙叶眷兹廬陵羣邪沸騰千里血腥有夫桓桓髮上指冠誓除暴殘夜則枕矛血淚交流同志之求酣歌慨慷舞劔欲狂惟籌之良彼何昏昏漏師弗懲賊我良朋正氣凛然雪為不寒欲膾盜肝君亦被拘詈盜益竒以死徇之雙璧焜煌如星吐芒照耀四方君名岩岩重如泰山一死亦安史官造辭鑽於幽墟後世是師傅守剛墓碣自焚尸沈骨之俗成雖纓辨之家亦靡然從之魚爛河决不可救藥君子每為之太息有若傅守剛之事其可不表之以厲人人乎守剛之父歿其諸兄具棺斂已舁出中野縱火而爇之守剛勢不能止哭踊將絶爇已編荆成筐實以象泉拾遺骸以歸守剛欲夜半持去㑹守者嚴不果明日諸兄捧筐至大澤而投清泠之淵守剛尤痛憤之深俟諸兄還舍解衣入淵中且泣且拾堆置沙上脫所服緼𫀆裹之奔告於先子尚書府君府君命留間房中設几筵使其父之友賈明善徴木造小櫝藏之適堪輿家趙翁自城南來憫守剛之志為擇地一所守剛傭書而買之負土成墳手藝松柏於四周其兄怒以其辱先也欲發而出之豫仲父文友君將挈守剛訴縣乃懼而止至今松柏蓋鬱然成林云守剛諱致柔守剛其字余之所命也傅氏金華好善里人曽大父某大父某父肖說皆農家守剛年十二始入小學時牧牛山澤間輒挾書誦不輟洎長登貞文先生吳公立夫之門當是時來受業者多貴人家子車馬焜煌冠服鮮麗燦然如神人守剛麻衣菲屨厠其間怡然無難色日受公教學識益凝定出言必思力踐蓋粹然儒者也間出為詩若文亦光潤可觀父病守剛往致醫溪漲不可渡守剛立水濱終日望天而泣或憐之以大綆貫腰挾之以渡醫見其情辭悃欵惻然與之還脉已曰此天相孝子也稍緩一夕疾不可為已藥之瘳守剛諸兄不知書競割户自私先業恣其取不與較守剛貧無所於歸出為閭族童子師久漸能自存遂娶天台王教授某之女為配年過四十生男鵬鵬絶愛之頃刻不見鵬鵬意輒不懌時撫鵬鵬頂曰吾之命其繫於此乎吾即死不為餒鬼矣余家潛溪抵守剛所居僅三里每遇正月一日必來謁數年之間風雪不易也家人每具饌以俟且曰傅守剛其將來乎言未既守剛坐㕔事作謦咳聲矣為之失笑守剛忽謂余曰致柔老且死鵬鵬眉娟好似能讀父書果如是目瞑九泉下矣豫自後移家浦陽青蘿山出仕於朝入翰林為學士久不知守剛死生洪武十二年冬余還金華省先墓忽有白面少年拜於庭問其姓名曰我鵬鵬也曰爾何為服衰麻乎曰先人不幸以今年春二月朔死矣問夀幾何曰六十又七矣曰葬乎未也曰死後一月權厝家西東阜之原曰爾今同處者何人曰先母卒二十年女弟鸞亦歸童某今獨侍繼母章氏以居且曰汝頗知學乎乃袖出詩文一巨軸及用經史事賡李翰䝉求三帙以進豫讀之見其遣辭豐縟而考事綜博嘆曰守剛有子矣余既歸蘿山鵬鵬持其父門人童徽所為狀來請曰先人制行一出於誠慤聞人善不翅若已出見人為惡輒攢眉而避并日一炊啜白水以代羮若享太牢鄉人咸以為賢部使者潘公黼聞而薦之先人以疾辭卒落魄不偶以死臨死執鵬鵬手泣曰吾生無功於時死當擇不食之地埋我宋先生最相知得一銘勒諸冡上不翅足矣言訖而終唯先生憐而遺之嗟夫若守剛者安可不表之以厲人人乎為之銘曰守也篤特立乎獨不受變於俗是謂踵君子之躅故裕軒先生墓碣銘并序烏傷之赤岸有望宗曰朱氏出於漢槐里令雲槐里七世孫晉臨海太守泛實自平陵來遷臨海之孫東陽太守恆東陽之孫金威將軍禮亦皆仕於晉至金威之曽孫幼始事齊厯守髙辛平昌潯陽三郡轉揚州刺史揚州十四世孫某有四丈夫子生十八孫知其後必蕃而患無以為之徴周廣順間乃冶鐵作羅漢像人授其一俾散居州境中若今赤岸則其一族也七𫝊至三府君良佑益以建善惇業繼其宗府君生宋鄉貢進士中鄉貢生元贈朝列大夫同知台州路總管府事騎都尉追封沛郡伯杓沛郡之子則朝列大夫婺州路總管府治中致仕叔麒也初縣之先逹徐文清公受業於新安朱文公而鄉貢君乃文清之高弟子三世父子遞相傳授辨析名理密於牛毛治中君兼以文辭馳騁於當時人讀之者若窺古鼎鐘雲雷之文不覺改容易視公諱同善字性與沛郡君之孫治中君之子也賦質迥拔日涵濡過庭之訓學識所至如春芽怒長月異而嵗不同宿學之士皆讓莫敢與為敵時鄉先正文懿許公講道東陽八華山復執經往從焉文懿之學上承文公五傳之緒味道之腴尤為饜飫公質其異同統宗㑹元凡天人性命之本禮樂刑政之原古今治亂得失之迹莫不洞該而參貫逮其所自得神融心悟不翅酣飲上尊而行吟春風之中也㑹科目法行有司强起公以應書不合輒棄去遂倣太史遷為汗漫游涉大江泝黃河東厯齊魯之郊北抵燕薊所過古遺跡必徘徊曕慕而不忍去或發為嘯歌扣轅為節以和之暨至京師諸公貴人爭相邀致而越王聘之益力遂授經於其府中久之思南歸同邑黃文獻公時為國子博士留之不可檄公補廣東憲府掾弗赴僉宣徽院事濟南韓公尤器公之才行辟為兩淮屯府幕屬赴官未數月復謝去還隱丹溪之濱逺近生徒嚮風奔附户外之屨常滿公隨其齊量左右翕張各使之充足而去既老涵養之功愈密四體不待羈而自協清明在躬播為大和薰蒸所及物無悖戾逮將終也絶無怛化之意咏詩二章夷然而逝春秋六十九實乙巳嵗春二月三十日也夏四月九日遂窆於鳯林山原禮也公篤於倫品事親從兄撫姻族接僚友皆可以無愧晚復繕治諸冢舍而刻家乘成書以傳然其局度凝恪處事寬舒而自然中於肯綮略無窘澀之態學者因稱之為裕軒先生云娶卜氏先二十九年卒或勸公更娶公笑而不言蕭然一榻人不能堪公安之教二子世濓世沅為佳士世濓問學蔚茂文焰燦燦起東南間以薦者授釣臺書院山長女文楣適前承務郎溫州路總管府經厯浦陽鄭泳亦以文學鳴嵗時來㑹公坐堂上子若壻旁侍問答經義金舂玉應聽者欣欣忘倦君子歆豔之孫棟亦嶄然見頭角某在幼先治中君羣從兄弟宋季以進士起家者八人聲名文物見重於一時議者以公所藴方之蓋甚無忝者顧獨潛處而弗耀咸嘖嘖痛惜不少置殊不知世都重位天也而身載明德亦天也位能澤物固顯矣德則可以淑人心可以善來學庸非顯之尤者耶天之於公厚矣仕不仕不足為公憾濓游公之翁季間者久何敢讓知世濓以墓文為屬乃序次而銘焉銘曰大道磔裂士習汙只尋聲接迹曲且紆只考亭之學闢九衢只前徐後許直以趨只機籥啓祕皎不誣只日月行天耀經畬只誰其繼者丹溪有朱只重徽疊照契德符只公生其後類神駒只振迅千里流電徂只視彼蹇乘徒崎嶇只終日不越州與閭只揚帆大江涉青徐只泰山髙峙河流殊只𤣥化紛緼塞八區只仰觀俯察理則孚只歸來故居恆著書只直自關洛窺泗沂只下視利祿乃其粗只少微星隕人嘆吁只著辭較德勒碔砆只白石可泐其名弗渝只北麓處士李府君墓碣處士姓李諱士華字庭實北麓其自號也其先家廬陵唐開元中逺祖德靈仕為撫州長史因居屬縣之崇仁髙祖昻宋太學上舍生曽祖緘以春秋舉進士至某官祖適父元德母盧氏處士賦才瓌異音聲如鐘幼喪父母二兄亦蚤世時當宋季亡賴男子學㺯兵於村疃暮夜擊人門鈔掠其資財以去稍與抗直剚以刃處士能自衛卒免其患會宋亡為元更易方笠窄袖衫處士獨深衣幅巾翺翔自如人競以為迂處士笑曰我故國之人也義當然爾府君善治生未幾家大穰遂以資雄鄉里積粟嵗至數千廩遇饑則平價出之飢餓不能出户者計口而周之活者恆百餘人宗姻無業班財以為饋死則給棺槨衣衾葬之善地且恤其遺孤唯恐不及負逋不能庚者茍有所乞輒再與未嘗有靳色或以田廬為償處士正色責之曰先人之業何可廢壞逋尚可紓也慰而遣之伻有盜廩粟者矜其貧益之使去識與不識咸目之為仁厚長者云㑹朝廷有鬻爵之命富家兒多競奔處士恬不以為意客以空名告身來售處士曰吾愧不能以文學干祿位而涉銅臭之譏雖貴奚益哉府君性純孝能事繼母如親母雖其性剛嚴不可近必下氣婉容得其歡心而後止常以不及終養二親語或臨之輒嗚咽流涕晨昏必展謁先祠遇初度之日號慟抵暮家人不忍見因諱言之訓諸子以學親自督視不至夜分不休也為人豁逹大度不少貶以狥流俗見假巫鬼惑人者力斥去鄉人鬬爭齗齗然正歡折以片言則免冠頓首謝嘉賓欵門倒屣出迎歡然無倦容雖不解飲必使盡醉而去元至正十一年辛未正月五日以無疾終夀八十六後二十二年當國朝洪武五年壬子葬於縣之大龍山之原娶郝陳二氏子四人彬鎬鏞蕃鎬以文行舉於朝擢國子正女三人丁師周晉戴尚德其壻也孫三人雍家奴寶定孫女三人尚幼曽孫二人宜夀普蘭曽孫女二人在室自夫仁厚之俗衰學者慨想三代之盛猶神龍游於𤣥間欲一見之而不可得嗚呼豈其然哉人有古今心無古今有如處士之行如前所載茍謂之三代之民孰不謂然處士不可作矣豫故特表出之以勵夫人人然而仕之與否是有命也不必為處士惜也銘曰祥麟威鳯隱而弗彰茍一出焉是為希世之祥謂之有邪則固不能以亟見謂之無邪則簡䇿所紀何為其周且詳吾謂處士為三代之民亦是類耳世之人無徒委之於渺茫緬懷德人中心孔傷今其已矣何日而忘故務光先生張公墓碣銘公諱明卿字子晦姓張氏其先出於晉公族解張因其字張侯故後人以字為氏譜家謂軒轅之裔為弓正而賜姓為張者殆非也子孫家於臨濮世有聞人至宋龍圖閣直學士燾位望尤顯元豐中退居於洛時年七十同太尉文潞公司徒富鄭公為耆英之㑹洛中相傳以為盛事龍圖之弟正議大夫煜建炎初扈蹕南渡遂為天台人煜生武節大夫埏埏生竹山尉巨巨生某官悠悠生某官述述生某官伯熾雖三世仕不甚顯而皆與有祿食伯熾生菜菜生莘夫字某隱約田里間能以詩書自振逮入元朝用薦者為鄉郡儒學正則公之父也公始成童而學正君卒即知家學是荷朝磨夕淬期以自立弦齊林氏素心邵氏皆鄉先生行公執經往從之反覆詰難愈出愈新二氏方毅靳推與咸曰張氏有子矣至大間有詔求直言公慨然為政事書一卷將渡大江凌黃河以獻於朝既而嘆曰吾為生民計耳不知我者以其為干祿乎盍止之於是南還而教授里中終日儼坐不窺户庭鄉之人士至有父子執經於門者傍縣慕其為人聘致為子弟師公亦不辭然天性嚴重有挾貴而驕及習鄙䙝事者公叱之或不能悛輒令束書以歸人曰先生不已甚乎公曰我之道蓋如是也鄧文肅公嘗受業於學正君及為亷訪使者屢遣使致書起公公謝不往公好施與㑹銅錢法廢有人行哭甚哀公問之則曰父喪在淺土吾銖兩而積得錢若干欲藉之以襄事今不用奈何公曰爾勿憂也出楮幣八十緡易之不問其姓名而去甲寅嵗惡道殣相望公嵗暮自黃巖還逢飢者輒豫錢至家則其囊枵枵空矣公恬然不以為意唯見官政有病於民每憤形於色走公府具白之雖不見聽士君子稱焉生平不嗜榮名築幽齊於智山列圖書左右又甃石為山蒔花藝竹遇嘉賓之至抵掌劇談釃酒賦詩望之者猶世外人纎毫塵土蓋不足涴也作為文章珠貫玉聨有臺閣之風時逰戲翰墨筆法穠逸可玩兼善畫竹石韻度清灑頗近文湖州此皆公之餘事至論其學術則一以考亭朱子為宗毫分縷析洞見其肯綮著之事為不易心於賤貧不屈節於名勢綽然能任人師之重是以登其門者皆彬彬雅飭諒而不頗其兄聖卿識見敻異以辭章自豪雖與公友恭無間獨於論辨稍不相合必面頸發赤不明不措公長身疏鬛衣冠整嚴昻然如出林之鶴見者畏而愛之因公所自號務光而稱之為務光先生云其所著有言志藁四卷六藝編六卷存養録十二卷尚友編五卷世運略八卷家傳一卷政事書一卷皆藏於家公娶謝氏後公若干年卒子男四人曰公昌大寧路儒學正曰公顯滁州儒學正博學而能文辭曰公福曰公良女三人皆適宦族王良佐王環趙永其壻也公夀五十有四至順壬申七月某甲子卒之日也公卒時諸孤尚幼逮至正某甲子十月某甲子始克奉二柩合窆於臨海磧嶺之原既已成禮公顯乃奉公同門友于君演之狀來乞銘豫聞天台為靈越奧區所謂金庭玉室璚樓璿臺咸在焉故其下多清修隱居之士若任次龍庾子真是已九原莫作有如公者其殆任庾之流亞歟雖然彼長往山林藐人世如秕穅視公著書立言以衣被於來世者又為何如也孰得孰失必有能辨之者銘曰既有以麗之曷從而蔽之既有以致之曷從而避之胡熙辰之遘而大耋是遺詘伸雖人顯晦則時乃浚洛伊乃達泗沂乃牖夫民彛磧嶺崔白石如脂太史勒辭尚知為務光先生之碑故黃府君墓碣銘豫從烏傷黃文獻公游識公仲子仲華甫進承公話言退與仲華磐桓華川上溫潤如瓊瑶使人不忍厭去公薨世大變甲兵滿天地東西各不相聞及真人起臨濠廓清六合豫入侍講禁林㑹浙江行中書新貢士至有黃昶者來叙世契問之實仲華諸孫復叩仲華何如則作土中人五年矣為太息者久之昶尋從豫入史局幾一載間自撰仲華行狀涕泣請銘仲華名橒仲華字也自幼嶷然有立出與羣童敖步武有度不失尺寸鄉先達韙之暨長撫世酬物悉中權度州里譁然稱之曰能父兄素儒懦疆畎為豪右兼并仲華奮厲致家之肥悉納金贖還自是益敦仁厚行貧而貸泉者不責其息稍弗能庚焚劵示之或有忿鬭者赴訴於仲華聽已指曰爾言曲爾言直皆心服去且曰得黃公片言賢於縣令長十人避兵石門山一婦疲卧荒榛時游騎已迫仲華命媵女扶以奔與諸婦同寢食冦退詢其家歸之然終不識其面性至孝親疾進藥劑無時夜不遑甘寢及沒衣襚棺竁之費咸出於私不忍煩諸兄文獻公剛介子弟鮮得歡心仲華曲盡其承酣觴笑談煦煦如陽春親屬有使酒難近者且愎諫仲華從容白其利害卒至改行仲華行事多類此他不能悉書仲華卒於吳元年三月十一日其月某日葬於崇德鄉平洋原先墓之次夀六十七世系遷移之詳文獻公已見諸圖記曽大父堮宋承節郎元贈嘉議大夫禮部尚書上輕車都尉追封江夏郡侯妣徐氏追封江夏郡夫人大父鑄贈中奉大夫江浙等處行中書省參知政事輕車都尉追封江夏郡侯進封公妣童氏追封江夏郡夫人父漙妣喻氏仲華配室傅氏生子三璨琥瓚女一適劉如圭孫男四永昶庚敏豫惟閥閲之家鮮克由禮有若仲華閒雅整飭抱齊魯諸儒至行孰謂非賢邪豫故特銘之以為聳善之助使人人取則仲華其不為三代之民矣乎銘曰中恬而熙外亷而隅惟義之是隨大振厥家尚質去華肫肫乎無涯有巋者山有冽斯泉靈氣之鬱芉體魄斯安繼以永年故巾山處士林君墓碣銘豫來南京索文者接踵而至多以衰耄力辭一日有持隴上白雲槀相示者勉强一視之彬彬乎卿雲也英英乎巖花靘妍也泠泠乎若幽人狷士飲氷而嚼雪也豫亟問之斯何人之詩也持者跽而答曰宗之先子所賦也先子諱茂濬字顯之姓林氏世為天台望族生平酷嗜吟上自漢魏下逮唐宋諸家無不漱其芳腴挹其真醇積而後發發必竭盡其興趣雖雕胃琢腎弗顧也嘗搆一室深廣尋丈內外以堊塗之白色晃眩若積雪初霽月光穿漏雖赤日如火凉氣亦翛翛然生先子澄坐其中而吟事益暢遇嘉朋至焚香啜茗談古今事上下三千年玉貫珠聨絶纚纚可聽或取雅琴鼓一再行起步白雲縹眇間逺近望之以為神仙中人晚年頗嗜金丹之學取周易參同契與二三友講之嘆曰一氣孔神無為之根水火交搆載其營魂浮游規中存之又存粗穢既澄游神九門奈之何捐棄之邪乃調息致修取心一物一道一之說自呼為三一子通𤣥之士多竒之集賢院聞其操行清絶不樂仕進因其所居巾山以巾山處士號之先子弗欲也吳元年丁未九月二十八日夜漏下三刻大兵下台城先子亟出沒於河年六十又三洪武八年乙卯某月日葬於臨海縣興國鄉慶善里龜溪之原惟先子素行敦飭親仁善鄰具有恩意而所謂白雲槀者尤為時所傳誦墓門有石不肖願圖文鐫之微顯闡幽在先生一揮翰間耳敢再拜以請嗚呼豫為文所纍幾欲燔毁筆硯若而翁者其事有可書如此又安能靳一辭耶遂序其事而繫之以銘處士曽祖某祖某父某母某氏先配杜氏生珤繼室章氏生宗即來速銘者以學行舉於朝授南陽府同知鄧州事遷太原府通判女二杜元昭金仲德其壻云銘曰不豔於榮不徇於聲一以詩名弭其人粗發其天倪龍虎功齊寄情五絃羽衣蹁蹮望之若仙尸解于河其幻則那夀何少多邈哉紫虛有鶴來歸千載之思故姜府君墓碣銘君諱澤字潤甫姓姜氏其先居蘭溪之髦賢祖某父思齊以資雄於鄉環其居五里所凡山若田皆克有之及君之生其父已五十餘越三年父卒又三年母時氏亦卒貪夫欺君之孤弱挾黠𨽻為姦內蠱而外蝕之并吞幾盡君之女兄道真時已歸金華楊某矣間一歸視君撫君頂泣曰姜氏之世不絶者僅有此息爾茍或凶豎欲去之以滅口則宗祀必絶為若敖氏之餒鬼矣夫豈可哉區區資産有不足計也急挾之以歸楊氏鞠育之如己子稍長俾從鄉先生楊夢斗王月溪趙松坡董覺齊游志慮淵冲而識見迥拔遂白於縣大夫復其先塋若干所田若干畞雖僅存十一於千百鄉之人士無不謂君為能者已而女兄命贅於同里之王氏君不忍釋之而去遂舍於女兄西偏挾王同居事之如母與姑每得嘉味必先進不進不敢先食及生子若孫嵗時相率坐女兄中堂羅拜於庭不知者以為真其母姑也君既受女兄卯翼之恩所以思報之者備悉志慮及女兄喪夫而無子為立從子恢道為後而躬扶持之其門賴以不墜雖楊氏之姻黨無不以孝弟忠信淑𨗳之有悖戾者懼之以法令亦翕然聽從君再從姪𢎞道被造僞鈔者所誣𢎞道初不識其人千夫長帥州官逮繫之從者百餘人君聞之大恐走州中訴其故官置𢎞道稠人中命造鈔者執之乃妄曵他男子以前事遂釋丁未嵗祲人相食君往糴七閩時流民所往成羣動以數百計乘間鈔道莫敢何問君獨以計脫卒致白粲來歸六親賴之以濟君頗通刑名家書於新令尤所練習或有致訟者質之為言其利害訟為衰止君晚命仲子遷城中往來嬉遊以書史自娛因以盤隱自號一旦有疾度不能以生因泣謂二子曰吾非女兄不克至於是誓將奉窀穸之事庶幾少盡心焉奈何今且先之爾等他日當有以慊吾志遂暝時至正壬午十月三日也夀六十又一是年十一月十二日葬於西山先塋之側配王氏後二十三年卒遂合葬焉二子曰明道曰懋某孫五人曰焴曰䕃曰溥曰繼曰善焴能積學為名儒以薦者為婺州路儒學録尋舉進士擢永平延安丞孫女二人長適默成先生七世孫潘思明次適陳仁曽孫三人曰麟曰堪曰增嗚呼金華為文獻之邦氣習之所移風聲之所被往往人多士君子之行有如君者不幸遭門衰祚薄之餘乃能聳然自異不踣其家復樂道人以為善而攄急報恩之志尤寤寐不忘夫豈無其故哉傳曰大河東流九里餘潤此蓋從古而然也濓不敏幸與焴同出於聞人先生之門墓文之屬有不得辭其責第深愧者文彩衰弱不足以昭幽廓潛然亦自謂據事直言而無所憾也銘曰孰畀之隆而閼於逢其非天耶一髮之存卒續厥門其非天耶無德弗酬得與善為逑其非天耶發迹詩書有孫為儒其非天耶生遂死安松阡鬱蟠其非天耶卓哉善人延裕於後昆其非天耶故葉夫人墓碣銘山西提刑按察司僉事張孟兼請余銘其大母葉氏之墓凡三年矣豫時供奉詞林日以文墨事上竟弗暇為今䝉恩休致家居而孟兼亦豫告省親道過豫門又復以前事為屬其言極慘戚豫何忍不為孟兼一銘之乎孟兼之言曰大父年逾六袠而未有孫及生孟兼具牢醴饗賢士大夫且曰吾衰矣不意埀歿之年獲抱孫焉於是賢士大夫咸起舉觴為夀未幾大父亡大母見孟兼輒泣尤愛憐之孟兼病創瘍浸淫被體晝夜啼不休大母與乳母范鞠諸房中親為傅藥節宣其食與衣見其學步學言每為喜動顔色已而嘆曰恨不令汝大父見之年十九禮宜授室始離大母左右逰學城南師事聞人先生辨析六藝采刺為篇章久之乃歸大母喜倍於前已而復嘆曰恨不令汝大父見之嵗乙巳朝廷下詔求賢以圖治安州縣不以孟兼為不敏交章薦之孟兼將赴京大母執孟兼手泣而言曰汝大父念汝甚唯寐忘之不幸不見汝之成立汝今欲入官當夙夜盡心以奉公上庶幾不辱於前人老身雖即瞑目無憾已孟兼謹佩服之弗敢違既至䝉恩擢國子録轉主事儀曹遷丞奉常凡厯八春秋屢思謁告覲省動有物尼之洪武五年十一月二十日嚴君以書來曰汝大母以今日終臨終無他言唯曰吾年七十又四分當死百無所歉於中獨惜不與吾孫一相見耳孟兼讀已五內分裂恨不即死相從於地下禮部尚書陶公白於丞相府遂以上聞獲還哭於墓次時大母祔葬大父徐山兆域距卒時已三十四日矣自時孟兼出為今官尋升山東提刑按察副使痛念祿足以充養而大母遽捐館舍䀌然傷心然非辭章無以白大母之行而泄孟兼無窮之悲焉所以不避譴呵而頻瀆於執事者職是故也豫聞之亦為之愴然嗚呼余何忍不為孟兼一銘之乎葉氏諱某杭之仁和人父信母某氏世以種善聞年三十歸浦陽張府君鎮初府君娶同縣陳氏無子葉氏來為之側室性慈惠柔順事陳氏如事姑復好施與逢單窶無倚者捐所有物資之弗靳三族翕然稱其賢生一子垕二孫長即孟兼次善一孫女一某四曽孫鈞朝幹全豫自少齡恆得驚風疾數涉阽危賴祖妣金淑人保抱携持以全性命竊祿熙朝位躋法從常思有以發揚潛德而一時故老號稱能文辭者先後澌盡竟無從求之方戰惕不自寧而孟兼乃惓惓徴銘弗懈亦可謂知其所重而竭報本之誠者豫頗愧焉嗚呼余何忍不為孟兼一銘之乎雖然孟兼以文章政事著聞當世繡衣直指威讋暴彊其大父母雖不獲見亦足以慰九泉之望銘與不銘未足深議也銘曰君子抱孫以其繼宗也斯勤斯恩奚暇計其瘝恫也珠之藏槖玉之藴璞寶之俾有終也為盤為敦光燭於外大顯厥庸也樂石勒銘樹之林塋馬鬛其封也故鄭夫人夏氏新阡碣銘至正三年夏五月豫來讀書浦陽東明山翻閲之倦因默坐木榻上忽鄭君濤喪冠絰帶揖豫而言曰濤妻夏雍字伯熙生十九年即與濤為配又七年不幸以疾終所遺一小兒曰枋始三嵗未能勝薦奠保母掖至柩前教之俯伏枋雖未解事念母不見亦仰首作嗚嗚聲濤見之雖欲以禮制哀不自知涕之從出也言訖泣下數行良久又曰夏氏家本虎林世有顯人雍之曽大父天瑞正議大夫泉州路總管大父若木奉議大夫建德路總管府治中父應孫承事郎兩浙都轉運鹽使司黃岩場監司令司令君娶永嘉陳夫人陳生二女伯即雍季曰穆字叔熙司令君以泰定末來尉浦江遂許以雍配濤以穆配濤之再從弟永後十年二女實來濤家去年十月朔穆既先逝今年五月初二日雍復以一病不起胡天之降凶於濤家者若是忍也雍屢有娠不乳及得枋酷愛之至數易乳嫗猶未慊其意聞兒啼聲中心怦怦然自是遂得驚疾疾既劇㑹司令君卒黃嵓雍復哭之哀逮穆之喪但能悲惋已無力出聲猶日使人視枋惟謹考其行事固無有大異人者然其小心畏慎未嘗一日少懈濤家義聚九世族屬之衆幾二千指雍一以禮遇之族屬之人咸以端莊靜懿稱其賢雍今已矣將以十二月初三日窆於穆之墓北車馬塢濤獨憫其以念子之故而致疾幸先生賜之銘使枋粗有知或謁墓下而讀焉則念母之心將油然而生是先生教枋以孝也言訖復泣下嗚呼雍之事誠若過矣世之人誠以父母愛子之心愛其親庸不謂之孝乎是宜銘之以厲吾徒且以警枋也銘曰母愛之由天衷子報之胡不同倘有人心當省厥躬過是墓者寧不為之改容節婦朱夫人墓碣節婦朱夫人諱則中鄱陽人年十五歸同里句容縣教諭劉斗鳯生三子炳煜燮一女旭貞而劉亡夫人年三十二又二十四年乃終夀五十六夫人自劉歿悉屏脂澤弗御益力家政晨起坐堂上更列傔媵於堂下令之曰爾為某汝為某晚各㑹其成無爽期者然樂於振急遇嵗儉及大雨雪必散粟雖疏材之細亦多藝分給之人有斗升之糴主廩者慵於啓鑰難之夫人罵曰爾飽矣豈知彼懸鍑待炊耶嵗壬辰夫人家燬於兵童御散盡炳提義旅隨大將軍上饒燮又死於厲旭貞適浮梁張子明未幾煜亦為仇家所害夫人間關出萬死獨抱炳子玉珊往依張使玉珊衣垢敝服雜蕘兒牧豎中卒有急令竄山澤夫人身先之每撫其頂泣曰我一家兵禍極矣汝父存亡未可知劉氏一宗若髮懸弗墜者賴汝在爾奈何虎豹又窺伺未巳耶鬼神有知得持汝以見汝父我含笑入地矣言訖衣袂盡濕後四年炳從間道回見夫人相與抱持哭絶而復蘇夫人指玉珊曰吾所以不死者有此故爾炳因迎養新安復遷浮梁竟以疾卒張舍實某年月日也以某月日葬縣東發京鄉之史源銘曰史源之山楊若曵旌有巋者藏太史是銘過者式焉知為節婦之塋文憲集卷二十三
