body:
  text: 文憲集卷十七明宋濂撰神道碑凡八章大明敕賜銀青榮祿大夫上柱國中書平章軍國重事兼太子少保鄂國常公贈翊運推誠宣德靖逺功臣開府儀同三司上柱國太保中書右丞相追封開平王諡忠武神道碑銘洪武二年己酉秋七月七日銀青榮祿大夫上柱國中書平章軍國重事兼太子少保鄂國常公薨于軍中二十三日訃聞皇帝為之震悼罷朝在廷之臣莫不灑泣越明日詔中書定議贈翊運推誠宣德靖逺功臣開府儀同三司上柱國太保中書右丞相追封開平王諡曰忠武八月朔日柩車至龍江上往臨奠慟哭而還親為擇地於鍾山草堂之原營建宅兆及棲靈之祠凡百須之具一給于官不以煩其家至冬十月九日始葬復推恩及其三代皆為王爵生榮死哀可謂至矣上猶念其功不置召臣濂于庭而謂之曰朕東撫髙麗西抵吐蕃北際沙漠南來交趾占城莫不稽首奉命計其開拓之功以十分而言王蓋居其七八朕今手録戰伐次第以授爾尚為文勒諸豐石以著王之功於無窮焉臣濓受詔而退謹再拜序而銘諸幽王諱遇春姓常氏濠州懷逺人世為農家賦性剛毅膂力絶人嵗壬辰羣雄並起江淮為之鼎沸時王年二十有三為羣盜劉聚所得聚覩王狀貌竒偉拔於行伍而信任之王每出戰必鼓勇爭先聚深喜之王察聚所為終不能有成欲擇所依乙未聞上駐兵和州領衆數十人棄聚來歸居兩月餘請為前部先鋒上曰爾之來者為士卒糧絶故就食耳爾自有主我安得而留之王請之再三至於涕泣上曰爾姑從吾渡江俟克太平委身事吾未晚也夏六月上先抵采石磯元兵陳於磯上而磯下巨舟如織相距僅三丈餘猝難登岸王乘快舸相繼而至上麾之使前王即捨舟挺戈先登衆皆披靡遂拔采石乘勝取太平從上守禦乃始授總管府先鋒冬十月升管軍總管丙申春二月元中丞曼濟哈雅復以兵屯采石南北不通上慮將士雖渡江而其父母妻孥尚留淮西勢莫可致命王統兵攻之王至設疑兵以分其勢而以正兵與之合及戰别出竒兵搗敗之悉俘其精鋭自是元兵扼江之勢衰矣尋守溧陽攻建康功為諸將先三月從今大將軍右丞相徐公達克鎮江夏四月授承信校尉領軍先鋒秋九月再攻常州㑹青軍叛去與僞吳張士誠合徐公被圍於牛塘王與諸將力戰大敗其衆擒士誠梟將張將軍冬十有一月除統軍大元帥丁酉春三月遂克常州遷中翼大元帥夏四月從徐公下寧國秋八月克馬䭾沙冬十月取池州戊戌春擢江南行中書省都督馬步水軍大元帥冬十有二月上親取婺州己亥夏四月轉鎮國上將軍同僉書江南等處行樞密院事守婺城尋命攻衢州降之冬十月升僉院十有二月攻杭州庚子夏五月召還京師從徐公拔安慶趙普勝之水寨時僞漢陳友諒揚言援安慶王策其必攻池州以羸弱守城伏鋭士於九華山眀日友諒兵果來攻城伏兵四合俘殺萬餘人六月友諒入太平犯龍灣王共謀擊敗之已而上整舟師襲友諒留王守京師軍民無敢譁辛丑春三月拜江南行中書省參知政事秋七月從上取安慶破江州回守龍灣冬十有一月張士誠出兵寇長興上時駐九江聞報還京師命王往援士誠兵敗俘殺五千餘人壬寅春修安慶城羅友賢搆亂據池州神山寨將與士誠通杭歙震動冬王往攻之癸卯春正月擒斬羅友賢餘黨悉平三月張士誠遣兵圍劉福通於安豐王從上擊之將戰王突入其陳三戰三勝敵兵大敗而去俘獲士馬無算遂同徐公圍廬州凡三月城將下適陳友諒攻南昌王解圍而還秋七月從上率諸將往援八月遇友諒師於彭蠡湖之康郎山王與之聨舟大戰呼聲動天地無不一當百縱火焚僞平章舟風急火熾十里之間湖水盡赤敵將張定邊素號梟猛奮前迎戰王射之定邊中矢走友諒乃退保鞋山諸將以友諒兵尚強請縱其去王獨不言及我師出湖口皆言江流湍急欲放舟而下上知其情命以舟扼上流王應之諸將乃遡流而上舟蔽江面控湖口者旬有五日友諒軍食乏出江求戰王遣火舟火筏禦之敵兵奔潰追北數十里與之酣戰自辰至未不解上所乘舟及王舟皆膠於沙王既脫御舟而已舟被圍復力戰而脫於是友諒中流矢死士卒十萬皆降未幾其臣立友諒之子理於武昌冬十月王帥師討之四面合圍甲辰春二月理銜璧出降荆湖之地望風皆附升中書平章政事秋七月從徐公取廬州八月遂自將兵平臨江之沙坑麻嶺十洞牛陂諸寨進取贛州乙巳春正月克之悉定南安南雄韶州夏五月還兵取安陸襄陽冬十月從徐公克泰州丙午春三月復從克髙郵夏四月淮安濠泗徐宿安豐皆下秋八月諸將攻浙西師次太湖僞萬户尹義等逆戰王擒之直趨湖州之毗山與敵兵水陸鏖戰敵兵大潰遂抵城下塞其四門晝夜環攻之僞丞相張士信悉發境中兵為援屯於舊館出我師之背王統竒兵由大全港入結營東阡復出敵背且填壅溝港絶其歸路士誠知事急出親兵拒鬭王一鼓勝之士誠復遣其將徐義統赤龍船親軍來援王復擊敗於烏鎮冬十月舊館降得兵六萬十有一月湖州亦下遂進圍平江丁未圍之益急士誠收合餘燼猶背城百戰降其將士且盡秋九月始克之縛士誠來獻籍其兵二十有五萬乃加授中書平章軍國重事疏封鄂國進爵上公冬十月復授征虜副將軍同徐公奉命北伐戊申春正月上即皇帝位國號大明改元洪武王與徐公下山東諸郡遂攻汴梁守臣李景昌遁進攻河南敵兵五萬屯于洛水之北將出迎戰王布陳既定單騎執弓矢衝入其隊敵發二十騎攢槊刺王王一箭中其前鋒大呼殺入悉獲其衆而河南諸城先後皆平上幸汴京謀取燕都秋七月徐公與王渡大河河北諸郡又平八月二日燕都不戰而克元君北奔師次太原其守將庫庫特穆爾帥衆來禦其鋒鋭甚王與徐公謀曰我騎兵雖集而步卒未至何以能戰莫若遣精騎夜劫其營其衆可亂衆亂主將可縛也徐公如王言庫庫特穆爾果中傷而遁己酉春正月進攻大同竹貞棄城走河東又平遂西入秦張良弼遁李思齊迎降奉元鳯翔鞏昌臨洮又平夏五月元將伊蘇兵侵通州有㫖命王以所部軍東還拒之遂搗永平過惠州獲江文清士馬以千計至大寧池速遁破開平元君又北奔追至北河俘其宗王三人及平章鼎珠等凡得軍士萬人車萬輛馬三千牛五萬全師還燕次柳河川得疾而薨享年僅四十爾王之為人守謙而不矜有功而無過運籌决勝之方不學而能其從大將軍東征西伐而能遵守節制及其自將兵則所至無不克捷由其智識明而材力雄故施之各得其宜嗚呼若王者可謂開國之殊勳者矣王之曽大父四三府君纍贈銀青榮祿大夫柱國中書平章政事追封開平王諡莊簡妣張氏追封開平王夫人大父重五府君纍贈儀同三司上柱國少保中書平章政事追封開平王諡安穆妣陳氏追封開平王夫人父六六府君纍贈開府儀同三司上柱國太保中書右丞相追封開平王諡靖懿妣髙氏追封開平王夫人妻定逺藍氏封開平王夫人子男三人曰茂曰升曰森皆上所賜名女三人長許為皇太子妃餘皆幼臣濂聞之昔日唐太宗起義兵而定天下當時有尉遲恭者棄劉武周仗劔來從其後輔成唐業而恭之功為多於是生有鄂國之封歿有忠武之諡今王之功非恭所可及上之所以遇王者封諡與之雖同而其王爵之加恩數優渥揆之于唐誠又過之史臣所謂君臣相遇千載一時者豈不異世而同符也哉是宜銘諸貞石傳之千萬世一以昭聖天子埀念功臣如此之至一以著王之勳烈於不朽云爾銘曰聖皇開天豪傑四從龍興而雲虎嘯而風義旗所指山嶽震動飈馳霆舂孰不神竦維忠武王其氣至剛仗劔來從飛渡大江無堅不摧無敵不碎席卷長驅易如拾芥平吳定越帖荆撫淮威聲所加小大畢來齊魯既寧汴洛亦定直指幽燕不戰而勝元君逺逝六軍倒戈本根既撥何有條柯乃收晉冀乃清秦隴乃徇遼海人百其勇茫茫朔漠灤河所經誓將剗滌邊塵弗驚王之忠精上貫天日煜其有光亘古不沒幅貟之廣漢唐莫過馬蹄所及王功為多十五年間百戰百捷備殫勤勞光輔帝業翊運之勳靖逺之威在古或罕于今見之大功埀成王忽長逝當寧興哀如失一臂爰加恩寵用鍚王封衮衣繡裳照耀泉宫天子曰噫未慊朕志其推爾爵上褒三世死生哀榮孰可比焉王雖云歿生氣凜然鍾山之陰隧道有石詞臣勒銘垂示千億大明敕賜榮祿大夫同知大都督府事兼太子右率府使贈推忠翊運宣力懷逺功臣光祿大夫湖廣等處行中書省平章政事柱國追封蘄國公諡武義康公神道碑銘有序皇帝即位之三載混一華夷聲教所被罔間遐邇梯山航海奉贄獻琛上念熊羆之士不二心之臣東征西伐宣勞有年方將胙土分茅以定功賞而都督康公薨于陕州上聞之嗟悼不已既敕有司穿土作室以寧體魄復欲昭其功勳於悠久詔翰林學士臣宋濂稽諸簡牘所書文於堅石以垂示於億萬載臣濂謹按公諱茂才字壽卿康其姓也世為蘄州人曽祖文廣皇贈中奉大夫中書參知政事護國追封京兆郡公祖德懋皇贈資善大夫中書右丞上護軍追封京兆郡公父壽皇贈榮祿大夫同知大都督府事柱國追封蘄國公母蕭氏追封蘄國夫人公當元之季四方雲擾未幾蘄州陷公結義旅以捍蔽為務授以長官俄遷為鎮府同諸將復九江搗蘄水黃連寨轉蘄州路同知總管府事屯戍和之裕溪太平之采石使者考其功狀升淮西宣慰副使同知元帥府事又升宣慰使都元帥嵗乙未六月上帥師渡江將士家屬尚留于和州上慮公扼采石之衝弗獲渡時出兵挑戰公兵雖寡而以寬𢎞得士卒心故臨陳人多效死於是數戰不克後數月常忠武王遇春遣游兵虛撓之公連日發軍以應王度其力疲夜設伏兵質明殲其精鋭殆盡然猶收合潰散堅寨於天寧洲眀年二月上命諸將以襄陽大炮破其寨公奔行臺便宜升淮南行省參知政事甫踰月上亦克金陵又奔京口舟師追及之公度天命有歸乃率所部餘兵三千解甲來附免冠頓首言前日戰各為其主今日屢敗天數也事至於此死生唯命茍得生全尚竭犬馬之力以圖報效上笑而釋之仍許統所部兵從征又眀年授秦淮翼水軍元帥守禦龍灣取江陰之馬䭾沙八月僞吳張士誠犯我疆境公驅兵逐之獲其樓船上賜名馬一匹黃金一錠嵗戊戌從廖楚公永安攻池州取趙雙刀之樅陽遷都水營田使兼帳前總制親兵左副指揮使眀年八月攻皖城僞將率樓船出戰公復獲之又眀年六月僞漢陳友諒傾國入寇攻陷我姑孰殺戮我吏民意將窺我南京上召公謂曰爾不疑我乎公復頓首謝上曰汝既不相疑宜作書遣使僞降友諒為內應招之速來仍紿告以虛實使分兵三道以弱其勢友諒果如所言暨至諸將同公奮擊大破之縛其士卒二萬有幣帛白金之賜嵗辛丑八月上怒友諒來寇率將士親征公領舟師行擊安慶破江州僞都友諒西遁遂下蘄州興國漢陽公沿流而下克黃梅某家寨十一月取江之瑞昌敗友諒八陳指揮友諒之勢遂衰遷帳前親兵副都指揮使明年九月復龍興又明年攻左君弼於廬州四月友諒圍龍興上親往援公與諸將皆從友諒聞上至亟解圍還七月大戰於彭蠡湖軍聲嘯呼湖水為之起立浮尸蠢蠢動至數十里友諒遂至敗亡又有幣帛之賜十月上親征武昌公從之嵗甲辰二月下之友諒之子理銜璧出降三月進金吾侍衛親軍都護府副都護四月從大將軍徐公達洊攻廬州七月下之八月拔安豐繼取江陵及湖南諸州加賜幣帛眀年二月改神武衛指揮使五月進大都督府副使閏十月士誠兵犯江陰京口上帥大軍水陸並進公在行中及至鎮江士誠兵已遁又眀年正月追至巫子門擊敗其衆獲士卒三千公功為尤多四月搗淮安之馬邏港拔其水寨復獲士卒與艨艟無算淮安平七月遂攻湖州十一月破之進逼姑蘇姑蘇士誠僞都即遣鋭卒死迎鬭大戰尹山橋公持㦸督戰益力鋭卒盡覆乃進圍齊門刀劍林立飛鳥不敢下大將軍命諸將合攻之吳元年九月姑蘇平公取無錫州十月升同知大都督府事兼太子右率府使進階榮祿大夫洪武元年上以江南之地既入版圖乃遣大將軍經略中原公從定齊魯之地復由黃河取汴梁下洛陽駐師陕州規運饋餉造浮橋以渡大軍鎮河中善撫綏遺民為之立石頌德絳解二州則公所招徠蔽遮潼關秦人不敢東向二年復從大將軍征漢中奉㫖還軍中道因疾而薨實八月之三日也年五十有七上下羣臣議贈公推忠翊運宣力懷逺功臣光祿大夫湖廣等處行中書省平章政事柱國追封蘄國公諡曰武義卜以九月二十一日葬於應天府上元縣鍾山鄉之幕府山上親臨奠而百司繼之祭幄相望聯絡原野時人以為榮公娶方氏追封蘄國夫人繼室田氏封蘄國夫人側室朱氏余氏子男三人鐸田氏出鑑朱氏出鎮余氏出公通經史大義事太夫人以孝聞輕財仗義意氣磊落而尤有志於事功值元祚將終其才弗克盡施然而真主龍飛於羣雄之中公即能識之卷甲韜戈率衆臣附坦然而不惑可謂上知天命下體人心者矣由是昭被寵眷倚之以心膂用之為爪牙十餘年間屢從征討茂績竒勳著稱當世存則安富尊榮加以爵位薨則疏封賜諡賁及九泉令名埀於竹帛重祿延於子孫公其可以不朽矣臣濂謹拜手稽首述辭于碑系之以銘深懼不足以稱上報功之意銘曰於赫大明受命于天如日之升照于八埏其一于時康公江險之恃大軍西來視如平地其二巨炮轟雷物莫敢攖何戰弗潰何守弗傾其三天人攸歸勢何敢抗知幾先來率衆內嚮其四皇帝曰嘻有附匪疏豫開誠心遇爾不疑其五爾礪矛鋋爾部士卒助豫四方以寧萬國其六公拜稽首賜死為生誓殫報效如無餘齡其七孰不為庭率師往討矯如翼如風馳電掃其八東吳西楚蹴陳駕張身經百戰凶豎始亡其九大將北伐同取汴洛出鎮于蒲恤其孤弱其十蔽遮河潼以義為關誰敢操戈睥睨其間其十一元龜負碑以頌遺愛民亦何心恩義斯在其十二從伐漢中迢迢西征有命班師中道而薨其十三帝念將臣血戰之苦將酬其勳錫以茅土其十四孰不壽考以樂承平公胡嬰疾隕魄泉扃其十五帝情憫悼恩命絡繹穿山為堂畢兹窀穸其十六名埀於史祿延於家翩然而逝公復何嗟其十七史臣造文大書深刻以昭公勳有永無極其十八大明敕賜故懷逺大將軍僉江南等處行樞密院事贈榮祿大夫江西等處行中書省平章政事上柱國追封梁國公趙公神道碑銘有序故懷逺大將軍僉江南等處行樞密院事趙公之薨距今已十寒暑褒恤雖頒而墓隧之碑未樹其子懷逺將軍同知金吾右衛親軍指揮使司事獻請于大都督府移文中書中書下其事禮部於是尚書臣凱侍郎臣魯具以事聞上可其奏詔臣濂撰文而臣某書篆以賜之臣濂等受命震惕深懼不足以稱上意退考諸功狀而序之曰公初諱某今改賜德勝姓趙氏濠之鍾離人曽大父小乙府君妣時氏大父省二府君妣王氏父諱仁贈懷逺大將軍同知指揮使司事輕車都尉追封天水郡侯妣李氏封天水郡夫人公世為良農家狀貌魁偉有膂力尤能馬上運槊捷疾如飛人不敢猝近嵗壬辰江淮俶擾州縣簡拔梟鋭為義兵竒公勇悍選為羣隊長公年甫二十有八帥衆接戰必操蝥弧以爭先蹈湯赴火有不暇恤敵人望而畏之然棲棲在下列無有旌其能功者乃走西營謁歸德王莽格𨽻麾下稍久察其馭軍無律絶類兒戲又欲擇豪傑而依之倀倀未有所歸嵗甲午大明皇帝統領大將南征駐軍滁陽公聞母夫人在軍中秋七月戊寅遂棄其妻來從及見上轅門喜獲騎將遂賜以今名命為帳前先鋒已而從上取鐵佛岡攻三汊河口破張家寨克全椒後河六丈大樹諸寨尋出師援六合左股為流矢所中幾至危殆上親臨視焉嵗乙未之春閏正月剗雞籠山羣盜與僞將韓溥酣戰直搗烏江下和州而含山次第平三月夜襲陳額森營戊申額森來侵力出鬭却之夏四月庚申拔板門寨五月擊長官寨遂取儀真上録公從戰之功超授忠勇校尉管軍總管府先鋒六月丙辰復從上渡大江時元兵屯牛渚劍槊如林常忠武王鼓勇先登而奪其營諸將乃下太平連攻蕪湖句容取之秋七月辛卯克溧水八月破溧陽公皆有功嵗丙申春二月元將曼濟哈雅闞大兵南渡擁兵建柵於采石磯以斷淮西之路維時將士家屬皆在淮西上每慮其心動洊命忠武王帥師攻之公亦在遣中乃以疑兵分其勢然後出正兵與戰短戈方接竒兵遽起而乘之元將大敗而遁三月乙酉大破陳額森營於方山庚寅下金陵公之績為諸將先丁酉上命徐魏公取鎮江公副之破貓獠軍水寨夏四月下丹陽金壇五月平宣城兵鋒所及勢如破竹而所向無前矣轉承信校尉領軍先鋒六月取廣德秋七月破僞吳張士誠水寨九月復從忠武王攻毗陵㑹青軍叛與士誠合圍魏公於牛塘王與公大敗其衆擒其梟將張將軍嵗丁酉春三月壬午取毗陵時豪傑雄爭而民心無定向曽未幾何廣德宣城叛公復取之夏六月戊辰取江陰秋七月丙子攻常熟張士德出挑戰公麾兵而進士德就縛士德士誠之弟也遂征甘露望亭無錫諸寨嵗戊戌春二月公從大將攻湖州已而宜興叛秋七月公復取之嵗己亥夏四月擢懷逺大將軍中奕左副元帥五月攻池州取青陽石􅀈當是時安慶實為荆楚咽喉之地勢不得不取秋八月公攻之已而取無為潛山冬十有二月復從大將征杭州嵗庚子春三月還南京㑹僞將朱暹來攻宜興公帥師為援即搗退之夏五月僞漢主陳友諒以重兵襲我太平境直犯龍江皇上震怒命諸大將分據險要授以成算而命公守虎口城虎口城龍江第一關也既而友諒兵大至兵陳既交殺傷相當而伏兵忽起山坳友諒兵大敗擒戮無算遂復太平秋八月下銅陵之臨山寨冬十月掠黃橋及馬䭾沙嵗辛丑春二月征髙郵夏四月升後奕統兵元帥秋八月上親率六師伐僞漢以報龍江之役公從行道經安慶攻破其水寨遂乘風直泝小孤山抵九江九江僞漢都也距九江五里所友諒始知意謂神兵自天而下友諒宵遁遂克九江獲其玉研華蓋日月旗等物公復分兵攻黃梅廣濟冬十月克瑞富臨江安吉諸州復回師攻安慶下之十有一月壬申進克撫州友諒既遁謀移都武昌公承命攻其沌口埧嵗壬寅春正月從上征南昌兵至彭蠡湖南昌降三月取新淦州已而祝某康泰據南昌叛殺守臣葉琛公率精甲從魏公復其城夏四月甲午城破公左肩為炮所傷久之乃瘳上壯其為人超授僉江南等處行樞密院事羅友賢據池州神山寨以叛冬十有一月公與忠武王平之僞漢餘黨建柵南昌之西山號為八陳指揮十有二月公從趙將軍破之俘獲三千餘人江右州郡雖已附往往觀望狐疑未即决嵗癸卯春三月臨江吉安富州三城叛公皆先後統兵復之上以南昌實西江重鎮襟江帶湖控荆引粵非宗藩不足以授綏定之寄於是詔皇姪大都督授以節鉞往蒞其地而公實統精兵受節制夏四月壬戌友諒帥強兵十萬攻圍南昌癸亥公統步卒數千闢城門迎戰僞將金指揮操㦸直前公彎弧一發應弦而仆敵氣大挫而退明日復合自是晝夜環攻城友諒親督促之勢在必取公贊畫祕計分命諸將隨方應敵剪獲甚衆六月辛亥公巡城至東門敵發蹶張中其腰膂箭深入約六寸公即拔出之且撫髀歎曰吾自壯嵗從軍傷於矢石屢矣其重無踰於此者豈命也夫然大丈夫死即死耳復何憾所恨者不能從主上掃清中原稍效微勳埀令名於竹帛爾丁巳遂薨於私第年三十有九軍中涕泣相弔上聞之悼惜不已遣使者來致祭冬十有一月其子獻護柩車至南京以內子葬于牛首山安德鄉下堡之原上念其功復命典謁者􅉠以布帛菽粟有差嵗甲辰春三月遂命獻代領其衆秋九月下中書議贈公榮祿大夫江西等處行中書省平章政事上柱國追封梁國公敕有司建廟南昌嵗時祭享嵗戊申正月乙亥上即皇帝位國號大明建元洪武追念開國元勳皆命配享仁祖淳皇帝廟廷公位居其八實異數也公為人沈鷙而簡默剛明而質直馭下嚴肅一號令之加旗幟為之改色是以戰無不勝攻無不下及從大將征伐尤能恪守軍令不敢違尺寸君子以此多之生平雖未嘗讀書隨機應變其智如神動與古名將合兼之臨難不懾奮弗顧身而於孝友之道尤為篤至信所謂間氣所生之良將也公娶王氏因公來歸歿於軍追贈梁國夫人繼室朱氏先公若干年卒子男一人獻王氏出也臣聞之龍蛇起蟄山澤通氣與運相值有開必先此古今通義也惟我皇上龍飛臨濠建萬世不拔之基一時將帥大臣多其鄉里之俊如趙公者亦一人也蓋昊天有成命既生聰眀睿知為天下君必有賢臣經綸而翼衛之此意已定於冥冥之中久矣公自壯嵗從戎何役不隨何戰不與所以輝耀其威靈者亦云至矣使假之以年勳業炳朗當不止於斯惜乎不見海嶽大歸於一統也其亦命也夫然而聖恩滂沛追命錫爵既備極於寵榮有子能令亦足上承宸渥宿衛殿庭公之不沒者蓋有在矣古者諸侯計功稱伐書之于太常勒之於彛鼎以示其不忘是用上遵詔㫖備書公之勳績繫之頌聲以昭示承休於豐碑焉頌曰洸洸將軍川嶽之英捷如俊鷹金瞳鐡翎臨風一擊百禽震驚當元季世四海雄吞繽紛戰塵白晝翳昏執戈而興拏風躍雲真人龍飛届滁之陽單騎來歸願備戎行帝曰俞哉羣慝爾攘元有將臣牛渚駐師公揚靈旗隨帝殄夷拔其水營雲散鳥飛于時羣豪割邑據都伐木建柵壅川為瀦視帝指呼是剪是屠孰為最強犬牙其中僞漢居西狂吳在東登我叛人軼我疆封無征弗從有戰必先斬將搴旗電逝飈旋敵人畏之縮衄莫前何彼凶殘犯我龍灣公扼虎口屹為雄關六軍奮呼殺人如山帝乃誕怒肆行天誅公時在行勇若虎貔俘厥寶玉僞都為墟胡不爾思復攻豫章恃其氷山以凌太陽公亟出遏殪彼豺狼堂堂晝巡出其東門不虞飛矢竟斃其身軍中慟哭於夜亦聞天祐大明實生俊英雕戈淑旗統馭萬兵胡命止斯不觀厥成天聲四震漢踣吳摧中原既定四裔畢來使公之存績用益恢天子念功禮備褒旌錫爵上公配享廟庭命書絢爛榮賁泉城牛首之山有墓在原禮官奉詔表此武勳以鴻厥慶以示子孫大明勑賜開國輔運推誠宣力武臣榮祿大夫柱國廣德侯加贈特進榮祿大夫右柱國進封巢國公諡武莊華公神道碑銘自古興王之際天既生真人拯民塗炭之中必有如虎之將𢎞展其丕猷弼成其大業此如燭照而龜卜蓋無疑者以漢唐言之則雲臺二十八將凌烟閣二十四人是已洪惟皇帝當四海逐鹿之秋龍飛淮甸噓陽吸陰反掌之間廓清八極夷荒蠻徼罔不臣妾當是時謀臣猛士效忠宣力其衆如雲若和陽華公亦其一人也歟公諱髙姓華氏字則未聞所謂和陽則其所居之郡也曽大父汝德贈中奉大夫湖廣等處行中書省參知政事護軍追封武陵郡公曽祖妣張氏追封武陵郡夫人大父某贈資善大夫湖廣等處行中書省左丞上護軍追封武陵郡公祖妣張氏追封武陵郡夫人父德新贈榮祿大夫湖廣等處行中書省平章政事柱國追封澧國公妣童氏追封澧國夫人公之生也挺然有英氣人見之者咸曰是子異日必亢厥宗及壯其材果超羣類不屑屈人下同黨多嚴憚之至正中天下大亂所在冦盜乘時為患害屠劉其黔黎蕩析其室廬剽敓其玉帛公慮蹙迫州境即於募居黃墩結集水寨召所強丁淬礪刀劍晝夜為禦侮計練閲有法暗合古之將略遐邇聞者多荷殳相從于時帝初起兵臨濠智勇之士雷動而霧集公遂帥衆而來𨽻于麾下及大兵飛渡長江進克采石繼攻蕪湖駐溧水而定建業搗京口而下江陰公皆從諸將建立竒勛㑹張士誠據有淮浙數州之地肆為不恭侵軼邊陲帝乃震怒遣大將出師討之公復在行摧敵於舊館陷城于姑蘇拓土于淮東其功號為尤偉蓋公自從軍授以先鋒之職八轉至榮祿大夫湖廣等處行中書省平章政事逮夫大統既集帝念將帥百戰之勞定功行賞上則公爵次則侯封各錫以鐡劵金書傳示子孫俾世其祿於是授公開國輸運推誠宣力武臣榮祿大夫柱國封廣德侯食祿六百石公未及受劵請命往廣海巡視城陴整飭軍隊行次崖州以疾薨于官舍年五十有九實洪武四年三月二十七日也訃聞帝懷悼不已詔有司迎公之柩以是嵗六月某日還葬於黃墩先墓之次藏劵墓中以慰公於九泉且進封巢國公諡曰武莊階加特進勳加右柱國褒崇之意無不備至公一子景春蚤世竟無嗣續其配澧國夫人蔣氏先薨至是與公合葬焉既葬禮部以聞帝若曰其令國子司業宋濂製為碑銘樹諸神道尚書臣陶凱即日傳命授臣臣不敢辭臣聞傳記所稱用世之士非才勇為難而炳於幾先者為難公當羣雄疊奮之時亦欲以扞障自效見帝之真即知天位之有在人情之所屬統其部曲歡然來歸非有先幾之識者能之乎其建樹功烈安享尊榮爵封上公位躋極品亦宜也雲臺凌烟之衆又豈得専美于前乎臣既厯序公之戰功次第於右復繫之銘辭曰士之所貴炳于幾先誠獲所依身名兩全當元之季王綱解紐羣雄虎爭鹿知誰手維武莊公家于和陽依水建寨以遏寇攘皇帝龍興知為真主仗劒相從率先多士帝曰俞哉爾兵我從即麾義旗同渡大江牛渚既殱于湖亦捷溧水洋洋視如一髮天兵載揚翔颷震霆秣陵南徐次第而平况此江陰勢如破竹兵鋒所向無強不衄鄰有勍豎據浙連淮來撼大樹何哉蚍蜉叶皇赫斯怒命將行伐鏟破連營洊除窟穴復敕雄師定淮之東載綏載寧載約其同凡斯諸役公無不與展力攄誠亦云備至天清地寧六合一家大統既定論賞有差黃金鏤書鑄鐡為劵作誓剖符千齡弗變皇恩下被將膺寵榮訃來海南聞者涕零宸𠂻憫惻為詔郡縣旋其柩車就鄉而窆崇階峻爵極于上公龍光有赫賁及幽宫儒臣作銘播揚嘉績百世之下視此貞刻元故嘉義大夫禮部尚書致仕贈資善大夫江浙等處行中書左丞上護軍追封譙國郡公諡文節汪先生神道碑銘濂奉敕總修元史凡忠義循吏之事天下郡縣悉上史官而宛陵汪先生獨闕既而先生族子克寬來與纂修始以其門人汪文炳所托事狀相示濂既命史官刪削立傳克寬以為史乃一代成書其法當略墓文乃私家所撰其紀宜詳復致其孫德垕之言請濂揭銘于隧上嗚呼先生之德之盛海內孰不知而所讞錢珍之獄泰定實録中嘗書之其可不備載以昭示方來乎先生諱澤民字叔志姓汪氏其先新安歙縣人自唐以來為官族五季之初兵馬使都虞候道安始自歙遷婺源之還珠里又厯八世至宋天禧己未進士祕書丞贈光祿少卿震生慶厯癸未進士都官員外郎贈中大夫宗顔都官生皇祐壬辰進士左奉議郎知漢陽縣贈少傅穀又自婺源遷饒州德興之龍溪少傅生贈通奉大夫槃崇寧癸未進士正議大夫端明殿學士藻藻以文學政事為時名臣通奉生紹聖丁丑進士朝散大夫江西轉運使愷知合肥縣贈中散大夫慥又自德興遷宣州之宣城子孫遂為宣城人中散生紹興庚辰進士通判隆興府鴻舉鴻舉之弟修舉則先生髙祖也曽祖諱宰臣贈朝奉郎祖諱夢雷淳祐辛丑進士纍官知靖州元贈翰林直學士亞中大夫輕車都尉追封新安郡侯父諱鼎新用父廕補將仕郎元贈嘉議大夫工部尚書上輕車都尉追封新安郡侯工部之兄鼎亨景定壬戌進士官池州大軍酒庫然自少卿至先生奕世科名蟬聯不絶先生自幼融通經史亦鋭然思繼承之㑹科目之法行遂領延祐甲寅江浙鄉薦上南宮不利有司用恩例署寧國路儒學正暨再舉遂擢戊午進士第授嶽州路同知平江州事階承事郎時先生之母譙國郡夫人王氏春秋已髙先生以平江道逺不可迎養上書丞相府乞降一二階就銓鄰州不報竟奉太夫人之官州有健民曰張以利餌長吏持其陰私使不敢問遂視閭井民若蟣虱頤指氣使輒奔走不暇稍忤其意即繫送于官人懼呼為張雷公先生曰弗治我民將無生即發其姦屛諸蠻夷不使與良民齒李氏有兄弟者三素豐於資季弟未有子而沒其婦傷季之夭也誓終身不再適孟仲利其財數設計撼之婦堅不動乃嗾亡賴男子誣以姦私婦不禁搒掠自引伏先生見其色有寃間行廉察之悉得其情白而出焉轉承務郎南安路總管府推官戍將多爾濟跋扈自用扼有司之掔俾不得詘信其姻家王某為郡府史藉其威尤鴟張無忌擅箠大庾縣令縣令訴諸府同官懼戍將之威相視以目無人發一辭先生毅然捕王下獄㑹監察御史行郡戍將結以厚賂御史召先生於庭詰其獄狀聲色俱厲先生徐曰王之姦賂人所知也御史欲屈法邪御史慙夜半馳馬去王卒伏罪居亡何戍將以贓敗部使者知其故檄先生推讞杖罪之廣州嵗祲民大饑疫癘洊臻死亡相枕藉其毒氣所薰蒸鮮有能生者江西行中書屬先生行振荒之政先生絶無所畏懾命大姓發廪以哺尫羸其病癘方熾者召醫注善藥親走其廬給之活者數萬先生暨從者亦無他虞將還送者歡曰我父母也奈何去之馬擁不能前湖州府判官錢珍挑推官梁楫妻劉氏不從誣楫冒糴官中米殺之獄中事連海比廉訪副使劉安仁逮繫者二百人中書移問者凡六各懷顧忌事終不白先生讞之獄立具時珍已飲藥死詔戮其尸安仁坐受珍賂除名時朝廷遣奉使宣撫江西聞先生名命巡南安章貢二郡事得専决聲績尤著擢承直郎信州路總管府推官丁內艱不赴服除遷平江路總管府推官階承德郎初浮屠甲與鄰僧乙有隙久不相周旋衆約其輸平乙因邀甲飲酒至醉遂寢其室甲弟子沈安素苦甲鞭笞且期速紹其業幸甲宿于讎夜持刀往殺之眀日訴諸縣乙虐於考訊輒誣服獄上先生閲其刀有鐡工氏名召工驗焉曰此沈安刀也逮安一訊即承脫乙械械之嘉定地瀕海朱管二姓為姦利於海中致資巨萬及以他事敗上下受其賂莫敢捕獄久不决先生與總管道童公適至徑縳以來竟籍其家及徴其帳厯備列省憲郡邑受賂之數惟先生及總管名下疏曰不受升奉議大夫知濟寧路之兖州兼管本州諸軍奧魯勸農事磁陽負郭之縣也孔子廟學久不建先生以為風教所繫買地作之殿堂門廡及齊序之屬無不見飭襲封衍聖公職止三品先生以宣尼之胄不可以弗崇上疏請增其秩廷議韙之奏升品為第二錫以銀章居一年政化大行絃誦之聲周達乎西東圜扇之間可設爵羅嘉禾生於縣郊瑞麥孕於洸水君子謂有漢循吏之風焉廉訪使者行部將壓境還曰汪兖州在吾可無往矣至正癸未詔修遼金宋三史拜先生朝列大夫國子司業俾分修兵志及宋理宗本紀史成有上尊束帛之賜已而除集賢直學士太中大夫未數月亟上納祿之請以嘉議大夫禮部尚書致其事先生既歸僦屋以居門生弟子援洛中諸賢故事為築室宛水之濱先生日督諸孫讀書以自娛不知其貧嵗壬辰蘄黃紅巾彭黨祖搆亂其餘孽自徽寇宣州江東部使者道童問策於先生先生語以收人心振士氣築城浚濠儲糧簡卒凡數十事寇再至再擊退之乙未夏六月長鎗叛帥瑣南班程述等挾兵渡江欲犯宣城城中兵不滿數百或勸先生去之民曰先生忠孝人也天必相之當相與守城若果去之吾屬亦隨之爾部使者茂布實周伯琦二公復申民言以為請先生曰昔江萬里寓鄱陽大軍逼城衆皆走散猶坐守以為民望况宣民離合視吾去留吾何忍棄父母之邦乎時軍費不給加以嚴刑弗之集先生從容一言獲鈔一萬錠米二千斛民心翕然欲為固守計屢戰輒屢勝八月丁丑江浙行省參政吉尼哥兒遣兵來援城內恃援至戍守頗懈是夜三鼓長鎗軍攀堞而上城遂陷戊寅僞萬户丁堅使前鋒葛義執先生逼降不屈遂遇害將死罵猶不絶口瑣南班雅敬先生名為具冠衾葬于某山之原得壽八十有三事上于朝贈資善大夫江浙等處行中書省左丞上護軍追封譙國郡公下太常定諡曰文節云先生娶戴氏纍封譙國郡夫人先八年卒子男二人用敬以子貴封敦武校尉常州路宜興州判官用和國子生辟充侍儀司舍人不赴兄弟痛憤不食相繼卒女一人適劉士禮孫男五人德宣以蔭資補官敦武校尉善盈庫副使德垕國子生曲阜宣聖林廟司樂德崇癸巳鄉貢進士湖州路德清縣學教諭德正德進孫女一人適吳愈曽孫男五人禧源𫝊源鳯源書源清源先生軀幹修聳髙準疏髯風裁峻如也其為學本諸六經真知實踐無一不本於道義其奉親也丁工部公之憂則三年獨處於外弗御酒肉每遇諱日悲慟不自勝至老不變事母夫人則板輿方舟迎侍之官熙熙承顔唯恐少違其意婺源三大墓為強家所侵辨理于有司經四十年必復之乃已其事君也一飯不敢忘懷保小民甚如赤子革弊除姦有知殆無不為然於律已則玉潔氷清毫髮之私又無自而入故其至也民戀愛之其去也民慕思之至有為生立祠者嘗重構美章亭於兖賊至不忍焚之且曰此汪公遺澤也嗚呼不知先生何以能致於斯哉由其立心之正不為勢利所誘擇術之精不為不義所屈忠孝大節所以暴白於天下揆古無讓於今無愧可謂不負於科目者矣先生為文不事絺章繪句而義理自足詩亦清婉有魏晉風尤以善書名家單紙片牘人咸藏弆為榮所著書有巢深燕山宛陵三藁傳之於學者當賓興之嵗江南三行省屢聘先生司其文衡士論尤服其精允至今人道之不忘也夫自壬辰之亂四方瓦解其能執節不回者往往於學士大夫見之如余闕之死於舒李黼之死於江台哈布哈之死於台尤號傑然者也有如先生無城郭封疆之守或保身於山澤君子亦未必深議之先生不以仕止為間孜孜汲汲思衛斯民於危亡之際遂及於難非事君無二心者能之乎使人人皆先生若國家其有敗亡之祻乎悲夫系之以銘曰仁皇建科璽書四布濟濟多士雲集川赴猗歟汪公游舉于鄉對揚大庭乃第奉常筮仕遐邦不遑將毋上疏廟堂願從近授孝聲載昭如水東馳公聞曰噫吾分之宜鋤強擊貪鷹隼橫騖去之弗亟我民之蠧疊為理官為獄立平起彼朽骨化而為生魯有名邦待公為政瑞麥嘉禾發為祥應䇿書載登金匱啓封衮斧之寄有詔倚公尋教成均六館咸悅復直集賢進班邇列公曰止哉吾懸我車秩宗之加以華其歸擕笏看山宛水之涘遘時艱屯四郊多疊氓之蚩蚩非公疇依公茍我留執㦸以隨一鼓作氣爭相奮躍刈冦如麻血汚秋鍔孰援我兵夜柝不鳴彼乘吾懈遂無堅城毒霧四塞殺戮以逞執公使降白刃磨頸嚼齒大罵我實王官咄哉賊奴敢正之干公雖遇害之死弗屈孤忠凛然皎如出日事聞中朝當寧嘆嗟節惠易名恩寵有加所貴君子行為民望薄俗瀾奔障之東向非孝無親非忠無君凡百在位視公為人敕賜開國輔運推誠宣力武臣榮祿大夫柱國淮安侯華君神道碑銘自古以來人臣事君始終一心以上承明德所以保勳烈於不刋熙令譽於無窮此丹書所謂敬勝怠者吉是也其或遭時擾攘攀龍鱗而附鳯翼自赴於功名之㑹一旦封重爵享厚祿志盈氣驕唯欲之是從遂致壞法亂政蓋有其初而鮮克有終此丹書所謂怠勝敬者滅是也嗚呼敬怠之間善惡之所由分禍福之所由繫臣某於淮安侯之事不能無深感焉侯諱雲龍字某姓華氏安豐人世為農家圖譜喪不知其先世遷移之詳三代皆以侯貴纍膺贈典曽大父六二府君中奉大夫北平等處行中書省參知政事妣王氏夫人大父七二府君資善大夫北平等處行中書省左丞妣韋氏夫人考子中榮祿大夫北平等處行中書省平章政事妣陳氏夫人侯生二十年元季兵亂挈家避難倀倀無所之皇帝龍興臨濠四方豪傑荷戈雲從侯上謁轅門命為帳前小校當是時人心既歸踴躍用命上帥大軍取滁州元戍將遁去和與滁接壤聞之喪膽繼復取之遂大招舟師渡大江太平父老望旌旗迎降侯後先從征由千户進鎮撫升萬夫長曽未幾何上攻金陵下之侯擒元將李將軍授總管之職尋隨諸將取廣德洊擢統軍元帥僞漢陳友諒據九江為都時侵我邊陲嵗庚子傾國而東陷姑熟直犯我龍江上授諸將方略設伏于險赤幟一揮伏甲盡出大敗僞漢兵侯亦有助戰功後三年友諒弗悛舊惡攻圍我江西上親帥六師往討友諒恐退入彭蠡湖與大軍遇相持四十餘日其大戰凡三友諒受矢斃于舟中龍江彭蠡二役侯在行中復以功升豹韜衛指揮使繼從伐荆州又同征江北郡縣而泰州髙郵淮安次第平轉淮安衛指揮使就留鎮之吳元年丁未大將軍徐達奉詔征中原侯復在行中齊魯既定河南之民簟食壺漿以迎王師暨入燕元君棄都而逃立北平等處行中書省授侯鎮國上將軍僉大都督府事分府北平拜資善大夫燕王府左相兼北平行省參知政事及天下大定論功行賞加開國輔運推誠宣力武臣之號官榮祿大夫勳柱國爵封淮安侯食祿一千五百石前職如故尋兼燕山衛都指揮使時北平新入職方非勳舊大臣不足以厭服之上以侯為鄰郡子且恩遇之深不翅骨肉至親必能為國宣力故特託以方面重任豈期侯昧於理動違邦憲據元丞相托克托大第居之凡元宮龍榻鳯䄄及金玉寶器非人臣可僭者皆用之弗疑已而以其第髙曠菑害屢生復役戰疲之士創殘之民唯新室是圖奢麗過制特甚此猶可也先是元故都破其達官之女多與我師為婚媾幼主尚竄沙漠諜者因倚之偵我事情上眀照數千里外屢敕中書移文北平凡舊任於元者悉遣發江南毋使為民患害侯皆廢格不行及至征鹵副將軍李文忠北征獲間諜數人始知故宦之家有官兵馬司者相率構姦僞作文榜欲為變托姦人以為巡邏之職將焉禦寇此非侯之過歟上猶念其功不忍置于法趣中書諭其盡遣侯仍弗之聽上怒詔內官往厯指其主名諭之侯始不得已奉詔侯自是益怠於政日從事歌舞燕飲遂得羸疾疾寖劇上召還南京以洪武七年六月二十八日卒享年四十又三娶繆氏纍封淮安夫人子二人長曰忠次曰關住女一人以七月十日葬京城之西石灰山之陽上親御翰墨製文一通遣中官致奠焉惟侯奮起戎行出遇真人乘六龍御天從征西方粗著勞效初無獨建竒功駿烈照耀人之耳目然而封以大郡錫之侯爵寵恩之加不為不重矣奈何靡思補報狥欲敗度絶無憂國恤民之心乃知往古韓彭之流怙功自専卒至夷滅皆其自取焉爾所賴聖天子推天覆地載之量保全功臣唯恐有毫髮不至故侯得令終于家享榮名歿世豈非幸歟故事生封侯者沒必加之以公於是勑止以侯禮聊示薄罰可謂仁之至義之盡者也臣濂奉敕撰神道之碑稽諸天理之正察乎人心之公不敢用昔人志墓常法特取春秋直筆褒貶之義勒文穹碑以為千萬世人臣之勸戒云銘曰人臣事君兮猶如事天寅畏是將兮終日乾乾慎終如始兮曷敢弗䖍一或怠逸兮眀命在前侯起戎行兮有力如虎逄時繹騷兮擇歸真主四征弗庭兮無役弗與斬將搴旗兮所向披靡帝用嘉錫兮龍光日殷疏以侯爵兮作鎮北藩兵民二柄兮付之旬宣鞠躬盡瘁兮宜報國恩胡昧爾心兮動違國憲僭侈是崇兮羣生胥怨峻宇雕墻兮朝夕沉湎是非倒置兮大分莫辨皇仁如天兮覆之幬之録其勛庸兮恤之崇之君恩固𢎞兮臣行或虧生弗為善兮死其忸怩春秋直筆兮善惡莫掩萬世取法兮納人于檢墓門有石兮可比琬琰史臣勒文兮以示褒貶故資善大夫廣西等處行中書省左丞方公神道碑銘洪武七年三月某日資善大夫廣西等處行中書省左丞方公歿于京師鍾山里之私第既已喪事而墓門之石未有刻文九年冬十一月其子禮恐公懿行堙沒無傳請于大都督府移文中書中書下禮部於是尚書臣籌以其事聞制曰可遂敕翰林學士承㫖臣濂為之銘臣謹按留守都衛經厯天台詹鼎狀公之行曰公諱珍避廟諱更名真因字貞姓方氏其系分自莆田再遷台之仙居三遷於黃岩遂占籍焉公長七尺狀貌魁偉而身白如瓠有偉丈夫量未嘗宿怨識者已知其為貴人至正初李大翁嘯衆倡亂出入海島劫敓漕運舟殺使者時承平日久有司皆驚愕相視捕索久不獲因從而綏輯之劇盜蔡亂頭聞其事謂國家不足畏復效尤為亂勢鴟張甚濱海子女玉帛為其所掠殆盡民患苦之中書參知政事多爾渚巴勒發郡縣兵討蔡寇公之怨家誣搆與其通逮繫甚急公大恐屢傾資賄吏尋捕如初公度不能繼且無以自白謀於家曰朝廷失政統兵者玩寇區區小醜不能平天下亂自此始今酷吏藉之為姦媒蘖及良民吾若束手就斃一家枉作泉下鬼不若入海為得計耳咸欣然從之郡縣無以塞命妄械齊民以為公民亡公所者旬日得數千久屯不解朝臣察其非罪奏為慶元定海尉使散衆各安其居自時厥後汝潁兵大起海內鼎沸齊國忠襄王李察罕保釐河洛晉冀李思齊張思道號令關陜陳友諒明玉真分有江漢荆益張士誠據淮浙公亦有慶元台溫三郡之地同縣章子善者好從橫之術走說公曰治亂有循環之運元數將極不待知者而後知今豪傑並起有分裂之勢足下奮襼一呼千百之舟數十萬之衆可立而待浙江而上則南北中絶擅餽運之粟舟師四出則青徐遼海閩廣甌越可傳檄而定審能行此人心有所屬而伯業可成也公曰君言誠是然智謀之士不為禍始不為福先朝廷雖無道猶可以延嵗月豪傑雖並起智均力敵然且莫若為主保境安民以俟真人之出斯吾志也願君勿復言子善謝去公自是其官纍遷至江浙行中書參知政事㑹有詔徵兵討張士誠公遂出師士誠知公且至遣其將史文炳呂真統十將軍兵七萬禦公於崑山崑山去姑蘇七十里士誠之僞都在焉文炳真陳兵城中仍以步騎夾岸為陳士誠命游兵往來旌旗數十里不絶氣勢甚盛公曰濱海之地非四達之衢乃復參用步騎兵雖衆不足畏也公舟師僅五萬身率壯士數百趨奣子橋文炳真使十將軍薄水戰矢石如雨公戒其衆持葦席藉塗泥冒矢石急奮夾岸之軍以火箭亂射公燎及鬚鬢橫刀大呼而入殺兩將軍及十餘人軍大潰若禽鳥散去公與壯士追擊趨其中堅文炳真接戰公出入陳中所嚮輒披靡橋左右水騎訖不得成列而岸上軍又敗北文炳真棄馬走亡十將軍溺死者萬計公乃次兵於岸明日又戰七戰七捷直至城下士誠得報遣使者送欵請奉元正朔公還遂以節鉞鎮浙東開治于鄞元之君臣多公之勳復數加爵賞俄至太尉江浙行省左丞相賜衢國公印章昆弟子姓賓客皆至大官當是時今上皇帝龍興臨濠定鼎金陵天戈所指無不簞食壺漿以迎王師上親取婺州而衢處相繼降公曰吾聞順天者昌逆天者亡今臨濠兵精甚所至無堅城此殆天命之所在也逆天不祥即遣子完入侍上喜曰自古英雄以義氣相許當如青天白日事成同享富貴何以質子為遂使完歸公復遣使者願守城邑如錢鏐故事嵗貢白金以給軍資上許之然猶自海道輸粟元都時羣雄方爭上方勵志中原公獨屛蔽江海使者交于二境上唯求庇民而已苖軍劉震蔣英等叛婺州殺首帥胡大海持其首來曰願𨽻麾下衆皆賀獨公不許曰吾昔遣使效錢鏐言猶在耳今納其叛人是見小利而忘大信也且人叛主而歸我即他日叛我又安可必耶遂帥師擊之仲兄中流矢而沒上遣使臨祭且慰撫其遺孤越數載上詔大將軍徐魏公平姑蘇縛士誠獻京師公以久疾不視事又莫府賓客無所陳說失朝賀禮上怒大軍且壓鄞公憂懼不知所為乃封府庫具民數使城守者出迎躬挈妻孥避去海上使完奉表謝曰臣聞天無所不覆地無所不載王者體天法地於人無所不容臣荷陛下覆載生成之德久矣安敢自外於天地敢一陳愚衷惟陛下裁幸臣本庸才處乎季世保境安民非有黃屋左纛之念曩者陛下霆擊雷掣之師至于婺州臣愚以為天命有在遣子入侍于時固已知陛下有今日矣所謂依日月之末光望雨露之餘澤者也而陛下開誠布公賜手書歸質子俾守郡縣如錢鏐故事十年之間與中吳角立皆陛下之賜戢也逮天兵下臨吳㑹臣嘗上書謂朝定杭越則暮歸田里不意今年以來老病交攻頓成昏昧而弟兄子姪志慮不齊致煩陛下興問罪之師方懷憂懼未能自明而大軍已至台溫令臣計無所出雖遣使再三而承詔之師勢不容已是以封府庫開城郭以候王師之至然猶未免為浮海之計者昔有孝子於其親也遇小杖則受大杖則走臣之事適與相類雖然臣一介草莽亦安敢自絶於天地故每自思欲面縛待罪闕庭復恐陛下萬一震雷霆之怒天下後世議者不謂臣得罪之深將謂陛下不能容臣豈不纍天地之大德哉謹昧死奉表以聞俯伏候命上覽表趣公入覲公至京師上且喜且讓曰若來何晚也公即叩首謝罪上以公誠慤遇之特厚每賜宴饗皆與功臣列坐未幾有廣西左丞之命俾奉朝請一日侍上燕坐不能興輿至第則成永疾矣上數遣中使賜問官其二子禮宣武將軍僉廣洋衛親軍指揮使司事完忠顯校尉虎賁衛千户所鎮撫令公得親見之也及公疾革上遣中使問所欲言公指使者中坐良久曰臣荷陛下厚恩無尺寸之功而子孫庸魯絶不知人間事臣所憂者獨此耳幸陛下以臣故曲加保全則臣感恩九泉為犬馬報陛下矣言畢而逝壽五十又六上聞哀憫之親御翰墨為文命官致祭皇太子暨親王亦如之中書省大都督府御史臺亦皆奉上㫖臨祭成禮而去先是公病時嘗屬諸子曰我即死毋歸葬海濱主上遇我過厚可求皇城外之地埋焉且使後人習於理義及是卜城東二十里玉山之原惟吉禮部為奏請上欣然可之於是以某年某月某日葬禮也公世為善人而其父尤柔良人弱之屢致侵蝕父笑曰吾諸子當有興者毋久苦我其後五子果貴顯元季以公之貴得屢贈三代曽祖天成榮祿大夫湖廣等處行中書省平章政事祖宙光祿大夫福建等處行中書省平章政事勳皆柱國爵皆封越國公父伯竒銀青榮祿大夫淮南等處行中書省左丞相上柱國仍追封越國公曽祖妣陶氏祖妣潘氏妣周氏妻兩董氏皆封越國夫人子男五人其二即禮與完其三曰本曰則曰安女五二適士族餘在室孫男六隋大業末海內紛紜汪華聚衆保民據有歙宣杭睦婺饒六州之境雖屢受隋爵及唐髙祖有天下遂封府庫籍民數以歸職方擢為歙州刺史殁于長安其事與公似無大相逺者蓋公以豪傑之姿庇安三路六州十一縣之民天兵壓境避而去之曽無一夫被乎血創其有功於生民甚大然而天寵所被賜官丞轄享有祿食而二子皆列崇階赫奕光著視唐則有加焉於是歷序其故著為銘詩以宣朗國家之鴻烈而及公保民之偉績云爾銘曰元季紛紜羣雄相吞公據海濱志欲靖民黃屋左纛我非敢覬綏定一隅以候真主大明煌煌出自東方天威奮張孰敢不來王乃籍土乃封府庫大開城門委之而去皇帝詔還喜動龍顔卿能庇民朕數嘉嘆卿居海邦倚水為強旌旗揚揚武夫洸洸舳艫數千橫行海中諸蕃畏威莫越其封炳乎幾先能順天命卒全黎元兵不血創何哉暴強驅民鋒鏑酣戰弗禁身乃就殛以此較彼卿實為能爵之崇階祿給子孫天語褒嘉金宣玉奏公拜稽首天子萬壽惟公挺生人中之豪功在三府其惠孔昭華之保歙事與公類至今廟食春秋不廢公雖歿矣德曷忘矣太史銘矣發幽光矣明故資善大夫御史中丞兼太子贊善大夫章公神道碑銘嗚呼是為吾友龍泉章公之墓初豫未識公時輒稔聞其名及公應聘而起同赴于南京同館于青溪同出入禁署以備顧問如是者四三年私竊以為生我者父母知我之志者唯公而已不知公何為棄豫而遽死矣乎有善孰豫相孰知我瑕疵而攻之乎神道之銘公之子特以為屬肝腸百裂其何能綴緝言辭乎相知之深者不為之則鋪張君子之休美不識當屬之誰乎因抆淚而序之曰公諱溢字三益姓章氏處之龍泉人逺祖有曰巖者仕宋以兵部尚書守泉州始家于南安至唐康州刺史及又自南安遷建之浦城及生福州軍事判官修修生光祿大夫檢校太傅西北面行營招討制置等使持節髙州諸軍事髙州刺史仔鈞娶練氏生子十五人其第三子獻誠仕南唐為銀青光祿大夫檢校司徒獻誠生文錫仕宋為祕書省校書郎文錫生都官郎中重又自浦城遷于龍泉子孫遂為龍泉人重生吉吉生順順生公琛公琛生世安世安生舉舉生宗宗生鄉貢進士輔輔生文義文義生用之用之生強宗強宗生煥文則公之髙祖也曽祖諱斯立祖諱格父諱遇孫母某氏公之始生其音如鐘父母疑為不祥幾棄不舉及成童嶷然莊重不習鄉井輕儇態諸兄出應科繇頗為儕類所侵苦公忿曰彼徒謂我弱爾吾不自厲豈為男子耶乃往受事縣官即有曲者舉正理直之衆始愧服比弱冠從鄉先生王叔剛游從事於正心修身之學既又聞金華為文獻之邦間出游以咨叩其統緒浙東憲使圖沁布哈請與語悅之已而改官陕西要公與俱至虎林心忽驚悸力辭而歸抵家父病已革越八日而逝人以為純孝所感至正壬辰蘄黃妖寇自閩犯龍泉公與從子存仁避亂山中而存仁為寇所執公心計曰吾兄止有一息不可使無後挺身出謂賊曰兒幼無所知我願代之賊聞公名方出重購以求及得公大喜賊帥欲問計公正色拒之曰若等皆有父母妻子顧為此滅族事耶賊怒繫之柱以刀磨其脅曰不降者且死公曰貪生惡死固人常情然吾終不為不義屈賊愈益怒曰汝誠不畏死耶公曰死即死何畏乎賊壯之不敢加害公夜紿守者乘間既脫歸乃集里民為兵不旬日擊却之處州府判官以兵來龍泉欲盡誅平民詿誤者舒穆嚕公宜孫實總兵政公走麾下說曰將軍知賊之由乎曰不知也公曰貧民迫於凍餒故相挻而從盜誠得一循吏招輯之民即平民耳今不出此而肆行剪屠是殆揚湯以止沸也不識可乎舒穆嚕公曰善微先生言事幾敗即檄判官毋擅殺舒穆嚕公服公器識留幕下與議軍事其平屬縣慶元及建寧之浦城松溪羣盜公有力焉上其功江浙行省丞相康里公承制授公將仕郎龍泉縣主簿辭不受海寇起黃岩掠沿海郡縣行省命石抹將軍守台城台之寧海民亦為變攻圍台城急舒穆嚕公飛檄召公為援公方退居田里得將軍檄即起曰吾邦非舒穆嚕公人且盡為枯骨今一旦有急正我報德之秋也集趫勇少年數百人晝夜行至城下約內外夾擊賊遂潰海寇亦遁去寧海大饑豪民吳甲蔣乙積粟不糶公言於舒穆嚕公將軍因屬公行縣賑之公至縣即抵二豪罪發其粟賑餓夫其尤困者俾僧作糜食之公還龍泉龍泉亦嵗儉大家有粟髙其直且不發公先以私田易粟貸里人乃行勸分之政民受其惠為多鄰邑青田潘惟賢為盜而龍泉監縣寶忽丁貪虐無狀民因導潘攻縣治寶忽丁棄印走公同其師王剛叔召豪傑與賊戰敗走之縣治遂復行省給銀幣為賞寶忽丁懼棄職獲罪而愧公有功乃謀害公公方贊元帥哈迪爾開府處城未敢發㑹帥府問寶忽丁罪遂結季溪惡少拒命首害剛叔于家帥府檄兵襲擊之寶忽丁遁去於是處之七縣盜皆蜂起行省移舒穆嚕公以行樞密院判官分治處州公謂舒穆嚕公曰松陽小醜不速平將養成大患舒穆嚕公曰唯君處之公乃遣千户曹勝安督兵授以方略一戰盡降之分院上其功行省升承事郎松陽縣尹又辭不受元帥葉君琛攻鄭寇於麗水屢為所敗分院調公及樞密院都事胡君深合討之公與胡君統軍至浮雲賊衆來逆戰並山為長陳兵既接我軍張左右翼夾攻之賊大敗直搗其巢穴賊望見公來拜乞曰我非為寇者待我殱此海蠻即降矣海蠻謂葉君所部海軍也公曰吾不知他特捕反者爾賊為內外二寨公麾兵踰外寨立壁或疑壁於兩寨間非利公曰非爾輩所知我既踰外寨則內寨疑其已降而外寨亦計其疑已二寨相疑破賊必矣壁未完賊突至相持未有勝負公麾竒兵橫擊賊奔北即移兵圍內寨數重下令急攻遂陷之執鄭置諸法外寨亦降行省復授福建行省檢校官尋又改除奉訓大夫處州路總管府判官皆不受南行臺治書侍御史特穆爾喇實分臺于婺長鎗軍叛迫其城治書遣從事楊迪徵師於公公勒所部軍就道長鎗聞公至輒引去省憲交章薦于朝除武德將軍僉浙東都元帥府事又辭不受或疑為要名公曰吾所將皆鄉里子弟使其肝腦塗地而吾獨取功名弗忍為也青田賊吳英掠婺之金華永康東陽諸縣聚衆猖獗公議討之分院乃調兵屬公及胡君與賊屢戰皆敗之賊勢蹙縛其黨張貴李興甫等出降遂昌凶右户閉糶土豪周天覺悉聚殺之元帥胡君往討天覺負固不服久之始請降公曰此賊不殄必貽後患胡君不聽受其降已而天覺果以復叛誅始天覺之未降也執其黨與三百人擊諸獄至是胡君欲盡坑之公執不可得生全者十六七時天下日入於亂公結廬匡山上自號曰匡山居士屬其子曰兵將至矣汝曹其保障州里乎己亥冬王師克處州公又避地入閩中今上皇帝遣使以束帛召公公乃幡然而起與青田劉君基麗水葉君琛金華宋濂同召至建業入見上問勞曰我為天下屈四先生耳然四海紛紛何時定乎對曰天道無常惟德是輔惟不嗜殺人者能一之耳上曰卿等其留輔豫矣亡何擢僉營田司事巡行江東兩淮之境田荒蕪及耕墾者皆分籍之差稅賴之以便公以疾在身者久上時遣使存問及疾小愈即入謁上見其來喜曰疾其瘳乎何遽出也一日上忽念公詢于中書左司都事張來碩曰章溢日來康強否來碩對曰溢日夜念母不置而以主上遇之厚不敢以言鬱鬱成疾耳上即命公歸省賜以白金文綺而留其季子存厚于京師浙東始設提刑按察司即擢公僉其司事尋命還處州代總制胡君入朝而為存厚娶胡君女賜賚優渥且俾存厚入侍皇太子以示親信胡君出師溫州復詔公還守處州饋餉供億規措無缺而民不知勞及師旋即日以總制事付胡君而還其部王師平荆楚設湖廣提刑按察司遷公僉司事公入見上慰勞之曰紀綱之事今屬卿矣公既至覩荆襄多廢地遂建議分兵屯田且以控制北方計為便上曰所言甚善苐未暇耳湖廣行省鎮撫回回怙勢作威輕重人罪以為常公廉得狀坐以法曽未幾河內道按察司宋思顔以浙東憲吏事不白下獄而浙東按察使孔克仁僉事王璹亦以事被逮辭或連公公憂懼不知所為上遣太史令劉君基喻公曰豫素知章溢守法令毋疑也既而胡君以兵入閩陷沒處州之境皆動搖上命升公浙東按察副使往鎮之平陽瑞安浦城福寧軍民等事皆𨽻焉公辭曰臣前任浙東無狀同列皆獲罪而臣獨䝉寬宥今若加升擢則益重臣過疆場之事臣身任之萬死且弗避副使之命臣不敢拜上重違其志命仍僉浙東按察司事比至山寨或已叛公宣布詔旨軍民皆感動乃誅其首叛者餘皆帖帖青田夏清聞胡君敗與福建參政范昌大合寇慶元龍泉時官兵盡戍浦城城中僅足自守公召舊部義兵使據要害列木柵為屯勢相聨絡别命元帥祁興季汶即龍泉縣治亦環植木城賊聞不敢犯公長子存道初以元帥戍浦城及是有㫖命存道提兵為逰擊而公即處城坐鎮之公謂父子相統於律不宜乃上奏請罷存道官不允兵戍浦城者以食不繼為病上以屬公洎浙東行省右丞李公文忠李公欲運處州糧餉公以為舟車不通而軍中所掠糧甚殷請拘入官而均給之兵食乃足青田稅官金甲發其同僚白乙匿官課乙既誅死而甲恣為姦利公訊之甲善口給辨不置公曰汝罪狀已明奈何欲以口舌撓法乎其辭遂屈上知為公所鞫當不寃命斬之建寧守將阮德柔遣使來納欵人咸以為詐公曰陳友定據全閩勢必不能容故德柔為圖自全計非詐也以其事聞詔許德柔以元官守本郡命比下德柔果為友定所並公因留其使厚存恤之溫州茗洋周遂卿恃山險常為寇鄰邑皆患之而郵傳之通平陽瑞安者亦為所要遮公命存道合平瑞總督孫安之兵擒斬遂卿中書命處州造海舟若干艘并僉溪船户為水軍其户凡一千既有領之者而又𨽻于軍府役繁而事擾公上奏設水軍千户所専統之處多山而少田軍需恆不足胡君為奏免唯輸硫黃白藤于朝而行省復有所科公屢以為言罷之水軍千户任惟淵朱仲欽共戍青田會寇至仲欽逆戰而惟淵走還仲欽以無援故敗公斬惟淵以狥遣指揮何世明擊寇走之惟淵乃胡君所任信者既伏誅部曲莫不股栗浙江行省參政朱亮祖總兵取溫州公調何世明以軍從溫州平公聞其掠人子女命鎮撫林理徵之各部送還其家海隅既寧公請朝京師上報曰吾知卿在邊良苦俟平吳當即召卿爾及浙西諸郡皆平上遣使召公且命分兵征八閩而存道守處州公既入見上嘉奬甚至上諭羣臣曰章溢雖儒臣父子宣力一方寇盜盡平其功誠不在諸將後公再拜謝不敢當明日上召問征閩諸將何如公對曰御史大夫湯和由海道進平章政事胡廷瑞自江西入此固必勝然閩中尤服浙江平章李文忠之威信若令文忠帥師徙浦城取建寧此萬全計也即日詔文忠出師如公䇿處州之糧其舊額一萬三千石有畸後以軍興加徵至十倍民不堪命公言之丞相丞相入奏上曰吾勞處民久矣詔從其舊溫州黃宗雲朱君達來附各處以元帥之職還守其土及我師征溫失利輒叛去溫既平君達又請降公曰何物小醜叛而復降納之是無法矣奏戮之浙江行省承詔作大舟入海徵輸巨材檄處州與諸府同公曰處婺之交限以峻險縱有水道何從出且凋敝之民曷以勝此公力言於省臣止之洪武元年正月上即皇帝位有事於太廟公與執事畢越翌日召公及劉君基入見上御奉天殿羣臣咸在上歷陳其功並拜御史中丞公辭不允尋兼太子贊善大夫公務存大體不屑屑於細故或以為言公曰憲臺百司之儀表居其職者當先養人以廉恥使人避而不犯豈直恃搏擊為能哉上親祀社稷㑹大風雨還坐外朝怒儀曹議禮不合以致天變將殺之公奏曰風雨已連朝無足怪者縱禮官議有未盡陛下精誠自足以格神明願寬雷霆之怒上為之霽威上愛公甚嘗語公及劉君曰二先生年同耄恐感霜露致疾善自衛攝不宜早趨朝也存道部鄉兵萬五千從李公入閩閩平詔存道以兵從海道北征公持不可曰鄉兵農人耳始令征閩許以事平歸農今復調之是爽信也上不懌而罷公繼論奏曰兵已入閩者俾還州里昔嘗叛逆之民宜籍為軍使北征一舉而恩威著矣上喜曰孰謂儒者果迂濶哉非先生為朕一行無能成兹事者公受詔遂行比至處州母夫人已歿公馳還舍援例乞丁憂詔不允丞相李韓公復貽書導上眷倚之意而遣存厚還家公灑泣而出日治戒事惟謹鄉兵既稟命存道部領由永嘉浮海北行上章乞如律守制詔仍不允已而章再上上覽之為惻然曰吾固知其情不可奪矣但朕憲臺缺人耳遂可其奏存道至昆山走京師聽進止上諭之曰汝父事朕宣勞為多今汝又帥師北上尚勉立事功以無忝爾父則豫汝嘉因授以處州衛指揮副使戍于上黨尋移平陽公自喪母夫人悲戚過度居常忽忽若無以自存者及營宅兆親負土石而感疾益深子女見之皆相顧悽愴曰勿憂也吾父母幸以安厝祖宗丘墓幸粗整飭嵗時薦饗幸有條序吾庶幾無憾第荷國厚恩未能報效此為歉耳臨終親友何濬來候曰當收斂此心毋有所執滯公曰吾久已知之遂薨於龍淵之私第實洪武二年夏某月某日也享年五十又六訃聞上甚憫悼乃親撰文遣官即其家祭之以其年某月某日葬于某山之原公娶陳氏勤儉恭淑克盡內助子男三人長即存道明威將軍處州衛指揮副使次存誠次存厚女二人長適陳某次在室孫男四人集慶集恭集善集正女二人公性篤於孝友父喪未葬而盜發里閈室廬被焚公稽顙籲天火至柩所而滅事母夫人備極孝養每事必得其歡心與二兄别居已久既創第龍淵請二兄同居以奉母怡怡之情藹如也先世有墓祠曰標慶菴公起其廢一新之且益田供祀事而定祭享之禮命子孫世守之其於宗族里黨患其子弟無所於學則創龍淵義孰延碩師以教之患其死者無所於葬則以玉峰西岡為義阡聽其薶瘞焉又以王剛叔實鄉郡之賢者而石抹將軍能忠於所事即龍泉劍水之陽作祠宇祀之曰忠賢祠蓋凡可以聳善扶義者無不為也公狀貌宏偉器局夷曠而撫世酬物一本於誠一循乎禮義外若和緩而其臨大事則議論爭辨不避權勢必折𠂻於理而後已其與學士大夫談聖賢之道如味飴蜜尤篤尚伊洛之學嘗曰古人為學皆躬行實踐人倫日用之間無非學也今人以記誦詞章為務特學之末事耳故公於章句之習皆不以屑意而於綱常之大端有關於世教者恆切切為人言之生平務在濟人利物嘉言善行人皆能道之不可勝紀也余竊聞之章為東南著姓自五季以迄于宋代多顯者內則兩制八座外則州牧邑宰皆未嘗闕其人親提師旅捍衛鄉州能成其勳名唯太傅公為尤盛閩人至今道之公當元季紛擾羣盜四起磨牙吮血而桑梓為墟公談笑而起皆劓殄之無遺育處之民至今思之於是聲光流顯上致萬乘之知持節諸部執法中臺其功業視太傅公疑若過之此無他太傅之所遭者衰世公之所際遇者有道維新之朝也古人所謂能光前人者公其有焉豫敢評隲公行勒諸堅珉以埀示永久於戲金或可銷也石或可􅘧也公之功不可忘也銘曰五季之亂殺氣昏太傅隻手障南閩西巖結壘兵雲屯狗鼠偷竊方繽紛怒來欲以一氣吞陰功上聞帝為欣敕生蟄蟄千子孫白筍堆床如爛銀匡山繼之譽益振方頥疏髯目電焞㫖吐鴻鬯鍾在軒蚩蚩赤子扇妖氛額抹絳帕手握􅚙嘯呼不異鬼魅羣公起長驅汗且奔一障仡立無邊塵較之太傅功或殷重徽疊照絶等倫大明天子御紫宸濟濟萬國咸來賓束帛往聘東海濱加以祿爵恩寵新庸田使者勞徠勤繡衣行部照青春貪夫宵遁不待晨一朝南徼將星湮括山恍惚失嶙峋狐狸跳舞騁妖神帝曰汝溢汝老臣整汝戎斾旋汝轅公車戾止集吏民導宣威德語復諄有叛命者馘以徇叶坐鎮鄉城如虎蹲大兒浙擊左右巡四郊帖帖多柔訓召還執法居誎垣長跪敷奏披逆鱗萱堂風慘逝驚魂上表陳情達帝閽哀號負土自築墳因劬致疢亟返真聞之孰不淚霑巾公知學術歸一原時㪺濂洛溉本根所以不銼枝葉繁文事武備道乃存黃腸題湊藏山樊大書遺行勒堅珉傳千百載期無諼文憲集卷十七
