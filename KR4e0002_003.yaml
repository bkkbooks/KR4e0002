body:
  text: 文憲集卷三明宋濓撰記凡二十八章閲江樓記金陵為帝王之州自六朝迄于南唐類皆偏據一方無以應山川之王氣逮我皇帝定鼎於茲始足以當之由是聲教所暨無間朔南存神穆清與道同體雖一豫一遊亦思為天下後世法京城之西北有獅子山自盧龍蜿蜒而來長江如虹貫蟠繞其下上以其地雄勝詔建樓於巔與民同遊觀之樂進錫嘉名為閲江云登覽之頃萬象森列千載之祕一旦軒露豈非天造地設以俟大一統之君而開千萬世之偉觀者歟當風日清美法駕幸臨升其崇椒憑欄遙矚必悠然而動遐思見江漢之朝宗諸侯之述職城池之髙深關厄之嚴固必曰此朕沭風櫛雨戰勝攻取之所致也中夏之廣益思有以保之見波濤之浩蕩風帆之下上蕃舶接迹而來庭蠻琛聨肩而入貢必曰此朕德綏威服覃及外內之所及也四夷之逺益思所以柔之見兩岸之間四郊之上耕人有炙膚皸足之煩農女有捋桑行饁之勤必曰此朕拯諸水火而登于袵席者也萬方之民益思有以安之觸類而推不一而足臣知斯樓之建皇上所以發舒精神因物興感無不寓其致治之思奚止閲夫長江而已哉彼臨春結綺非弗華矣齊雲落星非不髙矣不過樂管絃之浮響藏燕趙之豔姬一旋踵間而感慨係之臣不知其為何説也雖然長江發源岷山委蛇七千餘里而始入海白湧碧翻六朝之時往往倚之為天塹今則南北一家視為安流無所事乎戰爭矣然則果誰之力歟逢掖之士有登斯樓而閲斯江者當思帝德如天蕩蕩難名與神禹疏鑿之功同一罔極忠君報上之心其有不油然而興者耶臣不敏奉旨撰記故上推宵旰圖治之切者勒諸貞岷他若留連光景之辭皆略而不陳懼褻也遊鍾山記鍾山一名金陵山漢末秣陵尉蔣子文逐賊死山下吳大帝封曰蔣侯大帝祖諱鍾又更名蔣山實作揚都之鎮諸葛亮所謂鍾山龍蟠即其地也歲辛丑二月癸卯豫始與劉伯溫夏允中二君遊日在辰出東門過半山報寧寺寺舒王故宅謝公墩隱起其後西對部婁小丘部婁蓋舒王病濕鑿渠通城河處南則陸修靜茱萸園齊文惠太子博望苑白煙涼草離離𬎼𬎼使人躊躇不忍去沿道多蒼松或如翠蓋斜偃或蟠身矯首如王虺摶人或捷如山猿伸臂掬澗泉飲相傳其地少林木晉宋詔刺史郡守罷官者栽之遺種至今抵圜悟關關宋勤法師築太平興國寺在焉梁以前山有佛廬七十今皆廢唯寺為盛近燬子兵外三門僅存自門左北折入廣慈丈室謁欽上人上人出三人自為賔主適松花正開開黃粉毿毿觸人捉筆聨松華詩詩未就豫獨出行函道間會章君三益至遂執手止翠微亭登玩珠峰峰獨龍阜也梁開善道場寶志大士葬其下永定公主造浮圖五成覆之後人作殿四阿鑄銅貌大士實浮圖浮圗或現五色寶光舊藏大士履神龍初鄭克俊取入長安殿東木末軒舒王所名俯瞰山足如井底出度第一山亭亭顔米䒥書亭左有名僧婁慧約塔塔上石其制若圓楹中斫為方下刻二鬼擎之方上書曰梁古草堂法師之墓有融匾法定為梁人書復折而西入碑亭碑凡數輩中有張僧繇畫大士相李白贊顔真卿書世號三絶又東折度小澗澗前下定林院基舒王嘗讀書於此院廢更創雪竹亭與李公麟寫舒王像洗硯池亦皆廢又北折至八功德水天監中胡僧曇隱來棲山龍為致此泉今甓作方池池上有圓通閣閣後即屏風嶺碧石青林幽邃如畫前乃明慶寺故址陳姚察受菩薩戒之所又東行至道卿巖道卿葉清臣字也嘗來逰故名有僧宴坐巖下問之張目視弗應時雉方桴粥聞人聲戛戛起巖草中從此至靜壇多咸矜先生遺迹復西折過桃花塢詢道光泉舒王所植松已逰唯泉紺淨沉沉如故日將夕章君上馬去豫還廣慈二君熟寐方覺呼燈起坐共談古豪傑事厠以險語聽者為改視明日甲辰豫同二君逰崇禧院院文皇潛邸時建從西廡下入永春園園雖小衆卉略具揉柏為麋鹿形柏毛方怒長翠濯濯可玩二君行倦解衣覆鹿上挂冠鼠梓間據石坐主僧全師具壺觴豫不能酒謝二君出遊夏君愕曰山有虎近有僧采荈虎逐入舍僧門焉虎爪其顴顴有瘢可驗子勿畏往矣豫意夏君紿我挾兩騶奴登惟秀亭亭冝望逺惟秀永春皆文皇題榜塗以金又折而東路益險豫更芒屩倚騶奴肩踸踔行息促甚張吻作鋸木聲倦極思休不問險濕牒牒據頓地視燥平處不數尺兩足不隨久之又起行有二臺闊數十丈上可坐百人即宋北郊壇祀四十四神處問蔣陵及步夫人冡無知者或云在孫陵岡至此屢欲返度其出已逺又力行登慢坡草叢布如氊不生雜樹可憩思欲借裀褥卧不去坡古定林院基望山椒無五十步不趐千里逺竭力躍數十步輒止氣定又復躍如是者六七徑至焉大江如玉帶橫圍三山磯白鷺洲皆可辨天闕芙蓉諸峰出沒雲際雞籠山下接落星澗澗水滮滮流玄武湖已堙久三神山皆隨風雨幻去西望久之擊石為浩歌歌已繼以感慨又久之傍崖尋一人泉泉出小窽中可飲一人繼以千百弗竭循泉西過黑龍潭潭大如盎有龍當可屠側有龍鬼廟頗陋由潭上行叢竹翳路左右手開竹身中行隨過隨合忽腥風逆鼻羣鳥哇哇亂啼憶夏君有虎語心動急趨過似有逐後者又棘針鈎衣足數躓咽脣焦甚幸至七佛庵庵蕭統講經之地有泉白乳色即踞泉㪺咽衫袂落水中不暇救三咽神明漸復庵後有太子嵓又號昭明書臺方將入巖逰庵中僧出肅面有新瘢詢之即向采荈者心益動遂舍巖間别徑以歸所謂白蓮池定心石宋熙泉應潮井彈琴石落人池朱湖洞天皆不復搜覽還抵永春園見肴核滿地一髫童立花下問二客何在童云遲公不來出壺中酒飲且賦詩大噱酒盡徑去矣豫遂回廣慈二君出迎夏君曰子顔色有異得無有虎恐乎豫笑而不答劉君曰是矣子幸不葬虎腹當呼斗酒滌去子驚可也遂同飲飲半酣劉君澄坐至二更或撼之作儛笑鈞之出異響畏脅之皆不動豫與夏君方困睫交不可擘乃就寢又明日乙巳上人出猶未歸欲逰草堂寺雨絲絲下意不住乃還按地里志江南名山唯衡廬茅蔣蔣山固無聳拔萬丈之勢其與三山並稱者蓋為望秩之所宗也晉謝尚宋雷次宗劉勔齊周顒朱應吳包孔嗣之梁阮孝緒劉孝標唐韋渠牟並隱於此今求其遺迹鳥沒雲散多不知其處唯見蕘兒牧豎跳嘯於凄風殘照間徒足增人悲思况乎人事往來一日萬變達人大觀又何足深較豫幸與二君得放懷山水窟一刻之樂千金不人易也山靈或有知當使豫逰盡江南諸名山雖老死煙霞中有所不恨他尚何望哉他尚何望哉章君約重逰未遂因厯記其事一寄二君一遺上人云宋九賢遺像記濓溪周子顔玉潔額以下漸廣至顴而微收然頥下豐腴修目末微聳須疏朗微長頰上稍有髯三山帽後有帶紫衣褒袖緣以皂白內服緣如之白裳無緣舄赤色袖而立清明髙逺不可測其端倪程子色微蒼甚瑩貌長微有顴眉目清峻氣象粹夷髯四埀過領袍土黃色無緣內服領以白皂緇帽簷髙白履和氣充浹望之崇深伊川程子貌徑實顴微收色黃而淡目有稜角髯白而稍短在頰者尢短而翩翩若飛動帽袍與履咸如明道儼而立剛方莊重凛然不可犯康節邵子色微紫廣顙身頎然有顴特然其下癯骨爽而神清須長過領內服皂領帽有翼圍之袍緇履如伊川聳肩低袖手立而睨視坦而莊和而能恭橫渠張子面圓目以下微滿而後收色黃須少短微濃衣帽類康節履亦如之髙拱正立氣質剛毅德盛而貌嚴溫國公司馬子色黃貌癯目峻準直須疏而微長半白在耳下者亦半埀耳輪闊微向靣幅巾深衣大帶加組方履黑質白絇繶純綨前微下而張拱指露祛外有至誠一德不以富貴動其心之意晦庵朱子貌長而豐色紅潤髮白者半目小而秀末修類魚尾望之若英特而溫煦之氣可掬須少而踈亦強半白鼻與兩顴微齄齄微紅右列黑子七如北斗狀五大二小六在眉目傍一在顴外一在唇下須側耳微聳毫生竅前冠緇布冠巾以紗御上衣下裳皆白以皂緣之裳則否束緇帶躡方履履如溫公拱手立舒而能恭南軒張子姿貌􅀈偉眉目聳秀白而潤豐下少須神采燁然椰冠紗巾道服青皂緣繫以縚履白坦蕩明白使人望而敬之東萊吕子形貌豐偉顔色溫粹眉厚而秀髭淺而直衣道服皂緣冠幅巾躡皂履望之似嚴毅就之如入春風中金華宋濓曰天生九賢蓋將以明斯道也今九原不可作矣濓寤寐思之而無以寄其遐情輒因世傳家廟像影恭以諸家所載作九賢遺像記時而觀之則夫道德沖和之容儼然於心目之間至欲執鞭從之有不可得於戲九賢亦夫人哉葉治中厯官記豫舊與鄭玉待制交聞談括蒼葉侯之政為詳及識屠性山長其言比鄭乂加詳焉最後遇劉文慶架閣其言比屠又益加詳焉三君子皆以文學行義鳴其言侯事已嘖嘖歎咏不少置豫固信之自後出厯侯之所治處父老言其事至有泣下者豫愈知侯之為人有不可企及嗚呼循吏之績不白于世久矣有若侯者其可不謂之賢乎侯名琛字景淵别名伯顔姓葉氏處之麗水人其先有諱宏者宋某年擢進士第官至敷文閣待制太府少卿少卿從弟冠治易有聲嘗兩上南宫生一嗚國子進士進士生正大登仕郎登仕生天與仕國朝為處州路美化書院山長山長生應咸通史學善談古今治亂尤工五字詩有栖間集藏於家候之父也以侯貴嘗纍贈奉議大夫江浙等處行中書省左右司郎中驍騎尉龍泉縣子云侯從幼思有以自立嶷嶷異凡子天厯元年始踰弱齡即北逰京師諸貴人竒其才辟宣使於通政院院事至劇侯一無所懾出使郡國持以潔清長吏每畏憚之事必先集丁外艱而還重紀至元三年補江浙行中書宣使冦起臨漳朝廷命辨章别不花公往征侯在行中出竒計者為多至正元年辨章如京師欲薦侯為京官侯以母春秋髙辭吏部以常調擢侯徽州路歙縣丞階進義校尉丁內艱四年始之官會尹缺即署尹事歙不建録事司城內外民皆縣主治之鎮戍將恆持縣官短長順指而氣使之即不從其禍立至侯不為屈輒搖手相戒曰此健丞不可觸也盜發洪氏冡巡邏吏往驗柩傍得染人帳册一紙乃同縣張來所遺者即捕來搒掠久且無證後一月績溪獲真盜來得釋巡邏吏恐其欣也復嗾盜入之侯匿來他所偽使人服來衣巾出與盜對盜遙見之齊罵曰張來張來爾誤我矣侯乃出來問盜為誰盜對曰不識也來因免去嘉興朱甲僑居縣境衣冠之家或有所燕享必令朱集之一日以毆爭至庭侯熟視曰爾等非盜乎命禠其衣視之兩臂皆被墨刑者縣民與朱狎凡十七年莫有知其為盜以侯為神郡歲貢金以兩計者二千四百七十有五黠民攬其出內之柄髙其估以為利部使者至事輒敗會內藏多金中書命以楮幣相準一年黠民遽賕吏俾文上有司如所估之數他日幸藉以為辭侯恐或傳為例剝民必甚亟言于上官月漸減之俾與時平歙産紙歲輸五百萬吏胥要厚直于民而以亷惡者應官官不受又重賦于民侯察其弊也痛革之憂稅例輸貨錢歙糧不足以給兵食獨易之以粟號曰夏糧民深患苦之侯請以錢米兼賦于軍夏稅得如例行中書聞侯之政辟為掾從右丞呼圗克巴哈公討冦長汀侯贊其行綏徠之令不五月長汀冦平時中書重守令之選內外官多列上矦名九年春轉承事郎處州路青田縣尹自京師給驛之官蓋異數也青田素號難治侯謂非修明學官之政不足以化民下車之初即建明倫堂及極髙明軒禮碩士為六經講師增田三十畝有畸招弟子貟而廪食之月旦望謁先聖先師侯服深衣大帶親與之周旋升降退坐論堂申飭五倫之教懇懇如也吏以官書至侯見印文亷隅太明顧吏曰爾何敢刻偽印邪吏色動侯即訊之吏叩頭伏罪侯曰偽者非止爾汝能引一人以自贖則無罪矣吏喜具簡牘以對侯逮至庭下詰之如詰吏自是輾轉而獲一日間得偽縣印一十有八稅務印一十有二侯不欲食其言悉遣之唯撲其最後者牛疫死者法當聞海溪之地不滿十餘里浹日內民以牒上者二十有三侯疑之問牛死狀民以病腫對侯曰其肉還可食邪抑棄之也民曰焉敢棄之每下其直以歸解牛家耳侯曰解牛者何人民曰有二少年相隨行今猶在縣門東即其人也侯亟命執之少年佩小韋囊于腰侯取視大鐵針一皂角萆麻子各四侯曰此非毒牛具邪解牛者畏侯不敢諱具言以藥淬針針牛牛輒腫不能食死侯怒簿録其家以償死牛者時天下兵動縣地鄰東嘉數有大將統軍來過軍散入市廛剽鹵特甚民畏怖如虎狼前之縣令長莫敢吐氣侯據胡牀坐溪滸具牛酒勞之戒刺船者毋薄岸即薄岸者有罰縣民持梃循岸立以數計者千溪多灘險惡不易渡侯隂令勇卒以俟舟至輒止之侯親帥弓箭夫擊鉦鼓走溪上境內肅然縣多爭訟凡兩造在庭皆羣胥囊槖于家互蠱之以言遂紛紜不可釋因以射利侯杖之懼不敢為姦復刻小緑牌大僅如指來投牒者即細書牌隂令就逮其人往往感悟至中途多分解去吏若𨽻旁視無所容其私幾至訟息部使者余公闕嚴毅慎許可深嘉侯之行事以上尊酒勞侯者再復命侯墾田龍泉召有田之家履畝而實之驗民糧多寡以定科繇滿六斛者役一月多則倍之若集糧事亦視其數為差事成移婺之武義侯墾田定賦一如龍泉有持憲文書來撓政者侯挂之屋壁不啓封信行逺邇凡競土田及爭地不葬親者涉五十餘年弗決一旦悉得其平青田民久徯侯不還相率謁浙東憲府請曰幸還我葉侯自侯之來吾屬無所苦朝夕恆飽食以嬉侯之出二年矣日望其歸有不得也輒相與齎咨霣涕幸還我葉侯請己復造侯庭鴈行立再拜以申前辭言與涕俱侯亦為之泣下觀者皆太息而去暨侯之還縣民具綵舟來迎溪中舟尾相銜百餘里不絶十二年三月憲府以鄰郡有警欲新金華城僉謂非侯不能總其役要復輟以命侯行中書承制升侯處州路總管府判官事聞階轉承務郎憲府力留不遣十三年三月辨章三旦入公帥師平徽饒辟侯為行軍都事使者凡八至然後令侯就道八月師次婺源州州民素熟侯詣辨章乞侯攝州事從之徽國朱文公廟宅燬于兵侯周視歎曰此化基也不可以干戈未葺而弗亟圖遂規運而一新之絲毫不以煩民民大恱歲侵道殣相望時楮幣澀不行侯權令富民賣米以收之復煮淖糜以食飢者日以十斛計侯躬自監分所活者甚衆其所收禇幣侯為言於右丞赫赫公作茶課輸之不欲爽信也十四年侯從辨章還杭時青田吳德􅖤嘯衆倡亂焚掠府庫室人女婦日殺傷無算處溫婺及建寧均被其毒官兵捕逐輒失利十五年六月憲府辟侯攝同知處州總管府事往安定之或勸侯冦情難測當嚴重兵以自衛侯麾去乘匹馬行從以數蒼頭徑至縣縣民柔馴者聞侯至大喜咸從巖穴歸依侯以居諸冦亦出見自首服十月有妄男子謂吳德祥曰葉使君紿爾大兵旦夕且至善為爾計莫若劫使君以自安吳德祥信之欲為變項生留由之頗聞其事急趣侯避之東甌侯曰縣民恃我無恐故來歸吾若去其如彼何飢虎見肉其暴輒止爾冦得我亦然否則必屠戮無噍類吾縱茍活義弗忍為也二人泣去未幾賊黨張惟德吳伯賢等持旗幟刀槊直入縣庭侯盛服出坐聽事問曰爾來欲何為張惟德跽而請曰山中氓德明公厚欲見且久思屈玉趾一幸臨之無他虞也侯曰我行即行爾汝慎毋毒我民也語未畢遂擁侯登舟至黃壇諸賊先後出迎舍侯吳德祥家供張饔餼甚盛時命伶人陳雜戲以娛侯侯終不假以辭色每為陳禍福逆順鑿鑿不少厭羣冦頗感悟十六年四月復椎牛豕燕侯送還州城先是黃壇冦列寨柵百餘氣勢聮絡首尾應援人畏之不敢深入侯留黃壇久隂察冦所出沒悉得其要領喜曰天殆使吾平此冦也侯既歸寤寐亦不忘去時麗水之礲硿青田之廬茨皆大盜所巢有衆號數萬侯謂不剪二冦他日或與黃壇連則勢益大不可制會行樞密院判官舒穆嚕宜孫遣恭謀官龍泉胡君深章君溢統兵討礲硿侯急帥師與之會三面圍合矢石亂下如雨冦出戰大敗擒渠魁十餘人衆欲進殱之侯及二恭謀相謂曰作亂者此數賊耳餘皆良民家因脅逐而至此彼何罪欲使之作虀粉邪乃下令退師二十里俾盡挈妻孥以遁始焚其寨十七年行中書論功承制升侯浙東道宣慰副使僉都元帥府事兼同知處州路總管府事四月侯入沐鶴溪治兵八月遣禆將陳仲珍平蘆茨蘆茨既平冦所俘傍縣子女七百餘侯具舟洎糧命老卒悉護還其家十八年中書承舊階改處州路總管府治中侯帥師討黃壇獲偽將軍李夾等十人三月進攻楊山及黃坑等二十餘寨皆降復引兵圍長坂冦力拒不服食盡乃就烹師遂次髙洋八月冦大懼盡輸玉帛乞助於三恔羣冦率兵七千來援殊死戰侯親領鋭卒至三岱嶺以據其衝調别將夏廷輝衡擊之冦敗北斬首五百級擒三百餘人遂乘勝直搗周奧屯支拗賊黨周寶宋茂等皆遁侯分兵為十道以扼其吭宋茂復同吳德祥别作新寨於洞尖山山下翼以七管竭力死守九月侯命陳仲珍引驍勇卒三千自瑞安出其背擊殺宋茂新寨平吳德祥夜遁退保百丈林冦衆尚餘千皆壯鋭善戰樹大旗出跳鬬鼓聲振天官兵皆甲坐不動賊帥操巨戟突而前官兵大呼曰殺入冦披靡而退擒偽將軍七人至晚冦又遁去遂進焚百丈林火照耀如晝急分兵作三隊追之至篠村吳德祥父子自縊于林中千夫長徐德俊斬首以獻餘冦次第伏誅黃壇悉平昔何易于令建昌善政之可書者不過腰笏代民為刺史引舟耳其次不過剗茶以免𣙜管之病耳又其次不過有事小者勸大者杖而不以付吏耳他固瑣瑣不足紀也職方郎中孫樵尚傳其事至今易于之名在天壤間如祥麟如威鳯人欲見有不可得矧如侯者政行暴著加易于數等可使泯泯哉夫不知人之善不知知善而不能揚不仁余雖不敏頗以文字為職業不敢喑無一言謹以所聞於三君子者著書一通以俟他日傳循吏者宣慰曽侯嘉政記自中原俶擾蔓延大江之東兵連不解殆將十稔今年春三月丙辰西睦州陷夏四月壬午江浙行中書左丞楊公以浦陽與睦鄰也命宣慰曽侯自杭師來鎮其地五月乙巳師還邦人德其善馭士卒而弗擾也思之不置縣達爾噶齊碩裕實布哈君暨婺州路同知趙君大訥因民之思而相與樹碑于縣庭謂濓頗從事於文墨走書來徴記曰浦陽婺之蕞爾邑環以大山長嶺舟車所不通往歲大將趙野遜台首統軍道其間以輜重弗解羽而飛也塗逢農賈及浮屠黃冠師不問能不能以徽纒縶頸使肩之或血流不成出即殺以徇民深患苦或傳有師至咸驚呼曰吾屬將焉免夫亟奔避山谷至閲旬不返曽侯察知民情之驚疑從間道疾驅至縣申飭紀律區分隊伍各從方部以奠其居非有令號不敢妄踰户限仍令勇卒守其四門敢出入者罪隨加焉夜漏既下乃被鐡衣持弓矢從一二騎周巡近郊威加氣讋莫敢少恣一日門者稍怠有竊出捕人魚者痛鞭其長懲之自是無一人敢違命者縣父老相與言曰曾將軍其來矣乎何為使我不知也將軍其愛我也夫又指所統兵而相謂曰彼大纓短製而腰刀其溪洞之軍也夫吾儕小人無所識知頗聞此軍勇鷙遊擊未昜服馴又何其帖帖如是乎脫使他大將如曾將軍我民何至暴露山谷乎咸嗟咨慕咏而去居無何左丞公自將臨睦州檄曽侯還杭以守舊營晚始受命雞初號復就間道馳去每出卒一隊輒用數騎士監之若魚貫若鴈行無敢亂越三日縣父老又相與言曰曾將軍其去矣乎何為來不吾知而去亦不吾知也揆於古之良將善馭師者其亦無愧也乎人有功而人忘之不祥達爾噶齊君縣之賢大夫趙郡丞鄉之達尊曷有以處吾屬乎我等聞其言弗忍違用以其事纍吾子幸有以詳文之濓發書為之歎曰有是哉何曽侯之賢於人也昜曰師出以律否臧凶若如所言其殆師出以律者歟師出以律者吾見亦罕矣嗚呼有是哉何曽侯之賢於人也濓雖不識曾侯竊聞所至以愛民為務今來浦陽會大府有驗畝徴糧之科為之惻然亟白部使者罷之則其及物之功又不特善馭士卒使弗擾而已也濓因弗敢辭為文其事于石然而石可泐也文可滅也曽侯之功簡在縣民之心者千百載猶一日也曾侯尚勉之哉他時登宥府居政路其位益顯其功當益溥又將有鴻生畯儒執筆而特書之曾侯名華字華叟武岡人精悍而有智謀通孫吳司馬法捐家資招兵市馬為國宣力前後屢建大勳今以明威將軍廣東道宣慰副使僉都元帥府事兼江浙行省都鎮撫其禆將天臨李君敞精於騎射贊佐之間多著勞烈亦法之所宜書者也至正十八年夏五月二十一日金華宋濓撰浦江縣新建尉司記浦江尉司在縣西一百步歲久就圮至正庚寅大梁劉師稷以主簿攝尉事始作正廳未成而劉去明年辛卯新安洪在來為尉完之且新其門樓又明年壬辰建廳之前軒暨吏士之舍又明年癸巳造濯心亭屋以間計者若干役功若干糜錢若干濓懼後來者不知其勞也乃文其事于石俾相繼葺之靜學齋記三代以下人物之傑然者諸葛孔明數人而已孔明事功著後世或儕之於伊吕固為少褒或又以孔明與管仲並稱則卑孔明矣以其事言之管仲輔桓公僅以齊霸孔明奉昭烈於艱難之中尺地一民皆奪之於羣盜之手徒以大義震撼天下裂天下而三分之使孔明後死後主足輔復漢之舊疆致刑措之治於孔明何有哉在管仲未必能爾也以其本心論之管仲所陳於桓公而見於行事者皆微權小智雖假尊周為名其意則富強其國而已固君子所羞道也孔明當干戈鞍馬間所與其主論者必以德義為先其忠漢之心至於瞑目而後已至今誦其言想其人真伊吕之亞乎史氏不知其本心謂孔明慕管仲樂毅之為人嗟乎孔明豈二子比哉孔明於聖賢之學蓋有聞矣其所謂學須靜也之言信古今之名言也止水之明風撓之則山嶽莫辨渾天之察人撓之則晝夜乖錯况方寸之心乎古聖賢之成勳業著道德於不朽者未有不出於靜者也蓋靜則敬敬則誠誠則明明則可以周庶物而窮萬事矣茍雜然汨其中偶然應乎事卒然措之於謀為其不至於謬亂者鮮哉孔明之學惟本乎此故其所為當世無及焉至今無有非焉者而又從效慕之區區霸術之徒固不能然也然世之慕古人者吾惑焉古人所以為聖賢者其道德著乎其言其才智形乎功業而存乎册書非徒以其名稱之美而已也茍欲效乎孔明於孔明之所學必無不學也於孔明之所能必無不能也而後可孔明之所學而有未至也孔明之所能而有未能也而曰學孔明何可哉於孔明且爾况乎學孔孟之學者而可徒誦其言乎哉近代之所學者浮於言而劣於行孔孟之言非特言而已也雖措之行事亦然也學者不之察率視之為空言於是孔孟之道不如霸術之盛者久矣欲如孔明者安可得乎錢唐羅宗禮名其絃誦之室曰靜學庶幾慕孔明者余欲勉其成也辨孔明之為學與學孔明之道以告之修慎齋記修慎齋者中書掾葉杞孟堅之所自名也孟堅之言曰杞居括州麗水之陽父母俱存兄弟無故足迹皆不出里門一家之和其祥氣殆可掬而有也頃因鄉里推擇習刑法之學於大府遂充貢來南京季弟孟年實與之偕行朝夕奉承甚謹既而中書選為刑曹史閲一載升為令史父在家聞之有書來曰刑曹決天下之獄獄情萬變爾勿使有寃民朝夕洗心滌慮以承上官不可循一髮私羞服之用當於我乎給之茍違我言必將辱於吾矣自時厥後有從括來者輒致書一年之中不下五十畨書中之言無異於前時所云父猶恐書不能盡達也復使仲弟孟才來致備用諸物且申言之留連再月依依不忍别既别歸吾父問其狀甚悉喜曰爾往終勝簡牘之往還然又不若吾親見爾兄為稍慰耳時赤日如火即詣縣給過所直抵南京一相見頃悲喜交集晝夜訓飭之比前為尤詳且曰今朝廷清明亷吏無不登乎樞要爾當氷雪其操他日衣繡還鄉以慰慈母倚門之望豈不華哉亦留連再月而歸杞亦念父不置越數月適年勞及考急謁告東歸諸弟聞之歡迎三十里外杞升堂展拜問起居父子相抱持喜極不能成語曾未幾何部檄下州中趣杞上道父不忍子行澘然出涕乃陽謂杞曰幸因爾行得為錢唐一遊庶攬湖山之勝杞知其故力止之不從既至杞又止之還父復曰姑蘇抵此三百六十里耳其風物比錢唐尤勝吾何可還必至彼乃與爾别既至杞又止之還父復曰姑蘇至南京不逺矣我之情事尚未與爾畢之可遽先還耶杞遂不敢言於是同至又再踰月而别嗚呼世之為父者孰不知愛其子如吾父之深切十百之中不知寧幾見耶杞夙夜佩服戒言惟恐辱其先因取經中修身慎行之語名其寓居之齋曰修慎願為杞記之豫聞仁人孝子之思其親何時而能已耶山不足為之髙海不足為之深此無他昊天罔極之恩終不可得而喻也杞能不忘此時之思朝夕以之一動也修慎一靜也修慎則無負爾父之望矣杞尚朂之哉沖默齋記保寧禪師以沖默號其齋居來徴豫記豫按字書沖者虛也默者靜也即佛氏空寂之義也惟其沖也故默則沖為體而默為用惟其默也故沖則默為本而沖為末二者之理恆若相因未有默而不沖沖而不原於默者也夫太虛寥廓從橫自如陽運隂行真宰不動此兩間之沖默也自無生有從有入無外雖紛紜中實有定此萬象之沖默也靈光洞然出入無礙諸相皆忘大用常寂此一心之沖默也我念不生法從何起生滅本空而况於法此諸法之沖默也沖默之義大矣哉嗚呼有情之類亦云夥矣奈何營營逐妄擾擾迷真竭晝夜而實其所無反覆膠滯不求脫離是不知有沖者也風性所激運轉不停歘焉凝氷倐焉焦火十二時中無一息少寧是不知有默者也非大覺真人出而救之將何所底止乎然而妙明真性不涉三際元自沖虛本由默靜無所不容無所不具因無所不容故萬有厯然而未嘗有窒於虛因無所不具故羣動森然而未嘗有離於靜靜固非動動亦靜也虛固非實實亦虛也沖乎默乎其造道之樞要乎彼李伯陽所謂致虛極守靜篤者若近乎沖默而涉乎有為也韋應物所謂隱拙在沖默者欲藉是處世以保和為沖寡言為默者也而非其至者也然則何以為至乎必也入不二之門而後真知默也真知默者則無所事乎沖也禪師汲汲求法者也嘗揭沖默以自勵故為略疏體用本末而言之然亦未嘗有所言也禪師名覺慧字敏機吳興人出世嘉興之祥符近從四輩之請分座設法於大天界寺尋主寶寧禪剎蓋有志之士也寅齋後記洪武二年春濓以總修元史被召來京然史事貴嚴詔命禮部統之設局分科限絶外內將以日視其成當是時尚書稿城崔公恆往來乎局中濂因稔知公之為人公蓋名亮字宗明翼翼祗慎遇事若臨深淵方今皇上受天明命撫有萬邦自崇大禮以修天神地祗人鬼之祀凡牲醴之豐祝號之雅器幣之節燔告之嚴皆命公典之公精白一心上承休德夙興夜寐敬畏弗懈君子以謂國家自建禮官其涖事嚴恪未有踰於公者公猶以為未足且以寅名齋請濓記之夫寅者敬之謂也敬固無所不在而驗之於祠饗為尤宜方其齋明盛服以交神明靈飈回薄如將見之於斯時也志定神一曾有邪思之可干者乎茍以之奉親以之事君以之修身以之治人其心常弗變焉其有不獲其道者乎始之終之何莫不由於敬也能由於敬則成已成物之功其又有不致其極者乎昔者舜命伯夷典三禮其訓之有曰汝作秩宗夙夜惟寅直哉惟清説者謂即敬以直內之義也今公所居尚書之官古之秩宗也所主天神地祗人鬼之祀古之三禮也其委任之重且專也蓋如此然而皇上神聖端居穆清畏天勤民無一息之或間固已度絶於帝舜矣公之精白一心上承休德其可不以伯夷自朂者乎此公所以名齋以寅之意也雖然修德莫若敬德日以崇則位日以尊理之常也他日位於三孤寅亮天地以弼於一人濓又烏能無望於公乎公如有取於濓言非惟無愧於兹軒亦且有昭於名若字者矣華相先生既為公發明敬怠之説殆無餘藴庸敢掇其緒餘以為後記云栖雲室記中峯本禪師結廬姑蘇城西以為禪定之室翰林學士趙文敏公書其扁曰栖雲逮今數十年中峯卒而廬亦頺壞中峯之孫用庵照師作新室於故址復取故名揭之而屬豫以記余笑曰師其欺豫乎哉今之廬非昔時之所築也今之人又非中峯也而猶曰栖雲何哉室廬之夀以百年計人之夀以數十歲計禦燥濕閲寒暑屹乎有不傾之勢毅然有不亡之意今欲求其見之且不可得矣彼雲者起滅萬狀不可斯須審視奚為而久棲此室哉文敏公取以為名固異矣師取而重揭之又異也余復以言文之不亦甚異乎雖然自其易化者觀之則天地曽無殊於水中之漚自其可久者觀之流電之光可使比於歲月自其有形者觀之泰山可以齊於毫芒自其無形者觀之一髮可以擬於嵩華久速巨細者迹也有迹者固不足恃以不壞不可以巨細久速論者道也斯道也何間於古今新故之分哉然則安知今之廬異於昔時之所築今之人異於昔之人哉而雲也安往而不在乎嘗試與師登姑蘇之臺而覽古今之變三吳之間崇臺廣榭涼亭燠館敷金碧而炫丹瑤極人力而窮物狀者何可勝數蓋有歌舞未畢而號泣繼之車馬陳于庭而狐兔已遊于寢者矣彼之富麗竒瑰茍與栖雲之室潔量大小何啻岡阜之於沙塵今彼皆不復得守而此猶能新其棟宇而不廢何耶蓋無道以保身者雖富麗不能久存而有道之士身亡而名立固不隨世以為變遷也吾坐乎斯瞑目而思之充乎室皆雲也皆中峯也入吾耳而接吾目者皆道也中峯之徒茍有志於道孰不可為中峯哉尚何取於區區之故名也乎師近道者盍以吾言求之惜隂軒記人之異於物者豈特形貌而已哉亦必有道焉爾茍徒飲食以生死生無補而死無聞則物皆然也奚擇於人乎古君子所以汲汲而不懈者非徒求過於物且求異於庸常之人非特求過於人且求所以治安之而後已蓋天之生君子所以為民物計也凡民之生豈皆怠而嬉哉其所趨者小耳彼幽探而逺取多致而急售相時乘隙以徼十一之息者汲汲於財者也朝造而暮謁曲譽而巧頌眴俟顔色以覬人之喜悅信任者汲汲於勢者也衒長而飾智本能而逞功上以欺乎人下以欺其心者汲汲於名者也是皆有所利而為之莫不窮心力竭思慮目不暇暝而身不暇安亦勞且勤矣而君子何取乎君子之所務者徇乎道不徇乎人利乎民不顧乎身若禹益之治浲水焚山澤周公之制禮樂孔子之作春秋孟子韓愈之闢邪説皆焦心苦思東西奔走食不待飽而衣不務華至於終身而後已曷嘗為其身哉上以憂斯民下以明斯道爾君子之所為固如是也會稽翁昌齡由國子生再擢為監察御史名其燕居曰惜隂其有志於民者乎夫人常患無志有志矣患不學而妄行學矣患無位而不得見於世得位矣患非其職而不獲為今昌齡沉篤而專慤非無志也博洽而能文非不學也國家內外之官各不可越其職而御史於天下事無所不宜言則又居乎可為之位矣以利民之心行利民之政夫何難哉昌齡旦興而夕息坐斯室而思之民或有未安者乎所以休養之者或有未至者乎思而得焉則以告乎上日程而歲較吾之所為果不負斯職與斯民則惜隂之名為不徒矣茍曰簿書而已矣獄訟而已矣是則衆人之事爾雖勤且勞余何取於昌齡哉雙桂軒記濓侍經青宫時四明桂君彥良實為正字朝夕同出入禁中怡怡然侃侃然異姓兄弟也彥良間謂濓曰吾家在慈溪世舉進士或知望縣或知六察或帶閣職連綰郡章聲明文物固嘗盛矣故昔人稱其所居為攀桂里會宋亡為元業書詩者猶不廢區區雖不文亦以學詩獲與鄉貢之選二子冡曰慎介曰全今逢盛時復嗜學不厭思欲趾前人遺芳顧南榮有桂一章雙幹直上始合于一又復岐而旁達妍茂紛𬎼香滿户庭私竊以為桂吾姓也其殆符二子文字之祥乎讀書之室遂以雙桂命焉慎嘗從吾子受經幸有以記其事夫桂之為木厯代頗貴之至唐重進士科貴之尤甚每藉之以為喻蓋俗傳月中有桂桂茍在月孰得而攀之其意若曰擢第之難猶平地而升青霄云爾非實指夫桂也元豐之末新定有二倪生曰直侯曰直儒相繼中進士第郡守因表其坊曰雙桂非惟新定之為然也彥良之鄉有蔣氏伯仲焉曰璿曰珫陳忠肅公之弟子也紹聖崇寧間亦先後登髙科公號其堂曰連桂由是而觀以桂旌坊又以名其堂則前所謂桂者似實而非虛也雖然古之人立言而比興為多其在楚辭則桂與申椒木蘭並稱此無他芬香之物足以取譬君子也芬香之物當以類相應而卉木又得氣之最先者庸詎知雙桂不為二子之祥乎今慎也端毅自持而辭章俊麗全也趨善若水而期於無息皎然雙璧光彩交映馴而致之二倪兩蔣之問學直易易耳連捧貢函同䇿大廷亦宜也未見其為難也然而名者造物之所深忌桂氏自先世以來多以科目發身聞譽隆蔚達於遐邇至于彥良猶且不墮其業二子復將起而繼之斯所謂難也視彼倐榮忽悴父不能及子者果何如哉果何如哉桂之為祥兆又見於斯惡得不為彥良喜楊伯子有言曰桂之雙人之祥濓於彥良亦云遂書之以為記三益軒記明之昌國徐君元凱嗜古好修鄉邦稱為善士生子男子三長曰友直字孟益次曰友諒字仲益又次曰友聞字季益家雖貧徐君能使其頌詩讀書弗輟且因其字名軒曰三益以勵之友聞自郡諸生貢入成均近奉旨受事中書頗與豫相親時來執經問難遂以軒記為請夫益之為卦其象為風雷夫雷激則風怒風激則雷迅二者不待相期而相益者也君子觀之見善則吾將遷焉有過則吾將改焉而其為益也大矣然則何以知過而改之曰必得直友焉友能直則加以針規矣何以知其善而遷之曰必得諒與多聞之士焉友能諒則舍虛而從實友多聞則察理明而擇善精矣嗚呼此以取友於外者言之爾今季益家庭之內兄弟熙熙有善則相資有過則相告曽不出户而講習之功勝州里之人莫不慕豔而交之其益將非止於三至於十朋之龜弗克違亦有之矣他日德茂才顯若河東之三薛江東之三岑其有不齊軌而馳者哉雖然豫昔嘗取友矣始也自一家羣從之間朝夕摩切之然不敢自謂已足也復取之鄉人焉如是者久之亦不敢自謂已足也又求之國人焉如是者又久之間有謂曰學無止法也我安敢自畫于斯復求諸天下之人焉今耆矣秋髮繽紛而埀領矣尚孜孜弗懈益求古簡書之間見問學之優廣者質實而無偽者則云我未之能及也亟遷而從之志褊而行僻與過失而文飾者則云我寧或有之乎設有之亟改而正諸此無他知益之為義若此自近而及逺期終身行之也季益兄弟其果以余言為然乎季益通經而能文已出遊於成均是友天下之人矣豫尚何言儻或東歸見二兄焉宜以豫文勒諸軒中庶不負於翁名軒之意云抑余聞昌國古會稽之翁洲也東控三韓日本北抵海泗登萊土地幽邃風俗朴茂人材往往多著聞于時今又將於季益兄弟觀之上慎旃哉復古軒記臨川饒君孟持其五世祖某府君嘗嗜琴琴有復古玉髓二張其材孔良蛇腹斷而金沙明試一鼓之獨鶴夢回而滿山風露也寒泉漱巖而山鬼夜聽也可謂清且古矣府君雖殁厯世寶祕不翅孔氏之遺履時出玩之思府君之不可見慨然髙山仰止之情元季兵燹方張白晝為人持去煙海茫茫竟不知墜於何所如是者有年一旦外孫樂安夏氏忽購得焉舉以奉孟持孟持反覆拂拭不覺悲喜交集玉髓頗殘闕唯復古嶽沼暉軫咸具孟持取水精絃被之方申瓜指其初則嗚嗚然已而復洋洋然亦似傷其流落而慶其復還也孟持刲羊豕列豆籩燕饗三族合芳木為櫝尊閣堂中遂以復古題其榜云春秋之義大復古其謂復古者所繫甚大非一器物之謂也雖然有人於此闔廬為人所攘已而還之可以謂之復乎曰復則復矣而非古也疆畎敓於強暴取而歸之可以謂之復乎曰復則復矣而非古也巵匜杯棬之屬為貪者所竊肆力追而有之可以謂之復乎曰復則復矣而非古也然則何謂而可斯二琴者相傳或為雷威所斫由唐涉宋厯五百年之久所獲非一人所閲非一家始為府君之所有府君之後又奪於他姓今復歸之孟持正如寶玉大弓之再得不謂之復古也謂之何哉不可以一器物之微而遽少之也然而豫又有説焉古之人朝出耕夜歸讀古人書今則飽食以嬉我當復之古之人入孝出弟如用菽粟布帛斯須不可離今或有凌犯之者我當復之古之人事君如事天一動一靜儼如有赫其臨今則鮮有致其身者我當復之夫然故復古之功大矣二琴云乎哉孟持勉旃可也塤箎軒記泛浙河而南舍舟登陸有地曰漁浦土沃以亢池園樹林碩美蕃茂魚稻充羡百貨之所趨行旅之所集聚似市而不澆近野而不俚故其文多優遊而好文其尤以禮讓為人望者稱華氏余自京師還華氏之秀者曰拱辰侍其父候于河滸逆豫至其家館於賔次率其兄弟庭揖畢俯身自東階趨退足武相蹈不越尺寸徐與之言長少相顧擇辭而發懇然不煩祕然不畔于理皆良士也視其室名則曰塤箎而豫昔之所書者拱辰謂盍有以記之天下之物取諸人者有盡而本於天者無窮能充天之所與則得於人者可棄而勿論矣世恆知在外者之可樂而力取於人其受於天者則怠而不顧卒之兩無所得而戚戚以終身豈非惑哉今華氏兄弟以言乎爵則未嘗仕以言乎財則非甚富以言乎車馬衣服則雅素儉質與凡民等然入其門則父子有禮兄弟有恩忿疾之聲不聞于室和煦之色不絶于面食力而趨事安生以自適雍容怡愈不教而勸而未嘗有資於外物何必取諸人而後可樂哉其善充於天也固美矣天之所與者至重也茍善充之雖困貧甚天猶以為貴也不能充之雖位極乎崇髙天猶以為賤也若華氏之為天之所貴者也余安敢遺之而不録乎雲寓軒記閩士張君仲育學道龍虎山中扁其軒曰雲寓人聞而疑之曰異哉張君之名軒也夫蒼然而在上者太虛也寓乎太虛者雲也雲之為物二氣上升初無定形當其始生也勃焉如煙鬱焉盤旋或搖曳如帶或縈結如蓋或超舉如鴻或變化如龍倏然而雨天下忽然而不見其迹雖雲亦不自知其聚散起滅為何如人之望之一息而萬狀惚恍而不可為像今張君乃欲取以寓其身不亦異乎或聞其言又疑之曰是知雲之起滅而不知外物之起滅者也知張君之寓身於雲而不知其寓意於雲者也彼世之紛紛糾糾朝崇而夕替驟往而歘還毁譽榮辱之出於人者其變亦多矣獨何異於雲乎人惟不知其然也故竭智畢力終身趨走汨沒於其間而不之止若夫知道之士則不然其視天下之物舉不足當其一顧至於身亦自視如委蛻其去留之際不繫縶於物與浮雲無異蓋其所得者深矣今張君獨知之而以雲寓名其軒庶幾達生者之所為彼烏足以知其意哉或者聞其言又疑之曰是求其外而不得其內泥於迹而不通其道者之論也夫有道者用於物而不蔽於物自恆人而觀雲則雲而已自有道者而觀舒之周遍宇內斂之不見毫髮者非道邪澤潤四海而不以為功與夫並存而不知其所終者非道邪衆人資其惠而不能名其德功成則退而不底滯於用者非道邪是則張君取雲以寓意者有在矣彼烏足以知之邪且天地之初未嘗有雲之名也非特無其名也而亦未嘗有雲也非特無雲也而天地亦未始有也隂陽判而後有天地有天地而後雲生焉人見其巍且髙也從而以天名之見其卑且廣也從而以地名之見其絪緼無窮也從而以雲名之是則以天地名天地以雲名雲者亦已寓矣况復取雲以名軒不猶寓之寓者乎而人又嘵嘵焉而辨之非惑邪吾聞龍虎山中多異人廣成子安期生之流時往來其間張君試見而問之果孰為雲邪孰為寓不寓邪必有以語張君矣又安知不疑吾言為妄邪三人者退張君識其言屬筆於豫請書之坐隅遁耕軒記畨禺樊君德新以美材擢為户部主事每欿然有不勝任之言題其舍曰遁耕而謂人曰吾昔避地荆南有宅一區有田數十畝躬耕以養吾親甚自得也今繫官於此材薄不足以勝祿位勢微不能以施惠澤吾心未嘗不念躬耕時也行將陳於上乞身而歸反乎故廬此名所以識之耳聞者疑之曰署居與氓廛孰安章綬與民服孰華耒耜耘耔之業與簿書之政孰勞事人主而友卿大夫與居閭巷孰榮而曰遁且耕非有激而然耶且君子出處何常惟不失乎義而已昔之居田里共民之業義也今仕乎朝共乎仕之職亦義也以民而有祿位之思則為僣以仕而懷其故土願為齊民庸非過乎天之生人不皆賢不皆不肖將使才者治不才者爾故細民者耕且𧖟為粟帛以奉上者也君子者出智謀計畫均之使勿爭敓教之使知禮義者也使人皆欲為細民則誰為治使皆欲為君子則上安養今樊君以治人之才居乎位宜也而必欲為遁且耕何歟樊君曰仕之優於農吾豈不知之然國之祿位非以優仕者也使仕者勞其心以優細民耳故祿者出於民所以傭我之心力位者出於上所以使我自别於細民夫位髙於細民之上而德不稱則為尸位受民之傭而無功以報之則為茍祿吾惟是二者之懼愧交於心而不釋思其易稱無愧者而為之以為莫農若也故以見吾志焉且世之居位而肆虐者不知稼穡者也吾今不忘乎耕使目之見者耕也心之思者耕也烏敢自逸哉他日或得舍此而去放乎山澤之間求抱甕丈人之徒而友焉作為謳歌以慶夫天下之平此吾之志也云云者吾何暇計哉於是金華宋濓聞之嘉其存心之仁自待之薄異乎患失者也記其事以為仕者鑒焉慈孝庵記古者萬民之墓地同於一處故設墓大夫正其昭穆之位掌其爵等小大之數分其地使各有區域而得以族葬之凡爭墓地者聽其獄訟帥其府吏而巡其墓屬復居其中室以守之當是時凡民之葬者皆萃于一非特同氏族之人而已自世道既降而相墓巫之説興謂枯胔足以覆燾乎後昆謂福禍賤貴盡繫乎岡巒之離合丘陵之偭嚮一以此鉗劫愚俗而專竊墓大夫之政柄世之欲葬其親者輒斂容屏氣伺候巫之顔色巫曰此可葬雖踰都越邑亦匐匍而從事巫曰不可葬雖近在室之傍百利所集者亦割忍而違去之致使父子兄弟本一氣也一在天之南一在地之北吾不知其何説也安得卓識者出相與攻其繆妄也哉余方為斯嘆同里張君忽以書來曰吾父母既殁葬於家東北一里黃塢之原既而吾兄又捐館舍吾則以謂吾兄父母之子也其生未嘗頃刻離膝下死後而他薶之使死者無知則已脫或有知焉吾恐其心當愀然不寧也乃於父母之側攻位而藏之吾父母藏於是吾兄復藏於是吾夫婦幸未死他日或溘先朝露去將焉之又於兄之側十步預作二竁以俟而别建庵廬號曰慈孝俾學佛者守之吾知父子之親如是而已巫之言雖巧如簧吾固掩耳而弗願有聞也嗚呼余嘗嘆人之所見不能盡同故雖有藴於中而不敢揚言於人竊不自意張君之見已能與余同推而至於四海之廣九州之衆其見之同者又惡知無其人耶使同者至於十百焉或千萬焉則巫之舌不能勝而古者族葬之説可以漸復矣矧中原士大夫家多以昭穆序葬唯其行有汚於先人者始異其兆域衣冠之蟬聨在在有之人之富貴利達其不繫於地也昭昭矣奈之何怵於淫書末技而眩惑於是非也嗚呼若張君者其可謂卓識之士非邪濓因請記庵之成緒而攄其所見如此知言之士必有取焉張君名榮字叔茂金華蓮塘人以孝弟致家之肥其室曹氏亦克配君子父諱大仁有寬厚長者之量生平與物無忤人以佛子稱之晚自號曰存齋以至治壬戌某月某日卒壽六十七母施氏以某年月日卒壽七十皆以重紀至元戊寅某月日葬兄諱瑞字祥卿治家有能聲以至正癸未某月日卒夀六十七其葬則以戊戌某月日庵之經始以乙酉正月落成以五月田若干畝山若干畝儲其入以為守者之用云看松庵記龍泉多大山其西南一百餘里諸山為尤深有四旁奮起而中窊下者狀類箕筐人因號之為匡山山多髯松彌望入青雲新翠照人如濯松上薛蘿份份披披橫敷數十尋嫩緑可咽松根茯苓其大如斗雜以黃精前胡及牡鞫之苖采之可茹吾友章君三益樂之新結庵廬其間菴之西南若干步有深淵二蛟龍潛于其中雲英英騰上頃刻覆山谷其色正白若大海茫無津涯大風東來輒飄去君復為搆煙雲萬頃亭庵之東北又若干步山益髙峰巒益峭刻氣勢欲連霄漢南望閩中數百里嘉樹帖帖地上如薺君復為搆唯天在上亭庵之東南又若干步林􅀈蒼潤空翠沉沉撲人隂颸一動雖當烈火流金之候使人翛翛有挾纊意君復為搆清髙亭庵之正南又若干步地明迥爽潔東西北諸峯皆競秀獻狀令人愛玩忘倦兼之可琴可奕可挈尊罍而飲無不宜者君復為搆環中亭君詩書之暇被鶴氅衣支九節笻厯遊四亭中退坐庵廬回睇髯松如元夫巨人拱揖左右注視之久精神凝合物我兩忘恍若與古豪傑共語千載之上君樂甚起穿謝公屐日歌吟萬松間屐聲鏘然合節與歌聲相答和髯松似解君意亦微微作笙簫音以相娛君唶曰此豫得看松之趣者也遂以名其庵廬云龍泉之人士聞而疑之曰章君負濟世長才當閩冦壓境嘗樹旗鼓礪戈矛帥衆而搗退之蓋有意植勳業以自見者今乃以看松名庵若隱居者之為將鄙世之膠擾而不之狎耶抑以斯人為不足與而有取於松也金華宋濓竊不謂然夫植物之中稟真剛之氣者唯松為獨多嘗昧昧思之一氣方伸根而藴者荄而斂者莫不振翹舒榮以逞於一時及夫秋髙氣清霜露既降則皆黃霣而無餘矣其能凌歲寒而不易行改度者非松也邪是故昔之君子每托之以自厲求君之志蓋亦若斯而已君之處也與松為伍則嶷然有以自立及其為時而出剛貞自持不為物議之所移奪卒能立事功而澤生民初亦未嘗與松柏相悖也或者不知強謂君忘世而致疑於出處間可不可乎濓家青蘿山之陽山西老松如戟度與君所居無大相逺第兵燹之餘巒光水色頗失故態栖栖於道路中未嘗不慨然懷君何時歸濓當持石鼎相隨采黃精茯苓烹之於洞雲間亦一樂也不知君能從余否乎雖然匡山之靈其亦遲君久矣孝思庵記錢塘王生驥年二十即以春秋預薦浙江鄉闈既貢南宫庭議喜其尚少以大器期之俾肄業成均中未幾詔左御史大夫汪公右御史大夫陳公妙柬俊英為諸王伴讀生獲選入吳府豫時以學士兼太子贊善大夫生因從豫遊一旦傳旨命羣儒造縱豢鶴文生操觚立就豫為進呈上親讀一再過喜曰是子辭簡而意暢才氣皆佳及日將南至大祀于圜丘上復命羣臣賦七言律十二韻冠以三百言序諸老生或難之生與烏傷黃昶先成親跽讀御榻前上聽畢尤加奬厲云生初從豫學治經兼攻文辭未幾大進於前薦紳先生亟稱之無異言豫亦愛之甚謂其堪紹文脈也因叩其家世之詳驥曰其先系出于周有敬宗者為周司徒時人號曰王家因以命氏至秦武成侯離生二子曰元曰威元避秦居琅邪後徙臨沂威遷太原之廣武由是王氏有太原琅邪二族晉丞相導出琅邪後時家於江左其裔孫有居睦州桐廬者曰煦仕唐為和州刺史生肅清主簿淘淘生耕避五代亂以文行稱周乾化中仕吳越官至烏程悴烏程之弟宋錢唐令畎遂居虎林山中實驥之十五代祖也驥之髙祖父諱某曾祖父諱植皆以力本尚義見稱鄉人多德之祖父名暹字子愚錫號為明誼處士生先君諱常年三十出遊畨禺不幸客死時驥始七歲無所識知賴大父鞠育教訓以克至有今日先是大父常圖地於西湖北山之間曰駝巘嶺嶺有三竒石怪松根蟠其上鬱然可觀大父既預為夀藏且曰此新兆也吾敢居其首乎南山梯子嶺先世數大墓存焉年逺不敢遷倣古者葬衣冠之義斫木為主書吾父名諱瘞其中他日吾則祔其旁搆庵廬三楹間額之曰孝思示後世不忘其先也驥聞而識之久欲以庵記為請先生修史事嚴不敢有所聞每念驥來南京時大父挈驥拜曽大父墓下慨然曰爾能頗知讀書以亢吾宗非我之功實祖宗之澤是賴爾出於千里外慎毋忘孝思也驥尤不能置于懷願先生嘉惠之孝思之説其見諸傳記者不一而足非止乎詩也然其所謂孝者立身揚名使天下之人皆曰王氏有子豈不為孝之大者乎若規規不離乎親側號諸人曰我能養我能養而父母之名雖同里閈亦若無聞知如此而為孝將焉用孝乎今生始加冠巾輒被薦乎鄉入侍藩王以文辭上簡帝心其榮可謂至矣榮之至者孝之篤他日位益顯名愈揚使生者受封爵殁者膺贈典則生之孝又為何如哉是則孝思之義也庸非生之大父所深望者乎豫與生有師友之義為記其庵故不以頌而以規趙氏時思庵記晉府録事趙君德懷其名為古臯有請於豫曰古臯世居括昔嘗有屬籍于宋大父諱若順字和卿實魏悼王之十世孫通前古載籍之言論義下上若玉屑傾吐然恬於進取視銀黃焜耀漠然無動于中當時和景妍被古冠服徜徉煙霞泉石間心曠神怡超然於塵塧之表有不知白雲之移隂而夕陽之在樹也逢賔朋滿座相與流連不忍舍雖不解飲見其酣嬉淋漓觥籌交錯浩浩然與之同適人豔之者且曰王孫家之故習也或曰遺落世事其達士也哉於是州里皆稱為有德之士凡忿爭不直者悉來質焉交觴之酒使其各釋憾而去人至今能道之大母胡氏宋吏部侍郎絃之六世孫女婦道母範皆兩無所愧尤篤於訓子古臯生也時年已六十為之喜而不寐甫髫齓親自鞠育之節其燠寒時其饎羞及稍長使從名進士林彬祖學治經惟恐有懈怠意瀕卒猶執古臯手屬曰吾幸見兒成立將含笑入九泉矣雖然學無止法朂之哉朂之哉遂瞑年八十矣大父先卒年視大母而少六歲大父卒於某年月日大母卒於某年月日以某年月日葬麗水縣北四十里和樂鄉之太平里遂建菴廬以為妥靈之所名之曰時思古臯蒙國寵恩忝被任使今又受新命將為縣繁昌官書有程不能持一觴走酹墓下願畀文刻諸菴中埀視孫子庶以著懸懸之思豫聞之經曰春秋祭祀以時思之言不忘乎其親也不忘乎親孝矣孝之為道非一而足也德懷行矣持已以亷清潔如氷雪庸非孝乎治民辨訟使各得其平又非孝乎業精于躬而名昭于時道足於已而文埀於後又非孝乎如是者德懷思之而日思之是則時思之大者不必時省塋域而後為孝也他日入躋法從出刺方州華軒結軫佩綬懸魚過家上冢以為一族光榮使人指之謂趙氏之有孫不亦美乎豫之有望於德懷者如是而已德懷本名古臯今以字行博學有識以能古文鳴其為人也恂恂樂昜所謂溫其如玉者云拙菴記京口徐君德敬為中書管勾居京師處一室不堊不華僅禦雨風環庋圖書置榻其中每退食即徒步歸宴坐誦古人言賔客不交請托不通自號曰拙菴襲封衍聖公魯國孔侯希學書拙菴字以遺之德敬復徴文於余余天下之拙者也德敬豈若余之拙乎世之人舌長且圓捷若轉丸恣談極吐如河出昆侖而東注適宜中理如斧斷木炭就火猱援木以升兔走壙而攫之以鶻也其巧於言也如此余則不能人問以機謝以不知人示以祕瞪目顧視莫達其旨人之所嘉余縱欲語舌大如杵不可以舉聞人之言汗流顙泚人之所諱余不能止開口一發正觸禁忌人皆駭笑余不知恥余言之拙海內無二他人有識洞察纎微揭首知尾問白意緇未入其庭已覘其形始瞷其貌已盡其肺肝而究其緼奧福來熒熒出身以承禍方默默預防而避匿其巧於識也如此余夢夢不知憒憒無所思人之笑吾吾以為喜人之怒吾吾徑情而直趨網羅當前吾以為織絲虎豹在後吾以為犬貍吾識之拙當為舉世師此二者乃吾所大拙其餘癡經戅緯錯綜紛披良平不能榮其數遊夏不能述以辭德敬豈有之乎然吾亦有不拙者聖人既沒千載至今道存於經嶽海崇深茫乎無涯窅乎無塗衆人逰其外而不得其內舐其膚而不味其腴吾則搜摩刮剔視其軌而足其迹入孔孟之庭而承其顔色斯不謂之巧不可也生民之敘有政有紀離為六府合為三事周公既亡本摧末弊秦刻漢駁而世以不治吾握其要而舉之爬瘍擇纇取巨捐細德修政舉禮成樂備廣厦細旃每資之以獻替吾於斯藝雖管仲復生猶將扼其吭而鞭其背是不謂之巧不可也而德敬豈有是乎蓋人有所拙者必有所巧有所巧者必有所拙拙於今必巧於古拙於詐必巧於智拙於人者必巧於天蘇張巧於言而拙於道孟子拙於遇合而巧于為聖人之徒朝錯號稱智囊而拙於謀身萬石君拙於言語而為漢名臣余誠樂吾之拙蓋將全吾之天而不暇恤乎人也今德敬居位處勢誦古人之言而以拙自晦其殆巧於天者歟巧於智者歟巧於古者歟然則德敬之巧也大矣過於人也逺矣爵祿之來有不可辭矣烏可以不記清風亭記清風亭者撫州金溪鄧彥誠之所築也彥誠世居雲林三十六峯之陽其先世多以志節著當宋之季天下大亂嘗集義兵以護鄉社助國家宋亡為元七十又七年是為至正壬辰天下復大亂撫州不守彥誠歎曰冦將至吾可不衛宗人使及於難乎即召鄉里少年分隊伍樹寨柵於雲林山金鼓之聲晝夜不絶冦來輒敗衄而去薦紳之流依之以免者百數十家事平會府上其功將爵祿之彥誠謝曰吾之挺身禦冦不忘先世之明訓爾敢藉是以媒利耶掉頭去不顧乃於堂之西偏藝竹數萬竿引泉為池而築是亭其中彥誠戴華陽巾披鶴氅衣日逍遙亭上遊情物表淡然與塵慮相忘人見之者疑為仙人御風而行可望而不可即僉曰是功成而不居者其視富貴利達何有哉冝名亭曰清風以勵衰俗彥誠笑而不答嗚呼志節之士世不多見矣昔聞有田疇者遭幽州始擾蕩析離居疇率宗人避難於無終山百姓歸之者五千餘家且數立竒勳以自見魏太祖論功封為亭侯邑五百户疇謝曰疇自以始為居難率衆遁逃志義不立反以為利耶固辭不受至今言疇者慕其清風若神龍遊于玄間欲一見之而不可得其視未建尺寸之功輒欲重徼名爵者其為混濁蓋亦甚矣今彥誠之行事皎皎不誣有足多者豫雖未敢遽謂如疇察其志之所存寧不髣佛似之耶然君子之論觀其志而不較其功功固有小大志豈有崇卑耶志茍同功亦同也彥誠不必不如疇者昭昭矣後之人聞彥誠之風者豈不蹶然興起耶抑豫聞撫為文獻之邦士出其間各以道德忠義著聞載諸方䇿者班班可考彥誠以劬然一布衣又能竭力捍冦如此豈雲林三十六峯委靈隤祉以致然耶不然何其生賢之多也豫因為著清風亭記刻置亭上使人知所自立頗謂有禆於政化文之不工固不暇計也彥誠名諒江西提點刑獄諱元觀之諸孫來請記者其族人知南陽縣行父也氣節亦森然可尚云環翠亭記臨川郡城之南有五峯巍然聳起如青芙蕖鮮靚可愛其青雲第一峯雉堞實繞乎峯上旁支曼衍蛇蟠磬折沿城直趍而西如渴驥欲奔泉者是為羅家之山大姓許氏世居其下其居之後有地數畝餘承平之時有字仲孚者當承尊公之命植竹萬竿而搆亭其中嘗積雨𥘉霽晨光熹微空明掩映若青琉璃然浮光閃彩晶熒連娟撲人衣𬒮皆成碧色沖融於北南洋溢乎西東莫不紺聮緑涵無有虧欠仲孚嘯歌亭上儼若經翠水之陽而待笙鳯之臨也虞文靖公聞而樂之曰此足以抗清寥而冥塵襟乃以環翠題其額至正壬辰之亂烽火相連非惟亭且毁而萬竹亦剪伐無餘過者為之彈指欷歔及逢真人龍飛六合載清仲孚挈妻孥自山中歸既完其闔廬復搆亭以還舊貫而竹之曲蘖亦叢叢然生三年而成林州之壽俊與其有連者咸詣夫仲孚舉觴次第為夀且嘆曰江右多名宗右族昔時甲第相望而亭榭在在有之占幽勝而挹爽塏非不美也兵興以來有一僨而無不復者矣有困心衡慮僅脫於震凌者矣有爬梳不暇遷徙無寧居者矣况所謂逰觀之所哉是亭雖微可以卜許氏之有後足以克負先志前承後引蓋未有艾也飲且酣而興歌曰五山拔起兮青𬎼𬎼六千君子兮何師師鳯毛離徙兮啄其腴秋風吹翠兮實纍纍邈千載兮動遐思歌已而退夀俊中有陳聞先生者謂不可無以示後人乃同仲孚來詞林請豫為之記嗚呼昔人有題名園記者言亭榭之興廢可以占時之盛衰余初甚疑之今徴於仲孚其言似不誣也向者仲孚出入於兵車蹂踐之間朝兢暮惕雖軀命不能自全今得以安乎耕鑿崇乎詩書而於暇日怡情景物之表豈無其故哉蓋帝力如天撥亂而返之正四海致太平已十有餘年矣觀仲孚熙熙以樂其生則江右諸郡可知江右諸郡如斯則天下之廣又從可知矣是則斯亭之重搆非特為仲孚善繼而喜實可以卜世道之向治三代之盛誠可期也豫雖不文故樂為天下道之非止記一亭而已仲孚名仲麗嗜學而好修士大夫翕然稱之蘭隱亭記蘭隱亭者餘干葉君華卿之所築也華卿性清修不與塵坌交并皎皎然屹立物外雖身居城市中儼若重山密林青猿白鶴時給使乎左右也然物觸其前無以愜其意輒視之如粃粳且以為幽芬逺聞而類貞人節士之操者惟蘭為然乃藝百本於層樓之下圓盆方甒羅列乎後先當春日始和東風烻烻動人蘭於斯時玉茁其芽而紫花翹然其顛清馨襲鼻雖海外名香旃檀婆律之屬不足喻其髙韻也華卿日繞百回神凝而形忘暢然自得乃舞而歌曰采蘭兮采蘭白煙蒼莽兮生暮寒望美人兮不徠撫瑤琴兮誰與彈既而有肥遁君子聞往而賡之曰勿謂人逺河可涉只勿謂山髙磴可陟只聲氣之同為相求只歸視吾亭蘭正柔只華卿遂相與肆筵設席以為歡至夕乃休無歲不如之蘭雖草之屬亦似解華卿之意一幹之間特發雙葩以獻其妍流聞禁林虞文靖公揭文安公咸見於聲詩名曰瑞蘭後十年天下兵亂華卿扶攜耄倪避地臨川山中一去不返者十五春秋及夫六合廓清華卿始旋故里其樓與蘭皆化為椔翳華卿慨然如失良友遽即其遺址建亭植芳蘭速客嘯咏如初或勸之曰不仕無義子奈何溺是而廢恆經乎華卿曰年少時亦頗有志於仕自與世味酸醎不相入遂投分於蘭為金石交今素髮垂領矣尚復何云哉州里遂號之為蘭隱且以名其亭云華卿之子清苑令秀實天性至孝報政將歸省思有以恱親之意徴為文以記其亭豫聞王度記云古者之摯天子鬯諸侯熏大夫蘭士茝皆取其物有香燥濕而不變者也蘭則生澤中廣而長節節中赤高四五尺漢諸池苑及許昌宫中種之以降神或雜粉中藏衣皆取其芬芳爾傳曰佩帨茞蘭亦言其華葉俱香而可充佩幃者也若今所藝之蘭香則香矣華質昜萎與凡葩等何以為佩哉且鬯則鬱金熏則零陵香茞則白芷三者咸可佩胡為今蘭獨不然乎近代紫陽方回考訂極精而蘭則今名千金草及孩兒菊今蘭實古稱川續斷其言纍數百言而不止豫未敢信其説也華卿嗜蘭久大夫士過從者衆必當有以辨之雖然達人大觀以物付物而不泥於物茍辨之於錙銖其所謂磊落之士乎華卿但取蘭之馨可佩與否何暇深計也豫性亦愛蘭所居青蘿山不能得嘉種因懸趙孟堅所畫於壁旦出而夕入焉芳馨之氣冉冉達於四座此無他豫心中有蘭而觸目鼻者未嘗無蘭韓娥去而歌聲在耳曹公詐而梅津生舌其理亦猶是也華卿有學之士子故以此質之因記於亭壁明年謝事而歸當見華卿餘干江上以厠肥遁君子之末尚能製猗蘭之操使善琴者彈之新雨山房記諸暨為紹興屬邑與婺鄰國初得婺時伐偽吳張氏相持未決兵守諸暨界上張氏恃諸暨為藩籬乘間出兵侵掠兩軍屠戮無虛時故諸暨被兵特甚崇甍巨室焚為瓦礫灰燼竹樹花石伐斷為樓櫓戈炮樵薪之用民懲其害多徙避深山大谷間棄故址而不居過者傷之今國家平定已十餘年生民各安其業吾意其中必有修飭室廬以復盛時之觀者而未之見今年邑士方伯修為余稱其友張君仁傑居諸暨北門之外故宅昔已燬及兵靖事息始闢址夷穢創屋十餘楹旁植修竹數百四時之花環藝左右琴牀酒爐詩畫之具咸列于室仁傑未亂時稍有祿食至今郡縣屢辟之輒辭不赴以文墨自娛甚適號其室曰新雨山房願得余文記之一室之廢興為事甚微然可以占世之治亂人之勞逸非徒然也方兵革之殷人有子女金帛懼不能保雖有居室寧暇完葺而知其安乎糗糧芻茭之需呌號徴逮者填于門雖有花木之美詩酒之娛孰能樂之乎今仁傑獲俯仰一室以察時物之變窮性情之安果誰使然也非上之人撥亂致治之功耶自古極治之時賢且能者運于上隴畝之民相安於下而不知其所由然飫飽歌呼秩然成文成周盛時之詩是也安知今不若古之時耶仁傑其試為之余他日南歸駕小車過北門求有竹之家而問焉仁傑尚歌以發我余當鼓缶而和焉水北山居記古之君子其在朝市也雖繁華之膠葛恬然視之而却有山林之遐思焉今之君子其在山林雖清曠有餘往往嗤鄙為不足而數興朝市之外慕唯恐失之豈人之彛性或固然歟抑習俗相仍之久而弗克變歟有能特立而不為所移者殆所謂盆盎中之古罍洗也湖府經厯葉君伯旻世居永嘉城中永嘉為海右名區南引七閩東連二浙宦車士轍之所憩止蕃舶夷琛之所填委氣勢薰陶聲光淪浹人生其間孰不聞雞而興奔走於塵土冥茫中以求遂其尺寸之欲伯􅌈則不然結廬蜃江之北茅簷竹扉僅蔽風日名之曰水北山居間與二三友攜酒壺出由白鹿城登華蓋名山持杯浩歌聲振林木或擢短􅀈具笭箵埀綸於江水更或呼小奚奴相隨行吟夢草堂上詩句不逼古人不欲休當其得意時乾坤空闊竟不知榮辱之代遷而寒暑之往來也人皆曰賢哉吾伯􅌈髙情逸韻皎皎霞外迹雖朝市而心實山林其近於古之君子哉然豫竊有疑焉使伯􅌈為布衣時假此以洗心滌慮庶幾可也今佐大府為元僚任七品之職聳四民之望亦云重矣而猶不忘乎山居無乃不可乎試以伯􅌈之意逆之官書叢脞不暇爬梳戴星出入猶以為不足其能索句於寂寞之濵乎上承乎府公下轄乎掾曹不敢抗之以為髙不欲抑之以為卑慮冝詳矣其能釣滄波而出白魚乎民情真偽而莫之辨官事鞅掌而莫之理凝思入乎芒杪精析極乎毫釐其又能潄醪看山而流連光景乎是三者伯􅌈今咸無之而猶道之不置者將馮夢以見之耶或志之以示不能忘也我知之矣士君子不以出處二其心故賤貧不能攝冨貴不能驕始終一節卓為名臣伯􅌈之賢所可稱道者蓋如是而已其視朝得簮笏暮厭雲泉者賢不肖果何如哉雖然豫猶有一説為伯􅌈告焉當大明麗天萬物畢照名一藝者必收占一才者必庸有如伯􅌈之學之美誰不羡之其有不登於樞要者乎伯􅌈宜悉屏江湖之念而益存魏闕之思俟他日功成名遂歸老於水北山居岸巾而坐與三二友追敘平生舊遊烹鮮酣觴從容而賦詩尚未晚贊禮郎張生子翊嘗從豫遊因與伯􅌈求記其事故相與一言之文憲集卷三
