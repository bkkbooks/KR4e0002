body:
  text: 文憲集巻五明宋濂撰序凡二十七章大明日厯序洪武七年歲在甲寅夏五月朔日新修大明日厯成粤從皇上興臨濠踐天位以至六年癸丑冬十有二月凡戒飭之諄復征伐之次第禮樂之沿革刑政之設施羣臣之功過四夷之朝貢莫不具載合百巻藏諸金匱副在秘書甲寅以後則歲再修而續藏焉嗚呼惟天立辟惟辟奉天其能混合三光五嶽之氣者蓋可數也然挺生於南服而致一統華夷之盛自天開地闢以來惟我皇上為然其功髙萬古一也元季繹騷奮起於民間以圗自全初無黄屋左纛之念繼憫生民塗炭始取土地羣雄之手而安輯之較之於古如漢髙帝其得國之正二也平生用兵百戰百勝未嘗摧衂以至繼天出治經綸大經皆由一心運量文臣武將不過仰受成算而已其獨稟全智三也欽畏天地一動一静森若神明在上及至郊祀存於心目有赫其臨甚至不敢仰視惠鮮小民復恐一夫不獲其所貪墨吏及豪黠之徒有加害者必威之以刑其敬天勤民四也后妃居中不預一髮之政外戚亦循理畏法無敢恃寵以病民寺人之徒惟給事掃除之役此皆古昔所深患今絶無之其家法之嚴五也兵戎國之大權悉歸之扵朝廷有事征伐則詔大帥佩將印領之暨旋則上章綬歸士卒單身還第其兵政有統六也嗚呼帝力難名度越前聖不可以一二識也今日厯所書籌畧之運功業之著規模之宏逺其本蓋原於此矣然而史書甚重古稱直筆不溢美不隱惡務合乎天理人心之公無其事而曲書之者固非也有其事而失書者尤非也况英明之主不世出而記注之官遷易不常無以究夫聖徳之高深臣同暨濂幸獲日侍燕閒十有餘年知之深故察之精察之精則其書也頗謂得其實而無愧兹因日厯成書謹揭其大要於首簡使他日修實録者有所採掇庶幾傳信於千萬世也其總裁官翰林學士承㫖嘉議大夫知制誥兼修國史兼吏部尚書臣詹同翰林侍講學士中順大夫知制誥同修國史兼太子贊善大夫臣宋濂催纂官翰林侍講學士嘉議大夫知制誥同修國史臣樂韶鳯纂修官禮部員外郎臣吳伯宗翰林編修臣朱右臣趙壎臣朱廉儒學教授臣徐一䕫臣孫作布衣臣徐尊生其讐校謄寫則臣伯宗臣廉及鄉貢進士臣黄昶國子生臣陳孟暘開局於六年九月四日厯二百六十有五日始訖事云臣濂謹序皇明寳訓序皇帝繼天出治御大厯服七緯順度九圍敉寧爰自龍飛之初以迄今兹金匱之藏歲益月增乃徇翰林詞臣之請纂修日厯以成昭代之大典粤洪武癸丑之秋八月甲申帝御東黄閣召臣詹同臣樂韶鳯臣宋濂俾選海内文學之士開局西華門内相與編摩成書而命臣同臣濂為之總裁九月壬寅臣等既蒞事發所藏而繙閱之仰窺神機睿斷逺猶辰告足以明徵定保嘉惠邦家者充牣乎其間臣等因相與言曰日厯之成藏諸天府人欲見之有不可得者盍如太宗貞觀政要之書編集以傳詢謀既同於是輯成四十類自敬天至制蠻夷釐為五巻總四萬五千五百餘言皆從記注之真不敢以己意輕為損益云臣等竊聞之自古開基創業之君其設心也𢎞其慮事也周一言一動皆可為天下後世法治忽所繫甚為不輕所以大舜有勑天之誡武王有衣鑑之銘埀示於後炳若丹青厯代寳之用為大訓蓋慎之至也肆惟皇上恭膺天命經營四方康濟兆民惟日不足故凡戒飭臣工訓誓將士出經入史亹亹弗勌必欲使其心領神㑹而後已嗚呼日月之無私也容光其必照焉雨露之無私也百物無不潤焉皇上法天而行覆幬無際恒恐一夫不被其澤故精神之所㑹訏謨之所定誠與虞夏商周之文相為表裏非太宗所能企及此無他聖學緝熈内外一本於誠而太宗則飾之以詐術故也貞觀政要尚傳之於今則夫寳訓一書埀法於千萬世蓋無疑者非惟繼體守文之主所當朝夕誦詠以知創業之艱難而三事暨大夫誠能佩而行之亦可以盡安上治民之責矣翰林學士承㫖嘉議大夫知制誥兼修國史兼吏部尚書臣詹同翰林侍講學士嘉議大夫知制誥同修國史臣樂韶鳯翰林侍講學士中順大夫知制誥同脩國史兼太子賛善大夫臣宋濂等上洪武正韻序人之生也則有聲聲出而七音具焉所謂七音者牙舌唇齒喉及舌齒各半是也智者察知之分其清濁之倫定為角徵宫商羽以至於半商半徵而天下之音盡在是矣然則音者其韻書之權輿乎夫單出為聲成文為音音則自然協和不假勉强而後成虞廷之賡歌康衢之民謡姑未暇論至如國風雅頌四詩以位言之則上自王公下逮小夫賤𨽻莫不有作以人言之其所居有南北東西之殊故所發有剽疾重遲之異四方之音萬有不同孔子刪詩皆堪被之絃歌者取其音之協也音之協其自然之謂乎不特此也楚漢以來離騷之辭郊祀安世之歌以及於魏晉諸作曷嘗拘於一律亦不過協比其音而已自梁之沈約拘以四聲八病始分為平上去入號曰類譜大抵多吳音也及唐以詩賦設科益嚴聲律之禁因禮部之掌貢舉易名曰禮部韻畧遂至毫髮弗敢違背雖中經二三大儒且謂承襲之久不欲變更縱有患其不通者以不出於朝廷學者亦未能盡信唯武夷吳棫患之尤深乃稽易詩書而下逮於近世凡五十家以為補韻新安朱子據其說以協三百篇之音識者雖或信之而韻之行世者猶自若也嗚呼音韻之備莫踰於四詩詩乃孔子所删舍孔子弗之從而唯區區沈約之是信不幾於大惑歟恭惟皇上稽古右文萬幾之暇親閱韻書見其比類失倫聲音乖舛召詞臣諭之曰韻學起於江左殊失正音有獨用當併為通用者如東冬清青之類亦有一韻當析為二韻者如虞模麻遮之屬如斯之類不可枚舉卿等當廣詢通音韻者重刋定之於是翰林侍講學士臣樂韶鳯臣宋濂待制臣王僎修撰臣李叔允編修臣朱右臣趙壎臣朱廉典簿臣瞿莊臣鄒孟逵典籍臣孫􅀢臣荅禄與權欽遵明詔硏精覃思壹以中原雅音為定復恐拘於方言無以逹於上下質正於左御史大夫臣汪廣洋右御史大夫臣陳寧御史中丞臣劉基湖廣行省㕘知政事臣陶凱凡六謄槀始克成編其音諧韻協者併之否則析之義同字同而兩見者合之舊避宋諱而不收者補之註釋則一依毛晃父子之舊勒成一十六巻計七十六韻共若干萬言書奏賜名曰洪武正韻勅臣濂為之序臣濂竊惟司馬光有云備萬物之體用者莫過於字包衆字之形聲者莫過於韻所謂三才之道性命道德之奥禮樂刑政之原皆有繋於此誠不可不慎也古者之音惟取諧協故無不相通江左制韻之初但知縱有四聲而不知衡有七音故經緯不交而失立韻之原往往拘礙不相為用宋之有司雖嘗通併僅稍異於類譜君子患之當今聖人在上車同軌而書同文凡禮樂文物咸遵往聖赫然上繼唐虞之治至於韻書亦入宸慮下詔詞臣隨音刋正以洗千古之陋習猗歟盛哉雖然旋音以七音為均均言韻也有能推十二律以合八十四調旋轉相交而大樂之和亦在是矣所可愧者臣濂等才識闇劣無以上承徳音受命震惕罔知攸措謹拜手稽首序於篇端于以見聖朝文治大興而音韻之律悉復於古云洪武聖政記序自古帝王創業埀統方有事於征伐而於彌綸天下之治具勢或未遑及其大統既集亦不過振厥宏綱而萬目未盡舉焉如漢之髙帝得國最正雖曰算無遺䇿而施之政令猶乏精詳故史臣賛之亦但云規模宏逺而已夫以高帝之雄傑尚如此則其餘從可知矣洪惟皇上以布衣受天命蓋與髙帝同雖當開拓土疆之際停戈講藝息馬論道夜以繼日無一時之寧迨夫正天位朝萬國孳孳圖治恒若不足於是綱舉於上目備於下誠有非髙帝所可及是故郊廟以及百神之祭禮文咸秩則祀事嚴矣御極之日即立儲位以正青宫則大本定矣衆建諸王列封功臣則大分昭矣兵戎之衆自京師達於郡府率皆設衛權一出於朝廷而為將者不得私而軍政肅矣中外官有定制一革冗濫之弊而倖位絶矣冠服有别防範有數而民志自定無僣侈矣他如申禁令覈實效育人才優前代正禮儀之失去海嶽之封嚴宫壼之法勵忠節之訓剗積嵗之弊如斯之類不一而足或前王所未得或行之有未至者皆煥然有條可以埀法後世此其故何哉盖自近代以來習俗圮壞行將百年而天生大有為之君首出庶物一新舊染之俗與民更始是故睿思所斷動契典則度越千古咸無與讓此正所謂錫勇智而正萬邦也臣備位詞林以文字為職業親見盛徳大業日新月著於是與僚屬謀取其有關政要者編集成書列為上下巻凡七類合若干條名曰洪武聖政記然而天之髙明也萬物莫不覆焉地之博厚也萬物無不載焉聖人之作也萬物咸興欣覩焉故凡金科之頒玉條之列著之於簡書刻之於琬琰傳之於聖子神孫者將與天地相為無窮書曰惟天聰明惟聖時憲詩曰詒厥孫謀以燕翼子此之謂矣其所以致四海雍熈之治比隆於唐虞三代者豈不在於兹乎豈不在於兹乎臣不佞請以是序於篇端極知僣踰無任隕越之至洪武八年歲次乙夘正月甲子翰林侍講學士中順大夫知制誥同修國史兼太子贊善大夫臣宋濂拜手稽首謹序昭鑒錄序洪武六年三月癸卯朔上詔秦相府右傅臣文原吉翰林修撰臣王僎國子博士臣李叔允助教臣朱復秦相府録事臣蔣子杰晉府紀善臣呂宗盛録事臣杜環燕府録事臣張雲翀吳府録事臣吳從善楚府録事臣王鏞靖江府録事臣宋善類集厯代諸王事實既受命乃取東觀諸史相與研磨善與惡可為勸懲者咸采焉其文蕪事泛則删取其大槩或有奢淫不軌無復人理者輒棄而不收越二十又二日甲子書成繕寫為二巻臣原吉等詣闕投進仍請以太子贊善大夫臣宋濂為之序上可其奏先是有詔禮部亦修是書前尚書臣陶凱今尚書臣牛諒主事臣張籌遂録為一巻上塵乙夜之覧然二書義例本同無大相逺臣籌因㑹萃衆論合而為一承詔刻梓以傳名之曰昭鑒臣濂因得而序之臣濂欽惟皇上既正天位即定青宫衆建諸子為王作鎮雄藩於是發自淵衷錫以寳訓凡箴戒之諄切禮儀之等第兵衛之出入與夫職制營繕法律供用之屬具録成書共一百一十有餘條然慮其文太繁前史之事可據以為覽戒者多於各條之下微著其綱而其目則悉載此書庶幾得以互見其為聖子神孫建萬世之丕基者可謂深且長矣於戱盛哉然代天而理物者天子也衛天子謹藩制以壯磐石之宗者諸王也天子則元首諸王則手足是謂一體者也其可不同心而同德者乎昔者賢王有見於此敬以修身禮以齊家政以馭衆夙夜戰兢唯恐不能盡屏翰之寄故禄位傳諸無窮聲光顯於來世其或不賢而弗之察欲縱情逸且失其秉彛之性而欲久享爵秩抑亦難哉觀録中所紀厯厯蓋可數也傳曰義勝欲者從欲勝義者㐫又曰惟命不于常道善則得之不善則失之矣嗚呼寳訓具在赫若日星之臨覽是録者其懋戒之哉是歲五月三日臣濂拜手稽首謹序太古正音序余少時則學琴嘗學之而患無善師與之相講說雖時按書布爪滌堙鬰而暢懣憤心弗自是也後聞冷君起敬以善琴名江南當時學琴者皆趨其門余尤慕之以為安得一聽以償夙昔之好乎及入國朝余既被命起仕而冷君亦繼至時天子方注意郊社宗廟之祀病樂音之未復乎古與一二儒臣圗所以更張之冷君實奉明詔定雅樂而余預執筆製歌辭獲數與冷君論辨冷君閒抱琴為余鼓數曲余瞑目而聽之悽焉而秋清盎焉而春煦寥寥乎悲鴻吟而鸛鶴鸞鳯追而和之也砯砯乎水合萬壑瀑布直瀉其上而松桂之風互答而交衝也懇懇乎如虞夏君臣上規下諷而不傷不怒也熈熈乎如漢文之時天下富實而田野耆耄乘車曳屣嬉遊笑語弗知日之夕也余倦為之忘寢不自知心氣之平神情之適閱旬日而餘音繹繹在耳誠知其美欲從而學焉而余已老耄不可勉矣既而冷君出其所次琴譜曰太古正音者示余且曰子之所聞者皆出乎此所未聞者可按譜而學也子可以序之乎余有感焉樂之為教也大矣古之人自非居喪服有異故則樂未嘗違乎左右所以攝忿戾之氣通神明之德其助豈為細哉後世古樂寖久寖亡今之所存若琴者無幾士大夫又鮮能而寡聽之雖如余之有志於學猶有耄老無聞之悔况不若余之質固者乎誠以有其器而無其譜有其譜而其制不全故也今冷君獨不自私其藝將使人人可按譜而學豈非古人之用心哉然余恐人見其易而忽之也故道願學之意以見其為術之難述所聞者以告之使人知冷君之用志於琴甚久非特空言而已也冷君名某某郡人今為協律郎南征録序皇帝即位之二年春正月詔使者易濟往安南告以中夏革命萬邦底寧國王陳日煃遣陪臣同時敏奉表稱臣上嘉其事大有禮降璽書錫以王封仍頒之金印勅翰林侍講學士張以寧及典簿牛諒將之以行未及境而日煃卒以寧乃䕶詔印留洱江上使諒往其國諭以朝廷所以來之意嗣君日㷂復遣陪臣杜舜卿來告哀上素服御西苑之幄殿召舜卿入見慰問有加於是親御翰墨製祭文一通命翰林編修王廉充祭弔使既至其君臣出迎於郊議授受之禮往返數四不能决廉厲聲訶之乃奉御製文於綵輿迎入夀光殿别設日煃靈位於殿前使者南向而布宣之日㷂率郡臣再拜俛伏以聽成禮而還此皆王化逺被蠻夷之國無不駿奔受命而為之使者所以導宣德意使萬里之外天威咫尺非賢者善於辭令亦豈能之哉廉嘗與濂為文字交遂以所作歌詩曰南征録者授濂序昔吾夫子以誦詩三百能專對於四方然則詩固宜使者之所優為矧本乎人情該乎物理廉盖學之有素矣發於中而形諸外者夫孰禦哉今觀其措辭和而弗流激而弗怒雅而不凡可謂能專對者非耶廉字熈陽括蒼人以能文辭稱所著迂論數十巻鉤考名物制度之異同千載不决之疑能以意决之詩特其一事爾廉發京師也以三年夏四月其還也以四年春二月上念其勞親擢為工部員外郎以階資躐等力辭不拜今改授澠池丞云㑹試紀皇明設科倣古者六藝之教參以厯代遺制欲兼收文武而任之既詔天下三年一賔興其薦于州郡者凡五百人五㧞其一而授之以官猶以為未足復勅有司自壬子至甲寅三歲連貢歲擢三百人逮於乙夘始復舊制湛恩至渥也先是京畿遵行鄉試中程式者七十二未及貢南宫上求治之切皆采用之至有拜監察御史者及是當㑹試之期若河南若陜西北平若山之西東若江西湖廣若浙江若廣之東西若福建其為行中書十有一俊秀咸集而高句麗之士與焉右丞相臣廣洋左丞臣惟庸同禮部尚書臣凱臣訓文啓於東朝然後入奏於是詔臣凱與前侍講學士臣庭堅為主司而以侍讀學士臣同國子司業臣濂吏部員外郎臣本前貢士臣恂與考試事上召至内庭親諭以取舍之意臣凱等受命而出交相戒飭期有以副上㫖遂議分經而考互相㕘定使無所憾乃進於主司主司徧觀而後次第之猶慮滄海有遺珠之歎巻之已黜者復覆視而致謹焉晝盡其力夜向午燭影熒熒於簾几間不敢自寧士之就試者二百黜者僅八十人署名於榜用鼓吹導至中書掲而張焉甚盛典也書有之野無遺賢萬邦咸寧夫賢之在野無以自見多由進士升名於天府故昔人謂進士為將相科如以宋言之深沉有德如王旦面折廷爭如㓂準出當方面如張詠蓋不可以勝數至今科目倚之以為重與兹選掄者當思以前修自朂以忠貞佐國家而致黎民於變時雍之治庶於明體達用之學或無所媿不然則是録之行他月將有指其名而議之者矣可不慎歟可不慎歟庚戌京畿鄉闈紀録序昊天有成命皇明受之謂天下可以馬上得不可以馬上治於是大興文教寵畀四方乃洪武三年夏五月以科目選士詔内外之官胥此焉出閱三月畿甸之士將集試於京府禮部以聞皇帝御謹身殿召前御史中丞臣基今治書侍御史臣裕伯俾司去留之任而以翰林侍讀學士臣同𢎞文館學士臣稼起居注臣韶鳯尚寳丞臣潜國史臣濂佐其事各賜幣帛而勞遣之既受命不敢宿於家即相率詣試所精白一心以承休德先期一日夜漏下十刻始命題至次日黎明給之兵後學廢不敢求備於人其來試者一百三十有三在選者過半焉既撤棘僉謂遭逢盛際文運方開不可無紀述以示於後爰以諸執事及貢士之姓名輯成小録而俾濂序之濂惟天下弗靖者幾二十年干戈相尋曾無寧日今得以涵濡聖化而囿於詩書禮樂之中者果誰之賜歟是知帝德廣被其大難名不可以一言而盡也棫樸之詩有曰周王夀考遐不作人聖天子之造士者可謂至矣烝民之詩有曰夙夜匪懈以事一人凡為士者尚思盡瘁報國以無負於科目哉是為序辛亥京畿鄉闈紀録序進士之科始於隋而盛於唐唐於進士之外又有明經明法書算諸科然皆有學以肄其業每歲之冬州縣館監課試其成者使與計偕其不在館學而舉者謂之鄉貢既上尚書始由戸部集閱而關於考功復課試其可者而第之此其初制也自時厥後其法靡常而諸科或廢或因亦無一定之論唯進士之設行之頗久其得人之盛考諸載籍猶班班可見也皇明誕膺丕圗繼天出治迺法前王建進士科用康保于我烝民洪武辛亥秋八月洊當鄉貢之期凡畿内三州十七府之士皆歡欣相告裹糧而奔走儀曹具以狀聞上親選兵部尚書吳琳國子司業宋濂司考文之任命即日蒞事而中書右丞相汪公左丞胡公復妙柬在廷之臣廉慎而通文藝者為受巻謄録對讀彌封等官期各盡厥職庻有以副上側席求賢之意其不輕也較然矣夫自厯代以來為之士者焚膏繼晷矻矻窮年欲徼科目以為身榮奈何有終身而不霑一命者設得之秋髮繽紛而有弗獲禄食者其間幸無二者之累拘於嵗月又有不能改合入官者何其艱哉今我皇上求治之切一藝一才無不庸擢上第者固不限資序而爵之或見遺於南宫亦俾其與有禄食寒酸之士一旦遭逢盛際紆朱拖紫秉笏埀紳光顯尊榮照耀耳目此皇恩之滂沛醲郁誠厯代之所無有為之士者動静云為之間曷思所以致此哉其尸位素餐而不知報國者妄也違道干譽而不務恤民者殆也貪墨敗類喪名檢而隳風教者非人也鄉闈小録成直書首簡用以為多士之規是嵗八月十九日金華宋濂謹序春秋本末序洪武十一年夏五月皇太子御文華殿命侍臣講讀春秋左氐傳既而曰諸國之事雜見於二百四十二年之中其本末未易見曷若取春秋分記而類入之分記眉人程公說所述有年表世譜名譜世本附録等類頗失之繁但依世本次第成書先周尊天王也次魯内望國也次齊晉主盟中夏故列之魯後而齊復後於晉以晉於周魯為親其霸視齊為長也自齊而下次宋衛蔡陳地醜德齊而宋以公爵列於三國之首衞蔡陳之爵皆侯也鄭曹燕秦皆伯也陳蔡獨後異姓也若楚若吳若越以僣號見抑於春秋並居其後而小國戎狄附焉於是文學臣傅藻等受命纂輯編年一主乎魯雖曰無事一年各具四時諸國依前序次各繫以事其有一事再見及三見者通繫於主霸者之下若重復者則削之訓詁以杜預為之主凡例所及一一取㫖而後定繕寫為三十巻自春和門投進皇上聞而嘉之賜名曰春秋本末勅内官刋梓禁中以傳示四方臣濂聞諸師云五經之有春秋猶法律之有斷例也法律則用刑禁暴以為之範防㫁例則斟酌物情是非而定罪之重輕也是故古之君臣無不習於春秋使君而知春秋方能盡代天理物之道使臣而知春秋方能盡事君如事天之誠天衷以之而昭民彞以之而正何莫非春秋之教也然而尊王賤霸内夏外夷其書法實嚴必當曲暢以觀其同㕘互以察其變所謂屬辭比事者始可言也不然如涉彼大海渺無津涯豈一蠡之可測哉敬惟皇太子殿下潜心聖學其於六經之文循環讀之而尤惓惓於春秋今命宫臣纂輯成書一覽之頃其本末瞭然斯殆以人文化成天下也歟皇上以大舜之資善與人同亟命流布於四海是心也天地之心也臣幸生盛時遭逢兩宫之聖不勝慶忭之至輒忘䟽賤著其述作大意於篇首其校正無訛者翰林典籍臣劉仲質國子助教臣儲惟德正書入梓者中書舍人臣朱孟辯臣宋璲臣桂慎鑄印局副使臣詹希元云洪武十二年嵗次己未五月五日前翰林云云臣金華宋濂稽首謹序春秋屬辭序春秋古史記也夏商周皆有焉至吾孔子則因魯國之史修之遂為萬代不刋之經其名雖同其實則異也蓋在魯史則有史官一定之法在聖經則有孔子筆削之㫖自魯史云亡學者不復得見以驗聖經之所書往往混為一塗莫能致辨所幸左氏傳尚明魯史遺法公羊穀梁二家多舉書不書以見義聖經筆削粗若可尋然其所蔽者左氏則以史法為經文之書法公穀雖詳於經義而亦不知有史例之當言是以兩失焉爾左氏之學既盛行杜預氏為之註其於史例推之頗詳杜氏之後唯陳傅良氏因公糓所舉之書法以考正左傳筆削大義最為有徵斯固讀春秋者之所當宗而可憾者二氏各滯夫一偏未免如前之弊有能㑹而同之區以别之則春秋之義昭若日星矣奈何習者多忽焉而弗之察其有致力於此而發千古不傳之秘者則趙君子常其人乎子常蚤受春秋於九江黄先生楚望先生之志以六經明晦為己任其學以積思自悟必得聖人之心為本嘗語於子常曰有魯史之春秋則自伯禽至於頃公是已有孔子之春秋則起隱公元年至於哀公十四年是已凡一事中皆具二義必先考史法然後聖人之筆削可得而求矣子常受其說以歸晝夜以思忽有所得稽之左傳杜註備見魯史舊法粲然可舉亟往質諸先生而先生殁已久矣子常益竭精畢慮幾廢寢食如是者二十年一旦豁然有所悟入且謂春秋之法在乎屬辭比事而已於是離析部居分别義例立為八體以布列之集杜陳二氏之所長而棄其所短有未及者辨而補之何者為史策舊文何者是聖人之筆削悉有所附麗凡暗昧難通厯數百年而弗决者亦皆迎刃而解矣遂勒成一十五巻而名之曰春秋屬辭云嗚呼世之說春秋者至是亦可以定矣濂頗觀簡䇿所載說春秋者多至數十百家求其大槩凡五變焉其始變也三家競為專門各守師說故有墨守膏肓廢疾之論至其後也或覺其膠固已深而不能行逺乃倣周官論人之義而和解之是再變也又其後也有惡其是非淆亂而不本諸經擇其可者存之其不可者舍之是三變也又其後也解者衆多實有溢於三家之外有志之士㑹萃成編而集傳集義之書愈盛焉是四變也又其後也患恒說不足聳人視聽爭以立異相雄破碎書法牽合條類譁然自以為髙甚者分配易象逐事而實之是五變也五變之紛擾不定者蓋無他焉由不知經文史法之殊此其說愈滋而其㫖愈晦也歟子常生於五變之後獨能别白二者直探聖人之心於千載之上自非出類之才絶倫之識不足與於斯嗚呼世之說春秋者至是亦可以定矣如濂不敏竊嘗從事是經辛勤鑚摩不為不久卒眩衆説不得其門而入近獲締交於子常子常不我鄙夷俾題其書之首簡濂何足以知春秋間與一二友生啓而誦之見其義精例宻咸有據依多發前賢之所未發譬猶張樂洞庭五音繁㑹若不可以遽定細而聽之則清濁之倫重輕之度皆有條而不紊子常可謂深有功於聖經者矣濂何足以知春秋輒忘僣踰而序其作者之意如此若夫孔子經世大㫖所以埀憲將來者已見子常之所自著兹不敢勦說而瀆告之也子常姓趙氏名汸子常字也歙休寧人工古文辭尤邃於諸經雖疾病沉鬱之久不忘著書隱居東山四方學子尊之稱為東山先生子常别有春秋師說三巻春秋左氏傳補註三巻春秋習傳十五巻與屬辭並行於世前史官金華宋濂謹序孝經集善序孝經一也而有古今文之異者蓋遭秦火之後出於漢初顔芝之子貞者為今文凡十八章而鄭𤣥為之註至武帝時得於魯恭王所壞孔子屋壁者為古文凡二十二章而孔安國為之註後世諸儒各騁意見尊古文者則謂孔傳既出孔壁語其詳正無俟商確揆於鄭注雲泥致隔必行孔廢鄭於義為允况鄭𤣥未嘗有註而依倣托之者乎尊今文者則謂劉向以顔芝本㕘校古文省除繁惑而定為今文無有不善為之傳者縱曰非𤣥所作而義㫖實敷暢若夫古文并安國之註其亡已久世儒欲崇古學妄撰孔傳又偽為閨門一章文句凡鄙不合經典將何所取徵哉二者之論雖莫之有定然皆並存於時各相傳授自唐𤣥宗註用今文於是今文盛行而古文幾至廢絶宋司馬温公始專主古文撰為指解正之且憫流俗信偽疑真諄諄見於言辭之間以予觀之古今文之所異者特辭語㣲有不同稽其文義初無絶相逺者其所甚異唯閨門一章耳諸儒於經之大㫖未見有所發揮而獨斷㫁然致其紛紜若此抑亦末矣自伊洛之學興子朱子實起而繼之於是因衡山胡氏玉山汪氏之疑而就古文考定分為經傳去其衍文及不合經㫖者千載是非遂定於一元室之初吳文正公出於臨川又以今文為正頗遵刋誤章句重加訂定而為之訓解其㫖益明而無遺憾矣東廣孫君蕡讀而悅之因增以諸家所注名曰孝經集善而其大義則以朱子及吳公為之宗蕡通經而能文辭采擇既精而又發以己意其書當可傳誦故余為疏厯代所尚之異同序於篇端蕡字仲衍洪武壬寅鄉貢進士今為織染局使云書史㑹要序天台陶九成新著書史㑹要成翰墨之家競欲觀之以謄鈔之不易也共鍥諸梓而以首簡授予序序曰史以從道持中為義盖記事者也黄帝時始立史官而蒼頡沮誦實居其職蒼頡制字之人也自時厥後史氏遂掌官書以賛治至周宣王太史籒復造字五十篇以教童幼所謂史者豈非字學之本源乎然則紀厯代之善書者名曰書史非僣也宜也九成本衣冠子自青年即精究六書之法備知字文相生之意乃辨析古文篆籒分𨽻行草諸家異同并載其人而附見焉先之以帝王次之以名臣又次之以才士大夫起自三皇迄於國朝凡名一善者悉具録之其事核其論確而有徵皆遍采史傳及前修所著書不復以異議㕘乎其間書成釐為七巻予嘗取而觀之不覺喟然歎曰夏殷而上左史記言右史記事周則大史小史内史外史御史分掌其事其任至重也大則國家禮樂刑政治忽善惡固無所不當紀小則一事一物該古今而資問學者亦不可不明辨如此而名之曰史庶幾可也穠葩豔卉隨春開落何補於事功陸佃集之號為花史硯雖適用不過一石何關於治教米芾編之目為硯史是則奚可哉必也如吾九成精究六書直探蒼頡史籀之本源厯代字體變化如浮雲者皆可攷見致知格物之學似不為無助茍稱書史孰謂非宜哉抑予聞六書居六藝之一周官保氏掌飬國子則教之蓋自聖人以書契代結繩之治實取諸夬夬揚於王庭其用最大宜其天下無不學學之當無不至也予又獨嘅近世以來徇末而忘本濡毫行墨春蛇秋蚓之連翩輒揚眉以驕人曰此斯氷也此右軍大令也有識者觀之曾不滿夫一哂讀九成之書者不知能一自警否乎九成名宗儀積學能文辭嘗覧雜傳記一千餘家多士林所未見者因倣曾慥類說作說郛若干巻曾所編者則畧去之君子謂其尤精博云理學纂言序自孟子之殁大道晦㝠世人擿埴而索塗者千有餘載天生濂洛關閩四夫子始揭白日於中天萬象森列無不畢見其功固偉矣而集其大成者惟考亭子朱子而已四夫子之㣲辭精義朱子與呂成公既已纂成近思録以六百二十二條彚分十又四篇朱子之道無異於四夫子也其散見語言文辭者廣博淵深若未易涯涘烏可以不成編是故覺軒蔡氏與三嶼陳氏皆嘗采為續録以傳退軒熊氏患其去取不同摭朱子諸書之至精者為語要而於論學論事尤詳虚谷方氏與熊氏同時則又以為門人之所紀録不盡得其真未若文辭出於親製而無可疑復於百十巻中句抄節析為四十類名之曰晦庵集鈔嗚呼尊朱子之學者諸家亦可謂有其志矣然而傷於簡者既不足盡其真醇病於繁者又不能領其樞要二者蓋胥失焉烏傷朱君伯清自幼至老酷嗜朱子之書每謂人曰朱子之學菽粟布帛也天下不可一日無也伯清既受薦為國史編修上簡主知特詔授經於楚王府其見於辭章資為講說皆以朱子為宗已而不俟引年納禄而歸寄迹浦陽江上日取朱子書温繹之察隂陽鬼神之運行驗心情性命之發舒明白昭著循環無窮皆本乎道體之妙所見端確所得粹凝於是即朱子精語編成理學纂言一書其凡例全倣近思録其所采語録雖雜以方言唯恐失真片辭不敢移易氣象或不類者删之其於文集則節取切而要者載焉凡八千三百條方之於諸家殊適厥中取而讀之不翅親逢朱子在坐而見門人難疑答問之盛不知其身生於二百年之後也伯清嘉惠後學之功何其至歟世之好著書者多矣持一偏之見操無根之學肆口詆斥恬不自愧何嘗能窺朱子之藩籬是皆獲罪於伯清者也抑嘗聞孔子天之孝子也以其扶持天地植立綱常為千萬世計也朱子之志實與孔子同是亦孔子之孝子也當今學者瀾倒波隨一惟卑陋之歸伯清能尊朱子之學而扶導之豈非朱子之孝子乎夫孝者善繼人之志者伯清實有焉伯清名濂官至楚相府長史其父裕軒先生師事許文懿公公則上承朱子六傳之緒其家學淵源蓋有所自云洪武十二年九月二十四日同郡宋濂序呉郡廣記序呉在周末為江南小國秦屬㑹稽郡及漢中世人物財賦為南東最盛厯唐越宋以至於今遂稱天下大郡然其因革盛衰之際紀載於簡册者自呉越春秋越絶書以下若晉張勃顧夷隋虞世基唐陸廣微等所述及元和郡縣志寰宇記各有所明迨宋之時羅處約有圖經朱長文有續記范成大趙與恩皆撰類成書厥後有章悊者病其未完作吳事類補宋亡書頗散軼元趙儀鳯為總管嘗集諸儒論次遺闕㑹改官不果成入國朝呉縣教諭盧熊閔前志之紛乖以為茍不合而壹之恐不足示來者乃覽衆說摭遺事芟煩取要族别類分為序例一以舉其凡為古今記一以記其事為總序一以覈其名為表二以著職官氏族之詳為志八以述地理都邑文學祠祀食貨禮樂兵防天官之屬為列傳若干以見古昔人物之美其目曰名宦名臣儒林文藝良吏忠義孝友髙行隱逸而列女之節方伎之良及其事有不可棄者為雜傳附焉總之為巻五十其後有集文十巻以備文藝之實為外記五巻以存神仙浮屠之可考者題之曰呉郡廣記於是數百里之内二千載之間其事可按書而得矣知府某郡李侯某嘉是書有繫於政也將命工刻板以傳丁内艱去已而高郵湯侯德來繼其職遂督成之熊用薦者出由工部照磨為中書舍人以余有同朝之好請序其首古者列國皆有史官下至州閭莫不有之然不過記言書事而已及漢司馬遷班固創為序紀傳志年表之法由是四海之内無復遺事信史氏之善者也後世之郡得專社稷山川之祭有政令教化之施儼如古諸侯之國固不宜無所紀述而况於呉嘗為封國非他郡之比者哉厯漢至今雖間有所作而無完文以考其事物之全誠政之闕者也熊獨能毅然以筆削為己任倣漢史之法損益舊典為一郡成書豈非好古之士乎李湯二侯能知所重而圖其傳亦可謂達於政體者矣後之人覽是書治身居官取前之人成憲以為法將見道德興而習俗美勾呉之區與鄒魯無異矣則是書之為教不亦大哉余善熊獨能急世俗之所緩而篤於好古也為序其槩俾刻焉八詠樓詩紀序八詠樓在婺之城上西南隅其建立也實昉於武康沈休文齊隆昌初休文以吏部郎出守是邦民清訟簡號稱無事既創樓名之曰𤣥暢復為詩八詠以寫其山川景物之情宋至道中馮伉來知州事以為永明之體實本於休文而祖於徐庾心尤篤好之勒其辭於石寘之樓下且更𤣥暢為八詠期以傳示於無窮於是薦紳之家相繼有作舂容乎長篇鏗鏘乎短韻粉版𤣥書充溢於四壁矣好事者嘗輯為一編鍥諸文梓兵燹之餘漫弗復存南峯楊尊師竊病之乃與其徒胡君𤣥範旁搜逺采筆以成書上自休文下迄近代凡有所作粗及於樓者靡有所遺濂頗讀而疑之休文固知名之士其在齊梁之間立朝大節不能無所憾夫不能無所憾則人將棄之奈何其詩獨傳於今也豈解佩被褐果有慕君戀闕之意歟抑高才博洽名亞董遷或可以驚世而駭俗歟濂之愚皆不足以知之意者婺為禮義之邦士君子世惇詩書心存忠信往往勇於自治而不暇責人稍有寸善揚之唯恐不亟况休文嘗為民上者歟古所謂居其邦不非其大夫者獨吾婺之為然歟然而休文至今近九百載來守婺者不知其幾人冺冺而無聞者固多矣三尺童子過斯樓之下者亦能指曰是休文之遺跡也此無他誠以葩藻之辭好者既衆故傳之者久與浮文豔句有識者之所不能道尚能烜著震耀之若此則夫道明德立其言足以繫世教之重輕者又將何如歟學道之士益思有以自朂焉可也紀中賦凡若干首古詩若干首絶句若干首分為三巻巻後各有其竹素有續得者輒補入焉南峯名道可字某南峯其號也恂恂有賢行望而知為好古之士今主領寳婺觀事觀與樓盖聨峙云重刻貞觀政要序貞觀政要者唐史臣呉兢之所輯也兢浚儀人有良史才用魏元忠朱敬則薦詔直史館修國史遷右拾遺内供奉神龍中改右補闕累遷起居郎數上疏論事言人之所難言尋拜諫議大夫復修史轉太子右庶子開元十三年元宗東封泰山道中頗馳射為樂兢復極諫明年六月大風詔羣臣陳得失兢言斥屏羣小不為慢逰出不御之女减不急之馬明選舉慎刑罰杜徼倖存至公八事皆當時所諱者景龍間所修國史失實兢患之乃私述唐書唐春秋皆未就至是詔赴館撰録進封長垣縣男久之坐書事不當貶荆州司馬累遷洪州刺史復坐累下除舒州天寳初入為恒王傅卒年八十兢嘗定武后實録叙張昌宗誘張說證魏元忠事頗言說已許之賴宋璟等激礪苦切故轉禍為忠不然皇嗣且殆後說為相屢以情請改兢拒曰徇公之情何名實録卒不從世比之為董狐云其為人大畧如此初兢屢修國史見文皇之朝君明臣忠可取為後嗣法乃纂是書十巻合四十篇上之中宗然當復辟之初轉移之機間不容髮使中宗能觀之以法文皇則削武氏位號而崇恩之廟不復矣信任舊臣敬暉諸人不罷政事矣嚴於隂治韋氏之禍不致蹈覆轍矣奈何視為空文而弗之講徒使兢之孤忠遑遑焉而無所伸可勝歎哉厥後文宗踐位始喜讀而篤行之太和初政燦然可觀雖未能如貞觀之治亦可謂能法其祖武者矣自是以來其書盛行於世南北刻本多有舛訛臨川戈直嘗集諸家而校讐之然亦未能盡善昇有良士曰王敬仁故大族也欲刋梓於家塾以傳余遂假中祕本重為正之理有可通者因仍其舊不敢輒改夫讀其書者不可不知其人古之道也復詳序兢之行事於首簡云書之篇端謂兢為衛尉少卿兼修文館學士與史所載頗不合濂疑神龍進書之時方改右補闕未應陞遷如此豈或他有所據邪革象新書序革象新書者趙督先生之所著也先生鄱陽人隱遁自晦不知其名若字或曰名敬字子恭或曰友欽其名弗能詳也故世因其自號稱之為縁督先生先生宋宗室之子習天官遁甲鈴式諸書欲以事功自奮一日坐芝山酒肆中逢丈夫修眉方瞳索酒酣飲先生異而即之相與談𤣥者頗久且曰汝來何遲也於是出囊中九還七返丹書遺之臨别先生問其姓名曰我扶風石得之也得之蓋世傳杏林仙人云先生自是視世事若漠然不經意間往東海上獨居十年註周易數萬言時人無有知者唯傅文懿公立極畏敬之以為發前人所未言先生復悉棄去乘青騾從以小蒼頭往來衢婺山水間人不見其有所齎旅中之費未嘗有乏絶竟不知為何術倦㳺而休泊然而亡遂塟於衢之龍㳺雞鳴山原有朱暉德明者龍㳺人也久從先生㳺得其星厯之學因獲受是書而暉亦以占天名家暉既没其門人同里章濬深懼冺滅無傳亟正其舛訛刻於文梓而來徵濂為之序濂聞天官之說厯代所歩必微有弗同蓋欲隨時考驗以合於天運而已自唐涉宋其法寖精至元為尤宻耶律文正公楚材以金大明厯後天乃損節氣之分滅周天之杪去交終之率治月轉之餘以至兩曜五行後先出没皆有以研窮之而正其失且以西域與中國地里相去之逺立為里差以增損之名曰西征庚午元厯可謂無遺憾者矣已而許文正公衡王文肅公恂太史令郭公守敬復與南北日官陳鼎臣鄧元麟等徧㕘累代厯法重測日月星辰消息運行之變酌取中數以為厯本即所定授時厯厯經厯議二書猶存可考證弗誣也君子謂當世所推歩者皆二三大儒㑹其精神博其見聞備其儀像而後能造其精微今先生值屋書有禁之時又獨處大江之南且無所謂觀天之器其所著書往往與諸公脗合而無間者雖絶倫之識有以致之誠以人心之理本同故皆相符而無南北之異也抑余聞西域逺在萬里之外元既取其國有札馬魯丁者獻萬年厯其測候之法但用十二宫而分為三百六十度至於二十八宿次舍之說皆若所不聞及推日月之薄蝕頗與中國合者亦以理之同故也嗚呼四海内外凡圓顱方趾之民其心皆同其理皆不殊也豈特占天之事為獨然哉先生之易已亡於兵燼所著兵家書暨神仙方技之言亦不存其所存者僅止此而已當與厯經並行無疑濂故特序先生之事於篇首使讀者知先生之學通乎天人庶幾相與謹其傳焉景定諫疏序吾婺舊稱禮義之郡士生其間皆存氣節㐲忠義而東陽為尤盛自宋中世以來以直道著稱而列於國史者甚衆雖布衣下位之士不在諫諍之職而上封事者亦往往有之豈其人皆善為言論哉德澤之所漸濡師友之所講說風俗成於下而至於斯盛也余自少時好觀宋史凡吾郡聞人事有可稱者輒識之既而復歎士之幸獲見於史者如此不幸而遺軼不傳者蓋多有矣往年在翰林始得見東陽賈廷佐上高宗疏廷佐為桐廬主簿憤秦檜主和議紹興戊午上疏論之其辭甚切直而史不載至七世孫權出以示人世之士大夫為文以稱其忠廷佐之名始顯於天下廷佐之鄉人杜士賢在理宗時為武學生景定甲子秋因星變求言士賢上疏力攻賈似道誤國今年秋其曽孫實亦以示余其事與廷佐相類然士賢初無一命之爵其言請黜退似道厯數其罪切直頗同於廷佐而實又能趨京師遍求賢薦紳文辭以白之且將刻梓以傳或非廷佐後人所能及余於是又歎忠義之士天雖抑之於當時天每扶植其子孫使昭其聲光於不朽是豈智力所及哉當似道擅權時威燄足以生死人士賢發憤言之不至於殺身者毫髮間耳今似道之後不聞有為士者而人亦羞稱之士賢之子孫方守其遺業不墜而聞士賢之風者雖野人稚子皆嗟慕以為賢善惡之公昭明也如是則夫有志於忠義者尚何所憚而不為哉然則是疏之傳非特可補史氏之闕為人臣者皆可以鑒矣士賢字希聖後中武科授武岡軍新寧縣簿尉遂攝其令轉綏寧旴𣅿兩縣令以終篆韻集鈔序昔漢許慎氏作說文解字十四篇隨其偏旁分為五百四十部其文則九千三百五十有三焉南唐徐内史鍇苦其偏旁奥宻不可悉知而欲便於披閱乃以切韻譜其四聲名曰說文韻譜篆之有韻蓋自内史始宋巽巖李燾以韻譜局於四聲則偏旁卒未易見復依類篇分五音先後悉取說文次第而聨貫之至合溪戴洞之出用九類括說文之諸部與韻譜等書各自名家然互補益而未有能集之者鄱陽劉君爆幼承先訓留意於篆學厯年之久靡不貫通於是用韻譜為宗而其先後則分以五音每字之下又析以九類先儒之說有相發明者輒具録之字義之未安者必疏其是非而申以已說說文所引古文六經其字與今所行本或不同集為一編以附其後共成若干巻精宻而不失於粗疎嚴簡而不致於冗泛其可傳世蓋無疑者夫自宓犧命子襄為飛龍氏造為六書至黄帝時蒼頡從而衍之世相授受文字孳育周因建外史以掌其事秦漢以來官廢弗設遂致訛繆失真許氏竊患之采史籀李斯揚雄之書博訪通人兼考之於賈逵然後集為說文之書當是時去古猶近遺文宜可徵故其説最有據依所謂部端五百餘字蓋蒼頡篇云嗚呼向非許氏六書之學其不微且絶邪李陽冰生於唐代去許氏則逺矣雖號宗其書輕肆臆說妄加排斥内史頗以為恨作繫傳四十巻而反正之謂之傳者欲尊之如經也内史之後唯吳興道士張有尊之之意畧同許氏之學遂如金科玉條為世之法程間嘗獲習其書美則美矣而重複闕逸尚多有之古籀二文亦疑呂忱㕘入其間今世之所存者未必皆許氏之舊然則繹之正之有賢者作不能不盡心於斯也雖然說文其至矣乎濂自來金陵見六書正譌説文字原二書乃鄱陽周伯琦氏所造頗以許氏為宗今又覩爆是書亦羽翼說文之學唯恐其不明何鄱陽之多賢邪周氏之所著已盛行爆之此篇士大夫多願觀之濂故為序作者之意於篇首嗚呼契二儀之運該萬彚之理無過於六書博雅之士慎毋以為小學而忽諸則善矣爆字彦正嘗為嚴之建德令氣貌粹然有德君子也其於名物制度之學尤精云重校漢𨽻字源序𨽻之源何始乎曰秦皇時程邈减小篆為之便於𨽻佐故名曰𨽻書然未有㸃畫俯仰之態故西京之世金石刻皆鮮用之至東漢時賈魴以寫三蒼其法方大行勒諸碑碣者多紛紛𨽻書矣考洪适之所輯兩京僅一二見東漢則不啻數百如是則謂之源於漢亦可也曰非漢也而秦亦非也按齊之胡公太公六世孫先秦皇四百餘年後有發其臨淄冢者棺上有文隱起字與漢𨽻正同由是而觀非秦也源於周也邈則推廣之耳雖然非周也曷為知非周也使臨淄之棺不發孰不謂其必始於秦哉先秦皇四百年已有𨽻書矣又焉知先胡公四百年果無之哉去古既逺人無由稽其詳爾濂竊意伏羲之畫八卦即字之本源蒼頡衍而為古文其五百四十言列於許慎說文每部之首蓋與篆籀似無大異此固篆籀之變因之而相生豈𨽻書獨有待於後世邪夏殷以來諸侯之國各有書其體制或殊或一或可辨或不可辨然亦不越乎六書甚若沿襲為之而畧加變通者𨽻與篆籀雖㣲有不同疑其間出於古文之後各以其名為家或自業之精者相傳爾不然許慎嘗病當世學者稱秦之𨽻書為蒼頡時書其虚稱邪抑亦别有所本邪濂皆不敢必其然也同姓宋君季子博學篤行且留意於𨽻古之書所獲漢魏諸碑刻必夙夜潜玩不知有寒暑其父友處士桂兢刑部王經勸之曰學必有師無師雖勞弗工也季子乃三走鄱陽見伯誠先生歐君復歐君憫其用志不分悉以作𨽻之法授受焉凡隂陽向背性情逆順俱得其要領久之復往龍虎山中質諸方壺翁從義翁蓋深於𨽻學者見季子欣然接之語蟬聨不自休季子於是學大進遂以善𨽻書知名當時先是宋儒有婁機彦發者檇李之人也以世所存漢碑三百有九韻類其字字有數體具列之號之曰漢𨽻字源季子頗病其未博研精覃思增多一千八十七字仍集師友微言作漢𨽻綱領一十四則别撰辨訛字類及連綿字畧又一千三百八十四字至若字有闕遺采班馬二家所用者補之目為兩漢字統以附字源之後二書各六巻合為十二可傳於學者嗚呼金石諸刻歐陽修著為集古録十巻趙明誠倣集古而為金石録巻數則再倍之歐陽之未及者趙恒足焉至於洪适之出獨於𨽻學是攻其述𨽻釋二十七巻𨽻續二十一巻可謂富且侈矣然而見聞有限或未免於疏脫此婁氏字源亦不可不作歟今觀季子之重校非惟有功彦發抑可以補洪氏之不及矣當今大明麗天正四海同文之時他日或援蔡邕故事立石經於太學門外舍季子將焉徵哉願季子善自愛也濂三復其書僣為序其篇端嗜古之士必有以濂為知言者季子以字行家於臨川為詩文有法以道自守不為外物所移禮部朱君夢炎極推重之謂無讓大雅君子云醫家十四經發揮序人具九藏之形而氣血之運必有以疏載之其流注則曰厯曰循曰經曰至曰抵其交際則曰㑹曰過曰行曰達者蓋有所謂十二經焉十二經者左右手足各備隂陽者三隂右而陽左也陽順布而隂逆施也以三陽言之則太陽少陽陽明陽既有太少矣而又有陽明者何取兩陽合明之義也以三隂言之則太隂少隂厥隂隂既有太少矣而又有厥陰者何取兩陰交盡之義也非徒經之有十二矣而又有所謂系絡者焉系絡之數三百六十有五所以附經而行周流而不息也至若隂陽維蹻衝帶六脉固皆有所繫屬而唯督任二經則苞乎腹背而有專穴諸經滿而溢者此則受之初不可謂非常經而忽畧焉法宜與諸經並論通考其隧穴六百四十有七者而施治功則醫之神祕盡矣蓋古之聖人契乎至靈洞視無隱故能審系脉之真原虚實之變建名立號使人識而治之雖後世屢至授膜導穴驗幽索隱卒不能越其範圍聖功之不再壹至是乎由此而觀學醫道者不可不明乎經絡經絡不明而欲致夫療疾猶習射而不操弓矢其不能也决矣濂之友滑君深有所見於此以内經骨空諸論及靈樞本輸篇所述經脉辭㫖簡嚴讀者未易即解於是訓其字義釋其名物疏其本㫖正其句讀釐為三巻名曰十四經發揮復慮穴之名難於記憶聨成韻語附於各經之後其有功於斯世也豈小補哉世之著醫書者日新月盛非不繁且多也漢之時僅七家爾唐則增為六十四至宋遂至一百九十又七其發明方藥豈無其人純以内經為本而弗之雜者抑何其鮮也若金之張元素劉完素張從正李杲四家其立言埀範殆或庶幾者乎今吾滑君起而繼之凡四家㣲辭祕㫖靡不貫通發揮之作必將與其書並傳無疑也嗚呼槖籥一身之氣機以補以㵼以成十全之功者其唯針砭之法乎若不察於諸經而誤施之則不假鋒刃而戕賊人矣可不懼哉縱諉曰九針之法傳之者蓋鮮茍以湯液言之亦必明於何經中邪然後注何劑而治之奈何粗工絶弗之講也滑君此書豈非醫塗之輿梁也歟濂故特為之序之以傳非深知滑君者未必不以其言為過情也滑君名夀字伯仁許昌人自號為攖寧生博通經史諸家言為文辭温雅有法而於醫尤深江南諸醫未能或之先也所著又有素問鈔難經本義行於世難經本義雲林危先生素嘗為之序云塟書新註序堪輿家之術古有之乎周禮墓大夫之職其法制甚詳也而無所謂堪輿家禍福之說然則果起於何時乎蓋秦漢之間也漢藝文志有宫宅地形書二十巻既有其書斯有其術矣術果人人能之乎官有其書而不行之民間及至晉時方始盛傳而塟書遂號為郭景純所作予嘗讀之真確簡嚴意非景純不至此實宜為相地之宗也後世塟巫競起而蕪穢之至於二十篇之多西山蔡季通氏深覺其妄增删去十二而存其八草廬吳伯清氏又病蔡氏未盡藴奥擇至精至純者為内篇精粗純駁相半者為外篇粗駁當去而姑存者為雜篇誠可謂無遺憾矣新喻劉則章親受之呉氏為之註釋頗有所發明金華鄭君彦淵其尊呉氏不下於則章晝夜研精單思正其句讀觀其㑹通探其㫖趣粲然若燭照而龜卜其視則章蓋過之矣彦淵既鍥梓以傳復介學子劉剛請余序余謂塟書尚矣别有塟經八巻蕭吉所撰者又二巻號為地脉經者又二巻大抵與郭氏不異唯八卦五行經托於黄帝所作或者遂謂為地理之源豈黄帝之時已有其術歟信如此說諸經之中或云辨方正位或云卜澗東瀍西或云相其隂陽觀其流泉固有之矣不過趨人事之利何故無禍福之說歟是未可知也在唐之時楊翁筠松與僕都監俱以能隂陽𨽻司天監黄巢之亂翁竊秘書中禁術與僕自長安來奔至贑州寧都懐德鄉遂定居焉後以其術傳里人廖三傳三傳以通春秋故名廖傳其子禹禹傳其壻贈武功郎謝世南世南復傳其子武功大夫海惠州巡檢使永錫遂祕而不授世之言地形者其盛無踰此數人然其遺書或存今世多行之往往其說皆與郭氏合而無悖去之者豈相地者實宜宗之歟縱青囊有傳其妙亦不越於是歟嗚呼世不信地理之術則已設信之舍此將何從求之歟宜彦淵留意於兹而不暇自釋也然是書雖經蔡氏刋定至吳氏方為精宻其註之者雖有則章發揮於前又至於彦淵而後大備註書之士後出者益勝其言誠可信歟余春秋且高文采益衰落四方求者每踵武相接類峻却而不顧而獨為彦淵序此者非以其大有益於世歟彦淵名謐北山先生忠愍公之九世孫自號𤣥黙居士博通儒書而能文其於内丹之訣尤有所得云呂氏采史目録序皇帝既正宸極龕定幽燕薄海内外罔不臣妾慨然憫勝國之亡其史將遂湮微乃洪武元年冬十有一月命啓十三朝實録建局刪修而詔宋濂王禕總裁其事起山林遺逸之士協恭共成之以其不仕於元而得筆削之公也明年秋七月史成自太祖迄於寧宗總一百五十九巻左丞相宣國公李善長率諸史臣上進順帝三十六年之事舊乏實録史臣無所於考闕畧不備於是禮部尚書崔亮主事黄肅與濂等發凡舉例奏遣使者十又一人徧行天下凡涉史事者悉上送官今之北平乃元氏故都山東亦號重鎮一代典章文獻當有存者特擇有職於官者行示不敢輕也章貢吕仲善時司饍成均乃被是選是月癸卯即乘驛北去八月丁卯抵北平凡詔令章疏拜罷奏請布在方䇿者悉輯為一有涉於畨書則令譯而成文其不繫公牘若乘輿廵幸宫中隱諱時政善惡民俗歌謡以至忠孝亂賊災祥之屬或見之野史或登之碑碣或詳羣儒家集莫不悉心諮訪且遣儒生危於等分行乎灤燕南諸郡示以期日有慢令者罪及之爰自丁丑開局於故國子監至冬十又一月壬辰朔始完以帙計者八十擇高麗翠紙為之衣舁至行中書借官印識之進於南京乙未赴山東河水方凍大雪深二三尺仲善駕牛車遵陸而行一吸一呼冰生髯間己未至濟南其諮詢大畧如北平時又明年春正月甲寅竣事成書乂四十帙所搨碑文北平四百通山東一百通不在數中仍印識如前三月壬寅輦還京師已而諸使者咸集濂於是有所依據修成續史四十八巻夏六月復詣闕上進仲善以功陞太常典簿尋為丞且以史事之重不可易視也集為目録四鉅編上之而藏其副於家徵濂序其首昔者司馬光既著資治通鑑又畧舉事目年經而國緯之名曰目録示學者以樞要也仲善今備述采史綱領明其事之良艱示後人以軌則也書之意雖不同而心之厚於仁則一而已嗚呼史有闕遺久矣如近代衛紹王之朝記注亡失南遷後遂不能紀載當時史臣所屬若得如仲善者豈不有勝竇祥揚雲翼之所録哉順帝一紀卒得為完書皆仲善之功無疑人有功而不知不智也知而不言不仁也濂待罪國史故不辭而為之序使觀者有所徵焉進史後三月某日華川文派録序義烏婺上縣自隋至唐名士軰出若婁㓜瑜若駱賔王則其尤者也幼瑜之文以巻計者凡六十有六賔王之文其數亦盈十焉然皆散逸無存其僅見於世者往往出於編類家之所采此無他聚之廣則行之久也宋南渡後宗忠簡公澤其文多至五十巻細高居士黄公中輔亦十巻香山喻公良能則三十四巻香山之弟杉堂公良弼頗如居士之數南湖何公恪岩堂陳公炳各二十巻惟是四三君子事業雖不同其以文辭有助於名教則一而已計其當時鸞蹌鳯翥於士林行嗈嗈和鳴而龜麟為之後先學者歆豔之未必不家傳而人誦逺者僅二百年近者始百餘載求其家集則子孫或不能以咸有况他學者乎一邑之間且若此而况於四方乎嗚呼立言之士其心勤矣其慮精矣又惡知一旦變滅若烟霞者乎然則編類者之功要不可少之也居士之族孫鐡岩公應龢嘗有見婁駱之事乃自忠簡至於岩堂各編其粹精者十餘篇聚於一書釐為六巻名曰華川文派録華川縣之繡湖别名唐嘗因之置縣故取以號其録云後五十年豫章張侯來為縣讀而善之復謂羣公之文幸僅見於斯然未有謄其副者茍或亡之非唯重有識者之歎且將何以風厲於吾民亟請邑士傅君藻精加校讎捐俸而刻寘縣庠來徵濂為之序昔者鄉先達吳公師道憫前修之日逺而遺文之就冺乃集婺七邑名人所著為敬鄉前後録二十三巻其視鐡岩志益廣矣惜乎官其邦者不使永其傳兵燹之餘手稾弗復能存今侯則惓惓是書夙夜不少置以此較彼賢不肖之相去抑何逺哉雖然侯之風勵於縣人士者不止文辭而已也當如岩堂之介南湖之孝香山之質實無偽杉堂之寛厚有容居士之氣節不羣忠簡之竭誠報國至死而不變庶幾無負於侯不然則操觚濡墨仰而號諸人曰我能文我能文豈不見笑於大方之家哉侯名允誠以儒術縁飾吏事忠信廉明如古循吏縣務雖至劇雍雍處之輕重皆不失其度吏胥受約束拱手案側不敢出一語相可否諸弊頓革故治效彰著為諸邑之最是為序杜詩舉隅序詩三百篇上自公卿大夫下至賤𨽻小夫婦人女子莫不有作而其托於六義者深逺𤣥奥卒有未易釋者故序詩之人各述其作者之意復分章析句以盡其精微至於東山一篇序之尤詳且謂一章言其完二章言其思三章言其室家之望女四章樂男女之得及時一覽之頃綱提領挈不待註釋而其大㫖煥然昭明矣嗚呼此豈非後世訓詩者之楷式乎杜子美詩實取法三百篇有類國風者有類雅頌者雖長篇短韻變化不齊體段之分明脈絡之聨屬誠有不可紊者註者無慮數百家奈何不爾之思務穿鑿者謂一字皆有所出泛引經史巧為傅㑹楦釀而叢脞騁新竒者稱其一飯不忘君發為言辭無非忠國愛君之意至於率爾咏懷之作亦必遷就而為之說說者雖多不出於彼則入於此子美之詩不白於世者五百年矣近代廬陵大儒頗患之通集所用事實别見篇後固無繳繞猥雜之病未免輕加批抹如醉翁寱語終不能了了其視二者相去何逺哉㑹稽俞先生季淵以卓絶之識脫畧衆說獨法序詩者之意各析章句具舉衆義於是粲然可觀有不假辭説而自明嗚呼釋子美詩者至是可以無遺憾矣抑予聞古之人註書往往托之以自見賢相逐而離騷解權臣專而衍義作何莫不由於斯先生開慶已未進士出典方州入司六察其冰蘖之操諒直之風凜然聞於朝著不幸宋社已亡徘徊於殘山剰水之間無以寄其罔極之思其意以為忠君之言隨寓而發者唯子美之詩則然於是假之以洩胸中之耿耿久而成編名之曰杜詩舉隅觀其書則其志之悲從可知矣先生既殁其𤣥孫安塞丞欽懼其湮滅無傳將鍥諸梓而來求序文甚力予居金華與先生為鄰郡及從黄文獻公㳺備聞先生之行事可為世法因不辭而為之書先生名浙季淵字也晚以黙翁自號所著有韓文舉隅而孝經易書詩禮記春秋離騷各有審問不但箋杜詩而已也文憲集巻五
