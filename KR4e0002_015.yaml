body:
  text: 文憲集卷十五明宋濓撰針凡四章陳思禮以其讀書像求題作讀書針以告之古今千載天下萬理曷由知之存乎經史道散文繁歲益月增欲窮其全厥惟難能在昔先覺示我要㫖挈其宏綱衆目咸舉茍棄其本而披其枝力瘁心勞彌久卒迷仁恕于民孝慈于家終身有餘道豈在多惟爾陳生嗜學克孝不形于言已達其要尚虛厥心以誠爾躬聖賢何人敢不慎恭磨兜堅針昔李侍郎敦立嘗揭磨兜堅三字于坐隅磨兜堅者古之慎言人也其善于自防者哉為著針曰磨兜堅慎勿言口為禍門昔人之云磨兜堅人各有心山髙海深磨兜堅髙不知極深不可測磨兜堅言出諸口禍隨其後磨兜堅鐘鼓之聲因扣而鳴磨兜堅不扣而鳴必駭衆聼磨兜堅唯口之則守之以默守之以默是曰𤣥德磨兜堅磨兜堅慎勿言全有堂針全有堂者何監察御史黃君鄰讀書之室也缺者全之反其謂之全者何無毫毛之不備也無者有之對其謂之有者何心中本具不假外求也其謂全有者何天德也天德之著也如鑑之明也萬理森然隨物而應之也既曰全有或乃斫之喪之以至弗完者何人僞之滋也人僞之滋非學不足克之也克之者何整爾甲礪爾戈力戰而勝之也是故生而能全之謂聖人修而復全之謂賢人棄而不知求全之謂愚人三者之不同奈何敬與怠之謂也黃君欲全其所有非敬將何以全之黃君以政學聞于時復遑遑自治不止其殆知求全者歟為之針繄天扃顯性靈萬象森森炯以貞愚不縮智不贏毫末咸具天人并君子乾乾守以誠其有乃全百體寧師古齊針並序師古齊者豫學子連江陳子晟讀書之所也子晟今人也其曰師古者何志所存也志之所存奈何事不師古則茍焉而已言之必弗詳也行之必弗精也弗精且詳則滅裂之弊生而頽惰之氣勝矣能師古則反是然則所謂古者何古之書也古之道也古之心也道存諸心心之言形諸書日誦之日履之與之俱化無間古今也若曰專溺辭章之間上法周漢下蹴唐宋美則美矣豈師古者乎子晟春秋方盛為古文辭水湧而山出薦紳先生交譽之豫恐其或偏也為之針曰爾欲師古古何所師法言大訓日星昭埀爾繹爾思志須刻苦欲禔其身必入其户中唐坦然由户及庭有宧有奧以次而升惟學亦然懼畫於淺日造其深所見乃逺人已兩盡方為極功毋局於文一偏之攻此謂師古古訓是式我作爾針服之無斁銘黃氏義門銘有序天地之間有大防焉孝友之謂也水之始也濫觴爾茍無土以障之則必至於滔天火之初也螢爝爾茍非水以制之則必至於燎原人心感物而動不能無欲其端亦甚微不有孝友之人出為表式則淪胥以成風而彞倫斁矣昔者先王有見於斯雖委巷刺草之民能行之者必旌命之所以贊王治章人風而挽之於正也世之評唐史者且謂張公藝李知本劉君良孝行推於友睦數世不衰真豪傑之士嗚呼當是時金章盩綬之賢皂蓋朱轓之英布列中外未嘗無之顧乃以豪傑歸於閭巷之士者以其不俟教令所加而後奮也嗚呼南陔白華之詩蓋亦商之末世周之盛德也斯民以孝友著稱君子可以觀其世矣浦陽黃氏其先與文節公庭堅同所自出有諱度者宋隆興癸未進士亦諸祖也元至正中傳至諱圭君生三子其二曰隆曰生隆生一子曰逢原生生二子曰逢吉曰逢昌逢吉兄弟亦各有子至十有餘人三世之間孝友無間言逢吉乃殫志竭慮設為教條鑱諸樂石復遣諸子宿請濓銘之嗚呼子壯而分婦姑反脣相稽秦之俗已然矣况去古日逺風氣日益漓黃氏能不染於末習卓然不變其恆度豈非真豪傑者耶浦陽以義居聞者二三人唯鄭綺之家已至十葉黃氏知感慕而興起進修益力烏知不綺若耶雖然許史之稱未足為貴也猗頓之貨未足為富也唯孝友積諸躬令名昭于時其為貴且富也大矣所謂特立兩間而無愧稽諸賢哲而有徴著之後世而可法何莫不由於斯黃氏孫曽可不思自朂哉能如濓言揆之張公藝之流他日可馴致矣詩有之風雨如晦雞鳴不已濓於黃氏蓋深有望焉銘曰浙河東疆地曰浦陽厥氏維黃雙井同枝科名陸離世復詩書有儒其冠以義為藩奕葉共餐視其齊庭左史右經踵武繩繩視其房除前絲後纑燈火與俱至和所形揖讓而升穆然無聲既衍而葩實而匪夸三代一家世道下趨子父割閨婦姑勃豀十室九衰瀾倒波頽萬夫莫回蠅聲方冥忽聞怒霆孰不為驚植範建防翼法輔常斯德之亢造端非難延裕維艱任重如山如為髙陵世益代增非人獨能如松之青故隕新承所以永貞古先與謀庶行之修其道曷由執敬為符夙夜䆒圗百世如初浦陽深溪王氏義門碑銘有序浦陽於婺為山邑唐天寶末始割義烏蘭溪富陽三縣地置之人生其中往往朴茂淳質力農務本恥於華言僞行而以士自命陳文毅公盛稱書傳所載古者禮義之俗殆不是過其言信不誣矣載稽其事梁貞明初縣人何千齡四代同居宋淳熙中鍾宅亦至三世何鍾二氏之間而冲素處士鄭綺奮然興起教子孫無别火而食志確見凝尤非二氏所能及故六傳至文嗣而家益昌元至大末旌其門閭而於力役之征俾無有所與宋元二朝國史皆為之立傳蓋自建炎初逮今已厯十世踰二百五十春秋矣深溪王氏其先出於烏傷之鳯林有諱萬者字處一擢宋嘉定癸未進士第立朝謇諤凛然不可犯憸壬畏之為之斂迹終官太常少卿諡曰忠惠少卿之弟茇三傳至某生二子澄汶澄以忠厚為家州里之無告者煦之以仁人愛戴之不啻其父兄瀕終集家衆言曰汝曹能合族如同里鄭氏吾瞑目無憾矣言訖而逝澄生三子子覺子麟子偉子麟出為汶後皆善紹先志子覺生五子應念㦛慶聰子麟生一子憲子偉生二子勤恩而應之伯仲又各生子踰二十人矣子覺與子麟合謀召子姓謂曰一體之分散為九族癢疴疾痛舉切吾身收族而聚居是謂惇本離宗而自矜是謂乖義古之道也今吾家相傳四葉矣和孺之樂雖殷管攝之計未建庸非闕歟况吾父有遺言欲法鄭氏鄭氏於吾有連其成規具在吾將損益而行之何如於是應念帥諸弟踊躍承命請參定家則一卷朝夕遵之唯恐有所失馭家之禮質文之兼至應物之務內外之齊飭薰蒸太和之中一囿範圍之內鄉人士莫不感厲而歆艷之子覺且謂不可無以示來者既勒家則于碑而復徴濂文以紀其事昔者成周之世九夫為井井方一里而一夫受田百畞其家衆男為餘夫亦受二十五畞賦由斯而出夫由斯而定其勢不得不分當是時未聞有同居纍世者也其相親相恤之政則有大小宗法存焉大宗譬則幹也小宗譬則枝也枝雖有千萬之不齊而其幹終一而已前王持世之微權蓋不得不爾也自夫封建宗法之制壞九族之親漫焉不相統屬儼若秦肥之視越瘠仁人義士乃於服盡情遷之時綴之以食而弗殊事雖有異於古不猶行古之道乎哉浦江蕞爾之邑以義居聞者三人而子覺又不悖先訓蹶然而思繼焉古者禮義之俗誠豈有越於此哉文毅公之言至是益可徴矣子覺本名閥之後金華諸族亦同出於鳯林其顯融者項背相望而淳熙宰相為尤著宰相勢隆望重尚未能合族以居而子覺一韋布之士乃斷然行之斯可謂之賢也矣雖然靡不有初鮮克有終子覺之嗣人尚世守遺法而不墜他時將與鄭氏儷美而交輝聖朝以孝治天下旌異之典未必為子覺惜也龍光下燭行當煥煥於山川之間矣濓因不辭而記之又繫之以銘曰易著同人合乾與離上參于天火之赫熹類族辨物君子以之況我宗屬一氣之為譬猶單幹漸敷羣枝服雖少殺情或甚非物我相形矛盾迭馳借耰取箕誶語絲披所幸天衷亘古無虧不有人豪務克己私何能大公拔其藩籬浦陽之江其流瀰瀰太朴未散民醇俗熙以義聞者接軫聨帷有美王氏裔出紳緌佩厥先訓如銘鼎彞大合其族嗜義若飴夙夜無愆竭其心思度物引類取式樹規巨探浩渺細入密微日約月㑹有文可稽耄倪同心一唱百隨孰為範防徴禮與詩以匡念慮以肅威儀如水斯瀦畚築以時涓滴弗戒不翅漏巵古云孝弟致家之肥匪間古今驗若蓍龜維彼崇構肇自築基既堅既飭棟宇翬飛維彼跬步千里在兹行行不息其至無疑上慎旃哉勇毅自持誰謂華髙企其齊而太史造銘勒之豐碑節婦唐氏旌門銘有序皇帝恭膺天命誕敷文教凡有繫於民彞者輒加旌寵即書所謂表厥宅里樹之風聲者也粵洪武七年春三月姑蘇守臣某上言吳縣編氓張成妻唐妙堅生二子而成卒堅年二十有七乃忍貧鞠育指天自誓曰飛鴻尚不再偶况於人邪遂不施膏沐日處寒燈敗帷中或憐之欲奪其志每涕泣以辭今五十又七二子頗有所成立州里稱之無異辭者里耆某言其狀于縣縣上于府監察御史加覆核焉咸謂得表署其門如制令臣敢昧死上中書以聞制曰可於是符下有司行事并復其力役之征俾無有所與其子彥存竊以為龍光自天照耀下土不可無以宣布上德以昭示悠久請大都督府照磨馬嗣能徴濓著銘鑱諸樂石濓惟夫為婦天大倫之攸繫故士昏禮有云下達納采用鴈釋者曰取其不再偶也蓋有夫婦而後有父子有父子而後有君臣夫婦之道貞而天下可得而治矣聖皇在御持化機而制六合褒嘉貞節所以化行四方而作新斯民者也濓待罪國史法當備載其事且繫之以銘曰聖人御極惇叙天彞𢎞敷大訓隂執其機樹之風聲何物不動管攝人心邇赴遐聳有婦氏唐采歸于張克産二雛其夫遽亡泣淚既盡繼之以血相隨九泉乃我之節嗷嗷者雛匪親孰依忍死鞠之心唯天知寒颸蕭蕭燈青在壁月落參橫猶聞夜織或憐其孤諷之改圗豈無甘薺何忍茹荼含淚陳辭鴻不重匹人為物靈敢弗之敵厥子既長頭角嶄然苦節之亨由持之堅牧守上言請加褒錫帝曰俞哉朕豈汝惜烏頭雙表有巋者門銀榜漆書其光焞焞皇匪爾私用為世勸推而達之民罔不變子則盡孝臣宜竭忠三綱既建比屋可封國史造銘勒諸樂石奉揚鴻休以詔罔極忠孝堂銘忠孝堂者飛熊衛指揮使司僉事徐將軍之所建也將軍名桂字庭芳宿遷人也自幼負英氣稍長荷戈從軍開平忠武王北伐中原馮宋公南征西蜀太傅徐魏公逺討朔漢將軍皆在行間當戰陳之間勇氣百倍搴旗斬將奮不顧身近臣以其事聞皇上壯之自散騎舍人即升為今官命既下將軍舉手加額慨然太息曰桂也遭逢盛際忝被官使方愧不能效犬馬之力一旦上承寵渥自八品超居第四雖天之覆燾地之持載莫可比喻私竊以為報君唯在乎忠凡於國事近則服勞禁籞逺則捍禦邊陲無一絲不盡于忠庶幾少竭人臣之義然而五藏百骸從親所分鞠育訓迪之艱勤日擢髮而數之亦不足計其生全之德事君固當忠養親其又可忘於孝乎桂得以忠孝二言揭為堂顔出入日見之日見之則心不忘之矣將軍言既畢復請濓為之銘濓聞忠孝者天地之間大經大法也為子克盡其孝為臣克盡其忠始合乎物則民彞之正無是者非人也古之聖賢多矣著之為經箋之為傳雖曰千萬言之多無非舉此以防民也將軍今知務此則先立其大者矣然言之非難行之實艱將軍尚思勉之能勉之異日為將為相亦宜也非僥幸也銘曰上下兩間參之者人若非孝忠能與之鈞其忠斯何務宣其力報國一誠皎如出日其孝伊何如事神明視聼之際先於形聲有能孜孜日新不匱覆載之中俯仰無愧一失其道是謂薄夫犬彘雖賤不食其餘洸洸徐君其力如虎談笑折衝疇敢豫侮北伐南征靡役不從鋭欲建功名徹九重遂從散騎超掌禁旅出入佩劒以資還衛帝德如天罔敢弗欽何以報之終始一心髙堂有親况臨白髮愛日之誠於焉實切崇搆舒舒圗史紛如粉版𤣥書蟠蛟結螭是顧是瞻赫若明命毫絲弗愆一純乎正孰謂二者不得而兼所施雖殊實本一源願守此心堅如鐵石太史作銘勒諸坐側鮑氏慈孝堂銘有序歙之鮑氏故衣冠家也其諱宗岩者身載明德弗售于時人號為棠樾處士當至元丙子郡將李世達軍叛羣冦相挺而起肆其屠劉歙民相驚皆風雨散去處士君與其子寶慶教授夀孫共伏大壑中未幾冦嘯呼而至執處士君反接于樹抽刀將剚之教授出泣曰吾父耄矣不足以汚兵鋒願憐而勿殺即殺我請代之言畢引頸就刃處士君曰吾祗生此一兒死我猶可吾兒死則宗祀絶矣慎勿聼之相為讓者良久冦欲捨之或掌制於衆欲兵之又弗忍計未知所定忽有風渢渢起林木間類鐵騎蹴踏聲冦相顧怖愕疑官兵將捕已亟相率東趨父子因得釋歙人士咸歎曰孰謂無天道哉使無天道處士君父子何為乎而弗死也其慈孝之報乎當處士君之受縛子但見其親而不識有身父但見其子而不知有已死生禍福尚不暇慮初不知何名為孝何名為慈乎脫使處士君曰我必如是乃為慈其子又曰我必如是方為孝不幾參於人而不純其天乎嗚呼有若處士君父子足可為世勸矣然子為父死古之人多行之者固可為勸也若父欲存其子而自殞其生其可為勸乎曰非是之謂也處士君為存宗祀也為存宗祀孝之大者也不然則其宗為若敖氏之餒鬼矣用以為勸何不可之有哉豫與鄭內翰子美游子美歙人也其談處士事甚悉豫每為之太息慨然遐思其為人今處士君曽孫任詣豫請曰任之祖父嘗以慈孝名堂鄉先達程公已為造記先生能復銘之乎豫因厯序其事而繫之以辭使任勒諸堂上子孫世守之以為式鮑氏之世其益昌矣乎任端恪有學行蓋懿然君子人也銘曰父子之道一體而分天性昭然萬古無昏氣血感通罔間毫髮伊誰梏之户庭胡越惟歙鮑氏世敦詩書子勉於孝父勉於慈宋鼎將移羣冦方熾不幸遭之反接于樹有子含淚長跽致辭刀劍在前目不見之無死我親我死則可親死子存千齡亦夭父謂其子我耄及之日月所照寧復幾時冀子之生得存宗祀生生無窮孰謂吾死白刃可蹈難違者天若父若子何人弗賢冦雖匪人天嘏是錫疾飈西來褫盜之魄𤣥聖樹教重惟五倫五倫有愆曷名為人慶延于家繩繩孫子孝慈之報庶其在此有巋者堂揭以嘉名仰而瞻之如交神明為上或頑為下或悖來遊來觀翻然自悔黃氏悅親堂銘親可悅乎曰可悅之以道悅也非其道不悅也悅之之道奈何溫與凊無爽也定與省勿愆也可也而未至也視於無形也聼於無聲也日用三牲之飬也可也而未至也寶厥身也若愛瓊珍也慎所履也如在淵氷也跬步不忘乎孝也可也而未至也然則何為之至也身之顯也親名之彰也親名之彰也族姻之所艷也僚友之所願也州里之所榮也恱也然則斯悅也外也非內也是何言也是何言也外自內出也有諸內必形諸外也不可二之也建安黃居德養親之堂題之曰恱親居德以文辭致身為酆都尉其身將顯也豫故援此以告之也孟氏所謂恱親也人習而察也豫不敢勦說也銘曰恱乎親在顯乎身所以揚乎人人曰誰氏之子親譽因兹而有聞身者親之枝斯須不敢毁傷始為行之醇天經地義吾敢弗之惇嗚呼揚乎人顯乎身所以悅乎親正心堂銘有序元臨川監郡芒侯嘗名其燕息之堂曰正心侯既以此自治其身而化其民又推以教其子入國朝長子文縝司教成均思嗣侯德不墜復以堂銘為請三代盛時凡有國有家者皆不敢不學其學未嘗不本於心譬之操權衡以制輕重持規矩以裁方圎凡有形者皆不能違是以事功成而習俗美先王之道既息居乎位者不知學學者不知所本竊竊焉欲以私智小數勝之而民卒不可得而治前代之事如此者多矣而元為甚芒侯生乎其時獨能取聖賢為學之道治其身其天性之過人逺矣文縝又能推之以淑諸人非善繼志者哉銘曰昭哉聖則厥要甚寡正其一心以對天下一心之量天容地深炯若日月孰不照臨其不正時日月方晦昏亂迷惑靡有攸届誠其始萌乃正之功知不周物思誠曷從維知克誠維誠克正正以持身罔敢違令內以為家外以臨民明盡禮樂幽通鬼神世降道離人鮮由學徇其私心狙伺狙攫偉兹芒侯監于大邦揭聖明訓置諸崇堂崇堂嚴嚴筵几具有邦人君子陳說古道孰詭孰端曷從曷違折以片言灼如蓍龜豈徒其名又能允蹈既政以施亦身以教侃侃嗣子先人是程緝其休聲亶為難能勿謂已逺千載一心聖謨炳然奚古奚今正誼堂銘三代而下惟漢董仲舒最為醇儒其輔江都易王也告之以正誼明道之語千載之逺人猶誦而法之此無它慕之也長樂有士名時貢其姓亦董氏以文行入選亦充楚王府伴讀朝夕執遺經侍王開陳內聖外王之道遂慕仲舒之言取正誼名堂徴豫銘銘曰惟仲舒氏其德之醇其四方之所則效其有間於越秦矧同出於己姓厥初亦一氣之分雖派别而枝殊比之異族而尤當親其所親親之伊何正誼是遵赫明命之在目思制事之有倫豈絲髮之敢私察天人之相因廓然大公一歸至仁此所以務為匡正鄙其詐力不足稱於大君子之門更生之許王佐斷不為失而孟堅之著論乃徒致於糾紛有美董生文行孔馴當侍經於帷幄日劘切於典墳茍拾級而漸升又安知不為王傅之尊名若同而實同將何愧乎古人彼峻者堂聳以華棻我銘其楹用代書紳貞白堂銘古君子於治身之道詳矣而居室未嘗有名近世之士略於自治至於居室之名則務極其美昭而日月風雲雨雪霜露大而江河山嶽林泉丘壑細而竹樹草卉鳥獸魚蟲凡可以託情而比德者皆取以為名名則美矣於身何補哉誠能揭仁義道德之要著之於目而存之於心禁邪而止慝服之以終身而不蹈流俗之弊此不猶得古君子之意乎臨川許仲孚篤志嗜古以貞白名其堂蓋將矯夫側媚汙濁之弊以治其身是可謂善為學矣其友芒文縝來徴銘銘曰天不貞天柱傾地不貞地軸勝日月不貞乃蝕其明隂陽不貞寒暑僭行况伊人斯敢不貞有不貞者殞厥生天以白物罔惑地以白庶物育日月以白四海昭燭隂陽以白民用弗忒人茍弗白為暗為僻彼何人斯敢弗白有弗白者戕身喪德維許子學孔腴以貞白名堂隅豈銘爾堂將銘爾軀匪徒飾外宜銘諸心矢弗渝爾心之貞為道之樞爾心之白為德之居勿側以欹勿涅以汙持之永久為聖之徒雙椿堂銘三槐名堂預知顯融之兆五栁有傳式啓肥遁之趣蓋緣辭以達志而其文特繁託物以明類而其義最切粵自前古以逮方今指意固殊塗轍則一有若右司都事某君器局凝逺識度迥卓篤愛日之誠隆悅親之道奉其仲父並於嚴君建一室之靚深揭雙椿以為號氣同於祖奚須類我之祝孝推乎親必盡搆堂之志稽之五倫十起之私阿新思繼之晚昭然軌跡莫擬光塵由是美聞流於縉紳永歌傳於緗簡不鄙狂瞽漫紹徽音其辭曰有雙者椿離植于庭修莖並擢峻葉均青凉氛夕羃灝露晨零材非齊散夀比莊齡美兹華構託以嘉名雲聨遙户月淡鮮櫺中有二皓古之夀朋鶴髮齊素台背交升商宣宫奏柏茂松貞厥子能令省署蜚聲絳衣執板賢冠埀纓調陳五鼎飬或三牲簪裳生豔州里流榮雅辭振玉麗句雕瓊文犀作軸翠琰鐫銘禮敦民典孝篤天經名教所繫善俗攸興凡百君子宜鑑宜徴連槐堂銘有序人事無與於草木乎孝友之徴古多記之矣草木果符於人事乎則大舜閔曽之行未聞形於草木之祥也然則將何所定歟人之於天體異而氣同養吾氣以感之寒暑可自我而平日月可自我而明山川可自我而不震驚鳥獸可育四靈可至况草木乎然而有得有不得者變也物隨以應者常也變者天之權常者天之經天以經示人而以權教人以聖賢之德盡為人之道固其職也雖勿報焉可也未至於聖賢而能不悖於道烏可以弗旌乎是權也或因物以著戒或設象以假義又權之教人者也茍逐逐焉而報之仍仍焉而見之智者可以理推愚者可以幸得則不足以為天矣天道之權吾於㑹稽周氏有徴焉周氏兄弟曰彞兌皆賢而文居新昌彩烟山中事母甚孝入其門少長秩秩有序其氣穆然若陽春然鄉人稱之為孝弟舍傍樹槐一章髙尺餘岐為二幹及肩交合為一左右之枝各三上挺然數尺再合而再交焉於是觀者咸歎其異以為彞兌孝友之徴乃以連槐字其堂其友王宗成來京師為之請銘槐之為音近於懷懷者思也所以旌其孝友而教其後人以思也後人視斯槐寧不有思乎其枝歲繁而時茂猶子孫之愈久而多也子孫雖多其本於祖則一而已猶槐之衆枝本於幹也嗚呼周氏後人視於斯槐孝友之思其能忘乎此天之所以教也烏可以無銘銘曰周氏孝友德斯植天旌厥槐世希覿巨本數圍去地尺岐為雙幹挺雄特及肩而交交復副既副羣枝合如織鄉氓里耄歎以嘖炯哉竒祥古未識吾知𤣥化彰爾德俾爾後嗣思作則枝繁幹别勢莫抑同氣殊分麗千億槐枝可連人可析持敬齊銘吏部員外郎翟君大年謂余曰大年頃詿于吏議繼蒙有宥預有祿食列于英俊之後追思舊愆未嘗不惕然惴栗因以持敬名所居齊庶或善其後也請為銘以自勵焉銘曰坦途不戒驥或蹶羊腸畏惴駑可越靈臺孔微役萬物物來不制昏以逸持之以敬志斯一古之明訓作自哲曰人敬勝怠則吉心不持敬中蕩潏四體不敬形縮瑟不敬而言支以怵行而不敬遭僨跌矧兹有職紛轇轕上有嚴臨下羣列茍或不敬衆爾嘻鬼神遼哉㣚恍惚語之無聞罔由詰敬以格之迅如馹况均為人視聼徹事之以敬寧弗悅告爾持敬久愈晰德樹名彰底崇秩時習齊銘時習齊者江南行臺侍御史秦公之所自名也公河南人名從龍字元之厯事五朝為時名臣年踰八十而猶挾册齊中玩而繹之濓間往見公聞其言皆經緯道德一歸之經傳則其澤被民物勳列太常者何莫不由於斯時習之功不既盛矣乎宜其年既耄而猶孜孜弗之懈公戒濓銘銘曰水之習坎積則盈君子法之德乃恆𤣥默齊銘全椒孫仲善氏名其齊曰𤣥默危學士蘇修皆嘗遺之以文仲善復求余繼作修史事嚴厯數月未能撰述仲善又更求之今因休沐之暇輒援筆為之銘夫𤣥默者葆和之要道仲善能從事於斯則近道矣銘曰𤣥兮默凝神於恍惚默兮𤣥欲潛思於九淵曷若渺渺綿綿歸之自然一氣孔神超乎象先誰為之後孰為之前至矣哉此所謂鴻濛之根育丹之田也久而行之與道周旋可以接韓終之袂可以拍洪崖之肩勉旃勉旃必守夫規中焉介石齊銘金陵管君名豫以時順為之字以介石題其所居之齊皆取乎大易之義也蓋管君嗜學弗懈既習儒家言又通天官之學當皇上龍飛定鼎江左材藝之士無不寵任之管君用薦者擢為厯官已而建太史監遂改春官之職管君益竭其知慮凡氣朔之盈虛氣度之遲疾或步或推罔有絲毫愆忒上嘉其勤㑹廷議易太史監為欽天監遂命管君為之令管君亦可謂至榮也已然其進學之心猶孳孳也且謂豫以恱樂為義易致沉溺必以中正自期介如石焉則能審其幾微上下之交不至於諂瀆矣乃掇介石二言以自警嗚呼若管君者其知豫之時順之道乎雖然豫之彖辭有曰天地以順動故日月不過而四時不忒管君茍以順而測天其又有契於不過不忒之理乎大易之道無所不包故豫發其意於傳注之外而復繫之以銘銘曰豫之為義動以順茍耽于逸爽其正節介如石剛且徑其幾始兆見輒定自微而彰若龜鏡下不加䙝上弗佞如此進學德將凝或冥或鳴戕厥性戒之初終制乃勝有齊肅如更嚴靚我銘其楹宜敬聼古愚齊銘延陵韋侯彥芳吳中書僕射侍中𢎞嗣之四十七世孫夙以文學著聞亦既受薦於臨江别乘㑹二千石闕侯實行守事情孚化洽民宜之然猶不忘進修以古愚名其齊居侯殆有志古者乎志於古美矣古學之可法者頗衆奈何獨有取於愚乎有取於愚斯其所以為不愚也歟是宜銘銘曰唯古之愚如彀斯弩直矢一發奮往弗顧惟今之愚如履多岐詭祕變化曽不測其所之古故為疾今復非古致宣尼之所傷奈人僞兮旁午我情鬱紆曷日而攄豈惟賢不逮昔愚亦不如遡埃風而屹立懷媺人於千載不有君子善則誰采彼焉多詐睢睢盱盱心自以為智人觀則愚我愚我守直情徑行孰不愚我我智斯亨以愚而名豈無柳氏為激而過中同於自諡我將何從聖謨孔邇終日不違希顔則是居易齊銘衢之常山有簪纓世族曰魯氏蓋出於宋參知政事肅簡公貫之之後自亳而來遷舊藏玉刻傳宗印可驗其逺孫濬文念祖德深長思繼承之甚力種學績文惟恐有弗逮州縣察舉其才貢之中書中書奏濬文才行雅飭擢為侍儀舍人遷秦王府典儀將行詣詞林請曰濬文讀書之齊名曰居易鄱陽周先生伯溫為書三大篆揭之願以銘文為屬豫謂居易乃素位而行外物之來一歸之於天君子進德之方有出於此者乎是宜銘銘曰君子守分如守百職出位以思乃德之賊銀黃三組庾粟萬鍾我合受之不以為豐衡門棲遲藜糢是食我則安之不見其嗇此非在我皆天所為天則孔邇我敢悖之或逆或順視之若一心以道寧不纍於物徇而弗察非怨則驕惟外之願而中則搖觸類而推何往非正其正伊何安於義命侃侃魯生文獻之家夙夜以思揭德振華齊居深沉蛟螭作篆前陳回溪右撑翠巘爾居爾易勿險與難上慎旃哉德將不刋茂承齊銘閩人鄭子尚世惇詩書為良士其父周可君尤能以道自娛所居曰至德里並舍北南環植以蒼松鼓髯奮爪儼若蒼龍然嘗喟然歎曰始者拱把爾今則大將十圍人之種德其亦有類於是乎御史鄭公過而嘉焉名之曰松庒云周可君既乘風御氣遊神於冲漠之墟而松固無恙寒光凉翠益翹然發舒子尚日徘徊其下仰而慕俯而凝悵然其若思已而曰先子不可見矣倘能承繼之庶幾其不死矣乎乃取詩所謂如松柏之茂無不爾或承之語扁其齊曰茂承蓋萬物榮於春悴於秋各繫其逢惟松也舊葉將落而新葉已生所以四時而恆青子尚欲承父志無須臾間斷其將常茂而益榮者哉子尚亦善於取譬者己子尚以明經試天官歸教長樂鄉校其將行也介國子録趙伯庸來徴豫銘銘曰有松丸丸兮于彼郊坰來者既續兮往者始零衆悴黃霣兮其色獨青嘉名斯建兮象類之精父經能傳兮於粲其榮繼繼承承兮允有餘馨毋玩葩澤兮忽彼堅貞太史造銘兮勒於軒楹宇定齊銘靖江府伴讀方生仲文崇安人以宇定名齊蓋取莊周宇泰定者發乎天光之言釋者謂氣宇開泰則靜定也既靜定矣天光自發人見其人物見其物初無彼此膠葛之異懿哉斯言乎其衛生之說乎或者不察類以周多寓言輒泛引而非之周言固傷乎過髙若此者其有不可取乎茍不取不以人廢言之說果何指乎為著銘曰君子養生能兒子乎専氣致柔而肯傷於躁急乎雖終日嘷而嗌不嗄乎此謂太和坱圠而不由喜怒乎外物其能攖乎四體其有不順乎所以神之凝然氣之融然泰而安乎天光照耀物各付物而不淆亂乎夫若是天其天而不參於人乎芒乎忽乎熙熙乎其有出入乎無出入乎夀可至於廣成子乎豫有疑乎無疑乎人讀豫文有能察豫之中情否乎種學齊銘有序姑蘇張君其名為田其字為藝已遂以種學號其齊居濓聞之而歎曰何藝已之善取義者歟蓋其先人子昭君積書滿家而日讀之藝已又從而繼之非惟藝己也其子肯又能善承而勿使替之是張氏種學者三世矣因為著銘勒諸齊中一以昭種之之功一以為藝己父子朂也銘曰我有心田為寸者方何以種之以道德為之秧其葉油油其本洸洸仁耕之而義耨之唯恐涉於歲荒俟彼西成於粲其箱可以續蒸民之命脈可以佐至治之馨香此韓子之喻崔生所以欲久積而大昌肯舍己以從人不以禮而為防有美君子厥姓惟張通經而探乎𤣥髓掞文而煜乎星芒取種學而名齊欲孳孳而自彊史官作銘揭之中堂願是藨而是蓘終大迄於豐穰默齊銘陵川和君原德以文行稱趙晉間嘗被薦入朝稱疾辭去結廬太行之顚題曰默齊其友湯子上為之請銘銘曰昊穹上運𤣥壚下處風雨霜露得其平日月星辰得其軌江河山嶽以流以峙百物以生萬彚咸叙不發一言而莫敢失其恆職者以其本乎至誠之理也維人之生內則五性七情外則三綱六紀所以發於中而應乎事者欲其酬酢適宜辨析非是固不能歸之於一默而已然茍無誠慤存乎心徒欲以三寸之舌取勝角靡上陳為諛下喻為詭隂謀規利邪說誇己其去道不亦愈逺矣乎昔者孔子嘗欲無言顔氏如愚亟譽其美彼由與賜佞口多言棄弗之取其所尚可知也絳灌不文外若拙鄙而功茂績偉朝氏之子號稱智囊卒啓戎兵身斃于市惟躬行之為貴何言語之足恃晉有和君力學未仕期實踐以自修獨默默而無語此蓋將矯便佞之陋習而庶幾乎顔氏者非耶恆齊銘考功丞李君名永永為恆久之義遂以守恆為之字復自號其藏修之所曰恆齊易有之恆久也蓋恆之為卦震上而巽下雷震風發二者勢必相須所以恆久而不已也李君有學有守之人也既取是義為字與名又揭以命齊其篤於信道常而能久者歟為著銘曰天地之道恆而不窮剛柔相應雷動風從君子觀象隨時變易終始循環惟道之適茍執一塗子莫之中無權以行是謂真凶日月在天旋運不息躔次所經罔有差忒陽隂代謝寒暑迭更蕩摩呼吸萬物乃成唯久故恆動有常則惟恆故久靜不留物聖有明訓樹此教基逐物而遷有愧巫醫侃侃李君所學淵奧立不易方大中是蹈彼不度勢獨浚之求或處非據無禽致羞孰正孰偏有若白黑愼而行之永保終吉沖虛室銘沖虛二言乃𤣥門之關鍵道學之符徴也嗣天師張公取以自號復名其齊居金華宋濓為掇其義而為之銘銘曰惟其沖足以全𤣥黃之功惟其虛可以斡造化之樞蓋和氣盎於四體而空以涵夫中腴一吻契乎自然曽弗爽於無為迎於先而不見其合推於後而不見其離雖恍惚其有物竟孰探其幾微彼専氣如伏此抱一若嬰兒以大道之難言姑假象而示斯神明之胄為世𤣥師約萬言之喉襟貫一理之妙機瓊臺小史執筆受書掇三洞之隱文請揭之於座隅陳彥正丹室銘陳君彥正家在浦陽大山間實與龍湫五泄為鄰岩巒回互林木薈翳絶不類人世彥正日走其下當夜靜月白時輒登髙危坐冥然長思欲求古仙人與遊而不可得每天風翛翛作聲輒以為王子喬韓衆輩真躡鳯吹簫而來也如是者數年一旦有貝君一默者過之謂曰子若是甚無益也子欲求之盍學長生乎一氣孔靈凝之者神神之攸庭黃房窈冥綿綿若存是為天根子能有意於斯古仙人不難致也彥正樂其說之美乃稽首再拜膝行而前曰某不敏竊妄意浮遊塵埃之外不自期凡質之未易化也先生不以為非而辱教之願終身服役為弟子敢問其所欲者何先貝君復曰吾道貴清靜吾飬神丹雞犬不可近子盍别為丹室以處我彥正欣然從之乃即所居之東若干步作室一間中設一榻貝君與彥正對坐其中而鑰其所從之門外不可入內不可出前留一竅以納漿食後通一竇以傳便液蓋將専一心志以絶外慕云室既成彥正録貝君之言以告濓曰子宜為我廣而銘之濓聞古仙人之往來多在霍廬五嶽金庭洞陽赤水仙都諸山考之九微志可見已五泄處越水之濵固不足以附麗諸名山而齊之謝𤣥卿曽採藥其中後竟仙去濓嘗至其處乘風放歌便覺精神遐漂駕灝氣於溟涬莽蒼之間惜不得𤣥卿輩與之共語悵然而還今聞彥正結室其傍又得貝君為之依歸焉得無歆豔乎因不辭彥正之請而備書貝君之言廣其意而為之銘銘曰天地搆精日月撢持雌隂黃包雄陽𤣥施內有太虛明靈所都是謂規中執神之機超乎羣品不分精粗古之真人日與之俱三筆生津五氣布基水虎斂魄火龍藏珠金華先倡白液後追闔闢泥丸天行空飛入火蹈水不􅌊不濡或嬰霓幢或翳鳯輿杳然𤣥化莫知所如五泄之山蛟龍所居下有隱者山澤之臞乃連曲房乃列鼎爐浮遊黃宫神光舒舒蠻君背劍鬼伯執殳以呵弗祥以衛不虞養爾神嬰出有入無定見金童手持簡書致上帝命召還玉樞尚慎旃哉勿亟勿徐我作斯銘勒之座隅蒼雲軒銘有序世皆稱嚴子陵不屈光武以為髙士之問學固求所以行之耳茍得賢君事之而行所志君子之所樂也况光武素知子陵哉子陵之不以隱為髙也審矣其隱蓋有有所為爾人之志意材量明者能燭之於事為之先子陵光武少相友善使光武能任人可為盡力子陵何所苦而不出既出而決去哉蓋光武察察自用其後宰輔多不以禮退子陵預知其如此故決然避去而不疑以全故舊之義此子陵所以為髙也茍徒以隱為髙孰不可為子陵哉子陵裔孫居餘姚者曰宗道取范文正公祠堂記蒼雲語名軒余恐其昧乎出處之義也告之故系以銘銘曰維士為學志大行于時孰肯樂隱屈而弗為卓哉子陵識時之幾幾不可以出甘耕釣以嬉此為百世之師茍時可行而飾隱以欺是棄其天而失時宜嗟吾子陵志豈在斯爾宜則之勿執固以違視時推移如雲在山何滯斂與施或不盈握或雨四垂庶乎于道之歸韋軒銘閩有大儒曰朱公喬年自以性偏於剛效西門氏佩韋以為警因號其齊曰韋靖江府伴讀陳伯武亦閩人也有景行先哲之志用韋名軒所以禔其身者勤矣濓懼其矯枉而過正也為之銘銘曰韋之為義乃獸之皮可以束物枉戻而相違故其文上下為舛而中則從圍自非柔而熟之安能變生革而如脂古先君子佩之自隨蓋戒夫剛悻以自好狠愎而為非矯其過固不宜不力若馴致於純柔純弱又必招削薄之譏嗚呼噫嘻大中之為物也微若神蓍坦若九逵何不泄泄于于濶步而長趨近則入善人之室逺則為聖賢之歸不亦暢志乎而陳氏之子問學得師木漸者必上升膏蓄者必有輝指柔人以作極纂前修之風徽豫造銘而昭之竟不敢褒而以規菊軒銘金華韓先生進之以耆年碩德為州里後進所矜式文章問學既不獲用於世乃寄情於鞠華東籬之下環植之亡慮數十本蓋以鞠有正色與先生所禀正性相符故當風露髙潔之時獨致其妍而非凡花豔卉之可同也濓四十餘年之老友也雖不能文為著鞠軒銘一首先生當與我刪之銘曰鞠有正色具中之德君子法之以無頗與僻鞠有落英斯鞠其馨君子餐之期不爽厥真菊兮君子兮合為一兮終無忒兮永為民則兮篷軒銘有序新安胡君寧之作室城東隅旁隘中寬翼以欄楯而其制類舟招弟子肄業其間楊內翰剛中曰是期以濟川者也宜名汝舟寧之之子英復搆軒於前以篷為字篷者舟之蔽也雍虞文靖公白野忠介公宣城汪文節公咸為賦詩壬辰兵變化為菑翳之墟英亦避地城北岐陽山及四海底寧英擇地山陽洊造書室而軒亦繼完書云若考作室既底法厥子乃弗肯堂矧肯搆古亦有是言矣今若英者能承先志而弗墜可不謂賢乎哉為作篷軒銘銘曰歙多大山下瞰平陸嶺接峯聨前奔後逐如瀛海內波濤起伏有美君子搆室山麓因水取象揭以汝舟功期濟川朂之進修維舟之用視篷為急籍以葦蒲紉以靲䈼障除雨風奠安衽席豈無桂櫂艤河之洲亦有蘭橈載泛載浮匪篷斯完厥用焉求父唱于前子和于後兵燹之餘聿新良構寧事般遊思學之懋學功伊何夙夜無愆極夫顛連如涉大川脫彼墊溺升諸堂筵誰無齊居乃名為舫以燕以娛以速官謗警戒或怠其心則放斯堂暨軒間間言言有瑟有琴有典有墳春誦夏絃啓迪後昆凡厥弟子泳涵聖髓一葦杭之毋或中止大書軒楹銘者太史耘庵銘良鄉丞陳謙益仲東甌人也嗜學弗倦慨然有志於事功陳翰林元達以飛白書其憩止之室曰耘庵夫耘之為義耨治蕪穢之謂也種而能耘黍苗芃芃然興矣益仲其知自治者哉作耘庵銘銘曰伊人之情譬彼良田嘉種誕布黍苖芊綿耘耔不加載蕪載穢既茁而軋長莫之遂我田我耘我苖日豐有實其同迄于穫功記禮之家人以為奧得奧斯理失則罔效和其柔剛修禮以耕陳義而種善道乃亨耨在講學去非存是合其所盛本仁以聚感之使堅播樂以安五者既至學功始完惟益仲氏孜孜好禮以耘名室義或取此古訓洋洋觸類而通毋拘一曲滯而不融太史作銘勒於坐側上慎旃哉服之無忒三竒石後銘有序三竒石後銘為吳士朱孟辨作孟辨獲石聚寶山間製為山𤣥膚玉芝朵斷雲角三名其友王䝉先生圗而銘之銘邃甚至不容繼孟辨强余述之信乎珠玉在側覺我形穢也其詞曰山𤣥膚割紫蕤星霣魄石抱腴蒼水使者珮失琚山鬼環守目睢盱內藏一升白龍酥餐之凌霄躡雙鳬奮迅八極逰清都山𤣥膚玉為徒玉芝朵自天墮暈翠霞裁猗儺煅以九陽真澒火有聲泓噌玉之瑳不學三秀脆而夥韓終欲攓意仍叵青鳥傳信以需我玉芝朵青嫷嫷斷雲角鬼斧琢秀稜稜文斫斫霓旌難攀泝寥廓手析祥氛㢙一握尚帶蛟龍氣旁魄神每變幻資槖籥上衝牛斗香如濯斷雲角鎮書幄詩塜銘有序番有竒男子曰魯修學詩李存先生先生以文雄江東獨才修修有詩朋十人皆緣情善賦番數罹兵燹修懼其詩失傳埏埴為甓刻瘞芝山中瘞已請太史宋濓勒銘其上銘曰河清嶽明效坤之靈何蕤綏兮鳥文龍章於粲其英叶昌厥辭兮冥智斂真返諸至神薶黃壚兮泄為醴泉三秀千眠合貞符兮番山可夷番川可移道如初兮丹井銘海虞有虞山梁天監初漢天師十二代孫張道裕來隱其下建招真之冶鑿丹井焉宋淳熙中道士李正則浚井得藏丹石䃭啓之化為雙紅鴿飛入上湖至今湖中丹光煜煜然邇年井且廢莫知其所周尊師𤣥真窮日力尋獲之重加以甓構亭覆其上時皇明洪武元年也然仙家煉丹必以井故名山多有之其在今海虞者舊廢而新治豈𤣥學復興之徴與銘曰太隂委精自天一融而為液養萬物神丹浴之赤如日有夫𤣥巾發我室雙禽衝霞飛翐翐靈泉重噴甘逾密飲焉夀與天地畢了圜銘嗣漢天師張真人宇初築室龍虎山中修鍊瓊丹動靜兩忘已而神聚氣凝混含為一至和坱圠返乎太初真人既獲覩內景之祕因題其室曰了圜所以識也𤣥貞道士為原𤣥牝之㫖而勒銘曰髙上洞𤣥陽隂之根凝和攝真是謂昆崙中有三關七𬎼守閽上絶霞表下淪洞冥遡而索之黃房絳庭靈明潛通空澄淨泓真人之居規中為城龍帔鳯舄靈裙飛翻左挾元英右衛白元仰睨太䝉噓氣成雲化生萬神合妙為真升真玉虛朗氣洞清哀厥下士粗穢莫澄神隨形化降于北隂乃敕雷電指麾六丁授以赤書制魄攝魂還乎混混閉絶九門南陽熙真爽朗秀英三靈發曜八素啓瓊出入泥丸翺翔紫清羽葆先導颷臺後登與天為徒振古長存濓既作是銘或謂假象取喻而多瘦辭曷若著明言之嗚呼斯豈言之可明哉然而人身之內有至虛焉絲絡之所羣凑命蒂之所由生不倚八偶巍然中居此謂神之庭氣之母真息之根也人能存神於兹則性自復養氣於兹則命自正神與氣未始相離分之為二合之為一其殆化源也歟然欲了之則未易為功也鳥之伏鷇不足以言溫陶之烹瓦不足以言凝鑑之照形不足以言明勝是三者庶幾氣神混合自然成真而猶未忘乎迹也蓋有非神之神而行乎九天非氣之氣而超乎九地方所不能拘小大不能計而了之名且不立矣了之名茍未泯如隔紗縠而觀明月耳著明之言固無越於此然亦糟粕而已爾土苴而已爾何足以言了哉或者一笑而去因不欲棄而書諸銘後五輪沙漏銘沙漏之制貯細沙於池而注於斗凡運五輪焉其初輪軸長二尺有三寸圍寸有五分衡奠之軸端有輪輪圍尺有二寸八分上環十六斗斗廣八分深如之軸杪傅六齒沙傾斗運其齒鈎二輪旋之二輪之軸長尺圍如初從奠之輪之圍尺有五寸輪齒三十六軸杪亦傅六齒鈎三輪旋之三輪之圍軸若此與二輪同其如初軸杪亦傅六齒鈎四輪旋之四輪如三輪唯奠與二輪同輪杪亦傅六齒鈎中輪旋之中輪如四輪餘輪側旋中輪獨平旋軸崇尺有六寸其杪不設齒挺然上出貫於測景盤盤列十二時分刻盈百斫木為日形承以雲麗於軸中五輪犬牙相入次第運益遲中輪日行盤一周雲腳至處則知為何時何刻也餘輪各有楹附度中輪則否輪與沙池皆藏几腹盤露几面旁刻黃衣童子二一擊鼓一鳴鉦亦運衍沙使之沙之進退則日一視焉此其大略也初灤陽水善氷雖爨鼎沃湯不能為漏新安詹君希元乃抽其精思以沙代之漏成人以為古未嘗聞較之郭守敬七寶燈漏鐘鼓應時而自鳴者殆將無愧乎浦陽鄭君永與希元遊京師因知其詳歸而製之請余銘銘曰挈壺建漏測以水用沙易之自詹始水澤腹堅沙弗止一日一周與天似鄭君繼之制益美請惜分隂視斯晷國史研銘濓為國史遂以官名硯勒銘于隂誕敷帝制宣人文赤光如虹燭乾坤後千百載傳愈新銅雀瓦研銘有序臨汾徐昭家藏銅雀瓦研獲於漳河中相傳逾百齡兵部員外郎許圭以使事過之遂購焉質貞而文黝蓋真物云太史金華宋濓為造銘曰埏埴成胎資氣母炎火一爍貞且夀禁雨回風著勳久何哉舞榭鹿爾踪天假漳河滌其醜出贊觚翰列左右虹光夜半上衝斗龍圗龜文首交紐要使遺文傳弗朽海東石硯銘二形圎如日出海東五色寒芒貫當中發為人文亮天功育至陽産榑桑玉之英人之章硯銘三𤣥之胄靜重故夀以墨為守勿輕售𢎞經演道爾則茹之掞葩揚藻爾則吐之如鐵之堅尚欲磨而穿况斯石也乎夜窮晝研翕坤闢乾期逺濟於聖域乎婺溪石研銘歙之有研自唐開元中葉礪始礪獵師也因逐獸發之後為南唐元宗所賞愛名遂與端石齊其地在長城里之龍尾山山一名羅紋其下乃芙蓉溪研溪産者號為尤長濓嘗獲其一腹有刻文云李少微造少微元宗時硯官也制作絶工緻可寶已銘曰外雖黑內則白馬生角兮性乃易濟源研銘濟源硯者李文簡公故物也濓銘之以遺龍舒學子李端銘曰持爾堅以尚爾𤣥毋為白也遷日本硯銘夷而華四海一家此非文明之化邪髮櫛銘髮有垢尚假爾治心有垢人胡不思楷木杖銘客有遺豫孔林楷木杖者橫文如蛇腹節節可觀刻斯銘銘曰託根兮孔林有文橫橫兮如玉如金千載寂寥兮孰白爾扶持之心柏杖銘用之則行舍之則藏嘉言孔彰懷允不忘楷木杖銘生孔林承聖澤文庚庚光繹繹扶顚持危資爾德藤杖銘形之圎兮性之堅兮節之全兮吾與子周旋兮惠香寺新鑄銅鐘銘浦陽有大蘭寺在白麟溪之濵者曰香嚴創建於東晉時年代遼邈所鑄之鐘或成或壞不能盡知其可知者宋寶元間繼隆大師實為之隆嘗走汴京得中宫賜銅為助而兵部侍郎胡公則力相其事至慶厯甲申鐘始成越七十有八年睦冦至毁焉時宣和辛丑之春二月也普照大師子文即帥其衆而繼為之至甲辰冬十月鐘復成越二百三十年寺災鐘又毁焉則今至正癸已之秋八月六日也沙門普照與同流六十有二人謀曰成壞之相勢常相因而鐘者所以警昏昕昭法度祛障蔽也吾等不可以不亟圗遂走告里之善士于君城城乃捐錢一千五百緡俾合餘燼而新之銅以斤計舊者三千八百有竒新者二百有竒至冬十二月二日鐘復成昔天台智者大師深𢎞法華之㫖未十餘傳其教幾絶吳越國師德韶為聞于錢忠懿王遣使航海求其書於髙句驪後卒盛行當時之人以國師與智者同族姓疑其乘願輪而再世焉今照之名與子文之號正同或後或先又皆以音聲為佛事較之國師其迹固殊所以昭前人之業使之貽永久而弗墜者則一而已夫豈偶然哉雖然大圎覺海本無異同孰能分别後先形相若區區致泥於名迹之間亦惑矣必也自聲而生悟自悟以入道庶幾無負於斯鐘之建也與濓近遷居寺東五里青蘿山中與僧崇侃遊甚洽侃一旦來謂濓曰子盍銘吾鐘乎乃為之銘曰如來法門千差萬别孰方便故以一音攝有靈者鐘即廣長舌或震或鐘熾然而說其一五時所宣諸修多羅無量妙意中無不包一厯耳根千劫弗磨夤緣入道莫此為多其二白麟溪濵有大蘭若是惟香嚴法器所舍鬱攸構災一夕而化畢竟有形終屬幻假其三寺之比丘咸作是言彼成壞相如風轉輪往過來續後先相因不有廢者吾何以興其四乃謁檀那乃咨鳬氏乃簡赤金以歸爐錘侈弇中程薄厚隨軌外圎中虛與法為體其五若龍象衆暨諸鬼神胡跪作禮靡間幽明臺簴髙懸有聲鏗鍧如獅王吼如蛟龍鳴其六上徹諸天下入九地因聞生悟弗迷邪趣聲聲攝入曽無留礙盡轉如來大圎鏡智其七我昔嘗聞此妙音聲不從鐘出不由耳生隨處充滿非减非增願咸諦聼同證真乘其八文憲集卷十五
