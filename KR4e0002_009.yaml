body:
  text: 文憲集巻九明宋濂撰序凡三十一章送部使者張君之官山西憲府序天地正氣絪緼輪囷百折不回行乎太虚在物受之則為解廌為屈軼在人受之則為剛烈之士剛烈之士貴勢莫能加威力不能變參乎氣化關乎治體其重於物又不翅百千焉嗚呼正邪不兩立正氣伸則邪沴廓清矣我國家始建國江左輒從秦元之請立按察司設官分職彈劾百僚所以伸正氣也迄今埀二十年憲度益嚴遴官益精有若山西憲僉張君孟兼尤號稱職者也孟兼性鯁亮不善為依阿人有曲必面白之雖慚沮羞縮不暇顧然亦無他傷當良朋盍簪酒酣耳熱抵掌笑談胷中森然芒角必盡吐出乃已其氣衮衮不衰名上中朝選教胄子久之遷南宫奉常奉常南宫掌禮儀郊祀之事無以攄其耿耿及今出持使節知孟兼者讙曰孟兼行哉民生休戚無不得言吾見軺車夕至而封章朝上也貪賕舞法吏吾見望風畏讋解印綬而避去也民寃之不伸戾氣欝結吾見涣然而氷釋也孟兼行哉雖然鷙鳥之揚揚不如威鳳之􅗳􅗳狻猊之彊彊不如祥麟之容容刑法之堂堂不如德化之雍雍人不務德則已茍有徳焉又何憸壬之不革行哉憸壬革行正氣之復正道之行也孟兼盍於此而留意哉吾鄉先達自宋以来繡衣持斧赫赫見稱於時者凡六七人嗣芳猷而繼遐軌竊於孟兼望之孟兼行矣孟兼精於古文辭前御史中丞劉公極稱道之尤深名理之學其與李證應奉往復論性書上徹九重之聽蒙召對左掖門士林以為光榮云送黄仲恭赴官餘姚序烏傷黄仲恭翰林侍講學士黄先生之子也以廕補官同知餘姚州事將行縣大夫及鄉之壽俊先生之門人咸往餞於繡湖之上離觴既傾縣大夫進而言曰同知之職在昔為郡丞為别駕為司馬雖均號上佐其實非事之長而州牧或得以辟置之今則出於朝廷之命事之大小無所不當問其職之不輕也較然矣奈何官失其分强者忿鷙自將與守抗衡弱者依阿取容又一切局於鉗制不敢吐一氣出一辭二者胥失也方今四海塵㝠財用乏絶民心危迫為天子佐二千石者當如是耶願仲恭以此為戒鄉之夀俊又進而言曰先王之制酒禮一獻之間主賓百拜所以避其禍也後世為麯糵之託終日昏㝠鮮有不僨厥事昔之人嘗有碎力士之鐺破鸚鵡之杓者所以藥沈痼拔深溺進新德也願仲恭以此自朂先生之門人又進而言曰士君子非以傳圭襲組為難能世其德業為難仲恭先居士以布衣欲借劍斬佞人頭其剛大之氣至今可掬先吏部又以學識受知丞相宦業益顯今尊公先生又以文章為海内第一學者仰之如北斗如泰山繼其後者不亦難哉願仲恭以此自勉仲恭皆再拜曰梓雖不敏敢不夙夜祗奉嗟夫人之贈人以言者多貢以諛辭以相悦孰有如羣公者乎稽其所言縣之大夫所以朂其職也鄉之壽俊所以樹其德也先生之門人所以昭其世也能是三者其何愧先生之子耶仲恭尚慎哉仲恭才贍而智周能力於行弗滯於物其必有以處之矣濂受學於先生最久而與仲恭遊尤宻敢直紀其事復賦河有行舟四章以别詩曰河有行舟其水瀰瀰之子于征其去如矢河有行舟其水浪浪之子于征言戾海邦河有行舟其水沃沃之子于征曰佐州牧之子行邁我懐孔悲有椒有蘭苾如芬如持以贈子綴之裳衣吁其别矣如何勿思送吕仲善使北平采史序皇帝即位之明年四方次第平乃詔文學之士萃於南京命官開局纂脩元史爰自太祖開國至于寧宗凡一百二十六年已據舊史檃括成書而元統迄於終祚又三十六年遺丈散落皆無所於考丞相具以上聞帝若曰史不可以不就也宜遣使天下訪求之於是儀曹㑹諸史臣發凡舉例具於文牘遴選黄盅等十有二人分行各省僉以為北平乃元主故都其文獻必有足徵者非精練博敏之士未易以集其事予友仲善方司膳成均實應其選戒行李且有日與仲善遊者咸為賦詩以予嘗與刋脩之末俾題其篇端嗚呼傳有之國可滅史不可滅然既亡其國矣而獨謂史為不可廢者其故何哉盖前王治忽之微興衰之由得失之效皆可為後王之法戒史其可滅乎然自漢以迄於近世類多羣臣奏請始克緝成典籍惟我皇帝既承大統即蔽自淵衷孜孜以纂脩元史為意則其神謀睿斷卓冠百王偉量深仁與天同大巍巍乎不可尚已仲善行哉採石室之遺餘詢名賢之紀錄俾信史免於闕文傳諸後世其不有望於仲善矣乎仲善行哉弔齊魯之故墟探幽燕之陳迹呼酒長歌拔劍起舞將又不在於仲善矣乎然則仲善兹行亦壯矣若予者年踰六十髪白神耗不能逐車塵馬足之間以攄寫其中情仰睇飛雲唯有慨然遐思而已然而鋪張上德以昭布四方埀諸無窮者史臣之事也庸敢備書之以為序而區區離别之懷有不暇計也仲善姓呂氏章貢人有學有文其聞譽盖翕然云送徐教授纂脩日厯還任序洪武六年秋九月皇帝御謹身殿從翰林學士宋濂之請妙柬文學之士四三人纂脩大明日厯而詔濓與吏部尚書詹同司總裁事當是時杭州府學教授徐君大章實在選中開局於内府日給大官之膳而令中貴人護閽非奉勅旨不敢入其事至嚴也濂時與大章辰入而申出凡興王出治之典命將行師之績采章丈物之懿律厯刑法之詳咸以事繫日以日繫月以月繫年必商確而謹書之濂年加耄不能有所猷為唯發凡舉例而已其助我者大章之力居多越四月書成共一百巻遴日上奏登盤龍金匱中奠於丹陛之下縉紳之家争欲薦大章入詞林大章堅以足疾辭濂因為陳情於上乃詔賜文綺纎繒各三裝錢六千文仍俾其職為真故事教授試職三年俟育材奏功方許真授大章時未朞年乃異數云大章將還蒞教席濂餞之秦淮河上與之言曰教授之職雖設於宋其任亦云重矣在紹聖初詔令中制科及進士第上五人禮部奏名上三人府監廣文館第一人始令為之大章起布衣而輒膺其任豈無其故耶漢法太史公位丞相上天下計書先上太史公副上丞相由唐及宋宰相皆兼史官其重如此大章以一教授之微乃召入史館與編摩之列又豈無其故耶盖大章博覽載籍發之於詞章霞燦波縈峻潔鮮朗威儀儼雅又足為後進師表聲名籍籍起儒林間當此聖明之朝材咸求實不于其官于其人故大章致此無難也然而黄琮之貴必登於方明大雅之音必奏於清廟理勢則然大章以温然之姿鏘然之文乃鰓鰓下教於一郡如惜才之論何濂誠耄矣髪種種被肩矣聰明不及於前時矣詞林清切之班非大章誰所宜堪行將力薦而用之脱使大章實不良於步趨雖卧治之亦可也大章以為何如明年春正月友生金華宋濂序送王子充字序同門友王君子充謂濂曰褘名凡三易初名偉次名􅀈後復更今名文雖易皆從韋者以其聲之近也其名偉暨􅀈時鄉先達内翰栁公文學呉公嘗為之說唯今名未有暢其義者幸同游學黄文獻公之門敢以累吾子尚有以詳告褘也濂曰子充其欲存古之道哉夫褘之為物古之蔽膝所以被于裳衣之上覆前者也其制則上廣一尺下倍之長又倍之頸視上廣劣其半肩之革帶視頸又去五之三其名則江淮謂之褘或謂之韍關西東謂蔽膝魏宋南楚謂之大巾齊魯之郊謂之裧襦西南蜀漢謂之曲領或謂之襦韠又謂之襜焉陳楚謂之衳其義則古者佃漁而食因衣其皮唯知蔽先後而已後王易之以布帛而猶存其蔽前者不忘其初也今吾子充閒居烏傷溪上日求四庫之書擩嚌其芳潤而馳驟厥辭藻火炎而交龍飛林豔媚而川花鮮翠霞縈而頳虹迴可謂能一時之至文矣今乃以褘為名而子充是字殆欲存古之道以反無文之文乎無文之文其文之初乎於戲子充之不忘乎初者豈直文而已哉由是而充之酒醴嘉矣必思𤣥酒明水之為尚焉莞簟安矣必思蒲越藳鞂之為貴焉黼黻文繡美矣必思疏布之可登焉丹漆雕扆華矣必思素車之可乗焉昔者先王以此交神明而防民行者欲人反始尊質也子充率是道也太古熙醇之行可馴致矣夫以燔黍捭豚不可施於禮文繁縟之日巻領結繩不可用於太樸分散之時此無他勢有不同也况為士者當與世推移因其所宜變而通之以潤國家為務而欲泥古之質詆今之文譬猶圎枘而方鑿必有不合者矣雖然此非所以言子充也子充厲古學而惇古行者其心亦豈恤戾於今哉盖古之士也確今之士也爽古之士也白今之士也墨古之士也靖今之士也莽古之士也貴今之士也賤子充欲存古之道者其將反始而尊質乎成已成物之道皆能由是而充之庶幾無愧於名若字矣乎濂也不敏亦嗜古學者也姑因子充之請為詳舉諸經之疏及爾雅方言説文釋名等篇而暢其義如此若所云婦人之褘謂縭緌也即香䙬也王后之服褘衣謂畫袍也褘當為翬即翬雉也五彩純備者也皆非子充命名之義也贈行軍鎮撫邁里古思平寇詩序至正丁酉春三月括㓂復興蟻集蜂攢衆號數萬遂陷婺之永康蔓延東陽二郡震驚惴惴度日莫保朝夕行御史府聞其事欲命將討之詢謀于衆僉以為邁里古思公名進士也今長治越城中生聚而其人文足以附衆武足以威敵若討之莫如公宜於是命公總䕶諸軍以行公受命已即禡纛于門載斾就塗如拯溺焚三月甲申抵東陽公延見耆耉訊以山川險阨與盜出入恒狀笑曰賊在吾目中矣當為君一鼓却之乃申號令整部伍扼其要害分屯方巖山夏四月庚戌命諸將黄中等以竒計紿賊賊方椎牛豕髙㑹聞兵至皆吐舌相顧諸將横槊大呼而前自己至未大小戰十二餘合士卒奮勇無不一當百擒偽將軍三人斬首六百級奪旗鼓槍矛無算乙卯賊復空砦出戰諸將踴躍用命兩兵方接公親統精鋭兵截其衝賊大潰追逐二十餘里斬首八百級擒偽將軍六十有六人辛酉兵進屯胡陳諜知賊所在縱兵深入賊已宵遁焚其廬舍殆盡賊自是不復能兵矣壬申師還邦人士相與曰進士之效久不白武夫俗吏恒指斥以為戲識者短氣公本一書生仗劍即戎而其功烈輒煒煌如此彼噡噡者縱人百其喙尚敢謂儒無人耶若公之為亦可謂有文武全材者矣嗟乎自括寇之興凡其所渉之地百里無居人豈惟無居人方茆莖出師雖方嶽大臣不能禁侵掠其慘毒盖有與寇不相逺者公帥師而来不為不久耄倪恬嬉若不知其兵在其境者又非公之賜耶然則公之有勲於吾邦者甚大欲貺之以犧牲則犧牲公之所自有也欲投之以玉帛則玉帛非公之所好也其將何以為公之報哉夫鋪張盛美播之方今而傳於後世者莫如詩歌吾黨之士盍留意乎衆皆曰然於是陳樵先生倡之邦人士咸作之而命金華宋濂序之贈龍泉簿蔡君序𤣥􅘬攝提格其月白余氣清候沖鮮飈襲衣虚幌生白而走也獨居有美蔡君龍淵之湄容儀偘偘言辭熙熙不觀其行心已必其有為詢之儒紳僉曰韙哉是夫也良使民馴㠯綏創傷未平摩而嬰之流逋未復宇而寧之征賦方繁均而則之妖魃害稼祠而斥之吏有所程氓有所依自此而升其誰曰不宜世有恒言虎豹師師據山之厜而百獸辟易者則以其威鷹鸇襹襹游林之隈而衆烏讋服者其力之施當世變俗移愈嚚而漓方將峻法以繩其奸而寛緩是務何言之迂嗚呼噫嘻民其殆而物之生也每閼秀於冬霜之慘而甲拆於三春之暉雉安粰粥麥秀兩岐較之殘民以逞而傷天和者又孰是而孰非不有伊人其阽于危徵吾蔡君之事而感慨於斯曰牛老生援毫引辭以白其勤以揚其輝以播於時知之者謂足為在位者之戒不知者以為可怒可愕而詆余文之尚竒贈侍儀舍人林成之序余家食時有同門友宣君彦昭為温之平陽判官當報政而歸州之文學掾林成之實護送来浦陽成之以余頗知學也自浦陽謁予金華山中相與講學術異同論風俗淳漓至更䦨月落蟬聨不得休臨别造四言一章以贈成之既去西東絶不相聞予亦應中書之聘出仕熙朝有從平陽来者輒詢之咸言成之處烟霞泉石間詠詩讀書以為樂予亦為之驩然頗自念相望二千里不知何時與成之盍簪乎今年夏予在南宮忽有踵門而拜者予弗能識之叩其姓氏則成之也嗚呼相别未十年壯者日益衰朽至熟視良久亦不記其顔貌之真人事之不堪把玩如此可勝嘆哉於是與之坐而慰勞之成之頗往来於予門問詩若丈之法予以舊游之故厯舉體製之殊音節之異者亹亹列之未幾成之忽来告曰小人有母貧窶不能存雖幸竊祿於朝而烏鳥私情懸懸不能忘昨已請於廟堂陳其中情涕與淚俱下執政大臣憐其志予告一百日俾迎養於南京今將行矣執事其能賜之一言乎夫成之為退思先生五葉孫先生實考亭夫子髙弟世稱十哲之一其家世之懿不俟言也成之以茂才貢上銓曹擢為侍儀舍人出入禁省日覲天顔整肅乎鵷班峙立乎螭㘭其寵榮非他職名所可比今又奉板輿迎親而来母子怡愉聚於一堂何人不慕豔之亦何俟予言也無已則有一焉予與成之别後成之學問日新予則摧落不振四庫之書廢忘者十九視舊相見時若兩人焉此無他習與怠相仍氣隨世所移故也成之宜益自奮勵毋若予之所為則下不失家世之懿上無負國家之恩予與成之言者止此而已若夫温之先儒卓然以學術名家或沈潛性理或有志事功或推明經制大抵與吾婺諸賢同其於醇疵得失之間多有可議予雖欲言雖更僕亦不能盡也尚容他日為成之發之成之名伯生篤實好學有士行絶不同於流俗云贈林經厯赴武昌都衛任序莆有林君士衡由進士起家署為比部主事政成遷武昌都衛經厯中朝士大夫相率賦詩餞之而以首簡授予序序曰昔者艾軒林文節公謙之有慕伊洛之學聞呉中陸子正得和靖尹氏之傳因往從之自是專心於聖賢踐履之事一言一動莫不以禮逺近學者翕然尊事之南渡後以伊洛之學倡東南者實自艾軒始也艾軒嘗言曰道之全體全乎太虚六經既發明之後世注解固已支離若復増加道益逺矣嗚呼其言不亦至哉艾軒既沒其道一傳於林文介公學可再傳於陳文逺公元潔前承後引重徽疊照新學小生咸有所師法非先王之言弗道非先王之行弗行人號之為小鄒魯云迄今埀三百年流風遺俗猶有存者家談仁義而悦詩書敻然非他郡所可及君子之澤何其深且長哉今吾士衡固艾軒諸孫也其家學漸濡不俟言矣文行之謹飭亦從可知矣其治獄刑曹用法寛恕士君子復許之矣今擢為戎府元僚則其協比師率輯和兵民脩治戎器用戒不虞此特其所優為者爾雖然未可輕也武昌為湖湘一大藩障其行中書所轄凡二十七府府各置衛或千夫長戍之而都衛總其凢其職與省臣鈞禮地連數千里戍兵數十萬其練閲之方征調之節唯元戎能制之元僚能賛之其任之重也較然矣自道學不明學者纒蔽傳注支離之習不復見諸實用談兵之家尤以白面書生訾之士衡宜知所自重庶幾乎其可也雖然予惡用是呫呫為哉昔也艾軒提㸃刑獄廣東親檄郡兵破殄嶺南羣醜阜陵聞之悦曰林某儒生乃知兵耶特加直寳謨閣是知有用之學可以治兵可以撫民可以興禮樂可以移風易俗無所往而不當士衡尚推家學而行之其有不獲者哉况當聖皇御㝢四方無烽燧之警皥皥熙熙不異於唐虞之世士衡日與太師共論文武忠孝之道使勲在盟府之臣保其寵榮以終其身以遺其子孫暇則雅歌投壺發舒性情寤寐羣經一惟伊洛之是趨俾人人咸稱之曰是子也無愧艾軒之後人者也顧不盛歟士衡之行吾言止此而已贈鄭院判序有其術而無所於用值可用之機而人不能任之欲望其以有成者百家之所難也惟醫為甚扁鵲華佗天下固不常有也使有之而值淺易之疾遇難語之人上之不足展吾術次之不能從吾所欲為法宜鍼而責我以砭法宜實而命我以虚乖逆拘執卒之與恒醫無異是豈醫之罪哉勢使然也誠有善任人者惟吾所用而不較期以成效而不泥於私謀人人皆可得而勉矣故疾有死於過愛而生於達理過愛者恐其危而不肯任人達理者知非己之所能為則信人而求其成效其達者乃所以生之而愛乃所以殺之也若福建承宣布政使陳君彦銘其達理者與陳君之妻免身得寒疾羸弱已甚徵太醫院判官鄭君某藥之鄭君請曰愈否在吾幸無撓我陳君許諾鄭君乃視脈所宜集藥之良而療之或謂藥性與疾戾以語懾陳君君不聽任之不變已而果愈陳君出金帛謝之鄭君辭曰子善任我故爾使子不我任而自用雖欲愈可得耶且金帛非所欲子嘗善太史宋公得其文畀我足矣陳君以其言告余謂陳君之善任人鄭君之不伐其事皆可稱且類古之為治者蕭曹房杜雖為俊傑之士使其時不善任之黎庶何以享隆平之澤而其名聲事業何以埀至于今乎然則二君之事取喻則逺矣序而傳之豈特可為任醫者之勸乎贈㑹稽韓伯時序越韓君伯時從府君辟為山陰教官名上尚書吏部吏部同儀曹禁林議命經史二題試之考定入格伯時將還山陰蒞教事徵一言以為别余聞古之學者必有師師以傳經為尚術業有專攻授業有源委如田何之於易夏侯勝之於書浮丘伯之於詩劉歆之於禮張蒼之於春秋皆遞相祖述不敢妄為穿鑿之説人心壹而教化美莫此時為然自師廢民散之餘學者不必有師師不必以傳經為意以致家自為學人自為政而大道或隠矣近世婺越之間有二大儒出焉曰許文懿公曰韓莊節公皆深於濂洛關閩之學謹守師説傳諸弟子而不為異言所惑其布之方䇿者視於金科玉條不敢輕有改易四方之人類能辯之觀其容止聞其論議則曰彼韓公之門人也此許公之髙弟也薄俗之習因此為之一變余生於婺與許公同鄉里雖獲一拜床下而未及與聞道德性命之言而許公棄捐館舍遂從其徒而私淑之韓公在越不逺二百里㑹其已亡欲一見且不可得而况於其餘者乎余竊自念為韓公之學者布滿逺近尚幸見之如私淑許公之徒者久未能逢其人今年夏乃於京師獲與伯時遊伯時韓公諸孫而又得卒業於其門其人温如其文煜如其言論鏗如是誠無愧於家學者庶幾有以畢余之志適總裁史事未及與伯時相叩擊而伯時將去反欲徵余序以識别余將何言哉雖然山陰雖小邑亦古者子男國也伯時之行以人師自處邑之子弟皆北面而受業使乃祖韓公之道益明斯盖不辱於傳經之家矣後之君子稽其源委寫以成圖如田何夏侯勝諸人故事夫豈不可哉顧余不敏操無用之學徒以空文出應時須畫蚓塗鴉日不暇給思欲如許公家居講授而弗之遂其於伯時之去寧不歆豔於中乎異日投簪而歸當謁伯時於越相與泛賀湖之晚波挹禹山之秋翠以盡私淑於伯時者亦豈為晚哉伯時以為何如是為叙贈醫師周漢卿序余聞松陽周君漢卿以醫名者久矣一日余婿鄭叔韡復来青蘿山中述其詳曰周君之醫精甚他固不能知姑即士君子所常道者言之括蒼蔣仲良左目為馬所蹄其睛突出懸如桃羣工相顧曰是系絡既損法當周君笑不答以神膏封之越三日月如初華川陳明逺患瞽者十齡百藥屢嘗而不見效自分為殘人周君視之曰是翳雖在内尚可治用鍼從眥入睛背掩其翳下之目歘然辨五色陳以為神武成男子病胃痛常痛不可忍嚼齒刺刺作聲或奮擲乞死弗之得他醫用大攻湯治皆不愈周君以藥納鼻竅中俄大吐吐出赤蟲尺餘口眼咸具痛即止東白馬氏婦有姙厯十四月不産形瘠尫且黒周君脈之曰非孕也乃為妖氣之所乗耳以藥下之一物如金魚疾旋已永康應童嬰腹疾恒痀僂行久不伸周君解裳視之氣衝起腹間者二其大如臂周君刺其一魄然鳴又刺其一亦如之稍按摩之氣盡解平趨無留行長山徐嫗遘驚疾初發手足顫掉褫去裳衣臝而奔或歌或哭或牽曳如舞木偶粗工見之吐舌走以為鬼鬽所惑周君獨刺其十指端出血已而安虎林黄氏女生瘰癧環頸及腋凢十九竅竅破白瀋出右手拘攣不可動體火熱家人咸憂趣匠製棺衾周君為剔竅母長二寸其餘以火次第烙數日成痂痂脱如恒人於越楊翁項有疣其鉅類瓜因醉仆階下疣潰血源源流凡疣破血出弗休必殺人他醫辭不進周君用劑糝其穴血即止烏傷陳氏子腹有疣隠起捫之如罌或以為奔豚或以為癥瘕周君曰脈洪且芤癰發於腸也即用燔針如筴者刺入三寸餘膿隨針射出其流有聲愈櫧槩黄生背善曲杖而行人以風治之周君曰非風也血澁不通也為刺兩足崑崙穴頃之投杖而去其醫之甚精如此薦紳先生宜有以褒之揚之敢以序文為請余惟古之神醫一撥見病之應因五臟之輸乃割皮解肌決脈結筋搦髓揲荒爪幕以為治所謂鍊精易形者也今則人誰知之其次則湯液醴釃鑱石橋引案抏毒熨之法耳是法亦絶不傳其僅存於世者往往不能用用或乖戾以致夭閼而傷生者多矣夫醫者民命所繫一投丸之間一授箴之際則安危由此而分何可不致謹於斯邪昔司馬遷立倉公列傳其所治自齊侍御史而下凡十有餘人皆厯疏其病狀辭雖繁而不殺者其意盖有見於此也余敢竊取斯義備以叔韡所述序次成文以遺周君又安知他日脩史傳者無采於余之言哉余耄矣且有脾禍吐涎日二三升蔓延將四稔叔韡尚邀周君以起余之疾者乎贈别胡守中序予在金華山中聞涇人有胡恒先生學該才雄其形於篇翰間春華敷而秋漢明卿雲爛而甘澤滋陰陽倡而律呂和予喟然曰是何其文之鏘鏘哉焉得擣瓊屑而為之食㪺玉漿以為之飲俾其壽而康也及余来江左道出涇上涇上父老又言先生盖有道者舊館人遘兵禍挈家露走人指將及千先生避舍舍之復割餱糧與共明日或即盡無憾未幾涇亦亂先生室廬毁備厯艱險昔有寄黄金者先生腰之與同卧起一年事定寄者已寘勿問先生上謁解還腰中金或讓其愚先生曰吾重吾信金為輕予又驩然曰是何其行之彰哉老父言已指先生之居在翠微晻靄中矯首西睇不能挾天風一至其處悵然久之庚子冬予獨處金陵官舍方著書自娯忽有客来叩門童子執帖入覽其氏名則先生也予驚喜出迎不覺屐齒之折既見目其貌粹而莊耳其言粲以文余又唶曰是豈非懿然君子人哉自是日與之游談析名理劘切文史及辨擊上下古今事愈出而愈無窮向之所聞其誠足徵矣予方將資先生以進學一旦忽辭予曰江風翛翛歲聿云暮矣昨夕夢梅花翹春蘤以招我某其歸歟余曰聞有先生舊矣恨不一接今弗久輒别奈何先生曰吾髮雖種種力尚强子年亦未耄惡知不久相從於山水之間乎余因呼酒謂先生曰三洞雙溪之勝甲東州三秀之芝氷玉之薺晝夜恒羅生當與先生采之先生若弗從予有如此酒先生復勺水以酢予曰陵陽敬亭其紫翠蔚然在望陶明府庾内史嘗往游焉其遺跡尚有存者吾將往焉巢雲松而錬精魄子儻不我同有如此水於是相與大笑抗手而别贈賈思誠序同里張君以書来謂濂曰壬辰之秋兵發中原大江之南所在皆驛騷時惟伯嘉納公持部使者節来蒞浙東慎簡羣材官而任之以保障乎一方余雖不敏公不以為無似俾攝錄事判官判官職在撫治一城生聚凡其捍禦綏輯之䇿不憚晝夜而勤行之以酬公知遇之萬一然節宣之功不加日積月深以勞而致疾疾之初作大熱發四體中繼之以昏仆迨其甦也雙目運眩耳中作秋蟬鳴神思恍惚若孑孑然離羣而獨立若御驚飈而遊行太空若乗不繫之舟以簸蕩於三峽四溟之間殊不能自禁聞丹溪朱先生彦修以醫名四方亟延治之先生至既脈曰内搖其真外勞其形以虧其陰以耗其生宜收視返聽於太虚之庭不可專藉藥而已之也因屬其髙第弟子賈君思誠留以護治之賈君即視余如手足之親無所不致其意慮余怒之過也則治之以悲悲之過也則治之以喜喜之過也則治之以恐恐之過也則治之以思思之過也則治之以怒左之右之扶之掖之又從而調柔之不特此也其逆厥也則藥其湧泉以寤之其怔忡也則按其心俞而定之如是者數年不可一朝夕離去寧食不鮮羞衣不裼裘何可一日以無賈君寧士不鄒魯客不公侯何可一日以無賈君余疾於是乎告瘳而賈君有功於余者甚大矣子幸賜之一言多賈君之善而昭余之不敢忘德於賈君不識可不可乎余發張君之書重有感焉世之為民宰者恒飽食以嬉其視吾民之顛連漠然若秦越肥瘠之不相維繫非惟不相維繫又盬其髓刳其膏而不知止孰有如張君勤民成疾者乎世之醫者酬接之繁不暇雍容未信宿輒謝去至有視不暇脈脈不暇方而不可挽留者孰有如賈君調䕶數年之久而不生厭者乎是皆可書余方執筆以從文章家之後此而不書烏乎書雖然今之官政苛虐敲朴椎繫惟日不足我民病此久矣我瞻四方何林林乎州邑之間其有賢牧宰能施刀圭之劑以振起之者乎設有是余雖不敏猶能研墨濡毫大書而不一書是為序贈孔君序余来江寧之四月與楊君某㑹於郡庠楊君謂余曰曲阜孔君克敬宣聖五十五代孫也通儒家言習唐人古今詩往往婉麗如晴葩鬬春態有餘妍得言外含蓄之意然猶患學之未充也將負笈游大江之南適監察御史安道調官江寧遂與之偕来居無何南北道絶遂莫能歸故鄉青燈照影孤坐寥闃中思尼山之葱蒨懷泗水之淵淪未嘗不潸然隕涕吾黨之士憐焉子宜為文以宣其沈鬱庶幾有以底夫道也余謝曰克敬未余識也余何以文為楊君曰吾聞釋人之所難忘而能喻之以至理者唯文章之士則然子幸終為之毋以不識其重辭也余曰人生霄壤間坎止流行曷嘗有一定哉譬之西風木葉飄霣於川之中其迴旋轉移有直達長江者有泊於石磯而栖於浮查者有弗離其故處者一委之自然而已何所容其心哉若膠膠泥於土著之間殆非也以克敬之家言之其先本宋人至防叔始奔於魯遂為魯人其後裔亦不專居於魯也太子少傳潛則移於㑹稽撫州守博太學博士端朝則徙於信安通城令端植則遷於江夏處士管則分守臨川間求其故多因患難来奔而寖成巨族或以詩書擢進士第或以政事列刺雄藩或以文學主教庠序章綬輝艷後先相望初不拘拘於泗水之懷尼山之思也雖然父母之邦親戚聚焉墳墓存焉逺而去之豈人情所欲哉第以世變之来紛紜轇轕有非智力之可為能存喘息而復齒於衆士不翅足矣他尚何憂哉克敬之所憂者則宜曰我孔氏之子孫也孔氏之道大如天地明如日月信如四時堅如金石夫人之所當學也况吾為其後者乎是則可憂也克敬能若是則雖闕里之逺人孰得而愧之脱有不然雖衣博衣而立魯東門日號諸人曰我孔氏之子孫亦君子之所不與也克敬慎之哉抑余聞九苞之雛决生於岐山之鳳千里之駒必産於渥洼之馬用世之才多出於神明之胄克敬之賢余知其不特通儒家言及能詩而已負笈之志盖未艾也他日道益凝聲聞將日昭江寧之有孔氏其盛與信安江夏諸族等又當自克敬始也余之有望於克敬者不亦逺乎楊君曰子言美矣其理亦至矣可以宣其沈鬱矣盍書以贈之余不敢辭贈梁建中序虎林梁君建中妙年嗜伊洛之學而復有志於文辭之事下筆滔滔數百言不能自休取而觀之皆典雅可玩一時大夫士皆稱譽之建中不自以為足復来問文於余余也賦質凡庸行志弗强行年六十曽莫能望作者之户庭間嘗出應時須皆迫於勢之不能自已者爾何足以為建中告哉雖然亦嘗聞之師矣文非學者之所急昔在聖賢初不暇於學文體之於身心見之於事業秩然而不紊燦然而可觀者即所謂文也其文之明由其德之立其德之立宏深而正大則其見於言自然光明而俊偉此上焉者之事也優柔於藝文之場饜飫於今古之家搴英而咀華遡本而探源其近道者則而效之其害教者闢而絶之俟心與理涵行與心一然後筆之於書無非以明道為務此次焉者之事也其閲書也搜文而摘句其執筆也厭常而趨新晝夜孜孜日以學文為事且曰古之文淡乎其無味也我不可不加穠豔焉古之文純乎其斂藏也我不可不加馳騁焉由是好勝之心生誇多之習熾務以悦人惟日不足縱如張錦繡於庭列珠貝於道佳則誠佳其去道益逺矣此下焉者之事也嗚呼上焉者吾不得而見之得見中焉者斯可矣柰何中焉者亦十百之中不三四見焉而淪於下焉者又奚其紛紛而藉藉也此無他為人之念𢎞為已之功不切也余自十七八時輒以古文辭為事自以為有得也至三十時頓覺用心之殊微悔之及踰四十輒大悔之然如猩猩之嗜屐雖深自懲戒時復一踐之五十以後非惟悔之輒大愧之非惟愧之輒大恨之自以為七尺之軀參於三才而與周公仲尼同一恒性乃溺於文辭流蕩忘返不知老之將至其可乎哉自此焚毁筆研而游心於沂泗之濵矣今吾建中孜孜綴文思欲以明道為務盖庶幾無余之失者而余猶為是强聒者文之華靡其溺人也甚易之故也雖然天地之間有全文焉具之於五經人能於此留神焉不作則已作則為天下之文非一家之文也其視遷固幾若大鵬之於鷦鷯耳建中尚勉之哉建中尚勉之哉洪武元年冬十一月十五日金華宋濂序太史公平生以文章名天下而其該貫羣籍窮極經史蓄積醖釀與古人争長者人未必盡知之縱或知而尊之至其立心制行敦大和雅揆諸聖賢之道而無媿者世固未必識也於其大者不之識而謂足以知文章豈果能得其精微之意乎今觀贈錢唐梁先生建中序其論文如此則世之不足知公者宜也彼後生晚學未能執筆輒掎摭疵病以議公曽足與之言文哉建中剋苦古學老而不倦亦可以觀公之取友洪武二十三年春正月十日門人謹題贈蕭子所養親還西昌序天下之道唯孝與忠是謂秉彛萬古攸同矧惟成均首善之地風動四方罔不從化其居是職者其有不惕然自省者乎昔陽城之為司業也立諸生館下而誨之曰人之為學忠與孝耳諸生有久不省親者乎明日謁城還養者二十人諸生且爾况為其師者茍鶴髮之親在堂其心又將何如乎此余於西昌蕭君之事不能忘言也蕭君名執字子所居武山之西山形拔起如旌旗浩翠淋漓積自古初土沃而泉腴蕭君朝樵於白雲之山暮而言旋買鮮於溪沽濁醪於東隣婆娑起舞親側奉觴上壽親既醉蕭君亦微酡抃手歌曰武山崔崔有雲英英止武山如藍川流不停止我奉我親其樂莫與京止樂兮樂兮我衣之翩我顔之頳止蕭君之樂無日不然若將終身馬㑹科目之興有司强赴江西秋闈名在前列已而上南宫選授國子錄所授經皆公侯家之子見蕭君能古文辭皆心服之業將成蕭君獨有不豫色然人問其故輒潸然墮淚曰吾親髮盡白矣臚氣下上不自寧矣武山夜鶴曉猿遲余歸久矣於是走白丞相府其辭甚切吏拘於文墨往来參稽閲一歲而始報可蕭君治行李將歸激者曰蕭君之所見一何果哉抱卓犖之才當用才之時何不一試而歸今蕭君之同官或拜御史或擢縣令矣使蕭君少忍須臾銅章青綬豈不足以榮其親哉贊善大夫宋濂曰是惡足以知蕭君蕭君不忘孝於親其有不忠於君者乎惟念成均為首善之地故不敢冒爵祿以失菽水之驩爾不然是有愧陽城之諸生矣尚何足以言蕭君乎銅章青綬之榮子謂蕭君他日不為之乎激者無以對於是出酒飲蕭君率同志賦詩一章成則蕭君為之欣然引滿頺然就醉片㠶西上抗手而别洪武六年六月二十四日金華宋濂序贈朱啓文還鄉省親序工部奏差朱旼啓文既書滿將省親虎林山中薦紳家多發為聲詩呉府伴讀王驥與啓文有連遂以首簡請予序浙江名區虎林甲郡文彩朗耀光衝於牛斗才猷振拔軫接於荆揚故三沈有翹雋之聲二徐為俊髦之冠多厯年所匪惟今斯粤自唐季以来海田屢化獨繁華之如故慶光景之常新富庶亞於咸陽侈麗比於京索停鸞峙鵠山川之靈氣鬱蟠綺陌香衢笙管之春聲宛潬嗟士習之易染憫風俗之頻移儻有拔萃其間實稱良彦行必傳於緗素譽徧接於卿公惟朱氏之名家愜輿情之所屬塤箎交奏四經之義髓昭明黼黻相宣一姓之文鋒犀利棣蕚既形於周雅芝蘭遽産於謝庭華穎髙鶱允符二妙之選藻思遄發何慙八斗之才珠彩雖沈玉光難掩遂因文藝上貢銓曹雖王勃之少年豈朱雲之可吏厠行人於起部期試事於薇垣三載積勞行將授政一朝予告得遂榮親服綵上堂每賦髙年之引奉觴為壽尚瞻游子之衣春暉澹蕩以娯人秋月連娟而在户争誇具慶奚翅前蹤平浦西風催秦淮之急槳遙天去鴈起名勝之長吟不鄙衰孱来徵序引無山東之雅製續洛下之羣賢愧陳瓦罍式聨寳卣云爾係之以詩曰松帷落秋陰月魄淡凉夕朝鼔官河棹暮宿青山驛憶昔為行人風雨尚征役王事有程期吾敢思燕息今焉返吾廬搖曳武林陌上堂獻壽觴踉蹡喜増劇衣帶来時香酒仍去年白門前青桂枝寒花破寥闃不見近三年為我動顔色子歸趣誠佳子樂復何極可憐城頭烏肯倦西風翼贈呉府伴讀陳生孟暘序君子為學能知内而不外斯善矣内則自任之重而不失天分之正茍區區務外則奔趨竭蹷何所不至哉予自官京師南北之學徒頗有来受經者既而多攝御史巡行郡國而使孟暘亦在其列孟暘所蒞光穎徐邳宿五州官書浩穰至萬餘巻孟暘逐一􅐡梳使枉者直暴者馴且察夫民病請免夏賦之絲頻役之軍與夫輓運芻茭之艱分給滯鹽之便如是者數條右御史大夫陳公即以上聞多有舉行者已而同列之士或擢左右參政或典大郡或僉各郡按察司事人皆曰孟暘之材若是其將自此升哉孟暘適以疾請告人為孟暘惜之孟暘則曰爵祿之来天也吾敢有徼覬之心哉且方岳之任至重繭絲泉粟之殷甲胄獄訟之繁徵科營繕之勞無所不當與倘毛髮不至是負國也吾自度其才可與同列班乎不可也幸仕優而學拾級而升庶幾無曠官僨事之失也况吾母氏年近五十餘日薄西山素髮蕭蕭然埀領僑寓於婺城之間吾心懸懸如飢近已得請于上躡履而迎之以来庶幾吾心安焉不然鐘鳴鼎食以為榮結駟連茵以為侈適足以増夫愧耳予聞孟暘言知有志君子者也内而不外者也拾級而升而無躐進之望者也思孝乎親者也此贈别之言所以不可不作也贈夏安禮序樂昌丞廬陵夏君安禮見余於京師請曰安禮嘗讀古人之文見其聲烈垂於後世若日月之在天心甚慕之然年已不逮矣而每觀其同時之人多託名於文辭之中至今亦賴以不朽一何幸哉自意此由託得其人而然庶或可以自致而先生信今之傳世者願有以贈我使得置名於其間俾来世有聞焉余告之曰文辭固足傳世也然非君子之所得已也古之人道德備於身遭時居位而推之於天下若臯陶伊傅初未嘗自有所著而被其澤聞其風者相與紀載其言語行事以傳其次若管仲晏嬰為一國之政亦未嘗著書以傳而後之能言者反假其名以取信於世又其次若秦漢以下將相之獲書於史氏者或出於編葦販繒之流或起刀筆介胄漁鹽之間計其人或目不知書而口不能談豈暇為後世計哉而卒之顯名者其德行功業有足稱也又如班氏所傳循吏以及近代以循良稱者未必皆自能言亦未必託人為紀述而其事愈傳不廢是豈偶致之哉亦能盡其職而已故仕無崇卑能盡其職則榮於當時而傳於後世今安禮思自致於烜赫奚以他人為哉極乎材之所能為充其位之所得為則可矣然世之治民者强者酷虐以立威懦者㢮緩以怠事而汲汲惟其身之謀是皆不顧来世者也使稍却慮深思而惟恐其名之泯沒則豈不慙且懼哉安禮處乎下位能不自卑而思善其名亦可謂有志之士矣夫士恒患無志有志未有不至者安禮昔嘗佐澄城知武强赫赫以政事聞民交口稱之繼自于今茍能愈自奮厲他日史氏紀循吏之績以備國初之政其在安禮也夫其在安禮也夫贈張致中序銜轡衡䇿工之所以御馬也馬非此則不足以致逺然茍不用其力馬未有能至者也爵祿名器人主所以御天下賢才之具也有才之士非假爵位固不足以立功然茍恃焉而不脩其職其能成名者鮮哉余嘗讀漢將相表見四百年間登名于簡册者以千百計而余能熟其名者僅數十人他或無事功不見于列傳或不久輒罷不及有所為至于今則寂然無聞矣余每為之掩巻竊歎方其人在時皆位乎朝廷之上與人主相唯諾可否其威權勢力可以禍福一世使一世之人低首側足不敢視其前驅當其氣酣意得語其故人賔客亦未嘗不自必以為傳世無疑而今雖博聞多識者且不能知之况庸常之人乎此其恃焉而不知脩職之過也及觀卓茂魯恭之名皆發於邑令唐之元德秀宋邵子張子之流皆厄於下位或布衣終其身而名聲赫赫照宇内雖小子婦人皆習知而能道之後世或跡其里居官守所及之地為之立廟奉祀與其人尚存不異然後始大悟鄙陋無能者雖爵位不能顯其名豪桀之士自立於天下者固不待外物而後著也而世或恃之以夸於人則豈不惑哉四明張君致中學甚富義甚偉有志於功名思推其所得以澤物其意甚美繇奏差上書闕下論事天子才之擢為宛平知縣余嘉致中之賢而欲見其功名之成也故以所嘗歎者告之使致中勿以位卑自忽而益致思焉然余固以德薄位尊為懼者亦可以為戒也贈何生本道省親還鄉序世有恒言閥閲之家能守其田賦為難曰非難也一愿欵之人足以易之矣又以能保其闔廬不失先人遺澤為難曰非難也稍知承家之義亦不致於覆墜矣又以能傳龜襲紫為難曰非難也爵祿之来雖曰有命或可以倖致初不可以定論也然則孰為難其在紹書詩之業而有光前人乎前人之嚅嚌道真吾則兀然如嚼蠟丸前人之立言契道吾則瞠然如立土偶縱使入有田廬出膺膴仕惡在其為賢子孫也哉吾於何生之事不能無感焉生字本道北山先生文定公諸孫也先生當宋之季侍宦臨川獲從考亭髙第弟子黄文肅公傳伊洛正宗之學首喻真實刻苦之訓繼聞浹洽四書之旨積力既久道凝德立威嚴莫犯有如泰山之干霄和氣充牣儼若陽春之煦物故其學一傳為王文憲公再傳為金文安公三傳為許文懿公聨蟬散彩焜燿後先使吾婺為鄒魯之俗五尺之童皆知講明道德性命之學者先生之功也在他人夙夜孜孜欲儀刑其萬一况其子若孫者乎生嘗從事科舉之業受鄉薦矣㑹年始踰冠上命肄業成均此天之玉汝于成也向使合試南宫幸擢一第即隨牒浮沈州縣間而學不暇講矣學未成而仕寧不犯古之明戒哉生今幡然改轍唯乃祖之學是繼斯善矣繼之之道云何心欲其大也萬象無不涵也理欲其精也無一髮之不窮也氣欲其平也勿使粗暴之干也形欲其踐也毋徒為空言以瞽世也文辭足以溺志也非關名教絶之而勿為也異端小道或可觀也屏之斥之唯恐蹈之也如此則庶幾乎近道矣生其朂之哉生在成均援舊比歸省二親前御史中丞誠意伯劉公參知政事陶公嘉生有學而有文首為詩以華其行而詞林胄監之英記注給事之臣郎官藩僚之賢方外名德之士又各分題聨什而請予為之序嗚呼閥閲之家賢子孫能紹書詩之業者予不於生望之而孰望之哉生執經從予學者頗久予故肆口極言之若夫予告省親孝子常事爾兹可畧云贈髙麗張尚書還國序皇上誕膺寳厯威服德懷萬邦黎獻共惟帝臣時則有若髙麗處于海東遣使者奉表稱臣貢獻方物上嘉其誠詔錫以璽書金寳仍為髙麗國王且錫以王者禮樂使祀宗廟山川百神於國中王感上恩之優渥也事大之禮弗懈益䖍今年春復遣工部尚書張子温来朝上御奉天殿見之侍儀使自殿中傳宣問王起居且勞子温跋涉之故皇情謙抑在古所無即日錫燕於㑹同之館翌日御東朝命侍臣饗之自時厥後中書樞府暨御史臺次第而舉酒觴流行伎樂交作酣暢和適禮意有加焉夫以皇明天覆地載四夷君長孰不重譯来庭使節之往来琛賮之充牣無月無之而於海東之使禮遇尤厚者其故何邪他國之君長非不有其土地人民紐夷俗而蔑禮義騁其詐力惟日不足髙麗乃箕子胥餘之邦上有常尊下有等袠實存先王之遺風焉正當以中夏視之未可以外國例言之也矧今聖天子在上雄兵百萬如雷如霆有抗之者無不殞滅然於守禮之國必寵綏而懐柔之唯恐有所不及而髙麗之君亦知天命所屬雖在數千里之外遙瞻天威僅同咫尺致使海東之民安於田里而弗知戈甲之警含哺而嬉鼓腹而游無異承平之時是所謂君臣交盡其道者也不亦美歟抑予聞宋之徐兢嘗往其國其國有禮部尚書金富軾者與其弟富轍博學善屬文而進趨詳雅兢以綽有華風稱之今子温之来也應對精明進退有度而文采粲然可觀似無愧於前二子者使不賢而能之乎因其臣之賢則其國君之賢益可信矣子温之還大夫士多詩之予因總脩元史不暇與子温接頗樂聞其事而為之序云贈醫師葛某序古之醫師必通於三世之書所謂三世者一曰針灸二曰神農本草三曰素女脈訣脈訣所以察證本草所以辨藥針灸所以祛疾非此三者不可以言醫故記禮者有云醫不三世不服其藥也傳經者既明載其説復斥其非而以父子相承三世為言何其惑歟夫醫之為道必志慮淵微機穎明發然後可與於斯雖其父不能必傳其子也吾鄉有嚴生者三世業醫矣其為醫專事乎大觀之方他皆憒憒絶弗之省又有朱聘君家世習儒至聘君始以醫鳴醫家諸書則無不精覽一少年病肺氣上喀喀鳴喉中急則唾唾血成縷嚴曰此療也後三月死聘君曰非也氣升而腴中失其樞火官司令爍金於爐是之謂肺痿治之生已而果成生一六十翁患寒熱初毛洒淅齒擊下上熱繼之盛如蒸甑嚴曰此痰也不治將差聘君曰非也脈淫以芤數復亂息外彊中乾祻作福極是之謂解㑊藥之則瘳不藥則劇已而果劇治乃愈一女婦有噦疾每吐涎數升腥觸人人近亦噦嚴曰此寒噦也法宜温聘君曰非也陽陰未平氣苞血聚其勢方格靡有攸處是之謂惡阻在法不當治久則自寧且生男言後輒驗夫嚴生之醫三世矣聘君則始習為之而優劣若是者醫其可以世論否耶嗟夫昔之名醫衆矣未暇多論若華元佗若張嗣伯若許智藏其治證皆入神初不聞其父子相傳也自傳經惑於是非使禮經之意晦而不白三千年矣世之索醫者不問其通書與否見久於其業者則瞀瞀焉從之人問其故則曰是記禮者云爾也其可乎哉葛生某淮之鉅族也明於醫三世之書皆嘗習而通之出而治疾決死生驗差劇若燭照而龜卜無爽也士或不能具藥輒注之不索其償士君子翕然稱譽之名上丞相府賜七品服俾提舉諸醫官有疾者遂倚之以為命嗚呼若葛生者其無愧古之醫師者歟贈醫師賈某序醫之為道難言久矣然必審診以起度量立規矩稱權衡合色脈表裏有餘不足順逆之法復參其人之動静與其息之相應然後從而治之則其事為甚不輕矣非洞明厯世羣書之得失尚可與於斯乎黄帝内經雖疑先秦之士依倣而託之其言深其旨邃以𢎞其考辨信而有徵是當為醫家之宗下此則秦越人和緩無書可傳越人所著八十一難經則皆舉内經之要而推言者也又下此則淳于意華佗之熊經鴟顧固亦導引家之一術至於刳腹背湔腸胃而去疾則涉於神怪矣意之醫狀司馬遷備志之其所謂迵風杳風者今人絶不知為何證况復求於治療之深旨乎又下則張機機之金匱玉函經及傷寒諸論誠千古不刋之典第詳於六氣所傷而於情欲食飲罷勞之所致者畧而弗議兼之文字錯簡亦未易以序次求之也又下此則王叔和叔和纂岐伯華佗等書為脈經敘陰陽内外辨三部九候分人迎氣口條陳十二經絡洎夫三焦五臓六腑之病最為著明惜乎為妄男子括以膚陋之脈歌遂使其本書不盛布於世也又下此則巢元方其病源候論似不為無所見者但言風寒二溼而不著溼熱之文乃其失也又下此則王砯砯推五運六氣之變撰為天元玉䇿周詳切宻亦人之所難茍泥之則局滯而不通矣又下此則王燾孫思邈思邈以絶人之識操慈仁惻厚之心其列千金方翼及工害人之禍至為憤切後人稍闖其藩垣亦足以其術鳴但不知傷寒之數或弗能無遺憾也燾雖闇劣外臺秘要所言方證符禁灼灸之詳頗有所祖述然謂鍼能殺生人而不能起死人者則一偏之見也又下此則錢乙龎安時許叔微叔微在準繩尺寸之中而無所發明安時雖能出竒應變而終未離於範圍二人皆得張機之粗者也惟乙深造機之閫奥而擷其精華建為五臟之方各隨所宜肝有相火則有瀉而無補腎為真水則有補而無瀉皆啓内經之祕尤知者之所取法世槩以嬰孺醫目之何其知乙之淺哉其遺書散亡出於閻孝忠所集者多孝忠之意初非乙之本真也又下此則上谷張元素河間劉光素睢水張從正元素之與光素雖設為竒夢異人以神其授受實聞乙之風而興起焉者若從正則又宗夫光素者也元素以古方新病決不能相值治疾一切不以方故其書亦不傳其存於今者皆後来之所傅㑹其學則東垣李杲深得之杲推明内外二傷而多注意於補脾土之説盖以土為一身之主土平則諸臟平矣從正以吐汗下三法風寒暑溼火燥六門為醫之關鍵其治多攻其劑多峻厲不善學者殺人光素論風火之病以内經病機氣宜十九條著為元病式簡奥粹微有非大觀局諸醫所可彷彿究其設施則亦不越補攻二者之間也嗟乎自有内經以来醫書之藏有司者凡一百七十九家二百九部二千二百五十九巻亦不為不多也他未遑深論即今所論者言之世之醫師果能盡心於斯否乎脱或未盡心於斯則夫起度量立䂓矩稱權衡合色脈之屬焉能察而行之不至以人命為戲也幾希矣雖然亦有要焉逆與順之謂也曰升降曰浮沈吾則順之曰温凉曰寒熱吾則逆之果能此道矣則去夫先醫之所治雖不中不逺矣然又未易以一蹴至也非求之極博而觀其㑹通安可遽反於至約之域乎醫之道所以難言者盖若此而已烏傷賈思誠濂外弟也性醇介有士君子之行嘗同濂師事城南聞先生學治經久之思誠復去受醫説於彦脩朱先生之門諸儒家所著無所不窺出而治疾往往有竒驗薦紳間多為賦詩而屬濂以序濂非知醫者將何以為思誠告哉而思誠請之不倦因為直疏厯世羣書之得失而朂思誠以學者如此初不暇如他作者簸弄筆舌交錯以成文也贈傳神陳德顔序余方退朝忽起曹員外郎劉君宗文同一儒生見過指曰此吾學子松陽陳德顔也德顔善描真小與大咸宜請為先生試之余所遇畫神者亡慮數十有絶不得形似者有僅得髣髴而弗能全者形雖肖矣又有不得其風神如道家所繪仙靈者竟無以稱吾心不欲咈宗文之意姑諾之德顔反覆睥睨之而去越明日德顔持一小像来余不能自見揭諸壁間傔𨽻見之讙曰此吾主翁也俄門弟子至又争曰此我家先生也自時厥後僚友好我者聚而觀之僉曰此龍門子宋君也予亦自笑因叩之一云是舍杖而趨觀水潛溪時歟一云非也是破顔微笑肆口論文時歟一云亦非也是㝠心合道與造化游時歟余曰有是哉脱如三客言非特其形逼真抑且并性情而傳之矣曽未幾何宗文又再至余因與道客語宗文曰京都之間天下藝能之所萃止如德顔者十百之中僅一見焉先生既愛之矣盍為文以張之乎余自近歲以来為求文者肩摩袂接而至一切謝絶已久聞宗文言欣然揮毫為之藩府宰輔之賢詞林胄監之英臺閣清流之選以余延譽之故亦競賦詩畀之德顔何以得此於人哉盖君子所業但憂心弗純不患藝不精但患藝弗精不憂名不揚理之常也古之人以畫鬼神為易狗馬為難狗馬人皆識之不類則非之鬼神不與人接竒形佹狀可怖可愕任其意為之况人為物靈其變態千萬一毫不類則他人矣不其尤難哉非德顔之藝精者不能與於斯也余於德顔竊有所感焉史氏之法不溢美不隠惡必務求其人之似焉一毫不類亦他人矣奈何世道不古揚之則升青霄抑之則入黄壚問其氏名則是矣其行事則非也嗚呼一藝且然而操直筆者乃不能然豈不有愧於徳顔哉余論激矣宗文以為何如贈陸菊泉道士序呉下道士陸永齡好養生之説别號曰菊泉徵言於余曰永齡聞菊之為華得陽氣最盛者古人謂之日精屈子好神仙賦逺遊嘗餐其落英後世有飲南陽潭水而得上壽者則菊誠可以延年也久矣永齡誠樂而慕之故以菊泉為别名先生以為何如余曰菊固可以延年也雖然吾觀昔之神人若廣成子安期生之流至今數千載猶時時往来東海諸山間淩日月而薄陰陽視天地如一粟以千載為俄頃其壽可謂長矣其人初曷嘗餐菊飲水而致然哉亦善於自養而已夫人備五行之氣以成形形成而精全精全則神固誠能體乎自然而勿汨其中勿耗其神勿離其精以保其形大可以運化機微足以閲世而不死豈特致上壽而已乎雖然此道家之説也吾亦有所謂不死者書契以来可謂久矣凡聖賢豪傑之士至今儼然具乎方册間其事業可為世法言語可為世教國用之則興家用之則和人身用之則脩或反其道敗亡可立見自今而往天地無有窮也其壽亦無有窮也豈廣成安期之儔所能及哉又何以菊泉為哉永齡年少好學茍未至於此亦當以廣成安期自勉無以菊泉為足恃也吾之身善治之可以亘終古而長存與三光俱不泯没不能養之特蚊蚋起滅甕盎中耳豈不惑哉於是永齡謝曰先生教我矣請書之而願學焉羅氏五老圖詩巻序明之慈溪羅氏出於唐觀察判官隠之子塞翁塞翁来攝縣令因家焉至宋有名明復及謙者相繼擢第奉常蔚為書詩之家然而謙之後人多以耆壽稱其諱絅者年八十有四而終絅之子善卿其卒之年如絅而不及者再朞善卿娶某氏生五男子其一曰明逺年八十又三次二曰明傑其年如明逺而少二歲次三曰明徳其年如明傑而少十又三歲次四曰明純次五曰明叔明純如明德而少二歲明叔如明純而少三歲惟此五老人者髙邁八袠卑踰六旬當風日和美之時婆娑中庭衣冠偉如珮玉鏘如于于而趨雍雍而語皓髮龎眉照耀後前華帨綵衣給事左右見者驚詫不曰此人世之上瑞則曰是國家之休徵嗟嘆慕豔若有所不及噫亦異哉昔者睢陽固嘗以五老聞矣其系非一姓其生非一門不過仕焉而止優游鄉梓相與賦詩倡酬人猶以為異而傳之今羅氏則一姓也非直一姓又出一門焉豈惟一門又連弟若兄焉然兄弟之親有一從者有再從三從者有羣從者不能必其同也又同出於一父母焉揆於睢陽之所聞不為尤異者歟尤異之事可不彰而傳之歟藉曰睢陽之傳皆以爵顯而羅氏則隠約於布衣然爵祿有命不可以倖致顯弗顯固不當計也嗟夫人生至欲者莫踰於壽考書之九五福舉以為首詩人善頌雖不一而足尤以此為至願焉羅氏一門獲之為多誠稀世之盛事厥今之竒逢是宜材士大夫播諸聲詩牘累篇聨繩繩猶未巳也他日協諸律呂被于管絃使其子若孫持觴為五老人壽非特為一時之美談觀風之使或采而上之則牛酒之寵勞絮帛之敷錫天光下照赫奕於東海之濵矣猗歟休哉顧序睢陽之事者錢公明逸也明逸之文雄故能傳諸久逺若予荒靡不振之作將焉用之要不足為羅氏之重輕姑述其槩於首簡以俟如明逸者删焉羅氏五昆弟生子二十二人共爨而食者五世至正初以同居耆德旌其門予嘗求其故絅孜孜樂善惠利及人者衆善卿生平不害物命其好善如其父歲儉則散粟給宗族無死徙之憂臨殁又聚借貸諸劵焚之然其所培植者逺矣樗散雜言序樗散雜言者金華許君存禮所賦之詩也予嘗獲而讀之愛其取法比興有近於古作者謂存禮曰當今之詩予頗得縱覽求其如君者百十之中僅一二見焉非三十年磨濯光精而宣鬯靈龢烏能如芙蕖出水弗沾纎塵有如此者世俗葷腸溺胃饜飫肥醲未必能知君然而至寳不可使埋光而韜采也予當為君序之以傳已而存禮俾侍史錄其全集示予於龍門山中因為之言曰詩至於三百篇而止爾然其為體有三經焉有三緯焉所謂三經者風雅頌也聲樂部分由是而建所謂三緯者賦比興也制作法裁由是而定故周官太師之教國子必使之以是六者三經而三緯之所以聆其音節之詳玩其義理之純養其性情之正詩之為用其深且大者盖若此嗚呼學詩者其可不取之以為法乎學詩者固不可不取之以為法若夫出品裁之正合物我之公髙不過激悲不傷陋則論詩者又可不倚之以為權度乎夫詩一變而為楚騷雖其為體有不同至於縁情託物以憂戀懇惻之意而寓尊君親上之情猶夫詩也再變而為漢魏之什其古固不逮夫騷而能辨而不華質而不俚亦有古之遺美焉三變而為晉宋諸詩則去古漸逺有得有失而非言辭之所能盡也嗚呼三變之後天下寧復有詩乎非無詩也詩之合於古者鮮也何以言之大風揚沙天地盡晦雨雹交下萬彚失色不知孔子所删之者其有若斯否乎組織事實矜悦葩藻僻澁難知强謂𤣥秘不知孔子所删之者又有若斯否乎牛鬼蛇神騁姦眩技龎雜誕幻不可致詰不知孔子所删之者又有若斯否乎如是者殆不可勝數孔子吾徒之所願學者也孔子之所取如彼而後之作者乃如此尚得謂之詩矣乎唐宋諸名家其近古者固不可絶謂無之而不及乎爾者抑何其多也今世之以詩鳴者蠭起而泉涌其視唐宋又似有所未逮姑置之勿論間有倡為江南體者輕儇淺躁殆類閭閻小人驟習雅談而雜以䙝語每一見之輒閉目弗之視詩而至於使人弗之視則其世道之甚下也為何如哉此予於存禮之詩不覺深為之喜而繼之以歎也嗚呼使自一鄉達之於一邑自一邑達之於一州自一州達之於四方咸有如存禮者焉則詩之道庶幾其復古乎予雖不能詩而論詩頗謂有一日之長因愛存禮之作不待請而自為序之非深於詩學者殆未有以知予意之所存也葯房樵唱序序曰葯房樵唱者呉公文可所著之詩也夫詩在堪輿間無纎弗囿無鉅弗涵太極陰陽之化物則民彛之懿煙風月露之形河山草木之昭氣候燠寒之更毛羽鱗介之蕃治亂興亡之著夭壽死生之變可疑可存可悦可愕可感可慨外觸乎物内發乎情情至而形於言言形而比於聲聲成而詩生焉譬之氣至簧鼓神合自然機搖弩發道契沖漠上自王公卿士下逮小夫編甿率藻暢於襟靈一導揚於隠伏大而朝㑹燕享被之絃歌小而委巷深閨見諸譎諌雖位號之或殊而情衷之無異商周之隆斯義為盛漢魏以来古意漸削下沿唐宋之間而得之者蓋鮮矣於是呉趨楚豔而哇淫之咏汨焉牛鬼蛇神而誕幻之事彰焉霆飛霰擲而粗厲之文布焉胡唄梵吟而忽荒之趣見焉傖言粤語而俚鄙之䙝形焉鶯支蝶卉而留連之思滯焉詩道亦幾乎熄矣公嘗與濂劇論至斯為之彈指三歎蓋公以雄逸之資濟通明之識著於篇翰䂓倣風雅鼓動江山之氣發揮造化之微味𤣥酒於周廷襲懸黎於梁苑雕龍彩鳳不足為之麗衝飈激浪不足為之豪其悽婉也則孤猿夜號松露初滴其雅馴也則冠冕佩玉儼趨廊廟由其才無不兼所以體無不備世之讀者如入𤣥圃而覽明月木難之珍如登崑丘而覩天禾肉芝之貴誠可謂擅名制作之林競爽藝文之塲者已如濂不敏年踰四袠學廢三餘精神遐漂無永寧之夢金石相宣乏荆潭之情景伯之舌徒存文通之筆已失顧念疇昔獲陪杖履濯纓雙溪之側漱齒靈源之上攀蘿月以夷猶撫檆雲而舒嘯公時吞吐羣機陶鎔庶彚珠玉隨風氷雪在口人争傳於秀句價欲等於兼金奈何稍厯星霜遽分今古雖瀼西之室遺跡未寒而遼東之鶴一去不返尚忍言哉尚忍言哉公之子履與其門人黄琪編輯遺藳鍥之文梓乃縁世契之深逺以首簡為屬嗟夫玉光劒氣直出人間麟角鳳毛終為世瑞蕭功曹之新章不泯李奉常之妙什宜傳此理之常無足疑者第以疾疢相仍文藻衰落無義山之雅製序漫叟之雄篇姑綴蕪辭以信微臆云爾公諱景奎文可字也婺蘭溪人羣行存諸别傳履博學善屬文尤精於詩無忝於公者也至正十八年歲次戊戌三月己亥朔契家姪金華宋濂謹序筆記序世之為士者貴於立言然言不可以徒立也必依乎經史而為之辨證雖或未遑竭其終始而具釋全書所以發越其光晶而疏通其晦塞者其為来學寤疑辨惑之助而功不既多矣乎漢魏以来藝文之流伸其獨見而成一家言者亡慮數百原其所志亦未必不由於斯道也奈何俗學紛紜而莫之有定騖髙逺者宗恍惚而談𤣥虚尚靡麗者騁浮辭而矜縟製譬諸金貝珊瑚木難火齊可珍之物出槖而紛葩升槃而回縈非不煜煜可觀也然而寒焉不足為之衣飢焉弗能為之食求其若菽粟布帛之濟於用者曽何如哉嗚呼弊也久矣金華侍講黄公溍以文辭冠於一代藏諸金匱勒於樂石既已播厥中外晚又出其緒餘隨筆志之號曰日損齋筆記凢經史奥旨昧者顯之譌者訂之辭雖優柔不迫而難決之疑久蔽之惑皆渙然而氷釋其據孔氏之傳而以八卦為河圖辨僧瑩之妄而知熙陵為仁君此尤超然自得之見揆之於用殆猶布之與帛菽之與粟者歟其異可珍之物名雖貴而實有不足者歟非攬之於至博而約之於至精者不可以與於此歟昔者宋景文公祁嘗著筆記一編以釋俗考古雜説析為三門而上虞李術指其瑕疵者十條近代紫陽方公明亦著筆記一百六十餘條而河南張恒時斥其非二公素稱該洽而其所失有如斯者此無他博焉而不及精之故也嗚呼若公之此書然後庶幾無遺憾哉所可惜者公之胷中所存宜不止此而耄年之加厄於求文者之膠葛竟不能有以盡筆之也雖然味滄海者一滴而知醎采鄧林者一章而知材茍能因公之所嘗言而推見其所不言斯可謂善學者已濂從公游者最久既受此編以歸迺私序巻端寘諸篋衍而擇善學授焉至正甲午春正月望日門人同郡宋濂謹序文憲集巻九
