body:
  text: 文憲集巻三十一明宋濓撰忠義凡二章宋攝松陽丞助教梅溶溶之死執禮嘗哭之曰吾從父一老儒生耳平日恂恂似不能言者乃能慨然守百里之地以蕞爾之軀膺虎狼之暴至於麋身弗顧執禮之言其真足信哉凡人外柔者内未必柔但視其所存為何如耳世槩以白面書生目之可乎哉可乎哉是故溶之死非儒弗能故又冠曰儒以見儒術之有功於名教也人主嘉其忠而旌賞如是可以勸矣故特志之宋户部尚書梅執禮自宣和至靖康七年之間而梅氏一門殺身徇義者凡二人豈非難哉夫生者人之所甚樂而有家之私又人之不能遽忘彼豈甘於頸血濺地而自以為得計哉第以君上决不可背名教决不可負綱常决不可虧忠義一激雖泰山之高不見其形雷霆之鳴不聞其聲刀鋸在前不覺其慘鼎鑊在後不知其酷必欲得死然後為安也今去之雖數百載忠剛之氣充塞乎天地之間凛然如生非烈丈夫能如是乎使當時縱能屈膝受辱以保其首領受人唾罵受人賤惡雖生百年又何益也賈誼有言曰守圉捍敵之臣誠死城郭封疆梅溶以之法度之臣誠死社稷執禮以之孝友凡三章梁處士何千齡千齡當唐季人倫廢壊之時孝行推於友睦而禮遜之風數世不衰真所謂豪傑之士矣夫閭巷布衣之家雖其所為不足以驚世動俗有能修孝友之道者朝廷必下詔以旌之史官必求其實而書之脱或史官失書賢士大夫又必從而謹志之則其事往往反足以傳於後世豈非天經地義不可磨滅有非區區功名富貴者所可同也哉善乎魏徵之言曰雖或位登台輔爵列王侯禄積萬鍾馬踰千駟死之日曾不得與斯人之徒𨽻齒其言又豈不信然也哉嗚呼有志之士寧不於是重有感哉宋處士鍾宅鍾宅一家剔肝刲股者三人亦皆出於廹切之誠或舉韓愈氏所論鄠人者非之非之誠是也較於親病不嘗藥者豈不有間歟書而列之非嘉宅也愚又聞之兄弟之不和每起於妻子之離間非丈夫有逺識則為其役而不自覺一家之内乖變生矣此文廣之出妻雖非至徳而亦甚難事也然則如之何而可嘗見逺識之人知婦女之不可諌諭而外與兄弟相愛常不失歡私救其所急私賙其所乏婦女不與聞焉亦可謂善處妻子兄弟之間者矣明處士黄逢原鳴呼子壯而分婦姑反唇相稽秦之俗已然矣况去古日逺風氣日益漓黄氏能不染於末習卓然不變其恒度豈非真豪傑者耶浦陽以義居聞者二三人唯鄭綺之家已至十葉黄氏知感慕而興起進修益力烏知不綺若耶雖然許史之稱未足為貴也猗頓之貨未足為富也唯孝友積諸躬令名昭於時其為貴且富也大矣所謂特立兩間而無愧稽諸賢哲而有徴著之後世而可法何莫不由於斯黄氏孫曾可不思自朂哉政事凡七章漢尚書僕射楊琁嗚呼政事於人大矣操厚倫惇俗之具執舒陽慘隂之柄御賞善罰惡之權任出生入死之寄其在朝廷則四海被其澤其在一郡則一郡仰其賜其在一縣則一縣受其福茍得其人則上明下淳歌謠太平一或反是則流毒四境神怒民怨至有激成他變者其所繫甚重且難也葢如此人能以一善自效於官者豈可使之冺冺無聞乎縱曰往者之不可作寕不使來者之知勸乎嗚呼紀載之文其可少乎濓竊拳拳於此不可知者固已無如之何幸猶可以考見者輒不敢不書自楊琁至趙大訥凡十一人雖官有崇卑治有優劣其利吾民一也因盡録之宋撫州刺史蔣邵諸暨令張敦鄂州刺史傅柔洪遵撰東陽志書楊扶在蔣邵張敦傅柔之後且言邵厯洪撫二州刺史轉交州敦遷車騎大將軍柔亦刺鄂州扶東漢時人也遵既如此書則邵等宜在扶之前無疑矣濓不謂然漢朝之車騎將軍衛將軍左右前後皆位次上卿典京師兵衛則車騎固漢官也敦為扶前人亦未可知若洪在兩漢時名為豫章而撫之地𨽻焉鄂亦名為江夏郡並無稱洪撫鄂三州者及隋平陳始皆置之而冠以今號則邵柔疑隋以後之人也遵曾不考之是果何耶浦陽未置縣時地屬烏傷扶自曾祖茂来遷考其所居處實今縣地故扶之墓猶在縣西北十五里扶之子孫不見有别居之文遵獨據舊經以扶𨽻浦陽以扶之子喬璇𨽻烏傷其又何耶濓皆不得不正之宋工部侍郎傅雩古語有之人才必臨事乃見豈非然哉雱之使金也制詞甚褒之至有庶爾一言之合為吾兩國之成之語則當時任寄之重可見矣雱亦竒男子哉宋訓武郎黄仁環仁環者區區一劒之雄耳其初未必不鈔掠為人患亦復進之士君子之列何哉有過録善春秋之義也録之斯進之雖然當賊氣正鋭之時使仁環不急挫其鋒則數萬生靈血汚荒原矣宋太常少卿王萬人之欲猶夫疾也聖賢之書猶夫藥也以藥治疾則疾瘳而體和以聖賢之書克欲則欲去而理明自然之勢也世顧玩之以為辭章之助雖日誦五車亦何補身心哉萬自聞季衍讀四書之一言潜思精索反以自治故其律已則義利截然表裏不欺治小民則忠厚粹和不事威斷人自感服居言官則不畏權奸擊之愈力言或弗行掛冠徑去嗚呼是可謂善讀者矣當時賢士交口稱譽或謂其如白圭振鷺玉尺氷壺或謂其振荒如朱熹先見如蘇洵呂獻可無實功者能之乎嗚呼是足以貽不朽矣視彼抽秘思騁妍辭而與庸人孺子同一澌盡者竟何為哉竟何為哉元大學士吳直方天之生材欲振之張之以昌大其支必抑之歛之以培植其本譬之於物其榮腴流鬯於發生之日者皆出於嚴氷雷雪折摧之餘葢飬之不厚則發之不茂其勢然也公以惇龎宏碩之資藴康濟經綸之具司造物者特晦之於少齡而顯之於耄年其意亦猶是耳元知永新州趙大訥丈夫之以功業自見者豈必藉祖父之勢哉藉祖父之勢而成者世豈無之終不足謂之丈夫必也奮自布衣卓然有立小或作州牧大或聞國政使徳澤簡在人心聲聞流於後世然後始無媿於斯名善矣哉吳趙之為何其近是耶雖然均名為人均生是邦均食粟衣帛而有能有不能焉稍知自勵者可以惕然而省矣文學凡十章宋屯田員外郎于房于房論文有曰陽開隂闔俯仰變化出無入有其妙若神何其言之善也葢文主於變變而無迹之可尋則神矣司馬遷班固韓愈之徒號為文章家其果能易此言哉冝其三世以文名也濓竊慕之歴求其文而不可多得近過左溪山見房之子正封所書碑字勢雄㧞如蛟螭虎豹盤拏後先慨然想見其為人登高遐望精神為之飛動嗚呼數百載之下能令人思之不置者必有以也夫宋著作佐郎朱臨天聖慶厯間縣之能文章者唯于房父子為盛優於經學則臨一人而已臨之所傳有淵源意其所著必有大異人者今皆亡之惜哉濓㓜時尚見臨所受嘉祐告身於吳明孫家明孫葢朱氏外孫其亡亦已久今又不知何如也斯文存亡尚往往類是豈沉酣聲利者為可恒也哉宋工部尚書錢遹四朝史有云瑤華失位而復也太母實詔之姑有遷婦之文母有改子之道播之天下合於至公誠哉是言也遹在當時孰謂其不知此理耶其意葢有所循焉爾執禮銘遹之墓嘆其剛方少圓死生負謗其厚於揚善者哉宋太學生何敏中世之人掊克自恣剥膚及髓茍臨患難人將甘心焉如盗感敏中之恩庇百人而不殺者有之乎愚謂世衰道㣲士習日靡工文辭而茍利禄奔走乞哀於權倖之門惟恐不一售者有矣如敏中之以八行及遺逸薦而不受者有之乎朋友道䘮平時指天日為誓一旦臨小利害不引手一救反擠之下石者有矣如敏中鬻行槖而歸朋友之䘮者又有之乎宋處士朱有聞揚雄有言曰君子純終領聞蠢廸檢押如敏中有聞二人是已議者以立傳之法必關大勸懲則書若二人者碌碌爾庸庸爾何必累簡編哉濓曰不然世之人掊克自恣剥膚及髓茍臨患難人將甘心焉如盗感敏中之恩庇百人而不殺者有之乎奔走州邑奴事上官望塵亟拜掃門求通唯恐不能一見如縣令丞欲謁有聞而不可得者又有之乎時非三代人有小善必取曾謂二人之行而可遺之乎激而書之知者當識之也宋布衣倪朴宋自宣和之後國勢不振金人乗釁長驅而入破䧟太原侵軼真定攻擣汴京以致天子䝉塵生民暴骨當時臣僚謂冝枕戈待旦不共戴天以洗刷國恥以尅復土疆乃復割地議和頓首請命忠義之士雖欲有為每擯斥不用卒致淪亡而莫之救哀哉朴以一布衣之㣲非有爵號之榮禄賜之厚乃能赤心憂國吐其耿耿直欲叩帝閽上之雖其書不能進其視賈廷佐之二䟽陳亮之三書俊快朗烈照耀後先如朴者豈非人傑也哉使朝廷用之未必不能立竒勲柰何奸惡秉軸有志之士不獲洩其忠憤之氣推是言之亦不獨人謀之不臧也嗚呼王業終至偏安父讐終至不報必當有任是責者幸朴書猶存百世之下非惟使英雄灑淚肉食者聞之亦或知勸哉宋處士黄景昌縣之立言之士名不著者三人宋元祐紹聖間有朱恮者師黄山薛大觀大觀得平陽孫復春秋之學恮悉傳之嘗著春秋羣疑辨若干巻宋季有蔡慶宗光逺者以春秋舉于鄉後以恩補官至武進丞亦著春秋集解若干巻有陳訥升之者通周易得先儒未發之秘亦著河圖易象本議八巻今皆散佚無存或僅存人亦鮮知之者竊意事功之實行難亡語言之空文易冺故致是爾然則世之傳者亦何往而非空文哉必繫其學之醇疵醇則習之者多疵則傳之者少也嗚呼信如是説古之荒誕不經之文縱横押闔之術可謂極疵矣至今熟在人口者又何其多耶是葢有不可曉者意亦有幸不幸存焉幸不幸天也天則非人之所知矣雖然人衆者勝天文之得傳與否實繫乎後之人天何預哉今觀景昌所著之書亦將散佚無存矣濓為此懼故得而備論之元翰林待制栁貫公負瓌雄絶特之才畜峻大剛方之徳發而為文則沉雄而雅勁見于行則端重而遂直怠色不形于面媚言不出于口所學以聖賢為師而不戾俗以為異所至以教化為重而不阿世以為同起為人師入造胄子周旋禮樂之署統教吳楚之區晚歳就徴入掌帝制其于闢異端扶倫紀黜淫祀排勢臣勁氣直辭可輔彛訓危言卓行可激貪懦迨其退而燕處凛然神居屹然山峙喜怒不著語黙有恒可謂有徳君子矣元處士吳莱濓嘗受學於立夫問其作文之法則謂有篇聨欲其脉絡貫通有叚聨欲其竒偶迭生有句聨欲其長短合節有字聨欲其賓主對待又問其作賦之法則謂有音法欲其倡和闔闢有韻法欲其清濁諧協有辭法欲其呼吸相應有章法欲其布置謹嚴總而言之皆不越生承還三者而已然而字有不齊體亦不一須必隨其類而附之不使玉瓚與瓦缶並陳斯為得之此又在乎三者之外而非精擇不能到也顧言猶在耳而恨學之末能因志諸傳末以謹其傳焉宋潭州儒學教授張森元翰林文字陳公舉明儒學教諭張端臣翰林檢討鄭棠清逸處士鄭柏中書舍人周􅀈編修趙友同文學之士自古及今以之自任者衆矣然當以聖人之文為宗文之立言簡竒莫如易又莫如春秋序事精嚴莫如儀禮又莫如檀弓又莫如書書之中又莫如禹貢又莫如顧命論議浩浩而不見其涯又莫如易之大傳陳情托物莫如詩詩之中反覆咏歎又莫如國風鋪張王政又莫如二雅推美盛徳又莫如三頌有開有闔有變有化脉絡之流通首尾之相應莫如中庸又莫如孟子孟子之中又莫如養氣好辯等章嗚呼濓之所言者客爾以其所言推其所不言葢可知矣人能致力於斯得之深者固與天地相始終得之淺者亦能震盪翕張與諸子較所長於一世雖然此特論為文之體然耳若原其本則未也其本者何也天地之間至大至剛而吾藉之以生者非氣也耶必能養之而後道明道明而後氣充氣充而後文雄文雄而後追配乎聖經不若是不足謂之文也何也文之所存道之所存也文不繫道不作焉可也茍繫於道則萬世在前不謂其久吾不言焉言則與之合也萬世在後不謂其逺吾不言焉言則與之合也是故無小無大無外無内無古無今非文不足以行非文不足以傳其可以無本而致之哉浦陽雖小邑自宋以来以文知名者甚衆大抵據經為本有足貴者貞節凡二章宋節婦何道融詩曰無非無儀惟酒食是議釋之者曰有非非婦人也有善亦非婦人也唯議夫酒食而已葢婦人之行不出閨門在無事之時尚不欲以善自聞况當哀苦之餘稱之曰未亡人而顧以是自衒歟君子之論毎欲先之而不敢後者豈非憫其志之確而不少變歟抑將假是以勵其不能者歟世之材士大夫習爼豆攻詩書坐而堯言行而舜趨其自負誠不在古人後一旦受人家國之寄輙懐二心者有之矣况區區一女子所事不過織絍中饋之間反能守死自誓如秋霜烈日不可狎玩又可得而少之歟是故楚之貞姬梁之高行漢之桓嫠皆登於彤管之書者殆以是歟雖然貞節之昭風俗之偷也使當比屋可封之時果孰名其為貞婦貞婦之得名葢以世之不貞者衆也濓又豈得不為衰俗一慨也歟明鄭節婦黄琇昔者孔子稱宓不齊之善而歸於魯國之多賢葢觀感而興非有資於賢者要亦未易以成徳也今鄭氏之家十葉聚食其䂓度整肅如嚴霜烈日可畏而可仰其徳義之㴠濡又如春風和氣之薰蒸不自知其入人之深故其化行教洽過其門者猶率徳勵行而乖戾之慮消况為其家之婦者乎冝守貞執節之堅而循禮之謹也傳曰一家仁一國興仁其理誠不誣哉琴操凡三章飛泉操浦陽𤣥麓山有飛泉濓與鄭原先生數觀之造飛泉操鼓之琴書諸崖石其辭曰飛泉兮瀏瀏洗耳固非兮誰飲我牛覆謂我汚兮移彼上流具人之形兮柰何忘人之憂琴操二首余將有逺行道過雙溪之上中心隐憂未能釋去逢友琴生於麗澤精舍乃製穹霞洞林二操使彈之流宫含徴其聲泠泠然恍如坐青蘿山中時也生亦清俊士哉其辭曰有穹者霞其色楚楚朝冝弋於林暮汕於渚役車駸駸胡弗之休視彼江水彭然東流有洞者林其色隂隂可以樂飢可以洗心中有白雲藹其承宇我親之思我心之苦含山操二解有序含山操者為和陽王綱妻吳貞媛作貞媛遭兵亂乃能完節蹈水死其不有繫民經之大者乎辭曰含山有雲莫蔽我衣彼荷㦸者廹我以馳我馳我驅泣涕如雨仰視白日光不照下叶地不可穴天不可縁舍旃舍旃我尚何言含山有石其光差差石或可轉我節可虧我夫何之欲從無所舍彼黄泉無相見者叶誰謂淵深我視若陵我死得死中心之寧琴操二首客有吏於海東者以能擊貪暴聞然終用是受誣嘔血死予友胡徴君為著哀辭一通予讀之甚悲竊取其意作哀海東傷妷女二操使善琴者彈而和之客之鬼或有知則其鬱鬱之氣庶幾少伸矣乎辭曰我哀東海而思之苦彼何人斯猛噬如虎我不擊之我民之憂縱不我與覆以我為仇蒼天雖高寃其有極非血之嘔曷明心赤泱泱大風沉沉寒泉舍旃舍旃我尚何言有妷者女顔如舜英詆我以醜我其何傷眩白為黒古亦多有自尤不遑敢誰之咎黄鵠飛来其音誾誾我心茍安何戚弗欣天上地下命也柰何命也柰何焉知其他鼓吹曲凡二十二章王國祀仁祖廟樂章迎神奏淳和之曲皇圖聿崇茅社受封禮分雖異孝思則同緬懐世徳源深流鴻報本有祀式昭神功奉牲奏慶和之曲王國之東清廟翼翼奉我皇祖享祀弗忒薦以牲牷敢曰充腯神其廸嘗純嘏是錫初獻奏保和之曲皇祖載徳既淳且仁弗耀其身委祉後人睠兹藩服典祀維寅清醴方薦歆其苾芬亞獻奏清和之曲穆穆靈宫庭燎有煒貳觴載升神其樂止其樂伊何錫我繁祉磐石之宗本支百世終獻奏成和之曲神兮下臨陟降在庭不見其形如聞其聲冷風蕭然達於兩楹禮成三終神保攸寧飲福奏咸和之曲神具醉止威儀孔肅曰爾孝孫來飲爾福介爾眉夀膺爾百禄子孫保之以引以續徹豆奏嘉禾之曲禮備樂舉祀事攸冝孰其尸之廢徹不遲皇哉神惠覃及我私靈氛將逝如何勿思送神奏徳和之曲杳兮忽兮神運無迹鸞馭上征星流飈疾其靈在天其主在室億萬斯年孝思無斁宋鐃歌鼓吹曲臣聞真人應運而起旋隂轉陽協和神人剗革僣偽期底隆平於時五季之亂已極光嶽氣分河海怒溢強臣悍將割土分疆擅執節鉞倒持天柄敢拒帝命莫之敢制我太祖躬屬櫜鞬奉命四征赫聲濯靈所向輙克姦惡授首獻於太廟已而大功既茂天命攸歸乃受周禪即皇帝位璽書誕頒天日昭煥凡厥臣庶莫不翹足延頸以俟太平皇帝若曰皇天既畀我有家朕夙夜曷敢荒寧彼螢爝之㣲僅若一髪欲抗明於日月疇能置諸朕當剪其孽芽毋使滋蔓爾有衆尚克協乃心以底天之罰越建隆元年夏五月丁巳上親征澤潞六月辛巳克其城李筠赴火死冬十月丁亥又親征淮南十一月丁未傅其城未幾㧞之李重進亦赴火死乾徳元年春二月高繼冲遣客將王昭濟奉表稱臣而荆南平三月壬戌王師入朗州獲周保權以歸而湖湘又平三年春正月取劍州蜀主孟昶封府庫以降開寳三年秋九月己亥朔伐南漢四年春正月辛未次白田其主劉鋹素服出降七年冬十月王師伐南唐八年冬十一月乙未李煜奉表納降由是天威所加如雷如霆有觸之者靡不殞滅太祖既棄羣臣上游帝所太宗嗣厥大寳駸惠前烈文綏武戡唯日不足太平興國三年夏四月己夘平海節度使陳洪進以漳泉二州獻五月吳越王錢俶復盡獻其國所有地四年春二月甲子上親征太原夏五月甲申北漢主劉繼元率其官屬衘璧入朝自是海内羣雄皆為臣僕風氣宣通罔有限域東西幅員盈三萬里梯山航海獻贄奉琛委蛇而來上實天府戴白之叟埀髫之童皥皥熈熈莫知帝力於是宋興至是已二十年矣臣惟帝王之興自有貞符歴古以來史不絶書我太祖之生也祥光瑞彩流為精英異芳幽馥鬱為神氣所居之地紫氣隨之建纛而出白日為暈是葢上天著厥嘉貺以流耿光於無窮故自唐虞禪受之後鮮不以征誅而得天下其中豈無揖遜而紹位者皆陽予隂奪尋即廢之惟我太祖應乎天而順乎人陳橋之戴黄衣之加葢廹於甚不得已爾由是能大一統臣服四海用作神主聖徳神功巍巍堂堂傳至孫子億萬斯年跨漢唐而追三代何其盛哉然而短蕭鐃歌黄帝岐伯所以建威揚徳風勸敵士者也周制因之其在大司樂則王師大獻乃令奏愷樂在大司馬若師有功則愷樂獻于社大抵皆軍樂也古樂久已亡失至漢有朱鷺等十二曲列于鼓吹謂之鐃歌今尚可考見自時厥後代有其辭而唐栁宗元獨凖漢曲倣其篇數作鼓吹鐃歌以紀高祖太宗功徳及征伐勤勞之事臣雖不佞自㓜以文字為軄輙取法漢唐窮思畢精作為歌辭以侑戎樂治兵振旅之際得於馬上奏之焜耀鏗鍧震撼無際使有宋之成烈增光於後無讓於前臣死且不朽臣謹冒死上太祖生洛陽甲馬營中神光滿室有香郁然經宿不散此聖徴先見者也為啓聖徴第一啓聖徴兆載先炎精降爛以鮮破重隂爥層𤣥合之暢神必宣應昌期馭宰權天序叶地軌甄星游渚白帝延氣貫月永殷年質往牒無不然惟皇符熾且騫著成烈在不刋右啓聖徴曲凡二十二句句三字太祖將北伐師次陳橋驛諸將以黄袍加上身列拜庭中稱萬歳遂詣崇元殿行禪代禮為受周禪第二受周禪崇靈基飛龍在天黄道開躬握乾衡鎮坤機蒼精喪木無支黑光盪日見重輝天人同厯數歸靈承帝祐流鴻滋嘉瑞章紛若敦神爵集肉角來垊灝灝俗恢恢昭皇威時赫戱右受周禪曲凡二十二句其十八句句三字四句句四字昭義節度使李筠據澤潞弗服上御六師平之為斮老雄第三斮老雄雄勢蹙連㓂師樹高纛襲邊城施蠆毒王赫斯怒誓加戮百萬貔貅若林矗行視嶕嶢勝平陸升城齊呼山嶽覆飛矢貫臂㧞其鏃雄斯窮畀炎熇朱鳥鳴反舌縮反舌縮四海服右斮老雄曲凡二十二句其十七句句三字五句句四字淮南節度使李重進不庭憑恃江淮招集亡命上親討之為長淮沸第四長淮沸沸若湯有蛟下潜石作房腥沬旁灑矛距四張欲鼓孽浪浸日光真龍出火鬛明炳暴髓焦毒吭殱厥凶醜如刺狼水安流若鏡平皇威洽濊澤滂建萬寓慶無疆右長淮沸曲凡二十句其十五句句三字五句句四字上遣將討張文表假道荆南其主高繼冲懼奉表稱臣為耀靈威第五耀靈威奄八夤如山壓卵飈嘘塵大帥率師手握􅚙渠巾切矛炳也䇿馬飲江江水渾盪摩日月搖星辰孰敢奸命馘以狥蠻荆輿櫬稱妾臣剪拜柯條刖其根一朝坐鎮百粤門南荒帖帖絶妖氛右耀靈威曲凡二十句其十一句句三字九句句四字師克南平趨朗州武安節度使周保權拒命討獲之為鷹之揚第六我鷹之揚于彼南楚目城無全尚何有險阻虜周惛惛曾莫搆思仇孽既殄胡反噬我師裊騎厲華眊旋海水立霄旭昏殺氣回薄蓊若烟濯征斯克功無前王度逺引靡不肩右鷹之揚曲凡十八句其七句句三字九句句四字二句句五字諸將伐蜀取劍州蜀主孟昶封府庫請䧏為巴蜀平第七惟彼巴蜀務靡麗以夸金塊珠礫納政於邪於鑠王師如虎如彲㩋夷凶族使民氣以攄足不加首臂豈大於股啓關迎䧏崩角無敢後聲明宣流被區有百蠻来同孚至理上鄰二五皇徳羡且阜右巴蜀平曲凡十八句其二句句三字十一句句四字五句南漢劉鋹據嶺南良將征之鋹教象為陣以禦我集勁弩射之奔鋹遂詣轅門䧏為象斯奔第八象斯奔擴南爝開重昏揭兩曜通粤海接閩徼虜初弗知跳踉以戱敢持厥鷇雛鬭與隼俱力索氣銷始就縛三早凱旋奏戎樂威神出自天顯彼帝畧千秋萬年烝庶和且延右象斯奔曲凡十八句其八句句三字七句句四字三句句五字王師伐江南江南主李煜䧏時彗出栁歴輿兒為彗出栁第九維彗出栁六合布新矧此彈丸何敢不臣􅿹弓宛轉鐵騎叅潭天塹未度已無江堧帝詔將臣俟其來賓慎毋疾擊以病吾民長蛇成圍不異祥麟孱王既䧏市無驚塵大宣皇化覃于至仁右慧出栁曲凡十八句句四字太宗既繼大統平海節度使陳洪進獻漳泉二州為拓閩關第十閩關屹南紀上應牛女星南將窺瘴海東或帶滄溟五季失覊御藩鎮擅甲兵太阿既倒持僣竊瀆恒經誰歟據二州於此建節旌予奪自已出况復望来庭太宗嗣寳符渙號風霆行稽首歸厥命覆冒仰王靈鞮譯通絶域珪贄集明廷神猷杳難測穆穆臻泰清右拓閩關曲凡二十句句五字吳越王錢俶見上威徳日盛盡獻其土地為吳越歸之十一皇王握神契重華叶帝謩神兵從天下歘忽千萬餘揮戈日為囘投鞭海成枯奮擊八極間健疾飛電如錢氏最先覺方物乆内輸終知喬嶽尊邱阜欲何須登民獻天府不煩神戈誅帝徳統罔極萬國混車書右吳越歸曲凡十六句句五字海内咸臣唯北漢假息湯釡上親征之其主劉繼元素服紗㡌待罪臺下詔釋之為克戎逋第十二汾晉十萬甲數葉僣為君蟠根欲弗㧞毒虐我烝民聖人攄武師威烈赫然振刀㦸夜生火出入動若神方將藏下地䀜已凌高旻有城皆作醢無甲不為塵戎逋膽已落舉族悉來臣羣氓如流魚挈置􅌡海津自兹遂生育陶然履太淳阪泉著軒徳母浦明堯勛赫赫炎徳殷永世同不冺右克戎逋曲凡二十二句句五字四言古詩凡三章風樹亭詩有序風樹亭者嘉禾潘孝子之所建也孝子之親沒每對人言輙嗚咽流涕然無以寓其罔極之思取韓詩外傳樹欲静而風不止之言表其墓亭嗚呼孝子之意至是為可悲矣夫人孰不欲養其親親則不子待也所以昔者臯魚立泣而死者孔子葢傷之也憫之也以其志為可悲而無所用其力也嗚呼若孝子者念念不忘乎兹其亦知沒齒慕親之道哉為之詩曰山有嘉樹油然發榮豈不欲静風撓之鳴我思我親顔貎日改子欲養之親不子待嗚呼噫嚱孔懐孔悲山高海深孰堪喻之内而九藏外而四體皆親之枝同一根柢根既撥矣而枝獨存夙夜哀號莫達九原白楊蕭蕭泉扃夜閟我親我思得無蕉瘁親不可見音容是求求之不得血淚交流作亭墓隅是曰風樹仰之瞻之心焉孔瘁右詩八章章四句靈槐詩有序四明史氏貴富光榮與南宋相終始非特人事也葢有天道焉元有國百年史氏以忠信文學稱於時者甚衆而禄位弗稱人事不冝然也是亦有天道焉元季兵亂槐生於史氏之庭史氏里人曰是必有異既而槐死於馬里人又曰是必有異未幾槐果復生南園中里人曰前之異者徴已往後之異者將來徴之史氏殆有顯者乎入國朝史氏諸孫靖可以才見推為中書舍人出為泰州守遷肇慶通判前之言者曰是其徴矣然而未也遂相與字槐曰靈槐而歌咏之靖可嘗與余兒璲同官謂余冝賦詩嗚呼天人之際逺矣觀於史氏又何其著明哉詩曰難諶惟帝厥命孔赫鑒于九有顯相有徳先宋九君既南而㣲㣲不遂傾世臣毗之世臣之家鄮山之下歳時來歸旗節車馬馮軾而趨衮衣珮璜其綬伊何將相之章雄城渠渠黎庶如雨相臣戾止耄倪咸喜豈無公侯孰能後昆三相二王國存與存誰其尸之其徳有始既受多祜又有孫子鉅海湯湯朔風荒荒不淪于危不顯其光孰云菑播而不有穫天將昌之嘉徴允灼崇堂有庭其左有槐匪植而生惟徳是培天實培之或戕于人人力雖勞其能勝天南園膴膴有萌期蘖其本如達靡有摧害始軋而卑忽㧞而穹其兆斯何冝卿冝公明明天子俊乂是使矧兹世家王公之嗣嗟爾君子天休汝膺何以占之靈槐在庭贈閻希曾參政山東詩并序國朝以魏晉以來立行臺省於外葢為征討權冝之計至唐末方鎮擅地遂以中書令同平章事命之至今相沿而不革非所以示悠久乃改為承宣布政使司設使一人左右參政各一人以協和庶政統馭人民河南閻希曽由鄉貢進士擢為起居注皇上愛其才俊俾肄業文華堂堂在禁中車駕時幸臨訓飭之尋除監察御史轉司文監令乃授山東承宣布政使左參政希曾名鈍仕學兩優者也因其嘗受經於予故其行也詩以贈之其詞曰山東鉅藩統府惟六民物阜蕃土地饒沃宸衷軫之百司碁布誰挈其綱政乃無斁乃詔近臣爾鈍爾往宣朕至懐叅佐其長臣鈍曰吁臣恐弗勝方嶽重鎮厥任匪輕帝曰俞哉爾毋固辭精白一心力行無疑鈍拜稽首即日啓行君臣一心共底隆平我知閻子有學有文五色燦然出類超羣子之往矣期建功勲貯見政績邁于古人古人有云盡瘁國事子尚勉旃服之毋忒五言古詩凡二十七章雜體五首丹桃艷陽實移自武陵源柔風拂纎條鮮澤沃靈根吐葩當春茂結實俟秋蕃盈盈大如斚有色極華丹衛之不敢䙝期以奉君餐君餐發靈和神滋生玉顔無為升𤣥化𤣥黙即軒轅效顔平原流幻百年中有如水中泡虛形本不實何以永今朝悟此造化意肆情常逍遥夜來風雨至南園秀芳條采之薦美酒斟酌樂陶陶斜川素心友叩關約遊遨相携步廣陌遂與品物交驚颸亂陵蟬墜照落巖猱歸徕枕肱卧遐思遡寂寥黄唐不我逮緬焉心煩勞效陶徴君竹死不變節蕙焚尚餘馨秉性有恒操墆徒計切物非至情左崦結層構中園穿空㝠井花遙上白風影時獻青築竈試丹訣濡毫謄酒經一為纓笏累殊嗟神府扃事去慮將澹感来心已醒薨薨哀飢鳶累累嘆凍蠅逝將命脩駕薄言旋故坰㪺穠澆陽卉泛碧破隂苹觀化驗羣品褰襟咏三精情素諒已展爵服吾何營效謝臨川周庭體王國漢制建神區環極法北辰𤣥筴應蘿圖綺殿祥飈轉丹闕寳氣浮象魏壓輦道獸環䘖金鋪宮花錦隊展御栁翠鑾圍長生臨宇縣億載握皇符琛贄九夷集梯航百蠻輸天開睿情懌道洽臣節孚奉觴鳷鵲殿奏䟽承明廬元功在獻替昌言列都俞殷勤宣大雅持用補嘉謨效顔特進少年趨京洛京洛多繁華迅河日流駛崇芒鬱巍峩宛馬游龍行文軒流水過晨夕騁般樂張筵陳綺羅觀禊濯曾澗行酒上陽坡宛轉七盤舞縈環北里歌中有巗棲士如同顔闔家尋雲因剪木飲竇却搴蘿時盼城闕中流塵深如何自咤逸徳殷頗興賢達嗟及時不行樂長有好容華效鮑叅軍韶光將暮芳事未經托物念時濡毫成句入春已三月不見曜陽葩有足限户閾而能搴物華芳林􅂒只尺幰車日来過縞李感明雪頳桃凝崇霞焱開通鸎使暉媚促䗬衙要友具嘉游豈乏玉鼻騧鈎白出川曲采緑向層阿行樂固云得將軍猶枕戈憶山中平生絶俗尚幽期在一壑䘖巵周曲汜班坐䕃蘭薄日嫣花欲笑風迅燕飛弱䟽峰挺飛莖平楚下飢鶴厓傾石似行澗折泉如約何時脱塵鞅賦歸躡㯶屩浩懐漆園欲齊物伯陽期守𤣥脩軌務絶絆冲志在潜淵夕隂㝠蕙幌晨陽暖石田外膠一以遣澹泊返自然五圖非謬記九籥有真詮青青林間雨勃勃谷竇烟松華行將熟米之釀紅泉古辭四首步月空堦下蟋蝍廹人啼急扶卭竹杖越過畫樓西登樓望南山山峰如髻丫西頭雲起處定自故人家誰家採蓮女面如白玉盤相對悄無語風吹荷葉翻曉行秋川上無柰秋色何芙蓉難堪折却愁零露多静室二首静室似僧廬絶與黄塵隔引雀喜留黍惜苔懶穿屐有時倚幽軒情境一何寂只有巗華飛隨風亦無迹明月出東山照見西林明龍蛇布滿地欲步還自驚試問夜何其鳥喧自知更誰探千載意寂黙乃其情題亭上壁三首意隨流水行却向青山住因見落花空方悟春歸去花飛豈解愁愁之損年華請觀未蕋時何處得飛花山花招客笑山鳥喚人鳴相逢本偶爾花鳥亦何情古曲思君不可見忽見堦下花此花君手植如見君容華嫣然索予笑不語意自佳花容方窈窕因君愈妍好見花情尚多見君將柰何曉行荒雞一再號驅車事晨征寂寂秋風蕭况此華月明萬頃琉璃中着吾一身行肝膽盡冰雪毛髪亦含情超然鴻濛初頓覺百慮溟安得王子喬為言此時情始衰四時相推斥行年五十過觸心若無悰况復值春華良節足游衍逝齡翻成嗟蹙眉拭花露按愁聆禽歌氣索怯縮風顔凋仰流霞倚林思寢䄄躧坡企行車志士惜墜景達人傷逝波寧不動靈襟澘然下涕多人生大化中飄蕭風中花百年終變滅感慨欲如何寄逺曲淚盡愁難盡燕歸人未歸遙知君念妾似妾憶君時其一憂心不可冩天際望歸舟江長望不極更上一層樓其二妾有五字詩寄君君勿忘十朝成一字字字九囘腸其三關河勞夢魂欲見杳難憑照君文繡帳相近不如鐙其四遣興鶉衣皆惡顔章紱無醜容容顔未嘗異人心自不同西鄰起高樓妖冶衒春穠玳筵陳圓方朝暮雜歌鍾東家席為門著書述軒農豈能望膏粱糠覈亦不充一門軒葢集一門􅫞罔空是非千載定奚恤達與窮川上夜坐約王子充同作四山動暝色紅日下䝉翳川光生夜明一白欲無地星斗可俯拾恍疑青天墜曠景與心涵直接溟涬際若非隔林鍜不知有人世病懐人生老須至在我不敢辭老人多夀康我胡病擾之一從嬰弱痾筋力漸告疲凌晨頻攬鏡且復傷鬂絲固知非金石難可百年期如何未五十摧塌已不支豈非蒲栁質望秋輙先萎歴觀宇宙内氣化相推移試求古賢豪存者今為誰當知事必爾奚以嗟嘆為兒童種旅葵芳葉正參差南風一披拂流光欲生煇玩之百憂忘濁醪聊自持望鍾山作簡周先輩有序春旭載和鍾山在望道光泉之嫩碧冝嚥朱湖洞之飛丹可尋爰憶舊游輙形新咏不慚下側以豔高情云爾鍾山菀如沐綉巘孕春饒生黄歸灌棠駭緑亂陵苕谷沸桃雀集飈廻川景嬌兹今愧畜軫宿昔憶聨鑣陟峻鼻生火酣芳臉帶潮詩情霞間迥酒纈望中銷偏憐晴蘿思長麗凉月宵文園病渴吻沈生减圍腰江表周公子華采雙鳳翹逸興如遄舉相隨擷鞠苖題方方壺畫鍾山隐居圖余十年不作詩見方壺子此圖不覺逸興頓生㑹仲脩求題忻然命筆第塵土襲人者久殊不能佳耳詩曰飄飄方壺子本是仙者倫固多幻化術筆下生白雲白雲縹渺間㧞起青嶙峋似是朱湖洞笙鶴遙空聞豈無許飛瓊烹芝噏華芬錬師從何来面帶山水文相期守規中結庵在雲村心游帝象先神棲太乙根我㖟上清訣衛以龍虎君内㴠𤣥命秘一氣中夜存行當去採藥共入無窮門題新竹圖送張齊賢三章并序齊賢鄉尊丈夫春秋之高今躋九十誠邦家之人瑞州里之禎祥也慶旦將臨預繪新竹圖于扇以為夀且侑以詩三章一章美其徳二章期其年三章願其後之華榮也里中子宋濓上猗猗淇園竹冩之紈扇中持以奉翁夀期翁如武公猗猗淇園竹閲歳常青青持以奉翁夀願翁逾百齡猗猗淇園竹本根蔚且蕃持以奉翁夀顯榮多子孫答胡將軍將軍去征蠻軍氣如鷹揚寳劍白玉璏鐵馬青絲韁旌甲帶亮月笳簫激清商韓彭當後拒褒鄂作前行顧盼多姿態出入生容光奮迅東海濱海水為騰驤定如漢貳師去縳樓蘭王想見凱旋時横槊賦篇章椎牛饗壯士歌之侑行觴功勲名鼎鼐永世不能忘示呂生有序六經之後㡬無文矣近世學者専攻浮縟之章動以鼓吹六經為辭予實病焉因為吕生賦此以示能文者吕生家潯陽昻蔵若饑鴇持刺望門拜不復資介紹手持縹囊書蝇頭寫芒渺病眼花暈生力覽始能了詞鋒剛且鋭無異鏄斯趙汙萊盡媷劉糜芑植如旐風枝動姍姍秋實垂嫋嫋豈比稗與荑難復稱舂搗似爾才思多堪為世珍寳文華固交絢荒志咎非少憶當弱齡時頗亦躭葩藻精神應𠖇㑹合夢吞羅鳥射侯抗熊豻萬舞持皇翿五采染夏翟三就薦周繅自謂頗俊爽分得天孫巧俯視佔畢徒孤篁出叢葆有時被餘酒便指腹為藁䓇蹏薄如葉鴉蚓恣揮掃春苑集穠豔秋陵失乾薧下則陳姬周上復述軒皥古今萬沿革毫髪無不考終焉立門庭焉敢望􅉅笑古聖制為經白日行黄道流行逮幽隐爛然天下曉誰騁螢爝㣲欲以鬭𤣥造若非靈臺昏致此明目𦕈昌以七尺軀不解分白皂末俗狂瀾奔湖江决隄堡郊原化巨浸何地有桑棗魚鼈舞神姦廬舍作洲島非加回障功未易就平燥秪縁正學㣲本末遂顛倒邇来深知非筆硯稍焚燎遺經寘枕傍寤寐事蒐討尚慚弓力㣲不足穿魯縞荏苒餘十齡晦朔幾朒朓不見宗廟美憂心惄如擣爾才十倍丕雅志復精曒當思不逺復改轍謝纒繞蒸沙豈樂飢裹糧足充飽光廬長山東結蘭以為橑非獨繁牙籖亦自饒魚稻念爾當何來相與探深窈躬行驗所知勿憚心形勦翻翻逐時移毋類風中繇皮革可登器所貴在柔鞄大羽金𤓰鏑亦務端其笴千里孰如遐舉足始一蹻煌煌作聖功湏知此其兆勉旃復勉旃勿謂吾言耄送門生方孝孺還鄉詩并序洪武丙辰予官禁林寧海方生希直以文為贄一覽輙竒之館寘左右與其談經歴三時乃去明年丁巳予蒙恩謝事還浦陽生復執經来侍喜動于中凡理學淵源之統人文絶續之寄盛衰幾㣲之載名物度數之變無不肆言之離析於一絲而㑹歸於大通生精敏絶倫每粗發其端即能逆推而底於極本末兼舉細大弗遺見於論著文義森蔚千變萬態不主故常而辭意濯然常新衮衮滔滔未始有竭也細占其進修之功日有異而月不同僅越四春秋而已英發光著如斯使後四春秋則其所至又不知為何如以近代言之歐陽少師蘇長公輩姑置未論自餘諸子與之角逐於文藝之塲不識孰為後而孰為先也予今為此説人必疑予之過情後二十餘年當信其為知言而稱許生者非過也雖然予之所許於生者寧獨文哉庚申之秋生以不見大母久將歸省焉予深惜其去為賦是詩既揚其素有之善而後朂以逺大之業云詩曰昔在詞垣時英材常駿奔水碧與金膏價重駭見聞終然無根蒂歛散空中雲方生海上来玉栗而春温袖携絺繡書面帶黼黻紋揖遜入禮域陳義陵秋旻同餐太倉米共勘典與墳潜將索幽邃穹欲攀嶙峋蹈雪忽言别涉險航江津梅花似相憐沿途慰孤顰湛恩來九天憫吾髪如銀特勑還故山許與烟霞親生聞抱經來處此寂寞濱莽蒼叩太始溟涬窮無垠宇宙所管攝載籍所敷陳鉅細鈎鉗之若大樂建均律呂按髙下宫商肅君臣鬯和免惉懘疊奏歸繹純桑濮俟揮斥滛哇竟何存黄鍾壓瓦缶庭燎滅荒燐似兹稽古力可敵龕定勲濡毫冩雄顥勢欲移峨岷漏洩混沌竅出入造化神變幻波起伏清温玉璘珣盡抽神竒秘不墮臰臭同腐塵所以日出之逾見光景新山鬼當灑泣湘靈且逡廵振古著作家後先胡繽紛豈知萬毛牛難嫓一角麟古今二千載有如星在辰豈意荒礫中獲此席上珍予生髪未燥立言鄙河汾結交一世士暮齒越七旬妍蚩與苦良入目無留痕自非病狂藥顛倒甲與􅀈渠巾切寧因一學徒諛辭浪云云大言心不怍秪為所見真生今有行期序飲松竹根笑摘黄金花起泛青瑶尊酒酣雙耳熱劇論如抽緍豈無贈别言有意湏當遵真儒在用世寧能滯彌文文繁必䘮質適中乃彬彬有虞號多士九官展經綸惟時亮天工外夷悉來賓不聞有著書鼓盪摩乾坤生乃周容刀生乃魯璵璠道貴器乃貴何須事空言孶孶務踐行勿負七尺身敬義以為衣忠信以為冠慈仁以為佩亷知以為鞶特立晲千古萬象昭無昏此意竟誰知為爾言諄諄無徒謂強聒一一冝書紳送李生還四明詩有序古者重徳教非惟子弟之求師而為師者得一英才而訓飾之未嘗不喜動顔色此無他天理民彛之不能自已也予以一日之長來受經者每有其人今皆散落四方黍稷雖芃芃不如荑稗之有秋者多矣晚得四明李生其為人也凝重而不遷於物頴鋭有以燭諸理間發為文如水湧而山出喧啾百鳥之中見此孤鳳凰云胡不喜越一年别去感慨今昔又云何弗思退朝之暇懸鐙黙坐因發於聲詩一十四章以送之末章用來字者冀負笈重至以迄于有成也詩曰北風何逶迤雪花大於手之子有逺役忍勸尊中酒一解念子初來時才思若繭絲抽之已見緒染就五色衣二解被之行儒林孰不生豔慕蹮蹮媚學徒三步亦回顧三解余生老且至秋髪垂兩肩得之喜欲舞如獲寳璐然四解素編躭清晝青燈坐深夜深𤣥欲忘寢薦味如啖蔗五解一朝别我去何以釋離憂不禁秦淮水流子江上舟六解但願逆風起吹舟不得往共穿鍾阜雲時㸔白石長七解風本無情物豈能知我心事既不能諧贈言如贈金八解須知九仞山功或少一簣學功隨日新慎毋中道廢九解羣經耿明訓白日麗清天茍徒溺文辭螢爝欲争妍十解姬孔亦何人顔囘了不異肯堕盆盎中當作瑚璉器十一解不見金谷園瓊芳委塵沙泰山有喬松老幹凌蒼霞十二解四海皆兄弟知已獨難遇伯樂儻弗逢塩車厄騏驥十三解明年二三月羅山花正開登高日騁望遲子能重来十四解送黄伴讀東還故里并序濓黄文獻公老門人也嘗恨無以報深恩一旦諸孫昶從余學經為之喜而不寐㑹其還家覲省賦詩十四章為贈然絶吟事者已十餘年矣詩曰我昔弱齡時輙侍而翁游經畬日耕概藝圃兼旁搜泰山一以頺欲往將安從豈意麒麟兒復出湖水東爾年踰二十文采昭清秋燦燦五色錦孰肯寘道周一朝捧貢凾羣彦讓先登氊墨新題處祥雲為之升南宮雖免試成均復漸摩庭中傳且葉幾見寒雨多天子坐法宮詔繙金匱書爾獨當青年執筆與之俱九年游降勑持經贊藩王出入禁闥中衣分泥水香有時獻新文跪誦黼扆前帝曰爾小臣才思何蟬聨聲名落人間一如潮水生蛟龍助氣勢坐使汀洲平雙親在烏傷不見今三年青宮為奏請即日乗舟旋顧我髮種種與爾㑹神京懸鐙青照夜不翅父子情别言不忍出况復為新吟吟成意莫盡一字一寸心别去明早來立業繼而翁翁名亘天地不見初與終持此贈爾行櫂發龍江麋官書有嚴程勿戀故山薇贈劉俊民先輩劉君卓犖士出自詩書胄眉目儼如畫幽花眩晴晝踉蹡忽來謁進退頗温茂自言宅偃師家昔千金富大父名法從纍纍印懸綬文辭補元化求者輒奔走繼此簮纓餘矜莊事雕鏤無食不鳬翠有衣總文繡蘭舟盟津水蠟屐榖城岫或騎紫騮馬深林出從獸黄鬚年少兒執矢利先後一發巧中肋驩聲溢郊囿狼兎懸寳鞍歸來薦清酎燕姬白如雪時唱清角侑人意天上郎雌伏不敢雊一旦黄金盡其事乃大謬漁樵來争席傔媵或昂脰憤來氣屢絶十起九顛仆折節去讀書攻苦分句讀初如蛇入筒漸類雛脱鷇把筆學為文衆色紛来就又恐誤儒冠雜藝亦兼究雅奏辨宫商古文參篆籀六物推休祥八卦占爻繇更參九箴法俞穴别膚腠圍棊與握槊賭勝欲起鬭不覺疾聲呼有若熊虎豹最便結風舞唯恐技難售偶逢玳筵張肴核列飣餖酒酣兩耳熱徐起整衿袖文鸞側嚲翎皓鶴仰褰噣躡節盼盤鼓廻旋逐音奏雖得諸工憐不博兩眉皺使者天上來㑹合誠邂逅負書亟從之何翅杵投臼三河及幽并無地不馳驟登高或弔古感時更懐舊恨無息肩所若沉痾待灸前年往龍漠氣序異常候八月雪即飛一夜三尺厚今年度庾嶺熱氣甚蒸餾老梅雖未花鐵幹倚雲瘦欲俟喘息定隂厓聊宿留土虺長過竹矯首出嵌竇目光夾明鏡鑠我汗如漚閉目但待噬有術不暇呪性命鴻毛輕幾被山鬼蹂年來自懲創此險安可復俯思十載間行事賤如畜徒然召悲辛寸禄焉能就即將巢雲松終老友猿狖予聞心鼻酸宛若身在疚于時十月交日月㑹龍􅔀霜風吹人急層衣悉穿漏百齡俱過隙胡不重棲宿須知學踐形庶不慚載覆勺水當離尊贈詩比糧糗歸歟勿久留吾言不能又寄方編修以愚并簡徐大年方君足文史二十即决科州縣治文劇史館仍編摩須知軒冕榮莫換山水癖釣清一川舟攬翠千峯屐豈徒糜歲月且復註春秋書法嚴衮斧箋記分薰蕕雖然落湖江政自憶京輦雪盡馬蹄乾花簮貂帽淺十齡不能見一旦忽竒逢楚澤蛟龍雨秦淮鵰鶚風紅燈夢未殘明月家何處典衣沽酒别蹈雪騎驢去怱怱千里意沉沉三月餘可憐天邊鴈不帶山中書懐人隔秋水題詩冩山石若見徐徴君須言共相憶游仙篇贈鄧尊師并序往歳鄧尊師以高行道士被召至京寵遇優渥遂留主祈禜之事葢尊師通混元大道而尤加意九還寶丹之法數著竒驗役使鬼物特其餘技耳於是不還龍虎山中者頗久儀曺以其事上聞詔許之尊師來别且徴予片言夫道貴於無名奚假言宣哉予方温繹真誥輙擬羣真唱唪之體造一章以遺之方壺真人必囅然笑云是夫也何其狡獪之若此耶詩曰真人契𤣥冲翩翩泠風俱游行一氣中流耀周八區丹雀銜白環來授寳秘圖内感炎靈方欲采三素腴錬成赤明液鬱華凝黍珠蒼龍為濯氛上𤣥來辟非將期學真侶度之升紫虚自知滯塵凡何能應𤣥符頗聞琵琶峯肉芝發瓊荂玉掌如嬰兒烈日暴不枯定當分刀圭成此列僊儒送黄尊師西還九宫山并序雙井黄尊師中理文節公庭堅之八世孫也年弱冠以門資為光之固始尉尋患半身不遂棄官來歸有神師號金華君者謂曰吾能療而疾疾愈當為道士弗聴吾將去尊師曰儻能起廢疾為全人敢不受命金華君以帛粘其體焫燈徧灼之越七日起行尊師曰神師之言猶在耳也小子其敢忘乃去學老子法於欽天瑞慶宮宮在興國九宮山上即真牧張真君道清錬丹之所居十餘年遂主其徒凡一千人咸服其教恂恂有道待當皇上西平江漢尊師拜迎於鄂應對稱㫖後八年上思其人復召至南京所以寵勞者甚至既退命儀曹設宴享之薦紳家以為尊師幸逢盛際上簡主知龍光赫絶山中泉石當被餘輝而綽有喜色不可無咏歌以誇張盛美其西還也相率賦詩餞之而請金華宋濓予之詩曰崔崔九宮山翠蕤倚層青飛觀峙後先宸奎爛晶熒中有遯世翁霞衣佩葱珩仙徒一萬指執簡聴使令年來遘兵燹散走如流星翁獨牽青牛尋雲自躬耕翠華幸江漢扈從森幢旌俯伏黄鶴磯再拜陳中情天日下照臨簮裳受餘榮今又奉璽書翩然覲神京太官給珍膳法酒雙玉瓶祗因逢景運重瞻泰階平致使方外士恩寵霑鴻靈一旦賦歸歟行裾逐雲輕自言當弱冠緑袍佐山城風露感末疾離家煉黄寧藥烹日月鼎符參龍虎形經中氣象昭𤣥覽極窈㝠欲期起泥丸翀飛出孩嬰名花滿皇都春風語流鶯景氣非不饒歸思竟纒縈芳歳去如矢逝彼日堪驚純陽一銷鑠重隂遂相乗余聞重自媿顛毛類枯莖逐物尚役役棲身亦㷀㷀幸有一寸丹能與萬化并何時滴秋露相期註黄庭俚詠寄義門鄭十山長叔姪追述嚴陵别意結髮與子交二十又五春手足雖殊體肝膽寔同身朝帷接觴翰夜幌抱衾裯殷勤忠欵意寂寞采真遊親暱物所忌一旦忽東西剛腸固無淚不覺萬行啼子時惜我出餞至溪濆離家二百里不忍兩相分情深忘道逺猶謂咫尺間行將過嚴瀬勒轡子當還子方執手泣胡可便暌離中情一如河東流無止而流水到海止唯潮兩度來將心比潮水一日幾十廻欲别不成别背顔強登舟子騎白馬去十步九回頭出倚颿柱望望望苦逾濃馬首出復沒漸入烏龍峯峯高在天半未晚涵日車巖阿人已隐恨不鏟嵯峨身雖逐棹發魂則隨子征暝泊蘆花渚寤言呼子名迤邐向前馳徘徊宣歙間李白題詩處蹋蘚升孱顔升高欲為樂念子翻成愁想子已抵家伯仲聚綢繆自此積繁思思繁如棼絲柰何三月久不得子音徽客鴻未返塞夜鵲尚飛南俚辭冩中悁一歌百慮覃題𤣥麓山八景有序予不作詩者十年近尋蘭至𤣥麓山左泉右石争獻竒秀疑山靈欲鈎致新句故使人情思亹亹然也因賦詩八章用元漆書諸崖石别録其副以俟同然桃花澗桃花滿靈澗樹老不計春白雲如可問為覔種桃人鳯簫臺簫史去已逺朱鳥不下來幸有山頭月憐來入酒盃釣雪磯釣雪立蒼磯入夜魚不食不食非水寒自是鈎大直翠霞屏古石不改色絳緑自成圍誰裁一片霞為我製秋衣飲鶴川渴鶴忽飛來愛此一勺清五湖非不多恐染鳬鶩腥五折泉一汲復一汲有若歩雲梯終然投東意萬折不肯西飛雨洞飛泉灑成雨洗盡塵土胷欲持青芙蕖去㴞赤鯶公蕋珠巖吟上蕋珠巖詩成不敢寫疑有緑毛仙洗髄梅花下别義門平生無别念念念只麟溪生則長相思死當復來歸文憲集巻三十一
