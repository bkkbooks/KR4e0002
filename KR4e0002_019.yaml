body:
  text: 文憲集卷十九明宋濓撰墓銘凡一十九章贈承事郎吏部侍郎張府君墓志銘國朝之制凡官階自七品至於第四皆贈封其父母與妻上德至渥也于時吏部侍郎張度官品居四從例贈其父某君吏部侍郎母林氏德人命書既下度録其副楮焚祭墓下復請一介蟣蝨之臣待罪銓曹恩榮溥博逮及二親鸞綾金軸下賁泉壤度深懼無以侈上賜而埀示來裔莫堅匪石願吾子為文之濓謹按狀府君諱復禮字禮庭姓張氏廣之番禺人番禺有鄉曰黃岐角皆張姓環居之室廬櫛比當秋宵月白燈火連接而讀書之聲相聞宋紹興間有諱堮者始遷于禮園社堮生飛一通周易能㑹萃諸家之說而折衷之廣之士大夫推為宗師號曰黃岐張氏易歿葬社之南山配麥氏生二子彬甫鄰甫皆善傳父經既葬父晝夜念之弗置搆堂曰永思兄弟躬耕以奉歲時享事彬甫娶羅氏生丈夫子三其次即府君也府君薰炙家庭之教而于易學尤精發為大義頃刻千餘言出入朱程二氏無乖盩者漢儒拘泥不通或流于術數痛麾斥之當是時科目方盛行鄉人士咸謂府君爵祿可以引手致府君笑曰學易者為知吉凶悔吝而已何以官為獨念居處村疃諸子見聞孤陋乃築室都城中俾就名師儒遊見其成立輒喜動顔色已而度舉茂才去而為肇慶路髙要縣學教諭迎養甫六齡而府君歿矣時至正二十一年辛丑四月二十三日也享年六十又一國朝洪武元年戊申十月十五日度奉柩葬于增城縣西之章山因遷家焉四年辛亥度受薦入朝拜監察御史以至今官風采凛然貪墨為之屛迹君子賢之府君四子長即度次輔次峻次熙輔峻俱蚤世孫男二曰原潔曰吉祥女五人昔人有云為善者譬猶藝禾世世能令嘉種不絶則其發育也益昌且碩矣信哉斯言也府君世為儒積善之聞播於海南實合於易積善成名之義今度位居法從其聲益大以宏是皆府君遺休埀祉之所致度方欲為親榮而府君不及見矣悲夫此墓門有碑其銘固不可不勒也銘曰一屈一伸其理孔神易道之門君子之攸遵宜文而彰乃韜其光不露而揚俾後𦙍之昌有命自天寵臨昭宣鬱葱而綿延是為張氏之阡元故文林郎同知重慶路瀘州事羅君墓志銘有序嗚呼士君子立志孰不欲建功名埀竹帛哉或不能逢其時時逢矣或剛正忤物坎壈至死卒無以達其志志弗達矣使其名復寂寂無聞其鬼不靈則已脫稍有知未必不鬱悒於九泉之下操觚任紀載之責者寧不為一動心耶此余於廬陵羅君殊惻然也嗚呼君諱文節字仲正姓羅氏羅為江西右族唐肅宗時自洪都遷廬陵之秀川入宋以來家談仁義而人悅詩書以通經上南宫對大廷者幾無虛歲朱紫相承照耀州里起綰郡章者四人而邑之令佐尤夥焉曽祖時誠祖宗權鄉貢進士父履泰字以通為元之巨儒著書滿家春秋禮記周禮三經皆為之集解復衍河洛圗書之義列圗三十多前修所未發出其餘力補正戰國䇿舛誤數百條且為年表以次其先後行丞相府聞其名署東湖書院山長蓋世號道齊先生者也君始能言其父抱就書室抽一卷授之祝其疾讀君指插架牙籖曰吾齒稍長雖盡通之未慊也其父驚喜暨肄小學輒以氣雄諸生莫敢與其齒後從宦東湖賢士大夫咸折輩行為忘年交問學日進水湧而山出撫州判官燕君某辟為郡吏郡有獄疑不決守二爭以為問君厯階而升摘其案語曰如此則為直如此則為枉儕類大慙出竒計沮君㑹朝廷有詔造鹵簿器仗遣君至屬縣督其成君至樂安憩縣廨中羣吏更謁互諌以為鬼物所馮不宜居君笑曰惡有是乃酣飲而寢夜漏下十刻月色微明見丈夫長而青立與檐齊君奮起執之曰爾來矣爾來矣應時而滅黎明視之並廨有豫章穹隆而敷腴縣人祀以為神君曰其怪在爾矣厯數其罪用竹楔釘之未幾豫章枯死怪遂息郡有織錦工嘗籍于官竟遁入武昌出入辨章溫公門溫勢焰熏灼莫敢誰何復嗾君捕之縣知之不敢受君牒君直訴辨章辨章曰爾胡不求之府公乎君如言而往府公搖手相戒亦不復出一語君怒洊走辨章門辨章厲色斥之曰業已屬爾矣復來何邪君曰工合應官繇府若縣謂其為社鼠城狐不能詰區區小人固不知何所指明公乃方嶽大臣不助半指之力如廢王法何辨章語塞即下令捕與之衆益譁曰是尚不畏溫辨章其有我輩乎謀出之益急君懼禍及裹糧馳燕都燕都貴人亦忌君峭直髙門縣簿無可投足者遂入成均為弟子員一日方挾冊諷詠有相者謂君曰君兩顴入鬢當邊徼建功無以久淹為也君遂用國子助教姚公登孫之薦上於集賢集賢移文雲南行中書署君昆明州學正秩滿升授孟傑府君列蠻夷子弟曉之以君臣父子之懿辭氣激烈聽者聳然轉普定府知事廉行彌厲大理金齒宣慰司辟為令史豪酋侵人疆畎持黃金數鎰為君夀乞君勿右訴者君麾之去酋怒曰君賽天赤邪乃不納吾金也賽天赤鎮雲南之名相云君卒奪田歸訴者乾崖湎里當賦金使者至蠻人納賂往往過所賦之數而金又不可免君至憫其愚反復開導之蠻人鼓舞于庭曰微使者之亷孰能恤我至是亟輸金而還俄入掾雲南行中書雲南馹騎皆官中給直官吏乾沒之以市馬責土酋君曰為天子牧元元者顧若是邪痛懲其弊朝廷以雲南在萬里外下吏部準循舊比行銓選之法使者至選君承其事君知積弊未去且曰王者無外敢不靈承上命以正其法乎獻五策於使者吏受民賄者官不稱職者廩藏不㑹者月日不登者居制未終者皆不調使者大恱悉從之幸門遂塞滇池有神蛇能興雲雨㑹大旱民屢走池上若無聞者君為檄責之片雲欻然興雨因霑足南韶海中積葑成淤而浮游水上夷獠耕稼之號曰葑田田如不繫舟西東無定人交相為盜君命紀字為號疏其步畝及四畔所届上于官官為給劵使有所馮復植木􅍻海岸嚴其畛域不相淆亂或海潮漂蕩有藉以為奸者俾出劵環證之竟歸其田夷獠指示子姓曰此羅掾所賜也否則人盜之久矣監察御史至每召君于庭事難定者必待君言而後決雲南王亦熟君行命升為提控掾史提控掌六房之政人多畏縮不前君益淬礪弗少怠適中朝大臣喜意以失宰相意出參省事鋭意更張庶事悉心任君君知無不言言無不聼名聲翕然動蠻夷中先是蠻夷有鐵甲郎者負固不服至是歡曰天子遣賢輔臣至矣奈何不降帥未附者皆來歸君之功為多鎮戍萬夫長伯胡行事多不法憲府繩之急伯胡擁兵以叛纍歲不能討曲靖宣慰使鬼宗亦蠻酋也助兵一萬夾攻之伯胡就縛幕府上功擢鬼宗參知政事將上省臣上下莫不與之君力爭曰雲南親王臨蒞之地辨章而下多八座大臣何得有蠻酋位邪茍録其功使以參政之名自鎮其土足矣不然國體其謂何空一府咸曰微羅掾幾失之矣鬼宗懼託君鄉人囊金以獻君怒曰腕可斷案不可署鬼宗恚而止君疾惡如仇讎聞部使者德住貪暴賦虎神詩以為風德住銜之賂西行臺御史以専權自恣劾君君走訴中臺遂擊德住去之夷人大快君以常調除承事郎同知彌勒州事政成謁選吏部遇鄉友羅玉於逆旅乃勸君曰君以剛毅取嫉于人致齟齬一世秋髮已繽紛被肩何不謝事以佚老乎君慨然曰子言誠是也乃上乞骸骨之請以文林郎同知重慶府瀘州事致仕年僅六十三耳居數年中原道澀乃犯鯨波之險由海道至閩中而江西兵焰方亟遂不可還以至正二十六年十二月壬戌終于福州之民舍君未終謂其友曰此正吾死所也夫何憾時閩猶奉元正朔云其夀八十洪武五年冬君之喪始還明年某月日始祔葬先兆龜山之原君長身而瘠胸襟磊落如青天白日喜面折人過雖王公貴人無所避故有過者常畏君知亦有幸其知以自改者民事有屈而不伸君亷得其實忿忿見乎色必以告司法吏因得白者甚衆知識尤絶人每言某地當有兵變時承平人競指笑之其後果然始服其先見生平急患難重倫義族叔繼賢久居燕頗饒於資與妻栁皆老而無𦙍嗣乃迎羣從子觀逺為後觀逺至甫七日而繼賢夫婦死其服役者羅參出而呼曰我嘗為子矣觀逺何人乃欲與吾事邪觀逺弱噤不能對君亟告公府逐參盡囊括其資授觀逺且具舟車使扶二喪還江南不特此也凡遘疾疢貧窶及死喪無依流離不能歸者君必捐金倡義士周之初不知其為何如人也君娶劉氏子男二人長大紀有文學而剛介酷肖君次次炳贈畨禺縣主簿初次炳為奏差廣東宣慰府宣慰使釋迦班嘗招峒丁三千即遣征連州峒丁怒至清逺將為變衆憚弗敢往次炳請前峒丁彎弓相向次炳紿之曰宣慰命我來賞汝彎弓何為也峒丁退與清逺令斂繒帛散之乃率以往至連為冦所敗次炳被擒備極慘酷竟不屈而死致有今贈女三人長適郭滋蘭先卒次復為其繼室孫男一人警曽孫男一人某君葬後二年大紀汲汲圗君於不朽以國史編修趙君塤所為狀請撰墓門之銘嗚呼豫昔總修元史每求剛正之士在下位而不伸者載焉蓋以謂雖不能拔之於當時聊使其暴白於後世庶幾死者無憾而生者不愧惜乎有司不上君之事也於是徇大紀之請執筆而具書之百世之下必有因豫文而知君者雖然豫何人哉文之傳不傳固不可必也所可恃者世人豔君之行頗多多必則效之則效之必相與謹視之文其有不傳者乎信有人如君終至湮沒無聞則夫天理人心皎如出日者果為何說也嗚呼銘曰堪輿之間正氣烈烈在人為剛在物為鐵鐵尚可鎔剛則弗屈挺然常伸欲不可涅其一惟君之生能以志雄遵養以時日擴以充百壬所忌吾惟正從譬彼川流萬折必東其二古惟正人妖不敢干芃芃豫章變為枯菅誰鎮大藩乃復蔽奸我往折之聞者膽寒其三夷人何知椎結卉服宣厥彞經丕變其俗爾金我辭我直爾曲凡施惠利惟日不足其四威靈既震叛民來歸鐵甲侁侁棄戈而嬉有聲洸洸有澤輝輝有知即為不識位卑其五繡衣孔揚其貪若狼我斧我斨莫不加其亢形之聲歌庶懲而蘉覆謂我狂訾我以凉其六持此而行何適不艱坎壈其躬恬夷其顔胡不爾庸以豸為冠鷹隼一出狐鼠盡跧其七賢否易位曷以為政君亦何傷人為嗟咏禾黍離矣凉颸棘矣吉士亡矣何嗟及矣其八故處州路慶元縣儒學教諭張公墓志銘濓當弱齡嘗遊學郡城中時王教授雲卿方之官嚴陵忽持餞行卷示濓中有浦陽張公詩音律清麗而字體莊徑得八分之正心竊慕豔之後七年始獲拜公於月泉里第公風神峻潔眉目聳秀還而望之若玉井氷壺絶無一毫塵土意及聆其論議則纚然如貫珠退因私念前輩沈涵深固故其見於辭氣者有不及未嘗不自歎鄙吝粗穢而莫克攻勵之也方將為問道考德之圗居亡何而公亡矣又後十年公之子端臣件繫羣行為狀來金華山居請濓為之銘濓誠後死不可謂不知公者銘何敢辭公諱恕字如心姓張氏為婺之浦江人曽祖貴宋宣議郎祖祚承信郎父森湖南潭州路教公幼而穎悟取家中遺書晝夜研磨之雖暑爍金寒折膠不易其恆度逮長聲名藉藉起士林間逺近來學者户外之屨常滿已而用薦者教授常德之武陵遷婺之東陽處之慶元公所至皆以興學為己任招集弟子員危坐堂上列羣聖人之書為之敷繹大義皆充然有得士風為之丕變尋以母夫人春秋髙歎曰孝者百行之冠冕吾母鶴髮埀領尚可宦遊而弗之止邪自是夷猶里閭日侍夫人之側當風日清美或杖藜行佳山水間如嗜飲食或勝友時集輒商略古今上下數千年事及爇沉瀹茗賦詩自娛有不知老之將至也公素患脾疾至是發寖劇遺命治喪勿用浮屠氏法當依朱子家禮從事遂瞑公生於咸淳辛未十一月乙亥卒於至正癸未六月乙卯夀七十三娶方氏有婦德克配君子生子男六人虎臣端臣鼎臣稷臣純臣敬臣子女二于貞方元亨其壻也孫男五人僧家奴道童留孫復生憶祖僧家奴復生早卒孫女三人其年十月己亥窆公於縣東五里原先塋之側其所著書有詩集若干卷藏于家云夫自師道不立後生小子失其所依憑無以承藉其所休祉而甄陶其性情故蒞事制物動與理違深為識者之所慨歎有如公者惓惓以斯道淑諸人所以為世防而昭民能者實於是乎賴而公竟死矣雖然公之子皆業儒端臣博學而能文辭尤號最良者也橫經邑庠中俊秀子弟皆環聼之公雖亡其不歿矣夫銘曰孰武其先公則式之孰牖其後公則迪之纍世之儒聲華燁而况公之施三為校師襟珮逶他左矩右規鑽石幽墟以昭以貽里中子宋濓謹撰嘉議大夫泉州路總管朱公墓志銘濓少時即見莆士朱公廷試文數篇已歎其不可及後二十年聞公官閩中所厯有聲尤慕服之及今又閲二十餘年公之孫潚以墓銘為屬間公之死已十七年而濓亦老矣嗚呼其何忍辭公諱文霆字原道姓朱氏九歲能文十三從進士林君岡孫學經每日暮須諸生出獨援疑義難其師其師驚歎之元至治癸亥以尚書舉進士丁外艱去至順壬申再舉遂上名南宫對大廷名列第十賜進士出身擢同知瑞安州事階承事郎改汀州路總管府推官轉承務郎調甌寧縣尹進奉訓大夫御史交薦于朝除福建宣慰司都事丁內艱起知瑞安以大臣奏授奉議大夫福建儒學提舉遷同知泉州路總管府事升奉議為奉政至官引年辭歸遂以嘉議大夫泉州路總管致仕命未下以至正癸卯八月九日卒于家年六十九公同知瑞安大府檄公均瑞安平陽永嘉之役不為權沮財奪民服其平為甌寧行均役法上官以其舍人為屬請緩之公格不奉命上官怒誣搆公罪部使者亷其非辜獲免且以訟牒三百委公治之公從容剖答而退不能有言其知瑞安盜起旁境陷陶山天門諸堡募壯士攻破之斬其酋以徇颶風挾海水漂民廬舍公發官廩按行漂所賑之其提舉學士逐其茍職者易以儒儒悅之公孝友切至以父不逮祿養言輒涕泣事母惟恐咈其意撫五弟教而有恩居官無廢事公暇講授不輟學者因所居稱葵山先生嘗考閩浙江西三省士所取得美材為文本於理不為浮辭曲辨陳監丞旅稱之有集若干卷藏于家公之先建安人曽祖德誠宋潭州駐泊祖治安元河南等處醫學提舉父世英始遷莆以公貴贈奉議大夫同知興化路事驍騎尉追封仙游縣子母林氏贈仙游縣君夫人池氏封如其姑年若干以丁酉某月日卒于瑞安是年十二月十六日歸葬常泰里雙牌山之原及公卒穿夫人之墓合葬焉甲辰七月二十一日也男一人鏞古田丞六女適校官林敏中漳州路同知王謹惠安尉胡顯祖及黃孔修李某王某孫男一人即潚國朝鄉貢進士能世其家銘曰在元中世士患無位持經挾䇿就有司試試者為誰或哲或愚或以微纇棄照乘珠及其既獲爾州爾邑有所不通為吏侮執有美朱公洊薦而登左律右經吏駭且偵剔蠧平徭如衡稱物有撓之者正色不屈既典方州亦司儒臺黜士之贋誅盜之魁曷其致然維學知要學以為政天下猶小彼何弗思訾儒為迂刀筆拘拘視公何如公政在民無銘亦存銘匪銘公告其後昆於公是效公德孔多尚食其報故岐寧衛經厯熊府君墓銘熊君伯穎卒其友之仕者為之請銘余曰君與余善且才而文銘余所宜為後數年余致政歸衰老多病未暇具其事而為之請銘者亦亡余曰噫余可負吾友耶乃按故所書為銘君諱鼎字伯穎姓熊氏撫之臨川人世以尚書教授於鄉君少有敏質年十八從父受經義通之每私較試輒冠其鄉人鄉人推讓不敢與齒後六年為元至正七年領江西第九名薦書上燕京就禮部試文彩煜然動人偕試者竊視執筆不敢下衆咸以髙第期君有司以君議論竒竟棄不取君絶不為意曰第不第命也命可尤耶束書南歸當時名人若張文穆公起嚴余忠宣公闕李諭德好文張承㫖翥危左丞素揭祕書汯黃助教罕皆重惜其去相率為文辭以餞君退而益修其業十一年江西行中書省檄為吉安路龍溪書院山長龍溪故有田屬他邑前山長久不理寖侵之君至問吏叱曰國家置田以養士田亡士將安食即檄所治徴索既具弟子員肄業如令月旦望𤣥端深衣據席講說程其良否而奬督之無賴徒陳小峯縱其子寧為直學握出內之抦每與山長抗禮君按法黜之小峯噤不能吐氣以死郡守妻喪遇兵亂其子撤山長座將遷柩明倫堂上柩至門君叱止舁者置諸别室復欲以浮屠祝尸浮屠方以鈴鈸至君怒撞壞之曰此吾孔子堂豈浮屠廬耶亟屛去勿汚我守聞嘉歎君而以書謝曰先生教我厚甚時江西冦漸起所在擾潰不可為職諸郡帥守知君練籌略往往延問軍政君亦以拯民自任悉心力為之計贑郡帥全普庵薩里尤器君命君擇險隘為守禦備君於皇恐大蓼諸灘設坑穽建寨柵搆屋三千餘間結民兵自守田是贑獨完於他郡戍將三人坐戰敗將加誅君為救解出之㑹當大比他郡多以兵廢君獨請全舉行觀者以為異事吉安歲凶全與吉安守有隙禁吉民勿入糴民啼號于道君爭曰盜之起者為饑寒所迫也今使君閉糴將開盜門脫吉民事亟生變贑能獨全乎全悟即罷前令君周旋兵間委曲為民皆此類十三年郡多君前績便宜擢君贑縣尹員外置君恥之辭不受未幾以父喪歸服除兵部尚書黃昭江西廉訪使吳當總兵出閩關辟君參謀軍事君為昭畫策甚詳㑹昭與當罷兵柄䇿不行二十一年陳友諒僭號於九江用黃昭解觀等薦以君為太常卿俾守令踵門起君堅卧不赴既而國朝兵入江西武順寧河王鄧愈聞君賢下令遍索君强起揖王軍門王與君論事合大喜致帳中日夜咨以事一軍驚歡以為主將得師君見王寬裕誠大將材遂委身從之不去贊王取撫州兵不血刃賊酋鄧克明夜遁二十二年皇上親將兵入豫章州郡望風欵附九江亦下君得詔見慰勞甚至二十三年丁母夫人憂後三年以大臣薦徴至南京奉㫖偕諸儒托古昔嘉言善行作公子書以訓貴戚子弟書成賜襲衣白金㑹初平浙西授湖州府德清縣丞君招輯綏懷除剔宿蠧創三皇孔子廟建官吏廨署到官數月事治政平錢鶴臯反嘉興聲搖德清民皆逃散君堅坐鎮之錢不敢入吳元年上將正位宸極召議禮儀除中書考功博士尋遷起居注承詔搜括故事可懲勸者書新宫廂壁時上精求禮樂之事嘗召翰林學士朱升等陳樂器于庭上擊磬命升辨五音升對忤㫖上大怒欲置諸法君從容論解之上曰升每謂審音顧不辨宫徴何邪君對曰石音難辨自古而然唐虞惟后䕫能和磬聲書曰於豫擊石拊石百獸率舞上曰任此豎儒治樂樂何繇和君具言樂之和由人所致人君能致中和則萬民和萬物和而樂音和矣上怒乃解釋升不問升既出謝曰非熊君吾屬幾殆舍人耿忠奉使回奏廣信郡縣官多違法前所陳茶稅失實時新行赦上怒趣中書遣御史往亷狀丞相李韓公善長諌不聽御史已受詔丞相復諌不從君與給事中尹正諌曰朝廷新立將布大信於四方今肆赦之後復以細故而煩御史按問既失信且䙝國威上良久乃曰止其追御史毋往上詔浙西民輸糧京師浙西闕不可泝江率五石致一石民甚苦之君叩頭曰國家都京陵以浙西為根本而遽困之農作方興而僕僕於道路茍一年不得耕害不淺矣上悅是日即詔罷之明年改元洪武上即皇帝位凡創制更革之典君多預聞上遇君厚每字稱而不名立浙江提刑按察司以君為僉事階奉議大夫君分部台溫二郡經方氏竊據之後全乖人道爭訟以數百計君悉理其曲直而奏斷之凡威取田宅者歸業主得半直者中分之兩造無驗者籍之官豪胥猾𨽻六百餘户悉屏之别郡僞官悍將二百人其暴如虎狼君出竒計盡刮種類遷於江淮間民始安枕方氏居黃巖雖嘗簿録其家珠玉犀象金繒藏於姻家者動以萬計君皆搜索送諸官溫有邪師曰大明教造飾殿堂甚侈民之無業者咸歸之君以其瞽俗眩世且名犯國號奏毁之官沒其産而馳其衆為農其地多倡家中朝使者以事至多挾娼飲有司罷於供應君下永嘉令籍娼户數千械送之京按使者以法鉤連其他贓罪杖流之僞萬户金甲奪三人妻其夫訟則更為娶婦君至三夫皆訴君論金棄市各以其婦歸之平陽軍校掠農妻五年君攝其妻至軍校恐抱二兒泣曰妻去兒孰與養願公憐我君命置兒妻側兒避不肯近君曰此非其子詐也詰之果鄰家子罪校如律而斷其妻還于農於是軍中所掠婦數百皆相告語夜遣去一營幾空平陽州吏目杜乙嗜財甚考滿入京謁御史中丞劉基基詰謁故杜惶駭不能對遽命執訊之杜自陳在州時斂民白金三十兩又受楊某金置殺人罪不問守與佐皆相搆為姦有㫖下君鞫之同知以下吏皆服罪獨知州梅鎰廷辨不已民數百遮司門外爭知州信無辜君將聽之吏白曰今奉詔按獄而釋知州不治情則得矣如身受故出何君再進民詢之辭不變歎曰法以誅罪吾敢身畏譴而誅無罪人乎釋鎰以情聞上可其奏台臨海王參理妹有姿色許適嵊縣竺氏其內兄方敏覘其將嫁夜率衆劫至家逼為妻王詣永嘉侯朱亮祖訟事下邑方賄吏欲傅輕典君知有賄急逮吏治之吏具狀竟致方死罪而歸女竺氏兵克黃巖時州民乘亂報仇殺一家十餘人永嘉侯受辭令州捕鞫州初附假守捕殺人者十二人獄既成吏受賕釋之詭以死聞縱其餘黨不問君録囚廉得十二人尚頸繫東郭民家即收掠問狀抵官吏以贓罪捕餘黨誅之黃巖官署毁于兵官寓尼寺中并儲糧其間君視糧過寺尼數人來謁皆美少年也問孰為主者則方氏女弟也君大驚跽州守通判以下切責之令逐尼歸俗而以寺入官州有宋杜清獻公墓杜氏有田若干畞入僧寺儲其租以奉祀僧挾與方氏連奪田以為己有復墾田侵墓下墓且蝕其孫回以書聞君執僧置諸獄瘦殺之追田與回且令州立祠刻石以旌之寧海强民陳德仲以憾支解黎異異妻屢訴無為白之者君受之一夕省黎事有青蛙立案上君曰蛙非黎異乎果異則止勿動吾復爾寃蛙果如君言明日逮陳誅之縣民馮輔卿至正中為亂與方氏連兵既而方氏追殺之且沒其資産而餘田百餘畞其豪奴吳自取之輔卿妻杜囚服迎拜馬前訴奴君為治奴罪奏以田還之台地産鹽鹽賤而米貴時官賣鹽一斤責米二十五合反貴於米數倍復輸於杭路險不可舟車民病欲死君上封事乞民得償錢民獲免轉輸之勞凡事之未便者君皆為奏之兩郡民灑然如更生始兩郡旱公所至輒雨民曰此熊使君雨也是年秋始立按察司於山東擇其人行新政上曰無如熊鼎矣遂仍前階改山東開治濟南濟南元有廉訪司㕔事壯麗甲諸道臺檄君居之時汪丞相廣洋以參政建行省其中僚吏請君以臺檄白省而復之君曰官在政事何如耳豈以公署之麗耶城北有庳陋室君就其中治事丞相聞君言戒其屬曰此真憲官也吾等慎毋犯之山東為齊魯之域其民敦朴少訟君鎮之以靜而以保民為先時河北甫定濟南宿重兵兵肆暴侵民莫敢與校君移牒指揮司禁之黠軍數縱火劫人一家火則一市財皆殫君既申火禁督邑令庀火具為保伍相赴援復懸書通衢戢士卒士不戢坐所轄將火患頓息偏將有受部兵一繒者君收問連其黨獄之諸將大駭挾日出于庭數以黷貨罪准律贖金而縱之諸將又大喜由是莫敢橫恣東平侯韓政鎮濟寧奉㫖按籍選壯强為兵東平東昌濟寧三郡民皆驚散將為變君急飛書行部僉事段明德說韓侯止之分遣官屬招輯俾復業越三月民始定州縣官多失廉平君隂風跡數十輩悉如法論罷之六郡肅清齊河有强盜劫商人布千匹縣求盜逸去吏索之村中遇王氏婦不得於姑出走吏見其色動執訊之婦曰我王六家人也吏因考箠使其誣服為盜訛為王六家兒且指平人三十餘人榜掠無完膚問王氏夫安在衆不勝苦詐云已殺之沉於河矣追所劫布及尸無一是者獄已具君盡得其情而王氏之夫故在君坐官吏以法而悉遣之君患官好致訟乃令郡若縣各置二厯日著所治獄訟錢粟之績一留郡縣一上之憲府遞更迭易月按厯而鈎考之凡所為事莫敢隱者後遵以為式大明律初頒吏莫能通君日坐堂上立六曹吏堂下條授之與之辨析俾各通其法名聲赫然著聞凡疑獄皆質焉上嘗廷稱曰聞熊鼎為政得體朕甚嘉之二年十月臺臣奏山東憲司缺副使上曰朕得之矣詔升君為之三年四月封建親王擇王府臣僚上御奉天殿丞相以下咸侍上首問曰山東副使熊鼎稱是選乎衆皆曰賢上大書君姓字于几復問禮部尚書崔亮曰鼎何如對曰鼎誠賢上曰朕固以為足任也遂驛召君五月拜晉王相府右傅階中奉大夫㑹有事于方丘君受告導駕既齊宿習射苑中百官鴈行入上敕近臣以弓矢授君射君文臣素不諳習一發中鵠上喜勺湩飲以賜明日又射上詔君至榻前俯身御弓矢為射容以教君君跪受弓左執之右手指一矢鞬二矢向鵠三發連三中上嘉勞久之將遣之國上御端門君及秦王相鄭久成等以次就坐上敷揚治國之道逾數千言反覆奬諭甚至君等皆叩首謝賜食而退乘傳至晉陽議建王都城命工入山度材木治瓦甓四年大興衆築城作王宫君夙夜不懈七月奉相府賀生辰表詣闕至則車駕將幸臨濠敕從行數被召問恩寵有加九月辭於臨濠上倚馬詔以處將帥間協和之道且曰汝不善騎勿庸自來君還㑹徙沿邊諸雜羌萬餘入內地護卒弗嚴道亂奔散太傅徐魏公達發兵擒殱之事聞詔使詰責參政曹興等併免君官左遷大同衛知事五年召還六月除晉王相府參軍以尚書授王復奉詔兼授秦王經翰林學士承㫖宋濓時兼太子贊善大夫復薦君說書皇太子前君於書最深每以帝王心法之要陳之太子二王雅加愛重明年上御文華堂召君問曰秦漢以來諸侯王不肖者幾何君謝未考遂命之蘇州核糧長罪狀君至擇其尤虐民者杖徙之鳯陽事畢復入王府七年三月上御西苑復以諸侯王事為問君復謝未遑改刑部主事奪參軍所受俸八年正月授岐寧衛經厯賜白金五十兩錢萬三千文上復念君在邊良苦遣使持手詔諭君詔上所親製辭意甚厚有狐裘纊袍毳襪之賜時朵兒只把雖降而持兩端君上書萬餘言言狀其略謂西凉岐寧漢唐內地不可棄多爾濟巴勒非有歸向之誠特假我聲援脅服鄰邦為自安計朝廷宜思制之之道急之則必席卷而遁雖得其地而無民緩之則恐羽翼既成而跋扈宜稍給種糧撫其遺民以安衆心而以良將參守之則朵兒只把特匹夫耳又將安往上覽書曰人謂熊鼎迂濶今不迂也九年四月乃徴君還次西凉府打班驛遇多爾濟巴勒叛兵擁君北行君力爭不從遂與中使趙某等皆遇害時六月二十三日也夀五十有五後數日亂兵就擒獲君所佩囊中公牘始知君卒跡其骸骨葬于某地西凉衛以聞上感悼遣使弔祭命臨川恤其家其子某以某年月日至某地以其骨歸以某年月日葬于某山君學有應世材內行尤修飭仲弟渙為開封府延津縣主簿受誣以贓罷官死妻子漂流無依貧不能償其贓之半君以己俸代償之致其妻子于家諸姑適俞氏夫與子俱喪無所于食君成養之終其身喪葬之禮無闕者與人交誠朴不欺臨事善斷故居官必有名曽祖某祖某父某俱通經術母某氏有賢行娶某氏男若干人女若干人初君將之岐寧子某來見京師君口授所行事俾書之且曰我死生未可必或死我無纍汝者當今惟翰林宋先生文可傳我嘗獲先生知汝以此拜乞銘先生必憐汝幸為我銘我無憾矣嗚呼余言豈足恃耶而君惓惓若斯尤可哀也銘曰天祐皇明以民授之必生其人俾左右之啓國之初俊才如雲其心之貞允惟熊君執筆載言侍帝黼扆從容論奏爛然可紀豈徒能言亦見于行繡衣直指以蘇南氓獮强剗穢洗濯積垢南氓稽首君我父母君車自南民望于東帝曰汝來唯民之從齊魯千里厥土薉荒君居二年化為耕桑帝謂相臣鼎也可恃不負吾民寧負吾子維晉巨國維傅大臣將終任之命則孔屯既入授經復出治戎狐裘毳衣唯帝念功封論邊事其䇿甚偉欲召用君君則道死天子聖神用無遺才天困其逢賢者所哀生有事功歿多孫子銘圗其傳以示千祀元故纍贈奉訓大夫溫州路瑞安州知州飛騎尉追封樂清縣男林府君墓銘府君諱邦福字彥大姓林氏林出殷比干之後辟地林山因以地為氏子孫分居清河至漢太子太傅尊遷濟南晉太傅禮永康間又遷下邳永嘉之亂合浦太守祿又遷閩之溫陵自是閩中多林氏唐貞元中莆有孝子攢為福唐尉棄官廬墓致甘露白鳥之祥詔立闕旌其門孝子五世孫諱某當五季時仕于唐及沒夫人執氏扶襯還閩道經溫之瑞安值閩亂遂葬于縣之塔石村有馴鹿之祥人號鹿阡執氏卒合葬其地自後九世子若孫咸環葬左右其諱文慶者實夫人之九葉孫生古溪處士諱益甫復遷郡城生台州路總管府照磨諱桓實府君父也照磨君以孫常官七品當封父母援故事讓於祖贈從仕郎江浙等處儒學副提舉妣黃氏贈宜人府君局度孤鶱不為屑屑詭行弱冠出遊蘇府公廉其賢辟為史蘇之寓公多權要頥指氣使州縣皆唯唯不敢較府君毅然不為屈有請託者却不聼且曰國法何可以徇人積勞當調州之幕職江浙行中書以管庫缺官借授處州松陽監稅改監紹興如坻倉府君釐革弊政出內皆有程顆粟弗私轉嘉興陶莊務副使時浙西大侵民嘯衆敓餱糧與抗者輒見殺上官檄府君攝尉事府君授以籌略分遣弓箭手掩捕之未幾皆獲議法者悉付重典府君走白部使者曰飢民無食雖萬死不顧何往而不為亂原其初情不過魚游釜中少活須臾之命如法家議無乃太過乎使者以為然免死者數百人轉饒處二州州之務居城闉稅課每屈府君運量有法皆以最登秩滿監衢州常山務綘巾賊起沔陽江浙諸郡皆繹騷弗寧時浙省左丞髙昌公出鎮廣信専總戎事署府君常山尉府君集義旅數千淬礪戈矛使習坐作擊刺之法號令精明部伍整飭不亂狗鼠輩欲乘隙鈔掠者皆吐舌散去㑹子溫登進士第擢休寧尹尋補江南行臺掾迎府君就養未幾御史大夫子恣為不法人言沸騰溫以親故未忍擲其姦日恆鬱悒不樂府君謂溫曰吾能安吾貧慎毋以老身不行其志也明日溫率同列謁大夫力斥其子之非大夫慙甚既退溫即抗章辭去奉府君還鄉浙省左丞相康里公時承制得専封拜擢府君鄉郡知事郡民舉手加額曰吾州害與利林公知之我民庶有瘳乎適山冦竊發掠慈湖將窺城上下洶洶府君白于府曰事急矣奈何吾將以三寸舌却之乃單舸直走賊巢諭以禍福賊見府君至大駭爭持白刃相脅府君厲聲叱曰朝廷何負爾輩乃敢弄兵反藉使州縣賦斂急或不能堪當訴之方嶽大臣足矣今乃自麗刑憲官軍旦夕且大至舉族當作葅醢吾憐汝輩愚特來示以生道乃欲吾脅邪吾不畏死者任爾為之任爾為之賊衆愕眙相顧再拜謝曰明公言良是微公吾屬入鬼籙矣皆俯首退去為良民如初朝廷時遣近臣經略江南官有異績者必超擢之有司方以功狀聞府君竟以疾卒夀六十又七府君明白坦夷不尚鈎距遇事曲直輒辨白無少讓人初難之終服其明斷性好施與人有急難振之唯恐不及處伯仲間無間言尤篤於訓子故卓然皆有成立既而溫改福建行中書省管勾得請于朝封府君文林郎汀州路寧化縣尹夫人王氏贈宜人及溫纍升員外郎加贈奉訓大夫溫州路瑞安州知州飛騎尉追封樂清縣男夫人亦加樂清縣君府君卒之日至正十九年夏五月癸丑葬之日其年冬十二月甲申墓在永嘉縣建牙鄉先塋之側王夫人先十七年卒子男子四人長即溫奉訓大夫福建等處行中書省左右司郎中次常從仕郎泉州路德化縣尹次嘉福寧州知事次寧行宣政院宣使子女子一人適福州長樂稅課提領項昱孫男七人本秉東乘䇿某某女四人曽孫男二人某某女一人嗚呼天之生材也一元之氣既運無往而弗周譬諸木焉或可為棟梁或可為榱桷未嘗不具特人用之有違其材所以每形君子之歎有若府君材信美矣乃使之淹回下列無以吐其胸中所藴及逢世亂則建䇿禦冦親往諭降卒使革心從化其氣量足以有為使之専城而居必有赫著愷悌之政奈何斫棟與梁而以榱桷用之嗚呼果誰之咎歟然而天定終能勝人府君固不遇矣有子以詩書起家為時名臣貤贈所及至於二千石之榮可無憾於九泉矣濓雖不及拜府君床下而幸與溫游溫以前進士孔克表狀走金華山中徴豫銘義不得辭銘曰天之生材小大異宜用或倒施乃人之非恂恂林公厥材孔修茍竭其藴可鎮方州關市之征曷我溷之公笑曰嘻我斯受之料量既平出內無愆人或不足我則裕然山冦跳踉鋒蝟斧螳以敓以攘以撼大邦公乘單舸直入其阻威容言言其氣若虎賊黠而疑羣而趨之執刃圍之人為危之公聲如雷震破賊膽再拜稽首今則焉敢轉彼昏昏易為昭昭棄其戈矛爾黍爾苖古有薦士達諸巖廊孰持使節不發一章公雖不遇有子承家龍光炳煥泉壤增華建牙之鄉馬鬛其封史臣勒辭無愧於衷元故湛淵先生白公墓銘嗚呼是惟湛淵先生白公之墓先生諱珽字廷玉白其姓也出於宋丞相時中之裔世居文水時中之從子翼扈蹕南渡官至防禦使生武略大夫良輔食邑檇李因家焉武略之後又至武功大夫顯始占籍於錢塘生修武郎必騰修武生通武郎嶸先生父也妣方氏先生本四明名儒舒少度遺腹子通武育以為嗣五歲能屬對八歲能賦詩十三受經太學習為科舉業轟然有聲場屋間一時貴人爭欲出其門下甫及壯元丞相巴延平江南聞先生賢檄為安豐丞辭不赴乃客授藏書之家晝翻夜誦燈墜花穴帽不知也如是者一十七年程文憲公巨夫劉中丞伯宣前後交薦之復以疾辭中歲嘗出游梁鄭齊魯厯覽河山之勝登臨弔古訊人物風土慨然有尚友千載之意及至燕王公貴人見輒賔禮或欲舉為東宫官者先生復引義固辭南北孤逺士久困逆旅則必昌言甄拔之自是學益充文益富而家益貧宣慰都事鮮于公樞帥一時名士援杜甫邵堯夫故事共買屋使之居㑹李文簡公衎出將使指喟然歎曰有才如是坐視其窮可乎力挽起之授太平路儒學正先生不得已應命未幾攝行教授事悉心官政修建天門采石二書院政成當時事例可貢行臺令史達官勸之行先生笑曰吾守章逢爾它何覬哉尋轉常州路儒學教授兵燹之後禮殿與堂廡皆廢弗治祭器載籍亦闕先生為完之且復侵疆三千餘畞俄再遷教授慶元未上翰林集賢兩院謀曰白先生淹回下列吾儕不啓齒一言可謂汗顔矣共剡薦之升江浙等處儒學提舉司副提舉階將仕佐郎時鄧文肅公文原實為之長與先生志氣吻合舉刺得宜文化大行秩既滿銓曹有不知先生者署淮東鹽倉大使先生自以鹽策非所諳習不俟終更即謝事養疴海陵逺近學徒擔簦相從者殆無虛月先生已六十又七及再遷從仕郎婺州路蘭溪州判官則不復有宦情矣日與韻朋勝友曳杖游衍銜杯賦詩唯恐日之易夕所居西湖有泉自天竺來及門而匯榜之曰湛淵因以自號晚歸老栖霞又號棲霞山人以天厯元年九月十五日卒年八十一其年十一月二日葬錢塘縣履泰鄉棲霞山之陽其子遵治命題曰西湖詩人白君之墓云先生性至孝母病刲股和藥起瀕死者再及歿號慟自擲嘔血至數升父感竒疾醫言必得兔屎可療先生踏氷雪緣崖穴求之三日不得父死抱尸哭絶而復蘇繼母虐不子厥子先生事之愈恭既而改適他氏無儋石之儲先生為營朝夕且負其避兵迄免於難然汲汲行義尤不顧家之窶孤嫠不能昏者嫁之死而無所歸者稿殯之道中拾遺珠待其人訪索審而還之或以質劑假金匱乏不獲償焚而慰之生平無驕辭怠色一以謙抑為事聞人善未嘗不豔慕見揚人過掩耳亟避去奉先之外不惑異端不諂瀆鬼神疾疢憂患之來一委之於天自幼至老無一日廢問學故能長於詩文紫陽方公回稱其冠絶古今有英雄大丈夫氣剡源戴公表元謂其注波五經之淵披條百氏之畹廬陵劉公辰翁又言其不為雕刻苛碎蒼然者不惟極塵外之趣兼有雲山韶濩之音皆確論也翰墨雖其餘事亦有晉魏風酒酣命二童持紙懸筆一揮疾如雨風聲光翕然四達而先生素志丘壑以退為進故位不逮名君子惜之先生娶沈氏有賢行前二十七年卒子二賁文林郎南安路總管府經厯采溫州路永嘉縣鎮海東寨巡檢女一歸常州路儒學正鄭禾孫四栩越東明皆蚤世孫女一適平陽宋允恆允恆由紹慶路儒學正升授新州新興縣福緣寨巡撿賁以子夭命允恆仲子範為後範有學而文能繼其家者也範生子二弦􅌢女三先生所著書曰詩曰文曰經子類訓曰集翠裘曰靜語皆二十卷嘗鋟諸梓四方多傳誦嗚呼先生已矣濓也晚出雖不能識先生幸從鄉先生黃文獻公遊聽談杭都舊事有如淮隂龔公開嚴陵何公夢桂眉山家公之巽莆田劉公濩西秦張公楧虎林仇公逺齊東周公密凡十餘人相與倡明雅道而先生齒為最少乃與羣公相頡頏南北兩山間其遺跡班班故在僅踰五十春秋而先輩風流遺韻弗可復見不亦悲夫嗚呼死者固不可作若并其言行而不彰將何以為聳善扶俗之勸於是徇範之請巨細畢書之嗚呼先生之名其果待文而後傳哉銘曰虎林有善夫兮秉德良優柔嗜義如嗜利兮避名如避讎指退以為進兮謙抑每自修知分中自定兮不假外物求天經况所惇兮血淚交頥流冠冕百行先兮倫品庶不偷發越見聲詩兮笙鏞間鳴球律吕素和協兮八音交相繆雄章落四海兮虹氣日夜浮棲霞有名山兮草木光如油紀德薦石章兮千古振諸幽汪先生墓銘新安之婺源有隱君子曰汪先生諱炎昶字茂逺學聖賢之道不求聞於世年七十八以元重紀至元戊寅四月二十四日終於家初元既滅宋宋太學生孫公嵩悲哀不自勝歸隱海寧山中誓不與接發為賦咏以寄其無窮之思孫公同時進士許公月卿亦入婺源山中製齊衰服服之以識其終身哀宋之意此二公者皆新安之節義士先生受學於孫公而與許公門人交友故自少慨然無仕進志先生壯時元有天下已久宋之遺俗變且盡矣而先生衣冠動作語言禮度猶宋人也後生小子去宋逺無從徴之見先生咸以為前代之遺賢而先生亦曰吾古逸民也學者因稱之為古逸云先生少凝重記憶不能過人然刻苦専篤雖執匕據枕不廢誦習力久思深該貫宏博遂無所不覽要其歸宿精索於六經而詳究於孔子孟軻曽參子思之言參之以伊洛大儒傳注之說絲析髮解日攻月較不故求為異而亦不茍為同其所自得既形於言雖不欲求人之知然人有辨其未至者必樂而從之終其身未嘗自以為是也其教人履庭躋級具有條序為文竒而不肆遇時觸物輒為詩以達其情婉切悽壯人傳誦之蜀郡虞文靖公集巴西鄧文肅公文原皆盛稱其才而先生志操之髙人莫之知也先生家貧事母能致其樂母年八十九先生亦老矣䕫䕫祗肅進食奉水必躬親之母為忘其貧先生將終整冠坐命家具疏食少䬸置筯戒諸子以祭祠之禮言畢正身斂手而逝先生之曽祖諱沖祖諱天衢父諱季安裔出於唐越國公華娶江氏生三男子曰淮琛照乘棠金照乘為弟禹玉後一女適詹某其孫男三人曰某某某先生所著有四書集疏藏于家詩文凡若干卷先生卒時棠金已死淮琛貧未能葬命從子壡告于先生之門人趙君某請輯羣行為狀趙君以未葬辭既而淮琛亦卒後十九年至正丙申某月日壡始買地葬先生於黃京山髙路原又以為請趙君乃為狀屬余銘余諾之未獲為去葬之歲又二十四年余欲銘先生墓而趙君之死亦已久矣於是撫几歎曰先生之卒今始四十餘年而先生之子及門人知其事者皆已亡矣使復越四十年其能有知者乎為善者固冀人知己然有善而不聞於來世後死者之責也乃本先生之志為銘以告世之知先生者銘曰朔風荒荒海水赤矣宗社為墟將安即矣冠履倒置命之忒矣髙蹈避世舍道焉適矣彼夸者子羣趨弱矣人之攸樂我心戚矣為陵為淵孰失得矣嗚呼先生千載是式矣端木府君墓志銘豫友端君以善既卒之一年其子智衰絰踵門泣拜而請曰智也罪釁深重禍延先公以洪武癸丑三月乙卯卒于南京之官舍夀僅五十又三遂以是年某月某日葬于巉山東村之原竊惟先公自少有志事功其善政在人者今多能言之又十年則言之者或寡矣又十年則無人能言之矣此無它人逺者其言湮世易者其事晦亦恆理爾一念及兹寧不使人興懷乎然而託名文辭者可以埀之無窮千百歲猶夫一日也此為人子者所恃以無恐願先生進之按學子劉剛狀君諱復初以善其字也姓端木氏其先為衛人出於孔門弟子子貢之裔今獨以端稱氏者從省文也一遷於大梁再遷金陵烏衣巷三遷於溧水縣之巉山其詳備見譜圗記中曽祖時中祖安父邦達妣某氏君有逺志不肯寂寂落人後至正初以儒試吏江南行御史臺同列多貴逰子弟爭事表襮君獨泰然不失其恆行久咸畏服之俄遷書吏海右憲部君佐部使者行州縣彰善疸惡威聲獨著聞㑹四方兵動東南為尤甚君袖䇿言時政之急如此則可守如此則可戰否則有斂手就降而已上官聞之皆落落不合君仰天歎曰彼以吾發狂言耶時事從可知矣於是悵然有鄉土之思溧水道絶不能歸僑居金華日以書史自娛至正己亥皇上親御六軍取金華命常忠武王鎮之王聘君至幕下未幾君辭去㑹有言於朝者癸卯三月召為徽州府經厯徽為江東大郡政繁而賦殷君悉力佐治百廢具舉功則歸於其長田賦久不均民不堪命君即城東建局使民自實田集為圗籍核盈朒驗虛實而定科繇吏民隂為欺弊痛謫之不數月而畢由是民無逋租官無橫斂三皇孔子廟皆築臺門旅館之制亦廢君或葺或建咸中程式賦不及民皆若不知者丙午冬改通判吉州府吉俗尚譁訐素號難治公召父老子弟戒之曰豫聞爾民尚豪侈樂訟鬬朝廷子惠元元春雨秋露無不霑濡爾盍為良民以報上德寧梗化以自戕耶梗化弗祥天刑所不貸爾其識之民皆惴惴無敢執牒妄訴者丁內艱服除洪武辛亥春被召赴京除磨勘司丞時官署新立凡泉粟之出納刑法之是非物貨之變易無所不當讞君從本達支自流徂源勾稽隱伏纎芥軒露每一奏對上輒廷譽之未幾升為令君嚴於限域人見輒畏不敢有所請託俄僚屬皆以貪墨敗磔首東市唯君能獨存清白之行益表見朝著間冬十一月超授嘉議大夫刑部尚書君之用刑本諸法律而持以平恕老於議法者咸以為允杭州馬甲飛糧事覺逮繫者百餘人詔君往治其獄分羣囚别所人各鞫之合其辭參焉同多者情真否則僞郡守以下皆服罪壬子春三月拜湖廣等處參知政事階中奉大夫湖廣素號重鎮屬兵戈蹂踐之餘土曠民稀君首下屬州民復業者復其賦一年次閲官書凡糧儲轉輸錢幣出入與夫軍裝工役皆預為計畫且㑹官屬問事不集者其故何繇皆曰一省所轄府州縣二百有餘逺者在千里外每官多闕其事因不集君奏請于朝擇在職賢良吏攝其政不數月無事不舉民驚以為神既而以事召還京師俄以疾卒先配石氏前卒繼王氏子四仁義禮智皆石産也仁先卒君天性甚孝自逰宦四方不能奉歡膝下心常慊慊然所得祿賜恆歸以娛親其奉己則泊如也母既卒一念及之輒澘然泣下居官能守貧嘗著座右銘曰為官實難貧然後安事有不可急中存寬義曰心契上天腳踐實地人謂其能自警云君狀貌秀偉美鬚髯音吐鴻暢或治政弗暇休夜則焚膏命諸子環侍取書之嘉言善行厯厯訓戒至夜分乃止故翰林學士朱升嘗謂君為人其謙退似懦夫其専謹似腐儒瞻視精悍似俠客掀髯談世事似辨士而其精神超越又似逸人仙者君子謂為實録豫託交於君頗久而著勳焯能固後死者之責銘烏乎辭然而年日已邁文日以衰無以應四方之求近因燔毁筆硯一切謝絶之而中心猶以為未慊也雖然智之所請則有不得而忘情者遂備采剛之所録而繫之以銘銘曰惟士也良有志則剛如挾干將始晦而夷出遇而熙一躍而飛筮仕府僚因賦定繇功而不驕轉佐方州革俗以偷訓言繭抽磨勘設曹蠶絲牛毛孰得而逃進領秋卿邦憲是經中乎凖繩往蒞大藩以執政原江漢乂安材長如河夀則弗多其如命何有子治經足繼簪纓縱死猶生巉山之原木古泉寒銘在不刋故新昌楊府君墓銘越之新昌有大山曰彩烟與沃洲天姥鄰而彩烟尤為峻絶逺望之如雲霞繽紛天隙故名山之絶頂其平如掌沃野數千里桑麻蔚若犬雞之聲相聞或者嫓之武陵源云大姓楊氏自隋末來居之閲數百年而書詩之澤有引弗替在宋之時父子兄弟至連舉於有司而嘉泰壬戌進士轟其仕為尤顯官終朝奉大夫知廣德軍州事贈奉直大夫廣德之從子佑祖亦由太學舉進士為婺之浦江丞浦江丞生旵旵生禔禔生府君諱居字溫如生三月而其母梁氏亡父命乳母鞠之性穎悟八歲能賦詩及長聞天台于先生子惠傳伊洛性理之學執經而受其說久之融通諸家言而貫以一致神暢心怡實欲起古人千載之上與之晤語既又以為言之不文不能以行逺復從同郡韓莊節公游取文章大家日研摩之其於分章遣辭之法辨其類不類尤嚴其界域時先師黃文獻公以文名當代府君撰長書贄見之公讀已嘖嘖賞愛更揭諸座右賔至則指以示之曰是豈非文耶公為人極慎許可其器重之若此府君嘗以春秋學應書鄉闈不利遂掩關不出下帷而講授四方學子趨之者如雲府君日據髙座隨其性資而開導之如䝉大霧而行不自知其沾濡之至學成而去多著名于時人問之則曰我楊先生弟子也恩義隆洽不敢更名他師府君性至孝父有疾晝侍左右夜不敢解衣寢臨穴之日號絶于地良久而蘇歲時祭祀必預齊戒視滌灌盛服拜跽儼如祖考之在乎上贍塋有田為豪民所據府君帥宗人白于官復之仍創庵廬以居守者府君介而通莊而能溫未嘗妄言笑一動一靜皆可為式程善古文辭尤長于詩騷亦有愛齊稿若干卷藏于家府君出處之際唯道之從視不義富貴真若浮雲臨財尤亷路拾遺金俟其主還之里有喪及饑餓者恆周之學者方自以為得師年六十六不幸以洪武九年丙辰冬十一月二十日卒于家明年丁巳春三月十九日窆於金山之原在家西四里而近娶同邑趙氏生男子四長宗學先卒次須學去為浮屠更為梵噩有聲叢林間次願學繼父之業次闕學女子一歸士族盛必勝孫男一自牧女一尚幼豫聞之文者將以載道道與文非二致也自夫世教衰民失其正髙談性命者每鄙辭章為陋習拘泥辭章者輒斥性命為空言互相譏訕莫克有定殊不知道與文猶形影然有形斯有影其可岐而二之乎是可歎也已府君以超卓之姿窮理攻文孜孜弗之倦務欲合而一之亦可謂知道者矣銘曰大道流行日用昭宣非文之載道孰與傳安可岐之徇於一偏迂夫曲士牢執弗遷擲埴索塗何往不顛有倬夫子式窺其全以彼校此孰為愚賢鐫石幽墟過者察焉故朱府君文昌墓銘豫居浙水東時得朱君好謙之文嘆其善於修辭惜未及與其交而好謙歿於兵及來京師又得好謙從弟文昌詩閲之沖淡類漢魏雄健如盛唐復嘆曰何朱氏一門之多賢哉未幾國子助教曽君旦初同文昌冢子堅持知嘉定州事張􅰱狀來謁墓道之銘蓋文昌之死已四年矣豫重違曽君之請不敢辭文昌諱嗣榮文昌字也姓朱氏出唐散騎常侍滿之後滿本歙人來徙金溪明暘里世為衣冠甲族宋道州營道丞登生太學上舍生恢之恢之生銓銓生貴清貴清生仲梓文昌父也元初避地桃峯復遷家焉文昌治舉子業甚精通毛氏詩訓故折衷於朱子之說毫分縷析唯恐不合情性之真下筆千餘言不休走試江西鄉闈立論與有司不合即棄去一假古律詩以自見厯代諸大家皆探微索隱必欲得其㫖趣而後已用工之深出語輒驚人然不特精於詩甚輕財仗義尤人不易及少時嘗以錢粟貸於人一旦自責曰蠅頭之利其能汨沒男子之志邪悉集受貸者於庭取其所留質劑而焚之其後家單無旦夕之儲恬不為怪人有憫其貧畀良田百畞者文昌疑其不義辭弗受鄉友罹患難屬文昌為之解紛餽白金一鎰為文昌夀文昌笑曰吾雖貧亦惡用是哉卒直其事而還其金至正壬辰江淮兵動里之無賴少年相挺為變其首禍者頗與文昌遊乃來說曰公藏器于身不以此時取富貴尚何俟耶文昌叱之去遂與絶交未幾竟敗沒文昌宗黨知事變不測椎牛釃酒起為堡障屹然孤立數年而羣冦不敢犯文昌之謀為多僞漢陳友諒犯南昌諸郡相繼陷文昌曰此非吾輩之力可支盍各逃死乎乃挈一族入閩中雖偹嘗險阻略無怨悔意後五年國兵取江西州縣皆入職方文昌始還鄉里卜居澄源上遺落世故絶無毛髮縈心所不忘者唯詩耳因扁其室曰嘯雲軒云東平穆敬來為縣欲起文昌為縣學師文昌曰吾老矣唯逍遙林壑為宜耳橫經講道豈所堪哉因固辭而去性愛佳山水自謂得堪輿家不傳之祕稍暇輒布襪青鞋登陟不少倦不幸以洪武七年二月十四日卒夀五十六所著書有政鑑若干卷燬于兵尚存詩詞三百餘首題之曰燹餘集娶王姜二氏王先十九年卒子二曰堅曰重堅即請銘者孫二曰振振曰繩繩孫女一某年月日卜葬明暘里長岡山文昌所自擇也夫詩之為教務欲得其性情之正善學之者危不易節貧不改行用捨與險夷一致始可以無愧於兹如君者蓋近之矣世之人不循其本而競其末往往拈花摘豔以為工而謂詩之道在是惜哉銘曰詩之為教著于禮經溫柔敦厚本諸性情君子讀之豈惟多識玩其指歸感善懲逸我甑生塵我衣懸鶉非義之物弗取諸人如斯學經庶可無愧留連光景敢曰吾事彼蒼者雲其色可餐洗心滌慮是躋是攀髮猶未皤嗒然觀化何有外慕無晝不夜長岡之原桂老水寒魂魄未歸茲焉是安惇書爾銘詒爾孫子慶源方深其流瀰瀰故溫州路總管府判官宣君墓銘始濓游學諸暨時與烏傷樓君彥珍浦陽宣君彥昭鄭君浚常浚常之弟仲舒同集白門方氏之義孰孰師乃吳貞文公立夫蓋鄉先生也彥珍最先還而濓與彥昭浚常兄弟講學將一期當夜坐月白俟公熟寢輒攜手出步月下時皆美少年不涉事競跳踉偃仆為嬉戲或相訾謷或角抵其力至不勝乃止獨濓朴戅易侮不敢時相逐為歡彥昭於其間尤號雄俊彥昭䫜目穹鼻須髯森然如㦸顔面鐡色類河朔間偉人見者莫不畏之已而各西東散去浚常仲舒之燕都客太傅右丞相家馴致顯仕浚常官至僉江東建康道肅政廉訪司事仲舒纍遷太常博士彥珍受太師德王薦為玉龍千户所管民司長官彥昭知印行宣政院以年勞入選擢承事郎溫州路平陽州判官轉本路總管府判官歲辛丑浚常早卒後九年己酉彥珍亦卒又四年壬子彥昭亦受誣以死其幸存而未死者唯濓與仲舒爾浚常彥珍之墓濓常為之銘仲舒謂濓不可獨後於彥昭嗚呼前後未五十年而世變不可知者已如此銘其可足恃耶雖然不敢辭也彥昭姓宣氏岊其諱也世為浦江人生長富家而不染綺紈之習别無嗜好唯購書不知休或請脫衣巾以償亦不靳入仕極清白凡所需之物必取給于家毫分不受於民在平陽時吏𨽻畏其不相容各去而更他業儒生有百畞之園為世家所侵雖屢訴有司輒以厚賄屬吏連年不決彥昭立斷還之儒生函金為謝彥昭叱去曰顧法當爾吾豈私汝者耶彥昭恐童奴隂受之陽縛就地持杖大聲曰儒生所送金何在童奴埀涕曰某實不受金彥昭釋之曰吾姑試汝爾後十日儒生畫菜一本裝潢成㡧入謝曰判官清苦敢以一菜為獻彥昭曰是雖微物終有私意存遂題識而歸之天大雨民與軍爭簦民曰我物而軍取之軍之辭亦然絶無證左者彥昭命裂而為二並驅出使𨽻卒踵其後軍忿譟不已民曰汝自失簦於我何損耶𨽻卒以聞彥昭杖民令買簦償軍其在溫府治聲如平揚㑹大俠起東海來攻府城戍將問計於彥昭彥昭曰此烏合之衆耳宜帥精鋭大開城門搗退之冦果敗北自是屢戰屢捷戍將氣驕頗易之冦乘隙入城戍將被擒而彥昭亦受縛彥昭瞑目罵曰天子何負於汝乃搆亂邪冦怒欲兵之民翼蔽其背泣曰寧殺我毋殺我判官冦義之而止彥昭得解夜縋城而出請兵於方嶽連帥欲為殄滅之計無有聼之者彥昭知時事不可為歸卧孫井山中已而元亡大明受命有詔起江南文學之士而彥昭與焉上將官之彥昭辭以疾不受復還故山彥昭之兄財賦總管府知事彥髙風流醖藉為多士之冠彥昭與共論上下二千年治亂至抵几太息間操觚成詩酬答不已襟懷沖曠外物若不能擾之兄弟又善音樂遇風日和麗對坐海棠洞底取檀槽琵琶彈之侑以樂府新聲釃酒仰天而飲不至於醉不休㑹婚家乾沒里氓田氓撾登聞鼓訴寃誣彥昭關通州縣以致事不直彥昭實不與聞也逮彥昭至刑部婚家引伏部吏并罪彥昭彥昭抗辭曰我實無罪奈何不為白行當於殿陛前辨之吏怒下獄幽之彥昭氣憤憤無所泄不食三日死口鼻出涎涕凝結鬚上成氷實洪武壬子正月某日也夀六十其子騏收骨歸葬於某鄉某山之原禮也彥昭曽大父某大父某父嗣良母某氏娶方氏生三子長即騏次駰次駱女一適洪某孫男三某某某嗚呼彥昭之事行其都凡如此濓謹為序之皆出於人心之所同不敢以私好變易其辭蓋期傳信於來世云復收淚而著銘曰非學之弗蘉胡軋之而使屯邪非才之不揚奈何不得以伸邪百齡幾何孰為短長達人大觀其得喪固均邪墓草荒凉青而復黃寧不使余感舊而傷神涕淚而沾巾耶故處州翼同知元帥季君墓銘元季之亂江南諸郡多陷于盜獨處州以士大夫倡義兵堅守而完及今上渡江始降其城邑故處稱善郡是時起兵之士麗水有葉君琛青田有劉君基龍泉有章君溢與三君並稱者曰季君汶亦龍泉人其舉謀興事不甚相逺其後三君在國朝為顯官故天下皆知其名季早致其事以歸是以其功不顯然其鄉人至今以之擬三君則不以其位也君諱汶字彥父氏為季元至正中率壯士從石抹忠愍公宜孫討賊數戰數有斬獲功授義兵萬户經略使李國鳯承制改龍泉縣尹不就國兵破處州擢安南翼總管㑹賀李二將叛殺總制孫炎處大擾君勒部駐白岩出其不意攻之已而中書平章政事邵某亦引兵至左右夾擊遂誅賀李復其城事聞升處州翼同知元帥賜白金盂文綺青田盜葉賢三燒浦城政和兩縣掠婦女畜産而南君告胡總制深伏兵平山嶺邀擊斬之出私財贖軍中所掠耄倪遣還其家民德君肖像而祝者甚衆洪武元年上即位君入見于便殿辭疾乞骸骨上亦老君遂錫宴儀曹賜襲衣冠帶金帛遣歸居九歲以十年正月二十六日卒夀六十君少讀書多智略事親孝服喪如古禮族人貧者買田以贍之不能學者延師以教之外王父無嗣為立其宗人之賢者且割田畀之祀鄉民老無以養者月豫粟病則施藥死則給以槥櫝民苦嫁女育女多溺死君說以父子至理有育女者以粟六斛養之嘗出見羣嫗灌苖色飢甚遺以囊中金十兩而去其為人望之凛然與之語溫然久而知其為豁然長者也君曽大父諱泰來大父諱僅父諱鏡其先在宋時多顯者娶張氏先卒晚娶葉氏二男子矩槩槩為母弟漳後一女適張守成孫男四炳允頥允齊允中余與劉君基遊固聞君事及君卒矩復奉工部員外郎劉君狀趨京師請銘且言將以某年月日葬於劍池鄉大運里某山之原不可無銘乃為之銘銘曰元運將傾四方震驚海怪山妖執殳逞兵括有季君實竒壯士手麾義旌從者如水左捕右攘朱衣銅章卻而弗居以待真王真王之興雷轟風行孰戕守臣敢觸天刑長劍如林萬夫一心扼其咽喉執斧砧平帝念峻功賜金賜爵掃除東南罔敢不恪飛龍御天虎拜陛前􅍔亂既息乞身林泉帝曰歸乎齒則既多大帶巍冠輝于鄉閭鄉閭有言君績孔偉死而弗朽不在太史揆行考勳以焯以宣遺德在焉彌久而傳莆田陳府君墓銘君諱中立字誠中姓陳氏莆田之忠門人其先有名畟者宋紹聖間舉進士官奉議郎曽祖諱子文祖諱君保父諱髙有學行學徒私諡曰靖逸翰林侍講學士晉安張公以寧銘其墓母林氏君季父諱齊早死無子君以祖命後之少受經於溫陵盧公琦公以文學著稱君聞其指授色承心解日鶱月邁莆士皆歎服之元至正間部使者行縣集經生試君輒魁諸生㑹張潞公翥以修撰使莆見君文誦而竒之由是君名益著然就有司試即不利君語人曰我命薄故爾非吾文之罪也遂隱居不復有仕進意晚乃結廬壺山年五十有三以國朝洪武十一年正月十二日終于家君事先有禮每諱日必素服悲哀至終身不怠初君之祖暨父欲營義孰以教里中子弟規制未備而歿君繼先志創廟建學學後為祠祀艾軒晦庵夾漈三先生復為祠廟右奉其師盧公之主講說有堂燕居有室凡學之制無所不完割祭田十餘畝以食為師者儲山園之利以資春秋之祭凡為淑人善俗之計者又咸極其慮君日陳經傳為學者剖析聖賢大㫖鄉人賴之嗚呼世之為士者其未遇也常以無位不足施其所學為憂及既得位則又顧畏怯縮為其身謀終無所益於人者衆矣夫豈知君子之為善固不在乎位之大小哉若君者一介之士未嘗受釜庾之䘵而汲汲焉以化其鄉人為心其亦異于懷位尸䘵者多矣君配國清林氏子男曰堂曰基女二長適郡人顧初幼在室皆林氏出堂將以是年某月日葬君于某山之原請銘于太史氏濓濓嘗銘君母墓聞君行宜銘銘曰維古之士不以位世降俗偷位斯貴貴而無能冠狗彘豈若夫君賤為庶居家孝友推以義闢廬建學躬訓蒞鄉髦如雲聆且肄少長齗齗類洙泗化嚚為良暴更懿醇儒為功斯小試嗟哉後人繼其志廟祀勿忘欽永世故詩人徐方舟墓銘庚子之夏皇帝遣使者奉書幣起濓於金華山中時則有若青田劉君基麗水葉君琛龍泉章君溢同赴召遂出雙溪買舟泝桐江而西忽有美丈夫戴黃冠服白鹿皮裘腰綰青絲繩立於江濵揖劉君而笑且以語侵之劉君亟延入舟中葉章二君兢來歡謔各取冠服服之竟欲載上黟川丈夫覺之乃止濓疑之問於劉君曰此何人斯諸公乃愛之深耶劉君曰此睦之桐廬徐舫方舟也濓故聞方舟名亦起而鼓噪為歡共酌酒而别聲迹不相聞者久矣自時厥後葉君出守南昌歿于王事後五年章君為御史中丞以卒又後十年劉君亦官至御史中丞受封伯爵投老于家復以一疾不起又二年濓亦乞骸骨還山白髮埀領頽然成老翁矣今年冬來朝京師忽方舟之子膺持中書舍人史靖可之狀來謁遂速之銘則知方舟之死已厯一十二年嗟夫人生如寄石火電光真不堪把玩如此良可悲哉濓因語膺以舊事為之悽惻者久之乃序述其事曰方舟故簪纓家自幼有俠氣好馳馬試劍兼善攻毬踘之戲視拘拘法度士如無物稍長幡然悔曰此豈君子道哉即從師受章句為進士業操觚為文輒爛然成章已而又悔曰是如蠧書蟫出入于故紙中何有終期哉人生貴適意曷習古歌詩以吟咏性情庶幾少遂其願耳先是睦多詩人唐有皇甫湜方干徐凝李頻施肩吾宋有髙師魯滕元秀世號為睦州詩派方舟悉取而諷咏之鈢肝劌腎期起邁之乃已積之既久圎熟璀璨明珠走盤而玉色交映也方舟猶以為未足出遊江漢淮浙間與名士相摩切而詩道益昌江浙行省參知政事蘇君天爵聞其賢力欲薦之方舟曰吾詩人爾其可縻以章紱耶竟避去築室江臯日苦吟於雲烟出沒間翛然若與世隔因自號曰滄江散人天大雪乃泛舟釣江中終日戀戀若不忍舍去見者疑其非世間人元季兵亂益韜閉不出易為隱者服人莫知其蹤跡所在有瑤林滄江二集各若干卷唐詩通考若干卷藏于家云方舟平居喜怒不形于色無急步無疾呼罔測涯際性尚風義宛陵羅氏率五百指來避兵方舟衣且食之病者注藥死無所歸則擇地藏之久而弗懈事平具巨舟載其還家至正丙午正月九日方舟以疾卒夀六十八某年某月日葬于某縣霞川之原君子稽其自號題曰詩人滄江徐方舟墓表其志也方舟髙祖某宋四川制置使曽祖某某路提舉常平公事祖某始自淳安遷桐廬今為桐廬人父子竒元中順大夫平江路總管府治中致仕妣皇甫氏妻張氏有婦道前二十九年卒子三人長曰行蚤世次曰鼎次即膺以文學受薦授淮安桃源丞女二人適某某孫男九人曰某曰某云云孫女二人未行濓謂君子出處固立志之不同然亦有命焉當劉君之出也銜方舟以隱自髙數欲挽起之㑹有故而止方舟獲終老於山林亦豈偶然之故哉豫思方舟其人而不可得俯念疇昔䀌然傷情乃厯序其故而銘之曰有才不施一發乎詩日星月露草木走飛人事變遷可愕可悲舉無遁情入我範圍咳唾所及皆成珠璣一旦觀化魂無不之非湧醴泉定生靈芝昭德之符千載弗墟洪武丁巳冬十一月具官宋濓造亡友陳宅之墓銘嗚呼吾宅之死矣銘非濓孰能為之初濓讀書浦陽江上宅之侍其舅氏吳徴君長卿來遊濂始識之徴君淵澄山聳發言不繁而咸中肯綮宅之氣象雍容揖讓合節鳯和鳴而玉鏘如也濓心異之進謁徴君退必與宅之言問其所從師則韓莊節公性黃文獻公溍也問其所學則治經為進士之業也濂時頗有志應舉相與詰難經義連日夕弗休逮别去猶依依南望至日落乃止自時厥後宅之聲譽日起大夫士唯恐內交之晚廉訪使者行部舉為稽山書院山長宅之辭宅之意氣方豪謂朱紫可以引手致及試藝有司數上數不利乃撫几歎曰慈親年髙矣豫髮亦種種安能逐三五少年競一日短長耶即退隱大山中朝夕親側不敢少離去濓聞而悲之至正戊戌濂避兵徴君家已而遷宅之之西軒濓攜室人賈専及仲子璲長孫慎三世為四人爾心膽戰掉若喪家之犬宅之煦嫗而軫存之視濂猶弟兄遇璲與慎有若子孫宅之內子蔣夫人亦視専如妯娌然濓安之百里之外忘其流離顛沛之苦者宅之夫婦力也浦陽既入職方濓挈妻孥而還庚子之夏朝廷遣使者來召濂趣裝上南京擢為王官與宅之别者閲十春秋其依依之懷猶浦陽南望時暨以病豫告東歸思宅之之心逾切病間竟騎驢往見宅之大喜屐齒殆將折留連浹旬椎羊豕以為饗當夜半酒酣叙兵火離合語刺刺不能已既而掀髯髙歌聲調激烈一吐壯年不平之氣濓復悲其壯志雖不衰然亦頽然老矣居亡何濓復起修元史進官禁林又將十年而璲同慎亦俱竊䘵于朝濓私自念皇明圗任黃髮以開文治如宅之者年縱邁豈丘壑所能淹將以其文行上聞璲慎咸爭曰陳先生老矣得毋不可於意邪乃止洪武丁巳春濓蒙恩休致于家始知宅之之歿已五年矣欲如昔日一見有不可得矣追念今古不覺澘然出涕専亦思蔣夫人之切復念宅之固云歿而夫人尚無恙行當胥㑹以慰中心之懸懸近有自諸暨來者則又曰夫人之亡亦已三月嗚呼悲夫濓知宅之之深者宅之歿矣銘非濓孰堪為之宅之諱堂宅之其字也姓陳氏其先襄陽人十一世祖宋國子助教旦始遷于杭生餘姚知縣慤再遷諸暨陶朱里曽大父某大父琳承信郎提刑司幹辦公事娶吳氏吳居縣東之流子里生子曰燦宅之之父也仍娶于吳遂依女氏以居為流子里人宅之夀七十有七卒之日乃癸亥十一月六日閏月二十三日葬于戈溪之源娶黃氏夀六十前十五年卒繼配即蔣夫人有婦德鄉人稱之夀七十四後五年卒子男四鐵鋘鏞鎰鋘亦前五年卒女二適吳義吳鐩鐩徴君長孫孫男六濟溫浦潤浩潽女二尚幼曽孫男四樟權梓橡宅之性雅飭行乎患難能以理自遣室廬蕩於兵燹亟遷别墅曽無幾微見於顔色每速故人飲酒賦詩以自適其詩韻度深婉一篇出人競持去閭井之間恆樂親之久而不厭徴君家將合族為義居宅之左右徴君為定科條以齊子姓至今守之嗚呼宅之已矣而徴君亦作土中人矣上距避兵之歲僅二十年人事變遷何所不有未知後二十年又為何如也唯有善名著于時述作傳於人雖歿猶不歿也如宅之者是已銘曰五彩弗施不如赭泥我哀乎宅之受才則丕其數則竒我哀乎宅之斂其奮飛發於聲詩我哀乎宅之墓門有碑太史勒辭尚足慰多士之思金陵杜府君墓銘金陵有孝義之士曰杜君諱元字一元其先居吉之吉水與㑹稽正獻公衍同宗至君始逰江東樂金陵土俗遂居之而為金陵人君苦學有材氣能為詩元重紀至元中張文穆公起巖為江南行臺中丞見君詩願掾君君不可欲以茂材異等薦又不從年若干卒以布衣終君少時父患噩疾夜數驚君冠帶伏父榻傍父驚起輒抱持曰兒在斯父疾數月君目不敢瞑至愈乃已母沒服喪得古禮甚聲聞日起貴人賢士多樂與君游君未嘗以事干之及有罷黜失志者則為之力不怠行臺都事楊惠被劾去人莫造其門君獨持酒與飲而送之趙𢎞中為御史掾坐法罷君徒步與俱行百餘里僦屋居之儒學教授張鉉以事黜君出金帛資其行其子四歲失母君命婦鞠之不異己子兵部主事常允恭家人夜失火允恭方醉臥衆怖懾散走無賴子利其資將劫之君率少年數十輩為出其篋笥寶貨于外允恭泣謝曰微君吾其死乎鄰人陳鼎舉室死于兵二兒匿舍側怨家復害其小者君曰脫并殺其兒則陳氏絶矣卒為抱匿它所以免吉之部運吏輸糧金陵不足者三千斛吏受笞榜號泣莫為計君憫之為貸於大賈以償吏德君以物來謝君却之蔣山僧為御史所誣夜竄君室求救君藏之故人家僧獲全宋楊忠襄公邦乂廟在城南君以公吉人歲時率吉士游寓者具牲酒祭之君之為義多類此君嘗攻醫尤良於治證疾病造君者不問有無必豫藥藥必擇精善者服之必瘳金陵大疫君和藥走給之不得食者以薪米餽之賴君以生者甚衆由是人多稱君美及兵亂士卒相戒不忍犯君卒於至正丙申七月九日以丁酉三月十日權厝金陵清凉山右國朝洪武壬子十二月九日復改葬南門外之鍾家山夫人劉氏祔焉君曽祖若海祖懋父文煜母周氏君二男子曰琪曰環琪早卒環承事郎晉相府録事賢而能文精於書得晉人筆意二女適蕭伯髙鄧世良孫男二某某孫女四人皆在室環與余交頗久以銘為請余惑乎世之交友者利之所在則趨有小害則避去不肯留目一顧或道上相值輒引袂掩面陽為不識倘以事過其門䇿馬疾馳惟恐為所汙况望其拯恤乎若君者可謂無讓於古君子矣烏可不銘之以為世勸乎君所為詩凡若干卷藏于家銘曰杜裔孔巨支著吉水其在金陵則自君始君才既多胡不祿仕非不樂仕義不屈己養氣為文五色有煒孰非公卿接跡交軌彼徼其權權銷志沮吾守吾義夷險一揆章服之加鞶帶之禠所交者心加褫何與拯難濟危存孤起死匪名之求惟義所止兵戈如林白骨千里君若不知左孫右子斯豈人為天錫嘉祉天曷私君惟善之致貴有不聞賤有足恃刻文昭美以諗多士臨海方府君墓銘君諱濬字德明姓方氏台之臨海人五代時有以武顯者居臨海仙華山之東號東山方氏君其後也曽大父仲大父賢父奎母韓氏君少孤能自拔擢超出流輩中誦書不求多解務見于用持身有威儀不妄譁笑儇薄子過其家蹐步傾耳不敢出聲喜延攬賢士至則沽酒與飲取其歡欣不顧惜資費人有過弗匿於心輒面折之遇流俗則不肯舉目視至門亦不與語是以所交皆台之有名者元季或薦名于朝授江浙等處儒學副提舉不赴㑹方左丞據海上賤儒多倚之求利䘵君獨避匿日與里中故老緣躋山水間歌吟忘返庭有巨檜每醉餘盤旋其下晚乃别號檜屏翁一旦得疾正衣冠危坐抗手與視疾者訣頃之乃逝年六十時至正二十六年二月十日也娶牟氏諱巽事姑孝宗族稱之年五十有八以今洪武二年二月二十一日終五年十二月九日合葬於仙華山之原四男子仁義禮本禮去為浮屠本以才薦擢起居注遷徽州府通判改知金壇縣事有政譽一女適董宏孫男六人組忠良桓金瑰女三人長適韓載二尚幼本為起居注時與余同朝屢以銘為請未果為及余致政朝京師本至自金壇重以為言退則自狀羣行使忠來速銘其辭文甚於是知君善教子也銘曰維蔓方氏本於方雷事軒與舜曰明曰回叔佐周宣功侔尚父紘在西漢始徙南土南土之方皆祖於紘派别支繁維歙為宗台之方氏始自歙分或昭或泯不大有聞君之先人嘗以武顯君隱不仕乃篤為善善積在人彰善者天其將熾然𦙍子孔賢莆田黃府君墓銘莆田黃處士有良壻曰陳熙哀處士之早亡自狀其行千餘言走三千里來京師請銘且曰處士事繼母孝庶弟出後從父從父愛其女盡以腴田嫁之處士患弟貧割以私田之半族人以田來鬻處士不忍取乞以直而歸之不能為生者加衣食焉以資多為閭里之正里中民買鹽于官及科繇不能庚者出私財代輸有受誣者諍之於縣庭得解乃已每歲首縣次民資力多寡定征斂之籍衆不能決處士發一言皆稱平爭訟者來質是非告以理法舉酒飲之各謝而退藝田家歸粟入以小量遇凶歲則减賈以大量糶之初郡南有僻壤盜常狙伺以剽行旅處士搆廬棲僧夜則燃燈達曙盜散去復施貧死者棺三年至二百餘野無暴骨元末兵亂縣命處士帥兵扼險畫捕賊䇿陳于上民藉以安處士讀書有識待物恕以和其生也鄉人教其子俾取為法及其沒識之者無不弔弔者哭必哀至今言善人者稱焉熙又曰處士之善蓋多其類如此其使人感且化者不得而知亦不得而言也然其大者既不可言倘可言者又不得託文以傳焉則何以使為善者慕敢請余曰處士之行誠可傳矣余言之不文烏足以傳耶雖然不可辭也處士諱己字景陽自唐屯田員外郎潛之子朂不仕至審知始自光徙莆在宋稱書詩之族髙祖審再以進士舉于鄉與從兄某州通判君亮皆有名曽祖文子以五經為州學諭祖來鄉貢進士父元壯母陳氏繼母鄭氏俱名族處士娶林氏無子先二十年卒再娶李氏生子男四人興祖振祖光祖麒祖女三人長壻即熙其二適吳某王某孫男五人隆庸洪某某處士初為長女求壻富人爭欲問名不聽聞熙儒士許妻之或謂熙貧非偶處士曰我志決矣卒妻熙熙今為連江儒學教諭有文名君子又多處士善處其女也處士年四十二卒元至正十八年八月草九日後五年殯某山下草七年十月十二日權窆山之西今洪武十一年十二月草八日始克葬于白砂之原銘曰人不患財之弗贏而患善無可稱善集于身雖賤為恆氓厯千載而有聲身為鄙夫雖位居九卿溘既死而誰名維處士君足不出州里而化者衆身服乎韋布而德可程斯之謂死而如生文憲集卷十九
