body:
  text: 文憲集卷二十明宋濓撰墓銘凡一十七章故奉訓大夫僉提刑按察司事王府君墓銘濠梁王佐其先府君之歿越六年矣今奉工部主事杜君環狀來徴墓門之銘不覺為之愴然而悲蓋當皇上飛龍淮甸定鼎江表弓旌四出旁招俊乂濓時應聘而起擢典儒臺而府君亦仗䇿轅門思以勛業自砥礪薦紳之士多劀目禮之濓雖不泛與人交聞府君崇論宏議亦未嘗不傾耳而聽及退每自愧自歎以為弗能及自後離合靡常逮濓再召入禁林府君已作土中人載感疇昔銘欲不作可乎按狀府君諱濓字習古濠州定逺人曽大父某大父某皆肥遁丘園人號善士父子良敏給而多智定逺令酷愛之俾為書佐未幾補吏尉司遷霍丘縣以積勞升安豐府史達官知其能辟為河南行省理問掾未命而終母蔣氏府君嗜讀書知彞倫大義習為聲詩音節韻趣皆有法推擇為定逺縣吏出謀發慮皆中肯綮令長以賔禮遇之元季政乖豪傑並起府君附髀歎曰事急矣保宗社以拯黎民可也乃走潁亳説其軍帥曰民罹虐政不得已起為亂矣當思有以靖之虔劉人以逞所謂如水益深如火益熱者也無乃不可乎軍帥聞其言以為才交薦之擢萬夫長五轉至工部尚書非其所好也當是時盜稱名字者皆烏合之衆散漫無統所經之處唯務焚掠千里為荒墟府君察之度必無所成謂所親曰區區豈欲從戎哉奮不顧身出編虎鬚者志欲生蒸民也今若是猶魚遊釜中耳竈火已燃尚自謂得計耶吾聞真主已建都金陵寬仁愛人四方之民爭引領望之不去禍將及於是乘間挈家南渡府君之婦兄太師李韓公善長時已在上左右亟言之召見於青龍殿與語大悅會新設執法議理司方將選人以授遂詔為執法官府君悉心詳讞務協厥中人稱為平允丹陽令白齊因公致罪當棄市府君以情可矜恕敷奏上前得貸死知應天府王子謙坐事械繫者久府君惜其材議從末減由是上簡注之深升為中書貟外郎轉遷提刑按察司事階奉訓大夫府君巡行郡縣見貪墨蠧民者必擊去之唯恐弗亟餘則務存大體觀風宣化而已一日天大風晝晦上下詔求直言府君厯述災傷之病民竟為之罷徴俄得末疾家居者久之以洪武三年四月二十七日卒于京城之寓舍夀五十又七以九年二月日葬于某山之原娶李氏子男二人伯曰驥先十八年卒仲曰佐即來徴文者篤學好古凡法帖名畫多能鑒定且善虞世南書以才選充忠顯校尉飛熊衛千户所鎮撫女二人適魯某孫志逺髙某孫男一人寧安府君軀幹昻聳而容貌潤澤恂恂儒者也或共其論議輒掀眉吐氣指方畫圎衮衮數千言不休臨大事之際神采精緊毅然有不可奪之色與人交愈久愈敬遇急難必蹈湯赴火援之若行事有過差復面折不少恕性又慈惠凡貸泉布者不納息弗能庚則皆置不問遇凍餒者如身受其病思輟粟帛濟之乃已其在戎行專務以不殺為勸且導人辟兵之方賴以生者數百人至於事親盡孝奉意承顔唯恐毛髮有遺故鄉邦尤稱之咸曰孝如王習古庶幾無愧嗚呼為士者內行修于家外行有以澤諸人可謂不負所志者矣銘曰民吾同胞不幸亂離屠劉之何為我務生之海宇載清式簪且纓正色立於庭我竭其誠嗚呼唯行之腴契道之符不亟不徐循序而詳趨其亦有識之吉士也歟元故行宣政院照磨兼管勾承發架閣鄭府君墓銘至正乙未十二月二十五日故行宣政院照磨兼管勾承發架閣浦陽鄭府君卒年五十六歲以是月二十九日即葬縣東二十五里大樊山中去白麟溪三百步而近越四年己亥七月六日夫人吳氏亦卒年視府君踰四歲越一十五日而少房勞氏又卒年視夫人而少一十四歲其祔葬府君之穴夫人則是月十一日勞氏則一十五日也府君二子漠沂以架閣君既棄捐今半月間二母又相繼卒慟哭將欲無生請從兄溫州路經厯泳狀其羣行來徴銘府君諱銖字彥平其先出於鄭遂以國氏自公子友受封至今世系皆可考詳見世譜録中其由滎陽徙歙者則宋歙縣令凝道也由歙遷睦者則殿中侍御史自牖也自睦徙婺之浦陽白麟溪者則淮也淮字巨淵於府君為八世祖淮生照照生綺綺生聞聞生運運生政政生德璋處之青田縣尉府君之大父也父文厚母葛氏府君自幼輒失怙恃鞠於世母周氏府君事之以孝聞年十六善為廢舉之術未幾家大穰府君自綺以來八世同爨朝廷嘗表為義門子姓之多至數千指府君與兄欽營田八百畝有畸建嘉禮莊以給婚姻之用俄撫髀唶曰太阿在室孰知其有剸犀刺象功丈夫不能用世亦猶是爾豫將為萬里遊當必有所遇即弗遇歸老丘壑亦未晚耳於是戒行李與親舊揖别從以三蒼頭上馬徑去逮至京師諸公貴人爭相引重時托克托道濟公入秉鈞軸日以致太平為務一才一藝無不甄拔見府君儀觀偉飭器之奏為行宣政院照磨宣政蓋統治江南諸道浮屠氏事權至重浮屠以幣交者府君絶弗復通門庭肅如江浙行省右丞相多爾濟公以元勳碩德方領院事察知府君之亷命持檄行浙東西一髮無所取諸浮屠嘆曰凡受檄來者恆欲得重賄不奉命則禍立見聞其還也錢積至數萬今鄭君槖中蕭然空耳其亷吏也哉由是院之推亷吏者一則曰鄭君二則曰鄭君云轉松江等處稻田提領所大使嘉定華亭上海之交有田二十頃餘既𨽻所中而都水使者洎江淮財賦府復重賦之民日困甚府君為聞于朝免之先是徵民無藝歲有羡糧以斛計者萬餘上下共利之習以為常府君至獨曰是安可哉命給還於民吏爭以無主名為解弗聼乃計種家口數分之望門而拜者日以千數稻田所素號米貨之府而為之使者又總攬其綱他人靡不思遂其欲府君日糴于市處之猶貧人然會從子洵來省覲一夕病卒府君哭之慟且曰人生不翅朝露何以官為即日解印綬而歸居亡何亦以一疾不起府君性精密不妄嬉笑遇事各有條理不可越尺寸聲嗟氣歎之間諸奴畏之甚於鞭箠吳氏諱雙字齊祺生女曰潤歸義烏縣丞洪士濓勞氏諱觀漠沂蓋其所出也吳性平恕而誠慤宰物必均寧己劣於人府君出遊京師日禱于上下神祇及有疾猶扶憊東面叩頭再拜遇漠沂慈甚媵人報其安寢目乃瞑不得報輒輾轉至旦勞氏亦奉承惟謹同處三十年穆如也次女曰潾許適黃育其母曰珊奴嗚呼府君在家能孝居官復以亷聞可謂賢也已銘曰厲行於門一何哲也出而用世又何潔也蒸蒸兮能順皎皎兮弗涅也斷斷兮知止凝凝兮有發也懿哉若人名不滅也考行造文勒此圎碣也元封從仕郎江浙等處行中書省左司都事鄭彥貞甫墓銘嗚呼大同之世人不獨親其親不獨子其子貨不必藏於己力惡其不出於身自大道既隱情偽日滋此尼父所以有不及見之歎雖然秉彞天性亘萬古猶一日時縱有汚隆而其道則未嘗泯滅有若浦江鄭氏非一家之三代而其七葉之長彥貞君非三代之英乎彥貞諱鉉彥貞字也其家自宋南渡初即合食為義門迄今已厯十世宋元二朝國史皆為立傳家教修明有遺範二卷俾奕世守之彥貞嗣主其政益匑匑畏謹正己以蒞物或行其所未至或補其所不足家人翕然遵化一堂之上雅雅雍雍動逾千百指愛無不均也情無不一也不知孰為親而孰為疏也視其貨泉則錙銖皆聚於公且曰我惡敢私也察其事功則羣趨而競赴又曰此吾分當然也爾何與哉雖甚勞弗懈義浹仁孚和氣充牣四海之廣莫不聞知過其門入其庭者神暢心怡而鄙吝之萌銷沮無餘退而有言僉謂昔之義居如樊楊張李之流誠所不及而益重彥貞君之善繼先志也彥貞自幼沈毅端慤屹然如成人雖朋舊不敢狎侮語一近褻輒白眼望之聞人有輕己之言自責自勵唯恐如其料及壯主貨財倡家意其易惑百端傾誘之每正色叱之使去倡大詫曰此鐵心石腸人也彥貞事父盡孝父病在枕席其妻卒彥貞不敢哭強顔乾笑以奉湯藥竟不使之知後八日父亦卒彥貞哀慟幾絶水漿不入口者三日鬚髮為之盡白及至終喪張外舅必慶憫諸甥煢煢無依力勸其更娶彥貞謝曰鉉見後母肆虐戕賊骨肉者多矣忍令吾兒陷之邪不聼彥貞年未四十君子義之時天下承平衣冠萃于燕都翩然出遊以充其見聞揭文安公傒斯在禁林黃文獻公溍居成均二公以文辭鳴當世皆折行輩與彥貞交論文談詩或至達旦不休一時士大夫見彥貞方嚴皆敬憚之或酣酒放歌聞履聲即斂容正坐不敢吐氣自時厥後彥貞仲子泳與從子深同講授托克托太師家彥貞為書數千言陳時政之弊令進于太師太師多采而行之彥貞尚風義舊與參政呼都克婁斯遊其子為武義宰免官留武林貧不能自存彥貞延其家十口來浦江給衣食三十餘年鄰瞽者跛者彥貞憫其顛連養之終身每夙興告飢者填門彥貞積餘飯親攜簞分餉之至老不厭元季兵起州郡俱繹騷大將數統兵入境服義門名皆戒士卒毋敢犯樞密判官阿勒呼木帥軍五萬一夕驟至奪民廬舍以居二十里之內雞犬牛羊盡敝彥貞説之曰明公非太師之偏禆乎太師征髙郵尚以無罪去國况明公之士卒恣行不道乎脫有一人言於朝不識明公將何以處之阿勒呼木愕然曰業已如此為之奈何彥貞曰為明公計者甚不難浙東據山阻海其民頗柔馴易制明公誠能撫定而綏輯之俾他兵不敢東向執政柄者尚敢以嚧咳相驚乎行且録明公之功矣阿勒呼木不覺屈膝曰非公不能聞此言命左右致束帛為謝明日下令啓行一軍肅然曽未幾何國朝大兵取婺州彥貞攜家避入諸暨流子里時李曹公文忠統兵來過歎曰此義門也今世罕見之躬為扄鐍而去事平遣帳前先鋒率民兵二千護其家歸浦江人以為彥貞積善之報云彥貞年七十以甲辰之歲四月十四日終于家某月二十八日葬于諸暨州桐山鄉宣山之原家庭內外不問服之有無咸嗚嗚哭哭則盡哀一縣之中若宗黨若姻連若三農百工若鄉士大夫皆素冠拜哭哭亦盡哀傍邑之賢者聞之亦竊哀之曰是家實無愧於三代使尼父生於此時未必不樂道之今其七世之長亡矣薰漸之益吾屬將何望乎嗚呼此可以聲音笑貌為之哉彥貞之致是者必有在矣彥貞之先自歙遷睦又自睦來遷其詳見諸譜圖記同居初祖諱綺字宗文宋乾道中賜號沖素處士朝請郎郎中晏穆為銘其墓父文泰植志不屈人下設施運量大能昌其宗文泰乃青田尉德璋子出為伯父德池後德池之父致則處士曽孫也妻張澄有婦德敬夫如賔沒齒無一言相加遺男子五人長漢才優識精雖不大聲色弟子莫不畏之量入為出而其致用恆裕如也次即泳通經而有文纍官從仕郎溫州路總管府經厯得封彥貞江浙等處行中書省左右司都事階亦從事郎次湜東陽丞人謂才如長兄次渶江浙行省宣使次漴庶出也女子一人歸東陽蔣嘉亨男孫十人楨棫幹樞模格棠杗柯女孫八人其二適嘉亨之子昭及其從子明其一嫁同邑張宗餘皆未行曾孫男八人燾爟炎樵熒熉光焰濓也不敏與彥貞有連而彥貞子若孫又皆從濓授經其相知實深然而逰宦南京彥貞之歿斂不得憑棺窆不得臨穴將何以釋其悠悠之思唯紀載羣行鐫之樂石可以埀聲光於不朽貽矩則於方來是猶可為也於是不敢讓姑徇漢等之請而為之銘銘曰大道之行天下為公風氣敦龎臻于太康異體同心情無不通此謂醇熙三代之英世遷俗殊道德淪喪紾臂借耰秦法之涼肝膈充窒形骸閉藏愾我寤嘆涕泗沾裳彼美鄭君沈毅自強上承奕葉合族共煬內教云飭外政復蘉規重矩疊遹有耿光曷以致兹曰率其常或斂而舒或翕而張有子將將有婦洋洋無間戚疏萃於一堂孰為尊卑誰為父兄至和丕冒奚有畛封儻涉其庭煦如春陽浹人肌髓薰為善良人亦有言此為世坊非君之賢莫襲其芳襲之斯何既柔且剛以仁為食以義為漿翳能使昭枯堪再榮百鳥喧啾忽見鳯凰宜覽德輝西東翺翔豈意鎩翮竟歸冥茫載者亡車渡者失航瞻望弗及䀌然感傷仙華卭卭浦汭湯湯緬懷德人何日而忘故朝列大夫浙江行省左右司都事蘇公墓銘有序洪武十一年四月二十五日元朝列大夫浙江等處行中書省左右司都事蘇公卒郡之夀俊與旁州之賢凡知公者無不澘然流涕然公以政事聞于時享年至八十三而終五男子嘗與仕版七孫亦嶄然見頭角皆可以無憾顧乃哀之弗置者誠以一時遺老日就凋謝而公又云亡古今文獻將何從而徴之邪其子祖允等以其年某月日葬公於某山之阡乃命弟伯衡踵門請製墓上之銘濓公之里中子其哀公尤切於他人固不宜以不文為辭初公之生也不聞啼聲視之唯紫胞在地而臍帶縈絡之乳嫗撥開兒始啼識者已知為祥徴及長學經於許文懿公以才推擇充府史尋入閩海憲府為奏差憲使以亷直為同官所忌嗾御史劾之章未下即命奪使印公毅然持不可使亦攟拾同官之過欲訟繫之公諍曰兩虎共鬭其勢不俱生明公奈何類之已而皆止汀冦謀襲臨障公往督長吏為備長吏欲籍民為兵公曰民不知兵久矣一旦籍之必大致紛紜此非禦盜是增盜也長吏曰計將焉出公曰吾知所處矣閲兵籍得放逸者二千使帥之擊賊竟獲其首禍者廣東部使者聞公賢稽其年勞辟為書吏南海畨禺二縣輸恆賦之外復有所徴號稅外錢以給上官燕私之須小民怨讟盈道路公聞白罷之朝廷每頒新鈔諸郡部使者必監焚舊鈔此故事也時使者與廣州守有隙恚不往司鈔吏積十五年不得調公復白而焚之俄再入閩補令史於宣慰司聲稱藉藉行宣政院延公為掾久之趙郡蘇君天爵來參江浙省政極才公復挽之入省公遜與舒常弗之從蘇君遂兩用之公以蘇君知己遇事失當輒諍凛然有峭直風蘇君敬憚視之異他掾海漕之糧歲不下三百萬漕官多強取贏無錫州獨不與乃誣其糧惡不宜上供省臣怒欲加罪公命覆核之事獲免海盜起省發官粟募民舟載軍捕之舟未盡發而盜請降省逮民歸粟公曰言猶在耳惡可背之况民得粟必已食之既今將焉徴即徴唯徴未發者可爾省臣從其言蘄州紅巾搆亂陷於潛昌化犯杭州省臣皆遁參政樊君執敬獨坐堂上以死自誓公説樊君曰明公以身死國義則得矣如一城生聚何今城中健兒不下數十萬公庫金帛以萬計與其委諸盜賊曷若募民使戰邪戰而不勝就死何晚也樊君不能從上馬迎戰而死公與掾李樞謀以蘇李署號召民殺賊殺一人即攜首受錢二百五十緡民持刀爭奮數日之間獻馘者充庭未幾辦章教化君復杭州公絶口不言功考滿謁選銓曹中書參議汝中柏聞公名家子欲引為右曹掾公察其威權太橫力辭南還擢紹興路蕭山縣尹蕭山民詭名匿其田賦科繇不能均一公令其自實田輯為册書凡有徴發皆視書重輕之兵興以來縣糧輸衢處二州民憚逺征往往皆屬吏吏並緣為姦利糧不時集主運者妻孥恆坐繫公釋之而罪吏期月咸足且為立法每鄉置督運一人趣民各以糧赴江濵仍驗糧寡多賦錢僦舟以行民大便之縣為吳越要衝師旅經從無虛月誅索芻茭少不愜則侵掠居民民畏之甚於鬼公儲峙既豐有犯者擒置於法士卒入城如見大將不敢出語相誰何會歲儉弛湘湖之禁以利民不足啓常平倉以活餓者僚屬力沮之公大言曰發天子粟活天子民有何不可儻有譴責吾自任之民賴以生者以數萬計帥閫以元日至檄縣市殽核諸物公發視恚甚執筆書檄尾曰四郊多壘正臣子痛心疾首之時奈何襲太平故態飲酒為樂邪聞者愧服府公韙公之為有難決之獄移公訊之諸暨知州袁元以散耆年帛不明將搆以贓墨公推其情乃吏與里胥為濫元但不躬給爾公各坐以其罪元致白金為夀公曰吾知執法爾豈私爾邪卒却之歲餘改本路總管府經厯不上階自承事郎轉文林郎行樞密院照磨偽吳張士誠據姑蘇既降公持詔書往湖州責其戍將潘允明行郊迎禮禮成允明欲西向坐公公正色曰以爵則我幕僚雖相向坐亦以為過然我所持者詔書君敢與詔使抗禮邪挾胡床中席而坐允明懼服臨發贐米百斛錦二十端公笑辭曰君謂使者而可以貨取邪時士誠新授淮南平章政事開省蘇州士誠聞之請于康里丞相曰詔使四出唯蘇照磨廉介士願得為幕屬君恥之不往復超今官參政石抹君宜孫分省于處請公與青田劉君基從石抹君方以討賊自任浙東倚之為重每事必謀於公公勸其禮賢下士安輯流亡招徠羣盜撫之以恩石抹君始從之衆心翕然歸後好自用幕下士多散去部將胡君深章君溢亦擁兵觀望公獨左右之不變復移書胡君等惓惓以共濟國事為戒石抹君多用故人攝縣棄行省丞制所用者公曰今朝廷不通事當一出行省奈何違之石抹君愧謝越部書佐李伏喜誇誕石抹君賢之薦授員外郎位居公上數狎侮公人為之不平公不與校既而伏以反覆受賂覺石抹君械繫之公解之曰參政始薦之今乃囚之古之以禮進退人者其亦如是邪伏因得引去經略使李君國鳯循行至處久留不去以十羊授公牧公曰某以非才為省屬天使命之牧羊固當然大敵壓境天使能出竒計殱之雖日烹百羊何害否則某亦不保首領欲久為天使牧羊得乎李君默然元季處多盜征行吏多受盜金既降而復叛公秋毫無所犯大溪吳誠七成擒官簿録其家得帳籍驗之幕府官無不受賂者獨無公名已而浙水東諸郡悉入皇明版圗而七閩猶未附怨家告公長子仕閩宜謫徙滁陽公就徙無難色丞相李韓公憫公無辜欲奏而官之者再公以年耄力辭遂歸卧金華某山中左圗右史超然自得越十二春秋乃終未終一日精神如常時忽不晡食越翼日瞑目端坐至夜諸子進問所欲公曰靜以俟命無所欲也漏下四鼓撼之則逝矣是夜大風雨居民見士馬雜遝前籠絳紗燈訶叱東去民叩後來者云接蘇伯夔君子以為異公性敦恪尚風義孳孳務行及物之政唯恐有受其害者至於修水利興學校皆具有成績然識量堅凝不為威武所遷嘗從大司農受海盜降分比其衆冦不悅嘯其部曲大譟轅門下衆皆相顧失色公獨進曰天子以爾等本良民迫於不得已為盜故遣使者諭爾降爾果欲反不畏十萬橫磨劒邪俱逡巡而退復從樊君督海漕事用牲牢祀天妃廟始降神冦舟突而入陪祀官解散公謂樊君曰事不可中輟成禮而退神色自若與人交緩急可倚藉部使者有託其妻子者使者亡公禮之益厚避兵登舟逢故人兄弟倣徨走水濵亟呼與共載行數里所又見婦女羣泣亦其友母妻也命舟迎之或止公曰舟重不能前追兵且及遑恤他人邪公曰死生有命吾不忍獨濟也公之善行如此類者甚夥姑取其著者書之餘不盡載公諱友龍伯夔字也人稱之曰栗齋而不敢字其先居眉州眉山縣文定公轍之長子宋吏部侍郎徽猷閣待制贈少傅遲來知婺州因家金華歿葬蘭溪之紫巖鄉遂為金華人少傅生龍圗閣直學士廣南東路經略使贈少保簡少保生江東提刑祕閣修撰大理鄉諤大理生吏部郎中江西提刑林吏部生朝奉大夫顯謨閣待制知貴州熙貴州生通直郎兩淮轉運司幹辦公事圭運幹生從政郎淮安縣主簿鎮淮安君娶潘氏無子以三從弟太學生鎬之次子為後即公是也上距文定公蓋九世矣公娶宗氏忠簡公澤七世孫柔順惠嘉為一鄉婦儀子男子六人四仕于元一仕皇朝一蚤卒祖允將仕佐郎浦城縣主簿師道廣東宣慰使司奏差繼兄肖德後伯衡前鄉貢進士今自國子正擢翰林國史院編修官文辭雄麗較之小坡斜川集有過無不及焉思誠夭止善東陽縣尉崇德將仕郎行樞密院管勾子女子三人長適俞坦道餘皆天孫男七人恆悟悅恢愷忭欣孫女五人歸曹源宗涵徐道餘在室嗚呼蘇氏之世非惟以文學忠孝著稱而為政及物之美亦代不乏人有若少傅奏減吾婺市羅之額二萬八千有竒民為立祠少保厯典大郡所至以遺愛見思而大理之樹善剗姦吏部之忠厚敦俗奕葉之間簪笏相映公又起而繼之聲名烜赫亦丕昭於前烈何其一姓之皆賢哉嗚呼自奮於榮名者易為力而能纘先緒於弗墜者難為謀非天欲報功俾之世濟其美吾知未必能爾也嗚呼是則然矣婺之蘇氏其積纍深長實自少傅始後人因引而伸之公之仁民之功可謂侈矣其子若孫烏有不振拔者乎當知後之視公者亦猶今之視少傅也夫何疑哉伯衡與濓有文字之雅故竭蹶來山中請文遂厯序其事而歸之銘曰眉山蘇氏稱三文光芒萬丈爥乾坤少傅守婺政以仁紫巖生氣凛然存珠明玉潤多後昆簪紱繽紛絢朝暾貴而尸位玉之珉能守家法斯足珍維公挺生嘉兆甄鳴岐彩鳯瑞世麟從事大府厯粵閩其職雖卑氣益振峭直猶如古諍臣得失利害輒屢陳聞民有病眉則顰浙垣招充幕中賔孰知蘄冦紅為巾嘯聚山澤動作屯犯我屬部窺大藩用姓給號令編民殺賊如殺狐羣有功默默不自言大官受降東海濵忽爾跳踉欲舞􅚙一叱鼠伏不敢嗔身佩縣章魚懸銀煦嫗扞禦一以恩設心不讓漢吏循拔彼水火脫溺焚錯之華榱藉錦茵參贊宥密待咨詢手持璽書諭嚚昏中坐以示王人尊噉我以利耳不聞括氓搆亂奔狂瀾障遏勿使成瀰漫海桑既變光嶽新攜書歸卧丘壑雲執節不仕為全人庶幾不負名家孫春秋之髙踰八旬翛然觀化只逡巡大風挾雨來掀翻士馬雜遝向東奔絳紗籠燈光吐吞騶卒前呵肅靈氛生為良臣死明神丈夫如斯世罕倫白石可磨嫓瑶琨史濓造銘焯墓門石從可泐名弗諼故韶州路儒學教授曾府君墓銘府君諱順字至順姓曾氏郕國公四十九代孫郕國家於魯十四傳至都鄉侯據始避新室之亂徙豫章子孫日盛大江之南言曾氏者皆宗焉又六傳至略遷於臨川又十二傳至唐沂州刺史可徒生司空洪立司空生散騎常侍延鐸常侍又遷于南豐生四子長曰仁皓生志及文照南唐時又同遷臨江新淦縣之吉陽里文照舉童子科生乾度宋淳化三年進士仕至大常少鄉贈刑部尚書志生易用易用生侃侃生髙安丞斧擢元祐六年進士第又遷縣之髙元里屏山之下生用先用先生嶽嶽生願正願正生翊翊生汝舟汝舟生兼善能傳黃文肅公幹之學為時名儒生軍器監簿天麒天麒倜儻有大志常居文信公天祥幕府義從賈丞相餘慶等奉使於元竟全節而歸則府君之父也府君性警敏自幼輒有聞時信公之弟文惠公璧來為郡招府君與其子文莊侯升共學升既秀穎府君能與之競爽其師胡君端一亟目之為二俊當宋初改物遺黎故老猶有存者監簿君日開尊共飲劇談先代文獻府君從旁聽之有疑則問唯恐其不傾盡諸老為之嘖嘖愛賞元至正中程文憲公巨夫奉詔求賢江南欲薦府君才可用監簿君止之曾未幾何部使者趙君孟迎以茂才舉署饒州路儒學録改袁州升南雄州儒學正士皆服其化而為率德勵行之歸會科目詔行府君欣然應書不利退而歎曰吾能損所學以徇時好哉因不復踐場屋鄉友范文白公椁清修之士也極慎許與憫府君官不充其才會御史銓選廣中力薦之於是板授韶州路儒學教授未及上吏部已别選遂止賢公卿多稔府君行欲強起之府君辭已而長子受辟為校官季子以春秋舉于鄉取第五名文解府君喜曰吾何以仕為乃陶然自放清泉白石間與髙人逸士相遊樂府君被服儼雅揮麈談笑皎然如霞外人世間塵土不可得而侵也善鑑定古器物暨法書名畫每傳玩以為適或取琴鼓一再行焚香默坐超然與造物者遊一旦遘疾預告終期召婚友入榻前與之言别意甚懇懇介婦方歸寧命趣之還既至正衣冠起坐撫幼孫頂曰吾遲汝久矣復東首而卧翛然而逝實至正七年春三月某甲子也夀七十有五斂之日風雨晦冥室廬之後大木俱拔君子異之九年春正月壬寅奉柩葬于屏山麓堪輿家謂不利以某年月日改葬同里夏方之原府君孝友天至監簿君得痞疾甚劇府君泣禱上下神祇夜夢三士告之曰服二附湯當瘳已而果然厯十餘年方沒監簿君沒大母陳夫人年埀九十府君懼夫人之哀夙夜祗奉唯恐少咈其意夫人安之曰吾子雖亡不沒矣季弟甫齓出為伯氏後仲姊生四子而夫亡子絶幼茫不知所為計從父兄孤子凡三倀倀無所依府君皆鞠養教訓之使至成立且歸其産所入毫毛不以私其與人交一裁之以義郡守李章肅公倜聞府君為佳士禮下之李公後以誣免官其門可羅雀府君事之益勤别駕髙翔其知府君不下於李公及改守浮梁欲一見府君走書速之府君即日命駕既相見勞苦甚勤未幾徑上馬出城去翔聞之大驚追餞十數里且曰公能遠來何遽往如是邪府君曰既見君子不還將焉求翔歎息而去性尤仁慈振貧恤匱每不遺餘力臨川薑肅長沙談志仁盱江王旭皆顛沛流離數瀕於危亡府君能振之是三人者德之謂殺身亦不能報云府君容貌魁梧須髯如戟為文辭不務鈎章棘句而一以理勝當是時若吳文正公澄虞文靖公集皆海內師表每稱府君之賢不少置則府君信賢矣初監簿君著史學統紀一卷未及成而沒府君補完之府君所著詩文若干卷因自號唯庭遂以名藁吳公為序作者之意今藏於家府君娶義門劉氏克盡婦道前三十一年卒子男子三人長曰紹唯平陽州儒學教授次曰斯季曰魯承事郎祠部主事博極羣書而文辭龎蔚學者師之子女子一人分宜縣儒學教諭聶景堂其壻也孫男七人曰垕曰基曰壡曰均曰埴曰孰曰圭女六人長歸某餘未行曾孫男六人曰某曰某曰某曰某曰某曰某女四人在幼嗚呼聖賢之裔自北而南者若孔氏之於衢顔氏之於蘇於閩曾氏之於豫章皆多子孫而曾氏為尤盛紆朱拖紫以顯融于時在在而是常侍五傳至文定公鞏兄弟者出遂以辭章名天下何曾氏之多賢邪府君之先蓋與文定公同出于常侍奕世以詩書亢其宗府君雖不獲大用屢司教鐸蔚為經師達賢大官亟稱交薦可謂無負於家學者矣府君之葬翰林待制杜公本國子司業曾君堅既為前後撰銘刻諸幽室而魯嘗與濓同修元史夤緣交誼復來求隧上之文濓聞較德焯勤在古者不厭其詳故為表其行而益之以銘銘曰郕國傳道自孔門遺澤滂濊苖裔蕃有如大江從西奔支流雖千會一原重圭疊組光燉燉著勳昭德裕後昆夫君繼之如玉溫嶄然頭角譽彌敦目為二俊起繽翻三為人師教道尊書詩俎豆習禮文鄒魯其俗澆為淳自內而外本則存大木斯拔風霆掀人琴俱亡海氣昏學子攬涕為招魂刻文墓石揚清芬葉仲貞墓銘代栁待制作桐廬李驤龍嘗與武林葉禎交禎年三十時從父某來桐廬為釣臺山長山長君死禎貧不能歸驤龍為合錢豫之使賣藥市中以自給禎風神蕭爽不能隨世沈浮每遇月白風清輒同驤龍買舟泛桐江而下驤龍善洞簫禎歌古辭扣舷而和之或至忘返蓋飄飄然遊於物外者埀二十年而不知老之將至也禎一日病革憂戚莫知所為驤龍顧禎曰君非念後事乎有驤龍在君何憂禎喜力疾起拜曰此膝未嘗下人今不覺為君屈也竟不能食三日死驤龍為具棺斂買地葬焉後一年驤龍亦卒驤龍之從弟懋哀禎不娶而無子復合禎之所遺財市田二畝有竒入華林僧院俾立主以奉禎初禎善為學不治章句頗喜以詩自鳴翰林學士貫公甚器重之稍長習吏於浙西憲府部使者欲辟為屬不就天厯中有詔粉黃金為泥書大藏經禎以善書應募法當得儒學官亦不就蓋禎氣岸多豪一言不合輒徑去故卒無所成名禎字仲貞武林人無他族屬其世系禎未嘗言今皆不可知享年五十有四以重紀至元五年五月二十六日卒明年三月三日葬于玉塢山原去驤龍之墓不二百步葬後四月懋復為伐石來請銘昔粵謝翺以善詩來遊吳越間吾鄉岩南先生方公鳯實與之交翺死無所歸公為率一二友生葬翺于釣臺傍且刻碑志之其事與驤龍兄弟正相類豈聞公之風而興起者耶非耶先聖人嘗有言曰死於我乎殯驤龍兄弟蓋近之矣是宜銘之以詔後之人銘曰吁嗟葉生胡不恤汝家吁嗟葉生胡不就汝實而斂汝華使千載之祀一朝而墜豈汝之不自力抑命爾耶幸有仁人既殯且薶汝已歸骨於此矣豫尚何嗟吳子善墓銘濓之友吳中子善世家婺之東陽自曾祖某祖某父某咸為儒至子善益務讀書從里之大儒陳樵先生遊初濓謁先生太霞洞中先生曳杖微笑出迎坐濓於海紅花下俄呼酒酌濓先生自歌古詩奮袖起舞子善侍先生側目濓引滿以成先生之樂濓自是得與子善交後三年再謁先生復見子善時先生年耄重聼或有所問子善從旁書濓言以對及濓辭先生還子善送至山髙水長處坐石共語依依弗忍去自時厥後久不見子善聞子善獨奉母某氏居陋巷間雖無儋石之儲曽不少戚戚動于中每遇明月之夕輒鼓琴以自娛琴已復把筆咏詩弗輟濓竊悲之人往往窮則失守有若子善之為造物者必能昌之今年秋復求子善而謁焉則子善之死已三年矣嗚呼天者豈易知耶子善之固窮如是乃復使之早夭是果何理耶嗚呼悲夫子善通周易諸家説屢就試有司不中家益貧年過三十不能娶有一妾為生二子長某五歲幼某三歲子善母死未幾而子善又死二子蓋惸然可念子善之友張良金韋編蔣偉器率諸好義者既買棺以斂子善復用羡財贍其諸孤子善得年四十生於皇慶壬子某月日卒於至正辛卯某月日以某月日同母葬於縣南二里薑原蓋潘逵所指地也葬一年偉器來謂濓曰子與子善頗交久盍為銘嗚呼濂尚忍銘吾子善邪昔孟郊殁貧無以葬其友樊宗師為告諸嘗與往來者經營喪事且以餘資給其遺孀昌黎韓文公與交遊甚洽實為銘其墓今觀子善之事固不能盡同其交友之所盡心者則蔑古今之異也濓雖無昌黎之文又可無一言慰子善於地下也嗚呼悲夫銘曰孰使子材孰使子窮又孰使子年之不豐彼蒼者天曷其夢夢一氣悴榮或繫其逢我作銘詩以弔其凶以哀其終以揭其封鄭仲涵墓銘嗚呼自道廢民散之後世之為師弟子者朝離書帷夕若秦肥之視越瘠比比而是有如仲涵之於豫義則師友情如父子也仲涵之死豫寧得不哀乎仲涵初年學舉子業把筆為文春葩滿林色澤明鮮而生意津津敷暢豫思仲涵必先登再踐場屋皆不合有司繩尺仲涵歎曰吾惡用是為哉乃棄去益潛心秦漢以來諸文章大家無所不窺亦無所不辨畜之既深發之亦盛商敦周彞藉以五采五就陳列天祿石渠間人見之者雙目輒暈眩仲涵復歎曰吾惡用是為哉又棄去取羣聖人之經而燖溫之窮其道德性命之祕質於濓洛關閩之説久之充然如有所得仲涵復歎曰車成矣輪轅美矣不行何以涉於遠道乎益思明體而適諸用母夫人病逾年仲涵保抱扶持終日不離側夜則泣禱于天請以身代忽臀患惡疽不能坐跪鍊藥劑以進膝為生胝夫人病革思食西域瓜既食而卒仲涵見瓜終身弗忍食因懸懸念母不置氣鬱結弗舒遂得瞶疾逮居父喪拊膺悲號絶而再蘇者數四杖而後起服雖闋凡遇諱辰却酒肉弗御者七日至期哭奠如初喪癸卯之夏諸暨戍將謝再興以城叛浦陽與諸暨鄰壤訛言冦且至羣從兄弟皆避地東陽或移金華是年冬冦壓東陽囊橐皆無遺仲涵時在金華聞之泣盡持所服衣衾往分之雖身罹寒沍不恤也從弟澧與妻蚤夭三女傫傫然無依仲涵鞠育盡道各選名胄而配供張之豐逾於己女仲涵家義居十世族屬頗衆或有疾不擇疏戚夜必四三起視遇有死喪急難不顧利害身任之至於周旋事為之間條理粲然必期於集且不與人較曲直或以非理相讓但俯首默受而已其在內之行如此達之於其外者尤夥也蘄春王烈家燬於紅巾帥其族五十乞食浙河之右仲涵館之數月而後去同縣騷人貧不能養母來訴於仲涵仲涵曰吾何無母可養邪厚周之仲涵負笈從師道遇十餘人襁負其子且行且泣試叩焉則山水暴溢室廬漂沒欲求給縣大夫不食者日再周矣仲涵亟傾篋中錢與之村氓王氏患多男子仲涵至其家聞兒啼聲甚悲蓋氓將溺之於水仲涵為陳父子至情且惠以粟氓大感悟生之並舍三里所溪流湍悍遇雨則人蹤絶仲涵造舟渡之金華洞溪其悍為尤甚舊有石梁久壞而弗葺仲涵捐白金八百一十銖為倡衆翕然而和未幾而梁成當夏五六月赤日流金道多病暍者仲涵設湯茗濟之冬大雪仲涵晨出見寒士衣不掩脛齒相擊下上仲涵呼酒飲之爇火溫之乃解自衣纊裘為贈又嘗禱於廟寡嫗困卧廟門無衣愈於寒士仲涵與妻周雋謀製衣一襲與之凡納交仲涵者無不曰此古仁人也或又曰其內外行如一者哉仲涵自試藝不中遂不復有仕進意有薦為玉泉書院山長者仲涵辭不就及入國朝會求賢之詔下郡府絡繹致請仲涵輒以耳瞶為辭已而部使者趙君夀奉旨搜材浙水東以薦紳交譽力迫仲涵就道仲涵冠帶謁君辭意悃欵君察其誠也不敢強仲涵稟賦孱弱雖癯然若不勝衣而其精神緊峭矩度峻整人莫不親而愛之其於倫品之間歡然相聚睦然相惇有如春氣流浹不知泰和之襲人也性雖好施與絲毫事必咨稟於長者不敢私奔走兵燹中人見其袖二書以行頃刻弗少離及事平還家取而視之乃宗譜家範也仲涵所著書有遂初齋稿十卷續文類五十卷藏于家嗚呼仲涵之死豫安得不哀乎初豫讀書浦陽山中仲涵即從余遊先後十有餘年豫初無益於仲涵而仲涵之相助余者恆多時豫執經山長吳公待制栁公侍講黃公之門仲涵每侍豫往拜三公見其文亦以逺大期之自時厥後人事不齊不聚首者數載及豫赴召總修元史與仲涵約曰子非青年矣豫春秋亦漸髙行當俟汰而歸與子婆娑一丘一壑間聖賢心學之祕尚相與窮之史事雖畢復待罪禁林留南京者四年仲涵忽不逺千里來見且申前言豫諾之而未及踐豈意仲涵先豫而逝乎仲涵之子楷自為狀來求冢上之銘其詞纒綿悲愴尤足以動豫之哀思每一讀之淚澘然下所以久而不能成文雖然豫於仲涵忍不抆淚而言乎昔者徐仲車以孝行著稱惜以聾廢而仕不大顯君子以節孝諡之今仲涵之事無愧仲車者也宜私諡以貞孝處士勒石墓門而埋豫文墓中庶幾少慰仲涵於九泉之下乎仲涵姓鄭氏淵其名也其先世遷徙之詳見譜圗記曾祖德璋宋青田尉祖文轟父巨母周氏配室即周雋生一子楷也以文學稱女二一適吕堂一未行孫一耀生於元泰定丙寅九月十三日卒於今洪武癸丑正月十一日夀四十八以其年某月日葬某山之原禮也銘曰質圭璋兮絺繡文既姱麗兮又栗溫宜參雅樂兮獻明庭胡淪巖穴兮鏟其英匪進則退兮道之常保家肥兮譽彌章民同胞兮勢弗殊使我心惻兮軫寒與飢少微煌煌兮雲掩之隂雲英英兮又不能霖前何古兮後何今思美人兮涕泗沾襟東陽貞節處士蔣府君墓銘府君諱玄字子晦别字若晦姓蔣氏初周公庶子伯齡受封于蔣子孫氏其國在漢居杜陵者最著兖州刺史詡尤有名詡四世孫山亭鄉侯澄徙居義興之陽羡澄七世孫樞仕晉為吳郡太守復南徙台之仙居唐末五季之亂樞裔孫勛避地婺之東陽仕吳越錢氏為金紫光祿大夫檢校司空兼御史大夫遂家焉府君蓋其後也曾祖諱天廙宋紹定中入粟佐邉授迪功郎祖諱沐元南康路建昌縣主簿父諱吉相少俶儻負氣嘗事仁宗于東宫擢典用監知事出為襄陽路榖城縣尉以卒府君生于燕都兒時嶷嶷嶄聳不妄狎笑八齡就師讀書終日據案端坐未嘗旁顧其師竒之使察諸生怠肆者諸生畏憚斂戢莫敢譁年十六侍榖城之官杜門絶賔客不交晝夜攻學母夫人閔其勞節膏油不多與俟母寢以衣衾蔽牖而誦夜參半乃已榖城蒞官剛嚴府君因事進諌多所匡補出遇其吏民恂恂退抑人不知其為尉子也既冠而歸時許文懿公謙以道德為學者師府君從而受其説識悟過人辨析精確內涵外飭日超月異先輩皆自謂不及然府君務見躬行以禮齊其家奉先祠謁拜祀奠取朱子所修儀文行之歲時率族人祭始遷祖墓祭畢序長幼列坐告之親睦之道屬之近者朔望必會貧者歲周以兩月之粟修建昌所創義孰延師教其子姓至於鄉人每歲冬至殺牲置酒會長老俊乂行鄉飲禮府君為之講説嘉謨偉行使聽之曰為父兄子弟當如是鄉民莫不化服細民窶者貸以粟不取其贏待以炊者常數十家東陽多宋貴臣族民藝其田者既入粟半復畝徴其絲民頗苦之府君倡其鄉人曰君子以養野人奈何厲之遂罷不徴人用是德府君稱其善不虛口遇事無大小皆立決不形於謀議所為輒出人意表初延祐中惡少結邏卒誣平民為偽鈔破其家意府君儒生可侮以語撼之冀得賂乃止府君怒走白大府逮惡少置于法害遂絶由是宿豪文吏搖手相戒不敢過其門府君益刻苦為條法使後嗣可守室廬械器皆預為數世計各極其精善人服其才而惜其不獲施于世也府君饒於資産脫去華靡習聚書萬卷致力其中著四書箋惑大學章句纂要四書述義通若干卷治平首䇿二卷學則二十卷韻原六十卷府君懲士習日趨流俗獨製古冠衣服之揖讓步趨必以禮法人望之神情夷朗如逸民髙士及即之則雍然和與之語出仁入義愈久而愈無窮年四十有七以至正四年六月辛酉終于家學者私諡貞節先生十二月壬申葬縣南乘驄鄉御史里馬塢之原娶葛氏宋參知政事端獻公洪之玄孫子男四人大同興宗嘉亨允升女四人適葛實李觀及東陽儒學教諭李思文其一蚤卒孫男十人昭暉旭曄升昱昺昻景杲孫女二人適許益亨鄭格曽孫男五人鈞鑾鎕鎮某女三人允升嘗從黃文獻公溍逰有文用薦者授慶元路儒學正早死而二次子亦繼卒獨大同存善承其家學以故國子祭酒許元狀來請銘余未壯時嘗拜府君于家炙其言語儀貌儼然成德人也蓋今四十年而余亦老矣銘烏敢辭銘曰柏之丸丸或朽于山堂之巖巖或病于顛天産其良不需其完人愠以咨我恬以安探聖之源揚道之瀾不諧一時千載之傳鄭楫墓銘浦陽鄭楫少凝慤寡言能暗誦易詩書論語孟子稍出為詩歌可觀先生長者能之為加布其首字曰叔通年二十至正丁酉三月辛巳以病熱亡四月癸酉葬仁義里三角山其父濓哭之慟來謂豫曰楫也幸從先生遊先生謂為可教竊意其能亢吾宗今不幸死矣先生儻不死之盍為銘豫聞亦哀不自勝為著銘曰父母生子孰不欲望其成矧如楫之秀穎者乎今未出弱齡而遽霣魄泉下可悲也哉可感也哉唐思誠墓銘嗚呼吾思誠其死矣乎吾婺稱東南文獻之邦十數年來故材已霣而新秀未茁所以承前而引後者當有其人而思誠其可死矣乎嗚呼初濓年十九時來書遊城南識思誠於玄暢樓上思誠長濓僅三歲濓見其斂容端坐辨嚴光陶潛優劣厯舉傳語而以義裁之衮衮五千餘言濓雖慕之意思誠或致力於斯故知之為獨詳他固不能皆然也自是以來日與思誠親當風氣曣㬈賔客滿坐或觸其談鋒而思誠岸幘傾吐愈詰難愈見不可窮有來求詩若文者肆筆而成不事塗竄如春雨方滋宿葩雜芳不擇地而發思誠未始有自矜意且曰文以達吾言何以工為濓益慕之然猶謂思誠信竒士世之敏洽者將能之而未知其充積於己者果何如也後五年濓從淵穎吳公遊越而思誠以亷訪副使暢公之聘講授淮隂思誠搜剔經髓意融而言隨之聞者爭聽户外之屨常滿一時寓卿若辨章左公翰林承旨張公參知政事韓公皆忘其勢與思誠交聲華張甚及思誠自淮隂還會濓客錢塘上思誠竭蹶來訪濓欣甚出醇酬與思誠飲爇火夜宿相與辨諸子是非凡九十種餘及僻隱緯候之書又數十家濓時血氣未衰尚能記憶思誠各厯舉疑以問濓頗厯誦其文而對思誠抵掌於几曰君之精博一至此乎吾每見君言呐然不能出諸口又何善自閟藏而文采不露乎吾之強記不下於君第恨無書可誦陳氏書録之所記者吾唯能了其三之二耳濓聞思誠言遂以所疑者反質於思誠思誠答之如撞巨鐘隨叩隨應嗚呼自科舉之習行為士者趨辦目前一遇有問舌拄齶不得發孰有髣佛如思誠者乎而思誠方恥以自名又曰吾學不徒博徒博陸澄之書厨爾吾則藉之以窮理而施諸事也濓極慕之始知思誠之學期明體以達用而非獵襲以給談辨者也後十年濓既歸隱小龍門山飲水著書以樂先王之道不復與世接而思誠用部使者之薦擢金華縣教諭丁外艱不赴再遷衢州路學録亦未及上忽創發下體大熱如蒸焚已而增劇遂卒時至正丁酉八月十七日也濓方避兵勾無山南思誠之沒不及知暨知之而思誠之骨已入土久矣濓奔走西東弗能絮酒一酹墓下思誠之弟懷敬奉門人徐孳狀以墓銘為請嗚呼濓其尚忍銘思誠乎思誠幼而穎悟未就師傅已略能誦詩既長受業于文懿許公不出户者十有餘年而所造極深六經百家之説無不究之雖名物度數之微亦皆訂核其同異大抵其學以濓洛諸儒為宗故粹然一出於正武威余公持節海右深慕思誠之學特傾下之余公善大篆或請書揚雄九州針者余公不知所出思誠曰此載在古文苑即援筆寫之後覆以其書不差一辭余公為之驚服思誠天性孝友處己接物簡易平直無矯情之行自幼至老劬書不厭善字學得虞伯施之法嘗手録諸家異書亡慮數百卷又凡所讀之書輒撮其諸凡而附之以論辨名曰破萬總録録一千卷外有六經問對若干卷鉤玄集若干卷書學指南若干卷存齋雜稿若干卷皆藏于家思誠諱懷德思誠其字也姓唐氏唐為金華著姓宋南渡後擢進士第者十有七人其與鄉貢舍選及曹試童子科者莫可勝數而傑然出乎其間者世稱説齋先生先生諱仲友天分絶人書經目輒成誦遂以學行名天下由紹興甲戌進士中博學宏詞科召試館職纍遷著作郎迭守名藩更秉使節終官朝議大夫思誠先生七世從孫也人竊意思誠問學之富似無忝於先生君子之澤其未艾也當於思誠乎徴之孰知一文學掾之䘵有不能食况望如先生烜著于時乎此濓反覆嗟悼而不能自己者也雖然先生之名其埀之於今者以學不以位也位勢之隆可行志于一時學術之殷則遺芳於千載今思誠雖死於困窮而其所著書具存其不與形俱亡者固自若也惡知後之人不以稱先生者稱思誠乎濓又何悼焉姑厯序相知之次第以告世之知思誠者思誠曽祖欽祖津父琰孫皆不與仕籍卒年五十有一娶金氏五丈夫子升賁晉恆震女二申戍汪道演其壻也孫男三道堅無逸梓材墓在縣北婺女鄉之陽岡以其年十月某日葬銘曰孰為嶢嶢而不昭昭孰為詵詵乃復焞焞二氣糾紛莫知其門有遺者文煜乎霞氛訇乎霆奔不泐以堙不軋以髠後千百齡其永存徐夫人墓銘婦德以柔順為美然以之處常可也茍無堅凝之質事變臨之其能自立者鮮矣故持之以堅貞行之以柔順斯足以為賢婦偏一則有虐妄縱佚之失焉若徐夫人者其備婦德者乎夫人姓余氏衢之開化人年二十適邑士徐君安越十三年生四子徐君死舅姑皆老家莫為主資産頗傾蝕夫人日奉羞膳升堂問體安否退則率媵妾治絲縷麻枲歲時機杼之聲聞于鄰里衣服諸子務臻華好青褎綵襟少長嶷闕人不知其為孤年七八歲委之於學慈嚴兩至責其成績由是諸子咸為善士而家迄以成舅姑相繼夀終治喪葬以禮鄉人暴強者皆畏其能莫敢凌犯教女語婦必以夫人為則年七十有八以洪武九年九月七日卒于家二十三日葬于清源里西村之原三男曰祿可詵一女適某孫男五人玄孫林璣桂生以國子生擢給事中來請銘銘曰柔順為德斯婦常濟之堅貞家乃昌執偏或墮弱與強二者維全保無爽猗徐夫人婦之良喪夫秉志事尊章內外屹然禮義防躬親織紝靡怠荒家政浸修資大穰男治書詩女衣裳夀彌德備名譽彰孝孫刻銘闡幽光卓哉婦則埀無疆故朱夫人戚氏墓銘夫人姓戚氏諱某字某婺金華人宋朝奉郎知袁州事如琥之曽孫從政郎廣德軍司法參軍宋祥之孫貞孝先生紹之女年若干歸義烏朱君元踰若干年喪其夫三子皆幼時宋亡為元盜起旁縣焚廬舍剽劫家單甚夫人艱勤悲悴事舅姑無怠容遇諸子有恩而嚴少子嘗戲取人一雞卵夫人怒曰是乃所當取耶笞而責還之稍長遣從許文懿公遊督教愈於夫在時粥叉釧資之俾無倦懈父老病殊殆迎以就養烹藥進食不寐者三月留十年乃終不以喪葬纍兄弟出私資為具女兄歸朱氏蚤死夫人育其三孤兒長兒亡又撫循其男女為擇名族嫁娶族女貧不能行者必以貨助窶家得子多溺死以倫理訓誘俾勿溺資以粟帛里中人德夫人如慈母夫人與娣姒和視娣姒子猶己子御媵婢仁而威聞夫人謦咳咸肅畏譁者止惰者執業以俟久而知其可事多終身不忍去夫人春秋既髙三子冠裳翼然須髮頒白升堂奉觴以次為夀諸婦孫男女數十人列侍左右歡愈竟日年八十時姻連賔客慶問者以千計夫人讀書史為人言皆有詞采可稱述夀八十有七猶康強不衰旦起盥櫛召子孫來前曰吾殆死矣就枕熟寐日晡遂卒至正丙戌五月九日也十二月某日遷朱君之柩合葬某里東山之原三子長曰震亨有學行人尊之曰丹溪先生次曰巽亨次曰蒙正皆善士孫男五人嗣衍嗣洪嗣紀嗣湜玉汝孫女十人皆為巨室妻曽孫男二人文柏文椐女子三一適人其二在室夫人卒三十五年嗣紀以狀拜泣曰夫人於朱氏為賢母宜得銘余曰嘗聞丹溪言信然丹溪學可師法觀丹溪可知夫人賢觀夫人其子之賢益可徴余奚讓銘曰詩稱賢知多本母氏史傳子輿三遷是紀仁猷義訓與性皆成導之為善川赴木升少閼其端愈長滋戾曷若夙教圗難於易有儒丹溪行介德方匪惟師承惟母之良祗率慈惠具有典則尊章歎咨遐邇遵式黃髮朱顔眉夀樂康環珮紳緌秩其盈堂善慶孔多澤則在後後人勿忘碩儒之母故王母何夫人墓銘門人王綬喪其母夫人何氏衰衣稽顙求造墓隧之文豫與綬之父翰林待制君學為同師官為同朝揆義不可辭夫人諱妙音婺之義烏人大父仁父智母傅氏父早世傅厄于窮重醮金華俞氏俞故名閥夫人隨母鞠其家逮長大父器之撫其頂曰是女柔嘉其凡子儷耶時同里初齋王府君良玉家居講授受業者百人大父為夫人擇配環視諸弟子心自計曰無有出王禕右者禕即待制君府君之仲子也府君揣其意乃命行媒相知名片言成姻夫人既歸事君舅君姑甚恭待娣姒一以和勝三族競誦其賢待制君方從黃文獻公學絶不為家謀夫人挺身任之不以一髮貽其憂待制君能以文辭鳴海內者夫人之助為多待制君出佐方州入官禁林恆挾少房與俱夫人安之謂世之當然自後待制君持節諭西南夷六載不返夫人攻苦食淡煢煢然與二子綬紳居歲時具牢醴祭王氏祖若襧奉巵酒前酹命二子拜後曰我王氏老主婦也禮則宜然聞者為悲之夫人訓二子成人且為授室抱二女孫宜定宜亦許適豫孫恂夫人猶日治絲枲不廢經畫內政斬斬中度雖偉丈夫有所不能由是家寖裕然以待制君久未還積憂成疾羣醫不可藥紳䀌為心傷亟刲股作糜以進竟不愈洪武十年二月十一日遂沒夀五十六其年十一月二十八日葬于縣南崇德鄉青巖里之象鼻岡禮也嗚呼若夫人者其盡為人婦為人母之道者乎銘曰夫學方𢎞婦德維貞同聲而相應也雞號而興絲枲作朋克勤於內政也青燈宵明顧影惸惸能安於義命也國史著銘焯行幽扃欲其辭之稱也故金母翟氏夫人墓銘洪武乙卯七月三日故金母翟氏夫人以疾卒于南京之寓舍夀七十六卜以其月二十四日奉柩還葬故居無為州巢縣之槖臯鎮其子朝興既備書卒葬歲月刻石以置玄堂復介豫友錢顒狀其羣行請立銘於墓門按狀夫人世居無為州城偃月池上今遷於槖臯父大成巢縣稅務副使母徐氏夫人自幼溫醇莊重嶷然如成人父母有命毫髮不敢違事姊若兄亦盡其愛敬之道故一家竒之皆言慎擇所居不可與凡子年十六始歸同縣金君斗輔今封鎮國將軍僉大都督府事夫人既歸孝養舅姑甚至婉愈其容色唯恐有咈其意晝食之間未饋食不敢先飯或遇有疾具鼎烹藥齊嘗而後獻其於四時祭祀之禮尤謹祭器必親滌濯瀕祭心存目著儼乎若有覩者助鎮國公以節儉植家凡為伉儷者六十年相敬如一日未嘗以片言相加遺人以為難遇諸內外姻族一循禮節若鄰曲若傔媵亦皆有惠恩故稱夫人之德者無間言生子男四人長溫次良次恭皆先卒季即朝興驍勇而有謀當元季兵亂四海鼎沸歲乙未從皇上渡江與諸將削平江東取淮浙下湖湘定中原收西蜀十五年間與有勞烈遂由同知振武衛親軍指揮使司事升為本衛指揮使階昭勇大將軍改鎮國將軍僉大都督府事於是司勳援例上聞夫人致有今封鸞誥賁臨人皆為夫人榮不幸以一疾終嗚呼夫人其飭躬也儉其奉上也孝其事夫也敬其迪子也嚴其使下也惠五者備矣其無愧婦道母儀者乎銘曰葆貞則兮循天經叶篤孝敬兮奉尊章親滌濯兮慎蒸嘗事夫以敬兮終身不爽叶子為武臣兮從征四方斬將搴旗兮紀功太常鸞誥自天兮煜其寵光夫人雖殁兮令名不亡槖臯之原兮山秀水明叶太史作銘兮薦此石章故寧海郭君妻黃氏墓銘天地之間為人倫之綱者有三曰君也父也夫也君統臣父統子為綱固宜妻與夫齊亦以繫之者何蓋夫者婦之天婦能尊夫夫能統妻則倫紀修明而家政嚴飭不然則反目之禍作而斁諸之事起矣其有生能敬夫如賔歿而服喪若父者孰不謂之賢哉豫於寧海黃夫人之事不能無所感也夫人諱珍生有淑質父某與其母王氏絶愛之年十八歸同里郭君仁夀夫人尊之甚異動靜必遵稟而行毫末不敢欺內外諸政率皆親蒞雖甚勞勩弗憚君好賔客朝夕酣觴淋漓談辨以為適家單不能備物夫人極意營集不使知窘澀之狀君一日入台城歿於旅邸夫人聞之慟絶者數四及靈車至庭撫棺一號遂暈眩仆地幾欲無生以湯藥灌之移刻乃蘇治喪一循古禮布苫柩側取石為枕不解衣而卧者三月石有稜當枕處肌肉成創創液浸淫其子泣爭欲以木易之不許三年弗御酒肉柴毁骨立與人言則曰未亡人未亡人未嘗有愈色或曰孝子之喪父其有過於夫人者乎或曰夫人之事夫固至矣其於君舅君姑殆有過無弗及焉事舅姑固孝矣其在家也善奉父母亦有過無弗及焉其後父母無子而終相夫卜宅兆瘞之哀慕至老不衰若夫人者豈古之所謂無愧人道者非邪嗚呼位極三旌有不足榮也祿盈萬鍾有不足貴也名傳四裔有不足多也此權勢者可僥幸而致也惟夫制行可以厚人倫可以移風俗古今人莫不多之貴之榮之亘天地始終而不可泯也其不可泯者非有增三綱九法之重者乎夫人之事烏可使之不傳乎夫人夀五十六卒於洪武己未正月二十三日以其年某月日葬於某山生子四彌逺濬俊女一適傳士常孫三女二豫在京師濬為太學生嘗從豫遊以文學知名于時濬來請銘銘曰振其綱萬目乃張卑尊而有常庶各循乎降衷叶茍反于斯維家之殃懿哉夫人厥德允臧可以重彞倫而樹世防彤筆煒煌特以昭其藏陶先生妻喻氏墓銘嗚呼是惟當塗陶夫人之墓夫人馴德淑行自幼出天性父母異之曰是女也良非凡子配也慎選久之始嬪同郡陶先生安姑徐氏方毅以禮束羣下不可越尺寸雞始鳴夫人往候起居察顔色薦羞能獲姑心姑病皇皇不自寧力茍可致無弗及者暨卒先生適以使事留淮夫人襲斂殯奠無違度晝夜慟幾至傷生人稱為孝婦先生沈涵道藝以千載自期夫人恐以家汩其志凡內外政皆身服之不以勤先生先生之名聞于江南者夫人有助焉先生舉進士州人士無少長咸賀夫人不喜色或怪之夫人曰夫君所滋者德爾名非所急也及為校官問道考德者接武而至夫人則館之如未嘗貧春秋之祀盛服事滌濯不役媵御及祭升降周還精誠迫至若欲見之恆居不施丹鉛不服金鈿翡翠綺繡物後其家雖盛夫人處之猶前貧時女弟四皆適閭右族歲時來歸各為靡曼飾相夸漫夫人唯御常服充充無歉容喻宗譁曰是祗専靜嘉者也諸婦今得師矣人稱為令妻訓二子動靜必以學稍涉豫怠正色訶勵之偶見奕器于匭怒曰此牧豬奴戲耳汝為名家子亦復爾邪畀之火二子因惴栗自持遂以學聞人稱為淑母先生將移家秣陵夫人不忍獨其母且虞有兵禍力迎與俱母以耄年辭夫人泣曰世道方棘唯髙城深池可倚耳母從之其族果及於難人又服其有先識云夫人諱德常字可貞姓喻氏喻為當塗名門曽祖某祖某父汝政母梅氏二子則晟昱也孫一墉夀四十七以某年月日卒卒後十日權厝江寧縣陶家山之原嗚呼自先王之教不行公卿大夫多涼德以名勢相衒以利祿相媒頽波滔滔日流而弗返况所謂女婦乎有如夫人羣行之美可為女師可為女範蓋於古而無愧者又何可少也昔劉向傳列女八篇一事之善唯恐泯沒無傳使夫人生丁其時名有不著者邪銘曰夫人之行柔且則饋祀潔齊家政飭補紉浣濯亦盡職紛華弗御食儉德內外順治夷以懌栗而能剛類圭璧羣女從之視為式夀年不遐聞者惻先生祿位日赫赩玳首錦櫜書五色龍光當臨賁幽室史氏作銘示罔極文憲集卷二十
