body:
  text: 文憲集卷三十明宋濂撰贊凡三十九章文右相像贊才優德純山峙玉溫重厚可以鎮俗仁恕足以澤民或陳經術而侍青坊或秉霜簡而立紫宸終受知於聖主宅右揆而相秦深沉有謀真潞國之裔剛毅忠信誠絳侯之倫觀其屹立不動正笏埀紳猶可作懦夫之氣而褫邪佞之魂嗚呼此所謂邦家之重寶廊廟之大臣也歟婁貞公贊原武婁宗仁當天后政嚴之時獨以寬厚聞其弟守代州宗仁教以唾面自乾至今為善者師焉因贊之以自勗贊曰我言之恌斯辱之招我行弗足或貽其辱二者無失其至由外內省不疚我則何罪我面彼唾乃彼之愆我何潔之正使自乾孰忿自乘攘袂而閧孰量之𢎞受詬如頌是非茍繆不亦殆而微公之師吾誰與歸陸秀夫像贊身抱龍髯兮眼不見水鳳闕雖遐兮龍堂則邇玉雪皎如肯汚泥滓赤日出海兮爾心不死滕奉使贊齊人王蠋有言曰忠臣不事二君烈女不更二夫女之從人一與之醮當終身不改譬之白璧小有玷辱人將斥去而不之顧臣之事君也其理亦同故蠋特並言之事兩夫者雖辨如虞姬智如鄧曼吾知其決非良婦事二君者雖功如汾陽才如西平吾知其決非良臣嗚呼使此義昭如白日人臣安肯懷二心而國安有喪亡之禍哉東陽滕茂實當宋靖康初以太學正與僉書路允迪奉使於金議割三鎮太原尋奉密詔據城不下金人怒囚之雲中欽宗北遷茂實謁見涕泣請從行主者不之許其後允迪南歸茂實獨留雁門終身不再仕臨沒令以黃幡裹尸而葬仍刻石識云宋使者東陽滕茂實墓此殆不事二君者歟當是時有宇文虗中者亦以黃門侍郎使金見留遂改節易行反面事讐其後雖欲奪兵仗南奔而自贖卒亦不逃君子之議其視吾茂實果何如也茂實已矣人至今想其遺節如神龍不可得見至視虛中輩不啻若鬼蜮犬豕有識妾婦亦羞聞之此無他人心天理終不可誣也乃作滕奉使贊用規事君而有二心者贊曰漢有蘇武奉使不屈滕公配之有聲烈烈黃幡裹尸以全臣節如璧之白弗緇弗缺其人雖亡而神不滅上遊帝所凌厲日月降臣見之肝碎膽裂敢述贊辭勒在貞碣東陽十孝子贊十孝子者皆東陽人其事載於郡乘為詳豫讀書之暇因採其昊天罔極之思而為是贊以風世之為人子者秦顔烏東陽人古有醇孝厥姓惟顔父喪未葬行泣道間我畚我鍤是薶是瘞彼羣烏何知銜土豫助我冢既封烏吻血流感爾異類愧我同儔秦風日漓借耰鉏而德色誰意霠雲之四蒙見此皎日千載之下禮憲淪胥豈獨愧君烏亦不如有廟嚴嚴春秋是祀用興薄夫作孝子吳斯敦東陽人有孝者斯峴山之阿父罪當誅兒心奈何自非吾親盍從生我我寧隕身父死其可九關峩峩虎豹齗齗泣血上書願易以身王用爾恤卒全父命更旌爾門風彼不令池波奫淪宰木扶疏清風肅然過者下車晉許孜東陽人嗟嗟許生實孝于親胡風木不停遘此難屯輤車既載負土築墳我親我􅀈敢曰勩彼鄉民手胼足胝我不為辛巾笥猶存几筵不改惕然念之吾親何在秋霜凝凝春雨湄湄父兮母兮得母苦寒與飢兒既不可見寧不念兹天高可極此情罔極鹿獨不閔我觸我松柏嗟嗟許生厲志不移終身之慕於子見之唐馮子華東陽人緬彼孝馮綰廬墓傍思親不見欲與俱亡白月寥寥悲風四起蒲伏號呼哀徹心髓天錫嘉瑞慰我孝思有皎斯有斐斯芝孝馮曰噫吾焉用汝九京莫興百瑞奚補唯爾孝子樹我世防雖歷萬祀厥德彌章自公之亡肖公者幾茫茫堪輿孰非人子唐應先東陽人卓哉至行衆人所難眷我應君抆涕汍瀾親之云亡中心咽塞雖草生髮間何暇束櫛昔處膝下其樂泱泱今我來思舉目但見白楊彼蒼者天曷不我惻茍可從之我生奚恤爾心之苦爾行之優雙闕峩峩卒承天休唐唐君佑東陽人唐氏之子以孝行聞死生一節弗岐弗分唯思親不置鞠明究曛誰無父母以樂以愈今我何罪獨行次且我罪之深我宜隕墜胡獨使我親先彼朝露昊天不弔直至于斯渺渺音容如何勿思官用褒旌封闕在舍匪私爾一人式勸來者陳太竭浦江人浦汭之間有氏曰陳親沒居廬衰麻終身心勦形瘵杖而後起一氣如絲去死無幾朝哭如吞莫哭尤不忍聞松風翛翛林鳥嘐嘐來助豫之悲號遐思弗寧起奠我爵果肴在前烏鳥為之不啄世瀦失防頽波滉漾我思古人古人焉往宋董少舒蘭溪人有倬董君父以令終躬負厥土馬鬛其封四郊無人夜寒如水黑飇潛興如臨神鬼董君出廬擁墳撫膺念父寥寂長哀無聲日兮月兮能照下土寧不閔我最苦願亟入九泉奉我父母靈芝煌煌駿發爾祥蓋紫幹黃於燦其光有焯董君德聲斯不亡宋金景文蘭溪人濲水之州三山之坡下有孝子孝如之何父疢在首籲天請代願萃豫身我親罔害母棺未窆執􅀈以前天光下爥五色粲然五色粲然未足為偉怪雹獰風勿犯其里茍匪中忱曷以臻此綿代是師於戲孝子宋賈南金金華人孝道之𢎞百行所生誰與賈氏實敦古風生弗離親殁安可棄忍令親之玉體為泉扄所閟晝雖不可見接以夢寐夢中相見宛其未死覺後求之寒燈在几得不慨兹澘澘墮淚眷爾孝德閔我章逢梔蠟其貌黼黻其躬父子相軋或不相容我述贊辭用發民衷許魯齋先生贊濂洛之學傳自武夷重徽疊照日星昭埀逮我許公尊聞行知若親摳衣寒泉之麋張皇幽眇釐析毫絲如臯陶淑問畢其情辭如后羿注矢不失其馳既入閫域遂升堂基橫經胄監襟佩鏘如袪其人私牖其天彛釋其偏岐挽其九衢德成財逵昭用如時黼黻帝治甄陶泰熙明體適用公實庶幾無德弗報四海祝尸嗚呼許公百世之師劉靜修先生贊先生之心嶽鎮川澄先生之操玉溫石貞先生之學寤寐六經岐陽之鳳魯郊之麟和氣襲人盎然陽春發周孔性情挹其深醇或出或潛與道周旋九原可作吾為執鞭吳草廬先生贊紫氣蟬聨神物蜿蜒有開必先山川降神自元而貞篤生哲人慎斯勤斯絶乎等夷於道早知厲如秋霜煦如春陽何德之昌抱膝而居氣蓋八區閼而弗舒玩心神明操觚弗停輿衛聖經學徒是依毛之有麟甲之有龜㪺其淵沖以消吝封心熙氣融大明當軒留聘益尊施教成均北許南吳先後合符人文之敷大明太史金華宋濓贊虞文靖公像贊朱眀之墟離火降精也丹鳥褵褷為駕綵軿也手握化樞人文昭明也補帝袞衣五色熒熒也上凌霄漢下燭九溟也無幽不啓無芳不榮也頓挫萬彚配合三靈也獨騎元氣棲神窈冥也之死弗沒隨物流形也凝為矞雲燦為德星也琬琰所勒鬼祕神扄也命世之材一代之英也先師內翰栁公真贊偉貌長身端嚴若神即而就之煦然春溫海濶天髙莫窺覘其宏度霆奔飇竪莫驅駕乎雄文來趨蹌之襟佩作儀表於薦紳出入容臺振百年之禮樂昭宣帝制煥大號於乾坤惟其具該博崇深之學所以繼光明俊偉之倫仰瞻遺像有涕沾巾儻使泉臺之可作庶幾士俗之還淳門人具官宋濓拜讚吳山長像贊原道書院山長吳履豫之異姓弟也人之評履者一則曰履善屬文其嚴簡嶄絶處類秦漢間人語迫而視之有淵光也一則曰履自幼沉酣羲獻中行草書皆入妙品如寶劍舞空光芒疊發芙蓉出水態有餘妍當與鮮于大常齊驅其得意者或謂過之其知履僅若此至其尚風義赴朋友之急不顧水火雖古人猶難知之者未必能知履也因贊之以白履行于世贊曰若人者其古君子之徒與聞人急難即欲赴之力縱不及心懸懸其如飢水火在前幾若弗知輾轉不寐而長夜以思世滔滔而莫察吾獨探其隱微彼以藝文為矜衒者其相知也不亦淺而若人者其古君子之徒與石巖林先生像贊冰霜顔面鐵石心腸持斧七閩百壬斂藏神眀之政淵源之學其人雖亡清風猶昨溟涬生贊有序溟涬生者旴江廖應淮海學也抱負竒氣好研摩運世推移及方技諸家學年三十遊杭上疏言丁大全誤國狀大全怒中以法配漢陽軍生荷校行歌出都門道傍觀者嘖嘖壯之抵漢江濱遇蜀道士杜可大揖曰子非廖應淮耶生愕然曰道士何自知之可大曰宇宙太虛一塵爾人生其間為塵幾何是茫茫者尚了然心目間矧吾子耶然自邵堯夫以先天學授王豫天恱天恱死無所授同葬玉枕中未百年而吳曦叛盜發其冢得皇極經世體要一篇內外觀象數十篇余賄盜得之今餘五十年數當授子吾俟子亦久矣乃言于上官脫其籍盡教以冡中書其算繇聲音起生神鑒穎利可大指畫未到者生已先意逆悟可大自以為不及學既成去隱宣歙間遇余安裕戈陽將教之安裕勸生業中庸生瞪目厲聲曰俗儒幾辱吾康節於地下矣復去之杭客賀外史家晝市大衍數夜沽酒痛飲飲即吐吐即飲不醉如泥弗休醉中嘗大呼曰天非宋天地非宋地奈何奈何語聞賈似道遣客叩之生曰毋多言浙水西地髮白時是其祥也似道未解復召至屏人與語生曰明公宜自愛不久宋鼎移矣似道惡其言掩耳走生亦徑出過曾淵子家索酒轟飲酒酣作嬰兒啼曰大厦將焚燕猶呢喃未巳耶復賦歌以見意都人士聞之競指以為怪民不與接獨太學生熊希聖猶時造其廬生私執熊手謂曰吾端居層樓聞空中戎馬百萬來人鬼作哭泣聲壬申襄樊陷甲戌宫車晏駕乙亥長江飛渡似道亦殛死臨漳丙子三宫播遷諸王大臣皆南北亂走噓吸事耳子不去欲何為居亡何宋事日非沿江州郡望風奔潰生大慟曰殺氣又入閩廣中吾不知死所矣遂遁去其言無一不驗後四年病死處州學中年五十二無子唯一義女從之生宗堯夫先天之學頗自謂知易每見諸易師傳疏不問淺深輒訕駁以為樂及論後天則尊羲畫為經彖爻繫辭為傳黜文言彖象二傳為九師之言且謂説卦非聖筆不能作上下繫乃門人所述序卦直漢儒記爾蓋生聰明絶人未聞道而驟語數故其論經多失中然性使酒難近又好訐人陰私人面頸發赤不顧罕有從其學者唯國子簿吳浚進士彭復樂師之浚不卒業復屢受唾斥不怨生將遁時召復至口發例手布籌雖平昔所靳若終身不示人者一舉授復復後又授鄱陽傅立云或曰生瀕死語女曰吾死後一月中朝命山姓鳥名使徴吾及傅立當過豫門汝可出藏書示之立當以此致大官後皆如其言所謂山姓鳥名崔鵬飛也生所著書有玄玄集厯髓星野指南象喻統會聲譜畫前妙用數十萬言今猶間傳于世贊曰龍圖成章有文從衡以濬以眀以泄其藏以奠乎玄黃昔我素王韋編三絶墜緒微茫誰其我綴我參我腴九師襄之我苞我晶百氏攘之如河之渾如曀而昏如治絲以棼天未降割一髮攸存維洛有士居于百原超神沖漠凝於畫先數往知來小大斯甄莫峻匪崖我陟其顛莫深匪淵我瀹其泉簡材以畀非隱弗傳有冥者冢卒昭以宣或得其􅀈載神于言炎炎宋籙維其訖矣長星蝕栁色之赤矣眚祥見徴土髮􅓈矣朋昏以世莫之戚矣魚在在鬵尚其息矣維生之知中如沸羮彼惛弗知覆謂我狂我狂如何我憂孔多我山我河我用弗磨俾淪胥以訛我酒既嘉我瑟又和我寧不嘯歌北風其涼旗旐央央我車龎龎蕩蕩江流杭之如陸有腥其穢流血沃沃海氛方殷其何能目人有恆言風雨漂搖夏宇障之涉于大川蒸徒楫之楫副宇橈孑孑焉依國武斯墜不知攸戒日隕弗升雖晝作夜梟舞於林鬼瞰于舍孰投是艱曾莫之艾乃惄乃驚乃瞻乃行乃遁死于冥眷生之為胡乃神以著徴之古聖匪程伊度何以言之卒淪于數一曲之淹不通其故易道既泯數亦不類激贊於生發我長喟月出皎兮在天之心在天之心何古何今余自幼即見長老談溟涬生事近見李淦性學及戚光子實所造文又知生為詳以生之精藝如此而修宋史者不列之方技傳中殊可恨也故豫愍之特序之又傷易道之微激而贊之惜乎豫文蕪陋不能永生也然豫情亦至矣濓志采苓子贊榮陽鄭仲德有隱操嘗采苓九藍山間因自號采苓子斯贊之所由作也贊曰彼采苓者肥遁之士皎皎霞外不容纎滓白月入懷涼颸泝櫺髙視一世何慮何營匡山居士真贊紫眼有稜足以洞視千古長髯如戟足以畏讋百壬或建大將旗鼓而殄殱於妖沴或被處士冠服而容與於雲林可顯可晦載浮載沉一委順於外物初無纍於貞襟縣千尋之丹崖莫踰其峻瀦萬仞之重淵罔測其深抱忠義之志而耿耿自信所謂不變不改若百鍊之精金者邪曾侍郎像贊身形之瘦弱也則山澤之臞精神之凌厲也則列仙之儒博極諸書而守之則約智周羣類而處之若愚當議禮而考文較損益於錙銖稽百王之軼典翼一代之鴻圖豈非養德之腴造道之樞而為國之耆艾邦之蓍龜者乎章判官像贊唐福州軍事判官章公修實檢校太傅仔鈞之父也其遺像至今蓋四百餘年矣二十世孫御史中丞溢偶於閩中購得之如獲至寶持以示其友宋濓因為作贊贊曰器局深沉容儀嚴肅吁嗟哲人如金如玉餘慶所被孫子若雲重圭疊組至今揚芬四十二代天師張公像贊含沖葆虛執真之樞翊度宣靈契道之符龍虎衛乎左右風霆屬於指呼此古之博大真人而今之列仙之儒者邪趙使君像贊宋之王孫元之循吏才優識明政通民治未老而歸臨難不二懦夫觀之可以作氣趙子昻像贊文運中微頽波日靡公起東南作天一柱天人之表帝王之孫麟遊鳳翔珠明璧溫歷試中外遂居禁密其名之升與日同出彼憸邪者腐鼠敗豚何能病公臭穢自聞三百年間西東萬里雄鳴一代如公者幾公貌如玉公文如金變化莫測照耀古今李太白像贊元行臺治書侍御史亦憐真班所藏李太白像係祕閣傳本吾友危君太朴嘗為之贊自後流落於金陵駱氏酒家洪武己酉秋郡士王宗溥購獲之尋以摹本見貺因造贊曰長庚降精下為列仙陵厲日月呼吸風煙錦衣玉顔揮毫帝前氣吞閹豎視若烏鳶頓挫萬象隨機回旋金童來迎絳節翠旜下土穢濁孰堪後先囅然一笑騎鯨上天傅同虛像贊將求子於外兮則鍊精於三田欲索君於內兮則遊神乎八天是皆窺見夫粗迹而未能暢逹其真玄髙岑兮谷綿白鶴舞兮蹁蹮豈非長跨於洞庭之野吹瓊管而招飛仙者耶宜春夏都事遺像贊以忠字尚之其才孔良其氣則剛沉潛乎仁義之府擩嚌乎禮樂之場窮春秋而寓袞斧法菽粟以為辭章使之專城而居則可以攀次公之黃使之入直鑾坡則可追文成之張胡為乎低回下列莫展一長託使車以遐覽竟仙遊於五羊豈詘于人者難知而信於天者不亡後千百年剛風鬱滂當見騎麒麟而下大荒者耶玄英處士方公遺像豫學子方孝孺玄英處士之諸孫也持處士像來請贊贊曰振騷雅於江南混漁樵於玉笥諫垣天近雖屢形州牧之童牛衣夜寒終不奪煙霞之志凛然亢直之風可折諂諛之氣遵真曜之遺則造玄英之私諡唯其畜厚而發𢎞所以繼隆而傳熾紳笏蟬聯勳庸赫著蔓延閩浙之間莫匪雲原之裔敢申贊辭式昭瞻企王宗普像贊以子為貴介公子耶何其神清氣和無綺紈之態也以子為仙翁釋氏耶何其與時俯仰遊乎方之內也以子為詩人韻士耶何其清竒徑直訥然而謙退也然則果何為者耶蓋迹混乎三者之中而心遊乎埃壒之外此吾嘗謂空同子以古之人而處乎今之世也危雲林像贊文繼虞歐之盛位居廊廟之尊天下譽之而不為喜衆人毁之而若無聞此公所以為大雅之君子傳百世而存長者乎王指揮像贊真人龍興山川降精杖劒來從莫非豪英維時王公實將家子虎吼鷹揚萬夫披靡成功錫爵遂鎮一方弛其武威佩玉冠裳何以觀之有英其像益懋厥勛配古良將蘇都事伯夔像贊子由後平仲父才足以行志智足以成事也茍盡施於時必有大過於人而得位以行者僅出其一二也年齒之高林泉之趣皆公之所宜有固天報善人之所致也惟有子之甚賢以文鳴于治世足以繼絶學于前人揚休聞于不墜也此吾嘗私為之善誦長公之言擬公於朝氏之君成而知其無愧也自題畫像贊廣陵孫生貌豫真人皆失笑謂無不似者因題其右辭曰似柔而強如愚而明辨駁百氏寤寐羣經千載之長一世之短前武儼然吾敢不踐又吾心與天地同大吾性與聖賢同貴奈之何隨於曲學局乎文藝忘其真實之歸溺此浮華之麗顛隮於得喪之塗蒞惑於是非之際縱濫厠於大方曾不離夫小智靜言思之幾欲霣涕奮自今以為始日載惕而再厲有如升嶽者當極於崇顛辟若改火者須資夫新燧期融通於髙朗誓薅治其蕪穢用致知為進學之方藉持敬為涵養之地續墜緒之茫茫昭遺經之晰晰雖任重道逺必篤行而深詣庶幾七尺之軀不負兩間之愧爾其勉旃以終厥志越國夫人練氏像贊有序天地之大德曰生夫生者乃天地之心雖陰陽之所運行有開闔慘舒之不齊然天地之心生生而弗息者恆循環於無窮有如碩果不食則其生道已具其中俟時發榮挺然而莫之遏矣時至五代用兵爭強屠戮逮乎雞犬是天下極亂之時蓋無復人道有能於其間不為氣運之所變遷而一念之仁有以契夫生生不息之心則其感召之速所以敷遺於後人者其澤曷有既哉閩之練夫人諱寯建州刺史章公仔鈞之妻也生而肉髮深沉而端毅終日或不一笑言且知識有絶人者時閩王命公屯兵浦城之西巖南唐盧將軍帥師來侵我公遣二校請師于州失期將斬之夫人勸曰時危民未靖公奈何斬壯士公悟不問二校逸入南唐皆為大將一則金陵邊鎬一則上元王建封也保大三年二月南唐遣江西撫安使查文徴伐閩取建州鎬為行軍招討建封為先鋒橋道使奪其險要已而建封焚外郛八月甲子克之公殁已久獨夫人猶存二校遣使者持金帛遺夫人并以一白旗授之曰吾且屠城夫人宜植旗于門吾已戒士卒勿犯矣夫人反其金帛并旗弗受曰君幸思舊德願全此城必欲屠之吾家與衆俱死耳不能獨生也二校感其言遂止夫人之子一十五人孫六十八人多躋顯仕而其後人繩繩相繼位宰執登法從厯卿監佩守令之章者殆百餘人嗚呼何其盛哉非夫人有以契夫天地生生不息之心則其施報之厚未必若此之至也原夫人之心渾廓昭融不限封域視一城之生聚不翅如一家真有所謂仁者之量殃慶以類大易之旨也夫人之後其有不蕃昌者乎其有不絢著者乎昧者不知天之未定謂為善無足倚是則天之生生之道絶矣夫奚可哉夫人二十世孫存道以遺像求豫贊豫既質諸傳記以序夫人之事而復為之贊曰懿彼夫人生于七閩肉髮有倫靜毅而莊動循厥常女士之良笄而有歸建州之妻其德與齊建州桓桓旗旐翻翻以扼建關將固我城必集我兵移書以徴二校言旋何期之愆絶首以懸夫人曰吁乾坤創夷壯士勿誅逸之使奔遂為唐臣建斾而軍爭城以攻火旗晝紅陷其四封二校有云使鬼為人夫人之仁曷其報之曷槖我私曷授我旗旗植于家有突而譁我劍之加夫人曰吁是城卒屠我生何為有衆若林昔而斧砧今而謳吟夫人之亡其魄已藏其澤愈滂傳紫襲龜霧滃雲迷被于今兹遺像儼然萬目斯瞻曷取則焉黃氐三壽圖浦陽合溪人資善身安而家裕者人之所欲也藏智不用而厚重有餘者天之所福也君有以契乎天故不求而自足也超乎寵辱離乎毁譽而遊乎物表此人之所難能而君之所獨也資深智足以燭理而加之好學敏足以蒞事而本於無私事長不以和樂勝禮馭下不以慈惠傷威行乎家庭春溫而秋肅著乎言行方矩而圓規斯學者之所難能茍謂之篤行君子其孰以為非耶資文人知其外之偉而不知其內之美知其才之豐而不知其行之崇是蓋質而不二和而有禮介而能通者也龍馬贊有序西南夷自昔出良馬而産於羅鬼國者尤良或云羅鬼疑即古之鬼方其地有養龍坑在兩山之中泓渟奫深開闔靈氣而蛟龍實藏其下當春日始和物情酣鬯夷人立栁坑畔擇牝馬之貞者繫之已而雲霧晦冥咫尺不能辨色類有物蜿蜒上與馬接蓋龍云逮天色開霽視馬傍之沙有龍迹者則與龍遇謹其芻菣而節宣之暨産必獲龍駒焉粵若洪武四年六月壬寅夏國主明升以全蜀降獻良馬凡十而其一色正白乃得之於坑者身長十有一尺首高九尺足之髙比首而殺其二尺有肉隱起項下約厚五分廣三寸餘貫膺絡腹至尾閭而止精彩明晃振鬛一鳴萬馬為之辟易韀勒不可近近輒作人立而吼上謂天既生此英物必有神以司之親撰祝策詔有司以牲牢祀于馬祖然後敕典牧副使臣高敬囊沙四百斤壓之人跨囊上使其遊行苑中久之性漸柔馴適八月癸巳上將行夕月之禮於清涼山壇上於是乘之而出如躡雲而馳一塵弗驚皇情恱豫賜其名為飛越峯復命御用監直長臣馬晉臣繪其真形藏焉臣濓稽諸載籍漢之元鼎中有神馬出渥窪水中馬之生於水者尚矣養龍之説雖相傳於夷人要當可徴不誣也肆惟皇上以大德而位大寶日之所出日之所沒無不梯山航海獻贄奉琛邇者獨角之犀來自九真食火之雞貢於三佛齊之境其他佹形僪狀藉藉紛紛且不一而足而況兹水産之龍馬乎周書有云不寶逺物則逺人格所寶惟賢則邇人安皇上宵衣旰食日懷保於小民巖穴之士搜羅殆盡將圖治安如黃虞時其遐荒殊裔珍育竒産未嘗有心求之所以榮光休氣洋溢中國仁聲義聞充洽八表而龍媒之異自致於天間十二之中揆之於書前聖後聖蓋同一軌轍也其視二師之遣黷武窮兵以索諸大宛者果為何如哉臣濂以文字為職業際兹盛美不敢默而無言謹述贊辭一首以貽諸後世贊曰天駟熒蛟龍升靈泓澄神馬生祥飇瑞靄晝杳冥天一翕聚通精靈龍胡盈鳬臆輕竹披耳鏡懸睛花雪捲毛光照夜汗溝有血霞流頳振鬛鳴萬馬驚閃流電逐飛星九霄倣佛從龍行但聞瀟瀟風雨聲三川平八極寧真龍媒獻龍廷出入天門駕龍軿太霞五彩蒲瑶京皇風清皇道貞皇威明茫茫堪輿內孰敢不來庭陋彼漢將軍空圍二師城乃知天子在樹德不必連年徒用兵墨鞠圖贊建安蘇照為學子黃叔暘作墨鞠圖侑之以竹石豈以其氣節之相同歟禁林散吏宋濂為造贊曰我本中黃鐵為肝腸精神外章不自知形貌之黝歟緑竹猗猗白石瑳瑳貞而匪阿斯為月下之友歟萬色齊冥洞容物情雖暗而明豈陶令沉昏而托之酒歟陳方都督像贊桓桓俊英矯矯虎臣心雄萬夫才佚三軍爵列崇階功在盟府圖像雲臺流芳千古李徴君像贊嗜義親賢以道自娛懿哉若人君子之儒虎林處士贊虎林處士王君年踰七十而視聽如少壯時其孫監察御史驥從豫受經者久間來請贊贊曰素髮埀埀中心熙熙儉勤作肥家之本嚴厲為馭衆之基好施之仁久而彌篤嫉惡之氣老而不衰吹鳳笙於明月之夜飛羽觴於百花之時大布寬衣容與委蛇不知謬稱虎林處士知之者以為瓊臺之神仙乎華嚴經贊有序上人幻滅嚴持梵行欲求無上真如之道嘗自念言華嚴大經實中天調御第一時所談一乘頓教化為尊勝欲爇松為煤入以香藥搗和成劑以書此經而彼松煤者假物所就具黑暗相有染白法欲煆汞為丹承以空露研潤如法以書此經而彼汞丹者炫耀可觀能育人自非助道者欲推赤金素銀亷薄如紙復粉為泥以書此經而彼金若銀雖曰重寶外塵為體初不自內以是思惟身外諸物若勝若劣若非勝非劣若一若多若非一非多皆不足以稱此殊利繼我一身內而心膂肺肝外而毛髮膚爪資血以生資血以成資血以長資血以至壯老暨死是則諸血衆生甚愛如梵摩尼一滴之微莫肯捨者我今誓發𢎞願於世尊前以所難捨而作佛事從十指端刺出鮮丹盛於清淨器中養以溫火澄去白液取其真純蘸以霜毫志心繕寫滿八十卷尊閣益壽禪居昔者樂法比丘當無物時欲聞佛語了不能得乃信婆羅門言以皮為紙以骨為華以血為墨願書一偈況今千百妙頌十萬正文不止于一縱捐軀命以報佛思無足為異於血何吝唯願法界有情或見或聞證入雜華藏海證入雜華藏海已即得六根清淨得六根清淨已即得自性清淨得自性清淨已即得四天下微塵剎土中一切衆生皆悉清淨無相居士未出母胎母夢異僧手寫是經來謂母曰吾乃求明延壽宜假一室以終此卷母夢覺已居士即生今逢勝因頓憶前事於是親􅌊五分妙香香雲輪囷結為寶網編覆經上乃復合爪向佛散華作禮而稱贊曰雜華淨智海九會之所説一音所演唱十處放光眀信解行證門總攝無復餘如是具五周如是辨六相如是分十玄妙義皆充足以至四法界二十重華藏無邊香水海教條有差别性相子無礙圓融與行布非異亦非同一可為無量無量亦為一重重無有盡是為功德聚如來最上乘龍宫所祕藏上人出身血嚴飭書此經於一滴中中普含十方界於一一界中普現光眀臺於一一臺中普成獅子座於一一座中普見分身佛如上無數佛皆具大威德睂間白毫光遍滿一切處共宣大乘法聞者應解脫譬如日月生照三千大千悉見種種色法能破暗故譬如大洋海波平乃如掌無邱陵堆阜法能平等故譬如陽春至大地盡發生諸根各萌芽法能霑溉故譬如梵志夢一夢千劫事不過剎那間法能融攝故譬如子憶母未見心已至形神皆兩忘法能無離故譬如黃金色金色不相分金亡即色空法能不二故譬如石性堅初不從外得石性自圓滿法無修證故能如斯見解見經不見血若加精進力見佛不見經及至成道已見性不見佛我性如虛空了無能見者無見中有見全體即呈露茍執於所見亦非我本性見見二俱泯此為真見見真見復何有性本無物收一心歸命禮袛夜以為贊諸妙樓閣門彈指一時啓大還龍虎丹贊有序龍虎丹贊為豫友鄭源氏作源因讀金碧古文龍虎上經有悟大還之旨用之修練節節有竒驗復以其玄祕也請豫白之作是贊贊凡四章苞乾靈一人身苞精氣妙與元化并一神管攝之鉛汞各流行神所棲止處實為天地中闔闢類兩扉循環不竭窮廓然含沖虛獨立不以形是即真息根強名帝乙庭靜極必自顯內境埀白芒或想為連環無乃喪其常斡化紐二凝神入紫虛沖然抱一居青龍鬱上升白虎為熬樞牝牡既相從蒸潤如流酥鄞鄂一以固溫養成子珠銷霣離中隂坎陽復來隨純剛號為乾潛躍契道符鬱羅蕭臺中服霞漱雲腴閲厯無窮年永共溟涬具考火記三鼎爐乾坤樞匡郭水火魂戊巳居土官一氣中夜存火候十二時暮蒙復朝屯專氣而致柔綿綿日相因刑德務並進文武須錯陳薰蒸洽太和天機盎神津三元與五氣一一返其根後天不能雕長為萬象尊稽曲徴四三千六百門盡墮魑魅場雌雄鑄為劍日月吸光晶尾間閉玄液九鼎運女英三遜及五假八石巧煎烹如此之舉措難可一二名隂魔奪人命遺尸莽縱橫寒飊動羅鄷時有鬼嘯聲方知涉有為不可學長生觀音石贊虎林翁君祥卿得圓石一大可五六寸上現圓通大士妙嚴寶相坐寶蓮華善財童子合爪侍側蓋大士住不可思議解脫門能以神變作諸佛事攝受衆生大則示化真身於陀怛洛迦山小則寄影像於一木一石不假人為自然天造無非自慈愍中發現祥卿因請濂作贊以顯神功以示闡提生我慢者贊曰玄黃既肇分白石即受質斯時未有佛云何能應現千劫皆不化難以時節拘劫初與劫終常居寂光土石本無情物其頑無與等初無感通者云何佛示像微塵剎土中塵塵皆是佛有情與無情本來同一體諸佛亦無數動曰那由他云何圓通佛獨此示神變圓通於支那夙有大因緣所以不會捨如母之憶子如來談諸相皆是虛妄集云何自著相曷以釋迷網田相以俉性正如指指月見月指則忘寧有繫執故以此四者觀唯知佛願𢎞聖凡盡融攝調御菩提心假石顯云異超出思慮表既非圖繪力又匪鐫勒功幻成妙嚴相七寶作瓔珞瞑目結跏坐正以慈愍故用警闡提者徒爾增我慢當知神通力乃復有斯事始悔未見時口出不淨語如仰首唾天唾還著面故愚癡誠可念寧忍加斥逐我願大地人無不知三依見石非見石見佛亦非佛但見無量光各自心中發遍照十方界眀如日月燈十方諸品類盡得諸佛智文憲集卷三十
