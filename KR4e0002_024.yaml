body:
  text: 文憲集卷二十四明宋濓撰墓版文凡十章故封承事郎給事中王府君墓版文惟王氏所出不一有姬姓者二族有媯姓子姓者各一族有蕃姓者析四族餘未暇論述然姬姓二族皆出於周其一始於王子晉之子司徒宗恭其後則太原琅琅為尤盛其一始於畢公髙之子畢萬其後則京兆河間為龍蕃二者皆以其王族故氏之為王云太原之族自秦漢以至於唐最多顯著與清河之崔隴西之李滎陽之鄭范陽之盧天下號為五姓載於史牒者班班可考也太原之裔有分居光之固始者自東晉南渡來遷泉之晉江溫陵里圖牒喪不知其為幾世至唐協律郎普又自晉江遷黃陽之延興里協律生宋大理評事文郁大理生校書郎訥校書生大理評事保隆評事生莆田縣尉仁暅縣尉生睿睿生連連生籲籲生鄉貢進士贈奉直大夫國光進士生給事中晞亮給事生長溪東尉桂東尉生奉直大夫潤之奉直生禮部侍郎太冲禮部生知南海縣事應麟知縣生元莆田縣典史子春則府君父也母任氏府君諱公穀字德良生三年而典史君亡及稍長問其母曰吾父何在母曰若父死已久墓木今將拱矣府君劈踊號慟即製斬衰絰帶追行三年喪事兄最樂先生朝有如其父絲毫不違其教今先生時號名儒以古文著聞亦盡心於府君鞠育導迪無不備至羣族內外姻皆稱之府君𨽻業郡庠精勤越流輩夜將半鄰齊燈火盡滅府君獨焚膏挾册兀坐如枯株自是能通一經發為大義亦整比可觀郡慱士命題招弟子郡試於堂府君特居首列㑹歲當大比同舍生皆踊躍入家狀期赴鄉闈府君獨漠然若無聞或勸之府君泣曰豫生髮未燥先公棄捐一念及兹肝膽為之析裂雖幸母夫人存鶴髮鬅鬙而疾疢撓之恨不化一刻為一朝尚忍斯須離膝下乎杜門不出日以色飬為事及夫人卒葬祭一遵禮度哀號不暫舍性好施家雖單窶聞人飢凍輒解衣减食濟之不然夜不得甘寢君子以為賢元季政大亂七閩之豪挾兵威以擅生殺割土疆往往致書交辟之府君度其無成皆峻辭已而亂愈亟府君挈妻孥避地仙遊山中曳杖盤桓而烟霞泉石日與之相親及皇明御厯六合載清而府君則頽然老矣乃謂其長子寅曰不仕無義吾非不知也第迫於親老且病耳爾當力學淬行以繼其門寅遂以尚書中鄉貢第九名上南宫未及㑹試擢為給事中尋兼靖江相府録事階承事郎朝廷推恩封府君承事郎給事中府君之配陳氏先卒已十年至是亦贈孺人寅方攝監察御史按劾山西忽官書至驛言府君已殁寅匍匐奔還南京詣豫哭曰寅罪逆深重禍延先子以洪武八年十月三十日長逝壽僅五十又八寅將馳歸擇地縣南香山里白石峯之原以九年某月日襄兹大事而起母孺人之骨合葬焉惟先生職在太史中朝名公卿之墓無不藉雄文傳信于世敢奉楚府伴讀陳子晟狀再拜以請惟先生畀矜之豫聞閩多故族雖厯年千餘而其文獻猶有足徴者府君善承家學豈不思出就功名之㑹獨以親故不敢蹞步捨去則其敦厲孝行絶於人逺甚孝為百行冠冕所關彝倫者甚大此而不銘烏乎銘寅能汲汲孜孜顯露潛德惟恐人之不聞府君亦可謂有子矣府君六子長即寅次曰同曰驥曰祥曰載曰龍同驥載龍夭女一未行孫一陵生銘曰人所貴者身身之所本曰親呼吸相通實一氣之分乃或委而去之南則之越西則去秦能敦本而厚倫者豈不在於斯人豈不在於斯人贈承事郎工部主事劉府君墓版文濂家食時嘗如烏傷其校官劉君浩卿來見浩卿諱演美容儀晢白如冠玉有鵠峙鸞停之狀聆其谹議推闡王霸欲見之開物成務建瓴注而健鶻飛也求所著文閲之氣充而聲雄風雨晦冥雷電恍惚若鬼神之出入也濂甚豔其人數與之游蓋浩卿受經玉山鄭録事明善録事精通伊洛之學望重當世浩卿獲其傳為多濂意浩卿非文墨可羈必騰迅以升已而浩卿秩滿去濂亦潜伏大山長谷聲迹絶不聞㑹元籙告終而皇明御極濂應聘而起纍遷入禁林浩卿之子彬亦典儀晉王府既胥㑹亟問浩卿安否則墓木拱矣濂失聲哭曰浩卿止於是耶不覺為潸然出涕彬才猷日著轉承事郎工部主事改員外郎間謂濂曰彬幸藉先子明訓忝任官使近得援例贈先子如彬官母葉氏亦贈孺人先子卒時年五十又四乃元至正癸巳三月九日後七年己亥十月二十二日始葬麗水縣孝行鄉之桐嶺原迄今洪武丙辰蓋已八載而懸棺之石無文非不孝歟願先生畀矜之言訖泣下既而又曰先子之行多可書彬不能記其詳先子事父孝生能盡養暨沒廬墓左者三年廉訪使者遂以孝亷舉教諭義烏移龍泉興補百廢孳孳如嗜欲升明善書院山長以母耄辭先子性謹飭非大寒不襲重裘雖暑鑠金正衣冠而坐挾冊諷詠終日與人期在百里外風雨必赴之一日行桃山中見涕淚赴溺者先子止問之曰吾母亡未葬質先廬得錢二十千今遺之欲生奚為先子陽謂曰爾勿憂誠吾拾之爾力挽歸家償錢如其數其人知非真拜受感泣而去先子瀕殁謂彬曰金華宋先生最知我我死當以墓文相纍彬敢銜哀以請願先生畀矜之言訖復泣下濓曰濓實知爾父爾父有經濟才志不獲施以卒耆舊凋落宜爾不能詳濓故掇其概言之繫之以銘劉氏世居括曽祖某祖桂好施與州里歲儉亦賴之父德澤好施如先人母葉氏子男子三長師曽南康都昌丞次師夏即彬次師雍孫男子一輝女子四梁松朱某湯謹其壻也一未行銘曰丹穴之鳳五色離褷不髙翔於千仞乃戢翼而威蛇命也奈何振古如兹噫故浦江義門第八世鄭府君墓版文浦江義門其第八世主家政者曰鄭渭字伯陽宋龍遊丞德圭之曽孫東野處士文佩之孫元贈中書禮部郎中鑑之子年七十二以洪武十年九月十九日終於家十一月二十四日葬於縣東三十里杉柏墓之原其子梃桷與其孫炯勳合辭請銘於太史氏濓濓乃為之銘曰維伯陽父自幼頴發佐諸父齊家才超然自見也泉布出納及米鹽細務一一鈎校使無所漏也更繇之繁身獨任之載星往來踰三十春秋不憚煩也辭意懇欵一本諸誠無纎毫人僞也化行鄉邦三尺之童卒皆信服呼之為長者也縣之大夫踵門問政告之以利病民隂受其賜也方嶽重臣嘉其篤純欲辟為從事辭不為也上繩祖武下儀孫曽循蹈規矩晝夜兢兢自惕也大田以祭嚴若祖考之臨勒石示訓戒勿質鬻之也合爨一世中更亂離左抗右禦卒使危復安也羣從同樂熙熙然如春風和氣襲人見者革面也宅心忠厚不動聲氣寧人加已誓不先人也國初定賦郡田一斛驟增其半白於當路而蠲之也姻家析資陳之以秉彛不以已之親踈為厚薄人服其均且平也宗族有早孤者收而鞠之斂其租入逮長而悉歸之也有盜持斧斤之林僮往禦之反為盜所毆僮妻往護之失足墜塹死禁僮勿訟反遺之槥櫝也職此之故聞其捐館一郡為之出涕貴賤賢愚無間然也其妻吳裕字曰靜安能通詩書為一家女師是以配君子也嗚呼世不逮古夫妻相虐而兄弟為仇比比皆然也有若伯陽父實中流之砥柱彛倫賴以扶樹名教賴以增重奈何去昭昭而就冥𡨕也青山不移流泉不竭而形容不可復覩茍可贖之當人百其身也嗚呼勒銘斯阡言有盡而情無窮過者讀之不為之涕泗汍瀾非仁人也鄭彥宏甫墓版文鄭彥宏甫諱巨浦江人也其家十世聚居諸父平山府君文泰才雄志鋭蓋以義亢其族特善彥宏彥宏每侍左右操其權度以裁小大之政府君沒從兄青慩居士欽有才如府君日恢宏之其宗愈光茂亦惟彥宏是友蓋彥宏凝慤而夷冲其與物交範防至密諳練甚精而於羣從之間傾誠以相周旋故得其歡心其考文轟蚤世奉妣黃夫人盡孝及夫人亡出寢於外二年弗近酒肉哀慟無晝夜幾傷其生居亡何彥宏以次長其家確守成法如執玉捧盈唯恐有愧前人然所見一定雖羣言沸騰終不可搖奪由是內外政皆治㑹遭兵難法無少爽性好施與天大雪有童子凍餓道路彥宏亟溫以酒且治纊衣之使養於家喜注善藥起人夜半有告急者即應之亦無留難一日以事適鄰邑忽有拜馬前者彥宏曰吾不汝識今拜欲何為拜者曰吾家四三人病滯下欲死賴公藥乃生食公之德久不報幸一見不自知其䫙之頓地也彥宏笑遣之彥宏壽六十七以某年月日卒卒後一月某日葬於左溪山西源娶周氏先十八年卒生子男三演淵洧演夭淵洧皆恂恂善繼而淵通經藝以古文辭知名於時用薦者為月泉書院山長女一歸江蓮孫男四楷柳櫟檀柳夭女三人皆在室彥宏遇人煦煦有恩意逮沒人思之弗置至今有淚落者昔唐張公藝李知本劉君良皆以孝友聞史臣稱之以謂此三人者孝行推於友睦而禮遜之風數世不衰皆在元魏齊隋之際真所謂豪傑之士雖無文王猶興者今較以彥宏之家君子咸言過之而彥宏諸行又跬步不越於繩矩非傑然自立者能若是乎南陔白華商之季世僅見之夫子刪詩特存其聲而弗削况於後世者乎濓與彥宏遊凡三十年知之為至於是造文表諸墓以風示人人庶幾有來取則者故章府君墓版文章府君姓也遇孫名也宗覲字也浦城西村康州刺史及自南安來遷也今居龍泉康州五世孫都官郎中重再遷也又十一世至煥文三遷縣西之錦川也煥文生斯立斯立生格皆潛耀岩穴而善利覃於鄉邦此府君曽祖祖父也當唐之季逺祖仔鈞受唐命官至檢校太傅西北面行營招討制置使勳名著於一時其妻越國夫人練氏懿德隂暢能全建州一城生聚生子一十五人其後多榮號登進士第者幾百人若郇國文簡公得象以清忠致位台輔若寶文閣待制衡以文辭卓冠多士若忠恪公誼立朝論事務存大體若莊簡公楶建功涇原而夏童不敢東牧蓋章章者其他位法從典大藩者項背相望此府君世澤也持身凝簡超然百為之外而毅肅之氣洽於倫類望之如大山中居莫不尊而仰之然耿介無阿私臨事定議則曰某為回邪某為謇諤凛凛不少貶此府君恆性也凝坐一榻自明至曛未嘗去衣冠發言必想踐未踐則終日若思遑遑不少寧族姻比閭三尺童子來見必以禮接弗敢慢且諄諄然戒曰惇爾孝弟引翼爾文學毋隕乃祖乃父聲聞以為爾家羞人稔其德事不得直亦上謁而求平焉從容諭之輒中其肯綮誓勿煩有司旱暵疫癘泣禱於上下神祗不獲應不止此府君馴行也甲子三百六十有六府君所享年也至正三年五月六日沒之年月日也窆之年月若日則十四年二月十一日也縣之西寧鄉玉峯山之陽葬之地也宋兵部架閣張公宏女府君配也曰圭曰璋曰御史中丞溢子男子也妻縣人士陳師大者子女子也曰存仁曰存質曰某元帥存道曰存誠曰存厚曰存禮孫也件繫羣行而為之狀者青田劉先生基也撰次其事而樹文於墓門者溢之同志友宋濓也銘曰維章受氏出自東海曰齊之姜也奕葉蟬􅀈施於北南於煜其光也玉象降徴疊笏成陵爛然有章也府君承之凝簡而昭淵慤以莊也左矩右繩周旋敕慎納於危防也不詭而隨不肆而卬不尨而凉也含真葆熙吻合至𤣥莫吐耀芒也何以嫓之龍劍在襓神珠韞房也茍鬯所施物罔非吉胡斂不張也有子繼志曰隱曰顯各惟其常也棲心奧區三秀孕竒或發休祥也執法中司曰簡巖巖凛為飛霜也玉峯之阡冲和固結其氣靈長也太史勒銘鐫諸樂石百世而弗忘也故愚庵先生方公墓版文嗚呼自我齊國文公紹伊洛之正緒號為世適益衍而彰傳道受業者幾遍大江之南而天台為極盛時則有潘子善氏林叔恭氏趙幾道氏兄弟以及杜仲良氏如此者不能遍舉皆見而知之推原體用之學敷化𢎞治而風動於四方重徽疊照於斯為至流風遺俗汔今猶有未泯若我愚庵先生方公其殆聞而知之者歟先生諱克勤字去矜姓方氏其裔出睦州𤣥英處士于宋初十五世祖草四府君某始遷寧海侯城里曽大父重桂鄉貢進士大父子野父炯元鄞縣儒學教諭母葉氏宋丞相夢鼎從曽孫女也先生幼而端凝五歲知讀書自辨章句十歲暗記五經諸老先生嘖嘖愛賞目為神童年埀弱冠遍窮濓洛關閩遺書及尋鄉先達授源委凡涉性命道德之祕窮研探索寢食為之幾廢因喟然嘆曰為學必合天人而後可舍是非學也至正甲辰嘗一踐場屋言國家利害峭直無所顧忌有司不敢取飄然東歸益閉戶潛心于一卦一爻必欲驗諸事為至於天文地形禮樂刑政及制度名物之屬亦辨析歸於至當如指諸掌㑹海民為變江浙行中書檄吳江同知金剛奴募民為水兵先生詣金剛奴謂曰民計窮而為盜未為盜者亦挻挻欲動奈何授之以兵是謂增盜非禦盜也金剛奴怒不答既而水兵果於中道殺護吏逃去從盜金剛奴踰垣走折一足始悔曰吾不從方先生言以至於此未幾侍御史左答納失里至郡招諭劉都事基為之副先生上書陳勦殄之略不宜姑息都事韙其言而不能用遂致郡縣陷沒民罹塗炭先生發憤入山谷採松柏食之纍日不返當路延先生入幕府先生謝曰我辟穀久矣弗足與人間事也吳元年冬大明兵取台州先生欣逄真主之出乃大有為之時疏舉賢才安人心黜豪强除暴斂明教育十餘事將上之未果洪武二年詔立郡縣學以訓導辟先生樂於育才即起應命負笈來從者至百餘人先生據經陳義曲暢旁通幾無毫髮遺憾聞者皆淪肌浹髓薰為善良俄以母夫人春秋髙力辭而歸諸生追之者踵相接學舍為空四年夏朝廷聞先生賢欲致之部使者袁君宏以書幣來徴先生以母老不忍離左右辟去旁縣郡承使者風㫖雜逮姻連督索之先生上京師兩詣執政固辭執政竒先生材命就銓曹試考核入格名列第二上特命知濟寧府事階朝列大夫錫之冠帶以行先生至官為書一通懸於康衢諭上愛養元元之意民有所不平詣府自言禁吏胥不得呵問日引耆耄坐語訪以得失郡學舊有孔子廟堂頽圮聘前進士為師弟子員有未備者選補之役浮屠以葺廟堂南鑿為泮池傍列兩序闢射圃於廟北造弓矢樹正鵠日一再視學親為正句讀較中否屬縣之內社各立學學凡數百區學子繫籍者二千人兵後號為最盛始有詔民闢廢田者閲三載乃稅吏徼近功不侯期斂之復以田定起科繇民益惰田不增闢先生與民約定為簡書列為丁産為上中下三等等復析為三每有徴發恆視書為則吏不敢並緣為姦歲且暮轉戎衣于燕時有令役民舟者有誅别郡以牛車從事天雨雪牛僵死于道破産者十八九民請以舟就役僚佐畏令難之先生曰吾知從民便抵法非所辭也即載以舟具白山東行中書省省義不問郡倉絶糧省檄民七百里青州民病不能適漕運者自淮安輸濟南道出郡境先生欲就輸郡倉而使濟南致青州告于行省弗聽即以聞户部戶部奏可行省臣愧之郡城壞故事築以兵指揮使挾貴人勢當五六月聚民萬餘治之民不得田哀號而即工聲聞數里先生奮曰民病不救惡用二千石為密聞中書同官疑且得罪不敢署名先生獨署之胡丞相惟庸以聞即日詔罷先是不雨先生袒跣遍禱羣祠涕泣卧祠下誓不雨不還至是詔下民歡呼而散大雨如注是嵗五穀俱熟民歌曰孰罷我役使君之力孰成我黍使君之雨使君勿去我民父母自是連二歲三禱皆有年五年秋鄰境盡蝗先生省愆變食稽首告天夜聞空中薨薨聲燭之乃飛蝗蔽天而過郡獨有年民有赴訴者隨事則决大者笞辱小者諭遣之不留案牘尤慎於庶獄月録日省不使久淹或文有未具時作糜遍食之夏秋之稅每命斛卒持概髙下出其手或至纍旬不收民兢指倉為穽先生令民自概斛卒斂手不敢出氣遇將西成預移文與民期民爭來輸不遣一吏而稅常先登江西浙西二行省運糧百萬濟寧水陸數千里先生視如部民不使有錙銖怨懟舊比每斛益四升以禆蠧耗先生憫其道遠言于朝蠲之府召州縣官屬皆役皂𨽻往往索賂無厭先生下信符置郵無敢不至者信符之籍以印識而中分之吏托月日稽違以媒利先生私藏之緩急有程一自己出復行其法於封內一以信符召民民得竟并力耕桑襁負來歸者相望于道初赴官時戶僅三萬稅萬餘石三年之後稅以石計者十四萬四千七百戶亦增至六萬有竒二州二十縣家有積粟野無餓莩羊牛雞犬散被郊坰富庶充實如承平之世至於社稷山川諸祀先生修崇壇壝嚴飭器服或樹名木於周垣之外一如儀制無有所闕水驛在西門內庳陋汚濕居者弗寧先生料揀材木候農之隙更作於城南庭堂室房𢎞敞逾昔冬寒河凍驛舟不行令舟人伐木為炭穿土穴藏氷因其餘力以成事功泗水經郡城南通淮江北引河濟地勢髙瀉搆石為閘而時畜泄之魯橋棗林二閘厯歲久壞石填河中舟道難之役閘丁絙壞石治灰而甓之故以葦囷庤糧火屢為災教民為陶瓦營屋百餘間申戒火令編民居為曹伍遞相救恤其患遂止大將軍魏國徐公達副將軍曹國李公文忠統士馬十萬之燕駐郡稍久要官勢吏爭索糧芻相膠葛于前先生依序酬決無不如意一軍稱能永嘉侯朱公亮祖將舟師數百艘北征河水涸舟膠不可動脅先生曰即趣五千夫浚河否則以軍法論日且暮先生不忍煩民泣禱於天夜二鼓天雨黎明水起數尺舟竟去莫有言者先生為政以風化為急務以德勝佐二始雖倨慢先生委誠待之卒愧服武夫悍將不知禮久亦化戢在官縱無事終日冠衣坐堂上召諸吏授以書詩法律或公牘堆几羣辨方譁先生片言折之各心悅而去性不喜近名常自誦曰近名必立威立威必至害人吾不忍為也府庭之間不陳杻械革鞭懸楹間示不妄罰省憲考績為六府最八年春入朝皇上以為善治民錫燕儀曹使踐其舊職瀕行奬諭有加且曰政成當顯用卿秋八月知曹縣事程貢嘗以不職被笞心銜之上封事言狀詔御史楊某亷按楊為程故人恐程坐誣罪易民服潛索先生過事踰兩月無所得乃捕府中卒吏盡繫之榜掠無完膚無一可問者楊更與其吏謀誣先生用倉中灰葦時十月固未嘗附火而葦則苫公宇垣實無私用者先生不與辨遂就逮民號呼填道隨行百餘里者將千數先生次子孝孺上書政府大臣願以身為軍贖父罪不報竟謫役江浦㑹空印事起吏又誣及之孝孺復草疏將伏闕上訴而先生殁於京師九年冬十月二十四日也壽僅五十又一孝孺與兄孝聞奉柩東歸十年春二月二十四日窆於縣東北深灣章施山之原禮也先生妻林氏諱姬婦道為一族冠先十五年卒至是合葬生子二人即孝聞孝孺孝聞年十三居母之喪不肉食至服除人以純孝稱之女一人再娶王氏諱在生女一人未彌月而王卒少房董氏育之董氏生子一人曰孝友二女皆在室未行先生靣白如玉鬚眉秀整不妄笑語動容周旋必合禮法兵亂負母逃入深谷兩踵血流遇二弟訓育備至終身未嘗失色與人交率真任質不事表襮不以久近為冷熱立談之頃洞見肝膈南冠過郡者必以米醪饋之不能步者僦舟車送之萊蕪丞陳川欲迎母為養厄於無資出錢五千助之同列以事奪祿買布帛給其用且日延之對食久而不衰脫逢其飲醉投案大詬而去待之益恭及酒解來謝陽若不知者曰昔之夜吾亦醉矣不識君何謝也生平奉養簡素不服紈綺御一布𫀆數年載不易日不再肉不治官事輒却肉不食所守亷甚絲毛不取諸人每行縣以物自隨杯湯不肯受兖州守因童進二木瓜笞童十召州吏還之鄉人有為饒陽令者以燖雁侑書力却去乃已初至官時祿米一斛可易金三兩以軍食告乏月取十斗為食餘悉儲于倉或尤其迂不恤也晚年益加畏慎晝所為之事夜則白於天俯仰皆無愧怍榮辱利害恆視之若一坦然不疑古所謂體道成德之人先生誠庶幾焉其為文章質而不華平而中理有汗漫集若干卷傳學者云濓私自念齊國文公之薨始一百七十又九年而其學寖微希世取寵者徒剽掠為談辨誇多鬭靡者務組織為篇章文公所以扶世教淑人心者率棄為空言故其臨事之際仰攫俯拾唯恐利不入槖至有庸夫賤豎之不屑為者嗚呼可嘆也已有如先生聞風而興乃能誠求實踐參前倚衡儼若上帝鑒臨涵養既純發舒自異仁民善俗之政至今人人能道之夫命雖止於斯而其率性㑹道無愧於文公者尚皎然弗誣也孝孺久從濓受經頗知先生行事之詳於是厯叙其故而繫之以銘銘曰堂堂齊公命世之雄伊洛正傳實為大宗入天出人完傳翼經有遏必疏無幽不明疇不鼓篋千里來過燦如聚星惟台獨多流光所及寧有翳昏揭彼日月輝于天門逝者沄沄滅景銷聲不有人豪聞風孰興猗歟先生行知尊聞養氣弗餒充乾塞坤實孚名隨上徹九天鶴書翩翻降於丘園爰自布韋專城以居象笏朱衣於赫其儀寵恩之加其廣無垠曷以報之誓不顧身敷宣帝仁達于齊氓以煦以嫗以致其亨民或勞只如魴之頳乃平更繇俾遂其生黠胥舞文其貪若狼乃障乃防而扼其亢人相告言久嬰亂離父母孔爾我胡弗歸十百為羣其來如雲操厥耰鋤以播以耘我行其原萬桑沃然俯瞰于隰黍苗芊眠鄰多孽煌刺天而飛避不入境絶類有知真儒之效小試則殷誰曰漢吏專美其循太和薰蒸郁紛輪囷自此而升何澤弗臻大命止斯傷如之何視天方髙淚如懸河我文傒嘆數竒則然中心無慊生順死安善人殄瘁斯道之衰顧瞻無依胡寧不哀崔崔者岡渺渺者陂其中有墳千載之悲故一鄉善士張府君墓版文浦陽江之上有大姓曰張府君天錫字君與懿然篤厚人也自成童時輒知孝敬日趨大父母父母側問衣燠寒而進退之年既長益推錫類之仁九族有弗振者時恤其匱乏復懼族逺情疏築堂南山麓為序拜旅飲之所長幼之節粲然不紊其於惇愛廣順之道有所賴焉然不是以為足寒食十月朔汛掃先世諸塋必厯告嗣人曰此為某府君其名行若何支系若何本末如連珠已而泣曰吾髮種種矣茍不言爾等當不知土中為何人慎識之勿使牛羊踐履其上平居正襟危坐終日不妄動即動足跡亦有恆度撫世酬物一以誠有犯之者任其轇轕兩耳如無聞尤不喜以疾言厲色加人人愈愛慕之雖傔媵亦從化俯首趨功歡欣如也及殁不問賢不肖皆歎惋悼惜有至淚下者至今語及府君猶舉手加額稱之曰長者長者云府君之裔初自清河遷已厯十有三世曾大父維大父夢龍湖之儒學正父一寧妣方氏府君生於某年月日殁於某年月日壽若干以某年月日葬於縣西通化鄉施禮山原配室朱氏婦道克修前卒竟合葬焉子三坦泰祐女三石某朱某樓鐵其壻也孫五瑶福驥某某曽孫五某某昔漢之萬石君家以孝謹聞於郡國雖齊魯諸儒質行咸自以為不及若府君為人實有石氏之風奈何士習不古文有餘而行不逮尚有愧於齊魯諸儒又何敢望君之藩垣哉是可嘆已坦等遣從孫大常丞丁徴濓勒銘墓門濓聞至正初宗藩賢王有竒府君才者辟為營田總管府治中府君辭不赴今故不以為稱而題之曰一鄉善士張府君墓并感其事而銘之銘曰生之溫守之仁發之淳行之新以飭其身以伉其門以壽其子孫上海夏君新壙銘國朝有天下患吏之病細民公卿廷議以為吏它郡人與民情不孚又多蔽於黠胥宿豪民受其病固無怪莫若立巨室之見信於民者為長使主細民土田之稅而轉輸於官於是以巨室為糧長大者督糧萬石小者數千石制定而弊復生以法繩之卒莫能禁是時惟蘇之沈氏以奉法稱天子親召與語賜之酒食時减免其田賦名聞四方而上海有夏君者尤畏謹好禮繇賦皆先時而集不煩徴索愛恤細民銖兩無所妄取民咸悅而德之聨事者皆以為則其所為蓋無愧沈氏而名未若沈氏之顯者聞於上則勢隆而易彰鬱於下則雖善而莫著此余因夏氏之請而欲揚之者也君諱宗顯字叔眀自其曾祖參祖駟父祥皆居華亭君年十五六喪母以達禮聞服終請于父出從傅朱學數年學有名逰上海樂其土俗遂之長人鄉置田宅徙家以居既而家日殷富益敦行義兄及孀姊老而窶嵗時奉粟帛養之葬其喪而恤其子撫異母弟有恩事外舅姑盡子壻禮聘名士為師故人子就學者飲食之旦則冠帶坐堂上子孫盛服入揖立兩序俯首聽教命君各授以事㑹食遣去至夕取古今事可為法戒者辨析講說勉以為善子孫恭謹願慤不敢嬉遨譁縱凶嵗鄉里皆從君乞粟帛藥餌嫁娶喪災者取資焉故巨室之以長厚稱者必曰夏氏見君者慕其善與君逰者服其才聞君卒者莫不痛惜之也初君年未四十即穿壙為冢於舍西北若干步及年六十有六而卒遂葬焉君之卒以洪武十二年正月二十一日葬以二月九日娶王氏二男曰應炎應霖三女長適趙志學次適趙以仁一在室孫男三人翟彪麟女三人曾孫男一曰綿綿銘曰周法既壞經界隳羣氓相啖鼠與狸吏庸俗澆邈不知赤子顛踣吁可悲聖神造謨立治規俾大育小勢相維孰嚚戻法肆攘欺利猶在吻身已離惟吳夏君懲衆非畏慎奉上仁以綏凶嵗發廩賙困飢帛寒藥疾棺載尸居家孝友此其推子姓願謹習禮儀鄉閭愛戴莫敢違為富好仁曷能追天錫爾𦙍當蕃兹嗟哉巨室宜相師欲考令德徵銘詩樓母婁氏墓版文義烏樓璉詣余禁林且哭且拜曰璉也不才幸獲厠名銓曹擢主大同宣寧縣簿歸與母夫人别夫人慘然若不能勝情整璉衣出門涕淚闌干被頰璉恐重傷夫人之意忍泣而往之官僅五月而訃音至矣蒲伏歸伏草土今服既闋吏部用常例别調行有日痛念先母遺德未白舊幸灑掃門庭執弟子之禮敢以墓版文為纍按璉自為狀諱慶字靜嘉婁氏考某妣某氏夫人年二十歸同里樓君光亨婦道修飭甚其姑童氏御家屬以嚴纎芥有失輒鬱鬱不樂冡介間鮮有獲其歡心者唯夫人能之處先後唯以柔勝有恃强壓之者夫人俯首避去久之咸愧赧夫人亦自如樓君隱居教授州里多宗之每懸燈覽書直至雞號夫人侍左右不敢先寢困睫或不可擘必奮迅自力習以為常嘉朋至備物以饗雖截髮弗暇計其遇族姻不為翕翕而趨不為淹淹而舍始終有恆學者多不及也一旦病痰厥喉吻上下隆隆作聲已而蘇明日復卒夀七十八其時則洪武辛亥九月十七日又明年癸丑某月日藏于竹山里先塋之次子男子四玓瓅珍璉璉以明經試吏部入官今為成都府仁夀縣主簿階將仕佐郎子女子三環瑜珥俞盛方錫吳祐其壻也孫男三致中致和致剛孫女四貞娟婉媛皆幼世恆謂隂教不行天下無良婦有若婁氏豈非婦之良者耶奈何輕言之讀豫銘者尚有所厲也銘曰無非無儀維婦之常不有以昭之孰知其良余銘婁氏之藏百世之下遹有耿光瑞安吳門三貞母墓版文溫之吳荃不逺千里踏赤日而衝黃埃謁豫於浦陽江上既入容貌慘沮弗悅問其故輒嗚咽流泣而後言曰荃之先世初家鄱陽再遷㑹稽唐諫議大夫畦又自㑹稽徙溫之瑞安世有宦蹟至宋兵部侍郎洸某州教授瀹兄弟連擢某年進士第聲聞益著兵部幾世孫連江主簿朝宗無嗣以兄通判汀州泰來仲子諱埏君為之後君元栁州教授荃之曾大父也種學織文名播于邇遐其配金部郎中張公聲道之孫諱淑真柔婉靜專奉尊章能盡其禮曾大父方四十一不幸蚤世張夫人少九齡誓冰雪自潔卵翼其子至於有成夀七十二以至正元年辛巳八月辛酉卒五年乙酉二月癸未葬州之廣化鄉其子諱欽荃之大父也娶胡夫人諱節宋瓊州安撫使尚賢之孫大父學行如其先人念家世之多艱奮然欲有為寤寐不忘生一子諱璟荃之父也嗜學如嗜利罔有怠心及其冠也擇松江府判官林公天麟之孫諱亷為之室林夫人瀕行父以上腴田三十畝畀之林夫人曰兒聞女子之行父母有命戒之言不聞其他也敢辭暨去動靜具合節文三族翕然稱其賢荃父始二十一嵗不幸又以疾不起時林夫人多二齡荃在遺腹中甫九月荃父臨卒語林夫人曰吾家宗祀不絶如縷者在吾一身今病革若是奈之何哉然吾祖父無凉德生男或可期爾能保嬰惸而養吾二親吾死為不死矣林夫人仰天泣曰所不如君言者有如日言終而卒卒一月而荃生生一月而大父繼卒大父年方四十而胡夫夫少一齡二孀母相依為命抆淚治事晝夜更抱持荃嘗指曰吳氏三世惟賴此一孫耳嗚嗚對泣不能仰視逮荃六嵗天下繹騷大俠聚兵隂竊生殺之權者甚衆慕吾母豐於財爭欲聘之不聽更以危言震撼復不聽因說之曰當此亂世有力如虎者尚朝不謀夕以孱弱之婦不翅一輕塵乃欲保三尺孤耶知者頗竊笑於後矣為汝之計莫若托身勢家而心存吳氏顧不足隂持之耶林夫人剪髮長號曰吾聞烈婦不再嫁此義或乖禽犢不若也吾但不知負其天遺孤之保與否則天也吾言止斯茍或迫之有死而已其說既不行遂謀勒兵而强委禽焉林夫人聞之與姑言曰事急矣不可以不去即挾荃夜走平陽冒險阻履荆棘茹苦如茹甘吳故大家傔人媵女滿庭頤指得如意至是皆散盡林夫人躬操杵臼以執爨事食或不充攻絲枲以貿易之然猶市書教荃從名人游脫簪珥以代束修且曰家雖廢學不可廢也事姑尤孝謹姑多疾畢志竭慮以事巫醫忽夢神人謂之曰炮鱉飼之即差已而果然人以為孝感州大夫朱文霆賢之欲請于朝旌表其門閭林夫人固辭乃止林夫人居平陽十二春秋當至正二十二年壬寅十二月己丑林夫人不幸殁夀三十九胡夫人哭之慟曰上天罰我如是之酷耶老者存而少者先逝耶荃時二十三矣胡夫人由是日夜程督愈勤唯恐荃之怠也又七年為洪武元年戊申荃始還瑞安故廬以十二月庚辰葬林夫人與吾父同穴又二年胡夫人亦卒實三年庚戌九月辛亥也夀七十三葬以五年壬子二月甲申其穴亦與大父同所葬之地皆祔張夫人云惟我吳氏寡祐禍及三世幾致隕厥宗其克底於今者二貞母是賴前延後引靡遺餘力志節之著堅如金玉而不變屹如丘山而不移稽諸古史傳所載殆不是過不肖孤惸然在疚深懼不能負荷而先德之卓絶者又不白於世一念及兹涕泗汍瀾而不自知敢以墓文為請惟先生畀矜之言訖拭涕再拜濓因譬曉之曰荃無以憂為也一詘一伸天道之常荃之家其困瘁極矣涵蓄之久惡知不大發於後也栝人有林氏者當宋之訖籙家廢於兵婦姑挾三嵗兒奔走戎馬間幸而得全二母鞠之成兒擢高科而其子孫文墨彬彬多列膴仕其事與荃諸母頗類而酸辛則過之譬如木焉收閉華澤於沍寒之日暢達光榮於和煦之時理則然也頗聞荃汲汲好修而能古文辭薦紳先生咸器重之爵祿之至孰能禦之哉荃又有二子昆昱矣其𦙍系之滋亦將自斯焜煌朗烈上繼兵部公之步武似不難致也荃無以憂為也濓故為白其三母之行樹石墓門以志子孫他時融顯之所自後之讀者當以濓為知微之士云銘曰海東名區有氏曰吳世為簪纓起家則儒仁漸義摩上浹下孚隂教有翼大義鑑如卓哉三母貞德弗渝一延于前備涉艱虞誓竭肝膽以樹門閭二引其後丁時毒痛同扼猛兕以保孤雛正如鼎足損一則欹代有懿哲庶亡阽危荼蓼雖操冰雪自持中心所涵其氣吐霓白石可泐我志弗移黃金可銷我節肯隳卒紹三世免隊一絲粵稽於天厥理匪誣碩果不食其發必腴修幹入雲濃隂鬱敷欲搆明堂疇忍舍諸誰家鬼妻朝麻為衰夫骨未寒背而他之君子疾視何翅蟲蛆有人心者請觀銘詩表凡八章先大父府君神道表惟我大父府君卒于重紀至元丁丑十二月己卯後四年當至正辛巳十月壬申葬于金華縣東七十里東烏之山又六年丁亥十一月己未而大母夫人繼卒是年十二月丙申合葬府君之穴又十二年介孫濓始自撰文勒諸墓上不孝之戻其將何逃然自兵興以來潛伏草莽支綴餘息不敢使墜其宗及夫驚悸稍定欲求鴻儒畯生以論撰先德而故老凋落盡矣斯固區區不能自力之過亦遭時孔艱心與事背無以遂其犬馬之私失今弗圖恐終無以示子孫輒忘其固陋而一言之初府君生於宋季宋未巳而官政先亂諸惡少年緝紙為鎧剪筡為欔斬牲以祭社神唯務相屠劉睚眦之怨即蟻附蜂聚求饜其欲而後止府君亦多怨家能以智馭之獨能脫禍及江南入國朝法制未定州縣吏舞文以盬民府君因毁其家與夫人棲遲小室室中僅容榻案夫人設竈於戶外朝㩦釡出炊暮復持入御紡磚直至四鼓目稍瞑即起敲冰為盥嗽又復從事由是家用頗紓大德丁未嵗惡人相食府君出糴于杭亡賴男子結為隊伍夜半椎人門稱相公殺戮鹵掠呼號相聞里中惴惴不自保時嚴君侍夫人之側夫人與定計以物紿羣盜私走告捕賊掾部里兵襲之盡殱其衆府君聞其事自杭馳還見夫人悲喜交集且曰吾意爾母子作魚肉矣尚在邪已而傳酒相慰慶鄉鄰咸頓首謝曰微君家吾屬入鬼録久矣府君性忠信啓口露肝膽不肯作世俗軟媚無實語與人交無二諾友愛尤篤與兄共執里役州家或有科繇至挺身獨任之曰毋以煩諸兄也府君年五十以家傳於諸子晴檐獨坐拄頰看山世間升沈榮辱了若不相關又二十八年乃終黃文獻公為表其墓曰吉士云夫人粹然如玉而亷隅不可犯婦道母儀可為女中師傅行事暗合古烈女者甚衆齊家一以禮法雖細微事皆遵矩度入其庭上下祗肅無敢大聲疾呼者嵗時出坐堂上羣子姓捧觴上夀夫人厯以畏天為戒復證以近事曰某也善孫子繩繩多某也不善人已犂其庭矣從子有蚤孤者宗人利其資多欲潛害之夫人與府君卵翼至成人為之納室而返其資半髮不私夫人端明而有容其謙損不足之色津津見眉宇間卒享耆夀以終其年視府君又加七焉濓之生也與府君同月日府君特憐愛之四五嵗時府君坐置膝上以手循其髮而祝曰吾祖實寬厚長者生平好施與不求人知吾父孝弟如古人應物務以柔勝亦以恤貧之故致家之索及吾唯先訓是式每衡於心而勿敢忘承吾之利者列于前紛紛也今耄矣恐旦暮死不能有以詔汝汝固幼幸聽吾言即聽吾言期樹善於無窮言訖潸然而泣濓時雖無所識知頗能記府君之言嗚呼府君之為人其心厚於仁者乎濓也不敏學不加修不能使府君之名光輝震耀於來世兢兢惕惕若履淵冰所幸秪奉誨言立身行已頗無愧怍於人庶幾弗悖於府君之教者唐李翺為皇祖實録有云先祖有美而不知不明也知而不傳不仁也府君之美濓既知之矣雖不能工為文辭不可緣是以自陷於不仁之域於是以特牲告于神道列府君之言行而附見夫人之事貽諸孫子使繼夫為善之志歷百世而毋怠云府君諱守富字德政姓宋氏金華潛溪人父諱溥德母周氏夫人姓金氏諱妙圓父諱溥榮母謝氏生四男一女十三孫其世系之詳己見於翰林學士承㫖歐陽公所述刻諸石矣不書懼瀆也前史官介孫濓自製石刻載府君世系今録于左其文曰宋氏世居京兆唐大理丞憲武德間遷吳興憲字秉彛為易講師弟子數千人生有嚴有嚴生邠邠生綏綏生𤣥熊𤣥熊生欣欣生嬴嬴生戣戣生宗捷宗捷生服服生僎僎生循循生伯旒伯旒生榮周廣順中遷義烏覆釡山榮字體仁通尚書春秋私諡文通先生生甫宋雍熙末遷根溪之宋村甫字師杜生訓訓生帳帳生祥祥以弟海子阜後阜生侃從榮至侃七世皆為巨儒侃生永敷柏嘉定初同遷金華潛溪柏字秉操以兄永敷子溥德後溥德子即府君諱守富字德政履仁蹈義類古篤行者妻金妙圓賢甚一言一行可為女中師法生文昭文囿文馨文隆文昭一名朝字文霆有隱德朝廷賜號曰蓉峰處士生淵濓淵義烏醫學教諭濓博極羣書自布衣召入史館為編修官著孝經周禮傳龍門子數十萬言元至正中遷浦江孝門橋上文囿生澄渭沁涫澤潤文馨生溗汶瀛文隆生潚淵生瑛濓生瓚璲澄生琦瓛溗生理沁生珠瓊瑗瑛生性怡瓚生慎愷恂澄瑛瓚璲皆儒噫府君誠吉士哉何其孫子之賢且多也史官歐陽𤣥述先府君蓉峰處士阡表嗚呼惟我顯考府君之殁既窆白石山阡與顯妣夫人同穴於是距顯妣卒且葬時已二十春秋顯妣壼儀幸見諸登述而顯考之隧有石無辭輒泣而書之曰顯考之生也宋方內附官府新建黠胥騁奸家道因之陵遲鹽醯至有所不繼祖妣夫人與顯考鞠躬盡瘁誓勿蹶其門祖妣營度於其內顯考則隨物順成應之於外嵗增月衍頗有成緒祖考府君崇高節不肯屈人下鼠輩或加侵暴顯考於左右之使得以懲其非己而繇役繁興州司臨門急於星火顯考每躡屫而往雖暴露於外櫛風沐雨戒勿使二親知或憫其勞顯考曰在外亦差樂耳不知勞也嵗丁未大祲民散為盜夜持刀入人舍貨錢羊牛聽其所攘稍不從即見殺顯考時役官中用計安盜私聞于公府集社兵禽戮之鄉人德焉雖在事為叢沓中雅志書詩見濓頗知學歡然曰豫家自文通先生以來世多巨儒深懼詩禮之澤或絶以為君子羞心惄焉弗寧雖夢寐弗忘之汝宜從名人游毋殞厥宗人恆市腴田搆華居以遺子孫曾不旋踵隳廢不存者有之豫不能也其自號有知者則令逺附權貴人之門藉威靈以徼榮寵雖稍與仕籍而貪墨弗之戒至身辱家覆者有之吾又不能也豫所望汝者為孝子為悌弟為良師儒雖貧至骨無憾但得州里之人咸指曰宋氏有子矣吾之深願也大抵門不欲其髙惟其德之崇有子不欲其侈惟欲其業之修汝謹識之嗚呼濂也將何修以承明訓邪顯考明白坦蕩不設機穽三尺童子亦遇之以誠有上謁者整冠巾起揖之姻朋過從不以富貧為之重輕人與其處愛戀不忍舍凡見之行事每相謂曰是宋處士邪斯人無僞言僞行當信之弗疑達公顯卿慕其有隱德或逺致牢餼或升堂而拜顯考一以禮接而以義辭翰林侍講學士黃公游浦陽之仙華山約顯考偕行一見之頃顧謂濂曰而翁其有德之人歟容貌辭氣何其與流俗相去萬萬也集賢大學士吳公尤稱顯考之為人嘗贊其像曰形雖臞臞心則舒舒蓋執謙以泛應而樂靜以自娛所以小人之干自不能近君子之譽東西翕如若人者豈非孟氏所謂一鄉之善士者與議者不以其言為過嗚呼濂也將何修而有以紹先德耶顯考分在丘壑不嗜仕進至正初有上其名于朝者賜號曰蓉峰處士顯考曰是符吾志也生平無厚嗜衣取蔽體食取充口不見有憂愠之色晚年尤不嬰世事盤回夷猶陶然得世外之適間取古今事可喜可愕者閲之以治其情年八十一耳聰目明無所苦一旦得微疾猶能起坐食飲如平時越翼日即亡臨終一語不亂逺近聞者嗟悼不置省憲二府遣使者致祭七邑及鄰郡之士咸來弔哭或撰哀挽之詞動盈卷軸時隂雨連月當葬之日白日杲杲葬甫畢雨復如初衆尤嗟異焉嗚呼顯考稟質粹冲凡所謀為自然中乎繩尺孜孜以好善為務遇有戕賊人者則為之蹙額良久嘆曰人形而豹虎行曾不自省邪故上下咸以為有鄒魯上賢之至行人無異詞如濓不肖雖戰兢自守無所愧怍于人尚恨不足敬承明戒克紹先猷年踰五十猶持無用空文出應時須淟涊汨沒而實德且病矣每一念之顔面發頳不能自己因托拾顯考言行以表諸阡以志濓之自咎以告後世子孫知所取法焉滁陽蔡氏道山阡表祠部主事蔡秉彞詣濓請曰彛之曾大父諱某姓蔡氏初居趙川因官于滁遂家焉娶胡氏無子唯育一女懼蔡氏之不血食也乃命季氏子冬後冬負氣自豪殺人亡命竟不知所終遂以女歸來安之許氏許氏諱清字士亷讀書有賢行平居寡言以儉德自將曾大父愛之曰是類我者也命以為子不聽久之乃相從實彛之大父也不幸為高氏子誣搆以死罪留圜扉者二年資産咸廢而大父無愠容大父復無子亦生一女先是句容龍潭人孔氏有諱善者字國寶幼失怙恃唯二兄存頗虐之依仲父以生一且告仲父曰兄若弟一氣所鍾也茍戀區區資業使兄被不義之名人其謂我何請避之仲父為之汍瀾出涕且曰吾在子勿憂於是竟决去無留意行至滁大父見之嘉其知彛倫之理與其語又輕財仗義有特達丈夫志亦以女妙靜妻之刲羊豕大饗姻朋焚香祝天曰吾再世無嗣蔡氏之傳將遂微矣是子其克荷負吾家乎乃後之實彛之父也不數年盡復大父所喪土田人有曲行面直之鄉黨稱其賢生四子長即彛次𤣥童次夀童次慶真及一女至正甲午三月二十九日滁陷于兵先母與女素英抱節赴水死𤣥童慶真皆不知所往獨先人與彛間關渡大江而居金陵先人因憂憤成疾死時八月十八日也彛娶王氏生一子名繼宗嘗念三世皆以異姓為後雖於先王之禮有所未合原其情之所至豈得已哉彛家素積善天必福之異日子孫或衆多各俾一人承蔡許之祀而彛復姓孔氏則於禮為得矣然大父之年僅五十七大母復少四嵗而終父視大母之年又少十嵗母之年則如其父焉四喪皆於黃道山以昭穆序葬山在州東北十五里曾大父兆域之所在也墓石皆無文願子為通書諸碑以示後人天地開闢厥初生民何嘗知有所謂姓氏聖人者出惡其無貴賤親踈少長之别也於是因生賜姓胙土命氏以至於以字以諡以官以邑而族系漸繁矣蔡本姬姓許本姜姓皆以國氏者也孔本子姓以王父字為氏者也而三者何可同乎雖然凡有姓氏莫非神明之胄而出於炎黃之世所謂二十五宗一十四姓者尤多流雖殊而源則一遽謂之不同亦未見其為可也然彛之為孔氏固為不刋之論彼二氏者豈可忘其所付託而為若敖氏之鬼哉誠令子若孫繼之一如彛所言亦出於禮之變耳嗚呼氏族之不傳其淆亂無别亦難明矣使彛不自言數世之後惡知有所謂孔氏者哉昔人有云人有姓氏猶衣服之有冠冕裂冠毁冕雖有帶裳幅舄不足以被飾其身其任不為不重矣其任為甚重人仄視以為輕有如彛者豈非有識之君子乎某與彛友既久若異姓昆弟然故因其請為表著先塋之碑使後世有考焉彛字秉彛為人慷慨疏通其從政也難集之事談笑而成之人號為長才幼鞠同里王時中家遂壻焉已而襲其姓時中既有後今請于朝仍氏於蔡云故天台朱府君霞塢阡表孝子之於親曷嘗有紀極哉唯恐其嘉謨懿行不暴白於後世也件繫羣事既有狀矣足以昭于人人又有𤣥堂之銘銘此狀著矣又有阡上之表焉蓋辭之重復者事必著甚哉孝子之心其有所慎乎仙居朱府君之卒多厯年所其子公立既請縣大夫前進士魏俊民為之銘其二孫木棐猶以為未足復來徴豫文表於墓門揆於古義合矣豫乃按狀而書之曰府君諱嗣夀字得仁姓朱氏世居台之臨海宋殿中侍御史希述其逺祖也殿中君六世祖友直仕為宣撫司某官始遷仙居之東門至府君又六世矣府君之生岐嶷而深沈豐厚而敏慧自為童子時風岸孤鶱昻然野鶴之在雞羣見者莫不異之及游鄉校嚅嚌羣經食芳而潄腴充然若有所得且曰古者為學精神心術一寓之於事為或慮其有不正也必資體驗擴充之功所以皓首窮經不敢輕置之若拈華摘豔鉥心劌腎於辭章間陋之陋者也自是撫世酬物一出於正而異端無實之說了若不經意事父母輒盡其孝奉異母之兄甚於同母者凡事必咨稟而後行遇弟有恩及其蚤捐館舍諸孤貧喪不得入土府君泣曰兄弟同氣也死而不葬吾心其安乎即命堪輿家卜地而藏焉夫妻尤相敬如賔自委禽至髮白無反目之失教諸子力田孝弟不許事紛華靡麗遂名堂曰順德且賦詩以示意待族姻廬井曲盡人情不以貴富貧賤而為薄厚疏數春秋祭其先儀文並循家禮升降跪拜如將見聞其容聲人取以為法治家甚嚴子孫朝夕冠帶承候顔色拱聽訓飭不命之退不敢退也晚年築室東園藝菊花數十本當秋高氣清金錢纍纍然布柔條間府君熟玩不忍釋去或對之酣觴清詠終日且謂人曰菊誠吾良友吾殆托之以逃名乎達忠介公兼善時出鎮于台聞府君有賢行將剡薦于朝府君謝曰仕將以得祿養親也親亡以仕何為哉達公亦不敢彊未幾遘疾府君度不能起召子若孫訓之曰吾晝夜兢兢業業以克至于今日非為仰不愧俯不怍抑且可以見祖宗於地下汝等守爾孝弟篤爾忠信蹈爾禮義厲爾廉恥庶幾不陷於有過之域吾雖死將含笑入地矣已而遂卒時至正乙未十月二十一日也享年六十又九府君曾祖懋宋鄉貢進士祖智父元豪補武學生妣應氏金氏府君金出也娶同縣吕氏先十三年卒子男子二公立公成公成先四年卒子女子一適楊𢎞祖孫男六木松棠棐棣楫木棐即來謁文者孫女一歸吕志尹卒後當某年月日葬于縣東一里馬裊山霞塢之原禮也嗚呼士君子之立身也其功名烜赫於世則登名於國史其次焉則書諸郡志又其次焉則藉薦紳之立言者以傳及其久也未嘗不與史志相為頡頏有若府君之行斥乎澆漓葆乎醇熙一本乎真誠而弗事乎詭隨此所謂一鄉之善士非歟是宜揭之崇阡以為聳善扶世之計而所愧者豫非其人也雖然豫久居禁林海內名公卿及賢士大夫所銘者多矣鮮有徴文於十九年之後者而木與棐有焉則其久不忘乎親可知矣豫雖欲辭之而烏乎辭之若木與棐者亦可謂之孝孫矣乎是為表祝母葉氏塢門阡表姑蔑祝君應升謁濓金陵備列其先母之行丐濓為表揭墓上嗚呼濓也安能表而母乎夫表者所以焯德著美為之庸何傷而濓以弗能者非過激也蓋有所感也私竊自念吾先妣之棄諸孤越十三春秋矣縣繂雖有其石而至今無文方思俯伏薦紳先生之門以求發其幽輝而一時故老凋落盡矣曕望昊天䀌然傷心嗚呼濓也安能表而母乎雖然應升之請力矣濓或遏而絶之則應升將有同濓之感頗聞之君子不以病於己者病夫人於是因應升之言而經緯之應升之言曰先母諱了心姓葉氏世為衢人年二十二來居先君之少房其事正室汪夫人寅畏謹敇有過無弗及焉自先君殁與汪夫人同帷帳者埀三十齡情意欵洽無乖忤之色每子婦進飲食或一味之珍必叩之曰汪夫人已食乎子婦應曰然始敢下筯非惟事長之有禮也其加厲於應升者惟恐弗率于理時立應升於前而語之曰吾不暇泛引古今事以詔汝姑即汝家言之汝目擊焉或耳聞焉效之宜若易易也爾祖南劒教授君與鄉先達徐公友善徐既卒二子析田不能平由爾祖片言而决各受田萬畝二子德爾祖之靖其爭也請以畝二千為夀爾祖力却之踰年二子强之益切乃納其閒田五畝辭多而受少今人所難爾當效爾祖之介當爾祖之殁爾世父甫三嵗爾父方在妊後三月始生爾祖母江夫人冰雪自守寡母孤子相依為命凄然於寒杼苦鐙之間卒能再植厥家爾當效爾祖母之勤爾父由儒補郡吏從衢調婺台二州遷建平縣典史遇刑獄之有疑者必傳經典其無辜坐繫者必察其狀理而出之以故所至人咸稱其賢也爾當效爾父之仁爾祖若父其善行蓋不止是吾耄矣不能詳也以吾之所言則其所不言者宜以意逆之也初江夫人聘我以事爾父我至則江夫人殁久矣我不及侍養也所不深恨者幸而有爾也爾當聽吾言籍而佩之他日有所成立使人謂江夫人有孫是吾志也嗚呼應升何從而能受先母之托乎先母頗涉獵傳記每見書紙在地必掇拾付之水火雖入糞溷中亦固取之人問其故則曰倉頡造書時鬼尚夜哭可賤而蹂之耶性尤巧慧凡紉製縷結之事極其工緻諸女多師之經其指授者皆合繩尺然鬢毛種種未嘗少自暇逸所御衣衾或當漱浣必躬親作之子婦女𨽻求執其勞弗從也生於某年月日卒於某年月日夀七十二以某年月日葬於西安縣靖安鄉大塢門山之原男一即應升孫三曰士成士同士寧先君諱化孫前若干年卒其墓既别有志惟先母之葬已久未有刻文吾子幸畀之非惟有以慰幽靈於泉壤抑將以昭示子孫使服膺慈訓於無窮也先是應升為浦江校官濓獲與之游嘗為記其夀諼堂者堂蓋為母作也備聞其母賢甚因為表其墓曰詩之有無非無儀說者曰婦人無所專於家事有非非婦人也有善亦非婦人也斯言也豈曰婦人不宜有善哉以其行不出閨門謂雖有善人無從而知之耳世之婦女賢者非不昭然明也頗求其故皆其子孫有以揚之故令聞煒煜不隨時而泯沒也然則隧石之文其可不亟圖之乎嗚呼應升能之而濓有弗能焉其可怍也已其重有所感也已故孝友祝公榮甫墓表濓嘗奉詔總修元史凡天下有關史事者下郡國長吏博加采輯悉上送官往往吏非知書者以致龎雜淆亂不足以取徵孝友之人動至數千皆溢浮辭而乖實行濓令史官高啓撰次成編而親為筆削之唯存一百六人皆灼然可以勵世惇俗者而處之祝公榮亦其一焉婺與處雖連壤不知公榮之詳後七年公榮之子崑持所狀羣行求文表諸墓道蓋公榮之殁已十八年矣狀之稱述皆傳中所略者遂次第而序之公榮諱大昌公榮字也居處之麗水官橋里姓祝氏祝出軒轅氏之後至周武王時封彭祖逺孫光為祝侯子孫為齊所并故以祝為姓厯代多有顯人且載家牒可徴也五季初有諱實字茂之者自信安來為處州判官遂遷焉夀九十二以殁葬宣慈杉坑塘之原實生中奉大夫縝縝生朝議大夫儒儒生承議承議生允懷允懷生况况生宋紹聖進士建州司理參軍奕奕生公冕公冕生份份生武學教諭天祐天祐生潭州司户參軍䛬䛬生之琦之琦生紹紹則公榮之父也公榮孝友出於天性其在父母側容色穆穆以和父母意有所欲先候知之不待出言而事已集一日不見心惶惶焉若亡重寶得一甘味雖在百里外必歸薦之然後敢食母病晝夜錬藥奉淖糜以進衣久不脫蟣蝨叢生其間已而疾勢革走謁於羣神且泣且禱語不成聲見者為之揮涕及母殁劈踊無算屢至殞絶其於復襲揳綴斂殯奠祔之禮悉遵古制而不墜流俗之陋煬人不戒火起竈突間烟焰漲天公榮於急遽中力不能救乃伏棺而悲號且曰天乎吾母在斯幸天有以祐之天茍不祐我將與母俱焚誓不獨存也其火忽自滅州里嘆異曰昔蔡順伏母棺而火滅不意今日於公榮見之公榮既葬母朝夕翹首如有望而弗至既而曰是終無以解吾憂也乃命工摶土肖二親像於堂朝夕事之如事生焉公榮敬兄公亮如其父家政大小必關白而後行公亮出仕公榮不敢中席而坐恆若公亮之臨乎上其弟公直亡公榮奔視遂頻仆于地良久乃蘇抱弟尸而大呼曰吾弟去吾而何之乎悲悼過甚髮為之早白撫弟遺孤逾於己所生公榮孳孳以同爨為政請于公亮建家範數十則令子姓分任諸事視其勤惰而懲勸之每旦序食堂上氣象雍肅若不聞人聲三世之間愈愈如也或者欲間之說其分財公榮勃然變色曰此言何為至於我哉必吾不睦于家不敦友恭之道故爾昔張公藝尚九世同居况親昆弟乎茍計利而害義犬彘當不食吾餘因撫膺長慟言者赧然而退故處之人士言孝友者一則曰公榮二則曰公榮至今無間言云公榮風岸偉特善談史上下二千年治忽幾微如指諸掌聽者忘倦尊賢重傅未嘗有毫毛䙝慢意平心率物好惡無所偏徇而尤好施與故舊貧窶者周之死而不能棺者給之或丁嵗儉出粟估糶之青田盜阻行舟民不能鹽食公榮出所儲鹽惠宗族親姻以及於閭井人皆德之當元之末四方用兵蕃閫大臣多鈎致豪傑而布衣之士有談笑取將帥者聞公榮之賢辟書交至公榮笑而辭江浙行中書左丞相方承制行事署為處州路儒學教授亦辭乃築室南野而隱居焉不幸以至正二十年庚子正月一日卒夀五十又八二十一年辛丑某年月日葬於武川飛鳳山下禮也公榮凡三娶先配同縣王氏次東甌王氏次閩中陳氏皆簪纓大族子男子三人曰山曰崑曰豳皆好學尚義崑即來速銘者子女子三人常涓王逹其壻也一未行嗚呼孝者百行之根柢萬事之綱紀也執一術而百善至百邪去唯斯道則然所以化民成俗者汲汲焉是務而莫敢忽也近代之制文臣自少卿監以上武臣自正刺史以上實録方為立傳而能行孝友之政者雖在韋布中亦必登名與之齊行其治化之權衡於是亦可覩矣有若公榮之行之美豈可使其泯泯無傳哉嗚呼古之人有云位登台輔也爵列公侯也祿積萬鍾也馬踰千乘也殁之日曾不得與斯人之徒並稱此無他以風教所關為甚重也濓雖不敏其於公榮之行一一銘之石以為世道之勸孰曰非宜銘曰孝友之根實出降衷金石堪貫神明可通古之君子資之出治因其秉彞牖民孔易雖在布衣彤筆登名其意斯何樹之風聲誾誾祝君愛親靡舍朝斯夕斯肯離膝下親既云亡塗殯在庭臨風泣血哀不自勝煬人勿戒火起曲突有烟勃起上不見日伏棺悲號誓與俱焚誰謂天髙邈若不聞若勢方升熾不可遏不待反風虐焰隨滅家政之修法古名門毫髮敢私唯義之敦嚴布科條各授以事一門雍雍罔有乖戾辟書交飛君笑而嘻我有我政奚暇外馳古有篤行照耀方䇿以今較之孰為優劣埃風渺瀰德化耰鋤况曰善事不忘厥初飛鳳之山林水葱蒨勒文墓門用為世勸故太和蕭府君墓表大江之西蕭為著姓而居太和之後街者為尤盛唐開元間有從浙水東來為縣遂家焉譜圖闕逸不知其名而相傳且二十九世矣自時厥後擢進士第於奉常者後先相望宋氏南渡有為國子祭酒諱某者實生祕書監清伯祕書生南甫某年進士進士生四子長宗聖次宗陽皆以儒學入仕宗聖則臨江府教授宗陽則太和縣校官也次宗孟漕貢進士次則宗元府君然自祕書而下名皆忘今以其字書府君諱夢得元齊其自號也生四嵗而孤鞠於母夫人倪氏年七嵗夫人使之從師即知樂學九嵗善屬文同肄業者皆畏而愛之已而與翰林侍制楊君景行師事鄉先生達觀楊氏於是益潛心諸經而於易學尤精至元庚寅詔定江南版籍適部使者李公行縣李集多士於庭試以經義中者始得預士籍蠲其科繇府君遂升首選時倪夫人已老府君不復有出仕意科目法行雖舊日同門之友多躋膴仕府君淡然若無營或問之則曰吾母日薄西山吾尚欲逺游乎郡二千石及縣大夫數欲剡薦之皆不聽尋與漕貢君於縣西二十里創甘竹别業奉夫人居焉夫人性好施遇內外族姻之急者必思周之府君家雖貧能一如夫人之志女弟及甥女未有所歸府君備資裝配于名族夫人悅而安之及夫人病府君不解衣者數月死則廬墓左三年然後返逺近學者慕府君文行咸願執經為弟子學成而去若同里楊升雲若永新吳從彥若吉水周通若嘉禾俞鎮皆為名進士其焰焰於北方者尤多不能悉舉也府君雖不及仕其仁民愛物之心旦旦不忘縣之賦役無藝强有力者脫籍而使窶夫弱子承焉府君毅然曰是奚可哉乃走白上官稽其物産而甲乙之編為義役三年人以為允川梁有敝壞者勉有力葺治之鄉鄰有訟者及相鬭者是非方糾紛能以片言决之不幸以至正甲午八月十一日卒于家夀七十又七以乙未十二月某日葬於家東某山之原妻邱氏子男一人飛女一人歸廬陵易子韶孫男三人曰執曰安曰鳯執鄉貢進士今選為國子録孫女一人同里吳所與其壻也曾孫男四人曰珠曰韶曰規曰忠府君所著書有易學旁通若干卷燬于兵無復有者府君之葬周通集羣行為狀進士顔成子據之撰銘納𤣥堂中禮略備矣執復來請曰願有以表諸墓道嗚呼爵位可致也貨泉可有也聲問可長也唯世惇書詩不可必也蕭氏自祭酒世傳經于家至於府君尤能繼其志而不墜其靜也于于其動也徐徐不衒鬻而進趨每深藏而自腴殘膏賸馥霑丐於人者亦足以獲多士之譽斯不亦君子之儒也歟是為表先母夫人陳氏墓表先母陳夫人諱賢時金華潛溪人大父諱靜惠父諱道間母金氏諱信夫人年二十來嬪蓉峰處士處士大雅君子生平不識僞言僞行與夫人偕如鼓琴瑟生二子淵濓一女㜪以至正丙戌正月十七日卒夀六十有三其年三月五日即窆于白石山在潛溪西十里夫人淑茂柔明及行尤有聞于六親相處士建家備極勞勩晝趨事夜紉綴諸子衣大暑夕蚊蚋翳擈乃燒燈坐帳中久之帳色如潑墨處士嘗謂夫人曰吾不解市美田宅遺兒教之通一經足矣夫人深然之至賣簪珥使游學逺方夫人早喪母事父甚孝雖在夫家懸懸慕之如飢但得食頗美亟遣人遺之不遣不敢先食夫人春秋未高見淵以醫學鳴用薦者為義烏教諭濓亦自布衣召入史館㜪適儒士賈明善皆有孫矣居亡何不幸殁世濓追痛罔極魄隕心喪深懼懿德不顯於後忍死而書之曰潜溪有賢母焉厥質郁如厥行潔如厥聲蔚如白石之山發徵畜腴其體魄之所寧歟是為表辭凡二章故丹溪先生朱公石表辭丹溪先生既卒宗屬失其所倚藉井邑失其所依慿嗜學之士失其所承事莫不方皇遙慕至於灑涕濓聞之中心尤摧咽不自勝蓋自加布于首輒相親於几杖間訂義質疑而求古人精神心術之所寓先生不以濓為不肖以忘年交遇之必極言而無所隱故知先生之深者無踰於濓也方欲聚厥事行為書以傳來世而先生之子玉汝從子嗣汜忽蹐濓門以先生從弟無忌所為狀請為表以勒諸墓上濓何敢辭先生諱震亨字彥修姓朱氏其先出於漢槐里令雲之後居平陵至晉永興中臨海太守泛始遷今婺之義烏子孫蟬聨多發聞於世郡志家乘載之為詳當宋之季有東堂府君者諱良祐懿然君子人也蓋以六經為教以𢎞其宗府君生某某生迪功郎桂迪功生鄉貢進士環先生之大父也父諱元母某氏先生受資爽朗讀書即了大義為聲律之賦刻燭而成長老咸器之已而棄去尚俠氣不肯出人下鄉之右族或陵之必風怒電激求直于有司上下搖手相戒莫或輕犯時鄉先生文懿許公講道東陽八華山中公上承考亭朱子四傳之學授受分明契證真切擔簦而從之者亡慮數百人先生歎曰丈夫所學不務聞道而唯俠是尚不亦惑乎乃摳衣往事焉先生之年蓋已三十六矣公為開明天命人心之祕內聖外王之微先生聞之自悔昔之沈冥顛隮汗下如雨由是日有所悟心扃融廓體膚如覺增長每宵挾册坐至四鼓潛驗默察必欲見諸實踐抑其踈豪歸於粹夷理欲之關誠僞之限嚴辨確守不以一毫茍且自恕如是者數年而其學堅定矣嵗當賔興先生應試秋闈幸沾一命以驗其所施再往再不利復歎曰不仕固無義然得失則有命焉茍推一家之政以達於鄉黨州閭寧非仕乎先是府君置祭田三十餘畝合為一區嗣人遞司穡事以陳時薦然有恆祭而無恆所先生乃即適意亭遺址建祠堂若干楹以奉先世神主嵗時行事復考朱子家禮而損益其儀文少長咸在執事有恪深衣大帶以序就列宴私洽此不愆於禮適意亭者府君所造以延徐文清公之地先生弗忍其廢改創祠堂之南俾諸子姓肄習其中包銀之令下州縣承之急如星火一里之間不下數十姓民莫敢與辨先生所居里僅上富氓二人郡守召先生自臨之曰此非常法君不愛頭乎先生笑曰守為官頭固當惜民不愛也此害將毒子孫必欲多及民願倍輸吾産當之守雖怒竟不能屈縣有暴丞好諂瀆鬼神欲修岱宗祠以徼福懼先生莫己與以言嘗之曰人之死生嶽神實司之欲治其宫孰敢干令先生曰吾受命于天何庸媚土偶為生死計耶且嶽神無知則已使其有知當此儉嵗民食糠核不飽能振吾民者然後降之福耳卒罷其事賦役無藝胥史高下其手以為民奸先生集同里之人謂曰有田則科徭隨之君等入胥史餌而互相顧非䇿之上也宜相率以義潔其力之朒嬴而敷之衆翕然從每官書下相依如父子議事必先集若苛斂之至先生即以身前辭氣懇欵上官多聽為之損裁縣大夫勸耕于鄉將有要於民先生懼其臨境邪幅扉履往迎于道左大夫驚曰先生何事乃爾邪先生曰民有役于官禮固應爾大夫曰勸耕善乎先生曰私田不煩官勸第公田生青芻耳是時圭田賦重種戶多逃亡故先生以此為風大夫一笑而去鄉有蜀墅塘周圍凡三千六百步溉田至六千畝而嬴堤壞而水竭數以旱告先生倡民興築置坊庸鑿為三竇時其淺深而舒泄之民食其利後十年山水暴至堤又壞先生命再從子漳力任其事以嗣其成縣令長或問决獄得失先生必盡心為之開𨗳東陽郭氏父子三人虐毆小民幾斃又貫針鰌腹逼使吞之事移義烏鞫問當其子父皆死先生曰原其故殺之情亦一人可償爾二子從父之令宜從末減若皆殺之無乃己重乎事上從先生議張甲行小徑中適李乙荷任器來幾中甲目甲怒拳其耳而死甲乙皆貧人甲又有九十之親先生曰貰甲罪則廢法徇法甲必瘐死親無以養亦死乙尸暴於道孰為藏之不若使竟其葬薶且慰其親徐來歸獄服中刑耳或曰甲或逃奈何先生曰若以誠待之必不爾也縣如先生言後㑹赦免細民有斬先生丘木者先生訊之民弗服先生聞于縣將逮之人交讓民曰汝奈何犯仁人邪民曰計將安出人曰先生長者也急舁木還之當爾貸民從之先生果置而不問先生客吳妙湛院尼刻木作人形以為厭蠱館客陳庚得之欲發其事尼懼甚先生知之以計紿陳出碎其木刻陳歸怒且詈先生徐曰君乃士人獲此聲於吳楚間甚非君利儻乏金吾財可通用勿憂也尼後輦金帛為謝先生吻而去方嶽重臣及亷訪使者聞先生名無不願見既見無不欲交章薦之先生皆力辭唯民瘼吏弊必再三蹙額告之不啻親受其病者覃懷鄭公持節浙東尤敬先生以尊客禮禮之衆或不樂競短其行於公公笑曰朱聘君盛舉諸公之長而諸公顧反短之何其量之懸隔邪皆慙不能退初先生壯齡時以母夫人病脾頗習醫後益研䃺之且曰吾既窮而在下澤不能至逺其可逺者非醫將安務乎時方盛行陳師文裴宗元所定大觀二百九十七方先生獨疑之曰用藥如持衡隨物重輕而為前却古方新證安能相值乎於是尋師而訂其說渡濤江走吳又走宛陵走建業皆不能得復回武林有以羅司徒知悌為告者知悌字子敬宋寶祐中寺人精於醫得金士劉完素之學而旁參於李果張從正二家然性倨甚先生謁焉十往返不能通先生志益堅日拱立於其門大風雨不易或告羅曰此朱彥修也君居江南而失此士人將議君後矣羅遽修容見之一見如故交為言學醫之要必本於素問難經而濕熱相火為病最多人罕有知其祕者兼之長沙之書詳於外感東垣之書詳於內傷必兩盡之治疾方無所憾區區陳裴之學泥之且殺人先生聞之夙疑為之釋然學成而歸鄉之諸醫始皆大驚中而笑且排卒乃大服相推尊願為弟子四方以疾迎候者無虛日先生無不即往雖雨雪載途亦不為止僕夫告痡先生諭之曰疾者度刻如嵗而欲自逸耶窶人求藥無不與不求其償其困厄無告者不待其招注藥往起之雖百里之逺弗憚也江浙省臣往討閩寇深入瘴地遂以病還錢塘將北歸先生脉之曰二十日死使道經三衢時召吾可使還燕然亦不能生之也如期卒於姑蘇驛權貴人以微疾來召危坐中庭列三品儀衛於左右先生脉已不言而出或追問之先生曰三月後當為鬼猶有驕氣耶及死其家神先生之醫載粟為夀先生辭之一少年病熱兩顴火赤不能自禁躁走于庭將蹈河先生曰此隂證也製附子湯飲之衆為之吐舌飲已其疾如失先生治療其神中若此甚多門人類證有書兹不詳載先生孤高如鶴挺然不羣雙目有大小輪日出明雖毅然之色不可凌犯而清明坦夷不事表襮精神充滿接物和粹人皆樂親炙之語言有精魄金鏘鐵鏗使人側耳聳聽有蹶然興起之意而於天人感應殃慶類至之說尤竭力戒厲反覆不厭故其教人也人既易知昏明强弱皆獲其心老者則愛慈祥幼者則樂恭順莫不皆知忠信之為美固未能一變至道去泰去甚有足觀者或有小過深掩密覆唯恐先生之知凡先生杖履所臨人隨而化浦陽鄭大和十世同居先生為之喜動顔面其家所講冠昏喪祭之禮每咨於先生而後定蓋先生之學稽諸載籍一以躬行為本以一心同天地之大以耳目為禮樂之原積養之久內外一致夜寐即平晝之為暗室即康衢之見汲汲孜孜耄而彌篤每見誇多鬭靡之士輒語之曰聖賢一言終身行之弗盡奚以多為至於拈英摘豔之辭尤不樂顧且以吾道蟊賊目之及自為文率以理為宗非有關於綱常治化不輕詅也居室垣墉敦尚儉朴服御唯大布寬衣僅取蔽體藜羮糗飯安之如八珍或在豪姓大家當其肆筵設席水陸之羞交錯於前先生正襟默坐未嘗下箸其清修苦節能為人之所不能為而於世上所悅者淡然無所嗜惟欲聞人之善如恐失之隨聞隨録用為世勸遇有不順軌則者必誨其改事有難處者又𨗳之以其方晚年識見尤卓嘗自括蒼還道過永康謂人曰青田之民嚚悍值此法弛令乖之時必依險阻嘯聚為亂已而果然又嘗告親友曰吾足跡所及廣矣風俗澆漓甚垂髫之童亦能操狡謀罔上天怒已極必假手殱之盍力善以延其𦙍乎時方承平聞者咸笑先生之迂言未幾天下大亂空村無烟火動百餘里先生所著書有宋論一卷格致餘論若干卷局方發揮若干卷傷寒論辨若干卷外科精要發揮若干卷本草衍義補遺若干卷風水問答若干卷凡七種微文奧義多發前人之所未發先生嘗曰義禮精微禮樂制度吾門師友論著已悉吾可以無言矣故其所述獨志於醫為多先生生於至元辛巳十一月二十八日卒于至正戊戌六月二十四日瀕卒無他言獨呼嗣汜謂曰醫學亦難矣汝謹識之言訖端坐而逝享年七十有八娶戚氏道一書院山長象祖之女先三十五年卒子男二嗣衍玉汝嗣衍亦先三年卒女四適傅似翁蔣長源吕文忠張思忠孫男一文椐女二一適丁榆一尚幼其年十一月日始葬先生于某山之原卒後之五月也先生所居曰丹溪學者尊之而不敢字故因其地稱之曰丹溪先生云夫自學術不明于天下凡聖賢防範人心維持世道之書往往割裂掇拾組織成章流為譁世取寵之具間有注意遺經似若可尚又膠於訓詁之間異同紛拏有如聚訟其視身心皆藐然若不相關此其知識反出於不學庸人之下於戲秦漢以來則或然矣然而靈豸不鳴孽狐之妖弗息黃鍾不奏瓦缶之音日甚天開文運濓洛奮興逺明九聖之緒流者遏而止之膠者釋而通之一期闓廓其昏翳挽回其精明而後已至其相傳唯考亭集厥大成而考亭之傳又唯金華之四賢續其世𦙍之正如印印泥不差毫末此所以輝連景接而芳猷允著也先生少負任俠之氣不少撓屈及聞道德性命之說遽變之而為剛毅所以局量𢎞而任載重寤寐先哲唯日不足民吾同胞之念須臾莫忘雖其力或弗支茍遇惠利少足以濡物必委蛇周旋求盡其心應接之際又因人心感發之機而施仁義之訓觸類而長開物成化所謂風雨霜露無非君子之教者要亦不可誣也致思於醫亦能搜隱抉祕倡明南方之絶學嬰疢之家倚以為命先生一布衣耳其澤物有如此者使其得位于朝以行其道則夫明效大驗又將何如哉嗚呼先生已矣其山峙淵澄之色井潔石貞之操與其不可傳者弗能即矣徒因其遺行而誦言之見聞不博惡能得十一於千百之間哉雖然舍是又無足以求先生者敢托狀之概叙而為之銘曰濓洛有作性學復明考亭承之集厥大成化覃荆揚以及閩粵時雨方行區萌畢達世𦙍之正實歸金華綿延四葉益煜其葩辟諸上尊置彼逵路隨其志分不爽其度有美君子欲振其竒血氣方剛疇能侮豫七尺之軀忍令顛越壯齡已踰亟更其轍更之伊何我笈有書負而東遊以袪所疑非刻非厲曷圖曷究豈止惜陰夜亦為晝昔離其罿今廓其朦始知人心與宇宙同出將用世時有不利孚惠家邦庶亨厥志勤我祠事以帥其宗况有書詩以陶以礲以暢其施期夀夫物茍躬可捐我豈遑恤仁義之言繩繩勿休昭朗道真釋除欲仇上帝有赫日注吾目天人之交間不容粟聽者聳然如聞巨鏞有聲鏗鍧無耳不聰旁溢于醫亦紹絶躅開闡𤣥微功利尤博斂其豪英變為毅𢎞所以百為度越于人呫呫世儒出入口耳競操鬭華析門殊軌以經為戲此孰甚焉不有躬行其失曷鐫世塗方冥正資揚燎夢夢者天使埋其耀精神上征定為長庚與造化遊白光焞焞表德幽墟遵古之義僉曰允哉是祠無愧諸暨方孝婦石表辭嗚呼是惟孝婦方氏之墓夫孝未易稱余獨歸之孝婦而不靳者將以愧為人婦之不孝者也孝婦姓方氏諱迎越之暨陽人生二十七嵗歸同里楊君敬敬有母何氏孝婦左右就養惟恐違其志何病腑道澀不能親御偃溷孝婦浸之湯盆中以指探出之積嵗之久手文皆龜裂而孝婦未嘗有倦色昔人有為親浣厠牏者史臣尚以為難載之於策考孝婦之事尤人所難者耶人之所難者且若是則孝婦其他之行弗問而可知也嗚呼是尚不得為孝婦矣乎使如此而不得為孝則夫勃溪而不恭者乃足為孝乎豫自成童時讀劉向所傳古孝婦事以為斯世何為無此人心雖未敢必其無然歷三十餘年卒不能一逄嗚呼余豈意今於暨陽乃見之也暨陽距豫金華僅二百里豫昔嘗兩至其處而不知有孝婦至今始得知之嗚呼豫又意世之如孝婦者夫豈少哉特以不遇于君子故湮滅草萊而人弗聞之耳其弗聞者豫固無如之何其幸而得聞者可不大書揭之崇阡以愧人婦之不孝者耶非惟愧人婦也抑將愧人子也孝婦性儉慈頗知讀書嘗粥田教子父德在母張皆宦族年六十一生二子恆慧其卒以至正二年九月五日其葬於馬鞍山以三年十二月二十二日云志凡二章故成穆貴妃壙志成穆貴妃孫氏諱某其先世居陳州父和卿仕元朝因家江南毗陵母朝氏妃稟性賢淑聰慧過人父母既亡長兄楧治家事值元末天下大亂妃年十三隨次兄範避兵揚州遇青軍陷城一時離散範不知所在元帥馬世熊妻遂育妃為義女年十八未聘上聞其有容德詔納宫中及至言行皆有禮法如古賢女嘗請於上訪求楧得相見上即位册為貴妃位居衆妃之首妃益小心恭謹上甚至有警戒相成之助佐皇后以理內治宫壼肅雍上下咸無怨者侍上十有五年生四女其第二女蚤卒洪武七年秋九月癸未妃得疾至庚寅薨年三十有二上為之感悼詔諡成穆復緣人情定議命東宫親王持服一朞勑有司營葬具甚厚念其無子賜田租三百石令楧供嵗時祭祀之費卜日未得吉停柩宫中者兼旬至十月己酉始權厝京城朝陽門外禇岡之原禮也塗殯有期謹奉敕書其卒葬嵗月納諸壙中嗚呼哀哉故檢校孔君權厝志故奉議大夫湖廣等處行中書省檢校官孔公諱瀛字世表宣聖五十三世孫初家曲阜四十七世曰傳始遷衢故事孔子之後得補文學掾公年二十有司以名上署昌國州學正教授嶽州湖北亷訪使者辟為書吏除江浙等處儒學副提舉階將仕郎間乘馬出道逄宣政使騶從甚都公直前不避使使人讓之公曰我真聖人之裔官乃僞浮屠豈應相避耶政成以入廣例升尹海陽改浣江二邑民安之湖南亂公供億軍中朝廷録其勞授以今官尋以使事入蜀議連兵殄寇至蜀蜀亂公間關巴峽間久之復經雲夢泛洞庭回鄂鄂又亂妻張子思樵溺死傔媵散盡唯繼室高昌氏及爨下兩丁嫗存公度鄂不可居航彭蠡直趨豫章尋自豫章下九江九江又亂百具咸沒公被垢衣倀倀走持孔氏南北譜唯恐失之見者或曰迀人哉或曰此知本者也公一弗顧轉徙來金陵依富川族孫克仁居㑹高昌氏生子頗自慰曰得是亦足矣越三月子死竈嫗亦亡公旦暮淚不收衢抵金陵路餘一千耳思還衢未行適衢人至言其家廟蕪不治田若廬為戍兵所據益鬱鬱弗能解血出隂中藥之劇或具牲幣請禜鍾山神公罵曰死生命爾神安能制哉急去毋汙我逮疾革召克仁謂曰克仁克仁吾出千萬死至此意能歸正丘首豈知死於道路以鬼事纍汝語已目視霄漢者久之克仁亦凄然不能對夜漏下二十刻卒時壬寅五月二十有一日夀六十三公生紈綺家遇風日佳時必張樂設燕為樂趙歌燕舞交錯乎後先公頽然自放其中適甚末路顛連孑孑作寒窶士然生平俠氣時時見眉宇間識者憐之性頗嚴介子姓侍側終日不交一語多憚不敢近及是旅死無為主後者唯高昌氏擁鼻號聲不忍聞克仁雖貧力為具棺斂擇不食之地於石子岡距金陵城南三百步以卒後三日舁公柩權厝焉濓與公皆浙水東人故數造公公喜執濓臂曰吾見子殆欲忘食也未卒十五日與㑹稽梁君元亨㑹飲克仁家公居筵端劇談至日西下飲酒雖稍减精神浮動猶津津然不意公之遽亡也嗚呼人孰無患難未有甚如公者妻子死欲盡流挫困踣無所不極似可已矣若俾令終于鄉薶骨從先人復何害亦竟霣魄於此其甚可哀也夫公生神明之胄歷仕四十年又得中夀以死死且得禮葬視血染刀劍身膏草莽者又何如在公可以無憾雖然後嗣弗續古人所深悲公不幸蹈之人歟天也使公有知目决不瞑於泉下奈之何不哀乎濓聞公死哭之慟克仁請志其事因收淚以書其略若公羣行之詳則有俟於撰銘文者文憲集卷二十四
