body:
  text: 文憲集卷二十二明宋濂撰墓志銘凡十三章故江南等處行中書省左司郎中贈奉直大夫浙東等處行中書省左右司郎中飛騎尉追封當塗縣子王公墓志銘洪武戊申春正月皇帝正位宸極布告中外念及舊勳例頒恤典於是故江南等處行中書省左司郎中王公之殁已七年矣初公之既殁上詔有司議贈公奉直大夫浙東等處行中書省左右司郎中飛騎尉追封當塗縣男且俾與享雞籠山功臣廟中上猶未慊其情至是復仍其舊縣進爵為子以寵之公之子文感皇靈之洊被也䖍奉命書副墨焚告于墓下明年己酉冬十一月持翰林待制王君禕所具事行求濂為銘以侈上之贈濂辱與公游不敢讓之遂按狀而序列之公諱愷字用和姓王氏太平當塗人幼有大志沈酣六經諸史間必欲見之于用起應府公之辟為府史疏讞獄訟人服其平嵗乙未上取江南兵臨當塗即召公至幕府上方為元帥命為掾以參決戎事丙申春從王師下建業又下京口京口民新附杌隉不安公慰撫之始定上為中書平章政事建江南行中書省於建業升公左右司都事公遇事善于彌綸日以薦賢為先元戎宿將咸器倚之唯公言是信戊戌秋猫獠兵數萬自杭來降待命嚴陵境上上遣公馳入其軍喻以禍福偕其渠帥來朝是年冬上將征浙東時婺之蘭溪已下僉樞密院事胡公大海戍之上命公與胡公定議取婺親帥師圍其城守將出降公審察民情而奠綏之厯言上前無有不聽者己亥春王師攻越久不下夏六月師還上留胡公鎮婺而民賦軍器之務咸以屬公冬王師克三衢擢公左司郎中總制衢州軍民事公增城浚濠置遊擊軍募保甲翼餘丁及舊民兵得六百人以益戍守兵食不足則斥並城廢田五萬七千畝使之耕以自給民有田力弗能藝者聽軍士貸耕而為輸糧縣官籍江山常山龍游西安四縣丁壯凡六丁之中簡一以為兵置甲首部長統之丁壯八萬有竒得兵一萬一千八百無事則為農脫有警則兵者出攻戰而五丁者資其食開平忠武王屯兵金華其部將或來侵民公偵知之械而撻諸市王使人讓公公對曰民者國之本將軍天子股肱肯令傷其本乎撻一部將而萬民安計將軍所樂聞也王嘆美之開化馬宣差挾舊邑印章誘編氓為變江山楊明恃寨栅之險叛服靡常公皆定計擒之梟首以徇衆部內帖帖無譁民饑疫相仍死者枕藉道路公出倉粟使作糜哺餓夫修惠濟局居藥以注病者所活不可勝數學校廢於兵公為浚泮池築杏壇建極高明亭設博士弟子員孔子家廟之在衢者公亦為新之退食之暇輒集薦紳之徒摩切道藝人士翕然悅服諸暨戍將謝再興與部帥王甲有違言幾致亂上令公調解之公善於說辭二人之歡如初邊鄙以寧同僉樞密院事李公文忠以國之懿親握重兵鎮嚴陵上命公往來任其軍庚子夏六月僞漢冦龍江上召嚴陵帥葛俊搗廣信以牽其師道過衢公謂俊曰廣信僞漢門户彼既傾國入冦寧不以重兵為守非大將統全軍以往不可若出偏師撓之未見其利設有挫衄吾衢先繹騷矣乃止俊而請胡公行胡公至而廣信潰一如公言辛丑夏拜胡公江南行中書省參知政事分省于婺以控制東浙公仍以左司郎中分治省事金華婺劇邑役民無藝公令民自實田請都以糧多者為正里長寡者為副正則以一家或二家充副則合四三至七八而止通驗其糧而均賦之有一斗者役一日賤與貴皆無茍免者金華周泰義烏柳昌恃俠以蠧民公逮至於獄皆痛懲之自是畏避不敢吐氣猾胥潘立道操金華一邑田賦之柄飛寄詭遁並緣為奸利公廉其罪狀以聞置於法胡公日治軍旅以略嵊縣禦諸暨為己任分省之政皆公統之公挈綱布紀風采凛然僞吳將吕珍侵諸暨欲堰水以灌其城胡公奪其堰反決水灌珍珍勢蹙乃馬上折矢與胡公誓請各解兵公聞之移書謂胡公曰彼狡謀爾慎毋信今珍在重圍是天授首之日也胡公不忍食言竟從之珍畏敗盟而去先是猫獠軍來降胡公分其衆萬餘戍婺未幾猫獠等相挺為亂胡公被害公亦及於難當難作時猫帥多公恩欲擁之而西公正色叱曰吾天子大吏設不幸義當死寧能從賊反耶賊初縮首不敢犯拘縶一日而罵賊聲愈厲命左右取酒引滿竟日達夜旁若無人賊知不可屈遂刃之壬寅春三月七日也享年四十有六上駐蹕江西聞公之死為之嗟悼良久親為文祭之及返柩金陵上復率羣臣往城南致奠乃以某年四月十一日葬江寧縣鳯臺西鄉聚寶山之原公狀貌龎偉氣局堅凝善謀而能斷嘗以事入諫上弗聽公却立户外既暮猶不去上出怪問其故公從容諫如初上慨然從之公於吏事尤長據律按比而飾之以儒術案牘經其裁削辭簡而意周喜為詩歌與賔朋談笑樽俎間更倡迭和情意豁如也故於其殁也人莫不傷之公父諱榮母孫氏配張氏子男子三人長即文有學行今為侍儀使階承直郎次行賊害公之際行方侍側或勸其去行曰棄親而求生吾不為也卒隨公以卒次升童孫女一人濂為左史時侍上左右嘗與濂論佐運之臣以字稱公曰王用和經濟之材也吾將大任之惜乎早殁于難則上所以簡注公者為何如使公之存至於今必躋政府厯憲臺澤及於民者將益廣不特前所書而已人之患也有才而無其時今公雖有其時未能大顯而命止于斯不亦悲夫雖然公之贊治外垣為賢賔佐及臨患難詈賊而死為忠臣天恩所加便蕃優渥名亦足以不朽矣在公可無憾銘曰真人之興肇自濠梁白旄黃鉞指麾四方桓桓豪英雲合嚮應維時王公杖䇿出迎龍旗所届靡役弗前借箸以謀燭於幾先莫搖嚮風帥徒內附公往撫之謂公來莫浙河之東婺為名邦六師一臨完城以降奏凱而旋留將戍守公持文墨參其臧否姑蔑遺墟既入版圖兵民二柄孰斡其樞帝詢在廷非公疇可公拜稽首即日上道城增而高復浚其濠游擊置戍金柝夜囂孰為頑民嘯呼搆亂誘而縶之邊烽晏晏出粟哺荒注藥起尫民豫且康弗教則狂乃新泮宫乃置博士乃設俎豆乃經乃史金華建藩控于海東還公來治若疚在躬科繇匪度均之平之閭右奪政辟之刑之民樂其生親若父兄敵畏其威望如長城豈期妖豎相挺為變大詈不屈遂罹於難人孰無死公死則忠正氣不沒凌厲秋虹皇情盡傷親御翰墨摛文祭之龍光赫赩受才孔多竟不盡施清風宰木凄其餘悲不朽維文大書深刻後百千齡過者必式故贈將仕佐郎禮部員外郎瞿府君墓志銘濂侍講禁林時蘇之良士瞿公莊來為典簿其為人也文學蔚茂而勵行堅凝濂甚敬畏之凡應制諸作多出其手率皆稱㫖自是與之締交不翅伯仲然間以先府君墓銘為屬濂以索文者接踵于門雖諾之而未暇為今蒙恩致政家居又復移文以申前請乃序其事而繫之以銘序曰府君諱嗣興字華卿姓瞿氏其先居河南後徙通州之海門宋末有諱某者避兵南來至姑蘇之常熟家焉生二子曰青曰達俱有才力能伏其鄉人元兵取江南有劉將軍者徇地至姑熟青與達帥里中强壯拜馬前迎之有猘犬突出軍中衆愕眙持弓不敢發青直前一箭射殺之衆歡曰壯士壯士可官也青曰吾不如吾弟達將軍遂出旗號俾達招諭未降者承制授達為百夫長及宋亡遷蘇州巡鹽大使兼管內六縣捕盜轉憐口提領娶某氏府君其子也府君少時家有祿食日從其徒射獵飲酒為樂不喜學書然天資仁善和順未嘗有過年十七時憐口以例革不置官提領君家食甚貧府君即折弓矢脫略紈綺故態躬力穡事以養二親承候顔色唯恐弗至母嘗病疽時天熱疽潰臭不可聞人皆掩鼻趨過府君跪牀下執蒲葵扇驅蚊蚋以手摩穢剔汙扶其起卧不解帶者三旬至愈乃止母又嘗患積氣危甚醫弗能攻或告以股肉可療其法置刀盂上而禱于神俟刀躍乃可割府君如其言自旦至晡頓顙于地顙破血流被面刀弗動府君泣曰天忍不憫我耶我縱以身易母猶甘之肉何暇惜乎知刀終不可動起引之割肉置盂中裂帛漬血裹創戒左右勿泄羮之謬稱他肉以進母不食已五日見羮喜為之握筯食一杯幾盡食已而瘳母後感疾思啖菱時菱未葉遍市之不得解衣入菱澤中哀號索之竟日手足皆腫俄得菱實三馳歸遺母母疾如失既而貧愈甚或隔日一炊府君曰事急矣儻守之而不變如父母何攜家入蘇城謁多錢翁有所稱貸多錢翁察府君誠信可仗出資財俾府君貿遷而分其息十之二府君由是稍裕凡父母所欲無不致也府君不妄取而好施嘗朝出道獲人所遺囊有楮幣若干錠視其名則市中小夫府君坐不貼席走其家還之有墜田宅券書及他貴物于路者府君覽之曰券書失啓爭端蹤跡其人呼與之其人權貴家奴失主券畏罪欲求死叩頭謝曰活我者公也氊工王氏大雪凍餓不能起竈突無煙府君憐之天未明攜錢二十緍潛投忩隙而去歉嵗出糶有窶人來糶衣不掩脛府君受其錢五千陽忘曰汝糴十千邪倍與其粟鬻蔬者過門府君取蔬五錢授以楮幣十倍曰汝當以餘錢畀我鬻者笑曰吾安有餘錢邪府君曰汝第持去俟錢多歸我不汝急也其意實豫之而不欲其知皆此類凡負販者必多給其直家人怪問其故府君曰彼胝肩繭足以求升合利吾忍與之較邪嵗丙申常熟凶民來依者數十輩府君僦舍館而食之癘氣發者相枕藉府君躬親粥藥而時進之卒賴以生府君晚喜浮屠言讀其書豁然若㑹其意者復閲北溪陳氏性理字義即解其要曰聖賢之學蓋如是因戒其二子懋莊曰我少不學至老而始悔若等其勉之二子服父訓刻志事學莊入國朝蔚為名儒從典簿升禮部員外郎府君及見之曰吾有望矣洪武乙卯九月府君得疾恐念慮或亂畫紙為圓圈揭屏間常目之二十七日卒于家卒前一日楚府伴讀陳子晟等道過府君將之京問府君欲何言府君以兩手加額曰語吾兒莊努力供職報天子恩我死當不恨享年八十有四莊在部纍請封于朝未報卒後月餘贈將仕佐郎禮部員外郎娶蔣氏贈安人事舅姑如府君之孝舅姑或怒則率子女羅拜于前曰新婦誠可怒願念諸孫貸其罪舅姑意不解悲請至再三乃已年七十三先九年卒是嵗十月二十三日葬於吳縣橫山梅家灣之原與安人合兆男二人即懋莊女三人一夭二適某某孫四人紹緒紳闕曽孫男二人闕女一人府君殁之明年莊自員外郎拜福建等處承宣布政司左參政階通奉大夫於法當得加贈云嗚呼孝者天下之大經也一鄉得孝子焉則一鄉睦一邑得孝子焉則一邑順一郡得孝子焉則一郡治此無他人之所秉恆性固未始有殊而移風易俗之道蓋莫急於此也然而孝行之至心與天通韋布之士往往能感於神明發於祥徵載諸史牒復有不可誣者今府君不自有身唯欲其親之安刲股愈疾固人之所難至於菱未華時而能獲實者三非神明陰相之未必能致斯則心與天通之驗也在宋之初貴池有孝子者曰葉薈秋九月母有渴疾思生李食之薈號泣樹下忽叢葉中得雙李如彈丸人以為孝感府君之事寧不與薈類耶薈之名尚傳於今而弗泯則夫府君者其不當有傳耶兹銘之所由作也銘曰維孝之德是謂天經秉厥恆性體順達誠有美孝子醇懿是循但知有親遑恤其身親病在寢子兮呻吟稽顙于庭籲彼百神我命弗顧體肉何惜親年可延我志則懌求菱大澤悲啼欲喑豈意未華獲實者三天鑒哀衷顯厥祥徵揚之邇遐聲光騰騰卓行若兹亦足不朽况其立心一歸忠厚惟仁惠窮日惟孜孜吾分當然奚求人知施德不食其子維良上簡帝心參預藩方勒石幽宫文不妄飾此孝子墳過者宜式故中順大夫北平等處提刑按察司副使吳府君墓志銘府君諱肜字文明姓吳氏世為臨川人頴異越常流從虞學士集危左丞素學二公深相器重應舉鄉闈弗獲選去補江西行省理問所令史益種學績文不倦夜以繼日遂擢至正丁亥進士第授贛州路録事階將仕郎時郡守二皆朝廷重臣苛察繳繞察見淵魚僚屬重足而立莫敢仰視府君以事至府數與之抗辨氣凛凛不回撓初甚怒罵已而反賢之贛俗泥堪輿家說有踰半世不葬其親者府君召父老諭之曲盡倫理不兩月間葬者以千數民家二女咸學浮屠法揚言翛然坐脫無知氓競奔湊之府君坐以左道上官持不可府君謂其母曰吾聞坐逝者必焚其身以收舍利約以明日行火母亟來謝曰女幸生矣人告妻弟奪其金條脫者絶無左驗府君陽令中柝之告者欣然謝去妻之弟獨灑泣不輟乃杖告者而與泣者衆以為神朱甲與湯乙仇自刺而誣湯為盜妻實之官捕湯煅治竟誣伏府君察其色有寃以計紿朱妻出所刺刀其血猶在遂縱湯而罪朱劉漢銜李敬甫無以快其忿搆其集衆攘已資府君得其情往白守守怒令易辭府君不從更以它吏成案戮李于市當刑之日雷震守㕔事吏尋為厲所困自刎死郡兵暴橫虐諸民府君每直之守寖不悅民怨羣起而逐之因擁府君為守府君曰擅廢置二千石者族汝曹聽我言當迎守還不然吾決不從汝族也衆皆潰去越翼日復聚城外鼓譟焚廬舍為亂府君請守出共帥壯丁趨火獲造謀者梟其首餘置不問一郡帖帖時營國公和尼齊出鎮江西三品以下得専封拜功狀上署府君為郡治中實超四階至正戊戌僞漢兵圍城踰三月府君調度供億無闕及勢蹙慷慨自誓躍馬欲觸鬭民爭擁不得前城陷僞漢竒其才令軍中有生獲吳治中豫百金府君被報命釋而官之竟以謀脫歸臨川遁匿嵓谷日以奉母為樂若將終身焉郡既入職方守臣侯至善力薦起之乙巳秋七月拜國子博士成均初設其建立規制及銓選祠祭之事府君皆與聞贊決者甚衆丙午春正月轉同知嚴州府事浙江猶未下曹國公李文忠方議征進府君轉輸軍餉至軍前公以能稱之吳元年丁未召還南京與禁林諸老共議即位郊祀儀注洪武戊申春正月擢僉湖廣等處提刑按察司事階奉議大夫三月至官分部荆襄上疏言五事鑄降諸處印沙汰荆州湖泊官省武昌等處批驗所復荆峽二州田額均石首公安江陵三縣水夫科繇秋七月又上疏言興學置安陸驛傳輪役遞運船及給鑄錢諸物價等事上皆從之己酉秋九月改僉山東提刑按察司事庚戌夏四月以東昌土曠人稀請省博平清平夏津朝城館陶觀城范七縣秋七月超拜中順大夫北平等處提刑按察司副使薦剡人才唯恐失之兩考北平鄉試而得士為尤多癸丑春三月召還京值疾作而終夏四月二十又九日也享年五十有七曽大父某大父某父輔有恩在州里稱為惠人母蔡氏元配胡氏前十五年卒繼室彭氏子男四吉祥勝安皆夭唯林童耆齡存女八已亡其五長適胡中胡氏之兄之子也次適太常掾施興嗣幼在室生平撰述甚多有弱齡壯遊山居南游金蘭五藁藏于家初府君既沒興嗣以其子幼乃來京師請熊參軍􅀢狀其羣行徵豫為之銘其致辭悽以悲豫惻然諾之未及為而興嗣殁方懼吾文無所授而胡中又竭蹶來請辭如興嗣而有加焉遂以畀之府君權厝京師南門外中乃奉其柩歸將以某年月日葬臨川縣之赤岵山并持興嗣之骨還付於其家中亦可謂義士也已豫聞祭統有云銘者論著其先祖之有德善功烈勤勞慶賞聲名列於天下蓋孝子慈孫之所欲得者也今不敢廢兹義序而銘之庶慰府君於九泉之下使興嗣有知亦將無所憾矣銘曰虎蔚炳煥文何彰耶剗凶燭姦政何良耶動合矩度行何方耶位之欲昌而底于亡耶松摧柏焚孰知其為棟為梁耶神理冥茫胡可以測量耶四尺之墳岵山之陽有永其藏慎毋壞傷故懷逺大將軍同知鷹揚衛親軍指揮使司事于君墓志銘惟于氏逺有世序多以文學為業族居南康之都昌至君益顯融於時大父德仲贈明威將軍某衛親軍指揮使司副使上騎都尉追封河南郡伯大母王氏追封河南郡君父祥英贈懷逺大將軍同知鷹揚衛親軍指揮使司事輕車都尉追封河南郡侯母余妙真封河南郡太夫人君幼知讀書通大義縉紳先生稱之既長磊落有大志不屑為變情徇勢之行㑹元政大亂天下兵動江東西化為盜區分寧徐夀輝建僞號曰宋都九江使其將張福夏彰據湖口元將薩木丹巴勒駐師鄱陽都昌適當其衝要交互殺掠民倀倀不知所從君召父老子弟謂曰吾等皆良民順冦兵官軍以為叛從官軍則冦兵又將屠我行見無噍類矣其計安出父老子弟咸叩頭曰微君不能生我君乃集諸少年趫健者列為隊伍朝暮教以擊刺之法旬月間整整可用乃握劔坐庭中下令曰賊兵有入吾境共擊之不用命者斬衆皆股栗賊聞不敢犯同列有忌君能者數潛通搆害君皆先機而梟其首人以為神嵗乙未徐兵破鄱陽君之勢遂孤都昌繼陷徐聞君名急搜訪獲之命為江東宣尉元帥鎮鄱陽嵗庚子徐之柄臣陳友諒殺徐而自立更僞號曰漢君乃泣曰我與陳皆徐君之臣陳不道乃爾我可北面而事之耶當是時皇上龍飛臨濠定鼎建業豪傑之士爭相奔走君遣使者奉幣以浮梁降上悅而受之君輕騎謁上於龍江詔宰臣燕饗之禮意優渥賜以金鵰頂帽暨錦袍一襲授通議大夫行樞密院判官戍徽州永平翼遣之鎮行十里所復趣還解金連環并縧授之且曰豫賜卿冠衣不可少此故又召卿來爾君感知遇之深誓殫報效上疏曰于光之心鞠躬盡力報國一忠死而後已上命左右藏弆曰此于光誓書也君察僞漢國政不一兵出於外潛獻搗虛之䇿上親征九江君與郡將皆從飈行電疾友諒以為自天而下棄城宵遁君將兵下黃梅瑞昌諸城亡何助攻建昌拔之出戍鄱陽友諒攻洪都上親往大戰彭蠡湖友諒斃於流矢其子理假息武昌詔常忠武王追攻之理遂輿櫬銜璧出降君皆在行中與有功焉轉同知振武衛親軍指揮使司事遷鷹揚衛進階懷逺大將軍時僞吳張士誠據浙西淮東數州之地君從大將軍徐魏公往討泰興高郵淮安安豐皆下張之徑卒皆聚湖之舊館魏公督諸將及君破之遂平湖州下姑蘇士誠就擒及魏公征中原君統鋭兵以從益都沂棣登萊諸州次第平乃入汴梁克洛陜攻下潼關君與郭將軍守之元將王左丞自河中帥衆來奪關兩兵方挾戰君舞㦸橫貫其中大呼殺入元兵奔潰追斬之積尸盈野越六月進擊河中拔其城魏公命戍鞏昌元將庫庫特穆爾屢引兵來戰君輒搗走之敵兵不敢東向遂合諸部兵圍安定州君急分兵往救兵少不能戰退屯三十里復與元别軍㑹君腹背皆受攻遂被執百計誘其降不屈韓將軍戍蘭州元兵來圍城擁君行城下使誘將軍降君呼曰我不幸被縛誓死不辱國爾輩受大明皇帝厚恩當堅守以伺大軍之至勿信其甘言所誘也元兵大怒批其頰擁之使去尋聞被害上悼之錫以布帛令其家成服行喪遣祠部官祭以少牢奉其神主配享雞籠山功臣廟中君諱光字大用于其姓也自二十五嵗起兵至四十三而殁氣貌修整善鼓琴能吟古今體詩多古雅不凡兼通醫學針灸科人望之翩然貴介公子也及持㦸上馬輒鷹揚虎視所向不敢當逢者莫不改容太夫人性剛嚴君事之孜孜盡禮唯恐稍違其意遇氣有未平君長跽於前移時不敢起君子尤稱焉娶鄱陽劉淑姬通書史封河南郡夫人子男二人蕃與宣也君生於天厯戊辰九月十四日殁於洪武庚戌其月日則不可復知矣辛亥某月日蕃用招魂禮葬君衣冠於某山之原前葬一月其外舅建德令劉君爆狀君之行引蕃來拜于庭請為銘揭諸墓門嗟夫君以一書生嬰亂世乃能倡義旅以捍鄉邦繼而率衆歸有道之朝四方征伐為前鋒幕府上其功殆無虛嵗惜乎安定之後孤軍深入不能制勝遂致陷於虎口天乎命邪有識者蓋悲之也然君能執節不回視死猶生卒不負誓書死而後已之言亦可謂夷險一節者矣銘曰麟之師師鳯之儀儀治世之竒有力如虎長㦸徑弩才堪用武惟君之生丁時搶攘六合虎爭投筆而起集厥師旅以障州里真龍天飛大明赫熙仗劒來依帝曰嗟汝爾鎮歙土以安黎庶大軍長驅何戰不隨翦漢縛吳借籌決勝山東受令洛汴亦定潼關置屯鑄鐡為閽敵不敢捫靈旗西伐如火烈烈所向皆捷多寡勢殊視敵如無卒捐厥軀赤心如日以身徇國死又何恤皇寵有輝少牢祭之餟食崇祠寰宇一統不為麟鳯使人增慟冠衣具存大招爾魂藏之山樊山氣鬱鬱護此𤣥室魂兮來宅元贈武略將軍同知臨洮府事騎尉追封滎陽縣男朱府君墓志銘府君諱堯字子厚姓朱氏其先出于唐同鳯閣鸞臺平章事敬則之裔敬則居亳之永城世以孝義被旌顯一門六闕相望而子孫尤貴富邦人慕豔有金頭公銀頭公之號兩族叙昭穆而葬占地百餘畝亦目曰宰相林則當時簮笏蟬聮朱紫赫赩可知矣世逺譜廢子孫分適他州莫能究其詳府君銀頭公之後也五世祖某宋建炎初扈蹕南渡寓於霍丘仍以資雄于時曾祖某通判淮安州祖某提㸃夀春府稅課司遂居夀春之下蔡父某咸淳末嘗舉進士未及官而宋亡入元以儒入仕授無為州學正母胡氏府君幼不好弄嶷然如老成人及長孳孳嗜學求名講師而事之知解既至不欲陷於一曲凡天官地理卜筮醫藥之屬咸究其𤣥㫖晚而學易陰陽消長之理吉凶存亡之故觀象玩辭使心與理相涵無少爽者終日默坐視流俗紛紜絶不與競人以為迂則笑曰主靜乃吾學也鄉鄰有鬬者諭以訟終凶之義釋然而去若不能凶喪及無食與衣者竭其力周之自奉甚儉一豆二簞猶不盡食事繼母張氏如親母唯恐有毫髮違其意令聲流聞莫不高府君之行郡國將辟起之不聽部使者行縣又以茂材舉河南行中書遂署安豐路儒學正府君曰與其身有虛名孰若心無慚德辭不赴鄉子弟擔簦從之游日談道德仁義刮摩其故習亹亹數千言弗倦暇則鼓琴咏詩以自娛或時出佳山水間嘯歌忘返夀始五十以延祐戊午秋九月某日終于家以某年月日葬于縣西孤山祖塋之左娶劉氏子男三人曰某曰某曰復女一人適某元季府君以復貴贈同知臨洮府事階武略將軍勳武騎尉爵滎陽縣男劉氏贈滎陽縣君入我國朝河南山東相繼降復例遷京師有薦其文學於上者得召見擢國子助教侍經親王升燕府參軍轉長史豫時忝職禁林兼青宫贊善日與復游復凝重醇慤有儒者氣象豫甚重之㑹豫蒙恩歸田復持燕相府録事揚哲之狀求銘府君墓哲序事精贍且煥然有竒氣於是粗加櫽括而繫之以銘銘曰水若有源長流弗虧豈無潢汙朝滿夕除猗歟府君逺有世序邦人豔之綿延簪組嗜書不厭幾欲成癖晚而潛心我學吾易觀易玩辭孰出範圍參諸天人或驗事為發聞于時郡國交辟有儒一官可涖其職縻身下列揖拜上官豈若肥遁白雲青山令子既顯褒贈攸宜九泉冥冥蔚其有輝况今遭逢六合重熙龍光下被行當見之孤山鬱蒼中有𤣥唐太史勒銘永固其藏故東吳先生吳公墓志銘惟吳氏初自延陵而分圖譜之局廢不能詳其爵里世次五季末有諱嗣者自廣信遷撫之金溪其諸孫宋含光尉邦基生郇從象山陸文安公傳道德性命之學郇生福州教授行世行世生太學進士益益生鄉貢進士饒漕貢進士可景定甲子進士名揚兄弟並以文鳴可生泰連泰連生儼儀儀字明善世稱為東吳先生自幼以纘承家學為事雞初號輒起秉火挾冊而讀之時建昌江公存禮謝公升孫皆前進士先生負笈從之游繼登鄉先達虞文靖公集之門於是博極羣書其學絶出於四方先是元至正甲申先生伯兄儼與其子裕同舉進士裕連三薦始擢辛卯進士第名在第二冠南士之首及至丙申先生暨再從弟立盛又薦于鄉立饒之孫盛名揚之孫也鄉人榮之指先生之居相語曰是家在前朝以明經詞賦知名者先後相望今復如斯書詩之澤厥有衍慶㑹海內兵起先生遂無意北上下帷講授遐邇學徒爭奔走其門先生隨其資器孳孳訓迪必使優柔厭飫而後已凡所敷繹皆五經奧義不拘泥於箋記而大㫖自暢晚尤專心於春秋且謂聖人之經一而諸家異傳大道榛塞職此之由乃著三書曰禆傳曰類編曰五論辨辭義嚴密多先儒所未言嘗撫卷嘆曰此書吾積學之所致後世有揚子雲其將好之矣然於文辭尤豐贍有力下筆之頃思如湧泉開闔抑揚不愆矩度論者謂如晴巒出雲氣勢突兀不假雕琢天然成章先生則曰作文不原於聖經不關於世教雖工無益也先生涵養既深造詣益殊其於律己之功莊慤而端嚴隆寒極暑必正衣冠而坐家人聞其聲咳輒肅容而立不敢妄動天性篤於孝友事二親惟恐違其意季弟偉蚤夭其室周氏方少子衷僅五嵗先生經營其家撫衷至成人周氏得以遂其節先生為人剛直自將巽懦者不侮强禦者不畏或以非理來撓必峻言折之其人悻悻見於色弗少顧稍知感悔即遇之如初有寸善播揚唯恐不聞壬辰之夏縣燬於冦所在惡少年持白梃相挻為亂先生椎牛釃酒集里中耄倪諭以禍福皆稽首聽命他鄉為亂者皆罹草剃禽獮之慘或無孑遺獨先生之鄉獲免及入國朝撫州守侯君元善聞先生名欲聘起之先生以病力辭洪武庚戌江西鄉闈試多士府判官王黻夢州城中迎狀元既而先生之子伯宗實在首選明年辛亥對䇿大廷復以第一人賜進士及第召見奉天殿授承直郎禮部員外郎或者以夢之前徵為先生世科之符而先生已殁不及見矣先生之殁在辛亥二月二十八日上距所生大德丁未之嵗得年六十有五配何氏生丈夫子三人長即伯宗初名祐今以字行次禴次祁皆以經術教授州里女三人曽雅周禮黃顯其壻也孫男一人某女三人尚幼初伯宗㑹試南宫豫嘗奉敕與考試事伯宗因來謁以先生文集序為請豫未暇為而先生訃音至矣伯宗乃泣拜求撰墓文將選以其年某月日葬里之毬場山且勒文懸繂之碑豫聞世之右族重圭疊組者有之矣索其家學相仍數世而弗墜十百之中或一二見焉况夫科名尤造物者之所靳哉今先生之門何其奕葉聮輝至於如是也此無它山厚則木繁海深則川聚其亦理勢之必然耶自時厥後繼繼繩繩豫知未有艾也雖然先生之學則又在乎科目之外經不可不窮也德不可不修也業不可不廣也欲法先生者法此足矣是宜銘銘曰吳氏之裔何蟬聮兮科名接武代多賢兮先生承之志益鶱兮嚅嚌道腴涉幽𤣥兮衮斧法嚴聖有經兮傳者角立分户庭兮探賾索隱發精明兮剔抉浮翳朗日星兮窮經致用時則屯兮薜衣椒冠甘隱淪兮振揚教鐸鬯乃文兮牖其天衷德潤身兮世降俗偷病逾深兮方倚俞盧起痼沈兮祕其正陽平羣陰兮儒行之卓罔弗欽兮一鑑之亡我心傷兮其人雖逝名則良兮有寧一宫氣鬱藏兮焯德著美薦以石章兮義烏王府君墓志銘烏傷溪上有王府君者夀五十八以洪武九年夏五月丁巳卒於家十年春二月壬申葬于同義鄉下澤山之原素服而臨葬者千有餘人皆灑涕而去蓋府君忠厚君子也諱順字性之自幼嗜學嘗登許文懿公之門讀書必欲見之躬行使物被其澤里有大鼓湖瀦水灌田五千畝有竒嵗久岸且崩天稍不雨田咸作龜兆拆民遑遑不自寧府君嘆曰此非我之責耶即集衆興築之約田而輸作有差自出布錢鑿石作水門視時溢乾而畜泄之民得大利朝廷營建宫室徵木石之工於郡縣縣吏胥並緣為姦利不問老幼廢疾之不可任悉上其名索之弗得輒捕比鄰以代雞犬不得寧府君白於縣核實而作新籍凡有徵發按籍輸役之村疃之中癢痾疾痛者急不能注善藥府君儲峙一室或有求者施之無吝色然恐察之不精且與名士朱君震亨講切內經之說汲汲以濟人為務鄉閭有單窶者出粟菽相貸而不録其息沒則給槥櫝之逋錢久不能庚則焚其劵府君猶以為未足復謂移風易俗必本於學乃建書孰招良師㑹鄉族俊秀俾子弟與之共學甚貧者輒周以羞服月旦十五日具觴豆延其父兄列坐左右立諸生於堂下府君正衣冠中居以孝弟睦姻之道誘掖而飭導之縣大夫賢其為人顧左右曰若王性之者豈非一鄉之善士哉凡持牒來訴有及昏姻資産者下府君調解之人服其公取決片言之間不復重有辭田賦移易不常官欲重輯之以定科繇同義一鄉府君實與鈎校之任積弊盡削無敢上下其手者府君遂欲進均役之䇿㑹病卒乃止大夫聞之頓足曰良士亡矣奈何太息者久之府君性樂易未嘗有憂色見人為一善事喜動容貌每行鄉飲酒禮捧大明律置几案間諄諄為人講解使之心領神㑹不敢為非閒居無事焚香鼓琴以自樂四方賢士無不願與之交有納交者雖久留而不厭好法書名畫不翅金玉然顛沛流離亦挾以俱往通周易有所謀為則必揲蓍玩占所言凶吉多驗曽祖益之宋季為越之校官祖文繼父栖妣曾朱二氏妻凡三娶諸助何璉皆先卒今惟朱某存子男子三演溢淳子女子三諸宗陳亨吳童其壻也孫男五至淑至剛至和至誠至隆孫女四皆在室府君既葬之六月演請同縣宗潤集其行為書一通介學子童徽來謁文古者族則有師閭則有胥各掌其戒令教治屬民讀邦法而書其孝弟睦姻有學者校登夫家衆寡辨其老幼廢疾之可任者至於役國事相葬埋之事無不備極其情意嗚呼府君之行何其甚類之使一里得府君焉則一里寧一鄉得府君焉則一鄉治一邑得府君焉則一邑之民咸得其所矣視彼剝蝕於人扼其喉而盬其腦者抑何逺哉不可以不銘也其詞曰位不冠纓而惠孚於民仁矣哉若人是非紛紜而折以片言信矣哉若人文質彬彬而令譽振振君子哉若人銘以昭之揭於墓門義烏方府君墓志銘府君諱天瑞字景雲姓方氏宋元豐間有諱沈者自嚴陵白雲原徙居義烏之稠嚴今九世矣當五世時又有諱應龍者登嘉定癸未進士第官終大冶丞其族望嘗顯矣府君曽祖諱淵祖諱菘之父諱汝霖母喻氏紹興丁丑進士工部郎中喻公良能五世孫也府君六嵗時與羣兒戲于池濵一兒俯身攀藕花忽墮水中羣兒皆驚奔府君急持其足揚聲大呼人聞而來抱兒還其父逮長讀書窮㫖趣孳孳弗少懈其父以食指之繁故廬迫隘不足以容别買宅一區於三里外命府君居之府君昏定晨省雖大暑寒不廢父母憐其勤力止之府君跪對曰子職當如是不為勞也府君之配曰朱氏承直郎廣德路總管府經厯諱約之女也府君相敬如賔終其身無片言乖戾或者嫓之梁伯鸞朱殁府君一念之輒埀涕與人交重然諾一旦暴風疾雨府君擔簦躡屩倉皇欲就塗家人謂曰非有至急之故何遽往也府君笑曰吾與人期不欲爽信耳其遇宗族內外姻多煦煦有恩意有稱貸者或不能償置不問府君長身鶴立美鬚髯樂賔友過從當酒酣耳熱高談雄辨驚動四筵徐而察之皆根據經史出人思慮之所不到時論多之府君有兄二人孟曰天與字景賢仲曰天錫字景範景賢博通書傳善滑稽士無賢不肖皆樂與游尤精黃帝內經之學有疾者恆依之景範淵深而簡默遇勝友論詩輒抵掌劇辨滚滚如泉源發不見其窮府君固難為弟矣亦復翹然與之抗衡非聰明絶倫不能也府君年七十九疾病頗侵凌知其不可治乃絶醫賦詩一章示子孫大意以為吾讀孔氏書死生終始之說粗若知之萬事悠悠當同一夢彼浮屠氏所謂天堂地獄不過托是化為善而已吾家素絶之不必用也今死矣與明月清風浮游於天地間爾尚何道哉書畢而終實洪武九年十一月二十一日也府君生平嗜吟有詩集二卷藏于家妻即朱氏無子而先卒鞠景賢次子樵為嗣既而少房馬氏生子男子二人曰士龍曰士信子女子一人曰丑姬徵事郎中書舍人宋璲其壻也孫男二人某某以某年月日葬某山之原初豫與府君二兄交甚洽繼識府君於白麟溪上府君方為女擇配豫兒璲始九嵗操觚作蠅頭細字謄豫所造文辭府君心悅遂成婚姻家府君當有疾時璲將來南京省余往謁府君道别府君執璲辟言曰汝尊公當代文士第一流吾旦暮死不復與子相見願為求墓上之銘足矣璲泣而别未幾果以訃聞豫亦為泣下霑襟今豫致政還家府君從孫衡備書其事行士龍持以來請豫惡得不為之銘銘曰稠巖陽三鳯翔一鳯後逝雲為鄉梧桐菶菶空高岡緬懷德輝人可忘故灊峯先生府君墓志銘大江之西南昌名郡有灊峯先生其學以聖賢為宗其文以理氣為主其行以忠信為本其接人以明體適用為教其生也人尊之師之其殁也人又哀之慕之殁後二十一年而門人弟子與其孤翰林修撰善圖其不朽者甚悉乃集羣行成書而以銘文屬筆於濂濂竊聞先生多著書大抵研精易禮之學而及於邵子先天橫渠正蒙諸書共若干萬言先生之言曰先天之學心學也其圖皆從中起其前無古而後無今大之為天地小之為民物顯之為禮樂幽之為鬼神逺之為闔闢之初終近之為瞬息之起止莫不具焉邵子以命世人豪乃探是圖著為皇極經世書性命物理之說重明於世學者往往厭其難棄而弗講豫於是有經世書說張子正蒙書實與太極圖通書西銘並傳而未有為之注釋者余於是有正蒙書說禮經殘缺已久朱子雖定為儀禮經傳而其輯録多出于門人勉齊黃氏與信齊楊氏其中豫奪多有未定余於是有禮說易之為書廣大悉備伊洛大儒雖嘗論著而其義皆愈索而愈無窮豫於是有易說吾道不行於時而其見于言者不過如此而已嗚呼觀先生之言則其心之所存者從可知也濂雖不文敢不大書揭於墓道以為後進之觀云按狀先生諱隱老字子方姓朱氏南昌之豐城人曽祖某祖三德父應嶽母楊氏先生自幼輒劬書須臾不少怠母若兄頗以為迂靳膏油不多給秋霄月朗每挾册映讀之冬則拾枯薪及爇松明以繼欣然若忘其憂時江村姚公某泳齊洪公某洌泉趙公某皆宋之遺老淹通六藝之故而桂莊涂公應雷又逺承考亭朱子遺緒先生咸執經叩請莫不交與之且曰朱生令器也他日所成當無讓古人負笈而歸兄以先生不事生産作業力求析爨先生不得已悉以美田與之自取不毛者由是家寖貧或憐之勸其俯就科目庶得祿為親養一踐場屋不中益潛心於聖賢之祕窮索於經驗諸身心唯恐有不合者久之心與理涵瞭然如辨黑白遂倡鳴道學於荷山之陽四方學子悉從之遊先生顔貌嚴毅若不可親近設有疑問如撞巨鐘小大隨應無虛發者初先生伯父曰應五曰應祥曰應焱與其父皆足以師表州里龎眉白髮大布寬衣金碎玉撞塤鳴箎協使人望之苦窳之意消至是先生又能纘承之不墜士論多之至正壬辰春三月江淮兵動鄉之惡少年為變殺戮至雞犬耄倪皆竄匿先生猶操觚正冠衣而坐從容語鈔掠者曰資財任取之書籍非爾所好也及其再至四三至先生復曰吾家已罄矣爾幸他之盜素聞其名笑而去無敢縱火者西東憐數十家皆藉是獲完先生遭時多艱君族姻子弟戒之曰吾宗素以清白相傳寧寒餓而死不可為不義而生終無敢犯教者不幸以至正丁酉十月八日卒于家未殁語善曰吾著書多未脫藁芟繁補闕之責盡在於汝吾以數推明年江西當大變汝當謹避以免難吾今無所苦精神如常時但覺氣息漸微爾已而遂亡戊戌夏四月僞漢陳友諒陷南昌果如先生言後七年癸卯十二月初一日始葬於灊峯之下娶徐李二氏男一人即善克紹其家學者也女二人歸縣人虞淵邵誼孫二人象環逢掖象環通五經大義年十九前卒孫女一人適羅夀亦里之良族曽孫一人興祖曽孫女二人尚幼濂聞君之立心在乎逺且大者干祿以行志其澤可被於當時著書以明理其功實垂於後世孰短孰長人必有辨之者雖然人心漓矣士習陋矣翻經取題而媒仕進者有矣求髣佛如先生者尚可得耶銘以昭之亦發濂之深慨云爾銘曰古之聖哲何為作經牖人天明使反諸誠世衰道微耽厥口耳搴英托華以經為戲繽紛外馳奚補身心寶用瓦礫棄其南金考亭奮興上繼伊洛完經翼傳日星照灼豐城之墟天産碩儒豔其流光潄其芳腴堂虛露涼膏油莫續挾冊于庭借月而燭優之柔之茫然遐思饜之飫之如啖甘肥內存于心外著于目明命有赫吾敢不肅出而倡道荷山之陽有聲泱泱達于四方執經之徒雲合川赴若飲衢尊充足而去俗易風移惇我民彝天不憖遺孰不涕洟𤣥堂沈沈妥厥靈爽尚畀後人胡福是享玉龍千户所管民司長官樓君墓志銘嗚呼吾彥珍其止於斯矣乎初余年十九負笈入婺城之南受經說於聞人先生㑹彥珍亦從烏傷來卒業余家抵彥珍所居僅半舍不能一識至是始及見之歡如平生彥珍少余四嵗肌膚若玉雪服飾鮮潔容止閒雅一何貴介公子也居三年聞浦陽淵頴吳公闡教諸暨之白門余復裹糧相從彥珍知之騎驢躡余後越五月即還彥珍自是家居余且讀未見之書於浦陽仙華山往與還皆經彥珍門彥珍聞余來雖夜至一鼓亦必秉燭起迎釃酒澆我欵語不能休余因就寢席彥珍則卧余榻側不解衣至明方興及别送豫五里外訕侮譁笑無所不至將行又復盤旋若不能遽捨者時彥珍年方盛壯論議天下事若可俯拾故皆曠闊而疏略不事窘束又何跅弛竒才也已而走燕都用太師德王之薦授澧州管領拔都民戶總管府玉龍千户所管民司長官道里既逺風土嗜好迥然殊彥珍在官多悒悒不樂歎曰人生貴適意爾何至束縛馳驟如馬牛然未幾解印綬而歸不問賔朋有無無日不霑醉醉輒大笑世間事類不足以汚之至正中天下大亂官政苛急如束濕髮彥珍益不自憀賴大放於酒晨興未盥潄即以壺觴自隨白眼望天痛飲達暮唯恐壺口之竭也家事且日落彥珍視資財愈不自愛惜或勸何不少為子孫謀彥珍曰吾遭時孔艱托麴糵以為昏冥之逃耳君以不念子孫為責不亦大惑歟又何曠達之良士也乙巳春豫自左史乞骸骨還山中特扶短笻過彥珍彥珍首不暇冠急趨前執豫手曰君來歸耶且留連四三日勿遽舍我去指所乘青驢曰將宰以啖君池中有大鯉魚長可三尺取以為侑君雖不飲視吾引滿亦必為之暢然豫不能從後一月有客叩門甚急使蒼頭詢其姓名大聲呼曰汝第言舊日同舍生爾何必問其為誰耶豫亟出迎彥珍已據牀危坐問子曰豫渴甚汝何處可得美醞時方嚴酤禁豫不敢答彥珍攬子髯曰子誠俗士耶㑹日莫不得已止宿雞第一號即馳去自時厥後聞彥珍為酒所蝕形貌尫瘠其未幾竟死焉臨殁精神耿耿不亂也嗚呼吾彥珍其止於斯矣乎訃至豫不覺失聲慟㑹朝廷纂修元史起豫為總裁官倉忙就道不及執紼以視彥珍之葬輒往酹柩前追思生平之歡而話言厯厯在耳形容則不可復覩矣嗚呼吾彥珍其止於斯矣乎彥珍諱士寶彥珍其字也姓樓氏世居婺之義烏曽祖熭祖紹翁父如浚妣王氏彥珍幼孝于親母夫人抱疢嘗刲股以進纍數月目不夜瞑長從名師友游發為聲詩皆清雅可傳誦家素饒於財姻友或至寒餒肥馬輕裘與之無吝色娶同邑金氏宋知雷州士龍之曽孫女也內政修舉無愧于婦道子男子四鋭鉞鍾鍔鉞鍾先卒子女子一適浦江義門鄭棫孫男二淙漸某年月日生某年月日卒享年五十有六以某年月日葬于某鄉某山之原嗚呼吾彥珍其止於斯矣乎銘曰嗚呼彥珍死於酒耶不酒而死世何多耶嗚呼彥珍醉而醒耶高視陋俗醒其醉耶彼溺於聲利心𠞰形瘵而無一隙之適者方吾彥珍又何如耶嗚呼彥珍孰謂非矌達之士㑹稽陳君墓志銘監察御史陳煦述其先祖之行拜且請曰煦之先本儒族至于先祖遭家多艱始屈身為吏卓卓有可稱者先祖年六十有七以元至正己亥十二月十八日卒于婺之金華越一年辛丑正月某日權厝金華照水里之原今將以某年月日歸葬㑹稽某山先隴之次然先祖之卒今二十年矣相去日逺人之及見先祖者日益微稱先祖之美者當愈疏矣儻又越十餘年安復有知而稱之者乎惟托文辭之傳可以不朽而文辭之不美者又不足以傳煦嘗聞人咸推先生所為文必傳先生文傳則先祖之事愈久而不墜惟先生閔焉而賜之銘余曰余文豈足傳而祖耶然而祖之事信有可稱者乃受而銘之君諱克和字惟中陳姓陳為固始著姓唐末有遷泉之南安者宋太常少卿侁始自泉遷㑹稽君七世祖也曽祖一新文林郎祖麟左宣教郎父德星母季氏君六嵗喪母十九而父卒能自振拔讀書學法律挺挺不肯出人下元元貞初補三江鹽場吏核故所積鹽得羡餘數十百引以代亭户貧不能輸賦者流亡相率復還歸而調􅌘縣吏縣民誣鄰人盜其先塋珠君曰珠入土必壞汝先塋葬幾何年矣豈有完珠耶富族僞為劵書奪細民田君辨其劵曰是嵗某月改元何謂正月耶皆無以應而退轉吏上虞㑹嵗饑民道死相望君言于令尹發公藏易粟勸巨室啓廩賑貸存活者甚衆上虞夏蓋湖廣百餘里溉上虞餘姚二縣田夏旱二縣民爭決水至相毆繫君白尹立石表湖上而中分之爭遂止復有梁湖者溉民田甚博右族利其腴將堙以為田民病暵君浚復之改平凖鈔庫司庫為㑹稽縣吏紹興路聞君能辟為掾山陰塛埭塘圮海水禍稼郡公屬君治君役多田家斷巨石穴其中貫以堅木築之嵗乃有秋録事吏闕君攝其事樊氏叔姪爭先廬不決相訟前吏利其資故緩之不為析君登之於庭告以古孝弟禮讓事投鈎于地使各取之叔姪悔悟叩首泣謝讓其廬不必居踰年移吏婺州守熟君名不敢以吏待君每相可否論事民陰受其惠武義民欲誘饑民為亂事覺欲悉捕誅之武義大擾君走告廉訪副使伯嘉訥曰謀亂者一狂豎耳餘人果何罪今不因而輯定之亂且見矣賴以生者三千餘家義烏徐氏率少年七十餘剪髮為信劫其仇家既而仇遁其黨怒遂火縣治而去郡議以為亂律置之死君復告伯嘉訥曰愚民負氣縱火罪雖有之豈如議者之重耶且剪髮者皆脅從耳欲置之死不已酷乎七十人者皆賴以免聲績益彰至正乙未江浙行中書省以君為慶元路市舶提舉司都目戊戌奉檄使泉還道婺㑹國兵圍城君縋以出間道之㑹稽遇剪髮民相率邀致其家出婦子拜曰生我者君也爭具肩輿護君歸明年之金華訪其二子敬升遂卒卒時告其子皆善言聞君卒者為之歎息君為吏至老毫毛無所私家無儋石儲弗恤也然遇事敢言言必當乎理故所為輒可稱道娶吕氏生五男子長源國朝知完縣事次即敬福建行省員外郎次復元山陰縣儒學教諭次即升今為儀封縣儒學教諭其一曰瑞出後上虞梁氏女一適同郡王克常孫男六人長即煦由太學生為吳王府伴讀擢今官次曰杰烈默熊蒸孫女五人古之仕者將以行道也非以榮其身也然而所居卑則所被者狹故君子樂得夫時位焉茍幸時竊位以富貴其身而無所益於世則君子何取乎若君者雖老死於下位然所至而民受其惠其過於世之食厚祿而無善可稱者逺矣使天道可必君其有後哉銘曰萬鍾無聞彼為何人吁嗟乎君下位終身雖則位卑善政孔殷誰曰不信視其子孫元隱君子東陽陳公先生鹿皮子墓志銘婺之東陽有隱君子戴華陽巾裁鹿皮為衣種藥銀谷澗中當春陽正殷玩落紅於飛花亭上亭下有流泉花飛墜泉中與其相回旋良久而去君子樂之日往觀弗厭既而入太霞洞著書其書縱橫辨博孟軻氏而下皆未免於論議元統間濂嘗候君子洞中君子步履出速坐之海紅花底戒侍史治酒漿葅醢親執斚獻酬歌古詞以為歡酒已君子慨然曰秦漢而下說經而善者不傳傳者多不得其宗淳熙以來羣儒之說尤與洙泗伊洛不類余悉屏去傳注獨取遺經精思至四十春秋一旦神㑹心融灼見聖賢之大㫖譬猶明月之珠失之二千年上自王公下至氓𨽻無不倀倀日索之終不可致牧豎乃獲於大澤之濵豈可以人賤而并珠弗貴乎吾今持此以解六經決然自謂當斷來說於吾後云濂乃避席而問曰其意云何君子曰吾以九疇為六府三事而圖書為易象者不可誣以片言統萬論而天下古今無疑義以庸言釋經子而野人君子無異辭謂神所知之謂智知天下殊分之謂禮知分之宜之謂義知天地萬物一體之謂仁禮復則和之謂樂謂天地萬物一體經子之㑹要一視萬物則萬殊之分正家齊國治而天下平矣濂未達請復問其詳君子曰國家天下一枳也枳一爾而穰十焉枳有穰而一視之其於人則仁也發而視之穰有十則等有十其於人則君臣父子長幼之等夷刑賞豫奪之殊分所謂禮也視十為十者禮之異視十為一者仁之同分愈異則志愈同禮愈嚴則仁愈篤者先王之道也分愈異者志愈同故合枳之穰反求其故地枚舉而銓次焉者差之黍銖則人已無别犬牙錯而不齊斂之不合而一不可一見禮愈嚴者仁愈篤故治國家天下者不以禮則彛倫斁禮樂廢而仁亡是故洙泗伊洛朝夕之所陳者天下萬殊之分視聽言行之宜所操者禮之柄耳故學聖人者必始於禮焉故一體萬殊者孔子之一貫於洙泗伊洛之言無不統者也理一分殊之義廢則操其枝葉而舍其本根洙泗伊洛之㑹要不可見章句析而附㑹興遺經不可識矣濂受其說以歸間嘗質之明經者或者曰近時學經者如三尺之童觀優於臺下但聞臺上語笑聲而弗獲見其形所以不知妍媸唯人言是信君子之論偉矣或者曰伊洛之學大明於淳熙未易遽取舍之也自時厥後為貧游仕奔走於四方不及再候君子以畢其說聞君子益以斯道為己任汲汲焉惟恐不傳靡晝靡夜操觚著所見於書書成即刻梓示人復貽書於濂曰豫瀕死吾道苦無所授子聰明絶倫何不一來片言可盡也憂患相仍亦未及往而天下日趨於亂君子之室廬亦燬於兵寓子壻王為家留六年之久遘微疾默坐於一室不食飲者踰月縣令遣醫來視疾君子麾去曰吾年八十又八其死宜矣何藥之為未幾翛然而逝實至正乙巳十月戊申也君子姓陳氏諱樵其字為君采人因其衣鹿皮故又號為鹿皮子表隱趣也其先居睦之富春宋之中葉來徙東陽太平里世為衣冠巨族曽祖居仁祖嚞登仕郎父取青國學進士從鄉先生石公一鼇與聞考亭之學有志節嘗抗章詆權臣賈似道誤國及宋亡元丞相巴延見其章欲用之辭君子幼學於家庭繼受易書詩春秋大義於李公直方其於天下之書無不讀讀無不解學成而隱邈然不與世接唯寤寐羣經思一洗支離穿鑿之陋形於談辨見於文辭恆懇懇為人道之文辭於狀物寫情尤精然亦自出機軸不蹈襲古今遺轍讀之者以其新逸超麗喻為挺立孤松羣葩俯仰下風而莫之敢抗或就之學則斥曰後世之辭章乃士之脂澤時之清玩耳舍六經弗講而事浮辭綺語何哉少作古賦十餘篇傳至成均生徒競相謄寫謂絶似魏晉人所撰君子則諱之不復肯為也君子足跡未嘗出里門而名聞逺達朝著知名之士若虞文靖公集黃文獻公溍歐陽文公𤣥皆慕之以為不可及移書咨訪如恐失之性復至孝父患風嵐君子扶之以行嵗久益勤後為風痰所侵氣弱不能吐君子截竹為筒時吸而出之母郭夫人殁君子不見見其遺衣輒奉之嗚嗚而泣生平未嘗言利茍非其義千駟萬鍾弗為動家雖素饒於資痛懲膏梁之習惡衣菲食以終其身遇嵗儉輒竭粟賑里閭自取來牟以續其食嘗發所藏錫為器工人持歸乃白金也悉易之或以告君子君子一笑而已嗚呼君子已矣世豈復有斯人哉君子所著書曰易象數新說曰洪範傳曰經解經曰四書本㫖曰孝經新說曰太極圖解曰通書解曰聖賢大意曰性理大明曰答客問曰石室新語曰淳熙糾繆曰鹿皮子曰飛花觀小藁合數百卷君子正配朱氏先若干年卒生延年大年耆年喬年昌年大年至正庚寅中鄉闈乙榜第一署徽州路歙縣教諭側室某氏生逢年君子殁時諸子唯喬年在餘皆先卒女三人其壻即王為次則俞某張紹先孫男九人庭玉庭圭庭筠庭鸞庭鳯庭堅庭誨庭某庭某女四人適徐信俞本虞某闕某曽孫男五人紹宗超宗林宗某宗某宗女三人在幼喬年庭堅等洎王為以是年十一月某甲子奉柩葬於縣西南四十里懷德鄉斗潭山之原縣長二及學士大夫門弟子咸㑹莫不灑泣葬後五年其高弟子楊君芾乃為撰列行狀一通而喬年同王為持示金華宋濂再拜請為銘嗚呼君子以超絶之資曠視千古若一旦暮期以孔子為師而折衷羣言之是非不徇偏曲不尚詭隨必欲暢其己說而後已可謂特立獨行而無畏懾者也非人豪其能之乎雖然淳熙二三大儒其志將以明道也初亦何心於固必使君子生於其時與之上下其論未必無起豫之歎而君子之衆說亦或藉其損益以就厥中則所造詣者愈光輝渾融而卓冠於後先矣天之生材相違而不相值每如此竟何如哉然君子措慮之深望道之切其所傳者確然自成一家言殆無疑者世之人弗察伐異黨同常指君子為過高是豈窺見其衡氣機者哉濂也不敏竊有慕洙泗伊洛之學有志弗强日就卑近不足以測君子所至之淺深而君子則欲進而教之今因請銘故備著昔日問答之辭於其首後之傳儒林者尚有所稽焉其稱為君子者君子蓋有德之通稱尊之可謂至矣銘曰洙泗傳聖髓兮伊洛發遺精天人既渾合兮陽陰悉苞并無聞不開闡兮金石奏和平自兹益演繹兮白日中天行如彼藝黍稷兮薅去莠與莨舂實成白粲兮詔使來者嘗有夫起東海兮吐言一如鏞噌呱達幽隱兮務使聲逺揚豈欲異塗轍兮理致無終窮著書動盈車兮片言類括囊中有萬寶玉兮包絡無遺亡解之溢衆目兮瓌異吁可驚似兹海外珍兮神光燁如虹苟施琢刻工兮定可獻明廷下可奉公侯兮上可奠方明胡為墮空山兮枯槁埋光晶鹿皮剪為裘兮峩冠賸垂纓臨流玩飛花兮心與烟霞冥清風與逸氣兮橫絶宇宙中食道身自腴兮疇計祿位豐婆娑太霞洞兮卒以上夀終斗潭向東流兮內有八尺塋鬼神必訶衛兮靈氣結華英永為文字祥兮千祀埀休聲寧海林貞婦方氏墓志銘有序寧海林可企年埀八十纒綿疾疢偃卧不能興召其甥方孝聞而謂之曰吾耄矣即溘先朝露無所憾第母氏貞行未及顯白中心悴悴然類持杵舂繫之者聞汝弟孝孺受經于金華宋太史太史進人以善者也儻孝孺為達其誠太史未必不憫之而寵畀以文也言訖涕泗滂然下孝孺以言豫因不辭而序之曰貞婦諱友弟姓方氏亦寧海人宋某年進士淦之女孝聞之曽祖姑也年二十歸可企之父某時舅已殁惟姑存秋髮亦繽紛矣當科繇之興黔首藉是以魚肉之夫獨嬰其難且無同氣之親以為助貞婦俯首事紡磚或至雞號就枕由是給使之用不匱越八載而生四子夫以一疾亡長子年甫踰七餘子生尚幼貞婦幾欲無生然恐傷姑之心强顔追逐日夜飲泣吞聲不使聲聞于人里有豪士欲乘其孤婺凌之貞婦盛氣叱曰我未亡人耳爾誠君子耶當恤我軫我之不暇顧反以相虐耶茍進進不已誓直于官以懲彼繼者或聞之吐舌相戒莫敢犯卒能樹其門弗墜姑年八十恆多病貞婦敬之如鬼神保之如嬰兒無毫髮忤其意及以夀終帥家人行喪朝夕奠哭如儀學禮君子不能過也訓飭諸子從師問學束修不足脫簪珥繼之至其成立皆為之授室嵗時出坐堂上子婦與諸孫分東西立階下次第舉觴為夀雍穆之氣藹如陽春如是三十年乃卒卒時年八十二某年某月日也以某年月日葬某山之原州里之人至今指其門相謂曰是中有貞婦能皎然自守而致備福之養今豈復有是人耶相與慕咏而去貞婦四子長可傳次即可企次可任可信諸孫若干人某某孫女若干人歸濟寧知府方去矜及某某去矜孝聞父也豫聞夫者婦之天天可背乎背天則非人也有若貞婦之順乎天天之報施如此亦云厚矣哉銘曰鴻雁貞雌而不再雄而况於人乎林氏婦方其始無愧人道乎有人心者孰謂其不能興起乎文憲集卷二十二
