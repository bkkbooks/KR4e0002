body:
  text: 文憲集卷一明宋濂撰表凡五十八章進大明律表臣聞天生蒸民莫不有欲欲動情勝詭偽日滋強暴縱其侵陵柔懦無以自立故聖人者出因時制治設刑憲以為之防欲使惡者知懼而善者獲寧傳所謂獄者萬民之命所以禁暴止邪養育羣生者也譬諸禾黍必刈稂莠而後苗始茂方於白粲必去沙礫而後食可餐苟梗化敗俗之徒不有以誅之雖堯舜不能以為治夫自軒轅以來代有刑官而五刑之法漸著其詳弗可復知逮魏文侯師於李悝始采諸國刑典造法經六篇漢蕭何加以三篇通號九章曹魏劉劭又衍漢律為十八篇晉賈充又參魏律為二十篇唐長孫無忌等又取漢魏晉三家擇可行者定為十二篇大概皆以九章為宗歷代之律至於唐亦可謂集厥大成矣洪惟皇帝陛下受億兆君師之命登大寶位保乂臣民孶孶弗怠其訓迪羣臣諄復數千言唯恐其有犯慈愛仁厚之意每見於言外是大舜惟刑之恤之義也矜憫愚民無知陷於罪戾法司奏讞輒惻然弗寧多所寬宥是神禹見罪而泣之心也唯貪墨之吏承踵元弊不異白粲中之沙礫禾黍中之稂莠也乃不得已假峻法以繩之是以臨御以來屢詔大臣更定新律至五六而弗倦者凡欲生斯民也今又特敕刑部尚書劉惟謙重會衆律以協厥中而近代比例之繁姦吏可資為出入者咸痛革之每一篇成輒繕書上奏揭於西廡之壁親御翰墨為之裁定由是仰見陛下仁民愛物之心與虞夏帝王同一哀矜也易曰山上有火旅君子以明慎用刑而不留獄言獄不可不謹也書曰刑期于無刑言辟以止辟而民自不敢犯也陛下聖慮淵深上稽天理下揆人情成此百代之凖繩實有易書之奧旨行見好生之德洽于民心凡日月所照霜露所墜有血氣者莫不上承神化改過遷善而悉臻雍熙之治矣何其盛哉臣惟謙以洪武六年冬十一月受詔明年二月書成篇目一凖之於唐曰名例曰衛禁曰職制曰户婚曰廄庫曰擅典曰盜賊曰鬬訟曰詐偽曰雜律曰捕亡曰斷獄采用已頒舊律二百八十八條續律百二十八條舊令改律三十六條因事制律三十一條掇唐律以補遺一百二十三條合六百有六分為三十卷其間或損或益或仍其舊務合重輕之宜云謹俯伏闕廷投進奉表以聞臣等誠惶誠懼稽首頓首謹言洪武七年月日具官臣等上表進元史表伏以紀一代以為書史法相沿於遷固考前王之成憲周家有監於夏殷蓋因已往之廢興堪作將來之法戒惟元氏之有國本朔漠以造家用兵戈以爭強并部落者十世逐水草以為食擅雄長於一隅逮至成吉思之時大會斡難河之上始尊位號漸定教條既近取於乃蠻復逺攻於回紇渡黃河以蹴西夏踰居庸以瞰中原太宗繼之而金源為墟世祖承之而宋籙遂訖立經陳紀用夏變夷肆宏逺之規模成混一之基業爰及成仁之主見稱願治之君唯祖訓之式遵思孫謀之是遺自兹以降聿號隆平豐亨豫大之言鼓倡於天厯之世離析渙奔之禍馴致於至正之朝嬖幸蠱惑於中權姦蒙蔽於外漢網祗因於疏闊周綱遽至於陵遲風憲皆為不捕之貓將士盡成反噬之犬由是羣雄角逐九域瓜分風波徒沸於重溟海嶽竟歸於真主中謝欽惟皇帝陛下奉天承運濟世安民建萬世之丕圖紹百王之正統大明出而爝火息率土生輝迅雷鳴而衆響微鴻音斯播載念盛衰之故仰推忠厚之仁僉言實既亡而名亦隨亡獨謂國可滅而史不當滅特詔遺逸之士欲求議論之公文詞勿至於艱深事迹務令於明白茍善惡瞭然在目庶勸懲有益於人此皆天語之丁寧愈見聖心之廣大於是命翰林學士臣宋濂待制臣王禕儒士臣王克寬臣胡翰臣宋禧臣陶凱臣陳基臣趙塤臣曽魯臣趙汸臣張文海臣徐尊生臣黃箎臣傅恕臣王錡臣傅著臣謝徽臣髙啓分科修纂故上自太祖下迄寧宗靡不網羅嚴加搜采恐玩時而愒日每繼晷以焚膏故於五六月之間成此十三朝之史况往牒舛訛之已甚而它書參考之無憑雖竭忠勤難逃疏漏若自元統已後則其載籍無存已遣使而旁求俟續編而上進愧其才識之有限弗稱三長兼以紀述之未周殊無寸補臣濂忝司鈞軸幸覩成書信傳信而疑傳疑僅克編摩於嵗月筆則筆而削則削敢言褒貶於春秋仰塵一夜之觀期作千秋之鑑所撰元史紀三十八卷志五十三卷表六卷傳六十二卷目録二卷通計一百三十萬六千五百餘字謹繕寫成百二十册隨表上進以聞致仕謝恩表翰林學士承旨嘉議大夫知制誥兼修國史兼太子贊善大夫臣宋濂誠歡誠忭稽首頓首上言臣聞生世而逢真主仕宦而歸故鄉此人臣至榮而至願也臣本一介書生粗讀經史在前朝時雖屢入科場曽不能沾分寸之祿甘終老於山林今幸遭逢聖主定鼎建業特敕省臣遣使者致幣起臣於金華山中俾典儒臺繼升右史侍經東宫供奉翰苑去嵗欽蒙特除承旨為文章之首臣而次子璲擢中書舍人長孫慎殿廷序班一門三世俱被恩榮近者又荷追封祖父親御翰墨寵以雄文粲然奎璧之光照耀霄漢且憐臣年老令致政還鄉又有冠服文綺寶楮之賜鴻澤滂沛不一而足其高如天其厚如地照臨如日月非筆墨可盡述臣誠歡誠忭稽首頓首欽惟皇帝陛下以布衣混一四海如漢髙祖以仁義化被萬方過唐太宗宵衣旰食孜孜圖治欲使天下蒼生無一夫不被其澤雖以臣之愚陋無尺寸之功亦蒙寵遇如此之至銘心鏤骨誓不敢忘自度無以效犬馬之誠唯朝夕焚香上祝千萬嵗夀及以忠勤教子孫俾世世無忘陛下深仁厚德而已臣無任瞻天仰聖激切屏營之至謹奉表稱謝以聞臣濂誠歡誠忭稽首頓首謹言洪武十年二月十二日具官臣濂謹上表致仕謝恩箋具官臣宋濂誠惶誠忭頓首頓首上言近者欽蒙聖恩追贈二代許臣致仕還鄉臣自正月初六日陛辭十日發舟二十七日至家二月初三日詣墓所祭告昭宣制命龍光烜赫下燭泉壤鄉里親朋一時畢會相與嘆慕以謂天朝待士如此之至莫不感激思奮此皆皇上之大德殿下之深恩顧臣區區何以圖報於萬一臣聞古聖人有言曰為君難其所謂難者何也蓋以四海之廣生民之衆受寄於一人敬則治怠則否勤則治荒則否親君子則治近小人則否其機甚微其發至於不可遏不可不謹也所以二帝三王相傳心法曰德曰仁曰敬曰誠無非用功於此也治忽之間由心之存不存何如耳臣誠惶誠忭頓首頓首恭惟皇太子殿下仁孝溫恭出言制行動合至道中外無不仰望而臣猶以二帝三王相傳心法為言者誠以為君之難也臣退居田里而忠愛之心彌切旦夕不忘於是敢貢芻蕘之言伏望殿下察臣所言而篤行之則天下幸甚臣無任瞻仰激切屏營之至謹奉箋申謝以聞臣濂誠惶誠忭頓首頓首謹言賦凡二章奉制撰蟠桃核賦有序洪武乙卯夏五月丁丑上御端門召翰林詞臣出示臣桃半核蓋元內庫所藏物也其長五寸廣四寸七分前刻西王母賜漢武桃及宣和殿十字塗以金中繪龜鶴雲氣之象後鐫庚子年甲申月丁酉日記其字如前之數亦以金飾之所謂庚子實宣和二年字頗疑祐陵所書既奉旨撰賦埀誡方來臣濂謹案王母獻桃事詳見張華博物志第八卷史補類華言桃七枚大如彈丸遺帝五自食其二以今核觀之且十倍於彈丸則其實之如斗可知矣豈華出於傳聞而想像載之歟抑其言無足信而後之好事者假託傅會之歟不然漢武內傳所謂桃如鳬卵形圓而色青者又果何如歟復案蔡京所記尚庫有王母蟠桃核頗巨京嘗相祐陵其見與今相衍事當可徴然則傳志所載誠有不可信者歟臣敢忘其固陋謹撰賦一篇俯伏丹陛以獻初則極其形容終則一歸於正其詞曰炎漢六葉實惟武皇闡坤符握乾綱祀汾隂建竹宫叶仁獸在宫赤芝薦房西海獻續弦之膠弱水來燕卵之香慶諸福之畢集思騎龍於帝鄉幸靈桃之入口傳􅋖種於下方想其瑶階露寒彤庭秋迥銀燭未掩畫屏斜映啓承華之祕殿眄瑶池而神騁忽王母兮遙臨託青鳥以傳命鬱佳氣之蔥蘢覿芳姿之妍靚於是玳席初延霞觴屢傳蘭辭吐兮襲人縹袂舉兮髙騫紫雲之輜軿暫駐九微之燈火猶燃乃啓錦幪乃濯翠籩乃出桃實獻于帝前味甘醇而如醴色含腴以不乾鸞刀割蜜神液流泉上滋華池身輕欲仙將懷核而種之斸上林之寒煙王母微笑塵世易遷儻花實之並見嵗屢閲於三千唯紫府之列真視滄海於桑田彼窺鳥牖之小兒尚奚測夫幽玄斯核也匪鑄而成匪陶而凝藉五行之亭毒資六氣以流形鄙瓠犀之脆薄並玉質之堅貞爪之不入叩則有聲知何年之中析存半璧之晶熒俯貼金盤巢蓮之龜仰承玉露常蒲之杯鋭首聳兮尖岑豐下橢兮吐火切狹長也墜星衆皺蹙背文之籀一窪暈面色之頳荷盤欲展蚌甲未扃藏仁之迹猶在含肌之罅如生函肉好之隱約圍合線之交層龜鶴軒翥兮顯象寶章絢爛兮金明鳯卣鸞彛同藏真於天府星形月魄挾灝氣於蓬瀛嗟夫自昔仙靈恍惚難憑出無入有變幻莫停橘類盎兮巴園棗如瓜兮漢庭恣燕齊之方士騁詭辨之奔騰瞻雲路之咫尺恨凡骨之難登以雄才之蓋世甘昏溺而不醒至若建章月淡甘泉風冷銅莖中峙仙掌髙擎望飊輪兮不來徒馳情於窈冥苦白日之易短兮竟莫制於頽齡核雖存而人則逝兮悲秋風於茂陵矧宣和之繼軌兮慕鼎湖之龍升託青華之帝子設神霄之玄稱何殷鑒之不逺踵覆轍其相仍天啓皇明真人龍興順堪輿之大化調隂陽之至精道德行兮即龍虎之丹顯忠信昭兮勝鉛汞之功𢎞以九州為仁夀之域儕兆民於喬松之朋神機流浹太和薰蒸指佞人兮草生屈軼齊氣朔兮階秀堯蓂視區區之遺核初何繫乎重輕此所以革往古之荒唐法唐虞以作程也誶曰桃有核兮大逾掌歷千齡兮多惚恍慨靈仙兮勞夢思誰見崑丘兮紫芝長真人出兮海宇寧禮樂為冠兮仁義作纓簫韶九成兮鳯凰鳴青鳥不敢徠兮幻説清千秋萬嵗兮永長生竊記徽宗本紀宣和元年己亥二月庚辰改元遂易宣和殿為保和殿至四年壬寅夏四月丙午詔録三館書置宣和殿及太清樓祕閣始重稱宣和今核上之字刻于二年庚子之甲申月乃不書保和而猶襲宣和之名此固不可不疑况丁酉日屬庚子嵗癸未月之終今復𨽻之於甲申月之首尤有不可得而致詰者頗意此核非漢武時物字亦非宋祐陵所書雜書所載海外之國多大桃雖不可盡信或者得其遺核特依倣而託之者歟然濂年已邁舊學皆廢忘未必其言之足徵也姑書之於此以俟後之君子云崆洞雪樵賦有序劉君宗弼家于贑之崆洞山陽學贍而文雄嘗擢進士第入教成均出仕浙江部使者之寄聲光已赫然矣君乃退然弗居方以崆洞雪樵自號其殆顯幽一致者歟非賢而有德者蓋弗能也君間請濂賦其事雕蟲篆刻之學老且忘去黽勉操觚雖用賦體而比物成義為多君之西還或歌於清泉白石間山靈聞之未必不囅然一笑也其辭曰伊崆洞之拔起兮鎮嶠南之靈區翠旓繽其蕩空兮播灝氣之蕤綏章貢挾以比流兮盎土脈之滋腴穴遙通於龍翕兮勢蟠亘於鬱孤信地維之奧宅兮為靈真之所都則有白鵝羽人黃唐丹士闢玉為房鑄金成黍仰青帝之布帷撥赤霞而啓笥悼下土之坌濁凌剛風以徑度惟彭城之仙子兮式爛柯之遺軌謂靈奕之可觀兮意翩翩而遐舉裘翦鹿肥之花屨約芝田之蕊巾割湘雲之枝鞶點彩鷮之尾傷胡麻之未飯愛白石之堪煮踰洞真之石扉借修月之寶斧期緱生之下臨兮庶緑文之可㖟于時玄冬屆朔氣交水腹堅金莖高二鶴夜語獨烏晝韜莽六花之聚白合溟涬於空寥幻九清之祕景闢太素之神苞奪人目精兮若流水翻空而不定一白無定地兮如爛銀炫耀於霜臯瓊林玉樹疊頴聨條柯頓亡於春緑花巧綴于晴梢乃涉瑶磴乃依氷樾膚中寒而生鱗指屢僵而弗屈丁丁許許不遺餘力已枯成采方長不折玉屑隨聲而輕墮霜莖倚雲而初積束以九真之赤藤附以千年之苓魄既逍遙而永歸忘蕉鹿於今昔歌曰我采我樵兮大濛之野萬樹瓏􅌑兮玉光照夜孰能相從兮與霓旌而俱下於是築石竈翻金經養神火煉黃寧汞生水虎之窟鉛出火龍之扃液承太乙之珠機運元華之精憑乾坤之封劵植鄞鄂之丹城逮伐毛而洗髓致隂爍而陽凝種芝於瓊玉之山折桂於廣寒之庭領襟佩於橋門集鵷鷺於王庭白簡霜飛繡衣春明近一山而持斧使九夏之生氷乃乘風而來歸兮於瀛洲之先登隔人間之風雨兮遽真凡之異程至若西鄰之子沈酣羶葷屏龜香曙笙火花春葆階舞楚銀館歌秦黃塵迷南華之夢弊屣嗤東郭之貧樂鍾鼎之遺豔厭煙霞之近醇尚父釣渭阿衡耕莘或封齊於東海或致君於華勛齊出處於一塗肯變志於屈伸世繽紛兮麗以新蠟代薪兮傷芳辰翻海水以為霖兮曽莫濯夫遊塵孰不化為胡燕兮依華榱之飛文丹禽鳴夫空谷兮亦寥寥之一聞彈樵歌之逸響兮寄緑綺于秋旻歌曰若有人兮在蘭崖止白虎為使陟崇巇止皓毳回飊敷天葩止虛白內朗絶纎瑕止仁斧義斨龍鏘鳴止鵜膏匪施痂弗形止剪彼薪樗扶松柏止養賢大鼎熟以烹止天下為公大道行止遡風屹立思盈盈止頌凡八章平江漢頌天命皇上為億兆生民主旌麾所向悉臣悉庭初以一旅之師興濠泗間遂撫淮南平江東攻浙東西下之版圖所入方數千里定都江左發政施仁戴白之叟埀髫之童涵泳至化皥皥熙熙如承平時于時陳友諒據有江漢之地僣居大號賊殺其主大修蒙衝虐驅蒸黎如蹈水火不自度力又集蜂蟻之衆直窺豫章三月不解皇赫斯怒乃召羣臣于庭而告之曰陳虜不道敢屢豫侮昔者蕩搖我邊方侵軼我姑孰伺偵恥慶切候也我金陵賴爾一二臣鄰之力攻而敗之豫亦親覆其穴巢中宵竄走假息武昌豫不忍追殱之冀其悔禍以自逭於天刑癸卯之夏乃復圍我豫章是其凶德無厭自取殄滅此天亡之時天之明威豫不敢不順唯爾熊羆之臣不二心之士尚弼豫以成厥功羣臣曰都於是右丞臣逹參知政事臣遇春帳前親兵指揮使臣國勝同知樞密院事臣永忠臣通海備厥戎器簡厥師徒以俟七月癸酉上躬擐甲胄禡師祭也纛龍江帥樓船數百蔽江而上陳虜大讋解圍而逃丁亥與我師遇鄱陽湖之康郎山戊子上分舟師為十二屯命逹遇春永忠突入虜陳呼聲動天地矢鋒雨集炮聲雷鍧波濤起立飛火照耀百里之內水色盡赤焚溺死者動一二萬流尸如蟻滿望無際己丑焚偽平章舟刈戮餘二千辛卯復酣戰虜將張定邊素號梟猛上親禦之將士皆死戰歷一二時遇春等左右夾擊殺士卒無算張中矢百餘而退潛保鞋山不敢吐氣我師亦據湖口扼彼喉襟列柵南北江岸置火筏中流水陸嚴戒以候其發八月虜食盡遣舟五百艘掠糧都昌又為我大將所獲壬戌虜計窮冒死突出將上趨九江上命諸將一時俱合其大戰如戊子自辰逹酉督戰益急友諒中飛矢斃于舟中癸亥降其衆五萬人上命釋之不戮一人凱歌而旋舳艫相銜旌旗飛翻不疾不徐委蛇而來萬姓歡迎俯伏道左山川草木皆有喜色告廟飲至行賞論功賜遇春田若干永忠田若干其餘將士賚金繒有差臣稽在昔曹操治水軍八十萬來攻孫權而周瑜黃蓋敗之于赤壁苻堅發長安戎卒六十餘萬騎二十七萬以侵晉而謝玄謝石敗之於淝水然赤壁不過一焚而走淝水亦不過軍亂而奔初未嘗大戰也而史臣具書之以為千古美談矧今湖口之捷血戰纍日天地為之晦冥日月為之無光山河為之震蕩其神功駿烈炳耀鏗鍧與天無極較之二國未足多讓而歌詠不作非甚闕典歟臣謹備著其事撰為詞頌一通以流鴻績於無窮以俟太史氏之采録云其辭曰天眷有德實為哲皇肆其神略以靖冦攘義旄東指罔敢弗恭風烈虎嘯雲遊龍驤長淮既歸江左攸屬浙之東西樹侯置牧乃建國家以奠南服以懷中原以控西蜀蠢爾小醜敢讎大邦集其凶頑鋒蝟斧螳輕涉我疆以跳以踉亦既剪刈僵骸覆江洊齊六軍直傾其穴釋而弗誅俾自懲刷闔胡不然復豕而嘻翹其蟲臂當吾車轍皇明震怒厯告在廷是決不悛命將往征爾選舟師爾整甲兵漕爾糗糧各罄爾誠搖光在中夷則之月禡於江濱皇秉巨鉞以誓以戒以速其發紀律精明飊火奮激旟旐揚揚艂漢江切艭將將矛戈洸洸鎧胄明明載怒載厲載飛載揚雄威所吞已無荆湘既與虜逢大呼衝擊藥騰藜駁星流火戟虐焰電奔巨轟雷劈殺氣冥蒙不辨咫尺矢鋒所貫什伍聨聨縱橫交紐命隕弗顛攢桅湊帆筍束蝟編流尸塞川舟行弗前虜魄既褫扶創而逸聚于湖奧僅存喘息我方植柵江之南北火筏在流掩蔽如翼越厯四旬飛走途窮將冒萬死以絶其衝我師見之干艫如龍似兔之走而鷹之從酣戰六時由辰逹酉僕姑矢名也一發殪此酋首貫睛及顱仆若枯栁大憝既除餘不能醜遞相告言我誠不扶我革我頑我歸至仁誰謂培塿可髙嶙峋再拜稽首來降來臣皇曰俞哉汝俘豫受宥汝弗劉豫汝父母汝凍豫衣汝飢豫哺昔何昏迷今始撤蔀奏凱而旋騎吹鬱搖形於樂歌節以鐲鐃飲至于廟頒賞于朝帛堆其家肉登其庖都人聚觀舉手加額或嘆或謡有聲嘖嘖干戈相尋匪一朝夕自今升平可坐而策惟皇神武動則克之羣䇿盡屈四方式之惟皇寬慈降則釋之義聲動蕩疇能敵之惟皇明斷遇事即決洞見千里不隔一髮所以四征成此駿烈小大畢朝孰敢肆孽在昔赤壁洎乎合淝事以幸集尚傳䇿書况兹之功俊偉赫熹揆古無讓可無咏詩臣雖微賤文字是職對揚皇休并獻臣臆三代以還用仁興國皇宜遵行永作民極膏露頌洪武二年冬十月十有三日甲戌膏露降于乾清宫後苑蒼松之上皇帝敕中官折示禁林諸臣光潤如酒凝結如珠肪白飴甘彌布松柯馨烈之氣鬯逹左右勃鬱淋漓薰涵太和天休震動中外嘆嗟又明日丙子上御外朝左丞相宣國公臣善長帥羣臣稱賀上若曰甘露之降載在往牒然休咎之徵當以類應朕惡足以致斯卿等尚明為朕言之參知政事臣稼對曰聖人之德上及太清下及太寧中及萬靈則膏露呈瑞陛下敬恭天地輯和人民故天不愛道而嘉祥徽顯也起居注臣觀對曰帝王恩及於物順於人而甘露降陛下誕寬民賦衆庶歡豫底于敉寧神應之臻職此故也翰林侍講學士臣素對曰王者敬養耆老則甘露降而松柏受之尊賢容衆則竹葦受之今露降于松則陛下養老之所致也宜以制幣䇿告宗廟頒於史館以永億萬年無疆之聞上情存損挹皆推而不居言既已丞相帥其班以退翰林學士臣濂竊伏自念氐北有星名為天乳若明而潤則膏露下焉王者德格于上恩覃于下靈氛充牣祕貺斯甄此天人感應之常理也欽惟皇上興自臨濠匹馬渡江十五年間遂成帝業天瑞育滋不一而足彩霞成鳯卿雲聚繡赤烏飛翔白兔俯伏瑞蓮並嘉禾孕文實皆天之所命非人力所致而自至者今又覩兹聖徴則其德洞淪冥功成不宰三瑞沓至千休滋彰有不期然而然者矣雖然傳有之受命不于天于其人休符不于祥于其仁所以孔子之作春秋祥瑞不書而有年則書豈不以天道玄逺難知而人事之為可徵者乎皇上以天縱之聖留神至治以得仁賢為瑞以五風十雨為祥視彼前代植金莖以承液夸嘉瑞以紀年者未嘗不指以為戒則其英明之識超絶之智卓冠百王為法萬世是宜美盛德之形容播諸樂歌被之管絃以示聖子神孫於無窮云其辭曰上天降康甘露之襄於粲其英純乾發自陽以布於下方凝於休祥其祥伊何靈氣孔多有甘者液載仁惟澤潛靈是錫誕皇之德天地相合鴻休翕集厭厭浥浥紛紛密密匪隨日以食兆厥聖徴如卿之雲如景之星如日之重輪沖和氤氲以文我太平惟皇之聖貞符自應不卑而流不高而迎茀祿之攸成惟皇之明貞符爾承不倚而傾不恢而盈茀祿之攸寧休慶之即四國之式有濯厥聲耀于千齡嘉瓜頌皇明式于九圍德漸仁被和氣薰蒸靈物效祥乃洪武五年夏六月嘉瓜生於句容張觀之園雙實同蒂圓如合璧竒姿分輝紺色交潤誠為曠世之産壬寅京尹臣遇林函以絲匭圖其形於上移文儀曹請以奏聞癸卯尚書臣凱等奉瓜以獻時上御武樓中書右丞相臣廣洋左丞臣庸同知大都督府事臣英御史中丞臣寧翰林學士臣濂咸侍左右天顔怡愈重瞳屢回良久乃言曰徴之往牒其事云何丞相奏言漢元和中嘉瓜生于郡國唐汴州亦獻嘉瓜禎祥之應有自來矣陛下勵精圖治超漢軼唐故天錫之珍符太平有象實見于兹上謙讓弗居然而靈貺之臻復不可不承乃詔內臣置諸乾清宫翌日甲辰薦諸太廟臣濂退而思之夫瓜蓏力果切草實在地生之屬也其蔓逺引其葉阜蕃諸傳有之神瓜合形表綿綿之慶此固兆聖子神孫享億萬載無疆之祉况瓜之所出本於回紇中爾討而獲之故名為西方今皇上命大將軍統師西征甘肅西涼諸郡俱下而瓜沙已入職方行見西域三十六國同心來朝駢肩入貢大顯叶瑞其又不在於兹乎然而異畝同頴周公作歸禾之篇三秀合圖班氏有靈芝之歌矧此嘉植含滋發馨昭宣我神應焜煌我王度寧可喑於金於甘二切帝極無聲默而遂已乎顧臣駑劣不足以美盛德之形容謹上其事願宣付史館以備實録復繫之以頌頌曰乾道載清坤維用寧保合太和發為休禎句容之墟物無疵癘神瓜挺出殊實同蒂瓜孰非單此合而生二氣育質雙星降精蜜房均甘氷圭競美明月重輪仿佛堪象豈無賔連産於户東叶疇若兹瓜協瑞聨祥亦有華平張翠作蓋疇若兹瓜交輝映彩其兆伊何蘿圖綿延西域既柔德冒八埏羣臣曰都載拜稽首神休滋彰天子萬夀粵從啓運靈貺疊甄兩岐秀麥合柎方無切花萼足孕蓮矧此貞符近在輦轂王化自邇逺無不服帝曰吁哉朕猶慊然瑞當在人物胡得專使物為祥宜獻清廟自我先人積慶所召孰瑞不矜帝則弗居唯親是思我民之徒以實應天斯乃盛德小臣作頌以示罔極鳯陽府新鑄大鐘頌皇帝既正大統建都江表德綏威讋萬邦咸臣用羣臣奏臨濠為龍飛之地賜名曰鳯陽南北民大和會百族錯居動十萬數然而物大而盛不假器齊一之無以嚴昏旦之禁乃詔江隂侯吳良監鑄大鐘以定衆志以禆治化侯之受詔遣使者至富春山中徵金工何成諭以天子明命即日帥其屬十六人以從相地鳯陽城東三里搏泥成範畫其銑角衡之度侈弇為良篆帶以方候其燥剛始穿一十又三錬青赤銅六萬五千斤筮以洪武乙卯冬十一月己巳蒞事厥明侯具法服以牛一羊一豕一祝告先冶之神禮既成槖籥咸興鼓動風氣炎光赫曦上貫霄漢絳液既澄氣憤雲泄循竇而入肅肅有聲陽施隂凝徑質斯具越二日辛未乃發復取牲血塗其釁隙以厭除不祥鐘高十六尺有五寸厚六寸徑十尺有五寸圍三十四尺有竒混融其輪圓煒煜其容輝信技殫於人巧妙奪於神功者也於是營構層臺副以簨簴聚千夫之力巨絙而登之一杵之撞隱隱闐闐雷旋電奔震撼太虛遐邇聞者靡不聳愕會濂扈從青宫幸鳯陽親觀盛美侯遂請濂為之頌濂聞先王之世金部有七黃鍾乃樂之所自出而景鐘又為黃鍾之本所謂景鐘大鐘也其受至於九斛而止律吕由是而應隂陽由是而均夫豈細故也哉秦漢以來寖失古法小鐘或數尺大鐘或容千石皆不本於律度今我熙朝稽古右文定於中制宣導天地孚洽神人中和所致嘉瑞畢協增拓化原亦於是乎有賴非特嚴昏旦之禁而已濂待罪國史以文辭為職業義當揚發蹈厲以鳴國家之盛侯之有請不敢固辭頌曰維天穆清鼓以雷霆適昭天聲百物以生維帝濬哲法天之烈大鏞斯揭元氣噴泄眷于濠梁真龍飛翔乘陰御陽洗濯八荒神物攸起是為帝里從者如雨於焉萃止物大而豐往來憧憧節之以鏞罔敢弗恭乃飭鳬氏乃具爐錘乃烹乃鬻化金為水赤氣夜明如日之升流亟而頳入竇有聲彬彬斐斐功同神鬼不鈕不鋙輪圓順軌既啓其型敢愛斯牲塗釁禮成榮光如星千夫齊力臺搆懸植交扛孔奭載考載擊宅兮囷囷觸兮賁賁摩乾蕩坤以警昕昏發攄靈氣昭融品彚物無疵癘年穀攸遂博碩而龎聲與天通拓美集祥熏于家邦惟皇建極福之敷錫制器有赫式和民則稽樂之原鐘實為先律吕以宣功埀不刋小臣作頌有美無諷爰咨于衆是傳是誦擬晉武帝武功頌惟咸寧五年冬十有一月皇帝將舉兵徂征乃集多士于庭而訓之曰惟皇天孚佑有晉俾克君臨萬方爾萬方有衆罔敢有肆厥志朕猶夙夜祗􅘨若將墜于深淵唯恐一夫不獲以越前王彞憲商書曰民非后罔克胥匡以生后非民罔以辟四方朕曷敢荒寧今孫氏皓舍我民弗靖唯酒暨色淫酗無厭大開苑囿起土山樓觀殫極工藝肆厥威如虎狼羣臣有正視者輒殺無赦人怨神怒皓有耳若罔聞知則亦弗畏天降威命上帝震怒集厥命于朕躬不敢不正敢用吉玉宣璧昭告于上天神后帥爾有衆底天之罰爾伸爾為王子國之休戚與爾同之爾督徐州諸軍以出塗中爾渾戮力王室簡在朕心爾督揚州諸軍以出大江之西爾預夙以嘉謨告朕朕極不忘爾尚克踐前言以成厥勳荆州諸軍爾其督之以出江陵爾濬爾作大艦欲有事於皓多歷年所今維其時非爾弗克終厥圖益梁諸軍爾其監之以下巴蜀爾彬帥其部曲以從爾奮爾戎世號忠貞各將爾師以出夏口以出武昌爾充為使持節假黃鉞大都督以冠軍爾濟副之嗚呼爾有衆修乃干戈峙乃糗糧齊乃卒伍勿喪厥紀律惟爾賢往敷朕威靈越厥君臣宜執俘之獻于太廟勿大肆殺戮惟爾賢嗚呼朕豈有愛于皓土疆閔我民罹辜誕以爾多方殄殱乃讎爾尚兢兢懷保若撫鷇雛兵戎所指弗使致厥傷俾朕膏澤布于下民時乃功爾不聽朕言朕則孥戮汝爾其念哉太康九年春安東將軍渾出橫江所向皆克二月龍驤將軍濬克西陵鎮南大將軍預遣將渡江自進克江陵沅湘以南諸郡皆望風送印綬預分兵益濬建威將軍戎遣將與濬合攻武昌降之三月濬以舟師入石頭皓面縛輿櫬詣軍門降克州四郡四十三户五十二萬三千兵二十三萬夏四月賜皓爵歸命侯遣使行荆揚除皓苛政詔增充渾邑八千户進渾爵為公濬輔國大將軍預戎皆封縣侯諸將賞賜有差以伐皓之役實始於巨平侯祜祜既卒䇿告其廟封其夫人為萬嵗鄉君食邑五千戶復詔博士臣某刻石紀功昭示萬世子孫以紹有晉無窮之基弗敢壞頌曰煌煌有晉寵綏下民欲俾萬方均囿至仁惟皓不恭據彼海瀕殘虐是逞若火四焚帝怒斯赫命將徂征龍盾虎旟照耀日星士氣如虹吞厥南土長江天塹一朝飛渡罔不震驚流汗浹背豈伊神武自天而墜帝命將臣汝戒汝師汝敵則劉降宜舍之皓既面縛餘敢不釋萬里雖逺天威咫尺青蓋委蛇入于洛中夙發其祥昭此武功皇華載遣六轡耳耳誕布陽和以消陰曀旋乾轉坤六合一家文恬武嬉渾渾無涯有功者賞載盼載錫赤芾桓圭帝不之惜惟帝神武能屈羣䇿拓開蠻荒揭此日月帝德流衍頌聲斯播授之樂師以薦郊廟擬薛收上秦王平夏鄭頌粵武德四年秋七月朔記室薛收頓首再拜言仰惟秦王殿下龍興晉陽佐我皇帝起義兵以龕定禍亂金鼓一振罔不臣順唯鄭王世充夏王建德昧厥大命侵牟我邊陲刈劉我蒸人抄掠我玉帛干戈之相尋殆非一朝一夕皇帝震怒詔王督諸軍伐鄭遂敗世充于穀水進圍洛陽建德不思自靖凶德參會將兵十萬來救王帥諸將酣戰破而擒之於是世充智窮援絶率羣臣詣軍門降王至長安獻俘於太廟行飲至禮詔斬建德於市免世充為庶人徙于蜀中大赦天下天下萬姓歡欣舞忭以為皇帝之睿謨雄算王之戎功駿烈皎皎乎不可尚已收備在戎行親瞻制勝料敵之竒進退擊刺之雄耳目怖駭若臨鬼神雖淺劣無識不可無歌詩以鋪張鴻休謹撰平夏鄭頌一通以獻庶幾昭示萬世以宣有唐之聲烈以著王業之艱難云其辭曰真王挺生宅靈孕竒天日之表龍鳯之姿噓陽吹陰宰于化機精神所被物無不綏皇帝興兵以遏亂隋王左右之神運天施或獻竒謨食若元龜或賈棬勇力如虎貔雄吞八極易若拾遺如鼓迅飊泱泱四來降燕帖魏踣秦以隳金鼓之下孰能慢台維此二豎曰夏暨鄭據河北南兵犀弓徑勢成鼎足力與我競夏陷黎陽思百其勝衛滑齊兖蹂踐莫定鄭取汴亳奪我藩屛封豕長蛇貪噬益橫况於官城大設坑穽四周削起峻若甗甑忌則陷之毁宗滅姓怨氣塞天凝為祥眚人之孔哀其何能竟皇帝曰嗟我人何辜敕汝秦王汝亟是圖汝􅙀汝甲汝張汝􅋃汝簡鋭驍東傅其都王拜稽首禡牙出徂旌旄飛翻士卒嘯呼曰爾萬寶爾疾而趨扼其龍門毋逭虜誅曰爾德威視敵若無圍厥河內批其大軱曰爾君廓爾震鼓桴控彼洛口以絶餉輸屢戰屢克王乃向洛移軍青城壁壘星錯虜薄穀水栫以虎落王曰爾通爾急往角我引騎南以褫其魄靈威莫抗虜漸退却橫戟長追如鼠入槖掘塹而守朝鼓夕柝不日成擒以潤鼎鑊洪爐熾炭何金不鑠夏人卒狂稱兵黨惡其旅若林誠可怖愕王曰靖哉爾衆勿搖虜卒既惰虜將且驕虜命當傾決於今朝莫匪上天欲逸我勞使發一矢中此兩雕咽喉之門實在虎牢吾往敓之短兵爾操且行且餌伏鋭于坳伺虜深入乃與死鏖虜因大讋布尸滿皋進退維谷更動疊騷偵吾牧馬將襲而逃王乃濟河南臨廣武騋牝如雲留彼弗取虜果來迎列柵牛口我閉弗出自辰逹午虜氣既竭逡巡欲走王謂士及爾整部伍爾將梟騎突此羣醜矛進而翼截其兩肘會虜方朝顛倒失序震霆方驚不及掩耳擊刺從衡龍飛熊吼天日為黃塵起如霧正戰方酣王出以竒爾知節等卷斾而馳旁繞虜陳張我虎旗虜衆惶駭奔如流澌相彼酋首欲絶而西神槊一指顛若墜尸王叱武威執而縛之囚示鄭人鄭人曰噫我援已絶我力莫支我肉我袒牽羊以隨有餘者孽亦復來歸奉璽再拜冀免殱夷乃獲乃俘振旅而復王被金甲懸厥魚服逺而望之有光熠煜大將森衛後先聨屬鐵騎萬匹旁障羽纛鼓吹颯沓節以金鐲清廟有赫上與雲矗陳俎奠爵籩豆嘉肅既俘以獻且拜且祝祝已飲至列筵如竹醇酎川流精殽林簇鳧鷖既醉咏歌相續皇帝曰嗟竇實弗恭稔禍濟惡厥父用亢當梟其元以令醜凶充罪固殷悉衆禦攻待以不死徙置蜀邦我人實煩轉輸是共或居遐裔久阻冦封惴惴自保息屏足重宜行給復式寬其庸復赦宇內以示大同丹鳯銜詔無逺不通𢎞宣睿澤丕昭仁功萬方有言如蔀斯撤昔也戰爭連城蹀血蒿萊千里人迹殆絶今也恬嬉寧爾家室盡斂戈矛化為襏襫人和既滋天休當發山出器車庖形瑞萐騶虞在郊苞鳯巢穴黃龍舒采白鳥振潔無間朔南聲教孚浹視彼梁楚千鈞一髮定知來朝不煩斧鉞天生蒸人常代傖囊必眷有德以綏以攘簡䇿所紀更僕莫終徴之秦漢厥事孔明嬴政肆虐虎視域中踐華因河為固自防祠狐一鳴亂如沸羮六國復興各自立王籍起會稽中號最強喑啞叱吒萬夫膽喪劉季斬之不翅犬羊巨敵一鋤寰宇乃康強隋比秦尤瀆天紀諸桀援戈聚如蜂蟻不有靖之代何能治惟帝明睿乘運而起惟王輔之以臨四海黃鉞白旄翦剃不軌無堅不磢無險弗砥夏鄭既夷治平可致揆之炎漢聨芳儷美赫赫神功可昭萬祀收在戎行躬瞻鴻偉敢揚頌辭以告太史豫章鐵柱頌豫章郡鐵柱二旌陽令南昌許遜敬之鑄以鎮蛟者也郡地濵于江水蟲騁妖故民多江禍旌陽與西安吳猛世雲用正一斬邪三五飛步之術追殱其神於長沙復懼遺孽洊興使物治鐵厭其窟宅一在西山雙領南堙沒已久一在牙城南井迄今猶存柱出井外㢙尺下施八索謂能鈎鎖地脈云唐咸通六年節度使嚴撰來為郡將發視之未及咫烈風雷雨江水暴溢撰恐而止其見於道家書者如此濂竊聞之周有壺涿氏掌取水蟲若欲殺其神則以牡􅧄牛貫象齒而沈之則其神死淵為陵神謂龍罔象之屬也古蓋有其術矣矧單陽則飛制以重陰乃伏而不動鐵陰而蛟陽者也斯柱之建其亦沈􅧄象之遺意與於戲豫章之民與蛟不兩立微旌陽西安民其魚矣濂雖不敏謹徇郡守某之請勒文柱下以頌神功於億萬載頌曰吳楚合域翼軫分經南昌巨都蛟孽所庭咮攓波譎脽運濤縈天誅默驗腥遏僉徴沈竈蛙産蝕臭泓成靈伯應歷鬼憲宣刑嶽籙三辰斗劍七星揮斥電戰刉割霆升河眚黑廓川液紅星軌天設鎮冶金建楹祝融主焰閼伯司型八神錫羡五官儲精上旋圓樞下鍵方扃溟妃捧鑑淵后持衡飊笙鶴瀨月吹鳬汀仙旍回紫童節流青玄勳潛沕素牒晶熒龜山鐵絙龍鼎文銘翊扶鴻宰斡運清寧泰山可礪靈柱勿傾三老圖頌浦江鄭氏以孝弟為政一門五十餘室不别槃案而飯者埀三百年靈和充牣發為祥徴三夀作朋形於同氣孟曰伯陽父年七十有二叔曰仲德父年視孟而縮其四季曰仲舒父年比叔又劣其五惟是三老人者身載明德聿昭前聞天休滋錫精神熙康羣從子姓趨翼乎後先仁聲義聞流衍於倫類誠可謂備享百福而綏有遐齡者矣濂竊聞之南極有老人之星占者謂其光明潤則下多夀考是則天人之間氣化孚浹同流上下閲世靈長似若不偶然者况於孝弟之家通於神明者乎宜其人瑞之鼎立景貺之川臻也濂也不敏覽圖興嗟斯頌之所由作其辭曰維天降康其福穰穰斯夀之祥其祥何徴非景之星非雲之卿非三秀之榮鍾我夀朋大冠緇衣載肅其儀其神孔熙其樂孔皆叶燕居之耽時盍其簪如鼎之安如星之參協數于三孰不式且瞻旌門有恤孫子之飭有百斯集雅雅魚魚振振蟄蟄或馮或翼弗徐弗亟唯步武是式嵗時宴饗叶肆筵于堂籩豆大房曰殺羔羊其醪苾芳鐘鼓喤喤笙簧洋洋多士鏘鏘更獻夀觴祝鯁于前執酳于旁人士來觀有嘆有言維此旌門德義之尊維此夀朋景福攸臻積之既蕃受之弗諼錫羡于後昆其羡之都孰侈孰舒孰形匪圖古亦有諸其年曰耆或至于期頤是繪是摹儷美而同趨九藍之山有石巖巖曰麟之水其流亹亹眉夀無有害與之同體夀俊之良髮素而眉龎茀祿具慶叶流榮于鄉匪榮于鄉實邦家之光洪武十年七月望日前具官宋濂述詔凡一章奉制諭安南國詔春秋大義亂臣賊子在王法之所必誅不以夷夏而有間也間者安南國王陳日煃薨我國家賜以璽書而立日熙為王今觀所上表章乃名叔明詢諸使者日熙為盜所逼悉自翦屠其羽翼身亦就斃此皆爾叔明造計傾之而成篡奪之禍也揆於大義必討無赦如或更弦改轍擇日熙親賢命而立之庶幾可贖前罪不然十萬大軍水陸俱進正名致討以昭示四夷爾其毋悔誥凡五章給事中安統除兵部尚書誥兵部司馬之職尚書法從之官古不輕授今難其人蓋戎務之出入馬政之弛張莫不繫焉非有奮厲之才練逹之知不足以奉揚威武毗贊機密者矣具官安某粵自蚤嵗有志事功自北而南在朕左右及其給事內庭論思獻納之益亦時有焉夏官之選惟爾之能然以八座之貴朕非輕以畀人者也爾尚一乃心力以報朕所以見知之意嗚呼唯秉義守正則可以謹科條惟趨事赴功則可以行邦政尚思自勉服我訓辭遙授李思齊江西行省左丞誥朕起布衣除暴亂救民於水火之中其有能知天命所在帥衆來歸者朕每嘉焉爾李某當元運之衰奮自汝南擁兵而守秦隴積年屯戍志在保民及我師入關乃西往臨洮已而率其士馬之衆納欵轅門去危而就安轉禍而為福視彼暗於事幾殘民以逞者相去逺甚可謂通時逹變之豪傑矣兹授左轄於外省列之朝班仍給其祿爾尚夙夜恪慎思保令名以稱朕優禮之意爾其懋哉侍御史王居仁除山西行省參知政事誥國家之建行中書所以控制方面而布宣政令者也况河東山西之地古為雄藩所轄州郡不翅六十有餘版籍之廣民庶之繁其事亦云夥矣邇者鑄印開省未設丞弼先命近臣為參知政事奏辟官屬以行則是大小之務皆得専逹非止參預而已也與斯選者非得勳舊之臣曷足以重其任哉具官王某才足以匡時謀足以經逺自渡江以來委身事朕凡十五年踐揚中外多著勞烈執法中臺聲聞益著於是簡在朕心俾躋政府嗚呼陳紀立經爾尚膺藩宣之寄安邊靖國爾其盡撫綏之方往惟汝諧毋替朕命同知臨洮府事班景道除陜西行省參知政事誥陜西在古為雍州之域三秦之地延袤一千餘里土廣物殷號稱難治朕嘗建行中書設參知政事以綜核衆務以鎮安萬民然必得同寅協恭之臣共釐治之則事集而功成不難矣具官班某負倜儻之才抱經濟之略朕嘗歷試其為人設施次第綽有可觀故自臨洮别駕特授以參預之職夫别駕四品之秩也較之參預之資實超十階豈不以爾韞此竒才故不次而用之乎爾尚夙夜惟勤思稱朕懷官政之有弊者爾當振而新之民瘼之未瘳者爾當撫而摩之則豫一人汝嘉爾其欽承朕言不再擬誥命起結文吏部尚書程能而議功定勳而頒爵此皆選部主之所以古者置於五曹之右重其任也蓋國家之治在於得人得人之盛繫乎銓衡者甄别其能否然則天官之選可不慎歟具官云云爾尚允釐百工以熙庶績名器之崇卑爾當慎其任授之方流品之清濁爾當展其激揚之志時惟稱職汝往欽哉文憲集卷一
