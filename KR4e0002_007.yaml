body:
  text: 文憲集巻七明宋濂撰序凡三十四章詹學士文集序往時湖湘間材士大夫多以辭賦稱若江夏詹先王同文其一也葢同文襟韻瀟灑濟以宏博之學故體物瀏湸鏗鏗作金石聲及歸我熙朝遂以文鳴一時當勝友如雲酒酣耳熱有執巻來求者同文振衣而起捉筆四頋文氣絪緼從口鼻間流出頃刻盈紙爛爛皆成五色觀者從傍鼓譟且謂萬言倚馬可待者将無大相逺自是有問奇俊士僉曰同文同文云予與同文交且久而同官翰林初見之甚驚後屢見之竊自歎賦才暗劣規規方圓中日蹈古人軌轍不敢奮迅吐一奇崛語雖見諸簡牘者近一二千篇奄奄如無氣人作文固當如是耶去年之秋京畿試鄉貢士今年南宫試天下士同文皆持文衡區區亦與聞末議見同文考五經巻朗讀數行輒操觚書云云書已復讀又書云云予視之析理精緻如漢廷老吏議法是非重輕卒不可掩人以文辭稱同文固未見其衡氣機如同文者其何可及邪其何可及邪韓退之稱李杜文章光焰萬丈少陵之作頓挫沈鬱髙不可攀深不可探謫仙之辭飄飃然㳺戲璇霄丹臺吹鸞笙而食紫霞絶去人間塵土思此無他精華發為光耀縱横交貫不自知其所止退之言當不誣同文之能致是者豈無其故哉然予聞太史公周覽名山川故作史記奕奕有奇氣同文他日西還予将相隨泛洞庭浮沅湘登大别九疑之山吸風吐雲一洗胸中穢濁使虚極生明明極光發然後揮毫以尾同文之後萃靈鳳之彩毛擷天葩之奇馨或者當有可觀同文果以為何如邪同文以文集授予序神思揺蕩急展牘書之懼共凌空飛去是為序歐陽文公文集序文辭與政化相為流通上而朝廷下而臣庶皆資之以達務是故祭享郊廟則有祠祝播告寰宇則有詔令胙土分茅則有册命陳師鞠旅則有誓戒諌諍陳請則有章疏紀功燿徳則有銘頌吟詠鼓舞則有詩騷所以著其典章之懿敘其聲明之實制其事為之變發其性情之正闔闢化原推拓政本葢有不疾而速不行而至者矣然必生於光嶽氣完之時通乎天人精微之藴索乎厯代盛衰之故洞乎百物榮悴之情覈乎鬼神幽明之賾貫乎中外離合之由舉其大也極乎天地語其小也則入夫芒秒而後聚其精魄形諸篇翰渢渢乎泱泱乎誠不可尚已世有與於斯者其惟大司徒楚國歐陽文公乎公諱𤣥字原功潭之瀏陽人其先家廬陵與文忠公脩同出于安福令萬之後公幼岐嶷十嵗能屬文逮弱冠下帷數年人莫見其面經史百家靡不研究伊洛諸儒原委尤為淹貫遂擢延祐乙夘進士第厯官四十餘年在朝之日殆四之三三任成均而兩為祭酒六入翰林而三拜承旨蓋當四海混一之時文物方盛纂脩實錄大典三史皆大制作兩知貢舉及讀巻官凡宗廟朝廷雄文大册頒示萬方制誥多出公手金繒上尊之賜㡬無虚月海内名山大川釋老之宫王公墓隧之碑得公文辭以為榮片言隻字流傳人閒咸知寳愛文學徳行卓然名世羽儀斯文黼黻治具公之功為最多君子評公之文意雄而辭贍如黑雲四興雷電恍惚而雨雹颯然交下可怖可愕及其雲散雨止長空萬里一碧如洗可謂奇偉不凡者矣非見道篤而擇理精其能致然乎嗚呼自宋迨元三四百年之間文忠公以斯道倡之於其先天下學士翕然而宗之今我文公復倡之於其後天下學士又翕然而宗之雙璧相望照耀兩間何歐陽氏一宗之多賢也不亦盛哉初虞文靖公集助教成均其父井齋先生汲亦教授于潭見公文大驚手封一帙寄文靖謂公他日必與之並駕齊驅由是文靖薦公升朝聲譽赫赫然相埒卒符於井齋之言文靖之文已盛行公薨之十四年其孫佑持公集二十四巻來謂濂曰先文公之文自擢第以來多至一百餘册藏於瀏陽里第皆燬於兵此則在燕所錄自辛夘以至丁酉七年之作耳聞有見于金石者隨附入之子幸為文序之以傳濂也不敏自丱角時即知誦公之文屢欲裹糧相從而不可得公嘗見濂所著潛溪後集不我鄙夷輒冠以雄文所以期待者甚至第以志念荒落學術迂疎不足副公之望况敢冒昧而序其文乎雖然公文之在霄壤中上則為徳星為卿雲下則為朱草為醴泉光景常新而精神無虧亘萬古猶一日也序之與否尚何暇論㢤佑字公輔問學精該議論英發無愧于家學者也曾學士文集序翰林直學士臨川曾先生既殁其子中衛經厯仰發其平日所著望周山金石齋青華閩海昭回從政丙午居賢前後編凡九槀及逾海逾遼二志通類為若干巻介其同年進士雷燧徵濂序其首濂時竊祿詞林脩史事嚴雖諾之而未暇為後三年仰之弟儕復走南京申前請為尤切濂将焉辭惟曾氏出于郕國公自都鄉侯據南徙代有顯人至于文定公鞏文肅公布文昭公肇起於南豐遂以文章名天下文定之製熛鷙奔放雄渾瑰偉文昭之作簡嚴平實温潤雅馴最為學者之所同慕不翅景星之與卿雲而文肅之子司農少卿紆固守家法亦以辭章稱君子謂如魯殿秦碑見者珍惜自可孤行於二君之後司農從孫季貍蚤從吕居仁徐師川㳺又能大肆於文其文言質而義正乾道淳熙間羣公多畏敬之自時厥後作者繼軌要不可以一二數嗚呼何南豐曾氏之多賢㢤先生之裔分自南豐父祖皆宋進士書詩之業逺有端緒先生既承家庭之訓又出從元夫鉅儒游鑽研六經孳孳唯恐弗力聞吳文正公講道華葢山裹粮往叩之胸中疑難一旦氷釋自是達之於文奮迅馳騁皆足以如其志至正辛巳嘗舉於鄉明年試禮部報罷當路惜之連薦為校官皆不赴後十四年甲午始擢進士第助教國子脩撰翰林出任江西行省郎官入成均為丞遂升司業進詳定闕副使拜監察御史已而復為副使改今官而殁先生名位既顯海内求文者接踵而至凡得片言隻簡不翅拱璧之貴蓋先生之文刻意以文定公為師故其駿發淵奥黼藻休烈起伏斂縱風神自逺王良執御節以和鑾而驅馳蟻封也朱絃疏越太音希聲而一唱三歎也濤起阜湧飈行雲流力有餘而氣不竭也擅一代之英明作四方之楷則先生其有之矣濂也不敏幸識先生於建業欲以古文辭就正焉而先生亡矣故因仰之求文厯序南豐曾氏世學相仍之盛書于首簡使讀之者知先生無忝前人則為先生之子若孫必将感激奮勵期無媿于先生者矣先生名堅子白其字也剛明正直政事多可書已見其婣家危公素所撰墓銘兹不書郭考功文集序國家當興王之運其人才必超出常倫訏謨定命足以創業而埀統奉将天罰足以威加乎海内至于文學侍從之臣亦皆博習經藝彰露文綵足以備顧問資政化所以竭其彌綸輔翼之責作其發揚蹈厲之勇攄其獻替贊襄之益致其黼黻藻繪之盛此皆天也天意已定於𡨕𡨕之中楚生材而晉實用之撥亂世反之正昭宣人文而風動四方夫豈細故也哉洪武七年秋濂侍皇上升武樓賜坐其側從容問曰天下雖定朕猶埀意宿學之士卿能知其人乎濂對曰會稽有郭傳者其字為文逺寄迹釋氏法中其學有淵源其文雄贍新麗而精魄焜燿其議論崇谹皆根據乎六經波瀾相推若不知其所窮誠一代奇才也上頷之未㡬復召濂謂曰郭傳之文卿可持至朕將親覽焉時文逺偶以文一巻來貺因即以進上覽已笑曰誠如卿言會丞相御史大夫來朝命内使出示之且褒嘉至再即日召見於謹身殿奏對稱㫖詔銓曹擢為應奉翰林文字於是文逺日侍左右以備顧問賜予便蕃不一而足每命題俾撰文若詩輒見賞愛文逺自以受知之深精白一心以承休徳凡可以獻替者咸無隠情已而升修起居注遷考功丞而眷注益隆矣今年春濂蒙特恩謝事東歸将與文逺别文逺盡出所為文請濂序其首嗚呼古今辭章之士未嘗乏人第患知之者鮮爾州里中知之已聊足自慰况扵卿大夫乎卿大夫知之則聲聞漸著亦可表見于世況扵諸侯乎諸侯知之則光輝四達十百之中僅一二見焉人且豔之曰是夫也為人不翅足矣况上簡聖天子之知而屢見褒辭者乎然聖人之言即天也文逺之文天且知之矣則其際遇有道之朝恭承寵靈可謂千載一時者矣昔宋之孝宗嘗於禁中觀蘇子瞻文史臣書之以為至榮此異世尚爾今文逺親受知扵聖明其為榮輝又當何如㢤他日文逺道益行文益顯史臣必為立傳與經國諸臣同載簡册以見興王之運人材之出皆非細故豈不為盛典與濂也不敏齒日衰而學日落縱曰以文自娱其視文逺殆猶土鉶之於殷敦序諸首簡能不自愧乎雖然濂知文逺之文者也相知者不一言疇将言之因不敢牢讓文逺宐删正焉也莆陽王徳暉先生文集序給事中王寅敬伯詣濂玉堂之署殷勤請曰寅之伯父最樂翁諱朝字徳暉莆田人也其學出于同安尹陳公仁伯莆田之先達有二陳焉一則仁伯一則國子丞衆仲皆以文鳴於時實兄弟也其學又出于南塘趙氏之孫袐書公伯暐袐書公二陳之外王父也翁之所學淵源既正而其支流之相承遇奔石怒崖則噴薄如雷霆及至演迤平曠則煥然成文若綺縠之乍舒一翕一張類有物以司其柄者養之深而積之厚期大振扵時奈何其數之奇再試鄉闈皆不利竟以布衣教授州里以終遺文散落於兵燹十不存一寅懼其泯没而不傳也求得詩文若干首釐為十巻翁之友方君炯門人陳君虚中将刻梓以傳願先生為之序濂受而讀之詩則森嚴踔厲有蒼淵之色文多簡古峭奥而其有餘不盡之意恒見于言表人能玩繹之久方始得之其淵源有自誠如敬伯所言不宐以無傳頗求翁之致是者亦由其養氣之充積學之宏乎葢翁家甚貧或併日一炊每揚揚有喜色臨財甚介毫髪不茍取所見一定屹如丘山力撼弗能動儻涉非義舁金遺之不遷也唯游心古初思欲起聖賢而與之周旋故甞以性分為樂人叩其自得則曰守陰之宅蹈陽之庭風行雨集金舂玉鳴庫非吾窒崇豈我榮夷夷于于而獨適其適不亦可乎嗚呼翁之所見若此其殆有徳必有言者乎濂未冠輒受經學文於鄉先達若淵穎吳公立夫内翰栁公道傳文獻黄公晉卿皆天下名士悉得供洒掃之役其淵源非不正也第以受資平凡無以深詣而逺到年周甲子而逾六齡猶不能自振視翁之作不㡬於有愧哉雖然濂不能文而評文恐未有先之者世之骫骳萎弱之文不脫場屋之故態者反足以襲取髙位而翁卒于布衣戴章甫衣逢掖者不知果有公議否乎濂特徇敬伯之請妄置品評於篇端其有激也夫其有感也夫胡仲子文集序韓退之抗顔師一世自李習之以下皆欲弟子臨之而習之謇然不甚相下崇言正論往往與退之角其復性平賦二書脩身治人之意明白深切得斯道之用葢唐人之所僅有而可與退之原道相表裏者也濂嘗以為習之識髙志偉不在退之下遇可畏如退之而不屈真豪傑之士哉古之君子其自處也髙其自期也逺其自視也尊其擇師與友也審舉天下無足慊吾意者則求古人之賢者而師友之茍有得於心矣當時知否不卹也身之貴賤勿論也行之為事功宣之為言論一致也其心廓然會天地之全而㳺乎萬物之表觀古今如一旦暮視千載以上之人若同堂接膝而與之語何暇以凡近者累其心乎孟子舍子思之門人而願師孔子非遺其師也道宜然也近世學者鄙陋而無志聞古之人畏之如雷霆鬼神不敢稍自振㒒㒒焉於庸常之人師云師云而卒無所成者皆習之之所棄也吾友胡先生獨不然自其少時誦數十萬言在諸生中已驚動其鄉邦老儒咸畏而敬之及其既長而壯奇邁卓越務師古人出言簡奥不煩而動中繩墨如夏圭商敦望而知其非今世物也同郡大儒若吳貞文公立夫先生嘗師事之矣吳公亟稱其才不置黄文獻公晉卿以文學名天下見先生輒延致共語所以期待者甚隆而先生亦不為之屈也諸公既亡先生之學益成行益修徳愈邵而文愈雄大江之南稱賢者必曰先生而先生不自以為至也今天子有國之初大臣交薦先生才行上憫其老不欲重煩以政命為衢州教授會修元史復薦入史館史成賜金帛遣歸或謂先生未展其所學而先生澹如也先生嘗慕邵子程子之為人所養甚深極其博而守則約務乎大而不遺乎細扵人鮮所推讓而所許者衆必以為賢於言不輕發而所言者人必以為當其所著井牧皇初諸文有習之之辭而所得者非習之所及也先生年未老而文已傳於時獲讀之者莫不知其為可貴然其可貴者豈特文乎哉是則先生之自得者世之人未必能知之雖濂亦不能盡其詳也濂與先生同師於吳公相友五十餘年髪秃齒豁矣見世之士多矣心之所仰而服者惟在先生則先生之文豈獨今之所難遇乎學子劉剛撰次成集而王君士覺為圖其傳來請序之濂不讓而書其首篇所以歎先生之善學古人而幸天下之見其文也先生名翰字仲申金華人仲子其别號云曾助教文集序臨川曾先生旦所為文凡若干篇其門人某類編成書既而以首簡請予序序曰天地之間萬物有條理而弗紊者莫非文而三綱九法尤為文之著者何也君臣父子之倫禮樂刑政之施大而開物成務小而褆身繕性本末之相涵終始之交貫皆文之章章者也所以唐虞之時其文寓于欽天勤民明物察倫之具三代之際其文見扵子丑寅之異建貢助徹之殊賦載之於籍行之於當時其大本既備而節文森然可觀傳有之三代無文人六經無文法無文人者動作威儀人皆成文無文法者物理即文而非法之可拘也秦漢以下則大異於斯求文於竹帛之閒而文之功用隠矣雖然此以文之至者言之爾文之為用其亦溥博矣乎何以見之施之扵朝廷則有詔誥册祝之文行之師旅則有露布符檄之文託之國史則有記表志傳之文他如序記銘箴贊頌歌吟之屬發之於性情接之於事物隨其洪纖稱其美惡察其倫品之詳盡其彌綸之變如此者要不可一日無也然亦豈易致哉必也本之於至靜之中叅之於欲動之際有弗養焉養之無弗充也有弗審焉審之無不精也然後嚴體裁之正調律吕之和合陰陽之化攝古今之事類人己之情著之篇翰辭㫖皆無所畔背雖未造於至文之域而不愧于適用之文矣嗚呼文乎其可易言矣乎今吾先生淹貫羣經所謂三綱九法其文理之粲然者加體索而擴充焉甞以春秋連貢于鄉科目既廢益寓意於古文辭用功于動靜者久聲光燁然起士林中予取而讀之藻火黼黻之交輝金聲玉振之迭奏魚龍波濤之驚迅一一可以適於世用信夫萬物各有條理者於先生之文亦可以見之余在詞林先生方助教成均朝夕相與論文甚驩故因其門人所請推原文之至者而為之序著源委之真欲體用之兼舉也徐教授文集序曹丕有言文章者不朽之盛事其故何哉夫山之巍然有時而崩也川之泓然有時而竭也金與石至固且堅亦有時而銷泐也文辭所寄不越乎竹素之間而謂其能不朽者葢天地之間有形則弊文者道之所寓也道無形也其能致不朽也宜哉是故天地未判道在天地天地既分道在聖賢聖賢之殁道在六經凡存心養性之理窮神知化之方天人感應之機治忽存亡之候莫不畢書之皇極賴之以建彞倫賴之以敘人心賴之以正此豈細故也哉後之立言者必期無背於經始可以言文不然不足以與此也是故揚沙走石飄忽奔放者非文也牛鬼蛇神佹誕不經而弗能宣通者非文也桑間濮上危絃促管徒使五音繁會而淫靡過度者非文也情縁憤怒辭專譏訕怨尤勃興和順不足者非文也縱横捭闔飭非助邪而務以欺人者非文也枯瘠苦澁棘喉滯吻讀之不復可句者非文也瘦辭隠語雜以詼諧者非文也事類失倫序例弗謹黄鐘與瓦釜並陳春穠與秋枯並出雜亂無章刺昧人目者非文也臭腐塌茸厭厭不振如下俚衣裝不中程度者非文也如斯之類不能徧舉也必也旋轉如乾坤輝映如日月闔闢如陰陽變化如風霆妙用同乎鬼神大之用天下國家小而天下國家用始可以言文不然不足以與此也故所貴乎文者前乎千萬世而不見其始後乎千萬世而不知其終有不可一刻而離去者其能致不朽也宜哉丕也烏足以知之徒以魯國孔融等七子學無所遺辭無所假足以令聲名傳後而已安知其文哉傳有之言以足志文以足言言之無文行之不逺此則文之至者也文之至者文外無道道外無文粲然載於道徳仁義之言者即道也秩然見諸禮樂刑政之具者即文也道積于厥躬文不期工而自工不務明道縱若蠧魚出入于方册間雖至老死無片言可以近道也夫自孟氏既没世不復有文賈長沙董江都太史遷得其皮膚韓吏部歐陽少師得其骨骼舂陵河南横渠考亭五夫子得其心髓觀五夫子之所著妙斡造化而弗違百世以俟聖人而不惑斯文也非宋之文也唐虞三代之文也非唐虞三代之文也六經之文也文至于六經至矣盡矣其始無愧于文矣乎世之立言者奈何背而去之吾友天台徐君大章賦資絶倫自少學文即期以載道非六經所存不復輕寘念慮扵其間含積既久燁然以文名江南洪武中甞召入史館與脩大明日厯遂出教授武林日以横經講道為事逺近生徒莫不趨之猶水之赴壑當修日厯時予適為之總裁每與大章論文竊歎今之作者何其與古異也大章深以予之言為然去嵗過武林獲觀其文集若干巻今山居多暇因徇大章門人之請漫為序其篇端嗚呼世有豪傑之士知文與道非二致者必以余說為不謬茍非其人則以好髙尚誇尤之矣予一聽焉無事乎辨也葉夷仲文集序臨海葉君夷仲宋丞相西澗先生族諸孫也夷仲生有異資其文學之進如榮木升而春濤長日新月盛葢未已也頃由茂才舉于鄉奉使安南不辱君命以功擢髙唐州判官轉知睢寧縣為學猶孳孳不懈其弟廣武衛知事恵仲類集成編釐為若干巻来徵予序其請至六七而不倦予齒加長志氣摧攝操觚所云云皆無精魄頗類寐語者讀夷仲文方畏敬之弗暇尚奚敢序之哉雖然不敢無一言也昔者先師黄文獻公嘗有言曰作文之法以羣經為本根遷固二史為波瀾本根不蕃則無以造道之原波瀾不廣則無以盡事之變舍此二者而為文則槁木死灰而已予竊識之不敢㤀于是取一經而次第窮之有不得者終夜以思思之不通或至達旦如此者有年始粗曉大㫖然猶不敢以為是也復聚羣經扵左右循環而温繹之如此者亦有年始知聖人之不死其所以代天出治範丗扶俗者數千載猶一日也然猶不敢以為足也朝夕諷咏之沈潛之益見片言之間可以包羅數百言者文愈簡而其義愈無窮也由是去讀遷固之書則勢若破竹無留礙矣權衡既懸而百物重輕無遁情矣然猶不敢以為易也稽本末以覈其凡嚴褒貶以求其㫁探幽隠以究其微析章句以辨其體事固粲然明白而其制作之意亦皦然不誣也由是以定諸子百家之異同若别白黒而絶無難矣及夫物有所觸心有所向則沛然發之扵文翩翩乎其萃也衮衮乎其不餒也渢渢乎大無不包小無所遺也嗚呼予以五十年之功僅僅若此今年日逾邁慨兹舊業反成荒落将何以為夷仲言哉夷仲諸作温醇而有典則飄逸而有思致其辭簡古而不龎其神豐腴而不瘠可謂能言之士矣求諸輩行之中未見其敵也進進不已何古人之不可至哉予因忘其固陋以平日所自得者序諸篇首夷仲宐有取焉雖然文辭道之末也夷仲方與有民社之寄當務為政以徳而昌其道哉洪武九年正月望日具官金華宋濂序蘇平仲文集序漢武帝欲教霍去病兵法去病辭曰顧方畧何如耳濂謂去病真能用兵者古今之勢不同山川風氣亦異而敵之制勝伺隙者常紛然雜出而無窮吾茍不能應之以變通之術而拘乎古之遺法其不敗覆也難哉為文何以異此古之為文者未嘗相師鬱積于中攄之於外而自然成文其道明也其事覈也引而伸之浩然而有餘豈必竊取辭語以為工哉自秦以下文莫盛于宋宋之文莫盛于蘇氏若文公之變化傀偉文忠公之雄邁奔放文定公之汪洋秀傑載籍以來不可多遇其初亦奚暇追琢絺繪以為言乎卒至于斯極而不可掩者其所養可知也近世道漓氣弱文之不振已甚樂恣肆者失之駁而不醇好摹擬者拘于局而不暢合啄比聲不得稍自凌厲以震盪人之耳目譬猶敝帚漏巵雖家畜而人有之其視魯弓郜鼎亦已逺矣每讀三公之文未嘗不太息也葢晚而得平仲焉平仲文定公之裔孫少警敏絶倫誦說不勞而習中嵗大肆于文辭精博而不麄澁敷腴而不苛縛不求其似古人而未始不似也仕皇朝為國子學正近臣薦其才擢國史院編脩官以瞶辭歸濂以翰林承㫖致政将還天子命舉可以自代者即以平仲應詔既至復固辭上亦憫其誠特賜文綺遣之天下學士髙平仲之文而莫不惜其以疾困也人有困於當時而貴于後世者亦有貴于當世而後乃無聞者其得失久近果何如哉孰知平仲之困乃所以成其至貴者乎濂重平仲最甚序論其文所以歎蘇氏三公之不可及而喜今世之復有斯人也平仲名伯衡其先居睂自文定公長子徽猷閣待制遲來知婺州遂家焉今為婺之金華人去文定公十世矣朱葵山文集序文不貴乎能言而貴扵不能不言日月之昭然星辰之煒然非故為是明也不能不明也江河之流草木之茂非欲其流且茂也不能不流且茂也此天地之至文所以不可及也惟聖賢亦然三代之書詩四聖人之易孔子之春秋曷嘗求其文哉道充于中事觸于外而形乎言不能不成文爾故四經之文垂百世而不謬天下則而準之自夫斯道不明學者覩聖賢之文而恱其不朽于是始摹倣其語言以為工而文愈削矣夫天之生此人也則有是道也有是道也則有此文也茍能明道而發乎文則将孰禦乎而能者寡矣斯後世之文所以不逮古也後世之文加之以百言而不知其有餘損其十言而不見其不足以不本扵道故爾此非發於不能不言而强言之弊也聖賢之經其所不言也益以片辭則多矣其所言也删其一言則畧矣以其不志於文此文所以卒莫能過也故志扵文者非能文者也惟志扵道者能之元之末莆田有朱先生文霆以治經取顯官有政事人皆知之而其所為文世則鮮知之其孫進士潚近以示余其言醇而理彰扵理不合雖强之言不言其所言者未嘗不本諸道惟其志扵道而不以文名故言文者失之嗚呼人能因余言以求先生之文庶㡬得其所存先生字原道以泉州路總管致仕其厯官政事見予所撰墓銘故不著王君子與文集序經曰有徳者必有言此其故何哉葢和順積扵中英華發於外譬若水懐珠而川媚石韞玉而山輝其理固應爾也不然則其本不立其本不立潢汙行潦朝滿而夕除風枝露蘤西折而東萎欲以示悠逺扵人抑亦難哉濂扵西昌王君子與之文不能無所慨焉子與為人秉剛而守毅葆醇而蹈道其律己也不以夷險而易其操其接物也不以貴賤而二其節一履乎塗轍之正不違乎繩尺之素融融乎森森乎不可企已故其發之於文根柢于諸經涵濡乎百代體製嚴而幅尺𢎞音節諧而理趣逺有益乎倫理之重不爽乎物則之訓世之論者咸謂類其為人不亦信哉士之有志扵文者夥矣抽青嫓白組織文繡柔筋脆骨㸃綴形似徒夸豔乎凡目已違拂乎恒性所謂蠟其言桅其貌者其視子與有徳而有言殆猶魚目之扵夜光嫫母之扵西施也與然而駑駘恨劣逸驥難攀雖幸同于遺軌竟莫繼于後塵葢山林之日長道徳之功深子與則有之矣鹵莽而畊滅裂而耨若濂之進寸退尺者豈不為甚愧者焉子與不我鄙夷俾序其首嗚呼三代無文人六經無文法非無人也人盡能文非無法也何文非法秦漢以來班馬之䧺深韓栁之古健歐蘇之峻雅何莫不得乎此也子與功深力久必抽其闗鍵而入乎閫奥矣他日投簪東還尚迂轅載酒從子與問之洪武六年春正月既望呉濰州文集序唐子西云六經之後便有司馬遷班固六經不可學學文者舍遷固将奚取法嗚呼斯言至矣濂嘗諷二家書遷之文如神龍行天電雷惚恍而風雨驟至萬物承其􅐮澤各致餘妍固之文類法駕整隊黄麾後前萬馬夾㐲六引分旌而循規蹈矩不敢越尺寸嗚呼法之固堪法其能以易致哉然而淵沖之容可以攬結雄毅之氣可以掇拾古語有云取法者宐上固當有潛心而願學者矣濂猶恨未見其人豈逸駕奔馳實不可攀與抑去古愈逺聲光不可得而襲與吾友吳履徳基同郡人也自幼抱逸才一下筆間飄飃有奇崛氣逮長日取二家書玩繹弗倦超然若有得揚揚出謂人曰我知學司馬遷爾我知學班固爾諸子葢不足多也濂頗畏之疑之日後徳基去丞南康令安化今将出守濰州與濂胥㑹南京持所製文一編且讀且譁曰我此文近遷固否濂見其勁硬如屈鐵奇峭如削懸崖澤媚山暉如藴珠涵璧始而大驚中而釋所疑終則益畏之而發不可企及之嘆嗚呼善學遷固者世久罕聞今乃見其人哉雖然立言如六經此濂夙夜所不㤀者徳基尚朂之毋徒泥子西之言而自沮也靈隠大師復公文集序才體也文其用也天下萬物有體斯有用也若稽厥初𤣥化流形品物昭著或洪或纖或崇或卑莫不因才之所受而自文焉非可勉强而致也姑就植者言之黄者白者青者紅者黑而澤者紫艷而腴者翠白而緗綠者五色交糅變幻而不恒者一囿扵氣而弗可移也至于洛陽有花則絶類絶倫其植物中之至文者歟又以動者言之雙角而火鬛者兩羽而飛者炳朗而爛斑者介而紫暈者鱗而含金者衆彩錯布焜煌而難名者亦局乎氣而不能更也至于岐陽有鳳則超羣拔萃其動物中之至文者與非惟物也而人亦然有一人之人有十人之人有百人之人有千萬人之人有億兆人之人其賦受有不齊故其著見亦不一而足所謂億兆人之人聖人是也千萬人之人賢人是也百十人之人衆人是也衆人之文不足論賢人之文則措之一鄉而準措之一國而準措之四海而準聖人之文則榦天地之心宰陰陽之權掇五行之精無鉅弗涵無微弗攝雷霆有時而藏而其文弗息也風雲有時而收而其文弗停也日月有時而蝕而其文弗晦也山崖有時而崩而其文弗變也其博大偉碩有如此者而其運量則不越乎倫品之間葢其所稟者盛故發之必𢎞所予者周故該之必備嗚呼此豈非體大而用宏者與或曰上帝降衷不以知愚而有偏若子之言不㡬局囿乎氣而不遷者乎曰非是之謂也其性同其才或不同雖以七十子之從聖人其學各得其才之所近况下此萬萬者乎由是而觀因才所受而自文者人與動靜之物概可見矣濂之學文五十餘年羣書無不觀萬理無不窮碩師鉅儒無不親自意可以造作者之域譬諸登山攀躋峻絶不為不力而崇顛咫尺不能到也此無他受才之有限也世固有巵匜者焉有甕盎者焉有沼池者焉有溪澗者焉有湖江者焉有溟渤者焉水充其量則止小固不能為大大亦不能為小也濂昔官禁林四方以文來見者甚衆晚閱見心復公之作穠麗而演迤整暇而森嚴劍出襓而珠走盤也發為聲歌其清朗横逸絶無流俗塵土之思寘諸古人篇章中㡬不可辨遐邇求者日接踵於門既得之不翅木難珊瑚之為貴公卿大夫交譽其賢名聞九天皇上詔侍臣取而覽之特褒美弗置濂因謂當今方袍之士與逢掖之流鮮有過之者焉今來朝京師其徒曇鍠編類成書釐為十巻來徵濂為之序嗚呼文者造化之英華古今之綸貫斷不可闕也有若公者拔扵十百之中超然鶱舉而慕賢者之閫奥其可傳逺無疑濂烏得不倡體用之説以諗同志哉有訕濂陷于一偏而不可為訓者非知言者也不加功于文者也是膠柱調瑟而弗知變通者也使南稾序吏部考功主事林君元凱奉使安南遂以使南稾一編授予序序曰安南古交阯也漢唐以來其地皆入職方稱臣奉貢比内諸侯近代馭非其術徼其重貨責其躬朝蠻酋始敢為弗恭廷議憤之復有鑄金為人夜光為目之徵而蠻酋心亦離使者至其國多貪夫恱其金貝輒昧昧攫之遂致其䙝侮燕于廡下君子每為之短氣方今聖天子御極之初遣使往告即位其國主陳日煃稽首上表遂乃封為安南王未至日煃卒嗣王日㷂有請于朝復詔襲爵如初妙柬廷臣充頒封使者僉謂元凱前進士學古明經尤長于辭令其出使為宜上召至奉天殿親加勞問而遣焉元凱即日上道越五月至其國布宣天子威徳君臣恱服乃北面拜跪聽詔如藩臣禮将還日㷂遣陪臣夜半持黄金為壽元凱峻却之陪臣舉手加額稱為賢使者而後去肆惟皇上宅居中土逺人慕化者以其限山絶海使各安扵境土而無所利之深合古帝王懐柔之道固當著之史牒垂憲萬世有若元凱之為使義正辭嚴足以聳動羣聽凡其國以利相啗之姦卒無所售亦可謂不辱君命者矣然予聞序事之體志其大而舍其細故特取蠻夷叛服之由聖世明良之盛書之於首簡至于行役之勞倡酬之適山川土俗之詳已見詩中者可得而畧也元凱臨漳人名唐臣今以時制所禁更為弼文辭爾雅吾友王内翰品評閩南人物謂元凱為巨擘云杏庭摘稾序濓昔受學扵河東公獲見新安洪先生詩十餘篇心甚樂之竊意先生之所述篇章必富而新安逺在數百里外甞愧弗能一見先生以窺夫大全及河東公没先生之子存心來為浦江尉濂始得悉受而伏讀之不覺歎曰嗚呼是豈非詩哉夫詩未易言也商周之時三頌二雅洎夫十五國風之作既經孔子所删列為一經固将與天地相為終始若秦漢以來至于近代其間彫肝琢腎以自馳騁於一世者不為不多果能傳之千萬載而弗泯㡬何人哉縱傳矣求其無愧于孔子之所删定者又㡬何人哉葢必有超絶之識克以包羅宇宙之氣量濟以俊偉光明無所不通之學然後始能與於斯不然則流連光景之辭爾尚得謂之詩矣乎新安為江東一大郡自舊多文學之士及吏部諸公兄弟以詩倡于建炎紹興間而作者益盛流風餘韻直至于今不衰先生之生雖後朱公百餘年嘗及接鄉之諸老故聞見甚多而講索甚精其發之於詩和而不怨平而不激嚴而不刻雅而不凡庶㡬忠厚惻怛有三百篇之遺意者嗚呼是豈非詩哉濂頗觀今人之所謂詩矣其上焉者傲睨八極呼吸風雷専以意氣奔放自豪其次也造為艱深之辭如病心者亂言使人三四讀終不能通其意又其次也傅粉施朱顔燕姬越女巧自衒鬻於春風之前冀長安少年為之一顧詩而至斯亦可哀矣求其如先生之作尚可多得邪濂方将謄寘東明山中與二三子共學焉而存心以四方之士多願觀之俾濂摘其今古詩若干首鍥梓以傳先生之詩誠不宜無傳故濂特舉詩之未易言而先生絶出於今人者序之於首簡惜乎河東公墓木已拱無從質其説之然否也先生諱焱祖字潛夫由儒官起家四轉而為遂昌主簿遂以休寧縣尹致其事其善政可稱述而不係於詩者不書白雲稾序劉勰論文有云論說辭序則易統其首詔䇿章奏則書發其源賦頌歌讚則詩立其本銘誄箴祝則禮總其端紀傳文檄則春秋為之根嗚呼為此說者固知文本乎經而濂猶謂其有未盡焉何也易之彖象有韻者即詩之屬周頌敷陳而不協音者非近於書與書之禹貢顧命即序紀之宗禮之檀弓樂記非論說之極精者與况春秋謹嚴諸經之體又無所不兼之與錯綜而推則五經各備文之衆法非可以一事而指名也葢蒼然在上者天也天不能言而聖人代之經乃聖人所定實猶天然日月星辰之昭布山川草木之森列莫不繫焉覆焉皆一氣周流而融通之茍欲强索而分配非愚則惑矣夫經之所包廣大如斯世之學文者其可不尊之以為法乎吾友朱先生伯賢以純篤之資而留意於辭章先秦兩漢以至近代諸文無不周覽用功之久灼見其是非之真復取近正無疵者聚而為書蠅頭細字動至數十大册時出而諷詠之已而嘆曰學文不本諸經其猶玩培塿之卑而忽嵩華之髙乎乃復致力于經功益倍于前時越數嵗胸中浩然若有所得操觚書之凡隂陽盈虚之運民物倫品之理萬彚屈伸之變皆隨事而著源源乎㒺知其所窮且其為體多而不冗簡而有度神氣流動而精魄蒼勁誠可謂粲然藻火之章矣濂之有志為文不下於伯賢古今諸文章大家亦多究心及㳺黄文獻公門公誨之曰學文以六經為根本遷固二史為波瀾二史姑遲遲盍先從事於經乎濂取而温繹之不知有寒暑晝夜今已四十春秋矣用心之苦雖與伯賢同而伯賢之所造詣濂固不能窺見其彷彿也然而太上立徳其次即立言立言甚非易也自孟子以来致力於是者非不多求其可與經並傳者舂陵周元公一人而已元公之言曰文所以載道也輪轅飾而人弗庸徒飾也況虚車乎是則文者非道不立非道不充非道不行由其心與道一道與天一故出言無非經也元公豈嘗拘拘學為文哉濂與伯賢又當共勗之可也伯賢以白雲稾若干巻請予序濂故具論之使知伯賢之文壹以經為本而蹈襲近代以為美者其尚有所發也哉伯賢名右天台人著書甚多所謂春秋類編三史鈎𤣥秦漢文衡深衣考邾子世家傳皆别行守齋類稾序古之立言者豈得已哉設使道行扵當時功被扵生民雖無言可也其負經濟之才而弗克有所施不得已而形於言庶㡬後之人或行之亦不翅親展其學所以汲汲遑遑弗忍釋者其志葢如是而已奈何近代多藉為譁世取寵之具褒揚于贈餞之夫獻諛於泉下之鬼組織綺麗張浮駕誕以為能舉世安之曾無有非之者予不知古之立言者還果如斯否乎此予扵顧君徳潤之文不能無所感也徳潤名輝鄞人也其大父鄉貢進士應春父學海先生叔川皆名士徳潤幼承家學甫十嵗即善屬文郡博士俞希魯欲以神童貢辭不就既長大肆力於經傳卓然欲以事功自見會無有薦之者乃閉闗却埽喟然嘆曰吾身不遇矣殆将立言矣乎然經以載道史以紀事古先哲王所藉以牗斯民者也我當竭其思慮焉他若游言枝辭春花秋蘂堪翫於一時藝焉而已我則不敢知人以徳潤為知言徳潤自是黙索精思晝夜孜孜唯寐始忘之如此者埀三十年著釋圖一說約六十三圖徽二十一希言二十四事剡六十二治要十八體卦八解八辨十二議二十四傳七記論序文銘各三雜著十八賦六騷十九雜詩三百二十一合三十巻分為前後外三集通名謂之守齋類稾云予嘗受而讀之淵乎其莫窮約乎其若豐暢乎皆有契而混融有弗覈焉覈必詳也有弗擇焉擇必精也嗚呼其亦庶㡬古之所謂立言者乎昔在宋時桃源王説應求亦鄞人同季父致招樓郁楊適杜醇諸公因就妙音院立孔子像講貫經史倡為有用之學學者宗之應求所著唯在立言他則未暇及故有五經發源五十巻奏議書疏詩文二百十一篇薦者列其事召為明州長史應求辭及其既没勅建桃源書院贈銀青光祿大夫賜紫金魚袋嗚呼徳潤立言之志未必下於應求今時無有上其名者秋髪被肩亦且巋然老矣惜哉雖然徳潤志士也内而不外者也名之聞與不聞非所計也予故徇其外弟太子正字桂徳稱之請序而蔵之以俟後世之知揚子雲者味梅齋稾序洪武初余奉詔總裁元史于時預執筆者凡數十人皆四方豪俊余日與之周旋會聚間一休沐輒相過從飲酒為歡酒闌氣盛撫掌大噱論古人文章政事不深夜弗止信一時之樂哉然當是時諸君者皆壯强無恙余雖稍長亦未耄老方以為此樂可以長有未知其為樂也及後未數年人事稍稍乖殊或得州縣官散之南北或以老癃疾疢引歸田里或抵法遇患轉徙逺方求如舊時之歡須臾而不得然後知此樂之難遇毎一思之不知俛首愴心而繼之以歎息也又况余年愈耄觸事愈多而英才凋謝愈盡雖欲不思何可得哉幸而獲見一人於十餘年而後又得觀其文辭其慰喜又為何如也若吳郡傅君則明是已則明在數十人中以能文稱當乖殊之時歸為邑人師得益勉其所學最後獨存而文益進天之扵則明可謂加厚矣今年自吳中寄其文曰味梅齋稿者示余皆馳驟可喜嗚呼四方之英俊至是無㡬矣然則則明之文其何可少清嘯後藳序詩之為學自古難言必有忠信近道之質藴優柔不迫之思形主文譎諫之言将以洗濯其襟靈發揮其文藻揚厲其體裁低昂其音節使讀者鼓舞而有得聞者感發而知勸此豈細故也哉奈何習之者多如牛毛而專之者少如麟角也廬陵胡君山立生文獻之邦抱英銳之志敭厯仕塗綽著聲譽粤自戎幙至躋法從雖著勤勞之績不㤀賦咏之事風雲月露有以感夫中花草蟲魚有以寓乎目與夫人事酬酢時物遷移皆見之篇翰焉日積月盈分為清嘯前後二稾前稾則國史危公既序之矣予來京師復得窺其後稾而胡君遂徴為之序予披繹再四因作而曰正音寂寥久矣誕者流於荒忽而無據弱者過於纖靡而不振俗者溺扵陳腐而不新麄者流于桷犖而不潤其音節體裁之乖方文藻襟靈之弗暢具有之矣詩之為道其果如是乎哉有如胡君之作命意深而措辭雅陳義高而比物廣其殆庶㡬有忠信近道之質者與藴優柔不迫之思者與形主文譎諫之言者與此予不能不撫巻而嘆賞之也予也不敏以荒唐之資操褊迫之行雖自漢魏至于近代凡數百家之詩無不研窮其旨趣揣摩其聲律秋髮被肩卒不能闖其閫奥而補於政治其視胡君之作得不甚愧矣乎然而穹亭邃館必壓以呀然之獸鉅人元夫必冠以峩然之弁雄章俊句必首以傑然之文嗟予何人尚敢為胡君之詩之序乎牢讓再三竟不獲命斐然有作情見乎辭漢天師世家序嗣漢四十二代天師張真人以世家一卷命上清道士傅同虚徵濂序其首簡濂聞古者名世諸臣史官必為序其世系表以傳所以敦本始昭功伐也况於神明之冑理有不可得而闕者今所輯世家但始於留文成侯而其上則無聞焉濂因據世族羣書補之復用史法畧載其相承之緒使一閱輒知大都而其詳别見于左方云序曰張出自姬姓軒轅子青陽氏第五子揮為弓正始造弓矢張羅以取禽獸主祀弧星世掌其職賜姓張氏周宣王時有卿士張仲其後裔事晉為大夫張侯生老老生君巫君巫生趯趯生骼其孫曰抑朔至三卿分晉張氏事韓韓相開地相韓昭侯宣惠王襄哀王開地生平相釐王悼惠王平生良字子房漢太傅留文成侯居沛之豐邑生二子侍中辟疆及不疑不疑嗣侯生二子典髙典生黙黙生大司馬金金生陽陵公乗千秋千秋字萬年生嵩嵩生五子壯讚彭睦述其後多以功烈著傳至於唐列為安定范陽大原南陽燉煌修武上谷沛國梁國滎陽平原京兆等四十三望族中出宰相凡十七人高生通通生无妄旡妄生里仁里仁生覺覺生起起生桐柏真人大順大順生漢天師道陵是為𤣥教之宗其傳緒悠長倍前望族之盛論者弗察見留侯再世國除即意其絶嗣殊不知流裔南北如斯之繁也道陵字輔漢建武十年生於吳之天目山暨長博習羣書從學者千餘人尋中直言極諫科拜巴郡江州令棄官隠洛陽北邙山脩煉形之術章帝以博士徵不赴和帝即位召為太傅封冀侯亦不就乃杖䇿逰淮入鄱陽上龍虎山合九天神丹訪西仙源獲制命五嶽攝召萬靈及神虎秘文於璧魯洞俄往嵩山石室得黄帝九鼎丹書及道既成聞巴蜀沴氣為人災鋭意入蜀初居陽平山遷鶴鳴山感𤣥元老君屢受以經籙之法於是分形示化復立二十四治增以四治以應二十八宿妖厲為之衰熄如發醎泉破鬼城之事甚多不能備載永壽二年復遷渠亭山出三五斬邪雌雄劒二陽平治都功印一授嗣天師衡使世世相傳乃乗雲上升壽葢一百二十又三云衡字靈真有長材詔徴黄門侍郎辟隠居陽平山誓以忠孝導民君子謂其有繼宗開緒納俗安善之功衡生京師魯字公祺益纘前人之烈以鬼道教人自號師君其來學道者初皆名鬼卒受本道已信虎祭酒各領部衆多者為治頭大祭酒皆教以誠信不欺詐有病者自首其過復設義倉置義米肉其中任人量腹取飽過取則有禍人歸者日益衆遂雄據漢中詔授鎮民中郎将領漢寧太守其後歸魏太祖拜鎮南将軍封閬中侯五子皆為列侯女歸太祖子彭祖魯死諡原侯生盛宇元宗魏太祖封都亭侯弗受始自漢中還龍虎山創三元日升壇授籙盛生昭成字道融端坐石室虎豹逢之皆伏暨化去或見騎鶴逰空中􅢳冢驗之唯冠履留耳昭成生椒晉安帝召之不至椒生回回生迥迥生符符生祥祥字麟伯隨洛陽尉能吐丹寘掌中光芒穿屋復吞之祥生通𤣥嵗大疫以標植水中汲飲者咸愈通𤣥生恒唐髙宗問治國恒對曰能無為則天下治矣上嘉之恒生光光生慈正慈正生士龍士龍忘玉印長安酒家一少年盡力舉之不動明日士龍笑而攜去士龍生應韶應韶生頤頤生士元字仲良瘠而多髯居應天山四十年山多虎人莫敢謁焉每大風雨遥見乗黑龍往來諸峰間士元生翛翛生諶諶生秉一字温甫目光如電夜能視物嘗負劒行山澤間叱一老樹雷即震裂之擊死二巨蟒及小蛇百餘秉一生善善生季文五代之季受其籙文者頗衆乃鑄鐵環劵數萬繼之季文生正隨宋太中祥符八年召至闕賜號曰真靜先生後凡稱先生者皆賜號也吏部尚書王欽若為奏立授籙院正随生澄素先生乾曜乾曜生虚白先生嗣宗嗣宗生象中字拱辰生三月能行五月能言七嵗朝京師錫以紫衣象中生葆光先生敦復無子從子葆真先生景端嗣景端亦無子從弟虚靜先生繼先嗣繼先字嘉聞五嵗不解言聞雞鳴忽失笑賦詩人異之崇寧初解池鹽水溢遣使者召見書鐵符投之怒霆磔蛟死於水裔一日隨上入寢殿宫嬪競以扇求書繼先以經語書之皆宻契其意中舉一握稽手書曰保鎮國祚與天長存乃上所御者也上奇之命禱雨三日乃止授大虚大夫不拜詔江東漕臣即山中度地遷建上清觀改為上清正一宫從其學道者恒數十百人靖康初上復召時金人侵汴行至泗州天慶觀素筆冩詩隠几而化葬于龜山之麓後十六年西河薩守堅逰青城山相遇於峽口繼先以書一封赤舄一隻令達嗣天師家嗣天師大驚使人􅢳龜山之窆唯一舄存繼先無嗣以象中之孫時修嗣時脩曰繼先從子也吾烏得後之衆曰法統所在孰得而奸乃從時脩生正應先生守真守真在母胎厯十九月始産毗陵有妖憑樹詔劾之一夜風雷拔去後定濤江衝決髙宗賜以象簡寳劍清靜陰符二經守真生景淵景淵生慶仙張公洞有井甚深慶仙戱折木葉擲之俄波濤騰湧有一老翁從中出慶仙呵戒之而去慶仙無子從子觀妙先生可大嗣可大守真之曾孫其祖伯㙖父天麟皆常攝教事鄱陽水漲壊民廬無數袁提刑甫請可大治之殛死大白蛇水遂平尋又遇旱蝗可大禁之雨作而蝗殪勅授提舉三山符籙兼御前諸宫觀教門公事主領龍翔宫時當宋季元世祖聞其神異宻遣間使訊之可大授以靈詮且謂使者曰善事爾主後二十年當混一天下逮至元十三年果驗可大生宗演字世傳世祖平宋憶其父言有徵應遣兵部侍郎王世英刑部郎中蕭郁賫詔召之賜玉冠玉圭冠以靈應沖和真人之號仍給三品銀印令主江南道教事得自出牒度人為道士宗演生與棣字國華世祖時宣授體𤣥𢎞道廣教真人賞賜優渥竟卒於京師與棣無子弟與材嗣與材字國梁元貞初入見大明殿制授大素凝神廣道大真人大徳二年海鹽鹽官兩州潮水大作沙㟁百里蝕齧殆盡延及州城下與材投鐵符扵水符踊躍出者三雷電晦𡨕殲怪物魚首龜身其長丈餘隄復故常五年冬無雪上曰冬無雪民間得無有災害乎與材為建壇禱之是夜雪下盈尺上大喜命近臣賜酒曰卿能感神明一至此耶八年錄平潮功加授正一教主兼主領三山符籙給以銀印視二品九年崇明州海隄崩俾弟子持符往劾之民夢有神填海者遂安至大初加賜寳冠金服制授金紫光祿大夫封留國公給以銀印視一品與材生太𤣥字嗣成嗣成卒弟嗣徳嗣嗣徳卒其子正言嗣正言卒太𤣥之子正常嗣正常字仲紀即今天師國朝六覲京師洪武初制授正一䕶國闡祖通誠崇道𢎞徳大真人領道教事給以銀印視二品上復賜以褒文稱其瞳樞電轉法貌昻然人以為榮葢厯代相傳以眼圓而鉅者為𤣥應故上因及之云濓聞文成侯年少時學禮淮陽東謁蒼海君蒼海君先儒學士以為海神是也後又見異人黄石公下邳圯上則其未達之際固已能交通於神明至其晚年名遂功成乃欲辟穀從赤松子㳺實其初志非曰托之以自逃也故其九傳至漢天師感慕興起學輕舉延年之術祓除陰慝一以善道化民而嗣師系師繼之脩其業而弗墜惟恐有人横遭夭閼者當漢之季天下雲擾唯巴漢之間民生晏然行者不裹糧居者不捍闗官府賴以成治如此者埀二十年其功之及物可謂侈矣宜其世有令人出俾至化奚翅古諸侯之國天之報施不亦彰明者哉或者專歸於名山神氣之結故能演迤盛大如斯其論亦淺矣嗚呼文成侯子孫南北在在有之其以功烈顯著者小則充法從大則至宰輔非不光明俊偉也曾未㡬何降為皂𨽻者有不免焉其視𤣥裔相仍厯千二百有餘嵗而未已者為何如蓋必有其道矣嗣而興者尚知朂哉尚知勗哉柳氏宗譜序浦江之栁氏其先居河東宋髙宗南還時有名鑄者扈從來江南遂家浦江之烏蜀山生一子瀚瀚生森彬森生監藴藴生崇徳縣主簿補之崇徳生髙郵令元贈泗州知州浦江縣男金髙郵生四子其次諱貫仕元為翰林待制以文章名天下門人私諡為文肅有子三人皆善士而六孫能守其學不墜殁後三十又七年而介孫穆書其始徙傳緒之詳列為譜圖持以示濂濂泣而歎曰天道扵是可徵而文肅公有後矣濂少時幸執弟子役於公門公之為人其崇深閎博者固非淺見所能知至其端方直易厚重嚴慤怒氣不形于色惡聲不出諸口不知古之賢者復何如耳世之妄議恒謂賢者言論足以予奪當世文章足以抉發至理所為與造物者爭强故天道尤忌之而多難為其後是殆不然天惟有所不能也故生賢者出而代之為之政以遂天之生為之教以輔天之成為之文章語言以宣天之道使善者勉而惡者懼賢者何負於天而謂天忌之哉其不然也明矣是論也吾意賢者之子孫而不能自力姑引天道以自恕而非其實也不然自文肅公觀之何其異於彼哉文肅公之傳今三世其諸孫盛矣固可以見天道而未足以盡報賢之意今諸孫皆有徳積久必愈昌越十餘世将有傑然秀出者興其間然後可見天道之全也斯譜也君子由是觀天道焉穆之後人安可忽哉俞氏宗譜序俗之不美有志者鮮也今世之士論法道不古若則以無位為解及既得位卒不能有所為豈特無位之罪哉先王經天下之法深逺矣大者信非無位之所能行至扵族師閭胥之事獨不可推行扵州里之間乎州里之間茍未暇為獨不可行於同姓之親乎為士者布海内而無救於俗由是知今之士多無志也吾嘗損益周制可以化同姓者凡月之吉長少咸㑹於先祠拜謁畢齒坐命一人庭誦古訓及拜法誦已長且賢者繹其義而諷導之書會者名于册再會使互陳其所為其行有孝弟忠信者俾卑且幼者旅拜之而著于名之下有悖戾之行者命徧拜羣坐之尊者以愧之而亦著于其名之下踰月而能改者如初否則擯不使坐踰年而不改者斥勿齒同姓之人疾相撫患相拯貧相賙死相𦵏老弱癃殘者相養祭酺相召昏嫁喪灾相助不能然者不使與於會斯數者非甚難為也而人咸莫能為謂有志者鮮非邪誠有一人為之衆見其善必效之效者愈多則所化者必愈逺因以美天下之俗不難也惜乎吾未之見也學於吾者众矣吾未嘗不語以其故金華俞生恂其可語者乎俞生之先以書詩世其家擢科第者先後相望生之父大有尤好學譜其同姓之親以聨其族生繼成之益脩其遺文甚完譜固睦俗之本也然無法以行之安能久而無壊乎欲其久而無壊舍吾言不可也吾是以有言焉嗚呼恂茍能行之孰謂有志者之果鮮哉張氏譜圖序張以字為氏出於晉之公族有解張者其字曰張侯故晉國世有張氏而譜家謂少昊苐五子揮為弓正賜姓為張則非也子孫蔓延分適他國而居清河為最盛清河之族布於大江之南其遷江隂者則不知始於何世圖牒喪漫不可鈎考至月崖翁始入扵譜翁諱暉喜聚四庫書多至充棟人有願購者輒乞與之然博聞强記㦯以疑難質焉則曰是出扵何書何篇從容而起抽架上所有拂塵而驗之無差爽者暉生翊翊生思明通天官之學兼以六物推人休祥宛然目擊閭右民有不平之鳴知思明直而無徇嘗徼而愬之思明出片言理詘者面頸發赤以去不敢譁然尤尚風義州有過客號材大夫者必主之雖至單乏不恤也市有病氓卧道周氣奄奄欲絶思明舁至於家召醫調護之愈乃遣東甌書生疫死逆旅中逆旅氏大怖不知所為計思明具衣冠藏之淺土其後竟得以喪歸三山梁先生與思明有連及死無為主後者㷀妻與四女日夜相持以號思明為治葬事飲食其妻終身且悉配其女於士族君子稱之曰古有行義之士今惟吾張明徳乎明徳思明字也後為隂陽學正以終思明生端通毛氏詩用吕肅公之薦入仕四為校官遷浙西部使者掾丁元多故干戈相尋丞相康里公承制行事遂錄其軍功超授江浙行樞宻院都事端生宣宣能辭章入國朝以考禮被徵來南京尋至史局與脩元史上親書其名召至殿庭即日擢翰林國史院編脩官人以為異恩云時予適長詞林宣數來請白宣之宗族遭兵亂之餘凋落殆盡所僅存者唯宣之祖若父暨宣兄弟為四人三世自相師友漸摩道義不敢違聖賢之明訓邇者先祖又傾背矣痛念世徳弗昭家牒不脩皆無以示逺爰輯為一書虚其首簡先生儻畀矜之冠以序文實宣之願也嗚呼三代之前姓氏分而為二男子稱氏女子稱姓氏所以别貴賤姓所以别婚姻三代之後姓氏合而為一皆所以别婚姻而以地望明貴賤去古為益逺矣夫姓之與氏亦昭然易見者獨混淆而無辨况扵遷轉之無常承傳之盛衰又焉能盡知其所自出哉此無他圖譜之局不設中正之簿狀不存亦已久矣雖有智者出扵其後将何徴之邪宜乎宣之痛心疾首而不能自已也予竊聞之為善者必有後宣之家素以善行聞其後将益蕃厯數十世子孫繼脩此譜者屢書不一則指月崖翁為江陰之初祖造端之功豈非宣之所為與舊譜厄扵兵燹有不足恨也或者則曰宇文周之時嘗命叱羅氏為張姓今子何所據獨謂此出扵晉之張乎曰叱羅之張稍盛扵燕代之間而江南則無有也此非予之私言也蓋亦有所受之也義烏樓氏家乗序東陽著姓載扵方䇿者有八曰斯曰留曰路曰駱曰厲曰哀曰苗而樓居其一焉樓本姒姓夏少康之後周封杞東樓公支孫以樓為氏亦號東樓氏城陽諸縣有婁鄉是其地也氏族家以婁鄉之故遂謂婁與樓姓同殊不知婁乃邾婁氏之裔其姓曰曹判然不相屬也漢之季世樓泰字允恭者始自譙郡徙㑹稽其子苗建安中又自會稽遷烏傷苗字秀實生三子孟曰恭仲曰侍中𤣥季曰散騎常侍畯皆仕於呉畯生宣威將軍陟陟生康樂令𦙍𦙍生豐其下世次不可復知矣至南齊時有居烏傷竹山里者曰靈璨寄迹釋氏法中梁武帝賜號曰智者大師今義烏之智者鄉實因此而得名其地多樓氏居之宋南渡後諱奭府君生二子四孫六曾孫而𤣥孫之繁數登於十其中諱大年者嘉定癸未進士通判吉州大年從子諱子固嘉熙戊戌進士嚴州桐廬尉自是蔚為衣冠之望宗矣府君十世孫璉懼其族大而譜逸也於是撰為家乗二巻一倣司馬遷年表之法畫而為圖字名卒葬咸具疏之一輯先世墓志家傳祭文之屬而通判君遺詩之僅存者亦附著焉與宗人謀将刻諸梓以傳而詩予序之予知樓氏之族甚久而𢎞若永康若武義若東陽皆自義烏而分其居縣之東門者尤為近屬實同出于秀實之裔而四明之支則祖秀實之子恭恭之逺孫宣獻公鑰嘗述髙祖先生事畧自謂其先婺人但不詳徙居之始耳此皆鑿鑿可信無疑第智者大師附錄以婁幼瑜乃樓𤣥之裔而合樓婁為一音者似為氏族家所誤證諸史傳甚為不然也嗚呼凡言姓氏者皆原扵世本公子譜二書二書則本春秋左氏傳左氏傳則因生賜姓胙土命氏及以氏以謚以官以邑五者而已後世得姓受氏者多至三十二類益淆亂而難明况襲氏冒姓之不一者乎無怪乎附錄之不足徴也今璉也為斯而懼惓惓於譜事而不敢忘亦可謂賢也已因為辨折繫諸篇首使其子孫有考焉璉字士連嘗從予學經國朝洪武壬子試吏部中選授将仕佐郎大同府宣寧縣主簿遷成都府仁壽縣云丁巳秋八月具官金華宋濂序上虞魏氏世譜序濂居淛河東嘗聞上虞魏氏為簪纓大族其先蓋出於唐鄭國文真公徴之裔公居鉅鹿生禮部侍郎叔璘侍郎生武進縣令政始自鉅鹿遷居會稽之山陰武進生邠州錄事參軍珎㕘軍生莫州司馬明復自山陰徙居餘姚之蘭風司馬生石首縣令實實生廬陵尉潾潾生憲憲生章章生克敬克敬生惟賢惟賢生績績生塤塤生恕恕生和和生傑傑生有聲有聲生義義生安珦凡厯世一十又二雖不與仕籍而能脩明禮義蔚為鄉之望宗安珦生宋從政郎良瑞從政生紹興府學錄亨之復自蘭風徙居上虞之龍山學錄生迪功郎監婺州東陽縣酒税震龍監酒生文柄文柄生夀延夀延生鎮此其傳系可見之畧者也初侍郎實生二子武進與汝陽縣令殷武也汝陽為北祖至四世孫司空謩遂相宣宗武進為南祖孫子甚多如上所書之外而明之鄞台之臨海比比有之而在上虞者為最盛一門之内敦禮樂而説詩書由是四方才士大夫慕豔其聲華無不自遠而至當其園亭勝集雅歌投壺酣觴淋漓誾誾然和洽亹亹然旅語或不知夕陽之在樹也故鄉之論閥閲者一則曰魏氏二則曰魏氏云然而厯代以來名門右族若金張若許史者葢亦多矣未數傳間或至於殄絶宗緒即不絶亦降於皂𨽻有不勝感慨者矣魏氏自文貞至鎮已二十又五傳其遺風餘烈猶能不廢者其故何哉蓋文貞之事唐立心忠藎奏疏剴切凛乎有三代遺直之風徳厚者其流長其效固應爾歟鎮能孳孳弗怠詳譜其所自出粲然有條而不紊豈不誠賢者歟雖然氏族之學尚矣古者有世卿大宗之法得以傳其敬宗之義至於定世系序昭穆又有小史以掌之故其盛衰有徴而親疎備見也古法既廢唯宰相家得著世系表於史冊猶可髣髴見其遺意若鎮之為其亦可謂有所本歟魏氏之孫子幸襲藏而續書之公侯子孫必復其始他日焉知無文貞之出者歟鎮請户部闕郎中闕求序其首簡不揣蕪陋而備著之鎮字士圭有學有文者也諸暨孝義黄氏族譜序黄為嬴姓十四氏之一出于陸終氏後受封于黄今光州定城西十二里猶有黄國故城黄既為楚所併子孫散之四方以國為氏至漢尚書令香居江夏故世之黄氏咸以江夏為望隋開皇間有自江夏遷婺之金華者其諱曰苾厯十九傳至縈生二子洪浩洪生二子瑕珌浩生三子琛玘璞其子孫析為五大族瑕之枝則豐城珌之枝則剡琛之枝則監利玘之枝則分寧璞之枝則弋陽皆自金華而遷稽之金華豐城二譜及黄庭堅魏了翁李心傳諸儒所采著者頗同當可信不誣諸暨孝義之黄氏實出于珌珌之季弟玘有子曰贍以䇿于南唐用為著作佐郎知洪之分寧縣珌與之俱遂同家縣之雙井江南兵起珌之冢子惠自雙井遷于剡尋從剡遷今所恵之曽孫宋贈衞尉少卿振仁及于鄉待之舉火者數十家其妻仁壽縣君劉氏斥嫁貲以規義田均給婣族故其三子十孫多躋膴仕而十孫之中廣西提刑育為最顯育之從子朝請郎汝楫當方臘之亂罄家藏金帛以贖所俘者數百人汝楫生八子開閌閣同登紹興甲戌進士第而聞與誾亦相繼擢紹興庚辰乾道己丑之科闛復占特奏名終荔浦丞闡補官將仕郎閎脩職郎兄弟一時榮貴文墨彬蔚人比之荀氏八龍云自時厥後子孫益繁庶與禄食者代不乏人而書詩之澤至于今不衰少卿之裔孫周爰輯舊譜而續為新圖釐為若干巻而徵予序之嗚呼氏族之學難言者久矣他未暇深論姑以黄氏言之有謂出於高陽氏自伯翳賜姓嬴而其後有江黄諸國為楚所滅有謂出於金天氏自臺駘封于汾川而其後為沈姒蓐黄諸國為晉所滅皆以黄為氏今去唐虞以前殊為極逺其所出難稽猶可言也黄氏之望非止江夏而已若櫟陽若安定房陵若漢東上谷譙郡如此之類多至四十餘房而五大族不與焉氏族之書雖或志之何以不表其所自出今去漢亦已逺其轉徙之未易明猶可說也孝義之譜以鍾為始遷之祖而以瑕之五昆季為其子豐城之譜則以五昆季繋於洪浩之下且謂自秀州崇徳而遷金華新昌之譜又謂江浙之黄皆出建之浦城而遷金華黄魯直則又謂七世以上失其譜而各譜乃推至十二世若合符節近世有聚庭堅諸行作山谷老人傳則又謂六世祖瞻如分寧縣瞻實生玘抑又何邪今去五季宋初其時為甚邇其事宜可徵何為紛紜而莫之有定也葢因圖譜日廢而無官以涖之民間以所傳聞論著不能旁搜廣覽以㑹通其故矛盾不齊宜無足怪予嘗侍先師黄文獻公相與論及譜事公之先亦自金華析居浦江洊遷義烏其上世之諱亦曰珪曰琳豈亦縈之從孫耶竊意縈之兄弟必衆支裔實繫譜所不及者則亦無如之何要之江夏之後金華實為黄氏之望故余厯考羣譜參以諸儒之論備書之於首簡信其所可信疑其所可疑在覽者之自擇焉周子思文羣從子姓至一百餘人敦厚而善施皆無忝於先世云嚴陵汪氏家譜序周之文盛矣在春秋時周禮在魯故魯為文獻國及秦火之後廢亡畧盡所僅存者自五經左傳之外無聞焉以太史公之傳迄不能自有所論載葢慎之也況去今又千五百載之久者乎吾讀嚴陵汪氏家譜未甞不歎其記述之逺且詳也葢汪氏出於魯成公之次子汪其後遂以汪為氏有名錡者以童子死於郎之戰與孔子同時見扵禮記其來邈矣而其子孫自汪以下咸述其字名官位夀年墳墓所在他若墓中之銘朝廷之命為汪氏出者咸無所遺厯秦漢以下至扵今七十有餘世粲如目見而耳受此不惟過乎太史公天下之述姓氏者未有若斯之備者也豈周公之子孫固多文哉雖然汪固祖周公南方之汪自越公華而大著越公之後以詩書起家而顯扵宋登政府列侍從者不可勝數其盛固異扵他族矣宜其譜之修非他族所能比也然譜者記其名以傳不亡其先之義也而君子之不忘其先者不特修譜之為難而脩其身之為難譜或不修其為患小身或不脩則辱其先矣汪氏之先莫大於周公周公之禰文王斯二人者身為天下準言語為後世法為其子孫者豈易易哉今夫閭巷驟興之人身賤宗微其所為或有不至人将貸之曰其先亦若是耳以文王周公之裔列扵斯譜之前人閱之則曰若聖人之胄也聖人之行事若彼而若猶未免如是何以為聖人之後哉則豈不尤難矣乎然則汪氏之子孫修身慎行宣昭令聞以法周公為志者上也善守先訓不為匪彞以辱先者次也茍㢮然雜於衆庶不能自異於人斯為下矣與余交者國子助教中自言為汪七十二世博學能文其所謂宣昭令聞者歟其以譜請序也余故樂為之言畨禺蒙氏譜序太學生畨禺蒙安以其譜圖請曰安之先齊人秦時恬毅兄弟俱仕被信任後皆死扶蘇之難其子孫散處天下甚衆然千餘載未有大顯著動人耳目者畨禺之蒙始於有宋諱甄者自北方來知亷州遂家畨禺之海陽里至安八葉矣在宋世有禄仕自元得國始無仕者今閱三世而安復以儒生貢太學為弟子貟竊懼不能承其緒嘗考次八葉字名枝裔為譜使後人知所自願先生序之以昭吾先余告之曰姓氏固人之所甚重也然其著於時者不以其受氏之貴而顯亦不以有人稱之而傳在乎子孫之賢耳論受氏之貴顯莫貴於王侯之裔而今世載之簡䇿以為甲族者非必皆姚姒子羸燕齊氏也茍以人稱之而顯則左丘眀太史公班固之所書其苗裔未必俱顯於今也今天下之人語道徳必曰孔孟顔閔周程邵朱氏論政事必曰伊傅管晏蕭曹房杜韓富氏語文章則其人名氏彰著者尤多三者皆由其身善自振㧞而然未嘗恃於其先假之於人也蒙氏自恬毅始顯恬毅雖賢然其所為未能皆當於人心而卒死於亂邦其名猶且傳而不廢況有過於恬毅者乎方恬毅被禍時呼天地神明而自列其意豈自虞不遂泯滅哉而太史氏悼其忠悲其志尚不忍廢而著之史傳況夫道徳之士仁聲義聞足以厲俗而化人者何患其無傳乎安温而有文慎而達禮可謂有學道之質矣前之三者茍知所勉焉未有不至者也況於恬毅乎其名誠顯於當世而著於方冊後之人必曰此畨禺之蒙氏也蒙氏之後人必曰此吾蒙氏之聞人也畨禺之人必曰此昭吾邑者也若是則非惟可以顯其先且可以顯其鄉邑矣何患譜之無傳乎又何以余言為乎安曰此足以序斯譜矣請書之以告族人使知勉焉章氏家乘序章氏本姜姓出於神農氏之裔逮齊太公支孫受封於鄣即春秋所書齊人降鄣是也今宻州有古鄣城實其故地鄣紀之附庸國也紀亦姓姜地皆與齊接其為姜姓無疑或謂出於夏之諸姒者乃誤以辛作章而謂不去邑而别為章仇氏者亦不知漢章弇因避仇而始加之也鄣自為齊所滅子孫遂去邑稱章氏分適他國有諱展者仕晉為中散大夫世居汴之陽武至兵部尚書嵒永嘉初出守於泉始家於南安唐康州刺史鵬又自南安遷建之浦城康州之五世孫重復自浦城遷處之龍泉葢重之曾祖仔鈞當唐之季琅琊王王信通節度福州仔鈞投以三䇿大喜遂承制授髙州刺史檢校太傅其妻渤海郡君練寯賢而多識有恩及南唐將領王建封遂全建州一城之命生一十五子六十八孫支系敷蕃布於東西或入坐廟朝或出膺郡寄或宰百里之邑或秉節鉞分鎮邊陲後先顯者殆以餘百計蔚為江南望宗然而世逺族殷復罹兵燹漸至於不可考重之十六世孫溢深為是懼於是稽厥系緒法諸史表旁行為圖條列不紊作譜圖篇第一先世遺行可仰可師摭其都凡區别以陳作景行篇第二竹素所載琬琰所刻文章昭爛不愆其實作傳志篇第三事涉攷質難可類分小大弗爽集以示後作叢載篇第四四篇之外復不厭詳著本房圖以為别録通名之曰章氏家乗云濓竊聞之隋唐而上選舉必稽於簿狀婚姻必由於譜系是以圖譜有局郎令史有貟知撰譜事有官四方以家狀來上者官為考定藏於秘閣副在左戸其制最詳且眀也五季以來法始大壞而近代為尤甚官不必有簿而品第混淆家不必有譜而姓氏無别有不得不憮然而増慨者溢於其間乃能孜孜弗懈而成書以傳其賢於人也逺矣濓與溢游者久雖不能文謹為稽章氏所自出及夫述作之意序諸篇端他日圖譜之局或設博雅君子亦當於此而有考焉溢字三益尊尚伊洛之學持已率物粹然一出於正云桂氏家乘序桂本姬姓魯公族季孫後也相傳周末有季楨者與其弟桂挟䇿以干諸侯楨為秦博士被害桂懼禍且及遂謀詭姓遁身因即其名取字異而音畫不同者各命四子為姓示不忘厥初也伯子曰桂奕居幽州守墳墓仲子曰昋突遷冀南朱虛叔子曰炅奬徙齊之厯山季子曰炔奘移河南城陽自後四族流布多見諸紀載或謂睦與桂同音而出睢𢎞者固非或謂東漢末衛尉昋横分其四子各係以姓者亦失之也奕之子孫仍居幽燕五代之亂劉仁恭據幽州兵連禍結乃扶攜南渡散居廣信上饒九江興國池陽豫章成都諸郡而居信之貴溪者曰仔鄉仕南唐為静邊總轄使至宋加檢校國子祭酒兼殿中侍御史有功於世鄉人廟而祝之其後人擢科第躋顯仕者凡數十人而興國之永興眀之慈溪皆自貴溪分而慈溪一族則出於祭酒之孫可昇亦多由進士入官至今支系尤盛逮我國朝徳稱以眀經為太子正字陞晉王傅受知兩宫令望隆蔚徳稱從弟仲權擢忠之鄷都令孟誠知恵州河源縣復皆以政學聞仲權家食時乃合諸族譜圖及行狀碑志遺文釐為九巻曰桂氏家乗命徳稱之子中書舍人慎徵予序之慎嘗從予學因為撮其樞要冠於篇端嗟夫氏族之學古昔所甚重浹漈鄭漁仲著為通志其中二十畧唯氏族最備然而墨台氏逃難而改為墨牛金之子亦因避害而易為牢漁仲謹識之而不敢忽重變古也予故特書桂之所出為魯公族者其意亦猶是爾桂氏之嗣人尚思有以謹其傳焉予既作此序己客有以秦之篆𨽻與後世正楷異未必其畫之同疑出好事者之傅會殊不知𨽻書出於秦之先而與今之楷書正類要不可以此而遽少之也因并及之方氏族譜序惟方姓出自方雷氏方雷者西陵氏女軒轅之正妃是為嫘祖或曰榆岡之子曰雷封於方山後人因以方為氏未詳孰是周宣王時方叔食邑於洛故世望于河南至西漢末新莽將簒位司馬府長史紘官於呉中度天下必大亂即避去歙之東鄉因家焉生一子雄雄生三子儕儲儼儕闗内侯行南部太守儼大都督儲字聖明一字頤真太守周歆舉為孝亷又舉賢良方正第一累官太常兼洛陽令封黟縣侯和帝時下郊忤上意飲鴆而卒儲能役使鬼神故鄉人立廟祀之稱其為僊翁云僊翁生三子纘之𢎞之觀之一云覿洪觀葢傳文之異辭爾子孫分為三族其布列於諸州者纘之之後則嚴衢婺越𢎞之之後則徽宣池秀湖常觀之之後則莆田九江滁陽至今繁盛纘之逺裔曰文亮仕陳為散騎常侍生南昌令倫倫生隋祕書郎祚祚生太中大夫伸伸生唐太子中舍孚孚生右衛將軍始興始興生二子尊逢逢考功郎中秦州刺史生皓皓生吏部員外郎苗苗生三子堂常禇禇宣逺將軍堂永陽令生二子達讓達生三子引文引武引祖引文生道屬道屬生四子聰尊甲乙聰生四子道和令興令安令保令興生世雄世雄生道明道明生二子赦講講生君讚君讚生三子公懇公平公郁公郁生二子整漢衛史中丞生刑部尚書景漢生四子宗宷宰宥宗浙東觀察推官生三子永珍永符永豐永豐生十子可榮可昭可暉可浚可瓔可齊可同可度可剛可法可暉生肅肅生𤣥英處士干干字雄飛世居睦州白雲原以詩名後隱越之鑑湖以終生二子翼嚴翼小字託兒無嗣嚴生二子甲述甲亡其名生景先述生三子景光景珍景珣傳景光生二子彦超彦安景珍生三子彦誠彦暉彦瓊復自越還居睦景珣生三子承俊承邦承威傳生一子承招自彦超而下號為九房諸孫復布列于浙河之東多仕呉越錢氏宋太平興國三年錢俶納土有自睦徙台州黄巖者曰二四府君雖宗之述不知繋之何房之下既而君又卜遷明之象山未幾又自象山徙寧海侯城里始定居焉至熙寧元豐間其族漸大讀書為文辭者後先相望迄於宋季不衰同郡縣而居若臨海之鮫峯天台之龜峯寧海之愛山皆號詩書之宗其先同出於睦載諸家乘者甚詳不幸元初毁於兵今皆不可知矣府君十四代孫文大為是而懼不可知者則畧之其稍可知者不問親疎而惓惓並著之成書一篇以傳於後嗣文大之從子孝儒從余學經因命來求序予聞方之族自長史南遷蔓延數郡以科目發身登法從膺郡寄者在在而是北則濶寥罕聞近世遂指為布姓然據新定别譜則謂長史晉元熙間人仙翁仕梁在武帝時而文亮乃為之子也唐監察御史張友成所造仙翁廟碑及莆田譜圖記復謂長史官於西漢之季則仙翁實長史之孫距梁當甚逺史傳無文明未敢妄加臆斷而姑以碑為正大抵江南之方要皆仙翁苗裔自雉山而分者又為睦州刺史亮之派自白雲原而分者多為𤣥英處士之支雉山屬淳安亮則汪華之將武徳四年舉睦州附唐者也今文大之先出於𤣥英雖曰圖牒喪亡稍闕其所繋屬當無可疑者故予為稽𤣥英之譜特著承傳次第以補其闕畧猶文大之前志也好古博雅君子尚是正焉洪武十年夏四月十五日前翰林學士承㫖金華宋濓謹序予按方囘桐江集所載天下之方姓皆出於歙縣歙縣之東鄉今析為嚴之淳安葢予鼻祖紘西漢不仕王莽避地時所居仙翁儲之墓在縣學前廟祀則徽嚴山中皆有之曰真應廟徽嚴之方莆之方信之鵝湖之方屢出名卿顯人又按祕書省正字方翥莆田譜圖記所紀王莽之際衣冠流離有名紘字子纓者渡江而宅呉中以二説參之皆本於張友成仙翁廟記所以先後如出一轍獨新定别譜謂仙翁為新定人祖紘晉元熙間為郡功曹父雄生三子長儕娶司空謝安女次即仙翁季曰儼字叔威當南齊世與仙翁皆隱不仕及梁武帝即位仙翁始舉秀才終官太常卿竊意謝安卒於晉孝武太元十年卒後三十餘年始至恭帝之元熙又厯宋齊八十餘年而至梁度其時儕必尚存相去如此之久而曰娶安之女似無斯理也儕事且然不知仙翁仕梁之事其果足信矣乎又謂仙翁三子長曰觀次曰覿季曰洪而著作郎方仁傑閩系錄則云仙翁三子讚之𢎞之觀之譜圖記亦然葢觀字正同𢎞則避宋宣祖諱改為洪以𢎞與洪音義相近唯覿與讚稍異耳無乃傳聞之易訛耶惟方氏固為江南望族而𤣥英之支子孫尤衆其九世孫監察御史蒙自記白雲原之族時有二十三院實治平之四年至淳熙初吕太史伯恭見於文辭又云雲源枝葉甚蕃一原數百家聮譜合牒衣冠文物之盛鄉人紀之嗚呼亦可謂昌且熾矣今文大所譜又略不知其源流之詳頗閱勾無譜其稱𤣥英第三世諱述之下註云子孫遷寧海之侯城因據之為正且為牽引諸書而一辨之亦補闕之義也至若莆田之方則唐昭宗時守長史諱琡始遷琡生御史中丞殷符殷符生七子延康延年延範延逺延英延輝延滔最號貴顯延安户部侍郎子孫或家滁陽延滔左僕射其後人或遷饒信江蘇諸郡琡亦出觀之之裔因為𤣥英異支謂其徙於光之固始者則非予恐讀兹序者有疑而不釋謾一疏之不覺其辭之縷縷也是月十八日濓又題贈馬氏復姓序馬氏本嬴姓伯益之後造父封趙為趙氏至趙奢封馬服君又為馬服氏後單稱馬者省文也自秦滅趙子孫散居中原世有位序至唐太師北平莊武王燧為尤盛在宋季時王之十九世孫某為都統官擁重兵鎮興國軍遂即永興縣之辛安里家焉統生四子曰叔啓曰叔經曰叔某曰叔建叔建再傳而生莘莘生世榮世榮有雄才當咸淳末北兵長驅而入荆襄皆陷辛安豪士有起義師而勤王者世榮實贊其謀勢弗敵而敗世榮歎曰吾世為宋義民不得不爾今事不成天也弗避將殱厥宗因遁藏重山宻林中詭葉為姓飲水看雲以終其身世榮生元幼亡二親能自表見于世國朝皇慶延祐間大官辟為興國武昌岳陽三府掾以亷慎稱元生四子曰謙曰豫曰晉曰恒皆業于儒初馬氏强盛時析為二支以居咸建莊武王廟以奉祀事元既易姓當時序變遷之際䀌然傷心每帥諸子往哭于廟及祖父諸塋哭已呼諸子前厯語之故且曰吾馬氏也不得已更而為葉吾耄且死汝曹幸正其家牒復求薦紳先生文以昭之吾死目亦瞑元既卒天下大亂而謙豫相繼亡家又燬于兵晉挈恒孑孑走道路幸完其生復與有祿食間過濓道事歔欷以泣濓聞受姓命氏所以别生分類也南北混淆氏姓無辨葢有因襲致久而不能革者況逢時多故而詭姓遁身者乎古之人有墨胎氏辟難而改為墨又改為怡怡氏名寛者有重名于時終不能復其初姓又有牛金之子亦因逃患而改為牢又改為尞尞氏名㸃者乃能請于朝復氏于牛君子之論每不予寛而有取於㸃者在於能復與不能復而已今晉敬承父訓如奉璧玉蚤夜兢兢卒能復百年久易之姓非所謂繼志述事之孝者乎夫孝者非以傳龜襲紫為也非以玉帛充牣為也明其宗𦙍不使紊亂而失序者也魯襄公時鄫人以莒為後孔子作春秋大書曰莒人滅鄫以其姓異也夫姓異既不可以後人而襲人之氏其可以為宗乎晉之是舉實有合乎春秋之義濓願學孔子者也安得不為文以昭晉之美乎鄒氏復姓孫氏序洪武九年六月日皇上御東皇閣翰林學士臣濓考功監令臣克勤給事中臣傑監察御史臣鈍等皆侍時已漏上三刻臣傑出班跽奏曰臣之大父孫福謙陜人也出守嘉興郡當元季兵亂江南州郡繹騷大父逃匿無所至正己亥航海趨山東至登州颶風大作濤湧如雪山巨舟遽成虀粉一家五十人並死于海獨臣附餘板薄沙島幸有犬馬之命蒼黄無所歸長號於野州人鄒義者聞而憐之俾傭作其家臣年已十四矣久之養為子且為授室遂冐其姓曰鄒氏嵗行將一周大明受命四海肅清下詔興舉學官増設弟子員義家以臣肄業萊州府已而選入成均又選入武英堂俾練習政事今年夏四月復擢給事中由是日瞻天顔獲被寵榮如此之至皆非小臣所敢覬望聖恩如天固未知涓埃之報復竊私念孫氏無他族屬其不絶者僅寄臣之一身茍冐其姓遲回而弗之改臣之先臣幾何不為若敖氏之餒鬼哉臣敢昧死以請上曰朕為億兆生民主凡有襲人姓氏者必令歸其宗爾之請誠是也然非鄒氏爾亦弗克底于今日慎毋忘之傑於是以首叩地而退既退詣濓請書其事以示後世濓奉詔參考厯代郊禘大禮久不能成文傑尋擢監察御史復來申前言濓以未暇為荅居亡何傑又陞僉廣東按察司事遽來迫曰傑有數千里行必得先生文乃可耳幸勿辭我濓乃與之言曰孫本姬姓出於周之後至衛武公之子惠孫因以孫為氏鄒則子姓其裔則祖於宋自正考父食邑於鄒因氏焉二者何可亂也傑能復之亦可謂不忘其本者哉然有一說為傑告焉昔者范文正公蚤孤隨母適長山朱氏朱氏亦鞠育為子公遂力學擢上第封厥父母而後請命于朝復姓為范氏公之酬朱氏可謂厚矣傑之事與公正類幸思有以報鄒之徳哉聖皇之言即天也慎毋忘之慎毋忘之濓故舉此重為傑告之范公在宋位至叅知政事名埀方冊至今人能道之惡知傑之他日不如公哉亦在乎法其人而已文憲集巻七
