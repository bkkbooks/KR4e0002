body:
  text: 文憲集卷二十七明宋濂撰雜著凡十六章燕書十六首晉侯將伐楚楚子甚懼召六卿訊之曰楚國雖小自若敖蚡冒至於武文威稜氣焰懼彼諸姬今晉君不道乃謀兵入我是蔑寡人而死二三子也寡人耄矣不復親帥三軍以逆堅乃城郭以遲晉人不亦可乎王孫由于對曰然易有之王公設險以守其國非險國孰與守盍圖諸雖然城郭有時而墜楚國之南有方城焉其東有漢水焉晉人雖衆將焉用之雖然山川之險亦可踰也若使舅犯守郢先軫保鄖叔肸禦雲中荀偃扼直轅誰能侮豫雖然此猶以力言也齊民毒吾賦久若綏之以仁馭之以寬繩之以禮則封內之民德君以死守矣雖然是保民也非保國也楚子曰何謂保國王孫由于曰君務上尊天王下睦四鄰分昭于上勢定于下上下有序疇敢搆兵是保國也楚子曰善於是遣公子結如京師左司馬戍聘於齊魯諧大國晉侯聞之謂諸大夫曰楚國方尊王睦鄰而以兵入其境不祥遂退師君子曰甚哉分之大也分為天則定乃靡亂何有兵禍哉易不云乎六二之吉順以則也失則凶矣齊路寢壞桓公欲新之召工師翰具材工師翰伐巨木於營丘山中若樞若檆若魄旄若豫章無疵取而泛之河蔽流而下工師翰麾衆徒操剞劂斷之運繩尺剫之閣閣然槖槖然聲達乎臨淄之郊越五月路寢成桓公環視之東阿之楹有用樗者桓公讓工師翰曰樗散木也膚理不密瀋液弗固嗅之腥瓜之不知所窮為柣為棖且不可況為負任器耶工師翰對曰臣之作斯寢也嘉木以為桯文磶以薦址畫藻以奠井堅堊以厚墉陶甓以飾黝臣竊以為盡善矣雖東阿之楹缺以一樗足之不虞君之見讓也桓公曰寢之鞏者在杗廇承杗廇者在桴藉桴唯楹耳一楹蠧則寢隳奈何不讓工師翰曰臣聞國猶寢也一楹蠧則無寢若衆壬進尚可有國乎桓公曰不可也工師翰曰君既知不可何為察其小而遺其大也桓公曰不知也工師翰曰臣請為君言之擅執國柄者有雍巫焉成內食之姦者有夷鼓初焉長君之欲者有寺人貂焉外惡諸侯而凶德弗革者有開方焉是衆楹皆蠧矣路寢能獨存耶桓公悟曰敬喏於是解四子政而召管敬仲任之齊國大治君子曰工執藝事以諫忠矣斷而行之者非勇與宜其上下相親伯業底定書曰從諫弗咈桓公有焉易曰納約自牖工師近之矣鄭伯卒庶孽奪正公子五爭及厲公自櫟入國將盡劉諸公族懸劒于國門且下令曰敢爭者斬子俞彌方病聞之歎曰是何亡國之政也乃令左右扶見公未至公遙呼曰大夫力疾而見寡君非欲嘗國門劒乎聲色俱厲子俞彌陽驚曰何謂也公語之故子俞彌曰君能如此過文王逺矣臣頓首賀且不暇況敢爭乎公解顔曰寡君焉能過文王也曰臣言不悖君實過之公曰大夫言何易也雖然幸卒言之子俞彌曰君之過文王者無他威勝也公悅前子俞彌問曰文王初伐西戎次伐密須次伐耆邘次崇侯虎而作豐邑自岐徙都之其威盛矣大夫乃謂寡君勝之其故何邪子俞彌曰文王之威能行天下而獨不行於周宗故其子孫之盛兄弟之國者十有五人姬姓之國者四十人此無他親親也今君欲兵之非威勝文王乎公艴然見乎色曰大夫言固善如儀亹之黨何子俞彌曰鄭之公族盡二人黨耶君奈何殲之臣所居之南有山曰陽都之山甚深羣熊萃焉熊性惡血偶度絶壑棘刺脅血見若濡縷熊亟爪之血愈滋爪之不已膚成坎原原如泉湧熊不能禁剜去其膚而血弗息竟擢腎腸以死鄭之公族猶一體也今因公子五爭不問小大盡劉無乃與前事類耶公矍然失聲曰吾過矣吾過矣遂下城門之劍置諸公族不論君子曰鄭厲公之愎諌誰能犯焉子俞彌反復言之而公弗格者以順入以正出也內經曰寒因寒用熱因熱用其始則同其終則異於戲豈特醫師之為然哉魯之老父相與謀造狐白之裘紉之以密針緣之以畫純佩之以長禐尉之以榆火擇彤笥承之趨魯君之庭而致辭曰吾儕小人得有闔廬以蔽風雨者非君賜與出作入息而鼓腹酣歌者非君賜與男播于疇婦饁于郊以遂其生者非君賜與吾聞上德不報於人為無禮於德為愆義不祥莫大焉請以是為玉體之共謹再拜以獻魯君曰寡人聞之君猶本也民猶支也君所以庇民如本之養支也爾二三老父之無衣宜於寡人乎是給今倒行而逆施之無乃不可乎敢辭二三老父又相與謀曰是服之不華無以彰君之德也盍更諸於是以錦為衣繡以五色龍章鞶以朱絲襮以華黼有文爛如也又復趨魯君之庭而致辭曰臣等不佞長於蓬蒿之野未嘗受教於君子不知以禮事君今因物以合矩矩謂之章緣文以顯義義謂之範君有至德而惟皮革之物是供非合顯之意謹更之惟君圖焉公曰魯國雖小尚敢私裘乎禮若可受絁布惟盈如其不然五采奚益敢固辭二三老父又相與謀曰吾君誠賢君其不受者非有他也不欲重煩吾民我等當愛之以德可也又進而致辭曰君之中心臣等幸已知之有君無臣世謂亂國臣不敢以褻服汗于執事願以仁義為衣道德為領忠信為紳亷知為緣使君服之長有茲魯國先公社稷永有攸賴不亦可乎公曰寡人敢不承教君子曰魯之老父何其善愛君哉其氣和其辭婉以周其情懇願而有依魯君應之若黃鍾大吕弦歌于場洋洋乎相宣泠泠乎相應也君臣如此魯欲不治得乎禮曰無體之禮上下和同此之謂也秦昭王即位之三年中外士多去昭王患之謂陽山君曰寡人遇士不為不至矣先飢而餔之未凍而裘之寡人何負於士士之相視如辨髦將縶維之邪益離其心欲任其所之邪則去者日多矣弗禁國將空奈何陽山君曰君何患焉夫王孫非重甗不棲非山實不食非族林不懸聞人聲則逸弋人餌而罞之詔而馴之命之舂人立而下上其手命之水負壺出汲命作夔離桑林之舞則冠帶踉蹡而起夫王孫類夫人者猶可也至於䖑虪則噬人之物卭首則百獸讋掉尾則林木震嘯咆則隂飈四發非惟不敢近矧敢狎獵人羉而縳之習而安之相與作角抵之戲跨項編須或翻出蹯下無所不至䖑虪亦靈獸猶可也至於伯趙禽中微者爾技人引而羅之擾而柔之摶土為人獸神鬼面而空其中衣與皮如之令其為鬼則冒鬼面服鬼衣以出跳踉偃仆如畫至於人獸神皆然伯趙雖微猶禽屬也至於蚍蜉則蟲之至微者也形大於粟其目鼻入微不可見眩人以彘肪誘而致之集於乾壺玄與黃異貯序而教之布髹几於庭置二壺其上振鼓三初則玄黃皆出再則各成列奮首搖鬛相向三則紛紜交不可辨聞鉦聲各退入壺不亂夫王孫䖑虪獸也伯趙禽也蚍蜉蟲也皆口不能言冥頑不靈其可服而制之者奠心志寧嗜欲故也況士靈於萬物者乎且士者國必資以成治者也昔我先君繆公西取由余於戎東得百里奚於宛迎蹇叔於宋求丕豹公孫支於晉遂成伯業臣竊聞之先君嘗語羣臣曰林繁則衆禽來棲海寬則大魚來遊寡人之待士亦以寬故劒舄乃麇至耳今王之馭下如束濕晝不得寧夜不得息來者如入囊有入無得出者臣亦將去之況他人乎王若以誠待士縱其去來不問士若不至當磔臣以示不悔也昭王曰善鄰國聞之士之來歸者千餘人君子曰君子懷材抱藝孰不欲自見哉特患遇之非其道故避去爾禮云舉賢而容衆毁方而瓦合言寬裕也君子亦何心哉齊頃公欲賦民一丘出車一乘不從者死袁婁宰泣曰敝邑之賦急矣四丘一乘尚弗支也況倍三乎吾寧死爾不忍死民也弗奉令公使使者讓宰且召與使者俱宰至見公頓首請曰臣無罪盧蒲就魁在側斥曰汝惡得無罪立國養民古也瘠民肥國今也胡不朘民膏血以媚公爾罪一也公既棄民汝反欲愛民使諸侯不敢侵伐爾罪二也通國之宰皆徇公欲爾獨以正自匡而欲死之爾罪三也汝惡得無罪公笑而釋之君子曰古者諌有五有正諌有降諌有忠諫有戇諫有諷諌若盧蒲就魁之言其殆諷也與齊西王須善賈海出入扶南林邑頓遜羣蠻中貿遷諸寶若玳瑁頗黎火齊馬腦之類白光煜煜然遇東風覆舟附斷桅浮沈久之幸薄岸被濕行夷隂山中山幽不見日常若雨將壓地西王須自分必死尋歇竇絶氣庶遺胔不為烏鳶飯未入猩猩自竇中出反覆視意若憐之者取戎叔雹葖委萎諸物指之食西王須方餒甘之竇右有小洞棲新毳厚尺餘甚溫讓西王須猩猩獨卧于外大寒不自恤語言雖殊朝夕嗢咿作聲似慰解狀如是者一年不懈忽有餘皇度山下猩猩急挾西王須出送之登及登則其友也猩猩猶遙望不忍去西王須因謂其友曰吾聞之猩血可染􅀈經百年不篤是獸也腯刺之可得斗許盍升岸捕之其友大罵曰彼獸而人汝則人而獸也不殺何為囊石加頸沈之江君子曰負恩悖義人弗戮鬼斯戮之矣西王須之見殺也宜哉雖然西王須固可殺猶施於異類也類同者亦有之豈惟類同而同氣者亦或有之奈之何哉天王之法尚在吾當執刑書以往楚將伐魯取其地召諸大夫問焉辟閭巫臣曰可神子魚曰不可楚子病之請言其故辟閭巫臣曰魯公失政季氏得民公伐之弗勝次于陽州齊侯唁公于野井而不能討魯之臣子枕戈待旦莫敢發者畏季氏威也君將求逞諸侯而徼福周公之廟奈何不伐臣故曰可神子魚曰周室東遷列國失序若聲罪加之以兵何君不可攻何國不可伐楚之視魯猶齊晉之視楚也魯可伐也楚能免焉臣故曰不可辟閭巫臣曰魯棄周禮唯強弱是視當齊肇伯衣裳之會九兵車之會四魯鮮不與聞晉文率諸侯會于溫以臣召君不可以訓亦僕僕而往不遑寧處其蔑我楚國則曰是蓽簬籃縷之國可與行典禮乎楚國之民含怒日久非特君也康王即世魯公雖與二三大夫辱臨楚郊實怵於勢非中誠也不伐何以示逺臣故曰可子魚曰周公相王室尹天下於周為睦分魯公以大路大旗夏后之璜封父之繁弱殷民六族使帥其宗輯其分族將其醜類以法則周公即命于周其德至今未泯也夫修惠以懷人人誰弗親逞威以上人人何能輯今以魯不我與而兵之以示逺其無乃非德惠也乎臣故曰不可辟閭巫臣曰受姓定封孰非懿親諸姬存者其可數也或明德之弗崇則弗足以存且臣聞之立德敷政立義和民德天之明也義地之制也君人者則天之明法地之制以洽和民人古之道也今魯之公室弱民罹荼毒若入烈火無所避之棄而不伐不亦左乎臣故曰可神子魚曰王靈雖微天下共主楚國固強終人臣也以君伐臣是謂布義以臣伐臣是謂悖政四海弗靖職此之由君若以師宿于魯境東諸侯告于天王使一介之使以讓君曰魯也弱諸臣畔之致使其君越在草莽不能事宗廟諸姬竊憂之君為大國不唯其難之靖而土地是圖或為執事羞天王命我諸姬亦既有辭當以公徒三萬與君周旋於龜蒙之墟君其圖焉不知君將何辭以對也臣故曰不可辟閭巫臣曰天王崩王室亂劉子單子以王猛居于皇自救且不及況能綏魯國乎五侯九伯桓公實征之以臣伐臣非一朝夕今楚之伯與齊代興我若討魯之罪東諸侯震疊不暇其能有辭乎臣故曰可神子魚曰魯之為國密邇於齊又甥舅也王室固多難魯之君子或藉齊餘威以安靖之楚師進焉諸姬必忿將為楚患是無故勤諸侯也如或還也勞師千里糜厥糗糧觸冒風露何益於國臣故曰不可楚子曰巫臣之言良欲帥師東聞齊侯取鄆居昭公乃止君子曰春秋大夫類多能言而麗乎理者何其寡也季氏逐君諸侯莫不聞楚能告天王致討桓文之功可繼也神子魚乃遏之巫臣不務出此乃凌蔑我王室惓惓以威逺為言二者胥失也楚之為楚其不競也宜哉衛靈公問治國之要於蘧伯玉曰寡人之國不為小矣久而不治欲帥虎士以禦四封何如蘧伯玉曰可也非其要也遣使致聘以修鄰好何如曰可也非其要也曰慎簡百僚毋曠厥官何如曰可也非其要也曰杜閼女謁勿使行政何如曰可也非其要也曰斥擯姦回崇厥正士何如曰可也非其要也曰儉德是共屏棄淫侈何如曰可也非其要也曰懷保小民夙夜匪懈畏之如天敬之如神綏之若子何如曰斯其至矣有民斯有國有國斯有君民者君之天也君之則君舍之則獨夫耳可不畏哉公曰善哉言乎君子曰蘧伯玉之言其有激哉君者主民民之從君猶水朝宗振古然也而曰民為君之天何耶天之生民使君主之不使虐之虐之非君也是則君為民立民亦重矣哉靈公能善言抑可謂賢也已趙成陽堪其宫火欲滅之無階可升使其子朒假於奔水氏朒盛冠服委蛇而往既見奔水氏三揖而後升堂默坐西楹間奔水氏命儐者設筵薦脯醢觴朒朒起執爵啐酒且酬主人觴已奔水氏曰夫子辱臨敝廬必有命我者敢問朒方白曰天降禍於我家鬱攸是崇虐焰方熾欲緣髙沃之肘弗加翼徒望宫而號聞子有階可登盍乞我奔水氏頓足曰子何其迂也子何其迂也飯山逢彪必吐哺而逃濯溪見鰐必棄履而走宫火已焰乃子揖讓時耶急舁階從之至則宫已燼矣君子曰迂儒僨事往往類此是何可勝道人以經濟自負臨事之際或不知急緩以至覆亡亦何其謬哉中山君嬖梁其生生蹇僿而椎鄙盡國中無過者唯中山君宜之一朝不見輒若有所失語大夫旃曰梁其生其智人哉何為能安我也大夫旃曰心成憐白髮玄情弗怡艷色媸從古然也中山君曰何哉大夫旃曰君聞癸比子翏之為人乎子翏慎妃耦十年不遂恆鬱鬱離居曲逆有醜女眇左目疹瘢如叢珠且黑面羸曲逆人過而不晲醜女怒去從師學擊築彈坎侯三年精其技又善為北里之舞以惑人子翏一見大悅致厚幣聘以歸字曰玄姬朝築焉莫坎侯焉嬖之甚子翏稍出遊歸必熟視其面無不妍者反笑世人多一目云其友宛爰都憐之為致趙女光艷皎皎照人世謂閭須白台不能似之子翏逐出曰何物醜類敢儕吾玄姬所謂玄姬其君之智人與中山君笑曰大夫言過矣君子曰中山君之蔽一至是乎妍媸最易辨且不可況其他乎世道既汗以佞為賢以正直為憸邪者皆是也尚何暇中山君之笑哉齊侯再伐山戎賓須無問曰聞君將有事山戎然乎非與公曰然何如曰以臣觀之可伐者五不可伐者一公驚曰何謂也曰謀夫孔多可伐者一也矛戟銛利幡幟精明可伐者二也既稟充牣餫餉弗絶無仰於鄰可伐者三也卒乘輯睦隊伍成列不戰則已戰無不克可伐者四也大而陳蔡宋衛小而邾鄧杞薛皆與國也奔號承令匍匐恐後可伐者五也以此言之止君勿行者惑也臣竊有私焉夫山戎蕞爾之邦也使誠有罪君亦既伐之矣奈何再乎為土地耶海濱千里君悉有之何愛僻逺之野以廣君土疆為人民耶衣冠劒舄充斥君之境土何愛魋結卉裳之俗以亂我邊陲為一戰可以定伯耶君已帖陳服鄭親魯而攘楚矣何假山戎今再帥師徒使斯民肝腦潤草莽枯胔暴原野耳夫爭地以戰殘民以逞非仁君也非仁君不足以霸諸侯此不可伐一也齊侯曰大夫言固善山戎屢悖寡人奈何賓須無曰熊羆豺虎並家於山蛟鼉魚鱉俱穴於淵九夷百蠻均宅於仁君務仁德之修獨不能容一山戎乎容之則來庭伐之則叛去力不勝德故也君請改圖焉齊侯曰大夫之言善止君子曰桓公賢君哉不然何聞義則服如此也秦有尊盧沙者善夸談居之不疑秦人笑之尊盧沙曰勿豫笑也吾將説楚以王國之術翩翩然南逮至楚境上關吏縶之尊盧沙曰慎勿縶我我來為楚王師關吏送諸朝大夫置館之問曰先生不鄙夷敝邑不逺千里將康我楚邦承顔色日淺未敢敷布腹心他不敢有請姑聞師楚之意何如尊盧沙怒曰是非子所知大夫不得其情進於上卿瑕瑕客之問之如大夫尊盧沙愈怒欲辭去瑕恐獲罪於王亟言之王趣見未至使者四三往及見長揖不拜呼楚王謂曰楚國東有吳越西有秦北有齊與晉皆虎視不暝臣近道出晉郊聞晉約諸侯圖楚刑白牲列珠盤玉敦歃血以盟曰不禍楚國無相見也且投璧祭河欲渡王尚得奠枕而寢耶楚王起問計尊盧沙指天曰使尊盧沙為卿楚不強者有如日王曰然敢問何先尊盧沙曰是不可空言白也王曰然即命為卿居三月無異者已而晉侯帥諸侯之師至王恐甚召尊盧沙却之尊盧沙瞪目視不對迫之言乃曰晉師鋭甚為王上計莫若割地與之平耳王怒囚之三年劓而縱之尊盧沙謂人曰吾今而後知夸談足以賈禍終身不言欲言捫鼻即止君子曰戰國之時士多大言無當蓋往往藉是以媒利祿尊盧沙亦其一人也使晉兵不即至或可以少售其妄未久輒敗亦不幸矣哉歷考往事矯虛以誑人未有令後者也然則尊盧沙之劓非不幸也宜也越人甲父史與公石師交甲父史能計弗決公石師善決而計疏各合其長事無留行人兩而一心也因語相侵離去政輒敗密須奮泣諫二人曰君不聞海蟲有水母乎水母無目資蝦以行蝦亦資水母食兩不能無也水母姑置之又不聞有瑣􅖜乎腹藏蟹飢則蟹出求食歸則瑣􅖜飽否乃死蟹失所巢亦兩不能無也瑣􅖜姑置之又不聞夏屋有蟨鼠乎與卭卭岠虛比為卭卭岠虛齧甘草即有難卭卭岠虛負而走亦兩不能無也蟨鼠姑置之又不聞西域有共命之鳥乎枳首一體性多妬飢則爭啄一俟其暝餐毒草害之及下嗌皆斃亦兩不能無也是皆山海蟲爾不足怪雖人亦有之北方有比肩之民迭食而迭望失一則死亦兩不能無也今二人甚類之其所異者彼以形此以事爾奈何離去奈何離去二人相顧曰微奮言吾等將愈敗歡然如初君子曰十二官各有所司必相資以成體況尺有所短寸有所長何可自用哉密須奮可謂諷矣楚帥師伐晉晉人恐嚴甲兵以待楚入河陽退師未幾又入如是者三晉侯疑朝羣臣問焉伯瑕對曰楚誘我也急宜驅弗驅必深入存亡不可期晉侯曰子計疏矣伯瑕恚曰君如弗納臣言臣終不能俘隨君請先去之晉侯斥之問步毅步毅對曰楚非昔楚矣執政衆乖內嬖日盛曳綺穀而副玉珈者後宫千人旦謳暮酣惟日不足焉能及我問士渥濁士渥濁對曰毅言固當亦知其一未知其二者也楚西有秦難東諸侯則齊鄭魯衛枕戈待隙獨吾國有新喪未暇攻彼虞我兵起五國必應之故先動相制耳不足慮也問范丐丐對曰如二大夫言問韓起韓起大笑絶纓晉候變色曰大夫笑寡人乎起對曰老臣何敢笑君實笑鴈奴不知也晉侯曰何謂也曰具區之澤白鴈聚焉夜必擇栖恐人弋已也設鴈奴環巡之人至則鳴羣鴈藉是以瞑澤人熟其故爇火照之鴈奴戞然鳴澤人遽沈其火羣鴈皆驚起視之無物也如斯者四三羣鴈以奴紿已共啄之未幾澤人執火前鴈奴不敢鳴羣鴈方寐一網無遺者今楚師進退三執火之謂也君可不少察之乎晉侯曰爭人不當如是哉於是大嚴守備楚子聞之曰勿謂晉無人不敢侵君子曰晉侯其善謀哉集衆人之慮必有一長者及韓起獻計楚人知悉其情遂退師詩云先民有言詢于芻蕘況士乎宋剔成君自髙視羣臣皆下有諫者輒拒曰爾欲上我耶毋不已也指所佩劍曰懼此乎皆怖汗而退欲造九成臺於雍丘之郊恐羣臣言戒門者無納士納則死北殷子且謂門者曰吾將見吾君門者沮之子且堅欲入且曰吾事君十年豈不知君臣所甚惡者諌耳吾不諫則已何沮也曰子既不諌欲入何為曰吾善為雞戲將以悅君也門者入白剔成君君召至子且鼓肱為翼膠膠而長鳴鳴已急趨出氣甚暢君怪之趣使還問曰子人耳乃效雞鳴何也曰臣尊雞甚故效之曰何故尊之曰臣以堯舜之知或不如也曰是何言與是何言與寡人聞非聖人者無法況方之異類乎曰臣焉敢非聖人竊有疑也道蔽天地者堯德極萬世者舜皆古聖人也今謂其知不雞若者誠過乎激然風雨晦冥能司晨不愆度者堯舜能之乎曰不能也堯舜雖大聖司晨必以雞乎曰固也曰君如知此奈何盡下羣臣無若雞者乎君喜曰羣臣無言及此者今乃始聞之寡人有過子宜力諌也曰君令臣諌臣不敢隱今賦急民單環四封皆強敵夙夜憂勤且懼不免況事遊觀乎曰寡人不敢也曰君曰不敢而造九成之臺何也剔成君即日罷其役君子曰日之行晝天下無不照月之行夜萬國無不明然日月之光有所不及者一燈之微足補其光此蓋子且雞喻之説也演連珠五十首連珠者興於漢章之世班固賈逵傅毅咸受詔作之其後陸士衡演之司空圖徐鉉晏殊宋庠又從而效之然其為體不指説事情必假喻以達其旨而覽者微悟合於古詩諷興之義有足取者作演連珠五十首蓋聞忠臣徇國不惜於軀命烈士愛君竟忘其首領是以左轂之鳴車右伏劒越甲之至雍門刎頸蓋聞鷹鸇巢林烏雀為之不棲松柏在岡蒿艾為之不植是以君子居鄉憸壬革面正士立朝姦雄斂迹蓋聞志於貞節者浮名不足以纍其真志於恬泊者好爵不可以亂其性是以子陵樂富春之耕干木辭於陵之聘蓋聞天矩有定人謀莫移或順之而從吉或反之而致凶是以鶴脛固長截之則恐鳬脛雖短續之則悲蓋聞事貴審機行當寡尤大易慎辨早之戒春秋嚴謹始之謀微必馴於顯極鴻每事於纖求是以肥􅖆一出潛魚盡怖霜鍾初動巢鳥咸憂蓋聞龍升雲隨虎吼飈興豐澤劍飛徠山東之冠履晉陽戈指集冀北之簪纓是以氣志吻契精神合并桑隂不徙而大功立戎衣一御而四海平蓋聞體微而徑者或足以交戕形龎而武者或失於見制小大每失於相形剛弱乃拘於所畏是以豺舌雖狹而有殺虎之能鼠牙雖尖而有害象之技蓋聞資地以成恆麗形於名嶽向陽而集唯藉飲於醴泉物以類而方聚德必均而可肩是以五色神芝借鬯靈於朽壞九苞彩鳯笑嚇鼠之烏鳶蓋聞外味不加則形氣日削內養有道則神明自腴茍譬諸物若契以符是以脾析一停犘牛即付中夷既涸鱴刀成枯蓋聞賞物在精取財有道毫髮異觀天淵殊造是以嶧陽之桐惟伯牙能知其良烏號之弓必由基方領其妙茍徒妄粥而暗投曷若藏音而收耀蓋聞旭日才升於上玄則沈霾斯屏疾霆或振於後土則魑魅潛驚何則大明足以著宣天德大威足以遹昭天聲是以兩觀之誅尼父與政三叔之亂姬旦東征蓋聞殷商久旱有備而無虞鄭國屢災知警而弗復是以陽德載乎氣化玄邈難知治忽繫乎人謀昭明可究蓋聞人畜木難輕如尺布家藏敝帚重若千金何權度之遽失斯沈痼之已深是以自珍而蔑人者不行於匹婦中虛而徇禮者可化於百壬蓋聞青霞白鳯之文奚關治化黃馬碧雞之辨頗類俳優哀彌文之喪質致末俗之效尤是以六藝之科法莫嚴於炎漢三緘其口銘式播於成周蓋聞爭雄角勝者常貴於權謀伐罪弔民者必資於仁義由王霸之或殊遂正偏之頓異是以湯武之師若日照而月臨桓文之兵如風飛而雷勵蓋聞翔蠅飽偃溷之腴如甘芳餌艾猳處汗衊之窟若寢文茵緣局氣而不變乃反物而獨稱是以錮於陋習苦良易置同乎衰世妍醜奚分蓋聞負道推公者欲舉善以同人挾智自私者恆患賢之壓已以其量之隘𢎞驗其人之臧否是以五弓之陵莫齊泰華之岡一蹄之涔難嫓滄溟之水蓋聞神祕啓聖龍圖出河生卦爻之參錯見隂陽之蕩摩𢎞參元化丕叶大和是以梏於讖緯者誣絺繡於輕縞銖於術數者量瀛海以玄蠡蓋聞大鈞司播何竒不有通神廣攬厥識惟貞若限一已之陋將失百物之情是以南徼流泉人飲之而化蟒西戎羊角土種之以成形蓋聞九聖有作懸中天之兩曜七經埀訓燭萬古之重𡨕移擲埴以索塗咸履矩而蹈繩是以采章文物因茲而昭煥禮義廉恥藉是以修明蓋聞有感斯應無暗弗章或聲音之相召或物我之兩忘是以瓠巴援琴而鼓則遊魚出聽曽子倚山而嘯則飛鳥下翔蓋聞寰宇至博當百工共理廟社至重非一士可圖是以尺薪不能漫鑊水寸氷不足寒庖厨蓋聞哲士窮機必售其所嗜純臣強識必揆其所當是以文繡雖華犬冒之而棄去毛嬙雖美魚見之而深藏蓋聞正色在廷固資於謇諤婉容而諌尤貴於優柔盛怒無逆鱗之批易志有解頤之休是以叔向善辭故不殺摶鷃之竪晏嬰能諷故卒出斬竹之囚蓋聞士必因其才則可以致使器必稱夫用則可以致享若反是道將毁于成是以泗濱之梓不能以為笛雲夢之竹不足以為箏蓋聞善事國者不以私廢公善為臣者不以怨棄義是以解狐之引伯栁上黨則安舅犯之舉子羔西河則治蓋聞地隨天偏氣因方異既爽中和則流隱厞是以由首之山曽雪常凝夀麻之國大暑倍熾蓋聞志或不持亂靡有定甘於遂欲如染餳飴之鼎澀於從善如蹈刀鋸之穽是以善妬者弗服泰寶之木善淫者不厭大倉之令蓋聞玄黃載析品象攸凝兆人文以宣其用乂粒食以遂其生是以魚遊翠媯而録圖至天雨嘉粟而帝農耕蓋聞天兆既朕神符有尚叶二儀之絪緼含三辰之融盎有開必先揆理無妄是以赤龍感河而堯生白氣貫月而湯降蓋聞處平則通行危則蹇厥志弗回斯力乃衍是以魚升龍門難於拾級車上太行難於薄險蓋聞是非易軌白黑倒置勢有不一時隨所值是以齊女雖豔反以醜聞秦士雖賤卒以貴遇蓋聞唯氣應時其則弗爽唯神體物其用乃周是以槖籥順虛而鼓動關鍵乘時而啓抽故人心或變壯士歌而怨夫哭物化有定春女思而秋士憂蓋聞善言物情者否固有泰能察人理者詘或弗信是以道不濟而戎夷寒死志不行而東郭長貧蓋聞形采未彰者竟忘其窳陋事功未白者誰察其隆髙是以鬋飾自矜臨淄水始知其醜威稜素斂破昆陽始知其豪蓋聞事貴適用物宜近觀或墆恆而􅘈變終背易而由艱是故寒者不貪雙璧而思短褐飢者不願千金而美一餐蓋聞九五飛龍三靈叶瑞大德有貞至神攸馭是以帝堯即政景星出翼成湯臨宇飛煌挾馭蓋聞惟皇建極為世彞制變鹿豕之俗則竭力以行道出魚鱉之民則忘身而徇世是以通河漢者首無髮而股無毛贊天地者心有經而膂有緯蓋聞民既大安則樂世如砥策能戡亂則目牛無全是以勺酒鬱搖勢在克殷之後甲兵未動勝居服夏之先蓋聞中心弗妄大信孚如驗千里之違應在片言之是非是以史佚正辭以實桐葉之戲晏子佯對而發海棗之疑蓋聞葆熙石竇任運陵局左闔右開以攬二儀之祕仰觀俯察以盡萬品之情何則行廢安於否泰動靜符乎屯亨是以虞舜大聖猶禮於支父神禹至治猶優於伯成蓋聞一饋七起者文后之急士一沐三握者姬旦之下賢是以庶績用乂靈貺斯甄故自長而短人者國必仆賢賢而愚人者身必顛蓋聞天人協合上下盤魄參神運之回旋資氣化於沖漠是以君致尊而制命則日月貞明臣守卑而介道則雨暘時若蓋聞崇庳别方鴻瑣殊器其性有差其量則異是以蝦蟹之朋莫希雲龍之軌燕雀之儔難知鴻鵠之志蓋聞明聖有作問道無方之具茨而事大隗適東岱以奉中黃是以下綏定于黎庶上燮和于隂陽故沖默之德蟠乎無際淵微之應覃乎無疆蓋聞善行興邦嘉言作則法緣之以革姦人依之而建德是以聞一言之當如得萬人之兵獲一士之賢如得千乘之國蓋聞擇食者在驗其醇窳觀人者在察其衰良是以烏喙雖可充腸茹之則身滅憸邪雖可任事用之則國亡蓋聞昭懸景於天則暴威不作鼓飛廉之氣則柔慝自退是以白日揚光雷車避藏祥飇鼓籟玄雲掩斾蓋聞淡顔鈍舌不合於汙世戇揖癡步取憎於流俗寧采緑於澗阿肯逐軌於朝曲是以擇林而遁者甘西山之餓知命不憂者免窮途之哭蓋聞至道玄妙非氣象可局靈化潛融非軌轍可制若魚兔之已得則筌蹄之可離是以協三才而貫十端宰一心而統萬彚寓言五首齊桓公因過葵丘葵丘人掘地得鐵劒以上厄於土蝕甚桓公力耆之命左右礪以密砥沃以鳥膏雖日切劘下上而鱗然若痏痂者猶故也持以示隰朋隰朋曰是謂太白之精西方之英北斗上布中炯外空不用則已用不留行是蓋諸侯之神物也復示開方開方曰隰朋之言良是昔我太公嘗得寶劍于渭之陽名曰龍光命太史占之其繇有曰金以至剛象以武功大啓爾封東海之邦歷年八百乃終迄今卒受國于齊君之所獲與太公無異是殆天欲昌齊伯業乎昌之必自葵丘始管夷吾不言而出桓公召而問曰寡人得寶劍左右皆吾譽子獨無一言何也夷吾曰君暗而臣佞臣尚何言桓公曰何故夷吾曰君勢隆則諂諛日至諂諛日至則危亡之道也彼隰朋開方者豈不知三尺枯鐵冶鍛之家皆有之今敢面欺于君是君有重勢以臨之也古之賢王好善而忘勢者果何為哉桓公足地曰微汝言寡人不及此勢之所至可畏哉晉景朝出見飯牛者且行且歌意軒軒若自得命韓厥呼而問之女衣才至骭曽無衮繡之華出牧于野曽無文軒之載女果何樂而行歌若是也飯牛者曰此吾所以樂也吾豈欲異於人哉顧衮繡之榮適以囚吾身文軒之美適以械吾體故絶去而弗求也吾豈欲異於人哉人過百齡其速若一日耳舞而婆娑行而浩歌寤而蕤蕤寐而魚魚以此優遊卒歲不亦安乎生殺之柄弗纍于手安危之機弗繫于心朝夕所慮者牛之飢得青芻一束則吾事濟矣不亦足乎既安且足其視列車千乘積粟萬種皆外物也泊然與化俱冥矣不亦達乎有此三者而欲持以易彼非惑歟韓厥曰女自謀則善矣如蒼生何飯牛者不答笑去衛人有齊丘生者年五十生一子愛之食寢非子在側弗安弗飽偶渡河溺死齊丘像其貌而哭甚哀其友子人丙曉之曰魯人有愛狻猊者狻猊産徼而中國不可得乃使人貌之而日視之終不得一見之爾之所哀得無類是乎齊丘聞之愈悲子人丙之兄罵曰爾惡識死生之變哉宜乎不爾聽而愈悲也乃走告齊丘曰太虛之門氣有屈信生生死死一耳爾容何力哉古之達人委之順之由之全之不逆命不沮化不祈內福不辟外禍不知天之為人人之為天也且爾之死生亦縱浪大化中未知津涯尚何暇恤爾之子哉齊丘收泣謝曰喻之矣商於子家貧無犢以耕乃牽一大豕駕之而東大豕不肯就軛既就復解終日不能破一畦寧母先生過而尤之曰子過矣耕當以牛以其力之巨能起塊也蹄之堅能陷淖也豕縱大安能耕邪商於子怒而弗應寧母先生曰詩不云乎乃造其曹執豕于牢言將以為殽今子以之代耕不幾顛之倒之乎吾憫而詔子子乃反怒而弗答何也商於子曰子以豫顛之倒之豫亦以子倒之顛之吾豈不知服田必以牛亦猶牧吾民者必以賢不以牛雖不得田其害小不以賢則天下受禍其害大子何不以尤我者尤牧民者耶寧母先生顧謂弟子曰是蓋有激者也雍丘有北宫殖操舟捕魚蚌自給夜宿河濱忽獲夜光之珠明照百步外雍丘之人以北宫殖得竒寶也爭刺羊豕往賀之曰自若居雍丘出則操舟入則舍舟其衣罔罔爾其食扈扈爾宋人之窶者未有過於若也若今一旦得竒寶竒寶者世之所珍何欲不饜哉宋大夫聞之亦往賀曰宋君欲求照乘之珠十枚既有其九環宋國之疆而詔之無有應者不意若得之河濱也若當襲以阿錫貯以寶緘吾挈若西獻之貴與富弗須口也北宫殖將行其父始還自秦北宫殖具以告其父哭曰豫居雍丘十世矣安於一舟今以是珠獻必致貴富貴富則驕驕則暴暴則亂亂則危危則大壞而後已求如今日操舟尚可得耶吾安用是為也吾安用是為也碎之蘿山雜言二十首濂自居青蘿山山深無來者輒日玩天人之理久之似覺粗有所得作蘿山雜言君子之道與天地並運與日月並明與四時並行沖然若虛淵然若潛渾然若無隅凝然若弗移充然若不可以形拘測之而弗知用之而弗窮唯其弗知是以極微唯其弗窮是以有終至虛至靈者心視之無形聽之無聲探之不見其所廬一或觸焉繽繽乎萃也炎炎乎爇也莽莽乎馳弗息也茍不以畏為君而欲轡之勒之檢之柙之苞之涵之是猶教猿學禮也不亦左乎子不見嬰兒乎目不留采色故明全耳不留音聲故聰全舌不留苦甘故味全君子則之養其聰晦其明忘其味是之謂通原通原則幾乎聖人不用則已用則為天下獨六經皆故迹新入之機不同其機確確其履濯濯其機采采其履昧昧甚哉其機也人以文視經斯繆已善察機者其以質視經乎綿絲棼棼乃政之分純純謐謐乃政之一是故聖人馴而弗擾靖而弗逸明而弗察勤而弗煩弗擾故民舒弗逸故民寧弗察故民寬弗煩故民裕四者有失則天下受其害守正莫過于一一故弗二弗二則明明則神神則無不通天下之能事畢矣是故聖人之學貴一天下一物也譬之千鈞烏獲能舉之力不獲若則或壓焉或僨焉甚可畏也然則舉天下有要乎曰有德以懷之刑以威之隂陽相摩晝夜相環善惡相形梟鳯相峙梁藜相茂勢也亦理也君子欲盡絶小人得乎哉鳥之羽者兩其足獸之角者去其齒天地生物尚有不能而況衆人乎故曰功有所不全力有所不任才有所不足行遇刃者必避食逢鴆者必舍懼害已也麗色藏劍厚味臘毒則弗之察愚矣雞司晨犬警夜雖堯舜不能廢人有棄小善而弗采者非道哉以文徼名名必隳以貨徇身身必亡隳故無成亡因有爭唯君子知名不可徼身不可徇是謂守素則治治乃昭昭乃純純乃誠內修不暇奚事外欲皎皎兮不緇容容兮不知其所窮如擁鑑如持衡隨美惡輕重而應焉其君子之心也哉天無言而生殺遂伸子則榮屈子則悴亦何容力哉故君子與天合德不察察以自恃乎不默默以求全乎不赫赫以鷙翔乎不縮縮以雉伏乎能純一乎能絶外誘乎能山立而海受乎如是者謂之近道彼因氣強吾以義剛彼因氣弱吾以仁柔剛柔強弱之間不容一髮知者行之是謂得天不肖者悖之是謂失天人有奔走而求首者或告之曰爾首不亡也指以示之冷然而悟學者之於道亦然世求聖人於人求聖人之道於經斯逺已我可聖人也我言可經也弗之思耳天下之事或小或大或簡或煩或虧或贏或同或異難一矣君子以方寸心攝之了然不見其有餘以術干祿者敗以財樹家者禍以勢臨人者辱以安自恃者危以學自眩者禽以行自翹者偽是六疾也慈則和儉則裕勇則決明則逺容則聚是五懿也去六疾行五懿方有為於天下琴喻客有為豫言楚越之交恆多山山民齊氏者不識琴問人曰何謂琴或告之曰琴之為制廣前狹後圓上方下嶽首而越底被之以絲則鏗鏗然泠泠然可聽也齊悅曰是知琴也一日適通都大邑見負築來者亟趍視之驚曰是不類廣前狹後圓上方下者邪反側視之良久又曰是不類嶽首而越底者邪以指橫度之則亦有聲出絲間復曰是又不類鏗鏗泠泠之可聽者邪遂力致其人而歸師之三年蚤夜不輟自以為盡其技也鄉之告者偶過焉聞其聲輒瞿然曰子習者築也非琴也不然何若是嘈雜淫哇也因出琴鼓一再行齊民聞之蹙頞曰子紿我矣子紿我矣淡乎若大羮玄酒朴乎若蕢桴土鼓不足樂也豫所嗜者異乎是若鸞鳯之鳴若笙簫之間作若燕趙美人之善謳吾不知子琴之為築吾築之為琴也請終樂之嗟夫琴之為器人所易識山民乃以築當之則夫誤指鄉願為君子日愛之而不知厭者尚何怪乎感斯言作琴喻論頑陶尚書中立為余言臨海林甲一門皆疫死甲獨治喪暨甲歿無人藏其尸家犬奔號里巷若狂已而羣犬翕集銜甲衣曳至西郊跑土成坎薶焉坎淺不能容又復曳出如是者四三始壅土覆之而去新昌黃琛甫有牝犬為邏卒所食棄骨屛處其子銜之瘞諸野豫聞撫髀太息每舉諭諸人人輒笑豫誕且謂古無是事昔譙縣崔仲文畜犬會稽石和以丁奴易之不從和殺仲文奪其犬犬齧和守仲文尸跑浮土掩之尋牽和衣訴官和伏誅此晉義熙中事也冀州石玄度犬母育一子愛之甚玄度烹子啖之母候骨投地斂置一窟移葬於桑間日夕向桑嘷逾月乃止此宋元徽中事也謂古無是事者過矣夫犬能禦盜齚姦解難報恩傳記所載者然也又寧止此二事乎人若不自重物理有可徴者亦弗之信反指豫為誕豫故書此示之人心尚存其亦有所感夫孔子生卒歲月辨或有問於濓者曰孔子之生傳記所載歲月不同公羊氏云魯襄公二十一年冬十有一月庚子孔子生榖梁氏之説年之與日同於公羊而謂冬十月孔子生則與公羊實差一月月固差矣至賈逵注二十一年經云此年仲尼生昭公二十四年服虔載賈逵語云仲尼時年三十五則皆以孔子為二十一年生也司馬遷著孔子世家云孔子生於襄公二十二年則與公羊榖梁實差一歲日則雖與公羊同而月復與榖梁異杜預主司馬遷以注左氏傳謂二十二年生司馬貞主榖梁公羊以證史記謂二十一年生遷誤為二十二年者蓋以周正十一月屬之明年也孔若古主公羊榖梁謂為不易之論胡舜陟主司馬遷謂如榖梁公羊所書則孔子出處之年與經史諸子皆不合孔宗翰亦主司馬遷羅泌之議略與宗翰同洪興祖主榖梁而謂周家改月十月二十一日庚子即夏之八月二十一日馮去疾見傳記異辭則造為調停之言曰襄公二十年實己酉之嵗也是歲八月置閏以厯法積之則大雪節當在十月十七日或十八日是為十一月朔氣又三四日方為庚子是孔子之生已在十一月之節矣既在十一月則是二十二年庚戌歲首無疑公羊書為十一月似誤而非誤也司馬遷書為二十二年而又謂孔子之年七十三以卒亦未嘗誤也榖梁於年於月皆據實而書公羊於年亦據實而書於月則以節書謂有日可以表見也司馬遷於年則以節書三者皆非誤也若是衆言之不齊何如濓應之曰公羊榖梁二氏傳經之家也傳經之家當有講師以次相授且去孔子時又為甚近其言必有據依司馬遷固良史則後於榖梁公羊者也吾則無徵乎爾孔子所生之年吾當從公羊氏榖梁氏所以春秋長厯考之二十一年己酉十一月無庚子庚子乃在十月之二十一日孔子所生之月吾當從榖梁氏注家謂己酉為己卯卯酉之文相近故誤書也曰孔子周流諸國之年世家所紀多可考宋之大儒或取之若如子言無不遲一歲者遷尚不足信乎曰衛靈公之時孔子適衛又適陳匡人以為陽虎而拘之世家謂孔子使從者為寧武子臣於衛然後得去按武子仕於成公之朝至穆公末武子之子相已與孫良夫將兵侵齊則武子年當耄矣復厯定獻二公凡三十七年至靈公三十八年而孔子至衛使武子猶在其年將一百五十有餘歲矣武子之事然也孔子之年乃獨可信乎非惟此也孔子去魯世家謂定十四年年表則又謂為十二年以年表為是則世家為非以世家為是則年表為非一書之中自相矛盾若此他蓋不足深論皇王大紀曰遷載孔子言行不得其真者尤多言行且爾而況於年乎曰洪興祖謂周之十月即夏之八月者然乎曰非也三代雖異建而月則未嘗改也殷嘗建丑矣書則曰惟元祀十有二月漢嘗建亥矣史則曰元年冬十月舉前後以例之則周制可知孔子作春秋行夏之時為萬世法不過截子丑二月於前歲之終耳月固不之改也否則春入於夏夏入於秋錯亂而不成歲矣曰馮去疾謂十月庚子在大雪後即為十一月者可乎曰亦非也世之星史厯生以六物占人休祥當氣會之交固有生於己酉而以庚戌嵗推之者孰云吾儒乃有是耶此野人之語舍之勿以汙齒牙可也曰孔子之生豫既得聞命矣其卒之時亦有一定之説乎曰左氏云魯哀公十六年夏四月己丑孔丘卒司馬遷遵之諸儒又從而遵之理之所在孰得而違之故孔子所卒之年吾當從左氏然十六年乃壬戌之歲也是歲四月戊申朔有乙丑而無己丑己丑乃在五月之十二日已與乙文亦相近故誤書也所謂乙丑則四月十八日謂當夏正二月十八日者非也謂十六年為辛酉己丑日為戊戌者亦非也自壬戌歲上遡己酉孔子之年乃七十四謂七十三者尤非也曰近代王應麟博極羣書者也頗致疑於是而謂今不可考矣子乃質言之何邪曰衆言紛淆者當折衷以經經無明載當索之於傳索之於傳不猶愈於史乎謂今不可考者過矣曰子之言辨則辨矣夏周二正千古難決之疑也何言之若易易邪曰是非爾所知也雖罄徂徠之松以為煤盡剡溪之藤以為楮未能竭吾喙也他日當為受春秋者詳焉諸子辨并序諸子辨者何辨諸子也通謂之諸子何周秦以來作者不一姓也作者不一姓而其立言何人人殊也先王之世道術咸出於一軌此其人人殊何各奮私知而或盩大道也由或盩大道也其書雖亡世復有依倣而托之者也然則子將奈何辭而辨之也曷為辨之解惑也鬻子一卷楚鬻熊撰熊為周文王師封為楚祖者書二十二篇蓋子書之始也藝文志屬之道家而小説家又别出十九卷今世所傳者出祖無擇所藏止十四篇崇文總目謂其八篇已亡信矣其文質其義𢎞實為古書無疑第年代久邈篇章舛錯而經漢儒補綴之手要不得為完書黃氏疑為戰國處士所託則非也序稱熊見文王時年已九十其書頗及三監曲阜時事蓋非熊自著或者其徒名政者之所記歟不然何有稱昔者文王有問於鬻子云管子二十四卷齊大夫管夷吾撰夷吾字仲其書經劉向所定凡九十六篇今亡十篇自牧民至幼官圖九篇為經言五輔至兵法八篇為外言大匡至戒九篇為內言地圖至九變十八篇為短語任法至內業五篇為區言封禪至問霸十三篇為雜篇牧民解至明法解五篇為管子解臣乘馬至輕重庚十九篇為管子輕重豫家又亡言昭修身問霸牧民解輕重庚五篇止八十一篇題云唐司空房玄齡注或云非也尹知章注是書非仲自著也其中有絶似曲禮者有近似老莊者有論伯術而極精微者或小智自私而其言至卑汙者疑戰國時人采掇仲之言行附以他書成之不然毛嬙西施吳王好劍威公之死五公子之亂事皆出仲後不應豫載之也朱子謂仲任齊國之政又有三歸之溺奚暇著書其説是矣先儒之是仲者稱其謹政令通商賈均力役盡地利既為富強又頗以禮義廉耻化其國俗如心術白心之篇亦嘗側聞正心誠意之道其能一匡天下致君為五伯之盛宜矣其非仲者謂先王之制其盛極於周后稷公劉大王王季文武成康周公之所以制周者非一人之力一日之勤經營之難積纍之素況又有出於唐虞夏商之舊者矣及其衰也而仲悉壞之何仲之不仁也嗚呼非之者固失而是之者亦未為得也何也仲之任術立伯假義濟欲縱能致富強而汲汲功利禮義俱喪其果有聞正心誠意之道乎周自平王東遷諸侯僭王大夫僭諸侯文武成康周公之法一切盡壞列國盡然非止仲一人而已也然則仲何如人曰人也功首而罪魁者也曰齊之申韓鞅斯之列亦有間乎曰申韓鞅斯刻矣而仲不至是也原其作俑之意仲亦烏得無罪焉薄乎云爾晏子十二卷出於齊大夫晏嬰漢志八篇但曰晏子隋唐七卷始號晏子春秋與今書卷數不同崇文總目謂其書已亡世所傳者蓋後人采嬰行事而成故栁宗元謂墨氏之徒有齊人者為之非嬰所自著誠哉是言也老子二卷道經德經各一凡八十一章五千七百四十八言周柱下史李耳撰耳字伯陽一字聃聃耳漫無輪也或稱周平王四十二年以其書授關尹喜今按平王四十九年入春秋實魯隱公之元年孔子則生於襄公二十二年自入春秋下距孔子之生已一百七十二年老聃孔子所嘗問禮者何其夀歟豈史記所言老子百有六十餘歲及或言二百餘歲者果可信歟聃書所言大抵斂守退藏不為物先而一返於自然由其所該者甚廣故後世多尊之行之視之不見名曰夷聽之不聞名曰希搏之不得名曰微道家祖之谷神不死是謂玄牝玄牝之門是謂天地根神仙家祖之吾不敢為主而為客不敢進寸而退尺是謂行無行攘無臂仍無敵執無兵禍莫大於輕敵輕敵幾喪吾寶故抗兵相加哀者勝矣兵家祖之道沖而用之或不盈淵乎似萬物之宗挫其鋭解其紛和其光同其塵湛兮似若存吾不知誰之子象帝之先莊列祖之將欲翕之必固張之將欲弱之必固強之將欲廢之必固興之將欲奪之必固與之申韓祖之以正治國以竒用兵以無事取天下張良祖之我無為而民自化我好靜而民自正我無事而民自富我無欲而民自朴曹參祖之聃亦豪傑士哉傷其本之未正而未流之弊至貽士君子有虛玄長而晉室亂之言雖聃立言之時亦不自知其禍若斯之慘也嗚呼此姑置之道家宗黃老黃帝書已不傳而老聃亦僅有此五千言為其徒者乃棄而不習反依倣釋氏經教以成書開元所列三洞瓊綱固多亡缺而祥符寶文統傳所記若大洞真若靈寶洞元若太上洞神若太真若太平若太清若正一諸部總四千三百五十九卷又多雜以符呪法籙丹藥方技之屬皆老氏所不道米巫祭酒之流猶自號諸人曰吾蓋道家吾蓋道家云文子十二卷老子弟子所撰不知氏名徐廣曰名鈃李暹曰姓辛葵丘濮上人號曰計然范蠡師事之裴駰曰計然姓辛字文子其先晉國公子也孟康曰姓計名然越臣也蔡謨曰計然者范蠡所著書篇名非人也謂之計然者所計而然也顔師古曰蔡説謬矣古今人表計然列在第四等計然一名計研吳越春秋及越絶書並作計倪倪與妍然三音皆相近故訛耳由是觀之諸説固辨矣然是書非計然之所著也豫嘗考其言一祖老聃大概道德經之義疏爾所謂體道者不怒不喜其坐無慮寢而不夢見物而名事至而應即載營魄抱一專氣致柔滌除玄覽也所謂上士先避患而後就利先逺辱而後求名故聖人常從事於無形之外而不留心於已成之內是以禍患無由至非譽不能塵垢即知白守黑知雄守雌知榮守辱之義也所謂靜則同虛則通至德無為萬物皆容即道常無為而無不為侯王若能守萬物將自化也所謂道可以弱可以強可以柔可以剛可以隂可以陽可以幽可以明可以包裹天地可以應待無方即道沖而用之或不盈淵乎似萬物之宗也其他可以類推蓋老子之言宏而博故是書雜以黃老名法儒墨之言以明之毋怪其駁且雜也計然與范蠡言皆權謀術數具載於書絶與此異豫固知非著是書者也黃氏屢發其偽以為唐徐靈府作亦不然也其殆文姓之人祖老聃而托之者歟抑因裴氏姓辛字文子之説誤指為范子計然十五卷者歟關尹子一卷周關令尹喜所撰喜與老聃同時著書九篇頗見之漢志自後諸史無及之者意其亡已久矣今所傳者以一字二柱三極四符五鑑六七七釡八籌九藥為名蓋徐藏子禮得於永嘉孫定未知定又果從何而得也前有劉向序稱蓋公授曹參參薨書葬孝武帝時有方士來上淮南王安祕而不出向父德治淮南王事得之文既與向不類事亦無據疑即定之所為也間讀其書多法釋氏及神仙方技家而藉吾儒言文之如變識為智一息得道嬰兒蕊女金樓絳宫青蛟白虎寶鼎紅爐誦呪土偶之類聃之時無是言也其為假託蓋無疑者或妄謂二家之説實祖於此過矣然其文雖峻潔亦頗流於巧刻而宋象先之徒乃復尊信如經其亦妄人哉亢倉子五卷凡九篇相傳周庚桑楚撰豫初苦求之不得及得之終夜疾讀讀畢嘆曰是偽書也勦老莊文列及諸家言而成之也其言曰危代以文章取士則剪巧綺繿益至而正雅典實益藏夫文章取士近代之制戰國之時無有也其中又以人易民以代易世世民太宗諱也偽之者其唐士乎豫猶存疑而未決也後讀他書果謂天寶初詔號亢桑子為洞靈真經求之不獲襄陽處士王士元采諸子文義類者撰而獻之其説頗與豫所見合復取讀之益見其言詞不類因棄去不復省農道一篇雖可讀古農家書具有之或者謂可孤行吾亦不知其為何説也鄧析子二卷鄭人鄧析撰析操兩可之説設無窮之辭當子産之世數難子産之法子産卒後二十一年駟揣為政殺鄧析而用其竹刑夫析之學兼名法家者也其言天於民無厚君於民無厚父於子無厚兄於弟無厚刻矣夫民非天弗生非君弗養非父弗親非兄弗友而謂之無厚可乎所謂不能屏勃厲全夭折執穿窬詐偽誅之堯舜位為天子而丹朱商均為布衣周公誅管蔡豈誠得已哉非常也變也析之所言如此真不法先王不是禮義而好治怪説者哉其被誅戮宜也非不幸也鶡冠子楚人撰不知姓名常居深山以鶡羽為冠著書四卷因以名之其書述三十變通古今治亂之道而王鈇篇所載楚制為詳立言雖過乎嚴要亦有激而云也周氏譏其以處士妄論王政固不可哉第其書晦澀而後人又雜以鄙淺言讀者往往厭之不復詳究其義所謂天用四時地用五行天子執一以守中央此亦黃老家之至言使其人遇時其成功必如韓愈所云黃氏又謂韓愈獵取二語之外餘無留良者亦非知言也士之好妄論人也如是哉陸佃解本十九篇與朝氏削去前後五卷者合豫家所藏但十五篇云子華子十卷程本撰本字子華晉人曰魏人者非也藝文志不之載豫嘗考其書有云秦襄公方啓西戎子華子觀政于秦又稽莊周所載子華子事則云見韓昭僖侯夫秦襄公之卒在春秋前而昭僖之事在春秋後前後相去二百餘年子華子何其夀也其不可知者一孔子家語言孔子遭齊程子于郯程子蓋齊人今子華子自謂程之宗君受封于周後十一世國并于溫程本商季文王之所宅在西周當為畿內小國溫者周司冦蘇忿生之所封周襄王舉河內溫原以賜晉文公溫固晉邑也孰謂西周之程而顧併於河內之溫乎地之逺邇亦在可疑其不可知者二後序稱子華子為鬼谷子師鬼谷戰國縱橫家也今書絶不似之乃反類道家言又頗勦浮屠老子莊周列禦冦孟軻荀卿黃帝內經春秋外傳司馬遷班固等書而成其不可知者三劉向校定諸書咸有序皆淵慤明整而此文獨不類其不可知者四以此觀之其為偽書無疑或傳王銍性之姚寬令威多作贋書而此恐出其手理或然也然其文辭極舂容而議論煥發略無窘澀之態故尤善惑人人溺文者孰覺其偽哉列子八卷凡二十篇鄭人列禦冦撰劉向校定八篇謂禦冦與鄭繆公同時栁宗元云鄭繆公在孔子前幾百載禦冦書言鄭殺其相駟子陽則鄭繻公二十四年當魯穆公之十年向蓋因魯穆公而誤為鄭爾其説要為有據髙氏以其書多寓言而并其人疑之所謂禦寇者有如鴻蒙列缺之屬誤矣書本黃老言決非禦冦所自著必後人會粹而成者中載孔穿魏公子牟及西方聖人之事皆出禦寇後天瑞黃帝二篇雖多設辭而其離形去智泊然虛無飄然與大化遊實道家之要言至於楊朱力命則為我之意多疑即古楊朱書其未亡者勦附於此禦冦先莊周周著書多取其説若書事簡徑宏妙則似勝於周間嘗熟讀其書又與浮屠言合所謂內外進矣而後眼如耳耳如鼻鼻如口無弗同也心凝形釋骨肉都融不覺形之所倚足之所履非大乘圓行説乎鯢旋之潘合作番為淵止水之潘為淵流水之潘為淵濫水之潘為淵沃水之潘為淵沈水之潘為淵雍水之潘為淵汧水之潘為淵肥水之潘為淵非修習教觀説乎有生之氣有形之狀盡幻也造化之所始隂陽之所變者謂之生謂之死窮數達變因形移易者謂之化謂之幻造物者其巧妙其功深固難窮難終因形者其巧顯其功淺故隨起隨滅知幻化之不異生死也始可以學幻非幻化生滅説乎厥昭生乎濕醘雞生乎酒羊奚比乎不筍久竹生青寧青寧生程程生馬馬生人人久入於機萬物皆出於機皆入於機非輪回不息説乎人胥知生之樂未知生之苦知死之惡未知死之息非寂滅為樂説乎精神入其門骨骸反其根我尚何存非圓覺四大説乎中國之與西竺相去一二萬里而其説若合符節何也豈其得於心者亦有同然歟近世大儒謂華梵譯師皆竊莊列之精微以文西域之卑陋者恐未為至論也曽子孔子弟子魯人曽參所撰也漢志云十八篇唐志云二卷今世所傳自修身至天圓凡十篇分為二卷與唐志合視漢則亡八篇矣其書已備見大戴禮中豫取而讀之何其明白皎潔若列星之麗天也又何其敷腴諄篤若萬卉之含澤也傳有之有德者必有言信哉七十而從心進學之序七十免過勉人之辭其立言迥然不同也周氏不察而譏之過矣君子愛日誨學者也一日三省自治功也語有詳略事有不同也髙氏以辭費誚之亦何可哉或謂大孝篇有及樂正子春事固出後人所輯而非曽子所自著則庶幾也言子三卷言子名偃字子遊吳人近新昌王爚裒論語書所載問答而為此書不知者直謂為偃所自著蓋非也大抵古書之存於今者多出於後人之手如孔子家語謂為孔安國所録壁中之文往往多鈔左傳禮記諸書特稍異其辭耳善讀者固不敢與之世傳賈誼新書謂誼所作亦不過因過秦論弔湘賦而雜以漢書中語足之似非誼本書也此猶有所附麗而然古三墳書亡已久宋毛漸特出之山墳則言君臣民物隂陽兵家謂之連山氣墳則言歸藏生動長育止殺謂之歸藏形墳則言天地日月山川雲氣謂之乾坤與先儒所言三易大異隂符古無是書唐李筌特出之以為黃帝所作皆取兵家譎誕不經語而文以竒澀之辭又妄説太公范蠡鬼谷張良諸葛亮等訓注皆鑿空扇虛以惑世尤使人驚愕不止是果何為者哉豫讀言子之書於是乎有感子思子七卷亦後人綴緝而成非子思之所自著也中載孟軻問牧民之道何先子思子曰先利之軻曰君子之告民者亦仁義而已何必曰利子思子曰仁義者固所以利之也上不仁則不得其所上不義則樂為詐此為不利大矣他日孟軻告魏侯罃以仁義蓋深得子思子之本旨或者不察乃遽謂其言若相反者何耶慎子一卷慎到撰到趙人見於史記列傳中興館閣書目乃曰瀏陽人瀏陽在今潭州吳時始置縣與趙南北了不相涉也誤也漢志云四十二篇唐志云十卷不言篇數崇文總目言三十七篇今所存者唯威德因循民雜德立君人五篇耳威德篇曰立天子以為天下非立天下以為天子也立國君以為國非立國以為君也立官長以為官非立官以為官長也民雜篇曰太君者太上也兼畜下者也下之所能不同而皆上之用也是以大君因民之能為資盡包而畜之無取去焉君人篇曰君人者舍法而以身治則誅賞豫奪從君心出矣然則受賞者雖當望多無窮受罰者雖當望輕無已皆純簡明易類非刑名家所可及到亦稷下能言士哉莊周荀卿稱之一則曰慎到二則曰慎到雖其術不同亦有以也莊子十卷戰國時蒙人漆園吏莊周撰內篇七外篇十五雜篇十一總三十三篇其書本老子其學無所不窺其文辭汪洋凌厲若乘日月騎風雲下上星辰而莫測其所之誠有未易及者然所見過髙雖聖帝經天緯地之大業曽不滿其一哂蓋倣佛所謂古之狂者惜其與孟軻氏同時不一見而聞孔子之大道茍聞之則其損過就中豈在軻之下哉嗚呼周不足語此也孔子百代之標凖周何入敢掊擊之又從而狎侮之自古著書之士雖甚無顧忌亦不至是也周縱日見軻其能幡然改轍乎不幸其書盛傳世之樂放肆而憚拘檢者莫不指周以藉口遂至禮義陵遲彞倫斁敗卒踣人之家國不亦悲夫金李純甫亦能言之士著鳴道集説以孔孟老莊同稱為聖人則其沈溺之習至今猶未息也異説之惑人也深矣夫盜跖漁父讓王説劍諸篇不類前後文疑後人所勦入朝氏謂孔子沒道術散老子始著書周起而羽翼之老子著書在孔未沒之先墨子三卷戰國時宋大夫墨翟撰上卷親士修身所染法儀七患辭過三辨七篇號曰經中卷尚賢三篇下卷尚同三篇皆號曰論共十三篇考之漢志七十一篇館閣書目則六十一篇已亡節用節葬明鬼非樂非儒等十篇比今書則又亡多矣墨者強本節用之術也豫嘗愛其聖王作為宫室便於主不以為觀樂之言又嘗愛其聖人為衣服適身體和肌膚非榮耳目而觀愚民之言又嘗愛其飲食增氣充虛強體適腹之言墨子其甚儉者哉卑宫室菲飲食惡衣服大禹之薄於自奉者孔子亦曰奢則不遜儉則固然則儉固孔子之所不棄哉或曰如子之言則翟在所取而孟子辭而闢之何也曰本二鬼谷子三卷鬼谷子撰一名玄微子鬼谷子無姓名里居戰國時隱潁川陽城之鬼谷故以為號或云王誗誗一作詡者妄也長於養性治身蘇秦張儀師之受捭闔之術十三章又受轉圓胠篋及本經持樞中經三篇轉圓胠篋今亡梁陶𢎞景注劉向班固録書無鬼谷子隋志始有之列於縱橫家唐志以為蘇秦之書大抵其書皆捭闔鈎箝揣摩之術其曰與人言之道或撥動之令有言以示其同或閉藏之使自言以示其異捭闔也既內感之而得其情即外持之使不得移鈎箝也量天下之權度諸侯之情而以其所欲動之揣摩也是皆小夫蛇鼠之智家用之則家亡國用之則國僨天下用之則失天下學士大夫宜唾去不道髙氏獨謂其得於易之闔闢翕張之旨不亦過許矣哉其中雖有知性寡纍知命不憂及中稽道德之祖散入神明之頤等言亦恆語爾初非有甚髙論也嗚呼曷不觀之儀秦用其術而最售者其後竟何如也髙愛之慕之則吾有以識髙矣孫子一卷吳孫武撰魏武帝注自始計至用間凡十三篇藝文志乃言八十二篇杜牧信之遂以為武書數十萬言魏武削其繁剩筆其精粹以成此書按史記闔閭謂武曰子之十三篇吾盡觀之其數與此正合漢志出史記後牧之言要非是武齊人吳闔閭用以為將西破強楚入郢北威齊晉顯名諸侯葉適以不見載於左傳疑其書乃春秋末戰國初山林處士之所為豫獨不敢謂然春秋時列國之事赴告者則書於策不然則否二百四十二年之間大國若秦楚小國若越燕其行事不見於經傳者有矣何獨武哉或曰風后握竒經實行兵之要其説實合乎伏羲氏之卦畫竒正相生變化不測諸葛亮得之以為八陳李靖得之以為六花陳而武為一代論兵之雄顧不及之何也曰兵勢篇不云乎戰者以正合以竒勝戰勢不過竒正竒正之變不可勝窮竒正相生如循環之無端九地篇又不云乎用兵者譬如率然率然者常山之蛇也擊其首則尾至擊其尾則首至擊其中則尾首俱至斯固風后之遺説也曽謂其不及之可乎嗚呼古之談兵者有仁義有節制至武一趍於權術變詐流毒至於今未已也然則武者固兵家之祖亦兵家之禍首歟吳子二卷衛人吳起撰起嘗學於曽子其著書曰圖國料敵治兵論將應變勵士凡六篇夫干戈相尋至於戰國慘矣往往以智術詐譎馳騁於利害之場無所不用其至若無士矣起於斯時對魏武侯則曰在德不在險論制國治軍則曰教之以禮勵之以義論天下戰國則曰五勝者禍四勝者弊三勝者霸二勝者王一勝者帝數勝得天下者稀以亡者衆論為將之道則曰所慎者五一曰理二曰備三曰果四曰戒五曰約何起之異夫諸子也此所以守西河與諸侯大戰七十六全勝六十四闢土四面拓地千里宜也較之孫武則起幾於正武一乎竒其優劣判矣或者謂起為武之亞抑亦未之思歟然則殺妻求將齧臂盟母亦在所取乎曰姑舍是尉繚子五卷不知何人書或曰魏人以天官篇有梁惠王問知之或曰齊人也未知孰是其書二十四篇較之漢志雜家二十九篇已亡五篇其論兵曰兵者凶器也爭者逆德也將者死官也故不得已而用之無天於上無地於下無王於後無敵於前一人之兵如狼如虎如風如雨如雷如霆震震冥冥天下皆驚由是觀之其威烈可謂莫之嬰矣及究其所以為用則曰兵不攻無過之城不殺無罪之人夫殺人之父兄利人之貨財臣妾人之子女此皆盜也又曰兵者所以誅暴亂禁不義也兵之所加者農不離其田業賈不離其肆宅士大夫不離其官府故兵不血刃而天下親嗚呼又何其仁哉戰國談兵者有言及此君子蓋不可不與也宋元豐中是書與孫吳二子司馬穰苴兵法黃石公三略吕望六韜李衛公問對頒行武學號為七書孫吳當是古書司馬兵法本古者司馬兵法而附以田穰苴之説疑亦非偽若三略六韜問對之類則固後人依倣而托之者也而雜然渾稱無别其或當時有司之失歟尹文子二卷周尹文撰其書言大道似老氏言刑名類申韓蓋無足稱者朝氏獨謂其亦宗六藝數稱仲尼其叛道者蓋鮮嗚呼世豈有專言刑名而不叛道者哉朝失言矣仲長統序稱其出於周尹氏齊宣王時居稷下與宋鈃彭蒙田駢同學於公孫龍按龍客於平原君君相趙惠文王宣王死下距惠文王之立已四十餘歲是非學於龍者也統卒於獻帝讓位之年而序其黃初末到京師亦與史不合嗚呼素問以為黃帝所作而有失侯失王脫營不醫之文殊不知秦滅六國漢諸侯王國除始有失侯王者六韜謂出於周之吕牙而有避正殿之語殊不知避正殿乃戰國後事爾雅以為周公所制而有張仲孝友之言殊不知張仲乃周宣王時人豫嘗驗古書真偽每以是求之思過半矣又況文辭氣魄之古今絶然不可同哉豫因知統之序蓋後人依托者也嗚呼豈獨序哉商子五卷秦公孫鞅撰鞅衛之庶孽封於商故以名書漢志二十九篇陳氏謂二十八篇豫家藏本二十六篇其第二十一篇亡鞅好刑名之學秦孝公用之遂致富強後卒以反誅今觀其術以勸耕督戰為先務墾草之令農戰之法至嚴至峻也然不貴學問以愚民不令豪傑務學詩書其毒流至嬴政遂大焚詩書百家語以愚天下黔首鞅實啓之非特李斯過也議者不是之察尚摘其商農無得糴糶貴酒肉重租之語以為疵病是猶舍人殺敓之罪而問其不冠以見人果何可哉公孫龍子三卷疏府白馬指物通變堅白名實凡六篇漢志六十四篇其亡已多矣龍趙人平原君客也能辨説傷明王之不興疾名器之乖實以假指物以混是非冀時君之有悟而正名實焉豫嘗取而讀之白馬非馬之喻堅白同異之言終不可解後屢閲之見其如捕龍蛇奮迅騰騫益不可措手甚哉其辨也然而名實愈不可正何邪言弗醇也天下未有言弗醇而能正茍欲名實之正亟火之荀子十卷趙人荀卿撰卿名況漢志避宣帝諱作孫卿劉向校定除其重復著三十二篇為十二卷題曰新書唐楊倞為之注且更新書為荀子易其篇第析為二十卷卿以齊襄王時遊稷下距孟子至齊五十年矣於列大夫三為祭酒去之楚春申君以為蘭陵令以讒去之趙與臨武君議兵入秦見應侯昭王以聘反乎楚復為蘭陵令既廢家蘭陵以終鄉先正唐仲友云向序卿事本司馬遷於遷書有三不合春申君死當齊王建二十八年距宣王八十七年向言卿以宣王時來遊學春申君死而卿廢設以宣王末年遊齊年已百三十七矣遷書記孟子以惠王三十五年至梁當齊宣王七年惠王以叟稱孟子計亦五十餘後二十二年子之亂燕孟子在齊若卿來以宣王時不得如向言後孟子百餘歲田忌薦孫臏為軍師敗魏桂陵當齊威王二十六年距趙孝成王七十八年臨武君與卿議兵於王前向以為孫臏倞以敗魏馬陵疑年馬陵去桂陵又十三年矣崇文總目言卿楚人楚禮為客卿與遷書向序駮益難信其論殊精絶然況之為人才甚髙而不見道者也由其才甚髙故立言或弗悖於孔氏由其不見道故極言性惡及譏訕子思孟軻不少置學者其亦務知道哉至若李斯雖師卿於卿之學懵乎未之有聞先儒遂以為病指卿為剛愎不遜自許太過之人則失之矣韓子二十卷者韓非所撰非韓之諸公子也喜刑名法術之學而歸其本於黃老與李斯同事荀卿以書干韓王不用乃觀往者得失之變作孤憤五蠧內外諸説林説難五十五篇計十餘萬言秦王見而悅之急攻韓得非斯自以不如非忌之譖于秦王下吏使自殺非慘激人也君臣父子夫婦之間一任以法其視仁義蔑如也法之所及雖刀鋸日加不以為寡恩也其無忌憚至謂孔子未知孝悌忠信之道謂賢堯舜湯武乃天下亂術謂父有賢子君有賢臣適足以為害謂人君藏術胸中以倡衆端而潛御羣臣噫是何言歟是何言歟是亦足以殺其身矣燕丹子三卷丹燕王喜太子此書載其事為詳其辭氣頗類吳越春秋越絶書決為秦漢間人所作無疑考其事與司馬遷史記往往皆合獨烏頭白馬生角機橋不發進金擲蛙膾千里馬肝截美人手聽琴姬得隱語等事皆不之載周氏謂遷削而去之理或然也夫丹不量力而輕撩虎須荆軻恃一劍之勇而許人以死卒致身滅國破為天下萬世笑其事本不足議獨其書序事有法而文彩爛然亦學文者之所不廢哉孔叢子七卷中興書目稱漢孔鮒撰鮒該覽六藝秦并天下召為魯國文通君拜太傅及焚書令行乃歸藏書屋壁自隱嵩山陳涉起聘為博士遷太師仕六旬以言不用托目疾退老于陳而著是書年五十七卒則固非漢人矣又稱一名盤盂藝文志有孔甲盤盂二十六篇本注謂黃帝史或謂夏帝時人此書稱子魚名鮒陳人或謂之子鮒或謂之孔甲孔甲姓名偶同又決非著盤盂者也其殆孔氏子孫雜記仲尼子思子上子髙子順子魚之言行者歟其第七卷則漢孔臧以所著賦與書謂之連叢附於卷末嘉祐中宋咸為之注雖然此偽書也偽之者其宋咸歟王士元偽作亢桑子而又自為之注抑此類歟近世之為偽書者非止咸也若阮逸關朗易傳李靖問對若張商英素書若戴師愈麻衣易亦往往不能迷明者之目竟何益哉今觀是書記問篇所載有子思與孔子問答語子思年止六十二魯穆公同時人穆公之立距孔子之汲七十年子思疑未長也而何有答問哉兼之氣質萎弱不類西京以前文字其為妄昭然可見或者謂其能守家法不雜怪竒歷戰國秦漢流俗而無所浸淫未必然也未必然也淮南鴻烈解二十一卷漢劉安撰安淮南厲王長之子招致蘇飛李尚左吳田由雷被七披伍被晉昌等八人及諸儒大山小山之徒講論道德總統仁義著內書二十一篇李氏書目云第七第十九亡崇文總目云存者十八篇今所傳原道俶真天文地形時則冥覽精神本經主術繆稱齊俗道應汜論詮言兵略説山説林人間務修泰族等訓連卷末要略共二十一篇似未嘗亡也又有中篇八卷言神仙黃白之術又有外書三十三篇漢志與內書同列於雜家中外書余皆未見淮南子多本文子而出入儒墨名法諸家非成於一人之手故前後有自相矛盾者有亂言而乖事實者既曰武王伐紂載尸而行海內未定故不為三年之喪又曰武王欲昭文王之令德使四方各以其賄來貢遼逺未能至故治三年之喪殯兩楹以俟逺方三代時無印周官所掌之璽節鄭氏雖謂如今之印章其實與玉角虎人龍符旌諸節並用不過手執之以表信耳今乃曰魯國召子貢授以大將軍印如是之類不能盡舉也昔吕不韋相秦亦致辨士使人人著所聞集論以為十二記六論八覽其説雖未純要其首尾以類粲然成一家言非淮南之雜也古人論立言者漢不如秦秦不如周信矣哉揚子法言十卷漢揚雄撰凡十三篇篇各有序通録在卷後景祐初宋咸引之以冠篇首或謂始於唐仲友非也自秦焚書之後孔子之學不絶如線雄獨起而昌之故韓愈以其與孟荀並稱而司馬光好揚雄學且謂孟子好詩書荀子好禮揚子好易孟文直而顯荀文富而麗揚文簡而奧惟簡而奧故難知其與雄者至矣是法言者為擬論語而作論語出於羣弟子之所記豈孔子自為哉雄擬之僭矣至其甚者又撰太玄以擬易所謂首衝錯測攡瑩數文掜圖告之類皆足以使人怪駭由其自得者少故言辭愈似而愈不似也嗚呼雄不足責也光以一代偉人乃膠固雄學復述潛虛以擬玄抑又何説哉余因為之長嘆雄之事經考亭朱子論定者則未遑及也抱朴子晉葛洪撰洪字稚川著內篇二十卷言神仙黃白變化之事外篇十卷駁難通釋洪深溺方技家言謂神仙決可學學之無難合丹砂黃金為藥而服之即令人夀與天地相畢乘雲駕龍上下大清其他雜引黃帝御女及三皇內文劾召鬼神之事皆誕褻不可訓昔漢魏伯陽約周易作參同契上中下篇其言修煉之術甚具洪乃時與之戾不識何也洪嘗自言馬迹山中受九鼎金液三經於鄭君鄭君名隱又得之葛仙公玄玄洪從祖也其後鄭君知江南將亂負笈持藥東投霍山莫知所在亦不識其仙歟否也洪博聞深洽江左絶倫為文辭雖不近古紆徐蔚茂旁引而曲證必逹己意乃已要之洪亦竒士使舍是而學六藝夫孰禦之哉惜也劉子五卷五十五篇不知何人所作唐志十卷直云梁劉協撰今考協所著文心雕龍文體與此正類其可徵不疑第卷數不同為少異爾袁孝政謂劉晝孔昭傷已不遇遭天下凌遲播遷江表故作此書非也孝政以無傳記可憑復致疑於劉歆劉協劉孝標所為黃氏遂謂孝政所托亦非也其書本黃老言雜引諸家之説以足成之絶無甚髙論末論九家之學迹異歸同尤為鄙淺然亦時時有可喜者清神章云萬人彎弧以向一鵠鵠能無中乎萬物眩曜以惑一生生能無傷乎亢倉子同三復其言為之出涕文中子中説十卷隋王通撰通字仲淹文中蓋門人私諡因以名其書世之疑通者有三一云唐書房杜傳中略不及其姓名此書乃阮逸偽作未必有其人按皮日休著文中子碑謂通生乎陳隋之世以亂世不仕退于汾晉序述六經敷為中説以行教於門人皮唐人也距隋為近其言若此果無是人乎書果逸之偽作乎一云通行事於史無者獨隋唐通録稱其有穢行為史官所削然史氏之職善惡畢書以為世法戒人有穢行見諸簡策者多矣何特削通哉一云房杜李魏二溫王陳輩未必其門人脫有之何不薦諸太宗而用之隋大業十三年五月通已先卒將焉薦之劉禹錫作王華卿墓志載其家世行事有曰門多偉人雖未可必其為房杜諸公要不可謂非碩士也第其書出於福郊福疇之所為牽合傳會反不足取信於人如仁夀四年通始至長安李德林卒已九歲而書有德林請見之語江都有變通不及聞而書有泫然而興之言關朗在太和中見魏孝文自大和丁巳至通生之歲開皇四年甲辰一百七年矣而書謂問禮於關子明此最為謬妄者也噫孟子而下知尊孔子者曰荀揚揚本黃老荀雜申商唯通為近正讀者未可以此而輕訾之天隱子八篇不知何人所作唐司馬承禎為之序承禎字子微嘗著坐忘論此書言長生久視之法與之相表裏豈天隱子即承禎歟洪興祖謂承禎得天隱子之學豈或别有考歟玄貞子兩見唐志一云十二卷一云二卷豫所藏者外篇三卷爾計必有內篇而此非全書也唐張志和撰韋詣作內解志和字子同金華人始名龜齡年十六擢明經以策干肅宗特見賞重命待詔翰林授左金吾衛録事參軍因賜名後坐事貶南浦尉會赦還以親既喪不復仕居江湖自稱煙波釣徒著玄真子亦以自號其書多偏曲之論無足采所可采者其隱操亦卓卓云金華子三卷劉崇逺撰或云崇逺唐人或云五代人仕至大理司直其為人莫可考其為書録唐大中後事蓋駮乎不足議也昔劉向採傳記百家之言撮其正詞美義可為勸戒者以類相從為説苑新序二書最為近古識者猶病其徇物者多自為者少況崇逺乎哉金華子崇逺所自號蓋有慕皇初平云齊丘子六卷一名化書言道術德仁食儉六化為甚悉世傳為偽唐宋齊丘子嵩作張耒題其後遂云齊丘犬鼠之雄蓋不足道其為化書雖皆淺機小數亦微有見黃老之所謂道德其能成功有以也嗚呼是書之作非齊丘也終南山隱者談峭景升也齊丘竊之者也其云能得一者天下可以理老氏説也魂魄魅我血氣醉我七竅囚我五根役我釋氏説也心冥冥兮無所知神怡怡兮無所之氣熙熙兮無所為萬慮不能惑求死不可得神仙家説也非淺機小數比也使齊丘知此則何為不得其死也其文髙簡關尹子可亞也實微有見於黃老所謂道德者也聱隅子二卷蜀人黃晞撰晞宋仁宗時人著歔欷瑣微論十篇篇有小序造文效揚雄王通二氏而造理不能逮其謂張良得聖人之安蕭何得聖人之變劉向得聖人之力者似不可哉黃氏間采其語謂二代反有所不及非知言也然自五季以來士習極陋而文亦隨之入宋代將百年而猶未大振晞獨知辭賦戾乎治具聲偶甚乎倡優確然立論以成一家言真豪傑士哉真豪傑士哉周子通書四十章本號易通舂陵子周子惇頥之所著也自孟子沒孔子之學不傳千載之下獨周子得之以授二程氏遂大白於天下安定胡宏有云一回萬古之光明如日麗天將為百世之利澤如水行地其論不亦至哉第每篇之首宏輒加以周子曰三言而損其舊有篇名失其旨矣是書文雖髙簡體實淵慤誠可上繼孟氏非餘子比也然莫知其師傳之所自彼妄男子謂同胡文恭公受學於鶴林夀涯師者固為詭誕而云傳太極圖於穆修修傳先天圖於种放放傳於陳摶者亦恐知周子未盡也其殆不階師授超然獨覺於千古之上者歟子程子十卷一名程子粹言乃程頥叔子書蓋其門人楊時變語録而文之者也前有序不著氏名東陽厲髯翁云相傳為廣漢張栻作序稱得諸子髙子家傳以其卷次不分編類不别因離為論道論學論書論政論事天地聖賢君臣心性人物十篇欲其統而要非求類夫論語之書也豫取觀之實皆叔子之言而伯子之説附焉辭極峻古雖間有稍離真者亦不逺矣覽者尚慎擇之哉至正戊戌春三月丙辰西師下睦州浦陽壤地與睦境接居民震驚多扶挈耄倪走傍縣豫亦遣妻孥入勾無山獨留未行日坐環堵中塊然無所為乃因舊所記憶者作諸子辨數十通九家者流頗具有焉孔子門人之書宜尊而别之今亦俯就其列者欲備儒家言也始之以鬻子而終之以周程者欲讀者有所歸宿也其中疏剔抵排亦竊自謂有一髮之見第以家當屢徙之餘書無片牘可以稽質不能必其無矛盾也夏六月壬午僅克脫稿越三日乙酉而浦陽平矣余遂竭蹶趍勾無驚悸稍定俾仲子璲録之如右於戲九家之徒競以立異相髙莫甚於衰周之世言之中道者則吾聖賢之所已具其悖義而傷教者固不必存之以欺世也於戲邪説之害人慘於刀劍虐於烈火世有任斯文之寄者尚忍淬其鋒而膏其焰乎豫生也賤不得信其所欲為之志既各為之辨復識其私於卷末學孔氏者其或有同豫一慨者夫秋七月丁酉朔金華宋濂記祿命辨三命之説古有之乎曰無有也曰世之相傳有黃帝風后三命一家而河上翁實能言之信乎曰吾聞黃帝探五行之精占斗罡所建命大撓作甲子矣所以定歲月推時候以示民用也他未之前聞也曰然則假以占命果起于何時乎曰詩云我辰安在鄭氏謂六物之吉凶王充論衡云見骨體而知命祿覩命祿而知骨體皆是物也況小運之法本許慎説文已字之訓空亡之説原司馬遷史記孤虛之術蓋以五行甲子推人休咎其術之行已久矣非如吕才所稱起于司馬季主也沿及後世臨孝恭有祿命書陶𢎞景有三命抄略唐人習者頗衆而張一行桑道茂李虛中咸精其書虛中之後唯徐子平尤造其閫奧也曰十一曜之説古有之乎曰無有也書云在璇璣玉衡以齊七政所謂七政日月水火木金土也而無紫氣星孛羅㬋計都也星孛數見于春秋或見大辰或入北斗紫氣則載之史册與氛祲同占羅㬋計都者蝕神首尾也又謂之交初交中之神初中者交食之會也借此以測日月之蝕也唐貞元初李弼乾始推十一星行厯鮑該曹士蒍皆業之士蒍又作羅計二隱曜立成厯起元和元年及至五代王朴著欽天厯且謂蝕神首尾頗行之民間小厯而已若吳伯善若甄鸞若劉孝孫若張胄玄之所造但云七曜而不聞有十一星也曰然則假之以占命又起于何時乎曰洪範云月之從星則以風雨泠州鳩云武王伐殷歲在鶉火月在天駟則以星占國亦已久矣而未必用之占命也曰以星占命奈何曰豫嘗聞之于師其説多本于都利聿斯經都利蓋都賴也西域康居城當都賴水上則今所傳聿斯經者婆羅門術也李弼乾實婆羅門伎士而羅㬋計都亦胡梵之語其術蓋出于西域無疑朝公武謂為天竺梵學者于此徴之尤信也曰術之緣起則吾既得聞命矣然亦巧發而竒中乎曰有固有之而不可泥也何也且以甲子幹枝推人所生歲月展轉相配其數極于七百二十以七百二十之年月加之七百二十之日時其數終于五十一萬八千四百夫以天下之廣兆民之衆林林而生者不可以數計日有十二時未必一時唯生一人也以此觀之同時而生者不少何其吉凶之不相同哉吕才有云長平亢卒未應共犯三刑南陽貴士何必俱當六合誠足以破其舛戾矣三命之説豫不能盡信者此也天以二十八宿為體體則為經有定所而不可易以五星為用用則為緯恆絡繹乎其間或遲或留或伏或逆固有常度而可以理測茍謂躔某宿則吉歷某宫則凶猶或可言也設某星有變其行不依常經而犯乎河漢內外諸星又將何以占之哉或如前所謂生同一時者其躔次無不同吉與凶又何懸絶哉夫萬物皆出于五行安有五行之外又有四餘土木行度最遲而為吉凶者久故有餘氣而氣為木之餘計為土之餘猶為可言也水之餘則孛火之餘則羅果何所取義哉水火土木然矣奈何金獨無餘氣乎或謂相生故有而相尅故無亦非通論也況孛乃妖星或有或無而氣羅計三者本非星也不知何以有躔度之詳哉十一曜之説豫不能盡信者此也曰秦漢以來諸儒推十二國分野十二次度數及所分州郡躔次毫釐若無差忒者既可占國豈不能占人乎曰天運地維動靜不同故先正云有分星而無分野占國者不可盡泥也占國者不可盡泥況占命乎曰五星之精發乎地而昭乎天其分配十日十二子名雖殊而理則同也人資天地以生山林之民毛而力謂得木氣之多也川澤之民黑而津謂得水氣之多也得火氣之多則丘陵之民專而長也得金氣之多則墳衍之民晳而瘠也至於豐肉而庳則得土氣之多而所謂原隰之民也人之賦氣有薄厚短長而富貴賤貧夀夭此固然也人之賦氣有厚薄短長而貴富賤貧夀夭六者隨之吾不能必也亦非日者之所能測也蹈道而修德服仁而惇義此吾之所當為也不待占者之言而後知之也豫身修矣倘貧賤如原憲短命如顔淵雖晉楚之富趙孟之貴彭鏗之夀有不能及者矣命則付之於天道則責成於已吾之所知者如斯而已矣不然委命而廢人白晝攫人之金而陷於桎梏則曰我之命當爾也怠窳偷生而不嗜學至老死而無聞則曰我之命當爾也剛愎自任操刃而殺人柔暗無識投繯而絶命則又曰我之命當爾也其可乎哉其可乎哉所以先王知山川異制民生異俗剛柔緩急遲速異齊五味異和器械異度衣服異宜於是修其教不易其俗齊其政不易其宜所以卒歸於雍熙之治也昔者鄭大夫禆竈言鄭當火請以瓘斚玉瓚禳之子産不之與已而果然竈復云不用吾言鄭又將火子産曰天道逺人道邇非所及也鄭卒不復火嗚呼此不亦祿命之似乎吾知盡夫人道而已爾曰近世大儒於祿命家無不嗜談而樂道之者而子一切屏絶之其亦有所見乎曰有子罕言命核生辨監察御史上饒遊君元敏以核生為號進賢包先生希魯為之解多至七百餘言以核與核通故於果核函仁之義甚悉美則美矣而非元敏之意也蓋元敏之先實居閩中宋時有為名御史者今元敏以文學法律著稱於時亦擢居是官其自謂核生者殆將留心於聽訟之事乎何以知其然哉豫按説文核實也考事西笮邀遮其辭得實曰核核之文從西而敫則諧聲也徐氏從而釋之曰實謂考之使實也西者人覆之也笮迫也邀者要其情也遮者止其詭遁也所以得實也又按尚書曰兩造具備師聽五辭五辭簡孚正于五刑孔子亦從而釋之曰五辭簡核信有罪驗則正之於五刑也大抵簡核誠信有合衆心惟察其貌有所考合所謂察其貌者即周官之五聽也由是論之核之為義原其所自出豈不在此而在彼乎夫獄者法令所托乃以生萬民也求其無生始以法死之其可不敬慎之乎元敏孶孶弗忘復大書著于心目之間可謂良御史矣先生則謂果之仁必以核而得人之仁必反觀內求而後見不亦取類之逺乎且古人之序學功曰窮理曰致知窮究也致則推極也初未嘗言核也核則讞鞫之意多使無情者不得盡其辭也嗚呼何可同哉會豫有疾不能竭其所欲言謾略辨之如斯然亦自意一偏之見未合大方而先生之論則偉矣辨蘭王度記曰古者之摯天子鬯諸侯薰大夫蘭士􅉅則蘭為瑞草而取貴於世也尚矣然其種有九而九之中又有山澤二者之殊生於山者其葉類茅當春氣初發有莖出其荄長可六寸而一華冠其顛華絶香每行逶迤深谷間微風忽過而清馨悠悠逺聞故昔人有云芝蘭生於深林不以無人而不芳此花質易萎而不可佩服者也生於澤者廣而長節節中亦髙四尺漢諸池苑及許昌宫中皆種之以降神或雜粉中藏衣皆取其芬芳耳即所謂蘭又所謂都梁香故昔人之言士女秉蘭必於溱洧之曲然華葉俱香而可紉佩者也澤中之蘭吳郡陸機明之山中之蘭豫章黃庭堅始能詳著其説或者不察二者之異徒泥佩帨􅉅蘭之文力抵庭堅為非於是學者始病不知所從矣京口徐仲輝性愛蘭室之東西列植者皆蘭也金華宋濂故為作辨蘭雖然草之類夥矣其難辨者亦衆矣唐一物也許慎以為菜名郭璞以為今之菟絲也緑竹一物也陸元恪以為草名李石以為今之篁竹也矧蘭乎哉仲輝更求博雅君子質之慎毋以豫言為足信也文憲集卷二十七
