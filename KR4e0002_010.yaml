body:
  text: 文憲集巻十明宋濂撰傳凡三十五章太白丈人傳文中子學既成慨然有濟蒼生之心欲尊王道推霸畧稽今驗古建太平十二䇿與河東薛收西遊長安見隋君道經太白山息於灌木之陰有丈人自束来緼袍無表顔色腫噲肩負束芻去文中子靳十步弛擔箕踞而坐兩手搔爬眼視雲漢若四傍無一人者搔已䀜指文中子謂収曰彼鳳頸龜背須埀至腰者為誰收對曰河汾王夫子也曰其王通耶曰然曰將何之曰夫子憂世未治以䇿西見隋君耳丈人大笑不止文中子異之乃摳衣趨前揖而問曰丈人何哂通也豈通未聞先王之道不足以咸和萬民乎丈人曰不然也豈八殥之大利害如牛毛有非一士之舌可盡乎丈人曰不然也豈上天未欲平治天下而下不當見大卞之行乎丈人曰不然也曰三者既非敢問丈人所哂者何事耶丈人曰嘻何子愚之甚也夫具人之體服人之服食人之粟脱使稍有知孰不欲堯舜君民哉是有道焉不可茍而就也文中子曰其道何如丈人曰道有三其上焉者燮和坤乾經緯星辰樞機四時輨轄五行執天之德以牖帝明以達帝聰然其自任以斯道之重非人君北面而事之不復輕出出則以為帝者師若堯之君疇舜之務成昭禹之西王國是已其次焉者以六合為一家以四海為翰藩以五嶽為封鎮以元后為父母以臣鄰為伯仲以蒸庶為赤子煦以深仁財以正義防以峻禮陶以至樂威以嚴刑式以庶政治天下可運之掌上然亦不輕於自試必待王者致敬盡誠而後起而佐之否則樂耕漁以終其身若成湯之伊尹周之太公望是已其下焉者仿佯局束哫訾栗斯不逺千里衒已求媚君門如天無路可陟俯伏闕下魄遁神疲閽隷見訶不敢出氣此不自重惜而徇時射利者之所為若齊王之門操瑟而售者是已今子之西来也欲為君疇務成昭西王國乎欲學伊尹太公望乎抑欲同售瑟於齊王之門者乎子須麋具在寧不知所自處也且子獨不聞之三家之市有處子焉必待行媒始相知名又必待納采問名納吉納徵請期親迎而後始成昏不然是奔也雖國人皆知賤之矣子今負䇿而干進恐與不待聘而奔者無大相逺也况隋君天性沈猜不悦詩書廢棄學校殺戮元勛溺寵廢嫡惟婦言是用惟刻薄毒痡之法是崇是嗜蕭牆之禍起在旦夕子尚欲行王道乎言暴虐於湯武之世必見誅談仁義於桀紂之朝必見黜何也時不同也子如解吾言即請東轅毋西向不然子其行哉文中子曰丈人之論至矣通何敢不敬承明訓然竊有疑焉願丈人卒教之也昔孔子大聖也車轍環於諸國棲棲遲遲如喪家之狗至再逐於魯削迹於衛窮於齊圍於陳蔡而卒不悔者誠畏天命而悲人窮也今丈人教通以不仕然則孔子不足法歟丈人曰是何言與是何言與在孔子則無可無不可下孔子一等則可其所可不可其不可子自視其孔子耶抑下孔子一等者耶昔魯男子善學柳下惠者盖以其不可而學其可也予聞子嘗受書於李育學詩於夏琠問禮於關子明正樂於霍汲考易於王仲華而其知顧出魯男子下予竊為子不取也夫不察時而冒進謂之瞽施之不當其可謂之愚不度德量力而强行謂之固枉已從人謂之賊淪溺儃回而弗止謂之淹瞽則不達愚則不周固則不變賊則不正淹則不振是五垢者子皆躬蹈之宜乎有疑於予予去子矣予去子矣丈人言畢負芻而行文中子面如死灰逺望丈人南行不見其背目猶不暫捨薛收進曰夫子何慕之深耶收聞不合先王不順禮義謂之奸言雖辯君子不聽彼丈人不過姦言而辯者爾初未聞先王之道夫子衝冒風露跋涉而至此終不因其説而中返乎文中子遂行至隋隋君御太極殿文中子以太平十二䇿上之隋君下公卿議公卿多不悦文中子退而嘆曰丈人其至人哉於是賦東征之歌而歸著續經數萬言君子曰甚哉出處之難也以河汾之賢操經綸之具施之天下何不可者而丈人方詆其自售㫁㫁不恕况其下者乎甚哉出處之難也雜傳九首有序婺為浙水東大郡自昔人物多出其中載諸史册者既或謬誤而不載者又將湮没無聞濂竊病之欲分道學忠義孝友政事文學卓行隠逸貞節八類作先民傳以示鄉之来學荏苒沈痾竟不能遂志近幸少瘳因自劉滂而下得九人皆史官之所畧者謾敘其大槩而附以賛辭俾侍史錄寘别稿俟他日書成却隨類以附入焉傳直書名而不諱者盖史法當爾也南山樵者宋濂自引劉滂傳劉滂字德霖武義人滂自少誦説能屈其師與浦江梅執禮同游學人士多傾下之號東梅西劉中大觀已丑進士第調新昌縣令縣在豫章山中俗嗜鬭令到官輒移病去以他吏攝之滂臨以誠未幾稱治雖傍邑訟不能決者乞從滂決之豪鄒氏横里中挾貴婣誣人死滂捕致械治之部使者為請不聽卒傅以法投豪于相州蔡京與滂祖為布衣交滂至京師京曰吾故人有孫耶除詳定勅令所删定官欲挽滂為黨㑹常瓌書詩屏間京疑其訕已屬滂求其迹且遷官滂笑曰此胡為及我哉京聞之不悦滂亦拂衣去坐是不調者十餘年靖康初詔除太常博士不拜建炎中上問人才於近臣學士詹又給事中汪藻舍人李公彦皆云滂可用用滂知建昌軍建昌舊守多懦夫威權不立兵習悍驕邀求無度滂至一以法繩之兵不勝其忿持㦸入市掠人物即拒者刺傷之滂捕係追償兵遂為變滂及母妻皆死時紹興甲寅七月三日也滂卒時年五十六其妻湯氏侍姑側兵及身猶不去竟遇害建昌人聞滂死皆慟哭失聲踰期父老猶㑹佛祠哭之有欲絶者且千里以書弔其孤朝廷既誅始亂者復用御史言褒滂為朝請大夫官其一子墉滂好學善屬文與人交終始如一聞有急傾財赴之居官嫉惡如仇毅然不可回奪以及於難云賛曰劉氏初居七閩五代之季有汝明者遷永嘉之荆溪生四子焉孟與仲隨父居季移三衢幼曰器来徙武義滂之六世祖也荆溪之顯者則太常少卿安節給事中安上入河南從伊川程頤游所學甚粹人稱二劉先生武義之顯者世有其人其登進士第則自滂始而通判楚州嘉成甌寧宰三傑繼之後来者復接踵而起多以善政聞歲時燕饗軒盖繽紛青紫間錯當時以為盛事然君子之論則在彼而不在此也鞏豐傳鞏豐字仲至其家鄆之濵城渡江即所寓上斷為武義人曽祖燾祖庭芝皆左承議郎庭芝世號山堂先生者也父灋鄉貢進士前此科目相傳七世矣豐學敏而早成自童丱時前輩源緒古今音節事之因革總綂如注水千丈之壑迎前隨後宿艾駭服以為積數十年燈火勤力聚數十家師友講明猶不能到也時新迪義理之學草茅士震於見聞多矜露忲狃至他文史言論儒之藝業又昧陋傎倒莫知幅程獨豐抑縱開闔條䟽品彚應變不迫富若素有著之於文無險怪華巧而以理屈人片辭半牘皆清朗得言外趣尤工為詩多至三千餘首淳熙辛丑以太學上舍對䇿髙第教授漢陽軍代還舊比皆自學入館有不善之者纔授江東提刑司幹辦公事遭母喪免又授浙東㑹改法本路人不許為監司屬官遷幹辦福建帥司公事以格知臨安縣政尚寛簡吏民信化刑罰衰息㑹其友為學官豐勸拔滯淹士坐此食宫觀祿久之始提轄左藏庫復以宫觀罷已而又授宫觀而豐死矣嘉定丁丑正月晦日也年七十豐既挾竒才人謂宜居館閣中秘不應徘徊下列日望其升益顛仆不起故聞其死多傷之而龍泉葉適痛之尤深豐性質易無岸谷然有以自負命雲侣月跨越汗漫浩乎不可挽暇日輒載一壺獨行田野不問岐路抵暮而返去家二里有龍門峽登眺徜徉慨然曰此可以止矣仕雖不顯無幾微見於顔色云子二人積耕皆為儒賛曰武義之有鞏氏自庭芝始初庭芝登元城劉安世之門以道學為東平倡弟子受業者恒數百人及其来遷也以所學化導如東平故武義人士知尚義理之學亦自庭芝始至豐又從東莱呂祖謙游於是中原文獻麗澤淵源萃於一門矣嗚呼懿哉葉秀發傳葉秀發字茂叔其先由括徙金華為金華人秀發師事吕祖謙唐仲友極深性理之學以餘力為文輒擢慶元丙辰進士第弟子慕之從其學者歲至數百人初授福州長溪簿丁父憂而歸服除轉慶元府學教授秀發嘗著論語講義發越新意以誨諸弟子且曰聖門授業之源無過此書然義理無窮倘一切沿襲舊説吾心終無所得若欲見諸行事是猶假他人之器以為用用之於已且惴惴焉不以為便况欲假人乎哉時鉅儒樓鑰史彌鞏婁昉鄭性之楊蕳袁燮皆器秀發與之交而於蕳問難尤切每至日昃忘食蕳自謂有所啓發得邊詹顧葉四子為喜葉盖指秀發也秩滿關陞循從政郎建寧府政和令丁母憂服闋調安慶府桐城丞金人犯蘄黄二州桐城為鄰壤萬目睽睽不相保騎兵將迫家人號泣求避秀發叱之曰此正臣子竭力致身之日雖死何憾茍先去之如一邑生聚何脩城浚濠日為備禦計㑹金人使諜者至秀發擒之亟斬於城門以徇金人計沮不得近邑賴以完事定制閫忌其功不自已出上其擅斬非法降迪功郎未幾以敘改合入官授宣教郎知徽州休寧縣俄以前事論奪秀發退居餘十年無一毫觖望意獨憤李誠之之死上書頌于朝初誠之守蘄蘄陷一城士卒皆戰死無降者誠之亦望闕再拜㧞劒自剄議者不錄其忠反咎其不能全人故秀發不平而訟之言辭朗烈聞者嗟嘆史彌逺當國人有自桐城来者彌逺以秀發事為問其人厯言撫綏安定之詳且謂某等得保首領至今皆葉桐城之賜不然已無桐城久矣彌逺頷之從容問參知政事宣繒其言同彌逺嘆曰幾失賢矣即日起發擢知真州楊子縣轉奉議郎差監都進奏院越七日僉知髙郵軍髙郵為淮東繁治時尚繹騷弗寧秀發上五䇿一曰防海道二曰審邊城三曰擇武守四曰練軍實五曰畜財用而以正人心作士氣為之本言多聽髙沙三十六湖水髙而田下隄防不固則千里一壑民且無稼秀發建石埭以疏水勢瀦洩有恒無乾溢之病其後馬光祖来為守行埭上思秀發功建堂樊梁之隄以祠焉尋轉承議郎疾作上書乞致仕特陞朝奉郎已而疾甚力劾去貪墨吏人勸其何自苦如此秀發曰不可吾死後彼必殘吾民以逞同列来問疾整襟對坐惓惓以究心邊事為祝無他言其忠義出於天性至死不變如此紹定庚寅九月卒年七十卒之日唯遺書籍數篋弊衣一襲至無以為斂當屬纊時民夢秀發擁髙牙大纛入嶽祠民疑其為神遂肖像而祠其中云秀發夷險一節臨事唯可以義動不可以勢利刼澤物之心則若飢渴然居田里日有犯私鑄者縣令趙善琛欲重其刑而連坐之秀發曰刑一成而不變君子所盡心焉縱姦固失傷善亦豈為得哉善琛為之止有悍戾者日嗜鬬富人嫉之欲以嘯聚之名寘于法秀發白於郡守鄭如剛曰血氣之争則有之嘯聚則未之聞也民因得不死秀發卒後累贈朝議大夫學者尊之曰南坡先生所著書有易說周禮說論語講義及詩文行于世子夢擇孫振祖皆出仕能以清白世其家云賛曰濂嘗讀國學進士王若訥記秀發桐城斬諜事未嘗不流涕而嘆也當金人陷蘄士大夫析圭儋爵者或納欵賣降之不暇有若秀發者官僅一丞耳則不顧妻子嬰城固守法宜在所褒嘉顧以擅斬而罪之果何道耶譬有丈夫焉居深山中盜欲舞刀劒敓其財先遣游偵以察虚實其𨽻怒殺偵者丈夫乃不責盜而責𨽻可乎不可也國之政如此將何以致乎治耶宋自是而微矣嗚呼自古當季世變白為黒倒上為下若斯之類甚衆人所不能堪而秀發安之抑賢矣哉喻偘傳喻偘字伯經義烏人其從祖良能與兄良倚同入太學又同登紹興丁丑進士第其季良弼亦太學生晚以特科補新喻尉皆以文學稱而良能最知名偘蚤從良弼學繼受經於永康陳亮復由太學諸生登慶元己未進士第調宣城尉有境外盜狙入尉界内偘立執之歸于府府帥臣丘崈異之乃立所由尉庭下曰盜逃出境尉不執闌入境他尉乃執邪所由尉震恐開禧丙寅金人犯淮府檄令尉二人餉軍由厯陽達鍾離鍾離乃敵衝要法當以重兵䕶糧䕶不滿千人令畏縮不敢前偘奮不顧難諭鄉長老召募足千數即行道經含山有敗兵回揚言于衆曰我曹潰矣將以糧資敵乎弗去懼殱耳民愕視亡䇿將逃偘曰事急矣乃命弓率執大斧而前曰設遇敵尉必先死職也終不負國汝未必死乃負尉耶欲去視吾斧民不敢動卒致饋于濠糧有羨衆謂尉宜得偘悉歸于公府遷慶元府觀察推官丁父憂不赴調隆興府觀察推官真德秀来為帥素知偘能文見偘與屬吏迎道左為之改容思論薦之未薦德秀去偘乃以選入為宜春丞宜春地接贛吉吏珥筆成風民善訟偘為人怦怦諒直聽必以情民退無後言凡訴臺部者必曰得宜春丞一聽死無憾居久之由承直郎改奉議郎僉書鎮南軍節度判官聽公事改章服尋陞朝奉郎初偘久從諸老游幕中多新進少年議論雅不合偘嘆曰吾髮已種種寧能與翩翩小兒較短長哉遂請祠而歸築室夫人峰下曰蘆隠若將終焉嘉熙丁酉九月年八十四卒子二人宣子武子偘性豪談論今古輒目光如炬氣軒軒出鼻􅝉間人莫能抗尤長於文辭通直郎杜㳺嘗稱之曰質而不俚華而不靡憤而不激怨而不懟不以食膾炙為美澹乎其有味不以刺文繡為工黯乎其有光其感時念故推物類情抑揚離合必窮其源以揚其波其不合於律者鮮矣君子以為知言當乾道淳熙間朱熹吕祖謙陸九淵張栻四君子皆談性命而闢功利學者各守其師説截然不可犯陳亮倔起其傍獨以為不然且謂性命之微子貢不得而聞吾夫子之所罕言後生小子與之談之不置殆多乎哉禹無功何以成六府乾無利無以具四德如之何其可廢也於是推尋孔孟之志六經之旨諸子百家分析聚散之故然後知聖賢經理世故與三才並立而不廢者皆皇帝王霸之大畧明白簡大坦然易行人多疑其説而未信偘獨出為諸生倡布磔綱紀發為詞章扶持而左右之使亮之門惡聲不入于耳髙名出諸老上皆偘之功也已而亮為世議所扼當路必欲擠之死地凢再下詔獄偘與同志生極力營解幾陷羅織遂脫亮於萬死一生之中亮顧偘曰生死而肉骨也人多義之偘所著有隨見類錄二百卷蘆隠類藳五十巻首論六經之功用云從弟南强南强字伯强自幼負竒氣父直方以與陳亮類俾從之㳺時著錄牒者嵗數千百人南强周旋其間獨能探深索隠語移日精鋭鋒起亮曰喻伯强文墨翰議凜然可畏也慶元乙卯戊午連貢于鄉未幾入太學中監舉月書率占前列上禮部皆不得第嘉定庚辰俛奉南廊對授邊功部臨安府富陽縣尉轉脩職郎南强創射樓補闕卒額時其練習春秋則都肄府中徽幟精明行列整肅夐出他縣上縣民譚甲與丘乙鬨譚女以癎死誣丘驚跌所致挾王丙為左縣以命南强南强召譚與王列于庭且詰譚曰汝以病死女誣人汝不吐實將坐汝譚色動顧謂王曰汝嗾我也亟袖案白上言抵譚罪境内多盜販舳艫尾相銜不絶徼卒與豪猾為市弗可敗南强一切禁捕雖犯權勢貽怨讟弗懼也寳慶初禮部侍郎真德秀以言事去廟堂風京尹跡其所至欲並以為罪德秀舟過富春江南强亟見且賦詩為餞人皆壯之轉承直郎處州縉雲丞未上紹定庚寅三月卒年七十一南强讀書不為口耳學必欲見之實踐每至名義可喜事擊節慷慨謂戾契可致初當路欲排善類指陳亮為根煅煉刺骨罪且不測門人畏其威焰噤不敢出聲南强義形辭色貽書誚責言先生無辜受罪將賫恨入土吾曹為弟子當怒髮衝冠乃影響昧昧是得為士類邪復走東甌見葉適備陳寃狀適曰子真義士也即秉燭為作書數通南强又持走越袖見諸臺官誦言無忌卒直亮之寃南强為人不立崖岸而見義勇為聞朝廷行一善政輒昂首吐氣或有司苛虐彈指長吁終日不樂暇時旅肴設醴與賔友握手劇談日至再三不倦為文善馳騁下筆輒數千言不繩削而自合大篇短章恣人取去往往不甚愛惜惟梅隠筆談十四巻尚存子二厚祖埜埜業進士賛曰自道廢民散師弟子之義缺平居則繆為恭敬視其影或不敢踐一逢患難輒反目若不相識然甚者至更名他師使偘與南强見之必將唾去之矣傳曰民生於三事之如一唯其所在則致死焉其偘與强之謂乎樓大年傳樓大年字元齡義烏竹山里人父伯寛由太學入官授江陰縣尉轉知無為軍襄安鎮以終大年從鄉先生徐傐㳺傐實朱子弟子故大年長於性命之學登嘉定癸未進士第調迪功郎池州青陽縣尉丁内外艱服除監嘉興府袁部鹽場尋知嘉興青龍鎮該慶壽恩循從事郎嚴州遂安縣令差兩浙西路提刑司幹辦公事兩易監行在㑹子庫同列以侵欺被劾唯大年獨免改宣教郎知隆興府南昌縣為治先教化建利去病若嗜欲然縣民夜行為讎家毆死事覺賂其甥来就辟甥自陳殺民狀甚悉大年疑之亟命丞往驗丞受賕使焚屍以滅迹大年怒聞于府屬錄事覆實錄事復受賕如丞大年正色抗辨錄事為引去上之憲臺令觀察推官重讞事始白民敬之生為立祠遷奉議郎通判吉州提㸃刑獄李迪以大年㢘慎命錄一道滯囚大年隨重輕而疏裁之抱成案就迪言咸聽未幾攝郡事江東大姓查氏以父遺書據幼弟資産幾六十萬弟長訴之縣州厯二十年不解迪曰非清白吏如大年者不足以究此以其事下大年舉張詠決子婿争財故事為例命歸其弟人以為允嵗終吏以公帑錢粟羨餘来白曰此公券内物前官具有例大年斥之以助軍餉及周宗室之囏厄者皆舉手加額而退換承議郎領户部犒賞所主管文字尋陞朝奉郎寳祐甲寅三月卒于官年七十子一人三畏大年襟度灑落如晴空皎月一塵不染然在官洞察民隠脱有理未安者必反覆沈思終夜不寐所見一定屹如砥柱不移雖壓以權貴人之勢弗回也及解印綬去攀轅卧轍者綿亘十餘里或者以為無愧古循吏云初理宗降訓㢘謹刑二詔大年摭古之可法戒者二百事疏之號銘心偶錄藏于家賛曰濂嘗過竹山問大年子孫無恙獲拜其遺像癯然一儒者爾而其剛烈之氣則常信於萬物之上人果可以貌取之哉自夫道學不明士喪其所守雖以魁梧竒偉之夫考其行事脂韋自媚如女婦之留髯鬛也其視大年何如哉大年受學徐傐與聞濂洛關閩之學其所養充矣此所以夐然獨異也學之所繫於人者有如是哉許子良傳許子良字肖説東陽人姿稟卓犖幼誦書一覽通大義及壯馳騁經史精文辭尤長於科目之學抽關啓鑰得言外意生徒欣欣從之旬月間輒知為文肯綮嘉定丙子以詩賦魁江東漕司試禮部不利嘉熙戊戌始登進士第年已五十餘矣調餘姚簿未上用宰相喬行簡薦監鎮江西酒庫前此贏羨率自入子良不納一札以上歸公家官吏相顧駭嘆淮東轉運司辟主管帳司瀕江有蘆場三十里所民資其利守邊吏議清野欲悉削去子良諌之止遷知晉陵縣版籍紛亂官賦多放失諸司督逋急如雷電吏竄匿殆盡前令以不良去子良為稽逃亡考隠漏催科定繇條緒粲然沿江制置司辟準備差遣俄監安溪酒庫改宣教郎知都昌縣庫藏赤立子良節縮浮冗兩年之間供輸遂有餘豪右設詭名以欺租賦莫敢何問子良列其主名揭于市復從而一之豪右慙憤陰圖中子良無隙可乗而止沿江制置司辟幹辦公事轉承議郎通判和州改江州差幹辦行在諸司糧料院子良當輪對不欲立異惟取廷臣所言有關天命人心之大者重陳之不汎不激上為首肯再三未幾有㫖俾閲滯獄八十餘子良為繙案一一讞之雖累歲不引決者一旦曲直皆白進太學博士請外出知饒州以臺疏罷主管成都府玉局觀磨勘轉朝奉郎知岳州復轉朝散郎改知台州弊蠧相仍負上供錢三百餘萬子良節縮如都昌凡典例所宜得者亦謝去居半載郡計裕如子良聽訟據案與兩造相爾汝以察其情情既得即決遣之吏袖手旁睨具文書而已同僚與吏無所容其私皆忌之吏白每歲以錢折米二萬斛子良又不許而禁卒有不便者於是嗾其毆獄吏以撼之且相與出危言子良知墮其計即委印出關去事上降兩官賈似道開閫荆湖辟主管機宜文字且為辨其非辜敘朝散郎事有難處他人不能寘筆者經子良議定人無異辭景定庚申三月卒于沔川年七十五子良翛然如鶴風致孤鶱性清介不同俗與人交極尚風義赴急扶顛斧鉞在前弗暇顧然剛腸嫉惡或面折至發赤世多樂軟媚見其論議激烈望風嚴憚不知其襟懐夷坦無纎芥含茹意居官務抑豪强凢武斷於鄉者悉刑之事其長懇懇欲納忠縱嬰其怒不避知都昌日方岳来為郡岳面目嚴冷人不敢仰視子良數為抗辨且曰侯自我得之自我失之雖獲罪無恨岳初怒甚已而察子良忠亮反剡薦之子良生平奉養甚儉雖列膴仕蕭然如寒士客至啜茗清談飢則煮餅而已子良子四人伯繼仲立最良賛曰黄夢炎有云子良之為人其平如砥其直如弦其堅剛如百鍊金其孤峭如危壁千仞江萬里亦云蒼古勁嶷不知四方復有何人文學政事當推子良為第一呉子良亦云鏡明而衡平子良以之無愧於清白吏王萬者也子良何以得此於人哉非真卓然有立合於詩之柔不茹剛不吐者未必能致於斯也嗚呼賢哉或者以子良從似道辟為白璧蒼蠅之玷知人之道帝堯亦難之而顧以此尤子良邪其求全也甚矣葉由庚傳葉由庚字成父義烏人伯祖維芑祖維休連擢進士第父蓁字實之以世科累遷太常寺主簿輪對言中書政本宜清心正已以求賢為務時宰不樂改軍器監丞差知荆門軍建堡栅開溝洫蒐練民兵人思奮厲㑹京西帥幕建議築城東蒙兩山之巔蓁以山無水泉且非敵路條其不便者六制置使趙方主先入之説不從蓁嘆曰敝民誤國寧有避耳遂解印綬去有旨除䕫路轉運判官俄復予祠尋差知武岡軍未上而卒由庚生而口吃嗜讀書從周大亨習春秋為舉子業試有司不中遂絶意進取時丹溪徐傐倡明考亭朱子之學四方人士多集其門由庚執經從之傐授以中誠仁命性心六字之説由庚早夜磨礪探窮經旨驗之於躬行期凝合而無間傐謂人曰成父從傐最久静愿無他好講學意趣殊深吾道為有所託矣遂以通名其齋居且戒之曰心體之流行即天運之流行也無乎不通而塞之人其物矣由庚佩之終身金華何基王栢皆宗朱子學次第相傳逺有端緒皆慕由庚造詣真切相與貽書辨析至無虚月基疑周子太極圖補先天圖之未備其辭多云云由庚則曰太極圖與先天圖實相表裏固不待預見先天圖而暗與之合先天有圖其辭已具於大傳説卦中亦不待邵子别為論議而後明况先天乃伏羲所圖無非法象自然之妙太極乃周子自出心思擬形畫象而為之者先天圗當作先天圖觀之太極圖當作太極圖觀之圖雖不同而其理則未嘗不一也若曰周子之為圖盡在於修之一言使學者可以用功謂之隨時立教至是益備則可耳切不可謂陰有以補先天圖之未備也先天圖自太極生兩儀加倍而為四八以至于六十四左自一陽而六陽右自一陰而六陰自然生生不窮皆是天地本然之妙太極圖止於四象以為火水木金即其中以為土説至五行輒止各有其義未易優劣正不必將先天圗比並參較也栢以論語屬詞聨事集為魯經章句而以大學中庸孟子為之傳已整比成巻質之由庚由庚則又曰記錄之書非經體也移易固未為不可第論語乃孔子之微言與他記錄者實殊非可以緒分類合也南軒張子以程子之意類聚孔孟言仁朱子猶恐長學者欲速好徑之心滋入耳出口之弊又况孔子之言誠有不可破壊者以今第一巻首條子温而厲威而不猛恭而安類為夫子出處若入門人記孔子德容之盛未為不可第二巻首條堯曰至公則説乃弟子於終篇特記聖學之傳以著明二十篇之大旨與孟子篇終厯敘道統同一意亦恐不但思古傷今而已也今欲尊四書為魯經唯以孔子格言大訓與問答之語為經門人所自言及子思孟子之書為傳則庶幾爾夫欲尊之曰經者以其大公至正為萬世常行之道不可下同諸子並稱不必類合而經始尊也基栢皆深服其言由庚於講切義理不立異不茍同虚已精索必求真是之歸雖十往返不厭然其為人端重寡言笑燕居謹獨盛服不去身暑月則冠雲巾衣素紗深衣終日澄坐四時之祭豫戒内外祗事具饌必豐潔㝠幣必署名封識如期行事命弟子為儐賛奠獻告廟成徹俎而退則以餕餘饗宗人若冠若昏䘮亦皆遵朱子家禮問道考德者户外之屨常滿其誨學者曰古之人知行並進聞一善言見一善行未之能行唯恐有聞若纒蔽於文字間待其知至而後行是終無可行之日也人以為名言縣大夫過門問政多以謹義利之辨及視民如傷告之邑民陰被其賜部使者蔡抗及郡守趙汝騰趙孟傅先後具書幣請由庚攝麗澤書院山長雖皆力辭而名聞益顯婦人女子亦知其為脩身踐行之士也前至元己卯五月年七十八卒無子以族子遐孫為後平生不務著書雖研濂洛諸家之説以教人僅有論語纂遺若干巻詩文若干巻瘦叟自誌一巻藏于家賛曰婺傳朱子之學而得其真者何基則受經朱子之髙第弟子黄榦而黄栢則基之門人也至若徐傐親承指授於朱子而由庚從傐游者最久又盡得其説焉及傐既沒由庚與基栢遂以道學為東南倡評者謂基深潛沖澹得學之醇栢通睿絶識得學之明由庚精詳暢達得學之通考其一時化迪之盛入其室者殆如春風和氣之襲人從容一言之加輒晬面盎背而鄙吝為之消盡嗚呼何其盛哉九京可作濂當為執鞭焉呉思齊傳呉思齊字子善處之麗水人祖深有竒才永康陳亮以子妻之遂来家永康父邃武學博士官至朝散郎知廣德軍思齊少頴悟倣邃為古文即可誦季父國子監丞天澤器之悉授以所學遂用辭章家知名尋由任子入官監臨安府新城稅鎖㕔試漕司中舉上禮部不利後從常調為嘉興縣丞㑹令以言去攝縣事縣獄多留繫思齊坐獄户讞問凢株連疑罪悉簡出之死刑多平反事有檢覆得實郡首吏持之上下承望不敢動亟聞部使者黜之郡有盜殺其黨于貨獄蔓延不決下思齊議思齊曰盜攘盜貨與民殊科獄久不斷者由吏教囚以贓累民爾若正其殺人罪置寄贓不問則得矣慮囚者如其言民有育人之子者恒出入父母家一旦忽不知所往其父訟求之思齊召其母至庭一訊而情無隠卒白其事提㸃刑獄洪起畏辟思齊類曰吏或謂通籍可立致思齊曰斂怨以干祿非䇿之上也辭尋監户部犒賞酒庫起畏時守鎮江復檄入幕府起畏議築城思齊諌曰京口以長江為天塹城之何為即城徒厲民耳其役遂輟賈似道喪母上將以太常鹵簿臨其喪禮部侍郎文及翁欲上疏言懼禍且中止思齊曰叱嗟而母婢也公不可黙也未幾遷饒州節制司準備差遣監察御史俞浙以論謝堂出為太府少卿留夢炎當國言堂有勲籍浙劾之過思齊曰公宅百揆畏勢家而屈臺論天下其謂何似道丞相堂貴戚力能生殺人思齊以小官中其諱惡不虞宣泄人為危之而思齊弗顧也俄不願仕請監南嶽廟流寓桐廬婦翁方登嘗知饒州以思齊賢每謀以自近思齊不樂依婦勢避去性好施與兄弟孤女無歸者嫁之比鄰免女欲殺者食之死無以斂手足者棺之宦游十年田無半畮之増後值宋改物家益艱虞至無儋石之儲有勸之仕者輒謝曰譬猶處子業已嫁矣雖凍餓者不能更二夫也中遇寒疾耳失聽交游苦其聾語未畢馳去獨婺方鳳粤謝翺睦方壽劇談每至夜指畫手書傍觀咄咄而畧無倦意先墓在麗水不能數歸省歲時必遙望隕涕因自號全歸誓不失身以病父母也思齊天性真慤雖行人所難坦然不見崖異止知有是非不知有毁譽禍福學者尊其行争師之方鳳評思齊之為人如徐積陳思道君子不以為過大德辛丑年六十四手編聖賢順正考終之事曰俟命錄錄成賦詩别諸友遂卒臨卒神明湛然無怛化意所著書有左氏傳闕疑擬周公瑾平荆州碑魏司馬孚贊䟦杜詩集陳亮葉適二家文選又倣真德秀文章正宗輯宋一代詩文巻帙多未就子三人翼之拱之成之拱之蚤卒賛曰濂逰浦陽仙華山問思齊舊游處見其石壁題名尚隠隠可辨故老云思齊與方鳳謝翺無月不游游輒連日夜或酒酣氣鬱時每扶攜望天末慟哭至失聲而後返夫以氣節不羣之士相遇於殘山剰水間奈之何而弗悲若思齊者其知事君不以存亡貳其心者歟士有哀思齊者云睨碣石其如巻兮鉅海簸而不移其言信矣哉謝翺傳附謝翺字臯羽福之長溪人後徙建之浦城父鑰性至孝居母喪哀毁廬墓終身不仕通春秋著春秋衍義左氏辨證傳于時翺世其學試進士不中落魄漳泉二州倜儻有大節㑹丞相文天祥開府延平長揖軍門署諮事參軍聲􅏒梁楚間己復别去及宋亡天祥被執以死翺悲不能禁隻影行浙水東逢山川池榭雲嵐草木與所别處及其時號相類則徘徊顧盼失聲哭嚴有子陵臺孤絶千文時天凉風急翺挾酒以登設天祥主荒亭隅再拜跪伏酹畢號而慟者三復再拜起悲思不可遏乃以竹如意擊石作楚歌招之曰魂朝往兮何極暮来歸兮關水黒化為朱鳥兮有咮焉食歌闋竹石俱碎聞者為傷之然其志汗漫超越浩不可禦視世間事無足當其意者獨嗜佳山水鴈山鼎湖蛟門候濤沃州天姥野霞碧雞四明金華洞天搜竒抉祕所至即造游錄持以誇人若載七寳歸者游倦輒憩浦陽江源及睦之白雲邨尋隠者方鳳呉思齊晝夜吟詩不自休其詩直遡盛唐而上不作近代語卓卓有風人之餘文尤嶄㧞峭勁雷電恍惚出入風雨中當其執筆時瞑目遐思身與天地倛忘每語人曰用志不紛鬼神將通之其苦索多類此婺睦人士翕然從其學前至元甲午去家武林西湖上前代遺老尚多存者咸自詫見翺晚明年乙未以肺疾作而死年四十七瀕死屬其妻劉氏曰吾去鄉千里交遊惟方韶卿呉子善最親不翅兄弟慎收吾文及吾骨授之韶卿即鳳子善即思齊已而鳳等果至與方幼學方燾馮桂芳翁登登之弟衡葬翺子陵臺南以文藳殉伐石表之曰粤謝翺墓初翺以朋友道喪盡呉越無掛劍者思合同志氏名作許劍錄勒諸石未就復為建許劍亭於墓右從翺志也翺無子其徒呉貴祠之月泉書院云翺好脩抱獨刻厲憤激直欲起古人從之游不務譜於流俗意所不顧萬夫莫回也每慕屈平託興逺游自號晞髮子遇談勝國事輒悲鳴煩促涕泗潸然下士有茍合而氣志得者憎聞翺翺自若也所著手抄詩八巻雜文二十巻唐補傳一巻南史補帝紀賛一巻楚詞芳草圖譜一巻宋鐃歌鼓吹曲各一巻睦州山水人物古跡記一巻浦陽先民傳一巻天地間集五巻東坡夜雨句圖一巻浙東西游錄九巻餘倣秦楚之際月表作獨行傳及左氏傳續辨厯代詩譜皆未完所選唐韋柳諸家詩及東都五體詩不在集中賛曰翺一布衣爾未嘗有位于朝徒以被天祥之知麻衣繩屨章皇山澤間若無所庇其身使其食重祿受社稷民人之寄其能死守封疆決矣翺不負天祥肯負國哉翺盖天下之士也昔田横不降漢㧞劍自剄客之從死者五百人若翺之志其有類横之客者非邪吾聞諸任先生云楊氏家傳楊端其先太原人仕越之㑹稽遂為其郡望族後寓家京兆唐末南詔叛陷播州久弗能平僖宗乾符三年下詔募驍勇士將兵討之端夢神人告曰爾亟往此功名機也端與舅氏謝將軍詣長安上疏請行上慰而遣之行次蜀蠻諜知之斂退者半乃詣瀘州合江逕入白錦軍髙遙山據險立砦結土豪㬰蔣黄三氏為久駐計蠻出寇端出竒兵擊之大敗尋納欵結盟而退唐祚移於後梁端感憤發疾而卒子孫遂家於播宋贈太師太師生牧南既嗣世痛父業未成九溪十洞猶未服日夜憂憤其子部射逆其志選練將卒伐羅閩時閩附南射部射深入閩匿將士絶其後部射力戰死其子三公抱父尸不去閩執之以歸牧南卒三公幽于閩半載㑹阿永蠻酋長黒定與閩有連語之曰殺其父而囚其子人弗為也盍歸諸閩不答黒定怒夜以一牝馬竊載與俱歸且發兵納三公界上三公遣衛兵檄召謝巡檢謝帥夷獠逆之㑹濟江夷獠忽懐異志引舟岸北呼謝曰為我語若主當免我科賦否則吾不舟濟三公怒瞋目視舟嘘者三舟奔而前三公遂涉夷獠争持牛釃酒為謝三公翦帛繫獠頸吸水噀之帛或蛇形獠伏地哀祈誓輸賦不敢反三公復噀之帛如初三公生二子寳實寳當立自以才不逮讓與實實字真卿聞宋太祖受命即欲遣使者入貢㑹小火楊反新添族二部作亂實同謝巡檢討之夜薄賊營盡殱其衆實傷流矢病創而卒實生昭字子明既嗣世二弟先蟻各擁强兵先據白錦東遵義軍號下州蟻據白錦南近邑號揚州昭不能制曽未幾何蟻稱南衙將軍舉兵攻先且外結閩兵為助謝巡檢子都統謂昭之子貴遷曰蟻召仇讎而賊同氣罪不容于死盍討之遂大發兵設二覆於髙遙山要其歸而擊之閩大潰赴水死者數千蟻亡入閩貴遷太原人與端為同族其父充廣乃宋贈太師中書令業之曽孫鄚州刺史充本州防禦使延朗之子嘗持節廣西與昭通譜昭無子充廣輟貴遷為之後自是守播者皆業之子孫也貴遷字升叔慶厯皇祐間儂智髙亂邕貴遷曰通夜郎浮䍧牁出其不意擊之漢制南粤之竒䇿也吾當報國以自效即如瀘次于南川得暴疾將還其季父先使南川鉅族趙隆要殺之官至武功大夫德州刺史生三子光震光榮光明光震字長卿瀘南夷羅乞弟叛瀘遣使乞師光震督兵行時閩黨宋大郎與乞弟通遏其歸道光震與戰連七日不決遣帳卒王龍間道走播趣謝都統濟師謝至武婆山見二酋縱騎横槊馳騁若指麾其衆謝以勁弩射其一應弦而斃其一大憤㧞刃衝陣謝斫傷其首殺之即宋兄弟也二夷懼而退因不能為瀘患光震官至從義郎沿邊都巡檢使生五子文廣文真文錫文貴文宣文廣字敬德少孤仲父光榮潛謀簒立衆弗與光榮奔髙州欲藉蠻兵以危宗國文廣與部將謝石近謝成忠謀奉書幣逆光榮以歸事之如初光榮復欲陰鴆文廣文廣詭為不知愛敬日篤黄標儀盜發光震墓文廣捕斬之事連其弟理郭理郭奔髙州蠻謀作亂㑹老鷹砦獠穆族亦叛文廣命謝都統討夷之斬理郭戮穆獠釋其黨七人初西平猺視諸蠻尤桀黠難制文廣偕成忠夜入其栅擒獲之尋數其罪貸焉當文廣之時蠻獠為邊患楊氏先世所不能縻結者至是叛討服懐無復攜貳封疆闢而户口増矣年僅三十六而殁君子惜之官至武節大夫生三子惟聰惟吉惟佶惟聰字晦之七歲而孤育於母舅謝石近家石近以主少衆貳因奉光榮攝堡事光榮立日久益固位惟聰既長光榮深忌之寘毒魚中欲加害覺之弗食光榮復為送婦髙州紿與俱將殺於中塗謀洩弗果行光榮恚籍播州二縣地千七百里往獻于朝詔即其地建白錦堡加光榮禮賔使光榮還惟聰率部佐出迎光榮豫置毒于茗以俟𨽻人誤進光榮啜之即斃惟聰始親政光榮弟光明懟惟聰暮夜以兵刼之惟聰出禦光明敗奔蜀訴于部使者李獻誣惟聰謀不軌獻入其辭矯發南平諸寨兵入播惟聰憤懣不自勝大集兵拒戰敗其師事聞詔奪獻官進惟聰修武郎左班殿直賜金帶錦袍慰諭之光明因亡入閩而死居無何惟吉復作亂殺惟聰二子衆怒共誅之惟聰深懲家難禱于上下神祗誓曰世世子孫不可以權假人違此言者天實殛之惟聰復生二子選逡選字簡夫始立值徽欽二帝播遷髙宗南渡選慷慨負翼戴志務農練兵以待徵調士大夫韙之性嗜讀書擇名師授子經聞四方士有賢者輒厚幣羅致之歲以十百計益士房禹卿来市馬為夷人所刼轉鬻者至再選購出之遷於官館給食與衣者數載屬歲大比選厚餽遣徒衛送其還益竟登進士第逡貳於選謀入閩作亂選邑邑喪明而終官至武經郎生十有三子唯軫軾最良軫字德輿美髯長身狀貌瓌偉剛果勇決人服其能常病舊堡隘陋樂堡北二十里穆家川山水之佳徙治之是為湘江軫初無嗣鞠軾子粲為後晚生三子勲􅀢鼎以粲賢遂不易初議尤愛軾尋授軾堡政獨築室萬泉以終軫畜一虎馴服左右常駕以出游人異之官至秉義郎軾字德載沈静寛厚孝友無間言遇軫諸子不翅若已出初先據下州世治兵相攻凡七傳至煥軫之幕官猶泳從容白曰骨肉相殘澆薄之習也上下楊其初由一人而分干戈日夜相尋孰若講信脩睦復兄弟之親乎軾欣然曰吾有志久矣子為我往説之泳至下州煥頓顙受命遂盟而還軾留意藝文蜀士来依者愈衆結廬割田使安食之由是蠻荒子弟多讀書攻文土俗為之大變軾官至成忠郎累贈武節郎粲字文卿小字伯强幼授大學即掩巻嘆曰此非一部行程厯乎必涉厯之至乃可爾長好鼓琴投壺粲母弟煇有寵於父幾奪其位粲亦欲以位讓之因猶泳言得不廢開禧二年蜀帥呉曦叛粲帥師赴援㑹曦誅不果貢戰馬三百黄白金鉅萬且請因曦誅大舉北伐以雪先恥上優詔答焉嘉定十二年復輸馬三百於蜀帥蜀帥以聞上益嘉之南平夷穆永忠盜據公家田粲曰穆不道犯王畧吾為藩臣可緩其死耶帥衆討平之斬永忠歸其田南平閩酋偉桂弑父自立粲聲罪致討敗其衆於滇池斬首數千級闢地七百里獲羊牛鎧仗各以千計煥違盟鈔掠界上粲遣兵誅之歸煥所掠地賦於珍州下楊平邊患遂熄粲性孝友安儉素治政寛簡民便之復大修先廟建學養士作家訓十條曰盡臣節隆孝道守箕裘保疆土從儉約辨賢佞務平恕公好惡去奢華謹刑罰論者多之楊氏居播十三傳至粲始大官終武翼大夫累贈右武大夫吉州刺史左衛大將軍忠州防禦使賜廟忠烈封威毅侯生三子价佐佑价字善父英偉沈毅自少不羣父殁以郡政畀其子文專志養母端平中北兵犯蜀圍青野原价曰此主憂臣辱時也其可後乎乃移檄蜀閫請自效制置使趙彦訥以聞詔許之馳馬渡劍帥家世自贍之兵五千戍蜀口圍解价功居多詔授雄威軍都統制未幾復白錦堡為播州文領郡价統兵如故蜀警又急詔价以雄威軍戍䕫峽价分署所部屯瀘渝間遣竒兵擊東遂以捷多遷武功大夫閣門宣賛舍人嘉熙初制置使彭大雅鎮渝檄价赴援价督萬兵屯江南通蜀聲勢北兵不敢犯孟珙宣撫荆湘余玠制置兩蜀皆倚价為重上屢下詔褒美之价指天誓曰所不盡忠節以報上者有如皦日一日大飯羣僧价趺坐誦佛書數語而終价好學善屬文先是設科取士未及播价誦于朝而歳貢士三人云贈開府儀同三司威武寧武忠正軍節度使賜廟忠顯封威靈英烈侯文字全斌紹定中北兵始入劍文日閲士卒為備蜀中避地者多歸之嘉熙中北兵窺江彭大雅復来徵師价命禆將趙暹帥萬兵赴戰石洞峽擊破之以功轉武德郎閣門祗候父卒詔起文視事進武功大夫閣門宣賛舍人文移書余玠曰比年北師如蹈無人之境者由不能禦敵於門户故也曷移鎮利閬間經理三關為久駐謀此上計也今縱未能大舉擇諸路要險建城濠以為根柢此中計也下則保江自守縱敵去来耳况西畨部落已為北所誘勢必撓雪外以圖雲南由雲南以并吞蠻部闞邕廣窺沅靖則後門斡腹深可憂也玠偉其論竟徇中計後果如文言淳祐八年西帥俞興西征發兵五千人與俱大戰者三皆捷遷左衛大將軍余玠北伐漢中文命將趙寅會兵渝上三次戰又捷十二年北兵圍漢嘉文使總管田萬率兵五千間道赴之夜濟嘉江屯萬山必勝二堡萬以勁弩射之敵不能支遂却加右武大夫寳佑二年北兵由烏䝉渡馬湖入宣化宣撫使李曽伯来徵師文遣弟大聲統兵行大小九戰又捷轉左武大夫五年北兵循雲南將入播文馳奏詔節度使吕文德偕文入閩諭羣冦内屬冦黨勃先領衆降六年拜親衛大夫以解漁城圍翦烏江寇功加忠州團練使景定間劉雄飛夏貴守蜀復江安州餉禮義山戰懸壺平而播兵為多進中亮大夫和州防禦使播州沿邊安撫使爵播州伯食邑七百户詔雄威軍加御前二字以寵異之歲賜鹽帛給邊用著為令文留心文治建孔子廟以勵國民民從其化卒於咸淳元年贈金州觀察使元贈榮禄大夫同知樞宻院事柱國追封播國公諡崇德生二子邦憲字仲武倜儻有大節好書史善騎射始冠授成忠郎雄威軍副都統通管州事二年閩大舉入宼破立邊諸戍邦憲出師摳之閩敗却尋潛渡烏江步騎猝至民大駭邦憲部署諸將令曰必翦此寇而後朝食蠻聞急引退甫涉江邦憲追擊大敗閩衆於中沉斬首千級擒其首羅汝歸進武節大夫沿邊安撫使閩又悉兵寇下邑邦憲復敗之獲冦首阿鮓厯舉其罪狀而釋之閩自是懼不復出拜利州觀察使遷左金吾衛上將軍安逺軍承宣使牙牌節度使至元十二年宋亡元世祖遣使者詔邦憲内附邦憲捧詔三日哭奉表以播州珍州南平軍三州之地降十五年入朝詔襲守如故拜龍虎衛上將軍侍衛親軍都指揮使紹慶珍州南平等處沿邊宣撫使播州管内安撫使播下邑黄平壤近於荆地荆之戍將欲奪而南邦憲發其姦請復歸黄平十八年陞宣慰使十九年閩叛詔發諸道兵進討師道播而入邦憲給饋餉命將卒與之俱乃夷之累贈推忠效順功臣銀青榮祿大夫平章政事柱國追封播國公諡惠敏生一子漢英字熙載五齡而孤二十三年其母貞順夫人田氏挈之朝京師世祖摩其頂熟視良久諭宰臣曰是兒真國器也宜以父爵錫之賜名賽因不花授金虎符龍虎衛上將軍紹慶珍州南平等處沿邊宣慰使播州軍民安撫使賜金繒弓矢鞍勒遣歸二十四年族黨構亂殺貞順夫人漢英衰絰入奏上詔捕賊至益州戮以徇二十七年詔郡縣上計播之鄰境拒命漢英即括户口租稅籍進世祖大悦加播州等處管軍萬户二十八年漢英入朝奏罷順元宣慰司升播州安撫司為宣撫司授漢英軍民宣撫使㑹羅甸宣慰使斡羅思誘播下邑黄平諸寨長詐為新闢境土以獻漢英奏復之斡羅思恚不勝誣言舊有雄威忠勝二軍思播匿弗奏請籍征交州漢英抗言納土時已𨽻别籍矣御史臺審覈上之詔寢其事俄拜漢英侍衛親軍都指揮使成宗即位漢英入朝者三大德三年詔錫漢英世守其土漢英奏改南詔驛道分定雲以東地隸播西隸新部減郡縣冗員去屯丁糧三之一民大便之二年部蠻桑柘亂湖廣行省議用兵漢英言賊勢方盛宜招諭之不聽兵出久無功竟以漢英議始相繼降五年右丞劉深討南詔道出播漢英輦運軍食無乏六年閩婦蛇節宋隆濟叛詔合湖廣四川二省兵征之命漢英以民兵從甫出師卒遇賊漢英力戰大軍繼之降阿苴㧞乍籠賊復合拒竟大敗縛蛇節斬隆濟阿女而平之以功進資德大夫賜玉帶金鞍弧矢仁宗立顧禮益厚進勲上護軍増賜金帛延祐四年黄平南蠻蘆犇叛新部黎魯亦嘯刼聚亂詔漢英宣撫之二賊降置戍而還漢英為政急教化大治泮宫南北士来歸者衆皆量才用之喜讀濂洛書為詩文尚體要著明哲要覽九十巻桃溪内外集六十四巻賜推誠秉義功臣銀青榮祿大夫平章政事上柱國追封播國公諡忠宣其妻田氏亦善讀書人以為難能無子以弟播州招討安撫使如祖之子嘉貞嗣嘉貞至治二年来朝英宗賜名延禮不花累官資德大夫湖廣行省左丞沿邊宣撫使嘉貞卒子資德大夫播州軍民宣撫宣慰都指揮使忠彦嗣忠彦卒子資德大夫紹慶珍州南平等處沿邊宣慰使播州軍民安撫使侍衛親軍都指揮使元鼎嗣元鼎卒無子田氏以如祖季子嘉議大夫湖廣行省參知政事播州沿邊溪洞招討使城之子鏗嗣入我國朝鏗遣使内附授以播州宣慰使實洪武初年云史官曰播州本秦夜郎且蘭西南隅故地夷獠錯居時出為中國患楊端藉唐之威靈帥師深入遂據其土五傳至昭嗣子中絶而貴遷以同姓来為之後又三傳至文廣威讋德懐而羣蠻稽首聽命益有光於前人又三傳至選留意禮文尊賢下士荒服子弟皆知向學民風為之一變又二傳至粲封疆始大建學造士立家訓十條以遺子孫其子孫亦繩繩善繼尊尚伊洛之學言行相顧一如鄒魯之俗昔之争鬭􅐁攘之􅍔亦幾乎熄矣何其盛歟嗚呼楊氏以一姓相傳據有土地人民侈然如古之邦君由唐厯五季更宋涉元幾六百年穹官峻爵珪組照映亦豈偶然之故哉盖蒙詩書之澤涵濡惟深頗知忠藎報君之道或天有以相之歟楊文公大年所行貴遷之先人誥辭其中書令業則曰向事偽主當朕親征爰屬危機能傾丹欵其鄭州刺史延朗則曰奮身軒陛效命疆陲均甘苦而得士心袵金革而從王事以此觀之其功在國家澤被生民可謂厚矣世奕光榮而弗絶者雖本於天其亦有以也哉其亦有以也哉劉彬卿傳劉彬卿名文質彬卿其字也姓劉氏其逺祖仁贍仕南唐以忠節著子孫居袁者遷于豫章今為豫章人彬卿讀書不泥章句務在躬行年踰三十擔簦走燕都燕都貴人一見争相引重薦為太師國王府儒學正陞教授皆不赴除承懿寺照磨曽未幾何改繕工司照磨貢新麵上京彬卿旦夕視惟謹諸司同行者以入雨紅腐絓於吏議惟彬卿獨否帝與后妃太子皆賜之衣衣凡五襲人為彬卿榮彬卿曰吾敬君之道當爾也轉詹事院管勾府正司典簿壽福都總管府經厯中書左丞史克新戍遼陽時江南餉道絶各屯田以食軍士食且不給廷議欲徵其米五萬石人難之不敢往彬卿毅然請行初至軍有欲害之者彬卿色不變亹亹為陳利害衆咸感動卒致三千四百斛以歸博囉特穆爾以中書平章統兵鎮西京人畏其威不敢仰視彬卿持官書至左右索視之弗與遂辭不為通彬卿呼曰朝廷之命將委之草莽耶博囉聞之竟出見彬卿以官書進博囉視已謂彬卿曰可與幕府議之彬卿曰官書既達行與否在平章使臣何與焉趨而退博囉不敢强將宴留之彬卿曰使事已畢尚何留即日上馬去從事官皆餞之出郊嘆曰此真使者世盖不多見也府公俱徼僧賕僧愬御史臺臺臣問曰何獨無劉經厯邪僧曰經厯乃儒者理茍直不俟人言不然徒言之無益也且於我無所私焉敢誣之特授大司農司照磨宣政院聞之欲辟為屬弗能奪而止時官牛多掠於亂兵貧窶人無所訴富有力者反指以實口沒去牛羊失其租彬卿舍乗傳偽衣醫者服徒行民間㢘其實以聞徵富人租而優貧窶之家京南諸倉亡慮數十不以時入糧民告病彬卿馳驛察之既至紿驛吏曰吾將使江南耳因託故遲留徧詢倉之前後民盡得其情乃往揖倉使崔甲曰吾使臣爾願預坐隅以觀美政可乎崔不答彬卿遂坐與談倉中事崔忽拂衣起曰君知有使者事爾乃暇及此耶彬卿罵曰吾農官也吾不叩汝等誰復叩之汝即具文書来上倉中人皆吐舌相顧卒治崔如法逺近不待督而事集已而陞本司都事擢樞宻院都事俄復入都水監為丞陞少監階中順大夫彬卿性耿介不阿行事絶與流俗異初至燕客塔海平章家平章勸其納少室以奉巾櫛彬卿曰家有糟糠之妻相期至髮白肯中道棄之乎不聽其子時敏方幼一少年誘其馳馬竟跌死或語彬卿宜訟彬卿曰吾兒死生有定命可尤人耶經一晝夜忽自蘇後十二年補大宗正府譯曹掾一旦以疾卒彬卿召或者詰之曰此亦墮馬死耶國史掾萬生客死于燕妻子貧不能歸塟彬卿予錢二千緡俾奉柩還南昌御史大夫朶爾直班有忤相臣出為湖廣行省平章政事省署治武昌道梗未易達必經石頂關厯連雲棧過瞿塘灧澦出萬險而始至從事官皆散去獨彬卿留大夫曰吾國家老臣一死固當彬卿爾家貧爾當從此逝也彬卿曰士窮見節義正在今日大夫何為出此言邪及大夫沒又護其喪還檀州彬卿為人不避事茍使銜命而往雖萬里不辭凡出使即呼官錄其行槖且曰去時茍増其一即贓也尤善以形色言人吉㓙巧發竒中無毫髪差忒人有意問之輒固閉不答彬卿貌竒古眉毫長寸許雙目深其瞳閃閃照人黟南先生程文以道人劍客目之彬卿年七十餘今猶聞其騎青驢出入於豫章山中云史官曰嗚呼世道既降平日素號士大夫者恒脂韋自保秘孰有如彬卿之剛介者乎與人交也勢盛則趨勢衰則狐䑕竄望其門而畏之孰有如彬卿之不變其初者乎封殖自私汲汲恐或後視人顛連傾覆縱有耳若罔聞知孰有如彬卿惠及死喪者乎自它人言之如彬卿者可謂難矣而彬卿則曰此儒者恒事耳非難也嗚呼若彬卿者不亦君子之人也哉不亦君子之人也哉張中傳張中字景華臨川人也少習儒以春秋應進士舉不中遂放情山水厯遊江右諸郡遇異人授以太極數學談禍福多驗時天下大亂歸隠幕府山與人言避兵之方從之者吉違則㓙歲壬寅春正月上帥師下豫章御史大夫鄧愈侍上左右因薦中遣使者召至賜之坐問曰予定豫章兵不血刃市不易肆生民自此蘇息否中對曰未也旦夕此地當流血廬舍焚燬殆盡鐵柱觀亦化為灰燼惟一殿巋然存耳夏四月指揮使康泰反一如中言中自是寵遇有加且言國中大臣將有變上宜預防秋七月平章邵榮參政趙繼祖伏甲北門欲為亂事覺伏誅歲癸卯夏五月癸未上祭山川百神於覆舟山下問中曰此行何如中對曰吉天馬兩重似拜似舞祀畢上欲還馬忽人立作舞狀已而俯若拜是日中原贄名馬果符兩重之語中又言省署内當有震驚城中亦擾擾但於上無傷耳六月丁未忠勤樓災藥砲藏樓中遇火怒激如雷省署與樓連内外咸恐偽漢陳友諒圍我豫章三月不解秋七月癸酉上舉兵伐之召問中中對曰五十日當大勝亥子之日獲其首領其戰必在南康上因命中從行舟次孤山無風弗能進中曰臣頗習洞𤣥法當為祭之祭已風大作遂達彭蠡湖己丑戰湖中之康郎山常忠武王遇春深入虜舟數四圍之其勢甚危僉以為不可救中曰勿憂也亥時當自出如期果出連戰輒大勝偽呉王陳友仁及將士溺死者無算八月壬戌復大戰流屍蔽江陳友諒中飛矢卒癸亥降其衆五萬自癸酉至癸亥僅五旬唯南康與康郎山小異耳初豫章受圍上問何日圍解中對曰當在七月丙戌暨報至乃乙酉盖日官算厯是月當差一日實在丙戌解去其他竒中往往類此中為人狷介寡與人言嘗戴鐵冠人因號曰鐵冠子云賛曰濂數與中游見其人類陽狂玩世者與之語稍涉倫理輒亂以他言竟莫測其故甲辰夏五月同列二博士有咈上意方杜門待罪中叩二人所生年捉筆作㸃㸃狀如計數者良久笑曰不逺復期在七月五日濂書而識之至六月之晦有旨令二人復官頗疑其術之未盡驗及獲見上謝則中所期也中之術亦異哉上嘗親疏十事命濂作傳藏金匱中後六年覩遺藳於故篋因繕錄之而并紀所識之事云胡長孺傳胡長孺字汲中婺州永康人當唐之季其先自天台来徙宋南渡後以進士科發身者十人持節分符先後相望曽祖桌日人人迪功郎欽州司法參軍脱畧豪雋輕貲急施人稱為鄭莊祖巖起嘉定甲戌進士朝奉郎知福州閩縣事卓行危論竒文瑰句端平嘉定士大夫皆以為不可及在江西幕府平贛州之難於指顧之頃全活數十萬人父居仁淳祐丁未進士朝散郎知台州軍州事文辭政事亦絶出於四方至長孺其學益大振九經諸史下逮百氏名墨縱横旁行敷落律令章程無不包羅而揆序之咸淳十年以任子入官監重慶府隔槽酒務兼總領湖廣軍馬錢糧所僉㕔與髙彭李湜梅應春等號南中八士聲聞赫然㑹宋亡退隠山林中至元中詔下求賢有司强起之至京師集賢院薦為翰林脩撰言忤執政改教授揚州秩滿遷建昌適錄事闕官檄長孺攝之時程楚公家氣燄熏灼即違法人不敢何問其樹外門侵官道長孺亟命撤之轉台州路寧海縣主簿歲丁未浙江大祲戊申復無麥民相枕死宣慰同知托歡察爾議行賑荒之令斂富人錢一百五十萬給之至縣以餘錢二十五萬屬長孺藏去乃行旁州長孺察其有乾沒意悉散於民閲月再至索其錢長孺抱成案進曰錢在是矣托歡察爾怒曰汝膽如山邪何所受命而敢無忌若此長孺曰民一日不食當有死者誠不及以聞然官書具在可徵也托歡察爾雖怒不敢問縣有銅巖惡少年狙伺其間恒出鈔道為過客患官不能禁長孺偽衣商人服令蒼頭負貨以從陰戒騶卒十人躡其後長孺至巖中人突出要之長孺方遜辭謝騶卒俄集皆成擒俾盡逮其黨寘於法夜行無虞民荷溺器糞田偶觸軍卒辰卒杖傷民且碎器而去竟不知主名民来訴長孺陽怒其誣卒械于市俾左右潛偵之向杖者過焉㦸手稱快執詣所𨽻杖而償其器羣嫗聚浮屠菴誦佛書為禳祈一嫗失其衣適長孺出鄉嫗訟之長孺以牟麥寘羣嫗合掌中命繞佛誦書如初長孺閉目叩齒作集神狀且曰吾使神監之矣盜衣者行數周麥當芽一嫗屢開掌視長孺指縛之還所竊衣長孺白事帥府歸吏言有姦事屢問弗伏者長孺曰此易易爾夜伏吏案下黎明出姦者訊之辭愈堅長孺佯謂令長曰頗聞國家有詔盍迎之叱隸卒縛姦者東西楹空縣而出庭無一人姦者相謂曰事至此死亦勿承行將解矣語畢吏唯而出姦者驚咸叩頭服罪永嘉民有弟質珠步揺於兄者贖焉兄妻愛之紿以亡於盜屢訟不獲且往告長孺長孺曰爾非吾民也去未幾治盜長孺嗾盜誣兄受步搖為贓逮兄赴官力辨數弗置長孺曰爾家信有是何謂誣耶兄倉皇曰有固有之乃弟所質者趣持至驗之呼其弟示曰得非爾家物乎弟曰然遂歸焉轉兩浙都轉運鹽使司長山場鹽司進階將仕郎未上以病辭不復仕長孺為人光明宏偉務為明本心之學慨然以孟子自許唯恐斯道之失其傳誘引不倦一時學之有如飢渇之於食飲方嶽大臣與郡守二千石聘致庠序敷繹經義環聽者數百人長孺為言人雖最靈與物同産初無二本皆躍躍然興起至有太息者為辭章有精魄金舂玉撞一發其和平之音海内来求者如購拱璧碑板焜煌照耀四裔鄉闈取士屢司文衡貴實賤華文風為之一變晚寓武林病喘上氣者頗久一旦具酒食與比鄰别云將返故鄉門人有識其微意者問曰先生精神不衰何為遽欲觀化乎長孺曰精神與死生初無相涉也就寢至夜半喘忽止其子駒排户視之則正衣冠坐逝矣年七十五所著書多亡逸唯石塘文稾五十巻行于世其從兄之綱之純皆以經術文學名之綱字仍仲嘗作薦書其於聲音字畫之説自言獨造其妙惜其書不傳之純字穆仲咸淳甲戌進士踐履如古獨行者文尤明潔可誦人號之為三胡云賛曰長孺之學出於國子正青田余學古學古師順齊處士同邑王夢松夢松事龍泉葉文脩公味道味道則徽國公朱子之弟子也考其淵源亦有所自哉初長孺既於學古獲聞伊洛正學及行四方益訪求其旨始信涵養用敬為最切黙存静觀超然自得晚年深慕陸九淵為人宇宙即吾心之言諄諄為學者誦之今其説猶在安得豪傑者興而正其異同哉王秉彛傳秉彛名德良和州人姓王氏王氏出江左故望胄也秉彛為人龎博而堅凝鈎經索史智識過人數級當衆議膠葛更端猶尋前緒秉彛從容墜片言輒懌然從以故士君子恒歸往之秉彛亦樂與盤旋燕享之禮必極水陸珍脆酣嬉淋漓不知日之將夕間徜徉竒山水中見巖姿川容絪緼来獻狀情思烻烻然曰精聚神㑹吾殆與之無間豈古人所謂烟霞痼疾也邪勸之仕笑不答或云是有道者也或云是夫也良其才可用世肥遯盖將免乎秉彛皆棄弗省自壬辰兵亂秉彛崎嶇戎馬間雖窘迫甚幸得不死仰天誓曰吾力茍可生人雖百至凍餒不恤也道遇羣卒縛一男子且行且榜笞之叱曰不予金當就烹秉彛視之鄉人也輟白金二斤贖之出京口軍帥有享秉彛者既謁入左廡倒懸一夫頭窣窣控地作乞命聲秉彛曰欲享賔而虐無辜吾食不下咽矣帥悟使釋豫章有夫婦避兵者夫死於溺婦苦風攣不能行秉彛為葬其夫藥婦疾至愈乃遣過廣德逢健兵反接萌隸以白刃摩其頸老嫗隨之啼秉彛呵曰子脱可殺獨不哀其母老乎解其接縱去行未及久又遘一婦腹未晬兒左手引埀髫童童有三兄纍纍相援泣游卒荷戈隨其後秉彛呼游卒止出酒飲之且讓曰子壯士也胡為殺婦人殺一婦人姑寘之奈殺其五子何曷舍諸游卒如其言及僑居金華一老儒来告曰吾不火食者信宿矣秉彛為之動容搜囷中得米二斛悉予之建藥區市中畜善藥以賑人急甚窶者不受其直由是秉彛樂善之稱聞四方秉彛曰是善名我遂以榜其堂江左及海右士咸作為辭章云史官曰僕嘗游建業泛大江過厯陽望八仙人山山雲矗起如車盖問張文昌舊隠處想在空翠杳靄間故老已盡人無能知者及歸金華與秉彛相見潛溪上衣冠偉然議論磊落有竒氣第流連山水間而志不自釋噫秉彛固厯陽産也豈即所謂隠者邪非邪吾衍傳吾衍字子行杭人也意氣簡傲不為公侯屈色常自比郭忠恕居生花坊一小樓客至僮輒止之通姓名使其登乃登㢘訪使徐琰一日来見衍從樓上呼曰此樓何敢當貴人登邪願明日謁謝使節琰素重衍笑而去生徒從衍游者常數十百人衍坐童子地上使冠者分畨下授之時出小青凉傘教之低昂作舞勢或對賔游談大噱解髪濡酒中為戲羣童皆肅容莫敢動衍左目眇又跛右足一俯一仰嫵媚可觀宛有晉宋間風致畜兩鐵如意日持弄之或倚樓吹洞簫數曲超然如忘世者性好譏侮文學士獨推服仇逺及胡之純長孺兄弟謂百年間所無有初衍年四十未娶買酒家女為妾至大三年秋或訟女嘗為己妻官為逮女母母死復逮母後夫夫主衍家㑹其偽劵事覺連及衍衍固弗知也邏卒辱衍南出數百步錄事張景亮識之叱曰是不知情何攝也即遣歸或有訴衍丞相府事下杭府治臘月未盡二日甲子衍持詩别仇逺竟去不知所之明年三月辛酉衛天隠以六壬筮之得亥子丑順流象曰是骨朽淵泥久矣多寳院僧故從衍學為詩聞其死哭甚哀招衍魂塟之西湖上衍通聲音律呂之學善傚李賀詩工隸書尤精於小篆其志不止秦唐二李間宛丘趙期頥以書名世得之衍者為多其所著書有尚書要畧聽𤣥造化集九歌譜十二月樂辭譜重正卦氣楚史檮杌晉文春秋道書援神契説文續解石鼓咀楚文音釋間中編竹素山房詩世多傳為説者曰衍之才髙矣使其能自貶以入繩墨則其所進孰敢抗之哉今所學僅若是固可尚也亦可悲也雖然衍亦竒士也夫抱甕子傳予嘗游括之少微山俯瞰四周如列屏障山之趾有隨地形髙下為蔬圃約二十畮凡可茹者咸藝焉傍列桃杏梨李諸樹時春氣方殷蔬苗怒長滿望皆翡翠色樹亦作紅白花繽紛間錯如張錦繡段心頗訝之曰是必有異因曳杖而降冉冉至其處氣象幽夐絶不聞雞犬聲遙望草廬一區隠約出竹陰間疑中有隠者亟前候之良久見一士戴椶葉冠身被紫褐裘抱甕出汲水灌畦予進問曰夫子何名曰山澤之民無所名也强之曰人以其抱甕也遂呼為抱甕子爾曰丈夫處世亦多術矣出則華軒結駟入則鐘鳴鼎食有志者輒能致之夫子恒營營逐逐於一甕間無乃自苦乎抱甕子忽囅然一笑指苔磴揖予坐寘甕于地嘆曰吾受血肉軀與人同豈不樂榮貴與人異哉顧念之頗熟百歲之間寧復幾何與其疆情而徇世寧若任真以自放也吾圃之西則九盤山山之巔宋州廨建焉側有烟雨樓當山雲初興景象萬態極可玩李鄴侯馬莊敏公嘗登之而感慨矣其東清溪觀秦賢良謫官而来亦游憩其上時坐鸎花亭賦詩而今竟安在哉非惟人隨流水而逝異日淩霄之崇構皆蕩為氛埃一凝竚間野草荒烟若愁思之不可禁世事往往類此是何足深道吾所以抱甕出入而弗辭也且當抱甕之時㗳然忘形志慮外絶精神内營目不見色耳不聞聲招之弗前麾之不驚委蛇容裔而萬物莫吾敢攖自以無愧於赫胥尊盧之民子以吾為逐逐營營不亦過歟曰然則灌畦亦有道乎曰有蔬性不欲燥燥則生意厄而不伸蔬性宜溼溼或過焉則氣傷而寖屈吾日夜調之燮之俾適夫厥中則芃然而秀嫣然而榮矣言訖抱甕而去予深味其言盖有道而隠者也所謂强情而徇世曷若任真而自放不幾於樂其天者歟所謂人物代謝而樓觀不能以存一俯仰間而感慨係之不幾於達人大觀者歟所謂抱甕有術心與耳目之官内而弗外不幾於守一不二者歟所謂藝蔬得中不使倚於一偏不幾於治民有政者歟疾起而追之抱甕子入竹陰間閉户髙卧扣之不見答若無聞者予憮然而退史官曰予既歸金華山日思抱甕子不少置及官南京見朝紳中貌有相肖者問其同列曰是豈括之灌畦者邪曰然曰奈何仕為曰去年應聘而起典儀晉王府轉官起曹翦剔浩穰聲望盖龎鬱云曰其氏名謂何曰此烏傷校官劉浩卿子也名彬其字為宗文予不覺嘆曰浩卿吾故人也其有賢子若此予不能知之可愧矣夫雖然宗文當元季政亂肥遯山林若將終身焉及逢有道之朝輒蹶然興起以力政著聞其得出處之正者矣向予意其為有道之士者果非過歟果非過歟使宗文非有道之士則長往山林而不返矣謂之賢也得乎因記問答之語為抱甕子傳王冕傳王冕者諸暨人七八歲時父命牧牛隴上竊入學舍聽諸生誦書聽已輒黙記暮歸忘其牛或牽牛来責蹊田父怒撻之已而復如初母曰兒癡如此曷不聽其所為冕因去依僧寺以居夜潛出坐佛膝上執䇿映長明燈讀之琅琅達旦佛像多土偶獰惡可怖冕小兒恬若不見安陽韓性聞而異之錄為弟子學遂為通儒性卒門人事冕如事性時冕父己卒即迎母入越城就養久之母思還故里冕買白牛駕母車自被古冠服隨車後鄉里小兒兢遮道訕笑冕亦笑著作郎李孝光欲薦之為府史冕罵曰吾有田可耕有書可讀肯朝夕抱案立庭下備奴使哉每居小樓上客至僮入報命之登乃登部使者行郡坐馬上求見拒之去去不百武冕倚樓長嘯使者聞之慚冕屢應進士舉不中歎曰此童子羞為者吾可溺是哉竟棄去買舟下東呉渡大江入淮楚厯覽名山川或遇竒才俠客談古豪傑事即呼酒共飲慷慨悲吟人斥為狂奴北游燕都館秘書卿泰不花家泰不花薦以館職冕曰公誠愚人哉不滿十年此中荆棘生矣何以祿仕為即日將南轅㑹其友武林盧生死灤陽惟兩幼女一僮留燕倀倀無所依冕知之不逺千里走灤陽取生遺骨且挈二女還生家冕既歸越復大言天下將亂時海内無事或斥冕為妄冕曰妄人非我誰當為妄哉乃攜妻孥隠於九里山種豆三畝粟倍之樹梅花千桃杏居其半芋一區薤韭各百本引水為池種魚千餘頭結茅廬三間自題為梅花屋嘗倣周廬著書一巻坐卧自隨祕不使人觀更深人寂輒挑燈朗諷既而撫巻曰吾未即死持此以遇明主伊呂事業不難致也當風日佳時操觚賦詩千百不休皆鵬鶱海怒讀者毛髮為聳人至不為賔主禮清談竟日不倦食至輒食都不必辭謝善畫梅不減楊補之求者肩背相望以繒幅短長為得米之差人譏之冕曰吾藉是以養口體豈好為人家作畫師哉未幾汝潁兵起一一如冕言皇帝取婺州將攻越物色得冕寘幕府授以諮議參軍一夕以病死冕狀貌魁偉美鬚髯磊落有大志不得少試以死君子惜之史官曰予受學城南時見孟寀言越有狂生當天大雪赤足上潛嶽峯四顧大呼曰遍天地間皆白玉合成使人心膽澄澈便欲仙去及入城戴大帽如簁穿曳地袍翩翩行兩袂軒翥譁笑溢市中予甚疑其人訪識者問之即冕也冕真怪民哉馬不覂駕不足以見其竒才冕亦類是夫鄭景彛傳鄭銘字景彛婺之浦江人世以孝義顯聞景彛自幼濡染之深卓然有以自立面目嚴毅不妄言笑人多敬畏之從父大和司家政察其為人可成逺大器聘鄉先生呉公萊為之師呉公授以春秋三傳之學發凢舉例㑹諸説而折衷之景彛即能領解其趣有所質問咸中肯綮呉公極鍾愛遂相親如父子金華胡君翰亦来從呉公逰景彛與之晝夜相摩切凢天地萬物之理内聖外王之道古今事㑹之變無不及之講覈既久精神發舒大肆其力於古文辭呉公品評至嚴一辭稍不脩輒以為詬病故景彛之文幅尺𢎞而體式備胡君之文意度宻而波瀾張皆煜煜有光于時云初景彛早喪父事母黄氏至孝飲食必慎擇以進黄氏嗜鰇魚雖卒不可得必徧求之以悦其意㑹有疾益思得魚已而獲魚芼以香糝上之疾遂瘳奉諸兄如嚴父進退執禮甚恭不命之坐不敢坐蓮塘張翁無子聞景彛賢而有文命為贅婿景彛能當翁意翁亦以客禮待之然翁頗木訥自重景彛亦自韜秘絶不與人交終日嘿嘿而坐或焚香以銷世慮既而彈指歎曰吾誦詩讀書亦頗有志於事功奈何鬱鬱久居此耶黄氏殁其志遂孤景彛居䘮盡禮出入必布裹鞍轡三年不御酒肉翁大享賔樂作景彛潛避去翁不懌或為解曰居䘮不聽樂其家法自當爾翁何怪耶翁自是不敢强翁既耄欲以貲産悉屬之景彛辭請以畀諸族子翁不可姑受其三之一翁之亡皆景彛塟埋之他受田者漠如也景彛之仲兄鉅殁以次當長其家哀痛弗忍請至終䘮羣從固請乃泣告外姑以歸籍所得翁之田廬歸于公復自念久居於外不親家事能荷負者莫如從子渭又宗子也遂為文告先祠讓之渭亦固辭因虚其席年六十二卒景彛臨事重然諾不茍於取與鮑溪水惡春漲多溺人景彛駕石橋其上潘氏子母老無養給其衣食終身人又稱景彛為惠人云史官曰濂聞浦陽鄭氏家九葉同居最多令子弟而授經者之師呉公先生又一時名士心極傾下之後十五年濂以非材来繼呉公後始得與景彛交徵諸所聞益信景彛出所作賦數首峻潔莊凝絶似其為人而他文辭亦稱濂方惜景彛之學未暴白于世且謂玉光劍氣終有不可掩者而景彛忽作土中人矣不亦悲夫濂與景彛暨胡君皆呉公門人胡君既銘景彛之墓濂亦不能無情遂述為小傳一通以傳嗚呼有才無命世之如景彛者不少寧不使濂重有所感乎樗散生傳樗散生者錢唐人李氏名詞字孟言少受學越人楊君廉夫負氣尚節善為詩賣藥金陵市中名其室曰樗亭而自號為樗散生市人病者趨其門買藥無不與所與必善人人談樗散生美不置口或問樗散生今人莫不願為材有寸誇尺有尺誇尋惟恐人不知己才不即用既用又恐不得大任以為戚今生乃以樗散自名樗不才木也生豈無才者耶何其嗜好與人不同也所惡乎樗者以其無用也今生脩善藥以活疢疾者有功於民甚博何為以樗自汚哉樗散生曰吾計之熟矣名之美者吾豈不欲居之然茍無實以稱之則名祗足為禍吾苟自以為可用彼將以有用者求我我或不足如其所求則為妄人矣吾今自以為樗彼亦從而樗我不虞我足用而我足用者固存何損於我乎世之受禍深者求名太切者也夫名虚器得之未必有益於身而與我競者齦口恨切齧也齗魚斤切齒根肉然欲奪之不亦危乎吾是以安焉而不敢務乎名也且吾之食者醫醫之書易知醫之技易學吾誠盡吾心焉疑於心者不敢强施於人薄於用者不敢厚責其報雖有不中庶可以無愧矣我誠肯自負吾才而享釡庾之祿豈皆不若乎人然吏胥操法而迫吾側民庶持牒而聒吾前吾心欲平之而力不暇欲施吾才而勢有不能則吾心之愧無時而釋矣豈若守易能之技居無用之名以自適哉於是問者謝之咸稱樗散生為知道者余聞於建安黄仁云史官曰樗散生之傳不虚矣生豈果知道者哉君子之道貴乎食焉而無愧吾觀世之人有愧者多矣生豈無見者乎孔子强漆雕開仕開自以為未信而不願為孔子悦之樗散生豈學漆雕開者耶然則謂生為知道豈不然耶或謂生慕樗以不才而壽彼莊生寓言生盖不取云李疑傳金陵之俗以逆旅為利旅至授一室僅可榻俛以出入曉鐘動起治他事遇夜始歸息盥濯水皆自具然月責錢數千否必詆誚致訟或疾病輒遣出病危氣息尚屬目睊睊未瞑即輿棄之而􅐁其貲婦孕將産者以為不祥擯不舍其少恩如此非其性固然地在輦轂下四方人至者衆其勢致爾也獨李疑以尚義名于其時疑字思問居通濟門外閭巷子弟執業造其家得粟以自給不足則以六物推人休咎固貧甚然獨好周人急金華范景淳吏吏部得疾無它子弟人殆之不肯舍杖踵疑門告曰我不幸被疾人莫舍我聞君義甚髙能假我一榻乎疑謝許諾延就坐汛除明爽室具床褥爐竈使寢息其中徵醫師視脈躬為煮糜煉藥旦暮執其手問所苦如事親戚既而疾滋甚不能起溲矢與屎同汙衾席臭穢不可近疑日為刮摩浣滌不少見顔面景淳流涕曰我累君矣恐不復生無以報厚德囊有黄白金四十餘兩在故逆旅邸願自取之疑曰患難相恤人理宜爾何以報為景淳曰君脱不取我死恐為它人得何益乎疑遂求其里人偕往攜以歸面發囊籍其數而封識之數日景淳竟死疑出私財買棺殯于城南聚寳山舉所封囊寄其里人家往書召其二子及二子至疑同發棺取囊按籍而還之二子以半饋却弗受反贐以貨遣歸平陽耿子㢘械逮至京師其妻孕將育衆拒門不納妻卧草中以號疑問故歸謂婦曰人孰無緩急安能以室廬自隨哉且人命至重倘育而為風露所感則母子俱死吾寧舍之而受禍何忍死其母子乎俾婦􅌽以歸産一男子疑命婦事之如疑事景淳踰月始辭去不取其報人用是多疑名士大夫咸喜與疑交見疑者皆曰善士善士疑讀書為文亦可觀嘗以儒舉辭不就然其行最著云太史氏曰吾與疑往来識其為人疑姁姁愿士非有竒偉壯烈之姿也而其所為事乃有古義勇風是豈可以外貌決人材智哉語曰舉世混濁清士乃見吾傷流俗之嗜利也傳其事以勸焉毛德𤣥傳毛聚德𤣥者萊之掖縣人也幼有異質事繼母秦盡孝里中嘗冦至衆驚走秦老不能行聚獨侍左右弗去冦問曰爾不畏死耶何為不避我也聚泣曰我老母在安敢自求活乎冦義之不忍犯父嘗病疫居崑嵛山中夜渴求酒山深多狼虎聚弗憚跣走出山乞得酒以還父飲而愈與兄弟分財恣其所取而受其棄遺者長兄塟柩將及壙訛言盜且至人懼欲奔匿聚曰兄柩在斯忍棄之以圖生卒掩壙而還再從母殯城隅人取其塼殆盡聚買地瘞之族女六人貧不能嫁聚出私財嫁之族中不克塟者十餘䘮聚皆為葬之歲食有餘粟則推以濟鄰里貸不償者則焚其券有客宿其舍旦遺錢數百緍而行聚徒步追五十里還之隣人耕侵其畔或以告聚聚曰寧知非彼地耶其居家待人無長幼皆以誠久而人咸信之稱為善士聚生二子蔚炳蔚生二子紘綖皆好學紘今由國子生為殿廷儀禮司序班與余孫慎同官相友善史官曰孝弟慈愛人性所發也寧係所習哉萊在東海上其俗從古號為難治禹貢春秋外之今去古二千載乃有毛君之行是烏可以習俗古今論耶語曰為善必有後毛君之善卓然可稱矣其子孫殆將有昌者邪桑仁卿傳桑惠字仁卿婺之武義人其先居麗水桑溪南渡後有景昭者始遷婺厯四世皆不墜書詩仁卿幼䘮父獨奉母居不能與人浮沈介然自守遇人則翼然恭未嘗往叩富兒門惟日夕訓諸子弟雞初號輒呼起懸燈誦書食時使從師或值雨淖親持盖候之還人笑其愚勸曰子貧若是甑將生塵矣何不學他技藝朝出門暮可即得錢讀書固佳其效乃如捕風耳仁卿笑曰信如子言吾家學將絶於吾手矣寧餓而死不能從也乃召其子以時謂曰此妄人耳其慎毋聽吾之貧由天於讀書何預哉策勵比前為尤急及見以時明經能文辭鄉校迎為學者師仁卿撫几自慶曰吾將有以見祖宗地下矣仁卿無所於食質田於里翁已而失其券乃以計紿仁卿至家使重書之或履其跗曰慎勿書翁券失矣翁券失矣仁卿歎曰吾實得錢言猶在耳而因失券負之為計固得矣如内愧何一里譁然稱曰桑仁卿其誠慤人哉未幾卒貧不能斂手足鄉人惜其賢裒錢以塟仁卿娶同縣人項寄瑗甚賢絶仁卿固安貧終日樵蘇不爨項無纎介見於容色澹然能相歡凍餒日不自免聞有佳書必掇所織布帛貿之使讀自時厥後以時以賢良徵主袁分宜之簿州里攜酒漿来賀曰仁卿夫婦不負教子今得官歸矣項曰得官不足榮能不負官斯為榮耳以時在分宜數督運萬里外兢兢自持無所遺失再轉為温州判官遣候人迎養將及門而卒今以三轉為䕫州府通判陞至某郎益用政事聞于時謂父母之善教云賛曰子弟不患無俊良非父母竭力教之終不能有成也有如仁卿忍貧教子至樵蘇不爨一不變其志澹如也卒能奮發有耀於前人則吾所謂父母不力教子子未必有成誰不謂然因作小傳以為世勸焉竹溪逸民傳竹溪逸民者幼治經長誦百家言造文蔚茂喜馳騁聲聞燁燁起薦紳間意功名可以赤手致忽抵掌于几曰人生百歲能幾旦暮所難遂者適意爾他尚何恤哉乃戴青霞冠披白鹿裘不復與塵事接所居近大溪篁竹翛翛然生當明月髙照水光瀲灧共月争清輝逸民輒腰短簫乗小舫蕩漾空明中簫聲挾秋氣為豪直入無際宛轉若龍鳴深泓絶可聽簫已逸民叩舷歌曰吹玉簫兮弄明月明月照兮頭成雪頭成雪兮將奈何白漚起兮衝素波人見之歎曰是誠世外人也欲常見且不可得况狎而近之乎性嗜鞠種之滿園顧視若孩嬰黄花一開獨引觴對酌日入不倦人讓其留物怒曰舉世無知我知我惟此花爾一息自怡尚可謂滯於物耶復愛梅梅孕緑萼微吐赤脚踏雪中若温見輒凝視移時目不瞬且大言曰知我者惟鞠鞠已謝我去幸汝梅繼之汝梅脱又謝去我當上白鶴山采五芝耳白鶴山盖溪上諸峰云逸民年五十益恬泊無所繫間私謂其友曰吾於世味愈孤矣將漁於山樵於水矣其友疑其誕逸民曰樵於水志豈在薪漁於山志豈在魚是無所利也無所利樂矣子以予果滯於梅與鞠耶君子以其語近道有類於古隠者相與傳其事逸民所未嘗言則無從知之矣逸民陳姓洄其名烏傷人史官曰昔者李白與孔巢父等六人隠居徂徕山世仰之以為不可狎近因號為竹溪六逸寥寥七百年後而逸民亦以竹溪自名若出一轍豈聞風而興起歟縱曰其地或殊人之衆獨有異髙風絶塵照映後先其安有不同者歟士之沈酣聲利而弗返者盖亦知所自警歟夫自范蔚宗著後漢書以隠逸登諸史傳厯代取法而莫之廢者其意又豈無所激歟雖然逸民之自為則善矣文憲集巻十
