body:
  text: 文憲集巻六明宋濂撰序凡三十三章皇明雅頌序皇明雅頌者鄱陽劉仔肩之所集也其曰雅頌者何雅者燕饗朝㑹之樂歌頌則美盛德告成功於神明者也今詩之體與雅頌不同矣猶襲其名者何體不同也而曰賦曰比曰興者其有不同乎同矣而謂體不同者何時有古今也時有古今也奈何今不得為古猶古不能為今也今古雖不同人情之發也人聲之宣也人文之成也則同而已矣然則曷為謂之同江河沼沚有不同也水則同陵巒岡阜有不同也土則同人動乎物有不同也感則同趨其同而舍其異是之謂大同曷為知其為大同期歸於道焉爾歸於道焉爾者何世之治聲之和也聲之和也奈何天聲和於上地聲和於下人聲和於中則體信達順至矣體信達順其亦有應乎曰有三秀榮朱雀見龜龍出騶虞至嘉禾生何往而非應也應則烏可已也烏可已則有作為雅頌被之弦歌薦之郊廟者矣是集之作其殆權輿者歟郊禋慶成詩序皇帝自登大寳主百神即有事於昊天上帝以仁祖淳皇帝配神作主於今五載弗懈益恭粤洪武壬子冬十一月辛酉長日至復遘其時前期丙辰上御奉天殿集臣工於庭告以誓命戊午出宿齋宫有司汜掃反土鄉為田燭各戒具修㒺敢弗肅及期行事百辟卿士後先駿奔牲牷肥腯圭幣温緻器用質雅酒齊苾芬樂舞具舉升煙上聞皇心内外質文兩盡上帝居歆福禄攸降既竣事禮部尚書陶凱工部尚書黄肅工部侍郎牛諒晉府㕘軍熊鼎磨勘司令吳雲兵部郎中劉崧工部主事周子諒秘書監丞陶誼晉府録事張孟兼呉府録事呉從善咸謂皇帝升中於天國之大典幸際熈明與於執豆籩之列不可無篇什以紀慶成昭示萬世遂以唐詩星臨萬戸動月傍九霄多為韻各賦詩一章而屬濂序之濂聞郊祀之禮始於有虞氏至周大備秦漢以來寖涉不經且惑於六天六帝之說莫之適從君國子民者亦罕能躬嚴祀事往往遣大臣攝之肆惟皇上一據禮經而洗千古之陋每歲親升㤗壇昭事上帝恪恭寅畏有赫其臨隂斂陽舒降甘風雨覃及寰宇物無疵癘行見鳯凰降而龜龍假矣聲歌之發兹非其時乎昔者周人之頌所謂昊天有成命者郊祀天地也思文者后稷配天也二詩辭氣奥宻卒未能曉然非卜商之序掲其宏綱後世何自而明之羣公之什優柔而雅馴整肅而泰豫足以美盛德形容而告於神明善言詩者謂其有得周人之微㫖所可愧者濂非卜商之識僣序作者之意君子其謂斯何雖然一代之成憲後王之所取法者其大槩亦頗著見於間云是歲十有二月甲戌朔金華宋濂謹序御賜甘露漿詩序洪武癸丑正月始和越四日丙午時加已皇上御武樓之便閣召御史中丞臣寧太子賛善大夫臣濂賜坐左右上談嘉祥之應勅中貴人取所儲膏露於宫中俄盛以翠甖跪進上前皆玉潔珠圎世所未覩已而詔舁爨器至用金杓煉水二升火既勻水勢成濤上起自龍帳中親啓甖以投須臾融化與水為一上取杓中瀉二内侍舉幕承之查滓已浄重漉以絳紗囊上飲一爵而分賜臣寧與臣濂焉且曰此天地至和所凝也卿等服之去沉痾而衍遐齡臣寧等跪飲其味甘如飴而弗膩其氣清於蘭而不豔一入口間神觀殊覺爽越飄飄然欲御風而行於是各奠爵於几頓首于地而退臣寧謂臣濂曰唐之李白召對金鑾殿𤣥宗調羮以賜方䇿尚載之以示後世矧今聖天子親挹天乳以沃近侍㣲臣共享二氣禎祥此𤣥黄覆持之恩不可忘也宜發為聲詩以彰君之賜臣濂伏聞王者有德上通於天嘉氣協應鴻羡滋播今甘露頻降大和坱圠民物敉寧洽於太康是皆一人有慶使臣庶永有攸賴方將涵育靈澤衣被上德惟思日孜孜以圖報為事皇上不自滿假錫釐羣臣霑丐天漿上昭靈貺此與黄帝出馬腦甕甘露頒賜百僚之意同誠非𤣥宗之所擬也盛德所覃接肌藏髓曠世竒逢豈容喑黙乃稽首再拜造詩一章以侈上之賜從而屬和者凡若干人録成一巻傳示萬世子孫荷天之休至於無疆云應制冬日詩序洪武二年冬十一月二十有二日上御外朝遣中貴人召翰林學士臣濂侍講學士臣素侍講學士臣同直學士臣經待制臣禕起居注臣觀臣琳列坐左右既而命大官進饌賜黄封酒飲之上屢命盡觴内官承上㫖監勸甚力臣濂數以弗勝盃酌固辭上笑曰卿但飲雖醉無傷也酒終上親御翰墨賦詩一章復繫小序於首命各以詩進臣濂最先臣禕次之臣觀臣琳臣經臣同又次之上覽之大悅臣素最後詩以民瘼為言上曰素終老成其有軫念蒼生之意乎於是各霑醉而退明日臣素以遭逢盛際光膺聖眷如此不可無以示後來乃集其詩為巻而以題辭為屬臣聞之在唐中世當夏日炎蒸君臣相與賦詩不過以日長為可愛涼生殿閣為足矜後代多譏之惟我皇上勵精圖治其於冬日沍寒之際形諸篇翰固不忘於聽政羣臣賡歌復以逸豫為戒憂勤為勸而弗敢後者其故何哉蓋唐虞在上無小無大孰不精白一心以承明德况於文學法從之臣職在獻替者乎揆之於唐初不可以同日而語也臣濂不佞庸敢以是序諸篇端上所賦詩别以金龍箋繕謄其副尊閣於家示不可褻也寄和右丞温德亨詩巻序有志之士豈無郷土之思哉昔者楚人鍾儀為晉所留晉侯與之琴遂操楚音越人莊舄仕於楚雖富貴矣乃嘗為越吟此無它不忘本也楚與越皆同中國也語言相通也嗜好弗殊也尚為之抑鬱發於音聲如此况在絶域去中國數千里者哉宜其見諸咏歌而不能自已也右轄温德亨公居於汴梁資稟素美嘗從恕齋班先生學為詞章久㳺淮海元季亦躋膴仕隨冡宰逺行遂留西域今見天朝使者至不勝君王之思舊嘗賦絶句以寄治書瑣納兒加繼作唐律一章獻丞相胡公其憂深思逺若不能勝情者想其親屬暌離莽無一人四顧蕭條與影為侣極目之頃但見獵獵胡沙茫茫塞草而已右轄必慨然曰吾素居江淮錦繡城中聚族共樂者為何如耶賓朋離索誰可與接語言不通食飲異好側耳而聽但聞侏􅍣之音啁哳之歌而已右轄又必長歎曰吾昔在中朝文物府中更唱疊和者為何如耶此所以發於性情而形諸言者悽愴寥落讀之令人淚下霑襟也較莊舄之越吟其情實過之茍寫於琴未知與鍾儀又孰後孰先也丞相察其情以詩上聞皇上覽之尤憐其志之不能遂也惻然有動於聖衷勅丞相御史大夫而下咸屬而和之且連巻軸詔翰林侍講學士宋濂為之序濂仰惟聖皇臨御德被六合凡日月所照霜露所墜無不欲遂其生成然猶夙夜孜孜上法唐虞三代之治唯恐一夫不獲其所况如右轄實有志之士所以簡在上心實為尤切右轄宜益堅乃心敷揚聖化使西域之民皆知仰慕中華文物禮樂之盛相率來歸亦未為晚也他日拜舞龍墀之下殊恩異渥必將便蕃而至退而與親朋胥㑹以叙離合之情庶幾重覩天日以享承平之福當此時發於性情無非雅頌正音以歌咏朝廷之盛德其視向日憂深思逺之作霄壤不侔矣右轄勉乎哉右轄勉乎哉洪武八年十月壬辰具官宋濂序春日賞海棠花詩序春氣和煦海棠名花競放浦陽鄭太常仲舒開宴觴客於衆芳園時日已西没乃列燭花枝上花既娟好而燭光映之愈致其妍於是衆賔咸悅銜盃咏詩亹亹不自休酒半酣金華宋濂乃揚言曰李格非書洛陽名園記後謂園圃之興廢為天下盛衰之候其故何繇憶昔烽火之際冒雨風竄匿巖穴聞人歩履聲心怔忡若舂花草紅青何處無之有目不暇顧欲求濁醪一巵以澆渴吻尚可得邪今者衣冠雍容倡酬於爼豆間花雖不解言亦散影婆娑若相與為娯樂者不知何自而致之亦曰聖天子在上廓清四海化呻吟為謳歌所以有斯樂爾帝力所被如天開日明萬物熈熈皆有春意其視昔日之事為何如世道之盛其兆已見茍不能詩則止能則烏可已也雖然經有之無已太康職思其居吾儕今夕無乃過於太康矣乎宜知好樂之無荒而為良士之瞿瞿可也所賦詩自太常君而下凡三十人其三則賓客餘皆其君昆弟子姓云望雲圗詩序思親望雲圖者為福建承宣布政司右㕘政唐公作也公名俊字士明念親之不見日遑遑焉而求昧昧焉而思終無以宣其情圖之所以志之也間以書致辭於濂曰俊之先為睢陽人金季兵亂大父避地南陽遂家焉大父生三男子而先君居其二先君諱德謙蔚為才行之士元至正中汝潁大盜起先君棄捐諸孤窀穸之事甫畢而南陽陷矣俊時在童孺亟隨母夫人陳氏出避晝伏宵行至魯山匿焉未幾魯山又烽火連天竟失母夫人所在家屬亦東西作風雨散去俊㷀㷀無依朝夕嗚嗚泣曰哀哉吾母其存乎亡乎茍亡矣遺骸將何人瘞之乎然河南逹鄉里為近吾當忍死往而訪之乎於是間關晨走河南竄身兵籍中逢故時父老問之自南陽來者又問之有出入軍中者又問之如是者六年心勦形療竟莫可蹤跡復嗚嗚泣曰哀哉吾母豈果遂亡矣乎母既不可見何如勿生之為愈乎已而私自念宗系之不絶者一綫爾茍先朝露而自棄祀事將墜幾不為若敖氏之餒鬼乎宜擇真主而事之一旦獲見天日雖不得奉母嵗時持一盃酒走酹墳上土比之徒死不翅霄淵之殊此志或可自遂乎當是時大明皇帝定鼎金陵德綏威讋萬方嚮化俊乃間道内附期厠名行伍中以茍全性命而已宸衷見憐視之如舊臣賜以厚禄寵以名爵使再造其家室自兵馬副指揮入轉而至今官階躋二品此平昔夢寐之所不到俊每念聖徳如天無際而父母不得同與恩榮益至感泣不能自已頗憶先君言堪輿家謂大父墓最佳中支當有躋膴仕者母撫俊頂言曰他日將在吾兒邪今其言固騐非惟父母不之見而族屬無一人存者不亦悲夫願吾子為文之將示諸子孫以志吾無窮之思也濂讀之不覺潸然出涕嗚呼有是哉人之壯年有大父母父母俱存而號重慶者矣下此則父與母無故而號具慶者矣又下此則二親或有一存而稱偏侍者矣公自幼齡輒喪先府君當干戈搶攘之際而母夫人隔絶又死生不可知宜公雙淚既盡而繼之以血也雖然公無用爾也古之人所謂孝者非止得養親而已身者親之枝親雖亡而身存猶親之存也能敬其身是謂不死其親言也弗爽於貞行也允契於軌内外一致而無所違越非孝乎撫世酬物而一本於誠匑匑然謹畏唯恐失之行之於家推之於國達之於天下皆弗悖於道也庸非孝乎出鎮名藩承宣敷化使萬姓咸蒙至治之澤家給而人足皥皥熈熈如唐虞時庸非孝乎三者雖皆敬身之事此又移孝為忠之大者公能行之他日良史氏必大書曰唐某之子俊其治行如古名臣可為法於後世則公之親亘萬世而不死矣公之為孝也不亦大哉濂知公為人誠慤而廉介其拜御史持部使者節三預北平省事皆以美政著稱故濡毫而縷言之一以釋公之憂一以進公於道云呂氏孝感詩序天人之際難矣茍有以感之非難也天穹然而在上人藐然而在下勢絶而分殊豈易感哉然人之身天之氣也人之性天之理也理與氣合以成形吾之身與天何異乎人或不察乎此而謬迷其天性始與天為二矣能以誠感則天寕有不應之者乎是理也予觀於呂君為尤信君諱某字信夫夀春人事親至孝而好黄老家養神之説及親殁三年之服終猶哀慕如初喪因却酒肉弗御每旦滌豆籩具果疏爇香籲天徼㝠福於其親如是者數十年嘗汲井以行滌事時盛冬冰沍有金色魚者三入汲器中信夫異之持歸盛以陶缶寘香几上閭里人聞之相攜來觀者充其庭皆揖信夫而揚言曰今兹大寒魚潜不見操網罟者欲得一鱗不可致而信夫不求得之豈非天以旌信夫之孝乎且夫金魚昔文臣貴者章服嘗用之信夫子孫其有興者乎於是人皆揖而賀信夫却立而拱曰吾子道之未盡安敢言孝茍以為天之賜滋不敢承乃致祭而投諸井中愈䖍事天之禮又七年而後卒既卒其鄉人呂山見之於上真觀衣冠偉然若神仙中人已而過問信夫則信夫死矣厥後其子浙江鹽運使繼道以才德顯累官太常卿吏部尚書轉僉北平按察司事以至於今階入三品黄金横帶為時能臣由是其事傳於四方士大夫咸咏歌之而歎異之嗟夫信夫以孝事親誠格於天而天以魚旌之能養神而神全不散死而人或見之斯二者乃常理爾又奚異乎今繼道之顯融固宜也以魚數占之顯者殆三人乎繼道其一矣在其子與其孫固未已也昔者卜序白華之詩不特曰美孝子而必稱美其潔白今其詩雖亡而賴有序存故不見其詩而知孝子之行余竊取是義而具論其事以序呂君孝感之詩使觀者未見篇什而可知其人則亦卜氏之意然天人之際三百篇言之備矣在作者之自取焉葛孝子詩序清苑葛孝子守德仲謙事母有聞薦紳多其行頌美甚殷其𦙍師曽請序以文余謂孝子云何曰母病痿痺四體莫能屈伸衣帶筯七孝子必躬事不屬諸人匑匑色養如是者終其身母耄性嚴或少失其意叩顙謝過務取其歡欣身處疏淡奉養極㫖温假貸勞勩口不稱難母弗知其貧燕南部使者高其行欲薦名於朝辭疾不起不忍違其親貴臣知之俾師鄉校後教授中山保定二郡車載母以行徒歩推挽見者稱其賢出逰於外獲味頗珍必持以遺母已不敢先嘗醉而歸母不悅以嗔輒戒不飲非尊者賜未嘗染唇母以夀終哀號頓擗治塟與祭必傅於禮哭泣三年孝子有兄母沒求分力諍不能得恣其所取不忍與論兄寠且老迎以歸養死嫁其孤女待之有恩姊貧無子事之如兄而彌敦惠於同姓施及外婣鄉人稱孝子之行父以訓子祖以語孫曰若葛孝子古篤行與倫元至正之季盜起中原舉家避亂唐明府山采椹以餐忽逢大風西南來勢若萬馬奔家人懼走逃匿既而兵至餘皆遇害孝子家獨存人咸謂孝子至行可感鬼神嗚呼人孰無母孰無弟昆何獨孝子生有美名既死而不泯嗟哉恒民逐逐生耳生無可稱死則澌盡何異於蠆蚋與蚊孝子之名宜載國史宜勒貞珉光明炳燿有若景星懸彼高旻嗟爾後人勿謂孝子之行不可以臻天衷萬古烱如朝暾林氏詩序君子之言貴乎有本非特詩之謂也本乎仁義者斯足貴也周之盛時凡逺國遐壤窮閭陋巷之民皆能為詩其詩皆由祖仁義可以為世法豈若後世學者資於口授指畫之淺哉先王道德之澤禮樂之教漸於心志而見於四體發於言語而形於文章不自知其臻於盛美耳王澤既衰天下覩古昔作者之盛始意其文皆由學而後成於是窮日夜之力而竊擬之言愈工而理愈失力愈勞而意愈違體調雜出而古詩亡矣非才之不若古人也化之者不若而無其本也惟夫篤志之士不係於世之汙隆俗之衰盛獨能學古之道使仁義禮樂備於躬形諸文辭能近於古則君子多之然亦鮮矣至於今又鮮也求之嶺海之陬又鮮也而有林君汝文焉豈不尤可尚乎林君居潮之揭陽學詩三百篇以求先王政教之善治功之隆賢人君子性情之正道德之美以治其身其身醇如也以淑諸徒其徒蔚如也以形乎詩其詞粹如也林君居乎潮非有人諄諄然告之而能致力於此其所得不既深乎潮去京師六千里林君身不出州里而余知其名其所為不既至乎夫不資於口耳之淺而成文者文之善者也不資於爵位之顯而成名者名之髙者也余是以序而論之君名仕猷竹塢幽居詩序天台裴君日英其先君宦族好學多材能嘗挾其所長㳺浙水東西士大夫爭慕與交性好竹所居種竹數百至他所必擇有竹家以舍扁其室曰竹塢幽居留杭者甚乆杭守聞其名薦於京師京師為天下大都㑹㕓居櫛比求尺寸曠土不可得逆旅家僅可俯仰無從得竹然裴君掲其故名不廢且求能言者咏歌之或疑裴君以為實與名常不相違今在京師非有園林之勝安在其有竹乎裴君曰不然有竹之竹不若無竹之竹之美也有竹之竹適在耳目無竹之竹適在於心心之所得非若耳目之淺而易忘也吾方有竹時笙乎竹簫乎竹竽乎竹簟乎竹所見所聞日陳吾前者皆竹也然吾未嘗知竹之為美也今棄之而居乎此雖不接乎耳目而心恒存焉思竹之聲以為有虞韶之遺音思竹之挺拔特立以為有壯夫偉士之節思竹之厯寒暑而不變以為類乎有道者其虚中不窒似仁其直遂似義其周於用似才其高自騫舉不屈儕類下似智取而比德焉無不美者然後知竹之不可得也吾心日存乎竹雖謂之有竹何過乎且古之聖賢後世慕之如神龍威鳯者以其不可見耳聖賢道德雖高使人得接而狎之其不見慢於恒人者鮮矣其與吾好竹之說何異乎余謂裴君蓋善於用物者非世俗玩物者比也記其言於詠歌之首使覽者知其人焉王氏夢吟詩巻序東白王先生嘗嗜吟一夕宿仙華山下忽夢偉丈夫過之先生揖之坐問其姓名笑而不答唯取袖中詩一章琅然而誦迨寤而其詩已忘思之至旦頗能憶其首句遂從而補其辭且命潜溪宋濂序之濂自㓜時嘗讀謝内史夢惠連事未嘗不疑其說以為詩者發乎性情者也觸物而動則其機應類隨自有不容遏者又何待西堂之夢而後得句邪竊意内史欲神其詩之妙故特假此說以欺世耳及壯而逺逰艱難險阻莫不備嘗凡嬰於物而不能遽釋者則思思則寐必見之若持符節以相契無不合者濂然後知内史思之之專故其見於夢寐者有不可掩也今先生自㓜至老不翅六十餘年未嘗一日廢詩雖甚冗猶濡毫挈牘行吟不少休則先生之於詩可謂專矣夢之所形孰得而閟之哉今之人有志於詩者亦不少矣徒以鹵莽厭煩之學不克加修每一操觚動至旬月不再片章之出輒務求勝所以塵土之思填心塞膂往往如酣醉人語言了不知端緒視先生盍亦知少愧哉如濂不敏方將取法於先生而先生不以濂為繆悠命載其事於篇簡濂方内懼之不暇尚何敢序先生詩邪雖然先生之詩無愧於内史者也濂之名字誠得藉先生之詩以傳則夫後之視今亦猶今之視昔西堂之事詎得專美乎此又濂之有望於先生也桃花澗修褉詩序浦江縣東行二十六里有峯聳然而葱蒨者𤣥麓山也山之西桃花澗水出焉乃至正丙申三月上已鄭君彦真將修禊事於澗濱且窮泉石之勝前一夕宿諸賢士大夫厥明日既出相帥向北行以壺觴隨約二里所始得澗流遂沿澗而入水蝕道幾盡肩不得比先後纍纍如魚貫又三里所夾岸皆桃花山寒花開遲及是始繁傍多髯松入天如青雲忽見鮮葩㸃濕翠間燄燄欲然可玩又三十歩詭石人立高可十尺餘面正平可坐而簫曰鳯簫臺下有小泓泓上石壇廣尋丈可釣聞大雪下時四圍皆璚樹瑶林益清絶曰釣雪磯西埀蒼璧俯瞰臺磯間女蘿與陵苕轇轕之赤紛緑駭曰翠霞屏又六七歩竒石怒出下臨小窪泉冽甚宜飲鶴曰飲鶴川自川導水為蛇行勢前出石壇下鏘鏘作環佩鳴客有善琴者不樂泉聲之獨清鼓琴與之爭琴聲與泉聲相和絶可聽又五六歩水左右屈盤始南逝曰五折泉又四十歩從山趾斗折入澗底水滙為潭潭左列石為坐如半月其上危巖牆峙飛泉中瀉遇石角激之泉怒躍起一二尺細沬散潭中㸃㸃成暈真若飛雨之驟至仰見青天鏡淨始悟為泉曰飛雨洞洞傍皆山峭石冠其顛遼夐幽邃宜仙人居曰蘂珠巖遥望見之病登陟之勞無往者還至石壇上各敷鞇席夾水而坐呼童拾㫁樵取壺中酒温之實􅀢觴中觴有舟隨彼沉浮鴈行下稍前有中㫁者有屬聨者方次第取飲時輕飈東來觴盤旋不進甚至逆流而上若相獻酬狀酒三行年最高者命列觚翰人皆賦詩二首即有不成罰酒三巨觥衆欣然如約或閉目潜思或拄頰上視霄漢或與連席者耳語不休或運筆如風雨且書且歌或按紙伏崖石下欲寫復止或句有未當搔首蹙額向人或口吻作秋蟲吟或羣聚蘭坡奪觚爭先或持巻授鄰坐者觀曲肱看雲而卧皆一一可畫已而詩盡成杯行無算迨罷歸日已在青松下又明日鄭君以兹游良驩集所賦詩而屬濂以序濂按韓詩内傳三月上已桃花水下之時鄭之舊俗於溱洧兩水之上招魂續魄執蘭草以祓除不祥今去之二千載雖時異地殊而桃花流水則今猶昔也其逺裔能合賢士大夫以修禊事豈或遺風尚有未冺者哉雖然無以是為也為吾黨者當追浴沂之風徽法舞雩之咏歎庶幾情與境適樂與道俱而無愧於孔氏之徒無愧於孔氏之徒然後無愧於七尺之軀矣可不朂哉濂既為序其㳺厯之勝而復申以規箴如此他若晉人蘭亭之集多尚清虚亦無取焉鄭君名鉉彦真字也鄭氏喜友堂讌集詩序余自禁林致政而歸久不與諸友胥㑹悵然而興遐思洪武己未秋八月壬辰胡教授仲申朱長史伯清蘇編修平仲及金徵君元鼎咸集於麟溪鄭氏余同劉繼至鄭氏之賢太常博士仲舒置酒讌客於喜友堂籩豆孔秩冠裳有儀揖讓興俯翼翼如也蓋余與胡鄭朱三君自弱冠為同門友今皆頽然老矣蘇君生雖稍後亦嘗為同朝追計昔時各縻禄仕不獲巵酒為驩凡二十餘年今者幸遂家食或居異邑或相逺二百里皆得與之周旋於尊爼間則夫斯㑹之同豈易致哉於是獻酬樂甚酒酣鄭君為詩十四韻以慶㑹合之情出示坐客坐客先後倚韻而和之遂聨為巻俾能詩者續焉嗟乎余數人老者年逾七十次者六十有竒又其次者亦越五十春秋矣獨二生為最少耳又越二十餘年少者當愈長老者當愈衰未知復何如也然則今日之樂其可數遇乎是巻也豈特可識一時之樂後乎斯者誦而歌之必將慨然有不及與之歎矣洪武十二年秋九月甲午前翰林學士承㫖宋某謹序劉兵部詩集序詩縁情而托物者也其亦易易乎然非易也非天賦超逸之才不能有以稱其器才稱矣非加稽古之功審諸家之音節體製不能有以究其施功加矣非良師友示之以軌度約之以範圍不能有以擇其精師友良矣非雕肝琢膂宵咏朝吟不能有以驗其所至之淺深吟咏侈矣非得夫江山之助則塵土之思膠擾蔽固不能有以發揮其性靈五美云備然後可以言詩矣蓋不得助於清暉者其情沉而鬱業之不專者其辭蕪以龎無所授受者其制澁而乖師心自高者其識卑以陋受質蹇鈍者其發滯而拘古之人所以擅一世之名雖其格律有不同聲調有弗齊未嘗有出於五者之外也濂於職方郎中劉君之詩其殆無所愧矣夫劉君名崧字子高故為西昌大族前代以科第發身者三十七人劉君亦以明經舉進士而其志之所嗜尤在於詩况劉君天分甚高自為童子時輒有驚人之句比長益淬礪弗懈上自詩騷下從魏晉以來迄於唐宋凡數十百家皆鑚研考覈窮其所以言用功既深精神㕘㑹絶無古今之間已而曰此固可矣然猶未也乃束書走豫章與辛敬萬石周湞楊士𢎞鄭大同㳺而此五人者負能詩名見劉君皆驚異之相與揚㩁風雅夙夜孜孜或忘寢食及徵之於古瞭然白黑分矣已而又曰此固善矣然猶未也復痛自䇿督日賦一篇雖沍寒之折膠熾暑之流金劉君擁鼻鼓膝時作嗚嗚聲不成章不止也數年之間巻軸盈几已而又曰此固若有得矣然猶未也復具布襪行纏臨釣臺上三顧山陟虎鼻峰眺龍門或竟日㝠搜或終月忘返然以州里之近未足以窮耳目之遐觀環江右之境有竒山川不論道途之逺必一至焉襟宇向廣終若未能舒暢厥志復度庾嶺勺曲江翫韶石過清逺峽登越王之臺􅆽闕泉㳺石室厯觀海北名山再涉鯨波覽瓊臺雙泉之勝而還劉君之詩於是乎大昌矣濂幸獲讀之凌厲頓迅鼓行無前所謂緩急豐約隱顯出没皆中乎繩尺至其所自得則能隨物賦形高下洪纎變化有不可測寘之古人篇章中幾無可辨者嗚呼前千年而往者吾以知其人矣後千年而興者孰敢謂無其人乎茍謂有其人非劉君之作將能行之於逺乎世無劉君五美之具而徒諉詩為易易者其果可信乎濂也以繆悠之資玩時愒日不能成一章性雅好登臨又無濟勝之具雖於諸家詩無所不讀終不及窺其藩籬有負師友多矣其視劉君不亦重可愧乎雖然濂雖不善詩其知詩决不在諸賢後故因作序而相與一言之使郊愈復生當不易吾言矣劉君之詩十九歲以前皆焚去二十至四十九之所存亦十之七八耳今其門人蕭翀所編者凡若干巻翀字鵬舉亦嗜於詩蓋得劉君之傳者也汪右丞詩集序昔人之論文者曰有山林之文有臺閣之文山林之文其氣枯以槁臺閣之文其氣麗以雄豈非天之降才爾殊也亦以所居之地不同故其發於言辭之或異耳濂嘗以此而求諸家之詩其見於山林者無非風雲月露之形花木蟲魚之玩山川原隰之勝而已然其情也曲以暢故其音也𦕈以幽若夫處臺閣則不然覽乎城觀宫闕之壯典章文物之懿甲兵卒乘之䧺華夷㑹同之盛所以恢廓其心胸踔厲其志氣者無不厚也無不碩也故不發則已發則其音淳龎而雍容鏗鍧而鏜鞳甚矣哉所居之移人乎今觀中書右丞汪公之詩益信其説為必然者矣公以絶人之資博極羣書素善屬文而尤喜攻詩當皇上龍飛之時杖劍相從東征西伐多以戎行故其詩震盪超越如鐡騎馳突而旗纛翩翩與之後先及其治定功成海宇敉寧公則出持節鉞鎮安藩方入坐廟堂弼宣政化故其詩典雅尊嚴類喬嶽雄峙而羣峯左右如揖如趨此無他氣與時值化隨心移亦其勢之所宜也然而興王之運至音斯完有如公者受丞弼之寄竭彌綸之道賛化育之任吟咏所及無非可以美教化而移風俗此有關物則民彞甚大非止昔人所謂臺閣雄麗之作而山林之下誦公詩者且將被其霑溉之澤化枯槁而為豐腴矣雖然詩之體有三曰風曰雅曰頌而已風則里巷歌謡之辭多出於氓𨽻女婦之手髣髴有類乎山林雅頌之製則施之於朝㑹施之於燕饗非公卿大夫或不足以為其亦近於臺閣矣乎輶軒之使弗設而托之於國風者若無所用之皇上方埀意禮樂之事豈不有撰為雅頌以為一代之盛典乎濂蓋有望於公他日與鹿鳴清廟諸什並傳者非公之詩而誰哉濂也不敏受公之知十有一年故竊序其作者之意於篇首蕪纇之詞要不足為公詩之重輕也公名廣洋乃皇上之所賜其字則朝宗也淮南人洪武三年四月二十一日金華宋濂序劉顔昺詩集序余昔與劉君顔昺㳺見其賦詩多俊逸心獨竒之顔昺既别去間於士友餞行巻軸覽其歌吟往往皆堪傳誦復益竒之後十年重㑹秦淮上亟問近什何如顔昺解橐中得十餘篇余讀已大驚氣韻沉鬱言出意表何其近謝康樂歟藴藉脫落不霑塵土何其類岑嘉州歟渢渢乎仙㳺英英乎霞舉又何其善學李供奉歟蓋顔昺天分既髙而人功又深凡有摹擬輒髣髴似之余今猶舉其槩而言之也嗚呼予昔學詩於長薌公謂必厯諳諸體究其制作聲辭之真然後能自成一家顔昺之學正與予同自愧跛鼈之行不足以追逸驥尚何言哉然又竊怪顔昺何以能致於斯也頗聞其先人友梧翁乃月灣吳公之高第善為詩與文靖虞公文安掲公禮部吳公極相友善遂由縣文學薦入禁林未上而夭其家庭相傳必有卓絶於人者不然顔昺之詩何為膾炙人口而弗厭哉其能埀世傳後當不疑予耄矣文采衰矣不能有所發越矣姑摭昔竒顔昺者爲之序以自附知言之士云顔昺名炳鄱陽人金華山人宋濂序林伯恭詩集序詩心之聲也聲因於氣皆隨其人而著形焉是故凝重之人其詩典以則俊逸之人其詩藻而麗躁易之人其詩浮以靡苛刻之人其詩峭厲而不平嚴莊温雅之人其詩自然從容而超乎事物之表如斯者蓋不能盡數之也嗚呼風霆流形而神化運行於上河嶽融峙而物變滋殖於下千態萬狀沉㝠發舒皆一氣貫通使然必有頴悟絶特之資而濟以該博宏偉之學察乎古今天人之變而通其洪纎動植之情然後足以憑藉是氣之靈彼局乎一才滯乎一藝雖欲捷騁横騖以追於古人前之而愈却培之而愈低幾何不墮於鄙陋之歸此濂於伯恭之詩不能無感焉伯恭博極羣經而尤長於春秋嘗應書鄉闈實冠多士伯恭年始二十餘一旦名動海内自時厥後學益加修遂擢至正甲午進士第厯任省憲二府正色直言百壬畏懾時出竒計翦三逆豎如烹狐兎則其所養之充是氣浩然弗撓弗屈故其發於詩也沉鬱頓挫渾厚超越大雅奏而黄鐘獨鳴也武庫開而五兵森列也洪濤怒張而魚龍出没也一展巻間呈珍獻異可欣可愕精神為之震眩濂前所謂聲因於氣皆隨其人而著形者豈非然邪豈非然邪世之學詩者衆矣不知氣充言雄之㫖往往局於蟲魚草木之微求工於一聨隻字間真若蒼蠅之聲出於蚯蚓之竅而已詩云乎哉永嘉舊傳四靈詩識趣凡近而音調卑促近代或以為清新者競摹倣之濂每謂人曰誤江南學子者此詩也聞者且疑而且信焉今吾伯恭之詩出一洗習俗之陋信知豪傑之士自有其人也故敢執筆直題於首簡世有知言者必深有取焉伯恭名温姓林氏温之永嘉人劉母賢行詩集序劉賢母王氏諱某太原崞人也年十八歸處士仲安踰再期生一子溥又八年處士君殁賢母自誓曰吾聞貞婦不二夫生為劉家婦死為劉家鬼無子當爾况有子者乎確守其志堅如鐡石家素貧逮處士卒貧益甚治絲枲自給衣僅蔽身日唯一食艱瘁不可言處之恒裕如也里豪武氏子知賢母貧或可撼使猾嫗誘而且脅賢母痛詈斥之終不移所守親督溥從鄉貢進士趙惟賢國子助教張傅霖逰師若友有益溥者賢母遇之厚不以貧而廢禮溥後以文行聞卒為名士賢母性儼恪有烈丈夫風未嘗輕於笑語契家子姓見之趣敬畏下拜人因號為鐡面夫人云里婦有淫行招揺行市中賢母知其所從來以所曳杖擊之婦哭訴於夫夫曰劉夫人何故撻爾耶慚服不敢言有姑適賈氏老而喪明其子某每咈其意姑必泣告賢母賢母造門而喻之輒踰垣避去某處士之外弟也亦嚴憚之如此他蓋可知也年七十餘而喪當時南北名士大夫咸作詩文以美之命曰賢行詩集云嗚呼詩者發乎情而止乎禮義也感事觸物必形之於言有不能自已也昔者衛共伯早死其妻共姜賦栢舟以自誓一則曰之死矢靡他二則曰之死矢靡慝至今讀者為之感激奮勵豈非有繫彛倫之重者乎今也賢母之志與共姜同雖不自賦詩而世之士大夫推其意而代之言此蓋出於民之性而先王之澤也是宜刻梓傳世以為人婦者之勸雖然詩人之吟咏夥矣類多烟霞月露之章草木蟲魚之句作之無所益不作不為欠也華編巨冊摹印而行者比比有之其視賢母之詩有補名教者為何如哉知道之士必有擇焉孫伯融詩集序詩道之倡其有師友淵源乎非師不足盡傳授之秘非友不足成相觀之善無是二者不可以言詩也當元之季有丁仲容先生者自天台來客建業以能詩鳴方其㟁幘談笑有持巻來求者輒索酒飲數觥操觚如飛風雨疾而龍蛇蟠語意渾涵絶無斵削之跡讀之者皆驚以為仙才當是時夏煜允中為先生入室弟子其氣韻酷類而横逸滂沛過之伯融進受指畫於先生退交允中日取唐諸家詩而紬繹之稽其聲律求其指趣察其端倪已而學大進士大夫稱之曰是肖乎允中者也或曰非也脫凡近而逰高明鼓俠氣而超氛􅅽其髣髴乎先生者邪予來南京而先生墓木已拱獨允中共吟嘯於風月寂寥之鄉舂容乎大篇鏗鏘乎短韻無日無之允中間持伯融之詩相與諷詠予謂允中曰自科舉之習勝學者絶不知詩縱能成章往往如嚼枯蠟較之金頭大鵝芳腴滿口者有間矣如伯融者何處可得邪允中深以予言為然時伯融總戎于括予不及見未幾伯融死於難後三年允中亦殁予今耄矣私竊以謂先生之詩已鏤板傳世每念允中之名泯泯訪其遺稿三十餘首録藏青蘿山房頗恨伯融之什未有所托金陵蔣行簡伯融之弟子也乃蒐輯遺失釐為若干巻介翰林典籍蔡宗黙求予序其首嗚呼道隱民散久矣朝執經於講帷暮反眼相視若塗人者有之有如行簡之不忘其師非紛紜百鳥中間此孤鳯凰歟因不辭為稽其師友淵源次第而為之序聞之者可以勸矣伯融諱炎姓孫氏句容人元季落魄不仕及皇上定鼎建業出為江南行省掾同知池陽府已而陞知府事遷本省都事總制處州軍馬苗冦賀甲李乙叛遂遇害朝廷以其不屈志辱國贈徵事郎封丹陽縣男為人磊落有俊氣藐然白面書生而其胷中藏百萬兵使其賦命之厚勲業可立致今但以詩名於世惜哉雖然伯融藉此亦足為不朽矣蔣録事詩集後序四明蔣君子杰字有立世為簮纓大族宋金紫光禄大夫諱浚明者其七世祖也有立自㓜頴悟過人年未弱齡聲名已動薦紳間暨長以明經舉進士於鄉㑹試南宫遂擢以記注之職有立入侍黼扆出陪法駕皇上以其才良而行純深養遇之或命即物賦詠有立即奉制揮翰如飛上大悅時寵賜和章有立以為遭逢盛際實千載一時乃録平日所賦并他著餞贈之什共若干巻俾予題其首簡予聞昔人論文有山林臺閣之異山林之文其氣瑟縮而枯槁臺閣之文其體絢麗而豐腴此無他所處之地不同而所托之興有異也有立以粹然之學位居柱史日趨殿陛濡毫螭坳回視山林不翅有仙凡之隔故其見於辭者雲錦張而春葩明鐘簴奏而音律諧體製正而局度嚴誠可以傳諸當今而埀於久逺者也如予不敏年日以加文日以退視吾有立之進如水湧山出者寧不愧哉然而有立善古文宏富充贍得作者之體不唯能詩而已邇者執法刑曹處煩劇之務整暇而有餘不唯能文辭而已其政事亦灼然有可稱者異日振厥家聲使金紫公不專美於前予蓋深有望於有立者也輒序以識之史官金華宋濂序田氏哀慕詩集序孔子刪詩南陔白華皆存之而弗削者以其能孝也南陔之詩序言孝子相戒以養意者孝子之所自作交相勸勉而盡其事親之誠至白華之詩乃謂孝子之潔白潔白則其行之純可知豈非時人美之而賦是詩者邪雖有在人在已之殊所以咏歌其志而鼓舞以為交勸者其益不既大哉惜乎有其義而亡其辭也同郡田君奐篤美有馴行其母徐氏卒哀號慟哭將欲無生既塟遑遑焉如有求而弗獲人勸其還舍奐號曰吾母在此吾奈何離母而去也因結廬墓側而依焉人復勸之曰廬墓非古也奐號曰吾恨不死從吾母於地下古與非古吾弗暇計也於是復作為詩歌以自勉寢苫枕塊疏食水飲終三年而後歸鄉之士大夫與鉅公碩士聞之咸為太息亦作為篇翰以美之歲積月增遂成巻帙其婦公陳君本心曰是不可以無傳也將刻諸文梓不逺三百里來青蘿山中而以首簡授余序作者之意余疾病纏綿之餘凡以文為屬者必固閉而力拒之而其請至於三五而不倦因歎曰夫孝如奐者是亦足稱也巻中諸詩豐縟而紆徐粹雅而冲和固皆一時之傑作茍謂其有合於南陔白華之㫖我則不敢知設當孔子之時其刪去與否我亦不敢知此無他二詩之辭既亡縱欲徵之而不可得也雖然孝者天之經地之義無古無今無長無㓜無貴無賤有不可得而變易者人能咏歌之而鼓舞之雖孔子復生吾知其或將存之矣是詩之傳他日被之管絃諧諸金石使聞之者津津以喜㑹之者欣欣以勸則為移風易俗之益又豈小哉其視飾辭繪句道淫而宣驕者何如也剡源集序濂嘗學文於黄文獻公公於宋季辭章之士樂道之而弗已者唯剡源戴先生為然濂因日購先生之文絶不能以多致㑹有詔纂修元史命濂總裁其事事有闕遺者遂以上聞遣使訪於郡國竊以謂先生著作有關於勝國宜多乃屬使者入鄞徧求之鄞先生鄉國庶幾有得之者曾未幾何有司果以剡源集二十八巻來上濂始獲而盡覽焉因作而曰辭章至於宋季其敝甚久公卿大夫視應用為急俳諧以為體偶儷以為竒靦然自負其名高稍上之則穿鑿經義櫽括聲律孳孳為譁世取寵之具又稍上之剽掠前修語録佐以方言累十百而弗休且曰我將以明道奚文之為又稍上之騁宏博則精麄雜揉而畧繩墨慕古奥則刪去語助之辭而不可以句顧欲矯弊而其敝尤滋私自念辭章在世如日月之麗乎天雖疾風暴雨動作無時將不能蔽蝕其精明獨怪夫當時之士奚為乏一人障其狂瀾邪復念豪傑之士何代云無第區區所見孤陋故鮮能知之非誠然也及覽先生之文新而不刻清而不露如晴巒出雲姿態横逸而連翩弗㫁如通川縈紆十歩九折而無直瀉怒奔之失嗚呼此非近於所謂豪傑之士邪蓋先生七歲即知攻文咸淳中入太學以三舍法陞内舍生既而試禮部第十人登進士乙科調教授建寧府及遷臨安教授行戸部掌故皆不就㑹宋亡為元執政者薦之起為信州教授先生年已六十一矣尋遷婺州以疾辭後六年終初先生既擢第憫宋季辭章之陋即濯然自異久之四方人士爭相師法故至元大德間東南文章大家皆歸之先生無異辭先生之殁僅六十年已罕有知其名若字者殊可哀也濂在史局既命彚入儒學傳中及司業成均復將録其剡源集者歸以示諸人而先生之鄉有夏君閱來為國子正方與先生之孫資先謀刻於梓夏君遂以題辭為請且謂知先生之深者唯黄文獻公公既不可作子幸無讓於是忘其僣踰而為序之如此嗚呼豐城之劍荆山之玉縱埋没泉壤為已久神光上貫於霄漢者終弗能掩也其先生之謂乎先生諱表元字帥初一字曾伯慶元奉化州人洪武四年秋八月望日金華後學宋濂謹序霞川集序詩其可學乎詩可學也然宫羽相變低昻殊節而浮聲切響前後不差謂之詩乎詩矣而非其美者也辭氣浩瀚若春雲滿空倐聚而忽散謂之詩乎詩矣而非其美者也斟酌二者之間不拘不縱而臻夫厥中謂之詩乎詩矣而非其美者也然則詩之美者其將何如哉蓋詩者發乎情止乎禮義者也情之所觸隨物而變遷其所遭也忳以鬱則其辭幽其所處也樂而豔則其辭荒推類而言何莫不然此其貴乎止於禮義也歟止於禮義則幽者能平而荒者知戒矣河南王先生本中名臣忠肅公之子也先生蚤隨公宦㳺於吳越繁縟之邦及厯仕於朝出入於鳯閣鸞臺視師關陜貔貅十萬屬其指麾可謂偉矣先生之詩則和平而不矜晚年退居於家焚香黙坐一室蕭然幾若不能朝夕者可謂窶矣先生之詩則雍容而自得非止乎禮義者其能至於斯邪晉安張君志道評先生之詩有云如齊魯諸儒折旋規矩脗合禮度如幽并老將結髮百戰卒然指顧動中韜畧其言蓋盡之矣嗟夫詩道之不古久矣世之號善吟者往往流連光景使人馳騖於𤣥虚荒忽之塲控之非有挹之非無至造為竒論謂詩有生意須人持之不爾便將飛去此何為者哉殊不知詩者本乎性情而不外於物則民彛者也舍此而言詩詩之道喪矣濂也不敏自童年習為比興之學腥穢填閼而襟靈弗舒形於言辭則平凡為已甚今幸獲讀先生之詩庶幾其有發哉先生之詩甚富且多於兵燹之餘所存者僅僅如斯惡知不有神物䕶持者乎讀者尚思同謹其傳可也張侍講翠屏集序嗚呼先生之文濂何敢序之先生長濂凡九嵗濂初濡毫學文先生已擢進士第列官州邑及其教成均入詞垣先生之文益散落四方濂得觀之未嘗不斂袵而以不能識面為歉去年春始獲與先生㑹於建業各出所為舊稿相與劇談至夜分弗之倦且曰吾生平甚不服人觀子之文殆將心醉也濂竊以謂先生素長者特假夫褒美之辭以相激昻爾非誠然也曾未幾何先生使安南道次大江之西特造序文一首以寄其稱奬則尤甚於前日者濂讀而疑之酸醎之嗜偶與先生同故先生云然非濂之文果有過於人人也方將與先生細論而九原不可作矣嗚呼先生之文濂何敢序之文之難言久矣周秦以前固無庸議下此唯漢為近古至於東都則漸趨於綺靡而晉宋齊梁之間俳諧骫骳歲益月增其弊也為滋甚至唐韓愈氏始斥而返之韓氏之文非唐之文也周秦西漢之文也韓氏之文固佳獨不能行於當時逮宋歐陽修氏始效而法之歐陽氏之文非宋之文也周秦西漢之文也歐陽氏同時而作者有曾鞏氏有王安石氏皆以古文辭倡明斯道蓋不下歐陽氏者也歐陽氏之文如澄湖萬頃波濤不興魚鼈潜伏而不動淵然之色自不可犯曾氏之文如姬孔之徒復生於今世信口所談無非三代禮樂王氏之文如海外竒香風水齧蝕木質將盡獨真液凝結斬然而猶存是三家者天下咸宗之有元號稱多士或出入其範圍而檃括其規模者輒取文名以故章甫逢掖之徒每驕人曰我之文學歐陽氏也學曽王氏也殊不知三君子者上取法於周於秦於漢也所以學歐陽氏而不至者其失也纎以弱學曾氏而不至者其失也緩而弛學王氏而不至者其失也枯以瘠此非三君子之過也不善學之其流弊遂至於斯也文之信難言者一至於是乎濂與先生劇談時未嘗不撫巻而三歎奈何狂瀾既倒滔滔從之而無有如先生之所慮者也不亦悲夫今觀先生之文非漢非秦周之書不讀用力之久超然有所悟入豐腴而不流於叢冗雄峭而不失於粗厲清圓而不渉於浮巧委蛇而不病於細碎誠可謂一代之竒作矣先生雖亡其絢爛若星斗流峙如河嶽者固未始亡也信於今而埀於後者豈不有在乎如濂不敏童而習之顛毛種種猶不得其門而入凡先生之稱奬者皆濂之所甚愧者也先生之子煜乃持翠屏集來徵為之序嗚呼先生之文濂何敢序之謾舉先生相與論文者書之於篇端庶幾讀先生之文者亦將知其用意之所在也夫詩若干巻文若干巻春秋經説若干巻不在集中先生諱以寧字志道姓張氏福之古田人泰定丁卯進士仕至翰林侍講學士云馬先生歲遷集序士之生斯世也其有藴於中者必因物以發譬猶雲既滃而靈雨不得不降氣既至而蟄雷不得不鳴雖其所發有窮達之殊而所以導宣其堙鬱洗濯其光精者則一而已矣是故達而在上其發之也居廟朝則施於政事謀軍旅則行於甲兵嚴上下和神人則見於禮樂交鄰國則布於辭命或窮而在下屈勢與位不能與是數者之間則其情抑遏而無所暢方壹假詩以洩之詩愈多則其人之愈窮也可知矣此濂於嚴陵馬先生之詩為之深悲而不能自己者也先生諱瑩字仲珍建德縣新亭鄉人其七世從祖大同官至禮部尚書族故盛矣先生自㓜喜屬文而才氣倜儻思欲以功業自見京師逺在數千里外而無有薦於上者㑹延祐行科目取士之法先生以春秋禮記舉皆不利先生歎曰非吾才不如今人人多裹章服而吾猶被布韋其命也夫於是悉發之於詩凡身之所厯山容水色民情物態莫不模寫靡遺當其良朋勝友之集輒相率酣觴賦詩頃刻百餘言落筆弗能自休雖不規規然騁工巧於片辭之間而其音節之鏗鍧言辭之俊逸如揚颿大江風利桅勁一瀉百里而畧無留難之意世之人咸以此稱之而不知先生之窮至是為已甚矣逮於晚年其志益孤乃倣栁栁州製鐃歌鼓吹曲十二章將上之朝又不果因復自放於重山宻林中時命客取琴鼓一再行或吹洞簫倚歌而和之以釋其窮悴無聊之悲不幸年五十五竟齎志以殁先生殁後三十二年其子鈞懼其遺文將遂泯滅以歳遷集四十巻者俾濂為之序將圗入梓以傳濂生也後恨不獲拜先生於牀下而獨得窺其詩文又恨先生所藴於其中者不及顯融以見於功業而徒為古窮人之辭卒以棲遲至於老死豈非所謂命也夫昔者梅都官工於詩累舉進士輒抑於有司其窮固亦甚矣後數百年都官之名山峙而川流設使都官得行其志於當時其詩未必如此之工而其名亦未必如此之盛是天欲窮之乃所以達之也先生之事與都官正類其身雖窮而其詩之能達蓋無疑者濂又何必深為之悲先生别有雜古文十二巻應科困天集若干巻唐五百家詩選五巻宋南渡諸家詩選一巻講義讀書記各二巻不在集中王氏樂善集序和陽王君秉彛營道抗志葆學潜貞軒冕之榮不足以羈其跡貝珍之麗不足以累其髙肥遯遵大易之戒知足法老氏之㫖汲清澗曲采緑巖口集杜若以充衣織胡繩以為屩屹立㳺塵之表凌邁層霄之上當其蘿月斜映松飈遞響寄酒賦於閒情發琴歌於逸韻泉石自獻猿鶴不驚信乎皓皓弗緇亭亭絶俗者也然而仁心斯涵義聞攸暢拯彼顛連之苦奚翅飢渇之欲排難解紛曾忘其身危捐囷散金不計其家索徼符稚之遺風崇魯連之高節矧當戎馬之際尤止屠劉之虐起死骨以為生藥病甿而使瘉力茍可及知無不為察其善固不一而足於是清朝法從之賢方岳連率之貴薦紳𢎞博之士巖穴隱遯之儔莫不企瞻其容光承挹其辭氣因其堂構命以樂善或寓諸賦咏或紀於文辭絶去下蔡之音壹是大雅之倡言其典雅則冠冕佩玉揖讓廟堂也言其雄渾則江海澄波涵容羲娥也言其勁正則蒼官青士共傲歲寒也言其淳古則殷敦周匜有異䙝器也皆可遺芳不朽埀裕後昆非獨黎陽著紀善之傳鄴下行類善之集而已不揆菲作亦厮羣英此則珠玉在傍沙礫失色西子捧心醜人矉目不亦逺甚矣哉載稽古昔治浹化孚人存周急之行里崇相睦之俗協於大順殊號難及自鄒魯之聲教不漸而秦越之瘠肥罔顧同父尚錐刀之爭他人寧溝壑之脫静言思之慨我寤歎卓爾王君樂於從善輿論所許兹集宜徵儻鍥梓以行逺可惇風而廣惠豈若風葩露葉徒誇騷圃之工麟角鳯毛謾鬬文園之巧哉顧兹下劣忝附高明慕黄憲於汝南憶荀隱於日下辱履舄潜溪之上傳簡畢櫧槧之間敬序篇端畧攄悰愫意雖在於檃括文則尚於疏通若譏非古豈曰知言庶期見正於大方有徵於君子云爾前史官金華宋濂謹序丹崖集序為文非難而知文為難文之美惡易見也而謂之難者何哉問學有淺深識見有精粗故知之者未必真則隨其所好以為是非照乘之珠或疑之於魚目淫哇之音或嫓之以黄鍾雖十百其喙莫能與之辨矣然則斯世之人果無有知文者乎曰非是之謂也荆山之璞卞和氏固知其為寳渥洼之馬九方歅固知其為良使果燕石也駑駘也其能並陳而方駕哉雖然弊也久矣孰於民散師廢之後而必望見知於人乎茍有之曠百世而相感者不須悵然而遐思矣予與唐君處敬共居浙水東雖未之識有持其文一二篇來者頗獲讀之顧謂二三子曰屏斥蕪纇何其玉之潔而珠之明也脉絡聨貫委蛇不㫁又何韶鈞九奏音律相宣而始終粲如也其殆能言之士乎去年之春予被詔總裁元史而處敬亦以議禮被徵㑹於南京亟欲挽入史局儀曹愛其才弗允及予入詞垣為學士處敬亦來為應奉文字朝夕同論文甚懽遂索其全集觀之復顧謂二三子曰沉涵於經而為之本原饜飫於史而助其波瀾出入諸子百家以博其支流此作有之又頗愧向之知處敬者未深也嗚呼近代之文予見之夥矣大風揚沙而五色為之昏昧繁音嘈雜而五聲為之失倫求其如處敬者抑何其鮮哉非曰如之知之者亦寡矣此無他無真實之功求鹵莽之效西抹東塗莫尋統緒左剽右竊僅成簡編輒號諸人曰我知文我知文人以艱深文淺近者示之則曰是誠古文哉何其雅奥而不羣也或以其言之易又以塵腐罷軟者戲之則又曰此亦古文耳何其暢達而無礙也是皆無真見以人舌為之目故靦然而無愧怍有若處敬之文其尚能知之哉予雖不敏愛玩處敬之文日不釋手以為可埀逺而傳後因為序諸巻首嗚呼處敬之文荆山之玉也渥洼之馬也又豈患無卞和氏與九方歅者乎予之所論隘矣處敬名肅㑹稽人丹崖其自號也故以名其集云愚齋集序愚齋二十巻吳興林静氏所著也初静之系出艾軒文節公世多聞人至曾祖棄以武舉入官為宋馬歩水軍都統制祖友信仕元官至宣武將軍湖州路湖砲翼上千戸所管軍總管父德驥襲其職俱讀書知文及生静俊爽異常髫齡之時即觧綴篇章有外氏趙文敏公家法郡二千石欲以竒童薦父拒之静知父意欲為名世儒益研窮九經百氏之書雖老釋𤣥詮秘典悉掇其芳潤由是問學如川之增若黄文獻公晉卿宇文先生子貞皆延譽之遂用御史辟署安定書院山長辭不赴而元運亦衰矣今觀集中所著文則豐腴雅馴詩則藻麗典則誠無媿於作者求諸倫輩中不多遇也嗚呼為人子孫者毅然能以文易武有聲動人所謂能亢其宗者非邪近愈篤志濂洛關閩之學寤寐不忘則其明體達用又有出於詩文之外者其所至未易測也静嘗從予遊予嘉之故褒之褒之乃所以勉之也静字子山愚齋其自號云訥齋集序凡天地間青與赤謂之文以其兩色相交彪炳蔚耀秩然而可睹也故事之有倫有脊錯綜而成章者皆名之以文唐虞以來賢聖之君迭作而其文至周特備畫疆定野授田分井邦之文也前室後寢左昭右穆廟之文也車服有章爵土有數官之文也鐘磬竽瑟干戚旄狄樂之文也朝㑹燕饗郊社禘嘗禮之文也振旅茇舍治兵大閱兵之文也發號施令陳經布紀政之文也舒陽慘隂彰善癉惡刑之文也如此之故殆不可以一二數斯文也非指夫辭章而已也昔者孔子生於周末憫先王道衰以四科教學者而㳺夏以文學名其所謂文學者儀章度數之間或損之或益之以就夫厥中欲使體用之相資而本末之兼該也惜乎不見用於時君乃退而有隱憂始以平昔不及設施者壹寓於六經隂陽變易之義則繫於易治忽幾微之由則定於書成教厚倫之道則删於詩尊王賤霸之畧則修於春秋辨叙名分恱和神人之方則見於禮樂豈徒示夫空言為哉其意若曰先王之文所以範圍天下者吾不得行之著明於經庶幾後之人或有所興起者乎孔子憂世之志深矣奈何世教陵夷學者昧其本原乃專以辭章為文抽嫓青白組織華巧徒以供一時之美觀譬如春卉之芳穠非不嫣然可悅也比之水火之致夫用者蓋寡矣嗚呼文之衰也一至此極乎括蒼王先生毅字剛叔刻志經傳而其所學必欲見之於實用嘗誦言曰古人之所謂文者治具也古籍之所載者載此而已非若後世侈靡之文也侈靡之文吾不欲觀焉吾所謂文達吾胷中之所欲言耳初不知有他也於是先生之文明白洞達皆不假乎雕琢而其至味自足先生殁後之十年其高第弟子章君存道與其弟存誠皆篤學力踐能弗畔先生之教且謂先生之為人固不假文以見然非此又不足以知先生者因輯成四巻來請為文之序濂故以古人之所謂文非指乎辭章者序之於首簡其亦近於先生之志矣乎先生之行事濂嘗撰為小傳一通備載之矣兹不書鄭氏聨璧集序磨勘司令鄭君思先間謁濂禁林從容言曰伯父杲齋先生天分絶人嘗矻矻窮經再踐塲屋不合主司程度遂棄去㳺淛河之左右大肆其力於古文辭久之思如泉源衮衮出不休日試萬言倚馬可待大司徒楚國歐陽文公竒其材欲剡薦之㑹疾作而卒先子曲全先生㓜喪二親而賦性狷介州里不能容伯父時客授崑山乃走就之求四庫書疾讀雖暑鑠金寒折膠不越戸限未幾下筆為文皆循矩度而不輕於毁譽然剛毅忤物人有不善必折之雖其面頸發赤弗少貸晚寓蘇之海虞竟以坎􅇄終惟二父負不世出之才文名相埒遭元季兵亂不沾一命竟捐館舍而其遺文將遂零落不傳此思先日夜痛心而不敢自寧者也伯父文多不留稾思先自童丱見輒録之積二十春秋得文百篇古今詩四百八十首先子之著作雖存嘗自删焚僅留三十篇文百篇詩而已於是合寫成書釐為一十四巻題之曰鄭氏聨璧集將鍥文梓以行四方敢以首簡序文為請濂受而讀之杲齋之文則氣韻沉雄如老將帥師旌旗金鼓繽紛交錯咸歸節度曲全之文則規製峻整如齊魯大儒衣冠偉然出言不煩曲盡情意然皆有臺閣𢎞麗之觀而無山林枯槁之氣嗚呼是亦可謂能言之士乎昔夏侯湛與潘岳並美姿容其行止之處恒同輿而接茵人謂之聨璧然不過取人物之明潔耳初不論其能文也縱曰能文如温邢之敏贍亦生於異鄉初非出於一姓也縱出於一姓若二謝之藻麗初非出於一門也縱出於一門若二盧之雅逸則一從焉若二𢎞之典嚴則再從焉而同胞同氣者蓋亦鮮矣嗚呼有若二先生伯仲並以文鳴其亦可謂希世之士乎濂也不敏幸見杲齋於虎林而於曲全則未之識也及官成均乃與曲全之子司令君為同僚司令君善承家學文光赫然為御史為部使者百壬斂迹又以政事聞何鄭氏之多賢哉雖然不開之於先後將何繼不繼之於後前何以昭司令君汲汲為不朽之圗可謂知所本矣濂因備書其事冠諸篇首知言君子必有取焉杲齋諱東字季明曲全諱采字季亮温之平陽人東軒集序東軒集者天台方君明敏之所作也明敏仕於元嘗㕘知政事於江浙行中書襟韻瀟灑而氣岸偉如發於聲詩往往出人意表其弟明則繕鈔成帙同予學子桂慎請予評之予曰古詩俊逸超羣如王子晉鶴背吹笙隨風抑揚聲在雲外律詩清麗婉切譬猶長安少年飲酒百華場中鶯歌蝶拍春風煦然撲人終日傳盃而醉色不起詩人之趣至是亦可謂之不凡矣明則曰請為之序以傳何如余曰寳劍埋於豐城而紫氣上浮於天倚蘭生於幽谷而秋馨播於九衢詩佳矣不必藉序以傳也曰此固然矣願卒一言之曰詩之古者莫三百篇若也篇首各有小序所以序作者之意而非後世通為之序也漢魏以降作者鮮自白其意讀之者不能知乃私自臆度此為某事而發此為某時而歎使若人不死即而叩之恐其未必爾也故余嘗有言作詩必自序非他人之可與聞此言似不可忽也曰固哉吾子之為詩也可以序可以無序序之將何傷焉余無以辭因取所評者書之於首簡云明敏於書無所不讀最善談名理與人交煦煦有恩意君子賢之其所長者不特能詩而已也莆田四如先生黄公後集序濂成童時即讀四如先生諸經說見其立論精㣲鑿鑿過人逺甚未嘗不慕豔之稍長厯求先生之事迹然後知其淵源之所自而凝道之有方也蓋先生居莆陽唐御史滔十二代孫世為儒家其父績師事𤓰山潘公柄復齋陳公宓二公實考亭朱子勉齋黄公之高第弟子也先生夙承父訓年十二試舉子業鄉校多占前列後二十九年始擢咸淳辛未進士第調監瑞安府比較務未上名公鉅卿争聘之為講師而丞相江公萬里挽之尤力聲譽翕然動於一時德祐乙亥冬始之官與簽樞陸公秀夫遇陸公一見極器之明年丙子杭都已陷國事不可為陸公趣先生至行都充益王府撰述官兼處置使司幹辦公事改刑工部架閣以通直郎陞武學諭遂轉朝奉郎國子監簿兼福建路招捕使司都㕘議官先生皆辭不就宋既改物歸隠重山宻林不與世接四方有受學者先生為敷繹濂洛關閩之說而開導之其為文詞務以理勝不暇如他文士馳騁葩藻以為工而當時求者紛如也門人武夷詹清子類次六經四書講義為六巻刋之而先生之子元汀州路總管府知事梓又分記序墓銘字訓之屬為五巻而刋之先生年八十二而終遺文流落於薦紳者尚多其曽孫鄉貢進士至又裒集為十巻將刻諸梓介楚王府伴讀陳子晟徵濂為序以傳濂聞濂洛中㣲考亭未興艾軒林公光朝獨倡道莆陽從之者如歸市紅泉東井之學乃聞於天下網山林公亦之實紹艾軒之傳網山之後樂軒陳公藻又起而繼之樂軒家長樂網山居福清咸來講學東井而風聲所被氣習所薰人皆有鄒魯之行及乎𤓰山復齋之起推闡考亭經訓東西角立化行而教孚文質尤彬彬可觀先生産於艾軒之鄉耳目之所濡染固已先立乎其大者復因父師之故矻矻窮年遂探考亭之正緒則其所著皆六經之㣲所宣皆天地之秘誠有未易涯涘者奈何道未及行而宋祚已移識者不能不為之惜也先生之所藴與不可傳者固已隨物俱化若并其遺文同就泯滅不亦重可惜哉先生之子若孫孜孜以傳世為務可謂不死其親者矣濂年耄而昏避求文者如避讎敵甚不得已多令學子代之今以童年慕豔之久勉徇至等所請而躬序之如此然先生之集自能行世亦不藉區區之文而後傳也先生姓黄氏諱仲元字善父後改名淵字天叟别號韻鄉老人云文憲集巻六
