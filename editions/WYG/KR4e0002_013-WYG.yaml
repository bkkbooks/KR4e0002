body:
  text: 文憲集卷十三明宋濂撰題凡五十八章恭題御製勅符後皇上以上智之聖延攬英傑置之庶位知人善任誠近世所未有洪武十一年詔以太子正字臣桂彦良為晉王右傅且親御翰墨為文勅之識以謹身殿寳其子中書舎人慎裝潢成卷請臣題其後臣惟古明王之待重臣寵之以爵告之以言者有之矣然其時之文多述於代言之人求其出於親製者不可得也親製者如漢武之於吾邱夀王莊助者有之求其褒許隆至教告深切如此者不可得也臣與彦良同朝且同官東宫甚久彦良之為人淳篤和易有長者風當今廷臣鮮見其比上嘗以擬臣濂雖臣亦自以為不及也今勅文以善學孔孟稱之望以王佐之業傳所謂知臣者莫若君其此之謂與雖然今之職為相傅者數十人上未嘗以言為賜或賜以言未嘗以稱彦良者許之也彦良獨蒙聖知若是之至安可不思報乎具簿書綜獄訟他人能之者上不以責彦良亦非彦良之所以報上也必也輔王以徳義迪王以忠孝使晉國有泰山之安賢王有明哲之譽而彦良之名亦相與流於千萬載此豈非上之望於彦良者歟彦良其可不勉歟恭題御製方竹記後皇帝視朝之暇燕處武樓中每召一二臣隣諮詢治道時吏部尚書臣詹同在帝左右厯談古帝王事旁稽物理而偶及於竹帝曰竹之類其亦多乎臣同對曰其類實繁晉戴凱之所譜至五十餘種或根如盤輪或節若束針或細則勝箭或鉅可為舟有未能厯舉者大槩其色皆青其體皆圓也唯吳越山中有名方竹者最為佹異四稜直上弗偏弗頗若有㢘隅不可犯之色以故士大夫愛之往往采而為節帝曰信有諸乎臣同復對曰老臣焉敢謬言既退獲一枝以獻帝摩挲觀之悦曰臣同其亦信人哉於是親御翰墨草方竹記一通始言品物之夥中序格致之難及其末也謂臣同為人俊偉氣豪稽之傳記智過百人曰豪千人曰俊天語之褒嘉斯亦至矣已而召臣同於端門俾給事中繕書以賜臣同不勝忭躍將趨拜墀下帝笑曰卿頭童齒豁矣何以謝為臣同捧出屬裝潢工飾以龍紋玉軸持視太子賛善臣宋濂臣濂竊自念草莽㣲臣侍帝前者十又五年當帝為文性或不喜書詔臣濂坐榻下操觚受辭終食之間入經出史衮衮千餘言仰見天光昭回赫著簡素皆日精月華之所凝結敷之為卿雲散之為彩霞曾不見神化著見之迹其誠所謂天之文哉臣濂聞之三代而下混一寰宇者若漢唐之髙祖宋之太祖皆産乎北其勲烈信偉矣而未見以文辭稱今我皇帝生自南服天戈一揮九州内外㒺不臣妾自天開地闢以來世之所未有况乎神藻煥發陰麗陽明下被萬物無不仰照此無他皇天欲以文明化成天下故挺生聖人度越前代若斯之盛也然聖製雖多未嘗輕以予人臣同以文學侍從之臣簡在帝心者久故特被是賜焉夫臣以誠而事上君以恩而逮下唐虞盛治一旦復見三千餘年之後何其懿哉臣同宜勒諸金石與典謨訓誥之文並藏子孫之多永永傳之無極臣同受賜以洪武癸丑嵗五月之戊辰越二十七日實六月之乙未臣濂謹熏沐而題其後云臣濂拜手謹記恭題御和詩後洪武六年八月十六日皇上特詔臣及翰林學士承㫖詹同編修日厯既而中書亦奏㫖徵浙東西及江右之士七人分年纂輯而臣與同為之總裁九月四日開史館禁中日輪寺人守閽太官進饍羞其事甚嚴且秘臣等昧爽而入至日曛始出復㑹宿於詞林虞有宣㳛蓋不敢不慎也即成槀思得俊秀有文者通攷義例而繕書之於是遴選二生具名氏以聞上可其奏其一則義烏黄昶昶時以春秋中浙江行省第十七名文解肄業成均因移文博士徵之十月二十六日昶至臣引見上於西苑慰問良久且曰爾何人之裔耶臣對曰文獻公溍昶之從曾祖也上悦復見皇太子於大本堂勉勞有加焉未㡬上遣侍臣出尚方綺裘革履以賜十一月十五日前御史中丞誠意伯劉基偕臣與同侍上燕乾清宫之便閣同被酒而還愛昶有俊才揮毫賦一詩贈之字大如斚少選奉御傳宣召臣等赴右順門會上適乗步輦而至同餘酲猶未解上謂同曰卿醉未醒耶同對曰臣雖醉猶能賦詩贈黄秀才秀才謂昶也上曰詩何在同對曰在史館中上曰濂宜亟取之臣既上奏且笑謂臣曰朕即和同詩卿當為朕書之臣書訖歸與昶言昶自草萊賤士一旦遭逢盛際奎璧之光下照幽隱於是粉黄金為泥寫上賜和之章飾以黄綾玉軸而以同詩附其後昶嘗從臣學臣又親見其事請記之左方傳諸悠久臣伏見皇上聖神天縱形諸篇翰不待凝思而成自然度越今古非積學者所可及然亦未嘗輕發其俯和侍臣之詩豈非樂育菁莪以開萬世太平之基者歟詩不云乎肆成人有徳小子有造古之人無斁譽髦斯士此之謂也昶尚朂之哉昶尚勗之哉昶字叔暘能古文辭善繼其家學者也是嵗十有二月八日具官宋濂稽首頓首謹記恭題御賜文集後洪武八年嵗次乙夘春三月壬辰皇帝御乾清宫召臣至問前御史中丞劉基何日成行臣以翌日對繼問病勢不革否還可自力至家否臣復具以聞時基有霜露之疾上憫其為開國舊勲特降手勅令起居注郭傳宣示之俾還山以便侍養然聖𠂻猶念之弗置於是延臣扣其詳語畢上步出宫門臣從後至丹墀上忽顧内史張淵曰汝往取新刋文集一部賜學士宋濂臣謹叩頭謝淵引臣至典禮紀察司與司副李彬言紀臣氏名於籍始頒受焉蓋文集係御製凡三帙入梓雖訖尚秘藏禁中當時受賜者唯太師李韓公善長中書右丞相胡惟庸與臣為三人故内臣致謹之如是也臣仰惟聖學髙逺猶天之不可階而升也其發為宸章麗日卿雲照臨下土固非蟣虱小臣讃詠所能盡至於寛仁峻徳優遇舊勲及寵異文學侍從之臣恩意兩盡尤非前代帝王之所可企及也臣抃蹈之餘故備書應對之語與獲是寵賜之由於篇末俟他日歸田當造為􅊮笥飾以雙金龍尊閣於山中云是月三日癸巳午時具官臣宋濂盥手謹記恭題賜和文學傳藻紀行詩後新知武昌府事臣傳藻以其為監察御史時所受賜和紀行詩四首視臣濂臣拱而言曰天之道不可窺也觀乎日月星辰之晦明則知之地之道不可測也觀乎草木蟲魚之生息則知之聖人天地也其靜也與道謀其動也與神俱茍非發於言語文章何由而見天地之心乎臣獲事皇上二十年睿謨英斷雖非淺陋識所能知至於求賢若不及愛民如赤子此臣之所熟聞者也由此四詩觀之望藻可謂甚切而於民事尤詳及之庸非然哉臣與藻同師且同郡識其為人嘗求其受知之故蓋藻存心恕持法平其以御史使江淮間紀行之詩多寓諷諫之意故上喜而和之益可見上之待藻與藻之事上交盡其道也視夫導君以諛説及與臣下爭名者相去不亦逺哉臣老矣退伏田里久欲無言矣以曾執筆繼史官後敷賛聖治職有宜然者故為藻書之藻自御史轉太子文學後復為御史遂出知武昌云洪武十二年秋七月宋濂題恭題豳風圖後臣濂侍經於青宫者十有餘年凡所藏圖書頗獲見之中有趙魏公孟頫所畫豳風前書七月之詩而以圖繼其後皇太子覽而善之謂圖乃方帙恐其開闔之繁當中折處丹青易致損壊命工裝裭作巻軸以傳悠久屢下令俾臣題其末臣聞之七月一詩序者謂周公陳王業以告成王故備志稼穡之艱難自于耜而舉趾自播榖而滌塲以至上入執宫功莫不纎悉備具而功女蠶績之勤繼焉嗚呼國以民為本也而民之至苦莫甚於農有國家者宜思憫之安之宋之儒臣真徳秀有見於斯嘗請于朝欲繪農夫功女勞勩之狀掲之宫掖布之戚里使六宫嬪御外家近屬知衣食之所自來盛矣其用心也恭惟皇太子殿下天賦懿徳仁孝温文而尤留意於農事每於禁中藝植麥禾以觀其成則其憫小民勤勞固不待周公之告而後知然而此心易發而難持自古賢君恒存敬畏至以朽索馭六馬譬之願殿下之心朝夕如覽圖時則四海乂安無一夫而不被其澤盛徳大業必將度越成王無疑矣臣年雖耄日切望之因推徳秀之意備書篇中以竭犬馬之誠云洪武九年冬十一月壬午具官臣宋濂謹記題宋髙宗賜答羅尚書手詔右思陵所答新安羅公彦濟手詔一通其諸孫宣明裝潢成巻不逺數百里持至浦陽江上請濂識之濂聞公自政和二年擢進士第初監登聞皷院五遷至起居郎兼侍講兼權中書舎人公常上章控辭曾未㡬何再遷御史中丞故事中丞侍御史不並置乃更除侍御史公復求去甚力及改吏部尚書公復引疾奏乞宫觀及補外郡思陵不忍公去故優詔答如此由是觀之公之難進易退之風亦人臣所鮮能哉况其經營淮南之策表章春秋法天生殺之言闢南雄守欲罪和議之疏焯焯著於當時無志事功者恐不足以致斯或者遂以胡編修岳太師為公病是知其一而不知其二者也濂因循宣明之請題諸左方而稍及公之行事使來者有所考焉詔中所謂擢冠常伯者唐龍朔二年改六部尚書皆為太常伯然吏部為諸部之首故行詞者據其事而謂之冠云題宋熙陵御書後右宋熙陵御札一道前一道凡二十九字蓋濟陰張文定公師亮為相時所賜其母秦國夫人孫氏者也按公以淳化二年辛夘九月自參知政事拜吏部侍郎同中書門下平章事四年癸巳六月以尚書左丞免在位不過二十二月上於其間以夫人夀考而有令子數召入禁中及賜手詔存問此紙特其一爾逮至免相時夫人春秋八十有五已而除公知定州公因抗章力辭曾未㡬何而夫人亦薨矣後一道凡六十九字漫滅不可讀者六字末書二十八日復識以御書之寳則公知代州日所宻賜者也按公以雍熙三年丙戌七月庚辰自僉書樞宻院事授給事中出守於代端拱二年己丑七月甲申召入為刑部侍郎樞宻副使是札必端拱元年戊子所賜是年夫人夀已八十公之在官亦將三年於是上表陳請蹔乞寜省故札中以秋防逼近差替未得直候來春别有指揮答之上不忘舊言明年公遂還朝矣所謂二十八日其月雖未能遽定以近防秋之語為證非屬戊子之五月即六月耳二札之後有跋語一通其尾止云天聖六年龍集戊辰春二月二十有六日記而不署其名攷之家集則公之第二子秘書監致仕宗誨所述也中言御前擢進士第者太平興國二年丁丑正月戊辰上親御講武殿内出詩賦題覆試進士公時在吕蒙正榜第三甲及第故云御前也公往代時跋語謂朝廷方渴邊將先公首自請行者即非當時事實蓋公居宥宻同樞宻使王顯副使王沔與議取幽薊之事及曹武恵王兵敗上頗不樂繼以奏對忤㫖乃出為外任後因趙忠獻王言之故復召還茲云請行者諱之也先是藝祖幸洛陽公疏富民封建敦孝舉賢太學籍田懲姦謹刑下并汾選良吏十策為獻藝祖已甚器之暨太宗嗣大厯服日見超擢出入二府遂陟元台雲漢昭回之章不惟寵榮於其身抑且上及其親後四百年竊觀遺墨慨想當時君臣一心而能致其時雍之治者氣象為不可㡬及書曰居上克明為下克忠其此之謂歟題孝宗付史丞相内批阜陵鋭意於恢復中原張魏公浚賛之頗力而史衛公浩多從中沮之上嚮浚方篤隆興元年正月浩拜右僕射同平章事浚即有樞宻使都督江淮軍馬之命今内批所謂肅清舊壤者蓋指恢復也又云卿勉與樞使議之樞使正指浚也當是時二府議不合故上戒飭之也建炎五月親征之詔下浩以不預出師之謀遂力丐辭罷知紹興府奉祠而歸此批之頒當在未罷相前數日間爾予道出歙上朱徵君持此巻至驛舎迫之使題故走筆識之如右張史之得失出師之成敗未暇悉也凡有㫖從内出者曰内批又謂之御筆皆内夫人代書而所謂御寳批者或上批或内夫人批皆識之以御寳唯親筆則上親書押字而不用寳此批不用寳而有押字正所謂親筆者也聊并及之以見當時故事云題伊尹古像巻後余嘗觀孫季昭示兒編其言書所載伊尹放太甲于桐放當作教以其篆文相近故譌爾其論甚偉句曲外史張天雨能取其説書於伊尹古像之後誠知言者哉雖然汲塚竹書所載又何其與此異也題商山四皓圖右四皓圖一巻所謂四皓者昉見史記張良世家則東園公綺里季夏黄公甪里先生是也初不知其姓名按陳留志園公姓庚名秉字宣明居園中因以為號夏黄公姓崔名廣字少通齊人隱居夏里修道甪里姓周名術字元道河内軹人孔父秘記又作禄里此皆王劭據崔氏周氏世譜及陶潜賢輔録而為此説綺里季則無聞焉或曰姓氏書云綺里姓季其字也予方疑其誕妄不經及讀顔師古漢書註果謂四人者匿迹逺害氏族無得而詳皆後世皇甫諡圏稱之徒及諸地里書説所傅㑹耳見古人讀書精審固有以及之者矣而周公謹所著齊東埜語又呫呫不置者何耶非惟此也傳記所載如伯夷叔齊之類一一具氏名甚悉經中既無明文不知後世何因而知之耶一笑而斥之斯可矣然自舊以夏黄公為一人而畢士安則謂綺里季夏為一人黄公别是一人其説尤異據漢恵帝時所刻四皓神座一曰園公二曰綺里季三曰夏黄公四曰甪里先生恵帝去四皓不逺足以證士安之謬矣偶題此圖遂牽聨而書之書之工拙尚未暇論也題司馬公手帖後右司馬溫公與范忠宣書一通藏楚郡龍雲從家雲從間請題其後濓聞哲宗初立崇慶太后同聽政起公知陳州過闕留為門下侍郎忠宣亦從慶州召還為右諫議大夫俄遷給事中此書正此時所遣其殆元豐乙丑之冬或元祐丙寅之春乎夫公自熙寜辛亥居洛再任留司御史臺四任提舉崇福宫至是始司政柄故書中有閒居十五年之言公年蓋已六十有七新法方盛行小人附和者衆公度不可止遂絶口不言事故又有更求一任散官守候七十即如禮致事之言當是時章惇蔡確黄履邢恕等蛇蟠蚓結牢不可解公新自外至孑然獨立故又有如一黄葉在冽風中㡬何而不危墜之言公之志為可悲矣然公與忠宣素相知其居洛日忠宣方丐罷齊州之政判西京畱臺乃同為真率㑹則其志同道合固非一日之故熙寜之法又皆共怒其為害而其設施或不同者忠宣則欲去其泰甚公則欲鋤剗而絶其本根雖書有隨時示諭勿復形迹之請二賢之見猝有未易合者豈天未欲平治天下故使之然歟公遣此書後僅及數月且觀化冥冥之中忠宣繼公為左僕射務以博大開上心忠篤革士風四海方翹首望治曾未㡬何穎昌之命亦遽下矣不亦重可悲夫閲此帖者當知治亂之機所繫初不可以尋常簡牘視之也題富韓公十二帖右韓國富文忠公手帖一十有二其第一帖公為昭文相時所遣當是嘉祐三年公自至和二年與潞國文忠烈公並相及是始進昭文館大學士監修國史帖所稱集賢相公則魏郡韓忠獻王也其第二帖公服闋時所遣當時嘉祐八年公自嘉祐六年三月以母憂去位至此服除其年三月辛未昭陵升遐故帖中有甫畢家禍又遭國䘏之語而第三帖謂罪逆不死已及除禫要當與第二帖同時也其第四帖第五帖公為樞宻使時所遣當時治平元年公既除母喪即召入西樞帖中所稱昭文相公亦是魏王無疑宋承唐制以同平章事為真相之任其上相為昭文館大學士監修國史其次為集賢殿大學士或置三相則昭文集賢二學士并監修國史各除此三大館皆宰相兼之而亦以次而升魏王自集賢進昭文故帖中隨時而異稱也其第六帖公在宥府時所遣亦當是治平元年武舉之罷在望祐元年十月已未五年八月乙丑雖擢秘閣舊經試者五十一人用之而其制猶未復至是方議舉行故帖中有武舉文字始托西㕔侍郎等言是年九月丁夘卒詔行之也其第七帖當是熙寜元年初判汝州時所遣四五月間河朔大水民皆流離南郊禮畢兩府臣僚故事當有恩賜宰臣因菑而奏止之公念念不忘民故帖中亦有河朔水潦為患之云也其第八帖當是熙寜四年冬歸洛時所遣公以不行青苗之法為提舉官趙濟侍御史鄧綰所奏六月甲戌落使相以左僕射再出判汝州七月赴郡十月中引疾還家故帖中有赴汝海治事及歸洛養疾之語也其第九帖至十二帖所遣之時與第八帖同而第九帖當是與潞公時荆國王文公方得君羣小翕然附和最憚公之剛正欲陰中之故帖中有足疾七年又積憂畏心氣不寜之嘆潞公素敬愛公思欲薦起之故帖中又有曲蒙推假恐懼無地之懇也大抵賢者之出處實有闗於時政之得失今以此數帖觀之則君子小人進退之間一治一亂昭然可見有不待論而後明至若公之徳行勲業則載在國史播於天下賢士大夫之口雖婦人女子亦皆識公為賢亦不俟言而始知也此巻有宋宇文虚中跋語謂裝裭無次故濂為詳著所遣之時以足其未備更為序次如右虚中字叔通戌都廣都人以黄門侍郎使金見存仕為翰林學士承㫖皇綂初欲南奔不果竟被害云題朱文公手帖太師徽國朱文公帖一紙韻度潤逸比他日所書人以為尤可玩濂雖不敏則非特玩其字畫而已也蓋有所感也帖中云恭叔尚未至只文叔到已兩日矣見約誠之在此相聚也文叔名友文恭叔名友恭姓潘氏二人實為兄弟恭叔通禮學文公之修三禮以儀禮與禮記相參通為一書其不合者分為五類周官則别為一書恭叔實與討論之列文叔尤善問辨文公與論大學致知格物之義雖反覆數四而弗措誠之㳺澹軒也澹軒蚤從張宣公㳺晚復事文公文公遇之如黄直卿則三人者皆其髙第弟子計其一時師友相從之盛聚精㑹神徳義充洽如在泗沂之上自今道隱民散時觀之不翅應龍㳺乎𤣥闗欲一見之而不可得徒以貽有識者之感慨不亦悲夫此帖無嵗月不知何年所發其或學禁未興講道於竹林精舎時耶題宋名公與馬鶴山諸帖煥章閣待制知鎮江府馬公㑹叔以政事聞於乾道淳熙間一時所交皆龎才碩徳尺牘之存於今者猶可徵也公以直顯謨閣福建安撫使知福州日朱文公元晦出守于漳元晦帖云榮被召還之命蓋公時召入為太常大卿兼檢正實紹熙元年之八月也其餘諸公書所發嵗月亦有可知者留忠宣公仲至淳熙十六年尚居右揆續年譜載其紹熙初元即進左丞相今其銜尚云右相當是十六年袁侍郎機仲稱公為判府安撫顯謨大卿范侍御處義方自知滁州入居殿院其稱公與機仲同亦皆是十六年正公知福州時機仲帖云降授朝請郎機仲嘗權工部侍郎因論大理讞案有忤權要請外得予郡尋降兩秩至紹熙初始復元官然機仲及文節公廷秀范資政至能俱紹興二十四年張孝祥榜進士又與公為同年故帖中皆以年末稱而廷秀淳熙十三年始遷尚書左司郎中十四年除秘書少監未㡬以直秘閣出知筠州今其銜尚云左司當是十三年正公除直敷文閣江西提刑時至能之銜曰權禮部尚書者亦在淳熙中已而遷吏部遂參大政疑與仲至所發之時稍先一二年至能帖云任使超躐方悸畏控辭其或轉吏部之際耶趙忠定公子直紹熙四年三月自吏部尚書同知樞宻院事五年夏四月即陞知院今其銜尚云同知必在兩年之間子直帖云朝夕憂撓救過不暇盖為監察御史汪義端攻其植黨沽名之故也他如王文定公季海之帖中有臧否愆期等語按淳熙八年閏三月辛巳詔諸路監司帥臣各有所部郡守分三等治效顯著者為臧貪刻庸繆者為否無功無過者為平嵗終具名來上公時提㸃刑獄江西所上失期季海方在台司乃以道逺為解上不悦降公一官實淳熙十四年六月癸未帖後之署六月正與傳記相符也然即是諸公而通論之季海仲至以相業稱機仲正色立朝有古諌諍之風廷秀之愛國至能之不辱君命處義劾汝愚稽命論罷沈清臣雖於公議不無少貶然亦敢言之士子直奮不顧身定大計以安國家功業尤號焜煌無讓於古皆可謂有志不羣者矣至於紫陽文公上繼周程道學之緒使聖經昭明如日月之麗天則其功又為何如哉閲是巻者當思感悦慕效毋徒視為竒玩而已也新定馬君文禎公之七葉諸孫持此求題病忘之餘謾掛漏而書之題歐陽率更帖此碑歐陽信本晚年所書筆畫險勁若鑄鐵所成者反覆視之定為初刻本然而信本雖極力追倣右軍而其規矩媚趣或得於大令為多學大令者羊舎人薄給事為最優自後鮮有聞者唯法極師睥睨而從之至信本之起殆與之抗衡而無愧者也其有名之跡入宣和内府者凡四十紙惜皆不存而金石畧所載二十三種亦惟邕禪師塔銘昭陵六馬賛皇甫氏碑醴泉銘盛行耳類皆翻勒之多無以見孤峯崛起四面削成之勢如此本者誠可寳玩覽者當以殷彛周鼎視之題文天祥手帖予嘗見文山公與黄伯正手帖云贑州大姓起義旅相從者如歐陽冠侯等凡二十三家史多不載其名今莫可考矣寜都陳蒲塘父子亦二十三家之一乃因從子景茂請銘于公答書僅存而其氏名因籍以弗泯不亦幸哉觀公興言宿昔為之哽涕之言則其有感於蒲塘者深矣題趙子昻臨大令四帖趙魏公留心字學甚勤羲獻帖凡臨數百過所以盛名充塞四海者豈無其故哉後生小子朝學操觚暮輒欲擅書名者可以一笑矣今觀張唯編修所藏臨大令四帖聊書其末以示解事者題趙博士訓子帖後昔者趙簡子書訓戒之辭以授二子三年而問之伯魯不能舉其辭無恤則誦其辭甚習求其簡出諸袖中君子由是知其賢不肖之分也㑹稽趙君圭玉官法從時其父博士君作訓忠之書寄之圭玉佩服而弗忘復裝裭為㡧軸懸之齋閤不翅盤盂几杖之銘嗚呼圭玉固簡子之逺裔其亦聞無恤之風而興起者歟題黄山谷手帖右摩圗老翁自戎州回荆渚所遣二帖正固陵即位復宣徳郎監鄂州鹽税之時也其所稱諒正乃元祐侍御史黄公之子僑居于荆逮翁之至與兄益修持譜牒以敘宗盟翁繼往拜其家廟諒正以侍御公所用流離鍾遺翁其情好之篤不翅伯仲故翁稱之為五弟强宗也諒正善醫翁因以藥事相屬而云送藥甚恵同惜兩日喫妳差快同惜其女名也計翁生此女時年已望六十矣初翁三十餘嘗過泗洲僧伽塔即造發願文戒酒色與肉食曾未㡬何輒皆犯之至於耆年尚不能制其血氣之私如此豈飲食男女人之大欲雖賢者或不能免耶聊戲及之至若翁之大節及其翰墨之妙世無賢愚皆能道之茲不待賛也同惜後更名睦介休縣君謝氏所出長適舒城李文伯云題文履善手帖後右少保文信公手帖知贑州日六月所發公自為賈師憲所忌咸淳壬申即援錢若水例上休致之請明年癸酉紹陵特起公提㸃湖南刑獄又明年甲戌改知贑州公年始三十有九爾守贑僅踰年當徳祐乙亥之秋即帥勤王之師來赴臨安所謂六月正甲戌之六月也後一年丙子宋亡又二年戊寅公在朝為王惟義所執又四年壬午公以忠死於燕則國朝至元十九年也距作此帖時蓋九閲寒暑矣丙申春客有以悦生堂蘭亭本求跋者上有師憲題記予因斥去不暇顧未㡬胡君忽出此巻相示再拜起觀恍若見寳玉大弓於先王之世諦玩不能釋手於戲善惡之在人心其可不磨滅者如此雖千萬世不易也深可畏哉題葉信公五帖後東陽許仲文以先世所藏西澗先生葉公鎮之五帖示濂濂頗記先生以咸淳壬申除少傅右丞相兼樞宻使不拜詔授少保觀文殿大學士醴泉觀使甲戌十月改知慶元府沿海制置大使又不拜未㡬召為少師太乙宫使今第一第二帖以少保觀文等職入銜則壬申癸酉所遣正許君初權寜海令時也第三帖言許君愛人戢暴及薦牘之事雖不知為何時當在許令莅官之日計稍後於前二帖爾第四帖即前帖内幅其第五帖先生與弟竹友家書末言許權今解印去則最後者也竊惟先生正位台司屢挫權姦直言峻行無讓古人在田里時乃獨惓惓於一許令今之神明之政亦能上答先生之知上不傲下下能承上雖當宋季其氣象猶非後世所及令之子孫能寳藏五帖於兵燹之餘其亦賢者之澤哉令諱元沐號東泉景定壬戌方山京榜擢進士第云史官金華宋濂題題王羲之真跡後昔年危内翰太樸出示羲之野鳬帖且云别有喜色帖在江右出自丞相周益公家傳授次第一一有據須溪劉㑹孟平之謂如蘭亭裹鮓尤為佳絶濂恨未見之近豫章人士來求墓文忽持此帖為贄須溪題識宛然居後因驚喜曰此殆太樸所言者徧示中朝善書者咸定為真跡無疑或取唐臨者比之神氣夐然不侔鄱陽劉彦炳最號精鑒法書日閲此而不厭狂欲起舞真偽之辨固自有異哉須溪所書名中藏三代人物字偽署者輒易别謾并及之題張旭真跡唐人之書藏於秘閣者頗多惟顛張真蹟甚鮮今觀所書酒徳頌出幽入明殆類鬼神雷電不可測度其真所謂草聖者耶題郝伯常帛書後霜落風髙恣所如歸期回首是春初上林天子援弓繳窮海纍臣有帛書中統十五年九月一日放鴈獲者勿殺國信大使郝經書于真州忠勇軍營新館右郝文忠公帛書五十九字博二寸髙五寸背有陵川郝氏印方一寸文透於面可辨識蓋中統元年三月辛夘元世祖登極欲告即位定和議于宋妙揀廷臣惟公最宜四月丁未授公翰林侍講學士佩金虎符充國信使以行宋相賈似道拘留儀真不遣至元十一年六月庚申下詔伐宋問執行人之罪時公在儀真已十五載以音問久不通乃於九月甲戌用蠟丸帛書親繫鴈足祝之北飛十二月丙辰巴延南征之師竟渡大江十二年二月庚午似道懼命總管改佑送公歸國三月虞人始獲鴈於汴梁金明池四月公至燕都而七月辛未遂卒年僅五十三爾其書中統十五年即至元十一年南北隔絶但知建元為中統也十二年正月甲申宋亡帛書為安豐教授王時中所得延祐五年春集賢學士郭貫出持淮西使節獲見焉遂奏于朝勅中使取之十一月太保曲出集賢大學士李邦寜以其書上仁宗詔裝潢成巻翰林集賢文臣各題識之藏諸東觀而王約吳澄袁桷蔡文淵李源道鄧文原虞集皆有所作矣昔蘇武使匈奴匈奴詭稱武死漢昭帝使使者諭云天子射上林得鴈足有帛書言武牧羝澤中武因獲還此特出一時假托之辭非有事實也今當一介行使不通之際鴈乃能逺離矰繳而將公書至汴其殆天欲顯公之忠節耶㑹公以北歸故獲者不以聞不然則是書之所繫豈細故也哉或謂世祖見書有四十騎留江南曾無一人如鴈之嘆遂興師伐宋皆好事者傳㑹之談而不知有信史者也濂修元史既録詩入公傳今復書嵗月先後於巻末以見鴈誠能傳書云題顧主簿上蕭侍御書後嗚呼君子之制行毫末不可不謹一行有玷則衆善皆隳雖其後痛自尅責而覆水不可反瓶矣此濂於侍御史蕭振之事不能無感焉振字徳起溫之平陽人本趙忠簡公鼎所薦因秦檜引之入臺遂親檜而疏鼎蓋主和議者檜也鼎與劉大中毅然不從振劾大中以揺鼎鼎竟罷相及乎物議不可屈振頗自悔乃與檜時相異同聞楊煒上書責李光徇檜議和振因薦煒改秩意將藉此以自洗滌殊不知適為池陽之謫矣嗚呼振之治政厯厯可紀其在西蜀尤有聲故髙宗為發前有胡世將後有蕭振之歎使無劾鼎一事振能得不為君子矣乎後世公論之定卒儕之何鑄王次翁樓炤勾龍如淵羅汝楫之間號為檜黨立身一敗萬事瓦裂豈不信然哉振之友同里顧岡次鳳時為錢唐縣主簿移書於振其辭雖甚柔婉隱然有上鼎不附和議之意當時主桐廬簿賈廷佐亦疏檜累數千言桐廬與錢唐其地宻邇豈或相為謀耶然廷佐劇論讐恥不可忘名分不可貶和約不可信請誅王倫拘虜使決意用兵其言尤壯烈又可見一時士大夫忠義所激雖小官且然不特李綱張㦞曾開胡銓諸公而已惜乎岡之書不附戊午讜議中余故備論之使讀者知戴天履地為人一刻弗忘君而不失足權姦之門庶㡬仰不愧俯不作所以然者既深為振惜亦以振為大戒也岡五世孫元龍請白野忠介公繕寫其書成巻而歐陽文公黄文獻公今忠宣公咸為題識元龍之弟仲華復來徵濂文不已岡亦多賢子孫也哉題徐浩書徐季海之書本於其父嶠之所謂四十一幅屛者諸體皆備而草書尤工余頗獲見之至於騰躍奮迅誠怒猊之抉石渴驥之奔泉也世徒見其變化不測如此非可以力致殊不知其一出於真今觀此帖蓋可見矣近代趙魏公筆法多效之誠可寳玩也題龍眠居士畫馬李公麟畫如雲行水流固當為宋代第一其所畫馬君子謂踰於韓幹者亦至論也丁晞韓趙景升雖極力學之僅得其形似而其天機流動者則無有也觀此巻足以見之矣題韓幹馬臨本余頗獲覩東觀所藏圖畫中有長安韓幹花驄圗真跡其糜碎已甚四足自腕以下皆缺猶行水中然神采煥發如生似欲振鬛而長鳴者予意陳閎方能與之比肩而孔榮軰要不足窺其髣髴也今觀此巻之筆法與之絶類而紈素幸完豈不尤為珍玩也耶題淵明小像巻後右龍眠居士所畫淵明小像巻鉅公名人題賛於後發揮其出處者甚備固不必置辭於其間有謂淵明恥事二姓在晉所作皆題年號入宋之詩惟書甲子則惑於傳記之説而其事有不得不辨者矣今淵明之集具在其詩題甲子者始於庚子而迄於丙辰凡十有七年皆晉安帝時所作初不聞題隆安元興義熙之號若九日閒居詩有空視時運傾之句擬古第九章有忽值山河改之語雖未敢定於何年必宋受晉禪之後所作不知何故反不書以甲子耶其説盖起於沈約宋書之誤而李延夀著南史五臣註文選皆因之雖有識如黄庭堅秦觀李燾真徳秀亦踵其謬而弗之察獨蕭統撰本傳謂淵明以曾祖晉世宰輔恥復屈身後代見宋王業漸隆不復肯仕朱元晦述通鑑綱目遂本其説書曰晉徵士陶潜卒可謂得其實矣嗚呼淵明之清節其亦待書甲子而後始見耶姑參先儒之論而附著於左方云題越士餞行巻後古之人送别多發為聲詩以致期望祝規之意而唐為尤盛然其為辭托物以喻蓋得夫比興之義為多故有以所送人姓氏古今事而命題者如釋皎然餞顔逸得晉先傳是已有即景比物而造題者如劉商送别而月下聞蛩王符别故人得凌雲獨鶴是已有同賦古人詩以為題者如駱賓王送少府入遼共賦俠客逺從戎劉斌送劉散員賦得好鳥鳴高枝是已有以故蹟而分題者如盧綸送楊宗徳歸徐州幕得彭祖樓郎士元送李恵㳺吳得長洲苑是已有各探一物而遂作題者如張九齡餞梁明府得荷葉何包送孟儒卿得秤錢起送客得油席帽是已如此者不一而足見諸傳記盖斑斑可考也今觀越中人士送金徵君詩皆用越之名山舊迹立題以送其行其殆取法於盧綸郎士元者歟或者病其無所據予遂厯疏其故而繫於詩之左方以為越人解嘲殊不自知其辭之蕪且拙也題北山紀㳺巻後同郡許君存禮以北山紀㳺巻示濂請題識其後巻間諸詩皆鄉先達司理葉公侍講黄公太常胡公禮部吳公修撰張公之作禮部紀逰二文亦見其中然而待制栁公山長吳公頗皆有所賦詠惜乎未及采録因為檢其遺稾繕書以補焉且為之言曰權徳輿稱東陽為山水佳地今自北山言之潜嶽之峯如實蓮華屹然中居而三洞雙溪之勝暎帶後先佳則誠佳矣有若先達諸公咸文章鉅儒同生於一時同出於一郡豈非尤佳者乎何以言之人物固藉乎山川而生而山川則専倚乎人物為之引重而此諸公其顯而在上者則已羽儀文化流聲四方其隱而在下者又能播芳譽於天朝蔚為當世儒宗此非人之瑰傑益以昭夫地靈者歟侍講之詩蓋首倡者而作於至大庚戌之嵗自庚戌迨今五十餘年諸公前後物故而無一存者間嘗采芝山中經諸公倡酬之處岩紅澗碧其餘榮儼然在目有不得不感慨於中者矣嗚呼北山之雄麗不減於昔生祥下瑞當無時而休也惡知無俊偉疉興以繼諸公之軌轍者哉大篇短韻宜不止斯此巻特其權輿者爾存禮尚襲藏以俟存禮許文懿公之子學有淵源尤工於文辭非惟其性標雅有山水之嗜而景行先哲之意尤惓惓云題朱彦修遺墨後右丹溪先生書五紙與門人戴仲積及其子原禮者也夫醫之為道本於内經其失傳盖已久矣金之諸儒劉守真軰獨能逺紹絶學至先生始三傳則授受之正不言可知矣先生之弟子雖衆得其真切者惟仲積父子為優仲積不幸蚤世原禮以其學行於浙河之西從之者日益多由是先生之道沾被滋廣而三尺之童亦知先生之賢此非原禮之所致耶韓子有云莫為之後雖盛而不傳其此之謂歟原禮尤拳拳不忘而以遺墨求題謂見手澤有如見先生焉予嘗從先生㳺而交原禮諸父間甚久故不辭為之而書嗚呼師道立而善人多今於原禮見之題馮子振居庸賦後海粟馮公以博學英詞名于時當其酒酣氣豪横厲奮發一揮萬餘言少亦不下數千真一世之雄哉遺墨之出爭以重貨購之或刻之樂石或藏諸名山往往有之則為人之寳愛可知矣余藏此巻者久極為珍秘今以歸蒲圻魏先生先生博雅君子必有以賞識之為有所托矣題桂隱遺文後右桂隱黄先生遺文一十二篇其曾孫翰林侍講學士文獻公溍所鈔濂嘗受業公門見公追念先徳日蒐墜逸手録成編此蓋其藁本也濂之學子同里俞生恂購得之請識其後先生諱夢炎字子暘烏傷人博學工文辭擢宋淳祐十年進士第官至朝散大夫行太常丞兼樞宻院編修官兼權左曹郎官以朝請大夫致其事先生能文入仕之詳人類能道之至於志節之卓政事之美則鮮有知之者也先生為人不茍合忠君憂國之意惓惓不忘故於論對之際數以修君徳謹邊事為戒權臣才之欲寘諸言路使奉行其風指先生力辭不就此固足以增夫名教之重然其仁民之政尤不可以一二數在淮東制幕建議蠲放屯田租四千七百餘石通判蘇州樽節浮費獲錢十七萬緡以代民租嗚呼先生可謂偉特不羣之士矣非公之宏才碩學以繼其後又惡能世濟其美也耶今去公之歿已二十三年公之尚徳尊祖之意猶􅂱然見於觚翰間覽是編者其有不油然而興感者乎非但玩其字畫之妙而已也拾遺六篇公之髙第弟子翰林待制王君褘手抄從公命也恂并裝裭以附其後云題甘氏三友堂文後禮部主事甘君友諒以三友名堂蓋取孔子之言也余嘗恠友道壊缺諛佞以為容詐諼以為智遇不若已者則狎而愛之聞人有善則怒而變於色於是大異於古之所云矣甘君獨有志於此其過於人逺哉雖然三友世常有之貴乎有取友之資耳茍不虚中而拒則直者之言不可得而聞矣不能自治以誠則諒者將不願之矣不能謙卑自下則多聞之士不告我以善矣無是三者雖日益月增而求友其可致乎然吾聞甘君善士居官有美名非能取友殆不能爾也然猶以為未至而以名其堂其於治身之道得矣余雖耄尚將内交焉題恩斷江端元叟手跡後予幼從栁文肅公逰輒聞以仁恩禪師經賈似道墓詩有權握三朝位三事祗應知已是僧彬之句最得詩人優㳺不迫之意蓋似道厯三朝宰輔傲然以周公自期一旦敗亡在朝公卿弗恤之在野士君子弗恤之海内蚩蚩之民亦不䘏之其䘏之者惟承天主僧彬木禪火焚遺骸授其仲子歸葬㑹稽之附子崗耳似道誤國之罪可謂上通於天使其地下聞此詩將有餘愧矣此實十四字史評有闗於名教甚大今闕濟藏主以禪師手跡與元叟端公山居謠聨為一巻詣余求題故為疏詩之義若此山居謠寄興髙逺綽有寒山子之風學道之人類能傅誦之茲不復深論云題蔣伯康小傳後吾婺自東萊吕成公傳中原文獻之正風聲氣習藹然如鄒魯而其屬邑東陽為尤盛有若李正節侯茂欽信國葛端獻公容甫監察御史喬公世用通判眉州趙公周錫皆成公之髙第弟子或以忠義顯或以政事稱或以文學著傳之當世布之簡書相去一百餘載人猶象而法之嗚呼何其盛也今觀蔣君伯康小傳述其立身行已動法古人阽危之際又能力持其家使勿墜斯可謂之賢矣此固伯康問學之美所由致自非前修流風遺澤有以薫蒸之亦未必遽至於斯也嗚呼維桑與梓必恭敬止矧吾父母之邦賢哲奮興前被後承雖隱顯之或殊揆諸物則民彛之懿皆可以無媿聞風而興起者孰謂後無其人乎故因稱伯康之賢特推其本而言之忠厚君子當有取焉洪武十二年九月二十二日金華宋濂識題黙成居士矯齋記後右矯齋記一首黙成先生潘公為同宗伯益作伯益名好謙實復州史君宗回之子性嗜文史恂恂而馴飭厯官自麗水尉至通判紹興府以終先是伯益從子景良景憲受業吕成公朱文公之門故成公之女歸於景良而景憲之女又適文公長子塾故伯益於二公之學亦與有聞焉今觀先生以矯名其齋則其志之所存蓋可見矣烏傷吳生故衣冠鉅族嗜學成癖尤攻於詩文太常博士鄭君仲舒生之舅氏也以生可進於道遂因其字曰仲矯者書先生之記以為勗嗟夫先生楊文靖公之弟子也立朝大節足以㢘頑立懦故文公以剛毅近仁稱之此無他矯之之功也伯益受先生之教於二百餘年之前仲矯聞先生之言於二百餘載之後其有補於身心一也奚必並世而同時哉借使同時之士有善為文辭者雖揮千百字之多未必敵三百九十二言之簡也仲舒亦可謂善教者矣仲矯尚勉之哉洪武十年八月十三日前翰林學士承㫖金華宋濂記題李伯時山莊圗龍舒李伯時作山莊圖為世所寳傳南渡後名筆多臨摹之濂所見者數本獨此巻思致精婉殆將逼真可玩也盖伯時自為御史檢法遂以病痺致其事實元符三年庚辰伯時既歸老肆意龍眠山巖壑間素善畫嘗為此圗以寫其徜徉之趣然其所自序云元豐紀號嵗在丁已月在涂即買山於龍眠以基以堂庚辰上距丁巳凡厯二十四年矣計其買山之日伯時始尉長垣去第進士時甚為不逺則其髙情逺韻雅志石泉有非一朝一夕之故也丁巳乃熙寜之十年其冬十二月壬午詔自明年正月朔改元為元豐則戊午年也其序書於詔下之後既難稱熙寜又不可前期曰元年所以但書元豐紀號而已圗後有澹巖居士張澂所題識澂字新仲其視伯時為舅氏建炎三年己酉時為御史中丞二月己巳上疏劾黄潜善汪伯彦大罪二十條未㡬除守尚書右丞夏四月癸丑罷知江州以資政殿學士兼江東湖北制置使七月甲申以朋附苗傳劉正彦責授秘書少監分司西京居衡州澂謂自右轄得請潯陽薦竄回鴈者蓋指此也伯時襟度超軼風流不減古人澂亦竒士博學工文辭有不待言而後知故濂唯掇拾緒餘以附氏名於左方云三李即伯時公庚元中大小山即梁何㸃及其第𦙍嘗與東山何求同隱於㑹稽世稱何氏三髙時以比龍眠三李故澂舉之以為言耳因并著之題郭熙陰崖宻雪圗河陽郭熙以善畫山水寒林名蓋得營邱李咸熙筆法其所作陰崖宻雪圗大陰霮䨴而皓素淋漓使人玩之肌膚纍纍然起粟矣或者强指為楊士賢相類者殆未見其衝氣機也題趙大年鶴鹿圗趙令穰與其弟令松以宋宗室子精為文史而旁通藝事所以皆無塵俗之韵今觀令穰所畫鶴鹿圗叢竹幽汀長林豐草其思致宛如生成余隱居仙華山中時與麋鹿為友每坐白雲磴上教鶴起舞故得其情性為真開巻視之使人恍然自失題李伯時飛騎習射圗濂屢見李伯時飛騎習射圗其描寫位置如一所畫錦袍乗馬者四人前一人揵而馳反首左顧右手拽繡毬於馬後箭中毬上次一人彎弧斫鬉作放箭勢手猶髙舉未下樓大防詩所謂前騎長纓拖繡毬後騎射中如星流者是也次一人左執弓右持三矢其馬如飛似欲追射毬者最後植青楊枝于平沙繫以絳綃一人躍馬向前斜晲而射之章良能詩所謂紅綃低繫栁枝碧滿滿闗弓斫鬃射者是也盖伯時應奉廷試時所見衛士班中飛騎習射拖毬楊枝之戲故追圖若此其精神流動全用篆籕筆寫成固不俟讃美惜乎此巻但存第二騎餘皆失之終不得其全璧濂因據所見備書之使讀者暸然如見蓋亦補亡之一義云題李伯時畫孝經圗後右李公麟所畫孝經圗一巻至正中著作郎永嘉李孝光進入秘府順帝詔翰林學士承㫖臨川危素逐章補書經文元社既屋皇明受命圗入晉王邸王下教俾濂題識其左濂聞史皇作畫倉頡制字本出於一源聖人因字以著經而善繪事者則因經而作圗故古之人或繪詩與春秋或像論語或畫爾雅而圗孝經尤多人觀之者有若親逢其事感悦而歆慕不待辭説而意趣自顯則其於經似不為無助也公麟集顧陸張吳諸家之長為宋畫第一其圗是經盖取法於顧愷之勢如雲行水流自然有起伏之態誠希世之寳也然而王者之所寳在孝不在畫也厯代賢王其聲光流於無窮鮮不以能孝而致之載諸史冊尚可攷見經曰昔者明王事父孝故事天明事母孝故事地察長幼順事故上下治斯言至矣願王日加之意焉題織圗巻後宋髙宗既即位江南乃下勸農之詔郡國翕然思有以靈承上意四明樓璹字夀玉時為杭之於潜令乃繪作耕織圗農事自浸種至登廩凡二十有一蚕事自浴種至剪帛凡二十有四且各繫五言八句詩于左未㡬璹召見遂以圗上進云今觀此巻盖所謂織圗也逐段之下有憲聖慈烈皇后題字皇后姓吳配髙宗其書絶相類豈璹進圗之後或命翰林待詔重摹而后遂題之耶巻嘗藏小谷余先生家其後有雙岩鄭子有困學鮮于伯㡬所跋二公當時名流翰墨皆可寳玩雙岩謂題字為顯仁韋后所書則恐未然也嗚呼古昔盛王未嘗不以農事為急豳風之圗不見久矣有若此巻者其尚可獲之耶題蛺蝶圗後右蝶戲長春圗乃院人馬逺子名麟者所畫美人樸頭蝶筆勢圎勁意非李伯時不能到二畫皆絶品也舊時曾落宫掖故其間有上兄永陽郡王及楊妹子之字妹子縱能工書作畫未必能及此題者専指祐陵以為言則恐不然也題栢庵圗後上黨馬君庭堅其幼也父名之以栢長遂築室而居曰栢庵及主事勲曹轉閩省檢校官不至庵中者頗久乃命盱江監瑜畫為圗時展玩之而其僚友員外郎王彦和實為之記庭堅來京復請濂題其後傳有之鬯臼以掬説者謂掬栢也掬栢性堅緻有脂而香故古人破為臼用以搗鬱嗚呼栢之徳與申椒胡繩同又不特嵗寒後凋而已庭堅之父托此而訓名其知之深而望之至哉庭堅不惟奉以自名且以名其室是跬步不忘乎親矣不忘乎親者庸非孝乎昔者蘇文公命其二子曰軾轍且知軾之不外飾而車仆馬弊患不及轍其後咸如文公之言今庭堅所守貞勁而芳譽逺聞有無愧於栢者知子莫若父信哉或謂庭堅樹栢築庵乃為肥遁之計非至論也題七才子圗右七才子圗盖唐檢校左僕射同中書門下平章事韓滉所作滉善書得顛旭筆意畫則與宗人韓幹齊名其妙不待賛也宋宣和間嘗入御府故用小璽識於前後其第六璽乃帝筆二字見於義雲章及林罕偏傍記或者以此圗乃祐陵所臨祐陵作畫固有晉唐風致然畫後必有署押予於中秘屢見之因知其非也或又歸之邱文播文播雖亦畫七才子其運思平凡烏足以敵是哉黄金白璧可得而此巻未易得尚永寳之題梁楷羲之觀鵝圗梁楷東平相義之後善畫人物鬼神學於賈師古宋寜宗時為畫院待詔賜以金帶不受掛於院中而去君子許有髙人之風或者但知筆勢遒勁為良畫師且又謂其師法李公麟皆誤矣題墨本黄庭經後余嘗見黄素黄庭上下織成𤣥蘭中用丹砂作界道其絹精甚細視之不見絲縷相傳為王羲之書蓋明州刺史李振景福中遺朱友文者友文梁太祖之子後封博王博王薨竟屬陶榖家尋為大師李諱所獲復入宣和内府宋籙既訖流落人間鮮于伯機以重貲購得用樓閣錦裝潢成軸題其籖曰琹心玉文趙子昻為之賦詩定為上清真人楊許所書且稱其飄飄然有神仙之氣而伯機亦自謂生平書法得之於此為多不知何時又歸喬簣成湯垕二氏喬字仲山湯字君載最號藏書之家今則又入中秘矣予屢閲之其字體絶與墨本不同竟不能别其何者為真也豈楊與許之跡其實有異於羲之耶楊櫄氏出示此卷因備志於其後庶㡬同志之士有以訂正之題唐摹東方朔畫像賛右唐人所摹柬方朔畫像賛圭角混融而光精􅂱然非深知晉人筆法者不能予在中秘獲觀褚登善鈎榻黄庭經與此正同雖紙墨亦不殊信可寳也題李霽峯先生墓銘後濂兒時伏讀霽峯先生所撰大都賦即慕艷其人逮長受經於黄文獻公為言先生博學而能文議論英發如寳庫宏開蒼璧白琥黄琮𤣥圭雜然而前陳光彩照耀不可正視蓋豪傑之士也未及往見而先生竟觀化冥冥之中後三十年而公復薨逝又二十年濂亦髪種種而視茫茫矣慨念疇昔有志弗强賢者不能往親幸獲親者又不能盡傳其所學可勝歎哉先生之曾孫象賢與濂胥㑹南京出公所撰墓銘及文集序相示三復之餘益重耿耿象賢名世嗜學而有文今試藝銓曹擢官鄜州别乗先生為有後矣題張如心初修譜敘後浦陽仙華為屏大江為帶中横亘數十里而山盤紆週遭若城洵天地間秀傑之區也産于斯者族每繁衍而悠長髙智逺畧之士多由他郡徙居之若大羽之喬林巨鱗之滄海其間有龍溪張氏予嘗敘其得姓受氏為神明之胄流傳貴顯已詳見他世家列傳中即敘所謂北走中原逺探周漢究先民之所生南走吳越近搜吳寜吊大夫之遺墟者是也宋季自東陽白鹿山來遷諱祚字叔元者以安撫司提鎮鎮浦陽喜其山水饒沃而浦之東西又有麟溪鄭氏合溪黄氏深溪王氏左溪于氏褭溪吳氏各相規以道徳相敦以孝弟相勉以詩書積嵗既久上下相安軍民之間匪但臂指相似抑有家人婦子之意遂卜龍溪之側而家焉敘所謂樂其山水風俗之美與其民信且親而遂家焉者是也提鎮公而下七世于茲子孫之蕃即已踰百登仕版者十有餘人今固祖孫父子兄弟妻妾生卒墳墓厯厯可數過此而服盡代疏或遷徙之靡常盛衰之不一竟相視如途人者有矣於是有圗譜之設以提鎮公為浦陽始祖吳寜以前不之及而此后之子若孫皆備書焉敘所謂世系之推源者上逮弗逺族屬之登載者下逮未蕃然今日之近後日之逺也今日之寡不為後日之蕃哉吾惟盡造端托始之意使後人可繼而已者是也嗚呼世代綿延莫不有徳焉如翼運扶明賛化宣治世國世家公子公族者弗論矣亦有孝友足以宜家禮樂足以摩俗功力足以利民其視前不無稱異然而克昌厥後曾無少遜者何也因思提鎮公之鎮浦也四方雲擾而百里之中庭户晏然行者無褁糧之苦居者無捍闗之虞官府賴其保障以成治化提鎮公之及物可謂侈矣迨及子孫又能孝弟力田問道講藝升其堂則箕引而裘隨周其廡則壎唱而箎和臨其階則珠聨而玉綴提鎮公之後嗣何多賢哉吾聞周文公之造周也卜年七百卜世三十聿後子孫積徳數為過之則提鎮公之流傳寜有既耶積久愈昌數世之後將振振繩繩懸龜繫魚秉釣當軸以見天地報稱之意者今其世孫慶元學論如心公初修譜事夫如心公因濂景仰平時獲拜于月泉里第謂其查滓竭盡内外􅉷徹足以濯人肺腑徳藝淵深不能涯涘接人於神氣之㣲而嘆為前軰之不可及者今復于譜而見之耶其介子正卿亦舉明經為浦學諭與予曾同硯席謁予題識予欲為推原本始分别流派固如心公之所不言又欲為援情論道稽禮立法則又如心公之所能言予且烏乎言哉予特敬公之為人善是譜之誠而信㣲而彰確守弗失將流衍於無窮也故為題其意緒如此時皇明洪武己未秋九月朔旦嘉議大夫翰林承㫖學士知制誥兼修國史潜溪宋濂書題葉賛玉墓銘後余在浦陽與貴溪葉先生賛玉交先生之子名愛同性穎悟特甚嘗引之升樓出經題試之至正己丑先生父子皆别去不數年天下大亂聲跡不相聞者二十三年矣洪武辛亥之二月予考試春闈及榜出有葉孝友名乃貴溪人恐為先生之子復以名不同為疑時車駕將幸臨濠是月壬申㑹闈試事方畢癸酉即親策于廷甲戌臚傳進士名午門外即日謝恩趍青宫聽注授寫職名為凡偶進而分拈之孝友得為平鄉丞戊寅錫宴中書堂予被酒上馬出有從傍呼曰君非宋學士邪曰然曰子為誰曰我葉愛同也於是下馬執手相慰勞問何以更名乃知有司誤以其字聞復問先生安否則作土中人已六年矣為之悲喜交集喜則以先生有子悲則以先生之學僅止於斯也嗚呼二十三年之間人事變遷何所不有老身幸未死得與孝友一接豈非天哉然昔見孝友時兩髦初勝簮耳今則以文辭第奉常年且三十有八矣余之顛毛欲不種種尚可得乎俯仰古今而不知中心之慘慘也孝友以蔡君淵仲所撰墓銘相示因題其後而歸之題吳節婦詩後余自壯年則聞臨川吳節婦黄氏貞而甚文及頃嵗承乏史館總裁有元一代之史四方以節婦狀來上者甚衆余心存黄氏事欲為立傳而有司獨逸之殊竊恨焉今年黄氏之從孫吳君伯宗以其所為教子詩示余稱黄氏年二十七而夫泰發賈死江湖間二子一女幼黄氏苦心瘁形慈鞠嚴教詩其教之一端也余誦其辭愈歎異焉婦人之不貳其志者古多有之矣而未必能文也間有能文者矣其行未必皆善也在孔子刪詩之時三百餘篇之中求其備是二者惟共姜之柏舟為然其時去文武周公之化未逺猶且若是况今又二千載之後而黄氏獨有之豈不尤為難能矣乎其難能如此而史遺之誠可恨也然共姜之事初未嘗有傳特以其詩見取於聖人而傳黄氏之詩自誓之堅與之死靡他之語無異至於教子則深計逺慮以聖賢之道望之有殆非栢舟之所能過誠使後世有鉅人君子者出采而録之其傳世無疑矣惜乎余不足以張之也雖然安知來者無其人乎伯宗慎守以俟之可也題李節婦傳後婦人以節稱乃其至不幸也與其執之死靡他之誓曷若詠君子偕老之辭哉然而一與之醮終弗改其操身雖不幸而其苦節則有可尚者已若朱氏婦璹豈非其人哉嗚呼婦以節旌者固多而其事則殊有慕夫家貴冨而不忍去者有年壯多子而不易割恩者有不能氷雪其行姑盜名以欺世者璹之父母納李實為贅壻合婚甫十日實賈遼東遂溺死於海濤誓不更適養父母終身且依弟珍以居信誓堅確其皦如出日者歟揆前三者其無一之可疑者歟斯所謂貞節婦矣張侍講以寜傳以顯之孰謂非宜或者猶以未得旌褒為恨然旌表朝廷事也題天台三節婦傳後余脩元史時天台以三節婦之狀來上命他史官具藁親加刪定類入列女傳中奉詔刻梓行世先是㑹稽楊㢘夫為之作傳其事頗多於史官盖國史當畧私傳宜詳其法則然也近與台士㳺嘗詢之則㢘夫所載猶有闕遺者因摭其言補之杜思綗娶沈沈生三女及子勤而死繼室宗媛秘書丞陶誼女兄也生一女思綗亦仁宗媛棄膏沐弗御上奉七十之姑獲其懽心下視沈之子不翅親育十八年間悉畢其婚姻嵗丁未九月壬寅台城陷火燄燭天宗媛䕶姑柩不忍他適為兵所縶驅之行宗媛不從兵怒剚刅於頸深入二寸餘不見血而沒瀕死無他言惟念勤不置曰勤茍不存吾尚何望哉宗媛妺宗婉歸周本亦同日死於水誼婦王淑見事急抱其子名長已者屬傳姆曰持以歸其父長已存吾不死矣乃被髮亂走明日事定求之不得淑見夢媵人曰吾義不辱身赴南隣杜氏井死矣所懐簮珥亦投其中可聞漢生知之漢生其夫字也媵人以告黎明覔之皆在焉實十月乙巳也然人之受刅無血者宗媛則以之淑雖死其精靈猶能動物不亂是知貞節之人其超絶誠與常人殊薦紳家相訾嗸者輒斥曰女子婦人女子婦人猶有是嗚呼題李敘山長妻姚元靖夫人墓銘後濂居金華時嘗學經於淵穎先生吳公之門見當塗李公仲羽寄先生詩一通興寄幽邃有不可企及之妙因叩其問學淵源所自先生為之言曰當塗有姚四清徵君者時之碩士也仲羽與兄伯羽嘗師事之而仲羽之父青山府君復以經學文辭著聞仲羽兄弟既得賢父師如此故其所成就有大過於人者伯羽之文簡宻嚴奥一辭弗茍仲羽之文豐腴縟麗五采爛然延祐丁巳伯羽試京都庚申仲羽試江浙行省皆預薦舉又先後出為校官當世之人恒稱之為二李焉濂已謹識之及來金陵始職仲羽之二子宗泰宗茂文行凝峻俱為名儒而宗泰尤為夏國余忠愍公所器重濂益知先生言為可信而其家文獻之猶足徵也及觀吳文正公所述仲羽母夫人姚氏墓銘備言夫人通經史教二子極嚴向學少怠為之不食不語夜而讀書必持敝衣在傍綴之夜分不止又知仲羽兄弟之所成就雖有藉於賢父師而其出於夫人之教者夫豈少哉嗚呼昔之鉅儒因母訓成名見諸紀載者每班班可考有若夫人之賢實與之異世而同符也濂因詳著之欲其後裔知夫人家法之嚴而問學淵源有不可廢者如此夫人衆行則誌文具列之茲不復深論也誌文所書和中即四清夫人之兄習即伯羽翼即仲羽山長即青山府君甥舅父子皆以文鳴而夫人亦精于詩有梅窗集傳世一何盛哉銘辭凡三十言皆文正公手筆而并自署其名餘則仲羽書之其繫銜以集賢直學士奉議大夫者文正公自為國子祭酒之後即歸隱宜黄山中延祐戊午春始詔以今官起之行至儀真病作不復上渡江憩金陵修書纂言此蓋作銘之嵗而年正七十矣其文已刻于支言八十一卷文皆不殊惟貨財作貲産云文憲集巻十三
