body:
  text: 文憲集巻二十六明宋濂撰雜著凡二十三章文說明道之謂文立教之謂文可以輔俗化民之謂文斯文也果誰之文也聖賢之文也非聖賢之文也聖賢之道充乎中著乎外形乎言不求其成文而文生焉者也不求其成文而文生焉者文之至也故文猶水與木然導川者不憂流之不延而恐其源之不深植木者不憂其枝之不蕃而慮其本之不培培其本深其源其延其蕃也孰禦聖賢未嘗學為文也沛然而發之卒然而書之而天下之學為文者莫能過焉以其為本昌為源博也彼人曰我學為文也吾必知其不能也夫文烏可以學為哉彼之以句讀順適為工訓詁艱深為竒窮其力而為之至於死而後已者使其能至焉亦技而已矣况未必至乎聖賢非不學也學其大不學其細也窮乎天地之際察乎隂陽之妙逺求乎千載之上廣索乎四海之内無不知矣無不盡矣而不特乎此也反之於身以觀其誠養之於心而欲其明參之於氣而致其平推之為道而驗其恒蓄之為徳而俟其成徳果成矣視於其身儼乎其有威確乎其有儀左禮而右樂圓規而方矩皆文也聴乎其言溫恭而不卑皎厲而不亢大綱而纎目中律而成章亦皆文也察乎其政其政莫非文也徵乎其家其家莫非文也夫如是又從而文之雖不求其文文其可晻乎此聖賢之文所以法則乎天下而教行乎後世也今之為文者則不然偽焉以馳其身昧焉以汨其心擾焉以乖其氣其道徳蔑如也其言行棼如也家焉而倫理謬官焉而政教泯而欲攻乎虚辭以自附乎古多見其不察諸本而不思也文者果何由而發乎發乎心也心烏在主乎身也身之不修而欲修其辭心之不和而欲和其聲是猶擊缶而求合乎宫商吹折葦而冀同乎有虞氏之簫韶也決不可致矣曷為不思乎聖賢與我無異也聖賢之文若彼而我之文若是豈我心之不若乎氣之不若乎否也特心與氣失其養耳聖賢之心浸灌乎道徳涵泳乎仁義道徳仁義積而氣因以充氣充欲其文之不昌不可遏也今之人不能然而欲其文之類乎聖賢亦不可得也嗚呼盛矣今之人惑也聖賢之為學自心而身自身而家其為事亦多矣而未嘗敢先乎文今之人未暇及乎他自幼以至壮一惟文焉是學宜乎今之文勝於古之聖賢而終不及者豈無其故邪不浚其源而揚其瀾不培其本而抽其枝弗至於槁且涸不止也然則何為而後可為文也盖有方焉聖賢不可見矣聖賢之為人其道徳仁義之說存乎書求而學焉不徒師其文而師其行不徒識諸心而徵諸身小則文一家化一鄉大則文被乎四方漸漬生民賁及草木使人人改徳而易行親親而尊尊宣之於簡冊著之於無窮亦庻幾脩道而立教輔俗而化民者乎嗚呼吾何由而得見斯人於斯世也吾何為而不思夫聖賢之盛也虎林王生黼年甚少讀春秋而好為文問法于予予美其有志也以其大者語之河圖洛書說或問於宋濓曰闗子明云河圖之文七前六後八左九右洛書之文九前一後三左七右四前左二前右八後左六後右邵堯夫云圗者星也厯紀之數其肇於此乎方者土也畫州井地之法其昉於此乎是皆以十為河圖九為洛書唯劉長民所傳獨反而置之則洛書之數為十河圖之數為九矣朱子發深然其說厯指序其源流以為濮上陳摶以先天圖傳种放放傳穆修修傳李之才之才傳邵雍放以河圖洛書傳李溉溉傳許堅堅傳范諤昌諤昌傳劉牧修以太極圖傳周敦頤敦頤傳程顥程頤其解易大傳大概祖長民之意至于新安朱元晦則又力詆長民之非而遵闗邵遺說且引大戴禮書二九四七五三六一八之言以證洛書以為大傳既陳天地五十有五之數洪範又明言天乃錫禹洪範九疇則九為洛書十為河圖夫復何疑其說以經為據似足以破長民之惑臨卭魏華父則又疑元晦之說以為邵子不過曰圎者河圗之數方者洛書之文且戴九履一之文其象圓五行生成之圖其象方是九圓而十方也安知邵子不以九為圖十為書乎朱子發張文饒精通邵學而皆以九為圖十為書朱以列子為證張以邵子為主乾鑿度張平子傳所載太乙下行九宫法即所謂戴九履一者則是圖相傳已乆安知非河圗也及靖士蒋得之著論以先天圖為河圖五行生成數為洛書戴九履一圗為太乙下行九宫華父則又以為劉取太一圖為河圗誠有可疑先天圖卦爻方位縝密亭當乃天地自然之數此必為古書無疑乃僅見於魏伯陽叅同陳圖南爻象卦數猶未甚白至邵而後大明得之定為河圖雖未有明證而僕亦心善之則是華父心疑元晦之說而亦無定見也新安羅端良嘗出圗書示人謂建安蔡季通傳於青城山隠者圖則隂陽相合就其中八分之則為八卦書則畫井文於方圈之内絶與前數者不類江東謝枋得又傳河圗於異人頗祖於八卦而坎離中畫相交流似於方士抽坎填離之術近世儒者又有與太極圗合者即河圗之說又有九十皆河圗而有一合一散之異洛書既曰書而決非圖之說夫圖書乃儒者之要務若數者之不同何也濂應之曰羣言不定質諸經聖經言之雖萬載之逺不可易也其所不言者固不強而通也易大傳曰河出圖洛出書聖人則之書顧命篇曰河圖在東序論語子罕篇曰河不出圖其言不過如是而已初不明言其數之多寡也言其數之多寡者後儒之論也既出後儒宜其紛紜而莫之定也夫所謂則之者古之聖人但取神物之至著者而畫卦陳範茍無圖書吾未見其止也故程子謂觀兎亦可以畫卦則其他從可知矣初不必泥其圖之九與十也不必推其即太乙下行九宫法也不必疑其為太乙圗也不必究其出於青城山隠者也不必實其與太極圖合也唯劉歆以八卦為河圖班固以洪範初一至次九六十五字為洛書本文庻幾近之盖八卦洪範見之於經其㫖甚明若以今之圖書果為河洛之所出則數十載之間孰傳而孰受之至宋陳圖南而後大顯邪其不然也昭昭矣或曰子之所言善則善矣若鄭康成據春秋緯文所謂河以通乾出天苞洛以流坤吐地符河龍圖發洛龜書感河圖有九篇洛書有六篇者将果足信乎濂曰龜山楊中立不云乎聖人但言圖書出於河洛何嘗言龜龍之兆又何嘗言九篇六篇乎此盖康成之陋也此所以啓司馬君實歐陽永叔之辨而并大傳疑非夫子之言也或云揚雄覈靈賦云大易之始河序龍馬洛貢龜書長民亦謂河圖洛書同出於伏羲之世程子亦謂聖人見河圖洛書而畫八卦然則孔安國劉向父子班固以為河圖授羲洛書錫禹者皆非歟濂曰先儒固嘗有疑於此揆之於經其言皆無明驗但河圖洛書相為經緯八卦九章相為表裏故蔡元定有云伏羲但據河圖以作易則不必預見洛書而已逆與之合矣大禹但據洛書以作範則亦不必追考河圖而已暗與之符矣誠以此理之外無復他理也不必寘疑於其間也或曰世傳龍圖序謂出於圖南若河圖由圖南而傳當以龍圖解河圖可也而容城劉夢吉力辨其偽焉何哉濂曰龍圖序非圖南不能作也是圖南之學也而非大易河出圖之本㫖也八卦之設不必論孤隂與寡陽也不必論已合之位與未合之數也或曰然則易之象數舍河圖将何以明之濓曰易不云乎大衍之數五十其用四十有九又曰乾之策二百一十有六坤之策百四十有四此固象數之具於易然也不必待河圖而後著也或者無辭以對濂因私記其說而與知易者証焉鑽燧說宋子閒居見家人夏季改火不用桑柘取赤檆二尺中析之一剜成小空空側開以小隙一劀圓大與空齊稍銳其兩端上端截竹三寸冒之下端寘空内以細綯纏其腰别藉卉毛於隙下左手執竹右手引綯急旋轉之二檆相軋摩空木成塵烟輒起塵自隙流毛上候其烟蓊葧以虚掌覆空􅓹之則火燄燄生矣宋子嘆曰火在木中不鑽則火不見萬善具於人性不學則善不明人何可不學哉撲滿說撲滿貯錢陶器也状類甖口通一錢錢入不可出滿乃撲去故名濂因是未嘗不悲石荆州之為人也荆州俠士刼逺使商客致富至與貴戚爭豪以鐵如意擊碎珊瑚非金多不能然卒用是以殺其身嗚呼荆州亦撲滿歟傳曰仁者以財發身又曰積而能散然則聚財而不散者不可哉寧山續說兵部尚書單公徳夫濠梁之人也其與濂交嵗行将一周及再㑹京師公以寧山巻示濂曰名之有字固周道之彌文也字之外又有所謂號焉不幾於彌文之尤者乎此盖昉於晉流於唐極於宋秦漢以前無是也雖然行之既乆孰能廢之吾以寧山為之别稱意将取安靜之義臨川先生既為之說矣子幸為余重言之濂曰昔之人有劉彦冲者所居在屏山之下人因號之曰屏山又有孫明復者家於泰山之陽故人亦號之曰泰山焉皆從其地而實之非徒為是虚稱也今有峰名荆寳氣夜浮而矗起濠之西有山名杏靈氛􅓹蟠而平峙乎濠之北公欲取以為號盍於是乎求之然皆不彼即而獨致意於無形之寧山者豈故與古相戾耶公曰子言固善矣而吾則别有意焉夫自䘮亂以來淮楚先被其害崖非不髙也谷非不深也亦罹其蹂踐剪伐之苦盡失其故態古所謂山川鬼神莫能自寧者無甚於斯時也上帝震怒乃命皇上出而平之黄鉞一揮四海底定非惟齊民之安至于邱陵草木皆克保其恒性予驅馳戎馬之間十有餘年冒霜露而衝雨風無斯須之寧今幸列仕熈朝軄司喉舌埀紳正笏委委蛇蛇囘視昔日之為果何如耶號之以寧山所以志也山且寧民物其有不寧者乎雖然名固寓也字之而又號之寓之寓者也且夫地之載物嶄絶而屹立者人因呼之為山山初不知其名為山也名之為山山且不能自知况山之上又加其名曰某曰某者乎山既無定名吾不知孰為寧山而孰不為寧山乎濠梁之間吾廬在焉環吾廬之青翠如沐者皆山也不止荆杏二峰而已也吾茍以寕山加之山亦豈能拒予者哉吾収山之名而不求山之形盖欲全其天者爾嗚呼我則人也非山也山則山也非人也人今謂山為我又安知山不謂我為山乎若謂我為山則山與我一矣我與山一則物我齊矣物我既齊而奚虚實之有何當與子游於莽蒼之區鴻濛之都招亡是公而談齊物者可乎濂矍然而謝曰公所見幾於道矣濂尚何言哉作寧山續說蟠松說昔人之言喬木必繫於故家者何哉盖故家者非一世之謂其封培也有其素保衞也有其道所以能上千九霄下蔽萬牛撼雷風而弗驚沐雨露而常新者也嗚呼此亦自承平之時言云爾若夫當戎馬繽紛之際無澤不竭無山不童人之屋廬且不能自保其有鬰鬰芊芊巋然而獨存者乎盖必無也理之所必無而今或見之者是豈人之所能哉非人之所能則天而已矣中書左司郎中劉君明善居武昌之咸寧其先塋之在崇陽者有松暢茂成林其一最巨者枝柯縈盤勢若長蛟角鬛備具而爪距奮張尤為可觀者焉當汝潁變作蔓延至武昌愚氓起而應之相與建營結柵山之有木者剪刈無餘而崇陽之蟠松巋然獨存人過之者皆彷徨嘆息指而言曰是蟠松者出於平麓非有絶壑懸崖人跡之所不到也何為能免斧斤之厄乎且其形質與恒松等爾非鑄鐵以為枝柯也又何為能自全而不損毫髪乎嗚呼我知之矣持之以智力者不足以禦人事之變感之以慶祥者誠可以俟天命之定劉君武昌故家累世積善之深故天之報施俾其喬木在墟墓間者不異承平時其意若曰善人者天所厚也茍謂天不厚善人盍於蟠松徵之亦如是而已矣雖然天将雨而礎潤潮将生而飈興家将蕃而林木有輝理之常也今蟠松出於百剪刈之餘蒼然而弗渝充然而含滋得不為劉君之家盛大之兆乎矧劉君以濟世之學厯仕熈朝出持憲節入位郎官聲譽翕然動於中外其融顯方日進而未己也蟠松之祥又當於是乎徵之昔人又有言曰樹徳如樹木木之成材可資於一時徳之榮身可被於後裔劉君當益務乎徳哉某幸與劉君交於是推原其故作蟠松說人虎說莆田壺山下有路通海販鬻者由之至正丁未春民衣虎皮煅利鐵為爪牙習其奮躍之態絶類乃出伏灌莽中使偵者縁木而視有負囊至者則嘯以為信虎躍出扼其吭殺之或臠其肉為噬齧状裂其囊抜物之尤者餘封秘如故示人弗疑人競傳壺山下有虎不食人唯吮其血且神之已而民偶出其婦守巖穴聞木上嘯聲急意必有重貨乃蒙皮而搏之婦人質脆柔販者得與抗婦懼逸去微見其蹠人也歸謀諸鄰譟逐之抵穴獲金帛無算民竟逃去嗚呼世之人虎豈獨民也哉猿說武平産猨隕毛若金絲閃閃可觀猿子尤竒性可馴然不離母母黠不可致獵人以毒傅矢伺母間射之母度不能生灑乳於林飲子灑已氣絶獵人取母皮向子鞭之子即悲鳴而下斂手就制每夕必寝皮乃安甚者輒抱皮跳擲而斃嗟夫猿且知有母不愛其死况人也耶章氏三子制字說龍泉章史君有三文夫子孟名存道仲名存誠季名存厚既皆冠矣嘗有為其字者而其配名之義有未盡焉三子者以其父命請予為更之予竊自念加冠制字乃大賔之責衰朽之餘精神遐漂安能與聞于斯雖然不敢辭也予聞天道付予實有恒則唯正是将本無頗僻君子修之是之謂徳請字存道曰允徳何如人道之務惟在乎誠衆善之源随物以形其欲致之必由於明請字存誠曰允明何如地道所貴既厚且大深重弗遷宏博無際無所不負是曰能載請字存厚曰允載何如夫允之為言信也三子者信能察之則無媿于名若字者矣雖然未也學貴能辨辨則不戾視徳為虚𤣥而不驗之於實徳者其所謂徳非吾之所謂徳求明于寂黙而不著之於民用者其所謂明非吾之所謂明也視載為易足而不本之於龎鴻者其所謂載非吾之所謂載也三子者慎之哉雖然未也辨貴乎行不行猶馬之無足隼之無羽也𢎞其中廓乎使有容制乎外無使其沛作其欲不逺而復遏絶其未然而其天始全汨焉其若虚肅然其若拘統焉而有樞如此方能入於君子之塗矣三子者朂之哉雖然未也而家自太傅公以來以詩書禮樂衣被於子孫極盛而休其章紱之蟬聨勛業之煇煌溢于史冊而播於士大夫之口者先後相屬也而父史君尊崇理性之學嗜善如飴厲行如金石而三子者又各有士君子之操或提義旅以鎮捍鄉邦或攄所蘊以著澤物之仁或酣志書詩以纘其先緒亦既綽有令譽而予猶諄諄為是言者進學之功無已而繼志之責不易也必使上不媿天中不媿人下不媿地斯善矣三子者勉之哉雖然未也薛氏有三鳳焉才非不髙也而徳則鮮也賈氏有三虎焉位非不榮也而徳則鮮也宋氏有三絶焉才非不多也而徳則鮮也非三子者之所樂聞也三子者之所樂聞其殆聖賢之學乎予之有望於三子者可謂逺也已矣三子者其懋敬之哉其懋敬之哉傅幼學字說四明傅君其名曰行而字曰幼學問其字之說於余余告之曰子學後世之學歟将三代之學也後世之學士有以理財為學者矣有以聴訟為學者矣有以治兵為學者矣有以文章為學者矣有以訓詁為學者矣然皆非所謂學也夫辨章析句剔抉細碎若馬鄭之流訓詁之學也研精極深融理放辭若栁劉之類文章之學也貴變務竒奮智鼓勇若孫吳曺操治兵之學也以察為明以刻為公若商鞅韓非聴訟之學也箕斂口稅不遺毫釐若桑𢎞羊之徒理財之學也是皆得一而遺十或不適於用或用之而不足以致治故君子弗貴焉且夫聖人之所學者大可叅乎天地而小不遺乎事物妙可以贊化機而近不離乎云為其本仁義其具禮樂政治其說存乎經而學之存乎人人皆知學之而不能行之者惑於後世之學故也後世之學譬猶稊稗然藝之易成而穫之不可以食食必有霍亂泄嘔之疾人恱其易而不顧疾之在後不亦惑乎聖人之道猶粟菽也用之於身則氣充而體安用之於家則家裕國用之則治天下用之則四夷格而庻物育而後世未嘗大行者或有其人而無其時或遇其時而不能盡其才通患然也幼學材敏而色和志篤而有容庻乎學聖人之道者矣而又生乎今之世其殆将有合乎夫不學道而妄行者無他責也學道而不以行者自賊其心也得乎君而不以斯道事之者欺其上者也是恒人之所不敢為况幼學之名若字出於父師之訓者乎幼學盍自勉焉他日佐朝廷有以經術致治者吾知必幼學也夫說𤣥凝子𤣥凝子密人往來吳越間人問姓名不答迫之以指就案畫𤣥凝子字人因稱之曰𤣥凝子云初凝年十三時牧猪東海上有道士佩劒過之授藥一丸赤如火吞之即棄猪随道士去涉瞿塘上灔澦入青城山坐白龍洞中洞前大雪髙三四尺凝居之若溫時下山敲氷濯足澗中戯折澗竹竅而吹之學鳳皇鳴道士聞之咲曰孺子之駭一至此乎未幾道士去三神山採藥凝欲從不可獨處洞一年或三月不食即食不過黄精石芝嘗劚芝鬼城下有白虎向南行凝往執其尾躍上虎脊趍一里所舍去反白月射洞底秋風四鳴因思故鄊菊花酒且熟遂還密人見凝眼有碧燄意其已仙而凝弗是也人見凝者輒贈詩運筆如風字或類霆書鬼篆不可識俄道士復至與飲琅琊臺上大醉竟同去不知所之道士眉長八九寸雙目深髯怒張如㦸人疑為古仙人云為說者曰齊地自古多方士争言有禁方能神仙而少翁欒大尤善惑雖漢武雄才亦所不免今凝固齊産也豈其山川之靈有以致之歟嗚呼使上之人有好凝者其不少翁欒大也寡矣先王之世以左道惑衆者必拘殺於司冦必有㫖哉必有㫖哉蘿山遷居志余世居金華孝善里之潛谿其地在縣東七十里禪定院側溪之東即入義烏境元重紀至元元年乙亥正月十五日授經浦江義門鄭氏乆之以其家九葉同居乃願卜鄰焉相地於仁義里孝門橋之上其地直縣東三十里有山曰青蘿至正六年丙戌十月二十七日於山趾建寝室三楹間繚以周垣前敞小門十年庚寅二月十五日攜家自金華來遷掲其扁曰潛谿示不忘本也十四年甲午十二月八日再搆前軒如寝室之數東西榮之屬以次告完扁軒曰青蘿山房因舊山而志新築也十八年戊戌六月十八日國兵取浦江遂避入諸暨兵雖定浦江當戎馬之衝不可居十九年己亥三月十五日還潛谿故廬越九載始重葺治於是復來遷時國朝吳元年丁未四月一日也惟古人最重遷以墳墓在斯親戚在斯不敢輕於棄去或去之必出於勢之不得已今予豈有他哉特欲薰漸孝弟之風以朂我後人爾然蘿山之望潛谿朝發而夕至非若别郡千百里之逺宗屬之胥㑹先塋之展省固未嘗廢其與弗遷者初何異哉余既來遷偶閱宋嘉定末官給地券所居左右曰宋公園園與予姓同亦似不偶然者豈其數或前定歟予子孫居於此者毋析爨毋為不義毋侵蝕比隣日衣被乎詩書耕則為良農學則為良儒庻幾不負予之志也五􅂥山水志五􅂥山在婺杭越三州境上北距富春南據勾無東接浦陽其山水最號竒峭齊謝𤣥卿嘗以採藥深入其中而宋刁景純吳處厚亦頗游焉自西坑嶺入過遇龍橋北行二十歩始入西潭前横一溪水甚寒履之如氷由溪而前徑小潭旁有礁石突起類大甕斜覆乃捫石而登一失足輒墜又行二里所地稍夷曠怪石四瞰峰巒環列獻状其紋縈縈然類神工鬼斧所雕刓者山多猴逰人或恐之撒石亂下如雨又前行半里所泉自石竇中出瀏瀏作聲若琴若笙竽泉西流滙為小窪瑩澈泓徵毫髪不隱鯈魚數尾洋洋往來如行琉璃瓶中見人至潛去窪左大樹離立極怪偉倒影入水中如畫又前行五千步大石閼道相傳有岩角肖鷹喙忽夜大雷雨喙崩下聲聞二十里又行三十歩榛篠成林翠光浮映衣袂成碧色山蟲崕虺奔遶後先瞬目失所在至此則氣象隂幽絶不類人世如升蓬嶠坐水晶宫生平烟火氣消盡又自山腰縁葛而前竹籜覆地厚足動輒仆又過十歩許抵小潭小潭上曰西潭流水傾沫成白簾濶可七八尺冉冉下注滑而無聲兩傍石崖峭立苔蝕蘚暈時有水珠􅆴毶滴下嵗旱鄊民禱龍於此遇禱水或湧取蜥蜴入瓶盂中持以歸多驗自遇龍橋至此約可五六里皆蛇盤磬折路行若窮又復軒敞其中勝致難得具記或言潭上有石河從石河至三臺塔人跡罕至莫詳也尋故路而出斜迤而東過香爐峰峭拔上有石類香爐故名香爐北有峰圓而童名鉢孟峰或曰肖東甌鴈蕩又名雁蕩峰由雁蕩而南時有白雲覆於谷者曰雪峰屹然人立者名玉女峰嶄嶄勢欲柱天者名天柱峰其他諸峰星聨肺附登名圖籍者盖七十有二焉復從崕東折度略彴橋趍三學院院唐靈黙禪師道場師嘗降龍於此遺跡尚存由院北深入又百餘歩至東潭上飛瀑可二十丈瀑怒叅倒擊崕窽中若運萬斛雪從天擲下白光閃閃奪人目睛至潭底輒復逆上有聲如輥雷人咲語咫尺不能辨猶聞甕中聲居人云每天風一號四山林木震撼欲折黑雲下罩杳不知昏曉嵗多投龍者其多驗如西潭復北折而西泝潭之源登響鐵嶺度紫閬山村人多舎篁葦間有平皋數百畝可耕概傍㳂石河又行一里所地名石鼔足頓之鼕鼕鳴越十步至第一潭潭如井睨之正黑投以小石鏘若佩環又越十餘歩至第二潭圓如錡釡面廣而底敞大水驅亂石聚其内迨滿復洩去潭下石壁百餘尺險不可寘足從其石懸藤墜下至第三潭潭甚深以線縋之下不見底其形方狹而長天向隂常有雲氣從中起疑有蛟龍潛其下人恒以幽悄為病第四潭咸不敢往或以綯圍腰繫巨杙俯崕而瞰潭左右皆楓木其形大概如第二潭而廣袤倍之側有晉劉龍子墓相傳龍子常釣於潭得驪珠吞之化龍飛去後人為壘石作塚或云龍子之母塟焉世逺不可辨又其下至第五潭即東潭因其水五級故名之為洩云噫造物之委形山水者其竒峭有是哉刪烏城志元至正七年冬嘉禾城西有烏數千營巢於地圍八尺崇五尺晝夜弗休類有物督迫之者未幾大盜弄兵海上紅巾繼起江淮皆繹騷朝廷遂詔州郡築城築城自嘉禾始亦異哉唐貞元中田緒境内烏銜木成城其崇則緒五之二其圍則至數里之廣所以徳宗有播遷之禍今元亦馴致䘮亡先儒謂杜宇啼天津橋南方地氣先應亦是類歟吳僧本誠著烏城志五百餘言余愛其文特刪之以附集中本誠字道原以能文名志釋寄胡徵君仲申華容孝廉與廣平文學遇于神明之臺孝亷問曰予締子交已越二紀其貌固狎其志則未之聞也子能為我揚㩁古今而釋之乎文學曰走也不敏長自嵓穴鶴毳編襦土芝縕食動趾踉蹡發辭􅟌吃忽挾緗縹去厯都邑見者大噱指為木刻錯愕周章無地寄迹獨孝廉煖我以溫顔前我以重席迪我以三古之芳猷期我以九能之至域拜孝廉之貺厚矣孝㢘有問敢對以臆寓形霄壤不翅蠛蠓時幻嵗遷電滅鳥空唯極所適其樂則鴻出游大澤才騫氣雄鼻尖出火耳後生風金張前驅許史後從牽黄臂蒼箙矢韔弓仰落雙鵰俯搤長熊毛血旁灑塵坌四封入㨿􅐟館廷實惟供罍尊旁午豆俎衡從肉腴􅅤春酎暈移童器周八音律合六同部分立坐筵布西東緑華白台南威紫衝靨輔寄牙瓌質姣容歌㗋撼塵舞袖翩龍其有事固日新而弗足也竊有志焉孝㢘能許之乎孝㢘曰欲敗度縱敗禮古人所戒子豈宜蹈之願聞其他文學曰班生投毫令名煌燿終童請纓其齒甚少不有熖熖孰潛其爝非勒銘於燕然必建標於絶徼軒冕以之蟬聨紳笏以之姱嫽衛霍擁軨樊陳執纛公子掃門王孫媚竈霜露係乎吹嘘予奪視其慍笑其銳也若孟勞之出魯橈其重也如天球之鎮周廟天下學士揮汗為雨聨袂成帷莫不仰遺光而企末照其視處環堵厄藜藿擊壺而越吟倚柱而吳嘯卑卑南陽之耕落落滋泉之釣口心共語影形相弔不亦大有徑庭乎孝㢘曰功髙者身危位隆者名䘮此衆人之所嗜而君子之所慎也文學曰神封靈壤作鎮下方㑹稽衡華沂岱嶽常霍及毉閭分布九疆總三條於中區限兩界於外邦他若滄漲蕩浮青瀚混茫包天裹地循環相通叶湯其間怪偉靡可數詳天孫岳長水伯瀆宗叶荘昴宿寶符之貴𤣥龜青鯉之章金篋玉策之探日月珪璧之藏或隱而晦或露而彰走将簡徒御戒樓航濯足於咸池晞髪於塼桑豁氛埃於人瑕發忠信於天光蒼水之使稷邱之君庻一問之望鼎湖而想遺弓履河洛而思聖勲也孝㢘曰山川形勝固足以廓子耳目昌子文辭然非至焉子毋徒取則於太史遷也更請大之文學曰去聖逾逺學術紛披控名責實禮度是師上下有叙禮殺異宜苛察繳繞弗失絲釐貴儉兼愛上賢右鬼採椽不斵型簋唯土嗇然自奉與孔齊軌權事制宜詭行遁辭移隂轉陽入神出竒變化闔闢有目莫窺秉要執本立為經制法無常形事無成勢洞究羣情為萬物主儀節忒愆峻刑弼之肅如晨霜犯者裂肌伅鞅非到挾之以馳因彼天時以施教令若儀若象測度以定紀綱載明是謂大順食天所寓邦本所資山澤平地相厥攸宜八政之首著于經彛揣摩國紀宣明帝治或合或兼本末畢具凡有猷為㒺越憲制若是喧豗泣猋訊雷震撼乎四極充斥乎九垓渢渢乎海水起立而應龍天飛也戔戔乎五兵雜陳而神授握機也芒芒乎曠野萬里而列井布棊也是故徧索其說而試之不識可乎孝㢘曰夫子沒而微言絶諸子百氏人人殊未有能一之者也文學曰勘定惟武亦國之程其書漫衍四類是繩隂陽權謀伎巧勢形其目臚列繙繙繽繽九宫八門六甲五神軍軌兵鈐星式雷經金鷄玉狗風角鳥情制器尚精動合神機胄鎧羅陳戈㦸交施渠荅距堙鶩㝠扶胥象車雀杏行馬飛鳬武衡大櫓驩耳長芟雲火萬炬渾脫全驅䇿全器良其用益張營察六形旂按五方天地定位風雲流行龍虎騰趠鳥蛇翼驤正正竒竒巍巍堂堂赫赫赩赩稜稜璜璜以守則固以擊則揚或追北於函谷或喋血於太行或徇地於臨菑或陷壑於昆陽是亦英雄之壮觀也走竊樂之不知飢渇之在已也孝㢘曰兵者不祥之器聖人不得已而用之子服儒衣談儒書又焉用爾為文學曰粤厥軒轅游心太初上超鴻沆下入渺瀰有竊其餘亦神其軀文賓履生師皇馬毉玉柱丹砂騎鳴龍師木羊葛由神泉鹿皮折足山圖赭衣服閭女丸素書赤斧碧鷄朱璜瘕脫𤣥俗質虚心存冲寥跡入佹竒五性既絶九患亦除三階有嚴七嚴無虧身升紫宫位紀琳書隂隆伏骨目炯四規執東象之玉文契九赤之班符御躋虚之龍韈服太極之麟芝入火不爇入水不濡入石不閡入木不拘雲卧天行神潛靈飛是盖與天為徒又不特致治於無為也當闢我石室寝我世機服我胎息殺我蟲尸洗伐我毛髓銷解我膚肌覩銅狄而摩娑約令威而來歸不知能成其志否乎孝㢘曰聖人不師仙使其可為則周孔為之矣文學曰荒荒遺文或偽或真學徒巧辨或正或舛先出者堙從出者存何老生怨尤而異師是嗔藏之名山編簡乃完何傳授有緒而魚魯或殘汲冢一啓蟲書再覩何怪言放紛而不齊于古緯侯相傳内學是尊何列國寶書而盡閱其文僭辭竊義聾俗簧世日新月巧動莫之制衡錯摛瑩方州部家何立言浩深而莫究津涯始生終通生育及資何其象不一而數皆九為原熒丱冢名性氣體何圖指佹殊而重摹迭儗觸類而言何莫非此沾沾動喙徒見其鄙走将鉤其龎鴻掠其纎微懸空明之金鑑俾無遁於妍媸能若是是亦足矣孝㢘曰此粗近之然滯於傳註童習白紛若華蟬死生其間亦奚益哉文學曰孟軻氏歿世乏真儒師師萌庻倀倀奚歸孰廓我矇孰砭我愚羣言孔多契真者誰欲操腐艦以泛其區欲絡盲象以駕鼔車縱有智巧寧不殆而嗚呼噫􅐵一何寥乎九聖之神於昭於天九聖之心存之於文又何昭乎嗚呼噫􅐵薋葹盈室何有芳蓀繁星爛宵孰知朝暾寧不使我怡怡而愮愮乎帝降民衷徳與天一胡不自貴葩藻是溺顛倒首足淆混白黑棄其瓚槃寶厥瓦鬲拊膺自傷淚血交積誓劀俗穢以剗末習駕舂陵以為舟鼓闗洛而為檝張武夷以為颿期洙泗之可涉夙興夜寐偟偟業業凛然如上帝之在目睫若是何如孝㢘曰此僕素昔之所究心者也幸與子同之於是執手降臺相視而笑笑已繼之以歌曰真儒不生世隂隂兮擿植索塗愈幽深兮炯其靈根無古今兮超彼九𤣥離濁氛兮攀淵追鶱乘赤麟兮文之興䘮負以身兮任重道逺何時而止兮朝斯夕斯相期於沒齒乎續志林小引志以林名者何言多也所謂林者豫章䑕梓檆桂棫榎之屬皆在焉通曰林而不别言之何明所志之不一也所志不一其言續者何昔之君子嘗掇以名書續之所以繼也繼則繼矣其不同者何一以資多識一以牖民衷所以異也文埀世行逺者彬彬然諧彪彪然炳斯可矣子直而不婉奈何天文之昭也地文之著也人文之烜也我則不敢知今之所書其事核其辭質其理足為天下勸如斯而已矣吾聞古者左史記言右史記事職也故國無小大皆有之子職非史也其躐而僭之何史官失職乆矣國乎史曷若家乎史國私而家公也使天下之人家得史之人庻乎知法戒也奚僭為然則子所書皆善也勸矣如懲何善惡備書史也舍惡録善志也善者勸惡者懲矣曷為而不可也斯志也其言或不能盡徴者何所見異辭所聞異辭所傳聞異辭信其信疑其疑可也旌義編引浦江鄭氏世居縣東二十五里鄊名感徳里曰仁義其逺祖冲素處士綺自宋建炎初至今同居已十世歴二百五十餘年守詩書禮樂之教弗墜宋元二史俱載孝義傳中然其持守之規前録五十八則六世孫龍灣稅課提領太和所建後録七十則續録九十二則七世孫青槤府君欽江浙行省都事鉉所補皆已勒碑鋟板當時公卿大夫士所遺詩文亦累為麟溪集二十二巻刊示後昆今八世孫太常博士濤復以為三規閱世頗乆其中當有随時變通者乃率三弟泳澳湜白於二兄濂源同加損益而合于一其聞諸父之訓曾行而未登載者因増入之總為一百六十八則文辭之屬選有繫於事實者則録之釐為三巻通名曰旌義編既刻板可模印請言其故於篇端予與源為姻家濤為同門友而泳等又皆執經從余學義不容辭嗚呼是編之行其于厚人倫美教化之道誠有益哉非非子縣解篇引非非子廬於仙華山下幼不嗜書讀魯論未終篇棄去尋學鍊金碧九還寶丹斵丹房如方榻中僅容膝而述古仙人辭於四周澄坐其間身如槁木不動或睡睫不能禁輒下榻僵立達旦如斯者七嵗凡堪輿氣化之原事物盈虧之數神鬼幽顯之祕似不能越其範圍又乆之若有物鯁其中芒角森然膠刺肺腑必吐去乃暢於是濡毫著書炳然成文老生宿儒或有所未及而其藻思之奮發若山下出泉涓涓而不斷若獨繭之抽愈出而不窮既成書自號之曰非非子縣解云金華宋濂讀而疑之曰子自稱為非非孰非之耶以為人之非子耶則子為非而人為是以為子之非人耶則子為是而人為非非者固非而非之者不尤非非耶是故有是則有非無非則無是是其所非非其所是非其是是是其非非是是者固二而非非者果能一耶辟諸髹几焉人以其文墨墨也而不知其質皦皦也皦皦者謂之白如其墨墨者何墨墨者謂之黑如其皦皦者何惟黑惟白惟白惟墨惟白而黑黑非白乎惟黑而白白非黑乎亡白白則黑黑有有黑黑則白白無欲黑白而黑黑寧黑白而白黑也雖然此猶以迹言也吾本為白而黑何加焉吾本無黑而白何形焉是謂白黑忘矣白黑忘而有亡齊矣有無齊而是非泯矣是非泯而非非者絶矣非非者絶則天與人凝而合矣此之謂葆純此之謂熈神此之謂物㝠若是者何如非非子咲曰始吾學道物我而我物也繼而唯我我在今則吾䘮我矣我我且不我又何有非非者乎子言良信也濂亦莞爾一咲為繫其說於篇端非非子鄭姓源名婺浦陽人生貴人家能堅厲入道大夫士服其操行竒勁云贈浩然子叙引交神明有道乎曰有無妄而已矣然則所謂無妄者何也曰其中有物非思慮膠葛之可揺奪也非聲利沉酣之可變易也至虛而神與道合真放之無垠収之則存歴代以來恒有其人也今之近於此者其唯吾浩然子乎浩然子與余同姓其名為宗真遂以其稱浩然者為之字學道於京城報恩光孝觀得靈寳而能知鬼神之情状嗣天師知其賢號為體𤣥妙道純素法師提㸃觀事㑹朝天宫虛席中書以為言上召見奉天殿命太官賜饌俾之住持時洪武五年秋七月也又明年正月十五儀曺奉常同傳㫖諭之曰凡有事郊社及山川百神當令宗真帥其徒十人前期􅌊芳香潔豆籩以俟臨事之日仍令宗真被法服與祭浩然子拜命唯謹盖以其精潔而於敬恭神明為宜浩然子由是簡在上心屢蒙召對且賜白玉真仙像二十餘軀以鎮山中龍光赫奕光動林谷采真之士無不欣艶之余嘗見浩然子於冶城山風度凝簡執謙而有容澹然無所累其心所謂其中有物不為思慮聲利之所惑者誠近之此所以遭逢盛際而眷遇有加焉然而忠君親上臣子之職也浩然子益宜振拔精明傾竭誠慤以頌禱國祚於無疆非特敬恭明神而已誠如是雖身居方外而乃心王室被法服以與朝紳之列非僥倖也實宜也浩然子其尚朂之洪武六年冬十有一月金華宋某序顔率求鼎難秦興師臨周而求九鼎周王患之以告顔率顔率曰大王勿憂也臣請正大義以却其軍率乃詣秦君長揖言曰周之與秦勢雖若敵國其分則君臣也率聞君伐臣則有之矣自非弑逆未聞以臣伐君也不知君之興師而涉邦畿也何故天子謹使使臣以問諸左右秦君曰無他意也寡人竊聞九鼎四海之厚寶也誠願得一觀焉然恐周之執事不察敵國之情乃盛陳師衛以備不虞耳寡人人臣也豈敢稱亂率曰率意君忘其為人臣也今幸弗忘甚善率嘗適蔡蔡人有事其主者其主有龍淵之劒蔡人操刃與㦸逐而奪之或諫曰此汝主也汝何得乃爾獨弗畏不義之名乎蔡人曰吾見龍淵不見主也彼猶不見主故肆行而無忌憚君今知為人臣而興師求九鼎焉何也君不聞齊晉之事乎齊地方千里帶甲數十萬天王嘗賜太公履東至于海西至于河南至於穆陵北至於無棣五矦九伯皆得専征迨桓公之興平宋折鄭帖服荆楚威行諸侯天下莫强焉尚欵欵以尊周為事未嘗敢求九鼎也晉地亦方千里帶甲亦數十萬掎以太行之髙起以首陽之雄迤以黄河之深靡以大陸之廣所謂表裏山河之固晉實有之文公籍累世之盛侵曺伐衛大戰于城濮而楚師敗績列國畏威無敢不從然猶一曰尊王室二曰尊王室亦不敢求九鼎也今君欲行霸術不思法桓文而乃惟不軌是圖率恐諸侯有以議君也且君有不義者三以臣帥兵而刼天子不義一也鼎乃先王重器而敢睥睨之不義二也肆虎狼之威志在邱墟宗廟不義三也六國怨秦之虐日夜共謀洹水之上恨無其名以興師設知君有爾韓必遣三將軍出宜陽趙魏與韓唇齒之邦必注強弓蹠勁弩助之燕雖稍弱勢不能以獨寧四國合一精兵當不下三百餘萬齊為山東大國亦必驅其衆西向殽函嘗見諸侯並起其雄吞之志益暴又必急趍擣武闗君雖有百二之險舉六豹而噉一牛不至血肉狼藉不止也率竊為君危之夫鼎者又以昭夫徳也茍無其徳雖得之必亡之昔夏之盛也貢金九牧鑄鼎象物百物而為之備使民知神姦用能協于上下以承天休桀有昏徳鼎遷于商商紂暴虐鼎遷于周周徳雖衰天命未改君尚可力求之耶楚荘之强君之所聞也因伐六渾之戎遂來問鼎之重輕王孫滿一言却之輒俛首莫敢吐氣者豈力有不足哉誠畏負不義之名也君世有功於天王今其所為可不如蠻荆之長乎為吾君計莫若告於衆曰寡人不敏昧厥君臣大分帥爾有衆欲求鼎于周周之大夫弗以寡人為不榖肫肫然喻之矣寡人雖至愚竊已藏之中心矣爾衆宜解甲韜戈從寡人寡人幸至于廟當悔解自罰復告于太史書之以旌寡人之過君能如此則改過不吝之成湯又見於今日也君徳孰加焉秦君聞之赧然謝顔率曰子之言良是也即日罷兵西還鼎周鼎也故借周天子立論為說者曰秦師求鼎之事雖急率以是大義折之秦縱暴必能退師初不待陳臣思将兵以救之也既不能然復以八十二萬人輓鼎誑齊率真小人哉嗚呼大義不明乆矣豈獨率一人之為然哉嗚呼大義不明乆矣擬漢使諭郡國共擊邯鄲檄惟髙皇帝提三千卒起自豐沛赤幟一揮而天下底定累洽重熙至于孝平皇帝藐在幼冲委制新都侯莽乆秉國鈞遂致潛萌異圖僭奸天位四海豪傑怨怒切骨至有枕戈待旦而弗寐者義旗始竪持劒之士動以萬數不一二年直搗長安衆共誅莽天地為之開明日月為之宣昭神祗為之􅓹舒爾吏民之所共知賊王郎者本邯鄲卜筮之家乘海内弗靖詐稱成帝子子輿以惑爾吏民趙魏亡賴男子遂立為帝徇下幽冀漢與賊決不兩立義将剪屠之今大司馬劉公将城頭子路刁子都兵百萬衆從東方來軍容之盛煇赫震蕩如雷如霆攖其鋒者無不殞滅爾吏民皆漢舊臣當不忘二百年子養元元之澤帥爾子弟執爾戈矛鼓行而西相與成大功漢法具在陷陣却敵者受上賞搴旗斬将者次之執俘獻馘者又次之爾吏民随所擇焉前之大将軍建立殊績埀名竹帛者亦夫人也曾謂爾吏民弗能之乎亦在朂之而已其有不知順逆之辨甘為賊虜敢持兵以拒我者必草薙而禽獮之盡根株痛斷乃止耳爾吏民姑昧昧思之新莽篡立已十四年置百官有司謀臣甲士雄天下尚頸血濺地節解臠分王郎以新集之衆假名烏合遇戰則鳥獸散其能與漢兵敵乎漢徳在人心者未泯海内謳吟思之雖五尺童子日夜矯首以望赤帝旌旗之至故一叱咜間破昆陽之圍斬司徒之首拔武闗之險降宛城之兵下河北之衆星流電掃若神兵自天而下皆爾吏民目所親覩此無他天命所在固不可易也昔髙皇帝嘗刑白馬盟諸侯王非劉氏而王者天下共擊之况王郎僭厥帝號反易天常罪決在不赦爾吏民上察天命下度人心尚傳相告語戮力以誅無道使他日祀漢配天不失舊物爾吏民榮名無窮焉不然漢兵且至其無悔擬孝武南巡金石刻文按水經注及十道四蕃志所載而補之皇帝臨御撫有四極上與神通行幸雍郊親祠五畤白麟顯異如厥汾隂后土效靈地祗元光五年之冬行南巡狩至于盛唐望祀虞舜九疑􅓹葱天柱用登上凌峻極直薄太清眺望汪洋遂自潯陽下浮大江射蛟水中輯江淮物㑹大海氣以合岱宗上天報享著厥靈貺民用平康協氣自順灾害不作利澤攸長在昔神禹刻石紀功百世彌章羣臣從行請勒遺制昭示萬方廣薛季㫤對張柬之語神龍元年春正月秋官侍郎張柬之天官侍郎崔𤣥暉中臺右丞敬暉司刑少卿桓彦範相王司馬袁恕已舉兵討武氏之亂張易之昌宗伏誅中宗復位洛陽長史薛季㫤乗間言于柬之曰侍郎舉義兵剪除奸雄匡復帝室使四海蒼生再見唐家日月其事甚偉而季㫤無一語以為賀者侍郎亦知其意乎柬之曰不知也季㫤曰僕亦為侍郎不知也侍郎若知則其所設施當不止此侍郎幸聴僕僕請披肝瀝膽為侍郎言之昔我髙祖提三尺劍起晉陽輔以太宗之神武将帥之忠烈然後能縛世充於東都戮建徳於河朔剪黑闥於山東収李密於黎陽誅蕭詵於江陵晝不得息夜不得寐蟻蝨生於鎧胄之間盖出萬死一生百戰而有天下此無他欲為聖子神孫建萬世不拔之業耳今武氏以妾媵之㣲黜奪帝位斷王皇后蕭淑妃手足投酒甕中囚諸宗室朝明堂恣行殺戮御則天樓大赦天下革唐號為周易服色置社稷立宗廟身被衮冕手秉大珪自稱曰天冊金輪大聖皇帝南面而朝羣臣自天地始分以至于今未嘗有也侍郎竪義旗以復辟為辭但殺二張而釋武后弗圖是捨豺狼而問狐狸何以厭服天下人心僕竊為侍郎弗取也侍郎若聴僕計集百辟卿士執武后獻諸太廟數其過惡取太宗黄鉞斬之以謝天下凡武氏之在中外者無小大皆盡殺無赦庻幾少慰先帝在天之靈而侍郎髙義亦不在伊尹周公下侍郎能留意乎柬之曰吾業與𤣥暉等謀亦嘗如長史言但武后倒持魁柄二十有一年生殺廢置皆自其手出三公九卿惟知有武氏勇将精兵亦惟知有武氏萬邦黎庻亦惟知有武氏脫有一人號於衆曰天后且爾将何所寘吾屬乎則吾作虀粉矣季㫤曰不然武后負滔天之惡海内雖畏其威忠義之心人孰無之其専制之初李司馬起兵揚州奮臂一呼得勝兵十餘萬山東豪傑皆蒸麥為粮挿鋤為兵以俟南軍之至當時天下尚憤惋如此况今日乎侍郎朝𤣥武門而入不過羽林兵五百人耳誅二張如殺狐兎無一人敢動者則人情可知也侍郎即誅武后天下有不帖帖者當使鐵鈎鈎吾舌懸於長安城上以為亂言者之戒柬之曰漢之吕后與武后無大相逺平勃雖将南北軍未聞誅之豈不以誅之為弗是耶季㫤曰武后之罪浮于吕后萬萬吕后雖殺孝恵子盡封諸吕為王未嘗敢移漢鼎今武后肆行不道賴皇天后土未絶唐祚使侍郎得竭忠其間不然其天下非復唐有欲持一巵酒滴獻陵土且不可得侍郎尚欲同之乎柬之曰武后母也今天子子也以子罪母縱快忿一時如萬世公義何季㫤曰傳有之人臣無将将則必誅設有人焉招納亡命而欲睥睨神器侍郎必盡殺之乃已是何也亂臣賊子决不可赦也武后於唐大義已絶不過一亂賊耳二三大臣為國家討賊宜從先帝之法豈上所得預聞當此之時宗廟社稷為重武后為輕能殺之乃所以伸公義也柬之曰吾為唐家大臣即旦暮死恨無以藉手見先帝於地下今幸誅二凶復國號曰唐便當上章乞骸骨歸老故山他固不敢識也季㫤見柬之不能聴其言氣怒甚目光如炬大聲謂柬之曰此事姑寘之二凶雖誅諸武封建如舊日夜切齒恨不碎嚼侍郎之骨况三思又得辛於上儻白上罷政事矯制殺侍郎等若反掌耳侍郎尚不知動念乎柬之曰大事已定彼猶几上肉耳無相能為上素勇烈當使自誅之以張天子之威耳長史固不必過慮也季㫤退彈指嘆曰唉吾以柬之為天下人豪故往告之乃若是乃若是吾不知死所矣二月上命三思為司空五月賜柬之等王爵罷其政柄二年六月各貶為逺州司馬未幾皆為三思所殺如季㫤言文憲集巻二十六
