body:
  text: 文憲集巻三十二明宋濓撰五言律詩凡一章題李息齋竹方存雅題詩其上别駕聲名遠先生節行尊百年耆舊盡二老典刑存已返遼城鶴難招楚客魂人間留翰墨不獨重璵璠五言長律凡一章玉兔泉聨句有序洪武五年秋九月十又五日日入酉予與仲子璲過張錄事孟兼於成均秉燭對坐孟兼方命侍史汲玉兎泉㵸茗俄熊叅軍鼎劉職方崧周虞部子諒皆集相與談詩至愜心處輒抵掌笑譁吕太常仲善聞之亦驩然來㑹既啜茗已孟兼出新造玉兎泉銘諷之且曰今夕何夕勝友如雲不可無以為娯請舉泉聨詩何如衆皆曰然予年有一日之長俾題其首句餘則以次而續鬪竒據勝閧閧弗能休至二鼔詩成各擁衾就榻逮雞再號風雨凄迷僕夫載塗官事有程皆不告而散予亦騎驢去朝天矣明日孟兼将屬璲作小楷繫詩於銘左徴余為之引於戲人事聚散如中風飛矢其回旋飄泊曷嘗有一定之跡今幸得與二三君子岸幘咏詩囅然而一笑豈非天哉然此七人之衆楚産者大半獨予父子與孟兼居越西相距僅半舍他時或後先投簪而歸支九節笻訪孟兼白石山房遡咏諸賢立霄漢上欲一見不可得取此巻閱之恍如聚首成均時寜不有慰於寂寥之鄉也邪孟兼子諒皆以字名熊君字伯頴劉君字子高予則南宫散吏金華宋濓也詩曰成均地何靈聖澤資灌沃濓兎奔兆竒徴井渫廢新劚鼎自非三窟深孰湛一川綠孟兼儲精本從金生色絶勝玉子諒霜毛蘸寒飲雪毳翻夜浴崧釀洌補酒經沐丹驗仙籙仲善杵樁蟾宫棄珠噴鱣堂觸璲孕月生隂精觀天漏晴旭濓氷澄毛骨䜿鑑徹鬚睂燭鼎㕙名徒自竒獪行穢難贖孟兼雖涵東郭狡難洗上蔡辱子諒引滿瓶未羸探幽綆頻續崧流罌滲銀牀出竇濺瓊粟仲善醉沃目暈花凍汲指連瘃璲濡毫乃自潤照影從人欲濓光沈天上魄祥啟地中躅鼎摛辭挹餘清盥薦侑嘉告子諒劍刺非貳師池移豈身毒孟兼燕支媿淫陳鹽鹵鄙富蜀崧不動疑窪雪頻揺笑風纛仲善天光一眼開雲影片鱗束璲劇嚥覺瘮􅂒蹶足想彳亍濓觱沸虎爪跑㪺吸􅆐臂數鼎潔士濯冠纓渇卒卸刀韣子諒精當昴君降液或井宿督孟兼誰知鍾宿分脉與伊洛屬崧錫名爾固嘉戰句吾何局仲善聨將指鼎比疾勝擊鉢促璲驚風落燈燼斜月墜檐曲靈源詎能窮闕七言古詩凡十五章題宗忠簡公誥王黼時為少宰書名誥上青城妖祲連雲赭瞻烏靡止龍在野百年藝祖舊河山萬騎長驅若氷解京城留守一世豪仰天雪涕風蕭騷起扶白日照河北赤手欲障三秋濤義旂戞天天為泣四方猛士聞風集自期徇國與天通豈謂忠言反難入披肝上疏留至尊乗輿不顧東南廵拊牀三呌大星落非天棄宋良由人功業無成志可紀古來英傑多如此君侯心事漢武侯偉氣英聲冠千祀我來已恨王世遲不得親觀忠勇姿每過鄉邑髪猶豎綸誥况是當時為却憶前朝司馬死章蔡羣奸乘間起國雖未亂政先亡萬里蒙塵從此始吁嗟黼軰真奴臣賊君致㓂肥其身姓名汙眼尚欲嘔君侯在位能無嗔侯乎侯乎慎勿嗔誰使彼奴操國鈞君不見汴京禮樂正全盛江南杜宇啼天津題李廣利伐宛圖貳師城頭沙浩浩貳師城下多白草六千鐡騎隨将軍風勁馬鳴髙入雲師行千里不畏苦戰士難敎食黄土上書天子引兵還使者持刀遮玉闗烏孫輪臺善窺伺宛若不降輕漢使璽書昨夜下敦煌太白高髙正吐芒戍甲重徴十八萬居延少年最翹健殺氣漫漫日月昏邊塵冉冉旌旗亂水工決水未絶流旄竿已掲宛王頭執驅校尉青狐裘牝牡三千聚若丘惜哉五原白日晚郅居水急㳺魂返題段將軍征羌圖西域都䕶多男兒䕶羌校尉仍出師生羌八種來㓂塞白劍欲接雙龍飛凡亭山上血漂杵奢延澤中鬼應語至今有花皆成丹疑是當年血未乾題花門將軍㳺宴圖花門将軍七尺長廣顙穹鼻拳髪蒼身騎叱撥紫電光射獵娑陵古塞傍一箭正中雙白狼勇氣百倍世莫當胡天七月夜雨霜寒沙莽莽障日黄先零先奴古黠羌控弦鳴鏑将跳踉将軍怒甚烈火揚寶刀雙環新出房麾却何翅驅牛羊平居不怯北風凉白氈為幄界翠行銅龍壓脊雙角張綵繩亘空若虹翔將軍中坐據胡牀熾炭炙肉泣流漿革囊桐酒葡萄香駝蹄斜割勸客嘗趙女如花二八强皮帽新裁繫錦鑲低把琵琶彈鳳凰半酣出視駝馬場五花作隊滿澗岡但道驩樂殊未央題李太白觀瀑布圖長庚煜煜天之章精英下化為酒狂匡廬五老森開張銀河萬文掛石梁下馬傲睨立欲僵聳肩袖手神揚揚憶昔開元朝上皇宫中賜食七寶牀淋漓醉墨蛟龍襄人疑錦繡為肝腸麾斥力士如犬羊營營青蠅集於房金鑾不復承龍光并州可識郭汾陽不可丹陽逢永王大風吹沙日為黄狻猊哀啼聞夜郎蒼天欲使詩道昌頓挫萬物歸奚囊何處更覓延年方北海天師八尺長芙蓉作冠雲為裳授以蕋笈青琳琅蓬萊屹起瀛海洋羣仙遲汝相徊翔誰将粉墨圖縑緗顧我一見心倀倀詩成仰視天蒼茫夜半太白生寒芒題李西山古木圖營丘雲昏朔風急老蛟墮地作人立震雷怒電破杳㝠山鬼野狐皆夜泣李侯城南射虎歸手裂生綃吞墨汁狂呼􅃝臂寫此圖雲霧晦𡨕元氣濕回㸔荒原萬枯樹顔色慘澹神盡戢乃知妙奪𤣥化功庸史如林豈能識當時二李如二龍謂西山父子俊氣英聲動都邑百年灾變不須臾驥去圖存安可縶君不見風流人物今已徂豈特丹青絶代無題李易安所書琵琶行後有序樂天謫居江州聞商婦琵琶抆淚悲嘆可謂不善處患難矣然其辭之傳讀者猶愴然况聞其事者乎李易安圖而書之其意葢有所寓而永嘉陳傅良題識其言則有可異者余戲作一詩正之於禮義亦古詩人之遺意歟其辭曰佳人薄命紛無數豈獨潯陽老商婦青衫司馬太多情一曲琵琶淚如雨此身已失将怨誰世間哀樂長相隨易安寫此别有意字字欲訴中心悲永嘉陳侯好竒士夢裏繆為兒女語花顔國色草上塵朽骨何堪汙唇齒生男當如魯男子生女當如夏侯女千年穢跡吾欲洗安得潯陽半江水送錢允一還天台并序皇帝即位之二年秋八月大将軍帥師取燕都西北州郡次第皆平而天下歸於一統越明年之冬上将親御衮冕郊祀天地大告武成復念開國諸臣勞烈之多錫以鐡劵以申河山帶礪之誓前一月下禮官議其制度近臣奏言唐和陵時嘗有賜於錢武肅王其十五世孫尚德實寶藏之上遣使者即其家訪焉尚徳既奉詔櫝劵及五王遺像上之上御外朝與丞相宣國公臣善長禮部尚書臣亮主事臣肅觀之皇情悅豫敇省臣宴尚徳于儀曹恩意有加焉已而尚德東歸陛辭之日命還其券與像以禮敦遣之予時待罪禁林尚徳以余知其事頗詳請序其故而繫之以詩夫錢氏寶有此劵已五百載宋淳化中杭之守臣嘗連玉冊進之元豐五年又進之宋季兵亂劵沈官渭水中者五十六年元至順二年漁人獲之而售於尚徳之父世珪迄今有道之朝而尚徳又進之是嘗三登天子之庭其間或顯或晦雖若類靈物訶䕶之亦其子孫之多賢始能保守而勿墜也歟抑余聞武肅之有國呉越同時據有一隅以專威福者若前後之蜀南北之漢以至呉楚閩唐南平號為十國計其士馬之精彊城邑之壯麗府藏之充牣意盛氣得亦可謂一時之雄曽未旋踵夕陽芳草凄然有餘悲矣况望其子孫保其故物於十餘世之後乎由是觀之錢氏之樹徳也深矣皇明肇造區夏比隆唐虞凡前代文獻之可考者莫不訪求之尚徳之家世載眀德且將出躋膴仕以佐明時斯劵之徴葢特為之兆爾予因不辭序而詩之于以見尚徳遭逢之盛未止於此而他日相遇必當以余為知言云尚徳字允一天台人詩曰大明天子開鴻基雄兵百萬皆虎貔東征西討十餘載變化不異雲雷隨功成治定四海一剖劵分符恩澤施前王遺制久已冺錢氏世寶猶無虧天使持書徃征取有翁槖負來丹墀鞠躬俯伏再拜起旋解韜籍重重披精鐵煆成大逾瓦中突傍偃形如箕又云𤣥獻剖其半一片𤣥玉誰瑕疵鑿寲填金文絢爛筆畫方整蟠蛟螭誓辭三百有餘字河山帶礪無嫌疑繼陳五王有真像髣髴猶是唐冠衣腰圍白玉金作銙吻角左右分三髭重瞳回光屢下照笑語逾覺天顔怡便敇大官給珍饌上尊法酒澆瓊巵憶初唐綱既解紐恣舞鰌鱓號狐狸斗牛王氣果凌厲豫章占術元非欺八都健卒猛如虎指揮不異丘嬰兒羅平鳥圖騁怪幻内黄外白跳狂癡龍劍一揮赴水死大勛星日同照埀因兹錫劵代牲歃彭城開府如三司衣錦城空嘉樹老共守尚有三樓危淳化元豐兩進入龍光曾受天王知炎精訖錄九鼎沸一旦失去官河糜豈伊神物欲變化相逐雷劒為龍飛孰知漁者一舉網所獲非鼈還非龜終然鬼物所訶䕶不使光彩埋荒陂泥塗沙礫幸免累寳玉大弓欣有歸我知天意寔有在武肅𢎞烈何堪微八州生靈數百萬拔出水火行中逵子孫食報豈終極政如稼穡隨年肥髙牙大纛入黄閣金章盭綬趨彤闈不知堆牀定幾笏但見肘印懸纍纍七世珥貂未足擬一門三㦸終前衰况翁文采爛五色嗜古不管頭如絲秦淮呼酒話離别遠盻官舸如星馳于時同雲羃四野勢欲釀雪增寒威行行若過表忠觀好剔蒼蘚㸔殘碑灘哥石硯歌并序朱舍人芾雅士也近見灘哥石硯禁中遂摹榻一本裝禠成軸懸之書齋命予作歌填其空處歌曰朱君嗜古米黼同三代彞器藏心胸灘哥古硯近獲見驚喜奚翅逢黄琮研煤敷紙巧摹榻訪我一一陳始終有唐四葉崇象教梵僧航海來番禺手持貝葉寫健相翻譯華堂談𤣥空辭義幽深衆莫識當時授筆唯房融硯中淋漓墨花濕助溟真乘誠有功愛其厚重為題識七月七日元神龍鬼工雷斧琢削古天光電影生新容袤將四尺廣踰半作鎮弗遷猶華嵩涉唐來宋歳五百但見寶氣浮晴虹南渡羣公競賞識氏名環列縈秋蟲朔元雖以實内府棄寘但使烟埃封方今聖人重文獻氊䝉舟載來江東風磨雨濯露精彩奉敕舁來文華宫宫中日昃萬㡬暇侍臣左右咸雲從紫端𤣥歙盡斥去欣然為此囘重瞳重瞳一顧光照日天章奎畫分􅊏穠有才沉埋恨已久石如能語誇竒逢維昔成周全盛日兊戈徹衣并大弓藏諸天府遺孫子用以鎮國照無窮願将斯硯傳萬世什襲不下古鼎鍾上眀文徳化八極下書寛詔蘇疲癃君方執筆掌綸誥願以此言聞帝聰老臣作歌在何日洪武戊午當嚴冬望僊引横塘風斷愁紅淺舊燕銜春香滿滿鶴馭遥空不可攀繡扆斜張香夢懶暖簫不到茱茰帳寶露空溥五雲盌風前白鬢幾人悲萬里青蘋一時晚銅僊含淚辭青𤨏渺渺空嗟西日短弱川無力不勝航騎龍難到白雲鄉玉棺琢成已三載欲𦵏神仙歸北卬陶冠子折齒行陶冠先生家海堧玉作牙齒白且堅非惟硬餅似刀截左殽右胾咸能穿一朝怪事發坐側狂童酗酒步若顛手揮山斧作貍舞縱横奮擊何喧闐先生驚起急驅遏眼花落井無由悛當時月黒不辨色誤落兩齒聲鏗然先生大痛㡬欲絶吻角流血如流涎掀呀口中開穴竇唇齶一鼓風翩翩譬之連城列埤垷正陽雙玷功非全咀華從此憚强勁却愛芳脆柔於綿酒醺刺刺論世事宫徴未必能清圓東閭西井走相唁先生便可總煩悁跛足男兒尚節度折臂刺史居台躔但得錦心繡腸在何憂健翮難飛騫先生聞之只大噱誣辭奚用來如泉柔存剛缺古所戒昭晰不異明星懸余生􅄶廹與物忤藉此為鑒期無愆兩間分付妙不測神竒臭腐相縈縁但涉形形盡粗穢縣解定屬虛無先須知無趾别有趾外累皆撥蟲能天犢白人育寧足慮禍福相倚誠幽𤣥江城五月藕花發花氣蒸雨濃如烟且沽美酒對花飲正有三百青銅錢凉夜曲紅爵緑疏囘曉光翠睂雪肌凝白肪蟬衫麟帶結寶璫呉絲蜀桐啼鳳凰盤龍蘭鼎生暖香桃生豹枕展曲房夫君不來凉夜長鴛鴦離結髪成昏期白髪誰道鴛鴦中道拆妾身雖作土中泥妾䰟長與君同棲娶妻祇為多似續妾有三兒美如玉願君勿娶全兒恩一娶親爺是路人病痁新起歳在彊梧大淵獻獨蟄衡門悲逝景瘧鬼胡為苦見讎使我枯腸益悽哽初疑筋骸稍鉗束引臂噓呵絶馳騁須臾顫掉力弗禁齒牙下上聲相並䝉戎雖有狐裘溫􅀈冼何殊氷筋冷寒衰熱壯慘尤極百束薪蒸燃九鼎煆膏鑠髓無不到髙及頭顱卑脚脛四支似石下深潛一氣如塵寄寥逈自憐性命此日捐孰料平寧在俄頃起來盥濯把明鏡冠帶臨風且重整扶藜忽過百花園無限晴芳到隣杏燕支甕煖蠟凝春錦繡機翻紅暈影誰将生火鎔豔陽滿樹無烟光熲熲更疑神女㑹宓妃燕罷瑶池酒初醒血色羅裙尚舞風向人却妬晨粧靚對此閑愁盡歛藏有似投簪訪箕潁誰知鬒髪緑如雲轉目霜蓬已埀領多少東華塵土客營營至死無由省韋平荒冡生黍苖褒鄂枯髏宿蛙黽無花必用强追尋有酒何妨長酩酊題詩一笑鬼應聞定引川妃安溟涬陽翟新聲同朱定甫賦四首庚辰春作别苑蘼蕪㺯小花平洲赬蔗開輕牙春風如水極揺蕩流入天涯不識家網軒棲塵逺凝紙青鳥不來紅樹死雄鸞雌鵲此日分惜殺嬌䰟過遥渚隔簾花影望微月鸞橋似度龍綃韈倐無忽有情柰何淚灑杜鵑枝上血碧簫曲歇粉痕灰紅脚蛛絲結鏡臺望極官河斜雨外時時疑是翠車囘黄雀風長雨洗枝丹魚出水赤光肥遥天寥海絶行跡翠減紅銷知為誰曲閣香凝龍氣暖膩葉蟠花帶雲淺正是雙蛾巧喚愁欲斷應憑胡燕剪滴淚和泥封錦書書中一字一行啼莫恨鯉魚紅尾短隨波好送到遼西蹙衂雞頭徒若沸紺房蓮子光細細折蓮寄遠被絲牽舞鸞却識蓮中薏露漬銀牀金索冷明月不言星靨靨御街朝馬響纓鈴㡬樹梧桐鴉影淡暗拭衰紅出綺房無心宫額貼花黄秋裳未結鴛鴦縫交刀裁破一簾霜昔日翠翹今白葆可惜韶容鏡中老縱使青天不解愁凉榭芭蕉泣秋曉蘭燭啼紅愁夜闌江南清怨屬哀彈挑鬟斜凭玉欄干報道金籠鸚鵡寒鎮帷犀重鮮室溫白天碎碎玉花紛忩開雲母不知夜帳結流蘇散錦文盈盈小妾被流黄抱瑟升樓發浩倡銅龍漏極曙光動驩絶竟忘寒夜長祇恐愁紅向春死不死應須探春髓龍刀切紙印氷花貼在九華頳壁裏冉冉南光走冷圭梅含春影與雲齊青絲玉壺具顦顇井底生塵却解攜七言律詩凡四章和王内翰見懐韻并序余與王君子充舊同鄉逮入國朝同官翰林同總裁元史史成子充出使甘肅又使西南夷久而未還余尋以年髙納祿歸金華獨㳺山水間追數平生故人未嘗不深念我子充也去年其子紳以子充徃甘肅時道上寄余詩二章求和久未能成今聖天子敷大惠於四海與斯民更始蠻夷之長庻幾感化請罪闕下而子充亦殆将來歸耶此余之至願也次其韻以致斯意以示知子充者洪武十三年七月十一日同郡宋濓帝徳如天覆萬邦定期歸棹到龍江竒才不換金城百寵命當簪白筆雙喜極欲持如意舞醉來應使軟輿扛此情縱切何由遂吟對西南月滿忩才名老去愜休官聖澤髙深只自歡侍宴每容親繡衮從逰偏許近和鑾久知琛贄來殊俗漸喜寰區洽治安惟有張騫猶未返玉闗秋早節毛寒王内翰詩附芙蓉峰下是鄉邦未許歸帆泝浙江天下文章寧有㡬斗南人物恐無雙心期久與三乘契筆力真能九鼎扛投老著書渾不倦頗聞中夜坐燈忩同門同里復同官心事相同每共歡衮斧並操裁玉牒絲綸分演直金鑾名齊伯仲吾何敢義重師資分所安重㑹定知頭更白肯令歳晏舊盟寒和鄭博士見贈韻秋霜染得鬢成絲祗為烟霞勞夢思誰料杜陵埀白髪得同鄭老合􅁭期荷衣荇帶煩新製澗草巖花逞故知便欲從君同㸃檢歸裁氷繭寫成詩走筆送金賢良飄零已覺二毛侵且向西風問苦吟蜃雨蠻烟十年夢龍韜豹略一生心星埀鍾阜知天近水入秦淮似海深不是秋帆連夜發典衣呼酒共登臨七言長律凡四章思春辭丙申春作美人别我城南去幾見樓頭凉月生南浦沈書尋素鯉東風將恨與新鸎丁香枝上同心結九曲燈前白髪眀花託芳䰟隨鵲夢草移愁色上簾旌物華半老燕脂苑春影輕籠翡翠城歌扇但疑遮月面舞衫猶記倚雲筝因彈别鸐心如剪為妬文鴛繡懶成宫燭不啼偏有淚湘桃無語自多情岩南樹密晨烏集江北潮囘暮渚平幸有夢中能聚首喚醒恨殺短簫聲和鄭奉常先生讌集詩韻我生空負月臨奎余生辰月直奎宿占者為文學之神文學何曾遂昔期栁子未成非國語匡衡徒患作人師探珠赤水欣同調結屋青蘿得所依泉石要為中世托姓名豈料九重知東西御饌嘗分賜出入天門更不疑虎籞秋嚴威閃閃龍樓日轉影祁祁年華自覺隨流水造化誰言類小兒别夢屢形分講席歸田一似舊㳺時常隨采藥衣霑霧㡬度尋花屨帶泥投老幸知同臭味此生端不慕輕肥芳筵夜秩桮行數絳燭春融客醉遲一代耆英都在坐百年文獻欲還誰獨憐鄴下支離叟莫鬭長安絶妙辭頼有西風吹酒醒搔頭向月謾賡詩和蘇編修㳺東明山詩東明勝槩實佳哉圖畫天然八面開雲影入簾紛似絮巒光染袂緑於苔學書猶憶臨池寫采藥曾經帶雨栽祗為魚龍期變化致令􅆐鶴互驚猜數莖白髪雖侵鏡百鍊丹心不作灰中使傳宣承顧問東朝進講每低徊月移禁掖藏書署花壓瀛洲視草臺豈意衰齡霑異渥因兹勝賞得重陪丁寧杉桂無竒句約束溪山屬駿才倚杖指林尋故跡賜衣濕雨借新焙名編逓玩叢如筍嘉卉當筵粲若杯松䑕沿忩行且偃山禽窺客去仍來但知笑齒時頻啟何事愁腸日九回寄語山靈休厭我㸔花莫待作詩催和劉先輩憶山中韻憶昔山中鍊九陽山頭旭日正蒼凉鳳笙吹煖雲中火龍藥凝成鼎内霜靈戸啟扃森虎籞中房持㦸混桃康山分秋色侵𤣥氅蝸學天書篆敗墻五鳥花開呼鹿守千齡桃熟逓仙甞伐毛定欲追神女歌鳳誰能笑楚狂種得神𤓰如盎大養來瘦鶴似人長樓延虛顥殊庭上樹蝕蒼霞曲瀬傍劒氣尚堪吞鬼伯詩䰟端合起貛郎但求脫粟三升飯肯負眠雲六尺牀洞雪成漿烹日鑄海苔為紙寫風將舉頭便覺三山近小大俱㝠百慮忘七言絶句凡八章題送别圖使星一㸃照閩堧驛舍春濃酒易乾官栁似知離别意故将翠縷拂雕鞍題隱居圖樓臺倒影浸虛泓嘉樹擎寒不盡青何日過橋分半景傍雲同築草𤣥亭題長牧溪五燕圖誰描乳燕落晴空筆底能廻造化功髣髴謝家池上見栁絲烟暖水溶溶題長白山居圖滿地雲林稱隱居燕泥汚我讀殘書五更風急鳥聲散時有隔花來賣魚題張子璿畫林泉幽趣圖翩翩公子實仙才天師之子筆下雲泉潑翠開若是人間逢此景定應呼作小蓬萊宜興强如心避地而歸扁其居曰復初齋來徴余詩二首昔日攙搶照五兵今時喜見泰階平春風緑酒扶殘醉斜立官橋聽早鶯避地歸來景物遷白烟凉草思凄然摩挲為問庭前樹不見蒼髯已十年送葉明府之官郫縣文章才子之官去見說郫筒酒正醲飲罷細觀循吏傳莫縁山色憶芙蓉哀王御史并序鄉先達監察御史王公餘慶字叔善仕元至正間赫赫有聲持節廣州卒且𦵏之矣後為亂兵所發三衢徐煥自韶移守是州而東陽趙侃方知印廣東行中書於是合謀改𦵏城東悟勝寺之原寔洪武庚戌三月三日也予因從侃請大篆其爵位姓字刻之墓門復為詩哀之哀之所以歎鄉學之凋謝而斯文之無係也煥字炳文侃字希貢皆義士云詩曰剪紙難招御史䰟蠻烟瘴雨但空墳縱然有石題新篆誰守揚雄死後文四五言長短句猗歟詩有序猗歟美君子也君子謂奉常呉鎮卿鎮卿蚤以文顯使於金源不辱君命故作是詩也猗歟君子在括之陽餐然其章有玉其相厥聲孔揚聲之伊何如巖之峩峩不劌不頗屹立而弗阿塞庭逺而其勢綿如酣如連如貪噬我中區君子揚揚為天子使誕敷皇靈以讋其類彼何人斯是縶是維不虞其無知彼何人斯是維是縶不恤其無拂我金其躬我赤其𠂻我節之崇以迄於終皦爾之行孰能尤之真爾之剛孰能柔之㳺麟之冲冲兮鳴鳳之嗈嗈兮我思君子維邦之容兮猗歟九章六章四句二章章三句一章五句予謂作詩必本於三百篇自李陵專於五言歴代因之鮮有復於古者晉魏之間雖有作者音節韻趣亦有難於言矣方與劉先生伯溫同倡千古之絶學適呉從善以其逺祖墓銘求題欣然援筆賦之從善有文而又能不忘乎先如此其亦賢子孫也哉雲寓軒詩并序龍虎山錬師張君仲毓嗜學而攻詩尤善鼔琴嘗汗漫遊於湖江自謂若白雲出入空谷杳無定蹤遂以雲寓名其軒命弟子上官若冲來請余言夫膚寸而起倐然羃乎太虚者雲也英英份份資一氣之流行固凝而聚矣已而飄忽乎東西歛跡藏形類若不知所之此無他雲無心也方外有道之士茹术餐霞捐去塵俗之累翩翩然御風而逰𤣥間來無所縶去無所繫絶如雲之寓乎太空此無他亦無心也仲毓取寓雲以名軒不亦宜乎予聞至人不物夫物然後能齊於物仲毓自比於雲善矣而未免物於雲也物於雲則有礙有礙則不虛不虛則靈明不通矣我不為靜而動何形焉我不為動而靜何容焉是則動靜一如也我不為雲則夫巻也孰從而舒之舒也孰從而巻之是則巻舒亦一如也仲毓試澄心黙坐存神於鬱羅蕭臺間冲漠無朕而萬象森列其中而吾神未嘗形也未嘗形而雲果孰寓乎予當約仲毓逰金庭委羽之墟勺松華泉擘麟脯而食之且請仲毓出琴彈白雲之詩琴調清越羣仙或有驂鸞來聽者矣寓雲與否非所敢知其詩曰雲溶溶兮無根倐聚忽散兮不知其門變化罔測兮契乎道真龍虎名區兮列仙之倫剪雲製衣兮結雲以為神超然高潔兮日與雲而相隣步虛九天上兮不沾世氛水火交媾兮日月吐吞雲兮雲兮予寓爾以終其身五七言長短句凡四章蛟門春曉圖歌并序句章王君景行嗜學好修之君子也其所居曰蛟門正臨大海巨濤舂撞頃刻萬變平旦東望霞光燭天紅日大如簁想里切竹器也冉冉上升誠海東第一偉觀也王高士叔明為作蛟門春曉圖景行出以示予使人飄飄然有凌三山跨十洲之意故為賦長歌一篇而於神仙之事獨多云其辭曰瀛海無垠波濤吐吞涵浴日月叅契鬼神怪山如雲自天墜萬丈壁立蛟為門南有金雞之俯啄北有猛虎之雄蹲值獰飈兮奮揚束怒潮兮騰奔擲玉毬兮干霄灑輕霧兮飛塵雪山氷崖之可怖可愕兮帆檣簸蕩不可遏恍疑下上於星辰晨雞一鳴海色白層霞絢彩光如璊縱横閃鑠縛不定海神推上黄金盆靈境飄揺在世外髣髴直至扶桑村何人結屋於其間云是甬東才子開瓊闗雲間吹簫雙鶴下坐聆環佩聲珊珊有時共談三十六洞之秘笈緑文赤字可以鐫蒼頑猿拾花兮春片魚泳晝兮晴灣日媚嫣紅桃㸃點風入凉翠松翻翻中襟濯盡萬斛之黄埃兮不知聲利是何物便思紫府躋真班黄鶴山人列仙儒九霞為冠青綃裾手提五色珊瑚株幻出一幅真形圖令人毛骨動颯爽思乘灝氣超清都清都中有十二樓徃來盡入瓊姬儔金符玉節錦臂韝白台度曲彈箜篌雙成按拍歌莫愁我愁正孤絶我興欲飛越矯首東望神光發蓬壺春殘瑶草殷麟洲芝生翠環結我愛仙人蕚緑華面如蓮花雙鬢鴉幾年相期飯胡麻至今不來雲路遐何須龍虎鼎中求丹砂何須天河穩泛牛斗槎但令坎離交媾翻三車氣毋不動生黄芽我賦蛟門歌細看銅狄時摩娑長繩孰為覊羲娥白石應泐金還磨不學長生将奈何不學長生將奈何東雒山房詩并序東雒山房者上清羽客周君雒之隱居也雒字彦博而能文其先居伊雒之上故彦博以雒為名而又以東雒扁其居不忘乎本也葢彦博之先南遷廣信者多歴年所矣雖然彦博學神仙之道者也他日披丹霞乘青鸞北升嵩高之顛而俯瞰舊鄉寧不重丁令威之所感乎金華宋濓賦㳺仙之歌使書山房之素壁云歌曰東雒山人羽為衣腰懸寶劍光陸離超然乘天㳺曠蕩八極隨飈馳俯視嵩髙三十六一一秀出紫金翠羽之華芝中有少室八百六十丈顛倒元氣涵晨霏毿􅆴緑毛仙濯足清泠淵見人不肯折腰拜手擲綠黍散作天花旋天花旋舞連娟玉女從東來頭戴雲翹足跰􅓷試持秋帛擣寒石中夜靈響凄緊如霜絃不知龍穴有石髓太乙月鼎将同煎勞生任飄忽誰復相留連天雞一鳴天下白齊州九㸃凝青烟朝㪺瀍澗之靈泉夕潄伊洛之寒川雖知城郭尚依舊華表鶴淚應千年大江東流浴龍虎丹光掩月夜吞吐故鄉何處久不歸人間一笑成今古三素雲高不可攀仰見羣仙出沒於其間勿使明鏡凋朱顔顧我魁礧徒無由扣瓊闗我不能鼻息吹虹霓頓挫萬物歸新題我不能白晝兀坐惜居諸時翻枯竹除白魚但得三寸舌赤如蓮花凈於雪髙談蕊珠經旦夕聲不絶聲不絶造𤣥徽芙蓉峯前金虎要人騎山人當相求飛飛騰太微共持瑶華玉管凌雲吹贈虎髯生詩有序至正壬辰春勾椉張辰謂余曰虎髯生者白鳳山中人也呉姓鉞名頰有髯類虎髯人爭稱為虎髯生生自幼有大志讀書不為章句大義通而已作詩出竒語驚人至壯氣愈髙岸忽無所憚不事事與世多不合常慕古豪傑為人遇邑中大繇役隂以兵法部勒見髙山大澤便指畫為扞禦之規鄉里小兒衆相揶揄之先達士則曰此固狂生可進有為者也然以禮自守為順子為悌弟悉無慚色尤善近師友道在是不復計其年之崇卑便折節相尊事以故士類稍歸之時中原兵動東郡李侯辟為行軍司馬使者凡再返生送使者曰為予謝李將軍方天下多故莫府得十倍才功猶半之我素疎加以闇劣即偕使者去無益萬分豪幸勿復來明當入深山矣無幾有言生於行丞相府丞相屬以徼廵之職且召與語生自度丞相決不用其言乃不受更製竹皮冠服大布衣以自隱暇日窣窣然行松風中遇酒輒飲飲少亦醉醉便擊節自歌人莫識其所存何如也辰既為之傳生聞先生以文章名欲求一詩以自張幸勿為生靳予笑謂辰曰有是哉雖然辰不妄人也其言良信援毫賦虎髯生詩詩曰虎髯生鐡鑄形金鑄聲雙睛閃爍如怒鷹東飛欲盡三韓地西飛要絶康居城刺刺論世事滿口吐甲兵於焉栫長圖於焉建交營地聨大牙霜月苦天控虎口䨧雲㝠若笑我言狂我醉勿復醒十萬生靈定虀粉夜半鬼燐燒空青南方大諸侯聞之心膽驚便遣使者持弓旌招之至麾下洩此氣崢嶸生出謝使者人言慎勿聽逃入積翠巢崚嶒身衣鹿皮明首冠竹籜撑窣窣起向松風行虎髯生狂似李麄似彭何不執取紅氂丈二鎗叶搴旗斬將聲谹谹鑷白髪二首白髪如青草剪已竟還生草青能變白髪白不復青人生須知㑹有盡紫馬䭾錢沽酒傾昨日花如繡今朝花作塵人身一如花何為長苦辛古今富貴皆黄土唯有青山解笑人文憲集巻三十二
