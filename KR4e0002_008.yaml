body:
  text: 文憲集卷八明宋濓撰序凡三十五章送刑部尚書李公新除浙江行省參知政事序大丈夫生於世也先貴乎立志志既立不加之以問學猶玉巵無當其質雖美弗適於用也問學既充不遘其時猶操瑟立齊王之門雖有其藝而三年不得入也時既逢矣茍處之間曹冷局淹回下僚猶瞻仰岱嶽之巍峩亦未易叫閶闔而呈琅玕也古之人固曰不可企及亦其全是數者然後能立事功而埀竹帛也與晉康李公文彬器度宏偉昂然負髙志博習經史必期明體以達諸用當是時無有慰薦之者浮沈府掾中日以澤物為己任會海內不靜羣盜磨牙吮血殺人如麻公集兵二萬人保障封川肇慶新昌德慶四郡凡十五年強兵如九江劇盜如三山龍潭卒不能犯境幕府上其功雖纍加以重爵公惟知恤民為急而無所外慕由是薦紳之勝流岩穴之處士與夫技藝百工商賈之屬咸歡然稱之曰活我子女全我室廬存我金繒者其惟我李公乎公猶欿然每以為未足及天兵下廣東德慶侯實總戎事聞公之名遣使者聘起之既入見上署為中書斷事官遷大都督府持法平允聲譽翕然有聞尋改小司寇未幾升秋官又未幾上御外朝親擢為浙江行中書參知政事中外莫不慕豔之夫以公之賢能遭四海雍熙之世上簡萬乘之知入司喉舌翔翺法從出鎮行垣儀刑州牧銀章艾綬蔚乎其光華畫省長棘儼乎其雄邃足以行所志而不負其學矣大丈夫之際遇有如此者可不謂之榮乎抑豫聞嶺南郡縣以百餘計而東廣為最盛其出而仕者未嘗無其人唯張文獻公暨余襄公卓然清風振起百世公固廣産也中朝士大夫寧不以望二公者為公望乎公之往也推體用之學以施于民凶姦之未屛也我則鋤剗之仁化之未孚也我則宣布之人風之未淳也我則移易之民瘼之未瘳也我則蘇息之水利之未修也我則平治之庶幾無負聖天子寵眷之深意他日良史氏必録公之勳業焜耀簡書較之二公未知其孰優孰劣此蓋邦家之榮非一身之榮也公其朂哉送張編修赴南陽教授序河南張生翀奉旨自國史教授南陽行有日甫拜請曰翀也區區一布衣遭逢有道之朝獲肄業禁庭鑾輿時幸而敕戒之恩榮所加喬嶽不足為髙瀛海不足為深今者出典教一邦思所以𢎞敷帝訓甚懼弗稱願聞一言以自朂者豫曰古者設五經博士以教授所謂教授者非官名也以之名官自宋慶厯中始然有漕司所辟舉或以兼官或以士人而猶未肄朝廷也其命於朝廷又自熙寧中始夫教授之職以經術行義訓導諸生掌其課試之事而糾正不如規者其責實至重也生然豫言否乎生曰然豫曰未也冶師雖知精鐡必加陶鎔而後成湛盧梓人雖知良才必施斤鋸而後成宫室知之何難當思允蹈之爾生之往也取羣聖人之經列弟子於堂下啓之迪之優之柔之饜之飫之使心與理相涵事與心弗悖庶幾材成而器良矣生然豫言否乎生曰然豫又曰未也教道所施貴在變通譬之木也視小大而加斤鋸焉鐡也察銛鈍而施陶鎔焉一槩而視之過矣生之往也各因材之清濁學之淺深過者損之不及者益之毋驟語以髙逺恐其凌躐而不遜也毋使安於卑近慮其茍且而自畫也毋過於嚴厲上下之情不能相通也毋失於寬縱長幼之節或致玩褻也毋示之以非聖之書防其遁而離也毋習之以無用之文禁其乖而有僻也此六者皆變通之事也君子之立志不獲髙位以行其政令幸而得掌教一州焉亦不翅足矣何也政令能禁民為非而施教者乃使民自不忍為非人倫藉之以厚風俗因之可移顧有出於政令之上者豈細故也哉生能從事吾言庶幾上不負天子下不負所學矣生其往哉思盡心焉可也於是生再拜謝曰翀雖不敏敢不夙夜祗奉豫以生可進於道也次第其語而贈之生字鳳舉沈重有識量研窮遺經而造其閫奧出應書鄉闈嘗占前列云送布政葉公之官閩中序皇帝御天下之九年以諸行中書之設本於權宜之制中外並稱失尊朝廷意乃詔丞相御史大夫及翰林侍從之臣議更其名職革行省置承宣布政使司司有使使之下有左右參政皆親簡在廷之臣充其職十年夏儀鸞司使葉公受命為使於福建凡與葉公往來者咸曰公之往宜哉福建大藩也統府惟八壤地二千里物産之富服食之華甲天下而使又一藩之長也凡事之當否左參政曰可右參政曰不可司之屬曰然掾吏曰不然皆不敢自用其言白于使使可否之然後定其權之若是也而公又天子之親信臣也公精志小心事上二十餘年未嘗有過上之器公非一日矣宜乎公之當此任也金華宋濓曰雖然天子用公者非謂舊也謂公賢也以公為使者非以榮公以公能任重職也不命之他司而之福建者非謂地廣物富以去輦轂頗逺命公綏其民也夫國之建官立職豈以富貴其臣哉所以為民也天子與宰相運于內四海之逺兆民之繁安能畢得其情而遂其性哉故立布政之司以治之官以布政名欲其宣政化於下也有疾苦不能自達於上惟公得達之民有善可旌有惡可誅惟公得聞於上而旌誅之鋤其強悍培其良順俾山巔海涯之民皆得安其生以樂太平之治斯則天子委任公之意也亦公報天子之職也茍以位為公之榮豈知公者哉濓與公同朝最久知公之為人寬厚好善故具道建官之意以為公贈且以為公規送張禮部兼晉相府録事序皇明御天區宇敉寧文化洽熙罔間內外聖天子猶旰食宵衣欲圖治安如黃虞時在野之賢無不遣使羅致于庭當是時錫山張籌惟中以監察御史薦上名銓曹四方來者雲擁而林布銓曹各因其才命題試之而惟中前進士乃以經學對初覆考僉謂良才遂列為首選又明日丞相引見於奉天門上親御翰墨疏其名下曰翰林應奉其次而下悉用奉天選授官則惟中特被簡注可知矣已而惟中視草北門文辭雅馴而能弗悖上意於是日侍左右或講説經史或應制賦古今詩未嘗不再三稱善甫一載特授禮部主事未數日會晉相府録曹闕官復命兼之命既下六曹之士咸曰學者當明體而適用茍學矣而不施之於政是玉巵之無當也奚補焉上之摩厲惟中者厚矣詩人頌文王作人之盛有曰肆成人有德小子有造其今日之謂乎三館之士又曰詞林之設官自學士而下曰侍講曰侍讀曰直學士凡若干人而待制修撰編修之屬不論焉夫以賢才如此之多其事始集惟中以一人獨當其任亦未嘗見其有缺敗非其才之果良乎苟使議禮於儀曹贊書於宗藩其有不稱職者乎傳有之君子學之在躬當無施而不宜惟中其有焉金華宋濓則曰二者之論固當矣濓則以為天下才良者衆矣能致萬乘之知者幾何人哉縱知矣論説或不合沈沒於下僚十年不調者有矣縱調矣或處間曹冷局首尾拘畏不能展其志者有矣今惟中以一布衣之微上膺宸選未久而三遷其官清要之重寄不知惟中何以報上之賜乎奔走承順以為恭非報也出入謹飭而自防非報也唯精白一心以承休德常如天日之照臨有知無不為為之無不竭盡其智慮庶幾稍無愧耳他日名存竹帛功在國家不於惟中之望而誰望乎會上錫晉王土田於吳惟中將履畝而實之過家上冡以為鄉邦榮濓惟中老友也故於其行不敢佞而以規送李參政之官廣西序大丈夫而遇聖神之主承信任之隆而居方伯之位得施賞罰號令于千里之內亦榮矣哉信榮矣而君子不敢以為樂也君信則望臣者深君之信任者隆則後世責吾者重所居者髙而所治者廣則斯民議吾者衆議吾者曰承君之任如是之大也而敷君之德以澤吾民者猶有未至也後世責吾者曰彼之得君如此之隆也而其事業若斯之隘也吾之君如堯舜矣吾猶未及古之賢臣吾可不自省歟合三者而思之上恐負吾君中恐負吾民下恐不免後世之求備將日夜憂之之不暇矣奚取樂乎雖然吾才茍不足居乎位固不敢樂也誠有才焉斯民有未安也吾告於君而圖安之斯民未入乎善也奉吾君之道而教之大而國家之法有未著也吾以所得者告於君為後世慮者或未至也吾將為之贊助焉則可以不愧吾之職矣吾職之不愧則吾心可樂矣豈若無能者而戚戚為哉天台李君守恆以美才為上所拔擢任內廷承顧遇者三年今由左通政為廣西布政司右參政余知李君才甚充者也有方伯之樂而無其憂者也於其往道其榮且樂之故以告使致思焉送晉王府王傅李君思迪之官詩序成周之時王者必立師傅尊之曰公而不煩以政務廣厦細旃之上論道而已自漢以來以王為一等之爵衆建宗親以為雄藩故亦設傅相輔之相則總其國政傅則導以德義厯代相因未之或改我聖天子臨御之三年思固泰山磐石之宗以奠安黎庶九子一孫同日封建為王所以敦展親之道壯維城之勢也于時晉王開國太原詔簡在廷之臣以吏部侍郎李君為之傅命既下為士者曰我知李君文且賢也翩翩乎修辭截截乎雅韻春花明而秋雲敷江濤雄而蛟龍鳴出其緒餘克擢髙第遂為甲午科名進士其膺是選也則宜在位者曰我聞李君賢且能也自來京師即膺寵眷居右史有獻替之功佐延安有撫綏之績已而召入郎曹直躋法從試之也既屢而用之也彌篤其膺是選也則宜金華宋濓則曰是固然矣然而皇上之意以晉國表裏河山之固北控代朔南接關陜其地為形勝其民儉嗇而易化必得重厚誠慤君子輔王而安輯之此李君所以在選要不止前二者所云而已也今王雖未出閣李君之行浚治其城隍經營其宫闕勞徠其黎庶然後迎王就國日以法言大訓陳於前俾王為哲王斯民為唐虞之民熙鴻名於無窮埀令德于不刋在此舉矣李君尚朂之哉濓也不敏待罪於國史他日幸觀勳績之凝必執筆書之曰出鎮太原自晉王始其導王以德義底于成功自賢傅李君始不其韙歟李君尚朂之哉濓之有望於李君者若斯而已李君名吉其字曰思迪濟南人送甘肅衛經厯張敏行之官序長安張敏行至正癸卯進士也入國朝以來部使者薦起之擢為翰林典籍時四庫之書多藏文華堂堂在禁中舊為諸俊秀肄業之所抵奉天門不百武車駕嘗幸臨之敏行蚤趨朝已即危坐堂中中使或傳宣索書即啓鑰以上如是者二年雖得時近日月之光然未暇謁其氏名一旦上御東房遙見敏行委蛇入堂召而前問勞備至且曰爾能詩乎對曰臣雖不能願學焉乃命之題敏行研墨濡毫跪寫以進上覽畢恱曰詩甚佳北産如爾者誠鐡中之錚錚也由是日承顧問見其性秉忠慤可任以事特命為甘肅衛經厯賜內府白金五十兩錢一萬二千文以寵其行凡所與遊皆為賦詩豫時侍講禁林送至都門外執爵立而言曰甘肅在漢為酒泉為張掖等郡初因張騫言建置城府稍發徙民充實之隔絶西域而斷胸奴右臂當時胸奴悍強西域未盡服故其策不得不爾也今皇明在御天威所至如雷如霆西域諸戎稽首稱臣者接踵道路而元君之裔避居朔方遺留一線自保其身未嘗持一矢東向非漢時比也聖天子特念生靈久罹兵變不得以自寧設衛置屯一以備不虞一以招懷創殘之民其責亦甚重也敏行亦知其所以重乎於斯行也當導宣上德曰吾皇一視同仁罔間南朔夙夜唯爾民之憂恐爾寒也使來授爾裘慮爾餒也俾來給爾食或無以耕豫爾牛或無以獵賚爾馬若弓爾其寧哉氓縱曰愚離水火而升衽席云胡不樂將見荷旃被毳者于于而至矣經厯幕府之長無所不當問敏行宜以此報上毋若翰林時危坐咏詩而自逸也他日贊畫成功乘赭白馬周流弔古曰此霍去病擊胸奴處也此公孫賀敗虜兵遺迹也挏馬湩滿壺白眼望天而飲醉後耳熱發為聲詩以泄生平磊磈之氣斯亦奇男子之事敏行以為如何敏行喜曰先生之言至矣是為序送王明府之官序我國家重於民社之寄雖遐州僻壤必慎選守令以撫摩其人民蘇息其凋瘵而擢用人才之道必以常從事於朝廷省部者為先以其厯練之精而深達於民情政體也會稽王君元凱受命出宰夔之開縣告行於余徴言為贈兩川入我版圖未久其民新脫於鋒鏑之餘自非善於承流宣化者未易以涵煦生息之也廟堂之議以為元凱久以文墨議論贊佐春官儀文禮法諳集有素其為人持身砥行又端謹清修克稱兹選故有是命余聞昔子遊氏之為武城也以禮樂為教而聖人喜之此千載牧民之良法而近世以來為縣者率以法度束縛而操切之故禮教之澤不下流於民而醇風美俗罕或見之今元凱之往不惟使其百里之內政平訟理而安於田里其所以化導全安之者要必有其道矣他日觀風之使有言於朝者曰西蜀之地有萬家之邑其令之治先政教而後刑罰其民之俗好辭讓而恥鬭爭以故絃歌比屋而囹圄空虛雖在數千里之外而藹然不異乎邦畿之中是宜旌褒其縣大夫之能以為在職者勸若然者必元凱之所治也余在禮部常知元凱之為人今守職詞林秉筆史館晨入夜歸無敢暇逸故於元凱之請不及綴緝文辭為贈而姑道其所期望者如此朂之元凱其勿以余言為簡也是為序洪武六年九月既望金華宋濓識送魏知府起潛復任東昌序皇帝奄有九圍宵衣旰食以治安蒼生為務凡守令滿三載者朝京師詔銓曹考核治行其昭著者皆復舊職命儀曹燕饗之或遇有事郊社令被盛服從公卿大夫之後以與祀事上之意以為能勤民方可以對越明神蓋異數云當是時桐廬魏君起潛自尚寶丞出守東昌三年政成來覲闕下有旨俾復治東昌蓋東昌古博州今轄二州一十六縣正當燕齊要衝會大將軍徐公統十萬雄師北征漠北屯駐州境者三月起潛給舟車芻糧皆無乏絶兼能撫輯創殘之民既煦嫗之又從而勞來之和氣所召鄰郡蝗大集賊稼穡甚而郡獨亡害起潛之來朝也民爭攀轅卧轍有至泣下者嗚呼此豈可以聲音笑貌為哉使其復往治之宜也豫見起潛之還也埀髫之童羣然迎拜馬前曰我使君來也我使君來也脫昔我使君不徠飢孰兒哺寒孰兒衣乎黃髮鮐背之翁寬衣博帶相與聚首而言曰吾郡自兵燹之後呻吟於灌莽之中暴露於風雨之夕今使君闔廬乎我矣生死骨肉乎我矣奈何一旦去之吾儕小人欲效河內之借冦恂蟣蝨姓名不能上干天聽幸賴聖天子明見數千里外復以使君惠我加我幸莫大焉豫知必簞食壺漿爭迎於道周矣巖谷之士方外之徒聞起潛之至亦必嘆曰我等在山林稿項黃馘固無望於世然必無撓我無魚肉我始得遂其恬淡之性使君之重來也吾等其安於所處乎夫然故起潛事書於信史名流於方今矣雖然靡不有初鮮克有終起潛宜益加敬畏之所敬者何天也所畏者何民也一民銜寃天為埀象君子蓋甚懼之起潛能如是則功澤益深令聞長世不止如今日所稱而已也抑豫聞漢法郡守皆久任欲其與民休戚之相繫也非惟增秩賜金故或自丞相出膺郡寄或從方州入秉鈞軸載之方策斑斑可考也欽惟聖朝取法前王其久任之意實異世而同符有善者必旌褒有功者必超擢起潛他日之所至宜未可量也起潛尚朂之哉是為序送劉永泰還江西序聖天子以六合既寧益寤寐求賢而致時雍之治於是朝臣以永豐劉于先生聞初先生嘗以賢良徵因病謝歸及是使者至即束行李東上洪武辛亥閏三月實來京師丙子吏部侍郎顧君剛中等入奏上召見於外朝俾講説經書親與之論辨先生敷繹詳明上悅越翌日丁丑上御金水橋復召先生慰問良久敕儀曹賜冠衣又明日戊寅復召至便殿諭先生曰君子為學當見於世用爾自度其材可為郡縣何職宜竭誠以對朕將官之先生曰臣于在前朝嘗舉進士試南宫不利終老弗沾一命今幸遭逢有道之朝登崇俊良凡有血氣者莫不涵泳鼓舞於神化之中况區區草澤賤儒三瞻天日之表聖語丁寧又如此之至茍稍知君臣之義孰不感動以思報效第臣犬馬之齒已衰筋力弗強聽恍恍而視茫茫若冒昧上承昭旨異日倘有曠官之刺則負天恩深矣敢固辭上以其言誠懇而質直不奪其志親御翰墨賦詩一首且命先生亦賦三詩以進上覽之喜令內侍酌酒賜之俾其還山肆惟皇上以天縱之聖黃鉞四征大統以定而尤親近儒臣共圖治安年髙而不欲仕者復以禮而敦遣之此如上天雨露之澤滂沛周浹萬物咸賴聖德神功巍巍煌煌固非前代帝王所可及然而欲治之主不世出當此明良相逢千載一時先生平日所學致君爾澤民爾一旦翩然西還傍岩以為廬結雲以為衣菜有葅食有稻與魚左圖而右書于于而行沈沈以居先生之計則得矣其如蒼生何雖然先生之志則有在也其意必曰我於催科聽訟則年誠耄矣奔走承事則力誠不能矣若敷明孔子之道以淑後進使從之者知孝弟忠信變澆風而為厚俗是亦報上恩之萬一也是則可為也嗚呼先生之志果若此其於出處之義庶幾兩無愧乎先生將還士大夫多慕咏之相率作詩餞之而遣金華宋濓序之送許時用還越中序婺與越為鄰壤越屬縣曰嵊有許氏居之世以詩禮相傳為名門而時用則又其最秀者也濓家婺之金華距嵊為不逺在弱齡時即與時用相聞方以文墨自漸摩無雨風無晝夜危坐一室不暇見暨同試藝浙闈旅進旅退於千百人中無有為之先容者又不能見自時厥後時用以禮經擢上第為諸暨州判官金華抵諸暨比嵊為尤邇將騎驢走鈴下而謁焉時用又入行御史臺治百司其地清嚴雖時用亦不宜與人接又不敢見曽未幾何金華陷於兵士大夫螻蟻走唯流子里為樂土亟挈妻孥避焉流子里𨽻諸暨地在嵊之東南僅數舍即至濓時苦心多畏而土著民往往凌虐流寓者白日未盡墜輒翳行林坳鈔其囊槖物甚者或至殺人又不可見及至兵戈稍息豫還金華日采藥以自娛間念及時用即欲約二三子往候之以解夙昔之思去年冬聞時用有弓旌之招使者趣迫上道急於星火又不及見濓竊自念時用英傑士此行何所不至鸞臺鳳閣將以次而升何日能賦歸縱時用欲歸上之人未必聽也濓雖少時用一嵗則已皤然成翁度何由至南京既不能至又安能與時用一抵掌笑談邪慨然遐思者久之會朝廷纂修元史宰臣奉特旨起濓為總裁官使者亦見迫如前逮濓將戒行李時用至武林始旬日耳濓又自念史事甚重當有鴻博之士任其責者濓豈敢與聞藉是以往或得一見時用亦豈非至幸歟濓來南京寓於護龍河上方求時用館舍之所在忽有偉丈夫來見者問其姓名亟曰我許時用也子豈非景濓乎濓驚喜不及答亟延入坐備陳五欲見而弗能之故時用知濓嚮往之久亦相與傾倒每風晨月夕無不相往來一旦忽悽然墮淚曰余先朝進士也春秋又髙矣不足以辱明時使者不我知委幣而迫之來我不敢違今已陳情於丞相府矣丞相儻言之上得遂歸田焉不翅足矣他日又來言曰聖天子寬仁今用丞相言如所請矣已具舟大江之濵吾子遇我厚幸一言以為别嗚呼婺與越其壤相接邇其見甚易也乃積四十年而莫之遂厥後始見於千里之外既見矣逺或四三春秋近或及期相與論學以盡夫情可也未及兩月而即去既去矣或買一小艇相隨五六百里間采江花之幽靚殷勤道别亦云可也修史事殷足不敢踰都門愴然而别既别矣一二年間或再得聚首如今日焉猶可也然向者已如此自今而後其可以必期而必取之耶人事之參差不齊何可復道尚奚言為時用之别耶雖然時用之歸也其有繫於名節甚大時用采蕺山之蕺食鑑湖之水日與學子談經以為樂者果誰之賜歟誠由遭逢有道之朝故得以上霑滂沛之恩而適夫出處之宜也夫道宣上德以昭布於四方者史臣之事因不辭而為之書區區聚散之故一己之私爾則又當在所不計也送天淵禪師濬公還四明序文辭之美者見之於世何其鮮哉非文辭之鮮也作之者雖精而知之者未必真知之者固審而揚之者未必至此其每相值而不相成唐有栁儀曹而浩初之文始著宋無歐陽少師而祕演之名未必能傳至於今蓋理勢之必然初不待燭照龜卜而後知之也嗟夫浩初祕演何代無之其不白於當時卒隨煙霞變滅而無餘者豈有他哉由其不遇夫二公故然爾此余讀天淵師之所作其有感於中矣乎天淵名清濬台之黃岩人古鼎銘公之入室弟子嘗司內記雙徑説法於四明之萬壽寺近歸隱於清雷峯中蓋法筵之龍象也余初未能識天淵見其所裁與地圖縱橫僅尺有咫而山川州郡彪然在列余固已竒其為人而未知其能詩也已而有傳之者味沖淡而氣豐腴得昔人句外之趣余固已知其能詩而猶未知其能文也今年春偶與天淵會於建業因相與論文其辨博而眀捷寶藏啓而琛貝焜煌也雲漢成章而日星昭煥也長江萬里風利水駛龍驤之舟藉之以馳也因徵其近製數篇讀之皆珠圓玉潔而法度謹嚴余愈竒其為人傳之禁林禁林諸公多嘆賞之余竊以謂天淵之才未必下於祕演浩初其隱伏東海之濵而未能大顯者以世無儀曹與少師也人恆言文辭之美者蓋鮮嗚呼其果鮮乎哉方今四海會同文治聿興將有如二公者出荷斯文之任倘見天淵所作必亟稱之浩初祕演當不專美於前矣或者則曰天淵浮屠氏也浮屠之法以天地萬物為幻化况所謂詩若文乎是固然矣一性之中無一物不該無一事不統其大無外其小無內誠不可離而為二茍如所言則性外有餘物矣人以天淵為象為龍此非所以言之也天淵將東還賢士大夫多留之留之不得咏歌以别之以余與天淵相知尤深也請序而送之送從弟景清還潛溪序豫從弟景清年七嵗入小學十三嵗即棄去為廢舉之術居物于家視其時之詘信而操其竒贏未幾家大穰今二十有七嵗矣一旦發憤言曰吾以七尺之軀豈終溺於此而不知自返哉且貨財造物所忌藏者在室而奪者已在門吾豈若眀仁義於身使人不得而攘哉於是即外兄賈思誠謀思誠喜曰此竒男子事也景清勉之景清乃囊書襆被不逺一百里謁豫於東眀山具言其狀豫為之驚喜乃與之坐而語以孟軻氏夜氣之説而悲世俗傎躓於利害之塗莫能自拔豫言頗懇惻景清聞之輒蹙額斂容似欲泣者豫知其可教乃處之蘿山書室中蘿山豫新遷居地也距東眀僅三里日稍昃景清則挾䇿而來反覆詰難一字不解輒沈思良久期必通乃已至曛始罷去日以為常行迹蓋可數而待也豫間歸蘿山則又見其獨坐夜將半猶聞讀書聲不休嗚呼若景清之為不亦竒男子也哉昔蘇公眀允少不喜學年二十七始大發憤閉户讀書為文辭及舉進士茂材異等皆不中乃悉取所為文焚之益大究六經百家之説由是下筆頃刻數千言一時學者皆取其文以為師法今景清之年正與之同發憤讀書亦同使其志愈慤而不變學愈勤而弗息則今之景清惡知不為昔之眀允哉景清勉之雖然眀允之學志在文辭者也吾徒何事於斯必也學為聖賢有用之學達則為公為卿使斯道行不達則為師為友使斯道明如此而後庶幾也豫家自文通先生以來多勵行於儒今族人之衆幾及萬指罕有言詩書者竊喜景清之有志也於是東歸序以贈之景清試往質之思誠又必有以相發也送徐大年還淳安序觀人之法當察諸心不可泥其迹仕不仕有弗暇論茍其心在朝廷雖居韋布操觚染翰足以鋪張鴻偉上禆至化脫或志不在斯雖綰銅章佩墨綬朝受諜訴暮閲獄案政績藐然無稱古昔君子蓋獨竊慎之余於徐君大年之歸不能無所感大年生淳安萬山中載籍兼該而辭藻豐縟有聲於浙河東西當皇上龍興招延儒雅大年歡然被山人服趨輦轂之下同修前代史史成會有詔集諸儒議禮大年復與其事廷議將命官大年以宿疾辭去年秋中書奉旨纂修日厯朝紳各薦所知余以大年知本末義例可以觀會通而無首尾衡決之患疏其名以聞使使者持書下郡國大年即歡然應命詣闕入館之後俯首探刺唯恐一事有遺記注有闕略悉補足為完文日厯成廷議又將錫之官大年固辭如初嗚呼使大年初受命為一縣令長不過簿書期會爾招徠撫綏爾又其大者教化行百里爾一旦白身召入史館大書特書使聖天子宏謨駿烈烜赫萬古與天無極此其功與試宰者孰重孰輕雖不仕猶仕也藉令自兹終老山林可謂無負於國亦可謂無負於學世之好議論者見其辭祿而歸搖脣鼓喙詡詡相夸諼不曰潔身而自髙則曰獨善以固窮夫士遭不願治之世披腹呈琅玕無有舉目睨之者故不得已引退今當堯舜在上夔龍滿朝之峕以此疑大年者謂之誣士士不學則已學則必期世用有如大賈行廢舉術寶貨填溢市區乃振鐸號諸人曰我不售我不售萬萬無有此理以此窺大年者謂之矯矯與誣要皆非真知其心者雖然在昔宋室盛時布衣入史館者僅六七人皆兩制八座所薦引其任甚不輕大年雖不受褒寵而所被溥博汪洋有加往昔大年將何以自效且春秋猶未髙沈痾容有却藥之時行當杖䇿造朝門盡展所藴以驚動世俗使向之疑且窺者瞪目不敢吐一辭則出處兩無憾不然長往山林而弗思返日與猿鶴為友䬸霞雲而潄泉石髙固髙矣如不仕無義何洪武七年春正月一日宋濂引送戴原禮還浦陽序醫之為道至矣故周官有疾醫視萬民四時之病春之痟首夏之癢疥秋之瘧寒冬之嗽咳二氣皆分而治之驗其狀而制其祿甚為不輕也後世官寖失職故於其術每擇之不精有人於此能合於古者之道豈不猶空谷足音之可喜者乎如吾同縣戴原禮氏是已原禮生儒家習聞詩禮之訓惓惓有志於澤物乃徒步至烏傷從朱先生彥修學先生見其頴悟倍常傾心授之原禮自是識日廣學日篤出而治疾往往多竒驗豫請得而詳道之原禮從叔仲章六月患大熱面赤口譫語身發紅斑他醫投以大承氣湯而熱愈極原禮脈之曰左右手皆浮虛無力非真熱也張子和云當解表而勿攻裏此證似之法當汗遂用附子乾薑人參白术為劑烹液冷飲之大汗而愈櫧槩方氏子婦瘧後多汗呼媵人易衣不至怒形於色遂昏厥若死狀灌以蘇合香圓而蘇自後聞人步之重雞犬之聲輒厥逆如初原禮曰脈虛甚重取則散是謂汗多亡陽正合經意以黃茋人參日補之其驚漸減至浹旬而安松江諸仲文長夏畏寒身常挾重纊食飲必熱如火方下咽微溫則嘔他醫授以胡椒煮伏雌之法日啖雞者三病逾亟原禮曰脈數而大且不弱劉守真云火極似水此之謂矣椒發陰經之火雞能助痰祗以益其病爾以大承氣湯下之晝夜行二十餘頓減纊之半復以黃連導痰湯益竹瀝飲之竟瘳姑蘇朱子明之婦病長號數十聲暫止復如前人以為厲所憑莫能療原禮曰此鬱病也痰閉於上火鬱於下故長號則氣少舒經云火鬱則發之是已遂用重劑涌之吐痰如膠者無算乃復初樂原忠妻亦蘇人因免乳後病驚身翩翩然如升浮雲之上舉目則室廬旋運持身弗定他醫飲以補虛治驚皆無驗原禮曰左脈雖芤且澀神色不動是因驚致心包絡積汚血爾法宜下之下積血如漆者一斗即愈留守衛吏陸仲容之內子病熱妄見神鬼手足瞤動他醫用黃連清心湯不中原禮視之曰形瘦而色不澤乃虛熱耳法當以李杲甘溫除大熱之法為治即經所謂損者溫之者也服人參黃茋而安他若此者甚衆豫備聞賢士大夫恆言之今不能悉數也嗚呼有人如此可不謂之合於古道者乎夫醫之為道本於素問內經其學一壞於開元再壞於大觀習俗相仍絶不知究其微指唯執一定之方類刻舟而求劍者人訾之則曰我之用此不翅足矣又惡事內經為宋之錢仲陽獨得其祕於遺經而擴充之金之張劉李諸家又從而衍繹之於是內經之學大明劉之學朱先生得之最深大江以南醫之道本於內經實自先生發之原禮乃其髙第弟子其用心也篤故造理為特精其傳授有要故察證無不中亦可賢也已矣近來京師薦紳之家無不敬愛之服其劑者沉痾豁然如洗或欲薦為醫官辭不就遂賦詩以餞其東還且請豫為序昔者司馬遷作倉公傳載其應詔所對自齊御史成至公乘項處凡二十有三書治病之狀甚具豫倣此義稍陳原禮療疾奇中者繫之首簡并告周官疾醫四時治證之槩世之知言君子必有所擇焉原禮之從父能軒翁豫之同志友也幸以豫言質之送許從善學道還閩南序閩南許從善自少好長生之術嘗建一庵以欵真遊之士覬得一逢而受其説已而聞龍虎山止庵鄧鍊師得九還神丹之傳逺邇之人皆知尊禮時鍊師侍祠南京從善不逺數千里而三叩焉三年之間至者凡再鍊師具以谷神不死之道開之以祕藏約之以黃寧從善欣然如獲拱璧於其還也鍊師為索文贈之而同虛傅外史鬼谷方壺真人又咸為之請不知從善何以得此於方外髙士哉然豫嘗覽劉向列仙傳見其所載奇名詭姓與夫驚世駭俗之事甚悉而存鍊解化之術略不一言之豈寶祕隂陽之機而不露耶抑亦得其人而後度耶雖然老莊文列四家之書亦往往及之矣要不出致虛極守靜篤二句之外蓋虛則洞然涵乎太一靜則凝然萃乎太和虛非極無以收純玄之效靜非篤無以臻純默之功馴而致之與道蓋不逺矣自時厥後靈均發為一氣孔神於中夜存之言魏伯陽著為參同契復陽祕而隂泄之皆不敢畔其説也嗚呼斯非學仙者之準繩也耶宋金以來説者滋熾南北分為二宗南則天台張用成其學先命而後性北則咸陽王中孚其學先性而後命命為氣之根性為理之根雙體雙用雙修雙證奈何岐而二之第所入之門或殊故學之者不能不異然其致守之法又不過一之與和而已吾知從善亦必究其説乎夫一者萬之對也萬則紛紜而不定惟一能貫之和者戾之反也戾則參差而不齊惟和能全之長生久視之道其不本於此者乎所謂安鼎者非玄關一竅也安乎此者也採藥者非龍虎鉛汞也采乎此者也用火者非進退抽添也用乎此者也固不可有意而求亦不可冥然而忘去也頗聞閩南有武夷山其髙萬丈薄太清而凌飛霞多有隱君子棲遁巖穴間從善試以豫言質之必大駭曰是儒何人其論九還神丹之道何其與吾黨異乎又當辨其離合以告從善也從善名回號為還朴為人沈篤近道所以方外髙士極愛器之送吳仲實還金溪序金溪吳君仲實省其兄國子助教伯宗于成均伯宗以余友也偕其來謁仲實氣厚而色溫與之語秩然而有倫恭慎而甚文固已知其才矣既而復袖其詩十餘篇以見發而觀之辭繁而不浮理至而不俚其馳騁斂縱多態而有度問之以文學則鮮不能通勸之仕則曰未能也余於是益信焉士之患常在乎內虛而外衒學未聞道而慕乎爵祿之華內已足焉而外未能以動人猶以絅蒙錦也久則著而不可掩矣飾乎外而不務充其中譬之土木之質而文繡加焉其始非不悅目凝而視之則可醜矣古之君子是以勤乎其所當修者而不敢計乎其外也今之士則不然未有善焉惟恐人之不知未有才焉惟恐世之不用其未得則沾沾以自衒既得之則又薄卑而思尊此崇替起伏所以數數然也其視仲實之既至而以為不足年及可仕而以為未能者何如哉仲實不見夫善賈乎當衆人競取之時則棄之競鬻之時則置之其不取則已取必窮海內之珍不鬻則已鬻必獲巨萬之富矣安知仲實之棄之非取不售之非厚售乎仲實歸其兄之僚咸詩以送之余與伯宗善且知仲實之材也故敘以贈之送鄧貫道還雲陽序周官之制以鄉三物教萬民而賔興之所謂三物若六德六行六藝是也六行之中而姻居其一焉釋者曰姻者親於外親也夫人之生也內則諸族外則諸親歡然有恩以相愛粲然有文以相接蓋一出乎彞倫之正故賔興之際特於此察其行焉嗟夫世逺俗紛古之道不明久矣今於雲陽鄧貫道氏見之貫道本儒家富而好禮御史大夫陳公之女兄實歸焉當家居時公與貫道無日不相親或講論道德性命之奧或品量古今人物之盛以至雲亭月榭酣觴賦詩以寫沖和之情其樂殆歡如也及元季兵興所在皆繹騷貫道避地巖谷間深蟄而不出公間關走江表擇真主以為依歸自赴於風雲之會名譽日起而勛業日盛貫道之於公不相見者二十有二年矣洪武七年冬貫道思公之切厯湖湘泛大江直抵南京欲與公胥會公聞貫道之至亦喜不自勝出迎於龍江關相與序兵火離合問故舊存歿悲喜交集舉酒酹地各私相欣慶自是共周旋者且一月貫道以離家之久翩然動歸興有不可遏者豫因謂之曰夫自辛卯以來龍虎雄爭塵霾翳昏父子乎西東戚姻乎北南其别離之思蓋有不忍言者今也六合清明車同軌而書同文水陸數萬里山行水宿無一髮蜂蠆之虞有親姻在遐方者不行則已行則刻日可至貫道亦知所以然之故乎誠由帝德廣被如天之覆如地之載蕩蕩乎難名乃克致有是也頗聞貫道富問學能辭章何以不稍攄所藴以禆治化乎貫道則曰吾老矣不能用也雖然雲陽有紫微山七十一峰森列如畫秀氣甚磅礴也自漢以來為侯封之邦唐雖有肥遁之士而無大顯融者至陳公始以正大亷平之學出佐明時而足以當山川之勝貫道之歸也宜以公之事厯言於嵓穴抱道之士且告之曰聖天子在上可以出而仕矣豫敬愛貫道篤親姻之義故舉周官六行之一序以贈之詩自侍講學士樂公而下凡十八人分題為九詠古今詩各賦其一云送陳生子晟還連江序洪武七年十一月十二日皇太子臨大本堂召東宫贊讀及諸王府伴讀凡二十五人立庭下諭之曰爾等離父母去墳墓者三年于兹冬氣向深草木搖落寧不惻然動懷土之情乎吾已為爾請于上宜各旋歸歸即遄至無以久淹為也復命左右出內府錢若干以為道塗費衆皆羅拜而退時閩之連江有陳生子晟者以周易中第三名文解上禮部既而臺臣以其詞章古雅選入為楚王府伴讀朝夕陳説經義甚為王所賔禮及奉教令還閩詣豫言曰子晟久侍几杖今將有三千里之行願先生賜一言以自勗也豫曰爾之從我者學為文耳文豈易言哉翻秋濤之洶湧屹喬嶽而不遷沛元氣之淋漓未足以喻其變化也能知變化則􅞂遷轢固蹴蔡駕韓燁然有光萬丈矣孰能掩之哉爾以學止於是乎生曰然豫曰未也聖人埀訓皎若丹青所謂載道之經是已經則萬世之準繩也推其訓故以核其原繹其文義以達其支使言與理相涵而無悖去之者方可排斥毛鄭輕視王馬而靡所不通矣爾以學止於是乎生又曰然豫曰未也上天下地其中為人號曰三才功用則均上帝所降之衷日保守而弗失氣或我梏也吾則廓而通之欲或我戕也吾則絶而逺之內外混融庶幾與天為徒矣與天為徒則見諸用者窮則獨善其身達則兼善天下無所入而不自得焉是㪺濓洛之深泓而挹沂泗之清泠者也顧不韙歟生以為何如生避席而拜請書所與言者佩而行之豫老且病四方求文者日相迫趣誓欲燔筆硯以自絶憐生之篤志於學因寫以為贈送黃贊禮涖祀閩省詩序惟洪武七年十有一月庚辰皇帝御奉天殿視羣臣早朝太常卿唐鐸奏曰臣昔受明詔天下行中書其祠山川百神或未致恪虔宜令朝士涖之臣於浙鄂齊汴暨于豫章已嘗奉命從事若晉若燕陜若閩蜀若廣東嶺南逺者七千里近亦不下四三千里宜預遣使者期以明年春二月集事臣昧死以上制曰可於是遴選奉常官屬及儀曹主事凡七人時贊禮郎建安黃淵靜實與其列越三日癸未陛辭上諭之曰敬恭明神古今恆道也况瀕祭之時乎祭在他人亦所當慎况職在奉常乎已盡其職猶難况欲涖人而使其莊敬乎皆不可不察也爾等聞命之後雖跋涉乎險阻一言一動有赫其臨參前倚衡無乎不在勿使一髮非僻之干庶幾不廢朕命不然人非鬼責將不可逭矣衆皆稽首至地而退既退復敕儀曹各賜衣一襲又明日甲申啓行前御史中丞劉公伯溫參知政事陶公中立吏部尚書詹公同文今禮部尚書牛公士良咸以為淵靜遭際昌期獲將使指以臨涖祠事可謂寵榮也已各賦詩以為贈而文學侍從之臣藩府成均之賢與夫方外岩穴之士亦見諸聲歌以華其行淵靜請豫序其作者之意肆惟皇上宅中圖治其對越昊天毖祀于上下齋祓一心凝神於惚恍之中如將見之羣臣之助祭者下逮胞翟之賤亦皆有孚顒若以致鴻休薦臻甘露霄降三秀呈瑞彩霞結鳳白烏翔飛和氣充牣化為豐年此蓋精明之德放諸四海而準無不駿奔走執豆籩以薦德馨然猶慮藩垣之臣未盡體內廷之意遣使四出以監視之方於古昔帝舜之望山川遍羣神姬周之咸秩無文不是過也有君如此其忍負之今淵靜之往也宜精白志慮靈承上訓壇廟有缺圮者葺之服器有弊汙者易之牲牷有不肥腯者罰及之將祭之夕端笏埀紳正立壇之左右申以聖天子成命使百司及執事之人祗奉明畏有若天威咫尺升降俯伏穆然無聲牲俎苾芬庭燎有輝神靈洋洋昭格于上則夫蕃釐之錫淵靜亦當與有之矣淵靜行哉雖然神人相依者也南閩當兵燹之餘黎民創殘其或有失所者乎嘆曰起之其興利去弊之政或未能盡行乎淵靜宜知之歸告于上此於人神之道所謂兩盡者也淵靜行哉送趙侍制致仕還鄉詩序洪武九年冬十一月丙申皇上御奉天門御史左大夫汪公右大夫陳公以國子博士趙先生本初年踰七十跽而奏曰博士臣俶以詩經施教成均者四年其弟子為方嶽重臣及持節各部者往往有之是不為無功第以筋力寖衰而精神不完願放還山中以盡其餘齡制曰可且加其官為翰林侍制敕銓曹給誥命越三日戊戌俶具朝服詣丹闕以謝上詔之使前問曰卿何郡人對曰會稽上復問曰向為兵部侍郎出知萊州者卿之子耶對曰是也上曰卿誠耄矣歸養于家為宜俶於是以首叩地而退越七日甲辰詔出內藏庫錢二十五緡以賜先生將行二大夫各賦詩為贈京師人士復以越之古迹分題從而繼作而司業樂君子善持手簡授濓為之序昔唐國子司業楊巨源以能詩訓後進一旦以年滿七十白丞相去歸其鄉丞相愛而惜之奏為其都少尹又為歌詩以勸之京師長於詩者屬而和之當時以為榮其事若與今相類然而聖天子優老養賢之意有非唐之所可及七十而容致事同矣天子召見親加玉音而勞問焉則無之也升之以官俾為鄉人榮同矣出內藏之錢從而賜焉則無之也此蓋皇上勵精圖治雖天下之廣四海之衆老者皆欲安之使躋于仁壽之域非特寵其致事之臣而已斯所以度越前古而無所與讓也先生之歸也見鄉之子弟導宣上德俾習為孝弟忠信之行出為時用是亦報國之一端若區區效賀季真盤旋於鑑湖一曲間自逸之計則得矣豈士君子之所望哉濓亦耄矣詔許獻嵗歸田乃於先生之行厯敘其故非惟贈先生也亦竊思以自朂焉送胡十判官西還詩序牽情綴思莫難於别離感物成聲莫踰於歌咏是以漢士有河梁之賦唐人有芳園之集蓋將序禮焯勤宣休埀烈嫓燕饗於周詩準樂律於商雅者也安定胡十判官辨章公之姻弟也頴標比柏茂質方瓊苞韞三靈之秀潄濯六藝之府發為葩藻思倣枚鄒徵諸謀猷欲攀管樂頃綰二車之綬僉偉右轓之選安西之幕府多才鳯閣之舍人有格遽投華簪尋盟杜若來遊建業光映薦紳晴招鍾阜之雲曉勺秦淮之水沖襟孚洽清聞流滋暨其西還無不東企於是割鮫人之春綃擷鸞女之秋綺五色爭燦八音允和既合比興之則不殊韶濩之奏爽氣浮遊於前旌夜光陸離於行槖不鄙疏才得題雅製爰擊瓦缶之謡用相驪駒之什其詩曰白鴈響遙渚丹葉蝕山樊繁霜一何膠蕭晨孕枯寒激中方成紆别逺良獨難江筵有笙匏纎簧扇微翰欲奏陽阿曲芳懷注幽散情長江流促人遐岡勢漫何以寄所思袖有翠蘭玕刻作雙松柏持之綴君鞶送和贊善北歸養母詩序太原和君希文吕忠肅公之髙第弟子也在勝國時肄業成均通詩之傳疏積試八分將與有祿食俄丁外艱而去養母太行山中飲水著書以為樂以翰林待制徵不起已而中原板蕩大臣名將爭辟以為屬亦不起會兵荒相仍暴軍掠人以充糧所向殆盡唯希文堡障獲完希文昆弟之孤女十有六人當艱難險阻之中希文又能保全攜持而卒歸於士族故人見希文者咸稱之為卓行云入我國朝大將軍徐魏公聞其名薦而起之希文即束裝就道見上於治朝與語甚恱擢為刑部郎中未幾遷太子贊善大夫日侍書東朝間嘗陳其情素云小臣有母春秋之髙至八十有四無他兄弟以為養臣行年亦且六十雖有子僅四嵗耳烏鳥私情其能自已乎言訖潸然出涕東朝以其言聞上惻然憫之即日遣北還夫君子之為學劬簡編憊精神窮年矻矻猶以為未足豈務為譁世取寵之具哉亦曰學為忠與孝耳然其道無二致能忠於君必能孝其親希文以胄監之俊英雖出而仕而念母之切惓惓不少忘所以終遂歸養之志希文亦知所以致此者乎蓋生逢有道之朝皇上執孝道以御天下故希文朝有請而夕戒塗也希文之還服五綵斕斑之衣戲舞親側升堂為壽宜曰此非兒所能天子之恩也耆壽之朋簮纓之儔聞希文之歸必行斚授餼委曲相問勞又宜曰此天子之恩非某所能也州里從遊之彥嘗受經希文者必羅拜後先問朝廷所以遣還之故又宜曰此非豫所能天子之恩也希文果能之則誠知歸美報上之義而無愧於學詩者矣雖然希文固卓行之士其能全家以智活鄉黨以仁裁出處以義固人之所難能然希文不可以是而自足尤當增益其所學他時杖䇿重來推內聖外王之道以輔我國家上躋唐虞三代之盛使事功勒之鼎彝名氏升於史册方無負忠肅公之教不可徇一夫之私行而遽已也傳曰求忠臣者必於孝子之門豫蓋於希文望之送葉别乘之官通州詩序括蒼葉君景龍新拜通州别乘之命將之官前御史尚書劉公伯溫為率朝署簮纓之賢及山林華藻之士以杜甫詩勳業頻看鏡行藏獨倚樓為韻賦詩餞之請豫為之序余謂景龍生名宦之家自幼習聞詩書禮樂之懿誰不知之弗俟余言也其飭已亷介操心仁恕每有及物之功弗俟豫言也至於踐履中外涉厯礲切物態民情無不能周知亦弗俟余言也無已則有一焉聖天子在上所以宵衣旰食不敢自暇逸者豈非為斯民乎一州之民欲藉以安者得非托之景龍乎景龍務勗焉可也豫與景龍之兄景淵使君遊姓雖異情則兄弟也於是為序其事復總用前韻作詩十解繫之首簡云詩曰大明麗層霄青芝吐葐蒀物微且瑞世人當建奇勳一解而兄我所敬華皓見須鬛謝却山中雲遑遑贊王業二解矧君才思多錦繡照青春摛文追馬卿哦詩學李頻三解鶴汀接清煦蕙幌怯新寒引尊連月吸倚劍帶花看四解一從離巖扃十年服官政炙燈竹素間無一非龜鏡五解朱衣佩銀魚光彩耀一城自顧室磬懸無以贈君行六解幸有緑綺琴寶之如珩璜願君日彈之勿遣匣中藏七解一彈澆風淳再彈民生足衆生藿蘼中行見翹松獨八解栩栩亦有徒如君世寧幾不見庭前竹迎風自相倚九解官道年年别别君重離憂相思定何處鄰笛起江樓十解送安南使臣杜舜卿序天眷有德戡定四方以靖安生民於是我皇帝龍飛淮右仗劍渡江天下豪傑雲合景從一鼓而江南平再鼓而汴洛定三鼓而齊魯晉秦以寧四鼓而幽燕遼朔悉入版圖厯數攸歸大統以正德威所及雷動風行浩浩蕩蕩覃及無際于時安南國王陳日煃鼓舞皇化遣使稱臣帝嘉其嚮慕之誠詔翰林侍讀學士臣張以寧典簿臣牛諒賜以印綬仍其舊封為王使者齎詔而行未及國而王薨其世子日熙繼志述事守禮惟謹遣陪臣少中大夫杜舜卿告哀于朝請嗣厥位帝帥羣臣素服受舜卿見於西苑之幄殿慰問良久皇情䀌然傷悼退而嘆曰日煃率先內附朕意西南之民將有攸賴不知賢王何去朕之急也遂親御翰墨為文一通以祭之辭意悽惻讀者感動即日翰林編修官臣王濓吏部主事臣林唐臣奉命以往且詔世子王其國取前使者所護王印授之其德至渥也嗚呼皇帝君臨萬國如天日之照光無不被而王之父子能守臣節如江水之流勢無不東上以德而化下下以誠而事上君臣之遇合可謂千載一時者矣然而漢置九郡而交址居其一唐分嶺南為二道置節度立五管而安南亦𨽻焉地雖僻在炎徼涵濡中華聲教者已久固能尊事大國確守臣職昭被宸眷克保其土地人民與我國家相為悠久播之方今傳之後世書之信史嘉名美績焜耀鏗鍧當非他國之君所可及不亦盛歟在昔之時君子有行役者必賦詩以閔其勤今舜卿崎嶇萬里而來中朝士大夫皆念其賢勞於其還也發為咏歌以道其事夫導宣上德而布之四方者史臣之事也濓雖不敏乃本諸作詩者之意而為之敘云送陶九成辭官歸華亭序君子其可必於仕乎曰否可以仕可以不仕曰仕而不仕亦繫其逢乎曰否可仕而不仕不可也不可仕而強於仕亦不可也唯其義而已曰義之所在奈何曰義者宜也當其可之謂也欲當其可非守道君子其亦戛戛乎難矣哉嗚呼斯人吾不得而見之矣得見其次焉者斯可矣天台陶宗儀九成有學之士也僑居華亭之泗涇飲水著書多至一百餘卷會朝廷設六科以求賢郡守遂以九成為薦將授之以官九成慨然曰不仕古云無義當草昧之初兵戈未息法制未定民氣未蘇吾不可以不仕不仕何以解生民倒懸哉今天清地寧六合一家論道經邦皆夔龍稷契之彥趨事赴功多龔黃姚宋之儔四方人士樂觀治化之成贏糧而馳騖者動千餘人無事於吾也吾可以不仕矣去而為巢父為許由為嚴子陵擊壤而歌以為太平之幸民不亦可乎白之銓曹銓曹允之列之丞相府相君嘉之於是九成翩然東歸薦紳之家咸唶曰九成之出處其亦合於義哉或曰非是之謂也九成有弟曰宗傳近擢代縣令曰宗儒妙柬為選曹郎官九成之意以謂一家不可以俱仕恐妨進賢之路故力辭之不特如前所云而已也曰是未知九成者也九成伯仲之才不為不美矣其問學不為不充矣九成之志豈不欲如河東之三薛清江之三孔虎林之三沈番陽之三洪蜚英聲於當時樹芳烈於後世其所以果於辭榮而謝寵者亦度其時可以不仕也避嫌云乎哉雖然九成之歸也結廬泗涇之上日坐臯比橫經而講肄之子弟從之者皆知所以孝弟忠信出而事君又皆知能致其身之義九成有功于國比於他仕者留心簿書期會而不知教化者又為何如哉茍謂之仕亦可也抑豫聞國家稽古右文大興文治嚴禁林清切之選增成均弟子之員有如九成之賢其在所棄乎在所取乎九成行哉席不及暖突不暇黔豫知鶴書之赴隴矣九成必不能於果不仕矣九成行哉送國子正蘇君還金華山中序同郡蘇君平仲成均教胄子者五年近臣有薦其才於上者即日召見親擢為國史編摩之職平仲詣丞相府辭曰禁林地望清切日侍天子左右備顧問區區幼有瞶疾雖粗通文史誠不足以堪之敢辭丞相以聞上亦弗之強已而銓曹將别奏官之平仲念去親日久望天末飛雲慨然有感于中復走白丞相許之戒行李且有日與平仲遊者重惜其去咸發為聲詩而以首簡授豫序平仲豫素敬畏者也將何言哉以論乎家世則三蘇之名聞天下其隆德重望至今與岷峨爭雄遺書流落四海日星赫而風霆噴璇玉綴而瑶球懸韶鈞鳴而律吕諧師表百世人無異辭奚藉豫之言哉以論乎學術則嚅嚌鄉學之懿遡淵源於伊洛蹈軌轍於關閩義理精微析如蠶絲訓考是非判若白黑亦既心凝而身履之矣又奚藉於豫之言哉以論乎辭章則體裁嚴比姿態橫逸如春陽被物或根或荄或卉或條或小或大或圓或偏各隨其物而暢之無有同者其視膠滯一體守常而不變者何如也是故大夫士卿公欲文詞者必曰我徵之蘇君也隱逸及方外之人欲求文者必曰我徵之蘇君也平仲之令聞勃然興煜然不可遏又奚藉豫之言哉無已則有一焉古者國有國史下至閭巷之間亦有閭史皆據官守勿失紀善惡以示勸戒其國史之法見乎書備乎春秋以事繫日以日繫月以月繫時以時繫年殆猶山嶽之有定形不可易者太史遷别出新意輕變編年之舊創為十二紀以序帝王十表以貫歲月八書以述政事三十世家以録公侯七十列傳以志士庶厯代史官遵之而春秋之義類隱矣荀悅蕭頴士頗譏之而未能大有匡建至司馬溫國公光始取法於春秋采繫國家盛衰生民休戚之事起周威烈王訖于五代成一家言號曰資治通鑑劉恕直謂非遷之所可擬蓋公論云然五代之後而宋承之宋之後而元承之宋有李燾雖嘗著為編年異同之論皆並存之蓋不敢當作者之任特廣記備言以俟刪削元史幸新修縱有漏遺十四朝之行事亦頗粲然可覩有能搜纂以續司馬之書者將不在今日乎平仲學術之富如此而辭章之美又如此其東還也晨昏定省之餘集諸英俊翻閲新舊所藏獨操筆削而成百代不刋之典將不在平仲乎平仲之家少公以馬遷淺近不學疏略輕信上觀詩書下考春秋及秦漢雜記成古史一書至今傳之平仲因其家世之懿肆其鑒裁之公使人稱之曰蘇氏一門世濟其美將不在吾平仲乎豫也不敏以荒唐之學雜凡庸之識嘗思有所著作玩時愒日莫能就緒今年已邁矣雙鬢皤矣形骸弗強而精神寖衰矣徒持寸管為無用空文以應四方之求日不暇給茍不於平仲是望果誰望乎平仲將行率六館之士祖餞於龍江之上睇晴雲之孤飛觀白日之易流酌巨觥而屬平仲曰歲不我與睽離之言不足以汙平仲豫之所深望者不朽之盛事鑑世之元龜也平仲幸聽之願舉此觴為壽平仲曰敢不唯吾子之命一飲輒盡於是抗手而别送翁好古教授廣州序郡府之設教授自宋之中世始然不輕以畀人嚴立試法即舍人院受題呈大義五道文入等者方白省臣用焉復慮無以統臨之也别設官提其綱要司其舉刺驗其惰勤而惟恐有不及至於閭里有出為句讀師者亦必從所𨽻屬陳試經義弗悖于理者始聽其法至詳且密矣或者猶病其不法三代大小學為教而徒泥於訓詁文詞之間嗚呼可謂難矣近代以來急於簿書期會而視教民為悠緩司學計者以歲月序遷豪右海商行賕覔薦往往來倚講席雖有一二君子獲厠其中孤薰而羣蕕一鼓吻一投足輒與之枘鑿唯彼飲食是務號稱子遊氏之賤儒者日夕與居是故稍勵亷隅者不願入學而學行章章有聞者未必盡出於弟子員論至於此寧不為之長慨今我皇明一遵三代為治初入小學習以禮樂射數及升大學則明修己治人之道且為之擇師尤慎府設教授一員必試經義於銓曹文既中格然後白宰相署牘俾權教職三年有成始令為真其視宋益加密矣四方風動無不淬礪濯磨以思顯所學當是時越有翁君好古舊以名經舉進士兼工古文辭有司薦之于朝將官于州縣好古以目眚辭衆惜其才不忍聽其去乃試教官用為廣州教授瀕行陶參政中立朱太史伯賢既各有序贈之好古復來徵豫言豫聞之師曰牧伯以政為治校官以教輔治其職蓋鈞重矣夫以一韋布之儒獲際昌辰與牧伯分庭抗禮得以施化民成俗之道誠非細故哉好古之行也靈承皇上法古興學之意而盡革近代循習茍簡之弊閭里之句讀師必月會之授以彝倫大義使漸摩誘掖之庶幾相率而為進德之歸時雖不設提舉官而府尹之統涖部使者之所核實其法尤嚴也豈無以好古學政之善聞于上者好古勗哉毋徒泥訓詁之繁文為也毋徒溺藻麗之詞章為也好古勗哉送會稽景德輝教授鄉郡序成周之時自國都以達于家于黨于術無不置學學必立師師必以仕焉而止及道明德充者為之然以其國之賢還教其國之人不翅父兄之臨子弟名實之素孚而不藐然無聞也情文之素稔而不涣然無屬也於是其言易入其教易行秩秩而相親欣欣以相愛恩義兩盡薰為太和德成材達有非後世之所能及也會稽古諸侯之國今為浙河東大郡會學官闕教授員鄉之子弟咸曰言篤而行醇惟我景先生則然其黃髮老成人又曰擩嚌經腴朝夕不自饜著述成書惟我景公則然既而郡僚聞之府公亦聞之相與謀曰府庠之無師二千石之責也景君之賢信如子弟老成人之語以鄉人之所尊而為鄉弟子之所師未見其不可也盍上其事於選曹乎選曹既從其請試景君以春秋經義一通白于丞相府報下如章景君將東還涖教事詞林編摩之英成均宿學之士藩府賔僚之賢咸造文若詩榮之而以首簡授濓序嗟夫師道之不立也久矣頗求其故後世拘於選格多用異邦人為之師其實未易孚其情未易稔往往若秦越之相視日夜幸代者之至則望望然去矣今景君之獨能致是者何哉亦曰聖天子在上旰食宵衣以成周為法然後得遂其所志如斯爾景君之行也當思南渡羣賢之子孫咸萃是邦或以德行文辭著或以道學政事聞世之相去未逺也文獻猶有足徵景君能於此盡心焉則移風易俗之效將粲然可觀矣若曰吾耄及之他尚何所圖不過便祿養於桑梓之邦而已豈惟非鄉之父兄子弟之所望雖濓亦將致尤於景君濓知景君決不爾也故人有宋無逸許時用二君亦鄉先生也聞景君講道於鄉也其將有以翼助之哉景君名升其字為德輝云送許存禮赴北平教授任序鴻儒之胄傳經為難非藏髓以接肌盍鈎深而致逺欲承家學罔匪俊賢景伯之貫五經仲師之明三統咸號善繼致宣令聲有如婺郡許文懿公為武夷之世適作宇內之人師繭絲馬鬛析理義之精微粉墨鉛黃發箋文之樞要完經翼傳著述滿家簞食瓢飲肥遁終世其克生於令子遂允蹈於前猷務純楙以自持斂華英而弗耀倡道丹溪襟佩坌集揚徽京輦薦牘交馳天池卒馳於鯤鵬鍾阜竟辭於猿鶴於是上名宰府試藝銓曹典五教於比藩列諸生於東序朝紳悅懌侯服推尊斜川無愧於小坡西平咸稱為有子況當勝國之都嘗為人物之藪教鐸斯振一是韶濩之音藝圃深培佇見菁莪之盛如濓不敏比德知慚秋髮盈簪慨年華之易邁春花夢筆覺文彩之已非粗叨鼎鐘之榮敢忘桑梓之敬偶他鄉之相遇慰昔日之襟期把酒臨風髙情闓朗炙燈論道玄義昭融胡墨突之未黔遽江帆之催發雖無藻思強綴蕪辭繼前古之芳音首羣英之雅製云爾詩曰有菀者柳生于河麋折以送子而興我懷我懷伊何鄉之文獻人逺言微不絶如線之子之生實紹前徽彬彬其文郁郁其儀蘭在逺林其香苾芬豈期人知人輒有聞我傳我經其謨孔臧以迪以將以牖其衷叶遙遙北藩在燕之墟土俗徑悍柔以書詩不見白雲英英在山起而為澤卉木斯蕃教雨之施功亦如此茍專丘壑孰為杞梓學貴有用於子實多目送征帆其如别何其如别何獻此春酒後夜相思白月在柳洪武九年正月十八日送東陽馬生序余幼時即嗜學家貧無從致書以觀每假借於藏書之家手自筆録計日以還天大寒硯水堅手指不可屈伸弗之怠録畢走送之不敢稍逾約以是人多以書假余余因得遍觀羣書既加冠益慕聖賢之道又患無碩師名人與遊嘗趨百里外從鄉之先達執經叩問先達德隆望尊門人弟子填其室未嘗稍降辭色余立侍左右援疑質理俯身傾耳以請或遇其叱咄色愈恭禮愈至不敢出一言以復俟其欣悅則又請焉故余雖愚卒獲有所聞當余之從師也負篋曳屣行深山巨谷中窮冬烈風大雪深數尺足膚皸裂而不知至舍四支僵徑不能動媵人持湯沃灌以衾擁覆久而乃和寓逆旅主人日再食無鮮肥滋味之享同舍生皆被綺繡戴朱纓寶飾之帽腰白玉之環左佩刀右備容臭煜然若神人余則緼袍弊衣處其間略無慕豔意以中有足樂者不知口體之奉不若人也蓋余之勤且艱若此今雖耄老未有所成猶幸預君子之列而承天子之寵光綴公卿之後日侍坐備顧問四海亦謬稱其氏名況才之過於余者乎今諸生學於太學縣官日有廪稍之供父母歲有裘葛之遺無凍餒之患矣坐大厦之下而誦詩書無奔走之勞矣有司業博士為之師未有問而不告求而不得者也凡所宜有之書皆集于此不必若余之手録假諸人而後見也其業有不精德有不成者非天質之卑則心不若余之專耳豈他人之過哉東陽馬生君則在太學已二年流輩甚稱其賢余朝京師生以鄉人子謁余撰長書以為贄辭甚暢達與之論辨言和而色夷自謂少時用心於學甚勞是可謂善學者矣其將歸見其親也余故道為學之難以告之謂余勉鄉人以學者余之志也詆我夸際遇之盛而驕鄉人者豈知豫者哉送王文冏序上既立太學以育才俊士六七年間竒能足用之人駢興錯出布列乎內外為政咸有可稱已而慮文學之臣未多見也乃詔丞相御史大夫擇弟子員質美而能文者得三十有五人命博士躬與之講説日程其業而歲望其功丞相詔諸生喻上旨以為古之有文學者若遊夏以降漢之司馬遷班固唐之韓愈宋之歐陽修蘇軾皆傑然自立於世後世從而師之至今不衰諸生何異於斯人哉烏可以不勉皆謝而退莫不思自奮拔以稱上意上猶恐待之或未至也十二年春復詔大臣曰朕甚欲尊顯諸生慮其未悉吾意諸生入學之日久矣其令歸省其親賜其二親帛各四端有妻孥者攜以來月與粟錢務得其歡心勿惜有司費於是會稽王生文冏承命將還造余請曰上之恩諸生者至矣文冏未知所報願有以教之自昔國家之興駿功溢宇內盛氣薄日月天地為之磅礴山嶽為之動搖必有異才之士出而宣之然後上下得其序神人和而庶物育否則災害生焉皇上有天下今一紀憲章文物無讓古昔思得異才出而宣揚盛美播于無窮而諸生適逢其時一何休哉是詔一出凡含聲鼓喙者皆當奮躍以效才技況諸生躬承其寵而目覩其盛烏可不思報也士之有文者患不逢治世逢治世患乎無位不得被於人諸生以美才際盛時顯位可必取誠能以遊夏自視如上之所期豈非誠有志者哉文冏歸見余友梁先生故太學師也尚從而質焉送陳庭學序西南山水惟川蜀最竒然去中州萬里陸有劍閣棧道之險水有瞿唐灧澦之虞跨馬行篁竹間山髙者纍旬日不見其巔際臨上而俯視絶壑萬仭杳莫測其所窮肝膽為之掉栗水行則江石悍利波惡渦詭舟一失勢尺寸輒縻碎土沈下飽魚鱉其難至如此故非仕有力者不可以遊非材有文者縱遊無所得非壯強者多老死于其地嗜竒之士恨焉天台陳君庭學能為詩由中書左司掾屢從大將北征有勞擢四川都指揮司照磨由水道至成都成都川蜀之要地揚子雲司馬相如諸葛武侯之所居英雄俊傑戰攻駐守之迹詩人文士遊眺飲射賦咏歌呼之所庭學無不厯覽既覽必發為詩以紀其景物時世之變於是其詩益工越三年以例自免歸會余於京師其氣愈充其語愈壯其志意愈髙蓋得於山水之助者侈矣余甚自愧方余少時嘗有志於出遊天下顧以學未成而不暇及年壯可出而四方兵起無所投足逮今聖主興而宇內定極海之際合為一家而余齒已加耄矣欲如庭學之遊尚可得乎然吾聞古之賢士若顔回原憲皆坐守陋室蓬蒿沒户而志意常充然有若囊括于天地者此其故何也得無有出於山水之外者乎庭學其試歸而求焉茍有所得則以告余余將不一愧而已也送會稽金生序余居京師十餘年四方賢士從余遊者衆矣晚得某生之才余愛之既甚凡見其鄉閭及所與交遊之人無不愛也今年某生以其友太學郭生濬來見郭生與某生同邑出其文數十篇讀之善馳驟可喜與之語義理蔚然余又愛之既而郭生又以其同舍會稽金文舉訪豫且稱文舉交朋友有義見人有才者事之惟恐不至善為詩太學之論詩者必稱之余又以愛郭生者愛焉天下之人不肖者常多而材者常少不肖者如野蒿山櫪不培而自長材者如靈芝瑞木舉世不一二見靈芝瑞木之不易得如此見者茍不愛之非無目之人必無識者也是豈人情哉自昔國家盛時材士布列于朝與其同時者且猶愛之況今喪亂之餘斯道之不絶者如髮則才之生於此時者尤不易得也其可不加愛乎豫怪世之士為識不𢎞見有才者位尊則忌其蔽吾名年少則惡其分吾譽交排競訐傷至公之道益知某與郭之交薦其友為可愛而喜文舉愛才之心為足取也及文舉將歸省其親某生為之求言余故以愛才之説告之使見文舉者若覩靈芝瑞木然而毋蹈余之所怪也送李生序善觀璞者不觀其形而觀其色善觀人者不於其材而於其氣形可偽也色不可偽也材可強也氣不可強也摩其外輝然而溫栗然而潤人雖忽之吾必以為良玉矣叩其氣肆然而直浩然而正雖未措於世吾必以為美才矣古之育才者不求其多才而惟養其氣培之以道德而使之純厲之以行義而使之髙節之以禮而使之不亂薰之以樂而使之成化及其氣充而才達惟其所用而無不能加之以天下之大事而不勞優之於廟堂之上而不變窮居於荒陬陋巷而不憂其中有所受而然也故惟有所受者然後能有所為譬之大海然百川之灌千載之積受之而不辭然後能培萬彚載舟楫而不難汙潢之水一葉加之則勝浮之以杯則沈矣故君子貴乎有養也臨海李生宗魯在太學侃侃自許不逐時輩俯仰囊無一金之資處之恆無憂色是非其氣有足恃能然耶彼見寶貨而喜者死於寶貨者也以困貧為憂者終於困貧者也故惟安貧賤而後能脫貧賤輕富貴而後能享富貴安貧賤而輕富貴非善養氣者烏能爾耶生之氣美矣能養之以道吾未見其終貧賤也今年生歸拜其親其友某為余告且言生以布衣歸未有以慰其親請以言榮之余言不足以榮生或者因余之言以求生則知生之所得者過於人逺矣文憲集卷八
