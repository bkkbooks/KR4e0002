body:
  text: 文憲集卷二十九明宋濂撰辭凡三十八章思媺人辭吾鄉吕成公實接中原文獻之傳公殁始餘百年而其學殆絶濓竊病之然公之所學弗畔於孔子之道者也欲學孔子當必自公始此生乎公之鄉者所宜深省也嗟夫公骨雖朽公所著之書猶存古之君子有曠百世而相感者況與公相去又如此之甚近乎聞而知之蓋必有其人矣托物引類作思媺人辭辭曰惟媺人之惜嫕兮賦姱質於自然修蛾規而凝黛兮曼目轉以成􅗻妥鬢髮而如雲兮靨輔巧以承權纎腰秀頸若鮮卑兮容都曼而體便娟寶璐縈而右繞兮桂徽嫷以半偏懸明月以綴佩兮錯木難而傅冠向瑤臺而微步兮意淡靜以貞間宓妃之倫折芳馨以相遺兮復溶與乎江干勢翩翩其褰舉兮若遊龍之在淵何人間不可以久留兮遂凌厲乎髙寒馮道紀以為御兮鍊天和而為飱徑驅馭於隂陽兮時上下乎星辰歎豫生之何晚兮不一覿於芳儀念姱嫭之鮮雙兮遡回颷而曽思欿愁悴而委惰兮氣涫􅘺以如炊道茍可以遻之兮視萬里猶門墀登嶇􅋂而騁望兮正晨旭之蒼涼氣曀豁而闓朗兮莽山川之縱橫樹輪盤紏而柴兮薠草藿靡以相望豐狐思羣而咏嗥兮文鷮慕類以徐翔企精爽之不徠兮空雲龍之將將蹇侘傺而望絶兮耀靈忽其西藏降崇丘而臨曠野兮循故轍以東歸向闌楯而徙倚兮境外嬰而愁內滋新蟾皎以出天兮想纎美之曲眉繁星爛而成文兮懷繡帔之陸離蒼灝霩落而無滓兮思玉體之弗緇拂蘭袖而起步兮復經緯乎空庭苦鴻鴈之雍雍兮厭羽蟲之薨薨撼戶􅀈以悲惻兮惕厭容而弗自勝轉曲牖而入堂壇兮牉獨坐對乎華鐙鐙影搖曳如鳥􅎶兮象中心之靡寧寒尨狺狺而競吠兮耳恍聞於跫音疾倒屣以啓關兮颷鬬葉於枯岑縹綿綿而莫抒兮托幽寄於瑤琴琴聲咽而思深兮類孤鶴之鳴隂更家嗼以將闌兮斗杓旋而向東舒枕衾而就榻兮期夢寐以潛通精氣注以弗釋兮橋有物而衡中息纚纚以方微兮魂翕翕而上征造旬始而謁太儀兮羣靈繽其若叢氛旄溶以隨猋兮鳳旍沛而嬰空馭象車而秉虬節兮鞭列缺以斥豐隆豹纛熊幡聿皇以奮兮樛流紆譎鬱以相蒙左撝右衛動以綳彋兮倐胂倩浰雲滃而雷春回穴幡纚汨以卉歙兮吸嚊􅀈率藹以蒙鴻穆眇眇以前邁兮翩衯衯而弗止莽冥冥以無垠兮勢皇皇而迤靡超氛埃而淑郵兮竟按轡乎朱陵長麗舉噣以向日兮有赫戲之華文揚芒熛以上猋兮粲重離之丹門炫赤玉之寶章兮列八龍之威神歘東趍於蒼極兮青雕紛其並迎羣神衎衎以方饗兮奏靈和之鳳笙四酎芬而凍歆兮暈玉色而帶頳楫素威以升皓宫兮盼四極之浮浮蓐收顧余而破顔兮錫鏤瓊之華鉤謂貞白以自守兮合左契於伊周折寒門而燭元冥兮朔颸颯以吹裘有夫玄巾而檈甲兮握靈蛇以為驅重隂沍而未啓兮肅玄氛之幽幽四方非不可居兮悵所思之莫余都馳兩轂如飛丸兮又滔滔而遐逝靈氛告余以吉故兮子何為兮獨悲若彼中天之有居兮隔人世之風雨吾將導子之一至兮庶弗愆於恆素怊忽荒以從之兮駕剛颷以徑度􅘈光炎之炘炘兮綝纚鬱決而不可正視雕薨彤楹屹以上起兮瀏濫𢎞惝雲譎而波詭連卷欐佹杳以軋芴兮崴魁幼眇矗以髙峙中洞房之沕穆兮乃媺人之攸居使曼姬為豫通訊兮儼再拜乎堂埀􅘈朱扉之洞開兮移玉趾之委蛇珠明玉潔不足以為喻兮光照耀乎東西吐芳辭以若蘭兮意勤勤而告余曰皇降靈兮昭質弗沫毋染爾穢兮昧厥施紉藥襦兮曳茝斾結蕙纕兮張椒幃勺桂漿兮咽蓀麋索胡繩兮畦揭車集衆芳以逺蒸兮羌郁郁而斐斐余俯首而敬聽兮書鞶紳以自規海色動而報曙兮陶去幽而開寤雖嘉辭之盈耳兮邈若人其何處遂捫膺以沈思兮顝獨處而繚戾也誠因言以會心兮將神交於千載也亘天地而無初終兮惟我民之秉彛道𢎞敷於上下兮必有人而繫之往者固不可作兮幸方册之昭如日參驗於厥躬兮若面命而耳提跛鱉之􅀈姍兮固難齊於六驥能孳孳而弗怠兮亦千里之可至余雖質薤而力單兮敢不沾沾而奮厲帶鈎矩而佩衡兮撤蔀蒙而祛罻期有形以必踐兮始俯仰而無愧縱不得媺人以與之遊兮又何異同功而並世豫既為此辭嘗録一通寄王子充子充蓋有志同豫學吕者書以識之庸俟異日各考其學之成也青山辭青山崔崔白雲溶溶我疑其中仙人所宫風馬雲輿霓旌羽幢遊行太空翩然相從望而不見使我心忡我本金華牧羊之童口誦蘃笈有聲如鐘震撼岩壑無礙不通謫居下土黃塵濛濛五色之文布滿西東秋髙露清陟彼危峰呼吸元氣精神內融嘯傲萬物後天而終雲中辭黃巗有竒士曰許君弼其字廷輔治周易蔚然以文名會天下紛擾輒被鐵衣操蛇矛集兵以禦冦尤能挽強命中衆初弗信君設正鵠一百八十步外挾弓矢以往轟然一發輒中之乃皆歎服由是多驅馳戎馬間及天兵取台州四方次第平大興文治建科目以取士君慨然曰聖天子在上可以出而仕矣起應書鄉闈遂取浙江第二名君文解去通判沔陽府剸煩劇如庖丁解牛恢恢乎投刃而有餘地已而復慨然曰豫家之東有委羽山其髙摩天委羽之下又有桃山焉羣峰相與回環日未出常有雲氣起其間縹眇輕盈如夔羅綿籠罩崕谷如翔如舞絶可愛玩有時下覆櫩宇覺此身飄然在雲之中恍欲逐黃鶴仙人吹簫而往來也第以君恩未報不敢決去他時髮種種當挂冠而歸與雲為朋姑以雲中生自號蓋以表其志云夫雲之為物出乎太虛歘然而有忽然而無其變幻有不可測者當長空晴妍紆徐其興結而為祥鸞散而為綺霞其文采郁如也及其黤黮鬱勃鐵馬長驅雷電為之恍惚而甘霖注焉嗚呼雲哉何其有類於君也然非雲之類君實君有取於雲也樂繁華者贈勺藥以相娛務髙潔者貯秋菊以為糧物何嘗有心而人自強同之爾豫方與君談雲中之趣君忽昻然而來顧豫言曰弼知誦子之文久矣盍為賦雲中辭乎豫聞君襟韻灑落得喪一歸于天故其顔四時無憂色其號為雲中也亦宜為之辭曰委羽之山兮雲薄之勢輪囷兮復嵾嵯膚寸而合兮既合而復離不崇朝兮雨渺瀰渺瀰兮雲之歸玄功泯泯兮邈難知嗟爾雲中之人兮胡不爾思或出兮或處兮恆與雲以相期協晨中寥辭一首鬼谷仙人畫列禦冦御風圖以獻其師四十二代天師真人真人號沖虛子而唐封禦冦之號實曰沖虛此其圖之所以作歟濂竊觀之髯松奮張有風泠泠然起於其中霞光發舒閃鑠無定禦冦方乘颷間旋龍裳鸞帶凌亂不可止遙見神山隱起大瀛海上旭日一點如火海濤噴薄迎之濺沫而舞珠景物遼敻令人情塵銷霣直超鴻濛間嗚呼仙人之畫竒絶矣蓋以嫓真人非果在於禦冦也真人或飛斾上謁太清排空馭氣靡所不之將真人之似禦冦乎抑禦冦之同真人乎是未可知也濂因造協晨中寥辭一篇真人或咏於淵精之區九都衆真當有彈八瓊太璈來和之者庶幾後天而終可以凋三光者乎至若禦冦寓言旬有五日而後反者微旨已備見其書兹可略云辭曰帝青洞真陽太颷恆鬱敷凝神歘上征行與灝氣俱飛輪入溟涬九光開翠荂腰佩白琥囊吻薦紫琳腴曲龍有文人持節下明都㖟以八辰祕攝御萬象初陟彼方文臺大招許瓊暉廓落黃演氣陽堂明梵樞開明戊巳功玄契曲晨機羲娥俯倒景流光駐熙夷靈集動千載視之若斯須稽首方諸君同餐燕胎芝請授長生籙浩劫以為期豫老矣諸書皆忘去此卷雖久留齋中不克題就今日退朝稍早逍遙禁林涼颸飄飄然吹衣神情爽朗有若慿虛而行歌天上遂濡毫賦此他日煉丹仙華山中九轉成功當與沖虛神遊八極握手一笑何翅三千年也碧崕亭辭濂與太常卿魏觀先生遊甚久知其為孝敬之人也先生間嘗來謂濂曰豫家鄂之蒲圻蒲圻有山曰蒲首焉巉然而起如雲旓翠蕤蕩摩空濛間對峙雙石楹直上如笋中敞碧崕千尋嘉卉靈草雜被之紛紅駭緑儼如圖畫中我先人愛玩而不忘日支笻步其下或濯纓澗底或咏詩坐磐石上或望雲出沒崖谷悠然而忘返遂因以碧崖自號時移事遷層崖絶壁雖蒼然不改於舊而先人則追逐羣仙於風馬雲輿中弗能一見之豫每過其下不覺澘然出涕故於宦遊所至揭碧崖之名於楣間所以志之志之所以思夫親也雖然名之固寓也而言之則尤寓也曷若親履其地而求先人之遺迹乎當今聖人在上方以孝治天下他日幸遂歸田之請築亭山麓仍以碧崖名之當風日清美與二三子遊其間指而言曰彼清泉瀏瀏而斜出者此先人濯纓之處也磐石纍纍而可坐者此先人咏詩之地也崖谷沈沈靈氣之宣通者此先人望雲出沒之所也一俯一仰無非精神之參會非惟慰其遐思抑將藉是以勵夫所學期克肖乎先人豫雖耄矣此心不敢忘子幸為辭刻諸亭上何如濂曰傳有之舜食則見堯於羹坐則見堯於牆古之上聖猶若斯況下於此者乎人子之於親遇事觸物無有不可感勵者況親之昔日所遊厯者乎斯亭之建當與甄氏思亭並稱其視崇臺芳榭以騁遊觀之娛者果何如也若先生者豈不為孝敬之人哉先生字杞山觀其名也學問富而德行修踐揚中外其善政蓋章章云辭曰崖之雲兮英英其升崖之木兮欣欣其榮悵仙人兮向之颷風薄而上征豈降精而委祉兮發為休徵三秀之茁兮膏露之凝渺長思於無窮兮視一息於千齡金可銷而石可泐兮又焉能爽吾之精誠著存軒辭并序瑞安裴中季和以學行推舉典簿成均扁其軒居曰著存不忘乎親也御史中丞劉君伯溫嘗為賦詩以寫其情豫復師伯溫之意演為琴操三解使季和援琴而鼓之琴悲而不成聲聲信不能成也嗚呼孝子之思親果有終極否乎其辭曰人孰無親兮我親歸于黃土六合之間兮莫過我最苦風獵獵兮成音雲族興兮晝隂我親何在兮涕泗霑襟我親雖死兮我心不死開目則見兮威儀孔邇何俟當祭兮始如見之彼蒼者天兮悠悠我思求親冥茫兮曷求於身我身即親兮一體之分戰兢保持兮厥德克新毫髮不敢愆兮懼傷乎親上慎旃哉兮此謂著存孤憤辭中州人士有無罪而被廢斥者識與不識咸寃之濂因本其志為著孤憤之辭使世之用法不慎者讀焉其或知所懼也夫辭曰哀豫生之匪淑兮耿鬱紆其誰語恐此心之難白兮假微詞以自吐曩有志乎學古兮指前修以作則非秋蘭奚敢紉兮非申椒吾焉食仗所履之正直兮謂無施而不可悲世塗之嶮巇兮􅘈獨中兹危禍胡萋斐之小文兮竟成之於貝錦剛指方以為圓兮揆人情為已甚伊翩翩之公子兮余素得而友之握手以示肺肝兮若斷金而弗疑何中心之多變兮一旋踵而弗豫識既擠豫於坑穽兮復彎弓而下石汝面目之無怍兮曽何謀之弗深縱禍豫其何傷兮吾懼戕汝之良心覩日月之光昭兮聞雷霆之隱耽豫固不足畏兮汝寧不畏于天天道微而難索兮斯焉足以責汝彼黃鳥之嚶嚶兮猶求友而弗止將七尺之美軀兮乃一禽之不如豫固約結而罔措兮又為汝而歔欷嗟受命之蹇􅀈兮豈獨汝之為尤蛟龍鬬於深淵兮寧無損於鰌䱔汝雖不我陷兮豫安往而逃囚唯飲泣而無所訴兮傷豫罪之不當蒼天之至明兮獨不鑑我之幽枉叶於良切皎皎之白璧兮僉訾其為燕石也纎纎之素縞兮反謂其如玄漆也欲力詆以深文兮其奚患於無辭咎繇之不吾出兮眼有淚而誰知誓剖心以自明兮念父母之所遺茍雉經於溝瀆兮慮君子之見嗤夜漫漫而不旦兮悲風颯其四來秋蟲響於空階兮似助豫之悲哀六合之至廣兮置一身而無所魂恍恍若有忘兮雖生存而如死昔公冶之所遭兮夫何有於不仁在縲絏而非罪兮亦魯叟之所稱果自反而弗疚兮縱遇辱其如榮浮雲過而日潔兮春氷釋而水清外纍不足以為懼兮懼吾德之未明意欣欣以超絶兮振冠纓而起行取瑤琴以彈之兮有和衎之新聲樂天命以自度兮究年歲而不再更李都尉字辭皇上即位之九年以順德公主下嫁于太師李韓公之子駙馬都尉祺初祺小字為總至是詔曰其易以美名翰林諸臣乃定今名以進且字之曰子祺既而子祺請曰祺之名實定於先生祺於先生少嘗受業有師弟子義將何以教之余惟一代之興必有元勳厚德之人出於其間始則佐帷幄決勝負終則坐廟堂而贊治化成大功而享榮名為國家之柱石係天下之重輕若漢之蕭鄼侯宋之趙韓王皆若是矣至於連姻帝室若今太師則未之有也今太師極人臣之尊為上公之貴而都尉子祺獨能好學慎行敦厚下人發為篇章動有意趣是可謂富貴而好禮又難能也祺之為義為祥為吉子祺固有以致之矣為字實宜雖然尚父有云敬勝怠者吉此守位之事也敢以為勉焉辭曰氣合運凝天地載清君聖臣明以階治平惟臣謂誰實時元老運籌建略致天之討四方既帖乃戢干戈執政廟堂如漢蕭何非惟執政胙以大國丹書金劵俾首百辟爵則崇侯職則太師左右天子以鎮四夷四夷既安君臣交歡上降下承煥乎榮觀郴郴都尉大寵是膺太師之子天子之甥際兹風雲依彼日月侃侃都尉不自矜伐文駟錦衣其儀孔嘉出入金門不敢笑譁躚躚公子交趨兢諾都尉統師屹如山嶽斯時之人以恩為祥祥則既多惟敬乃將都尉之名曰祺是命何以承之告爾克敬庶民不敬且潰乃家況兹世臣不敬謂何凡人有身咸有嗜欲敬以攝之形莊氣肅自身而推孝親尊君動無弗敬乃有譽聞敬勝者吉古有𢎞訓敬以承祺萬福咸順爾克敬矣罔弗盛矣爾之祺矣罔爾違矣太師之勛山崇川長敬哉勿忘以繼耿光馮擇善都督字辭自昔帝王啓迹之地天必儲精聚靈使英雄謀略之士生乎其間以備其驅䇿而佐其設施及大業既定爵號之隆冠于當世褒寵之澤流于子孫若漢唐之豐沛晉陽君臣同休蓋蔚乎其盛矣今上皇帝龍飛江淮光啓神祚于時文武才俊鷹揚虎躍或秉鉞出征或執筆帷幄率多江淮之人論功剖符公國侯郡者以數十計若郢國馮公其一也郢公定逺人初從上為帳前總制親軍都指揮使立功草昧時不幸早卒及上即位追爵為公命其子誠侍青宫執業讀書及誠既冠三擢遂僉大都督府事而誠之季父初襲郢公職纍建大勳亦啓封宋國一門二公誠又位在樞府敏事慎職為上信任天下榮之誠篤好問學能為詩章以嘗受學于豫間來請曰誠之字曰擇善未達其義願有以教之乃為之辭曰江淮之間真主生焉乘風附雲實為英賢侃侃郢公熊虎之姿大劍良弓指麾義師孰與其才不賦以壽騏驥萬里僨于中道壽雖不延有弟克膺有子克承以宏厥聲烈烈宋公為郢公弟為都督誠又克為子為他人子名實易稱保國承家厥惟難能上則天君下則衆庶茍弗以誠曷以宅位惟誠之德貫通于天何感弗應何鬱弗宣天以至誠庶物乃育三光無愆四序靡瀆茍或不誠宜暑而寒人其怨嗟歲功斯癏況我伊人不誠其可矧爾世臣爵祿是荷爾或不誠民胥爾尤誠而無擇為僻為謬古訓孔多維人攸踐我將曷從維擇其善惟忠與孝則允蹈之維悖維惡絶而弗為蹈之匪艱服以悠久木升川增山立海受既擇衆善乃立爾誠乃保厥家乃篤鴻慶以之事君為臣之良以之立身為邦之光匪光于邦丕爾先人郢公有子聖主有臣張孟兼字辭并序國子録張君生于歲戊寅正月六日以厯推之是月九日始入春則中氣猶居丁丑年之冬其大父府君因以丁命名張君既長聞人先生字曰孟兼兼者何謂臨二歲之中也夫丁在土毋為火戊則土也火為文明之候非不灼然有光必變而為土然後生物之功遂張君以辭章名世今將刋其華而食其實乎雖然丁離象也戊坤象也離上而坤下於卦為晉彖有之明出地上順而麗乎大明柔進而上行張君又將自此而升乎方今大明御世治具畢舉張君益昭其明德發為人文以黼黻王度物有不資其成者乎是則兼之之義已或謂殷人尚質多以十幹名其與府君之意則敻然殊也張君浦陽人有學行與濓為同門朋辭曰戊為子丁為父火得為土百物之所祖能兼之道為伍趙廣字辭浦汭趙志道氏衣冠之望族也有子曰廣來求豫為之字豫謂廣之文從廣從黃廣則因廠為屋象對刺髙屋之形而廣則諧聲也許慎以屋之大者為廣實有容受之義焉請以子容字之何如志道曰善矣乃為之辭曰人之隘也爾則廣之人之拒也爾則容之惟廣惟容吾將見爾德之豐鄭仲昭字辭詩云倬彼雲漢昭回于天説者謂雲漢天河也夜晴則天河明其光隨天而轉也雲漢然矣揆於心之靈明其有弗同者乎豫友浦汭鄭君以漢為名內翰栁先生字之曰仲昭間來徵豫言豫聞制字必有祝於是稽諸詩義而補之以辭辭曰五禮攸建冠為之先備物祇事無一或愆筮期宿賓列器布筵辨間皮爵裳錯黃玄組纓屬缺韎韐用延尊甒有禁柶觶斯甄離肺充鼎乾胏實籩嘉爵既祭工祝乃傳造字命辭厥義則宣維天有漢灝氣成川衝角奠軫貫乎宿纒夜翳既斂若練在縣隨時運行素色連娟徵諸人心同此皎鮮森列萬象遍燭八埏出王遊衍與天周旋有媺鄭君世胄蟬聫十世同煬義聞四傳君實纘之僉曰象賢圖之回之家政爾肩泰之昭之先緒愈綿惟廉則礪惟溫則瑄處乎正中有赫其平漢名昭字佩服允堅一理是循顧諟匪偏相彼先民日夕乾乾一事或悖六鑿相挻君宜自朂弗懈益虔器服有銘在古則然敢補祝辭以代韋弦黃瑄字辭宣之為文上從一而下從二從回乃取風回轉以宣通隂陽之義尋復借為布為緩為明為遍不一而足若加之以玉則又為瑄蓋玉則象形宣則諧聲也爾雅云璧入六寸謂之瑄漢代郊祀則有司奉瑄玉而瑄又通作宣然則瑄玉者亦玉中之最貴者歟先師黃文獻公之嫡孫名瑄濂因字之曰伯宣且朂之曰天地之間貴者為玉賤者為石石譬則小人玉譬則君子也爾瑄出自瓊瑤之林人固曰此玉也非石也玉則玉矣曷益之以礱琢之功乎不然則玉徒玉爾器云乎哉雖然器幸成矣復局滯於一而未能無施而不當也瑄乎瑄乎其用是而自朂乎嗚呼文獻公藏器于身出而薦諸郊廟非特器而已也有如辟羡起度凡諸玉之用規矩皆自其中出爾瑄慎勿愧之瑄乎瑄乎其用是而自朂乎濂老門人也故於瑄不敢褒而敢針系之以誦曰璧大為瑄孕諸石孚尹夜氣吐秋魄薦郊奠廟神鬼格其儀敻出犧與帛嫓義配名到幽頥爾性爾繕靡朝夕豫言服膺宜無斁臧士幾字辭臧君哲字曰文濬密人也以儀曹屬時詔為司隸然其為人秀頴而嗜學賢士大夫愛之頗謂其名若字皆盛德事殊非所以自稱盍更之君來請於豫豫摘程子哲人知幾之義字曰士幾幾者善惡之發榮辱之主也可不慎歟慎之如何曰誠而已矣作字辭辭曰心神變化乘氣機弩牙既幹鈞石隨或黑或白乃異岐君子防之樹城碑嚴以金鼓列旌旗百體從令志則熙尚慎旃哉無殆而黃仁淵靜字辭有序建安才俊士曰黃生名汶仁負超羣之資朝出受易於部使者陳孟龍至暮抵舍復質所疑於仲父居德亦竒男子年十六時中私試髙等諸老生不中譁于庭居德因請面試上官前譁者執筆不能下面頸發赤以出以故生內外皆得師學之日進如水湧雲集洪武辛亥秋有司賢之以生名上福建行中書試藝棘闈八府之士充貢者二百而司文衡者又前進士林以順吳尚志郭麟江惟志也取舍甚嚴或懼不獲在兹選及榜出三十人中而生名居其四遂為易經諸義之冠生之年始弱齡耳明年會試南宫銓曹急於用才不俟再試擢奉常贊禮郎階入八品有識之士無不為生榮雖余亦愛生甚時以問學朂之生因執經從余學間拱手而言曰仁初名文仁有司援例以文犯周西伯之諡加水於其左及解名上中書吏以白右丞相汪公公曰仁之義甚𢎞無所不包其可冠以汶字乎宜去之先達因取魯論仁者靜之言字以淵靜願先生詳發其義嗚呼考亭朱子釋此至矣余何以言為雖然不可無以答生之意生之賦資固超羣而求仁之方不可不力也為序其事而申之以辭曰仁體凝重屹弗遷振古雄峙如山然生意周流踵至顛一息有虧用則愆爾生心澄靜若淵萬象森列具不偏返觀沖漠無後先其機或動矢發弦雲行雨施出自天神功不宰超虛玄全體大用昭以宣上師周孔下淵騫縱不及聖肯下賢流光不駐若電煽生其夙夜加勉旃張肯字辭古者冠而字敬其名也三加之後必為字辭以祝之或稽於經或據於史凡可以繕性禔身者無不可也由此觀之非惟敬其名抑且以敬其身能敬其身則成人之道具矣姑蘇張君藝已敦實有學之士也嘗名其子曰肯又以繼孟字之蓋取書大誥之義也雖加冠於首而未有為之辭者請豫補之余雖不獲從大賓之後與聞酌醴之事然與藝已友也輒陳所見而告之其辭曰冠禮之重為敬其名茍非其人禮弗虛行伊張氏子世傳以經名子曰肯厥義則宏吾為爾陳聳耳而聽有法於先爾基爾楹有災于前爾播爾營勿違厥時必將必迎勿閼其成載厲載興兹為善繼父事是繩前者有作後或匪承此謂悖則溺於淪冥規既我蹈矩復我程此謂順德令譽日增二塗之間美惡所形擇善固執弗撓而傾况爾秀穎如稼之青翹然獨異如木之榮棟梁斯任倉囷載盈上慎旃哉學惟蒸蒸余言止矣爾其服膺王宗器字辭王生璉字宗器其先太原人今家濟南之長山器局沈凝而學問精密洪武五年以易經舉進士山東名列第三既上南宫未試皇上召見便殿親命題賦詩詩成稱旨擢史館編修賜以冠服選入禁中文華堂肄業詔翰林老臣為師同時而進者凡十又七人車駕時臨䇿勵之且取其文品評其優劣日命光祿寺給膳羞酒漿每當食青宫暨親王迭為之主而璉等侍飯於左右冬夏賜衣各一襲復有白金弓矢鞍馬之頒蓋不一而足近又使璉攝御史廉察河南逮歸奏對益稱旨上悅謂近臣曰文華堂諸生如璉等者皆朕異日將相材也其期望之重如此璉嘗從余學故來以字辭為請豫因序璉遭逢之盛於首而著命名制字之義於辭璉能聽之必上不負於國恩下不負於所學矣辭曰宗廟之器貴重實殊夏有四璉殷稱六瑚周云八簋異名同符其貴斯何珠玉為飾其重斯何盛以黍稷嚴奉明禋神鬼是格惟端木氏才堪三卿文章外見以言語稱汝器見許載諸聖經今生既長局度純亮發為辭章大河奔放器字璉名父師所望出逢盛治講學禁中天日照臨以煦以融以達其衷用廓其蒙學之茂矣川之流矣材之秀矣木之修矣蚤夜孜孜道是求矣豸冠巍峩巡行洛河貪夫夜逃良士笑歌君子之為君子之多學無止功勿畫斯善辟彼行塗足不留踐百里至千所見逾逺志安於近行局一偏笙罔為鏞豆難充籩規模卑狹世則病旃德藏于身動無不被厥用能周由體斯具生尚朂焉庶幾不器王生致逺冠字祝辭虎林王生其幼也父命之名曰驥及年寖長加元服于首大賓字之曰致逺蓋取梁徐勉所謂人中騏驥必致千里之言也按説文驥千里馬也孫陽所相者其字從馬冀則諧聲夫千里馬不常有以謂世之竒才亦未嘗數見也以生名若字觀之則父師所期望者不亦深且長哉豫雖不及與聞三加酌醴敢抽蕪思而𢎞敷其義生宜聽之毋忽其辭曰古者體物取義孔殷麟紀其瑞鳳揚其文表厥茂實載敷清芬其一惟馬之族本非一類八尺為龍千里曰驥因生有别挺材見異其二伊驥斯何墮地不毛虎文彪炳龍骨陂陀天機趫騰絶山飲河其三當其奮飛神行電逝若滅若沒一日千里晨燕晡越視同遊戲其四誰其似之渥窪之姿肉角飛黃逸氣纎離天間翔翔玉臺裴回其五奚官善馴是澡是拂秣以美薦飫以香粒筐惡蜃溲慮無弗及其六物尚有兹人胡不如天賦權竒孰不自攄口噴紅光長鳴九衢其七豈無王良俾其振迅未必鹽車能厄神駿三羸五駑過者誰問其八生遊藝府逸思超羣剪水為神製霞作文亦既應書名達帝宸其九侍經藩王出入禁禦宫袍時頒太宫致餼寵賚之隆揆古無愧其十以利天下易經有辭取譬奔踶漢詔以之任重道逺生寧勿思其十一曷以思之朝夕兢惕匪力足矜所稱惟德豫言非誣朂之無斁其十二宋惟善字辭宋氏自京兆遷汳又自汴分遷吳興虎林虎林有名善字惟善者實承其後吳興則再遷金華而豫之逺裔也豫與惟善為同宗豫侍講禁林日惟善以學行貢諸朝皇上親擢為給事中朝夕在帝左右時被顧問恩寵有加焉已而兼靖江王府録事擢監察御史改知濟寧府未上升參山東承宣布政司政事豫與惟善為同朝瀕行惟善來言曰善以字辭為請已二年矣叔父文墨之冗日弗暇治因未敢纍執事今將有逺行叔父寧終靳一辭乎豫笑曰惟善通書工辭章經緯參伍燦然成文持節行州縣彰善疸惡又愜乎物情是文學政事舉勝於人縱豫有言將何有禆於惟善乎惟善請之益力豫不能牢讓因稽其命名制字之義綴之以辭辭曰隂陽迭運道寓其中繼之者善性成乎躬其善伊何化育之妙陽行隂具萬理樞要是曰天道體用弗遺式昭化源用樹學基有倬君子夙著徽美內功既加外聞益侈積久發𢎞上簡帝衷峻爵穹官日致顯融君恩如天無不覆燾昧昧思之非忠莫報往佐方嶽審其政機大見設施春煦秋威孰滯盍疏孰蠧盍剪孰才盍登自邇及逺此非外鑠實善之推成已成人庶其在兹我著我辭徵厥名字揭諸座隅以示籖史補張馮加冠字辭有序瑞安張生馮宋金部郎中聲道諸孫也以文學薦於朝擢奉常贊禮郎奉常所典祀天神饗人鬼祭地祇之禮其責任為甚重馮能周施佐助而無越禮愆度君子稱之馮當冠時大賓字之曰子翼而未有造祝辭者邇來監祀廣西行中書省參知政事黃君子雍嘗為推説字義而序之馮事豫頗謹間復以祝辭為請豫按士冠禮載其三加之辭甚具辭古也而字説則今也豫雖不敏弗能從大賓與聞制字之義馮之意難固拒也遂黽勉以補其辭辭曰冠而有字為敬其名曷為敬之期學之凝學將焉施莫重夫祭大嘏之受因神所致孰有賢行慎擇為尸豫撰厥几庶堪馮依豈惟佐食宿有命戒皇尸戾止益虔弗懈侃侃工祝左承右趍既贊道之復扶助之馮之謂何如神斯據翼之謂何如鳥展翅百靈繽紛儼乎若淵洞徹上下精白一心詩咏卷阿歸于孝德放諸四海準是為則爾職贊禮陟降廟郊周折圓方弗愆絲毛非志之醇疇能及此宜勵其功慎終如始自此而推泉達火然孝親忠君其道一原內涵外充一循乎敬大本既敦末罔不正爾有長才發軔在兹何逺弗屆何福弗宜探名索字孳孳不已賢亦何人希之則是鄭氏三子加冠命字祝辭有序浦陽孝義之門曰鄭氏其十世之長仲德甫筮得柔日宿余為賓將冠其從子木杲果命親與之周旋降升以成三加之禮於是稽名定義製字命之夫平土有叢為林因字木曰叔林日在木上為杲因字杲曰叔升丈夫致果為毅因字果曰叔毅命已遂通祝之以辭辭曰三加三醮既備禮儀昭告爾字各宜聽之木從地生含和茹滋孤撑非貴叢生乃竒蔚若鄧林隂陽蔽虧欲搆清廟掄材實宜毋學樗櫟擁腫離疏為世鄙賤工師莫窺木其朂哉夙夜克治杲杲出日新陽則微及升扶桑其光陸離嫓諸靈扃皎然弗緇群昏既斂洞察毫絲毋若小夫中霄而趨擲埴索塗陷於汙痺杲尚朂哉賢哲自期人之立志樹德為基唯果而毅篤行不疑譬之大將建以鼓旗奮矛爭先矯亢欲飛毋習巽懦如脂如韋聞過罔悛媕婀委他果尚朂哉振厲有為爾三子者昧昧以思彼蒼者天體物無遺或出或入靡不爾隨尚滌爾心一髮不私履善蹈道君子之歸茍務口耳言從行違奚翅犢禽安於鬚眉世之恆流父子異炊脫有不善衆方見嗤况爾旌門十葉聚居名播寰宇彤筆所書尢當戰惕若臨險戲尊厥祖武全其秉彛群翔于堂東塤西箎獨行于庭左矩右規庶幾無愧七尺之軀豫年耄矣百艱備罹涉事既廣理能真知諄諄爾誨辭肯貢諛請書座右視如嚴師鄭柏加冠祝辭浦陽江上有旌義之家曰鄭氏其子姓多從余遊有名洧者執經為最久近又攜其子柏請曰柏加巾時賓字之曰叔端而祝辭尚闕願先生追補之余聞記禮之家以竹箭有筠松柏有心居天下之大端故貫四時而不改柯易葉蓋喻人之得禮則內諧而外無怨旨哉言乎今柏之門內外雍穆且十葉聚食矣非禮有以管攝之惡免無乖盩哉夫端者本也釋者謂四物最得氣之本用此而不變傷以端為字配名實宜於是申之以辭辭曰齊家之道人情為由修禮以耕耒耜用宣媷其蕪穢灌以淵泉既功既施遲彼有年逮其大備食之肥鮮稽類取譬柏號最堅暨于松筠同得氣原青貫四時柯蔥葉芊外柔內澤本固末綿我挈其綱物莫敢先藉禮為政孰謂不然民則底定天和斯全釋回增美植正斥偏情通上下曽無間言揆諸稼事理不少􅀢爾生鄭柏紳緌蟬聨由禮達義世已十傳煦然春溫嘉生縈駢旌書煒煌降自九天爾生已冠學維箋箋朱唇漆鬛玉潔珠圓元賓加布三祝于筵取端配名朂爾致虔當為鬯曰與鬱回旋勿隨鮮葩衒竒兢妍此謂敦本確執弗遷循名責實夙夜乾乾祝辭止斯爾其勉旃補臨川危安子定加冠祝辭有序冠者責成人之道其禮自天子至于諸侯卿大夫士各有隆殺之節儀文雖已失傳唯士冠禮獨存告廟筮期宿賓命贊辨有皮爵之等裳有黃玄之錯器有尊甒柶觶之用鼎有乾胏離肺之實三加而彌尊制字以敬名其為禮甚嚴矣夫何故事親從兄忠君敬長之行望其有所成也古昔盛時以冠為諸禮之首者其職此之由歟自冠禮久廢風頺俗靡𡨕然夜行如擲埴而索塗君子未嘗不為之永慨也臨川危生安清敏好修為文辭亦整緻可觀嘗從郡諸生肄業成均學士大夫多延譽之其師曽先生旦初為字曰子定來謁禁林求豫為之説豫謂字之有説説文解字備述之矣何暇人言哉然三加成禮之後既命之字必造辭以祝之是猶可為也於是歷序冠禮之嚴定字代名者為甚重繼掇大學知止之義而申之以辭生慎聽之其將躋君子之域矣乎其辭曰人之初生父命其名弱齡攸屆乃以字稱此非彌文實厚彛經四行之責用底于成其一爾生名安以定為字稽諸聖經敷列其義必先知止始奠厥志射有正鵠直趨而逐其二方其未定逐物而搖紛紜舛戾水湧風飄及既定止類鑒孔昭事至則應順而不膠其三曷為致斯因靜之故靜為動基理罔弗具辟地博厚發育萬彚區萌畢達隨風而布其四靜主乎內靈扃廓然靡隱靡顯隨寓而安天光昭煥人滓將刋漸獲所止斯不為難其五惟古之學明體適用出輔邦家瑞若麟鳳逮及後世葩藻是弄誇多鬬靡有如聚訟其六昔我臨川學者所宗仰視陸子其猶神龍駕風鞭霆雨于太空被其澤者碩大而充其七憫彼夸毗以幸喪質直究本心皎如出日微言猶存可以尋繹生居其鄉敢不自力其八爾生長矣煜如秀榮濯濯而明英英而貞從師受經啄其至精亦既有文五色交縈其九我後賓贊不與酌醴今補祝辭庸申規厲行固宜篤知亦須至安定其中聖域可企其十東湖先生方君招魂辭至正元年春東湖先生年過九十貌加癯而神益腴一旦合賢士大夫于庭先生被古冠衣出肅賓升堂已復揖賓咸東向坐顧外孫楊恆執豆籩乃從容舉觶而揚言曰老夫耄矣其去人間世不逺矣私自念隂陽之運相摩相蕩而人實藉是以成形有生者必有死暫聚者必終散嘗昧昧思之上自頭顱齒髮下自肩髀腰膂不知何者為可藉何者為可恆乃欲長生坐閲世而不死乎豫每讀古書見所謂豪傑之士不可勝數或提三尺之劒擁百萬兵喑噁叱吒而江水為之湧起或掉三寸舌高軒結駟遊騁於諸侯之間亦足以懾強而下敵若而人其材略雄矣其精魄徑矣吾將求而與之遊則已蕩為飄氛而無致詰矣嗚呼世之人凡以有涯之身與無涯敵者皆可悲也是以榮啓期林類之徒有見乎此或被索鼓琴或行畦拾穗雖至老死不以戚戚少嬰其心豫竊慕之嘗聞古有虞殯之章蓋羣歌以挽櫬于塗與其施諸死後之鬼孰若豫親見之賢士大夫若不豫棄宜賦詩以挽豫豫當乘安車而出使善音者道豫而歌豫且擊輪為節以應之是未必遽減於秦淮海也賢士大夫若從豫言願舉此觶為賢士大夫壽衆皆曰然先生既行觶已又舉觶言曰賢士大夫固挽我矣豫又聞古之人有遭讒放逐者或閔其魂魄離散而不復還作辭以招之其人初未嘗死也豫雖無放逐之憂而其精神皆已斁竭筋骨皆已罷憊顧未死耳幸未死有能辭以招我庶幾翩然自適與夫既死而有靈亦御雲龍而一下聽之又未必不輾然而笑也此非屬吾景濂而誰為願舉此觶為吾景濂夀濂又曰然於是賢士大夫執觶以酢先生且各撰歌詩一章以進濂因製為招魂辭云先生名寀字德載姓方氏越之暨陽人其行大略見於延陵吳公所著碑銘辭曰魂兮既徠母逺征些上下八極皆曚冥些華山如雲倚空青些下有芝房炳明靈些白間綺疏紫檀扄些銅龍承樞吐赤瑛些繡帷髙褰耀輜軿些緑蛇衛轂若流星些淳熬熊胹溢鼎鉶些狼臅凝膏如玉晶些九霞玄冠五綵綎些麟衫麑裘光熒熒些珩璜合節鏘瓏玲些離灑巢和一齊鳴些沂􅑧飄毊發繁聲些趙舞激風肖霓些秦歌嫚回近懸瓔些室中百具無一不精些中天化居能及此清寧些魂兮歸徠不越故庭些哀志士辭奇俊之士無世不生特時人弗識之或識之而弗能用或用之而弗能盡其才所以聲光不流於當時事業不白於後世豫竊悲之庚寅之夏因覽元好問所録入之諸儒自辛願而下凡五人見其氣節剛方言論磊落實所謂奇俊之士者也雖其行事或未能無過終非齷齪陳腐懨不振者所可冀及萬一然恨其有志而不能遂也因掇其大略𨽻於各人之下又從而哀之以辭辛願敬之福昌人年二十五始知讀書音義有不通者搜訪百至必通而後已由是博極羣書且善於文辭尤以是非黑白自任每讀人詩必為探原委發凡例解絡脈審音節辨清濁權輕重片善不掩微纇必指如老吏斷獄文峻網密絲毛不相貸雖貽人怒罵不恤也性疏宕不修威儀貴人延客願麻衣草履足脛赤露坦然於其間劇談豪飲旁若無人家甚貧衆雛嗷嗷張口待哺素負髙氣又不能從俗俯仰其枯稿憔悴流離頓踣一假詩以鳴雖百沮之餘其耿耿自信者不少變元光初李獻能元好問在孟津願往見之獻能為設美饌願放策嘆曰平生飽食有數每見吾二弟必得嘉食明日道路中又當與老飢相抗去矣會有一日辛老子僵仆栁泉韓城之間以天地為棺槨日月為含檖狐狸亦可螻蟻亦可耳聞者悲之辭曰天生爾才胡不汝騁麻衣如墨下不掩脛下不掩脛不過寒我我食無所我生其可水豈無藻山豈無薇茍非我有我敢采之市魁屠伯彼豈無食我腹雖虛我腰肯折抱節而終我則奚憾烏鳶螻蟻上下何辨爾貧固甚爾守則多不義而富其如爾何李汾字長源平晉人曠達不羈好以奇節自許避亂入關關中無一人敢與相軒輊者元光末用薦書得從事史館從事職名謂之書寫特抄書小史耳汾素髙亢不肯屈世乃今以斗食故人以府史畜之殊不自聊館中諸人又多新進小生史家凡例或未能盡知就其所長有不滿汾一笑故刋修之際汾在傍則蓄縮慘沮握筆不能下汾正襟危坐誦左丘明司馬遷文數百言音吐甚洪暢誦畢顧四坐曰看秉筆諸人積不平乃以嫚罵官長訟于有司證左相半踰年不能決右丞師中遣東曹掾置酒和解之尋入關驅馬來京師日以馬價佐歡道逢怨家則畫地大數而去會恆山公武仙在鄧汾往説之署行尚書省講議官既而參知政事思烈與仙相異同懼汾言論遂害之汾孝友廉介過人者甚多寧寒餓而死終不作寒乞聲向人又善為詩清壯磊落有幽并豪俠慷慨之氣人以是稱焉辭曰奎星光光今何其昏大河東流遑恤無人金匱石室藏我册書豈伊羣兒所堪穢之我言弗信弗信從汝丘明雖鬼其文不死既不我嘉覆謂我僣我視我觚有淚如霰黃霧四塞黑白誰分彩鳳無華山貍有文悠悠蒼天曷其有常自古莫不然爾又何傷劉昻霄字景玄一字委房陵川人聰敏絶人或戲取市家日厯鱗雜米鹽者令讀之一過無脫遺者故其學無所不窺六經百氏外世譜官制與兵家成敗為最詳為人細瘦似不能勝衣好橫䇿兀坐掉頭吟諷幅巾褎袖談辭如雲四筵聳聽噤不得語遇其飲酒眼花耳熱後其鋒愈不可當不知去古談士為逺近餘子不論也嘗用門資敘調慶陽軍器庫使不就諸公方薦試宏辭未幾卒辭曰陋儒拘拘以簡為常目視環堵不知有四方狂瀾既倒誰復回之氣蓋一世獨爾能之上自黃虞下逮五季一隙必燭何有幽邃或觸其機談辭如雲誰非男子有舌無聲我豈誇多我豈鬬靡一物不知吾儒所恥獨立千古上遡寥絶爾身雖窮爾名豈滅雷淵字希顔别字季默渾源人崇慶二年進士授涇州録事不赴改東平府録事以勞績遙領東阿縣令東平河朔重兵處也驕將悍卒不可制淵出入軍中偃然不為屈不數月家有淵畫像雖大將亦不敢以書生遇之調徐州觀察判官召為荆王府文學兼記室參軍轉應奉翰林文字同知制誥兼史院編修官拜監察御史巡行河南搒掠贓吏風采凜凜蔡下一兵與權貴人有連時以藥毒民家牛馬以小直脅取之淵捕得數以前後罪杖殺之老幼聚觀交口稱快然亦坐是失官尋用宰相侯莘卿薦除太學博士再遷應奉終于翰林修撰纍官大中大夫先是正大間元兵突入倒回谷勢甚張平章苪公逆擊之突騎退走填壓谷溪中不可勝算諸將議不定釋之勿追淵請急殱之主兵者不能用後聞北兵狼狽而西馬多不暇入御始悔不用淵言淵學甚博文甚奇為人軀幹雄偉髯張口哆顔渥丹眼如望洋遇不平則疾惡之氣見於顔間或嚼齒大罵不休雖痛自摧折卒亦不能變也食兼三四人飲至數斗不亂生平慕孔融田疇陳元龍之為人雖其文章號一代不數人在淵仍為餘事耳淵之友髙廷玉李純甫亦以奇節自負人號之為三傑云辭曰爾心之徑爾氣之剛嫉惡如仇不問暴強將指出巡面冷如鐵霜簡所加邪蒿即折才豈止斯兵算又長眼見千里孰曰不明志不獲伸多士短氣其書徒存九原能起埃風四來式脂式韋有髯如戟妾婦之為我俗之昏誰復繼君茫茫九州敢謂無人雷琯字伯威坊州人志英邁博學能文以薦書從事史館調八作司使初并州李汾與琯同在館中以髙蹇得罪琯往送之信陵攜酒酬魏公子墳握手痛飲後去客陽夏以鞭擊酒壺作楚聲歌自言去國十年甲兵滿天地短衣匹馬來自西北將起楚漢間奇才劍客與遊而不可得當是時金已遷汴太河以東北盡山東西抵關輔大軍長驅徙少壯數萬人殺之居庸關外自黃河洛陽三門析津至丕之源雀鎮凡二千餘里潼關一帶西南邊山大小關隘亦一千餘里各分地界統以總帥夜則傳令坐守冬則燃草敲氷兼以關輔大飢秦民死者相枕藉琯皆悲之作商歌十章寫其情曰秦豫父母國也而一至此乎竟淚下不能食乃出奇䇿白宰相宰相不能聽琯去不知所之辭曰北風泱泱海水為竭俯窺神京不隔一髮舉鞭擊壺歌聲愈苦來自西北短衣匹馬我淚既盡以血繼之天門九重曾莫聞知孰秉國鈞我將自薦反謂我狂斥去如箭商顔有芝曄曄蕤蕤可以葆神可以樂飢長往不返誰甘幽深赤日在天廉明我心葉深道哀辭烏傷葉君深道字逢原沈確而有文生與豫友也死則哀之以辭綢山孤張華川瀦水動溶漾元精煦嫗育裔蟬聨為里望回鑾有疏挽漕有猷效忠亮君出其後丕纘遺緒宜炫熿胡為躔延決瘍潰疹閼難鬯長始知學優遊厭飫敢虛曠朝搜莫擲會其肯綮塧其骯業成韜畜如矢藏箙弓入韔室廬枵然有衣一襲履一量不隨遊塵上下鼓舞相頡頏嗟豫蹇􅀈感今思古徒慨慷辟諸豫章潔之百圍逢哲匠愧彼紛紜妄厠罍洗忝盆盎抽關啓鑰浸漬薰蒸豫􅀈相天胡難知木邪制土病腫脹呌呶輾轉晝夜變幻熱以瘡疾勢漸革魂氣隨風恣飛揚楔齒綴足鬠笄纋中禮是傍善人宜夀卒就黃壚永淪喪相此小夫露牙揚已學豪放手足胡越豈知五倫為世障胡不顛厥反使亂真日趍妄嗚呼噫嘻君今逰矣豫焉仗制服緦麻存慕音容哭相向玄雲漫漫涼風瀟瀟吹繐帳我詞之哀君知不知倍悲愴蔣季髙哀辭至正丁酉秋七月壬午濓畏暑被髮行青松間或有客自東陽來曰蔣季髙氏殁矣濓聞已哭之哀哭已進客問狀客曰前月戊辰季髙以事如縣中己巳即有滯下之疾晝夜之行餘百久之熱發體中如火其兄伯康懼亟呼翳視之翳至脈已絶矣自已已至今月甲戌僅六日而遽至于亡濓聞已復哭之哀乃尤天曰嗚呼悲乎不知何繇而夭吾季髙乎使季髙其行負天地愧神明夭之可也季髙恂恂儒者非其道弗言也非其道弗為也言其事親則孝而恭處伯仲則穆而和交朋友則信而貞遇族姻則惇而莊接閭黨則惠而慈求其致夭之繇無有也今季髙何為乃遘爾乎豈髙髙在上果不可必乎抑其視夢夢不能别善惡乎所謂天道常與善人其尚足徴乎嗚呼悲乎初濓年二十餘頗嗜學聞文懿許公弟子三衢方先生以性理學講授東陽之南深徒步往從之遊先生所主蓋蔣君子晦家子晦季髙父也濓因獲交季髙父子聞時季髙尚未冠即能執經問難進退雍容肌肉若玉雪可愛嵗幾何既哭其父今又哭季髙焉則夫人世如傳舍者可不信乎嗚呼悲乎季髙篤意于學方先生既殁復笈師事侍講黃公會濓亦執灑掃之役于公門與季髙交益密季髙日出所為文皆雅馴可傳誦濓甚敬之每一會繡湖上輒握手吐肺肝間酒酣氣豪競出慷慨背俗語季髙喜益與濓親季髙善辨説衮衮數千言不休濓不能屈每務力皆勝之于是各大笑而止之且曰良會不可數一嘻笑一怒罵皆别後之相思當時出此言亦以為常豈知别後之相思者乃為死後之相哀乎心雖如鐵石其不為季髙一酸辛乎嗚呼悲乎去年之春季髙有書來曰東西二峴山無君足迹十年矣縱不為吾行其可貽山靈之所笑乎濓方閉户著書跬步弗妄出不及如季髙言濓所居實浦汭青蘿山山中林樾蒼潤孤猿野鶴見人了無驚猜意而梅花泉又極可飲濓自念雖不能為季髙往季髙清俊士折簡招之或可一來當共飲水哦詩或投壺白雲間亦一樂也豈知季髙遽棄濓而長逝乎峴山之蒼翠固在眼寧不對之墮淚如襄陽乎雖欲重登顧後瞻前而季髙不見又寧不為之感慨乎嗚呼悲乎季髙之太夫人年踰八十母夫人髮亦種種而三子方纍纍在疚長者僅七齡幼者尚居乳哺中惸然可念季髙之死兩目能遽暝乎嗚呼悲乎季髙已矣濓將托季髙羣行為書以信後世適有故未及為姑撰哀辭一通焚之于墓以寫中心之悲季髙其能有知乎抑無知乎岱嶽可移瀛海可填濓之哀吾季髙者尚何時而已乎嗚呼悲乎嗚呼悲乎季髙諱久叔季髙其字也卒時年二十九云辭曰有木蕤蕤兮嗚呼將鬯其施兮嗚呼霜雪何為兮嗚呼竟從而折之兮嗚呼天者不可知兮嗚呼千載之悲兮嗚呼郭淵哀辭郭淵字濟川六人唐汾陽王子儀裔也宋季羣盜起淵聚族共保若一障曰蔡堡六人依焉天下已定民為占藉吏撓之民見縣有為丞相客者無敢呵相教為丞相奴淵謂民民賤生民也奴重人奴也使世世為人奴與王民孰愈民愧而止後樹吏吏務休息民而奴客困皆來謝曰微君幾不免大德末淮大飢淵作饘粥食之生者甚衆是時人多鬻子自救淵取困甚者假子飬之十餘年皆為娶婦居數歲大穰一朝縱之曰若事吾良苦及時歸毋久留為也皆涕泣曰公生我今驅我安之願留終公身淵曰毋悲後吾子孫不省將以汝為奴卒縱之有人貰酒飲西家者已醉而出遺所齎金于門淵適見藏弆俟之明日遺金人從西求金西家誠不知怒以為欺求之急西家怒益閉其人困即欲自剄方爭淵聞之遽出呼其人與之所遺金人皆驚始保蔡堡羣少年共劫一人將殺之淵呵曰此何罪至殺羣少年曰此疑狙伺為諜而將襲我故殺之耳曰吾所為相保以生誠惡死也今疑而殺人禍將及羣少年怒淵私計奪之力且追殺之乃曰吾代之贖何如羣少年喜遂免之後至升升市中有戴粔籹盤鬻于市者遇淵置戴盤叩頭泣曰今日遇公天也幸臨過我我有母皆願見公謝淵固辭假以為誤去之市上老人嘆曰世稱長者此真是耶初六界北邉民習兵少文淵與父諗以詩書俎豆為業人慕之多化者至今六多儒淵既卒其孫言抱李光孝所造墓文請濓哀以辭濓未及為言客死豫章可悲也已始言與濓遊語及當世輒暝目嚼齒語皆驚人聽者掩耳避去及操筆綴辭則海蜃吐樓而芝輿翠輦隱見空濛間可怖愕言誠竒男子濓故刪孝光文為辭哀淵且附見言事以見可哀不特淵也辭曰有開其先熙以申有紹其後文以彬何遏其施祿以屯王季楚哀辭王仲淮季楚越人也其父艮嘗檢校江浙行中書政成謁選京師時季楚年方二十餘請從行既至有多季楚才者薦其名遼陽行中書授季楚大寧路儒學正未幾以病卒檢校君哭之甚哀既請國子監丞陳公撰銘揭墓上復謂其甥方泗曰豫深哀仲淮既不能夀而又客死其二子基始八嵗孰始一嵗傫然也仲淮有知其能瞑目乎聞汝交友多能文盍求辭以哀仲淮且慰我泗來為濓言濓竊悲之初濓見季楚于泗家眉目秀整每言輒牽引史傳幾若貫通者濓方意其必進用于時今若是世之人欲以智力相雄長而不知止者果何如耶辭曰冥冥玄化孰尸其權胡豫其才而不豫其年嗚呼陳子章哀辭嗚呼吾子章竟止於斯邪始豫遊學諸暨之白湖而子章實來豫因獲與子章交當是時四方來者類多紈綺之子喜眩文繡以自媚人爭悅趨之獨豫之貧短衣才能至骭冷處前廡下四壁瀟然誰復見顧者惟子章與豫燈影相望而讀書之聲相接也豫時學未聞道心頗不能平子章嘗慷慨厲豫曰子量隘矣是焉足以汙子哉子章好使氣人稍加昵白眼視之至其去乃已豫因用子章厲豫者厲之子章矍然謝曰是善教我子章自是與豫居至歡也豫既還金華子章亦去越二年豫再見子章於烏傷更相勞苦子章握手顧豫曰子之貧尚爾邪子但力學天殆不能貧子也豫觀子章貌加壯其厲豫一如諸暨時未幾豫復西還金華又二年豫束書寓浦陽子章聞之喜以書來曰豫昔在諸暨與子居僅四月而别在烏傷未十日而别今子來浦陽浦陽豫父母邦也豫家距子之所寓不百里庶幾與子少相羊乎豫亦喜當與子章時相見也又三年子章未嘗一來豫竊怪之因詢子章所常往來者具道子章病咯血氣厭厭不振豫謂是疾勢雖迫人得良醫可己未始為吾子章憂又四年子章竟死嗚呼吾子章竟止於斯邪豫之交友固多矣如子章者寧幾人哉積二十年之久僅能再見之蓋以子章春秋始壯豫雖少長亦不過二三年其與子章遊未晚也豈知子章遽先豫而棄去乎豫蚤知子章若是又敢憂百里之逺不與子章周旋乎子章已矣孰能相豫之善孰能指豫之疵哉豫雖欲不哀子章不可得已因從而著其辭子章諱璋姓陳氏子章字也浦陽人辭曰已乎子章天賦爾材而鍾爾精宜乎輝赫其聲光振拔其華英不秩登於百石亦名薦於九卿奈之何單襦短褐不知圭組之貴藜羮糗飯莫沾鼎餗之榮雖足勩乎敝屣神憊乎篝燈竟不少用而遂潛輝韜迹於泉扄則吾子章何如勿生已乎子章白楊萋萋宿草莽莽悲泉咽而不流寒雲鬱而不聚以吾子章之才之淑而遽下制於一壞之土寧不使豫撫遺文而增慨想音容而惻楚也耶嗚呼唏矣哭張教授父子辭濂同縣張公繼祖力學而尚志操少讀魯仲連傳見其排難解紛歎曰士當如是而已大德中縣有桀黠吏挾重辟害民民愜怯莫敢觸其鋒公直之部使者時吏方抱案在庭公面疏其姦卒置于法延祐間郡上公才行署雙溪書院山長考第成遂調瀏陽州學教授公為復侵疆稽其步畝刻石學宫會守二闕太府檄公攝州事時歲荐䘲道殣相枕藉方下令勸分公為設方略使持劵者左入受粟者右出竟事帖帖無譁居二年以大父喪棄官歸卒其子道生力學如其父屢應進士舉不利困頓殊甚適余觀以監察御史行部浙東觀同舍生也召見相勞苦薦為武夷書院山長未幾亦卒初濂年幼時見公公即相器重與為賓主禮俾同道生師事城南聞人先生逮今粗知學而不陷於小人之域者皆公賜也濂既往哭公曾未幾何又哭道生焉雖石人猶當墮淚近抱疚袵席間中夜尤念公父子不能置起篝火濡毫申之以辭辭曰番番良士僅以教施才不盡展人期有兒兒今死矣吁其悲哭王架閣辭有序王君柳字德潤濟寧金鄉人祖仁義烏丞父端溧水州稅務大使母劉氏君少警敏人物又魁傑嘗掀髯自吒曰王柳不尋功名功名當自來逼王柳爾豈有錐在布囊而末不見者耶遂學治經試進士不中即棄去攻法家書為衢處二府吏尋補書吏浙東廉訪使者府遷浙西名上江南行御史臺辟察院書吏已而貢入中臺察院出調浙西道肅政廉訪司照磨兼承發架閣禆贊憲政人器其材因會酒言忤御史銜之以事中君下符逮就吏君坐樓上歎曰男子頭可斫膝不可屈死則死肯與獄吏對乎遂拔刃自剄左右急救君已仆地血滂然流君妻劉及子僧僧忍泣具棺斂載入金華即城北五里藏焉蓋君自幼寓金華又以女妻縣人江演兵起山東道絶不能歸故君喪來葬而妻子皆來依江初余入郡從聞人先生學君同日至與之語又知同庚戌生人相歡也晝摩切經藝晚則捉手同遊衍或縱談大噱幘墮地弗顧或聨詩才脫口即促繼之遲則罰昏鼓動鼕鼕始歸日以為常一旦去為吏余遂不以書記通有自浙水西至者出君手書相勞苦且曰吾薦子於方嶽大臣行授子校官矣子能為我一出乎余以書謝復固辭居亡何聞君死矣余之辭君者非託此以為名髙竊自念貧賤士何往不自得吾固不忘故人余足一動人必病余以為挾且私是以弗能往視君俟君他日歸休御欵段馬候君青霞白水間未晚也嗚呼孰知君之遽去余而死矣乎使知君之遽死也縱百千其人以為私以為挾朝夕迭提余耳而噪之余尚何恤必能謁君虎林之上矣今復何言哉今復何言哉君既不可見乃絮酒裹雞走哭君之墓僧僧知余至哭迎于途傫然也余心益百折不自勝造為哀辭一通以泄余情雖然余情其得而盡泄乎君卒時年四十七至正甲申九月十二日云辭曰犧尊青黃嘉禾之災樗大蔽牛不以為材使君非材行已昧昧過者弗睨孰得而害君既材矣人誰舍旃髙位疾顛理之必然氓之蚩蚩匪材曷治君仕則當不仕無義孰不顯融君門而凶豈仕之尤秪繫其逢所逢者時固有通塞亦命使之君復何惑物忌大剛不缺則刓自君取之命復何云君若居柔觸物惟忍非惟保名身何能殞從古有言柔則詭隨縱生千齡非君所宜君死雖亟君膝不屈君氣凛然千古莫奪人孰不死君死則寧尚可謂君鴻毛之輕君何用哀我哀有以天方夀君君則自死我茍無罪誰敢死余一朝之忿惜不爾思妻子煢煢東西顛沛君在九泉亦將自悔我則深悲豈直悲君悲法之隳法既隳矣君宜長逝彼豸斯冠天亦不畏悲海東辭王山鄭先生原善字復初延祐名進士起家德興丞轉處州録事有異政為衆所忌遭誣搆去官尋以疾卒臨川危君太朴病執法者不得其平為著悲海東辭濂亦繼作時元統癸酉冬十月丁亥也我悲海東我涕拭矣善人云瘁邦其棘矣倬彼昊天冒此下民彰善疸惡胡莫之懲冥冥其晝不見出日飄飄雨風墮我家室家室墮止邦國危止豈遽危之遂將自邇大君維河冢宰維舟卿士維楫蒸庶維徒上下相力厥載孔速茍不是念不膠則覆維彼哲人化為螟螣維彼愚人猶如鬼蜮鬼蜮戢戢巧為我賊螟螣僥僥蝕我黍苗我民我牧唯恐傷只彼豺伊兕敢為民痏既啜其肓復醢其髓我置我法孰云能已淑爾君子繡衣孔揚有瑲蔥珩有節斯煌不我能朂覆謂我爽詈我縶我絶不畏明訾彼鸞凰見藻是食有振者麟邪蒿為室式紛式錯動罔不忒嗚呼昊天曷其有極甡甡其鹿乃索之江中林喬喬乃求其魴顛倒眩瞀以逞無良嗚呼昊天曷其有常無然惛亂無然慆淫無然回遹以虹我心爾之悖矣民胥害矣爾之迪矣民相懌矣勿曰丘陵崇不可夷勿曰淵氷堅不可摧忽為平陸忽若流澌誰與爾謀曾不爾思謂爾醉止黝然無知爾不用酒何德之違謂爾蠱止上下卒迷日用飲食不愆厥初其止蘧蘧其行踽踽其慘呿呿其威虺虺我淚既竭繼之以血百海其深莫喻我心我生不辰伊誰之云無越我墻我垣我藩無菜我田我田我麋天命有定我將我怨爾無人怨我爾用歆乃塤乃篪乃琴乃瑟乃磬乃笙以樂其音以樂其音實獲我心峩峩墮山山則有樗彼漼者淵淵則有魚匪今獨然振古如兹我茍不樂不樂奚為廣漢難辭難古禮也周人三時皆行之春冬之季難難陰氣也仲秋之月難難陽氣也蓋二氣或佚厲將乘之為災故難以止焉其制命方相氏帥百𨽻索室區疫以逐之又磔牲以禳四方之神漢襲周制而其儀加詳選中黃門子弟百二十人為倀子赤幘皂制執鼗方相黃金四目蒙熊皮玄衣朱裳執戈揚盾十二獸有衣毛骨中黃門行之冗從㒒射將之以逐惡鬼於禁中夜漏上水朝臣會侍中尚書御史謁者虎賁羽林郎將執事皆赤幘陛衛乘輿御前殿黃門令奏曰侲子請備逐疫於是中黃門倡侲子和其辭凡八十言繼作方相與十二獸儛歡呼遍前後省者三持炬火送疫出端門門外騎士以次傳火棄雒水中自漢至今朝廷之難雖廢而民間猶有存者先臘一日巷萌社𨽻飾鬼神貌御五色龍虎文衣巡門擊鼓而難之豫惡其言鄙褻因疏古者用難之意復廣漢辭使習焉其辭曰陽陰乘化左右而行日厯昴畢得積尸大陵其氣勃芒更涉虛危墳墓西司鬼官攸房厲附強陰而降于釁殃咨爾十二神宣其威良焱突劒亢胇胃食虎甲作食􅓇雄伯食魅騰簡食不祥攪諸食咎伯奇食夢祖明強梁共食磔死寄生委隨食觀錯斷食巨刳其腎腸窮奇騰根同享於蠱毋使害傷咨爾十二神煆爾戎兵出􅛍四方吮厲之􅎺以代酒漿解厲之肌以充糗糧絲厲之腱織以為衣裳斥除慝陰暢回明陽乾坤載清物楙民卬惟爾神之功神或不蘉上帝是明急急如律令補雩壇祝舞歌辭周官有司巫掌羣巫之政令若國大旱則帥巫而舞雩漢法夏不雨祀竈毋舉土功更火浚井暴金于壇杵臼于術為四通之壇於邑南門外方七尺植赤繒七其神蚩尤祭之赤雄雞七玄酒具清酒搏脯祝齋三日服赤衣拜跪陳祝辭以丙丁日為赤火龍一長七丈又為小龍六長三丈於南方皆南向壯者七人皆齋三日服赤衣而舞之司空嗇夫亦齊三日服赤衣而立之鑿社而通之閭外之溝取五蝦蟇錯置社之中池方七尺深一尺酒脯祭齋衣赤陳祝如初取三嵗雄雞猳豬燔之四通神宇令民闔里南門開里北門幸得雨報以豚一酒鹽黍財足以茅為席然周制久廢典午以降漢法亦不行而祝辭尤闕歲丙申夏旱羣巫雩于山川之神豫既書其事授之復補其詞使巫歌舞焉於泰鴻冒下民動以化時屈伸煜朱鳥萬物甄亢則害陽畢屯土膏耗蓊欲痻田畯奔勢維礥壇四通僾明神神中臨勃如煙鬯嘉錫燦若羅繭握薦豕炳膋蕭灌鬱金掬芳赫氣上延合溟漻洞五精貫八幖茫無外莽翛翛門沆碭駕以猋俯下土無不釗鬱行風羽輪翔玄黃變慘復爽衆嫭集亢景章僾然存索之亡爍陰明回叢陽符翹襟逝弗忘崇明禋成穡功憑紺筵嚴以卬應上公與天通植赤繒驂紅龍左列缺右豐隆流火降巨若鴻鬼婦劉散為風灑靈注遍四封函斯活頴茸茸衆維魚兆已從融祉暉育宵氓甫田阜物豫成風平平綽以行人敷與鬼肹蠁耿曜振霈充盈神心暢樂茫良四宇綏萬國洋洽大康慶昭膺楊刺史廟迎享送神歌辭浦陽雞冠山上有古神祠相傳祠漢交州刺史楊侯侯縣人也名扶字聖儀纍官皆有惠政侯歿已千載民以雨暘禱輒應是侯之神在天猶不棄於吾民也吾民其可忘於侯乎濂雖不敏為撰迎享送神之辭俾邦人歲時歌以祀侯其辭曰紛溶溶眺天門白霓出雜雲敦翩我靈整修駕車登登般裔裔翩我靈降潛場回飈興與之鴹翩我靈變陽陰奔以放光淫淫翩我靈繽如牆神鬼衛鳥翼張紛溶溶一神筵啓混朱黃愈以康恍芒芒奄靈車奠芳酎爵行千流若雨奄靈車蕙為有饗且飫以舞歌奄靈車靈已醉廣宣延無不備奄靈車樂無極神山髙髙可測神筵啓二氛翼翼欲上升指青雲化為文靈之旋疾如風從西虎導東龍神之旋髯長逝凌紫青瑶光下靈之旋兆逢惕景已滅猶放􅜜靈之旋錫我祐沛若雲雨下土氛翼翼三題辭菊坡新卷題辭當塗陶君用髙蓋出於晉徵士元亮之裔凡宦轍所臨必效前人種菊花滿坡當萬木搖落時花始秀拔低昂枝上若赤金所鑄錢頗可玩用髙公退之餘酌酒與花對恍然如在柴桑籬落間殆忘其章綬之榮案牘之煩也或者疑之曰仕者樂乎朝市故馳而弗息隱者慕於山林故往而不返有若水之與火未易合也昔者元亮遭時孔艱不能為五斗米折腰向鄉里小兒因有托於菊而逃焉耳今用髙則不然生逢今有道之朝亦既由憲史檢校中書而主畫於秋官矣衆咸以致君澤民期之用髙則留情於菊若將與世相違者無乃不可乎嗚呼是何言歟是何言歟觀人之道不于其迹而于其心迹固朝市也而心則不忘乎山林謂之吏而隱可也迹或滯乎山林之中而其心則豔華趨榮無一息之不思市朝茍謂之為隱孰能信之況君子之出處可仕則仕可隱則隱初何容智力於其間哉設使元亮當今之時將不能不仕而用髙生於元亮之世似亦不得不隱也世之人學元亮者多矣皆在乎去位之後用髙則見於在官之時此蓋魯男子之善學栁下惠者也用髙誠賢乎哉豫固不敢以用髙方之元亮也以其志之或同而他人未必能知也聊相與一言之并作采菊之辭以遺用髙曰我采我菊露其和矣今我不樂鬢其皤矣鬢其皤矣吾行歌矣我菊我采露其晞止今我不樂白日馳止白日馳止吾顔衰止歌罷用髙攬衣而起曰贈豫言者盈三帙矣子頗能知豫之志曷為書于新卷之端俾詩家者流繼之他日約子於三徑間俯仰西風歌此辭而餐落英顧不美歟豫不敢固辭用髙通儒術為人仁厚士林中多稱之云羅鄂州小集題辭有倬羅公家于歙邦幼名曰願冠字為端良其父吏部內外踐敡春秋之學與胡氏抗衡生子凡六皆能辭章公居其五尤赫赫有芒既收世科厯仕縣州出刺武昌皂蓋朱幡績用翕以張夫自五季以來文氣日卑宋室龍興篤生哲師汶陽浚其源二尹導之元城倡於前范張和之逮于廬陵日粹以夷臨川南豐眉山父子同焰而聯輝清寧協順功用發揮精氣充斥暢達蕤綏變化合神而光景弗虧奈何王轍既南涉于偏頗衰俗羣趨以事決科浮聲切響駢言儷辭襲謬而踵訛公挺其間弗徇弗阿濯其孽痾障其頽波謂六經之作如日行天不可以軋摩唯秦暨漢是則是效接其遐軌而視法在軻然而畜之不𢎞則動之弗振涵志今古潛神典墳玩陰陽之交察海嶽之文核治亂之變通典禮之津以至稗官虞初旁行敷落鳥獸蟲魚之倫凡可以資博識者咸區别而彚分力思精索從莫達晨玄功以凝將通乎鬼神故其形諸篇翰鑰啓繭抽髙雅精鍊莫之與逑喬嶽嶢然上凌太清而陋夫土丘戴冕執圭屹若山立而異於卉裘棠溪之金美則為鏐干將之鐵百煆始遒視彼蝕鍮腐鉛敻乎不侔考亭朱子取法魯騶發人瑕類一髮必讐獨推公文而弗舍者以協理之微幽嗚呼公既逝矣遺文四行唯於東南粲如列星遭時不平遂壞於兵其諸孫宣明賢而有徵懼懸黎之鏟彩結緑之沈英復鍥於梓以震其聲以開其冥以鍧於衆聽濂也不敏幼誦公文蒼白無成搏朽壤以代磶不壓亦傾揉敗檿以為弧莫使之綳其瞻公之製作猶應龍之降升區區贊述何繫重輕姑序其作者之意於首簡使後生小豫知豪傑之士不為衰俗所囿而雄渾之作或當與秦漢并文憲集卷二十九
