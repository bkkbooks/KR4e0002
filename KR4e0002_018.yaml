body:
  text: 文憲集卷十八明宋濓撰神道碑凡七章大明追崇楊王神道碑銘皇帝躬膺大寶式展孝思既追崇祖宗四代帝號建立太廟復念皇太后之所自出追封外王父為楊王外王母為楊王夫人建祠于太廟之東嵗時遣重臣致祭近有來自淮隂者言王墓在旴眙如故上聞之悲喜交集即詔內臣及圓丘署令往祭而修治之置灑掃之户凡三護視塋域且命詞臣撰文以樹諸神道臣濓伏讀御製王之行若曰王姓陳氏世為維揚人不知其諱當宋之季名𨽻尺籍伍符中從大將張世傑扈從祥興帝駐南海至元己卯春世傑與元兵戰師大潰士卒多溺死王舟亦為風所破幸脫死達岸與一二同行者纍石支破釡煮遺糧以療飢已而糧絶計無所出同行者曰我等自分必死聞髑髏山有死馬共烹食之縱死亦得為飽鬼不識可乎王未及行疲極輒晝睡夢一白衣人來謂王曰汝慎勿食馬肉今夜有舟來共載也王以為偶然未之深信俄又夢如初至夜將半夢中髣佛聞櫓聲有衣紫衣者以杖觸王之胯曰舟至矣奈何不起乎王驚寤忽身在舟中見舊所事統領官時統領已降于元將元將畏舟壓凡有來附者擲棄水中統領憐王亟載皇板下日取乾餱從板隙投之王掬以食度王之渴乃與王約以足撼板王即張口向隙受漿居數日事將泄皆倣徨不自安忽颶風吹舟盤旋如轉輪久不能進元將大恐遍求於禜祈者不可得統領知王能巫禱遂白而出之王仰天叩齒若指麾鬼神狀風濤頓息元將喜乃飲食之至通州賚王數巨魚送之登岸王歸維揚不樂為軍伍避去盱眙津里鎮擇地而居以巫術行王無子生二女長適季氏次即皇太后晚以季氏長子為後年九十九嵗而薨遂葬焉今墓是已臣濓聞之君子之制行能感於人固難而能通於神明為尤難今王當患難危急之時神假夢寐掖之以升舟非其􅀈誠上通於天何以致神人之祐而至於斯也王之羣行其詳雖若不可知舉此而推之則其積德之深厚斷可信矣是宜慶鍾聖女誕育皇上以啓大明億萬年無疆之基於呼盛哉昔日史臣贊堯之德首以親九族為言其效至於黎民於變時雍之盛然九族之中母族居其三皇上以念母之故思王不能忘封以王爵享以祠廟今又樹碑墓道以紀其異行是皆以孝治天下也將見四方嚮風咸知以孝自勉皥皥熙熙臻夫隆平之治不難矣臣濓既序其事復再拜稽首而獻銘曰皇帝建極允展孝思疏封母族自親而推錫爵維揚地邇帝畿立廟崇祀玄冕衮衣痛念宅兆卜之何墟閭師來告今在旴眙皇情悅豫繼以涕洟即詔禮官汝往葺治毋俾蕘豎跳踉以嬉惟我楊王昔𨽻戎麾獰風蕩海糧絶阻飢天有顯相夢來紫衣掖以登舟神力所持易死為生壽躋期頥積纍深長未究厥施乃育聖女茂衍皇支蘿圖肇開鴻祚峩巍日照月臨風行霆馳自流徂源功亦有歸無德弗酬典禮可稽聿昭化原扶植政基以廣孝治以惇民彛津里之鎮王靈所依於昭萬年視此銘詩大明故王府參軍追封縉雲郡伯胡公神道碑銘上天既革元命皇帝定鼎金陵遣大將下浙河東諸郡而婺衢處三州相繼平時當草昧之初上思得智勇之才用之於是處之胡公仲淵躍然而起以自赴功名之會入陪廟算出鎮鄉邦言聽計從寵遇無比浙東之俊彥攀龍鱗而附鳯翼者皆自公始若公者可謂犖卓不羣之士矣公諱深仲淵其字也系出漢安定宋初有諱棟者自潤之丹陽遷處之龍泉因家焉棟生璠璠生文虎文虎生竦竦生晟晟生滂滂生衢州録事參軍松年松年生鄉貢進士應辰應辰生溫州樂清令㻑㻑生江南西路兵馬都監見大則公之曽大父也大父諱堂父諱鈺仕元為征東行中書省左右司貟外郎母趙氏生三子公其長也次曰潭曰海繼母季氏生一子曰溥員外府君蚤嵗宦逰京師公始十齡而大母季夫人與母夫人相繼亡公侍大父奉繼母撫幼弟艱難刻厲以自植立未弱冠走京師侍府君適府君使高麗復往候焉居久之府君棄捐館舍公崎嶇萬里奉柩南還舟行一日泊大崖下夜夢人語之曰此崕且崩宜急避驚覺趣移舟俄傾大風雨至崕果崩聲如萬雷既歸葬於縣北之圍源遂廬於墓左悉取諸子百氏天官地志兵謀術數醫藥卜筮老釋之書而研究之發為文辭操筆可立就當元之季江淮俶擾蔓延閩浙間盜由建之浦城松溪入龍泉公嘆曰浙水東地氣白矣禍將及乃集鄉兵結寨于湖山已而處州之民相聚為盜江浙行中書省調萬户舒穆嚕宜孫戍處州辟公參謀軍事檄所𨽻諸縣募壯士為軍浹日間得數千公引之屯竹口下令賊中曰爾皆良民也因驅迫故為亂棄仗即仍良民矣賊以公長者其言不欺盡毁旗械肉袒請降溫州戍卒韓虎陳安國殺主帥據城叛行省命宣慰使恩寧普公討之道由處州與公語意合帥府軍事復辟公參謀之公曰溫城叛者唯一二人耳若破其城玉石必俱焚如平民何遣辨士入城説其黨曰韓虎悖逆亂常今王師四集旦夕且攻城雖金湯無不破者若輩胡為與賊守自取作虀粉耶將軍未忍即加兵茍能去逆效順悉從原宥或稔惡不悛城一破悔無及已其黨相向泣曰吾屬自度旦暮鬼耳儻獲復生敢不唯命乃殺韓虎等以城降溫城瀕海民以漁為業時城閉者三月民病甚公請發粟賑之歡呼之聲載于道路宣慰欲列公功聞于朝公辭既而宣慰以行省參政總兵征鄱陽復邀公俱行戎務無巨細悉屬之青田潘惟賢聚衆為叛龍泉長吏聞風遁去賊遂焚縣治公之師曰王毅先生與門子弟集義兵搗退之里中惡少年疾其功因害先生公在鄱陽馳而歸執害先生者盡殱之縉雲之黃村松陽之白巖遂昌之大社麗水之浮雲泉溪無賴之氓咸為盜根勢蟠結不可禦行省丞相康里公承制以石抹公為行樞密院判官分院鎮處州既至假公分院行軍都事統兵討麗水攻泉溪賊寨拔之未幾又平浮雲白巖賊懼遂來降縉雲盜亦就平乃移師攻遂昌賊帥周天覺方友元傾其精鋭出迎敵公望見笑曰賊若堅守不出未易即殄滅今兹之來豈非天授我乎分部諸校以正陳接戰以竒兵夾擊之别遣逰軍入山搜其伏匿比戰賊三面受擊輒大敗斬首數千級生擒八百人獲方友元梟之乘勝直攻大社周天覺降復移兵討青田賊黨金德安殺潘惟賢兄弟以降先是國兵取浙東婺衢既下獨處州為舒穆嚕公守不降嵗己亥今上皇帝遣僉樞密院事胡公大海由間道取處州舒穆嚕公出戰敗北大軍入城而分兵取屬邑未附者公時以假元帥統龍泉慶元松陽遂昌四縣兵欲閉關為拒守計四縣士民咸請于公願內附以全民命且曰君治兵殆十年勤勞亦至矣而朝廷無一命之錫國家負君君何負於國哉公知時事已去乃解甲出見胡公四縣因不受兵上素聞公名召至南京待以殊禮居亡何擢中書左司員外郎上日與公論天下事公有言未嘗不稱善也遂詔公還處州招集舊所部將校兵卒以從征西上既平江西命公以親軍指揮守吉安會浙東苗軍為變婺守將既被害而處城亦為所據上遣公復處州比至城已復除公浙東行省左右司郎中總制處州軍民事郛郭甫被兵民物凋瘵而山寇乘間竊發人情未固公隨方招捕凡首惡即誅之然猶慮戍兵之寡日募之獲勝卒萬餘人諗于衆曰兵少不足禦敵師衆又無以食之奈何衆皆曰飬兵所以衛民茍不為禦備計子女玉帛且不保况於食乎公乃因民之産以權宜增賦之沿海軍素驕橫及是以復城有功橫益甚公擇其尤無良者斬之衆乃讋服江西食東浙鹽而有司十分稅一販者鮮至公請以二十分收一商賈遂通城南枕大溪浮橋之廢已久橋隄當水之衝亦為所齧蝕幾盡公即上流比舟為梁以濟行者州學敝壞講舍僅存用以貯官粟公撤而新之薦新進士吳世昌為郡文學以司教事城中民廬多為戎士所據混淆而處公度間曠之地建營屋數十區使别居之縉雲官田其稅額甚重執里役者恆以私粟代償公以新沒人之田實其數其害乃除諸暨守將謝再興叛兵犯東陽平章李公文忠擊走之公引兵為援建議以為諸暨浙東藩障若諸暨不守則衢處不支矣乃度地去諸暨六十里並五指巖新築一城不旬日而成樓櫓濠柵靡不畢備上聞諸暨叛遣使來議别為城守計暨至城已完上嘆賞不已其後浙西將李伯貞大舉入寇兵號二十萬頓城下城堅不可攻敗績而去上念公立城功以名馬賜之青田之蘆茨地接閩徼人素獷悍葉仲賢恃其險屢服屢叛乘我師在外復來寇公怒還軍深入禽其渠魁少壯者皆籍為兵二十年逋誅之盜一旦就平溫州方明善攻我平陽公出偏師復之并復瑞安所侵地而親統正軍攻溫州明善勢蹙與其仲父國珍議納嵗幣詔公還師明善繼以鹽若干來進貢上命處州易銀以入內藏上怒銀色惡責守令使償公曰此吾過也守令祿薄何能償乃售龍泉田以銀九百兩代輸公尋入覲上欲留公且柄用之以邉事未輯願還守外上時已即王位乃擢王府參軍仍總制處州等翼陛辭上喻之曰俟閩浙盡平當還汝中書矣福建陳有定擾邉公奉命征之遂取建之浦城而崇安建陽二縣亦下上賜以所乘駿馬建之守將阮德柔兵四萬屯錦江實出我師後公還兵擊之破其塞柵有定大懼帥鋭卒亟圍我營公突陳與決戰馬蹶因被執有定既得公頗禮遇之公具道天子仁聖四海歸心羣雄樂為之用且援竇融歸漢故事撼之有定初無殺公意會元使至督迫之遂遇害于福州實嵗乙巳之春也亨年五十有二上痛悼不已命使者即其家祭之復詔中書議加恤典追封縉雲郡伯有爵而無階官職勳者有司之制未備也公天資頴拔智識絶倫藝術弗學則已學之則無不精性倜儻好施豫賢士有貧乏傾槖以周之弗吝也其守鄉郡凡五載馭衆一以寬厚用兵十餘年未嘗妄戮一人恩惠在人甚多故其歿也聞者莫不流涕鄉人為立祠宇祀之公元配同里項氏先五年卒生二子長曰楨宣武將軍僉處州衛指揮使司事次曰樞女一人適章存厚繼室滁陽楊氏前中書左司郎中元杲女弟也公既沒之二年楨等乃刻木為象具衣冠以葬實祔于圍源之左葬已來徴濓為之文昔濓侍上於白虎殿忽顧問曰胡深何如人濓對曰文武才也上曰誠如卿言浙東一障朕方賴之則上所以倚公者至矣然公亦知上恩眷之深而無以圖報嘗謂人曰區區承詔鎮處城賴皇靈覆育幸已寧謐誓將挈全閩之地以入版圖庶展犬馬之微衷也奈何功業未就而死及之其非命也夫濓辱公交者五六春秋見公酒酣耳熱指揮三軍而雄姿奮揚不可遏及與縉紳之流論文評詩則欿然布衣書生也濓未嘗不服其勇而愛其謙今公不可作矣敢用備著公之事揭諸墓門以告世之知公者銘曰洸洸胡公萬人之英一劒橫空莫之敢攖浙河之東地氣盡白此為兵徴見於龜莢爾衆荷戈來入我堡置爾枕席拔爾水火公師如風鼠寇如雲一鼓之餘散為埃塵節鉞出鎮涉厯五年桴鼓不驚雞犬晏然誰登叛人陷我諸暨公遷其城寇至輒敗皇用嘉錫使車絡繹天間龍馬於公弗惜公感主知酣歌慨慷誓提八閩以歸職方旄鉞所屆勢如破竹天未厭亂三軍夜哭公材孔多公志弗阿月出如赭公命奈何丈夫之澤流于異方孰能行之父母之邦匪公之臨十里枯胔公雖止斯庶亦無愧廟堂有嚴肖像其中精靈翕然上與天通栝蒼之山其翠欲滳公名配之有永無斁大明故中順大夫禮部侍郎曽公神道碑有序治古之時非惟道德純一而政教修明至於文學之彥亦精贍宏博足以為經濟之用蓋自童丱之始十四經之文畫以嵗月期於默記又推之於遷固范曄諸書豈直覽之其默記亦如經基本既正而後遍觀厯代之史察其得失稽其異同會其綱紀知識益且至矣而又參於秦漢以來之子書古今撰定之集録探幽索微使無遁情於是道德性命之奧以至天文地理禮樂兵刑封建郊祀職官選舉學校財用貢賦户口征役之屬無所不詣其極或廟堂之上有所建議必旁引曲證以白其疑不翅指諸掌之易也自貢舉法行學者知以摘經擬題為志其所最切者唯四子一經之箋是鑽是窺餘則漫不加省與之交談兩目瞪然視舌本強不能對嗚呼一物不知儒者所恥孰謂如是之學其能有以濟世哉此濓銘亡友曽公之墓憤激于中而復繼之永慨也公諱魯字得之曽其氏也孔門弟子郕公五十七代孫其居新淦吉陽里者已久世裔之傳與夫轉徙之詳昔以著於公之先墓茲不重載曽大父兼善宋贈大理評寺祖天麒宋宣教郎軍器監主簿父順元韶州路儒學教授妣劉氏公年七嵗能暗誦九經一字弗遺奉禮郎簡君正理欲以神童舉于朝其父力止之及齒稍長取三史日記之尋及其餘數千年間國體治亂人材忠佞制度沿革咸能言之有叩之者如山川出雲層見疊敷杳莫察其端倪公殊不以為足所藏子集動至數百家各攬其精而掇其華聞有僻書隱牒不憚道里之逺必購得之既得必篝燈讀之達旦不寐發為辭章龎蔚炳朗毅然有不可奪之氣廬陵劉提舉嶽申與之語連日夜弗休嘆曰不意後生中能至於斯也其將以文鳴乎杜內翰鄉之丈人行也公負笈從之遊益充拓其所未至寤疑辨惑惟日不足遂以博極羣書稱于時公猶謂未要於至道述長書一通謁虞文靖公集於臨川虞公大悅曰昔程子與張敬夫年十六七脫然有志聖賢之道子能如是復何讓古人公年蓋十九矣由是益濳心濓洛關閩之學分别義理密如蠺絲牛毛而尤愛吳文正公澄之書吳公亦居臨川其著書滿家無大無小公一一訪獲之玩繹未嘗釋手久之充然有得盤桓林泉以道自娛若將終身焉至正壬辰天下大亂州縣所在繹騷公召里諸豪集健兒持兵以保障乎一方仍椎牛釃酒開陳逆順禍福言甚剴切衆皆聳耳而聽卒無敢犯非義者人號曰君子鄉及入國朝有詔纂修元史勒成一代之典遣使者起公于家公贊決部居補苴罅漏者不一而足其功為最多史成上坐端門召諸史臣有白金束帛之賜公居其首焉公將乞身還山會朝廷開局編類禮書輿論以老成之士無踰於公者共堅留之議禮之家有如聚訟自古難定於一公當羣言沸騰之中揚言曰某禮宜據某書則是從其説則非有不服者爭相辨詰公厯舉傳記答之各心醉而去俄選入儀曹為祠部主事階承事郎時洪武二年十二月也常忠武王薨髙麗王遣使來祭公索其文觀之使者靳不與公不可使者不得已出之外則襲以金龍黃帕內則不書洪武之號公責之曰龍帕固疑誤用若納貢稱藩而不奉正朔君臣之義果安在耶使者頓首謝過皆命易去之乃已安南來貢王客曹已受其表將入見公取其副覽之其王乃陳叔明公曰前王陳日熞爾今驟更名必有以也亟白尚書詰之使者不敢諱蓋日熞為叔明所逼而死遂篡其位中心懷懼故託修貢以覘朝廷之意上聞之曰島夷何狡獪如此却其貢不受五年二月上問丞相曰曽魯在禮部今何職耶對曰不過主事爾即日超六階拜中順大夫禮部侍郎公以順字犯父諱辭就朝請下階吏部以國法有定不之許倭人入寇戍將每捕獲之上憫其無知命儒臣草詔歸其俘公之所撰有中國一視同仁之語上悅曰頃觀陶凱文已起人意今魯復如此文運庶其昌乎凱禮部尚書也八月奉旨考京畿鄉試入院之後忽吐血一升公猶力疾閲卷不息自是遂奄奄不振九月膏露降鍾山羣臣咸見諸咏歌獨公撰賦以進十月上將郊祀出宿齋宫命取諸作使侍臣更畨誦之至公賦曰此曽魯作耶援據既精鋪敘有法豈新進之可驟至哉十有一月疾愈篤上章乞骸骨甚至中書以聞上惻然許之十又二月辛邜歸舟至南昌公謂次子圭曰吾命止明日不能至家矣然吾以一介微賤之士受國寵恩位躋法從又得守正而斃死復何憾所憾者不見二孫之成立也即趣具觚翰為書戒之壬辰次石岐潭果斂祍而逝距家才兩驛爾丙申至故居丁酉始具棺斂擇地於縣南屏山之陽以六年某月某甲子祔葬九世祖髙安府君之塋從治命也公蓄德熙和人近之者溫如玉潤不見忿戾之色然其人則山澤之癯身退然若不勝衣未嘗有所矯飾其處家也事親克孝父喪哀毁致疾踰年而後能起已而二兄諸姪相繼捐館公抆淚經紀凶事一年間葬十餘喪且撫存其孤惸惟恐或失其所平生輕財仗義喜周人之急四方賔客日登其門公倒屣迎之了無倦容嘗一試江西鄉闈有司置諸乙榜人為不平而公亦淡如也其出仕也精白一心有知無不為凡典禮涉於制度者必經公損益而後定雖古者吏牘之繁簡署字之上下人所不能知公獨稽諸書以為決公誠所謂濟世之學者非邪公屬文不喜留稿其徒雖有所輯録猶未成書其自著書有六一居士集正訛南豐類稿辨誤藏于家他咸未脫藁當公修元史時濓實為總裁及入南宫又有僚友之好故相知號為最深其坐官齋更析互辨每至夜分嘆末學之空虛復古道之寥落又復相視囅然一笑嚴陵徐尊生嘗有言曰南京有博學之士二人一以舌為筆一以筆為舌其意蓋指公與濓嗚呼尊生過矣濂也何人而敢上儷於公哉雖然公未遽欲棄濓也相期他日幸歸休必胥會焉共成一書庶可籍手以見前賢公今不可作矣故因銘墓之文而屢興懷於治古之時也世之讀者必將深感焉公讀書之室曰守約齋學者遂稱為守約先生享年五十四嵗娶聶氏先二十年卒公再不納配一榻蕭然如山林枯稿之士人難之子男二人長孰今來請銘者次即圭出為仲兄後女一人應真適劉奉孫二人正龍夢龍銘曰氣化紏纒人文昭宣萬類斯甄兮天設地施一偶一竒形聲相資兮載籍繽紛六藝攸尊各闢其門兮枝分葉敷散為千塗混其精粗兮彌綸大邦物采文章有變有常兮不生碩儒孰軋其樞孰苞其腴兮玉節曰陽神珠吐芒莫自翳藏兮大明麗天束帛戔戔搜羅俊艾兮衮褒鉞誅寓於䇿書輿論所孚兮儀曹之升儀禮稽經日維蒸蒸兮黼黻帝猷上窺殷周功在刪修兮所積之諶所發之深開陽闔隂兮正笏埀紳其色誾誾邦之老臣兮媚學蹮蹮其中枵然何翅霄淵兮天胡降喪一鑑之亡四國之傷兮其神上征化為列星寒光晶熒兮下射屏山馬鬛桓桓名在不刋兮闕四十二代天師正一嗣教護國闡祖通誠崇道𢎞德大真人張公神道碑銘有序洪武丁巳冬十有二月五日四十二代天師張公薨於龍虎山之私第年甫四十又三禮部尚書張籌即為奏聞皇上嗟悼者良久且曰朕欲命其遍祠五嶽今方一至嵩山何期大數止於斯耶遂親製文一通遣前浙江行省參知政事安慶為弔祭使仍令其冡子宇初襲掌教法戊午春二月十六日宇初奉公冠劔權厝南山先墓之次至十有二月某日卜宅兆於某而瘞之宇初恐遺德未能大白于世與羣弟子輯為成書使張致和即金華山中請銘神道之碑濓幸辱與公遊義不可辭公諱正常字仲紀姓張氏信之貴溪人漢留文成侯四十六代孫也重紀至元乙亥夏六月十三日其父太玄真人坐而假寐忽見神人飛空而至曰余自華蓋山來遊君家願見容也及覺而公生紫雲覆庭紅光照室人以為祥徴年七嵗雙目爛爛如巖下電容止異羣童後三嵗太玄出遊五嶽名山指相傳雌雄劔及玉刻陽平治都功印曰龍星再集于亥吾兒當持此大振玄風太玄渡淮化去而公之仲父嗣德繼主其教仲父薨衆論咸屬于公公力讓仲父之子正言正言薨公始嗣其職實至正己亥之嵗太玄之懸記至是始驗公升廣筵開演道家玄旨四海學徒聞者聳然領解時天下大亂經籙祕而不傳者十年公乃啓黃書赤界紫素丹刻之文授其徒胡合真整比以行奉贄來受者川赴雲蒸劔失其一流落鄱陽季氏家夜生光怪公訪而合之辛丑上統大將親取江南公知天運有歸遊遣使者上箋述臣順之意乙巳公朝京師上一見恱曰瞳樞電轉法貌昻然真漢天師苗裔也下詔褒美之錫燕者再兼有金繒之賜丙午復入覲京城士庶人求靈符者日以千百計侍史不能給閉關拒之乃相率毁關而入公叩齒集神濡豪篆巨符投朝天宫井中人爭汲之須臾水皆竭見土弗止飲者疾瘳上嘉之令作亭井上號曰太乙泉及還山復詔中貴人賜以織文金衣仍下中書給驛劵畀之以便朝覲洪武戊申上登大寶位建號改元公入賀錫燕于便殿即日降制書授以正一教主嗣漢四十二代天師護國闡祖通誠崇道𢎞德大真人之號仍俾領道教事給以銀印視二品設其僚佐曰贊教曰掌書久之陛辭而歸上御謹身殿從容謂曰卿乃祖天師有功於國所以家世與孔子並傳以迄于今卿今體之以清靜無為輔豫至治則于汝嘉賜白金十二鎰新其宅第己酉春上召公入朝踰月承顧問者四錫燕者一三月十有三日上將通誠於天帝致齋三日御衮冕服親署御名于章勑太常設樂手授于公俾祝而焚之禮成燕公于文樓羣弟子饗於别館復有金繒之賜庚戌夏上録公之功特勑吏部改贈公父三十九代天師太玄輔化體仁應道大真人嗣成為正一教主太玄𢎞化明成崇道大真人改封公母明慧慈順仙姑胡氏恭順慈惠淑靜玄君玄君時年八十朝野以為榮是年秋上復召見問以鬼神情狀更給銀印壬子秋復頒制誥以寵之冬十又二月復召入覲癸丑春將還上命留弟子以司祕祝之事丙辰上欲遣使召公公忽先期而至上喜曰卿之來何與朕意相符邪明年之秋朕將遣使祠海嶽諸神卿當妙揀清修之士與其偕來丁巳夏公率羣弟子江𢎞仁等入覲錫燕午門之城樓上舉爵謂公曰卿宜罄此一觴勑內侍出御製厯代天師贊示公曰他日當書以賜卿翼日詔公從太師李韓公善長祠嵩山分遣重臣與公弟子代祠羣望自公而下賜衣各二襲楮幣有差既還錫燕如初公自返故里志趣頗異常一日置酒與昆弟酣飲慨然嘆曰五嶽名山先子欲逰而不可得嵩山中峯乃吾祖得太清丹經之所今藉天子威靈幸一至焉咽曦景於層宵邈浮埃於浩劫吾志將有在矣君子疑其言未幾示以微疾端坐榻上屬弟子方從義曰吾無以報國家寵恩爾等宜左右我子孫以贊寧謐之化命取劔印授其子曰我家千五百年之傳在是汝其勉之死生數也吾之不死者其光赫熹四爥寰瀛先天地不知其始後天地不知其終也舉手作一圓象默然而化是夕大崕石崩聲聞數十里云公幼警敏靈籙祕文之屬皆不習而通嵗屢旱禹步召風雷精神達於冥漻甘霖即降或有為魑魅所慿者授以片符輒潛影不見公憫兵戈疫厲之餘沴氣不消舉行玄壇舊典修壇墠建隂陽鼎而錬度之其徴驗尤夥然其天性夷曠潔而不緇如超萬物之外故以沖虛子自號最愛佳山水仙蹤靈迹所在必窮幽極深動至纍日忘返當適意時欲乘白鶴與羣仙翺翔紫清之上其於人間事未嘗因此少輟其奉玄君備極孝飬暨歿葬祭咸盡禮度兵禍相仍傾資募人為兵以捍禦鄉井人賴以安公之玄裔備見世家茲不載其曽大父諱宗演三十六代天師演道靈應沖和玄靜真君妣周氏某玄君其大父諱與材三十八代天師太素凝神廣道明德大真人金紫光祿大夫追封留國公妣易氏妙明慧應常靜玄君其考妣則太玄真人與胡氏也公字觀宇娶旴江包氏宋宏齋先生恢之五世孫子男子四人長宇初即今天師頴悟有文學人稱為列仙之儒近者入朝上召見奉天殿反覆諦視之笑曰絶類乃父寵賚有加焉次宇清次海鵬次勝祐子女子二人一歸鄱陽王嶽一在室惟公生乎神明之胄簡素端凝用道為體而膠轕遊氛無自入於念慮澄靜之久天光自發所以受知聖君入朝京師天寵便蕃聲聞四達至於死生之際又能不動聲色超然坐脫如行者之返故廬非真有道者豈易致哉是宜銘銘曰天開日明真人上升周流九霄駕輗作軿卿雲英英剛飈泠泠絳節翠旙恍其來迎載稽玄裔歲踰千齡五綵交絢玉笈金經矧有劔印奔星走霆非人莫授恐干鬼刑華蓋神君於焉降精圓目青瞳閃如電熒入朝帝京照耀殿庭進退有儀金衣霞頳帝曰俞哉爾方外臣輔朕鴻化凝真集神巍巍嵩山嶽之中尊爾往代祠執禮如存庶集靈和以綏兆民皇用褒錫璽書金繒君臣遇合玄德之徴胡為弗留飛神窈冥崩崖墜雷百里震驚圓光有赫四燭寰瀛在天為清在地為寧在人為貞是謂三靈此乃道樞中黃之扃公能守一精聚氣凝不死維神所説維形白鶴來歸遼東露零洞視萬古後天弗傾元贈開府儀同三司上柱國録軍國重事江西等處行中書省丞相追封咸寧王諡忠肅新濟公神道碑銘今上皇帝既有天下憫元忠肅公新濟死節之忠擢其一子昌官內廷遷監察御史俄超山東按察司副使昌將行詣濓泣曰先公薨于蘄盜盜有義先公者具棺葬於蘄水縣鳯凰山下家人弗聞知時兵未靖各守其境道阻不通昌微服跳走數千餘里瀕死者數矣遇今上克蘄始獲至詢蘄人啓棺北還以某年月日葬於某地而昌又獲祿食于朝皆上之至仁先公之遺德也先公之忠既載在元史惟是墓道之碑未有刻文敢惟先生是請翌日濓以聞詔曰然新濟之忠朕實知之卿其勿辭乃考論其事曰謹按元贈開府儀同三司上柱國録軍國重事江西等處行中書省丞相追封咸寧王謐忠肅新濟字吉甫河西人贈榮祿大夫河南江北等處行中書省平章政事上柱國追封秦國公改封雍王印濟之曽孫贈榮祿大夫甘肅等處行中書省平章政事上柱國追封代國公改封涼王吹斯嘉勒多爾濟之孫贈榮祿大夫陜西等處行平書省平章政事上柱國追封趙國公改封邠吉王森濟之子其先三世以言語材藝事太祖憲宗世祖為克哷穆爾譯諸國言後皆以公貴封王曽祖妣婁徹辰祖妣額寧妣順祖皆從其夫封國為夫人改封王夫人公兄弟六人於次為三少騫然不可犯武宗時召見便殿襲克哷穆爾濟事仁宗於濳邸仁宗即位雅宜公久不改官英宗知公材延祐七年十二月授承直郎中尚監丞賜中統鈔千貫給校尉十人専道而行監尚御用物公持出納不可勢屈中官貴臣手無符勑絲毫不放英宗竒之至治二年二月遷右侍儀同修起居注命龍慶州達嚕噶齊托歡以女妻公賜鈔三萬貫為聘資寖得眷近公每侍側中外利害乘間進取無虛時泰定元年六月拜監察御史階奉直大夫丞相特穆特爾紛更朝政御史大夫多喇薩蘭狼據中臺公奮章劾之朝廷凛然畏公三年七月升朝列大夫引進使知侍儀事四年九月進侍儀使階朝請大夫文宗天厯二年八月拜江南行御史臺治書侍御史時大夫阿斯爾蘭哈雅有能聲公至萬口移譽於公大夫聲頓寢詔賜衣一襲上尊一朋鈔五千貫至順元年遷河東山西道肅政廉訪使薅姦剔穢煦其朽枯境內帖息三年二月復拜治書侍御史治陜西行臺未至召還同知中政院事六月改同知功德使司事順帝元統二年四月淮西江北道肅政廉訪事告闕僉擇其良以公為之一道稱治明年徴拜大都路總管府達嚕噶齊輦轂之下權幸肆橫法滯不行公操其紀綱風追雷斷不問誰何姦宄帖然屏伏至元二年六月擢嘉議大夫大府卿大府近且貴莫敢鉤核閹竪攘竊斂散無藉吏緣為私公較擲隱蔽立簿計數吏畏若神將作院纍嵗乾沒綺繡之屬一萬五千縑悉責償之知崑山州事管某上書誣平江路總管道童詭報嵗災帝命公察情否初道童以廉正治其屬官不能堪故誣之且倚前翰林學士阿勒呼木為援公驗得其狀以聞率坐二人罪三臺交章薦公五年二月特受資善大夫都留守仍兼大府卿益虔於職談其美者日以上聞帝曰不可無旌以勸奉職者六年三月就加榮祿大夫未幾帝幸大府見公所為條法精密諸藏皆盈有黃金束帶之賜時微雨公立階下命侍臣取御服油衫加公身至正二年十二月升宣徽院使四年二月改湖廣等處行中書省平章政事省控治五溪洞蠻土司鹿馴家暴變幻百出每視省臣臧否以為叛服公禁戢內兵勿擾其境布約施惠化其悍猾效貢奉職比於近縣十二月以中政院使召還六年六月賜金虎符海西遼東哈斯罕等處打捕鷹房齊里克琨萬户府達嚕噶齊十月還將作院使後二月太府闕卿再入太府兼將作使階超光祿大夫七年十月遷宣政院使明年三月拜江南行臺御史大夫時承平日久官恬吏怠漫無倫紀公至擇剛明御史行十道紏劾貪邪疏拔寃滯憲司𨽻卒盤據為虐者甚衆公下令屛斥之俾州縣之卒更月入直民歡樂之建康城北有宋王荆公墳寺僧世守既久視為己有王氏孫伐山木僧執送官官將以盜論事上公公怒曰王氏山王氏孫伐之何謂盜耶即歸山于王氏而逐僧出之秦檜裔孫敓民田羣訟不決公問寮屬曰秦檜何人寮屬以姦臣對公閲檜傳大署其狀曰檜之誤國千載有餘戮矧茲遺胤敢為民害盡斷其田於民公之明決皆此類湖東道僉事三寶珠廉介不阿御史以私謁之不聽輒以事劾之章至公所公曰鶚敢擊鳯耶奏杖御史托克托丞相與御史有連銜公十年五月移湖廣行省平章政事湖廣地並江北威順王科綽布哈田獵蹂踐稼穡起廣樂園萃名娼巨賈以罔利有司莫敢問公至求見王閽啓右扉入公公引繩麻向中門坐叱閽曰吾受天子命為藩大臣烏可以小門入我閽懼告王乃啓中門導公入公拜謁畢起言曰王帝室之胄與國同體不為天子養民而獵野獸恱婦女以為民病臣竊為王危之王投几降坐執公手謝曰非公不知此悉罷其所為有蕃僧持官府柄橫甚公捕其妻妾十有八人籍于官置僧于法由是民得吐氣十一年妖賊徐真一等起汝潁蔓延湖湘間勢甚熾時武備久弛公咨于衆或以老將鄭萬戶有材略對公乃令募土兵繕城池修戈甲起部屬以諜賊事賊聞有備遣其黨十餘詣軍門降公謂鄭曰此誣也鄭設伏受降誘而殱之縛其黨六百人獄以俟命會公召為大司農平章和尚受賊賂繫鄭而釋其縛縱之明年正月賊乘懈襲武昌六百人自內為應城遂陷城中人泣曰新濟平章在吾屬豈為俘乎公至都入見陳致賊狀帝喜賜食及錢三萬貫托克托不悅奏為江西省平章政事員外置吏卒趣遣之官至江東有詔會浙西平章政事巴延特穆爾南臺中丞曼濟哈雅守江州時江州已破江以西道不通公開省太平募人開道持羽書走江西徴兵未返而賊焰漸逼調廣德軍寧國之軍僅一百五十人賊號百萬衆皆沮懼公曰勿憂彼賊我王師彼豈吾敵乃貸富民財募強壯為兵初行臺募兵人給十五千無至者公豫五十千三日從者逾二千人公曰可矣即擐甲胄舟二千人鼓行泝江而上四月與賊黨戰池州斬首數萬復其城至魯港威順王之兵亦至士氣益張賊據銅陵拔柵夜遁去又復銅陵搜其黨得二千餘盡戮之復遣俾將陸行遇賊白馬灣又敗之賊走淮西公部分諸將卒兵躡其後及于白湄賊窮列陳迎戰公麾左右策馬雜射薄其軍擒偽相周驢賊潰不能列俘其衆五千奪舟六百艘乘勝奔擊之賊溺死者蔽江江水為赤由是道稍無阻已而賊擾池公率衆至池遇五遊騎于苦竹嶺斬其二鞫賊安在聞其衆三百屯貴池襲之散去復其邑賊復攻陷石埭殺尉公夜輒之賊陳其衆三千於縣西嶽溪橋有三人一乘驢二躍馬突前挑戰乘驢賊驍勇無敵軍中常畏之公引弓射之應弦而仆再發再斃二人後師乘之賊棄城走其散卒千餘焚掠縣西鄉公復追出境賊忽將舟師二百艘順流來攻公命萬户王惟恭禦之戰方酣麾舴艋從旁橫擊賊破走乘勝進望江清水灣居三日偵者告賊舟四百順風引帆直指我軍諸將失色公曰無傷吾有以勝之乃偃旗伏橫港中風急水駛賊舟不得泊奄忽電過過且盡命舉旗掣帆鼓譟出其後賊驚駭不能弓官軍奮擊遂敗之擒卒二百獲其舟艦器械甚衆進克建德縣時賊久圍安慶聞其黨敗而濟哈雅亦至焚營解去公且行且戰復湖口及江州賊巢據彭澤公欲攻之而江州倉無一日糧乃諭民輸財麥士卒俾惟恭守小孤山而自駐番陽口扼江湖要衝以圖恢復然亂已久湖廣江浙多敗江西亦無援助者轉戰六百餘所將兵日衰耗困疲財粟亦且殫匱或請去就食東南圖再舉公曰吾受命守江西此江西地也死則死此去將何之九月二十日賊知公兵食俱竭帥大舶載葦蔽江而下杜上下流縱火夾攻公麾兵殊死戰死且盡從子拜布哈將親兵數千人戰亦死公猶堅坐大呼公曰殺賊殺賊俄而賊射公中目仆舟中賊素識公名不忍害輿置密室中明旦少蘇賊饋食公卧叱去或以刀脅公降公罵曰狂賊我國之大臣恨不能殺爾而為爾獲命也何謂降為大罵不已賊終不敢害環卒守公凡不食九日忽自力起北面再拜曰臣力竭不能報國敢不死以辱命言畢而絶時十二年九月二十九日年五十有七卒後二年監察御史庫庫等請褒其義乃贈今官而諡忠肅云公先娶即托歡女諱諾倫生一子而卒後娶郭氏中書平章政事布哈之女俱封趙國夫人子男五人曰咱雅實哩公卒後特授榮祿大夫利用監大卿曰達爾瑪巴拉大中大夫僉遼陽行樞密院事其三即吉昌初名達爾瑪實哩上賜今名曰寶山曰寶座女一人濂昔論次元史未嘗不嘆其敗亡之易由於內外壅絶將相非人使然也當亂之始興誠得數萬之兵使一猛士將之可立見其撲滅而顧依違不斷養致大釁其中有足任如公者又卒俾之孤危無援不足以成功豈非自致哉惟公忠義果敢出於天性歷踐要職聲績彰明提千百未試之卒轉戰湖江間復城破邑懾敵人之膽雖勢孤力微大功不竟然忠義之氣猶足以立萬世之防範使亂臣賊子懼宜乎皇上褒其後人而以銘命濂也其辭曰朔河之西正氣烈烈摩蕩日月乃生英傑其人謂何為忠肅公偉貌長髯猶人中龍當元盛時出入禁闥一志小心不自矜伐歷事三宗登于顯融正色厲言以折姦凶既司行臺亦尹京邑貪邪宵遁鬼神晝泣湘湖之間名王所都納貨掄姝蒸黎告瘏公聞蹙額盛服往謁以笏畫地再拜辨説弛其嚴威謝以巽辭豫實無良非公不知盛極而弛孽生釁起帕額持戈蔓延千里公駭而告聘師與謀始剪始屠天子召豫匹馬比馳狐鼠相賀大城巖巖一蹴而破民泣且號吾實不辰公如在斯豈為盜人當寧載詢亂實誰敢稽首告言權臣喪氣公喪其氣彼斥公身朝辭暮行禦魑魅羣公曰豫家世承國恩先臣在天敢負吾君我兵二千以義為勇盜雖如林逆不能衆既復池陽遂徇銅陵呼聲如雷江水晝凝左馘右擒轉戰日亟扼江湖咽以掃南極氣吞逆雛奈力之痡孰謂猛虎制于羣狐人或謂公盍往他所公曰受命死則于此烈焰燭雲勢無全軍志在誅夷罵聲益振羣賊羅拜來饋飲食叱之不御以死報國公死者身不死者名相贈王封以愧茍生豈惟當時愈久愈著元廟既隳公尚有子公子克孝天子是庸匪惟私公以勸盡忠雖公至忠天子至仁刻辭豐碑埀訓萬年毛公神道碑奉國將軍僉大都督府事毛驤來謂濓曰先公以至正辛丑正月朔日棄遺諸孤某月某日遂畢窀穸之禮迄今已十八春秋洊蒙天寵之加賁及泉壤而墓土之石未有銘辭大懼無以昭君賜而示子孫願為備書其故碑刻焉按狀公諱麒字國祥姓毛氏居鳯陽定逺縣之昌義鄉生平負英氣多謀略人恆敬之壬辰之夏汝潁兵火起所在郡縣皆相挺為亂今上皇帝龍興臨濠憫生民之塗炭持三尺劔出而救之一呼之間從者數萬直趨定逺之池河初縣之大姓陳氏與公謀招健兒為兵屯營其地挾縣尹某為帥作保障計聞大軍且至皆棄妻孥作風雨散去公獨扶尹其詣轅門欵附上遙見之令左右問曰爾為何人對曰定逺尹也扶尹者何人對曰縣民毛麒也上壯公所為乃召之前指謂侍臣曰衆皆潰而麒獨降非有識者邪於是寵遇優渥朝夕俾公侍膳與其計征討之事健兒聞公在幕府亦先後出降上取滁州擢公行軍總管府經厯司其倉廪兼掌晨昏厯以錯將帥之失佐者未幾取和州軍威益振上以建國之初唯兵食最急仍命公護滁州倉乃帥師渡長江太平望風乞降遂聞江南行中書省徴公還升為郎中當是時上之左右唯公及太師李韓公尤被簡任凡政令之敷布饋餉之轉輸羽檄之交馳皆二公相與協贊之及建康下遂定鼎焉分道帥師日以獻捷聞復升公為參議官戊戌冬上親征婺州公實權署中書省事小大庶政咸出公營度人情吻合文武無間言上將大委任之而公之病告上臨其家坐榻上執手問所苦且勉其善自愛如是者凡三訃聞宸衷憫悼錫贈有加焉且詔參軍胡深選葬地於江寧虎頭山及靈車就塗上復躬御翰墨作文一通御鎮淮橋而祭慟哭良久直至處所視其下棺始還公之子驤時備宿衛上念公弗置俾驤就儒師學親自訓督之命為飛熊衛管軍千户轉振武羽林二衛驤感上恩自謂千載一時夙夜思立身揚名以報國顯親為務會大兵征漢鄂定襄沔汴吳興俱從征有功洪武元年上郊皇天即帝位國號大明在廷之臣皆驗勳進官擢驤宣武將軍僉羽林左衛親軍指揮使司事仍追封公西河郡伯封公妻周氏西河郡君大將軍徐魏公奉詔征中原而驤又從行直搗燕薊元君出奔天下於是大定論功行賞升驤懷逺將軍同知羽林左衛親軍指揮使司事世襲其職得推恩二代時重定封贈例司封據令更贈公懷逺將軍同知親軍指揮使司事周氏封淑人公父文政贈明威將軍親軍指揮使司副使母朱氏贈德人驤室劉氏先封西河郡君至是亦更封淑人已而驤進官羽林左衛親軍指揮使階昭勇將軍滕州段士雄反驤帥師討平之倭奴入寇浙柬沿海郡縣皆失寧驤會浙江太倉諸軍捕斬五百餘級獲海舟一十二艘倭奴逺遁入奏奉天殿上大恱曾未幾何驤復超奉國將軍僉大都督府事加贈公僉大都督府事階奉國將軍而明威公亦加昭勇將軍羽林左衛親軍指揮使朱氏加淑人周氏劉氏皆夫人繼室張氏亦封夫人公生子九人驤其長也次曰駿某階羽林衛千户所鎮撫曰􅀈某階金吾左衛千户所鎮撫曰某曰某曰某曰某曰某曰某女三人二先卒一嫁宿衛舍人沈俊孫六人曰振武曰應孫曰承安曰鎖住曰東平保曰寶慶嗚呼天造草昧之時六合雄爭未知鹿入誰手昧者往往失於所憑依而公獨能炳於幾先識真主於龍飛之初扶携臣服獻計宣勞以佐興王之運豈非豪傑之士哉及乎神武四達方域內附皇上崇德報功之心唯恐有弗及故當時開國元勳無不分茅胙土鐵劵金書傳及來裔奈何公之蚤世不得盡其才而與之並其命也邪雖然驤之雄略超羣著竒勳出入扈從上簡帝心爵位之顯融贈恤之便蕃尚方新而未艾也公雖歿亦可以無憾矣銘曰猗歟毛公沈毅而雄元運將終亂如聚蜂公奮而興使民為兵執旗一呼從者如星我州我閭我保鄣之俾全其生寧顧我私上天厭亂特命真人驅雷駕雲廓清妖氛公聞曰噫天胡可違附鳳攀龍茲惟其時我志先定敢徇輿情上謁轅門稽首以迎上嘉其忠寵賚日優談笑折衝帷幄運籌羽檄星馳饋餉弗遺是馳是驅以壯我王師飛渡大江軍威洸洸達于四方無敵不降自參戎閫遂贊中書拾級而升漸見赫熹卉木方榮嚴霜折之大火始然河水滅之天若假年勞烈孰侔貂蟬朱紱豈不公侯命也止斯人其奈何中外聞之孰不嘆嗟公雖云亡有子慨慷出入禁庭侍衛帝傍勳名日崇貤典日殷天光照臨燀燀焞焞難逢者時不朽者名名著實并登諸汗青莫堅匪石以礲以磨史官造銘永鎮山河元故國子祭酒孔公神道碑堯舜禹湯文武及孔子德皆聖人惟孔子不得位而功最盛天於恆人有一善且昌其後昆况德充天地功施萬世而身不食其報者乎堯舜禹湯文武皆王天下故子孫受其祉有限孔子無位故餘慶遺澤被其子孫者無窮自斯民之生未有若孔子之德而無位者也亦未有孔子之傳世久逺而襲為封君者也嗚呼天之報聖人其在茲乎公諱克堅字璟夫世家魯之曲阜孔子五十五代孫也曽祖曰之厚贈大夫濟寧路總管輕車都尉祖曰浣纍贈通議大夫禮部尚書上輕車都尉皆追封魯郡侯父曰思晦嘉議大夫襲封衍聖公纍贈通奉大夫河南江北等處行中書省參政知事護軍追封魯郡公諡文肅曽祖妣女真氏祖妣李氏妣張氏皆追封魯郡夫人公少廓達通敏日誦千餘言始冠逰學成均通春秋左氏傳文肅公薨襲封衍聖公階嘉議大夫元重紀至元五年上疏請修飾廟像順帝可其奏賜山柬厯日錢之半給其費命監察御史族人思立持楮幣二萬五千緍勒碑以紀成績至正六年中書謂公爵與階不稱奏升之制授中奉大夫易銅章以銀十五年平章政事達實特穆爾薦公明習禮學徴為同知太常禮儀院事以子希學襲公爵是年冬帝親郊公攝太常使盛服襜然登降有容觀者稱為達禮御史大夫蘇蘇言公才宜近侍左右拜中臺治書侍御史公辭歸明年拜山東道肅政廉訪使既受詔復辭會山東兵亂公率家人北行次藁城丞相賀太平奏召公為集賢直學士希學為祕書卿遣使者即藁城起之公至燕都處盜毛貴犯畿甸且逼廷議棄燕遷關中公曰天子當與社稷宗廟俱為存亡烏可棄而它之今勤王之兵頗衆與之決戰盜可平也如公言盜果敗去十九年遷禮部尚書知貢舉時四方士避亂多集都邑公請設流寓科以取之是年冬擢陜西行臺侍御史李思齊及察罕特穆爾二軍爭泰隴相攻朝廷不能制陜西行省丞相德埒特穆爾納思齊降將命張良弼禦之公及中丞袁渙諍曰不可二軍不敢舉兵犯奉元豈其力不足哉特以無名耳今納其叛將而出兵禦之是引虎使噬也丞相不從渙亦被劾去公怒曰謀之不善亂且至矣遂自劾而歸月餘二軍及良弼戰于鹿臺奉元果陷二十二年除國子祭酒帝賜上尊太子書大成殿額以賜公以世亂不樂居位竟謝病歸闕里營别業城南以居後起公為集賢學士資善大夫不就復以公為山柬廉訪使卒不起二十八年皇上手詔趣公入覲待以賓禮而不名賜以廪祿不煩以職郊祀必致膰肉撫勞甚至洪武三年春以疾告遣中使存問疾篤詔還公于家給驛以行賜白金百兩文綺八端它錢物稱是三月二十八日次下邳新安驛薨于舟中夀五十有五希學奉喪歸以六月十三日葬于孔林去孔子墓若干步公寬厚樂易事親有禮遇族黨有恩與人交不為掩覆計度一以誠信豐厚美髯容止甚都順帝以福人稱之公娶張氏濟寧路總管子仁女封魯郡太夫人丈夫子九人長即希學次希説希範希進希麟希鳯希順希尹皆元國子生希贇其季也女一人適某某孫男九人曰訥曰證曰某某女五人希學今資善大夫襲封衍聖公每嵗朝正于京師上寵錫之甚厚以袁渙狀來請曰先公沒今十年而墓道之石無文以刻恐休德不聞于來世人其謂何濓嘗獲識公且與希學善雖老矣其忍不銘銘曰天命大聖為萬世師廓幽昭潛雨施日輝功加堯舜位則不有斂其遺澤以昌厥後厯年二千有興有亡五十餘世封褒相望自侯而公愈逺彌貴桓圭衮衣肅將祀事惟公紹休道大且文人曰休哉聖師之孫入為秩宗左禮右樂格于幽明上下允若亂兵趨燕宗社震騫君臣合謀棄而西遷公曰不然君死社稷以正伐亂勝不以力王師焞焞如虎如貔盜遁難夷公實啓之關陜之間將驕胥噬彼謀不臧以水止潰公謂元戎世方興亂無失厥防以速其叛言臧不從不臧是為禍將逮身云何弗歸璽書迎拜俾掌邦教大訓宏謨敷聖之道土宇日隳位其可居退修于家琴瑟詩書皇明御極取聖為則陟降帝庭禮儀有翼生享其榮死篤其承云誰致然聖澤休明惟聖之澤如山如川有址有源以永厥傳繼聖惟賢守位惟德昭績埀聲後嗣是式墓碑凡六章東丘郡侯花公墓碑皇上渡江之六年庚子夏閏五月癸酉偽漢主陳犮諒以舟師入寇圍太平行樞密院判花公率麾下三千餘人結陳迎戰三日賊不得入乙亥城中乏食公士馬憊城陷賊縛公急公怒奮身大呼縛盡解起奪守者刀殺五六人罵曰賊非吾主敵也曷不趣降賊怒碎公首縛於舟檣衆射之公至死罵賊不少變已而賊犯龍江上命諸將力戰賊敗遁去後五年甲辰上即吳王位追封公東丘郡侯又十六年其子僉水軍左衛指揮司事煒泣曰先公歿今二十年無文銘于神道竊恐忠烈不白於後世敢請惟公勳業始卒宜載國史余嘗待罪太史氏不敢以耄辭公諱雲姓花氏世為懷逺人自考以上姓名皆亡莫知遷徙世次然皆不顯公少孤隨母嫁張氏貌偉而黑驍勇絶人儕輩畏服之嵗癸巳杖劍謁上于臨濠上竒其材力俾將兵略地所至輒克破懷逺城口擒其帥以歸進攻全椒拔之羣寇據繆家寨公俟夜襲之冦散走上將取滁州單騎前行遇賊數千人於道拔劔躍馬衝其陳而過賊驚曰此黑將軍勇甚不可與爭鋒兵既至遂克滁甲午從上取和州得卒三百以功授管勾明年乙未率所部先渡江上克太平以公忠勇可信任命宿衛左右丙申上破集慶公得兵千人升總管徇鎮江丹陽丹徒金壇諸縣皆下之過馬馱沙劇盜數百遮道索戰公且行且鬭三日夜皆禽殺之授前部先鋒攻常州拔其城駐守牛唐營夏六月立行樞密院於太平遂拜公院判階安逺大將軍丁酉春正月克常熟州獲卒萬餘命公將之秋七月以兵三千之寧國陷山澤中者八日羣盜蟠結梗道公操矛鼓譟出入營壘間斬首千百計而身中一矢還命守太平後四年遂卒卒時年三十有九夫人郜氏公與偽漢戰時一子方三嵗夫人以牲酒祭家廟會家人泣曰今城且破吾夫忠義人必以身死之吾夫死吾必不獨生然不可使花氏無後嬰兒在若等善撫育之聞公就禽夫人赴水死年甫三十有五侍兒孫氏瘞夫人尸遂抱兒以行偽漢軍虜之至九江軍中惡飬小兒孫氏以兒授漁家屬之曰此兒良宜善視之是年冬王師伐偽漢漢敗孫氏至漁家視兒在瞷漁人出竊負以走夜宿陶穴中天曙脫簪僦舟渡江遇漢僨軍奪舟棄江中孫氏抱兒遇斷木浮至附之入葦洲採蓮實哺兒七日不死夜半聞人語聲呼之逢老父號雷老告之故與其俱行明年辛丑春二月達上所孫氏泣抱兒拜上上亦泣置兒于膝曰此將種也賜雷老衣遣之復其徭已而令人追之忽不見兒八嵗侍皇太子就學年十三授虎賁右衛副千户後七年拜今官即煒也煒於洪武丁巳偕孫氏至太平奉夫人骸骨歸乃束草像公以二月己未合葬上元縣南五十里之水橋嗚呼觀公之死賊與妻妾之報公可以知公之為人矣天不殄其後豈不宜哉銘曰雲雷遘屯區宇分篤生真人鎮乾坤騎龍鞭霆下天門前翼後衛蓊若雲誰其最雄花將軍力驅智駕敵萬人蹂躒羣盜猶麚麏大刀長戟屬櫜鞬左麾右刺流電奔緋衣緇辨貔虎屯駐馬飲江江水渾吳楚之域殺氣昏手挽天河洗妖氛軍聲隆然若雷震遭者膽落兩足蹲元戎開府大江濆腰佩兵符威令尊控制上遊為國藩偽漢恃力不圖存建旗揚帆事鉦鼖艨艟蔽江躡鉤援捶牛享士士氣伸馳馬督戰寧顧身賊焰熾若烈火焚大戰三日勢愈殷單騎赴之齒囓齦怒髮上指目吐煙叶汝賊凶頑犬與豚願醢汝肉一口吞賊慚耳塞不忍聞至死不屈酬國恩飄然乘雲叩帝閽請為厲鬼扼賊元賊當殛死洗厥寃天子下詔褒忠勳東丘立侯賁九原孤兒保育寵便蕃不墜宗祀天所敦生為烈士死明神神靈在天光焞焞嗟爾來觀萬子孫繼忠男孝慎勿諼弗信請考太史文故嘉興知府吕府君墓碑元至正之季民反處州為盜轉掠而東陷永康婺諸縣繹騷弗寧永康太平里大族吕君文燧散家資數千萬與弟文燁合謀募里壯強子弟得三千人將之與盜屢戰盜敗走復其邑斬獲甚衆吕氏之聲聞東南朝廷三授以官皆辭不受用事者聽讒殺其弟卒不敢怒而為之盡力大臣義之承制表其閭而復其家婺之巨室細民幸不遇盜者悉歸功吕氏是時永康有吕氏隱若巨鎮焉今上皇帝既克婺君族人藉兵甲以君名詣轅門降上大喜特立永康翼以君為左副元帥兼知縣事時君以事留杭未返命其弟文烜攝之君還復召為庸田司經厯改中書省管勾江西行省都事權知廬州府至官三月浙西平更授嘉興知府纍階某大夫松江民作亂襲嘉興君覘知之走使者告李曹公文忠賊始據城曹公兵即至遂就擒諸將欲屠城君爭曰據城者賊也城中民何罪釋不屠民德之滿三載入朝奉詔持節諭闍婆國洪武三年十一月次興化有疾十六日卒于驛舍四年十二月某日歸葬東陽縣興壟西丘之原年五十四君有德於鄉鄉人聞其卒皆哭泣相弔喪歸耄倪拜迎於道數十里不絶卒之明年嘉興佐二以下坐鹽法死者數千人有司以君嘗署名公櫝例藉其家上特詔歸之曰吾知吕文燧誠信人必不圖姦利且歿於使事可念也時吕氏家逮繫縣獄鄉人哀之如親戚及詔歸其家乃皆舉手相賀君子由是知君之德及人者深也君字用明文燧其名也其先有諱玖者自河南來遷玖玄孫浩上書宋孝宗朝脫父兄于詔獄孝宗崩行喪三年浩弟源以行義旌門皆有惠於閭里源玄孫鑰仕元為永康尹君曽大父也大父汲父機母某氏初君之大父嘗修上世所立義田以食族人置學以教子姪至君踵其志卒成之君為人如懦夫至其奮發於義不顧利害必達乃止蓋其所從來逺矣君娶戚氏三子曰堂塽垍垍後季父文炯六女其三人適同邑胡海金華戚誠道東陽俞文璉餘未行孫男二人堂既葬君乃謀於弟曰先子之友固多其同朝仕而知先子者唯太史宋公太史嘗銘天下賢公卿大夫其言可傳信茍以墓上銘為請必不忍辭乃以君族弟熒狀來請君之政蓋多可稱余不能知然其最大者活永康嘉興之民書其大使人可推知其餘也銘曰人之所爭智名勇功或易於始而艱其終吕君之興秉義孔偉散金聚兵以彌狐鼠既克有成不居其名錫命者三辭而弗承匪徒辭之以俟神聖黃鉞臨城解甲請命左綰將符右佩縣章季也攝之於君有光起司甫田亦佐方嶽章服有儀蔚為邦伯自廬而吳千里是綏相其良姦以撫以誅憸氓跳踉弄兵陷郡陰檄王師禽斬以徇將怒謂君亂民可屠君爭不從萬家獲蘇不躋於崇而淪於遐吏操深文幾隕厥家家之再完明天子明天子不遺由君之誠君德甚多鄉人是思載德登碑于以悼之贈中順大夫鎮江知府徐公墓碑皇上即位之十年詔曰光祿卿徐興祖慎事小心在朕左右二十又五年未嘗有過非其祖父之教曷以致斯其凖恆制寵贈之官以勸奉職者於是吏部承詔贈其大父餘慶中順大夫應天府丞父景福中順大夫鎮江府知府祖妣朱氏贈德人妣髙氏贈淑人興祖既祗奉制書告于墓下復謂余曰吾祖父世有醇德祖之事稍逺弗能悉知知而悉者惟吾父而已吾父之德吾知之吾子雖知之弗悉也至於吾孫又不若吾子之知則遂忘矣茍不托於文辭何以示後之人使知所自敢以纍執事焉余與興祖同朝甚久不獲辭徐氏世為建康人國初易建康為應天府今為應天之江寧人公諱景福字某諱餘慶之子諱守禮之孫平居願貌寡言事親先事揣意取其歡欣兄眉夀析産出居朝夕往省問其缺乏及所好而饋進之並市肆修百物以通時之有無不過求銖兩息遇人不問長少卑躬悅色懇篤誠信出言惟恐傷之一揖埀首幾欲及膝久之然後起與俗無怨聞喧詈聲輒引避人告以求利則曰茍足可矣非敢求也或尤其太同則曰誠以待物同非所知也由是里閭咸稱之為善士公既以此自治生子亦以是教之年若干以某年某月日卒某年月日葬于聚寶山府丞墓側妻即淑人髙氏祔焉髙氏柔嘉有則年若干以某年月日卒子男三人長紹祖次即興祖次敬祖興祖淳篤遜謹由尚食局副使四遷至今官階中大夫為上所信任賜以第飭土田而孫男五人欽鑑鈞仁義皆謹飭習禮欽復擢為從仕郎掌醢署丞曽孫男女又十餘人君子於是知公積善之報未已也嗚呼為善者觀於徐公可以知勸矣乎銘曰天博而穹厥聽孔聰善祥慝殃咸以類從孰嚚不知訾其幽逺棄不為善其胤卒殄有察其然善集于身身或弗昌昌在後人懿惟徐公嗜善忘利豈必多言躬行於事純孝篤誠于父于兄小智私謀我則不能里譽閭稱公誠善士不顯其身以遺厥子厥子如何氷潔璧溫玉食是司以奉聖君帝嘉舊勳俾長光祿金帶朱衣其儀甚肅殿門嚴嚴不敢顧瞻退食于家默無一談帝曰爾賢祖父善教錫以峻爵以勸忠孝乃贈徐公守彼鎮江徐公有父佐于鄉邦制書煌煌丹璽如日宰木祠垣燁然動色鄉鄰歎咨始實弗知積善致斯胡寧不為徐公有善子食其報人孰非公賢者是效故翰林侍講學士中順大夫知制誥同修國史危公新墓碑銘嗚呼翰林侍講學士中順大夫知制誥同修國史危公享年七十以洪武五年春正月二十三日卒于和州含山縣之寓舍其年二月十五日權厝於含山某年月日始還葬金溪白馬鄉髙橋之原其子偃於蹇反深懼公之功行世系不昭白于天下書夜兢惕自為狀二萬言來謁新墓之銘濓守官少暇久未克論撰春正月蒙恩致政柬歸私念公相知特深在前朝時欲引薦入史館及今待罪禁林實與公為同僚相得甚歡於是評隲羣行而勒文于碑其文曰公諱素字太朴姓危氏危本姬姓周武王庶子某生而手中有文曰危因賜姓危氏封於新其後居光州晉永嘉中建州刺史京遷建昌之南城唐黃巢之亂全諷與其弟仔倡赤手起兵擒巢黨柳彥章于象牙潭擢撫州刺史纍官金紫光祿大夫檢校太傳封南庭郡王南庭之後復遷撫之金溪白馬鄉譜圖亡竟逸其名南庭十五世孫宋景定三年進士通直郎知臨安府仁和縣事元纍贈中奉大夫江浙等處行中書省參知政事護軍追封汝南郡公炎震公之曽大父也纍贈資善大夫河南等處行中書省左丞上護軍追封臨川郡公龍友公之大公也纍贈榮祿大夫江西等處行中書省平章政事柱國追封豫國公永吉公之父也曽祖妣王氏彭氏妣劉氏皆封郡夫人郡之名如其夫母劉氏黃氏並封豫國夫人公自至正元年用大臣交薦入經筵為檢討公年已四十一矣五年改承事郎國子助教七年除應奉翰林文字同知制誥兼國史院編修官未上轉宣文閣授經郎兼經筵譯文官階文林郎明年復入翰林為應奉十一年遷儒林郎太常博士十三年轉奉訓大夫國子監丞擢兵部貟外郎十五年升奉議大夫禮部郎中拜朝散大夫監察御史遷工部侍郎明年轉朝請大夫大司農丞又明年升中奉大夫大司農少卿復入禮部為尚書十八年參議中書省事兼經筵官次年進通奉大夫御史臺治書侍御史二十年拜通奉大夫中書參知政事同知經筵事提調四方獻言詳定使司後四年階升資政大夫俄除翰林學士承旨榮祿大夫知制誥兼修國史博羅特穆爾入相出為嶺北等處行中書省左丞明年棄官居房山二十八年閏七月元順帝北奔淮王特穆爾布哈監國承制復起為翰林學士承旨上章控辭已而元亡逮入國朝召至南京洪武二年授以今官三年兼𢎞文館學士是年冬監察御史王著等劾公亡國之臣不宜用公坐免詔出居和州閲再嵗而卒公生四嵗其大父即使公讀書大父本黃氏子來繼於危知公能亢危氏宗督厲之尤切年十五即通五經大旨據座為人師與同郡葛君將曽君堅黃君冔葛君元哲更相策警窮日夜不休復徒步走臨川吳文正公澄清江范文白公梈之門質而正之二公皆析行輩與之為禮吳公至恨相見之晚凡所著書多與公參訂之虞文靖公集孫先生轍名德俱尊其遇之一如吳公由是公之名震動江右間出遊金陵或以其文示南臺中丞張文穆公起巖張公以狀元為顯官少所稱許獨推服公曰危君為狀元庶幾相當老夫有愧色矣張公入朝遂挾公以行達官貴人慕公聲華爭欲出其門下更相論薦唯恐失之公之檢討經筵也經筵一月進講者三講文皆屬公手公嘗敷繹民惟邦本之言以進典領臣惡其峭直難之公曰經筵之職所以格君心反不以民之疾苦告邪縱加罪罪在操觚者素請當之卒以進講順帝大悅詔賜經筵官酒公不飲復賜馬湩一革囊金織文幣人一端皆有副已而有詔下中書發錢粟千萬賑河南永平民萬口咸曰活我者經筵官也公復移書執政請修宋遼金三史乘傳行宋兩都訪托闕遺書成公之力居多順帝知公問學淵深特命注爾雅較君臣政要公悉心而為之不數月而成及進賜金若干公辭曰臣職也何勞而受賜不敢奉詔尋有宫人之賜公復辭曰臣有糟粳之妻在大江之南無所用之亦不受其助教成均也六館生擇所疑羣揖難公公片言折之悅而去分監上京輟餐錢建監門葺齋舍勒開國以來分教師之名于石尚書王某致政居蔚州搆暖泉書院請額於朝他監官以地無先賢故事不從公聽其立師以訓士子順帝以公善筆劄詔書釋氏書公辭曰臣官胄監以教化民彛為職外教之典不宜書無已遷他官乃可耳遂止其授經官學也受業生皆貴戚大臣子橫肆不率度公創教條置帳厯日書其勤惰月會而賞罰之皆畏服不敢犯其復應奉翰林也會修后妃功臣傳事多亡逸無據公買餳餅饋宦寺戚里厯厯叩之復參覆得實乃始筆之卒為全史其在太常也請親祀南郊築北郊以斥合祭之非謹諡法嚴祀典以祛謬妄時翰林承旨張公翥為博士禮文有闕者同補正之人稱為雙璧其為國子監丞也捐束修鋟小學書及夏小正經傳考于梓以惠學者其居兵部也奉詔墾田於雄霸二州相地受略剃除荆棘闢田幾千萬畝使民有道民德之其升禮部也與許文正公衡之孫克學俱贊皇太子受玉册故事皇太子謁廟用牲體百官以朝服賀於東宫公謂克學曰儻有違禮人惟責吾二人盍正之遂徹牲體而以便服賀其擢御史也知無不言御史觀音保等四人以諫死英宗朝公請録其後官之四川行省平章政事囊嘉特天厯初舉兵欲翌戴明宗雅克特穆爾巴延等構殺之公力為雪其寃容城民魏敬益買田千畝後見鬻田者二十家不能自生以田劵還之公請旌其門以敦亷讓其在工部也順帝欲以蒙古書譯釋氏三藏經下部刋行公以無益諫罷之執政居第與燒飯橋近有司希其意欲鑿石易橋公諍止之降香祀嶽瀆故用金十兩為香函吏利金以銅半雜之或造銅函易金公亷其狀皆執論誅之淮南兵亂公奉旨亷問其故會維揚京口嵗飢民欲相食公便宜諭守臣發楮幣數萬定賑之所全活者甚衆上淮西宣慰使余闕捍賊功狀請升其官秩復請立宋徐節孝書院於淮安其官大司農也分治京南保定之境幾無曠土時海輸不至軍國多仰焉新城民田氏聽後妻讒殺其子公憤之職既不可治乃為文祭其子民悔愧後妻逃去人搖手相戒不用婦言其長禮部也時亂將亟公憂之每陳得失無隱丞相賀惟一曰君向寡言今又何多也公曰時危恩重情豈能默默吾不敢畏丞相但畏後世史官耳其參議中書也論天下事以擇將帥舉賢才為本請専任甘肅行省平章定住總西方兵勿遣其迎帝師誤軍事用樞密副使布延布哈為中書參政經略江南以額森特穆爾黃常為禮部尚書頒厯安南立兵農宣撫使司以安畿內任賢守令以撫流竄之民順帝欲以公兼兵農宣撫使公以疏逺辭且諫曰今日之事宜臥薪嘗膽以圖中興可也公言雖愈加切時不能盡用舊制銓曹有行止科吏主之曰具內外官十名上中書中書籍以遷擢其後吏怠不為意仕者淹滯有待選十餘年者公責吏日具五名五日一上中書吏樂易集各思奉職而久滯者獲伸髙原富民劉強通其子婦婦訴官達刑部吏受賕欲變其獄以俟赦公以事關倫理趣如法論之其轉侍御史也亂兵殺易州達嚕噶齊公請假守令以制兵之權會中書左丞成遵而下以贓得罪獨賀丞相翰欒平章與公不與皇太子書澄清忠義清白傳家八字以褒賜之其參知政事也刑部尚書托里圖兼興和路總管與守將有隙守將誣其欲私發官囷糧廷議杖踰百免其官公驗無發封狀釋不問都事倪晦與劉哈喇布哈同官丞相台哈布哈幕府數以公事忿爭劉怒欲中晦隂結監察御史劉君楚俾擠之會晦至燕都囊故人所寄買馬白金君楚攟其囊得金下晦獄令自伏為贓狀上中書公疑亟為白出之馬德守德州俘所獲南軍千户楊甲至都將斬之公召問狀乃淮安世襲千户戰敗陷濟南羣盜中陳柔俾詣德軍饋物德械送之非賊也公白宰相釋之楊感泣曰參政生我枯骨中惠大無以報然參政長者為公法釋我我不敢私謝期以忠義報可也卒與逆臣博羅特穆爾戰死之太醫院經厯徐某藏盜贓盜敗徐就鞫案已具要官庇徐屬公從末減使三返公竟不許嶺北行省參政董復初素有廉名同省臣飛書言其在稱海宣慰司時取官中米千石公疑其事遣使核覆之果得其誣博囉特穆爾庫庫特穆爾俱以平章總兵河南漸生釁端公謂御史大夫布哈曰飬虎者欲其不相搏噬則别其牢今欲二人無鬭莫若加其職而分地處之用博囉特穆爾為丞相治四川以庫庫特穆爾為丞相治河南各責其成功可也大夫曷不為上言之普化如公言順帝及皇太子咸以為然會丞相吹斯澗喪妻不出事中寢初江南經略使布延布哈李國鳯請封徽國朱文公為齊國公以龜山楊公豫章羅公延平李公西山真公九峯蔡公從祀於孔子廟廷公為御史時亦請封諡劉蕡事上中書皆寢不報至是公皆舉行復為文以少牢躬祭墳墓禮部員外郎薑碩使偽漢陳友諒不屈而死公為奏官其子京畿歉國用不足公奉旨以錢幣誥勑募民入粟公以義諭民聞者感動荷負來輸者填道至有不願給直者上都宫殿火順帝敕重建大安睿思二閣公上書諫曰茍以二閣為祖宗所建四海九州獨非祖宗故物乎會皇太子大臣亦以為言遂罷其役其承旨翰林也翰林修史有司日奉餐錢方為之否則斂手而坐公謂同列曰吾等以史為職且祿已厚矣奚俟餐錢而後為邪因次第修之其以左丞居嶺北也和寧為太祖肇基之地而無圖志可徴公請於朝作和寧志先是夏侯尚玄嘗伏闕上疏言郯王某之寃公髙其義補其子為宣使時伊蘇岱爾為胤平章挾私憾殺右丞達爾瑪巴拉公曰是尚可以仕邪不去禍且及即上章辨達爾瑪巴拉無罪辭官去居房山臥不起將相重臣皆以書請不聽丞相史列門來問計公曰撫軍院誤國至斯不可救矣亟請河南王庫庫特穆爾總兵以衛畿甸而固守之當時事勢已不可為及再任翰林僅一日而大兵入燕公曰國家遇我至矣國亡吾敢不死趨所居報恩寺脫帽井傍兩手據井口俯身將就沈寺僧大梓與番陽徐彥禮大呼曰公毋死公毋死公不祿食四年矣非居位比且國史非公莫知公死是死國之史也力挽起之已而兵入府藏埀及史庫公言于鎮撫吳勉輦而出之由是纍朝實録無遺闕者公之力也其入國朝也皇上嘗訪以元興亡之故甚見禮重俾之侍講禁林宋穆陵顱骨為嘉木揚喇勒智所發後入宣政院西畨僧相傳授為祭器公言于上索取瘞之聚寶山時公春秋已髙雅志亦不復仕矣公厚重深中有容寡言笑聞詆毁如不知與人交有禮雖貴顯恆若貧賤時平生好薦賢先後所引若翰林學士劉君獻待制黃君哻等七十餘人至通顯者甚衆纍持文衡考試多士人服其公樂善好義若有督之者凡事有關於名教可以勵風俗者必為之乃已居官清慎節儉遇凶嵗輒疏食不御酒食倉吏進祿米贏七斗時斗可易白金五兩公命歸之官奉敕書徽政院使圖們岱爾神道碑其從子以白金五十兩為夀公却之曰國體當爾居中書凡請文來謝者皆不受故人妻子不能衣食者厚賙而生之偃嘗請仕公曰賢才未進吾敢私爾乎能以德報怨參政燕人杜翺以公南士欲構公罪翺死金陵公為文祭之公博學善文辭至正中獨以文鳴天下凡朝廷制作皆自公出四方欲顯白先德者皆造公門尤精於書得片楮隻字者寶祕以為榮有文集五十篇奏議二卷宋史稿五十卷元史稿若干篇藏于家公娶舒氏先三十年卒再娶趙氏先十一日卒俱封楚國夫人子男子二人偃中至正二十年進士第纍官承直郎大都路同知薊州事今為安慶府儒學教授遊登仕郎大都路儒學提舉亦前年卒女六人一適同邑曽侁堅之子也餘皆夭孫二人長太平夭次德章公未仕時館授貴溪張氏張思伐杏樹以闢家孰有鬼夜叩寢門告公曰吾杏之精也主人將伐願參政生之公即造張力解而止鬼致白金壺為謝公辭及公為參政嘗以滿溢為懼後升左丞遂怏怏不樂云嗚呼天之於人不能以俱全也久矣或授之才而不假以位或畀以位而不畀以時此竒才偉德之士常困而不施而生民所以鮮蒙其休澤也惟公以淵深之學精純之文嘗都顯要之地位海內仰之如祥雲景星亦可謂有得於天矣而逢時亂亡不獲大展以死豈不可哀乎雖然觀其所自著者固足以不朽矣銘曰二氣孕精至文乃生凝為川嶽煥為日星天地之文因象以示象默無言非人莫著往古百代作者孔多迄今有聞其能幾何元興朔方氣淳而龎俊烈宏謨震蕩萬邦積盛而彰實在君子維八十年其績甚偉卓茲危公起大江西奧學醇辭孰能與齊在至正初交薦而升敷繹聖經以牖帝明中原薦飢黎首告病公跽而言民為國命同列畏聞吐舌改容當寧褒嗟曰維汝功往師成均矇瞽有相化其荒嚚趨厥禮讓貝葉之文有詔俾書非職所宜正色控辭或服豸冠或為宗伯或居中臺或參廟畫孰寃弗雪孰善弗褒孰蠧孰莠弗除弗􅀈白之擢之豫之錫之剔之殛之抉而植之彼何不思多言是訾曰匪其然吾畏後世南風泱泱耆老淪亡屹如丘山以鎮四方疆土日蹙孰不震動謂尚有公恃以無恐權姦肆威盜秉國鈞畏公有言出為藩臣政亂無章倚勢相戮公駭而吁吾胡可祿微服宵趨房山是居庶士遑遑如涉失桴天兵北征驅雷走霆有耳莫掩燕社已傾公曰國亡吾曷不死公忍不死以存國史大明方隆多士景從有詔任公侍講禁中昔豈不仕弗獲行道時之可為公則既老維古賢士立德樹勳茍有弗施著之斯文公文之純太音玄酒道則在茲爵祿何有孰高為山孰深為淵文之有傳終古昭宣元故祕書少監揭君墓碑有元盛時荆楚之士以文章名天下者曰虞文靖公集歐陽文公玄范文白公梈揭文安公傒斯海內咸以姓稱之而不敢名其後三公皆死無繼者獨文安冡子諱汯君以文學仕順帝時至國亡而後終人謂揭氏有後君字伯防少敦朴苦學同舍諸生已成誦出嬉遨君獨坐諷不休夜爇薪以繼必至精熟乃已年十八盡通六經大義肄舉子業試不合有司既棄去取諸子百氏書窮研之攻古文辭侍父入燕都補太學生端方有威儀六館士敬憚之或譁笑方殷聞君履聲輒止是時虞公及歐陽公皆在朝廷交稱君美以為文安慶至正闕年文安薨天子錫金錢百僚皆致賻禭人勸君輸貨縣官而給鹽淮安可獲利數倍且無遺路虞君哭不從曰汯敢玷先君之喪乎至家援禮制儀戚易兩至服闋以廕補祕書郎階承務郎遷翰林國史院編修官轉太常博士再入翰林為修撰仍兼國史編修階三轉至奉議大夫代祀北嶽北鎮還拜江南行臺監察御史未上留為禮部員外郎階朝列大夫十八年奉詔諭江西至七閩會偽漢陳友諒陷江西不得往改僉江西湖東道肅政廉訪司事加朝散大夫治建寧既而友諒兵寇杉關下邵武據延平建寧受圍大軍退保福州城中吏民相繼出奔惟經略使布延布哈尚在君詣與之謀經略聞君至迎曰僉事猶未行耶君憤曰經略何為發此言今盜賊圍孤城正吾與經略致死時也吾死將與此城俱顧獨走欲安之乎經略起問計君為之畫䇿經略歡曰吾志決矣即當如君言部散卒得千人命建寧總管阮德柔將之出戰不利民大讋君集衆告以禍福謂并力禦賊則妻子可生緩將為俘馘語甚切民感泣請各自效無老少悉乘城固守君往來撫勞之分壯者千人助德柔戰屢捷勢稍張城外有山曰黃華髙出城上君恐賊窺見虛實作層樓蔽之命守者煆鐵為長鉤廣儲水樓下以俟衆不知所為及賊據山以火攻樓即以長鉤曵之隨灌以水火尋息復預積濕薪枯秸城下賊穿隧以入燎煙於隧熏之死者甚衆賊揚言攻城西君察其旗亂而氣怠命備城東已而果攻城東知有備驚駭而退是時內外相持逾十旬樵蘇道絶徹民居以炊經略憂以問君君曰士氣在乎作之爾且直壯曲老吾以王師討賊何憂不勝乃槌牛釃酒勞將士以義激之皆踊躍請戰空一城鼓譟助之聲如雷霆賊衆數萬逆戰君戎服出陳後督諸將盡力俄矢石亂下或請少避其鋒君叱曰破賊在今日敢言退者斬於是士卒殊死鬭自寅至午焚其三柵乘勝奔之是日福州援兵繼至賊敗走復延平等三州獲勝兵千餘人咸欲繫獄論其叛逆罪君曰大盜未殄脅從者可勝誅耶誅桀黠者數人悉縱之耕及諸將上功于朝被褒擢君未嘗出口或為君寃君曰吾職耳可徼功乎改江西行省郎中未赴以工部郎中召時淮浙亂道不通留家四明之慈溪挾子樞浮海而北過黑水抵鐵山卒遇倭寇同行多被害君脫走趨遼東轉之山東制下升祕書少監階中順大夫而齊國忠襄察罕特穆爾在洛遣使迓君君赴洛留嵗餘承制授刑部侍郎不就二十八年踰太行至燕都未久大明兵圍城七月十八日順帝宵遁明日君覺之遑遑北走樞失君所在號哭而追及于海子橋君罵曰吾死職義也爾來欲何為奮然行弗顧樞泣抱持賔客故人亦稍至遂強掖君歸環立守之君擁衾卧不食樞叩頭流血請所親厚者交進慰解乃起食一餐八月二日兵入燕凡仕者例從南京君至稱疾弗仕踰年反慈溪洪武六年二月八日卒于寓舍年七十四月一日權厝舍西香蘇山之原以某年月日葬某地君事繼母以孝聞撫庶弟有恩六主文衡所得多竒士交友皆當世名人為文敦深簡質有父風務關倫教不為浮豔語集毁于兵存者若干卷藏於家君自視欿然接人和而有禮寡言峻行未嘗有矜大之色雖家人不見其疾言厲氣平居非疾病必冠帶為私書皆端謹可觀初君之曽祖贈嘉議大夫禮部尚書上輕車都尉追封豫章郡侯惟聰祖贈中奉大夫江西等處行中書省參知政事護軍追封豫章郡公諡貞文文成世居豐城皆以厚德稱至文安遂以布衣致位翰林侍講學士中順大夫知制誥同修國史同知經筵事追封豫章郡公而推恩及於二代郡侯之配黃氏何氏郡公之嬪黃氏文安之室李氏程氏皆封豫章郡夫人君起其後又能世其家有聞于時而君之子樞樂復好學問不失儒行當可繼於君嗚呼爵祿之繼可幸致也而繼其文學為難文學可勉而修也而繼其道德為難若君者可謂兼之矣君娶曾吳易三氏曽早卒吳易二氏皆封靖安郡君子男四人棐丑夭其二郎樞樂三女適盛伯剛某君之居慈溪與今晉王傅桂君彥良交君卒彥良持樞狀來速銘銘曰自古有國貴惟世臣匪爵之仍有德有文有元百年中有揭氏位雖弗崇其德可持揭氏之先豈無侯王盛莫與紀靡久卒亡維文安公敦厚凝確際時休明典帝制作德尊望隆震撼四方執造化機闔隂闢陽人止其身公又有子緝其休聲克闡克似豈惟文辭亦有事功建略南藩剪屠姦凶仗義為城奮作士氣章甫申申復地千里褒寵之加非我敢知勞烈雖多乃職之宜邦國殄喪吾能獨存奉身以歸敢汚先君生既有聞歿則有承凡時之人其誰與京天匪私君以彰世德德著穹碑來者咸式故筠西京府君墓碑洪武二年冬十月二十有五日筠西府君以一疾不起聞壽年雖八十有八其州里之人更相弔哭以為義士亡矣吾屬將何所依賴十數里中聲嗚嗚不絶四年春正月六日葬于孝義里戈溪之源其孫鐩以濓知府君最深請張君辰件右功世取文刻碑文曰府君字長卿諱宗元號筠西其氏曰吳吳出泰伯苗裔初遷會稽之山隂唐太宗間有諱翥者以學行聞門人私諡文簡先生先生逺孫少邽咸通初復遷諸暨開化鄉之峽上少邽九世孫泗宋崇寧中復由峽上遷孝義里世有顯人其詳具見譜圖記曽祖蘭祖元祐父護母斯氏府君馮出也孕二十四月而生幼發智如成人蚤喪父事母夫人甚恭黎明至寢所候起居躬進膳羞必待竟食乃退母常戒之曰我有媵侍自足備給使勿勞苦我兒也府君頓首謝及母有疾府君遑遑不自寧夜參半泣禱上下神祗籲以身代久弗驗府君心益苦一夕母夢白衣人謂曰汝夀止於斯今以汝子之孝特延一紀疾果瘳呼圖嚕呼公宣慰浙東聞君之孝辟為奏差受事僅數月嘆曰我母年已耄茍力田以為飬不翅足矣何以仕為竟拂衣而歸日在親側視其顔色為進退厯十二年母以髙壽終府君號慟幾致隕絶服闋雖已久但語及之輒哽咽流涕如新喪見者憫之府君自念父母歿唯教子孫毋析居乃可以繼先志聞浦陽鄭順卿家十世同㸑特往謁焉順卿示以家範數千言府君如獲寶璐而歸力遵行之十有餘年家政蔚然可觀戶庭之間穆如春風人無間言者和氣所感有犬病足其子銜食哺之犬得不死文人競為歌詩美之府君益堅為善之志製家教一篇誨飭剴切洪纎無不及而惠利鄰族之事居多召子孫示之曰天之畀於吾者厚矣脫有餘財可坐視顛連而弗之恤乎吾就地之日近故惓惓為爾輩言之府君晚年耳益聰目益明健步如強年人及見玄孫之生士君子咸集府君危坐中堂一子康髮盡白帥諸孫曽鴈鶩行以進次第舉觴為壽府君抱玄孫置膝上銜杯盡歡蒼顔酡暈望之者謂為神仙中人繪史遂為髙玄聚慶圖以傳後三年府君遘竒疾陽道閉澀不復能小遺醫者云病在隂氣絶藥不能及法當吸而通之其孫曰巨者遽如醫言僅得汙血一勺終不治府君度疾不可為呼家人與訣以義居不分為屬其耿耿猶前志云府君娶陳錢二氏皆先卒繼楊氏後府君亦卒子男子二長庸先卒次即康子女子一適同里斯文孫男四鐩銓鉞巨孫女一花亭黃鏞其壻也曽孫男十源滉濤海汝􅀈治瀚渡淇曽孫女二在室玄孫男橚梓桶植府君性恬沖與物亡忤貌熙熙常如春未嘗見少憂戚之容頗嗜音樂自造短簫長可六七寸遇風日清美輒箕踞而吟之聲振林木而胸中之自信者一假是以泄之故當時之賢者多樂與之逰且惜其不沾一命之祿以展所藴終無以暴白於世然而生受備物之養歿則期功緦麻千指就位而祭雖古之封君亦不過此尚奚憾哉濓也不敏頗嘗獲拜牀下與聞緒論及東出逃難及蒙授館致餼如忘年交府君今不可覩矣俯仰今古惡得無情乎於是掇其大者而製銘曰有夫之嬴如發行之真如家聞之馨如條教惟程孰得而京如影端于形孰得而傾如蟄如繩如彚如蒸如將厯世而𢎞如文憲集卷十八
