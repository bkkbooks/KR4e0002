body:
  text: 文憲集卷十二明宋濓撰題凡六十一章恭題御製文集後臣聞有徳者必有言蓋有徳者和順積中英華發外無非天然之文不待勉强而後成譬猶大化流行融液通暢而萬物發舒各得生生之妙精神充衍無往不在故大舜作五絃之歌湯為盤銘武王造起居之誡皆燦然成文此揚子雲所謂聖人之言炳若丹青也恭惟皇帝陛下統御以來用人文化成天下睿訓諄復惟恐一夫不獲其所天縱聖能形諸篇翰奎壁照耀層霄絢采光被上下萬象動色然而建中於民寤寐弗忘則有虞阜財解慍之歌也夙夜修省常如神明森列左右則湯武盤盂几杖之銘也仁民愛物之心隨感而見布于方策溫潤淵深統貫乎斯道光芒氣燄蓋覆乎六合前聖後聖實異代而同符也臣供奉詞林幸日侍几硯仰瞻揮洒之際思若淵泉頃刻之間烟雲盈紙有長江大河一瀉萬里之勢跪捧而觀殷彞周鼎未足喻其古也太山喬嶽未足喻其高也風霆流行未足喻其變化也蓋由天徳純粹無聲色之好無遊畋耽樂之從聚精㑹神凝思至道形於心聲同功造化非語言形容之可盡也且當萬幾之暇時御翰墨多不留槀見於侍臣之所錄者得若干篇臣竊以為日星昭回于天下飾萬物蒼生無不仰照聖皇之文猶日星也是宜刻于文梓流布四海使見之者咸獲咏嘆文明之化熈熈皥皥相與率徳勵行以為忠孝之歸豈不盛哉於是敬錄如上文與詩凡五巻續有制作復編類為後集云翰林侍講學士中順大夫知制誥同修國史兼太子贊善大夫臣宋濓拜手稽首謹書恭題御製論語解二章後右解論語二章乃皇上所親製以賜翰林修撰臣孔克表者也初上留心經籍以為經之不明傳註害之傳註之害在乎辭繁而㫖深洪武六年乃詔克表及御史中丞臣劉基秦府紀善臣林溫取諸經要言析為若干類以恒言釋之使人皆得通其説而盡聖賢之㫖意又慮一二儒臣未達注釋之凡乃手釋二章以賜克表俾取則而為之克表等承詔釋四書五經以上詔賜名曰羣經類要復裝裭所賜為巻以臣濓嘗與聞斯事請識其左方臣聞聖人之治天下養之以政而教之以道民非養不生非教不明三代以降未有兼之者也欽惟皇上以聖智之資治民之政壹法乎古復慮經㫖晦而人不知道乃釋諸經以教之其為後世慮者可謂詳且備矣克表適際盛時而預執筆承明詔豈非幸哉昔唐之盛時太宗有志於教化而孔氏曰頴達者實率諸儒為五經疏天下至今傳而誦之不廢今上開物牖民之心過於太宗而克表復為諸儒首孔氏可謂世不乏人矣他日是書之傳將與頴達之疏無異則夫聖謨之詳烏可不知所自哉臣故表而出之使後世知類要之書實本諸此也恭題御賜書後昔在乙巳之春臣濓待罪右史三月十五日卧病京師之官舍不入侍者六日上顧近臣黼曰老宋起居何久不見邪黼以病對且言其致疢之詳上憂形於色曰宋起居純飭之士不參以分毫人偽侍予五年猶一日也不知何以而有斯疾乎越一日又問曰病勢稍損否黼對如初越二日又問黼復對如初上惻然曰爾往傳命俾歸養金華山中父子祖孫驩然同聚疾必易愈愈且速造朝國家文翰庶有賴哉二十四日黼至導宣上㫖臣力疾起拜今越翼日陛辭上勅黄門内使出大府金藉以束帛賜之自後候問之使相屬于道時方嚴肩輿之禁自相國以下至百執事皆弗之許特命中書造安車給健丁六人以載此尤異數也二十八日皇太子以舊學之故復遣内臣存問賚以繒幣白金之屬恩意有加焉三十日上道夏四月十七日方抵金華故居十八日具謝表一通進上并致書太子以寓箴規之意上覽之再三喜甚謂太子曰此書汝當日誦一遍復親御翰墨賜書褒答其文則上所自製字乃侍臣代書其外封九字内年月六字及花書則上之親筆也復出官局文綺白繒各一命太子署名緘封遣使者即臣家以賜焉時六月七日也惟上深仁如天厚澤如地凡囿於兩間者莫不同浴神化鼓舞至徳以臣之微亦獲霑被寵榮如此之至竊伏自念臣本一介書生應聘而起即典儒臺未幾召入禁城授太子經由是峻登記言之職賜服金紫先後所承恩數不一而足今以微疴之故又勤宸念眷注優異錫予便蕃此固上天雨露之滋一草一木無不使遂其生成之性而臣區區犬馬之誠所以思報効之者何日而敢忘哉天保之詩曰天保定爾亦孔之固俾爾單厚何福不除臣敢誦此詩以答上賜復追疏遭逢之盛於賜書後示諸子孫俾世世毋忘上恩云恭題御筆後洪武元年夏四月上幸北京五月四日道經下邳駐蹕于東門外設壇具牢醴祭于山川百神祭畢遂升御舟召守土臣四明李侯相親出御筆一道且諭之曰山東故官聽其從宜居處以俟選用相既稽首拜受因復奏曰其有願往南京及旋故鄉者何以遇之上曰卿稽其人數去南京者日予米二升還故鄉者皆給一斛相退奉詔行之嗚呼非聖徳如天一視而同仁者其奚暇念及於此哉越三月燕都遂平懐柔綏徠之效蓋有不疾而速不行而至者矣相既侈兹奇遇裝潢成軸持以示濓濓方待罪國史謹已備錄藏諸金匱復為記其事於左方云恭題御訓談士奇命名字義後國朝之制設中書舍人十餘員開署禁中專掌繕書誥勅書畢赴吏部主事徧詣中書省御史臺大都督府親簽名氏然後頒行湘陰談士奇時官本部主司勲之科洪武十年春三月四日受事於中書舍人忽遇上御步輦而至問曰爾為誰士奇跪對臣吏部主事也曰爾何名對曰士奇曰其義云何對曰臣聞之於師俊美之謂奇曰爾之入仕儒邪吏邪對曰習刀筆之吏爾考功監令郭傳在側奏曰士奇雖吏頗誠慤自持上因命奉御取筆以進書曰夫吏之為奇公以事法以當如律天下他所不及乃曰奇凡二十二言士奇頓首再拜舞蹈而退士奇既黙識之歸紀於簡册復用金書成巻私竊以謂蟣蝨之臣姓名上徹天聽兼之聖謨洋洋戒勅深至真所謂千載一時者矣乃來請記其事以著寵恩之所自臣濓聞之背私之謂公當理之謂法行法當理則不謬於是非處事無私則允合於公正茍能是雖律之天下人將有所不及始可謂之奇丈夫矣至哉聖人之言何其表裏之兼該本末之詳明也哉士奇宜晝夜欽承以奇自負精白一心盡瘁事國庶幾無愧寵靈之施者矣士奇尚朂之哉士奇通法律歴長沙衡陽二府史陞湖廣按察司書吏擢虎賁左衞知事以轉今官云洪武十年冬十一月前具官臣金華宋濓謹題恭題御書賜蘄春侯巻後洪武六年夏六月十又三日皇上幸大本堂堂乃儲君講道之所而諸親王肄業於左右當是時勛舊之子亦聽執經入侍上既至召開平忠武王之子鄭國公常茂蘄國武義公之子蘄春侯康鐸列于階下慰勉再三復勅奉御具觚翰親書二帖一賜茂一賜鐸帖皆八字其賜鐸者云謹承祖業愛爾勤功鐸稽首再拜而受乃命良工用黄綾玉軸裝潢成巻珍襲以示子孫鐸嘗受經於臣濓來請識之臣伏覩國家之遇勳舊義雖君臣情踰父子上下相孚脗合無間蘄國公值四海雄争之初多樹奇功不幸蚤世不得見今混一之盛宸衷憫悼朝夕弗忘既勅近臣經紀家事復令其子習學禁中且以承祖業為朂其恩數至優渥也夫祖業未易承必勤功之人乃克能之聖謨所及正合書中業廣惟勤之義鐸宜拳拳服膺而弗失庶幾上不負君師之訓下可以保前人之功業矣鐸尚朂之哉鐸尚朂之哉帖傍書康二子者以别與茂也二子鐸與其兄鑑鑑今僉廣西䕶衞指揮使司事云九年秋七月二十二日翰林學士承㫖嘉議大夫知制誥兼修國史兼太子贊善大夫臣金華宋濓謹識恭題御制賜給事中林廷綱等勅符後洪武十二年正月二十一日上御奉天門權給事中林廷綱等六人以歸省其親為請上欣然可之明日陛辭上親制勅符諭之且命人各書其副以歸廷綱等咸叩頭拜受而退既而廷綱嚴裝成巻以示臣濓請識其左方臣聞古聖君之待重臣當授職之際必告之以言如堯之命九官周康王之誥君陳者有之矣今廷綱以初試職之小臣而有此賜誠古所鮮有也小臣膺此賜或有之然昔時訓命之辭多作於代言之官如廷綱之賜出於上所親製者無有也親製者或有之求其誨諭諄切期望深厚猶父命子如廷綱所被者無有也嗚呼上之待廷綱可謂至矣廷綱宜何如報哉廷綱其去而思乎昔者處乎閭巷而齒乎恒民今一旦至此果誰之賜歟烏可不盡心也上之望廷綱者以忠為先而忠非効一職奉一令之所能盡必也至公而忘私徇義而忘身斯可矣茍徒恃上之寵榮以夸其鄉邦是恒人之智爾於廷綱何取哉是月二十五日前某官臣濓拜手謹題御賜資治通鑑後題元順帝即位之九年海宇晏寧文治誕敷乃開宣文閣設經筵詔翰林諸臣分番進講復出司馬光所編資治通鑑分賜近臣集賢大學士浦陽吳公直方時為大長秋官屬實獲與兹寵榮公既引年歸江南慨念上之恩不可忘命郡諸生宋濓備識之以示子孫濓聞先代典籍遭秦焚滅之後至漢孝文時漸采用之自時厥後遵用儒術竊意簡册流布已久公卿大夫必咸習之及觀東平思王傳王以上之叔父來求太史公書大將軍鳳白不許然後知天下之書尚多藏於秘府雖以王室近屬有不得易見之夫以王室近屬且若是則其他疏逺之臣尤可知矣嗚呼太史公書其褒善貶惡之義多取則於春秋顧乃靳而不許是何漢徳之不宏也哉方今朝廷更化稽古右文公卿大夫孰不知讀太史公書上方以謂歴代之史有資治道者莫備於通鑑一書復出以賜近臣天光下臨衣被萬物聲教所及罔間朔南嗚呼盛哉濓也不敏間嘗上謁於公獲觀此書於存心堂黄綾為褾整飭嚴煥於是拜手稽首而識其後非惟昭公遭逢之盛而使後世珍襲惟謹至於聖代文治之隆有非漢世之所可及者他日太史氏亦當有所采云至正十五年正月望日里生宋濓謹記題魏受禪表後右魏受禪表一通劉禹錫以為王朗文梁鵠書鍾繇鐫字世號之為三絶筆法勁拔如鑄鐵所成葢得蔡中郎之遺意至唐人效之則流於娬媚矣朗字景興東海郯人也史稱其文博而富贍觀此碑葢可見云題梁元帝畫職貢圖梁元帝職貢圖一巻自且末中天竺師子北天竺渴槃陀武興番高昌及建平蜑臨江蠻凡九國前圖使者形狀後列其土俗貢獻歲月而各國咸如之絹素剝蝕幾若不可觸古誠古矣然猶有可辯者據梁元帝即蕭繹其字世誠武帝第七子也梁書稱其任荆日畫番客入朝圖名畫記遂因其説亦云畫職貢圖并序外國貢事又據裴孝源公私畫錄所載梁元帝畫六巻並有題印而無職貢圖又云職貢圖三巻江僧寶畫乃隋朝官本上有陳梁年號後來議者謂裴貞觀中人官為中書舍人距繹時尚未逺其言當可徵洛陽任子羔一祖裴説而駁史氏之妄踰數百言則此圖已不能定於何人所作矣况繹以湘東王鎮江陵與岳陽王詧互相攻戰曾無寧日詧遂降魏魏遣柱國于謹取江陵繹焚古今圖書十四萬巻歎曰文武之道今夕盡矣繹尋遇害竊計其時繹亦何暇娛情於繪畫之事脱誠有之亦與十四萬巻同歸灰燼矣惡能至於今日哉此濓之所未喻也又據李龍眠手帖云梁職貢圖首虜而終蜑凡三十餘國而所謂三十餘國又皆不與史合自晉氏渡江南北分統北虜豈能越海而來貢邪嗜古之家又謂此圖唯傅正字欽父所藏者為真首河南而終狼牙修凡二十二國其國與龍眠所言又有同異且似疑龍眠首虜之説而易虜為魯魯乃伯禽之裔東表元侯之國四夷之中亦豈有所謂魯邪今以此巻較之傅本又絶不同均號職貢圖而乃復參差如此此又濓之所未喻也又據此巻題曰梁元帝畫每段所寫土俗貢獻之事則云陶學士書豈繹畫此時特留餘地而候陶之書邪此又姑置之陶自䟦其後初書廣順三年云云中間字多糜爛不可屬讀後復書云夏五月二十九日汴上雨中書北海陶穀時具位珥貂三載也據陶名穀字秀實邠之新平郡人邠即豳也古在雍州之域漢屬安定北地郡漢末置新平郡今易北地為北海亦當有其説邪陶起家校書郎在周為翰林學士入宋歴禮刑户部三尚書遷承㫖年六十八卒贈右僕射陶嘗自言頭骨當珥貂因人笑之自悔不復言况在翰林日初不珥貂安肯自書以衒人耶陶博學善記以辭翰擅一世今所書字形體窘束絶無俊逸之氣頗類書經手所為觀其書佛作仏壻作聓葢未能猝變者此又濓之所未喻也然其畫意渾璞而無世俗纎陋之態固不得為真梁物要亦為宋代名筆所作世之粗工塗青抹紅以欺人者見之必循墻而避矣濓與王君子克同觀青溪上偶因吻創在告援筆題之不覺其辭之多也題唐太宗哀册文後天台詹君國器嗜古如嗜利近於汴梁市中購得褚登善所撰唐太宗哀册文一卷舊嘗藏相臺岳珂倦翁家後有北燕喬簣成所題定為唐人書詹君既自識其左復請濓一言之濓聞唐故事哀册國之大典也非職載筆至司鈞衡者不敢為之登善自貞觀二十二年九月己亥為中書令二十三年三月丁卯太宗不豫四月己亥幸翠㣲宫五月己巳崩於含風殿庚午奉大行御馬輿還京師當是時登善秉政中書緝熈帝載者已九月哀册必屬之葢無疑也此巻當為命藁之第二故於二十三年下闕歲次己酉五月甲辰八字嗣皇帝下不書治字家傳縉雲下無高祖配天一人有慶八字遡悲風於長下缺術字然特其缺文耳徵之大詔令蘿圖琬琰集文粹文苑諸書其更改又各有同異殆不能悉數也濓竊按正史雜史咸謂太宗以八月庚寅日葬與大詔令等書並同庚寅則八月之十八日也今獨云庚子則是月之二十八日不知何以有一旬之差將史悞耶或藁本之筆訛也嗣皇帝之名不書懼凟也其理固當太宗之崩既書二十六日己巳矣年月甲子初何足隱諱而懸空之耶尤有不可得而曉者相去七百餘載其事不可臆度未可以遽言也若論字畫當為登善所書登善初師虞世南晚入右軍之室故唐之能正書者僅二十八人而登善居三四之間此巻溫潤似虞其結體則多法右軍世之人徒見登善所書或與薛稷類者遂疑之殊不知先哲有兼人之才而其作字初不拘一體張顛善草書至其小楷極端謹有法傳其學者唯顔真卿得之爾觀登善者宜以是求之簣成雖號能鑒古其言似不足徵也國器尚永寶之孔氏譜系後題神明之胄莫盛於闕里孔氏宜其文獻有足徵者今竊觀其二家譜牒則互有得失姑舉其一二辯之一譜云順一名謙生鮒騰樹鮒生隨騰字子襄生忠忠生武安國武生延年延年生霸霸生福福生房房之從弟某生尚安國生卬卬生驩驩生立立之從弟吉生何齊樹一作祔生聚聚一作彦生臧臧生琳琳生黄茂茂生宣一譜云謙生鮒滕樹祔鮒生育滕生彦貞彦生成貞一名忠生武武生安國延年延年生霸霸之下不甚殊安國生黄卬茂黄之曾孫尚生疇疇生賢卬生驩吉驩吉生立何齊立生元元生子建茂生宣樹三傳至琳其後不書祔生最最生讓讓生員據前譜言之則安國與武為兄弟黄茂皆琳之子而驩吉為兩人尚乃霸之曾孫樹即是祔聚一名彦實樹之子也據後譜言之則延年與安國為兄弟黄茂皆安國之子而驩吉只一人尚乃黄之曾孫祔即非樹彦實滕之子也濓竊考之後譜謂武生延年安國者據史記前譜謂忠生武安國者據家語及前漢書固各有所依憑第司馬遷與安國同時而班固乃出遷後家語亦漢之諸儒所錄似當以史記為正也孔叢子云子國生子卬子卬生仲驩子國安國字也太史公云安國生卬卬生驩皆不聞言驩吉者非特此也漢成紀綏和元年二月封吉為殷紹嘉侯三月進爵為公恩澤侯表綏和元年二月孔何齊以殷後孔子世吉之嫡子封紹嘉侯或者雖疑父子不應同封而吉固自為一人明矣漢劉琳府君碑鉅鹿太守孔尚撰尚自言承曲阜伯之裔自伯魚至武十世無封曲阜者唯安國有之尚為黄之曾孫亦無疑者若鮒雖與祔同音蔡文侯昭侯相去五世皆名中古人尚質未必若是拘拘有以二字音同而疑無此人其亦過哉孔氏五十五代孫克仁以譜圖未備有志於纂修之事間請濓撰序以冠篇端濓恨讀書不博兼之老嬾多病舊學廢忘無以䆒知其詳因畧疏所聞綴之巻末孔氏孫子以學行知名者代有其人而克仁亦以文章家自顯幸為起其疵繆焉濓既為孔君題闕里譜系一書復謂之曰孔氏傳至四十二代光嗣遭孔末之難末乃灑掃户孔景之後欲冒襲封於是盡殺諸孔氏時光嗣為泗水令其妻張夫人生仁玉始九月夫人遂秘養之及長再襲封卒贈兵部尚書兵部生四子曰宜曰憲曰冕曰朂今之南北裔如曲阜之崇聖苖孔二村所居及若古一名傳端友端朝之遷衢端植之遷鄂琯之遷撫瓚之遷吳興皆其子孫固不可以不謹其傳而於正外二支尤所當明辯之也頗聞前軰言元貞二年二月官中所定户版闕里正支為户凡一十有二分為五位所謂五位者則太子中舍國子博士中散大夫侍郎襲封也若外院孔氏乃闕里子孫灑掃户每歲輸入祭祀錢者其為户凡三十有一分為五院所謂五院者則宅上洙泗三傳文登寧陵也子宜述其事庶幾他日有所於考而無涇渭混淆之患孔君曰此克仁之志願為我續書之辭不獲命復為附麗題識之左以為後來纂修者之一助云題孔氏所藏先世誥後宋制差則出勅除則給誥誥有奬勵之言而勅但書所授職事而已然誥則用綾其所識印章文臣則吏部武臣則兵部王公命婦則司封加勲則司勲及元豐官制行四選悉用吏部而兵部唯施之於藩官若差勅則書以白紙而用中書門下印印之今觀金部郎中孔毅父所受誥猶可以考見當時故事也然而多歴年所兵燹屢更而子孫得以保守不墜其亦君子之澤也哉金部九世孫善夫裝潢成巻求題於濓濓之所欲陳者雲林先生危公已備筆之矣謾畧著其説而附氏名于左方云題周益公所藏歐陽公遺墨後歐陽公譜圖序作於至和二年乙未後一百三十一年平園周益公得公所具檢藁一段并嘉祐八年癸卯夜宿中書東閣詩八句聨為一巻詩陰有中書所錄裕陵出閣親揮兩行亦不棄去而附見之且各題其左而識以中書省印者三巻首又識以益國之章其慎重之意至矣平園與公皆廬陵人故平生所敬慕者於公為尤切文學政事皆欲並之非止寶其字畫而已也其後奉常質行定名特與公同諡文忠可謂能遂其志者矣然平園題此巻時乃淳熈十二年乙巳方秉政樞廷至十四年丁未之二月始登右揆其借用中書之印當在此時葢宋世雖得以官印識私藏若非親蒞其官則亦不敢僭用之也若論其封爵則自十五年戊申因明堂加恩初封濟國公十六年己酉正月進左揆再封許國三月拜少保又更封益國其封益國乃在題巻五年之後巻首之章必後來追而識之也今詩及譜圖序並見居士集十三巻與六十二巻中其文皆同唯詩改空作徒為稍異爾裕陵為光國公時名仲鍼及賜名頊乃加忠武節度使同平章事而封王矣其事正在公東閣賦詩之年九月辛亥平園之題實與史合或人弗之察著為文辭謂為十月者其悞多矣金華宋濓再拜謹記題朱文公自書虞帝廟樂歌辭後朱徽公提舉浙東嘗行部至三衢大虞呂氏適為衢府法曹遂往見之公為寫虞帝廟送迎神樂歌辭以贈葢公劾台守唐説齋其疏凡六上説齋方除江西提㸃刑獄朝論遂掇其職畀公公以言不行即日解印綬去此辭之書正在衢聞命之時豈堯舜君民之志弗遂而有所遐思者歟或云别自有見亦未可知也此帖出於立齋王剛仲所藏立齋初從劉撝堂游而卒業於北山何氏考其淵源之正實有所自故其寶愛尤為深至云題黄文獻公所書先府君行實後右黄文獻公乞銘於柳文肅公之狀文獻公以學問文章名天下此雖造次所書而考據精詳倫序不紊事信而辭實言遜而禮恭皆可以為法不特字畫之羙也濓嘗執業二公之門於是二公之卒已久矣永念今昔撫巻慨然題王魯公授少保致仕誥右宋王魯公特授少保致仕誥一通係紹熈元年五月一十二日所降者葢孝宗淳熈八年辛丑八月魯公由樞密使拜相十五年戊申五月以觀文殿大學士出判衢州㝷即奉祠十六年己酉二月光宗受禪八月魯公以母喪致疾而薨故年仍稱淳熈十六年至十二月始詔改明年為紹熈元年是為庚戌之歲誥之出給合於魯公未薨之前乃在既薨未閲月後何耶宋自宣和以來未有既死而乞致仕者南渡之後禮文凋喪雖宰相輔臣考終於位其家已發哀即服降㫖給賻方上謝事之章而朝廷復為之告廷出命如其未死時此最有乖政理其後吏部郎嘗以為言終不能行而止此誥未免循習當時故事而未之或改也者不然誥中所謂尚克全於徳履及益高冲致永介夀祺之語皆生前事何故追而書之其為後來補授制勅當無疑也惟魯公忠君孝親大節偉然故其相孝宗獨至八年之久同時秉鈞軸者唯梁文靖公前後七年可以配之餘人皆所不及謂非得君之深者可乎葢必有其道矣魯公五世孫葯雅飭君子也持巻索題甚切㑹病痁新起精神昏昧謾掛漏而書之洪武十三年八月己未朔前翰林學士同郡後學宋某謹識題張尚書具慶堂巻世徒知父母之存為具慶至若人子能發聞于時以顯榮其父母父母雖殁而有不没者存孰不為之慶幸斯亦可以謂之具慶君子識之而世人未必能知之也錫山張君惟中以碩學雄文致位大宗伯海外蠻夷無不知其姓名其弟所安又能慎守先緒敬其兄如敬父兄宦京師數來省候之久而後去猶依依不忍别士大夫咸指曰是兄弟也良可謂不死其親矣故入其庭升其堂者榮光休氣浮蕩於後先儼若二老人龎眉鶴髪據筵笑語此無他名不死則其身如不死矣為其婣連為其僚友莫不慶愜于心豈獨其家之子若孫哉不然則父母雖存名氏不出於里閈聚散日逐于齊民縱曰不死與死相去葢無幾雖日有三牲之養其為慶也隘矣惟中伯仲舊以具慶名堂近歲父母亡墓上之木已拱猶旦旦念親如存若具慶時每謂人曰我父母未嘗亡也嗚呼可謂能孝也已濓與惟中交最密不翅異姓兄弟故探其志而疏之以附送所安序後云題周文矩畫狄梁公諫武后圖右狄文惠公諫天后圖相傳為長安周景元作以筆法重輕較之葢建業周文矩爾非景元也予於秘府多見二子真跡故敢鑒定若此未知賞識之家以為何如也若夫狄公拳拳存唐之忠史書之天下士大夫皆能道之予尚何言哉題新修李鄴侯傳後余讀歐陽子等所修新唐書事多舛繆如紀中載膠東郡公降封縣公而傳中乃稱郡公傳中叙天平節度四人而紀中則云七人此猶可也宰相載於世系表而于惟謙相中宗鄭綮相昭宗武什萬相武后乃皆棄而不錄此猶可也觀其述作繁者失於支蔓畧者過於簡率以致渙而無統鬱而弗章則其所繫者重矣劉昭舊史義例無法固不足責豈意新史亦復爾邪吳縝糾繆葢不得不作也有若李泌在唐建謀猷輕爵祿髣髴漢之留侯新舊史皆畧其事且譏其好縱横大言以鬼道媚人主取宰相何其悖耶晉王府長史朱君讀而病焉因據泌之子繁所錄家傳十巻參考羣書倣前賢删正陶潛諸葛亮二傳芟繁摭華重為泌傳一通泌之事始大白於天下後世嗚呼微朱君泌不銜寃於九泉之下乎然而唐史之謬不止於此而已縝之所未糾者尚多朱君宜推類以盡其餘哉余繼修元史及皇明日厯朱君皆與其事余見朱君有良史之才故為題識傳後而屬望之如此若余之耄則無能為矣朱君名右字伯賢天台人題柳公權書度人經後正書之擅名者自魏鍾繇而至於宋僅得四十四人而唐柳誠懸實錚錚乎其間則夫墨妙筆精有不待贊矣其入宋秘府凡六帖而書度人經者二此巻特其一爾是經乃晉宋人偽作至誠懸時相傳稍久故信而書之近代紫陽方回則謂五季蜀王建時道士王喬始造且確然弗自疑不幾於甚可笑歟使回見誠懸書此吾知其顙有泚矣題陳忠肅公疏文跋語後七峯居士諫議陳公因上書論日錄事有忤曾布出守海陵尋謫武夷祠官未幾除名勒停編管宜春崇寧二年正月移合浦三月五日過長沙興化寺遇神宗忌日於是依浮屠法運轉經藏造疏六千言以薦嚴事疏文用駢儷體恐不足以盡意仍以散辭分注其下首序請改實錄言蔡卞者九事非國是者七章其餘辯布之姦凡所以尊私史而壓宗廟者無不縷列既燔告神皇在天之靈是月十五日復以别本綴于元豐中王安石所貽手帖之後又假設臣布引咎之辭作䟦語繫之且手書二通一遺其姪正裕一寄其甥李進祖俾秘藏之身死之後出示親戚朋友冀幸有知之者葢公嘗自謂家覆身亡如浮漚起滅不足深計唯神考十九年駿烈茂功受誣羣小為臣子者不得不辨故其所著之書曰日錄不合神道論曰辨誣論曰尊堯集曰自撰墓志墓志述因日錄殺身之由其言至一萬八千有奇而語尤哀切然而諸書大扺皆疏文并䟦語中意也嗚呼公之愛君尊主之誠耿耿弗忘如此真所謂忠精貫日月者矣烏傷王君禕其八世祖永年令仙居時而公之冢子正彚實為尉交契之深遂以其女歸仙居之子嚴州司法儔今王君家藏跋文正假託臣布引咎之辭豈或正裕所秘藏者而正彚出示於親戚歟今去公造此文時已歴二百四十二年中更水火兵革靡所不有區區一紙之微初非所謂金相石質乃能傲兀無窮世變手澤如新殆造化者使神物䕶持昭示來裔以遂公忠憤之志而永曾蔡之惡於弗磨也吁可畏哉王君與濓為同門友而義若弟昆間以相示因忘其孤陋而僭書之若夫君子小人進退有繫於家國安危者史臣褒貶已有定論兹不復勦説云題天台陳獻肅公行狀後濓過濠梁天台王公完出考亭朱子所撰陳獻肅公良翰行狀徵濓題識朱子之文古今共尊何敢贊一辭若公事行或有闕遺亦學者之不可不知也按宋孝宗實錄云乾道五年十二月樞密都承㫖張説奏請置酒延諸侍從上許之説退約客獨兵部侍郎陳良翰不至説殊不平上遣中使賜以上尊珍膳説因附奏臣奉㫖集客而良翰不至是違聖意也已而上命再賜説復附奏良翰迄不肯來夜漏將上忽報中批陳良翰除諫議大夫坐客皆愕然此與唐𤣥宗時宋璟却王毛仲事正類非有剛直之操者孰能與於斯哉夫自姦檜主和議而史浩湯思退繼之牢不可破孝宗恢復之志雖上通於天終莫之遂不主和者惟張浚胡銓張闡張震及公等數人而已公平生大節此最彰著故朱子特詳列之而舍拒説細行亦紀事之體當然耳然而朱子修通鑑綱目璟之事何嘗不載况孝宗之知人賢於𤣥宗逺甚亦法所合書豈當時弗知耶抑偶忘耶實錄舊藏元之内府革命後竟不知所在狀中既不收修宋史者復失於采輯周公謹紀孝宗聖政雖曰具錄又誤指為同時從官陳良祐事濓恐後人無所考焉特為補闕授諸公完使藏焉公完字繼逺公之七世孫今出後王氏云題趙魏公書大洞真經此巻乃趙魏公六十三歲所書至精至妙非言辭贊美可盡葢公之字法凡屢變初臨思陵後取則鍾繇及羲獻末復留意李北海此正所謂學羲獻者也舊嘗獲見周侍御家侍御既坐貶竄竊意必歸天上不知復流落人間今得披玩累日抑何幸哉殷卣周彞可得而此巻不可得博雅君子尚思謹秘而傳焉題趙子昻馬圖後趙魏公自云㓜好畫馬每得片紙必畫而後棄去故公壯年筆意精絶郭祐之作詩至以出曹韓上為言公聞之微笑不答蓋亦自負也此圖用篆法寫成精神如生誠可寶玩也題趙子昻書招隱巻後右趙魏公所書招隠士一篇公自大徳三年八月改集賢直學士行江浙等處儒學提舉至七年十月已閲五載而公年亦五十矣鄉先生方君夀甫從其父巖南翁游杭提舉官署時寓於杭府故先生得見公而請書此巻也巻左有翰林待制柳公長薌山長吳公題識二公皆濓所嘗師事者九泉不可作矣披玩數四不覺淚落紙上題北山先生尺牘後右北山何公與其弟子魯齋王公手帖北山平日執謙特甚人有來學者雖誨之無不傾盡而未嘗受其北面之禮此書之稱再拜稱尊兄者猶可見也元思姓汪氏名開之時法先生之孫魯齋少與之同學嘗取論孟集義别以鉛黄朱墨以求朱子去取之意而精於四書之學者伯誠姓張氏名潤之自號思誠子登北山之門埀三十年其微言奥㫖莫不盡聞焉二公偶出北山念之形於簡牘間則其於師友之道可謂篤矣王子文名埜嘉定十三年進士襄蜀事急議遣使講和宰相依違不决史嵩之帥武昌首進和議子文時為樞密院編修兼權檢詳謂今日之事宜先定規模并力攻守士論韙之北山雖居山林而憂國之切故有廟堂議和子文除擢之問則其厚於君臣之義又何如哉夫以北山之學承朱子再傳之緒造詣真切踐履純固而其見之翰墨雖出於一時皆有關於世教有益於人倫似無斯須不志於道者也是誠何可及哉朱子之書盡編者以時事出處問答分類而通載之凡四十一巻約一千六百八十餘篇濓每疑其太泛魯齋之所選北山之所定當必甚精惜乎未及見之也因并識之以為寡陋之愧云題潘内史贈别墨本太康陸君子賡喜佛氏言以内史舍人潘佑贈别序文能發明先佛遺義近於白下得墨本承以匡廓緣以色繒揭寘坐右以自省間徵予識佑事於下方按佑幽州人能文辭與徐鼎臣齊名仕於南唐自秘書省正字累遷中書舍人當後主時國事日蹙佑極憤切累疏論列至謂不能與姦臣同事亡國之主張洎從而擠之後主乃收佑屬吏佑遂自剄前史馬元康誣佑溺淫祀左道斥為人妖陸游作南唐書能辨其妄固為甚當及游論佑則譏其學老莊齊生死故其上疏若惟恐不得死者則又未免涉于深刻也人之所欲莫甚於生雖愚不肖之人亦不輕以畀人况賢智有如佑者乎直以忠義所激乃視死如歸耳佑之死其心無白之者鼎臣作江南錄亦没而不書及藝祖命曹彬南征指殺佑為殺忠臣於是其事始著于後世於戲為人如佑尚不免議者之口人之不樂善乃至此哉王介甫嘗作文評鼎臣至於游之所論未有指其非者故因子賡之請而極言之清源王古删晁明遠諸書為道院集要全載此文以簡牘為簡牋􅀢芥為􅀢芥窘束為跼促亦微有不同要當以石本為正題許先生古詩後文懿先生許公嘗賦秋夜感興詩一十二首錄寄其友吳公正傳至元末吳公自建徳尹入教國子既已謹志其事俾陳監丞衆仲題於巻後他日閲篋衍又得先生遣興詩十首吳公手鈔綴于前巻復與衆仲各有論識衆仲之言病夫世之論詩有儒者詩人之分而謂先生獨能兼之可謂知言而無復遺憾者矣龍泉章君三益久慕先生之學近獲此巻於吳公之子濬仲將琢石勒寘龍淵義塾以濓頗與聞先生之道請申言之夫自陳伯玉倡為感遇詩三十八首而李太白繼作遂衍為五十有九君子稱其得風雅之正至於文公朱子感興之什其數比陳僅餘其半方之於李則將闕其三之二言辭固若不多然於太極陰陽之微家國治亂之由異端害道之故無所不及非唯二子不能道之黄初而降大厯以前吾恐未有臻斯理者也今先生之詩其音節則倣二子而絶仙佛之誕其㫖趣則本文公而寫性情之真雖言無統例與朱子少殊而其寄咏之深隠憂之切實有出夫二子之外其於傳世固無疑者而濓於衆仲之言則不能無所感焉詩文本出於一原詩則領在樂官故必定之以五聲若其辭則未始有異也如易書之協韻者非文之詩乎詩之周頌多無韻者非詩之文乎何嘗岐而二之沿及後世其道愈降至有儒者詩人之分自此説一行仁義道徳之辭遂為詩家大禁而風花烟鳥之章留連於海内矣不亦悲夫於是衆仲之殁已久而吳公亦不可見無從質正始因三益之請為書其末以足衆仲之所未言雖然濓之語激矣夫豈知詩者哉題金徳原和王子充詩後右徳原金先生所和子充王君詩凡一百九十韻時子充在金陵因黄主簿之官烏傷作詩餞之遂於鄉中舊游深致意焉詩止一百二韻凡增多八十有八者乃先生引而伸之也濓嘗力疾起讀非惟波瀾浩渺不可涯涘而其念鄉學之美思官政之治實有得古人風勸之義視彼摭華摘豔取合於一時者不翅天淵之懸隔矣昔者柳柳州同劉賓客述舊言懐寄澧陽張使君五十二韻之作因其韻增至八十通贈二君今其詩尚存要不過流連光景歎悼無寥者之辭耳雖其觸類盡意不厭其多與先生畧同至於有關世教足以增夫彝倫之重則識者當謂先生之詩為不徒作也先生氣雄而言腴發為文章尤雅健有奇氣又不但長於詩而已先生為已之功深不自表襮惟濓知之為獨至故題諸詩後以志慕豔之私云題呂仲實詩後右呂忠肅公詩一章為蒲圻魏君觀作初公為集賢大學士因為議錢幣事與丞相托克托不合翩然東歸葢至正庚寅十月二十日也後四年甲午二月起公為湖廣行省左丞㑹天下兵亂道澁不能前至十二月八日始抵治所是時已有中書左丞之命明年乙未正月二十九日使者至閏月十三日即上道故詩中有左丞兩月餘及今又入中書之句又二年丁酉三月十一日而公薨矣惟公蚤師蕭貞敏公傳道徳性命之學真知實踐故其立朝大節極有可法篇章散落於四方者固宜寶之如魯敦周彝傳之於子若孫也濓與魏君交甚洽故畧疏公出處歳月於詩後使讀者或有所考焉題王黄華詩藁予在江乗偶得黄華山主黄庭筠子端詩槀三首一首絶句次彦高問疾韻二首七言律次許子靖題光華堂韻彦高當是翰林待制吳激乃王履道外孫米元章之壻也筆法遒勁得於婦翁為多許子靖名安仁大定七年進士歴禮部員外郎出守高平後以汾陽軍節度使致其事二公皆當時知名之士子靖登第葢先子端九年而彦高與子端之父遵古游尤號前輩今觀其勞問酬答所以敦忘年之契甚至此在二公固為盛徳而子端文采蘊藉為一時之所景尚者於斯亦可槩見矣子端熊岳人官止翰林修撰字法初倣元章謫鄭州後氣象横放自成一家予甚愛之故識其後持歸金華山中以示子姓之嗜書者或曰彦高與子端相去頗逺恐或别是一人余亦未能深知之也題王庭筠秋山應制詩藁金源之制每歲以正月如春水九月幸秋山五日之間羣臣一進起居表其嚴慎如此之至者志非在於田游將欲修兵政而紓民賦也道陵如薊門至秋山河東王庭筠以翰林修撰扈從左右應制賦詩三十餘篇甚被奬眷葢自大定以來累洽重熈文物聲名可擬漢唐故其一時君臣遇合天施地受雨露無際緣物引興浹于太和此乃金極盛之時奈何盛極忘治貽謀匪遠僅一再傳翠華遥遙南狩而秋山者則已委於沙塵烽火之區武元文烈諸孫雖欲求一乳而射之尚何可得耶觀庭筠之詩而感慨係之矣自當時言之孰不效上林羽獵以侈大榮觀而庭筠乃能以秋山不合圍為風則庭筠者亦良士也哉此巻庭筠所具之藁惟十四首而逸其大半詩序中所謂九日正泰和元年九月丙辰然道陵以是月七日甲寅發京師二十九日丙子至自秋山道途所歴凡二十有三日其幸香林平頂山溫泉等什皆可以次而推至若牡丹酴醿松影三詩則不知作於何時按庭筠以明昌三年供奉翰林五年八月遷修撰未幾謫鄭州防禦判官承安四年復起為應奉翰林文字泰和改元又轉修撰明年遂亡夀甫四十七爾詩既題曰奉㫖而作雖不能必於何年其决在禁林之日矣題危雲林訓子詩後古之人教子多發為聲詩何哉葢詩緣性情優柔諷詠而入人也最深韓昌黎之子符讀書城南嘗作詩送之曲盡其意至今讀者猶蹶然興起豈曰小補之哉雲林先生危公冢子某字於幰自檢討奉常遷佐蘇州先生時辭嶺北行省左丞獨居房山聞於幰將之官賦四言詩一章勉之嗚呼先生之詩固無愧於昌黎而符能讀父書䇿名南宫今於幰以明經擢進士第君子亦竊謂似之或言古今人不相及者其果可信歟雖然先生所作於修己治人之道反覆備至是有關名教甚大不特可施於訓子而已其視誘之利祿而以惜居諸為念者又為何如哉知言之士必能辨之題鄭北山追復誥後故責授濠州團練副使鄭忠愍公與責授秘書少監分司南京贑州居住孫近同奏復資政殿學士其日乃紹興二十六年之正月甲子距秦檜之死纔四月耳今勅後云二月九日乃誥下之時也所謂良臣姓魏氏該姓沈氏奏與逵則周趙二人也㑹予有千里之役始獲見此巻走筆識之殊不暇詳若夫公之大節與賊檜之姦諸先正己極論之亦不待詳也題顧拙軒誥命後右拙軒先生顧公誥命一通公諱周卿字成子仙居人嘉定癸未賜進士及第任慶元府奉化縣主簿階修職郎故事修職郎滿三考關陞令錄先以合入階官給誥公遂入從政郎久之始注授監嘉興府鮑郎鹽塲差遣然舊制無從政郎崇寧初以通仕郎易錄事參軍縣令至政和中復改以今名乃選人七階之一也此告之首當有十幹暨千文紀號若曰甲天等字第幾之類其尾復欠紹定五年七月十三日下十字其背紙又當書行在官告院凖鈔出給及寫告楷書當行手分令史主事等名氏而守當官批上本官告命照㑹亦繼其後歴年之多皆未免殘闕爾吏部主事碩公之六世從孫琢玉為軸重加裝褫持以相示故為詳書之以備當時典故云於戲世家舊室何處無之未一再傳不知祖諱者有之矣如碩者豈非賢哉豈非賢哉題趙模千文後左右内率府錄事參軍趙模集右軍行書為千文模在唐有能書名嘗與韓政諸葛貞馮承素等奉勅臨摹蘭亭逮今猶有存者予於秘府頗見之最喜其善用筆而正鋒恒在畫中所以度越諸人也歟此本係鮮于奉常家藏者神采尤沉著不露可寶也題褚書千文褚遂良書見於石刻者世亦甚鮮况其真蹟乎今觀所書千文柔勁險媚真如鐵綫縈結而成或者評為柳誠懸所臨禇書似則似矣其入神處恐非誠懸所至也朱悦道文藁後題右烏傷朱君悦道所為文一巻予讀已愛其理明文順顧謂二三子曰辭章之弊久矣梔蠟為葩以逞妖艷非不眩人目睛比之元氣流行千紅萬紫徧發洛陽名園固自弗侔何也生意之動盪與死色之不澤者其可以並論也哉葢古人之於文以躬行心得者著為言言有醇疵但繫乎學之淺深爾後世則不然以文學文皆億度想像而為之知道君子未嘗不一笑擲之也今悦道之文論議必本諸經而翼以濓洛關閩之説既履康衢矣長安雖逺惡有不至者哉其視顛連榛莽之蹊而虎豹蛇虺縱横交於前者奚翅萬萬悦道非惟見諸空言又思踐履以驗之此尤度越於人人予雖留意於文造道不深而出言多疵深有愧於悦道雖欲痛自懲刷而秋髪繽紛被肩矣惜哉予期悦道甚逺悦道氣宇清粹誠足以副予所期他日道明徳立而文益昌予當在知言之列無疑故錄與二三子言者題其巻後云題永新縣令烏繼善文集後世之學者必有師雖百工伎藝之微亦必有以相授然後能造其閫奥况為文者發造化之秘貫今古之統茍無以管攝而闔闢之則何以盡其變化不測之妙其不傳之於師奚可哉吾鄉修道先生胡公以光明正大之學發於精深嚴簡之文訓廸學子篇章句字皆有法往往從之者多得文之㫖趣其所造固有淺深高下之殊而體裁終不失於古四明夢堂噩師雖居浮屠中能久與先生游先生為文之法實與聞之烏君繼善自㓜學文於夢堂凡先生所指授者悉以語烏君故烏君之為文峻潔如明月珠起伏如春江濤因語二三子曰必如烏君然後可以言文也若無師授其可易致是哉予嘗譬之有美錦焉使朝市縫人製之則能中度而適體委於巖穴之粗工則左低而右昻上侈而下斂錦固錦矣其如不合何文之無師授者亦若斯而已予老且多病文字一切謝去不作縱有一二多仰手於人獨喜烏君之文親題後而歸之嗚呼予生也雖居先生之鄉而不能傳先生之學其於烏君又豈能無慊於中哉烏君名斯道繼善字也明之慈溪人嘗知化之石龍縣今調吉之新水其為人溫然如玉蓋與相稱云題栲栳山人詩集後餘姚岑公靜能志節之士也其居鄉也人皆敬而憚之是何也其出言可為世則其制行可為世範所以名閥之家雖至凋瘁多藉之以自立崛起寒微之軰縱富埒公侯亦不為凌躐之事設有之往往私相謂曰岑先生莫知之乎復退縮不敢吐氣或者不知徒謂公為詩人嗚呼公果詩人也哉廣西部使者虞㤗魯瞻其鄉中子也力請予題聊紀公之賢行以示讀公詩者題鮮于伯機所書蘭亭紀後鮮于奉常公嘗見葉秋臺書反覆諦視至欲下拜秋臺之書人頗譏其陋公獨知其用筆之妙字學雖淺藝非功力精到亦不足以相知况其他者乎予藏公所書濟石硯賦自謂可入妙品今觀此巻實可與之抗衡非真知書中意者未必以予言為至當也題剡源清茂軒記後剡源先生戴公以文辭名天下曾未百年學者鮮有見其全集者予總修元史欲為先生立傳於是白丞相下有司即先生之家謄其文藁二十巻以上至今藏之秘府中書舍人毛君集出示先生所造清茂軒記正在藁中其為真筆無疑葢毛君從祖震卿與先生為忘年交故先生不靳而為之記發明山水之勝分明如畫今之能文者雖多如蝟毛求如先生絶不可得毛君乃能重書以傳亦可謂賢子孫矣哉題危太朴𨽻書歌後學必博而後所見精非惟諸經奥㫖皆當研摩至於𨽻書之學漢魏以來其運筆結繩多不同茍不歴考其變何以充其知識而袪流俗之陋哉吾友危先生太朴作𨽻書歌一篇贈四明汪君大雅備括諸碑之所自且歴疏之亹亹千餘言不休嗚呼世以空虛之學浮談强辨如蠭起泉湧者視此曷知愧哉大雅方以𨽻學知名於時復能惓惓於先生之詩裝潢襲藏惟謹則其尚徳之心為不可及已題東陽二何君周禮義後世有恒言决科之文不足以行逺嗚呼豈其然哉顧其合道與否為何如耳昔吕成公之編文鑑其用意寖精密而張廷堅所著尚書義二篇特載入之與龍圖序諸文並傳四海之中但識字者皆知誦之茍謂其不能行逺可乎東陽何氏宋季多以科目發身内舍生夢申與其弟參知政事夢然所作周禮義各一首皆近道之言較之廷堅未見其不及也五世孫觀光惟恐失墜裝褫成巻求予題而藏之亦可謂孝子慈孫者矣題余廷心篆書後右四大篆豳國忠宣公余闕為浦陽戴君叔能書至正九年公持使者節來鎮浙部濓偕叔能往見公奬厲甚至且各書齋扁為贈公去浙後江南大亂荆楚之域皆為偽漢陳友諒所據公時以淮南行省右丞分治安慶安慶前後皆盗區公獨守六年小大二百餘戰未嘗敗北不幸糧絶城陷公遂赴水死君子稱其大節與日月爭光信哉公文與詩皆超逸絶倫書亦清勁與人相類然其忠義之氣可以懼亂賊清惡厲天地因之以位君臣藉之以定斯豈細故雖所書不工猶當傳之萬世况能臻其妙者乎此紙所在定有神物呵䕶見者當如張中丞之詩段太尉之笏聳然起敬不可徒以翰墨視之公唐兀氏余闕其名也字廷心一字天心元統元年進士世居武威今為合肥人翰林學士金華宋濓謹題題張泐和陶詩陶靖節詩如展禽仕魯三仕三止處之沖然出言制行不求甚異於俗而動合於道葢和而節質而文風雅之亞也他人欲效之者雖衆然樂澹泊則蕩而弛慕平易則野而穢惟蘇子瞻兄弟以雄邁之才氣勢可與之相敵然其辭㫖則亦逺矣豈不誠難乎哉今之和陶者余嘗見數家最後見句容張泐文伯自九日閒居以下皆和之至詠荆軻而止諸四言及形神釋桃源等什則不和恐難繼也文伯産江淮間䘮亂之餘獨能致力學問以追古之作者其有志者哉題太平策後昔成宗皇帝臨御萬方以天下之廣非一人耳目所及羣臣有直言極諫者咸嘉納焉所以來讜議達羣情而成治功也大徳中三衢鄭以吾宿衛禁中覽時政有所缺遺疏太平䇿一綱二十目上之上嘉其忠特命以吾為雷陽教授濓每取而讀之未嘗不仰歎成廟之徳之盛也隋文帝時河汾王通非不以太平十二策奏之文帝不能用通遂東歸續六經以傳學者嗚呼以吾之賢未必能有過於通也上猶采其言而用之使通生於今日則其道必將大行於時六經有不必續矣由是論之不惟成廟之聖非隋文髣髴其萬一亦可以見士之遇合茍當明時雖小善必錄若值猜暴之主縱大賢亦有所不容道之所繫於時者夫豈人力之可為也哉澧陽張君逢喜誦以吾之策嘗手錄之且請濂識之於是不辭而題其後重紀至元元年夏六月十九日濓題題史内翰書右歸去來辭一巻大名史公奕興定五年所書以贈李澥者也公奕字季宏大定二十八年進士再中博學宏辭科累遷著作郎翰林修撰同知集賢院後以直學士致仕文章書翰皆有故老遺風所著洹水集尚傳于世澥字公渡湘人也少學詩於王内翰子端亦工行書不失前軰典型累舉不第而卒然自党文獻世傑趙郎中文孺任判官君謨趙尚書周臣諸公先後疊起風聲氣習濡染為深故金之士大夫多以善書名家觀季宏公渡則其餘葢可見矣季宏性雖溫厚每靳與人書今特為公渡贈者豈非同聲相應者乎宣宗自改元興定之後國政愈非而疆土日蹙古人之文何限季宏不之書而獨拳拳於是辭者意其先見亡兆而殆將隠歟距作此紙時僅踰十年而金社遂屋矣吾黨閲此巻者又當於此求之題朝夕箴後右朝夕箴一名夙興夜寐箴凡二百八字南塘先生陳公之所譔也先生諱栢字茂卿台之仙居人與同邑謙齋吳梅卿清之直軒吳諒直翁父子游而深於道徳性命之學葢自謙齋從考亭門人傳其遺緒而微辭奥㫖堯生得之為多當時有慥堂鄭雄飛景溫軰行雖稍後而事先生為甚謹人以其學行之同通以四君子稱之今觀先生之著此箴本末明備體用兼該非真切用功者當不能為是言鄉先正魯齋王栢㑹之讀而善焉以教上蔡書院諸生使人錄一本寘于坐右則其所以尊尚者為何如哉嗚呼前脩日逺後生小子不知正學之趨惟文辭是攻是溺志亦陋矣濓故表而出之并繫先生師友之盛於其後以勵同志者云韻府羣玉後題右韻府羣玉一書元延祐間新吳二陰兄弟之所集也二陰一名時夫字勁弦一名中夫字復春博學而多文乃因宋儒王伯祿所增書林事類韻㑹錢諷史韻等書㑹粹而附益之誠有便於檢閲板行於世葢已久矣入我聖朝近臣奉勅編洪武正韻舊韻音聲有失者改之分合不當者更之定為七十六韻今重刻是書一依新定次序而字下所繫諸事並從陰氏之舊因書其故以告來學者洪武八年夏五月既望翰林侍講學士金華宋濓記新刻廣韻後題右廣韻一部雕刻已完可模印然自梁沈約制為聲韻以來隋仁夀初陸法言等纂次成編唐儀鳳末郭知𤣥復帥其屬而附益之時號切韻天寶中陳州司法孫愐以切韻為繆畧復增字四萬二千三百八十三雅俗兼收務矜該博且取周禮之義又更名曰唐韻宋祥符初陳彭年丘雍復重修之又易名曰廣韻至於宋祁景祐集韻之出復增二萬七千三百三十一字而廣韻微矣近代書肆喜簡而惡繁集韻罕傳而廣韻獨盛行濓等奉勅校定一遵洪武正韻分合之例布列如左註則並仍其舊舊韻凡二百又六今省為七十六云洪武九年九月壬子朔翰林學士承㫖金華宋濓記題省心雜言後省心雜言一書刻于虎林西湖書院已久序之者謂和靖處士林逋所作世之鉅儒頗疑焉且云逋之所優者詩爾至於法語格言可以埀世而範俗者逋或未之有聞也復定為河南和靖處士尹焞所撰豈不以焞為程門高弟而談理乃其所長耶然而呂稽中作焞墓誌銘載焞奉詔撰論語解之外他無所著書是則以逋和靖之號偶同於焞因嫁此以誣之耳殊不知鄉先達敬巖王公佖所編朱子語錄續類之書其第四十巻雜類篇云省心錄乃沈道原作非林和靖也朱子完經翼傳其言行世若揭日月葢必有所據矣當以沈道原作為正夫以近代新出小書以理度之亦甚易知爾尚或不能詳其所著之人而妄以意見言之况於千載之上者哉噫題易菴巻余聞老易相為用也久矣至於魏伯陽著書明述卦候之㫖而後世丹經咸祖之此不獨形之空言而實見於行事者也冶城道士王君宗懋名其丹室曰易菴吾友危學士嘗為之記復請余跋其後嗚呼太極其鼎爐者歟坎離其藥物者歟陰陽其火候者歟王君當有識於此矣若夫開物成務隨時變通葢出於是三者之外非更僕不能盡也尚容他日為王君言之題甘節巻後地天為泰純剛純柔之卦也節自㤗來則柔自節剛剛上節柔恐其剛柔過盛而無節也故當節之然節至於苦則不能常决非貞之道又必至於甘節從容悦豫而無窘束之意乃為人情之所尚也易之所謂甘節者其大意葢如此鹽城孫君子章僑居吳郡甘節里因以甘節老人自號然孫君篤厚長者居鄉多善行而每事有當節者輒節之自苦以至於甘婆娑嬉游以至終身然亦未嘗過也揆於易卦所謂節者施之一身不幾亦有合歟孫君之子化以能古文辭名世朝廷聞其賢徵為侍儀使名聞之升正騰騰未已是則甘節之亨又當復見於此矣題苦寒詩後亡羊先生多與余論詩大槩以句豪韻險為工此篇法韓退之而尤務出奇者也精於詩者必能辨之題禊帖唐太宗詔供奉官四人臨摹禊帖趙模諸葛貞得其筆意湯普徹得其形似而馮承素於形意二者兼有之此巻精神飛動下於右軍真跡一等其或出於承素者歟題悦生堂禊帖右蘭亭悦生堂本係宋相賈師憲命其客廖瑩中參較定武諸本采字之精善者輯成一帖始命金華良工王用和勒石經一年乃成寘諸悦生堂中尋補用和武階以報之濓按師憲遭竄逐時朝廷命王孟孫簿錄其家石刻蘭亭多至八千匣當時方回奏劄亦頗及之度其所藏者善本必多故廖所采輯薦紳家號為至精先師内翰公嘗摹搨為巻而以趙文敏公所臨者繼其後誠可謂雙絶矣公之孫柳穆能寶此巻於戎馬刼灰之餘穆亦賢乎哉題栖雲軒記後余往年讀劉𤣥靖山栖志見其所載紫岩靈岩勝槩分明如畫時正當袢暑不覺凉颼生肘腋間今年夏六月客有授予蘇太史栖雲軒記記為本菴上士作其狀靈岩之景亦分明如畫蒸溽為之頓消嗚呼因文辭而想見其處雅興遄發尚忘其時之燠炎况親睹嵬眼澒耳之勝者乎葢𤣥靖久栖此山太史亦嘗出游覽故其言真切有足以動人也何文定公跋山栖志有云想𤣥靖一時飛屐上下千峯紫翠間左浮丘而右洪崖其風致猶前日也余今於太史之文亦云若夫雲幻非幻契經多言之茍欲重宣其義非千百年莫能盡他時或造山中當敷座於巒光水影間為上士説法未晚也題夀昌胡氏譜後君子之所為貴乎有徵昔者孔子修五經書斷於唐虞詩起於關雎春秋自隠公始或餘繫以辭或從而定之未嘗敢增益也其慎且敬如此故孔子之經傳百世而人莫能非之及司馬遷作史記逺泝博索於孔子所不敢述者皆采而實之其事雖備而去闕疑之意逺矣其備也適足以為誣何取其能博哉族之有譜所以紀所自出實則為尊祖偽則為誣其先而亂其類不孝莫甚焉近世之士不察乎此多務華而衒博或妄為字名加於千載以上不可知之人或援它郡異族之貴顯者以為觀美其心非不以為智卒陷於至愚而弗悟也夀昌胡氏則不然於既逺者皆不敢有所載獨自其有徵者錄之得十有五世詳親而畧疎考訛而傳信附其遺文及當時所受制命之詞皆蔚然有序是可謂善學孔子者矣嗚呼不知而妄作者其能無愧於斯哉修譜者名榮來京師而以示余者名翰皆善士云題金谿劉氏族譜序金谿劉貫以雲林先生危公所製宗譜序示余且聞世裔之詳卓為其邑之鉅族衣冠文物炫燿江右若其造譜之次第則自十四世祖宗元由南豐來遷之後其八世從祖虚妙大師道正遂建修真觀而於觀側樹祠以祀劉氏羣主其六世祖國子博士堯夫乃刻本支之詳于石植諸祠下號永善族圖其祖介福又倣大小宗法為圖鋟版懸於家祠其世父傑復集二圖著為書六巻是則先生所為序之者也遭世不靖碑裂而版燬貫抱其書避入大山中幸而獲存珍襲寶愛惟恐逸墜今思有以永其傳也復來徵予言以厠先生雄文之後予也不敏於先生無一日之雅先生不以為疎謬力薦諸朝以布衣詔入史館雖於辭章或未之學得忝名氏於先生下風不亦幸歟予竊聞之劉氏之别有五帝堯陶唐之後受封於劉者此為祁姓以國為氏也定王封母弟康公於劉者此為姬姓以邑為氏也項伯婁敬之後而皆為劉者此漢之所賜姓也他若雕陰東郡等族或稱劉者此亦漢以宗女妻冒頓冒其母姓以為氏也大抵雕陰東郡之裔多居恒代項婁之宗盛於山東姬氏之傳至漢末而無聞唯祁姓之分為士㑹士㑹後昆周末遷于魏又自魏家于豐至劉煓執嘉子孫極為貴盛而布列於南北矣然而江左之劉則祖於散騎常侍弼之後江右之劉則出于游擊將軍握之胄此皆見諸紀載而無疑者但其世次難明不知從握至宗元實為幾傳也姑附其説於此或可以為修譜者之一助云雖然先生博極天下之書為時儒宗而於氏族之學攷覈尤精當必有以告貫先生他日南還貫尚以予言而取正也哉貫字孟唯質美而有文作詩得六朝體且於譜圖惓惓而不忘是葢能知其本者也文憲集巻十二
