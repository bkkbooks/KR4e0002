body:
  text: 文憲集卷二十八明宋濂撰雜著七儒解儒者非一也世之人不察也有游俠之儒有文史之儒有曠達之儒有智數之儒有章句之儒有事功之儒有道德之儒儒者非一也世之人不察也能察之然後可入道也威以制之術以凌之才以駕之强以勝之和以誘之信以結之夫是之謂游俠之儒上自羲軒下迄近代載籍之繁浩如烟海莫不賴其𤣥精嚅其芳腴搜其闕逸略其渣滓約其枝蔓引觚吐辭頃刻萬言而不之止夫是之謂文史之儒三才以之混也萬物以之齊也名理以之假也塗轍以之寓也雖有智者莫測其所存夫是之謂曠達之儒沈鷙寡言逆料事機翼然凝然規然幽然漆漆然逮逮然察察然獵獵然千變萬化不可窺度夫是之謂智數之儒業擅專門伐異黨同以言求句以句求章以章求意無高而弗窮無逺而弗即無微而弗探無滯而弗宣無幽而弗燭夫是之謂章句之儒謀事則鄉方略馭師則審勞佚使民則謹畜積治國則嚴政令服衆則信刑賞務使澤布當時烈埀後世夫是之謂事功之儒備隂陽之和而不知其純焉涵鬼神之祕而不知其深焉達萬物之望而不知其逺焉言足以為世法行足以為世表而人莫得而名焉夫是之謂道德之儒儒者非一也世之人不察也能察之然後可入道也游俠之儒田仲王猛是也弗要于理惟氣之使不可以入道也文史之儒司馬遷班固是也浮文勝質纎巧斫朴不可以入道也曠達之儒莊周列禦寇是也肆情縱誕滅絶人紀不可以入道也智數之儒張良陳平是也出入機慮或流譎詐不可以入道也章句之儒毛萇鄭𤣥是也牽合傅㑹有乖墳典不可以入道也事功之儒管仲晏嬰是也跡存經世心則有假不可以入道也道德之儒孔子是也千萬世之所宗也我所願則學孔子也其道則仁義禮智信也其倫則父子君臣夫婦長幼朋友也其事易知且易行也能行之則身可修也家可齊也國可治也天下可平也我所願則學孔子也今指三尺之童子而問之則曰我學孔子也求其知孔子之道者雖班白之人無有也嗚呼上戴天下履地中函人一也天不足為高地不足為厚人不足為小此儒者之道所以與天地並立而為三也司馬遷以儒與五家並立荀卿謂儒有小大揚雄謂通天地人曰儒者要皆不足以知儒也必學至孔子然後無愧於儒之名也然則儒亦有異乎曰有之位不同也三皇儒而皇五帝儒而帝三王儒而王臯陶伊傅周召儒而臣孔子儒而師其道則未嘗不同也雖然自有生民以來未有盛於孔子者也我所願則學孔子也鄭氏名濓解余友鄭仲德氏閒叩余曰幸與子同名濓而論者屢病濂字之義無據子亦知有其說乎余謝之曰余固寡陋至於父命之名則豈容有弗知之理耶請得而略陳之按濓字始見於周禮之輪人其文曰雖有深沈亦弗之濓也鄭𤣥借作粘音注謂泥不粘輻是已許慎說文解字唐人所抄舊本則曰濓力簟反從水從兼或從亷薄氷也一云中繩小水又云淹也徐鉉所定新本則又曰濓力鹽反從水兼聲薄氷也一云中絶小水不言或從亷以余觀之氷必水字之誤繩必絶字之訛所謂濓則水之淺薄者爾由其淺薄小水故中絶也若試作繩作氷則於義難為訓矣雖曰郭璞山海經傳有山河無險四徹中繩及酈道元水經注有水自下通為繩之語終不若絶字為暢意者鉉見唐本之謬為之校定如此亦未可知也又按顧野王云溓與濓同里兼里忝含鑒三反薄也大水中絶小水出也其說與鉉正合豈鉉之所校定者實有本於此耶又按黃帝內經隂陽類論曰隂陽交期在溓水楊上善云溓者水靜也七月水生時也細玩經之下文以石水盛水同喻則冬月水氷如石盛則雨雪皆解為水之時則溓之為義似與小水出之意粗同鉉之所定當益可信不誣矣至若朝說之謂溓字從兼亦本文亷字非兼并之兼者固不察兼乃諧聲之義而樓鑰所云字書無濂字林黃中疑後世所加若元結之唐峿浯者亦不考舊本或從亷及顧氏溓與濓同之說近者楊恆著書學正韻自負該博輒輕易改絶為統尤與小字之義不相合也然而溓字在周官則宜作力鹽反而以淹訓之其義亦通正不必借音戴侗溺於鄭說乃於六書故收粘音之溓而於亷音之濓則不收又可笑也矧此字本無深義特以濓溪周子而顯以濓名溪乃道州營道縣小澗去州城之西二十里而近初亦以小水得名胡珵云楚粵之間方言謂水小者為濓亦一證也周子家於是溪之上晚寓九江蓮花峰下不欲忘其初遂用故里之號亦以濓名溪黃庭堅作濓溪詩則謂溪名周子之所自取而濓為清亷之義則其說尤異於所聞也余老且多病舊學廢忘十至八九其言雖覼縷不輟未必可徵仲德尚求大雅之士而正焉不須病濓字之義無據而期師法濓溪其人斯可矣哉或者則曰韻書云亷儉也釋名云斂也皆有收縮之意釋字唯四聲最近濓之從亷其為薄水豈不昭然也哉此論頗有補於說文復繫之調息解越西有仙華生遁跡林坰槁木其形儲思於𤣥元之域游神乎太清之庭然猶慮夫尸蟲未戢龍虎未攖金鼎未固流珠未明悵鶴駕其已逺羃行雲於紫城於是謁𤣥素先生而叩之曰吾聞粵之鎛秦之盧燕之函胡之弓車雖號淺藝皆承師資况以大道之奧百靈之腴琅笈有所祕瓊簡有不書先生葆乎𤣥則鍊乎真滋幸啓其隱為豫詔之𤣥素先生曰上堪下輿二氣與俱漚鬱咇茀鴻絅偨池運行不已詘信以時日以里計九十萬餘茍愆其素灾異紛蕤維人之生法乾之樞肖坤之儀委清受寧發神吐奇晝動夜旋綿延若絲一萬三千五百有畸執神之麾斡精之羲其入則翕其出則噓莽爾勿驅迅焉弗馳勿抗而崇勿按而庳純乎𤣥潛盎如春熙儻失其養朋慮所移焦火凝水淵淪天飛恣睢無際涉厯渺瀰斧斤日加貞陽則罷生方有志於𤣥學盍慎所之仙華生曰息之宜調則既聞命矣敢問其出果何所始乎𤣥素先生曰善哉問也夫千章之木紛溶簫篸上摩雲漢者以其根也百川之水宛灘膠盩東達滄瀛者以其源也息之在人也亦然離離豳豳如器斯盛旭旭許許如槖斯鼓不西不東宅于至中離形特立乃與道通不下不上混然無象潛與神符豐融肹蠁所謂太乙之晶中黃之扃水火之魂坎離之門神靈之所營太和之所蒸皆於是而大凝鄞鄂既立隂陽闔闢元嬰載皇與炎襄羊赤霓如璊羾于𤣥門以九儀為車以六氣為轅策𤣥應而周流後天地而長存不亦侈且騫歟然而神有弗授人有所疑上智聞之力行弗隳下愚聞之斥以為非或流旁蹊忘彼九馗十架七棊八石六芝烹汞煎鉛咽津茹脂有一于此命其殆而生宜法乎自然而守之以無為仙華生曰質具隂陽數分生死譬諸晝夜必然之理若如先生言毋乃與造化戾耶𤣥素先生曰子謂天地非隂陽耶曷為不見其終也人雖藐然與天地參一氣乘之並立而三天地久長人胡有死特所養者非其道爾西河薊公汝南爰支九息青谷三鍊赤須若斯人者皆閲世靈長而不變衰燎火遇風其消必疾𤣥石沈淵千齡不泐嗇則歸室久視弗忒生不見夫玉靈乎閉氣內食以存其息浮游回光靡所傾側况有至靈而不物於物者乎生過矣生過矣仙華生曰先生之言固美矣至矣豫竊聞之雨露之所潤功存庶彚君子之所志澤及黔黎先生懷負明德進用明時宜拓化原以乘政機使隂陽和而風雨若武功戢而文教施則其所調又不止一己之私若是何如𤣥素先生辴然而笑曰生言及夫物者也翩翩乎㫖哉仙華生退於是次第其語以書先生之軒孔子廟堂議世之言禮者咸取法於孔子然則為廟以祀之其可不稽於古之禮乎不以古之禮祀孔子是䙝祀也䙝祀不敬不敬則無福奈何今之人與古異也古者將祭主人朝服即位于阼階東西面祝告利成主人立于阼階西面尸出入主人降立于阼階東西面此皆主人之正位也卒脀祝盥于洗升自西階主人盥升自阼階祝先入南面主人從戶內西面祝酌奠主人西面再拜稽首皆為几筵之在西也尸升筵主人西面立于戶內拜妥尸尸醋主人主人西面奠爵拜皆為尸之在西也漢晉春秋所載章帝元和二年幸魯祠孔子帝升廟西面再拜開元禮亦謂先聖東向先師南向三獻官皆西向是猶未失古之意也今襲開元二十七年之制遷神於南面而行禮者北面則非神道尚右之義矣古者造木主以棲神天子諸侯之廟皆有主卿大夫士雖無之大夫束帛以依神士結茅為菆無有像設之事開元禮亦謂設先聖神座於堂上西楹間設先師神座於先聖神座東北席皆以莞則尚掃地而祭也今因開元八年之制搏土而肖像焉則失神而明之之義矣古者灌用鬯臭鬱合鬯臭隂達於淵泉既灌然後迎牲致隂氣也蕭合黍稷臭陽達於牆屋故既奠然後焫蕭合羶薌蓋求神於隂陽也今用熏薌代之庸非簡乎古者朝覲㑹同與凡郊廟祭饗之事皆設庭燎司烜共之火師監之其數則天子百公五十餘三十以為不若是則不嚴且敬也今以秉炬當之庸非瀆乎古之有道有德者使教焉死則以為樂祖祭於瞽宗此之謂先師若漢禮有高堂生樂有制氏詩有毛公書有伏生之類也又凡始立學者必釋奠於先聖先師釋奠必有合有國故則否謂國無先聖先師則所釋奠者當與鄰國合若唐虞有䕫伯夷周有周公魯有孔子則各自奠之不合也當是時學者各自祭其先師非其師弗學也非其學弗祭也學校既廢天下莫知所師孔子集羣聖之大成顔回曽參孔伋孟軻實傳孔子之道尊之以為先聖先師而通祀於天下固宜其餘當各及其邦之先賢雖七十二子之祀亦當罷去而於國學設之庶幾弗悖禮意開元禮國學祀先聖孔子以顔子等七十二賢配諸州但以先師顔子配今以雜置而妄列甚至荀况之言性惡揚雄之事王莽王弼之宗莊老賈逵之忽細行杜預之建短喪馬融之黨附勢家亦厠其中吾不知其為何說也古者立學專以明人倫子雖齊聖不先父食久矣故禹不先鯀湯不先契文武不先不窋宋祖帝乙鄭祖厲王猶上祖也今一切置而不講顔回曽參孔伋子也配享堂上顔路曽㸃孔鯉父也列祀廡間張載則二程之表叔也乃坐其下淳祐初張居程上後因國子監集講再定張遂居程下顛倒彛倫莫此為甚吾又不知其為何說也古者士之見師以菜為摯故始入學者必釋菜以禮其先師其學官四時之祭乃皆釋奠今專用春秋亦非釋奠有樂無尸而釋菜無樂是二者之重輕係乎樂之有無也今則襲用魏漢律所製大晟之樂乃先儒所謂亂世之音者也其可乎哉古者釋奠釋菜名義雖存其儀注皆不可知唐開元禮倣佛儀禮饋食篇節文為詳所謂三獻各於獻後飲福即尸酢主人主婦及賔之義也今憚其煩唯初獻者得行之其可乎哉嗚呼學校者禮之所自出猶河瀆之宗瀛海也猶山嶽之祖崑崙也今乃舛繆若是則其他可知矣禮固非士庶人之所敢議有人心者孰能默默以自安乎雖然此姑言其略爾若夫廟制之非宜冕服之無章器用則雜乎雅俗升降則昧乎左右如此類甚多雖更僕不可盡也或者則曰子之言信辨矣建安熊氏欲以伏羲為道統之宗神農黃帝堯舜禹湯文武各以次而列焉臯陶伊尹太公望周公暨稷契夷益傳說箕子皆可與享于先王天子公卿所宜師式也當以此秩祀天子之學若孔子實兼祖述憲章之任其為通祀則自天子下達矣茍如其言則道統益尊三皇不汨於醫師太公不辱於武夫也不識可乎昔周有天下立四代之學其所謂先聖者虞庠則以舜夏學則以禹殷學則以湯東膠則以文王復各取當時左右四聖成其德業者為之先師以配享焉此固天子立學之法也奚為而不可也章服議歙儒有議章服之制者其言曰公之服龍山華蟲火宗彛五章在衣藻粉黼黻四章在裳五章則五列也四章則四列也四列之外雜以雲朵聞之禮官駁之曰九章之名則是也其謂五列四列則厯代之制無有也非也自軒轅氏肇為章服有虞氏從而明之各章或一或兩而已惡取所謂五若四哉假使其言可行則天無二日天子之服當繪三辰無乃有數日乎矧三辰者咸法天而成章雲亦天物也設用以間之無乃又益之以一章乎蓋曲說之無據者也是未可信也金華宋濓曰禮官之議皆傅經而辨善則善矣至謂厯代之制無有則不能有以降其心也竊按唐制衮冕之服衣繪而裳繡自山龍而下每章一行為等每行十二夫行猶列也天子之衣既云每章分為十二則公之服似可以類而推但不知五四之分又别何所見也自山龍而下始然則日月星者必仍其舊而無所加强誣天子之章當有數日亦不能通矣又按宋制章服並織成間以雲朵而補其空地夫間以雲者不過藉為文章而周飾之亦非益之以一章也由是觀之歙儒其果有據乎無據乎若不待知者而後决所可憾者好奇之過舍先王之大法而循末代之彌文耳嗚呼自先王之法壞侈靡之習逮於六代極矣至有議畫鳳於衮以示差降飾圓花於裳而云於禮無礙者况於唐宋之世哉豈惟衮衣為然也冠冕之制古者以采藻為旒前後邃延延冕上覆也𤣥表纁裏後世則用龍鱗錦表綴玉為七星旁施犀瓶金絲網之屬又外作翠旒使碧鳳銜之古者以旒數為降殺極於十二而止後世則或增為二十四焉使歙儒舉以為言則羣起扼其吭矣不觀其㑹通而遽斥人以曲說亦不可哉然則將安從之曰章服當凖有虞氏之制古之人有是言也宜以禮官為正治河議此係舊作比嵗河决不治上深憂之既遣平章政事嵬名御史中丞李某禮部尚書台哈布哈沈兩圭有邸及白馬以祀又置行都水監專治河事而績用未之著乃下丞相㑹廷臣議其言人人殊濓則以為河源起自西北去中國為甚逺其勢湍悍難制非多為之委以殺其流未可以力勝也何也河源自吐畨朵甘斯西鄙方七八十里有泉百餘泓若天之列宿然曰鄂端諾爾譯云星宿海也自海之西又匯為鄂楞諾爾二澤又東流為齊必勒河而伊爾齊之水由西合呼蘭之水從南㑹伊拉齊之水復至自東南於是其流漸大詢之土人始名黃河也河水東行又岐為九派曰伊遜鄂羅木譯云九渡也水尚清淺可涉又東約行五百里始寖渾濁而其流益大朵甘之東北鄙有大山四時皆積雪曰伊拉瑪博囉又曰騰格哩哈達譯曰昆侖也自九渡東行可三千里乃至昆侖之南又東流過庫濟克特二地至哈喇伯勒齊爾與納琳哈喇河合又合竒爾穆蘇二水乃折流轉西至昆侖北既復折而東北流至奎騰州其地名必勒齊地自昆侖至此不啻三千里之逺又約行三百里至積石從積石上距星宿海蓋六千七百有餘里矣其來也既逺其注也必怒故神禹導河自積石至龍門南到華隂東下底柱及孟津洛汭至于大伾大伾而下釃為二渠北載之高地過洚水至于大陸播為九河趨碣石入于渤海然自禹之後無患水者七百七十餘年此無他河之流分而其勢自平也周定王時河徙砱礫始改其故道九河之跡漸至湮塞至漢文時决酸棗東潰金隄孝武時决瓠子東南注巨野通于淮泗泛郡十六害及梁楚此無他河之流不分而其勢益橫也逮乎宣房之築道河北行二渠復禹舊跡其後又疏為屯氏諸河河且入于千乘間德棣之河復播為八而八十年又無水患矣及成帝時屯氏河塞又决於館陶及東郡金隄泛濫兖豫入平原千乘濟南凡灌四郡三十二縣由是而觀則河之分不分其利害昭然又可覩已自漢至唐平决不常難以悉議至於宋時河又南决南渡之後遂由彭城合汴泗東南以入淮而向之故道又失矣夫以數千里湍悍難制之河而欲使一淮以疏其怒勢萬萬無此理也方今河破金隄輸曹鄆地幾千里悉為巨浸民生墊溺比古為尤甚莫若浚入舊淮河使其水南流復於故道然後導入新濟河分其半水使之北流以殺其力則河之患可平矣譬猶百人為一隊則其力全莫敢與爭鋒若以百分而為十則頓損又以十各分為一則全屈矣治河之要孰踰於此然而開闢之初洪水泛濫於天下禹出而治之水始由地中行耳蓋財成天地之化必資人功而後就或者不知遂以河决歸於天事未易以人力强塞此迂儒之曲說最難成事者也濓竊憤之因備著河源以見河勢之深且逺不分其流决不可治者如此倘有以聞于上則河之患庶幾其有瘳乎雖然此非濓一人之言也天下之公言也京畿鄉試策問問儒吏之分古無有也蓋儒守道藝吏習法律法律固不出乎道藝之外也奈何後世岐而二之岐而為二果始於何時歟然而儒之與吏各以才顯者亦衆矣以儒言之有以明經為郎出守河南而民以殷富者有以明經入仕刺舉無所避而加光祿大夫者以吏言之有以治獄才高而舉為侍御史者有以治律令而升封為博陽侯者其果何修而致此歟豈皆以儒術緣飾吏事者歟世道日降事寖非古為儒者不以明體適用為學而留情於章句文辭之間峩冠博帶論議衮衮非不可也及授之以政則迂闊於事為羣吏之所賣為吏者不以致君澤民為務而溺志於簿書期㑹之末承順以為恭奔走而效勞非不能也及察其所為則黷貨舞法為民之大蠧古之為儒為吏者其果若是歟誠使儒而不迂吏而不姦皆良材也不知何以擇而用之歟方今聖天子提三尺劍平定天下如漢高帝發政施仁孜孜圖治過唐太宗且以吏弊未除而為生民之害乃徵四方布衣之士畢升於朝命銓曹選而官之高者擢守令次亦不失為州縣之佐聖德至渥度越前代其所以然者欲使儒術革吏弊而臻夫太平之治也古語有之法如牛毛弊如蜂午革之之道果何先而何後孰緩而孰急歟考之周禮士多而府史少今世之吏數倍於前事繁政紊案牘紛然所以其弊為滋甚劉炫所謂老吏抱案而沒者也其可减去太甚而收良吏之績歟稽之漢世以四科取士若曰某以某才堪任某職初不專於一塗所以去弊興利具有其道董子所謂量才授官録德定位者也其可行之於今而收賢儒之效歟諸君子讀往聖之書負真儒之學生平立志耻與俗吏為伍其必講之有素矣當斟酌古今之宜逐問以對毋謄紙上之陳言一則曰在得人二則曰在得人六經論六經皆心學也心中之理無不具故六經之言無不該六經所以筆吾心之理者也是故說天莫辨乎易由吾心即太極也說事莫辨乎書由吾心政之府也說志莫辨乎詩由吾心統性情也說理莫辨乎春秋由吾心分善惡也說體莫辨乎禮由吾心有天叙也導民莫過乎樂由吾心備人和也人無二心六經無二理因心有是理故經有是言心譬則形而經譬則影也無是形則無是影無是心則無是經其道不亦較然矣乎然而聖人一心皆理也衆人理雖本具而欲則害之蓋有不得全其正者故聖人復因其心之所有而以六經教之其人之溫柔敦厚則有得於詩之教焉疏通知逺則有得於書之教焉廣慱易良則有得於樂之教焉潔靜精微則有得於易之教焉恭儉莊敬則有得於禮之教焉屬辭比事則有得於春秋之教焉然雖有是六者之不同無非教之以復其本心之正也嗚呼聖人之道唯在乎治心心一正則衆事無不正猶將百萬之卒在於一帥帥正則靡不從令不正則奔潰角逐無所不至矣尚何望其能却敵哉大哉心乎正則治邪則亂不可不慎也秦漢以來心學不傳往往馳騖於外不知六經實本於吾之一心所以高者涉於虛逺而不返卑者安於淺陋而不辭上下相習如出一轍可勝嘆哉然此亦皆吾儒之過也京房溺於名數世豈復有易孔鄭專於訓詁世豈復有書詩董仲舒流於災異世豈復有春秋樂固亡矣至於小大戴氏之所記亦多未醇世又豈復有全禮哉經既不明心則不正心既不正則鄉閭安得有善俗國家安得有善治乎惟善學者脫略傳注獨抱遺經而體驗之一言一辭皆使與心相涵始焉則戛乎其難入中焉則浸漬而漸有所得終焉則經與心一不知心之為經經之為心也何也六經者所以筆吾心中所具之理故也周孔之所以聖顔曽之所以賢初豈能加毫末於心哉不過能盡之而已今之人不可謂不學經也而卒不及古人者無他以心與經如氷炭之不相入也察其所圖不過割裂文義以資進取之計然固不知經之為何物也經而至此可不謂之一厄矣乎雖然經有顯晦心無古今天下豈無豪傑之士以心感心於千載之上者哉隋室興亡論昔周室暗弱靜帝幼冲高祖以外戚之尊入握朝權都督諸軍遂假黃鉞開丞相府當是時宗藩大臣心志弗平五王連謀三方稱亂高祖咸得翦夷之始有輕睨周鼎之心自進爵隋王加九錫尋受周禪而即皇帝位於是修明庶政綏撫逺夷經營四海至日昃不遑暇食高熲蘇威李德林之屬調馭于內楊素韓擒虎賀若弼之徒折衝于外規模日盛遂萌平陳之謀張皇六師直搗金陵陳人膽破叔寶斂手就擒天下自是歸於一統東底大海南撫交趾西連且末北極五原莫不禀受正朔願為臣妾開皇仁夀之間人物阜繁號為極治及煬帝嗣位藉承平之休運慕秦皇漢武之為人治宫室而務侈靡使絶域而勤逺略市武馬而困蒸庶御龍舟而般遊無度自以為日月所照雨露所及孰敢不臣高句驪一島夷怒其不恭親總大兵一百十三萬分十二軍並發旌旗彌亘千里近古出師之盛未之有也意謂狼噬𤣥菟之野鴟張扶餘之境電掃襄平之墟未幾麥鐵杖死遼東宇文述敗蕯水而九軍先後陷焉曽不悔禍益務興戎府庫空竭頭㑹箕斂而民益不堪命由是盜賊蜂起王薄發長白張金稱聚河曲林士𢎞據九江杜伏威掠江淮翟讓出陽城似此之類不可勝計而海內四分五裂矣江都之幸猶自沈湎聲色惟日不足度其不免乃欲摩頸自斫卒至血濺御衣而身亦隨殞非天下之至愚孰能與於此哉當其指麾羣雄叱咤之間風駭雲流而混六合於一家何其雄也身死肉未及寒而邦國蕩覆子孫誅戮殆盡反不如𢎞農一布衣時又何其削也君子論禍敗之幾不起於煬帝之日而基於高祖之時何也蓋天下大物也可以德持不可以力競使高祖以德結人心雖煬帝昏荒之甚其敗亡未必若斯之速也夏有太康殷有雍已河亶甲周有幽厲而宗祀不絶者以禹湯文武之德未斬也是故采章文物不足為之盛金城湯池不足為之固長鎗大劍不足為之利士馬精强不足為之勇玉帛充牣不足為之富其足以賴而長存永治者非德何以哉惜高祖不可語此徒以力競也悲夫秦士録鄧弼字伯翊秦人也身長七尺雙目有紫稜開合閃閃如電能以力雄人鄰牛方鬬不可擘拳其脊折仆地市門石鼓十人舁弗能舉兩手持之行然好使酒怒視人人見輒避曰狂生不可近近則必得奇辱一日獨飲娼樓蕭馮兩書生過其下急牽入共飲兩生素賤其人力拒之弼怒曰君終不我從必殺君亡命走山澤耳不能忍君苦也兩生不得已從之弼自據中筵指左右揖兩生坐呼酒歌嘯以為樂酒酣解衣箕踞拔刀置案上鏗然鳴兩生雅聞其酒狂欲起走弼止之曰勿走也弼亦粗知書君何至相視如涕唾今日非速君飲欲少吐胸中不平氣耳四庫書從君問即不能答當血是刃兩生曰有是哉遽摘七經數十義叩之弼厯舉傳疏不遺一言復詢厯代史上下三千年纚纚如貫珠弼笑曰君等伏乎未也兩生相顧慘沮不敢再有問弼索酒被髮跳呌曰吾今日壓倒老生矣古者學在養氣今人一服儒衣反奄奄欲絶徒欲馳騁文墨兒撫一世豪傑此何可哉此何可哉君等休矣兩生素負多才藝聞弼言大愧下樓足不得成步歸詢其所與游亦未嘗見其挾冊呻吟也泰定末德王執法西御史臺弼造書數千言袖謁之閽卒不為通弼曰若不知關中有鄧伯翊耶連擊踣數人聲聞于王王令𨽻人捽入欲鞭之弼盛氣曰公奈何不禮壯士今天下雖號無事東海島夷尚未臣順間者駕海艦互市于鄞即不滿所欲出火刀斫柱殺傷我中國民諸將軍控弦引矢追至大洋且戰且却其虧國體為已甚西南諸蠻雖曰稱臣奉貢乘黃屋左纛稱制與中國等尤志士所同憤誠得如弼者一二輩驅十萬橫磨劍伐之則東西止日所出入莫非王土矣公奈何不禮壯士庭中人聞之皆縮頸吐舌舌久不能收王曰爾自號壯士解持矛鼓譟前登堅城乎曰能百萬軍中可刺大將乎曰能突圍潰陳得保首領乎曰能王顧左右曰姑試之問所須曰鐵鎧良馬各一雌雄劍二王即命給與隂戒善槊者五十人馳馬出東門外然後遣弼往王自臨觀空一府隨之暨弼至衆槊並進弼虎吼而奔人馬辟易五十步面目無色已而烟塵漲天但見雙劍飛舞雲霧中連斫馬首墮地血涔涔滴王撫髀歡曰誠壯士誠壯士命酌酒勞弼弼立飲不拜由是狂名振一時至比之王鐵槍云王上章薦諸天子㑹丞相與王有隙格其事不下弼環視四體嘆曰天生一具銅斤鐵肋不使立勳萬里外乃槁死三尺蒿下命也亦時也尚何言遂入王屋山為道士後十年終史官曰弼死未二十年天下大亂中原數千里人影殆絶𤣥鳥來降失家競棲林木間使弼在必當有以自見惜哉弼鬼不靈則已若有靈吾知其怒髮上衝也録客語豫養痾官舍有三客候豫豫命侍史速入環坐榻前甲客云近有奇事臨川浮屠曰法循者常行般舟三昧一夕示寂闍維心獨不化乃集熾火煆之俄出五色光屬天就視之獲佛像高三寸非金非石具顔面手足及衣之襞積若刻成者因取置净􅔑上次早觀之舍利己纍纍生矣乙客云惡有是爾搆虛飾僞者為之以欺世耳丙客云不然也某在瀫水時親覩一事與臨川正類有優婆塞負貶淮中遇異人授以禪觀之法逮歸不言不笑唯好同結廬山社者游死後火葬心內包觀自在像鸚鵡軍持皆具是未可非也三客言已復相質於豫豫不能了有佛之信否姑以所聞明之昔波斯人來閩相古墓有寶氣乃謁墓鄰以錢數萬市之墓鄰諱不與波斯曰汝無庸爾也此墓已無主五百年矣墓鄰始受錢波斯發之見棺衾肌肉潰盡唯心堅如石鋸開觀之佳山水青碧如畫傍有一女靚妝憑欄凝睇蓋此女有愛山癖朝夕吐吞清氣故能融結至於如此嗚呼孰謂行般舟三昧者而無奇驗乎吾心之靈實參兩間無物弗該無理弗囿人能用志不分則上可致日星之變下可召物産之祥豈徒見諸身心而已哉第可憾者為物所移自塞自損而不能與天地同耳悲夫豫故備録客語以為吾黨學聖賢之勸録㪭人申鮮生辭龍門子傳周官將成鼓琴潛溪之上初調清角更轉黃鐘音節熙醇神氣恬康鼓已微步其樂若洋洋者㪭人申鮮生舍罟而來揖龍門子曰先生何樂邪龍門子曰子試言之生曰今之人奮𬒮爭秩嚼齒分名舚􅀈涎流回繞神營濶略機穽企豔鼎纓許史聨鑣金張並旌而先生龍蛇相淆雅俗不形確守貞固刋落浮榮此固不足以纍其情今之人雞號而奔日入弗息沈溺食貨罄竭籌策火生目間電飛舌隟障簏自欺鎖核成惑而先生被毳荷旃溫如繒帛飯糗羮藜甘若飴蜜此固不足以穢其跡今之人竦身鷹奮用志鳥頏舒翹燕趙振頴荆梁入關度轡三峽戒航悲歌弔古感慨成章而先生如雉三伏若龜六藏冥情中閈息景菀桑此固不足以蕩其衷今之人肆情忘世耽詠碩薖曳索被裘拾穗服莎洗耳箕上種芝巖阿潔身亂倫傷義則那今先生久藏巨器思拔人痾俟時而行與世委蛇此固不足以同其科若此數者皆非先生之所樂也先生之所樂者我知之矣經緯今古評隲文辭本根培壅柯條紛蕤大則苞八殥小則入一絲卑則抵重淵高則凌赫曦追邇轍者則或秦而或漢攀逺駕者則或殷而或姬揆序有度囊括無遺靡蹟弗探何罅不窺抑之則驚霜夏隕揚之則寒谷春熙開陽闔隂出神入奇譬諸圜鍾為宫主房星定卯位而樂奏可享於上帝鳥雲山兵棲岑峰觸盤石而武車可張於軍威迅霆出火喪匕策燔喬木而天聲可震於魑魅火龍黼黻戴日星挾藻粉而文采可華於卷衣且子雲思高而吐鳳士贊才澀以夢龜紹述海涵而地負退之橫騖以川馳子夀輕縑而素練景先膩體以豐肌何莫不嗜於斯先生之所樂或在兹乎龍門子愀然曰子以我樂於治文乎哉何卑我之甚也在昔姬旦輔建太平分職設官陳紀立經八法著式三兆埀程揭其朗曜統此列熒秦焰既慘周典失明河間有獻考工是徵劉歆挺起博士始升杜承鄭繼句凖文繩羣工異見衆說作朋瀆亂不驗隂謀從衡制淆新室禮亂詛盟攘斥不遺徒惑世聽前王大法信有足慿末世附離闢之則逞載疏載翦且損且乘浮翳將斂大明用升編簡埀就樂寓於聲子不吾知乃以為悅於文耶抑吾聞之安絶潢者以天下之水無過其大而不知有渤澥之宏深尊培塿者以宇內之山無踰其高而不知有岱華之峻極溺觚翰者以古今之學無出於文而不知有經術之淵奧豫雖不敏竊受教於君子矣方將寤寐於黃虞情思乎孔周重明一代之典以埀百王之憲子乃以文士况我不亦左乎於是漁父悵然顧豫曰有是哉有是哉吾今而後不敢復相天下之士矣乃歌曰大素既雕兮日趨彌文五采絢爛兮以汨吾真中有一夫兮其色誾誾游心古初兮隨道屈申欲鼓芳風兮以扇游氛我將從之兮不知其門歌已負罟而去楚客對宋子泛舟西上夜泊彭蠡褰篷而坐時長空無雲明月皎然孤照衆星環列一一可數同舟有楚客者忽指月問曰日月一也此何以有虧盈乎宋子曰不然也月圓如珠其體本無光借日為光背日之半常暗向日之半常明其常明者正如望夕初無虧盈但月之去日度數有逺近人之觀月地勢有正偏故若有虧盈耳曰然則其有夜食奈何曰此為地影之所隔也月上地中而日居下地景既隔則日光不照其隔或多或寡故所食有淺有深蓋地居天內如雞子中黃其影不過與月同大地與月相當則其食既矣唯天之體廣漠無際然其圍徑之所及去地幾千萬里巧算者亦可以推之也客曰月之為說既聞命矣五星盈縮占者時有不合此何以無定論乎朱子曰五星從黃道內外而行考其盈縮則於分段距度最宜精審近代占天家於測景授時之法誠可謂度越前古至於星占則微有不同且如辛亥歲正月乙酉朔火當躔房五度彼則謂在房之一度二月辛巳火當入斗初度彼則謂在三月己丑正月己酉金木始當同度彼則謂在乙巳其後驗之天象所失昭然若論水星距日之度盈縮之間終不踰二十三度半之外彼則謂正月癸卯水躔斗十九度在晨疾段中較之日躔虛六度已距二十七度此尤所未解然天道未易言必得明理之儒如許衡者出正之可也客曰星厯之學儒者亦在所講乎宋子弗答趣侍史具衾入舟而寢述𤣥為張道士作天地之間有𤣥𤣥之道焉塞八區宰六幕茫乎大化莫見其迹窈冥忽荒之中而有神以為之樞其神何如洞乎無象漠乎無形曕之弗覩聆之弗聞履氷弗寒炙日弗溫故巍然高而不知其際邃然深而不知其止恢然大而不見其外藐然細而不見其內其施之于用也能覆能載能隂能陽能靜能動能柔能剛能上能下能圓能方能舒能慘能翕能張毛者亦以之而趍羽者亦以之而翔甲者亦以之而出鱗者亦以之而行凡有血氣者莫不藉是以存所謂不依形而立不待力而强不以生而存不隨死而亡者也故古之聖人能養而全之守一處和若蟄龜然一故弗雜和故弗戾久而行之其道乃至蓋懼其搖而散也乃嗇其精恐其勞而汨也乃定其神慮其躁而失常也乃寧其氣而弗攖精與氣合其神則凝然後駕太清以為輿指溟涬以為蓋荷日月以為輪運六氣以為轅化莽蒼以為馬直逺游乎無窮之門雖鬼神不能測其機而况於人乎人皆有之而不能之者則眼之精疲於五色耳之精沒於五聲鼻口之精散於臭味四肢之精削於運用精既散矣氣隨竭矣神雖弗離將安傳之矣卒俯首就斃如慕光之趍火其亦可悲也歟嗚呼混淪在上者謂之天磅礴在下者謂之地中立兩間者謂之人天地不死而人皆死者何也不知有𤣥𤣥之道故也因本黃老氏餘論作述𤣥讀宋徽宗本記徽宗爰自端邸入正宸極呼吸雷風舒慘陽隂赫然有為聞于天下於是叙復正人宏開言路意臻時雍之治以復祖宗之舊曽未旋踵卒改所圖委政姦回托國閹豎鼎軸非據節鉞妄加狐狸嘷於闕庭鬼蜮潛於宫掖置編類之局樹黨人之碑倡言紹述擠陷忠良虐焰炎炎炙手可熱百僚側足四國寒心羣凶方為得志力陳豐豫之說開大晟府以制雅樂用魏漢律而鑄九鼎文飾太平詐言符瑞八寶誕受𤣥圭肇錫金芝出于蟾脊祥麟育於牛腹由是侈心寖生邪欲轉熾大興土木之役創運花石之綱艮嶽排空絳霄凌漢殫極功藝之巧鈎致珍怪之物君臣酣飲上下荒淫俾晝作夜以亂為治至同臣庶之服恣行期門之事兼之妖人乘釁蠱惑帝聰天神降于坤寧璇宫通于寰宇𤣥科祕籙方崇醮祠之儀太虛金壇遂定道階之品其視法弊令乖民生塗炭將驕卒弛邊備摧落縱有耳而不聞雖有奏而弗鑒皇天震怒災異薦臻白眚見於禁籞赤氣犯於紫宫大水冒於都城妖狐升於御榻咸謂適然益開戎釁滅天祚而亡兄弟之國結完顔而進虎狼之鄰卒啓狡謀遂成反噬張穀之降始受尼瑪哈之師已出旌旗蔽空戈㦸滿野肆其封豕之威如蹈無人之境蹂踐我檀薊侵軼我代朔攻搗我太原圍逼我京闕三鎮之割方急六賊之誅已緩勢至於此亦可醜矣及夫金兵再出力遂不支瓦解土崩魚爛河决宫闈淪辱宗室翦夷哭聲震天赤血滿地翠華北狩逺臻漠北之區父老見思徒灑山東之淚當是時也雖欲噬臍悔將何及自非義士集勤王之師謀臣建南渡之䇿則九廟神靈幾不血食矣不亦悲哉嗟夫成湯務德帝命式于九圍紂為不道身死周人之手其所感應捷於桴鼓聞以一人治天下未聞以天下奉一人奈何窮奢極侈而毒痡四海百萬生靈彼實何辜其身亡國破為萬世笑非不幸也宜也傳曰惟命不于常道善則得之不善則失之可不畏哉可不畏哉太乙𤣥徵記金華宋濓賦質甚弱十日九疾生産作業之事皆力有所不任唯日學操觚造為文章精思弗得罷極就寢夢一老父白髮鬅鬙與雲鬬潔身被黃服手支青藜杖徐徐而前招濓謂曰若何疲思之甚邪吾乃太乙之精在皇漢時曽降天祿閣以洪範五行授劉向若今意有何圖第言之吾當有以處若也濓再拜曰下土蟣蝨臣不自料得接休光以沐浴神化亦既幸矣復不以臣之微賤使吐其情辭臣雖無知敢不精白一心以承靈貺臣受氣于天孱弱而䝉庚戌之歲律中應鍾日在于氐地寒以風母妊七月臣體即降生未五齡百疾交攻熱火鬱木邪沴制陽肝氣動搖手牽目瞪謁醫視之謂為瘛瘲毒艾焮膚其苦莫膺雖脫于虎口筋骸弗彊有牛負軛有鎛在場力既弗任田卒薉荒幸有書一束塵齧蠧戕振拂驅剔以佩以藏以嘬以嘗以求其方疲精竭思攻為文章窮年矻矻恆不知變更太乙曰吾聞心有所溺者必有所甚樂也若之所嗜如是將樂之邪抑弗獲已也濓曰臣為文之時獨潛闔廬五官內守形若橛株凡慮既澄運思希夷上升層霄下入重壚絪緼庶彚彌布大區自形自色匪可數知一一攝之若禽在笯若獸在周阹縱健距捷羽曽不得離其範圍及夫意暢氣熙與神合機嶽蕩河翻雷椎霆驅倐爾隂合歘然陽施鬼出電入載正載奇萬紾千變莫窮端倪雖身執台樞腰懸金魚膳羞熊蹯居飾璇題入則麗姝吹竹彈絲出則戎士負弩曳旗亦不足以踰其適臣實樂之初非有弗獲己也太乙曰若樂則樂矣古之人亦有業是者乎濓曰有之雖更僕不可盡也請陳其略昔有巨儒曰太史遷豪氣孤鶱濶視無前執筆著書動數萬言祕之金匱及藏名山至今文光上燭九天董生三策揚雄太𤣥相如大人退之五原若修若軾若鞏之賢各有論著焜耀後先虎鳳騰躍韶鈞相宣汗瀾卓踔盤紆蟬連業之既專厥功乃全其功何居時磨研之耔之穫之湘之瀹之炊之酌之使心樂之一日不治若芒刺肌六氣昏昏精神不來由是觀之古之人所業其亦有以哉太乙曰嘻若言陋矣知冠角􅏋胡之為象而不知辨冕纓緌之制知糗飯藜羮之為美而不知淳熬肝膋之味知吳歈楚豔之為曲而不知夏濩武勺之音若言陋矣濓於是憮然自失膝行而進俯首至地且拜且祈曰臣不佞竊受教於先生長者學文二十餘年自意已造其極不知猶未也夫井魚固不足以語大夏蟲固不足以語寒幸察臣之誠憐臣之愚授臣以要道使臣聞之雖即死無憾太乙愀然不答濓復殷勤致辭俯伏俟命厯一時之久太乙三嘆而後言曰上堪下輿惟人中居厥初芒芠瞢未有知野鹿標枝蚩蚩狉狉聖人者出扶弼教基揭我日月燭我冥馗所謂建生民極立天地心者是不有其道歟道雖無形揆文可知典謨渾淳卦畫閎奇雅頌恢張禮樂威儀春秋謹嚴衮褒鉞誅不由於此去道逺而舍其根荄玩其葩葉而何以史遷諸子為且非文不行非文不章天子非文曷風四方諸侯非文莫守其邦卿大夫非文身鬱不揚士庶人非文卒遏于鄉故云文者乾坤之粹精也隂陽之靈和也四時之衡石也百物之錧轄也中國之采章也四裔之儀法也可不務乎彼辨博馳騁以邪奪正是誣世也卑辭甘言藉威取寵是媚權也佞墓受金是非舛繆是罔利也氣亡魄喪懨懨不振是萎薾也抽青嫓白眩人耳目是聾瞽也若此者弗可枚舉其文乎哉其文乎哉吾前之所謂文則異於是矣充於一身和順內積英華外發達于四國民物阜康政教鬯洽筆之於書則可為天下後世法傳曰有德者必有言若之志勤矣其亦慎所學哉言訖四方晦冥飊風上行仰視天門如有火光反而顧之太乙巳亡濓驚而寤不知其為何祥也乃召日者占之日者端櫝出蓍左右揲之掛而扐之遇復之離曰是謂後得而先迷百折旁岐倀倀安歸雖車堅馬肥終九顛而一隮或道之於崇期載旌以驅厯國過都膳宰致餼司里授廬不亟不徐直抵夫𤣥聖之所居蓋復者不逺復也而重離又文明之象也此殆示子學文𤣥徵乎濓於是惕然悟悉燔毁筆硯取六藝燖溫之未幾學果進段干微段干氏問龍門子曰秦漢以來正學失傳至宋而復盛因願竊有聞也幸厯以告我金陵之學何如曰穿鑿聖經而附㑹已說甚者竊佛老之似以誣吾聖人之教學顔孟者固如是乎又其甚者一假功利以搖動天下利源一開魚爛河决而莫之禁如此尚可為國邪豫嘗謂亡宋天下者自金陵始也曰然則無一髮可取乎曰確執堅信淡然不為位勢所動是則何可及也所惜者學之疵耳曰眉山之學何如曰其文辭氣焰有動搖山嶽之勢蓋其才甚高識甚明舉一世皆奔走之恨其一徇縱橫捭音擺闔之術而弗知先王之道士之輕佻浮誕者恆倚之以為重禮義亷恥則棄去而弗之恤使其得君其禍天下有不在金陵下也曰東嘉之學何如曰東嘉之學人或不同大扺尚經制而求合乎先王攻禮樂以振拔乎流俗二者亦一道也第其致力忘大本而泥細微而見諸行事者皆繳繞膠固而無磊落俊爽之意徒以辭章論議馳騁於一時蓋其所失也其立言純懿而弗背者傳之千百世可也曰永康之學何如曰氣豪而學偏者也使其當今之世也擁百萬兵馳騁於天下堂堂之陳正正之旗實有一日之長是何也其智數法術往往可馭羣雄而料敵情而剛烈之氣又足以震撼而翕張之其能成功宜也若論先王之道德一怒而安天下之民則瞢乎未之見也曰金溪之學何如曰學不論心久矣陸氏兄弟卓然有見於此亦人豪哉故其制行如清天白日不使纎翳可干夢寐即白晝之為屋漏即康衢之見實足以變化人心故登其門者類皆緊峭英邁而無漫漶支離之病惜乎力行功加而致知道闕或者不無憾也曰橫浦之學何如曰清節峻標固足以師表百世其學則出於宗果之禪而借儒家言以文之也儒與浮屠其言固有同者求其用處蓋天淵之不相涉也其可混而為一哉金溪之學則又源於橫浦者也考其所言蓋有不容掩者矣曰金華之學何如曰平原文獻之傳幸賴此不絶耳蓋粹然一出於正稽經以該物理訂史以參事情古之善學者亦如是爾其所以尊古傳而不敢輕於變易亦有一定之見未易輕訾也當是時得濓洛之正學者鼎立而為三金華也廣漢也武夷也雖其所見時有不同其道則一而已蓋武夷主於知行並進廣漢則欲嚴於義利之辨金華則欲下學上達雖教人入道之門或殊而三者不可廢一也嗟夫龍七虎逝而孽狐為之雄山摧嶽仆而培塿為之大氣宇厭厭四分五裂之弊今乃實蹈之矣寧不為鄉學之一慨哉雖然學以存此心也心存則理之所存也前乎千萬世此心同此理同也逺而四海之廣此心同此理同也所謂東海有聖人出焉此心同此理同也西海有聖人出焉此心同此理同也南海北海有聖人出焉此心同此理同也吾何憂哉天之髙也吾不愧其覆也地之厚也吾不愧其載也心之𢎞也吾不愧其靈也吾何憂哉然則將何憂憂不如孔而已矣段干氏曰我未之聞也謹受教删古嶽瀆經維禹治水三至桐柏山驚風迅雷石號木鳴五伯擁川天老肅兵雄干持旄龍鴻敕軒閼不能興禹乃震怒召集百霛搜命䕫龍桐柏千君稽首請命罔不惟寅神令所射激如欃槍乃縻鴻䝉乃囚章商乃縶兜盧皇威載揚犂婁卒劉勢不敢爭彼無支祈力踰九象叶厥形肖猿目有電光量淮度江辦捷從衡授之童律童律莫當授之烏木田木田􅋟臧授之庚辰庚辰扼其亢絡以鐵繩讋如犬羊繫諸淮隂龜山之旁未魅水精洞妖石祥奔號萬數若有喪亡淮流湯湯入海既平民用靖康直達外方至于陪尾無壅弗通率惟厥常以昭于無疆世傳元和九年李公佐游洞庭登包山與隱者周焦君探林屋洞得古嶽瀆經第八卷今觀其文雖竒而未醇竊意即公佐焦君所造以玩世者戲删潤其辭集古鼎文寫之以寄吳君濬仲濬仲蓋深於古學者也鑄窳器與方乳曲文大鬲爭妍其自知不可哉丙申冬十一月濂志書書劉生鐃歌後伯夷栁下惠飭身制行皆髙於當世然揆諸大中之道或不能無過故其流至於隘與不恭甚哉為師之難也近代以文章名天下者蜀郡虞文靖公豫章揭文安公先師黃文獻公及廬陵歐陽文公為最著然四公之中或才髙而過於肆或辭醇而過於窘或氣昌而過於繁故效之者皆不能無弊惟先師之文和平淵潔不大聲色而從容於法度是以宗而師之者雖有髙下淺深之殊然皆守矩蹈規不敢流於詭僻迂怪者先師之教使然也烏傷劉生剛從余學經為文頗久近製國朝鐃歌十二曲傳於逺邇士君子稱之顧豫豈能使生至是哉實先師之遺教被人深且逺故耳余少於斯文蓋有志焉及今尤真知之然後嘆先師之不可及也後之有志於學者非果有得於古人之法烏知余言為然哉書畦樂翁事畦樂翁延名姓王其字為與齡廬陵人沂公七世孫也生平有逸趣當得意時物我齊冥不知天地之為大日月之為明山嶽河海之為髙深也或登髙騁望或曳杖長歌或呼酒縱飲翛翛然自比於葛天氏之民如是者有年一旦忽卜居豫章東湖上欲起徐孺子與之游駕雙鳥犍衝雲而耕土脈壅起虛攢若積塵翁荷鍤經營析為九區伍伍相比皆斸成小窪取嘉蔬藝之新雨過緑甲浮頭如旋螺已而怒長翠光方勻凝望皆一色翁欣然自得曰二氣絪緼往過來續往者不知其所往來者不知其所來往者回陳來者復新新陳相因如環之循今吾畦之青萌孰知為黃之所基乎基者萌之始萌者基之終達人於此大觀終之始之始之終之非始非終惟始惟終可以一古今可以混彭殤可以同晝夜矣蓋人生百齡萬中得一七十加竒千中得一或五六十固比比有之然不免於孩提致夭於襁褓者亦衆矣奈之何哉夀者自夀夭者自夭吾未嘗夀之夭之也憂樂之間寧知夫夭者不為夀而夀者不為夭耶今觀吾畦而日涉之一盛一衰則妙理悉具焉故其樂有不可得形容者矣藝蔬云乎哉藝蔬云乎哉翁言流聞四方有識者咸以為知道競謁翁問其故翁不得已示之曰勿小吾圃隂陽之理著焉勿小吾身心中具天地焉具天地於一心著隂陽於一圃六合雖廣孰加焉子若規規求於形迹之間則醯雞以甕中為天爾何暇與大方之外哉子休矣子休矣為說者曰吾聞江右有徐孺子者其清風隱操敻出千古見諸史册惜乎不載其言論風㫖無以探索其緒餘今聞翁之言察其行事其殆聞孺子之風而興起者歟然翁少負才氣客遊諸公間以文墨議論見稱譽度其志亦欲施諸事功者今若是其殆以時進退者歟以時進退則幾乎道矣豫故具列子篇以示知翁者書陳思禮陳思禮字用和四明人世為士族思禮生七歲父德祥歿母石氏誓以節自守夙夜勵思禮以學遇之極嚴雖大雪沒脛必使挾冊以往思禮或少懈輒對之泣曰爾父為名儒唯生一子吾所以忍死鞠育者欲爾取法也今奈何背之思禮惶懼却立若無從匿身俟母怒稍解輒去篝燈誦書自是不至夜分弗休母年五十五病卒思禮被髮狂號曰吾母何在吾母何在母所以辛勤萬狀而弗釋者為思禮也思禮加冠而母不待養尚何以生為不如相從於九泉之下魂魄茍有知猶可盡承事之禮不然縱夀百齡何益也乃操刃欲自剄家人奪之環守至旦共譬解之曰爾死則母之祀絶矣母雖死欲使母不死者移孝為忠以顯揚之也思禮收涕謝之服闋入郡庠從名師學明經期以科第起家見諸事功踰四三年思禮二十四矣初母未死時為擇配石氏至是欲成昏思禮掩耳不答其姻其友執其袂而羣譟之思禮泣曰吾娶則詩書之業蕪矣即不蕪何以自給不與市魁賈竪相逐弗可得也他日何面目見吾母請緩之其師鍾士懋持之益急曰爾奈何失昏期也思禮不得已泣從之合卺之夕思禮屢誦蓼莪詩泣曰娶婦為養姑也吾母今不在寧不肝腸寸裂乎連泣七日夜不輟見者哀矜焉思禮既娶後學功愈自策不敢廢洪武六年春詔下郡國徵諸生思禮亦上名吏部已而奉㫖入成均為弟子員試藝中選升上舍生先是思禮既喪親夙夜不忘乃以如在扁其堂襲封衍聖公孔君希學為作隸古書之御史中丞誠意伯劉公基參知政事陶公凱暨中朝士大夫皆有詩若文贈之云史官曰豫在詞林思禮時同諸生入謁每言及父母其淚滂然流豫為惻然久之昔者李沆之父獨生沆待之甚嚴或勸之答曰止以一子不可不爾也後沆卒為名臣石氏以一女婦乃能忍哀茹苦而以嚴教子以節自誓以潔白終其身可謂貞婦者矣思禮日夕兢惕惟恐有孤先志思欲以沆自勉不亦孝子之情也哉是皆有係於名教人紀之重不可不書也具列其事于篇書萬安丞吉安萬安縣有豪民劉仲賢以攘牛殺鄒君瑞父子五人厯時已久鄒嫗始獲執牒訴諸縣懼不得尸弗録嫗辭嫗哭於庭三日縣丞髙昌萬鵬舉録之俄有大蜂五聚丞之案麾去復至如是者四三丞乃祝曰爾信為鄒之鬼邪明日再聚吾案如期蜂復集丞猶未之信連與蜂期咸如初丞乃上馬抵劉舍反覆蹤跡之總無所有忽見五蜂飛集竹坡丞亟令左右具畚鍤斸之四尸藏竹下如生唯孩童尸未獲蜂復導丞至榆木下環繞而悲鳴發之孩體已腐唯其首獨存獄具斬劉市中嗚呼人不得其死附物以暴寃者至如是夫昔豫友楊觀尹漢川有蛙鳴躍履畔楊曰汝若有所訴當前我蛙即躍而去楊躡其後行二里所見一尸橫焉楊捕逆旅氏一鞫即伏方疑無主名檢死衣得過所知為湖南賈人遂伏辜漢川人與豫言豫竊以載籍所見固有若斯者是殆未可信也今觀萬安丞事與之正類徵諸人人言不殊其將弗信矣乎因謹書以為世戒書前定三事永嘉林君伯恭為濓言溫生延祐丁巳八月八日至三歲父命名榮祖又十二歲更今名又十歲當至正辛巳以春秋經試江浙鄉闈溫名第一董彞第四董朝宗第五朱公遷第二十八實殿榜後榜中孔暘王孔文髙祿鄉潘如圭四人皆再薦溫上南宫不利以恩例置奉化州學正丁亥始之官㑹董彞亦為學正慶元交談之頃彞慨然曰吾父諱伯大嘗出應書大父得竒夢記諸籍云丁巳年九月七日夜夢林溫作魁朱姓人鎖榜第四第五人連姓董內四名用朱筆㸃云是舊請舉者稽之於今無有不合其最異者溫之生甫一月爾奉新王君文博復與濓言載夢與劉鑄到南昌經江西省署見放鄉貢進士榜諦視之髙懸朱牌十枚上書金字日光炫耀不可讀忽一隸卒前白曰第一名南昌熊誼汝居第六遙呼鑄曰爾名亦在後須㬰有紅英佩刀者十餘人自省中歡而出似相迫逐載驚寤明發與人言皆大笑當是時大都督朱公鎮南昌干戈方殷謂安有貢舉之事後八年為洪武庚戌始設科江西四十名額南昌占其十十名中熊誼冠首正符朱牌之數載却在通榜第六鑄居十九及試大廷載又中第二甲第六名一一皆驗濂聞此二事頗異之且言於金溪吳君伯宗伯宗曰豈惟是哉庚戌之夏五月二十二日臨川通判王黻夢城中作樂迎狀元黻甚訝之二十五日忽聞使者來頒科舉之詔其年秋伯宗濫充江西鄉試第一衆已為與夢叶至廷對之日復擢置榜首鄉里至今以為美談濓觀傳記所載前定事如此類者甚衆未敢信也今親聞三君子之言其有不可信者乎姑書之以見人囿氣化中誠有一定之數不可以智求不可以計免也自修之外一聽於天而已書劉真人事劉真人德仁滄州樂陵人始生有光照其室及長讀書稍通大義㑹宋靖康之亂徙居鹽山太平鄉一日晨起有老叟乘犢車相過托道德經要言授之曰善識之可以修身可以化人仍投筆一枝而去自是𤣥學頓進從之游者衆真人乃取所授書敷繹其義以示人一曰視物猶已勿萌戕害凶嗔之心二曰忠於君孝於親誠於人辭無綺語口無惡聲三曰除邪淫守清靜四曰逺勢利安賤貧力耕而食量入為用五曰毋事博奕毋習盜竊六曰毋飲酒茹葷衣食取足毋為驕盈七曰虛心而弱志和光而同塵八曰毋恃强梁謙尊而光九曰知足不辱知止不殆學者宜世守之金大定初詔居京城天長觀賜號東嶽真人傳其道者幾遍國中且善於劾召之術趙氏為狐所祟真人劾之里中塋兆自焚狐數百鳴嘯赴火死人尤神之然其養毋如禮及亡喪祭一遵世教無愆度者後若干年追封無憂普濟開明洞微真人德仁卒陳師正嗣師正幼漁于河德仁挈以入道能預知吉凶事師正卒張信真嗣有詩文數百篇號𤣥真集傳于世信真卒毛希琮嗣當金之亡兵戈俶擾希琮能以柔而存希琮卒酈希誠嗣元憲宗甚尊禮之賜真人號曰太𤣥名其教曰真大道仍給璽書護之希誠卒孫德福嗣德福卒李德和嗣德和卒嶽德文嗣德文卒張清志嗣自德仁至此世稱之為九祖云史官曰道喪千載諸子之言人人殊德仁在宋金之間􅀢佛老子遺意以化人人亦多從之者蓋其清修寡欲謙卑自守力作而食無求於人實與天理合也天理人心所同固足以感召歟彼得之而此失之其亦有以也夫書客言二首天台李某遇盜官為購捕之有刀鑷工出簪珥粥諸市市魁執送官工具言私於下東鄰女得之官逮女問狀女戰栗不能言工曰爾母佯懼為也爾左乳有瘢可驗官覆之信然女恚自剄死死三月始得真盜初女童子時常用工剃髮故知女瘢工怒女嫁時不償其勞陷之黃巖少年嘗游於博徒一日飲市上市人㩦虛篋與博不勝馳而去少年慙其紿已躡至大澤中杖之仆地有一翁挾子過焉意其病厥也扶還其家未至而氣絶市人家縳翁父子入官子哀慟不伏翁謂子曰兒毋用苦吾老矣自度在世無幾願易兒也子聞之輒自陳殺市人狀甚悉官用縱翁歸翁念兒寃也自經死為說者曰漢張釋之為廷尉天下無寃民嗚呼今之從政者其釋之也哉書白衢州三衢沈君持正來為烏傷文學掾豫謁之持正盛稱其守白侯之賢豫問之曰侯定科繇如何曰衢為州雖據東浙上游厥田惟下下入賦以斛計僅三萬三千有餘豪有力者兼并且善避役役多在貧人侯察其奸令民自實田以田定賦一州服其平侯律已何如曰侯清約甚飲衢水外一物不煩衢民每旦徒行入府署野夫不識與爭道不問廷有鬭民立為疏直枉皆免冠叩頭謝長子自沔陽來越旬即遣歸唯一童給侍朝夕未幾亦遣侯馭吏若隸何如曰吏抱案立左右唯侯言是裁不敢以意出入之隸人數不逾九凡冒隸名巡聚落以病人者悉罷去去年春藩府以善治聞天子嘉之遣使賜束帛衢人咸為侯榮豫問已顧謂二三子曰此南陽白景亮明甫自征東行省譯曹掾起家四轉而來為是州甚有惠政昔豫聞蘭溪吳德基言若此今持正又盛稱其賢故豫屢問之持正言與德基同則白侯之賢信已使牧郡國者皆得如侯則下民之瘼庶幾其有瘳乎答郡守聘五經師書十一月二十七日承遣使者來山中賜以書幣强濂為五經之師聞命驚愕不知所云雖然執事之意則甚善也昔舒人文翁為蜀郡守招下縣年少者為學官弟子每行縣益從學官諸生明經飭行者與俱蜀地大化比齊魯焉執事亦舒産是宜汲汲孜孜欲追躅於文翁也然而興學在乎明經明經在乎選傅得良傅則正鵠設而射志定土范齊而鑄器良聲流教溢俗轉風移反是則政墜矣此則執事不可不慎者也濂也不敏幼即多病若藝黍稷與肇牽車牛逺服商賈之事皆力所不任靖自念之吾將何執以閲世乎適家藏古書數千卷因取翻閲習久成性遂不欲棄去然亦藉是以自遣耳非有所能也是故家庭之間未嘗以知經稱之豈直家庭哉至於鄉黨州閭亦未嘗謂其通經也執事者不之察一旦强儒之使服深衣大帶張拱徐趨於講堂之上吾恐人無不笑之而所笑者又恐不止於區區也執事何為欲强之乎況五經自孟氏後無兼通之者如施讐之易大小夏侯之書轅固韓嬰之詩尹更始之春秋慶普鄭興之禮各僅僅成家而已濂視數子之間曽不足負羈絏以從執事采浮華而忘本實但見耳目具者輒聘以為師執事倡之曰某可師也左右畏威莫敢諌白又從而和之曰某實可師也所以濫及於濂濂縱不顧清議曲㣘執事意而匍匐從之襟佩森如立竹執經問難欲屛之邪則所職何事欲應之邪則環視其中枵然無所有其於窘迫實有不堪執事何為欲强之乎古之通經者非思騰簸口舌以聾瞽時俗實欲學為忠孝而孝者又百行之冠冕茍於孝道有闕則雖分析經義如蠺絲牛毛徒召辱耳陽城為學官時謂諸生曰凡學者學為忠與孝也諸生有不省親者乎其有不省親者即斥去之此古人龜鑑也濂嚴父年埀八十旦暮㺯雛親側以盡愛日之誠猶懼不足乃使棄之以臨諸生諸生將何以取法乎諸生尚不欲久去膝下況為師者乃可爾乎世豈無陽城將何面目以見之也執事何為欲强之乎師嚴然後道尊理勢然也濓以輕浮淺躁之資習懶成癖近益之以疏頑不耐修飭亂髮被肩纍日不冠時同二三友徒跣梅花之下轟笑竟日不然則解衣偃卧看雲出巖扉中有類麋鹿然見人至輒驚遁欲危坐一刻亦不可得自知獲罪名教痛思懲艾卒不可變此執事素所知非今日造此飾詞如此之人不棄絶則已安可使儀刑後進執事何為欲强之乎濂雖不能造文性樂之甚當操觚沈思時闔扉凝坐不欲聞步履聲雖犬猫不使之近即近輒拊几大呼人咸指為狂易傳以為笑儻章不能就擊磬繞室中行或使小蒼頭簡髮如捕蝨狀或摩搔膺腹使氣隆隆然降升乃已若一入城市衆人叢居又無邃房曲閣可下關牡未書半行狙伺猿視大鳴小噪敗人興趣寧失萬金之産乃不怨茍廢此樂不如無生執事何為欲强之乎平生朴戇視人世百為顛倒變幻動如神鬼或握手視肺肝乃宿刀劍之慘或鬭爭紛不可解則暗敦玉帛之好如此之類不一而足明以告我尚不能通曉況啓之以端欲使其揣摩測度邪自料決不能與此輩周旋茍與之相周旋寧免其見賣乎況兼目有短視疾雖月下可讀蠅頭之字距尋尺間白晝則不見人不相知者必以我為簡非挾人以濟如水母之目蝦必有禍我者素無所仰於人不知奚故而自求苦乃如此執事何為欲强之乎又自嬰禍患以來得怔忡疾見一夫負㦸而趨心輒驚悕若杵擊下上面無色澤口噤不能對人近年衰孱日甚酬答稍煩則肩髀頽墜重如壓石急呼枕熟寐一二時然後漸復其舊自度亦不久在人世者所居之北有一峯峻甚俗以其如馮翊夏陽之山因號曰小龍門其間多閒曠之地思誅茆架草室三間以奉老親則志願畢矣此足一出衆事皆棄嘗日夜計之與執事相契亦歡甚初無不共戴天之讐執事何為欲强之乎昔者衛人有西乞牟問禇師睔曰世傳五鳯信祥徴乎曰有東方則發明南方則焦明西方則肅爽北方則幽昌其見或有孽焉唯中央號鳯凰乃至瑞耳曰可獲之乎曰否有德則見岐山之陽爾非可以力致也禇師弗之信出千金號諸岐山之陽岐山民疑之羅彩鷮售焉禇師持歸誇諸人人皆笑之執事之所為無乃有類於是乎吾婺為東萊倡道之邦而龜山考亭之正宗又往往傳諸學者故閥閲之家多尊道德而賤功利據案談經比比皆是執事不彼之即而獨此是强豈棄瑞鳯而愛彩鷮乎古人有云經師易得人師難遇執事於易得者尚不鑒其僞真況所謂難遇者邪竊為執事不取也雖然執事孜孜汲汲以興學為意何讓乎蜀之文翁但未能選良師傅其術為少疏耳今之為守牧者不為不多也而溺冠跨項亦有之矣如執事者又何可少哉又何可少哉濓非明經者愧不能成執事之意化吾邦如齊魯故歷疏鄙衰之不可强者如此惟執事采擇焉儻嬲之不置則黃冠野服負親而逃東海之上豈能悖性徇物亹亹隨人作上下邪禮幣隨使者還千萬情辭筆不可盡答董秀才論詩書濂白秀才足下承書知學詩弗倦且疑歷代詩人皆不相師旁引曲證亹亹數百言自以為確乎弗拔之論濓竊以謂世之善論詩者其有出於足下乎敢然不敢從也濂非能詩者自漢魏以至乎今諸家之什不可謂不攻習也薦紳先王之前亦不可謂不磨切也揆於足下之論容或有未盡者請以所聞質之可乎三百篇勿論已姑以漢言之蘇子卿李少卿非作者之首乎觀二子之所著紆曲淒惋實宗國風與楚人之辭二子既沒繼者絶少下逮建安黃初曹子建父子起而振之劉公幹王仲宣力從而輔翼之正始之間嵇阮又疊作詩道於是乎大盛然皆師少卿而馳騁於風雅者也自時厥後正音衰微至太康復中興陸士衡兄弟則倣子建潘安仁張茂先張景陽則學仲宣左太沖張季鷹則法公幹獨陶元亮天分之髙其先雖出於太沖景陽究其所自得直超建安而上之髙情逺韵殆猶大羮充鉶不假鹽醯而至味自存者也元嘉以還三謝顔鮑為之首三謝亦本子建而雜參於郭景純延之則祖士衡明逺則效景陽而氣骨淵然駸駸有西漢風餘或傷於刻鏤而乏雄渾之氣較之太康則有間矣永明而下抑又甚焉沈休文拘於聲韻王元長局於褊迫江文通過於摹擬隂子堅涉於淺易何仲言流於瑣碎至於徐孝穆庾子山一以婉麗為宗詩之變極矣然而諸人雖或逺式子建越石近宗靈運𤣥暉方之元嘉則又有不逮者焉唐初承陳隋之弊多尊徐庾遂致頽靡不振張子夀蘇廷碩張道濟相繼而興各以風雅為師而盧升之王子安務欲淩跨三謝劉希夷王昌齡沈雲卿朱少連亦欲蹴駕江薛固無不可者奈何溺於久習終不能改其舊甚至以律法相髙益有四聲八病之嫌矣唯陳伯玉痛懲其弊專師漢魏而友景純淵明可謂挺然不羣之士復古之功於是為大開元天寶中杜子美復繼出上薄風雅下該沈宋才奪蘇李氣吞曹劉掩顔謝之孤髙雜徐庾之流麗真所謂集大成者而諸作皆廢矣並時而作有李太白宗風騷及建安七子其格極髙其變化若神龍之不可羈有王摩詰依倣淵明雖運詞清雅而萎弱少風骨有韋應物祖襲靈運能一寄穠鮮於簡淡之中淵明以來蓋一人而已他如岑參髙達夫劉長卿孟浩然元次山之屬咸以興寄相髙取法建安至於大厯之際錢郎逺師沈宋而苗崔盧耿吉李諸家亦皆本伯玉而宗黃初詩道於是為最盛韓栁起於元和之間韓初效建安晚自成家勢若掀雷抉電撑決於天地之垠栁斟酌陶謝之中而措辭窈眇清妍應物而下亦一人而已元白近於輕俗王張過於浮麗要皆同師於古樂府賈浪仙獨變入僻以矯豔於元白劉夢得步驟少陵而氣韵不足杜牧之沈酣靈運而句意尚竒孟東野隂祖沈謝而流於蹇澀盧同則又自出新意而涉於怪詭至於李長吉溫飛卿李商隱段成式專誇靡曼雖人人各有所師而詩之變又極矣比之大厯尚有所不逮況厠之開元哉過此以往若朱慶餘項子遷李文山鄭守愚桂彥之吳子華輩則又駁乎不足議也宋初襲晚唐五季之弊天聖以來晏同叔錢希聖劉子儀楊大年數人亦思有以革之苐皆師於義山全乖古雅之風逮王元之以邁世之豪俯就繩尺以樂天為法歐陽永叔痛矯西崑以退之為宗蘇子美梅聖俞介乎其間梅之覃思精微學孟東野蘇之筆力橫絶宗杜子美亦頗號為詩道中興至若王禹玉之踵微之盛公量之祖應物石延年之效牧之王介甫之原三謝雖不絶似皆嘗得其髣佛者元祐之間蘇黃挺出雖曰共師李杜而競以已意相髙而諸作又廢矣自此以後詩人迭起或波瀾富而句律疏或煅煉精而情性逺大抵不出於二家觀於蘇門四學士及江西宗派諸詩蓋可見矣陳去非雖晚出乃能因崔德符而歸宿於少陵有不為流俗之所移易馴至隆興乾道之時尤延之之清婉楊廷秀之深刻范至能之宏麗陸務觀之敷腴亦皆有可觀者然終不離天聖元祐之故步去盛唐為益逺下至蕭趙二氏氣局荒頽而音節促迫則其變又極矣由此觀之詩之格力崇卑固若隨世而變遷然謂其皆不相師可乎第所謂相師者或有異焉其上焉者師其意辭固不似而氣象無不同其下焉者師其辭辭則似矣求其精神之所寓固未嘗近也然唯深於比興者乃能察知之爾雖然為詩當自名家然後可傳於不朽若體規畫圓准方作矩終為人之臣㒒尚烏得謂之詩哉是何者詩乃吟咏性情之具而所謂風雅頌者皆出於吾之一心特因事感觸而成非智力之所能增損也古之人其初雖有所沿襲末復自成一家言又豈規規然必於相師者哉嗚呼此未易為初學道也近來學者類多自髙操觚未能成章輒濶視前古為無物且揚言曰曹劉李杜蘇黃諸作雖佳不必師吾即師師吾心耳故其所作往往猖狂無倫以揚沙走石為豪而不復知有純和沖粹之意可勝嘆哉可勝嘆哉濂非能詩者因足下之言姑略誦所聞如此唯足下裁擇焉不宣濂白擬答吕相絶秦書昔我嬴秦實長西戎獻公不我鄙夷以伯姬歸我穆公穆公不敢忘獻公薨國內不靖羣公子出奔穆公懼大國社稷之隕㑹齊人納惠公于晉惠公許以河外列城五東盡號略南及華山內及解梁城言猶在耳乃即背之㑹晉薦饑來乞糶於我諸大夫惡惠公二三其德也欲乘饑伐之穆公則曰其君是惡其民何罪於是乎輸粟于晉自雍及絳相繼不絶未幾秦亦饑穆公又曰晉君其能恤我民矣乎遣使之晉惠公弗念穆公之施絶而弗與穆公不得已有韓原之師相從惠公而西雖然豈敢以至即改館饋七牢焉使歸于國及晉再饑穆公又餼之粟惠公薨懷公遣師軍于廬栁威靈所加孰不畏之我穆公忘已之怨使公子縶如晉師天誘其衷退軍于郇文公遂入曲沃朝于武宫吕卻畏逼將焚公宫以圖不軌穆公知之乃潛㑹文公于王城誘而殺之文公即位來逆夫人嬴氏穆公以晉國大臣未協俾三千人衛之以歸微我穆公惠文之能有國未可知也則是我有大勳于晉豈惟諸侯知之皇天后土實與聞焉文公常不忘我舊德戮力同心以輔王室子帶之亂天王出居于鄭使左鄢父來告難亦使簡師父以告于晉我穆公左執鞭弭右屬櫜鞬親帥師屯于河上以遲文公文公恐我分其績也乃辭我師而下納王于成周殺太叔于隰城而獨受陽樊溫原攢茅之田我穆公不敢言文公自是信宣於諸侯虞夏商周之𦙍莫不震疊相率而朝於晉非為秦也文公又以諸侯方睦欲修舊怨于鄭穆公畏文公之威不能自寧急出師軍汜南鄭伯恐使燭之武來言曰君嘗為晉君賜矣許君焦瑕朝濟而夕設版焉君之所知也夫晉何厭之有既東封鄭又欲肆其西封若不闕秦將焉取之穆公聞其言而懼結盟而還文公薨襄公即位穆公有事於鄭未嘗以一矢犯晉疆場襄公蔑棄我穆公以墨衰即戎敗我于殽殄殱我卒徒係纍我三帥我穆公亦不唯晉之怨乃自悔過誓告於羣臣然猶願徼靈於惠文以事我襄公襄公不察我之誠又帥宋陳鄭三國之師取汪及彭衙國中之人怒曰晉不報德則已乃日事干戈是欲滕薛我也將悉敝賦以待于郊亦冀晉人遣一介行李之來修復舊好襄公唯力是恃又伐我圍邧新城襄公薨穆公亦即世晉人以國家之難欲立長君使先蔑士㑹如秦逆公子雍我康公唯穆公之事是效多帥徒衛以納之晉人遽食前言而立靈公又敗我於令狐自時厥後又取我少梁又戰我于河曲康公薨共公即位靈公亦悔于厥心欲求成于我又不明言以侵崇急我我共公惡其詭道弗敢與成靈公薨景公即位景公不務撫綏秦民又迫我于輔氏景公薨君嗣厥位寡人謂二三大夫曰我兩國匪以玉帛相見而以興戎寡人之恥也盍行成乎君亦降心相從㑹于令狐而盟于河之東西口血未乾又使郤錡乞師于魯欲以伐我且以蔓辭以文致我罪寡人聞之困獸猶鬭況國乎君既有意督過矣寡人亦何愛一國士卒不與君周旋左右乎君若惠顧前好唯令狐之盟是申是尋亦唯命鍛乃戈矛備乃弓矢俾兩君相見于野亦唯命寡人敢帥西方之諸侯俯伏以聽唯執事其進退之擬漢賜衛青璽書皇帝使謁者問大將軍青朕以眇身托於諸侯王上萬方嚮風唯胸奴未款塞且登我叛臣計謂漢兵不能度幕輕留數寇邊民不得田作朕心靡寧今遣大將軍將四將軍出定襄驃騎將軍去病出代各將五萬騎步兵踵軍後數十萬人必深入赴利禽獮而草剃之且敵逐水草食聞大軍至多藏匿山中䇿其必有伏卒有伏何以制之將軍預為備跡捕山間敵且盡乃為便中國為敵所苦者日久將軍乘吏士鋭氣當一鼓而克勿延期敵土地寒苦漢馬不能冬功脫不蚤就進退惟艱爾當今智謀勇功誰復如將軍者即將軍不滅敵敵將孰滅哉間者敵入上谷殺略吏民將軍擊却之右賢王冦朔方將軍率六將軍圍之得禆王十餘人衆萬五千餘人畜數十百萬將軍屢建功髙即此行寧有不利耶朕已下丞相御史趣刻印俟幕府以功上使使者即軍中益封爵將軍勉焉驃騎將軍與將軍一體人也其立功有如將軍前將軍廣年耄且數竒毋令當單于秋向髙幕北風苦徑將軍强食慎兵事自愛補范少伯辭越王書臣聞知足不辱知止不殆古之明戒也臣雖不佞竊嘗從事斯語敢白其私於下執事唯君王加察焉臣本南陽一布衣自謂衰賤未嘗世祿故飲食則甘天下之無味居則安天下之賤位被髮佯狂不與於世而君王待之過禮置諸羣臣之列臣日夜心計之一介狂士而上辱君王之知如此當盡瘁以事國即於國事無所建白設有不幸誓伏劍結纓以報稱萬一言雖不出諸口上帝鬼神實鑒臨之夫椒之役夫差分其人民之衆以殘伐吾邦夷吾宗廟莽為空棘君王以餘兵五千保棲㑹稽下守溟海唯魚鱉是見困亦甚矣夫差不道復追而圍之大夫種膝行頓首請成夫差聽申胥讒毅然不許君王恚甚至欲殺妻子燔寶器觸戰以死臣時在左右憂懼不知所為亦屢思克踐前志所以未忍即死者將有所圖也幸賴先王之靈夫差悔過卷斾而旋君王既反國臣亦得效犬馬奔走與大夫柘稽為質于吳夫差畏君王之威不敢久留臣遣之東歸君王因與臣及大夫種謀以復讐為事食不殺而饜衣服純素不袀不𤣥內飭其政外事諸侯如是者二十餘年始發習流二千教士四萬人君子六千人諸御千人有事于吳及其平而還後四年復往伐焉敗之於囿又敗之于郊又敗之於津如是三戰三北遂圍之棲夫差姑胥之山夫差使王孫駱肉袒膝行請成君王弗之許乃被五勝之衣帶步光之劍仗屈盧之矛瞋目大言以執之夫差懼太息四顧引劍而死君王乃北渡淮與齊晉諸侯㑹于徐州致貢于周周元王使人致胙命為伯當是時越兵橫行江淮東諸侯畢賀初君王之在㑹稽其辱為已甚臣豈不知主憂則臣勞主辱則臣死其不能即死者為此事也藉君王之威武二三大夫之用命一雪其仇始願從㑹稽之誅君王憐臣之愚不賜臣以死乃欲與臣分國而治且臣聞之四時之序成功者去天之道也功成名遂身退明哲之事也持祿固位知進而不知退危亡之道也昔晉大夫祈奚為中軍尉請老而歸身名俱全人以為知分申侯有寵於楚鄭之君楚鄭之君唯其言之是聽非不可者卒致首領不保為天下萬世笑何也不能退也況臣起自布衣幸得侍衛左右何功於越而稱上將軍大名之下難以久居若戀執寵榮而沈溺不返不有人禍必有天殃君王幸察臣知止知足之志賜臣骸骨得乘扁舟出三江入五湖去耕東海之濱則志願畢矣唯君留意焉文憲集卷二十八
