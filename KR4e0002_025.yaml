body:
  text: 文憲集卷二十五明宋濂撰行狀凡四章故集賢大學士榮祿大夫致仕吳公行狀曾祖諱聞皇贈中奉大夫福建道宣慰使護軍追封渤海郡公妣盛氏追封渤海郡夫人祖諱蕃皇纍贈資善大夫太常禮儀院使上護軍追封渤海郡公妣沈氏追封渤海郡夫人父諱伯紹皇纍贈翰林學士承旨榮祿大夫柱國追封渤國公妣金氏追封渤國夫人本貫婺州路浦江縣德政鄉尊仁里年八十二公諱直方字行可姓吳氏初名佐孫後避十世祖諱而更以今名其先出自毗陵毗陵吳之延陵乃季子之家邑也自時厥後一遷於鄱陽再遷於嚴陵三遷於婺之浦陽浦陽北鄙有里曰新田去今縣治二十餘里吳氏之先祖家焉其冢猶在大樓山之原厯三傳有一翁始生六子其介子公養唐乾寧初又遷縣西吳溪上公養生伯勝伯勝生文昌文昌生承倚承倚生佐佐生崇崇生子􅀈子􅀈生嗣明嗣明生元禮元禮生景行景行生璣璣生宣慰公聞世隱於農而能以誦詩讀書為務委祉埀休有自來矣聞生太常公蕃字衍之以貿遷有無稍出遊梁楚間晚而無子以三從兄迪功郎英之季子伯紹為之後伯紹實承旨公一名寶字伯玉公之父也公生四嵗而渤海郡夫人沒七嵗而渤國夫人卒十嵗而太常公亦捐館舍公獨與承旨公居承旨公寬厚長者強宗右姓時侵苦之奪其土田承旨公莫能誰何益衰削不振公時雖在童孺痛徹心髓仰天自誓曰彼之陵轢我者利其孤幼也豫稍長不能揚眉出一語白人豈丈夫也哉遂自力於學宗人幼敏家多納名士大夫鄉先生方公鳳粵謝公翺括吳公思齊咸寓與處或談名理及古今成敗治亂或相與倡酬歌詩公每出侍側聞其言有會心處輒記之終身不忘入坐書孰凝然如癡也至晚各散去猶執卷呻吟弗輟偶嬰蠱疾諸醫不能療數至困殆如是者十年人為公危有相者謂公曰子貌廣貴甚疾且亡害何不遊學以暢其懷乎能如吾言病不藥而自已公然之乃入郡城習吏事祝帥閫不數月其疾早瘳聞錢唐為東南都會而行中書蒞焉一時人物之所萃復謀往遊居數年而莫有用之者公歎曰王侯將相寧有種耶吾殆俟時也此而不遇豈别無其地乎於是不告戚姻交友直走京師日與貴公卿接所見益恢宏而所守益凝定第困於在下而峻登樞要者又諱問布衣隻影翩翩於五千里外惡衣菲食或不能繼凡厯二十有六年而落魄益甚矣其剛徑不屈之氣初不肯少貶以徇流俗或憫公勸其南歸公笑曰生為寄死為棄何分冀北與江南乎掉頭去不顧大德中會有旨粉黃金為泥書毗盧大藏經禮部選筆札端謹者充公在選中以勞當得一官未幾罷延祐初明廟在潛邸用大臣薦入備説書已而出幸北藩又罷去泰定元年奉省檄為上都儒學正逮之官已為代者所先時太師德王曼濟台留守灤京聞公氣宇恢廓延而與之語大恱以為南陽諸葛孔明亦不是過因聘入賔館使教其二子長則中書右丞相托克托次則御史大夫額森特穆爾公遂留德王家後德王日益貴顯事有難決者必質問而後行如卜蓍龜無少爽者德王益敬之遇休沐自必與公對語終日德王曰吾與他儒生語輒欠伸思睡今與君言有若聆鈞天廣樂終日而不知倦君誠竒士哉語已熟視公連稱賽銀者再賽銀華言所謂好也元統二年丞相方執法中臺以公在先朝有講説之勞言於上命為江浙等處儒學提舉與對品階中宫難之擬副提舉階將仕佐郎未及上重紀至元二年御史臺改授將仕郎海北廣東道肅政亷訪司承發架閣兼照磨而公年已六十一矣三年遷宣政院架閣管勾四年至官僅三月升本院長史公盡心弗懈出納惟允中宫數有白金束帛之賜逺國遣使欲獻羣馬以徼求厚價同列以為利爭言之公揣其道塗所經屢涉海洋非二年不可到縱到馬亦病死不能多力却去之六年丞相之從父秦王巴延方秉鈞軸恃其有定策功専權自恣悉變亂舊章出入擁重兵以自衛中外危疑上深患之丞相時為御史大夫乃召之問計丞相以謀於家為對公曰大夫失言幾事不密則害成矣丞相驚曰謀將安出公曰宜亟黜之以謝天下丞相以親嫌辭公曰傳有之大義滅親大夫知有朝廷耳家國不宜恤丞相曰事不成奈何公曰事不成天也一死復何惜即死亦不失為忠義耳丞相頓足曰吾意決矣乃入奏久之未敢動適秦王侍皇太子出獵栁林丞相欲發公曰皇太子在軍中脫挾之以生他變何以處之丞相悟急白太后傳旨趣以歸閉京城自守遣使持詔散遣諸軍出秦王為河南行省丞相一反舊政民大悅上多公協贊功召對便殿慰諭甚至會內臣以玉盤進饌輟以食公特超一十餘階授公集賢直學士亞中大夫七年改本院侍講學士進階中奉大夫復召入龍光殿錫以黃金束帶丞相亦自是進位台司國有大事上命必定於公公亦慨然以澤被斯民為己任有知無不言言之丞相無不行天下翕然比後至元之治於前至元之功居多然公謙抑未嘗與人言故人不可知所可知者其與議中書時一二事而已科舉廢已久公力言丞相曰科舉之行未必人人食祿且緣此而家有讀書之人人讀書則自不敢為非其有繫於治道不小丞相因奏復之二浙民食鹽病民為甚其直漸增至數倍民不堪命公為言之減其額而下其估他如楮幣銅錢相榷之宜有司公田多科之擾官寺建設之冗繁江南顧役之長利公咸一一建白多己見於行事拜集賢學士階資善大夫居亡何以年久謝事上章乞骸骨遂以集賢大學士榮祿大夫致仕食俸賜終身俄又賜田一千九百餘畝尋謝不受先是御史言公躐進官階奪其誥命至是察官辨其誣復之公生於宋德祐己亥十一月二十四日庚寅薨於今至正丙申七月十二日庚寅享年八十有二以薨後一月葬於德政鄉後吳山徐塢承旨公之墓左實八月十二日庚申也公前娶盛氏先十七年卒後娶金李二氏金氏纍封渤國夫人子男二長萊字立夫九嵗善屬文博通經史百家衆流之言蔚為儒宗文師延祐庚申以春秋預鄉薦後用御史察舉為饒州路長薌書院山長四方學者尊之私諡曰淵穎先生亦先十七年卒次志道崇文監承奉訓大夫孫男三長士諤婺州路金華縣儒學教諭涎士謐次存仁曾孫男三長中次平次弇曾孫女一申公讀書欲通大義務在力行不屑為區區章句之學其於魯論言忠信及事君能致其身之語尤深有契悟終身言必思踐至於國家有急輒欲忘軀徇之而不以為難經史格言可以斷大事決大疑者皆謹記之故其臨事未嘗少惑善評文詞詞林宗工與公遊者以所草詔令示之公為指其瑕疵極中事情人皆嘆服性尚風義德王夫婦薨公年已八十不憚鯨波之險親往京師行弔祭之禮尤人情之所難公深沉有謀絶不事表暴人但見其堅凝醇篤有若懦愞不知遇事快利若風鶻掠林健帆挾舟以飛也承旨公薨墓碑未立丞相欲為奏敕詞臣撰文以遺之公曰先君隱約田間少見於事為若挾天子威命以彌文夸侈之固無不可是非以誠遇先君也卒辭之乃自疊巨石十五成為碑大書所封官號復列幼時辛苦艱難與其自誓之意刻諸石隂且謂內曰此吾所以酬素志也公家食將十年跬步不妄出終日正衣冠危坐或至夜分未嘗有惰怠容賓至則相與劇談當世之務玉貫珠聨聞者解頤方嶽重臣仰慕聲光遣使執饋食之禮州縣大夫俯伏迎拜唯恐不恭四海之內雖愚夫愚婦亦皆能道公名字而公初無自驕之色遇鄉黨有如貧賤時官府事一髮不相涉僕從或以惡言加人輒縛致有司杖之生平不惑於堪輿家誑誕無驗之説遺言隨地而葬但毋使土親膚又以無大功業不必乞銘於人以為識者之所訕鄙乃自序厯官世第而系之以辭曰余生雖艱其有所覬漫遊京華旅食三紀際時休明偶膺祿仕位躋極品恩封三世儒者之榮於斯為至報上一誠如水東注樹碑自銘以詔來裔人以為實録云夫天之生材欲振之張之以昌大其支必抑之斂之以培植其本譬之於物其榮腴流鬯於發生之日者皆出於嚴氷霜雪摧折之餘蓋養之不厚則發之不茂其勢然也公以惇龎宏碩之資蘊康濟經綸之具司造物者特晦之於少齡而顯之於髦年其意亦猶是爾故公之施於用也篤固而不搖勇鷙而善斷雖職居散地實密贊化機一反掌之頃國勢尊安權姦自是而屏迹政治自是而康乂古之所謂社稷臣者於公殆庶幾矣然自聖元混一四海埀及百年大江之南韋布之士品登第一而以勞烈自見者豫章程文憲公文海吳興趙文敏公孟俯長沙歐陽公玄及公為四人或以文章顯融或以政事著稱事固有殊道則一也其沒而不返者既皆有所論述以表見於世公其可獨少乎公之子志道及其孫士愕恪奉先戒不敢乞銘於人以濂嘗受業淵頴先生之門而志道又從濂學最久因以事狀惓惓為請濂也不文幸獲受知于公雖契家子姓特容以賓禮見義固不敢辭謹采天下之人所嘗言者為文一通附諸家乘之末不敢抗之以為髙按之以從卑唯務稱其實而已他時執史筆者尚有考於斯焉至正丙申八月將仕郎翰林國史院編修官金華宋濂述故翰林待制承務郎兼國史院編修官栁先生行狀本貫婺州路浦江縣通化鄉胡塘里曾祖蘊妣童氏祖補之宋迪功郎嘉興府崇德縣主簿妣金氏考金宋忠翊郎髙郵軍髙郵縣令元贈奉訓大夫淮安路泗州知州飛騎尉追封浦江縣男妣俞氏追封浦江縣君先生諱貫字道傳姓栁氏其先出於有熊至展禽仕魯為士師食采栁下因以為姓自後子孫寖盛世家河東宋建炎中先生七世祖鑄始從趙忠簡公鼎自河東遷杭子森復自杭遷婺之浦江森三傳至蘊生崇德縣主簿補之崇德生髙郵縣令金髙郵先生父也先生素有異質雖未成人時即不茍取嘗隨髙郵遊神祠拾人所遺金珠可值萬緡密伺其求而還之髙郵驚異甫及冠遣受經於蘭溪仁山金公履祥仁山逺宗徽國朱文公之學先生刻意問辨即能究其旨趣而於微辭奧義多所發揮既又從鄉先生方公鳳與粵謝公翺括吳公思齊遊厯考先秦兩漢以來諸文章家大肆於文開闔變化無不如意先生曽不自以為足復裹糧出見紫陽方公回淮隂龔公開南陽仇公逺句章戴公表元永康胡公純長孺兄弟益咨叩其所未至諸公皆故宋遺老往往嘉先生之才無不為之傾蓋隆山牟公應龍得太史李心傳史學端緒且諳勝國文獻淵源之懿儀章官簿族系如指諸掌先生又往悉受其説自是先生之學絶出而名聞四方矣國朝大德四年庚子先生年三十一始用察舉為江山縣學教諭至大元年戊申遷昌國州學正江山乃大山窮絶之境昌國則邈焉雲海島嶼中先生皆以詩書變其俗考滿至京中書左丞張公思明一見輒器重俾諸子師事之當時號為名公卿者爭相延譽如恐弗及吳文正公澄嘗語人曰東陽栁君卿雲甘雨也天下士將被其澤程文憲公巨夫以墨一丸授之曰文章正印今屬子矣延祐四年丁巳先生年四十八銓曺以士論所歸特除湖廣等處儒學副提舉未上六年己未改國子助教階將仕佐郎至治元年辛酉升博士轉將仕郎諸生敬之如神明其後散之四方幾千餘人去為良御史名監司者甚衆泰定元年甲子先生年五十五遷太常博士升徵仕郎時方承平稽古禮文之事次第並舉遇有所討論先生為權準古今敷繹詳緻廷議莫不多之勳戚大臣請諡者三百餘人文移山積先生為之質行定名三月而畢臨江守李侯倜為部使者所劾他使者力辨其誣後官至集賢侍講法應得諡其子欲入金沒臨江事先生辭之卒明其非罪柄國者欲以其祖配享孔子廟禮官承望風旨唯恐有忤先生毅不可事遂寢有神降于洛郡長吏列上儀曺請錫封爵中書下其事先生以為神姦能鼓民不治將亂請檄所部禁戢之沅陵嵗貢包茅四十餘匭茅輕舟搖押行吏多沉江死先生建言請損其三之二附他以輸浙東西每三嵗更造漕舟民甚苦之舟一滲輒棄不視先生白相臣建船司以修治之其當新者聽給沒入贓吏錢毋病民會有力沮者不行監察御史馬公祖常薦先生堪任風憲章再工弗報三年丙寅先生年五十七以文林郎出為江西等處儒學提舉龍興郡學久廢不治先生請宰府新之延聘名儒孫轍為學者師士風為之復振他書院不籍於禮官者亡慮數十其出納布粟從提舉署主領一貟司之有力者常行貨求檄至則乾沒為姦先生盡罷遣分𨽻所在學官提舉朝夕膳嵗進米凡八十石皆取於諸餼廪中先生謝不受後來莫有敢追襲其弊者黃冠師建三靈廟以侵學地浮屠據東湖書院田二百二十畝而贏先生皆為復之葺漢先賢徐孺子墓立宋髙士蘇雲卿祠古碑碣所紀有關於名教者必訪求而重刻之凡可以扶世導民者無不為也豐城學徒挾姦以持教官短長時主教者又不知以職自振每用計相傾先生各坐以其罪聞者心服南康倉吏坐飛糧株連逮繫者百餘家省憲二府檄先生讞其獄先生為鈎摘隱伏所平反者甚多滿秩而歸杜門不出者十餘年完廬數間僅蔽風雨而饘粥或不繼先生處之裕如也先生雖居嵓壑海內仰之猶如魯泰山作鎮海隅莫不以其出處為斯文隆替之候風紀行部必過門承問而去至正元年辛巳先生年七十二朝廷更化徵用老成臺閣近臣有以先生名聞于上者於是有旨以翰林待制承務郎兼國史院編修官起先生于家先生即冠帶見使者退謂人曰吾今幸親禁近得陳堯舜之道以贊太平之治死不恨矣會貢舉法復行江浙行中書留主文衡二年壬午夏五月至官僅七閲月竟以一病不起實冬十一月九日而先生年七十三矣省臺樞府而下皆來歸賻館閣之士至於灑泣集賢大學士吳公直方國子博士吳公師道與經筵檢討危公素共經紀喪事御史中丞張公起巖在成均為同僚友至是哭之尤哀冢孫頴奉靈輀南還諸公相與陳奠東門見者皆咨嗟隕涕三年癸未冬十二月二十一日與夫人盛氏合葬通化鄉荆山之阡盛氏纍封浦江縣君先十二年卒子男三鹵同因孫男三秬穎穆秬夭女一所著書有文集若干卷金石竹帛遺文若干卷近思録廣輯三卷字系二卷藏於家先生局度凝定燕居默坐端嚴若神即之如入春風中久與之處未嘗見疾言遽色雖有桀驁者瞻其德容莫不氣奪而意消孝友本乎天性季弟實出為人後遇之有恩不翅在家者生平以奬進人材為已任諄諄勸誘至老不倦人有一善播之唯恐不亟士類咸樂歸之讀書博覽強記自禮樂兵刑隂陽律厯田乘地志字學族譜及老佛家書莫不通貫國朝故實名臣世次言之尤為精詳善楷法工篆籀京兆杜公本謂其妙處不減李陽冰為文章有竒氣舂容紆餘如老將統百萬雄兵旗幟鮮明戈甲焜煌不見有喑嗚叱吒之嚴若先生者庶幾有德有言為一代之儒宗者矣先生既沒同門友戴良既著哀頌一篇以泄無窮之悲復恐先生之羣行湮沒無以顯白於來世俾濂狀之濂雖不敏受先生之教為深因不讓而搜羅缺逸評隲成章以附家乘之後雖言之不文幸無愧辭他日太常特為定諡史官特為立傳尚有采於此云謹狀至正五年十月日門人金華宋濂狀故翰林侍講學士中奉大夫知制誥同修國史同知經筵事金華黃先生行狀先生諱溍字晉卿姓黃氏黃為婺名族至宋太史公庭堅族望尤著太史之從父昉生景圭俱來浦江景圭生琳娶忠簡宗公澤之女弟始遷於義烏琳生中輔力學尚氣節當秦檜柄國士有議已者輒捕殺猶奮然題樂府太平樓上有劒欲斬佞臣頭之語人至今誦之晚以轉運使薦當得官命垂下而卒中輔生紹祖紹祖生伯信於先生為髙祖迪功郎纍贈朝散大夫妣宗氏忠簡公四世諸孫女纍封安人曾祖夢炎淳祐十年進士仕至朝散大夫行太常丞兼樞密院編修官兼權左曺郎官以朝請大夫致仕妣陳氏纍贈宜人繼方氏祖堮方出也以進納恩補承節郎入國朝弗仕今纍贈嘉議大夫禮部尚書上輕車都尉追封江夏郡侯妣徐氏淳祐七年進士奉議郎兩淮宣撫大使司幹辦公事彬之女今追封江夏郡夫人父鑄以朝請府君遺澤補將仕郎今纍贈中奉大夫江浙等處行中書省參知政事護軍追封江夏郡公妣童氏承信郎監嘉興府鮑郎鹽場伯永女今追封江夏郡夫人夫人妊先生時夢大星煜煜然墜於懷厯二十四月以至元十四年冬十月一日始生甫晬即自免乳徐夫人抱而育之比成童不妄踰户閾授之以詩書不一月皆成誦逮學為文下筆頃刻數百言常著弔諸葛武侯辭前太學內舍劉君應龜朝請府君之外孫也見而嘆曰吾鄉以文辭鳴者喻叔竒兄弟爾是子稍加工不其與之抗衡乎因留受業弱冠西遊錢唐前代遺老與巨公宿學先生咸得見之於是益聞近世文獻之澤暨還故居從仙華山隱者方君鳳遊為歌詩相倡和絶無仕進意其友葉君謹翁力挽之出天德五年舉教官七年舉憲吏就試皆中其選已而復退隱于家延祐元年貢舉之法行縣大夫又強起先生充貢鄉闈時古賦以太極命題場中作者往往不脫陳言獨先生詞致淵泳綽然有古風特置前列二年上春官復在選中及奉大對惓惓以用真儒行仁義為言辭甚剴切讀卷者以其頗涉於激綴之末第奉上旨賜同進士出身主選吏以為白身補官散階當下二等上命特與對品階授將仕郎台州路寧海縣丞僅踰再期會有詔改鹽法江浙行中書承制遷兩浙都轉運鹽鐵使司石堰西場監運事聞命仍舊階居其職閲四載以功超一資升從事郎紹興路諸暨州判官至順二年用故御史中丞馬公祖常之薦入為應奉翰林文字同知制誥兼國史院編修進階儒林郎丁外憂去官服闋轉承直郎國子博士經六年之久請補外换奉政大夫江浙等處儒學提舉至正三年春先生始六十有七不俟引年亟上納祿侍親之請絶江徑歸俄有旨命預修遼金宋三史丁內憂不赴除服以中順大夫祕書少監致仕居四嵗故湖廣行省平章公多爾濟巴勒今中書左丞相太平開府公力交薦之被上旨著致仕仍舊階除翰林直學士知制誥同修國史同知經筵事進階中奉大夫九年夏四月洊上章求歸田里不俟報而行上聞之遣使者追及武林驛敦迫還京復供前職十年夏四月始得謝南還行中書為言於朝給以半俸終身公牘已具而未及上十七年秋七月今江浙左丞相金紫公達實特穆爾方承制司黜陟之柄移書起先生咨議省事以疾力辭閏九月五日薨于繡湖之私第享年八十有一學士大夫聞之俱流涕曰黃公亡矣一代文章盡矣門弟子劉涓王禕宋濂傅藻等咸來相治後事以是月十八日葬于縣東北三里崇德鄉東野之原距嘉議府君之墓僅十步娶王氏嘉熙二年甲科進士從事郎昭慶軍節度掌書記困金之曽孫文林郎監沿江制置副使司造船場沂之孫將仕郎桂之女今纍封江夏郡夫人先一年卒及是始合葬焉子男一人梓用蔭入官初授忠顯校尉紹興路同知餘姚州事女一人適惠州學正陳克讓俱先卒孫男四人瑄琛􅀈珣所著書有日損齋初稿三卷續藳三十卷義烏志七卷筆記一卷傳學者先生在寧海時縣地瀕于鹽場而亭戶恃其不統于有司肆毒害民民不敢正視編氓之𨽻漕司洎財賦府者亦謂各有所憑橫暴尤甚先生皆痛繩以法吏懼以利害白弗顧也有後母與僧通而鴆殺其夫者反誣夫前子所殺獄將成先生變衣冠隂察之具知其姦偽卒直其寃逺近以為神明巡兵捕鹽販者急遂沈鹽于河帥衆以拒巡兵怒乃取他私販事以實之民有在盜籍者謀為劫敓未行邑大姓執之以圖中賞格初無獲財之左驗事皆久不決先生為之疏剔以其獄上各論如本條免死者三十餘人部使者董君士恆行縣廉知先生有治狀事悉諉焉先生為黜其以賄敗者上百戶一人縣吏二人在官無祿者四十餘人愚民以婚田鬪競往訴咸下其狀多至數十百先生録其當問者即不當問者遣之先生明習律令世以法家自専者有弗如也凡經其論定翕然畏服不敢重有辭嵗大旱禱于靈湫有白龍蜿蜒見湫中已而黑雲四興大雨如注縣以有年在石堰視亭場為尤囏居是官者常以稱盤拆閲及不能檢防私鬻被譴先生規措有法無毫分入於吏議在諸暨其俗素號難治先生不加鄙夷一導以善政民多從化捕盜司屋壞撒而改作無敢後期巡海官舸例以三載一新費出于官而責足於民有餘則總其事者私焉先生適蒞是役撙節浮蠧以餘錢還之爭歡呼而去姦民以偽鈔鈎結黨與脅攘民財官若吏聽其姦挾之以往新昌嵊縣天台寧海東陽諸縣株連所及百餘家民受禍至慘郡府俾先生鞠治一問皆引伏獄具官吏除名同謀者各杖之有捕盜卒隂置偽鈔板於良民家乃白于官往索之惡少年持梃從者百餘人先生遇於野詰從吏曰弓卒額止三十安得此曺耶可縳送于州聞者遁走有盜繫錢唐縣獄遊民賂獄吏私縱之假署文牒發兵來為向導逮捕二千餘家先生疑而訊焉悉得其情以正盜宜得重議持偽文書來者又非州民俱械還錢塘誣者自明奉省檄監稅杭州先生御之以寬商旅四集僅閲三月增錢十二萬緡有竒在成均視弟子如朋友未始以師道自居輕納人拜而人來受學者滋益恭業成而仕皆有聞于世時人欲增設禮殿配位四配位合東坐而西向學官或議分置於左右同列不敢爭先生獨面折之其人恚甚日坐堂上以危語相加御史惡其無禮逐去之乃克如先生言在禁林會修本朝后妃功臣傳先生為條陳義例多所建明士類服其精允進經筵者三十有二經筵無専官曰領曰知咸宰執近臣講文之述率屬先生訂定非有關於治道之大者不敢上陳其啓沃之功為多上嘉其忠數出金織紋段賜之始先生嘗預考江浙江西上都鄉試江浙則三往而一主其文衡至是被上旨考試禮部尋又為廷試讀卷官前後所甄拔者盡知名之士先生天資介直絶不事造請逢覃官者一減資者五銓曺或失於收敘亦不自言在州縣間唯以清白為治一錢不受於民所至無圭田月俸弗給每鬻産以佐其費及升朝行挺立無所附足不妄登巨公勢家之門君子稱其清風髙節如氷壺玉鑑纎塵不汚先生性篤孝于親親歿營冢於三釡山有乳虎馴狎之異山去所廬十里月旦望必展省大暑寒不易先世遺文嵗久或有殘缺極力搜訪補綴成編家居不談米鹽細務與公府短長邑長吏來謁鄉鄰有急覬得片言為援輒峻却之尤不輕於薦引或譏其絶物先生諭曰公朝爵祿將以待賢者豈為吾私親設哉先生貴而能貧雖位至法從蕭然不異布衣時又寡嗜欲甫臨強仕之年即獨榻于外給侍于左右者二蒼頭而已遇佳山水則觴咏其間終日忘去其沖曠簡逺之情使人挹之鄙吝頓消與人交任真無鈎距不事矯飾以為容恱而誠意獨懇至然剛中少容觸物或弦急霆震若未易涯涘不旋踵間煦如陽春曾不少留礙焉先生之學博極天下之書而歸于至精有問經史疑難古今因革與夫制度名物之屬旁引曲證語蟬聨不能休至於剖析異同讞決是非多先儒之所未發見諸論著一本乎六藝而以羽翼聖道為先務然其為體布置謹嚴援據精切俯仰雍容不大聲色譬之澄湖不波一碧萬頃魚鱉蛟龍潛伏而不動淵然之色自不可犯中統至元以來如先生者二三人而已故凡國家典册詔令及勳賢當得銘者必命先生為之海內之士與浮屠老子之流以文為請者日集于庭力麾之而弗去一篇之出家傳人誦雖絶徼殊邦亦皆知所寶愛雅善真草書人有得其片幅者必藏弆以為榮世之評議者謂先生為人髙介類陳履常文辭溫醇類歐陽永叔筆札峻逸類薛嗣通識與不識僉無間言於呼先生生當六合混一之時鍾河嶽英靈之氣積之既厚所用亦宏仁皇肇開科舉之初即以儒學自奮厯仕五朝晚乃入侍今天子掌述帝制勸講經帷嶷然獨任斯文之重天下學士咸所師法遂使有元之文章炳耀鏗鍧直與漢唐侔盛先生之功固不細矣至於出處大節尤人所難能者年未七帙而謝事暨羣公力薦起之俄復控辭上方眷待之深再召還朝未幾又辭其難進易退之風真足以廉頑而立懦揆之古聖賢之道蓋無愧也若先生之所自立者豈不綽綽可傳於後哉先生之薨在法當錫諡立傳某從先生遊埀二十年知先生為最深因輯任官行事為書一通上干太常國史然巨細詳記不敢效古書法為簡嚴者欲其事之白以俟芟托也謹狀至正十年十月一日門人金華宋濂狀凝熙先生聞人公行狀公諱夢吉字應之以諱行姓聞人氏相傳出於漢太子舍人通其後裔遷居於蜀有諱韶者為婺之金華縣令遂為婺人縣令生逸孫以儒學教授溫州娶王先生詵之女生子號桂山翁翁生始三嵗而教授君亡王後去適項氏翁鞠於其家因從其姓及長娶劉侍郎諸孫女而生公乃以公還氏聞人云初鄉先達定菴魯齋二王公崇尚伊洛之學金鳴而玉應宫奏而商宣倡明道學號為極盛翁往來咨叩而得之定菴者為最深翁知公有異質父子自為師友晝夜飭厲之公亦上承翁志不出郊坰者十年一日有約遊城南者所藏黑履久弗御革底為穿故凡七經傳疏悉手抄成帙義理所在深體密察微如蠶絲牛毛剖析靡遺積之既久神會心融訓詁之説有紛拏不定于一者公别其是非如辨黑白四方學徒或執諸經問辨公為厯陳衆義而折衷之不煩餘力譬猶屠牛坦一朝解十二牛而芒刃不頓君子稱之泰定丙寅公以尚書舉于鄉上禮部不利公無幾微見于顔面益進修弗懈時有司以解額太嚴不足厭士論别選文理優者為副榜公後連中焉海右憲府知公學行欲辟書吏公辭重紀至元初山東李公絅持部使者節來浙東知公不可吏乃薦為校官初授處學録轉衢之西安縣學教諭昌國州學正名上銓曺改泉州路學教授某郡李君國鳳方經略江南得承制專封拜君嘗從公遊知位不稱其德擢為福建等處儒學副提舉公力辭朝廷尋以年久當升除慶元路總管府知事未上以壬寅嵗三月丁未卒于永康之寓舍上距所生癸巳之年凡七十載娶胡夫人無嗣以弟之子亨享為後二女長曰貞適唐夀道説齋之五世孫次曰艮適胡裕夫人之姪也以是年八月一日權厝于合德鄉之原禮也公之學一以誠為本涵養既馴內外一致故其氣貌類玄文之玉溫潤而澤絶無纎瑕而孚尹煥發于外者燁如白虹能令人愛戀弗厭下帷講授前後授學者數逾二十各隨其資而裁輔之多有躋膴仕者性行恬沖公卿之家意欲邀致每避謝弗往門庭之間草積不剪雖當鑠金之暑折膠之寒正襟危坐淵然若有思終日未嘗傾側其誨學者必先道德而後文藝故於辭章若不經意時而出之文義深鬱亦粲然可觀江左名士鄧某以儒者之學自任尤知愛公謂公門弟子曰今時學子德未能立而溺志修辭組織華彩沽釣聲譽實德且病矣如吾夢吉誠髙世之軌範哉人以為知言公既沒及門之士以公執醇弗變而含和有耀也私諡曰凝熙先生仍告郡太守祠公於學宫前原道書院吳履前進士仁和丞唐元嘉從公為甚久猶患粹行不昭于世條而列之俾濂銓次成書鍥梓以傳某實無似曩因張教授繼之拜公於函丈公一見遇之如子姪所以整攝其威儀礲磨其問學者無不至也第以患難相仍業不加修有悖於公之所教又安能道盛德之什一哉雖然不敢辭也謹用刋落葩藻直序事迹以俟傳儒林者諡議凡四章深裊先生吳公私諡貞文議斯文天地之元氣得其正者其文醇得偏者其文駁世之治也正文行乎上則治道修而政教行世之亂也正文欎乎下則學術顯而經義章斯文之正非謂其富麗也非謂其竒佹也非謂其簡澀渙漫也本乎道輔乎倫理據乎事有益乎治推之于千載之上而合參之於四海之外而準傳之乎百世之下而無弊若是者其惟文之正者乎文茍得其正則窮泰何足以纍之浦陽深裊先生吳公天賦絶人精識邁古咀嚌六經以其道饜飫百家以盡其用貫穿該博洞視當世瑰瑋宏大不愧前古其陳理也明而嚴其敘事也精而當其道情也周而婉其賦物也深而遒年未弱冠志意廓然憤東鄙之不恭則欲蹈北庭而陳説覽時政之多僻則欲告時君以仁義以聖人之志莫顯於春秋也則排異説而務得褒貶之中以三代之政莫著于書詩也則略傳注而務得理事之實以亞聖莫盛於孟子也則斥史遷之妄而傳之以詞賦之祖莫忠於離騷也則法而式之以古樂府之作隨三代而升降也則撰而次之搜抉隱伏擲糾訛謬神行電逝川流石止傑乎雄哉先生之於文可謂貞而有則矣先生既不喜仕後用薦者為長薌書院山長而終史臣嘗附于元之列傳門人私以淵頴易名或竊病其未稱於是更諡曰貞文先生庶使來者知浦陽之文自先生始大盛而貞文之不遇可為當時惜也故翰林待制栁先生私諡文肅議天地之運隂陽之化置大和於生物之地置大肅於成物之時蓋鬯達茂遂之極非濟之至嚴則盛者不堅實者不確而發育於春夏者終不足以有成故降之以霜露沍之以氷霰使昔之驕虐暴溢者一旦收斂縮閉折挫而無遺寓深愛于至畏之中萬物莫知其由然故肅者天地之所以為教也惟人也亦然導之以柔惠誘之以慈良俾人見之而化者春之和也臨之以儼恪以榷其惰慢之氣持之以介正以格其邪僻之心不怒而威不言而厲者秋之肅也育才莫善於和成德莫善於肅嚴肅之君子其猶霜露之教乎元故翰林待制浦陽栁公先生負瓌雄絶特之才畜峻大剛方之德發而為文則沉雄而雅徑見之於行則端重而遂直怠色不形於面媚言不出於口所學以聖賢為師而不戾俗以為異所志以教化為重而不阿世以為同起為人師入造胄子周旋禮樂之署統教吳楚之區晚嵗就徵入掌帝制其於闢異端扶倫紀黜淫祀排勢臣徑氣直辭可輔彝訓危言卓行可激貪懦逮其退而燕處凛然神居屹然山峙喜怒不著語默有恆可謂有德君子矣先生既卒而元亦亡時異典湮節惠之禮未舉門人咸喟歎而稱曰士有易名况先生嘗有位者乎惟先生之文天下靡不聞知以德配之於義為稱先生之德宏深博大兹不敢擬議然表見而易覩者非曰肅乎請遵古者私諡之例以文肅定諡如何衆咸曰允哉遂諡曰文肅云洪武十年春三月己卯朔前某官同縣門人宋某謹議淵頴先生私諡議傳曰物生而後有象象而後有滋滋而後有數數成而文見矣是則文者固囿乎天地之中而實能衛翼乎天地品裁六度叶和三靈敷陳五彞開道四德何莫非文之所為而所謂文者非他道而已矣故聖人載之則為經學聖人者必法經以為文譬之于木經其區幹者歟文則其柯條者歟安可以岐而二之也自史氏失職以訓詁列之儒林以辭章書之文苑雖欲昭後世之弊而失之古義益逺矣有如長薌書院山長吳公先生丰裁峻明才猷允茂漱六藝之芳潤為一代之文英纂述之勤汗簡日積于詩書則科分脈絡而標其凡於春秋則脫略三傳而發其蘊於諸子則研核真偽而極其精於三史則析分義例而嚴其斷藻繢所及無物不華汪如長江峻如喬嶽激如雷電和如春陽其妙用通于造化其變通莫拘若應龍之不可羈觀其所志直欲等秦漢而上之凡流俗剽竊無根之學孱弱不振之章皆不足闖其藩垣而逐其軌轍者也嗚呼盛哉門人學子僉曰經義元深非淵而何文辭貞敏非頴而何於是私諡曰淵頴先生云門人金華宋濂等謹議凝熙先生私諡議太和之氣絪縕盤薄於堪輿間沛為甘澤凝為卿雲發為三秀醴泉産為祥麟威鳳及其鍾於人也為慈祥豈弟之君子足以儀世而導俗足以敦薄而還淳其為邦家之華道術之寄蓋甚不細也有若金華聞人先生以惇龎之姿卓絶之識屏去流俗凡近之見期造正大髙明之庭言其植志則以三德六行為本原而涼偷之事弗為也言其講學則以四書五經為標凖而非聖之學不習也言其攻辭則以文字從職為載道之用而斥鈎章棘句為非學也言其訓人則以真實不欺為凝道之端而指出口入耳為小夫也由其淵源深而培養厚故其功用茂而運量宏教鐸所臨襟佩翕集得諸觀感之際丕冒薰蒸之中由是沖鬯其性情由是陶鎔其氣質粹矣成德之彥歸諸果行之功若非碩學之敷施曷收醇儒之效驗如此也以此觀之其守道之篤獨立弗遷不亦凝乎其光輝昭著由內達外不亦熙乎謹用合辭私諡曰凝熙先生庶幾可以景行先哲而嘉惠方來云爾門人同里宋濂吳履等謹議雜著凡七章弔忠文弔忠文者為豫章新建黃君翊作也夫人臣盡忠事君之常經也忠其可弔乎使忠可弔則世之不忠者有可憾焉矣黃君字孟翔翊其名也通春秋工於屬文每以奕葉為儒錚錚思自見會進士科罷去作江西部使者屬亡何又棄去司計廬陵學官滿一考冀可循例補校官廷議改法以錢粟吏不可為人師更辟大府掾君不得已受事廬陵郡君性剛徑不可回撓事礙於法輒抱案厯階而升摘其語與上官議反覆相鉤連上官怒斥之屹立不少動已而卒如君言安成土豪暴甚州縣畏之如鬼一旦殺人上下相目莫敢逮同列嫌君木強嗾君行豪樹柵自固君命拔去抵其門惡少年數十執刃譁而出君叱曰爾欲反邪少年曰反則不反汝足稍前即刳汝腸矣君曰爾主自殺人何與爾事顧乃同族滅耶少年色動君挺身呼而入曰爾即殺我爾即殺我少年皆投刃走君趍坐堂上索豪豪知事急出見君求解且誘以重賂君陽諾之與其俱來置諸法人見君咸戟手指曰此健吏不可犯也至正壬辰大盜起蘄黃將及郡郡二千石與官屬皆雲散鳥逝君獨止孔子廟堂盜獲之知其為府掾強之仕使行官書君罵曰死狗奴我死即死其能官於賊耶盜怒反接于樹厯一日意其自悔抽刀礪頸曰從則祿汝不從則血涴吾刀矣君大罵愈於初賊斫首而去嗚呼事君竭忠固以死繼之然亦視其位之何如耳當是時統制閫外者宜死之專城而居者宜死之荷戈禦侮者宜死之然皆未嘗死君以一府掾之微可以不死也即不死物議當不及乃能瞋目罵賊視死如歸使其當前三者之任其激揚奮厲足以有為可知矣此不為而彼為之悲夫君之子載以文學擢第奉常間拜豫泣道君事請為文然君之死孰不以為忠至其從容就義則鮮有察其詳者豫因造文一首托之楚聲纒綿悲愴以白君之情君雖在九泉必當以豫為知己使世之不忠者讀焉其亦有所愧夫君之友廬陵蕭彞翁鄉貢進士也參謀軍事於省府偽漢陷廬陵赴井死婦弟同縣鄧椿為臨江府吏臨江府陷椿集廬陵義軍千百濟以舟偕萬夫長楊瓛等與賊大戰城下三日兵潰投江死其志與君同俱人傑也法宜牽聫得書文曰繄委質以事君兮秉忠貞而不隳斯天經與地義兮位無間於尊卑當海嶽之塵昏兮鼓腥風於干戈譬巨瀦之失防兮泛搖搖之大波悲何山之不懷兮復何陵之不襄舞魚龍而跳象罔兮孰舉手以遏其狂倚長劍於天外兮豈豫力有不任曕九關之莫通兮誰屬豫以三軍矧祕計之屢出兮復掩耳而不余聽婦人難與圖謀兮徒有淚以沾膺慟哭而叩蒼旻兮豫倀倀而安之或危蹙而無所騁兮將誓死以為期胡妖氛之日熾兮絳帕首而狂呼冠切雲而佩蔥珩兮棄堅城而長逋豫雖賤為府史兮頗嘗與於祿食縱一粟其亦君恩兮敢曰職卑而莫恤毁車殺馬而遐逝兮人孰得而非豫君有急而臣背去兮其自揆為焉如彼王蠋本齊民兮雖君祿有不享尚一死以報君兮植後世之大防况豫結髮而好修兮聞聖謨於父師臨難而求茍免兮非禽獸而須眉豫豈異夫人人兮甘惡生而樂死唯殺身以成仁兮免君子之所鄙巍煌之宫墻兮實宣尼之祕祠亟攝衣以從之兮依嘉樹之嵾嵯中心皎如白日兮即萬死其奚惜與淵騫遊於地下兮亦豫情之深懌瞋目而罵賊兮經百折而弗變卒從容以就義兮誠遺言之堪踐爾死固若傷夭兮凛萬世而猶生較喪節而久存兮厯百齡其何榮吾知爾精魄之攸化兮下醴泉而上卿雲之二物固為休禎兮豈爾心之所欣必震蕩為風霆兮叱列缺以施鞭殛不忠而為虀粉兮使天威之昭宣嗟鄧蕭之二生兮眼見義而不見水宜與爾為三忠兮享百世之明祀悼余生之蹇􅀈兮力不足以振之悲風蕭蕭而四來兮謾含哀而陳辭蔗菴述夢文為東陽胡先生作龍集壬申瑶光西指火烏戢羽鬱華罷御明河埀兮近人秋影髙兮在樹時有東白仙人弄丸餘暇下蘭庭登雲榭遡涼風燕芳瀣望太濛兮何極發雅歌于清夜歌曰絳節兮白舫神津布兮流漿隔秋水兮渺豫懷招美人兮翠瓔房歌已就寢遙天未曉白間吐影霓屏微妥襲瓊露之方溥謝缸花之半墮何蟬蛻於泥丸兮慿風馬而遐遊隨明月於華胥兮羌孰蝶而孰周指帝清之廓落兮俯銀漢於下流䀛弭節於山椒兮神恍恍而莫豫留則有洞靈之館真遊之府四玦薦芬五芝浮礎彩入綺疏丹開曼宇壁借堊兮流霜程方潤兮靈雨圍八角之流蘇障九翎之葆羽中有室之嚴密兮蔚元蔭之紛蕤積浩翠於清空疑或有而或無禽藏文於五苞樹潛魄於三珠錫芳題於蔗菴懸粉榜之舒舒彼瀛洲之神人粲玄冠與縞衣施長盤兮凝藍挾雙佩兮瓊琚勢繽翻其並徠持白雲以贈豫指殊庭以相告謂君子之攸居言訖而逝剛籟遄舉虛灝中肌神爽開寤耿銀燈之猶青見蟾華之在戶欲重往以覔之兮杳不知其所止茍遽舍以為幻兮又豫目之所覩心狐疑以至旦兮竟不識為何祥也爰有事于玉靈兮乃吉繇之所彰也稽嘉植之孔芳兮育火精于南離絶玉文之瓶棗蹴紺澤之氷圭泰尊初泛霜肥漢液寶刀新割艷動吳腴潄華池之香涎流丹齶之甘滋潰文園之渴城沃虎頭之癡脾樹明德以及物兮將玄應以朂之安晚節于穆貞兮若茹醴而含飴於是嘉名立曲房闢縹帙敷青氊列麟室曉移洛塵春寂但同符於昔夢任仙凡之迥隔茍心目之若存即異境之超絶何實何虛非存非滅聆簷馬之夜語恍芳卿之下謁宜收視于三庭生皓英於神白吹鳳笙兮歸來風翛翛兮將夕擲萬彚于一幻兮曾何間乎今昔羽衣化而鶴翀兮野蕉迷而鹿失世何往而非夢兮笑倚琴而秋泣雖不變者之長存兮恨飛鴻之遺迹亂曰噫碧藍無塵夜向闌仙子持節來姍姍靈泉濯翠色可餐冷光逼人粟花漫何以錫之紫琅玕琅玕有節不可屈食之素瀋甘如蜜仙人之夀同金石只此長生便有期却勝人參五葉齊誥皓華文龍門生間居纍日弗懌雖深自寬辟卒未能釋去頗聞道家之言肺神皓華者實主憂因假為問對作誥皓華文文曰上章困敦在旦之月火雲不移積氣焮熱時龍門生黯慘弗恱顔面腫噲情神鬱勃顙文九折麋梁雙閼首不暇冠足何能襪其友亡羊先生哀之謂匡山君曰龍門生病矣為祅為嬖矣其中枵枵神喪守矣匡山君曰花妖媚武圊祟惑赤仇鐸投繯苟伯赴溺移昭入幽倒白作黑不遄其逐卒霣靈魄龍門生之所罹殆此疾也邪亡羊先生曰不然也彼自外入有隙斯窒此自內出無罅可遏昔者元靈錫真黃苞承鈞􅫋􅫋者人分為五神守靈威明龍煙育嬰或喜而眉揚或怒而色頳或恐而湮淪或思而纏縈各𨽻攸司别域異扃中有皓華其字虛成西方之英白虎之精於時為秋揫斂華榮於音為商肅殺之聲於行為金厥德為刑於藏為肺百憂所城察之無迹迫之不驚歘爾水集忽焉雲凝眊矂䵝昧哫訾竛竮久而弗革或爽厥貞余嘗遇河上文人於龍都之山九陽之庭授我以帝青之録示我以赤水之經劾召五鬼麾斥三靈動為山合怒為霆崩即將召皓華而訊之不亦可乎匡山君曰子計誠良矣亡羊先生乃仗七星之劒曵三辰之精灌酒于茅焫膋上升禹步成罡拔髮為兵左叱右顧潛聽于冥涉炊五斗黍頃回飇怒旋冷氣四興幻陽變隂弄晦閃明勃律媻卒如見其形有媺一夫素裳彯纓衛以刀戟載以輜軿踉蹡而前呼謂亡羊先生曰我皓華之神也與夫子人鬼異程曷召我為亡羊先生曰龍門生之疾爾奈何祟之吾之召爾非茍然也寓形兩間為生幾何擊石火起流陽電過俄頃歇滅不樂則那既有良朋相與嘯歌上下角逐東西戛摩筵陳笙磬尊列象犧酣嬉淋漓屢舞傞傞雞蟲失得鴟鳳少多棄而不辨遑恤其他孰不志舒孰不顔酡孰不鬯遂孰不婆娑爾何使龍門生戚戚沕沕媕媕婀婀委榻弗振如蝕沈疴爾當攄情以對其辭若直吾將爾為式辭或不能良我劒有鋩皓華聞已頩然怒曰夫子藝周載籍心統人天在古無上在今無前電生目底雷捲舌間雄章谹議彈壓神姦夫子宜先天下憂而憂乃欲自樂耶惟昔尼父任道為宗上畏天命下悲人窮雖不得位唯世是從敢曰自佚以疚厥躬子幸我聽請竭始終民吾同類綏之匪易遑遑齊魯栖栖宋衛樹伐蒲圍絶糧不繼車轍周環曾莫少避欲興東周拯我民悴是謂世憂夙夜罔替天下為公道紀攸繫魚爛已成河決安治傷麟曷來嘆鳳不至舍瑟長吁反袂拭涕述為彝經表我王制是謂道憂唯恐淪墜夫子法尼父者也宜為二者深憂乃欲自樂耶况今六合雄吞矛縱戟橫千里蕭條土絶播耕尸胔如山悲風往還鳥鳶見人飛集樹端夫子不為之長慟日欲開口笑樂一何惑乎亡羊先生囅然笑曰爾望吾以聖人之事我病未能若謂生民遘屯則有肉食者存吾亦何知焉古今一馬天地一指死生一轍彭殤一軌溟涬無末恢落無始神光下燭人粗將弭內已若忘外憂自止我額弗戚我齒長啓我神孔寧于胥樂只爾固欲反之將有説耶抑罔我也皓華曰大道陵夷始有聃周放言如雲彌布八邱蛟龍驣驤搏之無由狎聖侮賢漫漶弗收欲齊夫物強名弗憂夫子取之人將見尤且吾聞之王公弗憂四國不治侯伯弗憂庶政用隳子男弗憂名毁身隨士庶人弗憂災害是罹是憂者羣善之原衆德之基修之則安悖之則危故曰生於憂患死於安樂而君子終身以之夫子奈何棄諸粵自古初有天皇焉斡運日月輨轄坤乾司執神機主宰帝權懼民多欲志因物遷特遣天老命厠五官蹈陽金德専主憂患以助人極以拓化原夫子辱我以祟並觀如此尚有識耶亡羊先生曰爾言固善古之聖賢有無憂者矣有知命樂天者矣有遁世無悶者矣若是彼皆非歟皓華曰夫膠柱不可以調瑟刻舟不可以求劒尚矣事雖有常易貴變通苟執于一子莫之中憂樂有異時勢不同使古聖賢生於當今其有隱憂又將何如也言既畢化為白氣其長如虹昏昏蒙蒙歸于太空亡羊先生退謂匡山君曰皓華之辭良直吾敢不敬承以為式於是攢眉入室睫淚欲滴撫物傷懷終宵太息咨目童文有序走也病目視不及尋簡禮越度速愆招刺乃抽隱思引物嫓義作咨目童文文曰咨爾童子我目之精凝媾五神配合三靈素質西皓圎暈東青南丹注眥北玄孕睛約束臉胞黃中之英氣幾內動藏系外徵啓闢人牖通泄天明聚為根蒂敷為華榮衆咸允賴爾獨失貞孰不若電洞觀八紘爾於咫尺不分五牲誰不如月照徹七經爾顙湊几僅辨一丁此明而執孰視弗迎彼不面識反揖而承頰或自泚顔常發頳辟如水母藉蝦始征又如野狼挾狽則逞皆爾弗職以玷我形童子曰噫何言之戾賦授自天初無恆制堯眉八彩嶽黃以毳聃耳無輪慎額斯贅尼口類海敦狹且鋭澤鼻如蝎欽直而細四者猶殊目胡不異或牟其參表厥明睿或角而方遐舉長世或瞭而揚或眵而翳一囿于玄我則何繫矧子淫書膏焚晷繼摛掞辭藻搜剔文藝肺鏤肝雕心鉥腎劌我劀我揉我斫我弊八廓注邪五輪受厲靡精弗喪有明益瘞我合子躬如左右契子榮我尊我􅏓子盩豈圖子玷成此左計咨爾童子爾辭固臧傅以正理則涉于涼形雖異賦爾宜自強何取其窳乃釋其良書淫所致尤墮意量冬映雪席夏乘螢囊刺股流血懸髻於梁未聞其目遽縮晶光是謂遁辭君子所襄星野有舍雲漢成章測步幽渺挈度機祥為爾之故不知低昻三條占限兩戒畫疆氣勢旁魄民物浩穰為爾之故足不及行述此二端餘可類詳尚飾巧言陳法列方孰為曲直敢矯而亢童子曰噫士貴自謀匪姣足恃惟道是遒考亭有熹廬陵則修厥視惟短所履孔優一紹道緒上遡魯鄒完經翼傳衣被九邱一昌其辭出孔入周有光赫赩昭若參遊子不此即而反我仇椒蜂彌豹豈無炯眸鼓辭樂禍腥聞不收偃瞻文眇世所嘲咻內美之章玉瓚黃流子苟弗悟自貽大郵何河而厄何漆以休何青以謗何肉而囚子勿置思棼若繭抽遺形全智與造化遊我雖俚言實為逺猶毋慚墨墨成此絿絿童子言已我心之疚蒙倛既寢斷災亦陋植鰭太纎削瓜匪秀號尊聖哲名亘宇宙非形之妍惟德之茂况目在形賓筵一豆雖眊非瞽物亦云覯縱瞽焉尤有用輒售朦腴三品備豫樂奏國語成書事明若晝矜察秋毫或速殃咎潛曜自將神腴內富五色免惑一誠自守幸遂遵養庶絶馳驟禍福倚伏理嘗易究所憂忘荒如醟四酎本實不培枝葉巧湊弗别莠禾徒煩薅耨童習固動白紛罔就千古居前萬世在後虛生其間冠裳猿狖自今伊始啓矇撤覆責躬靡遑敢目之詬我道之凝我學之懋上慎旃哉吾言不又逐鷏文蚊害物蟲也凡有血氣者恆病焉然其所化不一江南有孑孑生汙水中好屈伸水上見人泳去久則蛻為蚊此蟲化也塞北有蛟母草草楙而蚊變嶺南有蚊子木實如盧橘熟則綻蚊出實空此草木化也江東有蚊母鳥生池澤茹藘中形類烏􅖂而大黃白雜文鳴如鴿每鳴吐蚊一二升此禽化也爾雅淮南子李肇唐史補陳藏器本草注頗載其事以豫觀之四類之中唯蚊母出蚊特夥蚊母鷏也豫因作逐鷏文使鷏可逐也則人之胎禍戕物者其知所警也夫文曰來汝鷏上堪下輿萬物並育各全其生以蕃以族􅀈飛繽翻蠕動蹙衄鱗介潛淵毛蹄藏陸文華璀璨形模繚曲遊泳同嬉喊呀相逐既拘於氣曷禁夫欲大或啖小衆將壓獨唯類之求於人敢觸來汝鷏相度汝生厥形甚微賦質䵝昧樂生穢草啄磔蠡蛤捕索蛙魚含蓄佹反軒露掘竒非疢噦嘔無疾唾洟産醜衒惡朝息夕孳不胎而凝憑化而馳不卵而孕與涎相依初若蠢萌漸則奮飛來汝鷏爾腸刀鏃爾胃芒刺不爾之虐所出曷異鳴如雷殷聚若雲翳緣撲湊肌噆嘬口咡投間抵隙潛察默覷體如粟眇吻若錐利中有豹腳勢尤可畏髙沙斃女西洋死吏艾熏徒力羽扇不避我人尚然矧彼物類來汝鷏物豈無嘔與爾不同兔口出子一氣之從驢嗌吐絲局厥異封鳥能嗽金昆明所鍾雞或懸綬色眩黃紅惟爾肆孳胎此禍􅓇草木所化汙水是宫無若汝慘厥害則鴻豫今逐爾欲滅爾蹤嗚呼我挺之將兮其長嫓矛爾鷏我逐兮亟去勿留往彼北荒兮其土幽幽鬼物披攘兮豺兕咿嚘爾宜吐蚊兮齧彼若仇胡宅中土兮自貽大郵我逐爾鷏兮下民用休鷏既逐兮梧桐昁昁鳳皇下來兮鳴聲噦噦文原余諱人以文生相命丈夫七尺之軀其所學者獨文乎哉雖然余之所謂文者乃堯舜文王孔子之文非流俗之文也學之固宜浦江鄭楷義烏劉剛楷之弟柏嘗從豫學已加以道為文因作文原二篇以貽之其上篇曰人文之顯始於何時實肇于庖犧之世庖犧仰觀俯察畫奇偶以象陽隂變而通之生生不窮遂成天地自然之文非惟至道含括無遺而其制器尚象亦非文不能成如垂衣裳而治取諸乾坤上棟下宇而取諸大壯書契之造而取諸夬舟楫牛馬之利而取諸渙隨杵臼棺槨之制而取諸小過大過重門擊柝而取諸豫弧矢之用而取諸暌何莫非粲然之文自是推而存之天衷民彝之敘禮樂刑政之施師旅征伐之法井牧州里之辨華夷內外之别復皆則而象之故凡有關民用及一切彌綸範圍之具悉囿乎文非文之外别有其他也然而事為既著無以紀載之則不能以行逺始托諸辭翰以昭其文略舉一二言之禹敷土隨山刋木奠髙山大川既成功矣然後筆之為禹貢之文周制聘覲燕享饋食昏喪諸禮其升降揖讓之節既行之矣然後筆之為儀禮之文孔子居鄉黨容色言動之間從容中道門人弟子既習見之矣然後筆之為鄉黨之文其他格言大訓亦莫不然必有其實而後文隨之初未嘗以徒言為也譬猶聆衆樂於洞庭之野而後知音聲之抑揚綴兆之舒疾也習大射於矍相之圃而後見觀者如堵墻序點之揚觶也茍踰度而臆決之終不近也昔者遊夏以文學名謂觀其會通而酌其損益之宜而已非専指乎辭翰之文也嗚呼吾之所謂文者天生之地載之聖人宣之本建則其末治體著則其用彰斯所謂乘隂陽之大化正三綱而齊六紀者也亘宇宙之始終類萬物而周八極者也嗚呼非知經天緯地之文者惡足以語此其下篇曰為文必在養氣氣與天地同茍能充之則可配序三靈管攝萬彚不然則一介之小夫爾君子所以攻內不攻外圖大不圖小也力可以舉鼎人之所難也而烏獲能之君子不貴之者以其局乎小也智可以搏虎人之所難也而馮婦能之君子不貴之者以其騖乎外也氣得其養無所不周無所不極也攬而為文無所不參無所不包也九天之屬其髙不可窺八柱之列其厚不可測吾文之量得之覝燬魄淵運行不息基地萬熒纒次弗紊吾文之焰得之崑崙元圃之崇清層城九重之嚴邃吾文之峻得之南江北瀚東瀛西溟杳渺而無際涵負而不竭魚龍生焉波濤興焉吾文之深得之雷霆鼓舞之風雲翕張之雨露潤澤之鬼神恍惚曾莫窮其端倪吾文之變化得之上下之間自色自形羽而飛足而奔潛而泳植而茂若洪若纎若髙若卑不可以數計吾文之隨物賦形得之嗚呼斯文也聖人得之則傳之萬世為經賢者得之則放諸四海而準輔相天地而不過昭明日月而不􅑯調燮四時而不愆此豈非文之至者乎天德湮微文氣日削騖乎外而不攻其內局乎小而不圖其大此無他四瑕八冥九蠧有以纍之也何謂四瑕雅鄭不分之謂荒本末不比之謂斷筋骸不束之謂緩旨趣不超之謂凡是四者賊文之形也何謂八冥訐者將以賊夫誠橢者將以蝕夫圜庸者將以混夫竒瘠者將以勝夫腴粗者將以亂夫精碎者將以害夫完陋者將以革夫博昧者將以損夫明是八者傷文之膏髓也何謂九蠧滑其真散其神糅其氛徇其私滅其知麗其蔽違其天昧其幾爽其貞是九者死文之心也有一於此則心受死而文喪矣春葩秋卉之爭麗也鴟號林而蛩吟砌也水湧蹄涔而火炫螢尾也衣被土偶而不能視聽也蠛蠓死生於甕盎不知四海之大六合之廣也斯皆不知養氣之故也嗚呼人能養氣則情深而文明氣盛而化神當與天地同功也與天地同功而其智卒歸之一介小夫不亦可悲哉豫既作文原上下篇言雖大而非誇唯智者然後能擇焉去古逺矣世之論文者有二曰載道曰紀事紀事之文當本之司馬遷班固而載道之文舍六籍吾將焉從雖然六籍者本與根也遷固者枝與葉也此固近代唐子西之論而豫之所見則有異於是也六籍之外當以孟子為宗韓子次之歐陽子又次之此則國之通衢無荆榛之塞無蛇虎之禍可以直趍聖賢之大道去此則曲狹僻徑耳犖確邪蹊耳胡可行哉豫竊怪世之為文者不為不多騁新竒者鉤摘隱伏變更庸常甚至不可句讀且曰不詰曲聱牙非古文也樂陳腐者一假場屋委靡之文紛糅龎雜不見端緒且曰不淺易輕順非古文也豫皆不知其何説大抵為文者欲其辭達而道明耳吾道既明何問其餘哉雖然道未易明也必能知言養氣始為得之豫復悲世之為文者不知其故頗能操觚遣辭毅然以文章家自居所以益摧落而不自振也今以二三子所學日進於道聊一言之畫原史皇與蒼頡皆古聖人也蒼頡造書史皇制畫書與畫非異道也其初一致也天地初開萬物化生自色自形總總林林莫得而名也雖天地亦不知其所以名也有聖人者出正名萬物髙者謂何卑者謂何動者謂何植者謂何然後可得而知之也於是上而日月風霆雨露霜雪之形下而河海山嶽草木鳥獸之著中而人事離合物理盈虛之分神而變之化而宜之固已達民用而盡物情然而非書則無紀載非畫則無彰施斯二者其亦殊途而同歸乎吾故曰書與畫非異道也其初一致也且書以代結繩功信偉矣至於辨章服之有制畫衣冠以示警飭車輅之等威表旟旐之後先所以彌綸其治具匡贊其政原者又烏可以廢之哉畫繪之事統於冬官而春官外史專掌書令其意可見矣况六書首之以象形象形乃繪事之權輿形不能盡象而後諧之以聲聲不能盡諧而後會之以意意不能以盡會而後指之以事事不能以盡指而後轉注假借之法興焉書者所以濟畫之不足者也使畫可盡則無事乎書矣吾故曰書與畫非異道也其初一致也古之善繪者或畫詩或圖孝經或貌爾雅或像論語暨春秋或著易象皆附經而行猶未失其初也下逮漢魏晉梁之間講學之有圗問禮之有圗烈女仁智之有圖致使圖史並傳助名教而益羣倫亦有可觀者焉世道日降人心寖不古若往往溺志於車馬士女之華怡神於花鳥蟲魚之麗遊情於山林水石之幽而古之意益衰矣是故顧陸以來是一變也閭吳之後又一變也至於關李范三家者出又一變也譬之學書者古籕篆𨽻之茫昧而唯俗書之姿媚者是耽是玩豈其初意之使然哉雖然非卓然拔俗之姿亦未易言此也南徐徐君景暘工書史善吟古今詩信為才大夫也旁通繪事有士韻而無俗姿一時賢公卿皆與之遊名稱籍甚有薦于朝者景暘以母老不仕豫尤愛景暘者於其别去故作畫原以贈焉嗚呼易有之聖人有以見天下之賾而擬諸形容象其物宜是故謂之象然象之事又有包乎隂陽之妙理者誠可謂至重矣景暘其亦知所重乎哉文憲集卷二十五
