body:
  text: 文憲集卷十一明宋濓撰傳凡三十二章余左丞傳余闕字廷心一字天心唐古氏世居武威父錫拉卜藏布官合肥遂為合肥人母尹氏夢異人生闕闕生而髮盡白家貧年十三始能就學嗜欲甚淺不知有肉味惟甘六藝學若飴嗜之不厭與河南張恆遊恆臨川吳澄弟子善談名理闕之學因絶出四方擢元統癸酉進士第授同知泗州事泗瀕淮民豪弗馴令蝕人土田官籍之多以誣去闕繩尤暴者數十不敢譁廖甲與舒乙競田廖焚舒廬舍舒婦偶母子同死遂置灰燼中誣之闕為白其事泗無麥民以乏故事弗聞闕上之中書定為令凡無麥者減賦代還長老爭進金為夀闕謝去後闕往桐城道逢故民皆羅拜馬首相隨信宿而别俄召入應奉翰林文字轉中書刑部主事三月之間疏滌寃滯獄五百上官忌其才議寖不合闕上宰相書言狀又不報投袂而歸居亡何復召修遼宋金三史拜監察御史上疏言守令最近民欲萬國治責守令反是政龎宜用殿最法力行之便上從之藩王府諸校白晝􅐁金道上勢如狼闕鞭遣六十人上思治切議遣奉使巡察郡國闕言奉使恆無狀所至處食飲供張如事至尊曾不能宣上憂恤元元之意宜亟罷之後闕補外會奉使者亦至執闕臂曰誠如君言知闕忠亮不怨闕在位知無不言言峭直無忌人勸闕少辟禍闕曰吾縱惛豈不知批逆鱗為危委身事君身雖殺弗悔也改中書禮部員外郎闕議復古禮樂其言精鑿有徵聞者斥為迂濶弗用安西郭氏女受聘未行會夫卒郭自縊死有司請旌其門闕以過於中庸不可以訓格不下出為湖廣行省左右司郎中廣西多岐山負粟輸官者厄于道險費常倍闕命以為帛代輸右丞沙班怙權自用多録其私人闕每抗辭沮之會莫猺蠻反當帥師又止不行無敢讓之者闕揚言于庭曰右丞當往受天子命為方嶽重臣不思執弓劍討虜乃欲自逸耶右丞當往沙班曰郎中語固是如芻餉不足何闕曰右丞第往此不難致也闕下令趣之三日皆集右丞行章宣慰巴延以婆律香贄闕闕覺重辟之香中果胎黃金章歎曰余贄達官多矣潔如氷壺唯余公一人復以集賢經歷召入預修本朝后妃功臣傳遷翰林待制出僉浙東道亷訪司事發姦摘伏聰察若神州縣聞闕至貪墨吏多解印綬去婺定賦無藝役小大各違度闕遴官履畝實之徭賦平衢士無養以沒入田分𨽻學官郡長燕只吉台肆毒殘衢民民重足立闕鞫治之獄上行御史臺臺臣與其有連反以事劾闕闕歸青陽山已而丁尹氏憂闕日夜悲號有甘露降于墓君子以為孝感至正壬辰天下兵動平章政事鴻和爾布哈方統戎淮南承制起闕權淮西宣慰副使分治安慶安慶距城皆盜柵人爭謂不可往闕毅然請行從間道入推赤心待人罷其苛賦轉粟以哺餓夫八社民翕然歸闕知民可用乃帥之破雙港寨寨甚固小路若髮闕被甲荷戟直前賊空寨出鬭殺傷相當至日昃賊殊死戰鬭不勝退復收散卒誓曰死則死此爾何生為一鼓而進大破之諸寨畏威次第降闕益繕城浚濠礪矛戈分屯耕郊外田民懼不能者遣軍士護之耕賊來輒與戰一日賊四合旌旗蔽野鼓譟之聲震天地闕縱驍騎數十大喊而出賊勢披靡遣兵擊之斬首數千級當是時淮東西皆陷獨安慶巋然存賊來戰又數敗賊銜之偽作尺牘通城中諸大姓約期日反冀闕捕戮之闕曰我民安有是命悉焚去賊計窮復令闕故人衛鼎許大明以甘言説降闕命牽出以鐵椎擊碎齒頰懸其皮東門灊山有虎傷人闕造文檄山神使驅虎虎出境功上中書朝廷俾為真升同知淮西宣慰副都元帥賜以上等及黃金束帶江西諸官軍動號數萬掠玉帛殺嬰兒置戟上以戲沿江州郡患苦之獨不敢近城下即近出師搗退之或服其義至有來歸充將校者溪河兵屯潯陽命使者帥壯士百輩腰刀直入脅主供億闕叱左右收縛付獄且上疏言貓獠素不被王化其人與禽獸等不宜使入中國他日為禍將不細後竟如闕言轉淮南行省參知政事尋改右丞賜二品服闕益自奮誓以死報國立旌忠祠以勵將佐時集祠下大聲謂曰男兒生則為韋孝寬死則為張巡許逺不可為不義屈意氣慷慨甚丁酉冬賊大集諸部圍城戰艦蔽江而下樵餉路絶兵出數失利戊戌正月七日城陷闕猶帥衆血戰身中三矢賊呼曰余將軍何在吾將官之有生致者豫百金闕戟手罵曰余恨不得嚼碎汝肉吐餧烏鳶寧復受汝官邪賊怒舉長鎗欲刺闕闕遂自剄沉水死年五十六其妻耶卜氏聞之亦率其子得臣女福章赴水死諸將卒慟曰余將軍不負國我等可負余將軍邪從而死者千餘人朝廷知其忠贈闕榮祿大夫江浙行省平章政事諡曰忠愍追封夏國公闕為人剛簡有智無職不宜為為即有赫赫名所至薦賢旌孝義如恐後每解政開門授徒蕭然如寒士五經悉為之傳注多新意詩文篆𨽻皆精緻可傳贊曰於戲闕真人豪也哉獨守孤城逾六年小大二百餘戰戰必勝其所用者不過民間兵數千初非有熊虎十萬之師直激之以忠義故甘心效死而不可奪也雖不幸糧絶城陷以死而其精忠之氣炯炯上貫霄漢必燦為列星流為風霆散為卿雲凝為瑞露闕雖死而其不死者固自若也然而闕死於君而能使妻死於夫子死於父忠孝貞節萃於一門較之晉卞壼家又似過之矣於戲闕果人豪也哉余來江左見其門生故吏言闕事多至泣下因想見戰守處江流有聲而斷雲落日淒迷於莾蒼間猶足以動人悲思因掇其行事成傳以示為人臣者濓既作余廷心傳又見其門人汪河言當廷心死時其妾滿堂生一子甫晬棄水濱有偽萬户杜某呼曰此必余參政子是種也良不可殺竟捐所鈔諸物懷子以去今三歲矣人或戲子曰汝父何在子橫兩指拂喉曰如此矣此一事也池州判官李宗可蘄人也李嘗文身又號為花李善槊視賊欲吞廷心兄闑嘗以女歸之及來舒命權義兵萬户統新軍守水寨前後多戰功賊來破城李橫槊入賊中殺死甚衆聞廷心死馳馬還家聚妻孥謂曰余相公死國吾亦義不屈汝等毋不死為人所魚肉拔劔無大小盡殺之出解甲據胡牀中坐取酒飲至醉復衣甲自刎死此一事也嗚呼仁者宜有後而義烈之士聲光可流於無窮濓雖不文唯恐其失墜也故復附著于篇白牛生傳白牛生者金華潛溪人宋姓濓名嘗騎白牛往來溪上故人以白牛生目之生軀幹短小細目而疏髯性多勤他無所嗜惟攻學不怠存諸心著諸書六經與人言亦六經或厭其繁生曰吾舍此不學也六經其曜靈乎一日無之則冥冥夜行矣生學在治心道在五倫自以為至易至簡或笑其迂生曰我其迂哉我若迂孟子則迂之首矣生好著文或以文人稱之則又艴然怒曰吾文人乎哉天地之理欲窮之而未盡也聖賢之道欲凝之而未成也吾文人乎哉或求學文生曰其孝弟乎文則吾不知也生不肯干祿或欲挽之使出生曰祿可干耶仕當為道謀干之私也生安於義命未嘗妄有所為或疑其拙生曰我契以天不合以人是乃巧之大者拙乎哉生慕孔顔之樂如聆鈞天之樂如獲裊蹄之金言及之手足舞蹈不已或以為狂生曰吾能知之恨未能允蹈之奚其狂生幼多疢常行服氣法或誚其欲久生生曰盜跖甚夭顔子甚夀子知之乎或人不答生曰竊陰陽之和以私一已服氣矣運量元化節宣四時服氣乎生雖貧喜色常溢眉宇間或詰之生曰吾內足樂也內既足樂無人非無鬼責得亦樂失亦樂我何憂哉生御惡衣粗饌安之或慮其詐生曰錦衣與卉服雖異暖則一糟核與淳熬固殊飽則均何詐為生不貴貴人不貧貧人或尤其無别生曰貴自貴爾於我何加焉賤自賤爾於我何損焉生遇物以誠三尺之童莫之敢欺或譏其同生曰我道蓋如是同不同弗知也生不享外神唯事其先甚謹或謂其報本耶生曰非唯報本也以氣感氣吾先以之外人何預哉生多讀台衡賢守慈恩諸家書或謗其偏生曰我雖口之未嘗心之也何其偏生當情意調適輒懸特磬於簴親擊以鐵籈瞑目側耳而聽自以為達制樂之原或笑之生曰此蕢桴土鼓之遺聲也五音繁會則未矣生好著屐登山遇境勝處注目視弗釋或惡其癖生曰吾於巒容川色見三代之精華不忍舍也生年四十有六髮無白者日坐一室中澄思終日或執筆立言動以賢聖自期其中之所存者人固莫能識也適有畫史貌生之騎白牛者生大笑以為得其真故自疏其事如左曰白牛生傳云贊曰生妄人也哉言其文弗能成章言其道則又邈乎未之見也猶自語諸心曰我學古人我學古人不亦悖且戾乎鄭氏孝友傳鄭綺字宗文白麟二十一世孫也其先居滎陽凝道遷歙自牖遷睦淮遷浦陽今為浦陽感德鄉人淮綺之祖也綺通春秋穀梁學撰合經論數萬言事父母孝父照以非罪繫獄當入死綺上疏郡守錢端禮請以身代端禮察之白其誣母張病風攣綺保持若嬰兒袒適厠必抱就之三十年不懈綺生聞聞生運運生政政生德圭德璋至元中仇家傾德璋以死罪將械送揚州德圭毅然代其行德璋泣隨之爭欲赴吏德圭竟以詭計先死之德圭生文嗣自綺至文嗣凡同居六世歷二百年咸如綺在時至大二年秋九月鄉老黃汝霖等言于縣縣上其事亷訪使加審按焉文達中書禮部四年春二月準式旌表門閭文嗣生鑑鑑生渭渭生挺皆善守合數千指無異心者重紀至元元年冬十二月太常博士柳貫與鄉校羣士又上狀請如故事復其家從之初文嗣既沒德璋子大和司家事嚴而有恩雖家庭中凛如公府子弟稍有過頒白者猶鞭之每遇歲時大和坐堂上羣從子皆盛衣冠鴈行立左序下以次進拜跪奉觴上夀畢皆肅容拱手自右趨出足武相銜無敢參差者見者唶唶嗟慕謂有三代遺風雖石奮之家亦所不及名聞天下自大丞相及臺院諸公卿多賦詩美其行部使者武威余闕行縣以其孝友七郡或莫之先書東浙第一家以褒嘉之皇太子在青坊聞其事而嘆曰此國家之祥瑞也復親御翰墨畀以鳳麟二大字翰林學士承旨歐陽玄為之贊勒石以傳大和性正方不奉浮屠老子經像冠昏喪祭必稽朱熹家禮而行子孫從化孜孜孝謹不識廛市嬉戲事執親喪哀戚甚三年不御酒肉食食貨田賦之屬各有所司無敢私凡出納雖絲毛事咸有文可覆挾日則會不公則監視發之諸子晝趨功入夜輒坐棣萼軒中溫溫語笑至更餘始休雖多列顯仕或入侍經筵出持使節不敢挾此有一毫自驕意諸婦唯事女紅不使預家政宗族里閭以恩懷之各有差內外極嚴輿臺通傳不敢越堂限家畜兩馬一出則一為之不食人以為行義所感有家範三卷傳于世贊曰史氏之言多有不足取信者濓少時嘗讀唐書宰相世系表謂白麟之後不傳私竊信之及觀司空圖滎陽記則曰白麟生師慎師慎生懷芬懷芬生鄑鄑生斌卿斌卿生唐青州刺史庶庶生侍中徽徽生大理卿鄘鄘生鱐鱐生給事中謨謨生宣州觀察使回又觀鄭燮生遂安譜則曰回生𢎞𢎞生垣生倕倕生子襲子襲生扈扈生宋歙縣令凝道凝道生殿中侍御史自牖自牖生祕閣校理安仁安仁生淮淮生照照生沖素處士綺綺即傳之所書者也其承傳次第灼灼可信如此惡覩其所謂不傳者哉考徵不廣而欲以一人之見聞定百載之是非難矣此傳作于至正初已刻浦陽人物記孝友篇中近板燬於火因重鈔於此以勵民俗云吳德基傳吳德基者名履婺之蘭溪人也其父景奎故為儒鄉人師尊之酷好為詩遊山澤間方苦吟而雨至雨濡其衣弗知也德基少受學聞人先生夢吉學春秋俊邁有竒材長通諸史為文辭願學司馬遷班固最好書尤工行草得之者藏弆為榮元季教授鄉里名動一時國朝取婺李曹公文忠為浙東省左丞聘德基為郡儒學正李公數與語知其才辟為掾稱疾而辭有司舉于朝為南康丞南康俗悍其民以為丞儒者也易之德基自如數月皆周知其情偽有所發擲一縣驚伏德基乃更以寬化之視民如子民有訴召使前與語弗加咄叱民有援丞裾相爾汝弗責也有徵調召其大姓坐之廡下好言誘之聽人人自説便否由是民愛丞如父而吏卒不能為姦民王瓊輝仇里豪羅玉成執其家人挾法笞辱之玉成兄子玉汝怒集少年千餘人圍王氏家劫奪家人歸且縛瓊輝連道箠之至家解衣箠殆死乃釋去瓊輝兄弟五人庭訴齚指出血誓與羅氏俱死德基念成獄當連千餘人勢不便乃召瓊輝語之曰獨羅氏圍爾家邪對曰千餘人曰千餘人皆辱爾邪曰數人爾曰汝憾數人而纍千餘人可乎且衆怒不可犯倘不顧死盡殺爾家而就逮雖有司有法汝悔何及邪瓊輝良久曰吾恨羅氏欲快吾憤爾惟明公所命德基乃捕操捶者四人於瓊輝前杖數十血流至踵命羅氏對瓊輝引罪拜之事遂止兩家皆叩頭曰公弭我事德甚宏咸願有所上獻德基却去縣令周以中初至召民轉輸至郡不得躬至鄉召之一民逸去命卒笞之不肯伏走入山罵令曰官當在縣何以至此為令怒吏卒因以語動令欲誣一鄉民圖賄利獲六七人下獄扃鐍甚嚴卒方往捕未返鄉民大駴音駭德基計民無罪自出巡獄叱卒釋之卒以它辭解德基槌碎獄門遣之曰若無罪還告父兄無恐乃往告令令怒曰民無道衆辱我君乃釋之何輕我至是邪德基曰犯使君者一匹夫爾其鄉人何罪且法乃天子法豈使君解怒具乎令意慚乃已其俗好淫祀有蛇出户限民怪之以為神至奔走祠之德基罪神巫十人投其主江中為丞六年去知長沙之安化去三月他吏用法急南康民作亂命師討平之死者過半南康民泣曰我吳君在寧有此禍乎安化鄰古三苖其土豪多糾民為兵既盡降萬夫長易俊原獨恃驍勇與麾下數十人遁入山谷保險自固郡邑患苦之江陰侯吳良承詔求餘寇已移檄旁縣兵且集召德基計事德基曰易氏未有反狀奈何激之使生變乎不若先以計致之果反用兵未晚也否則出兵無名民先受其害矣願君侯熟慮之侯曰令之言然吾為令徐之德基乃屏吏卒步至山谷中抵俊原家家空一老人出對客德基謂曰易俊原出見江陰侯則無事矣今不出大兵且至一縣民皆為韲粉然殺一縣父兄子弟者昜俊原非縣令也老人曰俊原必出惟明府哀憐之德基謬曰俊原或未肯來得其子及麾下三四人先往可免矣明日其子及麾下至如德基言兵止不發既而盡致其麾下惟俊原一人度兵勢孤乃招之曰君侯願與俊原相見俊原喜詣軍門請見遂縛送京師事平民按堵無擾江陰侯檄取故兵之為農者民咸自疑驚奔相告勢甚危德基屬耆老諭民曰侯所取者兵民無與也籍其願為兵者數人而止長沙郡令造戎衣德基力爭曰吾邑民貧而俗暴思之且恐其叛去安可責以事功如他縣乎令格不奉命其罪小奉命而致亂其禍大決不敢辭小罪而蹈大禍也郡從之凡有徵徭皆不使之與越三歲入朝擢知萊之濰州事民畜官驢四十匹萊守核其孳息狀與籍不合曰驢當歲産駒今幾歲宜得幾駒乃何少也欲責欺罔罪而徵其償諸縣皆已勒民買驢德基獨戒民勿償守怒問德基濰不償驢何辭也德基曰民實不欺妄烏可責其償國家富極海內為吏者宜宣布德澤為民除疾苦寧少數匹驢耶守語塞德基因畫不便者數事守不敢復言并諸縣已償者皆罷之山東民願以羊牛代秋稅者官從其言德基與民計羊牛後有死瘠患不如納粟便獨收民粟他縣牛羊送陜西民驅走二千里皆破家郡以濰獨完令役千人部送鄰縣牛德基列其不可曰有牛家送牛雖勞不敢怨使人代之脫道中牛死誰當代償耶力爭不奉命德基為吏不求威名以愛民為先尤重獄事凡有訟召受訟者面直之釋其怒乃已不忍置民於獄獄屢空當有追需于民不務速辦稍緩其期約故物價不湧民視他所費恆減十二三所至民樂其簡易而感之以為愛已居濰二年會改濰為縣召還濰民遮門抱其足泣拜曰自得吾父濰民膚無笞瘢今舍我去願得隻履事之以慰我思其得民心如此德基至京師遂謝事歸將行辭其友翰林學士宋濓濓為德基交甚狎時亦致仕將歸呼德基謂曰若願受長者教乎德基曰唯何以命之濓曰天子官汝五品秩乞骸骨歸恩甚大汝知保之之道乎德基謝曰願卒教之濓曰慎毋出户絶世吏勿與交吾之教子無以加于此矣德基至家如濓戒君子多其能受善言云太史公曰世俗恆謂儒者少功顧非儒者爾湯之興以伊尹周之興以周公此獨非儒者耶何其功之大也彼世之儒者其號則同其誦説則同其所操守者異于伊尹周公者多矣豈特少功哉謂之不足用可也然其間有足用者不可誣也俗吏以嚴急督責為足用謂儒者為懦緩僨事而不知得民者非儒不能也以豫觀於吳德基恂恂不大聲色而衆庶安其政既去而思之視世吏之督責者果孰多耶德基之政固世俗之所笑者而其心誠愛民有足取焉古所稱平易近民豈弟君子非德基之謂耶所謂難與俗人言其此類耶朱環傳子元女夀朱環字君玉婺之義烏人漢槐里令雲四十代孫也赤子時無兒啼聲仲父桂奇之養為子桂後生璧及定周因外環環益孝謹凡勞事皆服行不知有寒暑時境內多盜白晝出道上劫人財桂有金數百兩與璧謀瘞窖中璧夜發去反誣環所為桂怒褫環襦袴立之大雪中一日夜不使去環恂恂謝過無一言辨其寃桂猶日虐環五六年間瀕死者數四恆順受之不怒桂死遇璧益厚璧子慶多暴或遂嫁以殺人罪環憂不能食竭私財救之慶獲免環善讀書寶祐間嘗舉進士年八十六終于家子元女壽元字子初性警敏絶人至元末有盜數千起縉雲過永康置寨峽源山山抵元家甚邇盜將劫元父環及環兄遇魁為謀帥元聞遽歸告二翁速避寇不聽復涕泣諫翁罵曰豎子不解事江南內附久誰敢叛耶設有寇不過鼠竊狗偷何足病元自度賊若縛翁去則是翁從賊反官坐以法雖有百喙莫能白為今之計者孰若殺賊自明乃與役夫傅參謀執刃伏垣下或止之曰賊勢張甚汝不畏作𦵔醢耶元曰吾知有親爾若得白親以無罪雖萬死不恨會賊偵騎至竟斫殺二人梟首市中以血手入示翁負之北逃賊平翁竟無罪夀生有淑資年既長歸金華戚象祖台寇楊鎮龍反西攻婺州宗王昻吉岱及浙東宣慰使史弼捕獲之械至州城將鞠其反狀夀父環有亡奴在械中奴嘗怨環撾傷欲連環出資助鎮龍時史怒寇甚凡獄辭所引必盡殺乃止環子元疾病不能起乃視夀泣夀曰昔緹縈能救父命我獨非人耶乃走告法曹掾馮耿賢曰妾父無罪亡奴欲誣以不道倘事不得直一家枉作泉下鬼聞君素長者獨不能相活乎言訖淚如雨馮怒曰此事豈汝女子所知夀哀祈益切馮為惻然良久揮夀去曰爾但歸吾知所處矣明日使吏椎碎奴口不果誑贊曰昔尹吉甫子伯竒無罪為後母譖而見逐履霜中野作履霜操其辭多怨傷濓竊謂伯奇不必爾也父母惡之勞而不怨何假於辭哉今環之無罪與伯奇同環裸身立大雪中則又非若履霜比也乃能順受之而無怨不賢而能之乎古之所謂純孝者環蓋近之矣元為親故拔劔斫賊而不知有身夀雖女子亦能脫父命於虎口皆環身教之然也人之行莫大於孝孝有如環之父子可使無聞哉因具列之于篇白鹿生小傳白鹿生者諸暨之人也風神峻爽翹然欲超羣其外族曰方建孰聘賢傅館四方遊學士生往受諸經領其玄旨稍事文墨輒峻潔如淵珠衆譁曰生賦資絶倫非積功所可及盍遜其一席地聲光流婺越間煜煜能動人競要遮作州閭師數弗應浦陽江上有鄭氏一宗纍三十室同案而膳戒子姓執贄致辭生躍然興曰是或可為也即日上道皋比中居以倡道為已責與諸生言必稱曰昔之人曰昔之人日摩月切操行有可觀歷十春秋自以精明不逮前時退居白鹿山戴梭冠披羊皮裘帶經耕煙雨間暇則吟風弄月傲睨萬象若不知古今之殊軌有識者莫能窮其際高郵欒鳳來為州牧獨造門拜曰鳳聞先生賢言行無悖古先哲人願為州學子師生牢讓不起鳳不得已令閭右子弟即其家問道州政有闕失鳳必移書咨訪生白以利病裨助恆多後若干載殿中侍御史唐鐸出守越欲辟起之生力辭如前鐸不敢強生性醇篤無銖髮矯偽與人語出肺肝相示耻為覆藏事乖名義峻言斥之弗少恕家無儋石儲臨財甚介山氓誤坐法當死生憫其蠢愚謀諸鄉鄙活之氓輟烏犍為謝生拒之頓顙于地澘然隕涕生曰東作方興非牛何以耕俟三冬或可爾至期氓復來請生反覆譬曉之乃已州人士求連生族祝生持其成暨委禽致餼繼以金幣生笑曰孰謂君子而可以貨誘乎悉遣去人復譁曰是可以義取者生尚不之欲况其他乎於是鄉人教子者恆指生為法效學焉生名恆字本初姓楊氏白鹿生因其所居號之云史官曰余與生遊者三十年不可謂不相知者待罪國史時遂白執政薦之入成均聞生不受州縣辟事乃寢然其行義可法者不當使其泯泯因為造小傳如右隱之與顯非所以論生也王先生小傳王先生毅字剛叔其先自琅琊徙居處之龍泉至先生十有三世世為農初西鄰有王氏子事身奉神甚謹嘗斫木為拜其當額處成窪母某氏有妊夢王來而誕在赤子時頗異遇浴及手足露皆怖而哭姑懷之則止頭患瘍母惡其臭捲木葉掩鼻當乳時閉目弗之視痎疾大作身熱如火焮榻畔懸繩代椸無風繩自搖及能言備陳入浴時如蹈大海茫無津涯風入手足間痛若刃割姑衣有纊能覆之乃安木葉氣烈不可近熱弗能禁神出戲繩上下視一小兒僵卧心知其為已也熱退乃復還人咸奇之六歲知好書家單不能致每借市中一誦輒能記憶稍長所嗜益深父機命牧牛挂書牛角而讀之隨牛而東西行日入忘歸復使之視舂溪濱挾册坐轓車則米成粉不悟父怒逐之出世父與明憐之為代償其米且令聚徒教授束修之上悉以購書積至萬餘卷精思疾讀唯恐其不盡夜分燈屢涸猶聞其吟諷聲或至達旦不寐因觀周子太極圖説嘆曰此升聖域之階梯也人心與上堪下輿同大局於一藝可乎會上饒鄭君原善來為郡録事先生往質所疑鄭君甚器重之已而往謁許文懿公謙於金華山中公為詳陳理一分殊之旨先生豁然如夢斯覺居久之絶淮泗泝黃河而覩泰山鳬繹之雄徘徊闕里悵然有千載之思遂北至京師薦紳先生若黃文獻公溍揭文安公徯斯翰林承旨學士歐陽公玄參議中書危公素爭相引重聲譽翕然至有薦為檢討經筵編修翰林者先生皆引分固辭俄南還鄉里益以躬行實踐為教其發明本心之學至利欲沉冥處多有感泣者一邑化之雖大山長谷愚夫愚婦皆知畏慕革心從善縣飢先生告令曰民飢且死大夫其得奠枕而卧乎即語以勸分之法閭右之家計口賦之食餘粟盡乞貧民全活者以萬數父老見先生拜且泣曰我等皆白骨也而先生人之爾至正中荆襄兵起掠七閩直犯縣南鄙先生畫八䇿贊將軍石抹宜孫破之仍不逺萬里遣其徒上書行御史臺以明將軍之功未幾盜發青田揚言來攻縣長吏寶忽丁遁盜遂深入焚官舍汙人女婦剽鹵至雞犬先生召門人章溢季文謂曰吾豈忍以良民畀豺兕乎溢等曰唯先生命乃部勒鄉民為兵逐殺羣盜大府録功賚之以金幣先生曰得選賢令以撫創殘民則毅拜賜侈矣謝不受俄部使者下令正丁罪丁恚集季溪惡少年據險阻以方命首害先生于家縣人無少長皆痛憤灑泣以復讐為事弟子胡深方參軍事鄱陽急馳歸與同門友告諸方伯連率帥師剪夷之越二年始平葬先生蓋竹鄉之西山别建祠而尸祝之先生為學深見天地萬物一體之意視衆氓之顛隮如已病之茍力可救雖鈇鉞鼎鑊有不暇恤至於禽魚之微不得其所亦為蹙額弗寧思遂其生然疾惡如仇遇有賊民吏切齒扼腕流涕太息必疏其姦狀鋤而去之豪民制巨量以入粟亦叱使減去以合常度小人不便為惡時欲加害賴上官察之獲免生平不食君祿其尊主庇民之念夢寐不忘武威余闕公持節浙水東亷知之謂其卓行不讓古人性不溺文辭歎曰當今之世何能文者如牛毛而植德者若麟角盍亦知重輕乎人有求者揮毫立就亦淵然有竒氣可誦自幼不茹葷肉雖強之食終弗能下咽間居斂容澄坐多至夜中或倦極目瞑鼻息雷鳴坐客未寢者談辨蜂起晨興先生各能記其言而折衷之其神全而不亂如此殁時年五十二娶樓葉二氏無子以兄子彥荀為後扁書室曰木訥齋人因稱為訥齋先生云太史氏曰昔者山陽殷子通以儒術教授里中人薰為善良者衆及鄰境寇作子通帥弟子起兵殱之長吏惡攘其功使人殺子通門生毛術手刃殺者梟首以甘心焉君子多其義其事與先生絶類雖然先生以明體適用之學保障鄉縣使三十萬蒼生去危即安非子通比也固不幸遇難而死諸生為師復讎兵屯二年弗解卒尸鼠輩于市功比術為尤難祠宇之建不建又在不論由是而言其義不益多歟嗚呼先生道德之化蓋亦入人深矣杜環小傳杜環字叔循其先廬陵人侍父一元遊宦江東遂家金陵一元固善士所與交皆四方名士環尤好學工書謹飭重然諾好周人急父友兵部主事常允恭死於九江家破其母張氏年六十餘哭九江城下無所歸有識允恭者憐其老告之曰今安慶守談敬先非允恭友乎盍往依之彼見母念允恭故必不遺棄母母如其言附舟詣談談謝不納母大困念允恭嘗仕金陵親戚交友或有存者庶萬一可冀復哀泣從人至金陵問一二人無存者因訪一元家所在問一元今無恙否道上人對以一元死已久惟子環存其家直鷺洲坊中門內有雙橘可辨識母服破衣雨行至環家環方對客坐見母大驚頗若嘗見其面者因問曰母非常夫人乎何為而至於此母泣告以故環亦泣扶就坐拜之復呼妻子出拜妻馬氏解衣更母濕衣奉糜食母抱衾寢母母問其平生所親厚故人及幼子伯章環知故無在者不足附又不知伯章存亡姑慰之曰天方雨雨止為母訪之茍無人事母環雖貧獨不能奉母乎且環父與允恭交好如兄弟今母貧困不歸他人而歸環家此二父導之也願母無他思時兵後歲飢民各不相保母見環家貧雨止堅欲出問他故人環令媵女從其行至暮果無所遇而返坐乃定環購布帛令妻為製衣衾自環以下皆以母事之母性褊急少不愜意輒詬怒環私戒家人順其所為勿以困故輕慢與較母有痰疾環親為烹藥進匕筯以母故不敢大聲語越十年環為太常贊禮郎奉詔祠會稽還道嘉興逢其子伯章泣謂之曰太夫人在環家日夜念少子成疾不可不早往見伯章若無所聞第曰吾亦知之但道逺不能至耳環歸半歲伯章來是日環初度母見少子相持大哭環家人以為不祥止之環曰此人情也何不祥之有既而伯章見母老恐不能行竟紿以他事辭去不復顧環奉母彌謹然母愈念伯章疾頓加後三年遂卒將死舉手向環曰吾纍杜君吾纍杜君願杜君生子孫咸如杜君言終而氣絶環具棺槨殮殯之禮買地城南鍾家山葬之歲時常祭其墓云環後為晉王府録事有名與余交史官曰交友之道難矣翟公之言曰一死一生乃知交情此非過論也實有見於人情而云也人當意氣相得時以身相許若無難事至事變勢窮不能蹈其所言而背去者多矣况既死而能養其親乎吾觀杜環事雖古所稱義烈之士何以過而世俗恆謂今人不逮古人不亦誣天下人哉詹士龍小傳詹士龍字雲卿光之固始人父某宋開慶中都統勇勝軍守鄂以偏師巡渠巴諸州與元兵戰南平身嬰九創被執發憤不食卒元兵破鄂降其軍士龍生三歲同母胡氏北遷董忠獻公文炳以其父忠也鞠為子文炳長子名士選故命其為士龍飲食衣服一視諸子外人不能辨諸兄忌之罵曰虜子見幸乃同我輩耶士龍不知其故泣訴文炳文炳曰爾真吾子飛語慎毋聽也士龍哀祈益切文炳頗漏言士龍晝夜流涕欲復詹為姓受文炳卵翼恩深未敢言一日獵滹沱河遂陳前志文炳戲曰爾投石水中石浮吾當爾從也左右皆笑士龍仰天祝曰天若不絶詹氏石當浮因投石水中石盤旋急流中若沉浮者數四文炳以手拍鞍曰詹都統之靈其不死乎即令士龍復詹姓文炳薨為服齊衰三年歲時祭祀必先設神主率家人奠之士龍後用文炳弟文忠薦為高郵興化尹士龍修築捍海堰三百里數郡利之初發地獲范希文石記曰遇詹再修事蓋前定云轉兩淮都轉運鹽使司判官改淮安路總管府推官拜江南行臺監察御史時姦臣柄國虐焰方熾士龍上章劾之未幾事果敗士龍退隱興化葺草堂德勝湖上若將終身朝廷念其老成以廣西亷訪僉事起之居二年鬱鬱不樂乃移疾而歸年五十八卒子澍嶽州華容尹文炳妻以從女實因前好云史官曰精誠之格將何所不至上致日星之應下召物産之祥古則有矣今觀士龍投石之事其惡可不信哉或者致疑天人之間視之若茫然不相通過矣豫總修元史時有司不以聞失於紀載因徇其孫壻余文升之請刪其墓志為小傳一通以傳孝子丘鐸傳丘鐸字文振汴之祥符人故御史中丞劉基先生弟子也通儒書兼習醫家言流聲動一時至正末父誠為湖廣等處儒學提舉鐸侍母馬夫人留吳越欲御車往從江右兵大起武昌陷江浙繹騷鐸憂懼不知所為急避地四明暨江南皆歸職方復奉母至南京每西向翹首曰武昌有來者庶幾知吾父之所在乎已而其父果至自武昌父子相見悲喜交集鐸賣藥市中以自給親歡然忘其貧曾未幾何母弟鈞擢會稽上虞巡檢鐸與父母皆同赴官夫人疾鐸晝夜泣禱上下神祗乞以身代及殁鐸哀慟幾絶卜葬鳴鳳山之原哭曰鐸生也咫尺不離吾母膝下今逝矣可委體魄於無人之墟乎乃結廬墓側朝夕上食如生時當寒夜月黑悲風蕭颼如臨鬼神鐸恐母岑寂也輒巡墓號曰鐸在斯鐸在斯其地多虎聞鐸哭聲輒避去故會稽人異之稱為真孝子云先是鐸在四明從祖父母居汴者八人貧不能自存鐸咸迎養之死皆返葬先塋人以為難其姑適河南匡氏者年十八夫亡誓不再適鐸義之養其終身凡二十年如一日然其制行峻絶它皆類此文不能盡載也為説者曰豫聞鳴鳳山當白馬上妃二湖間人迹罕至白晝虎狼旁午鐸煢然獨處心無畏懾者豈不以親之體重於身乎然身者親之枝也可不敬乎敬其身斯孝其親矣鐸情固迫切當知以禮自節哉當知以禮自節哉危孝子傳臨海孝子危貞昉字孟陽事親以孝聞其父孝先洪武辛亥進士擢官麟遊丞再遷陵川坐法謫役浦江縣貞昉時為郡諸生聞之奔訴於郡守欲走代之守以其名𨽻學籍難其行貞昉號泣于庭曰人孰無父哉奈何獨沮於我也左右為之言獲如其請即日上道詣京師伏闕上疏曰臣父臨川丞孝先不幸絓吏議輸作大江之濱筋力向衰不能執事而大母范氏春秋復踰九十旦旦念之恐染霜露之疾無以遂其菽水之忱終天之憾或及其身臣犬馬之齒方殷願代父作勞使其歸養雖即死無恨聖天子以孝治天下惟哀矜焉疏奏上惻然從之貞昉乃解儒衣易短製欣然就役施施無難色然質體尫弱不勝負任之苦越七月病卒貞昉通周易兼能學唐人歌詩性剛直讀古忠孝事斂袵久之且曰使貞昉生其時亦當若是爾遇交友患難蹈湯火赴援不為利害惑卒時年二十八聞者皆悲之為説者曰父子體殊而氣同者也故古之孝子不以身自私非過激也宜也有如貞昉者詣闕上疏欲代父受役毅然以死自誓唯知有父而不知有身其殆近於古之孝子者非邪嗚呼死生於人大矣貞昉之死於孝是有益於天衷民彞之重無愧於俯仰無慊於神明奚翅足矣他尚何説哉彼悖德犯上者亦曷嘗不死其死也如敗豚腐鼠人孰稱道之觀吾貞昉則若威鳳之翔千仭可望而不可即得與失又為何如哉貞昉之名宜登國史以風厲四方豫舊史官也特為立傳使秉直筆者他日有采焉瞿孝子傳瞿孝子嗣興字華卿蘇之常熟人父達元初為百夫長遷蘇州巡鹽大使兼管內六縣捕盜轉怯憐口提領母某氏孝子天性純慤依依親側若不忍斯須釋者母患癰癰潰當長夏臭穢不可近孝子燖湯洗滌執扇驅蚊蚋靡晝靡夜至月餘乃休既而又罹積氣疾衝擊下上百藥不治或授以刲股可療法祝刀于天俟刀躍方可用孝子頓顙流血刀弗動孝子情迫切強取刀刲股肉作羮以進母不食已五日忽盡啖之氣銷如失一旦母思芰食時芰始華孝子求諸市不獲凡川有芰者解衣入水歷覆其葉覔之雙脛皆赤腫孝子號呼曰神胡不相我乎俄得三芰水中人以為精誠所感然其宅心仁厚單窶者必思賑給而不欲使其知氊工王氏家無儋石儲且卧疾不能興雞初鳴孝子往其門以錢二十緡投窗隙而去民有告糴者鶉衣百結孝子受其直五千復陽問曰吾性多忘若欲糴十千耶遂如數與之鬻蔬翁過門孝子市錢五十文以楮幣五百文授翁令補餘錢翁慍而辭孝子曰汝第持去他日見還未晚也負販夫或來貿遷孝子一聽其言不與較家人怪之孝子曰彼竭汗血以逐什一之利寧能足吾欲乎歲大儉來相依者數十人孝子擇旁近舍舍之會厲氣作病者相枕藉孝子每晨躬攜粥藥撫視卒賴以全孝子朝出道中拾遺囊孝子悉歸求者一金不自私未幾又有亡契劵及白金者孝子蹙額曰白金固易致質劑乃資業所憑藉其必起爭端乎密偵其人還之其人勢家奴因失主物畏懼幾欲死謝曰三尺微命孝子所賜也孝子雖不讀書其篤行類鄒魯士州里翕然稱之孝子年且耄見介子莊宦學有立洪武初擢禮部員外郎喜動顔色其後病且革言不及家事惟曰死生恆理爾煩語吾兒莊善事聖天子毋以老身為念也遂終史官曰濓待罪禁林日與莊為同官莊念父在逺一語及之涕泗澘然流濓因歎曰非誠心愛日者乎已而蘇人來言孝子之賢絶於醜夷有未易追躡之者濓又歎曰非是父焉能有是子傳所謂以身教者孝子其庶幾乎是有關世教民彝之大故造瞿孝子傳使圓冠方履者讀之必將惕然而自省矣孫孝子傳孫孝子諱惟中字伯庸濰州昌邑人祖明父琳世為農孝子朝出耕夜歸讀古人書性雅愛宋名臣言行歷歷能道之凡所謀猷恆取以為則年及壯用推擇為寧海州史一年貢益都府瀕行會父卒皇皇如欲無生縣有漢昌邑王廢城舉柩葬城中結庵廬其側藉苫以居曠野無人深夜月冷哭聲依稀隨悲風逺聞人為泣下日啜淖糜二盂却酒肉弗御晨起無火掬雪頮面輒詣墓前拜久之手足皸瘃形容憔悴甚或勸其還哭而不對閭師韓泰亨帥闔巷民言于縣縣尹戴友諒弗之信將亷之伺夜半攜二蒼頭出風雪中抵庵廬而聽孝子聞足音遙問曰暮夜欲何為戴嘆息而去以為不讓古人亟上之府部使者加覆察如縣言請旌其門文達中書禮部不報孝子長身美髯善談古今事遇子弟若嚴師家法著于井落多效之娶劉氏從孝子之化居舅喪亦不近酒肉三載生三子尚志尚文尚德尚志業為儒今禮部主客主事云史官曰李璮據益都明被兵掠至洪溝去家三十里年始十歲兵以其童也易之明夜遁倀倀亂行有老父教之曰兒但從吾指以往即至家矣明如其言走固隄鹽場中草深滅頂而豺狼左右嘷明竟得還父母亦避兵方歸舉燈索明不得相向哭燈忽作花復自相慰曰我兒其返乎不然此花何徵也言未訖忽聞叩門聲啓視之明也亟挽以入初父止生明今明之子孫逾四十人而惟中又孝行卓卓如此天之不絶孫氏者其有以哉其有以哉周賢母傳周母王氏名妙貞括人祖德潤父思齊辟為州縣吏生十齡見父有戚容問曰家業幸粗給大人當開口笑樂何乃自鬱鬱邪父曰此事非爾女子所知吾所掌獄案死者欲生之不可得故弗悅爾王氏曰名教自有樂地何不棄之復溫繹書詩邪父曰不意女子能發斯言吾之意正如此耳即日揖上官去人賢之瀕嫁父欲厚其裝環珥鞶帨之屬無所不飭王氏視之淡如出示二女弟恣其所取既歸事君舅君姑盡禮處娣姒之間恆欣欣然或主中饋身先之不專役媵人鄰有寒餓及喪禍輒周其急歲壬寅山寇作避地魯峰顛惡少年欲來侵掠王氏偵得實遣人擲其姦盜驚而潰其母項因世亂來依極力奉之以悅豫其心王氏嘗嬰疾衆醫束手謂不療忽夢老父與易氣及覺氣騰騰從頂升挾日絶粒不食已而果元氣來復疾頓瘳識者謂為神助云其夫則周世英生男女各二女皆有所歸男曰荃曰茂茂有文學政事出仕矣王氏年今七十云金華宋濓曰豫嘗從史官之後遇人有善者必謹書之將以誘民衷而樹世防也有如周母能成父志推孝於尊章出其餘智亦足破雀鼠輩之姦其中必有大過人者矣於戲賢哉賢而得書亦春秋之法也二賢母傳瑞安有大姓曰吳氏世守禮度而嚴於昏姻柳州教授埏生子欽年近弱齡埏欲為之擇配久且未成或曰同郡胡節有容德且達宦之後可室也乃遣行媒知名節之父悅焉六禮既備故節來歸於欽內外宗暨媼御而下宜之生子璟鞠育至長為娶縣人林亷亷名卿孫粗習書傳然勤翼翼然抑畏節愛之不翅若親女亷亦事節若母懷妊九閲月璟以病死未死執亷手涕泣惓惓以養親存孤為託亷諾之後三十日亷生一男子且悲且喜曰吳氏之宗其不為敖氏餒鬼乎未幾欽亦卒節與亷蓬首垢面自稱曰未亡人誓撫遺孤以不墜其家後六年元政日紊四方寇盜蜂起市魁都伯各聚農為兵陽號保障陰則倚藉為姦有利吳氏多資欲奪亷之志亷年二十有餘爾善自閉拒不可撼遂有謀殺其孤者亷懼棄家挾姑而遁擇鄰境大山匿焉艱難備嘗室如懸罄無絲毫怨懟意唯飭厲兒以學無有寒暑晝夜年三十九卒節撫棺哭泣竟欲無生益督兒事書詩勿怠又二年節亦卒兒名荃今為巨儒州人識與不識咸稱為吳氏二賢母云太史公曰吳氏之系何其危哉當璟瀕亡時荃在母腹男女未可知林氏毅然以存孤為諾非見義明如皎日能然乎使林氏之足一移吳氏宗祀墜矣此其功非再造其家者乎譬猶狂瀾東奔欲舉隻手以障之抑難矣豫謂林氏具五美焉其不畏強禦一也富而能貧二也炳於幾先而不陷於虎口三也干戈紛紜之中鬻環釧市書厲子以學四也終始一致不為浮議所惑卒令終於牖下五也夫然故其能以節操顯著者宜哉雖然不為之先孰為之後非胡氏挈綱振維於上則林氏煢煢然無依矣是則胡氏者不為尤賢乎賢哉二母如楚之雙璧光彩交映見者動容如越之雙劍光芒閃爍不可狎玩誠可謂無愧於彝倫者矣嗚呼女婦且爾則凡受人家國之寄委棄若土梗者果何心哉閩二婦傳賴道慈閩古田縣人歸同縣張文孫生一清十五歲而文孫殁於疫道慈甫年二十九黃華亂家又毁於兵羞服且弗完能確然守志弗渝人力撼之泣曰張氏自浮光遷閩其不絶如線者唯此一子耳余奈何去之及一清成人為取婦廖氏生三子頥興野而廖亡繼以陳道真道真亦古田右族既歸一清粥簮珥治財與道慈再植張門一清事道慈孝極旨甘道真相之唯恐有不足而遇廖之子不翅已出道慈晚嬰末疾手足不能用道真與媵人余乙恆挾持以就虎子道慈體肥重疲力從事逾十春秋弗厭人難之道真生以寧年十餘日授書十三帙帙三紙道真夜宿火至四鼓自起爇燈呼兒誦書坐其旁以俟頃刻皆能暗記黎明命之出送至齋門乃還以寧愛書或忘食道真執匕餧之任其恣觀不輟二十七以春秋擢泰定丁卯進士第繇國子助教八遷而為翰林侍講學士秩二品纍贈道慈道真皆清河郡夫人一清贈福建江西等處行中書省參知政事文孫贈禮部尚書閩人榮焉謂道慈之節道真之孝皆卓絶不可及殆天報之也道慈卒時年八十而道真則七十云傳有之婦道盡而天倫正有若二婦其所謂盡於婦道者耶鄭節婦黃氏傳黃為浦江著姓自隋唐以來即有聞而宋隆興癸未進士度亦其族也其居辛山者曰德清有女曰琇字守貞生賦淑姿不失故家遺範父母愛之為其選良配元至正己丑冬十二月歸同縣鄭氏瀛字仲容守貞年甫二十奉上接下無愆禮人稱其賢明年仲容髀患疽流注肌核間一潰一興纍纍如連珠百藥弗驗守貞扶掖卧起附膏於紙而更敷之雖甚久無懈怠意又六年仲容殁守貞自矢不再適且曰生為義家婦死為義家鬼敢失節以玷旌門乎其志堅凝屢有撼之者不少動寒燈孤幌淡然能自安遂命仲容從子柎為其後守貞今四十九矣及見柎授室生二子熛煁朝夕受其孝養云昔者孔子稱宓不齊之善而歸於魯國之多賢蓋觀感而興非有資於賢者要亦未易以成名也今鄭氏之家十葉聚食至大辛亥嘗旌其義門其規度整肅如嚴霜烈日可畏而可仰其德義之涵濡又如春風和氣之薰蒸不自知其入人之深故其化行教洽過其門者猶率德勵行而乖戾之慮消况為其家之婦者乎宜守貞執節之堅而循禮之謹也傳曰一家仁一國興仁其理誠不誣哉豫官議曹時郡國多以節婦事行來上輒聞報下褒異其門閭觀風使者或以守貞為言其有不彰明之者乎異日烏頭雙表之樹與旌門後先輝映不亦一家之盛美哉豫故輯其事為傳文一通衣冠之士儻有扶植彝倫為任者尚見諸賦咏以同其傳云柳氏二節婦傳柳氏二節婦者上虞柳宗逺妻唐及其子桂之婦陳也初唐年二十三歸宗逺事其姑孝越二年生一子桂而宗逺卒或少唐恐其難寡居也以語試之唐忿曰吾喪夫命也婦不二醮義也命天使然義出於人心吾縱不畏天能昧吾心而負義乎且吾姑老吾子少吾去之將安求乎益苦心瘁力營粟帛以養姑命桂學詩書於鄉先生姑年八十餘乃終而桂長遂娶陳女為婦陳歸桂逾年桂亦卒陳年甫二十四或閔陳無子且少也勸其再配陳哭曰此豈人所言乎吾姑不負吾舅吾敢負吾夫乎吾寧即死柳氏牖下不願聞此語也乃去膏沐屏華麗與其姑相依以居姑食然後食姑寢然後寢家內外事必告而後行姑婦孝愛如母子歲時具殽醪祭柳氏亡人二婦煢然拜階下輒涕泣不能相視後以某子某為桂後今唐年六十陳亦四十鄉人咸稱為二節婦云史官曰夫婦者相扶以生者也相扶以生者人道之常也不幸遇夭折臨患禍夫不獲婦其婦婦不得夫其夫是豈人情所願也哉斯變故也夫人處平居無事雖至暗劣皆可以勉事有出於難處者雖竒偉丈夫時時猶有失焉况婦人哉若柳氏姑婦皆在少年喪夫處人之所難堪以至于老余讀其事未嘗不為之歎息也人常患後世俗不逮古是烏可槩言乎二婦之所為擬之古賢婦何讓乎余因門人朱瑾請為列其事使繼此執筆者有取焉王節婦湯氏傳婦以節名非常也變也變而不失其正不亦善之善者乎若王節婦者是已節婦名慕貞姓湯氏世居武林施水坊父榮母戚氏慕貞生十七年同里王君暹聞有容德俾其子常奠鴈納為室既歸三族媼御交譽之常字彥常少有逺遊志既生女及男驥元至正乙未出商番禺已而之桂林後六年死焉慕貞二十七矣遙望南海淚眼無乾時上承舅姑米薪鹽醯之費靡不經度不足使蒼頭貿易以給舅姑忘其子之亡舅嘗患疽慕貞稽顙北辰乞以身代疾乃瘳舅有女兄二人年髦無所依慕貞迎還於家忠養同其姑夫之季弟曰暉娶史氏育二女貧不能嫁慕貞擇良壻治嫁具遣之暉與史旅死三衢慕貞不憚千里之逺取二喪藏諸先塋其訓驥尤切俾事賢傅受春秋三傳之學國朝洪武癸丑取浙江行省第六名文解貢入成均選授吳王府伴讀朝夕陳訓于王久之拜監察御史近以使事入閩過其家方嶽大臣洎部使者交謁于門問母夫人無恙人為慕貞榮慕貞不自樂也且曰我未亡人爾自意危如朝露不復有今日幸視驥加長歲時持一觴酒酹王家墳上庶他日九泉見彥常無慚色爵祿之有無皆天也奚暇計哉君子愈賢之嗚呼婦之青年喪夫最號多艱儻居貴富家有傔媵足以備驅役闔廬足以蔽風雨粟帛足以供衣食猶可自安茍或煢煢弔影室如懸磬忍寒夜織機聲與候蟲齊鳴達曙不休自非鐵心石腸未必不為之動也學士大夫讀四庫之書平日抗手論天下事何處更有豪傑一遇絲髮利害反眼若不相識視女婦未嘗知書者乃有所不及可勝歎哉濓於慕貞之事不得不為之紀載也夫移風俗美教化之道慕貞實有焉因具書之以厲為人婦者贊曰婦以節名初非美稱唯王婦湯守變以貞心堅同石操潔如氷太史作傳永揚休聲前翰林學士承旨嘉議大夫知制誥兼修國史兼太子贊善大夫金華宋濓撰周節婦傳節婦姓趙氏名淑宋燕懿王之裔安定郡王令詪九世孫也令詪從高宗渡江南居越諸暨遂為諸暨人父孟德有文學生二女節婦長且賢尤愛之授論語孝經列女傳皆能通其義年十八求宜壻者得同邑周本恭歸焉始歸而姑卒既而舅及兄公姒氏亦相繼死兄公子顯宗尚幼節婦相夫飭喪治葬咸盡禮育顯宗如子歸十一年生三男宗善宗祚宗政宗政始生時天下亂夫嬰疾甚恐不起顧節婦曰今兵革四興嗣子單弱如此我死爾能自保乎節婦囓指流血泣曰天在斯吾有不能保孤兒者天實誅之夫卒節婦年二十九髽跣號泣泣間含食哺諸兒不暫出户限明年國朝克諸暨與偽吳分邑拒戰兩兵交焚掠家資無纎毫存節婦抱兒及顯宗從一媵出走匿惟持田籍以行深山窮谷間飢餓顛踣削木膚採藜藿以食或閔其艱勩勸之曰呱呱者何足恃奚為自苦耶節婦怒不與言剪鬢髮示之益自裁戢厲色峻辭使人莫敢近兵定而歸富民侵主其田殆盡節婦持田籍與辨卒賴以完知州田若賦高其行欲上其事于朝節婦曰宜然耳何足上聞力辭不願乃復其家節婦感泣日治麻縷為布帛以繼乏絶市詩書教諸子夜焚松脂于室坐諸子兩旁而口授之或怠睡首俯輒笞咄不少恕諸子皆凛然畏憚如嚴君覩其色變即惴恐莫敢舉目視及長遣從名師遊所友善士相過則喜為之置酒否則憤歎竟日節婦以兄公早殁惟宗顯存為之昏娶先於己子羞服與諸子同人不知辨諸子遜弟皆有士行宗祚入為太學生以文行稱人咸謂節婦善教所致云史官曰世之傳節婦者多貴殺身為難能至於守義不二者則略而遺之余甚惑焉鋒刃之威迫于後湯火在前有所不顧此人情所能勉至於困窮災變切身凍餒顛踣而不渝其志存人之孤非篤於禮義者其孰能之若周節婦是矣嗚呼此豈特賢於女婦而已哉謝節婦傳節義人性之所有也豈以所居而變哉南雄在嶺之南山毒海悍風氣與中州殊論者或從而訾其習俗其言陋矣若謝節婦者安可輕耶節婦謝氏女南雄人年二十八適郡士鄒永泰居四年生子忠甫十月永泰得疾危懼或死有父母存且子幼莫為計以語覘婦曰吾旦夕死然吾家貧安敢以老親幼子纍爾哉婦流涕曰君豈病而狂易耶君萬一不幸養老撫孤妾職也妾一移足忍見鄒氏兒為人奴𨽻乎已而永泰卒窶愈甚甔盎無朝夕儲節婦躬力蠶織為布帛易粟以奉舅姑忠八歲使就鄉師學節縮服食以資束修禮其舅姑不知其貧及舅姑卒鬻所居廬以易槥櫝行喪治葬務合儀則或閔其艱勸其再事富人節婦曰我豈不知富人勝於鄒氏乎然鄒氏我所安也使我食他人八珍九鼎不若飲鄒氏杯水耳益自操守不少變教其子為儒節婦少嘗讀孝經小學書通達義理故能盡婦道云史官曰嗜欲之性人孰能免哉能以禮義制之則不入於邪僻矣婦之事夫當無恙時指天地神明誓生死不相違棄及遇變故能如其言者蓋鮮矣豈非不達禮義使然耶若謝婦者夫死困厄幾不能為生而處之欣欣然行其自誓之語如合符契非禮義淪於心能致是耶嗚呼禮義足以治人也久矣韓節婦傳節婦韓氏名惟秀開封人元四川行省左丞渙之女也年二十一歸耶律文正王四代孫養正養正時為劉莊場鹽司令甫六閲月沒于官節婦行三年喪乃還父母家適其弟敏以疾卒二子肅寬俱幼節婦與敏妻賈氏約曰吾聞古之烈女不更二夫吾與汝皆簮纓家子宜則效之茍或失思慮再醮於人縱死為鬼亦當有餘羞耳賈氏悅曰此妾之志也朝夕乎父母舅姑之側旨若甘恐或不備也衣與衾恐或不完也教肅與寬又恐不知其方也左之右之同心弗少懈歲壬辰賈氏亡節婦哭之慟曰爾何遽去豫而死乎豫寧與爾俱亡乎不火食者三日已而又曰吾茍死其奈父母何遂割情忍泣奉尊撫卑如賈氏存時見寬以才學被選列官國朝再轉為侍議使節婦今年五十九其母則八十五云史官曰易有之不節若則嗟若無咎又曰安節亨蓋不改其節則必能亨違節之道則哀嗟自己所致無所怨咎矣聖人作易當無物不該推此以喻節婦庶幾亦有合者乎節婦自耶律君沒制行如白璧者三十有八年使令名昭晰於無窮視彼夫骨未寒輒棄之他適為人唾去而弗齒者果孰為亨而孰為不亨乎况節婦無子可依毅然堅其苦志於母家此尤卓異可書者故備列之然賈氏能與節婦同志卒以節終亦賢婦也哉趙節婦傳略監修國史長史張君子長著趙節婦傳纍辭至九百餘節婦之孫嗣鴻懼讀者莫得其要請濓刪其辭為傳略云節婦徐氏名定瑞婺蘭溪人年及笄歸金華趙時堯時堯父旰夫亦娶徐節婦姑也無子生二女時堯以再從子為其後二女以非己同出不相寧節婦相夫順受之母子以和時堯卒節婦年甫三十誓不再適養其姑終身撫弱子至於成人復三十年乃終若節婦者其無愧婦道者邪王貞婦傳王貞婦名妙清會稽人年及笄歸同里可先樓君生二子叔仁澄叔仁始七歲澄僅四月而樓君亡貞婦毅然以節自誓朝虀暮鹽或不能給而貞婦安之從事殘燈敗杼夜參半猶隱隱聞伊軋聲人數有撼之者志如鐵石而弗可動舅姑亦憐其少欲俾更適人貞婦泣曰妾聞婦人於夫一與之醮終身不移妾何敢忘家縱貧得服勞於舅姑之側他日九泉之下當有以見吾夫儻舍之而去雖終日飲醲囓肥犬彘亦不食其餘矧人乎哉妾有死而已不能從也舅姑見其語剛而意不回復義之貞婦自是事舅姑益致其恭教二子從良師遊皆成人知問學亦頗能盡孝見稱於士君子間貞婦夫死時年二十七而今已五十四矣史官曰嗚呼若貞婦者豈不為難哉自陰教久不行女婦不知書詩謨訓其所欲為鮮克由於禮者矣而貞婦乃能矯然自異如徑松梃梃於蒿萊間是何可及也嗚呼若貞婦者豈不為難哉王貞婦傳貞婦名順榮字靜安姓王氏台之黃岩金沙里人性莊毅日處深閨人不見其面其父廣東元帥嗣竒之慎擇所配年十七歸同邑楊伯瑞伯瑞以才用世纍官行樞密院斷事官階從四品得封貞婦河南郡君至正間貓獠兵侵天台伯瑞帥師往扼之弗勝遂遇害貞婦時寓四明年二十又七生子慶夀始兩月聞夫亡躑躅欲求死親屬交相慰解遂護喪還葬于鄉屏鉛華弗御戴道家冠披鶴氅衣翛然如塵外人未嘗輕於笑語人誚之則曰我未亡人爾尚何心追逐世好耶鄉里小兒欲媚上官以貞婦美姿容嗾使聘之不從將以威劫其去貞婦遽引刀斷髮痛詈不少休事遂寢越三年有權貴人聞其賢強委禽焉貞婦度不免拊膺長號呼曰楊樞密何在楊樞密何在妾將相從于泉下因悶絶仆地媵人抉齒以藥灌之移時乃蘇俟間執慶夀手曰吾命婦也不敢虧節以辱汝父汝父亡我非不能死以汝年幼將誰育之即不育歲時何人持巵酒以酹汝父墳乃忍死至今今汝已十齡吾復何憂我將死於汝父之墓言訖泣而行慶夀號訴從母林氏林亟往救貞婦以刀自剄不殊林奪刀挽之歸環守至旦稍解貞婦復斷髮如初權貴人曰此烈婦不可強之強之不祥嗚呼女婦之質甚弱耳扣盎足以駭走之今貞婦乃不為威武所屈若是非其秉志剛見義明有不能也世以丈夫自居者冠帶儼如步趨鏘如議論藹如人倘以女婦目之則頩然怒去及究其所為一遇小利害則甘心喪其所守似婦人女子之不若抑又何説哉然自兵亂以來婦人徇節而不屈者或自剄死或墜崖下死或赴水火而死固人之所難此特出一時義烈所激爾有如貞婦處孤燈敗帷間淒風蕭蕭然中人歲積月深必有甚不能堪者恆人之情寧不為之少衰貞婦之操則愈堅如鐵石百折不撓豈不尤人所難者乎使一鄉之得若人必有率德而勵行者由是達之一邑一州無不皆然其於移風俗美教化之道有國家者蓋有賴焉是宜為之傳以俟觀民風者贊曰昔夏侯令女夫死不嫁遂致斷髮為信或蹙迫之急乃割耳與鼻誓不欲類於人至今想其遺風猶凛凛然可畏也今貞婦截髮絶人其厲操蓋與令女同若其持刃自刎比之割耳鼻者且欲并身而捐之其志為益苦矣嗚呼令女不可見有若貞婦其所謂異世而同符者非耶徐貞婦鄭氏傳徐貞婦鄭名妙靜衢之西安人其父頥本簪纓家娶周無它男子惟産四女而貞婦居其三年十齡粗通孝經大義沉毅如成人諸女或與之狎輒厲聲叱之皆畏讋不敢近父竒之慎擇所歸聞同郡徐思誠乃宋忠莊公徽言之七世孫代有顯人而思誠又習進士業彬彬而文於是慨然許之及合卺成禮貞婦已十九矣時舅天祥與姑朱氏春秋皆高貞婦靡日靡夜事紡磚惟謹由是羞服備給上獲舅姑心凡遇賓祭亦悉意助集不足則質簮珥供事及其自奉疏食水飲甘之若飴舅殁貞婦出所畜布泉為含襚衰絰諸費始得成喪思誠出卜葬地舟覆溺死上航溪貞婦哭慟幾欲無生不憚勞勩葬舅與夫先塋之側養姑高堂日問起居察時燠寒為衣進之退撫二子謙貞俾從醇儒學而與勝己者交非其類者絶之雖寒燈涼幌人不能堪貞婦處之裕如父母及諸娣憫其年少欲使其更醮貞婦曰吾夫固亡有二子在斯不謂之亡矣脫若無子其如姑老何義亦不忍去也具人之形而犬彘其行妾肯為之乎即引交股刀截去髻誓不二夫聞之者懼不敢撼貞婦見二子成立謙以行義察舉為部使者掾以政事聞擢為瀧水丞貞婦喜曰吾今而後可以見吾夫地下矣謙當之官會恩例覃及於親受文綺細繒之賜貞婦益喜召謙至出白金盤八授之曰國家寵恩至矣爾居官宜氷蘖自守祿或不給則售此用之慎毋黷貨為也洪武二年知縣何忠以貞婦年三十夫亡寡居二十八年氷清玉潔可以厲民風乃上其事於府知府王珍加覆核焉浙江按察僉事張思立復亷其非誣然後具牒上行中書以次達之中朝三年四月得旌表其門如令貞婦今逾六十又四康強無它疾嘗有田宅為強族所據屢訟不得直夫殁讓弗與競及宅轉鬻他姓貞婦贖居之識者謂貞婦知大體云史官曰禮始夫婦者何蓋有夫婦而後有父子有父子而後有君臣三者雖殊其道一而已矣若使婦不二其夫子不唇其親臣能忠於君天下其有弗長治者乎奈何世教淪滑士大夫誦法先王往往或至於悖君父有如一女婦之微不甚知書乃能抗節自守足以增於五倫之重亦可慨也夫故余於徐氏之事特為著傳文一通不少讓將以厲子職樹臣節重名教非曰徒作也有來讀者毛髮將聳然而立矣蔣貞婦傳蔣貞婦德新世居歙之黃山自幼莊靜父忠甫為之擇配鮮有當意者年二十有八始歸同郡羅宣明宣明鄂州刺史諸孫家法素謹貞婦奉尊章處先後咸底禮度中外稱之弗置至正壬辰蘄黃妖寇起破州郡屠戮人如刈草菅蔓延將至歙宣明散家資募兵保障鄉井己而兵大集歙城陷官軍復者再三宣明功為多癸巳夏四月元帥沙不丁治歙城以宣明慷慨仗義俾分築一百三十尺宣明之家索於用兵其計無所從貞婦盡售奩中物相之宣明忘其憂乙未冬十二月祁門黟縣惡少年搆浮梁劇盜來犯歙宣明謂貞婦曰我素負殺賊名賊必不貸我汝宜相從軍中如何貞婦曰婦人在軍中兵氣恐不揚子獨不聞之乎妾有兄弟在香山寨柵頗可守妾往依之君努力自愛勿以妾為念也遂灑泣而别丙申春正月歙城復陷宣明請兵江浙行中書賊聞宣明妻孥在香山攻之益力二月天雨雪寨破賊大肆焚掠初貞婦以宣明從征不忍茹酒肉至是炮炙行觴命左右醉飽以二子驢兒馬兒屬蒼頭奴詹寄詹勝寶曰事勢至此我誓不受辱一死決矣然不可使羅氏無後汝宜護二兒還主翁也言訖勝寶負驢兒出媵人挾馬兒繼之貞婦又繼之遇賊石崖上賊遂褫其衣貞婦力拒賊攫貞婦髮貞婦齧其臂爪其面出血罵曰死狗奴汝何不殺我賊怒斫其臂以刀舂之墜崖而死驢兒見母死哭罵曰賊賊爭忍殺吾母他寇曰何等小物敢爾耶橫槊刺其背死勝寶遁寄不勝怒執木戟擊傷數冦與媵人皆遇害日將夕冦退貞婦從姪蔣志道從積尸守緣崖下見貞婦尸如生傍有衣篋類有物窣窣然動啓視之馬兒在焉亟抱以歸宣明云太史公曰喪亂之餘女婦以節著者有矣若歙之蔣氏何其烈哉夫以柔脆之身竟欲抗如虎之盜自非義激于中視死如歸其氣不如是之明也大抵故家遺俗詩書之澤弗替宣明又能奮揚而飭導之使一門之內婦死於夫子死於母而一蒼頭之微亦能為其主捐軀此殆難以聲音笑貌為也然則宣明亦賢矣哉賢者宜有後篋中之兒所以能獲全於今也王媛貞阮傳王媛貞阮者名淑稿城人均州守阮容之子歷陽王瑀之妻也瑀故名閥淑亦出右族好禮而貞一陽和陰肅懿聞流三族間瑀以材起家為裨將當戍夫槩夫槩與敵土犬牙瑀將邏騎偵其營敵意徑兵壓境悉力迎戰瑀知不能免蹈白刃前邏騎皆逝瑀尋被執以不屈死淑慟曰夫者婦天也吾天傾矣尚何所仰哉遂蒙被泣卧不粒食媵人以食進淑麾曰去吾不食矣己而氣阽阽若絲先後僅屬媵人又以藥進淑復麾曰去吾不藥矣如此者七日竟終年甫二十三爾淑葬金華城北黃塢其顛有異瓜生蔓一而四實其色光翠如沐者君子謂淑能知貞道矣貞道明則常倫定矣詩云髧彼兩髦實維我儀之死矢靡他此之謂也頌曰翼翼貞阮執行有常夫戍而俘䀌然隱傷不食以死其節煒煌瓜瓞之生天旌厥祥宋烈婦傳烈婦宋姺音莘字新金華潛溪人美姿容幼即讀書知大義搦管作字亦莊正可觀既長歸烏傷賈明善足不妄踰户閾雖家人弗聞其語笑聲一宗歡曰是端簡靜默也賈氏有婦矣父母亦賢之不忍其逺去左右越一年令與夫來居潛溪烈婦孝養益謹見諸女讀古烈女事則慨然想其為人既而曰是亦不難為婦者當璧碎而潔無寧瓦全而穢也歲戊戌十月西兵搗蘭溪逺近大震烈婦不自安同夫避入浦陽城竇山中未幾鄉民嘯聚倡亂樹旌纛執劔殺人如刈草菅烈婦亡匿灌莾中為遊卒所執乃抽銀條恱求解不聽將亂之烈婦以計紿曰吾有珠貝可直數千緡昨夕瘞山前坎中爾幸無急我急我我將死於爾何利不若導爾發之遊卒悅其言從之行至深淵側竟躍入死焉時十一月十四日也其兄濓聞而哭曰天乎烈婦在家為淑女歸人為良婦既淑且良縱不備有胡福其豈不得考終于寢乎不知何為而遘兹兵禍也嗚呼自古莫不有死當是時執法之大吏秉鉞之將帥守土之二千石或有不能而烈婦獨能捐軀徇義死固死矣千載猶生視彼弗死而若死者何如也縱遘兵禍又何傷焉然而婦之守貞猶人子之當孝人臣之當忠也烈婦之死恆道爾何足深羡乎雖然是固恆道爾而亦非易致也人之所欲莫甚乎生茍所見一髮未盡則幸存之念興幸存之念興含辱忍垢何所不至哉想其臨淵之時貞剛之氣充塞上下天不足為高地不足為厚日月不足為明視區區微生直鴻毛輕耳不然何以能若是之烈也徵太平日所言當璧碎而潔毋令瓦全而穢者不亦允蹈也哉烈婦之事與軋之竇氏越之王氏無大相逺求之千百而不一二見焉濓因不避親托其行實著為私傳一通所以白烈婦之志他日傳之竹帛詔諸海內良史氏職也非濓之所計也謝烈婦傳謝烈婦芾婺之金華人年十三適蘭溪吳履奉尊章處宗族以禮性勤而剛事非義毅然執弗行鞠撫衆雛紉針補綴常至夜分雖血貫指不自寧履貧而宦遊家政一聽芾能弗墜戊戌春三月西師破睦州遊騎日壓境上芾懼急謂履曰妾聞西師鐵騎逾十萬數出則塵埃蔽天白日為黃既得睦必東窺婺謂其不至者妄也卿讀書號男子宜察知之妾衰瘦如鬼旦暮禍及決不能挈弱幼逺遁曷若先買舟東下為上計否則歸妾母家母家南有池即有急以身餧魚鱉爾誓不受汚以病君也履重於行紿曰勿恐有履在也冬十月二日丁卯履出城南芾復申前言且祝履曰宜急旋稍緩噬臍無及矣履復答如初越四日辛未芾見潰軍被血衣東奔不絶謂媵人曰事急矣候雞再號裹糧挾季女以東媵人負小兒從明日壬申力憊甚芾猶手牽女且行且泣曰汝父不得復見矣吾與汝死即死耳身不可失也遂避入金華山中媵人後視芾不相及棄小兒道上亦泣去己而遊兵四出赤幟遍山澤東西作呼嘯聲虜女婦無算芾度不可免力疾捫蘿而上抱女投崖下死履歸求之夾日始得尸母與女相向其貌如生時嗚呼人極之所由建者三綱也使臣子之於君父皆如芾之弗畔其夫國家安有喪亂之禍哀哉嗚呼世之號士君子者平居暇日高自稱譽無不曰我學周公仲尼之道茍指為婦人女子則勃然怒去一旦君父有難輒或竄或伏不翅狐兔是婦人女子之弗如抑又何説也然自兵興以來女婦以節著者亦頗見之未有若芾之烈者也夫豈樂死惡生者哉誠以義塞于內與其生而抱愧寧若死而就安推其所志神明可通金石可貫衡嶽之層雲可開非細故也彞倫風教於是所係為甚重濓故為文道其事使濓言行人心或不亡者當自省矣嗚呼彼有家而奉箕帚者孰非人婦孰非人婦哉贊曰戊戌之變濓女弟姺亦以秉節沉淵死後烈婦特三十有六日爾濓悲之淚落弗止聞有如姺者必謹叩之或歷其地以訪焉間嘗過金華山中問烈婦投崖處悲風四集林木怒立猶凛凛有生氣豈其貞魂烈魄猶足以感人耶烈婦雖死其弗死矣夫張義婦傳義婦張氏濟南鄒平人年十八歸戍卒李午午同從子零出戍七閩未幾午死張獨事舅姑父母生養死葬無遺禮復痛夫死數千里外枯骨未知所歸乃往卧氷上呼天祝曰天乎妾夫何罪妾夫何罪生既不見父母死又不能歸葬父母之傍使無妾即已妾在敢愛死乎天若許妾取夫骨雖寒甚當得不死踰月竟不死鄉人異之為聞於縣給過所遣之至閩零猶在問夫葬地則榛莾日塞不可識張哀慟幾絶夫忽降于童與張語生前事甚悲且示骨在處張如其言發得之持骨祝曰爾信妾夫耶入口當融如氷雪黏如膠己而果然官義之為上于大府請復其家使零護喪歸濟南金華宋濓曰濓聞長老言廬陵有趙應祥者父行賈死利津亂葬叢冢間應祥求之慟哭七日夜不得乃解髮繫馬鞍上祝曰天若有知行至父墓鞍即墮未幾鞍墮發而視之果父也葬時所題名氏猶存此與義婦之事頗類傳曰孝悌之至通於神明此之謂夫貞婦郭丑小傳郭氏丑字道安六合人也美姿容其父彬授之書詩輒通大旨母劉氏得疫疾諸弟妹尚幼羞服無所倚賴道安上扶掖母氏起居下撫孩稚潄浣紉綴之事皆親之冬盛寒燈火蕭然持針恆至夜半不休且不樂靡麗身衣紈素同綺繡女偕坐略不動容目亦不注視至於纂組烹飪不經師授而悉精其能彬絶愛之不肯歸凡子同里鄭玄來求婚彬激曰爾能從師攻文辭即可爾玄乃力學道安年十九竟妻玄婦道甚修譽起一鄉間玄以古列女傳難之道安曰某女事如此某女事如彼一一舉之無漏文玄不能屈因加進學功其父讓不悅痛繩之玄悒悒不樂道安曰子但盡誠盡孝他非所知也瞽叟底豫之言豈猶不聞之耶玄釋然道安秉性堅貞強暴欲侵凌道安厲色叱之去其人恃為尊屬屢見迫道安彈指出血曰父誤我矣父誤我矣不幸遇此唯有一死爾媵人勸曰何不告夫君知之道安曰吾茍白其故父子何面目相見耶曰此人倫之變宜走訴父母使其知所忌不敢肆道安曰秖揚惡聲耳無益也不若就死之為安日向中道安潛出沉于河時洪武十年七月十七日也彬聞之悲欲無生瘞于揚子西沙清水潭上一夕玄夢其來車馬儀衛甚都且曰妾今在長蘆水府掌鉤考人間善惡念子索居故一來耳不可久留也言畢颯然如雨風而去次夕其姑夢亦如之長蘆在六合城南二十五里云史濓曰郭氏素稱詩禮之家婦人女子亦有異於人彬之姊真適許士瞻生一女而士瞻死年始二十三耳今埀五十而節操凛然而道安又貞烈如此誠可為敬仰哉傳言忠節之人殁必為神明長蘆之事雖近誣亦不敢謂決無是理也嗚呼新臺之什孔子刪詩而不削去者其埀訓也逺矣哉文憲集卷十一
